<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="沙漠植物生存智慧插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">沙漠植物怎么活下来</text>
  <line x1="220" y1="56" x2="580" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——存、找、躲、舍，四招求生</text>

  <!-- 四栏 -->
  <line x1="200" y1="100" x2="200" y2="460" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="400" y1="100" x2="400" y2="460" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="600" y1="100" x2="600" y2="460" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- 第一招：存水 -->
  <g transform="translate(100, 130)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#2d6a4f">存</text>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">仙人掌</text>
    <g transform="translate(0, 60)">
      <rect x="-15" y="0" width="30" height="80" rx="15" fill="#2d6a4f" stroke="#1a4a2f" stroke-width="2"/>
      <rect x="-32" y="25" width="18" height="35" rx="9" fill="#2d6a4f" stroke="#1a4a2f" stroke-width="2"/>
      <rect x="14" y="15" width="18" height="45" rx="9" fill="#2d6a4f" stroke="#1a4a2f" stroke-width="2"/>
      <!-- 水滴标注 -->
      <ellipse cx="0" cy="40" rx="6" ry="10" fill="#4a90b8" opacity="0.5"/>
      <text x="0" y="105" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">叶变刺</text>
      <text x="0" y="118" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">茎储水</text>
    </g>
  </g>

  <!-- 第二招：找水 -->
  <g transform="translate(300, 130)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#c8843a">找</text>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">骆驼刺</text>
    <g transform="translate(0, 60)">
      <!-- 地上部分 -->
      <rect x="-15" y="0" width="30" height="15" fill="#6a8d3f"/>
      <line x1="-10" y1="0" x2="-12" y2="-10" stroke="#4a6a2f" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="-12" stroke="#4a6a2f" stroke-width="1.5"/>
      <line x1="10" y1="0" x2="12" y2="-10" stroke="#4a6a2f" stroke-width="1.5"/>
      <!-- 地下根 -->
      <line x1="0" y1="15" x2="-15" y2="120" stroke="#8d5a36" stroke-width="2.5"/>
      <line x1="0" y1="15" x2="0" y2="130" stroke="#8d5a36" stroke-width="2.5"/>
      <line x1="0" y1="15" x2="15" y2="120" stroke="#8d5a36" stroke-width="2.5"/>
      <!-- 地下水位线 -->
      <line x1="-30" y1="125" x2="30" y2="125" stroke="#4a90b8" stroke-width="2" stroke-dasharray="3,3"/>
      <text x="40" y="128" font-family="serif" font-size="8" fill="#4a90b8">水</text>
      <text x="0" y="155" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">根扎二三十米</text>
    </g>
  </g>

  <!-- 第三招：躲 -->
  <g transform="translate(500, 130)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#e07856">躲</text>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">短命植物</text>
    <g transform="translate(0, 60)">
      <!-- 种子 -->
      <ellipse cx="0" cy="100" rx="6" ry="4" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
      <text x="0" y="115" text-anchor="middle" font-family="serif" font-size="8" fill="#7a3b14">种子睡觉</text>
      <!-- 箭头 -->
      <path d="M0 90 L0 70" stroke="#e07856" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
      <!-- 花 -->
      <path d="M0 60 L0 40" stroke="#2d6a4f" stroke-width="2"/>
      <circle cx="0" cy="35" r="8" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
      <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="8" fill="#7a3b14">雨来就开</text>
      <text x="0" y="140" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">一生几周</text>
    </g>
  </g>

  <!-- 第四招：舍 -->
  <g transform="translate(700, 130)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#4a90b8">舍</text>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">梭梭树</text>
    <g transform="translate(0, 60)">
      <!-- 主干 -->
      <rect x="-4" y="20" width="8" height="80" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 活的枝 -->
      <path d="M0 30 L15 20" stroke="#2d6a4f" stroke-width="2"/>
      <path d="M0 40 L-15 30" stroke="#2d6a4f" stroke-width="2"/>
      <!-- 枯掉的枝 -->
      <path d="M0 50 L18 55" stroke="#8d5a36" stroke-width="1.5" stroke-dasharray="2,2"/>
      <path d="M0 60 L-18 65" stroke="#8d5a36" stroke-width="1.5" stroke-dasharray="2,2"/>
      <text x="0" y="115" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">舍枝保根</text>
      <text x="0" y="128" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">雨来再发</text>
    </g>
  </g>

  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#e07856"/>
    </marker>
  </defs>

  <!-- 底部引言 -->
  <g transform="translate(400, 490)">
    <rect x="-320" y="0" width="640" height="90" rx="10" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14" font-weight="bold">没有腿不能跑，没有手不能挖，可它们活了下来</text>
    <text x="0" y="52" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">存水 · 找水 · 躲旱 · 舍枝——每一棵沙漠植物都是一本生存教科书</text>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">环境再难，只要肯想办法，总能找到活路</text>
  </g>
</svg>
