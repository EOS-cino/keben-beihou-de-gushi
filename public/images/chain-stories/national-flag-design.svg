<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="五星红旗设计图案含义的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">国旗的设计故事</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">曾联松设计的五星红旗，1949年定为国旗</text>

  <!-- 大国旗 -->
  <g transform="translate(400,200)">
    <rect x="-180" y="-100" width="360" height="240" fill="#c84a3a" stroke="#8d5a36" stroke-width="2"/>
    <!-- 大星 -->
    <g transform="translate(-110,-55)">
      <polygon points="0,-36 10.6,-11 36,-11 15.8,5 22.5,30 0,15 -22.5,30 -15.8,5 -36,-11 -10.6,-11" fill="#f4b942"/>
    </g>
    <!-- 四颗小星 -->
    <g fill="#f4b942">
      <g transform="translate(-30,-80)"><polygon points="0,-13 3.8,-4 13,-4 5.6,2.2 8.7,12 0,6 -8.7,12 -5.6,2.2 -13,-4 -3.8,-4" transform="rotate(-20)"/></g>
      <g transform="translate(-5,-50)"><polygon points="0,-13 3.8,-4 13,-4 5.6,2.2 8.7,12 0,6 -8.7,12 -5.6,2.2 -13,-4 -3.8,-4" transform="rotate(-45)"/></g>
      <g transform="translate(-5,-15)"><polygon points="0,-13 3.8,-4 13,-4 5.6,2.2 8.7,12 0,6 -8.7,12 -5.6,2.2 -13,-4 -3.8,-4" transform="rotate(-70)"/></g>
      <g transform="translate(-30,15)"><polygon points="0,-13 3.8,-4 13,-4 5.6,2.2 8.7,12 0,6 -8.7,12 -5.6,2.2 -13,-4 -3.8,-4" transform="rotate(-90)"/></g>
    </g>
  </g>

  <!-- 标注线 -->
  <!-- 大星标注 -->
  <line x1="290" y1="145" x2="180" y2="100" stroke="#8d5a36" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="60" y="85" width="120" height="30" rx="5" fill="#fef0d8" stroke="#c8843a" stroke-width="1"/>
  <text x="120" y="105" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">大星：共产党</text>

  <!-- 小星标注 -->
  <line x1="395" y1="150" x2="500" y2="100" stroke="#8d5a36" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="500" y="85" width="140" height="30" rx="5" fill="#fef0d8" stroke="#c8843a" stroke-width="1"/>
  <text x="570" y="105" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">小星：全国人民</text>

  <!-- 红色标注 -->
  <line x1="580" y1="300" x2="640" y2="340" stroke="#8d5a36" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="560" y="340" width="160" height="30" rx="5" fill="#fef0d8" stroke="#c8843a" stroke-width="1"/>
  <text x="640" y="360" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">红色：革命鲜血</text>

  <!-- 金色标注 -->
  <line x1="290" y1="200" x2="160" y2="340" stroke="#8d5a36" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="80" y="340" width="160" height="30" rx="5" fill="#fef0d8" stroke="#c8843a" stroke-width="1"/>
  <text x="160" y="360" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">金色：光明未来</text>

  <!-- 底部故事 -->
  <rect x="60" y="410" width="680" height="160" rx="10" fill="#fef0d8" opacity="0.6"/>
  <text x="400" y="438" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">1949年，新中国征集国旗，收到近三千幅作品</text>
  <text x="400" y="462" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">上海普通人曾联松设计了五星红旗图案</text>
  <text x="400" y="486" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">大星代表中国共产党，四颗小星代表全国各族人民</text>
  <text x="400" y="510" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">小星的尖都朝向大星，表示全国人民团结在党的周围</text>
  <text x="400" y="540" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a" font-weight="bold">1949年10月1日，第一面五星红旗在天安门升起</text>
</svg>
