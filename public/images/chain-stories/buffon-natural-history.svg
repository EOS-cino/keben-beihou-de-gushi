<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="布封与自然史插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：布封和自然史</text>
  <line x1="220" y1="62" x2="580" y2="62" stroke="#6a8d3f" stroke-width="2"/>

  <!-- 地面 -->
  <rect x="0" y="500" width="800" height="100" fill="#e8d9b8"/>

  <!-- 中心主题 -->
  <rect x="280" y="100" width="240" height="56" fill="#fff6df" stroke="#6a8d3f" stroke-width="2" rx="8"/>
  <text x="400" y="125" text-anchor="middle" font-family="serif" font-size="17" font-weight="bold" fill="#4a6a2f">布封 · 《自然史》</text>
  <text x="400" y="145" text-anchor="middle" font-family="serif" font-size="12" fill="#6a8d3f">用文学笔法写科学，四十四卷写一生</text>

  <!-- 布封头像（左上） -->
  <g>
    <line x1="320" y1="156" x2="160" y2="210" stroke="#6a8d3f" stroke-width="1.5" stroke-dasharray="5,4"/>
    <circle cx="160" cy="250" r="30" fill="#f0d0a8"/>
    <!-- 假发（18世纪） -->
    <path d="M130 245 Q160 215 190 245 L190 235 Q160 208 130 235 Z" fill="#e8e0d8"/>
    <ellipse cx="130" cy="255" rx="8" ry="15" fill="#e8e0d8"/>
    <ellipse cx="190" cy="255" rx="8" ry="15" fill="#e8e0d8"/>
    <!-- 眼睛 -->
    <circle cx="152" cy="250" r="2" fill="#2a2a2a"/>
    <circle cx="168" cy="250" r="2" fill="#2a2a2a"/>
    <!-- 嘴 -->
    <path d="M153 262 Q160 266 167 262" fill="none" stroke="#7a3b14" stroke-width="1.2"/>
    <!-- 领结 -->
    <path d="M148 285 L160 278 L172 285 L165 295 L155 295 Z" fill="#c84a3a"/>
    <rect x="100" y="310" width="120" height="24" fill="#fff6df" stroke="#6a8d3f" rx="4"/>
    <text x="160" y="326" text-anchor="middle" font-family="serif" font-size="12" fill="#4a6a2f">布封（1707-1788）</text>
  </g>

  <!-- 书堆（右上） -->
  <g>
    <line x1="480" y1="156" x2="620" y2="210" stroke="#6a8d3f" stroke-width="1.5" stroke-dasharray="5,4"/>
    <rect x="570" y="280" width="100" height="20" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1"/>
    <rect x="575" y="262" width="95" height="20" fill="#4a6a2f" stroke="#3a5a1f" stroke-width="1"/>
    <rect x="580" y="244" width="90" height="20" fill="#c84a3a" stroke="#a83a2a" stroke-width="1"/>
    <rect x="585" y="226" width="85" height="20" fill="#7ab8d8" stroke="#5a98b8" stroke-width="1"/>
    <text x="625" y="312" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">44卷</text>
    <rect x="560" y="330" width="130" height="24" fill="#fff6df" stroke="#6a8d3f" rx="4"/>
    <text x="625" y="346" text-anchor="middle" font-family="serif" font-size="12" fill="#4a6a2f">《自然史》四十年</text>
  </g>

  <!-- 动物群（下方） -->
  <g>
    <!-- 马 -->
    <line x1="350" y1="156" x2="250" y2="380" stroke="#6a8d3f" stroke-width="1.5" stroke-dasharray="5,4"/>
    <g transform="translate(180 370)">
      <ellipse cx="50" cy="30" rx="35" ry="18" fill="#8d5a36"/>
      <ellipse cx="20" cy="25" rx="12" ry="10" fill="#8d5a36"/>
      <rect x="30" y="42" width="5" height="25" fill="#8d5a36"/>
      <rect x="55" y="42" width="5" height="25" fill="#8d5a36"/>
      <rect x="70" y="42" width="5" height="25" fill="#8d5a36"/>
      <path d="M15 18 Q10 5 18 0" stroke="#5a3a1a" stroke-width="2" fill="none"/>
      <path d="M25 18 Q22 5 28 0" stroke="#5a3a1a" stroke-width="2" fill="none"/>
    </g>
    <rect x="180" y="430" width="100" height="24" fill="#fff6df" stroke="#8d5a36" rx="4"/>
    <text x="230" y="446" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">写马：忠诚勇敢</text>
  </g>

  <g>
    <!-- 天鹅 -->
    <line x1="400" y1="156" x2="400" y2="380" stroke="#6a8d3f" stroke-width="1.5" stroke-dasharray="5,4"/>
    <g transform="translate(370 380)">
      <ellipse cx="30" cy="30" rx="25" ry="15" fill="#fff6df" stroke="#c8a83a" stroke-width="1"/>
      <path d="M50 25 Q60 15 55 5 Q48 8 48 20" fill="#fff6df" stroke="#c8a83a" stroke-width="1"/>
      <circle cx="53" cy="10" r="5" fill="#fff6df" stroke="#c8a83a" stroke-width="1"/>
      <path d="M55 10 L62 8" stroke="#c8843a" stroke-width="2"/>
      <circle cx="52" cy="9" r="1" fill="#2a2a2a"/>
    </g>
    <rect x="335" y="430" width="130" height="24" fill="#fff6df" stroke="#c8a83a" rx="4"/>
    <text x="400" y="446" text-anchor="middle" font-family="serif" font-size="12" fill="#8a6a14">写天鹅：高贵优雅</text>
  </g>

  <g>
    <!-- 松鼠 -->
    <line x1="450" y1="156" x2="550" y2="380" stroke="#6a8d3f" stroke-width="1.5" stroke-dasharray="5,4"/>
    <g transform="translate(530 375)">
      <ellipse cx="25" cy="30" rx="18" ry="22" fill="#c8843a"/>
      <path d="M40 25 Q55 15 52 0 Q45 5 43 18" fill="#c8843a" stroke="#8d5a36" stroke-width="1"/>
      <circle cx="18" cy="18" r="12" fill="#c8843a"/>
      <circle cx="15" cy="16" r="2" fill="#2a2a2a"/>
      <path d="M10 12 L8 8 M26 12 L28 8" stroke="#8d5a36" stroke-width="1.5" fill="none"/>
    </g>
    <rect x="510" y="430" width="120" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
    <text x="570" y="446" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">写松鼠：机灵乖巧</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="14" fill="#4a6a2f">"风格即人"——布封用四十年写出每种动物的"性格"，让科学有了文学的温度</text>
</svg>
