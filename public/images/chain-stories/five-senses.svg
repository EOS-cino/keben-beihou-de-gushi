<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="人体五感奥秘插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">人体五感的奥秘</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">视觉、听觉、味觉、嗅觉、触觉，是我们认识世界的窗口</text>

  <!-- 中心人形 -->
  <g transform="translate(400,320)">
    <circle cx="0" cy="-80" r="35" fill="#f4c8a0" stroke="#8d5a36" stroke-width="2"/>
    <!-- 眼睛 -->
    <circle cx="-12" cy="-85" r="4" fill="#3a2a1a"/>
    <circle cx="12" cy="-85" r="4" fill="#3a2a1a"/>
    <!-- 嘴 -->
    <path d="M-8 -68 Q0 -63 8 -68" fill="none" stroke="#8d5a36" stroke-width="2"/>
    <!-- 鼻 -->
    <path d="M-3 -78 Q0 -72 3 -78" fill="none" stroke="#8d5a36" stroke-width="1.5"/>
    <!-- 耳朵 -->
    <ellipse cx="-35" cy="-80" rx="6" ry="10" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
    <ellipse cx="35" cy="-80" rx="6" ry="10" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
    <!-- 身体 -->
    <path d="M-25 -45 L-30 50 L30 50 L25 -45 Z" fill="#6a8d3f" opacity="0.7"/>
    <!-- 手 -->
    <ellipse cx="-35" cy="0" rx="8" ry="15" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5" transform="rotate(-15 -35 0)"/>
    <ellipse cx="35" cy="0" rx="8" ry="15" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5" transform="rotate(15 35 0)"/>
    <!-- 脚 -->
    <ellipse cx="-15" cy="65" rx="10" ry="6" fill="#8d5a36"/>
    <ellipse cx="15" cy="65" rx="10" ry="6" fill="#8d5a36"/>
  </g>

  <!-- 视觉（左上） -->
  <g transform="translate(150,170)">
    <circle r="45" fill="#a8d0e8" opacity="0.3" stroke="#7ab8d8" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="22" ry="13" fill="#fef9ed" stroke="#4a8ab8" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#4a6a2f"/>
    <circle cx="2" cy="-2" r="3" fill="#fef9ed"/>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14" font-weight="bold">视觉·目</text>
    <text x="0" y="83" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">分辨千万种颜色</text>
    <line x1="35" y1="35" x2="100" y2="80" stroke="#7ab8d8" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- 听觉（右上） -->
  <g transform="translate(650,170)">
    <circle r="45" fill="#fef0d8" opacity="0.5" stroke="#c8843a" stroke-width="2"/>
    <!-- 声波 -->
    <path d="M-20 0 Q-15 -12 -10 0 Q-5 12 0 0 Q5 -12 10 0 Q15 12 20 0" fill="none" stroke="#c8843a" stroke-width="2.5"/>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14" font-weight="bold">听觉·耳</text>
    <text x="0" y="83" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">空气振动传声音</text>
    <line x1="-35" y1="35" x2="-100" y2="80" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- 味觉（左下） -->
  <g transform="translate(150,460)">
    <circle r="45" fill="#e07856" opacity="0.2" stroke="#c84a3a" stroke-width="2"/>
    <!-- 舌头 -->
    <path d="M-15 -15 Q-18 5 -8 18 Q0 22 8 18 Q18 5 15 -15 Q0 -22 -15 -15 Z" fill="#e07856" stroke="#8d5a36" stroke-width="2"/>
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">酸甜苦咸鲜</text>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14" font-weight="bold">味觉·口</text>
    <text x="0" y="83" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">舌头尝五种味</text>
    <line x1="35" y1="-25" x2="100" y2="-60" stroke="#c84a3a" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- 嗅觉+触觉（右下） -->
  <g transform="translate(650,460)">
    <circle r="45" fill="#6a8d3f" opacity="0.2" stroke="#4a6a2f" stroke-width="2"/>
    <!-- 鼻子 -->
    <path d="M0 -18 Q-8 -10 -6 5 Q-3 12 0 14 Q3 12 6 5 Q8 -10 0 -18 Z" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
    <!-- 手指触碰 -->
    <circle cx="18" cy="18" r="8" fill="none" stroke="#4a6a2f" stroke-width="2"/>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14" font-weight="bold">嗅觉+触觉</text>
    <text x="0" y="83" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">鼻闻味·肤感冷热</text>
    <line x1="-35" y1="-25" x2="-100" y2="-60" stroke="#4a6a2f" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- 底部 -->
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">五感配合起来，我们才能完整地感受这个世界</text>
</svg>
