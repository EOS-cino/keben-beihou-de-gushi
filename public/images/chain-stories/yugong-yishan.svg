<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="愚公移山插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#5a3a1a">愚公移山</text>
  <line x1="340" y1="56" x2="460" y2="56" stroke="#c9952e" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8a6a3a">——子子孙孙无穷尽，山不会再长高</text>

  <!-- 天空 -->
  <rect x="0" y="90" width="800" height="200" fill="#c4dae8"/>

  <!-- 两座大山（太行、王屋） -->
  <!-- 左山（太行） -->
  <g transform="translate(150, 0)">
    <text x="0" y="115" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#5a4a3a">太行山</text>
    <path d="M0 290 L-80 290 L-50 200 L-20 150 L10 130 L40 160 L70 220 L100 290 Z" fill="#8a7a6a" stroke="#4a3a2a" stroke-width="3"/>
    <!-- 山顶雪 -->
    <path d="M-10 140 L0 130 L10 140 L5 145 L0 142 L-5 145 Z" fill="#f4f4f0" opacity="0.8"/>
    <!-- 岩石纹理 -->
    <g stroke="#6a5a4a" stroke-width="2" fill="none">
      <path d="M-40 220 L-20 210 L0 225"/>
      <path d="M-30 250 L-10 245 L10 255"/>
      <path d="M20 200 L40 195 L55 210"/>
      <path d="M40 240 L60 235 L75 250"/>
    </g>
  </g>
  <!-- 右山（王屋） -->
  <g transform="translate(650, 0)">
    <text x="0" y="115" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#5a4a3a">王屋山</text>
    <path d="M0 290 L-100 290 L-70 220 L-40 170 L-10 145 L20 165 L50 210 L80 290 Z" fill="#7a6a5a" stroke="#4a3a2a" stroke-width="3"/>
    <!-- 山顶雪 -->
    <path d="M-15 155 L-10 145 L0 150 L10 155 L5 160 L0 157 L-5 160 Z" fill="#f4f4f0" opacity="0.8"/>
    <!-- 岩石纹理 -->
    <g stroke="#6a5a4a" stroke-width="2" fill="none">
      <path d="M-50 230 L-30 220 L-10 235"/>
      <path d="M-40 255 L-20 250 L0 260"/>
      <path d="M10 210 L30 205 L45 220"/>
      <path d="M30 240 L50 235 L65 250"/>
    </g>
  </g>

  <!-- 地面 -->
  <rect x="0" y="290" width="800" height="310" fill="#a8c870" stroke="#7a9a4a" stroke-width="2"/>

  <!-- 愚公家（小屋，中间被山挡住路） -->
  <g transform="translate(400, 340)">
    <text x="0" y="-15" text-anchor="middle" font-family="serif" font-size="13" fill="#5a3a1a">愚公家</text>
    <!-- 屋身 -->
    <rect x="-30" y="0" width="60" height="35" fill="#c4a070" stroke="#7a5a20" stroke-width="2"/>
    <!-- 屋顶 -->
    <path d="M-35 0 L0 -25 L35 0 Z" fill="#8a5a3a" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 门 -->
    <rect x="-8" y="15" width="16" height="20" fill="#6a4a2a" stroke="#3a2a1a" stroke-width="1.5"/>
    <!-- 窗 -->
    <rect x="-22" y="8" width="10" height="10" fill="#c4dae8" stroke="#5a3a1a" stroke-width="1.5"/>
    <rect x="12" y="8" width="10" height="10" fill="#c4dae8" stroke="#5a3a1a" stroke-width="1.5"/>
  </g>

  <!-- 愚公（老人，拿着锄头挖山） -->
  <g transform="translate(280, 400)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#5a3a1a">愚公（九十岁）</text>
    <!-- 头 -->
    <circle cx="0" cy="-45" r="18" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2.5"/>
    <!-- 白发/白胡须 -->
    <path d="M-15 -52 Q0 -65 15 -52" fill="#e8e8e8" stroke="#aaa" stroke-width="1.5"/>
    <path d="M-12 -38 Q0 -25 12 -38 Q8 -30 0 -28 Q-8 -30 -12 -38" fill="#e8e8e8" stroke="#aaa" stroke-width="1.5"/>
    <!-- 眼睛 -->
    <circle cx="-6" cy="-47" r="2" fill="#1a1a1a"/>
    <circle cx="6" cy="-47" r="2" fill="#1a1a1a"/>
    <!-- 身体（弯腰） -->
    <path d="M-15 -28 Q-20 -10 -18 10 L18 10 Q20 -10 15 -28 Z" fill="#7a5a3a" stroke="#3a2a1a" stroke-width="2"/>
    <!-- 锄头 -->
    <line x1="15" y1="-15" x2="40" y2="-30" stroke="#8b6332" stroke-width="4" stroke-linecap="round"/>
    <path d="M38 -32 L50 -35 L48 -25 Z" fill="#6a6a6a" stroke="#3a3a3a" stroke-width="2"/>
    <!-- 手 -->
    <path d="M15 -15 L35 -25" fill="none" stroke="#7a5a3a" stroke-width="10" stroke-linecap="round"/>
    <circle cx="37" cy="-27" r="7" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
  </g>

  <!-- 家人（一起挖山） -->
  <g transform="translate(500, 410)">
    <text x="0" y="-80" text-anchor="middle" font-family="serif" font-size="13" fill="#5a3a1a">儿子·孙子</text>
    <!-- 人1（儿子，挑土） -->
    <circle cx="-15" cy="-40" r="12" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <path d="M-22 -45 Q-15 -55 -8 -45" fill="#3a2a1a" stroke="#1a0a00" stroke-width="1.5"/>
    <path d="M-25 -28 L-30 10 L0 10 L-5 -28 Z" fill="#5a6a3a" stroke="#2a3a1a" stroke-width="2"/>
    <!-- 扁担和筐 -->
    <line x1="-30" y1="-15" x2="10" y2="-20" stroke="#8b6332" stroke-width="3"/>
    <path d="M-35 -15 L-30 -5 L-25 -15 Z" fill="#a08050" stroke="#6a4a20" stroke-width="1.5"/>
    <path d="M5 -20 L10 -10 L15 -20 Z" fill="#a08050" stroke="#6a4a20" stroke-width="1.5"/>
    <!-- 人2（孙子，小，拿铲子） -->
    <circle cx="25" cy="-25" r="9" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <path d="M19 -30 Q25 -38 31 -30" fill="#3a2a1a"/>
    <path d="M18 -16 L15 10 L35 10 L32 -16 Z" fill="#6a8a4a" stroke="#3a5a2a" stroke-width="2"/>
    <!-- 小铲子 -->
    <line x1="35" y1="-10" x2="48" y2="-5" stroke="#8b6332" stroke-width="3"/>
    <rect x="46" y="-8" width="8" height="6" fill="#6a6a6a" stroke="#3a3a3a" stroke-width="1.5"/>
  </g>

  <!-- 挖出的土石（运到渤海） -->
  <g transform="translate(620, 470)">
    <text x="0" y="-15" text-anchor="middle" font-family="serif" font-size="11" fill="#5a3a1a">运往渤海</text>
    <!-- 筐里的石头 -->
    <ellipse cx="0" cy="0" rx="20" ry="8" fill="#8a7a6a"/>
    <circle cx="-8" cy="-3" r="5" fill="#9a8a7a" stroke="#5a4a3a" stroke-width="1"/>
    <circle cx="5" cy="-2" r="4" fill="#8a7a6a" stroke="#5a4a3a" stroke-width="1"/>
    <circle cx="12" cy="-4" r="3" fill="#9a8a7a" stroke="#5a4a3a" stroke-width="1"/>
  </g>

  <!-- 智叟（嘲笑愚公，右上角） -->
  <g transform="translate(700, 200)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="13" fill="#9a3a3a">智叟（嘲笑）</text>
    <!-- 头 -->
    <circle cx="0" cy="0" r="15" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <path d="M-12 -6 Q0 -16 12 -6" fill="#5a4a3a" stroke="#3a2a1a" stroke-width="1.5"/>
    <!-- 眼睛（斜视） -->
    <path d="M-6 -2 L-3 -2" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M3 -2 L6 -2" stroke="#1a1a1a" stroke-width="2"/>
    <!-- 嘴（撇嘴笑） -->
    <path d="M-5 6 Q0 3 5 6" fill="none" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 身体 -->
    <path d="M-12 15 L-15 50 L15 50 L12 15 Z" fill="#9a6a3a" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 对话气泡 -->
    <path d="M-20 -25 L-60 -45 L-60 -65 L20 -65 L20 -45 L-10 -25 Z" fill="#fffdf7" stroke="#9a3a3a" stroke-width="1.5"/>
    <text x="-20" y="-55" text-anchor="middle" font-family="serif" font-size="11" fill="#9a3a3a">"你老了，</text>
    <text x="-20" y="-42" text-anchor="middle" font-family="serif" font-size="11" fill="#9a3a3a">搬不走山！"</text>
  </g>

  <!-- 愚公的回答 -->
  <g transform="translate(150, 200)">
    <path d="M20 25 L60 5 L60 -15 L-20 -15 L-20 5 L10 25 Z" fill="#fffdf7" stroke="#3a6a3a" stroke-width="1.5"/>
    <text x="20" y="-5" text-anchor="middle" font-family="serif" font-size="11" fill="#3a6a3a">"子子孙孙无穷尽，</text>
    <text x="20" y="8" text-anchor="middle" font-family="serif" font-size="11" fill="#3a6a3a">山不会再长高！"</text>
  </g>

  <!-- 底部对比标注 -->
  <g transform="translate(400, 540)">
    <rect x="-250" y="0" width="500" height="45" rx="8" fill="#fffdf7" stroke="#c9952e" stroke-width="1.5" opacity="0.9"/>
    <text x="-150" y="28" text-anchor="middle" font-family="serif" font-size="13" fill="#5a3a1a">精卫填海（一只鸟·一片海）</text>
    <path d="M-30 22 L30 22" stroke="#c9952e" stroke-width="2.5" marker-end="url(#arrowY)"/>
    <text x="150" y="28" text-anchor="middle" font-family="serif" font-size="13" fill="#5a3a1a">愚公移山（一家人·两座山）</text>
  </g>
  <defs>
    <marker id="arrowY" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#c9952e"/>
    </marker>
  </defs>
</svg>
