<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从青铜卖鞋到凡卡写信的故事画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#7a3b14" stroke-width="2"/>
  <line x1="300" y1="300" x2="500" y2="300" stroke="#7a3b14" stroke-width="3" stroke-dasharray="8,6"/>
  <circle cx="350" cy="300" r="6" fill="#d4a017"/>
  <circle cx="400" cy="300" r="9" fill="#c8553d"/>
  <circle cx="450" cy="300" r="6" fill="#d4a017"/>
  <!-- 左珠：青铜芦花鞋 -->
  <circle cx="170" cy="300" r="110" fill="#8a6d3b" opacity="0.25" stroke="#b5651d" stroke-width="3"/>
  <ellipse cx="170" cy="295" rx="28" ry="12" fill="#f5efe0" stroke="#8a6d3b" stroke-width="2"/>
  <ellipse cx="170" cy="295" rx="10" ry="5" fill="#d8c89a"/>
  <circle cx="160" cy="290" r="2" fill="#d8c89a"/>
  <circle cx="180" cy="290" r="2" fill="#d8c89a"/>
  <text x="170" y="335" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">青铜卖鞋</text>
  <text x="170" y="358" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">让出自己脚上的</text>
  <!-- 右珠：凡卡写信 -->
  <circle cx="630" cy="300" r="110" fill="#5d8aa8" opacity="0.25" stroke="#1e5f8e" stroke-width="3"/>
  <rect x="608" y="275" width="44" height="34" fill="#f5efe0" stroke="#5d4037" stroke-width="2"/>
  <line x1="615" y1="287" x2="645" y2="287" stroke="#3a3a3a" stroke-width="1"/>
  <line x1="615" y1="295" x2="642" y2="295" stroke="#3a3a3a" stroke-width="1"/>
  <line x1="615" y1="303" x2="640" y2="303" stroke="#3a3a3a" stroke-width="1"/>
  <path d="M 650 280 l 14 0 l -4 6 l 4 6 l -14 0 z" fill="#a83232"/>
  <text x="630" y="335" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">凡卡写信</text>
  <text x="630" y="358" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">寄不到的回信</text>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">青铜的芦花鞋，凡卡的信</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">把温暖送给别人，别让另一个凡卡没人应</text>
</svg>
