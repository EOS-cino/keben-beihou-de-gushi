<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="杜牧与清明习俗插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：杜牧与清明</text>
  <line x1="200" y1="62" x2="600" y2="62" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 杜牧 -->
  <g transform="translate(180, 260)">
    <circle cx="0" cy="-50" r="28" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 幞头（唐代官帽） -->
    <path d="M-22 -62 Q-20 -80 0 -82 Q20 -80 22 -62 L18 -58 L-18 -58 Z" fill="#3a2a1a" stroke="#7a3b14" stroke-width="2"/>
    <!-- 五官 -->
    <circle cx="-7" cy="-50" r="2.5" fill="#2a2a2a"/>
    <circle cx="7" cy="-50" r="2.5" fill="#2a2a2a"/>
    <path d="M-4 -40 Q0 -37 4 -40" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 胡须 -->
    <path d="M-8 -38 Q-6 -30 -3 -28 M8 -38 Q6 -30 3 -28" fill="none" stroke="#3a2a1a" stroke-width="1"/>
    <!-- 身体（唐服） -->
    <path d="M-22 -22 L-32 55 L32 55 L22 -22" fill="#4a90b8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 腰带 -->
    <rect x="-28" y="10" width="56" height="7" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
    <!-- 手（持笔） -->
    <path d="M22 -10 L35 5" fill="none" stroke="#f0d0a8" stroke-width="7" stroke-linecap="round"/>
    <rect x="33" y="3" width="3" height="18" fill="#5a3a1a" stroke="#7a3b14" stroke-width="0.5" transform="rotate(30 33 3)"/>

    <text x="0" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#7a3b14" font-family="serif">杜牧</text>
    <text x="0" y="105" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">"小李杜"之一</text>
  </g>

  <!-- 名句 -->
  <g transform="translate(500, 170)">
    <rect x="-140" y="-35" width="280" height="75" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.9"/>
    <text x="0" y="-12" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a3b14" font-family="serif">停车坐爱枫林晚</text>
    <text x="0" y="10" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a3b14" font-family="serif">霜叶红于二月花</text>
    <text x="0" y="30" text-anchor="middle" font-size="11" fill="#e07856" font-family="serif">——《山行》</text>
  </g>

  <!-- 阿房宫赋 -->
  <g transform="translate(500, 290)">
    <rect x="-140" y="-25" width="280" height="55" fill="#e8a838" opacity="0.12" stroke="#e8a838" stroke-width="2" rx="8"/>
    <text x="0" y="-5" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a3b14" font-family="serif">《阿房宫赋》</text>
    <text x="0" y="15" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">后人哀之而不鉴之，亦使后人而复哀后人也</text>
  </g>

  <!-- 清明习俗 -->
  <g transform="translate(400, 440)">
    <text x="0" y="-30" text-anchor="middle" font-size="15" font-weight="bold" fill="#7a3b14" font-family="serif">清明习俗</text>
    <line x1="-60" y1="-22" x2="60" y2="-22" stroke="#c8843a" stroke-width="1.5"/>

    <!-- 扫墓 -->
    <g transform="translate(-180, 10)">
      <rect x="-25" y="-15" width="50" height="30" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5" rx="3"/>
      <rect x="-15" y="-25" width="30" height="12" fill="#5a3a1a" stroke="#7a3b14" stroke-width="1"/>
      <text x="0" y="35" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">扫墓祭祖</text>
    </g>

    <!-- 踏青 -->
    <g transform="translate(-60, 10)">
      <path d="M-10 15 Q-5 -5 0 15" fill="none" stroke="#2d6a4f" stroke-width="2"/>
      <circle cx="-3" cy="-5" r="4" fill="#e07856"/>
      <path d="M5 15 Q10 -5 15 15" fill="none" stroke="#3d8a5f" stroke-width="2"/>
      <circle cx="12" cy="-5" r="4" fill="#e8a838"/>
      <text x="5" y="35" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">踏青赏花</text>
    </g>

    <!-- 放风筝 -->
    <g transform="translate(60, 10)">
      <path d="M0 -15 L10 -5 L0 5 L-10 -5 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M0 5 L0 15" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-3 10 L0 13 L3 10" fill="none" stroke="#7a3b14" stroke-width="1"/>
      <path d="M0 -15 L-20 -25" stroke="#7a3b14" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="0" y="35" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">放风筝</text>
    </g>

    <!-- 插柳 -->
    <g transform="translate(180, 10)">
      <path d="M0 15 Q-3 0 -5 -15" fill="none" stroke="#5a3a1a" stroke-width="2"/>
      <ellipse cx="-8" cy="-10" rx="4" ry="2" fill="#2d6a4f" transform="rotate(-30 -8 -10)"/>
      <ellipse cx="-2" cy="-18" rx="4" ry="2" fill="#3d8a5f" transform="rotate(20 -2 -18)"/>
      <ellipse cx="-10" cy="-5" rx="4" ry="2" fill="#2d6a4f" transform="rotate(-45 -10 -5)"/>
      <text x="0" y="35" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">插柳枝</text>
    </g>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="540" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="565" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">清明不只有眼泪，还有杏花——缅怀逝者，也拥抱春天的到来。</text>
</svg>
