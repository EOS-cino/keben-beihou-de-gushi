<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="阿基米德在浴缸中发现浮力原理">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a3b14" font-family="serif">连珠小故事：阿基米德和皇冠</text>
  <line x1="200" y1="55" x2="600" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <rect x="0" y="480" width="800" height="120" fill="#e8d5b0" opacity="0.35"/>

  <!-- 浴缸 -->
  <ellipse cx="200" cy="430" rx="120" ry="28" fill="#a0c4d9" opacity="0.5"/>
  <path d="M 90 380 Q 90 460 200 460 Q 310 460 310 380 L 300 380 Q 300 440 200 440 Q 100 440 100 380 Z" fill="#d4a574" stroke="#7a3b14" stroke-width="2"/>
  <ellipse cx="200" cy="385" rx="100" ry="16" fill="#6db3d4" opacity="0.7"/>
  <!-- 排水溢出 -->
  <path d="M 310 400 Q 330 415 325 435 Q 320 455 335 465" fill="none" stroke="#6db3d4" stroke-width="3" opacity="0.6"/>
  <circle cx="328" cy="448" r="4" fill="#6db3d4" opacity="0.5"/>
  <circle cx="335" cy="468" r="3" fill="#6db3d4" opacity="0.4"/>
  <path d="M 100 400 Q 80 415 85 435 Q 90 455 75 465" fill="none" stroke="#6db3d4" stroke-width="3" opacity="0.5"/>
  <circle cx="82" cy="448" r="3.5" fill="#6db3d4" opacity="0.4"/>

  <!-- 阿基米德人物 -->
  <path d="M 180 380 Q 168 320 175 280 Q 180 250 200 245 Q 220 250 225 280 Q 232 320 220 380" fill="#e8c4a0" stroke="#7a3b14" stroke-width="2"/>
  <circle cx="200" cy="225" r="26" fill="#e8c4a0" stroke="#7a3b14" stroke-width="2"/>
  <path d="M 176 222 Q 170 242 182 250 L 190 246 Q 186 236 186 228 Z" fill="#c8c8c8"/>
  <path d="M 192 246 Q 200 262 208 246 Q 204 256 200 258 Q 196 256 192 246" fill="#c8c8c8"/>
  <circle cx="192" cy="222" r="2.5" fill="#7a3b14"/>
  <circle cx="208" cy="222" r="2.5" fill="#7a3b14"/>
  <ellipse cx="200" cy="235" rx="5" ry="4" fill="#7a3b14"/>
  <!-- 双臂高举 -->
  <path d="M 175 285 Q 148 248 138 208 Q 136 193 146 188" fill="none" stroke="#e8c4a0" stroke-width="10" stroke-linecap="round"/>
  <path d="M 225 285 Q 252 248 262 208 Q 264 193 254 188" fill="none" stroke="#e8c4a0" stroke-width="10" stroke-linecap="round"/>
  <circle cx="146" cy="186" r="6" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
  <circle cx="254" cy="186" r="6" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>

  <!-- 尤里卡气泡 -->
  <path d="M 278 128 Q 278 108 298 108 L 402 108 Q 422 108 422 128 L 422 158 Q 422 178 402 178 L 322 178 L 302 194 L 307 178 L 298 178 Q 278 178 278 158 Z" fill="#fff6df" stroke="#c8843a" stroke-width="2"/>
  <text x="350" y="153" text-anchor="middle" font-size="22" font-weight="bold" fill="#7a3b14" font-family="serif">尤里卡！</text>

  <!-- 皇冠 -->
  <g transform="translate(540, 350)">
    <rect x="-40" y="20" width="80" height="20" fill="#f0c040" stroke="#7a3b14" stroke-width="2" rx="3"/>
    <path d="M -40 20 L -30 -10 L -15 15 L 0 -20 L 15 15 L 30 -10 L 40 20 Z" fill="#f0c040" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="-30" cy="-5" r="4" fill="#d44" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="0" cy="-12" r="5" fill="#4a8" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="30" cy="-5" r="4" fill="#44d" stroke="#7a3b14" stroke-width="1"/>
    <rect x="-55" y="40" width="110" height="8" fill="#a0703a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-50" y="48" width="6" height="40" fill="#a0703a" stroke="#7a3b14" stroke-width="1"/>
    <rect x="44" y="48" width="6" height="40" fill="#a0703a" stroke="#7a3b14" stroke-width="1"/>
  </g>

  <!-- 排水实验容器 -->
  <g transform="translate(660, 380)">
    <path d="M -30 0 L -30 60 Q -30 70 -20 70 L 20 70 Q 30 70 30 60 L 30 0" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="30" ry="8" fill="#6db3d4" opacity="0.5" stroke="#7a3b14" stroke-width="2"/>
    <ellipse cx="0" cy="-5" rx="28" ry="6" fill="#6db3d4" opacity="0.6"/>
    <path d="M 30 5 L 45 0 L 50 10" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="50" cy="18" r="3" fill="#6db3d4" opacity="0.7"/>
    <circle cx="52" cy="30" r="2.5" fill="#6db3d4" opacity="0.5"/>
  </g>

  <!-- 标注：阿基米德 -->
  <line x1="200" y1="225" x2="120" y2="130" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="55" y="100" width="130" height="30" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="4"/>
  <text x="120" y="120" text-anchor="middle" font-size="15" fill="#7a3b14" font-family="serif">阿基米德</text>

  <!-- 标注：浴缸/排水 -->
  <line x1="310" y1="430" x2="380" y2="492" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="315" y="492" width="130" height="30" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="4"/>
  <text x="380" y="512" text-anchor="middle" font-size="15" fill="#7a3b14" font-family="serif">浴缸 / 排水</text>

  <!-- 标注：皇冠 -->
  <line x1="540" y1="345" x2="570" y2="278" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="510" y="248" width="120" height="30" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="4"/>
  <text x="570" y="268" text-anchor="middle" font-size="15" fill="#7a3b14" font-family="serif">皇冠</text>

  <!-- 底部说明 -->
  <rect x="50" y="545" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="570" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">阿基米德在浴缸中发现排水原理，兴奋高呼"尤里卡！"——由此揭开皇冠纯度之谜。</text>
</svg>