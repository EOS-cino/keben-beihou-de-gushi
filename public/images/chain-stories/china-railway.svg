<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="中国铁路从蒸汽到高铁的演变插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：中国铁路的故事</text>
  <line x1="200" y1="55" x2="600" y2="55" stroke="#c8843a" stroke-width="2"/>

  <!-- 时间轴底线 -->
  <line x1="80" y1="320" x2="720" y2="320" stroke="#8d5a36" stroke-width="3"/>
  <polygon points="720,320 705,312 705,328" fill="#8d5a36"/>

  <!-- 地面 -->
  <rect x="0" y="320" width="800" height="280" fill="#d8c9a8" opacity="0.5"/>

  <!-- 节点1：1876 吴淞铁路 -->
  <circle cx="160" cy="320" r="8" fill="#c84a3a"/>
  <rect x="90" y="340" width="140" height="30" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="160" y="360" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">1876 吴淞铁路</text>
  <!-- 蒸汽机车 -->
  <g transform="translate(110, 230)">
    <rect x="0" y="20" width="80" height="40" rx="4" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="2"/>
    <path d="M80 25 L105 35 L105 60 L80 60 Z" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="2"/>
    <rect x="20" y="8" width="12" height="16" fill="#5a3a1a"/>
    <circle cx="26" cy="0" r="8" fill="#ffffff" opacity="0.7"/>
    <circle cx="36" cy="-12" r="11" fill="#ffffff" opacity="0.5"/>
    <rect x="10" y="30" width="16" height="14" fill="#a8d0e8"/>
    <rect x="40" y="30" width="16" height="14" fill="#a8d0e8"/>
    <circle cx="20" cy="62" r="8" fill="#3a2a1a"/>
    <circle cx="55" cy="62" r="8" fill="#3a2a1a"/>
    <circle cx="95" cy="62" r="8" fill="#3a2a1a"/>
  </g>
  <text x="150" y="210" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">蒸汽时代</text>

  <!-- 节点2：1909 京张铁路 -->
  <circle cx="360" cy="320" r="8" fill="#c8843a"/>
  <rect x="290" y="340" width="140" height="30" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="360" y="360" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">1909 京张铁路</text>
  <!-- 人字形线路 -->
  <g transform="translate(300, 230)">
    <path d="M0 70 L50 30 L50 70 L100 30" fill="none" stroke="#7a3b14" stroke-width="3"/>
    <line x1="-5" y1="70" x2="105" y2="70" stroke="#8d5a36" stroke-width="2"/>
    <text x="50" y="95" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">"人"字形线路</text>
    <!-- 小火车 -->
    <rect x="35" y="20" width="30" height="16" rx="2" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <circle cx="42" cy="38" r="4" fill="#3a2a1a"/>
    <circle cx="58" cy="38" r="4" fill="#3a2a1a"/>
  </g>
  <text x="360" y="210" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">詹天佑自主修建</text>

  <!-- 节点3：现代高铁 -->
  <circle cx="600" cy="320" r="8" fill="#6a8d3f"/>
  <rect x="530" y="340" width="140" height="30" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="600" y="360" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">现代 高铁时代</text>
  <!-- 高铁列车 -->
  <g transform="translate(510, 240)">
    <path d="M0 40 Q0 15 25 12 L130 12 Q150 15 150 40 L150 55 L0 55 Z" fill="#7ab8d8" stroke="#4a6a2f" stroke-width="2"/>
    <path d="M0 12 Q5 0 25 0 L130 0 Q150 0 150 12" fill="#ffffff" stroke="#4a6a2f" stroke-width="2"/>
    <rect x="30" y="22" width="20" height="14" rx="2" fill="#a8d0e8"/>
    <rect x="60" y="22" width="20" height="14" rx="2" fill="#a8d0e8"/>
    <rect x="90" y="22" width="20" height="14" rx="2" fill="#a8d0e8"/>
    <line x1="0" y1="48" x2="150" y2="48" stroke="#c84a3a" stroke-width="3"/>
    <circle cx="30" cy="58" r="6" fill="#3a2a1a"/>
    <circle cx="120" cy="58" r="6" fill="#3a2a1a"/>
  </g>
  <text x="585" y="210" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">时速350公里</text>

  <!-- 速度线 -->
  <g stroke="#7ab8d8" stroke-width="2" opacity="0.6">
    <line x1="660" y1="250" x2="700" y2="250"/>
    <line x1="670" y1="265" x2="710" y2="265"/>
    <line x1="660" y1="280" x2="700" y2="280"/>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="540" width="700" height="42" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="566" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">从吴淞铁路到京张铁路，再到今天的高铁——中国人一步步把远方拉到眼前。</text>
</svg>
