  <rect x="370" y="350" width="100" height="24" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
  <text x="420" y="366" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">飞沙堰</text>
  <line x1="555" y1="220" x2="555" y2="155" stroke="#c8843a" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="500" y="143" width="100" height="24" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
  <text x="550" y="159" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">宝瓶口</text>
  <rect x="60" y="430" width="680" height="140" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
  <text x="400" y="458" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">都江堰由鱼嘴分水堤、飞沙堰、宝瓶口三部分组成，巧妙利用地形分水排沙。</text>
  <text x="400" y="480" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">鱼嘴将江水分为内江和外江，飞沙堰在洪水时溢洪排沙，宝瓶口控制水量。</text>
  <text x="400" y="508" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">两千多年来一直发挥着防洪灌溉的作用，是世界水利史上的奇迹。</text>
  <text x="400" y="540" text-anchor="middle" font-size="13" font-weight="bold" fill="#c8843a" font-family="serif">不与水硬拼，而是因势利导，让水自己找到出路。</text>
