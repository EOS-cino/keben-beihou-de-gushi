<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="植树节由来和人们种树的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：植树节的由来</text>
  <line x1="200" y1="55" x2="600" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 天空 -->
  <rect x="0" y="70" width="800" height="250" fill="#a8d0e8" opacity="0.25"/>
  <!-- 太阳 -->
  <circle cx="120" cy="130" r="30" fill="#f4c842" opacity="0.7"/>

  <!-- 远山 -->
  <path d="M0 300 L200 240 L400 280 L600 230 L800 270 L800 340 L0 340 Z" fill="#6a8d3f" opacity="0.35"/>

  <!-- 地面 -->
  <rect x="0" y="320" width="800" height="280" fill="#6a8d3f" opacity="0.3"/>

  <!-- 左侧：孙中山画像 -->
  <g transform="translate(150, 200)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">孙中山</text>
    <!-- 身体（中山装） -->
    <path d="M-25 80 L-20 20 L20 20 L25 80 Z" fill="#3a4a6a" stroke="#7a3b14" stroke-width="2"/>
    <!-- 领口 -->
    <path d="M-8 20 L0 35 L8 20" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <line x1="0" y1="35" x2="0" y2="80" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 头 -->
    <circle cx="0" cy="0" r="22" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头发 -->
    <path d="M-20 -5 Q-15 -22 0 -22 Q15 -22 20 -5" fill="#2a2a2a"/>
    <!-- 胡子 -->
    <path d="M-8 8 Q0 14 8 8" fill="none" stroke="#2a2a2a" stroke-width="2"/>
    <!-- 眼睛 -->
    <circle cx="-7" cy="-2" r="2" fill="#2a2a2a"/>
    <circle cx="7" cy="-2" r="2" fill="#2a2a2a"/>
    <!-- 嘴 -->
    <path d="M-4 6 Q0 8 4 6" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 扣子 -->
    <circle cx="-5" cy="45" r="2" fill="#7a3b14"/>
    <circle cx="-5" cy="60" r="2" fill="#7a3b14"/>
    <circle cx="5" cy="45" r="2" fill="#7a3b14"/>
    <circle cx="5" cy="60" r="2" fill="#7a3b14"/>
  </g>
  <!-- 日期标注 -->
  <rect x="80" y="310" width="140" height="30" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="4"/>
  <text x="150" y="330" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">3月12日 · 逝世纪念</text>

  <!-- 中间：日历 -->
  <g transform="translate(400, 200)">
    <rect x="-60" y="-50" width="120" height="130" fill="#fff8e0" stroke="#c8843a" stroke-width="2.5" rx="4"/>
    <rect x="-60" y="-50" width="120" height="30" fill="#c84a3a" stroke="#7a3b14" stroke-width="2" rx="4"/>
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#ffffff">3月12日</text>
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="48" font-weight="bold" fill="#c84a3a">12</text>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">植树节</text>
    <!-- 小树图标 -->
    <g transform="translate(0, 60)">
      <rect x="-3" y="0" width="6" height="12" fill="#8d5a36"/>
      <path d="M-15 0 L0 -18 L15 0 Z" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    </g>
  </g>

  <!-- 右侧：人们种树 -->
  <g transform="translate(620, 280)">
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">全民植树</text>
    <!-- 小孩种树 -->
    <g transform="translate(-40, 0)">
      <!-- 树苗 -->
      <rect x="-3" y="0" width="6" height="30" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1"/>
      <path d="M-12 0 L0 -18 L12 0 Z" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
      <path d="M-10 -5 L0 -22 L10 -5 Z" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
      <!-- 土坑 -->
      <ellipse cx="0" cy="32" rx="15" ry="4" fill="#8d5a36" opacity="0.5"/>
      <!-- 小孩 -->
      <circle cx="20" cy="-10" r="9" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M14 -2 L26 -2 L24 25 L16 25 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 手臂举着铁锹 -->
      <path d="M16 5 L5 15" fill="none" stroke="#e07856" stroke-width="5" stroke-linecap="round"/>
      <line x1="5" y1="15" x2="-5" y2="35" stroke="#8d5a36" stroke-width="3"/>
      <path d="M-10 33 L-2 37 L0 42 L-8 42 Z" fill="#a8a8a8" stroke="#5a5a5a" stroke-width="1.5"/>
    </g>
    <!-- 大人种树 -->
    <g transform="translate(30, -10)">
      <!-- 树苗 -->
      <rect x="-3" y="10" width="6" height="30" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1"/>
      <path d="M-12 10 L0 -8 L12 10 Z" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
      <ellipse cx="0" cy="42" rx="15" ry="4" fill="#8d5a36" opacity="0.5"/>
      <!-- 大人 -->
      <circle cx="-25" cy="0" r="10" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-30 8 L-20 8 L-22 35 L-28 35 Z" fill="#3a4a6a" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-22 15 L-12 25" fill="none" stroke="#3a4a6a" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- 已长大的树（背景） -->
  <g transform="translate(700, 320)" opacity="0.6">
    <rect x="-5" y="0" width="10" height="60" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <circle cx="0" cy="-10" r="28" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
    <circle cx="-15" cy="-5" r="16" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
    <circle cx="15" cy="-5" r="16" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="510" width="700" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">孙中山先生一生重视植树造林，他于3月12日去世，人们把这天定为植树节，</text>
  <text x="400" y="558" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">鼓励大家都来种树，让大地多一片绿色。</text>
</svg>
