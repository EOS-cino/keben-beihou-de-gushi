<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从稻谷到米糕背后许多劳动环节的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：一块米糕背后的劳动</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 流程图：从左到右展示劳动链条 -->
  <!-- 箭头 -->
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#c8843a"/>
    </marker>
  </defs>

  <!-- 第一环节：育种插秧 -->
  <g transform="translate(110, 200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">育种插秧</text>
    <!-- 水田 -->
    <ellipse cx="0" cy="50" rx="55" ry="12" fill="#a8d0e8" opacity="0.6"/>
    <!-- 秧苗 -->
    <line x1="-20" y1="45" x2="-22" y2="25" stroke="#6a8d3f" stroke-width="2"/>
    <line x1="-10" y1="45" x2="-12" y2="22" stroke="#6a8d3f" stroke-width="2"/>
    <line x1="0" y1="45" x2="-2" y2="20" stroke="#6a8d3f" stroke-width="2"/>
    <line x1="10" y1="45" x2="8" y2="22" stroke="#6a8d3f" stroke-width="2"/>
    <line x1="20" y1="45" x2="18" y2="25" stroke="#6a8d3f" stroke-width="2"/>
    <ellipse cx="-22" cy="22" rx="3" ry="5" fill="#6a8d3f"/>
    <ellipse cx="-12" cy="19" rx="3" ry="5" fill="#6a8d3f"/>
    <ellipse cx="-2" cy="17" rx="3" ry="5" fill="#6a8d3f"/>
    <ellipse cx="8" cy="19" rx="3" ry="5" fill="#6a8d3f"/>
    <ellipse cx="18" cy="22" rx="3" ry="5" fill="#6a8d3f"/>
    <!-- 农民 -->
    <circle cx="0" cy="-15" r="10" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-8 -5 L8 -5 L6 25 L-6 25 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M0 -12 Q0 -20 8 -18" fill="none" stroke="#2a2a2a" stroke-width="2"/>
    <!-- 草帽 -->
    <ellipse cx="0" cy="-22" rx="14" ry="4" fill="#e0a838" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 箭头1 -->
  <path d="M180 220 L220 220" fill="none" stroke="#c8843a" stroke-width="2.5" marker-end="url(#arr2)"/>

  <!-- 第二环节：收割 -->
  <g transform="translate(290, 200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">收割脱粒</text>
    <!-- 稻穗 -->
    <line x1="-15" y1="40" x2="-18" y2="10" stroke="#c8843a" stroke-width="2"/>
    <line x1="0" y1="40" x2="-3" y2="5" stroke="#c8843a" stroke-width="2"/>
    <line x1="15" y1="40" x2="12" y2="10" stroke="#c8843a" stroke-width="2"/>
    <ellipse cx="-18" cy="8" rx="4" ry="6" fill="#e0a838" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="-3" cy="3" rx="4" ry="6" fill="#e0a838" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="12" cy="8" rx="4" ry="6" fill="#e0a838" stroke="#7a3b14" stroke-width="1"/>
    <!-- 镰刀 -->
    <path d="M20 -10 Q35 -5 30 15" fill="none" stroke="#a8a8a8" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="-10" x2="15" y2="-20" stroke="#8d5a36" stroke-width="4"/>
    <!-- 谷粒 -->
    <circle cx="-25" cy="35" r="2" fill="#e0a838"/>
    <circle cx="20" cy="38" r="2" fill="#e0a838"/>
    <circle cx="-5" cy="42" r="2" fill="#e0a838"/>
  </g>

  <!-- 箭头2 -->
  <path d="M360 220 L400 220" fill="none" stroke="#c8843a" stroke-width="2.5" marker-end="url(#arr2)"/>

  <!-- 第三环节：碾米 -->
  <g transform="translate(470, 200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">碾米</text>
    <!-- 石磨 -->
    <ellipse cx="0" cy="45" rx="40" ry="10" fill="#8d5a36" opacity="0.4"/>
    <rect x="-35" y="30" width="70" height="18" fill="#a8a8a8" stroke="#5a5a5a" stroke-width="2" rx="3"/>
    <ellipse cx="0" cy="30" rx="35" ry="9" fill="#c8c8c8" stroke="#5a5a5a" stroke-width="2"/>
    <!-- 磨柄 -->
    <line x1="0" y1="30" x2="25" y2="5" stroke="#8d5a36" stroke-width="4"/>
    <!-- 米粒（白色） -->
    <ellipse cx="-15" cy="55" rx="2" ry="3" fill="#fff8e0" stroke="#c8843a" stroke-width="0.5"/>
    <ellipse cx="-5" cy="58" rx="2" ry="3" fill="#fff8e0" stroke="#c8843a" stroke-width="0.5"/>
    <ellipse cx="8" cy="56" rx="2" ry="3" fill="#fff8e0" stroke="#c8843a" stroke-width="0.5"/>
    <ellipse cx="18" cy="58" rx="2" ry="3" fill="#fff8e0" stroke="#c8843a" stroke-width="0.5"/>
  </g>

  <!-- 箭头3 -->
  <path d="M540 220 L580 220" fill="none" stroke="#c8843a" stroke-width="2.5" marker-end="url(#arr2)"/>

  <!-- 第四环节：蒸糕 -->
  <g transform="translate(660, 200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">蒸糕上桌</text>
    <!-- 蒸笼 -->
    <rect x="-30" y="20" width="60" height="35" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2" rx="3"/>
    <rect x="-32" y="15" width="64" height="8" fill="#a8783a" stroke="#5a3a1a" stroke-width="2" rx="3"/>
    <!-- 蒸汽 -->
    <path d="M-15 15 Q-10 5 -15 -5 M0 15 Q5 5 0 -8 M15 15 Q20 5 15 -5" fill="none" stroke="#c8c8c8" stroke-width="2" opacity="0.6"/>
    <!-- 米糕 -->
    <rect x="-20" y="0" width="40" height="18" fill="#fff8e0" stroke="#c8843a" stroke-width="1.5" rx="3"/>
    <circle cx="-8" cy="6" r="2.5" fill="#c84a3a"/>
    <circle cx="8" cy="6" r="2.5" fill="#c84a3a"/>
  </g>

  <!-- 下方：其他环节 -->
  <g transform="translate(150, 400)">
    <text x="0" y="-10" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">种甘蔗</text>
    <rect x="-25" y="0" width="8" height="50" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5" rx="3"/>
    <rect x="-13" y="-5" width="8" height="55" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5" rx="3"/>
    <rect x="-1" y="0" width="8" height="50" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5" rx="3"/>
  </g>

  <g transform="translate(330, 400)">
    <text x="0" y="-10" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">熬糖</text>
    <path d="M-25 15 L25 15 L20 50 L-20 50 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <ellipse cx="0" cy="15" rx="25" ry="6" fill="#c8843a"/>
    <path d="M-10 10 Q-5 0 -10 -10 M10 10 Q15 0 10 -10" fill="none" stroke="#c8c8c8" stroke-width="2" opacity="0.6"/>
  </g>

  <g transform="translate(510, 400)">
    <text x="0" y="-10" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">运输</text>
    <rect x="-30" y="10" width="40" height="20" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <rect x="10" y="0" width="20" height="30" fill="#e07856" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <circle cx="-18" cy="35" r="6" fill="#2a2a2a"/>
    <circle cx="18" cy="35" r="6" fill="#2a2a2a"/>
  </g>

  <g transform="translate(670, 400)">
    <text x="0" y="-10" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">销售</text>
    <!-- 超市货架 -->
    <rect x="-30" y="0" width="60" height="50" fill="#fff8e0" stroke="#c8843a" stroke-width="2" rx="2"/>
    <rect x="-25" y="5" width="50" height="12" fill="#8d5a36" opacity="0.3"/>
    <rect x="-25" y="20" width="50" height="12" fill="#8d5a36" opacity="0.3"/>
    <rect x="-25" y="35" width="50" height="12" fill="#8d5a36" opacity="0.3"/>
    <!-- 商品 -->
    <rect x="-20" y="7" width="10" height="8" fill="#c84a3a"/>
    <rect x="-5" y="7" width="10" height="8" fill="#6a8d3f"/>
    <rect x="10" y="7" width="10" height="8" fill="#f4c842"/>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="510" width="700" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">从一粒稻种到一块糕，要经过育种、收割、碾米、种甘蔗、熬糖、运输、销售，</text>
  <text x="400" y="558" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">真的经过了无数人的手，每一样东西都来之不易。</text>
</svg>
