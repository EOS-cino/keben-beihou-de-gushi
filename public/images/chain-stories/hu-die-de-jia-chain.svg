<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从担心蝴蝶到法布尔观察昆虫的善意故事画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#7a3b14" stroke-width="2"/>
  <line x1="300" y1="300" x2="500" y2="300" stroke="#7a3b14" stroke-width="3" stroke-dasharray="8,6"/>
  <circle cx="350" cy="300" r="6" fill="#d4a017"/>
  <circle cx="400" cy="300" r="9" fill="#c8553d"/>
  <circle cx="450" cy="300" r="6" fill="#d4a017"/>
  <!-- 左珠：担心蝴蝶 -->
  <circle cx="170" cy="300" r="110" fill="#e88aa8" opacity="0.3" stroke="#c8553d" stroke-width="3"/>
  <path d="M 150 280 q -20 -18 -32 -4 q -6 18 24 16 z" fill="#e8a04e"/>
  <path d="M 190 280 q 20 -18 32 -4 q 6 18 -24 16 z" fill="#e8a04e"/>
  <line x1="170" y1="276" x2="170" y2="296" stroke="#3a3a3a" stroke-width="2"/>
  <text x="170" y="335" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#7a3b14">担心蝴蝶</text>
  <text x="170" y="362" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">一颗善良的心</text>
  <!-- 右珠：法布尔 -->
  <circle cx="630" cy="300" r="110" fill="#8fb996" opacity="0.3" stroke="#3a7d44" stroke-width="3"/>
  <ellipse cx="615" cy="278" rx="8" ry="14" fill="#3a7d44"/>
  <line x1="610" y1="270" x2="600" y2="262" stroke="#3a7d44" stroke-width="2"/>
  <line x1="620" y1="270" x2="630" y2="262" stroke="#3a7d44" stroke-width="2"/>
  <line x1="610" y1="288" x2="600" y2="296" stroke="#3a7d44" stroke-width="2"/>
  <line x1="620" y1="288" x2="630" y2="296" stroke="#3a7d44" stroke-width="2"/>
  <text x="630" y="335" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#7a3b14">法布尔</text>
  <text x="630" y="362" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">昆虫记·观察</text>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">担心一只蝴蝶，遇见一位昆虫老朋友</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">认真看待小生命，就是和他们站在一起</text>
</svg>
