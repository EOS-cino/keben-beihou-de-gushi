<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="老舍笔下的北京与草原不同世界插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a3b14" font-family="serif">连珠小故事：老舍的北京与草原</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左右分割线 -->
  <line x1="400" y1="80" x2="400" y2="510" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- ===== 左侧：北京胡同 ===== -->
  <!-- 天空 -->
  <rect x="0" y="80" width="400" height="180" fill="#e8d8c0" opacity="0.3"/>

  <!-- 胡同四合院墙 -->
  <rect x="20" y="160" width="360" height="220" fill="#c8a878" opacity="0.4"/>
  <!-- 灰瓦屋顶 -->
  <path d="M20 165 L40 150 L80 150 L100 165 Z" fill="#8a8a7a" stroke="#7a3b14" stroke-width="1.5"/>
  <path d="M100 165 L120 150 L160 150 L180 165 Z" fill="#8a8a7a" stroke="#7a3b14" stroke-width="1.5"/>
  <path d="M220 165 L240 150 L280 150 L300 165 Z" fill="#8a8a7a" stroke="#7a3b14" stroke-width="1.5"/>
  <path d="M300 165 L320 150 L360 150 L380 165 Z" fill="#8a8a7a" stroke="#7a3b14" stroke-width="1.5"/>

  <!-- 红门 -->
  <rect x="170" y="220" width="60" height="100" fill="#8a3a2a" stroke="#7a3b14" stroke-width="2"/>
  <line x1="200" y1="220" x2="200" y2="320" stroke="#7a3b14" stroke-width="2"/>
  <circle cx="193" cy="270" r="3" fill="#c8a848" stroke="#7a3b14" stroke-width="1"/>
  <circle cx="207" cy="270" r="3" fill="#c8a848" stroke="#7a3b14" stroke-width="1"/>

  <!-- 胡同地面 -->
  <rect x="0" y="320" width="400" height="120" fill="#b8a888" opacity="0.3"/>

  <!-- 人力车（骆驼祥子） -->
  <g transform="translate(100, 340)">
    <!-- 车轮 -->
    <circle cx="0" cy="30" r="14" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <line x1="-14" y1="30" x2="14" y2="30" stroke="#7a3b14" stroke-width="1"/>
    <line x1="0" y1="16" x2="0" y2="44" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="0" cy="30" r="2" fill="#7a3b14"/>
    <!-- 车厢 -->
    <path d="M 14 30 L 20 10 L 45 10 L 50 25 L 50 30" fill="#5a4a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 车把 -->
    <line x1="50" y1="25" x2="65" y2="20" stroke="#7a3b14" stroke-width="2"/>
    <!-- 拉车人 -->
    <g transform="translate(70, 15)">
      <path d="M -3 15 Q -5 5 -3 -2 Q 0 -5 3 -2 Q 5 5 3 15" fill="#4a5a6a" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-8" r="6" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
      <path d="M -6 -10 Q -4 -16 0 -17 Q 4 -16 6 -10" fill="#3a3a3a"/>
    </g>
  </g>

  <!-- 茶馆招牌 -->
  <g transform="translate(280, 250)">
    <rect x="-20" y="0" width="40" height="50" fill="#8a6a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="20" text-anchor="middle" font-size="12" fill="#fef9ed" font-family="serif">茶</text>
    <text x="0" y="38" text-anchor="middle" font-size="12" fill="#fef9ed" font-family="serif">馆</text>
  </g>

  <!-- 左侧标签 -->
  <rect x="120" y="85" width="100" height="24" fill="#fff6df" stroke="#c8843a" rx="4" opacity="0.9"/>
  <text x="170" y="102" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">北京胡同</text>

  <!-- ===== 右侧：草原 ===== -->
  <!-- 天空 -->
  <rect x="400" y="80" width="400" height="180" fill="#c4d8e8" opacity="0.3"/>
  <!-- 云 -->
  <ellipse cx="520" cy="120" rx="35" ry="12" fill="#fff" opacity="0.6"/>
  <ellipse cx="680" cy="130" rx="40" ry="13" fill="#fff" opacity="0.6"/>

  <!-- 草原 -->
  <rect x="400" y="260" width="400" height="180" fill="#8aba5a" opacity="0.4"/>

  <!-- 远山 -->
  <path d="M400 260 Q500 230 600 250 Q700 230 800 255 L800 280 L400 280 Z" fill="#a8c898" opacity="0.4"/>

  <!-- 蒙古包 -->
  <g transform="translate(620, 320)">
    <path d="M -30 25 Q -30 -8 0 -20 Q 30 -8 30 25 Z" fill="#f0e8d0" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M -8 25 Q -8 8 0 4 Q 8 8 8 25 Z" fill="#c8a868" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="0" cy="-16" r="3" fill="#c84030"/>
  </g>

  <!-- 羊群 -->
  <g transform="translate(460, 340)">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#fff" stroke="#d8d8d8" stroke-width="1"/>
    <circle cx="8" cy="-2" r="4" fill="#e8e8e8"/>
  </g>
  <g transform="translate(500, 350)">
    <ellipse cx="0" cy="0" rx="9" ry="6" fill="#fff" stroke="#d8d8d8" stroke-width="1"/>
    <circle cx="7" cy="-2" r="4" fill="#e8e8e8"/>
  </g>

  <!-- 骑马牧民 -->
  <g transform="translate(540, 330)">
    <ellipse cx="0" cy="10" rx="22" ry="10" fill="#8a5a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-14" y1="18" x2="-14" y2="32" stroke="#8a5a3a" stroke-width="3"/>
    <line x1="8" y1="18" x2="8" y2="32" stroke="#8a5a3a" stroke-width="3"/>
    <ellipse cx="22" cy="2" rx="8" ry="6" fill="#8a5a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M -22 8 Q -28 14 -26 22" fill="none" stroke="#8a5a3a" stroke-width="2.5"/>
    <!-- 骑手 -->
    <path d="M -4 -4 Q -6 -12 -4 -18 Q 0 -20 4 -18 Q 6 -12 4 -4" fill="#c84030" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="0" cy="-23" r="6" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    <path d="M -6 -25 Q -6 -30 0 -31 Q 6 -30 6 -25" fill="#c84030"/>
  </g>

  <!-- 右侧标签 -->
  <rect x="560" y="85" width="100" height="24" fill="#fff6df" stroke="#c8843a" rx="4" opacity="0.9"/>
  <text x="610" y="102" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">辽阔草原</text>

  <!-- 底部：老舍人物 -->
  <g transform="translate(400, 470)">
    <!-- 身体 -->
    <path d="M -25 60 Q -28 20 -22 5 Q -12 -2 0 -2 Q 12 -2 22 5 Q 28 20 25 60" fill="#4a4a4a" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头 -->
    <circle cx="0" cy="-18" r="18" fill="#e8c4a0" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头发 -->
    <path d="M -18 -20 Q -16 -34 0 -35 Q 16 -34 18 -20" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 眼镜 -->
    <circle cx="-6" cy="-18" r="5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="6" cy="-18" r="5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-1" y1="-18" x2="1" y2="-18" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-6" cy="-18" r="1.5" fill="#7a3b14"/>
    <circle cx="6" cy="-18" r="1.5" fill="#7a3b14"/>
    <!-- 嘴 -->
    <path d="M -4 -9 Q 0 -6 4 -9" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 手拿笔 -->
    <path d="M 22 10 Q 35 15 40 28" fill="none" stroke="#4a4a4a" stroke-width="8" stroke-linecap="round"/>
    <circle cx="40" cy="29" r="4" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    <line x1="40" y1="29" x2="45" y2="40" stroke="#7a3b14" stroke-width="2"/>
  </g>

  <!-- 标注 -->
  <line x1="400" y1="445" x2="400" y2="410" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="355" y="388" width="90" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="405" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">老舍</text>

  <!-- 底部说明 -->
  <rect x="50" y="545" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="570" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">从北京胡同到辽阔草原——老舍笔下不同的世界，相同的都是普通人的善良与真情。</text>
</svg>
