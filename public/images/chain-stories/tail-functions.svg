<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="动物尾巴各有各的用处">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 顶部标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a3b14" font-family="serif">动物尾巴各有各的用处</text>
  <line x1="270" y1="52" x2="530" y2="52" stroke="#c8843a" stroke-width="2"/>
  <!-- 四个分区背景 -->
  <rect x="30" y="65" width="365" height="225" fill="#f0e0c0" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <rect x="405" y="65" width="365" height="225" fill="#d4e8f0" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <rect x="30" y="300" width="365" height="225" fill="#e8d8c0" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <rect x="405" y="300" width="365" height="225" fill="#e0e8c8" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <!-- ============ 左上：猴子 ============ -->
  <!-- 树枝 -->
  <path d="M50 140 L380 160" stroke="#6b4a2f" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M120 155 L110 180 M250 158 L260 185" stroke="#6b4a2f" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- 树叶 -->
  <ellipse cx="80" cy="130" rx="18" ry="10" fill="#6a9a4a"/>
  <ellipse cx="350" cy="145" rx="16" ry="9" fill="#5a8a3a"/>
  <!-- 猴子 -->
  <g transform="translate(200,200)">
    <!-- 尾巴（卷握树枝） -->
    <path d="M20 0 Q60 -20 80 -50 Q90 -65 75 -55 Q60 -45 50 -30" stroke="#8d5a36" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="20" ry="25" fill="#a8754a"/>
    <!-- 肚子 -->
    <ellipse cx="0" cy="5" rx="12" ry="16" fill="#e8c4a0"/>
    <!-- 头 -->
    <circle cx="0" cy="-35" r="16" fill="#a8754a"/>
    <!-- 脸 -->
    <ellipse cx="0" cy="-32" rx="11" ry="12" fill="#e8c4a0"/>
    <!-- 耳朵 -->
    <circle cx="-14" cy="-38" r="5" fill="#a8754a"/><circle cx="14" cy="-38" r="5" fill="#a8754a"/>
    <!-- 眼睛 -->
    <circle cx="-4" cy="-35" r="1.5" fill="#3d2817"/><circle cx="4" cy="-35" r="1.5" fill="#3d2817"/>
    <!-- 嘴 -->
    <path d="M-3 -28 Q0 -25 3 -28" stroke="#3d2817" stroke-width="1" fill="none"/>
    <!-- 手臂（抓树枝） -->
    <path d="M-15 -10 L-30 -40" stroke="#a8754a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="-31" cy="-41" r="4" fill="#e8c4a0"/>
    <path d="M15 -10 L25 -35" stroke="#a8754a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="26" cy="-36" r="4" fill="#e8c4a0"/>
    <!-- 腿 -->
    <path d="M-10 20 L-15 40" stroke="#a8754a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M10 20 L18 38" stroke="#a8754a" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
  <!-- ============ 右上：鱼 ============ -->
  <!-- 水波纹 -->
  <g stroke="#6ab4d4" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M430 100 Q450 95 470 100 Q490 105 510 100"/>
    <path d="M550 130 Q570 125 590 130 Q610 135 630 130"/>
    <path d="M660 110 Q680 105 700 110 Q720 115 740 110"/>
  </g>
  <!-- 气泡 -->
  <circle cx="460" cy="240" r="4" fill="none" stroke="#8ab4d4" stroke-width="1.5" opacity="0.6"/>
  <circle cx="475" cy="220" r="3" fill="none" stroke="#8ab4d4" stroke-width="1.5" opacity="0.6"/>
  <circle cx="700" cy="250" r="5" fill="none" stroke="#8ab4d4" stroke-width="1.5" opacity="0.6"/>
  <!-- 鱼 -->
  <g transform="translate(580,180)">
    <!-- 鱼身 -->
    <ellipse cx="0" cy="0" rx="50" ry="25" fill="#e8a838"/>
    <ellipse cx="0" cy="3" rx="45" ry="18" fill="#f4c850"/>
    <!-- 鱼尾（摆动游泳） -->
    <path d="M48 0 L80 -25 L70 0 L80 25 Z" fill="#e8a838"/>
    <path d="M48 0 L80 -25 L70 0 L80 25 Z" fill="none" stroke="#c8843a" stroke-width="1.5"/>
    <!-- 鱼鳍 -->
    <path d="M-5 -22 L5 -35 L15 -22" fill="#e8a838" stroke="#c8843a" stroke-width="1"/>
    <path d="M-5 22 L5 35 L15 22" fill="#e8a838" stroke="#c8843a" stroke-width="1"/>
    <!-- 侧鳍 -->
    <ellipse cx="-10" cy="5" rx="12" ry="6" fill="#d49438" transform="rotate(-20 -10 5)"/>
    <!-- 鱼头 -->
    <circle cx="-35" cy="0" r="18" fill="#f4c850"/>
    <!-- 眼睛 -->
    <circle cx="-42" cy="-3" r="5" fill="#fff"/><circle cx="-42" cy="-3" r="3" fill="#3d2817"/>
    <!-- 嘴 -->
    <path d="M-50 3 Q-53 0 -50 -3" stroke="#3d2817" stroke-width="1.5" fill="none"/>
    <!-- 鳃线 -->
    <path d="M-25 -12 Q-22 0 -25 12" stroke="#c8843a" stroke-width="1.5" fill="none"/>
  </g>
  <!-- ============ 左下：牛 ============ -->
  <!-- 草地 -->
  <rect x="30" y="470" width="365" height="55" fill="#a8b87a" rx="0"/>
  <!-- 牛 -->
  <g transform="translate(180,430)">
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="55" ry="30" fill="#8a6a4a"/>
    <!-- 花斑 -->
    <ellipse cx="-15" cy="-5" rx="18" ry="12" fill="#e8e0d0"/>
    <ellipse cx="20" cy="8" rx="15" ry="10" fill="#e8e0d0"/>
    <!-- 腿 -->
    <rect x="-35" y="20" width="10" height="30" fill="#6a4a2a"/>
    <rect x="-15" y="25" width="10" height="25" fill="#6a4a2a"/>
    <rect x="15" y="25" width="10" height="25" fill="#6a4a2a"/>
    <rect x="35" y="20" width="10" height="30" fill="#6a4a2a"/>
    <!-- 蹄子 -->
    <rect x="-36" y="48" width="12" height="5" fill="#3d2817"/>
    <rect x="36" y="48" width="12" height="5" fill="#3d2817"/>
    <!-- 头 -->
    <ellipse cx="-60" cy="-10" rx="22" ry="18" fill="#8a6a4a"/>
    <!-- 角 -->
    <path d="M-72 -25 Q-80 -32 -78 -38" stroke="#e8e0d0" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M-48 -25 Q-40 -32 -42 -38" stroke="#e8e0d0" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- 耳朵 -->
    <ellipse cx="-78" cy="-12" rx="6" ry="4" fill="#6a4a2a" transform="rotate(-30 -78 -12)"/>
    <ellipse cx="-42" cy="-12" rx="6" ry="4" fill="#6a4a2a" transform="rotate(30 -42 -12)"/>
    <!-- 眼睛 -->
    <circle cx="-65" cy="-12" r="2.5" fill="#3d2817"/>
    <!-- 鼻子 -->
    <ellipse cx="-75" cy="0" rx="8" ry="6" fill="#6a4a2a"/>
    <circle cx="-78" cy="0" r="1.5" fill="#3d2817"/><circle cx="-72" cy="0" r="1.5" fill="#3d2817"/>
    <!-- 尾巴（赶蝇） -->
    <path d="M52 -5 Q75 -15 85 5 Q90 15 80 25" stroke="#6a4a2a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="80" cy="27" rx="5" ry="4" fill="#3d2817"/>
    <!-- 苍蝇 -->
    <circle cx="90" cy="20" r="3" fill="#3d2817"/>
    <line x1="87" y1="18" x2="84" y2="15" stroke="#3d2817" stroke-width="0.8"/>
    <line x1="93" y1="18" x2="96" y2="15" stroke="#3d2817" stroke-width="0.8"/>
  </g>
  <!-- ============ 右下：松鼠 ============ -->
  <!-- 树桩 -->
  <ellipse cx="580" cy="500" rx="60" ry="15" fill="#6b4a2f"/>
  <rect x="520" y="475" width="120" height="30" fill="#8d5a36"/>
  <ellipse cx="580" cy="475" rx="60" ry="12" fill="#a8754a"/>
  <ellipse cx="580" cy="475" rx="40" ry="8" fill="#8d5a36" opacity="0.5"/>
  <!-- 松鼠 -->
  <g transform="translate(580,440)">
    <!-- 大尾巴（保暖蓬松） -->
    <path d="M15 -5 Q50 -20 60 -55 Q55 -75 35 -70 Q20 -60 15 -40 Z" fill="#c8743a"/>
    <path d="M20 -10 Q45 -25 52 -50 Q48 -65 35 -60" stroke="#a85a2a" stroke-width="1.5" fill="none"/>
    <path d="M25 -15 Q40 -30 45 -45" stroke="#a85a2a" stroke-width="1" fill="none"/>
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="22" ry="28" fill="#c8743a"/>
    <ellipse cx="0" cy="5" rx="14" ry="18" fill="#e8a878"/>
    <!-- 头 -->
    <circle cx="-5" cy="-30" r="16" fill="#c8743a"/>
    <!-- 耳朵 -->
    <path d="M-15 -42 L-18 -52 L-10 -45 Z" fill="#c8743a"/>
    <path d="M2 -42 L5 -52 L10 -45 Z" fill="#c8743a"/>
    <!-- 眼睛 -->
    <circle cx="-10" cy="-30" r="3" fill="#3d2817"/>
    <circle cx="-10" cy="-31" r="1" fill="#fff"/>
    <!-- 鼻子 -->
    <circle cx="-18" cy="-25" r="2" fill="#3d2817"/>
    <!-- 嘴 -->
    <path d="M-18 -22 Q-15 -19 -12 -22" stroke="#3d2817" stroke-width="1" fill="none"/>
    <!-- 手臂（抱松果） -->
    <path d="M-12 -8 L-20 5" stroke="#c8743a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- 松果 -->
    <ellipse cx="-22" cy="8" rx="8" ry="10" fill="#8d5a36"/>
    <g stroke="#5a3a1a" stroke-width="0.8">
      <line x1="-26" y1="4" x2="-22" y2="6"/><line x1="-18" y1="4" x2="-22" y2="6"/>
      <line x1="-26" y1="9" x2="-22" y2="11"/><line x1="-18" y1="9" x2="-22" y2="11"/>
      <line x1="-25" y1="13" x2="-22" y2="15"/>
    </g>
    <!-- 腿 -->
    <ellipse cx="-8" cy="25" rx="6" ry="4" fill="#a85a2a"/>
    <ellipse cx="8" cy="25" rx="6" ry="4" fill="#a85a2a"/>
  </g>
  <!-- 标注：猴子（卷握） -->
  <line x1="250" y1="180" x2="310" y2="120" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="285" y="92" width="100" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="335" y="111" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">猴子（卷握）</text>
  <!-- 标注：鱼（游泳） -->
  <line x1="640" y1="180" x2="690" y2="130" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="660" y="92" width="100" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="710" y="111" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">鱼（游泳）</text>
  <!-- 标注：牛（赶蝇） -->
  <line x1="240" y1="430" x2="310" y2="380" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="285" y="355" width="100" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="335" y="374" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">牛（赶蝇）</text>
  <!-- 标注：松鼠（保暖） -->
  <line x1="620" y1="400" x2="690" y2="360" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="660" y="335" width="100" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="710" y="354" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">松鼠（保暖）</text>
  <!-- 底部说明 -->
  <rect x="40" y="545" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="570" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">猴子尾巴卷握树枝、鱼尾摆动游泳、牛尾驱赶蚊蝇、松鼠尾巴御寒保暖——动物尾巴各有妙用。</text>
</svg>