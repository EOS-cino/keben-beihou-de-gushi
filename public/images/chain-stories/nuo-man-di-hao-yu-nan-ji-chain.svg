<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从哈尔威船长到泰坦尼克号乐手的故事画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#7a3b14" stroke-width="2"/>
  <line x1="300" y1="300" x2="500" y2="300" stroke="#7a3b14" stroke-width="3" stroke-dasharray="8,6"/>
  <circle cx="350" cy="300" r="6" fill="#d4a017"/>
  <circle cx="400" cy="300" r="9" fill="#c8553d"/>
  <circle cx="450" cy="300" r="6" fill="#d4a017"/>
  <!-- 左珠：哈尔威船长 -->
  <circle cx="170" cy="300" r="110" fill="#1e5f8e" opacity="0.25" stroke="#1e5f8e" stroke-width="3"/>
  <path d="M 145 320 l 50 0 l -8 18 l -34 0 z" fill="#3a3a3a"/>
  <rect x="160" y="296" width="20" height="24" fill="#1e5f8e"/>
  <circle cx="170" cy="288" r="10" fill="#f5d9a0"/>
  <rect x="156" y="300" width="28" height="6" fill="#3a3a3a"/>
  <text x="170" y="350" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">哈尔威船长</text>
  <text x="170" y="373" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">与船共存亡</text>
  <!-- 右珠：泰坦尼克乐手 -->
  <circle cx="630" cy="300" r="110" fill="#a83232" opacity="0.2" stroke="#a83232" stroke-width="3"/>
  <path d="M 615 275 q 8 -4 8 6 q 0 10 -8 6" fill="#5d4037"/>
  <line x1="623" y1="281" x2="650" y2="281" stroke="#5d4037" stroke-width="2"/>
  <circle cx="650" cy="281" r="6" fill="none" stroke="#5d4037" stroke-width="2"/>
  <line x1="618" y1="285" x2="640" y2="295" stroke="#3a3a3a" stroke-width="1"/>
  <line x1="622" y1="288" x2="644" y2="298" stroke="#3a3a3a" stroke-width="1"/>
  <path d="M 630 300 q 4 -6 8 0" stroke="#c8553d" stroke-width="2" fill="none"/>
  <text x="630" y="335" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">泰坦尼克乐手</text>
  <text x="630" y="358" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">奏乐到最后一刻</text>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">哈尔威船长，泰坦尼克的乐手</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">危险时刻先想到别人，是职责与担当</text>
</svg>
