<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="奶奶一双手与一碗热汤里的亲情插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：一碗热汤里藏着多少爱</text>
  <line x1="170" y1="55" x2="630" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左：炖汤(慢慢熬) -->
  <g transform="translate(180 240)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#e07856">炖汤：慢慢熬</text>
    <text x="0" y="-42" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">小火几小时，营养都进汤里</text>
    <!-- 锅 -->
    <ellipse cx="0" cy="30" rx="40" ry="8" fill="#5a3a1a"/>
    <path d="M-40 30 Q-40 -10 0 -10 Q40 -10 40 30 Z" fill="#8d5a36"/>
    <ellipse cx="0" cy="-10" rx="40" ry="10" fill="#e8a838" opacity="0.7"/>
    <!-- 小火 -->
    <g transform="translate(0 36)">
      <path d="M-8 0 Q-4 -10 0 -14 Q4 -10 8 0 Z" fill="#e07856"/>
      <path d="M-4 0 Q-2 -6 0 -10 Q2 -6 4 0 Z" fill="#e8a838"/>
    </g>
    <!-- 白汽 -->
    <g stroke="#fff" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round">
      <path d="M-12 -14 Q-16 -26 -12 -38 Q-8 -50 -12 -62"/>
      <path d="M0 -16 Q-4 -28 0 -40 Q4 -52 0 -64"/>
      <path d="M12 -14 Q8 -26 12 -38 Q16 -50 12 -62"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">不急不躁，像奶奶的爱</text>
  </g>

  <!-- 中：吹凉一勺 -->
  <g transform="translate(400 240)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#e07856">吹凉再喂</text>
    <text x="0" y="-42" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">怕烫着，吹了又吹</text>
    <!-- 奶奶的手+勺 -->
    <g transform="translate(0 20)">
      <ellipse cx="-10" cy="0" rx="20" ry="8" fill="#f0d0a8"/>
      <path d="M8 -2 L34 -8 L36 0 L10 6 Z" fill="#8d5a36"/>
      <ellipse cx="34" cy="-8" rx="10" ry="5" fill="#e8a838" opacity="0.8"/>
      <!-- 吹气线 -->
      <g stroke="#fff" stroke-width="1.5" fill="none" opacity="0.8" stroke-linecap="round">
        <path d="M-20 -6 Q-10 -10 0 -10"/>
        <path d="M-20 -2 Q-10 -4 0 -4"/>
        <path d="M-20 2 Q-10 0 0 0"/>
      </g>
      <!-- 嘴(侧面) -->
      <g transform="translate(-26 -2)">
        <path d="M0 0 Q-6 -2 -10 0" stroke="#c84a3a" stroke-width="1.5" fill="none"/>
      </g>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">把心疼吹进汤里</text>
  </g>

  <!-- 右：焐被窝 -->
  <g transform="translate(620 240)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#e07856">焐热被窝</text>
    <text x="0" y="-42" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">热水袋提前暖好</text>
    <!-- 被子 -->
    <path d="M-40 30 Q-40 -10 -20 -14 L20 -14 Q40 -10 40 30 Z" fill="#c84a3a" opacity="0.7"/>
    <path d="M-40 30 L40 30" stroke="#8d5a36" stroke-width="2"/>
    <!-- 热水袋 -->
    <ellipse cx="0" cy="8" rx="14" ry="10" fill="#e07856"/>
    <rect x="-4" y="-4" width="8" height="6" rx="2" fill="#8d5a36"/>
    <!-- 热气 -->
    <g stroke="#e07856" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round">
      <path d="M-6 -8 Q-8 -16 -6 -22"/>
      <path d="M6 -8 Q8 -16 6 -22"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">爱常常是"提前"的</text>
  </g>

  <!-- 心理发现框 -->
  <g transform="translate(400 380)">
    <rect x="-240" y="0" width="480" height="56" fill="#fff6df" stroke="#2d6a4f" stroke-width="2" rx="8"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="14" fill="#2d6a4f" font-weight="bold">心理学发现：手捧热饮，会觉得身边的人更"温暖"</text>
    <text x="0" y="44" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">身体的暖，真的会让心也跟着暖起来</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="470" width="700" height="105" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6" opacity="0.85"/>
  <text x="400" y="498" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">炖汤要几小时，吹凉要一下下，焐被窝要提前——爱藏在时间的长短里。</text>
  <text x="400" y="522" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">奶奶那双干粗的手，把暖一点一点递给孩子，自己从不喊冷。</text>
  <text x="400" y="546" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">这份暖能存很久：等孩子长大了，遇到冷的时候，</text>
  <text x="400" y="568" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a">还会想起那碗汤、那双手——于是又有了走下去的暖。</text>
</svg>
