<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="鲁迅的梦境与现实插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：鲁迅的梦境与现实</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左侧：野草中的梦 -->
  <g transform="translate(170, 240)">
    <text x="0" y="-80" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">《野草》中的梦</text>
    <!-- 枣树 -->
    <g transform="translate(-40, -20)">
      <line x1="0" y1="40" x2="0" y2="-20" stroke="#5a4a2a" stroke-width="3"/>
      <path d="M 0 -10 Q -10 -15 -15 -10" fill="none" stroke="#5a4a2a" stroke-width="1.5"/>
      <path d="M 0 -15 Q 10 -20 15 -15" fill="none" stroke="#5a4a2a" stroke-width="1.5"/>
      <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">枣树</text>
    </g>
    <g transform="translate(0, -20)">
      <line x1="0" y1="40" x2="0" y2="-20" stroke="#5a4a2a" stroke-width="3"/>
      <path d="M 0 -10 Q -10 -15 -15 -10" fill="none" stroke="#5a4a2a" stroke-width="1.5"/>
      <path d="M 0 -15 Q 10 -20 15 -15" fill="none" stroke="#5a4a2a" stroke-width="1.5"/>
      <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">还有一棵</text>
    </g>
    <!-- 引文 -->
    <rect x="-70" y="30" width="140" height="35" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="4"/>
    <text x="0" y="46" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">"一棵是枣树，</text>
    <text x="0" y="59" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">还有一棵也是枣树"</text>
    <text x="0" y="78" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">——孤独的夜</text>
  </g>

  <!-- 中间：以梦写现实 -->
  <g transform="translate(400, 240)">
    <text x="0" y="-80" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">以梦写现实</text>
    <!-- 梦境外衣 -->
    <rect x="-60" y="-50" width="120" height="40" fill="#e8e8f0" opacity="0.5" stroke="#4a90b8" stroke-width="2" rx="6"/>
    <text x="0" y="-25" text-anchor="middle" font-family="serif" font-size="13" fill="#4a90b8">梦境·幻象</text>
    <!-- 箭头 -->
    <path d="M 0 -5 L 0 15" fill="none" stroke="#c8843a" stroke-width="2"/>
    <path d="M -5 10 L 0 17 L 5 10" fill="none" stroke="#c8843a" stroke-width="2"/>
    <!-- 真实心情 -->
    <rect x="-60" y="20" width="120" height="40" fill="#fff6df" stroke="#e07856" stroke-width="2" rx="6"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="13" fill="#e07856">真实心情</text>
    <!-- 三层含义 -->
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">美好=希望</text>
    <text x="0" y="95" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">消散=无奈</text>
    <text x="0" y="110" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">追回=反抗</text>
  </g>

  <!-- 右侧：吃草的牛 -->
  <g transform="translate(630, 240)">
    <text x="0" y="-80" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">吃草的牛</text>
    <!-- 牛 -->
    <g transform="translate(0, -20)">
      <ellipse cx="0" cy="0" rx="22" ry="14" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <ellipse cx="-22" cy="-5" rx="8" ry="7" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-28 -10 L-30 -14 L-26 -12" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-20 -10 L-18 -14 L-16 -10" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="-25" cy="-5" r="1.5" fill="#2a2a2a"/>
      <line x1="-10" y1="12" x2="-10" y2="22" stroke="#5a4a2a" stroke-width="2.5"/>
      <line x1="-3" y1="12" x2="-3" y2="22" stroke="#5a4a2a" stroke-width="2.5"/>
      <line x1="8" y1="12" x2="8" y2="22" stroke="#5a4a2a" stroke-width="2.5"/>
      <line x1="15" y1="12" x2="15" y2="22" stroke="#5a4a2a" stroke-width="2.5"/>
      <!-- 尾巴 -->
      <path d="M 22 -2 Q 30 0 28 8" fill="none" stroke="#8d5a36" stroke-width="2"/>
    </g>
    <!-- 草 -->
    <path d="M -25 25 L -25 18" stroke="#2d6a4f" stroke-width="1.5"/>
    <path d="M -20 25 L -20 20" stroke="#2d6a4f" stroke-width="1.5"/>
    <path d="M 20 25 L 20 18" stroke="#2d6a4f" stroke-width="1.5"/>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">"吃的是草，</text>
    <text x="0" y="70" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">挤出的是牛奶、血"</text>
    <text x="0" y="88" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">——鲁迅自喻</text>
  </g>

  <!-- 下方：核心精神 -->
  <g transform="translate(400, 430)">
    <rect x="-280" y="0" width="560" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">现实黑暗如昏灯，梦境美好如水乡——</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="13" fill="#c8843a">在黑暗中不放弃希望，在失落中坚持"追回"——这就是鲁迅</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">鲁迅：用梦境写现实，用笔做武器，一生在黑暗中追光</text>
</svg>
