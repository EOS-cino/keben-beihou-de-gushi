<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="各种民间艺术代代传承的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">民间艺术的传承</text>
  <line x1="290" y1="58" x2="510" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 四种民间艺术 -->
  <!-- 1 花鞭 -->
  <rect x="30" y="80" width="350" height="200" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" opacity="0.6"/>
  <text x="60" y="108" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">花鞭</text>
  <g transform="translate(200,200)">
    <line x1="-40" y1="20" x2="20" y2="-20" stroke="#8d5a36" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-25" cy="10" r="7" fill="#e07856"/>
    <circle cx="-10" cy="0" r="7" fill="#6a8d3f"/>
    <circle cx="5" cy="-10" r="7" fill="#e8a838"/>
    <path d="M20 -20 Q50 0 60 30 Q65 50 50 60" fill="none" stroke="#c84a3a" stroke-width="3"/>
    <path d="M20 -20 Q45 10 50 40" fill="none" stroke="#e07856" stroke-width="2.5"/>
  </g>
  <text x="200" y="260" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">鞭上缠花，舞成彩风车</text>

  <!-- 2 皮影戏 -->
  <rect x="420" y="80" width="350" height="200" rx="8" fill="#3a4a6a" opacity="0.12"/>
  <text x="450" y="108" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">皮影戏</text>
  <!-- 白幕 -->
  <rect x="520" y="140" width="140" height="100" fill="#fff6df" stroke="#7a3b14" stroke-width="2"/>
  <!-- 皮影人 -->
  <g transform="translate(590,190)" fill="#c84a3a" stroke="#7a3b14" stroke-width="1">
    <circle cx="0" cy="-20" r="10"/>
    <path d="M-8 -10 L-12 20 L12 20 L8 -10 Z"/>
    <path d="M-12 0 L-24 10 M12 0 L24 10" stroke-width="3"/>
    <path d="M-12 20 L-16 40 L-8 40 M12 20 L8 40 L16 40" fill="none" stroke-width="3"/>
  </g>
  <!-- 操纵杆 -->
  <line x1="566" y1="200" x2="540" y2="170" stroke="#8d5a36" stroke-width="1.5"/>
  <line x1="614" y1="200" x2="640" y2="170" stroke="#8d5a36" stroke-width="1.5"/>
  <!-- 光源 -->
  <circle cx="480" cy="190" r="12" fill="#e8a838" opacity="0.6"/>
  <g stroke="#e8a838" stroke-width="1.5" opacity="0.5">
    <line x1="492" y1="190" x2="510" y2="190"/>
    <line x1="490" y1="180" x2="508" y2="178"/>
    <line x1="490" y1="200" x2="508" y2="202"/>
  </g>
  <text x="590" y="260" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">幕后操纵，灯下讲故事</text>

  <!-- 3 捏面人 -->
  <rect x="30" y="300" width="350" height="200" rx="8" fill="#e8f0e6" opacity="0.5"/>
  <text x="60" y="328" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">捏面人</text>
  <!-- 手 -->
  <g transform="translate(150,400)">
    <ellipse cx="0" cy="10" rx="30" ry="18" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 面团 -->
    <ellipse cx="0" cy="-5" rx="14" ry="10" fill="#e8a838"/>
    <!-- 捏出的小人 -->
    <g transform="translate(0,-30)">
      <circle cx="0" cy="0" r="6" fill="#e07856"/>
      <path d="M-5 5 L-7 20 L7 20 L5 5 Z" fill="#6a8d3f"/>
    </g>
  </g>
  <text x="150" y="460" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">一团面捏出小人</text>
  <!-- 成品展示 -->
  <g transform="translate(280,390)">
    <circle cx="0" cy="0" r="8" fill="#c84a3a"/>
    <path d="M-6 8 L-8 24 L8 24 L6 8 Z" fill="#e8a838"/>
    <path d="M-8 12 L-16 18 M8 12 L16 18" stroke="#c84a3a" stroke-width="2"/>
  </g>
  <text x="280" y="440" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">孙悟空</text>

  <!-- 4 剪纸 -->
  <rect x="420" y="300" width="350" height="200" rx="8" fill="#fff6df" stroke="#c84a3a" stroke-width="1.5" opacity="0.5"/>
  <text x="450" y="328" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">剪纸</text>
  <!-- 剪刀 -->
  <g transform="translate(500,400)">
    <circle cx="-10" cy="0" r="8" fill="none" stroke="#8d8d8d" stroke-width="3"/>
    <circle cx="10" cy="0" r="8" fill="none" stroke="#8d8d8d" stroke-width="3"/>
    <line x1="-6" y1="6" x2="20" y2="30" stroke="#8d8d8d" stroke-width="3"/>
    <line x1="6" y1="6" x2="-20" y2="30" stroke="#8d8d8d" stroke-width="3"/>
  </g>
  <!-- 红纸和窗花 -->
  <g transform="translate(620,400)">
    <!-- 折叠的红纸 -->
    <rect x="-30" y="-20" width="60" height="50" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="0" y1="-20" x2="0" y2="30" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- 剪好的窗花（蝴蝶） -->
    <g transform="translate(0,-50)">
      <ellipse cx="-8" cy="0" rx="10" ry="6" fill="#c84a3a"/>
      <ellipse cx="8" cy="0" rx="10" ry="6" fill="#c84a3a"/>
      <ellipse cx="0" cy="0" rx="2" ry="8" fill="#7a3b14"/>
    </g>
  </g>
  <text x="560" y="460" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">一刀一剪，连而不断</text>

  <!-- 传承箭头（老到少） -->
  <g transform="translate(400,520)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">老艺人 → 小徒弟：一代一代传下去</text>
  </g>

  <!-- 底部说明 -->
  <rect x="40" y="540" width="720" height="36" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="563" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">花鞭、皮影、面人、剪纸——最了不起的艺术，往往藏在最普通的生活里。</text>
</svg>
