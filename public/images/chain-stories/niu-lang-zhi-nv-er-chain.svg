<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠故事 - 星河两岸的传说">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 连珠标识徽章 -->
  <g transform="translate(60,42)">
    <rect x="-44" y="-22" width="88" height="44" rx="22" fill="#3a7d5c"/>
    <circle cx="-26" cy="0" r="5" fill="#fef9ed"/><circle cx="-10" cy="0" r="5" fill="#fef9ed"/><circle cx="6" cy="0" r="5" fill="#fef9ed"/><circle cx="22" cy="0" r="5" fill="#fef9ed"/>
    <text x="40" y="5" font-family="serif" font-size="16" font-weight="bold" fill="#fef9ed">连珠</text>
  </g>
  <!-- 标题 -->
  <text x="460" y="48" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#3a7d5c">星河两岸的传说</text>
  <line x1="360" y1="64" x2="560" y2="64" stroke="#3a7d5c" stroke-width="2"/>

  <!-- 夜空 -->
  <rect x="40" y="90" width="720" height="420" rx="12" fill="#2d2a24" opacity="0.92"/>
  <rect x="40" y="90" width="720" height="200" rx="12" fill="#2d2a24" opacity="0.5"/>

  <!-- 背景星点 -->
  <g fill="#fef9ed" opacity="0.6">
    <circle cx="90" cy="130" r="1"/><circle cx="160" cy="115" r="1.5"/><circle cx="230" cy="140" r="1"/>
    <circle cx="310" cy="120" r="1"/><circle cx="400" cy="135" r="1.5"/><circle cx="490" cy="115" r="1"/>
    <circle cx="570" cy="140" r="1.5"/><circle cx="650" cy="120" r="1"/><circle cx="720" cy="135" r="1"/>
    <circle cx="110" cy="180" r="1"/><circle cx="250" cy="175" r="1"/><circle cx="380" cy="185" r="1.5"/>
    <circle cx="520" cy="175" r="1"/><circle cx="680" cy="185" r="1"/>
  </g>

  <!-- 左上：织女星（织女星星座连线） -->
  <g>
    <text x="170" y="425" text-anchor="middle" font-family="serif" font-size="15" fill="#c05a30">织女星</text>
    <circle cx="150" cy="200" r="4" fill="#fef9ed"/>
    <circle cx="130" cy="240" r="3.5" fill="#fef9ed"/>
    <circle cx="170" cy="250" r="3.5" fill="#fef9ed"/>
    <circle cx="190" cy="220" r="3.5" fill="#fef9ed"/>
    <path d="M150 200 L130 240 L170 250 L190 220 Z" stroke="#3a7d5c" stroke-width="1.5" fill="none" opacity="0.7"/>
    <!-- 织女剪影 -->
    <g transform="translate(150,310)" opacity="0.8">
      <path d="M-12 -20 L12 -20 L16 14 L-16 14 Z" fill="#c05a30"/>
      <circle cx="0" cy="-30" r="10" fill="#c05a30"/>
      <circle cx="0" cy="-40" r="6" fill="#7a3b14"/>
      <path d="M16 -10 Q30 0 26 18" stroke="#c05a30" stroke-width="4" fill="none"/>
    </g>
  </g>

  <!-- 中间：银河分隔 -->
  <g opacity="0.5">
    <path d="M340 100 Q380 250 340 400 Q310 470 340 500" stroke="#7a7468" stroke-width="30" fill="none" opacity="0.3"/>
    <path d="M340 100 Q380 250 340 400 Q310 470 340 500" stroke="#fef9ed" stroke-width="2" fill="none" stroke-dasharray="3 8" opacity="0.4"/>
  </g>
  <text x="360" y="280" font-family="serif" font-size="14" fill="#7a7468" opacity="0.7" transform="rotate(80 360 280)">银  河</text>

  <!-- 右上：牛郎星（牛郎星与两颗子星） -->
  <g>
    <text x="580" y="425" text-anchor="middle" font-family="serif" font-size="15" fill="#c05a30">牛郎星</text>
    <circle cx="570" cy="220" r="4" fill="#fef9ed"/>
    <circle cx="545" cy="240" r="3" fill="#fef9ed"/>
    <circle cx="595" cy="240" r="3" fill="#fef9ed"/>
    <path d="M545 240 L570 220 L595 240" stroke="#3a7d5c" stroke-width="1.5" fill="none" opacity="0.7"/>
    <!-- 牛郎与扁担挑孩子剪影 -->
    <g transform="translate(570,310)" opacity="0.8">
      <rect x="-10" y="-20" width="20" height="34" rx="4" fill="#3a7d5c"/>
      <circle cx="0" cy="-30" r="10" fill="#c05a30"/>
      <path d="M-10 -10 Q-26 0 -34 12" stroke="#3a7d5c" stroke-width="4" fill="none"/>
      <path d="M10 -10 Q26 0 34 12" stroke="#3a7d5c" stroke-width="4" fill="none"/>
      <circle cx="-34" cy="16" r="7" fill="#c05a30" opacity="0.7"/>
      <circle cx="34" cy="16" r="7" fill="#c05a30" opacity="0.7"/>
      <line x1="-34" y1="16" x2="34" y2="16" stroke="#7a3b14" stroke-width="2"/>
    </g>
  </g>

  <!-- 底部三个星座故事卡片 -->
  <g>
    <!-- 卡片1：猎户座 -->
    <rect x="60" y="440" width="200" height="60" rx="6" fill="#fef9ed" stroke="#3a7d5c" stroke-width="1.5" opacity="0.9"/>
    <g transform="translate(95,470)">
      <circle cx="0" cy="-12" r="2.5" fill="#c05a30"/><circle cx="-10" cy="-4" r="2.5" fill="#c05a30"/>
      <circle cx="10" cy="-4" r="2.5" fill="#c05a30"/><circle cx="-8" cy="6" r="2.5" fill="#c05a30"/>
      <circle cx="8" cy="6" r="2.5" fill="#c05a30"/>
      <path d="M0 -12 L-10 -4 L10 -4 M-8 6 L8 6" stroke="#3a7d5c" stroke-width="1" fill="none"/>
    </g>
    <text x="200" y="465" font-family="serif" font-size="13" fill="#7a3b14">猎户座</text>
    <text x="200" y="486" font-family="serif" font-size="11" fill="#7a7468">猎人升天化作星辰</text>

    <!-- 卡片2：北斗七星 -->
    <rect x="300" y="440" width="200" height="60" rx="6" fill="#fef9ed" stroke="#3a7d5c" stroke-width="1.5" opacity="0.9"/>
    <g transform="translate(335,470)">
      <circle cx="0" cy="-12" r="2.5" fill="#c05a30"/><circle cx="8" cy="-6" r="2.5" fill="#c05a30"/>
      <circle cx="16" cy="0" r="2.5" fill="#c05a30"/><circle cx="24" cy="6" r="2.5" fill="#c05a30"/>
      <circle cx="18" cy="14" r="2.5" fill="#c05a30"/><circle cx="8" cy="12" r="2.5" fill="#c05a30"/>
      <circle cx="-2" cy="8" r="2.5" fill="#c05a30"/>
      <path d="M0 -12 L8 -6 L16 0 L24 6 L18 14 L8 12 L-2 8" stroke="#3a7d5c" stroke-width="1" fill="none"/>
    </g>
    <text x="440" y="465" font-family="serif" font-size="13" fill="#7a3b14">北斗七星</text>
    <text x="440" y="486" font-family="serif" font-size="11" fill="#7a7468">指引方向与思念</text>

    <!-- 卡片3：嫦娥奔月 -->
    <rect x="540" y="440" width="200" height="60" rx="6" fill="#fef9ed" stroke="#3a7d5c" stroke-width="1.5" opacity="0.9"/>
    <g transform="translate(575,470)">
      <circle cx="0" cy="0" r="14" fill="#c05a30" opacity="0.3"/>
      <circle cx="0" cy="0" r="9" fill="#c05a30" opacity="0.5"/>
      <path d="M0 -8 Q6 -4 4 4 Q0 8 -4 4 Q-6 -4 0 -8 Z" fill="#fef9ed"/>
    </g>
    <text x="640" y="465" font-family="serif" font-size="13" fill="#7a3b14">嫦娥奔月</text>
    <text x="640" y="486" font-family="serif" font-size="11" fill="#7a7468">月宫孤影盼团圆</text>
  </g>

  <!-- 底部说明 -->
  <rect x="0" y="514" width="800" height="86" fill="#fef9ed"/>
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="17" fill="#3a7d5c" opacity="0.9">连珠小故事：天上星河璀璨，人间聚散离合皆成传说</text>
</svg>
