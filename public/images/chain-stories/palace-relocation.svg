<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="故宫文物南迁插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#8a2a1a">连珠小故事：故宫文物南迁</text>
  <line x1="200" y1="62" x2="600" y2="62" stroke="#c4a83a" stroke-width="2"/>

  <!-- 地图背景（简化中国轮廓） -->
  <path d="M120 200 Q100 250 130 320 Q150 380 200 420 Q280 460 350 450 Q420 460 480 440 Q540 420 560 380 Q580 320 560 260 Q540 210 480 180 Q400 160 320 170 Q200 175 120 200 Z" fill="#e8d9b8" stroke="#c4a86a" stroke-width="2" opacity="0.6"/>

  <!-- 起点：北京故宫 -->
  <g>
    <rect x="180" y="220" width="50" height="35" fill="#b83828" stroke="#7a1a14" stroke-width="2"/>
    <path d="M175 220 L205 195 L235 220 Z" fill="#f4c842" stroke="#c4a01a" stroke-width="1.5"/>
    <circle cx="205" cy="237" r="6" fill="#c4282a"/>
    <text x="205" y="275" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#8a2a1a">北京·故宫</text>
    <text x="205" y="290" text-anchor="middle" font-family="serif" font-size="11" fill="#8a2a1a">起点 1933</text>
  </g>

  <!-- 路线1：北京→上海→南京 -->
  <path d="M230 235 Q330 280 420 320" fill="none" stroke="#c44a3a" stroke-width="3" stroke-dasharray="8,5"/>
  <!-- 路线2：南京→四川/贵州（西迁） -->
  <path d="M420 320 Q380 380 340 420" fill="none" stroke="#c44a3a" stroke-width="3" stroke-dasharray="8,5"/>
  <path d="M420 320 Q460 380 440 420" fill="none" stroke="#c44a3a" stroke-width="3" stroke-dasharray="8,5"/>

  <!-- 中转点：上海/南京 -->
  <g>
    <circle cx="420" cy="320" r="8" fill="#c4a83a" stroke="#8a6a1a" stroke-width="2"/>
    <text x="420" y="305" text-anchor="middle" font-family="serif" font-size="13" fill="#8a2a1a">上海·南京</text>
  </g>

  <!-- 终点：四川/贵州 -->
  <g>
    <circle cx="340" cy="420" r="8" fill="#3a7a5a" stroke="#2a5a3a" stroke-width="2"/>
    <text x="340" y="445" text-anchor="middle" font-family="serif" font-size="12" fill="#2a5a3a">四川</text>
    <circle cx="440" cy="420" r="8" fill="#3a7a5a" stroke="#2a5a3a" stroke-width="2"/>
    <text x="440" y="445" text-anchor="middle" font-family="serif" font-size="12" fill="#2a5a3a">贵州</text>
  </g>

  <!-- 火车（运输工具） -->
  <g>
    <!-- 车头 -->
    <rect x="580" y="180" width="50" height="40" fill="#4a4a4a" rx="6"/>
    <rect x="630" y="190" width="30" height="30" fill="#5a5a5a" rx="4"/>
    <!-- 烟囱 -->
    <rect x="590" y="165" width="12" height="20" fill="#3a3a3a"/>
    <ellipse cx="596" cy="160" rx="10" ry="6" fill="#cccccc" opacity="0.6"/>
    <!-- 车轮 -->
    <circle cx="595" cy="225" r="8" fill="#2a2a2a"/>
    <circle cx="620" cy="225" r="8" fill="#2a2a2a"/>
    <circle cx="650" cy="225" r="8" fill="#2a2a2a"/>
    <!-- 文物箱 -->
    <rect x="585" y="185" width="18" height="18" fill="#c4a86a" stroke="#8a6a3a" stroke-width="1.5"/>
    <line x1="585" y1="194" x2="603" y2="194" stroke="#8a6a3a" stroke-width="1"/>
    <rect x="606" y="185" width="18" height="18" fill="#c4a86a" stroke="#8a6a3a" stroke-width="1.5"/>
    <line x1="606" y1="194" x2="624" y2="194" stroke="#8a6a3a" stroke-width="1"/>
    <text x="615" y="250" text-anchor="middle" font-family="serif" font-size="13" fill="#8a2a1a">文物专列</text>
  </g>

  <!-- 文物箱（堆叠） -->
  <g>
    <rect x="660" y="350" width="40" height="35" fill="#c4a86a" stroke="#8a6a3a" stroke-width="2"/>
    <line x1="660" y1="367" x2="700" y2="367" stroke="#8a6a3a" stroke-width="1.5"/>
    <line x1="680" y1="350" x2="680" y2="385" stroke="#8a6a3a" stroke-width="1.5"/>
    <rect x="665" y="320" width="35" height="30" fill="#d4b878" stroke="#8a6a3a" stroke-width="2"/>
    <line x1="665" y1="335" x2="700" y2="335" stroke="#8a6a3a" stroke-width="1.5"/>
    <text x="682" y="405" text-anchor="middle" font-family="serif" font-size="12" fill="#8a2a1a">上万箱文物</text>
  </g>

  <!-- 数据标注 -->
  <rect x="100" y="470" width="240" height="60" fill="#fff6df" stroke="#c4a83a" stroke-width="2" rx="8"/>
  <text x="220" y="492" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#8a2a1a">南迁数据</text>
  <text x="220" y="510" text-anchor="middle" font-family="serif" font-size="12" fill="#8a2a1a">历时十余年 · 行程上万里</text>
  <text x="220" y="525" text-anchor="middle" font-family="serif" font-size="12" fill="#8a2a1a">百万文物几乎无损</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="15" fill="#8a2a1a">战火中，故宫人用生命护送国宝南迁西移</text>
</svg>
