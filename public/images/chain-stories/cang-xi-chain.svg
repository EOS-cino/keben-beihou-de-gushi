<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠故事 - 世界面具文化">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 连珠标识徽章 -->
  <g transform="translate(60,42)">
    <rect x="-44" y="-22" width="88" height="44" rx="22" fill="#3a7d5c"/>
    <circle cx="-26" cy="0" r="5" fill="#fef9ed"/><circle cx="-10" cy="0" r="5" fill="#fef9ed"/><circle cx="6" cy="0" r="5" fill="#fef9ed"/><circle cx="22" cy="0" r="5" fill="#fef9ed"/>
    <text x="40" y="5" font-family="serif" font-size="16" font-weight="bold" fill="#fef9ed">连珠</text>
  </g>
  <text x="460" y="48" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#3a7d5c">世界面具文化</text>
  <line x1="360" y1="64" x2="560" y2="64" stroke="#3a7d5c" stroke-width="2"/>

  <!-- 顶部标题 -->
  <g transform="translate(400,110)">
    <rect x="-100" y="-20" width="200" height="36" rx="18" fill="#c05a30" opacity="0.9"/>
    <text x="0" y="4" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#fef9ed">面具里的世界</text>
  </g>

  <!-- 面具1：藏戏面具（左上） -->
  <g transform="translate(150,220)">
    <rect x="-85" y="-65" width="170" height="130" rx="8" fill="#fff" stroke="#7a3b14" stroke-width="2"/>
    <g transform="translate(0,-5)">
      <ellipse cx="0" cy="0" rx="30" ry="38" fill="#c05a30" opacity="0.75" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-18 -28 L-12 -40 L-6 -30 L0 -42 L6 -30 L12 -40 L18 -28 Z" fill="#7a3b14"/>
      <ellipse cx="-9" cy="-3" rx="5" ry="4" fill="#fff" stroke="#2d2a24" stroke-width="1"/>
      <ellipse cx="9" cy="-3" rx="5" ry="4" fill="#fff" stroke="#2d2a24" stroke-width="1"/>
      <circle cx="-9" cy="-3" r="2.5" fill="#2d2a24"/><circle cx="9" cy="-3" r="2.5" fill="#2d2a24"/>
      <path d="M-7 14 Q0 20 7 14" stroke="#2d2a24" stroke-width="2" fill="none"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">藏戏面具</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#7a7468">中国西藏</text>
  </g>

  <!-- 面具2：京剧脸谱（左下） -->
  <g transform="translate(150,420)">
    <rect x="-85" y="-65" width="170" height="130" rx="8" fill="#fff" stroke="#c05a30" stroke-width="2"/>
    <g transform="translate(0,-5)">
      <ellipse cx="0" cy="0" rx="30" ry="38" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 脸谱花纹 -->
      <path d="M-20 -20 Q-10 -30 0 -20 Q10 -30 20 -20" stroke="#2d2a24" stroke-width="3" fill="none"/>
      <path d="M-15 -10 L-8 -5 M15 -10 L8 -5" stroke="#c05a30" stroke-width="3"/>
      <ellipse cx="-9" cy="0" rx="5" ry="4" fill="#fff" stroke="#2d2a24" stroke-width="1"/>
      <ellipse cx="9" cy="0" rx="5" ry="4" fill="#fff" stroke="#2d2a24" stroke-width="1"/>
      <circle cx="-9" cy="0" r="2.5" fill="#2d2a24"/><circle cx="9" cy="0" r="2.5" fill="#2d2a24"/>
      <!-- 脸颊色块 -->
      <ellipse cx="-18" cy="12" rx="8" ry="6" fill="#c05a30" opacity="0.5"/>
      <ellipse cx="18" cy="12" rx="8" ry="6" fill="#c05a30" opacity="0.5"/>
      <path d="M-6 20 Q0 25 6 20" stroke="#2d2a24" stroke-width="2" fill="none"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">京剧脸谱</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#7a7468">中国北京</text>
  </g>

  <!-- 面具3：威尼斯面具（中） -->
  <g transform="translate(400,320)">
    <circle cx="0" cy="0" r="75" fill="#c05a30" opacity="0.06"/>
    <g transform="translate(0,-5)">
      <!-- 威尼斯鸟嘴/华丽面具 -->
      <path d="M-25 -25 Q0 -40 25 -25 L28 20 Q0 35 -28 20 Z" fill="#fef9ed" stroke="#7a3b14" stroke-width="2"/>
      <!-- 装饰 -->
      <path d="M-25 -25 L-35 -35 L-30 -20 M25 -25 L35 -35 L30 -20" stroke="#c05a30" stroke-width="2" fill="none"/>
      <ellipse cx="-10" cy="-8" rx="6" ry="4" fill="#fff" stroke="#2d2a24" stroke-width="1.5"/>
      <ellipse cx="10" cy="-8" rx="6" ry="4" fill="#fff" stroke="#2d2a24" stroke-width="1.5"/>
      <circle cx="-10" cy="-8" r="2.5" fill="#2d2a24"/><circle cx="10" cy="-8" r="2.5" fill="#2d2a24"/>
      <!-- 鼻形 -->
      <path d="M0 -5 L-3 12 L3 12 Z" fill="#c05a30" opacity="0.4" stroke="#7a3b14" stroke-width="1"/>
      <!-- 嘴 -->
      <path d="M-8 20 Q0 26 8 20" stroke="#2d2a24" stroke-width="2" fill="none"/>
      <!-- 金色花纹 -->
      <path d="M-20 5 Q-15 12 -10 5 M10 5 Q15 12 20 5" stroke="#c05a30" stroke-width="1.5" fill="none"/>
    </g>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#c05a30">威尼斯面具</text>
    <text x="0" y="86" text-anchor="middle" font-family="serif" font-size="11" fill="#7a7468">意大利</text>
  </g>

  <!-- 面具4：非洲面具（右上） -->
  <g transform="translate(650,220)">
    <rect x="-85" y="-65" width="170" height="130" rx="8" fill="#fff" stroke="#7a3b14" stroke-width="2"/>
    <g transform="translate(0,-5)">
      <!-- 非洲椭圆形面具 -->
      <ellipse cx="0" cy="0" rx="26" ry="40" fill="#7a3b14" opacity="0.7" stroke="#2d2a24" stroke-width="1.5"/>
      <!-- 几何纹样 -->
      <path d="M-15 -25 L0 -32 L15 -25" stroke="#c05a30" stroke-width="2" fill="none"/>
      <ellipse cx="-8" cy="-8" rx="4" ry="6" fill="#fef9ed"/>
      <ellipse cx="8" cy="-8" rx="4" ry="6" fill="#fef9ed"/>
      <circle cx="-8" cy="-8" r="2" fill="#2d2a24"/><circle cx="8" cy="-8" r="2" fill="#2d2a24"/>
      <!-- 鼻子 -->
      <path d="M0 -5 L-2 15 L2 15 Z" fill="#c05a30"/>
      <!-- 嘴 -->
      <rect x="-6" y="20" width="12" height="4" rx="1" fill="#c05a30"/>
      <!-- 疤痕纹 -->
      <line x1="-12" y1="5" x2="-8" y2="5" stroke="#c05a30" stroke-width="1.5"/>
      <line x1="8" y1="5" x2="12" y2="5" stroke="#c05a30" stroke-width="1.5"/>
      <line x1="-12" y1="10" x2="-8" y2="10" stroke="#c05a30" stroke-width="1.5"/>
      <line x1="8" y1="10" x2="12" y2="10" stroke="#c05a30" stroke-width="1.5"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">非洲面具</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#7a7468">西非部落</text>
  </g>

  <!-- 面具5：日本能面（右下） -->
  <g transform="translate(650,420)">
    <rect x="-85" y="-65" width="170" height="130" rx="8" fill="#fff" stroke="#c05a30" stroke-width="2"/>
    <g transform="translate(0,-5)">
      <!-- 能面（长椭圆） -->
      <ellipse cx="0" cy="0" rx="24" ry="38" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 头发线 -->
      <path d="M-20 -25 Q0 -35 20 -25" stroke="#2d2a24" stroke-width="2" fill="none"/>
      <!-- 细长眼 -->
      <line x1="-14" y1="-5" x2="-6" y2="-5" stroke="#2d2a24" stroke-width="2"/>
      <line x1="6" y1="-5" x2="14" y2="-5" stroke="#2d2a24" stroke-width="2"/>
      <!-- 眉 -->
      <path d="M-14 -12 Q-10 -14 -6 -12 M6 -12 Q10 -14 14 -12" stroke="#2d2a24" stroke-width="1.5" fill="none"/>
      <!-- 鼻 -->
      <path d="M0 -3 L-2 10 L2 10 Z" fill="#7a7468" opacity="0.3" stroke="#7a3b14" stroke-width="0.8"/>
      <!-- 嘴（小） -->
      <path d="M-3 18 Q0 21 3 18" stroke="#c05a30" stroke-width="1.5" fill="none"/>
      <!-- 牙齿 -->
      <rect x="-2" y="18" width="4" height="3" fill="#fef9ed" stroke="#2d2a24" stroke-width="0.5"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">日本能面</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#7a7468">日本</text>
  </g>

  <!-- 连线装饰 -->
  <g stroke="#7a7468" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.4">
    <line x1="235" y1="220" x2="325" y2="290"/>
    <line x1="235" y1="420" x2="325" y2="350"/>
    <line x1="565" y1="220" x2="475" y2="290"/>
    <line x1="565" y1="420" x2="475" y2="350"/>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="17" fill="#3a7d5c" opacity="0.9">连珠小故事：面具千面，世界各地用面具演绎文化</text>
</svg>
