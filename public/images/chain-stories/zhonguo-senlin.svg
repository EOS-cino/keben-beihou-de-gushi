<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="中国森林类型插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">中国的森林</text>
  <line x1="330" y1="58" x2="470" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 从北到南四种森林 -->
  <!-- 寒温带针叶林（小兴安岭） -->
  <rect x="20" y="80" width="760" height="110" fill="#d8e8d8" stroke="#c8843a" stroke-width="2" rx="6"/>
  <text x="60" y="105" font-family="serif" font-size="15" font-weight="bold" fill="#3a6a2a">寒温带针叶林（东北）</text>
  <!-- 针叶树（三角形松树） -->
  <g transform="translate(200,160)">
    <rect x="-2" y="0" width="4" height="20" fill="#8d5a36"/>
    <path d="M0 -35 L-20 0 L20 0 Z" fill="#3a6a2a"/>
    <path d="M0 -25 L-15 5 L15 5 Z" fill="#3a6a2a"/>
  </g>
  <g transform="translate(280,160)">
    <rect x="-2" y="0" width="4" height="20" fill="#8d5a36"/>
    <path d="M0 -30 L-18 0 L18 0 Z" fill="#3a6a2a"/>
    <path d="M0 -20 L-13 5 L13 5 Z" fill="#3a6a2a"/>
  </g>
  <g transform="translate(360,160)">
    <rect x="-2" y="0" width="4" height="20" fill="#8d5a36"/>
    <path d="M0 -38 L-22 0 L22 0 Z" fill="#3a6a2a"/>
    <path d="M0 -26 L-16 5 L16 5 Z" fill="#3a6a2a"/>
  </g>
  <!-- 雪 -->
  <g fill="#fff6df" stroke="#aaaab8" stroke-width="0.8">
    <circle cx="450" cy="130" r="2"/><circle cx="500" cy="140" r="2"/>
    <circle cx="550" cy="125" r="2"/><circle cx="600" cy="135" r="2"/>
  </g>
  <text x="680" y="150" font-family="serif" font-size="12" fill="#7a3b14">红松·落叶松</text>

  <!-- 温带落叶阔叶林 -->
  <rect x="20" y="200" width="760" height="110" fill="#e8e0c8" stroke="#c8843a" stroke-width="2" rx="6"/>
  <text x="60" y="225" font-family="serif" font-size="15" font-weight="bold" fill="#c8883a">温带落叶阔叶林（华北）</text>
  <!-- 阔叶树（圆形树冠） -->
  <g transform="translate(220,290)">
    <rect x="-3" y="0" width="6" height="20" fill="#8d5a36"/>
    <circle cx="0" cy="-12" r="20" fill="#e8a838"/>
    <circle cx="-12" cy="-5" r="12" fill="#d88828"/>
    <circle cx="12" cy="-5" r="12" fill="#e8a838"/>
  </g>
  <g transform="translate(320,290)">
    <rect x="-3" y="0" width="6" height="20" fill="#8d5a36"/>
    <circle cx="0" cy="-12" r="18" fill="#c8483a"/>
    <circle cx="-10" cy="-5" r="11" fill="#d4584a"/>
  </g>
  <g transform="translate(420,290)">
    <rect x="-3" y="0" width="6" height="20" fill="#8d5a36"/>
    <circle cx="0" cy="-12" r="20" fill="#e8a838"/>
    <circle cx="12" cy="-5" r="12" fill="#d88828"/>
  </g>
  <!-- 落叶 -->
  <g>
    <path d="M500 295 Q506 289 512 295 Q506 301 500 295 Z" fill="#e8a838"/>
    <path d="M540 300 Q546 294 552 300 Q546 306 540 300 Z" fill="#c8483a"/>
  </g>
  <text x="680" y="270" font-family="serif" font-size="12" fill="#7a3b14">栎树·桦树·杨树</text>

  <!-- 亚热带常绿阔叶林 -->
  <rect x="20" y="320" width="760" height="110" fill="#d8e8c8" stroke="#c8843a" stroke-width="2" rx="6"/>
  <text x="60" y="345" font-family="serif" font-size="15" font-weight="bold" fill="#3a8a3a">亚热带常绿阔叶林（南方）</text>
  <!-- 常绿树（深绿茂密） -->
  <g transform="translate(240,410)">
    <rect x="-3" y="0" width="6" height="20" fill="#8d5a36"/>
    <ellipse cx="0" cy="-15" rx="25" ry="22" fill="#3a8a3a"/>
    <ellipse cx="-15" cy="-8" rx="14" ry="12" fill="#2a7a2a"/>
    <ellipse cx="15" cy="-8" rx="14" ry="12" fill="#2a7a2a"/>
  </g>
  <g transform="translate(350,410)">
    <rect x="-3" y="0" width="6" height="20" fill="#8d5a36"/>
    <ellipse cx="0" cy="-15" rx="22" ry="20" fill="#3a8a3a"/>
    <ellipse cx="-12" cy="-8" rx="12" ry="10" fill="#2a7a2a"/>
    <ellipse cx="12" cy="-8" rx="12" ry="10" fill="#2a7a2a"/>
  </g>
  <g transform="translate(450,410)">
    <rect x="-3" y="0" width="6" height="20" fill="#8d5a36"/>
    <ellipse cx="0" cy="-15" rx="24" ry="21" fill="#3a8a3a"/>
    <ellipse cx="14" cy="-8" rx="13" ry="11" fill="#2a7a2a"/>
  </g>
  <text x="680" y="390" font-family="serif" font-size="12" fill="#7a3b14">樟树·楠木</text>

  <!-- 热带雨林 -->
  <rect x="20" y="440" width="760" height="110" fill="#c8e8c8" stroke="#c8843a" stroke-width="2" rx="6"/>
  <text x="60" y="465" font-family="serif" font-size="15" font-weight="bold" fill="#2a8a4a">热带雨林（云南·海南）</text>
  <!-- 雨林（高大分层，藤蔓） -->
  <g transform="translate(200,530)">
    <rect x="-4" y="0" width="8" height="20" fill="#5a3a1a"/>
    <ellipse cx="0" cy="-25" rx="35" ry="20" fill="#2a7a2a"/>
    <ellipse cx="-20" cy="-15" rx="18" ry="12" fill="#3a8a3a"/>
    <ellipse cx="20" cy="-15" rx="18" ry="12" fill="#3a8a3a"/>
    <ellipse cx="0" cy="-40" rx="25" ry="14" fill="#2a7a2a"/>
  </g>
  <g transform="translate(340,530)">
    <rect x="-4" y="0" width="8" height="20" fill="#5a3a1a"/>
    <ellipse cx="0" cy="-30" rx="30" ry="18" fill="#2a7a2a"/>
    <ellipse cx="0" cy="-45" rx="22" ry="12" fill="#3a8a3a"/>
  </g>
  <!-- 藤蔓 -->
  <path d="M240 500 Q280 490 320 500 Q360 510 400 495" fill="none" stroke="#5a8a3a" stroke-width="2"/>
  <!-- 孔雀 -->
  <g transform="translate(500,525)">
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="#3a9a8a"/>
    <circle cx="7" cy="-3" r="4" fill="#3a9a8a"/>
    <path d="M-5 -2 Q-15 -8 -12 5" fill="#3a9a8a"/>
    <circle cx="8" cy="-4" r="1" fill="#3d2817"/>
  </g>
  <text x="680" y="510" font-family="serif" font-size="12" fill="#7a3b14">望天树·藤蔓</text>

  <!-- 标注：从北到南 -->
  <line x1="50" y1="135" x2="50" y2="495" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="15" y="295" width="40" height="40" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="35" y="312" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">北</text>
  <text x="35" y="328" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">↓</text>

  <!-- 底部说明 -->
  <rect x="40" y="558" width="720" height="34" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="580" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">从东北的寒温带针叶林到南方的热带雨林，中国的森林类型丰富，各有特色。</text>
</svg>
