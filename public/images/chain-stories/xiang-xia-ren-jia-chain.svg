<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从乡下人家到丰子恺画乡村的故事画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#7a3b14" stroke-width="2"/>
  <line x1="300" y1="300" x2="500" y2="300" stroke="#7a3b14" stroke-width="3" stroke-dasharray="8,6"/>
  <circle cx="350" cy="300" r="6" fill="#d4a017"/>
  <circle cx="400" cy="300" r="9" fill="#c8553d"/>
  <circle cx="450" cy="300" r="6" fill="#d4a017"/>
  <!-- 左珠：乡下人家 -->
  <circle cx="170" cy="300" r="110" fill="#e8a04e" opacity="0.3" stroke="#b5651d" stroke-width="3"/>
  <rect x="145" y="285" width="50" height="30" fill="#8a6d3b"/>
  <polygon points="145,285 170,265 195,285" fill="#c8553d"/>
  <rect x="160" y="300" width="20" height="15" fill="#5d4037"/>
  <text x="170" y="345" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#7a3b14">乡下人家</text>
  <text x="170" y="368" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">用文字写乡村</text>
  <!-- 右珠：丰子恺 -->
  <circle cx="630" cy="300" r="110" fill="#8fb996" opacity="0.3" stroke="#3a7d44" stroke-width="3"/>
  <rect x="610" y="270" width="40" height="40" fill="#ffffff" stroke="#3a3a3a" stroke-width="2"/>
  <path d="M 620 285 q 10 -8 20 0" stroke="#3a3a3a" stroke-width="2" fill="none"/>
  <circle cx="622" cy="295" r="1.5" fill="#3a3a3a"/>
  <circle cx="638" cy="295" r="1.5" fill="#3a3a3a"/>
  <path d="M 622 302 q 8 4 16 0" stroke="#3a3a3a" stroke-width="1.5" fill="none"/>
  <text x="630" y="345" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#7a3b14">丰子恺</text>
  <text x="630" y="368" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">用画笔画乡村</text>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">乡下人家，丰子恺的乡村画</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">认真看、认真画、认真写，普通日子也值得记</text>
</svg>
