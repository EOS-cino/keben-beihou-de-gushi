<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="南朝佛寺兴衰与杜牧写诗背景插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：南朝四百八十寺是怎么回事</text>
  <line x1="150" y1="55" x2="650" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左：南朝大兴佛寺 -->
  <g transform="translate(180 250)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">南朝大兴佛寺</text>
    <text x="0" y="-42" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">梁武帝四次舍身出家</text>
    <!-- 皇帝(和尚帽) -->
    <g transform="translate(-60 0)">
      <circle cx="0" cy="0" r="12" fill="#f0d0a8"/>
      <path d="M-10 -8 Q0 -20 10 -8 Z" fill="#c84a3a"/>
      <rect x="-8" y="2" width="16" height="20" fill="#c84a3a"/>
      <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">梁武帝</text>
    </g>
    <!-- 寺庙群 -->
    <g transform="translate(30 10)">
      <path d="M-30 0 L0 -22 L30 0 Z" fill="#e07856"/>
      <rect x="-24" y="0" width="48" height="30" fill="#f4e4c4" stroke="#8d5a36" stroke-width="1.5"/>
      <rect x="-8" y="12" width="16" height="18" fill="#8d5a36"/>
    </g>
    <g transform="translate(80 -6)">
      <path d="M-20 0 L0 -16 L20 0 Z" fill="#e07856" opacity="0.8"/>
      <rect x="-16" y="0" width="32" height="22" fill="#f4e4c4" stroke="#8d5a36" stroke-width="1"/>
    </g>
    <text x="20" y="60" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">建康七百余寺</text>
  </g>

  <!-- 中：耗费民财 -->
  <g transform="translate(400 250)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">耗费民财</text>
    <text x="0" y="-42" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">僧人不纳税服役</text>
    <!-- 金币流向寺庙 -->
    <g fill="#e8a838">
      <circle cx="-30" cy="-10" r="6"/>
      <circle cx="-15" cy="6" r="5"/>
      <circle cx="0" cy="-6" r="6"/>
    </g>
    <g stroke="#e8a838" stroke-width="1.5" fill="none" opacity="0.6">
      <path d="M-30 -10 Q-10 0 20 0"/>
      <path d="M-15 6 Q0 4 20 2"/>
    </g>
    <!-- 百姓 -->
    <g transform="translate(-40 20)">
      <circle cx="0" cy="0" r="8" fill="#f0d0a8"/>
      <rect x="-6" y="6" width="12" height="16" fill="#8d6f47"/>
      <path d="M-6 22 L-10 36 M6 22 L10 36" stroke="#8d6f47" stroke-width="2"/>
    </g>
    <text x="-40" y="50" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">百姓负担重</text>
    <!-- 寺庙收钱 -->
    <g transform="translate(30 0)">
      <path d="M-18 0 L0 -14 L18 0 Z" fill="#e07856"/>
      <rect x="-14" y="0" width="28" height="18" fill="#f4e4c4" stroke="#8d5a36" stroke-width="1.5"/>
      <text x="0" y="14" text-anchor="middle" font-family="serif" font-size="8" fill="#7a3b14">寺</text>
    </g>
  </g>

  <!-- 右：烟雨楼台 -->
  <g transform="translate(620 250)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">烟雨楼台</text>
    <text x="0" y="-42" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">杜牧借古讽今</text>
    <g transform="translate(-20 10)" opacity="0.7">
      <path d="M-26 0 L0 -20 L26 0 Z" fill="#e07856"/>
      <rect x="-20" y="0" width="40" height="26" fill="#f4e4c4" stroke="#8d5a36" stroke-width="1.5"/>
    </g>
    <g transform="translate(40 -6)" opacity="0.5">
      <path d="M-18 0 L0 -14 L18 0 Z" fill="#e07856"/>
      <rect x="-14" y="0" width="28" height="20" fill="#f4e4c4" stroke="#8d5a36" stroke-width="1"/>
    </g>
    <!-- 烟雨 -->
    <g stroke="#9fb0bc" stroke-width="1" opacity="0.6">
      <line x1="-30" y1="-20" x2="-34" y2="0"/>
      <line x1="-10" y1="-26" x2="-14" y2="-6"/>
      <line x1="10" y1="-22" x2="6" y2="-2"/>
      <line x1="30" y1="-26" x2="26" y2="-6"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">多少楼台烟雨中</text>
  </g>

  <!-- 时间轴 -->
  <g transform="translate(400 380)">
    <line x1="-220" y1="0" x2="220" y2="0" stroke="#c8843a" stroke-width="2"/>
    <circle cx="-220" cy="0" r="5" fill="#e07856"/>
    <circle cx="0" cy="0" r="5" fill="#e8a838"/>
    <circle cx="220" cy="0" r="5" fill="#4a90b8"/>
    <text x="-220" y="22" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">南朝(420-589)</text>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">侯景之乱</text>
    <text x="220" y="22" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">晚唐杜牧</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="470" width="700" height="100" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6" opacity="0.85"/>
  <text x="400" y="498" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">梁武帝痴迷佛教，建康一地佛寺七百余座，僧尼成千上万，耗费民财。</text>
  <text x="400" y="522" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">几百年后杜牧站在江南，看着烟雨中的古寺，借南朝旧事提醒当朝：</text>
  <text x="400" y="546" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a">"四百八十"是虚指，形容寺庙多得数不清——历史，是一面镜子。</text>
</svg>
