<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="人类探索星空历程的连珠故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#4a5a6a">连珠小故事：人类一步一步认识银河</text>
  <line x1="170" y1="55" x2="630" y2="55" stroke="#e8a838" stroke-width="1.5"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#7a7468">从神话想象，到伽利略的望远镜，再到宇宙膨胀</text>

  <!-- 夜空背景 -->
  <rect x="0" y="100" width="800" height="280" fill="#1a2a4a" opacity="0.15"/>
  <!-- 银河带（贯穿背景） -->
  <path d="M0 200 Q400 260 800 200" fill="none" stroke="#fef9ed" stroke-width="40" opacity="0.12" stroke-linecap="round"/>

  <!-- 第一格：古人的想象（天上的河） -->
  <g transform="translate(150 280)">
    <rect x="-95" y="-80" width="190" height="180" fill="#fff6df" stroke="#e8a838" stroke-width="1.5" rx="8"/>
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#8a5a14">古人·天河想象</text>
    <!-- 银河（波浪） -->
    <path d="M-60 -20 Q-40 -30 -20 -20 Q0 -10 20 -20 Q40 -30 60 -20" fill="none" stroke="#4a90b8" stroke-width="6" opacity="0.5"/>
    <!-- 牛郎织女隔河 -->
    <circle cx="-45" cy="-20" r="5" fill="#e07856"/>
    <circle cx="45" cy="-20" r="5" fill="#4a90b8"/>
    <text x="-45" y="-8" text-anchor="middle" font-family="serif" font-size="9" fill="#8a5a14">牛郎</text>
    <text x="45" y="-8" text-anchor="middle" font-family="serif" font-size="9" fill="#8a5a14">织女</text>
    <!-- 神话人物仰望 -->
    <g transform="translate(0 50)">
      <path d="M-10 20 Q-12 5 -6 -2 Q0 -6 6 -2 Q12 5 10 20 Z" fill="#2d6a4f"/>
      <circle cx="0" cy="-10" r="8" fill="#f4d4a8"/>
    </g>
    <text x="0" y="90" text-anchor="middle" font-family="serif" font-size="11" fill="#7a7468">用眼睛看，靠想象</text>
  </g>

  <!-- 箭头 -->
  <path d="M250 280 L300 280" stroke="#c8943a" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- 第二格：伽利略望远镜 -->
  <g transform="translate(400 280)">
    <rect x="-95" y="-80" width="190" height="180" fill="#fff6df" stroke="#e07856" stroke-width="1.5" rx="8"/>
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#8a5a14">伽利略·看见星星</text>
    <!-- 望远镜 -->
    <g transform="translate(-20 -10) rotate(-25)">
      <rect x="-8" y="-3" width="50" height="8" fill="#8a6a3a" stroke="#5a4a2a" stroke-width="1.5"/>
      <rect x="-12" y="-5" width="10" height="12" fill="#5a4a2a"/>
      <rect x="38" y="-4" width="10" height="10" fill="#e8a838" stroke="#8a5a14" stroke-width="1"/>
    </g>
    <!-- 望远镜里看见的密星 -->
    <g fill="#fef9ed">
      <circle cx="50" cy="-30" r="1.5"/>
      <circle cx="55" cy="-25" r="1"/>
      <circle cx="48" cy="-22" r="1.2"/>
      <circle cx="58" cy="-35" r="1"/>
      <circle cx="52" cy="-18" r="1.5"/>
      <circle cx="62" cy="-28" r="1"/>
      <circle cx="46" cy="-32" r="1"/>
    </g>
    <circle cx="53" cy="-27" r="22" fill="none" stroke="#e8a838" stroke-width="1" opacity="0.5"/>
    <!-- 伽利略 -->
    <g transform="translate(-30 50)">
      <path d="M-10 20 Q-12 5 -6 -2 Q0 -6 6 -2 Q12 5 10 20 Z" fill="#4a5a6a"/>
      <circle cx="0" cy="-10" r="8" fill="#f4d4a8"/>
      <path d="M-8 -14 Q0 -22 8 -14" fill="#3a3a3a"/>
    </g>
    <text x="0" y="90" text-anchor="middle" font-family="serif" font-size="11" fill="#7a7468">1610年，银河是星</text>
  </g>

  <!-- 箭头 -->
  <path d="M500 280 L550 280" stroke="#c8943a" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- 第三格：哈勃发现宇宙膨胀 -->
  <g transform="translate(650 280)">
    <rect x="-95" y="-80" width="190" height="180" fill="#fff6df" stroke="#2d6a4f" stroke-width="1.5" rx="8"/>
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#8a5a14">哈勃·宇宙膨胀</text>
    <!-- 多个星系（旋涡） -->
    <g transform="translate(0 -15)">
      <ellipse cx="0" cy="0" rx="22" ry="8" fill="none" stroke="#4a90b8" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="12" ry="4" fill="none" stroke="#e8a838" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="3" fill="#e07856"/>
    </g>
    <!-- 远离的箭头 -->
    <g stroke="#e07856" stroke-width="1.5" fill="none">
      <path d="M-30 -15 L-50 -25" marker-end="url(#arr2)"/>
      <path d="M30 -15 L50 -25" marker-end="url(#arr2)"/>
      <path d="M0 -25 L0 -45" marker-end="url(#arr2)"/>
      <path d="M-25 0 L-45 5" marker-end="url(#arr2)"/>
      <path d="M25 0 L45 5" marker-end="url(#arr2)"/>
    </g>
    <!-- 哈勃 -->
    <g transform="translate(0 50)">
      <path d="M-10 20 Q-12 5 -6 -2 Q0 -6 6 -2 Q12 5 10 20 Z" fill="#2d6a4f"/>
      <circle cx="0" cy="-10" r="8" fill="#f4d4a8"/>
      <path d="M-8 -14 Q0 -22 8 -14" fill="#3a3a3a"/>
    </g>
    <text x="0" y="90" text-anchor="middle" font-family="serif" font-size="11" fill="#7a7468">20世纪，星系在远去</text>
  </g>

  <!-- 底部：望远镜发展 -->
  <g transform="translate(400 470)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a14">每一次认识，都靠工具的进步和好奇心推动</text>
    <!-- 小望远镜图标排列 -->
    <g transform="translate(-120 20)">
      <circle cx="0" cy="0" r="6" fill="none" stroke="#8a6a3a" stroke-width="1.5"/>
      <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">肉眼</text>
    </g>
    <g transform="translate(-40 20)">
      <rect x="-3" y="-6" width="14" height="4" fill="#8a6a3a"/>
      <text x="4" y="22" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">望远镜</text>
    </g>
    <g transform="translate(40 20)">
      <rect x="-8" y="-6" width="16" height="12" fill="#4a5a6a"/>
      <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">射电</text>
    </g>
    <g transform="translate(120 20)">
      <circle cx="0" cy="0" r="8" fill="#4a90b8" opacity="0.5"/>
      <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">太空望远镜</text>
    </g>
    <line x1="-110" y1="20" x2="-50" y2="20" stroke="#c8943a" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="-25" y1="20" x2="30" y2="20" stroke="#c8943a" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="55" y1="20" x2="110" y2="20" stroke="#c8943a" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- 底部说明 -->
  <rect x="60" y="545" width="680" height="40" fill="#fff6df" stroke="#e8a838" stroke-width="1" rx="6" opacity="0.85"/>
  <text x="400" y="568" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a14">科学是一步一步走出来的，好奇心是永不停歇的引擎</text>

  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#e07856"/>
    </marker>
  </defs>
</svg>
