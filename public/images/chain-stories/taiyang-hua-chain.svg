<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="太阳花向光性与昼夜节律的科学插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：太阳花为什么追着太阳转</text>
  <line x1="120" y1="55" x2="680" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左：昼开 -->
  <g transform="translate(180 230)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#e8a838">白天：开花</text>
    <text x="0" y="-42" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">细胞吸水膨胀撑开花瓣</text>
    <!-- 太阳 -->
    <circle cx="-40" cy="-10" r="16" fill="#e8a838"/>
    <g stroke="#e8a838" stroke-width="1.5" opacity="0.5">
      <line x1="-40" y1="-30" x2="-40" y2="-36"/>
      <line x1="-58" y1="-10" x2="-64" y2="-10"/>
    </g>
    <!-- 开放的花 -->
    <g transform="translate(10 10)">
      <g fill="#e07856">
        <ellipse cx="0" cy="-14" rx="7" ry="12"/>
        <ellipse cx="0" cy="14" rx="7" ry="12"/>
        <ellipse cx="-14" cy="0" rx="12" ry="7"/>
        <ellipse cx="14" cy="0" rx="12" ry="7"/>
      </g>
      <circle cx="0" cy="0" r="8" fill="#e8a838"/>
    </g>
    <!-- 光线 -->
    <g stroke="#e8a838" stroke-width="1" opacity="0.5" stroke-dasharray="3 3">
      <line x1="-30" y1="-6" x2="0" y2="4"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">吸引昆虫传粉</text>
  </g>

  <!-- 中：夜合 -->
  <g transform="translate(400 230)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#4a6a8a">夜晚：合拢</text>
    <text x="0" y="-42" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">细胞失水，花瓣合上</text>
    <!-- 月亮 -->
    <path d="M-40 -10 A16 16 0 1 0 -40 16 A12 16 0 1 1 -40 -10 Z" fill="#fef9ed" stroke="#8a8a8a" stroke-width="1"/>
    <!-- 合拢的花(小卷) -->
    <g transform="translate(10 10)">
      <ellipse cx="0" cy="0" rx="6" ry="10" fill="#e07856" opacity="0.7"/>
      <ellipse cx="0" cy="0" rx="3" ry="6" fill="#c06540" opacity="0.7"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">保护花粉不被露水打湿</text>
  </g>

  <!-- 右：扦插好养活 -->
  <g transform="translate(620 230)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#2d6a4f">扦插：死不了</text>
    <text x="0" y="-42" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">掐一段茎插土就活</text>
    <!-- 茎段 -->
    <g transform="translate(-10 -10)">
      <rect x="-3" y="-20" width="6" height="40" rx="3" fill="#3d8a5f"/>
      <ellipse cx="0" cy="-20" rx="5" ry="3" fill="#2d6a4f"/>
    </g>
    <!-- 土 -->
    <ellipse cx="-10" cy="14" rx="24" ry="6" fill="#5a3a1a" opacity="0.6"/>
    <rect x="-30" y="14" width="40" height="16" fill="#8d6f47" opacity="0.4" rx="2"/>
    <!-- 新芽 -->
    <g transform="translate(10 -8)">
      <path d="M0 0 Q4 -10 8 -16" stroke="#2d6a4f" stroke-width="2" fill="none"/>
      <ellipse cx="8" cy="-16" rx="4" ry="6" fill="#3d8a5f"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">不挑土不怕晒</text>
  </g>

  <!-- 生长素对比(向日葵原理) -->
  <g transform="translate(400 380)">
    <text x="0" y="-10" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">向日葵追太阳的秘密：生长素"怕光"</text>
    <!-- 茎横切 -->
    <rect x="-60" y="0" width="120" height="20" rx="4" fill="#3d8a5f" stroke="#2d6a4f" stroke-width="1.5"/>
    <!-- 太阳光从右 -->
    <g stroke="#e8a838" stroke-width="1.5" opacity="0.7">
      <line x1="80" y1="-10" x2="62" y2="2"/>
      <line x1="80" y1="10" x2="62" y2="10"/>
      <line x1="80" y1="30" x2="62" y2="18"/>
    </g>
    <text x="84" y="14" font-family="serif" font-size="10" fill="#e8a838">太阳</text>
    <!-- 生长素多在左(背光) -->
    <g fill="#e07856">
      <circle cx="-44" cy="10" r="3"/>
      <circle cx="-34" cy="10" r="3"/>
      <circle cx="-24" cy="10" r="3"/>
    </g>
    <text x="-34" y="36" text-anchor="middle" font-family="serif" font-size="9" fill="#e07856">背光侧长得快</text>
    <!-- 弯曲箭头 -->
    <path d="M0 -10 Q-30 -20 -50 -8" stroke="#c84a3a" stroke-width="2" fill="none" marker-end="url(#ar4)"/>
    <defs>
      <marker id="ar4" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
        <path d="M0 0 L8 4 L0 8 Z" fill="#c84a3a"/>
      </marker>
    </defs>
    <text x="-50" y="-20" text-anchor="middle" font-family="serif" font-size="9" fill="#c84a3a">弯向太阳</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="490" width="700" height="85" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6" opacity="0.85"/>
  <text x="400" y="518" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">太阳花白天开、晚上合，是花瓣细胞吸水放水在"开门关门"。</text>
  <text x="400" y="542" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">植物追光，是因为光就是它们的"饭"——光越多，养分越多，长得越壮。</text>
  <text x="400" y="566" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a">给点阳光就灿烂，是太阳花最了不起的本事。</text>
</svg>
