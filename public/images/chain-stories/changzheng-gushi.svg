<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="飞夺泸定桥、过雪山草地等长征故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a3b14" font-family="serif">连珠小故事：长征路上的故事</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- ===== 左侧：飞夺泸定桥 ===== -->
  <!-- 河岸 -->
  <rect x="0" y="280" width="350" height="20" fill="#8a7a60" opacity="0.5"/>
  <rect x="0" y="380" width="350" height="20" fill="#8a7a60" opacity="0.5"/>
  <!-- 河水 -->
  <rect x="0" y="300" width="350" height="80" fill="#4a7aaa" opacity="0.3"/>
  <path d="M0 320 Q80 315 160 320 Q240 315 350 320" fill="none" stroke="#6aaaca" stroke-width="1" opacity="0.5"/>
  <path d="M0 350 Q80 345 160 350 Q240 345 350 350" fill="none" stroke="#6aaaca" stroke-width="1" opacity="0.5"/>

  <!-- 铁索桥 -->
  <line x1="0" y1="285" x2="350" y2="285" stroke="#5a5a5a" stroke-width="2"/>
  <line x1="0" y1="290" x2="350" y2="290" stroke="#5a5a5a" stroke-width="2"/>
  <line x1="0" y1="295" x2="350" y2="295" stroke="#5a5a5a" stroke-width="2"/>
  <!-- 铁索垂链 -->
  <line x1="50" y1="285" x2="50" y2="300" stroke="#5a5a5a" stroke-width="1"/>
  <line x1="100" y1="285" x2="100" y2="300" stroke="#5a5a5a" stroke-width="1"/>
  <line x1="150" y1="285" x2="150" y2="300" stroke="#5a5a5a" stroke-width="1"/>
  <line x1="200" y1="285" x2="200" y2="300" stroke="#5a5a5a" stroke-width="1"/>
  <line x1="250" y1="285" x2="250" y2="300" stroke="#5a5a5a" stroke-width="1"/>
  <line x1="300" y1="285" x2="300" y2="300" stroke="#5a5a5a" stroke-width="1"/>

  <!-- 攀爬的红军战士 -->
  <g transform="translate(120, 280)">
    <path d="M -5 5 Q -6 -3 -4 -8 Q 0 -10 4 -8 Q 6 -3 5 5" fill="#8a3a2a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="0" cy="-12" r="5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    <path d="M0 -17 L1.5 -14 L4 -14 L2.5 -12 L3 -10 L0 -11 L-3 -10 L-2.5 -12 L-4 -14 L-1.5 -14 Z" fill="#c84030"/>
    <!-- 手抓铁索 -->
    <path d="M 5 -2 Q 10 -3 14 -3" fill="none" stroke="#8a3a2a" stroke-width="3"/>
  </g>
  <g transform="translate(180, 282)">
    <path d="M -4 4 Q -5 -2 -3 -7 Q 0 -9 3 -7 Q 5 -2 4 4" fill="#8a3a2a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="0" cy="-10" r="4.5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    <path d="M0 -15 L1.5 -12 L3.5 -12 L2 -10 L2.5 -8 L0 -9 L-2.5 -8 L-2 -10 L-3.5 -12 L-1.5 -12 Z" fill="#c84030"/>
    <path d="M 4 -1 Q 9 -2 12 -2" fill="none" stroke="#8a3a2a" stroke-width="3"/>
  </g>

  <!-- 对岸敌军碉堡 -->
  <g transform="translate(330, 270)">
    <rect x="-15" y="0" width="20" height="20" fill="#6a6a5a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-10" y="5" width="5" height="5" fill="#3a3a3a"/>
    <!-- 枪火 -->
    <path d="M 5 8 L 15 5 L 12 10" fill="#f0a020" opacity="0.6"/>
  </g>

  <!-- 左侧标签 -->
  <rect x="90" y="100" width="140" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="160" y="118" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">飞夺泸定桥</text>
  <line x1="160" y1="126" x2="160" y2="270" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ===== 右侧：过雪山草地 ===== -->
  <!-- 雪山 -->
  <path d="M400 280 L480 150 L520 200 L580 130 L640 200 L700 160 L750 220 L750 280 Z" fill="#e8e8f0" stroke="#b8c8d8" stroke-width="2" opacity="0.8"/>
  <!-- 雪线 -->
  <path d="M400 280 L480 150 L500 180 L520 200 L540 170 L580 130 L600 170 L640 200 L660 175 L700 160 L720 190 L750 220" fill="none" stroke="#c8d8e8" stroke-width="1.5"/>

  <!-- 草地（沼泽） -->
  <rect x="400" y="280" width="350" height="120" fill="#7a8a4a" opacity="0.3"/>
  <!-- 水洼 -->
  <ellipse cx="500" cy="350" rx="20" ry="8" fill="#5a7a8a" opacity="0.4"/>
  <ellipse cx="620" cy="370" rx="25" ry="10" fill="#5a7a8a" opacity="0.4"/>
  <ellipse cx="680" cy="340" rx="15" ry="6" fill="#5a7a8a" opacity="0.4"/>

  <!-- 草地上的红军 -->
  <g transform="translate(450, 340)">
    <path d="M -4 12 Q -5 3 -3 -2 Q 0 -4 3 -2 Q 5 3 4 12" fill="#8a3a2a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="0" cy="-6" r="5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    <path d="M0 -11 L1.5 -8 L4 -8 L2.5 -6 L3 -4 L0 -5 L-3 -4 L-2.5 -6 L-4 -8 L-1.5 -8 Z" fill="#c84030"/>
    <!-- 拄棍 -->
    <line x1="5" y1="5" x2="10" y2="15" stroke="#8a6a3a" stroke-width="2"/>
  </g>
  <g transform="translate(560, 360)">
    <path d="M -4 10 Q -5 2 -3 -2 Q 0 -3 3 -2 Q 5 2 4 10" fill="#8a3a2a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="0" cy="-5" r="4.5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    <path d="M0 -10 L1.5 -7 L3.5 -7 L2 -5 L2.5 -3 L0 -4 L-2.5 -3 L-2 -5 L-3.5 -7 L-1.5 -7 Z" fill="#c84030"/>
    <line x1="-4" y1="3" x2="-8" y2="13" stroke="#8a6a3a" stroke-width="2"/>
  </g>
  <g transform="translate(660, 350)">
    <path d="M -4 10 Q -5 2 -3 -2 Q 0 -3 3 -2 Q 5 2 4 10" fill="#8a3a2a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="0" cy="-5" r="4.5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    <path d="M0 -10 L1.5 -7 L3.5 -7 L2 -5 L2.5 -3 L0 -4 L-2.5 -3 L-2 -5 L-3.5 -7 L-1.5 -7 Z" fill="#c84030"/>
  </g>

  <!-- 雪花 -->
  <g opacity="0.6">
    <line x1="460" y1="200" x2="466" y2="200" stroke="#c8d8e8" stroke-width="1"/>
    <line x1="463" y1="197" x2="463" y2="203" stroke="#c8d8e8" stroke-width="1"/>
    <line x1="540" y1="220" x2="546" y2="220" stroke="#c8d8e8" stroke-width="1"/>
    <line x1="543" y1="217" x2="543" y2="223" stroke="#c8d8e8" stroke-width="1"/>
    <line x1="620" y1="190" x2="626" y2="190" stroke="#c8d8e8" stroke-width="1"/>
    <line x1="623" y1="187" x2="623" y2="193" stroke="#c8d8e8" stroke-width="1"/>
  </g>

  <!-- 右侧标签 -->
  <rect x="520" y="100" width="140" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="590" y="118" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">过雪山草地</text>
  <line x1="590" y1="126" x2="590" y2="145" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 底部：长征精神 -->
  <g transform="translate(400, 470)">
    <!-- 五角星 -->
    <path d="M0 -25 L7 -8 L25 -8 L11 3 L16 20 L0 10 L-16 20 L-11 3 L-25 -8 L-7 -8 Z" fill="#c84030" stroke="#7a3b14" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#fef9ed" font-family="serif">长征</text>
  </g>

  <!-- 标注 -->
  <line x1="400" y1="445" x2="400" y2="420" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="335" y="398" width="130" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="416" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">长征精神</text>

  <!-- 底部说明 -->
  <rect x="50" y="545" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="570" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">飞夺泸定桥的英勇、过雪山草地的坚韧——长征路上的故事，铸就了不朽的长征精神。</text>
</svg>
