<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="抗日战争少年英雄插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#5a3a1a">抗日战争中的少年英雄</text>
  <line x1="220" y1="56" x2="580" y2="56" stroke="#c9952e" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8a6a3a">——英雄不分年龄，爱国不分大小</text>

  <!-- 天空 -->
  <rect x="0" y="90" width="800" height="200" fill="#c4dae8"/>

  <!-- 远山 -->
  <path d="M0 290 L120 220 L240 290 Z" fill="#8a9a88" opacity="0.5"/>
  <path d="M200 290 L380 210 L560 290 Z" fill="#7a8a78" opacity="0.5"/>
  <path d="M500 290 L640 230 L800 290 Z" fill="#8a9a88" opacity="0.5"/>

  <!-- 地面 -->
  <rect x="0" y="290" width="800" height="310" fill="#a8c870" stroke="#7a9a4a" stroke-width="2"/>

  <!-- 三个少年英雄并排展示 -->

  <!-- 1. 雨来（左边） -->
  <g transform="translate(160, 380)">
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#5a3a1a">雨来</text>
    <text x="0" y="-82" text-anchor="middle" font-family="serif" font-size="11" fill="#7a5a2a">（保护交通员）</text>
    <!-- 头 -->
    <circle cx="0" cy="-50" r="20" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2.5"/>
    <!-- 头发 -->
    <path d="M-18 -58 Q-10 -72 0 -68 Q10 -72 18 -58" fill="#3a2a1a" stroke="#1a0a00" stroke-width="1.5"/>
    <!-- 眼睛（坚定） -->
    <circle cx="-7" cy="-50" r="2.5" fill="#1a1a1a"/>
    <circle cx="7" cy="-50" r="2.5" fill="#1a1a1a"/>
    <!-- 嘴 -->
    <line x1="-4" y1="-40" x2="4" y2="-40" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 身体（布衣） -->
    <path d="M-18 -30 L-25 40 L25 40 L18 -30 Z" fill="#6a8a4a" stroke="#3a5a2a" stroke-width="2.5"/>
    <!-- 腰带 -->
    <rect x="-22" y="0" width="44" height="8" fill="#8a6a3a"/>
    <!-- 手臂（握拳） -->
    <path d="M-18 -20 L-30 10" stroke="#6a8a4a" stroke-width="10" stroke-linecap="round"/>
    <path d="M18 -20 L30 10" stroke="#6a8a4a" stroke-width="10" stroke-linecap="round"/>
    <circle cx="-32" cy="12" r="7" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <circle cx="32" cy="12" r="7" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 红缨枪 -->
    <line x1="32" y1="12" x2="50" y2="-40" stroke="#8b6332" stroke-width="3"/>
    <path d="M47 -40 L53 -50 L50 -35 Z" fill="#c4c4c4" stroke="#5a5a5a" stroke-width="1.5"/>
    <!-- 红缨 -->
    <path d="M50 -38 L45 -30 M50 -38 L55 -30 M50 -38 L50 -28" stroke="#c44a3a" stroke-width="2"/>
  </g>

  <!-- 2. 王二小（中间） -->
  <g transform="translate(400, 380)">
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#5a3a1a">王二小</text>
    <text x="0" y="-82" text-anchor="middle" font-family="serif" font-size="11" fill="#7a5a2a">（引敌入埋伏）</text>
    <!-- 头 -->
    <circle cx="0" cy="-50" r="20" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2.5"/>
    <!-- 头发 -->
    <path d="M-18 -58 Q-10 -72 0 -68 Q10 -72 18 -58" fill="#3a2a1a" stroke="#1a0a00" stroke-width="1.5"/>
    <!-- 眼睛 -->
    <circle cx="-7" cy="-50" r="2.5" fill="#1a1a1a"/>
    <circle cx="7" cy="-50" r="2.5" fill="#1a1a1a"/>
    <!-- 嘴 -->
    <path d="M-4 -40 Q0 -37 4 -40" fill="none" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 身体 -->
    <path d="M-18 -30 L-25 40 L25 40 L18 -30 Z" fill="#8a7a4a" stroke="#4a3a1a" stroke-width="2.5"/>
    <!-- 腰带 -->
    <rect x="-22" y="0" width="44" height="8" fill="#5a4a2a"/>
    <!-- 手臂（放牛鞭） -->
    <path d="M-18 -20 L-35 5" stroke="#8a7a4a" stroke-width="10" stroke-linecap="round"/>
    <path d="M18 -20 L30 15" stroke="#8a7a4a" stroke-width="10" stroke-linecap="round"/>
    <circle cx="-37" cy="7" r="7" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <circle cx="32" cy="17" r="7" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 牛鞭 -->
    <line x1="-37" y1="7" x2="-60" y2="30" stroke="#8b6332" stroke-width="2.5"/>
    <path d="M-60 30 Q-65 35 -62 40" fill="none" stroke="#8b6332" stroke-width="2"/>
    <!-- 牛（旁边，简化） -->
    <g transform="translate(-65, 55)">
      <ellipse cx="0" cy="0" rx="18" ry="10" fill="#8a6a4a" stroke="#4a2a1a" stroke-width="1.5"/>
      <circle cx="-15" cy="-2" r="8" fill="#8a6a4a" stroke="#4a2a1a" stroke-width="1.5"/>
      <path d="M-20 -8 L-22 -12 M-18 -8 L-16 -12" stroke="#4a2a1a" stroke-width="1.5"/>
      <circle cx="-17" cy="-3" r="1.5" fill="#1a1a1a"/>
    </g>
  </g>

  <!-- 3. 小兵张嘎（右边） -->
  <g transform="translate(640, 380)">
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#5a3a1a">张嘎</text>
    <text x="0" y="-82" text-anchor="middle" font-family="serif" font-size="11" fill="#7a5a2a">（缴获武器）</text>
    <!-- 头 -->
    <circle cx="0" cy="-50" r="20" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2.5"/>
    <!-- 头发 -->
    <path d="M-18 -58 Q-10 -72 0 -68 Q10 -72 18 -58" fill="#3a2a1a" stroke="#1a0a00" stroke-width="1.5"/>
    <!-- 八路军帽 -->
    <path d="M-18 -58 Q0 -72 18 -58 L16 -52 L-16 -52 Z" fill="#5a6a4a" stroke="#3a4a2a" stroke-width="1.5"/>
    <!-- 帽徽 -->
    <circle cx="0" cy="-58" r="3" fill="#c44a3a"/>
    <!-- 眼睛（机灵） -->
    <circle cx="-7" cy="-48" r="2.5" fill="#1a1a1a"/>
    <circle cx="7" cy="-48" r="2.5" fill="#1a1a1a"/>
    <!-- 嘴（笑） -->
    <path d="M-5 -38 Q0 -33 5 -38" fill="none" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 身体（八路军灰军装） -->
    <path d="M-18 -30 L-25 40 L25 40 L18 -30 Z" fill="#7a7a6a" stroke="#4a4a3a" stroke-width="2.5"/>
    <!-- 腰带 -->
    <rect x="-22" y="0" width="44" height="8" fill="#4a4a3a"/>
    <!-- 手臂（拿枪） -->
    <path d="M18 -20 L35 -5" stroke="#7a7a6a" stroke-width="10" stroke-linecap="round"/>
    <circle cx="37" cy="-3" r="7" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 缴获的枪 -->
    <line x1="37" y1="-3" x2="60" y2="-25" stroke="#5a5a4a" stroke-width="3.5"/>
    <rect x="33" y="-7" width="8" height="5" fill="#3a3a2a" stroke="#1a1a0a" stroke-width="1"/>
    <!-- 左手 -->
    <path d="M-18 -20 L-30 10" stroke="#7a7a6a" stroke-width="10" stroke-linecap="round"/>
    <circle cx="-32" cy="12" r="7" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 木枪（腰间别着） -->
    <line x1="-15" y1="5" x2="-35" y2="20" stroke="#8b6332" stroke-width="3"/>
  </g>

  <!-- 底部：共同精神 -->
  <g transform="translate(400, 510)">
    <rect x="-280" y="0" width="560" height="70" rx="10" fill="#fffdf7" stroke="#c44a3a" stroke-width="2" opacity="0.9"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="15" fill="#c44a3a" font-weight="bold">共同的品质：勇敢 · 机智 · 爱国</text>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="13" fill="#5a3a1a">他们没有枪炮，只有勇气和智慧，用自己擅长的方式为抗战出力</text>
  </g>

  <!-- 儿童团标注（左上） -->
  <g transform="translate(120, 140)">
    <rect x="-50" y="0" width="100" height="50" rx="6" fill="#fffdf7" stroke="#c9952e" stroke-width="1.5" opacity="0.85"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="13" fill="#5a3a1a" font-weight="bold">儿童团</text>
    <text x="0" y="38" text-anchor="middle" font-family="serif" font-size="11" fill="#7a5a2a">站岗·放哨·送信</text>
  </g>

  <!-- 红缨枪（右上角装饰） -->
  <g transform="translate(680, 140)">
    <rect x="-50" y="0" width="100" height="50" rx="6" fill="#fffdf7" stroke="#c9952e" stroke-width="1.5" opacity="0.85"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="13" fill="#5a3a1a" font-weight="bold">1937-1945</text>
    <text x="0" y="38" text-anchor="middle" font-family="serif" font-size="11" fill="#7a5a2a">抗日战争时期</text>
  </g>
</svg>
