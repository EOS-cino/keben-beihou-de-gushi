<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="五行相生相克圆环插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">五行学说的由来</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">木生火，火生土，土生金，金生水，水生木</text>

  <!-- 相生圆环（顺时针箭头） -->
  <circle cx="400" cy="340" r="150" fill="none" stroke="#6a8d3f" stroke-width="2" opacity="0.4"/>

  <!-- 五个节点：木(上) 火(右) 土(下) 金(左) 水(左上偏) 按相生顺序排列 -->
  <!-- 木 顶部 -->
  <g transform="translate(400,190)">
    <circle r="42" fill="#6a8d3f" opacity="0.85"/>
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#fef9ed">木</text>
  </g>
  <!-- 火 右 -->
  <g transform="translate(540,300)">
    <circle r="42" fill="#c84a3a" opacity="0.85"/>
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#fef9ed">火</text>
  </g>
  <!-- 土 右下 -->
  <g transform="translate(490,460)">
    <circle r="42" fill="#8d5a36" opacity="0.85"/>
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#fef9ed">土</text>
  </g>
  <!-- 金 左下 -->
  <g transform="translate(310,460)">
    <circle r="42" fill="#c8843a" opacity="0.85"/>
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#fef9ed">金</text>
  </g>
  <!-- 水 左 -->
  <g transform="translate(260,300)">
    <circle r="42" fill="#4a8ab8" opacity="0.85"/>
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#fef9ed">水</text>
  </g>

  <!-- 相生箭头（绿色弧线） -->
  <g fill="none" stroke="#6a8d3f" stroke-width="2.5" opacity="0.7">
    <!-- 木生火 -->
    <path d="M435 210 Q490 230 520 270" marker-end="url(#arrowGreen)"/>
    <!-- 火生土 -->
    <path d="M545 340 Q545 400 510 430" marker-end="url(#arrowGreen)"/>
    <!-- 土生金 -->
    <path d="M448 470 Q400 475 352 470" marker-end="url(#arrowGreen)"/>
    <!-- 金生水 -->
    <path d="M295 430 Q260 400 260 340" marker-end="url(#arrowGreen)"/>
    <!-- 水生木 -->
    <path d="M285 270 Q310 230 365 210" marker-end="url(#arrowGreen)"/>
  </g>

  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#6a8d3f"/>
    </marker>
  </defs>

  <!-- 相克连线（红色虚线，五角星形） -->
  <g fill="none" stroke="#c84a3a" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5">
    <line x1="400" y1="190" x2="490" y2="460"/>
    <line x1="540" y1="300" x2="310" y2="460"/>
    <line x1="490" y1="460" x2="260" y2="300"/>
    <line x1="310" y1="460" x2="540" y2="300"/>
    <line x1="260" y1="300" x2="400" y2="190"/>
  </g>

  <!-- 中心说明 -->
  <circle cx="400" cy="340" r="38" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5"/>
  <text x="400" y="335" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14" font-weight="bold">相生</text>
  <text x="400" y="352" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a" font-weight="bold">相克</text>

  <!-- 图例 -->
  <g transform="translate(80,520)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#6a8d3f" stroke-width="2.5"/>
    <text x="38" y="5" font-family="serif" font-size="13" fill="#7a3b14">相生：互相帮助</text>
    <line x1="200" y1="0" x2="230" y2="0" stroke="#c84a3a" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="238" y="5" font-family="serif" font-size="13" fill="#7a3b14">相克：互相制约</text>
  </g>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">传说大禹治水后，上天赐"洪范九畴"，其中第一条就是五行</text>
</svg>
