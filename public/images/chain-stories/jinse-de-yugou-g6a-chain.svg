<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠故事 - 长征中的感人故事">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 连珠标识徽章 -->
  <g transform="translate(60,42)">
    <rect x="-44" y="-22" width="88" height="44" rx="22" fill="#3a7d5c"/>
    <circle cx="-26" cy="0" r="5" fill="#fef9ed"/><circle cx="-10" cy="0" r="5" fill="#fef9ed"/><circle cx="6" cy="0" r="5" fill="#fef9ed"/><circle cx="22" cy="0" r="5" fill="#fef9ed"/>
    <text x="40" y="5" font-family="serif" font-size="16" font-weight="bold" fill="#fef9ed">连珠</text>
  </g>
  <text x="460" y="48" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#3a7d5c">长征中的感人故事</text>
  <line x1="360" y1="64" x2="560" y2="64" stroke="#3a7d5c" stroke-width="2"/>

  <!-- 雪山草地背景 -->
  <path d="M0 120 Q150 80 300 110 Q450 75 600 105 Q700 95 800 115 L800 514 L0 514 Z" fill="#3a7d5c" opacity="0.08"/>
  <!-- 雪山 -->
  <path d="M0 200 L120 130 L200 200 Z" fill="#7a7468" opacity="0.15"/>
  <path d="M100 200 L240 110 L380 200 Z" fill="#7a7468" opacity="0.18"/>
  <path d="M320 200 L460 120 L600 200 Z" fill="#7a7468" opacity="0.15"/>
  <path d="M540 200 L660 135 L780 200 Z" fill="#7a7468" opacity="0.15"/>
  <!-- 雪顶 -->
  <path d="M210 130 L240 110 L270 135 L255 140 L245 130 L230 140 Z" fill="#fef9ed" opacity="0.7"/>

  <!-- 中央五角星 -->
  <g transform="translate(400,300)">
    <circle cx="0" cy="0" r="55" fill="#c05a30" opacity="0.08"/>
    <path d="M0 -30 L8 -10 L30 -10 L12 4 L18 24 L0 12 L-18 24 L-12 4 L-30 -10 L-8 -10 Z" fill="#c05a30"/>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#c05a30">长征精神</text>
  </g>

  <!-- 故事1：丰碑-军需处长（左上） -->
  <g transform="translate(150,180)">
    <rect x="-90" y="-50" width="180" height="100" rx="8" fill="#fff" stroke="#c05a30" stroke-width="2"/>
    <g transform="translate(-55,0)">
      <!-- 雪中战士形象 -->
      <rect x="-4" y="-15" width="8" height="22" rx="2" fill="#3a7d5c" opacity="0.8"/>
      <circle cx="0" cy="-22" r="6" fill="#c05a30" opacity="0.8"/>
      <!-- 雪堆 -->
      <ellipse cx="0" cy="10" rx="14" ry="5" fill="#fef9ed" stroke="#7a7468" stroke-width="0.5"/>
      <!-- 雪花 -->
      <circle cx="-10" cy="-18" r="1" fill="#fef9ed"/>
      <circle cx="10" cy="-12" r="1" fill="#fef9ed"/>
    </g>
    <text x="20" y="-20" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">丰碑</text>
    <text x="20" y="0" font-family="serif" font-size="12" fill="#7a7468">军需处长</text>
    <text x="20" y="18" font-family="serif" font-size="12" fill="#7a7468">冻死雪山</text>
    <text x="20" y="36" font-family="serif" font-size="12" fill="#7a7468">化作丰碑</text>
    <path d="M90 0 Q150 30 240 90" stroke="#c05a30" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.5"/>
  </g>

  <!-- 故事2：七根火柴（右上） -->
  <g transform="translate(650,180)">
    <rect x="-90" y="-50" width="180" height="100" rx="8" fill="#fff" stroke="#7a3b14" stroke-width="2"/>
    <g transform="translate(-55,0)">
      <!-- 火柴 -->
      <rect x="-2" y="-15" width="3" height="20" fill="#7a3b14"/>
      <rect x="4" y="-12" width="3" height="17" fill="#7a3b14"/>
      <rect x="10" y="-15" width="3" height="20" fill="#7a3b14"/>
      <circle cx="-0.5" cy="-16" r="3" fill="#c05a30"/>
      <circle cx="5.5" cy="-13" r="3" fill="#c05a30"/>
      <circle cx="11.5" cy="-16" r="3" fill="#c05a30"/>
      <!-- 党证 -->
      <rect x="-16" y="8" width="22" height="14" rx="1" fill="#c05a30" opacity="0.4"/>
      <text x="-5" y="18" text-anchor="middle" font-family="serif" font-size="8" fill="#fef9ed">党证</text>
    </g>
    <text x="-20" y="-20" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">七根火柴</text>
    <text x="-20" y="0" font-family="serif" font-size="12" fill="#7a7468">珍藏火种</text>
    <text x="-20" y="18" font-family="serif" font-size="12" fill="#7a7468">临终托付</text>
    <text x="-20" y="36" font-family="serif" font-size="12" fill="#7a7468">星火燎原</text>
    <path d="M-90 0 Q-150 30 -240 90" stroke="#7a3b14" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.5"/>
  </g>

  <!-- 故事3：半截皮带（左下） -->
  <g transform="translate(150,440)">
    <rect x="-90" y="-50" width="180" height="100" rx="8" fill="#fff" stroke="#c05a30" stroke-width="2"/>
    <g transform="translate(-55,0)">
      <!-- 皮带 -->
      <rect x="-18" y="-4" width="30" height="8" rx="2" fill="#7a3b14"/>
      <rect x="-18" y="-4" width="8" height="8" rx="2" fill="#c05a30"/>
      <circle cx="-14" cy="0" r="1.5" fill="#fef9ed"/>
      <!-- 断口 -->
      <path d="M12 -4 L14 4 M10 -4 L12 4" stroke="#7a3b14" stroke-width="1"/>
      <!-- 节约 -->
      <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="9" fill="#7a7468">充饥</text>
    </g>
    <text x="20" y="-20" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">半截皮带</text>
    <text x="20" y="0" font-family="serif" font-size="12" fill="#7a7468">皮带充饥</text>
    <text x="20" y="18" font-family="serif" font-size="12" fill="#7a7468">留存半截</text>
    <text x="20" y="36" font-family="serif" font-size="12" fill="#7a7468">铭记长征</text>
    <path d="M90 0 Q150 -30 240 -90" stroke="#c05a30" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.5"/>
  </g>

  <!-- 故事4：一袋干粮（右下） -->
  <g transform="translate(650,440)">
    <rect x="-90" y="-50" width="180" height="100" rx="8" fill="#fff" stroke="#7a3b14" stroke-width="2"/>
    <g transform="translate(-55,0)">
      <!-- 粮袋 -->
      <path d="M-10 -15 Q-12 0 -10 15 L10 15 Q12 0 10 -15 Z" fill="#7a3b14" opacity="0.6"/>
      <line x1="-10" y1="-15" x2="10" y2="-15" stroke="#7a3b14" stroke-width="1.5"/>
      <ellipse cx="0" cy="-15" rx="10" ry="3" fill="#7a3b14" opacity="0.5"/>
      <!-- 颗粒 -->
      <circle cx="-4" cy="0" r="1.5" fill="#c05a30" opacity="0.7"/>
      <circle cx="4" cy="5" r="1.5" fill="#c05a30" opacity="0.7"/>
    </g>
    <text x="-20" y="-20" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">一袋干粮</text>
    <text x="-20" y="0" font-family="serif" font-size="12" fill="#7a7468">省粮救战友</text>
    <text x="-20" y="18" font-family="serif" font-size="12" fill="#7a7468">野菜充饥</text>
    <text x="-20" y="36" font-family="serif" font-size="12" fill="#7a7468">舍己为人</text>
    <path d="M-90 0 Q-150 -30 -240 -90" stroke="#7a3b14" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.5"/>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="17" fill="#3a7d5c" opacity="0.9">连珠小故事：雪山草地，长征路上的牺牲与奉献</text>
</svg>
