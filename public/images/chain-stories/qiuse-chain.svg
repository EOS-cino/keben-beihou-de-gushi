<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="古代诗人咏秋名句与秋意故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">古人笔下的秋天</text>
  <line x1="280" y1="56" x2="520" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——秋还是那个秋，诗人的心不一样</text>

  <!-- 杜牧：红叶的美 -->
  <g transform="translate(160, 130)">
    <rect x="-130" y="0" width="260" height="170" rx="8" fill="#fef9ed" stroke="#c84a3a" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#c84a3a">杜牧 · 看见红叶的美</text>
    <g transform="translate(0, 75)">
      <rect x="-3" y="0" width="6" height="50" fill="#8d5a36"/>
      <circle cx="-18" cy="-5" r="18" fill="#c84a3a"/>
      <circle cx="15" cy="-10" r="20" fill="#e07856"/>
      <circle cx="0" cy="-25" r="16" fill="#c84a3a"/>
      <!-- 停车 -->
      <rect x="40" y="20" width="24" height="14" fill="#4a90b8" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="46" cy="38" r="4" fill="#7a3b14"/>
      <circle cx="58" cy="38" r="4" fill="#7a3b14"/>
    </g>
    <text x="0" y="150" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">"停车坐爱枫林晚"</text>
    <text x="0" y="164" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">为看红叶，宁可晚一点</text>
  </g>

  <!-- 杜甫：落叶的愁 -->
  <g transform="translate(640, 130)">
    <rect x="-130" y="0" width="260" height="170" rx="8" fill="#fef9ed" stroke="#7a3b14" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">杜甫 · 看见落叶的愁</text>
    <g transform="translate(0, 80)">
      <!-- 落叶萧萧 -->
      <path d="M-40 -20 Q-30 -25 -26 -15 Z" fill="#e8a838" stroke="#c8843a" stroke-width="0.8"/>
      <path d="M-10 -10 Q0 -15 4 -5 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="0.8"/>
      <path d="M20 -25 Q30 -30 34 -20 Z" fill="#e07856" stroke="#c84a3a" stroke-width="0.8"/>
      <!-- 江水 -->
      <path d="M-60 20 Q-30 14 0 20 Q30 26 60 20" fill="none" stroke="#4a90b8" stroke-width="2"/>
      <path d="M-60 32 Q-30 26 0 32 Q30 38 60 32" fill="none" stroke="#4a90b8" stroke-width="2" opacity="0.6"/>
    </g>
    <text x="0" y="150" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">"无边落木萧萧下"</text>
    <text x="0" y="164" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">"不尽长江滚滚来"</text>
  </g>

  <!-- 刘禹锡：秋鹤的劲 -->
  <g transform="translate(400, 340)">
    <rect x="-280" y="0" width="560" height="150" rx="8" fill="#fef9ed" stroke="#2d6a4f" stroke-width="2"/>
    <text x="0" y="26" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#2d6a4f">刘禹锡 · 看见秋鹤的劲</text>
    <g transform="translate(0, 80)">
      <!-- 鹤冲云 -->
      <ellipse cx="0" cy="0" rx="14" ry="8" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.2"/>
      <circle cx="-12" cy="-2" r="6" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.2"/>
      <polygon points="-18,-2 -24,-4 -18,0" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
      <path d="M10 0 L30 8 L30 -2" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.2"/>
      <line x1="0" y1="6" x2="-6" y2="30" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="6" y1="6" x2="0" y2="30" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 云 -->
      <ellipse cx="40" cy="-20" rx="20" ry="8" fill="#4a90b8" opacity="0.3"/>
      <ellipse cx="-50" cy="20" rx="22" ry="8" fill="#4a90b8" opacity="0.3"/>
    </g>
    <text x="0" y="135" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">"我言秋日胜春朝"——一只鹤冲破云层飞上天</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 520)">
    <rect x="-300" y="0" width="600" height="50" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">杜牧看美，杜甫看愁，刘禹锡看劲</text>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">读懂了诗人的心，诗就活了</text>
  </g>
</svg>
