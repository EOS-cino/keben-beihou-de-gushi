<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- Background -->
  <rect width="800" height="600" fill="#e8f0e8" opacity="0.3"/>
  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-size="22" fill="#2d2d44" font-family="serif" font-weight="bold">远古森林里的生活</text>
  <text x="400" y="70" text-anchor="middle" font-size="13" fill="#6b6b80" font-family="sans-serif">从采野果到学会用火</text>
  <!-- Scene 1: Gathering fruits (left) -->
  <g transform="translate(160,320)">
    <rect x="-100" y="-130" width="200" height="260" rx="12" fill="#fffdf7" stroke="#e8e0d0" stroke-width="2"/>
    <text x="0" y="-100" text-anchor="middle" font-size="13" fill="#2d6a4f" font-family="sans-serif" font-weight="bold">采野果</text>
    <!-- Tree -->
    <rect x="-5" y="-30" width="10" height="60" rx="2" fill="#8b6f47"/>
    <circle cx="0" cy="-50" r="35" fill="#5a8c4a"/>
    <!-- Fruits -->
    <circle cx="-15" cy="-45" r="5" fill="#e07856"/>
    <circle cx="10" cy="-60" r="5" fill="#e07856"/>
    <circle cx="20" cy="-40" r="5" fill="#e8a838"/>
    <circle cx="-20" cy="-65" r="5" fill="#e8a838"/>
    <!-- Person reaching -->
    <g transform="translate(-30,20)">
      <ellipse cx="0" cy="0" rx="8" ry="12" fill="#c4956a"/>
      <circle cx="0" cy="-15" r="7" fill="#d4a574"/>
      <line x1="6" y1="-5" x2="18" y2="-20" stroke="#c4956a" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="-5" y1="10" x2="-8" y2="25" stroke="#8b6f47" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="5" y1="10" x2="8" y2="25" stroke="#8b6f47" stroke-width="3.5" stroke-linecap="round"/>
    </g>
    <!-- Basket with fruits -->
    <g transform="translate(35,50)">
      <path d="M-15,0 L15,0 L12,20 L-12,20 Z" fill="#d4b896" stroke="#8b7355" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="15" ry="4" fill="#c4a886"/>
      <circle cx="-5" cy="3" r="4" fill="#e07856"/>
      <circle cx="5" cy="5" r="4" fill="#e8a838"/>
      <circle cx="0" cy="-2" r="4" fill="#e07856"/>
    </g>
  </g>
  <!-- Scene 2: Making fire (center) -->
  <g transform="translate(400,320)">
    <rect x="-100" y="-130" width="200" height="260" rx="12" fill="#fffdf7" stroke="#e8e0d0" stroke-width="2"/>
    <text x="0" y="-100" text-anchor="middle" font-size="13" fill="#c44d2e" font-family="sans-serif" font-weight="bold">钻木取火</text>
    <!-- Fire pit -->
    <ellipse cx="0" cy="60" rx="40" ry="10" fill="#d4b896"/>
    <!-- Logs -->
    <rect x="-30" y="55" width="60" height="8" rx="2" fill="#8b6f47" transform="rotate(15,0,59)"/>
    <rect x="-30" y="58" width="60" height="8" rx="2" fill="#a08060" transform="rotate(-10,0,62)"/>
    <!-- Fire -->
    <path d="M-15,55 Q-10,30 -5,45 Q0,20 5,40 Q10,25 15,50 Q12,58 0,58 Q-12,58 -15,55 Z" fill="#e07856"/>
    <path d="M-8,50 Q-5,35 0,45 Q5,30 8,48 Q5,53 0,53 Q-5,53 -8,50 Z" fill="#fdd835"/>
    <!-- Person drilling -->
    <g transform="translate(0,10)">
      <ellipse cx="0" cy="0" rx="8" ry="12" fill="#8b6f47"/>
      <circle cx="0" cy="-15" r="7" fill="#d4a574"/>
      <line x1="0" y1="-8" x2="0" y2="30" stroke="#8b6f47" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="-12" y1="0" x2="12" y2="0" stroke="#c4956a" stroke-width="3.5" stroke-linecap="round"/>
    </g>
    <!-- Sparks -->
    <circle cx="-20" cy="35" r="2" fill="#fdd835" opacity="0.8"/>
    <circle cx="22" cy="30" r="1.5" fill="#e8a838" opacity="0.8"/>
    <circle cx="-15" cy="25" r="1.5" fill="#fdd835" opacity="0.6"/>
  </g>
  <!-- Scene 3: Cave dwelling (right) -->
  <g transform="translate(640,320)">
    <rect x="-100" y="-130" width="200" height="260" rx="12" fill="#fffdf7" stroke="#e8e0d0" stroke-width="2"/>
    <text x="0" y="-100" text-anchor="middle" font-size="13" fill="#4a90b8" font-family="sans-serif" font-weight="bold">住山洞</text>
    <!-- Cave -->
    <path d="M-60,80 Q-60,-20 0,-40 Q60,-20 60,80 Z" fill="#a89888" stroke="#8b7d6b" stroke-width="2"/>
    <path d="M-45,80 Q-45,-10 0,-25 Q45,-10 45,80 Z" fill="#5a4a3a"/>
    <!-- Fire inside cave -->
    <path d="M-10,70 Q-5,55 0,65 Q5,50 10,65 Q8,72 0,72 Q-8,72 -10,70 Z" fill="#e07856" opacity="0.8"/>
    <!-- Person at entrance -->
    <g transform="translate(-20,50)">
      <ellipse cx="0" cy="0" rx="7" ry="10" fill="#c4956a"/>
      <circle cx="0" cy="-12" r="6" fill="#d4a574"/>
      <line x1="-4" y1="8" x2="-6" y2="20" stroke="#8b6f47" stroke-width="3" stroke-linecap="round"/>
      <line x1="4" y1="8" x2="6" y2="20" stroke="#8b6f47" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Rocks -->
    <ellipse cx="-55" cy="75" rx="12" ry="8" fill="#8b7d6b"/>
    <ellipse cx="50" cy="78" rx="10" ry="7" fill="#8b7d6b"/>
  </g>
  <!-- Bottom timeline -->
  <line x1="100" y1="520" x2="700" y2="520" stroke="#e8a838" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="160" y="545" text-anchor="middle" font-size="11" fill="#6b6b80" font-family="sans-serif">采集时代</text>
  <text x="400" y="545" text-anchor="middle" font-size="11" fill="#6b6b80" font-family="sans-serif">发现火</text>
  <text x="640" y="545" text-anchor="middle" font-size="11" fill="#6b6b80" font-family="sans-serif">定居生活</text>
  <circle cx="160" cy="520" r="5" fill="#2d6a4f"/>
  <circle cx="400" cy="520" r="5" fill="#c44d2e"/>
  <circle cx="640" cy="520" r="5" fill="#4a90b8"/>
</svg>
