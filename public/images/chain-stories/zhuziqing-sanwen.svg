<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="朱自清背影荷塘月色等名篇插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a3b14" font-family="serif">连珠小故事：朱自清的散文世界</text>
  <line x1="170" y1="55" x2="630" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左侧：《背影》——父亲爬月台 -->
  <g transform="translate(180, 220)">
    <!-- 月台 -->
    <rect x="-60" y="40" width="120" height="15" fill="#b8a888" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-60" y="55" width="120" height="30" fill="#a89878" opacity="0.5"/>
    <!-- 月台边缘线 -->
    <line x1="-60" y1="40" x2="60" y2="40" stroke="#7a3b14" stroke-width="2"/>
    <!-- 父亲背影（胖，爬月台） -->
    <g transform="translate(-15, 20)">
      <!-- 身体（胖，弯腰） -->
      <path d="M -16 20 Q -20 5 -14 -5 Q -7 -10 0 -10 Q 7 -10 14 -5 Q 20 5 16 20" fill="#4a5a6a" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 头（低着） -->
      <ellipse cx="0" cy="-15" rx="10" ry="11" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 帽子 -->
      <path d="M -10 -18 Q -10 -26 0 -27 Q 10 -26 10 -18" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1"/>
      <!-- 手臂（撑月台） -->
      <path d="M 14 -2 Q 22 5 25 15" fill="none" stroke="#4a5a6a" stroke-width="7" stroke-linecap="round"/>
      <ellipse cx="25" cy="18" rx="6" ry="4" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
      <!-- 腿（蹬着） -->
      <path d="M -10 18 Q -15 25 -18 35" fill="none" stroke="#4a5a6a" stroke-width="6" stroke-linecap="round"/>
      <path d="M 8 18 Q 5 28 2 38" fill="none" stroke="#4a5a6a" stroke-width="6" stroke-linecap="round"/>
    </g>
    <!-- 橘子（朱红） -->
    <circle cx="30" cy="35" r="5" fill="#f06030" stroke="#c84020" stroke-width="1"/>
    <circle cx="38" cy="33" r="5" fill="#f06030" stroke="#c84020" stroke-width="1"/>
    <circle cx="34" cy="28" r="5" fill="#f08040" stroke="#c84020" stroke-width="1"/>
  </g>
  <!-- 标签 -->
  <rect x="120" y="100" width="120" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="180" y="118" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">《背影》</text>
  <line x1="180" y1="126" x2="180" y2="160" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- 标注：父亲买橘 -->
  <line x1="35" y1="30" x2="0" y2="0" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3" transform="translate(180,220)"/>
  <rect x="50" y="200" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="105" y="218" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">父亲买橘</text>

  <!-- 右侧：《荷塘月色》 -->
  <g transform="translate(600, 220)">
    <!-- 月亮 -->
    <circle cx="0" cy="-60" r="20" fill="#fef8e0" stroke="#c8a848" stroke-width="1.5" opacity="0.8"/>
    <circle cx="-5" cy="-65" r="4" fill="#e8d8a0" opacity="0.3"/>
    <!-- 月光 -->
    <circle cx="0" cy="-60" r="28" fill="none" stroke="#fef8e0" stroke-width="1" opacity="0.3"/>
    <!-- 荷塘水面 -->
    <ellipse cx="0" cy="40" rx="80" ry="15" fill="#3a5a6a" opacity="0.2"/>
    <!-- 荷叶 -->
    <ellipse cx="-30" cy="25" rx="22" ry="8" fill="#5a8a4a" stroke="#4a7a2a" stroke-width="1.5" opacity="0.7"/>
    <ellipse cx="25" cy="30" rx="20" ry="7" fill="#6a9a5a" stroke="#4a7a2a" stroke-width="1.5" opacity="0.7"/>
    <ellipse cx="-5" cy="38" rx="18" ry="6" fill="#5a8a4a" stroke="#4a7a2a" stroke-width="1.5" opacity="0.6"/>
    <!-- 荷花 -->
    <g transform="translate(-30, 15)">
      <ellipse cx="-5" cy="0" rx="4" ry="8" fill="#f8e8e8" stroke="#e0a8b8" stroke-width="1" transform="rotate(-30 -5 0)"/>
      <ellipse cx="5" cy="0" rx="4" ry="8" fill="#f8e8e8" stroke="#e0a8b8" stroke-width="1" transform="rotate(30 5 0)"/>
      <ellipse cx="0" cy="-5" rx="4" ry="7" fill="#fff0f0" stroke="#e0a8b8" stroke-width="1"/>
      <circle cx="0" cy="0" r="2" fill="#f0c840"/>
    </g>
    <g transform="translate(25, 20)">
      <ellipse cx="-3" cy="0" rx="3" ry="6" fill="#f8e8e8" stroke="#e0a8b8" stroke-width="1" transform="rotate(-30 -3 0)"/>
      <ellipse cx="3" cy="0" rx="3" ry="6" fill="#f8e8e8" stroke="#e0a8b8" stroke-width="1" transform="rotate(30 3 0)"/>
      <ellipse cx="0" cy="-3" rx="3" ry="5" fill="#fff0f0" stroke="#e0a8b8" stroke-width="1"/>
    </g>
    <!-- 荷茎 -->
    <line x1="-30" y1="15" x2="-30" y2="40" stroke="#5a8a4a" stroke-width="2"/>
    <line x1="25" y1="20" x2="25" y2="40" stroke="#5a8a4a" stroke-width="2"/>
  </g>
  <!-- 标签 -->
  <rect x="540" y="100" width="120" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="600" y="118" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">《荷塘月色》</text>
  <line x1="600" y1="126" x2="600" y2="140" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- 标注：月下荷塘 -->
  <line x1="600" y1="160" x2="660" y2="180" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="640" y="200" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="695" y="218" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">月下荷塘</text>

  <!-- 中央：《匆匆》沙漏 -->
  <g transform="translate(400, 250)">
    <path d="M -20 -40 L 20 -40 L 20 -36 L 4 0 L 20 36 L 20 40 L -20 40 L -20 36 L -4 0 L -20 -36 Z" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M -16 -36 L 16 -36 L 4 -4 L -4 -4 Z" fill="#e8c868" opacity="0.6"/>
    <path d="M -10 36 L 10 36 L 2 16 L -2 16 Z" fill="#e8c868" opacity="0.4"/>
    <line x1="0" y1="-4" x2="0" y2="16" stroke="#e8c868" stroke-width="1"/>
  </g>
  <rect x="345" y="100" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="118" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">《匆匆》</text>
  <line x1="400" y1="126" x2="400" y2="205" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 底部：朱自清人物 -->
  <g transform="translate(400, 440)">
    <!-- 身体 -->
    <path d="M -25 70 Q -28 25 -22 8 Q -12 0 0 0 Q 12 0 22 8 Q 28 25 25 70" fill="#3a4a5a" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头 -->
    <circle cx="0" cy="-16" r="18" fill="#e8c4a0" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头发 -->
    <path d="M -18 -18 Q -16 -32 0 -34 Q 16 -32 18 -18" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 眼镜 -->
    <circle cx="-6" cy="-16" r="5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="6" cy="-16" r="5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-1" y1="-16" x2="1" y2="-16" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-6" cy="-16" r="1.5" fill="#7a3b14"/>
    <circle cx="6" cy="-16" r="1.5" fill="#7a3b14"/>
    <!-- 嘴 -->
    <path d="M -4 -7 Q 0 -4 4 -7" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 手拿笔 -->
    <path d="M 22 12 Q 35 18 40 30" fill="none" stroke="#3a4a5a" stroke-width="8" stroke-linecap="round"/>
    <circle cx="40" cy="31" r="4" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    <line x1="40" y1="31" x2="45" y2="42" stroke="#7a3b14" stroke-width="2"/>
  </g>

  <!-- 标注 -->
  <line x1="400" y1="410" x2="400" y2="370" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="350" y="348" width="100" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="365" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">朱自清</text>

  <!-- 底部说明 -->
  <rect x="50" y="545" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="570" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">《背影》的父爱、《荷塘月色》的宁静、《匆匆》的追问——朱自清用真诚的笔写尽人间至情。</text>
</svg>
