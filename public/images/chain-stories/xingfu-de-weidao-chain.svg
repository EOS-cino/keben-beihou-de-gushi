<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="袁隆平在稻田里查看水稻的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空 -->
  <rect x="0" y="0" width="800" height="300" fill="#4a90b8" opacity="0.06"/>
  <!-- 太阳 -->
  <circle cx="680" cy="90" r="30" fill="#e8a838" opacity="0.4"/>
  <!-- 远山 -->
  <path d="M0 280 Q150 230 300 260 Q450 220 600 250 Q700 230 800 270 L800 320 L0 320 Z" fill="#dceee3" opacity="0.5"/>
  <!-- 稻田 -->
  <rect x="0" y="280" width="800" height="320" fill="#e8a838" opacity="0.15"/>
  <rect x="0" y="320" width="800" height="280" fill="#f4d783" opacity="0.3"/>
  <!-- 稻穗（大面积） -->
  <g stroke="#e8a838" stroke-width="1.5" opacity="0.4">
    <line x1="20" y1="380" x2="18" y2="360"/>
    <line x1="50" y1="385" x2="48" y2="362"/>
    <line x1="80" y1="380" x2="78" y2="358"/>
    <line x1="110" y1="388" x2="108" y2="365"/>
    <line x1="140" y1="382" x2="138" y2="360"/>
    <line x1="170" y1="386" x2="168" y2="363"/>
    <line x1="200" y1="380" x2="198" y2="358"/>
    <line x1="230" y1="388" x2="228" y2="365"/>
    <line x1="260" y1="382" x2="258" y2="360"/>
    <line x1="540" y1="380" x2="538" y2="360"/>
    <line x1="570" y1="385" x2="568" y2="362"/>
    <line x1="600" y1="380" x2="598" y2="358"/>
    <line x1="630" y1="388" x2="628" y2="365"/>
    <line x1="660" y1="382" x2="658" y2="360"/>
    <line x1="690" y1="386" x2="688" y2="363"/>
    <line x1="720" y1="380" x2="718" y2="358"/>
    <line x1="750" y1="388" x2="748" y2="365"/>
    <line x1="780" y1="382" x2="778" y2="360"/>
  </g>
  <!-- 稻穗弯腰 -->
  <g fill="#e8a838" opacity="0.5">
    <ellipse cx="18" cy="358" rx="3" ry="6"/>
    <ellipse cx="48" cy="360" rx="3" ry="6"/>
    <ellipse cx="78" cy="356" rx="3" ry="6"/>
    <ellipse cx="108" cy="363" rx="3" ry="6"/>
    <ellipse cx="138" cy="358" rx="3" ry="6"/>
    <ellipse cx="168" cy="361" rx="3" ry="6"/>
    <ellipse cx="198" cy="356" rx="3" ry="6"/>
    <ellipse cx="228" cy="363" rx="3" ry="6"/>
    <ellipse cx="258" cy="358" rx="3" ry="6"/>
    <ellipse cx="538" cy="358" rx="3" ry="6"/>
    <ellipse cx="568" cy="360" rx="3" ry="6"/>
    <ellipse cx="598" cy="356" rx="3" ry="6"/>
    <ellipse cx="628" cy="363" rx="3" ry="6"/>
    <ellipse cx="658" cy="358" rx="3" ry="6"/>
    <ellipse cx="688" cy="361" rx="3" ry="6"/>
    <ellipse cx="718" cy="356" rx="3" ry="6"/>
    <ellipse cx="748" cy="363" rx="3" ry="6"/>
    <ellipse cx="778" cy="358" rx="3" ry="6"/>
  </g>
  <!-- 田埂 -->
  <path d="M0 400 Q400 390 800 400" stroke="#9fc8b4" stroke-width="20" fill="none" opacity="0.3"/>
  <!-- 袁隆平 -->
  <g transform="translate(400 400)">
    <!-- 身体（弯腰） -->
    <path d="M-25 0 L-30 -50 Q-25 -60 -15 -65 L15 -65 Q25 -60 30 -50 L25 0 Z" fill="#2d6a4f" opacity="0.8"/>
    <!-- 腿（站在田里） -->
    <rect x="-15" y="0" width="10" height="30" fill="#4a90b8" opacity="0.7"/>
    <rect x="5" y="0" width="10" height="30" fill="#4a90b8" opacity="0.7"/>
    <!-- 头（弯腰看稻穗） -->
    <circle cx="0" cy="-75" r="15" fill="#f4d4a8"/>
    <!-- 草帽 -->
    <ellipse cx="0" cy="-88" rx="30" ry="6" fill="#e8a838" opacity="0.7"/>
    <path d="M-28 -88 Q0 -105 28 -88 Z" fill="#d49828" opacity="0.7"/>
    <!-- 脸朝下 -->
    <path d="M-5 -75 Q-3 -72 0 -75" stroke="#333" stroke-width="1" fill="none"/>
    <path d="M0 -75 Q3 -72 5 -75" stroke="#333" stroke-width="1" fill="none"/>
    <!-- 手持稻穗查看 -->
    <path d="M25 -45 Q40 -30 50 -20" stroke="#f4d4a8" stroke-width="7" stroke-linecap="round"/>
    <path d="M-25 -45 L-35 -30" stroke="#f4d4a8" stroke-width="7" stroke-linecap="round"/>
    <!-- 稻穗在手中 -->
    <g transform="translate(55 -18)">
      <line x1="0" y1="0" x2="5" y2="-20" stroke="#e8a838" stroke-width="1.5"/>
      <ellipse cx="3" cy="-20" rx="3" ry="6" fill="#e8a838" opacity="0.7"/>
      <ellipse cx="7" cy="-18" rx="2" ry="5" fill="#e8a838" opacity="0.6"/>
      <ellipse cx="0" cy="-22" rx="2" ry="5" fill="#e8a838" opacity="0.6"/>
    </g>
  </g>
  <!-- 放大镜 -->
  <g transform="translate(470 370)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#8b6f47" stroke-width="3"/>
    <circle cx="0" cy="0" r="15" fill="#fef9ed" opacity="0.3"/>
    <line x1="11" y1="11" x2="20" y2="20" stroke="#8b6f47" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- 蝴蝶 -->
  <g transform="translate(200 200)" opacity="0.5">
    <ellipse cx="-5" cy="0" rx="6" ry="4" fill="#e07856"/>
    <ellipse cx="5" cy="0" rx="6" ry="4" fill="#e07856"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#333" stroke-width="1"/>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" font-weight="700" fill="#2d6a4f">连珠小故事：袁隆平的稻田梦</text>
  <text x="400" y="82" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#7a7468">他梦见水稻长得像高粱那么高，穗子像扫帚那么大</text>
</svg>
