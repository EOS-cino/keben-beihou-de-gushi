<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="詹天佑把志气修成铁路">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 顶部标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a3b14" font-family="serif">詹天佑把志气修成铁路</text>
  <line x1="260" y1="52" x2="540" y2="52" stroke="#c8843a" stroke-width="2"/>
  <!-- 天空 -->
  <rect x="0" y="58" width="800" height="300" fill="#f0e0c0"/>
  <!-- 太阳 -->
  <circle cx="680" cy="110" r="26" fill="#e8a838" opacity="0.7"/>
  <!-- 远山 -->
  <path d="M0 340 L100 250 L200 300 L320 210 L440 280 L560 230 L680 290 L800 255 L800 360 L0 360 Z" fill="#c4a06a" opacity="0.4"/>
  <!-- 八达岭主山体 -->
  <path d="M250 380 L360 145 L400 115 L440 145 L550 380 Z" fill="#b07d4a"/>
  <path d="M360 145 L400 115 L440 145 Z" fill="#946838"/>
  <path d="M300 300 L340 255 M380 280 L420 235 M450 300 L490 255" stroke="#946838" stroke-width="2" opacity="0.5" fill="none"/>
  <!-- 隧道口 -->
  <path d="M385 380 L385 270 Q400 248 415 270 L415 380 Z" fill="#2d1c10"/>
  <path d="M383 275 Q400 253 417 275" fill="none" stroke="#7a5a3a" stroke-width="4"/>
  <rect x="376" y="374" width="48" height="8" fill="#6b4a2f"/>
  <!-- 人字形铁路 -->
  <path d="M400 380 L400 310" stroke="#5a4030" stroke-width="5" fill="none"/>
  <path d="M400 310 L340 255" stroke="#5a4030" stroke-width="5" fill="none"/>
  <path d="M400 310 L460 255" stroke="#5a4030" stroke-width="5" fill="none"/>
  <g stroke="#8d6a3d" stroke-width="3">
    <line x1="395" y1="360" x2="405" y2="360"/><line x1="395" y1="340" x2="405" y2="340"/>
    <line x1="395" y1="320" x2="405" y2="320"/><line x1="372" y1="290" x2="382" y2="285"/>
    <line x1="352" y1="270" x2="362" y2="265"/><line x1="418" y1="290" x2="428" y2="285"/>
    <line x1="438" y1="270" x2="448" y2="265"/>
  </g>
  <!-- 地面 -->
  <rect x="0" y="380" width="800" height="180" fill="#d9c19a"/>
  <!-- 地面铁轨 -->
  <line x1="60" y1="475" x2="740" y2="458" stroke="#4a3525" stroke-width="4"/>
  <line x1="60" y1="490" x2="740" y2="473" stroke="#4a3525" stroke-width="4"/>
  <g stroke="#9a7548" stroke-width="6">
    <line x1="110" y1="472" x2="110" y2="492"/><line x1="170" y1="470" x2="170" y2="490"/>
    <line x1="230" y1="468" x2="230" y2="488"/><line x1="290" y1="466" x2="290" y2="486"/>
    <line x1="560" y1="462" x2="560" y2="482"/><line x1="620" y1="460" x2="620" y2="480"/>
    <line x1="680" y1="458" x2="680" y2="478"/>
  </g>
  <!-- 蒸汽火车 -->
  <rect x="560" y="412" width="105" height="46" rx="6" fill="#8a4a2a"/>
  <rect x="575" y="396" width="50" height="20" rx="4" fill="#6b3818"/>
  <rect x="585" y="400" width="14" height="12" fill="#f0e0c0"/>
  <circle cx="580" cy="462" r="12" fill="#2d1c10"/><circle cx="640" cy="462" r="12" fill="#2d1c10"/>
  <circle cx="580" cy="462" r="5" fill="#9a7548"/><circle cx="640" cy="462" r="5" fill="#9a7548"/>
  <rect x="598" y="386" width="12" height="15" fill="#3d2817"/>
  <ellipse cx="604" cy="376" rx="10" ry="8" fill="#d4c4a8" opacity="0.7"/>
  <ellipse cx="612" cy="362" rx="14" ry="10" fill="#d4c4a8" opacity="0.5"/>
  <!-- 詹天佑人物 -->
  <g transform="translate(200,382)">
    <ellipse cx="0" cy="-58" rx="14" ry="5" fill="#3d2817"/>
    <path d="M-10 -58 Q0 -72 10 -58 Z" fill="#5a4030"/>
    <circle cx="0" cy="-48" r="11" fill="#e8c4a0"/>
    <circle cx="-3" cy="-49" r="1.5" fill="#3d2817"/><circle cx="3" cy="-49" r="1.5" fill="#3d2817"/>
    <path d="M-4 -43 Q0 -40 4 -43" stroke="#3d2817" stroke-width="1.5" fill="none"/>
    <path d="M-15 -38 L-18 -5 L-12 0 L12 0 L18 -5 L15 -38 Z" fill="#4a6a4a"/>
    <path d="M-6 -38 L0 -30 L6 -38 Z" fill="#3a5a3a"/>
    <circle cx="0" cy="-25" r="1.5" fill="#2d1c10"/><circle cx="0" cy="-18" r="1.5" fill="#2d1c10"/><circle cx="0" cy="-11" r="1.5" fill="#2d1c10"/>
    <path d="M-15 -35 L-38 -25 L-44 -22" stroke="#4a6a4a" stroke-width="7" fill="none" stroke-linecap="round"/>
    <circle cx="-45" cy="-22" r="4" fill="#e8c4a0"/>
    <path d="M15 -35 L25 -15" stroke="#4a6a4a" stroke-width="7" fill="none" stroke-linecap="round"/>
    <circle cx="26" cy="-14" r="4" fill="#e8c4a0"/>
    <rect x="-10" y="0" width="8" height="28" fill="#3a4a3a"/><rect x="2" y="0" width="8" height="28" fill="#3a4a3a"/>
    <ellipse cx="-6" cy="30" rx="6" ry="3" fill="#2d1c10"/><ellipse cx="6" cy="30" rx="6" ry="3" fill="#2d1c10"/>
  </g>
  <!-- 标注：詹天佑 -->
  <line x1="190" y1="345" x2="115" y2="300" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="35" y="278" width="100" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="85" y="297" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">詹天佑</text>
  <!-- 标注：人字形铁路 -->
  <line x1="365" y1="280" x2="245" y2="200" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="155" y="182" width="120" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="215" y="201" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">人字形铁路</text>
  <!-- 标注：八达岭隧道 -->
  <line x1="415" y1="300" x2="560" y2="200" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="500" y="182" width="120" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="560" y="201" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">八达岭隧道</text>
  <!-- 底部说明 -->
  <rect x="40" y="545" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="570" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">1905年，詹天佑主持修建京张铁路，中国人首次自主设计铁路，八达岭隧道与"人"字形铁路闻名于世。</text>
</svg>