<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="陈伯吹创作儿童文学的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：陈伯吹的儿童文学</text>
  <line x1="170" y1="55" x2="630" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左侧：陈伯吹写作 -->
  <g transform="translate(180, 220)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">陈伯吹写作</text>
    <!-- 书桌 -->
    <rect x="-70" y="50" width="140" height="12" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="-60" y="62" width="8" height="50" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="52" y="62" width="8" height="50" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 稿纸 -->
    <rect x="-45" y="35" width="70" height="18" fill="#fff8e0" stroke="#c8843a" stroke-width="1.5" rx="2"/>
    <line x1="-40" y1="42" x2="20" y2="42" stroke="#c8843a" stroke-width="0.5"/>
    <line x1="-40" y1="46" x2="20" y2="46" stroke="#c8843a" stroke-width="0.5"/>
    <line x1="-40" y1="50" x2="15" y2="50" stroke="#c8843a" stroke-width="0.5"/>
    <!-- 笔 -->
    <line x1="10" y1="30" x2="25" y2="15" stroke="#3a4a6a" stroke-width="3" stroke-linecap="round"/>
    <!-- 台灯 -->
    <line x1="-50" y1="50" x2="-50" y2="20" stroke="#5a5a5a" stroke-width="2"/>
    <path d="M-62 20 L-38 20 L-42 5 L-58 5 Z" fill="#f4c842" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 光线 -->
    <path d="M-50 20 L-30 50 L-70 50 Z" fill="#f4c842" opacity="0.15"/>
    <!-- 陈伯吹 -->
    <circle cx="0" cy="-15" r="16" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
    <path d="M-10 -22 Q0 -32 10 -22" fill="none" stroke="#c8c8c8" stroke-width="2"/>
    <circle cx="-5" cy="-15" r="2" fill="#2a2a2a"/>
    <circle cx="5" cy="-15" r="2" fill="#2a2a2a"/>
    <path d="M-3 -8 Q0 -6 3 -8" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 眼镜 -->
    <circle cx="-5" cy="-15" r="5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="5" cy="-15" r="5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="0" y1="-15" x2="0" y2="-15" stroke="#7a3b14" stroke-width="1"/>
    <!-- 身体 -->
    <path d="M-12 0 L12 0 L10 35 L-10 35 Z" fill="#3a4a6a" stroke="#7a3b14" stroke-width="2"/>
    <!-- 手臂（写字） -->
    <path d="M10 10 L20 30" fill="none" stroke="#3a4a6a" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- 中间：代表作 -->
  <g transform="translate(430, 220)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">代表作品</text>
    <!-- 书1 -->
    <g transform="translate(-50, 0)">
      <rect x="-25" y="-30" width="50" height="65" fill="#c84a3a" stroke="#7a3b14" stroke-width="2" rx="2"/>
      <rect x="-25" y="-30" width="50" height="8" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="10" fill="#fff8e0">一只</text>
      <text x="0" y="13" text-anchor="middle" font-family="serif" font-size="10" fill="#fff8e0">想飞</text>
      <text x="0" y="26" text-anchor="middle" font-family="serif" font-size="10" fill="#fff8e0">的猫</text>
    </g>
    <!-- 书2 -->
    <g transform="translate(10, 5)">
      <rect x="-25" y="-30" width="50" height="65" fill="#6a8d3f" stroke="#7a3b14" stroke-width="2" rx="2"/>
      <rect x="-25" y="-30" width="50" height="8" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1.5"/>
      <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="10" fill="#fff8e0">阿丽</text>
      <text x="0" y="13" text-anchor="middle" font-family="serif" font-size="10" fill="#fff8e0">思小</text>
      <text x="0" y="26" text-anchor="middle" font-family="serif" font-size="10" fill="#fff8e0">姐</text>
    </g>
    <!-- 书3 -->
    <g transform="translate(65, -5)">
      <rect x="-22" y="-28" width="44" height="60" fill="#7ab8d8" stroke="#7a3b14" stroke-width="2" rx="2"/>
      <rect x="-22" y="-28" width="44" height="7" fill="#5a98b8" stroke="#7a3b14" stroke-width="1.5"/>
      <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="9" fill="#fff8e0">童话</text>
      <text x="0" y="13" text-anchor="middle" font-family="serif" font-size="9" fill="#fff8e0">故事</text>
      <text x="0" y="26" text-anchor="middle" font-family="serif" font-size="9" fill="#fff8e0">集</text>
    </g>
  </g>

  <!-- 右侧：儿童文学奖 -->
  <g transform="translate(660, 220)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">儿童文学奖</text>
    <!-- 奖杯 -->
    <ellipse cx="0" cy="-20" rx="20" ry="12" fill="#f4c842" stroke="#7a3b14" stroke-width="2"/>
    <path d="M-18 -20 Q-20 10 -8 15 L8 15 Q20 10 18 -20" fill="#f4c842" stroke="#7a3b14" stroke-width="2"/>
    <rect x="-8" y="15" width="16" height="20" fill="#e0a838" stroke="#7a3b14" stroke-width="2"/>
    <rect x="-18" y="35" width="36" height="8" fill="#c8843a" stroke="#7a3b14" stroke-width="2" rx="2"/>
    <!-- 星星 -->
    <text x="0" y="-18" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">★</text>
    <!-- 文字 -->
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">陈伯吹国际</text>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">儿童文学奖</text>
  </g>

  <!-- 下方：名言 -->
  <g transform="translate(400, 430)">
    <rect x="-220" y="0" width="440" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">"给孩子写东西，要蹲下来，用孩子的眼睛看世界。"</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="13" fill="#c8843a">—— 陈伯吹</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="510" width="700" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">陈伯吹一辈子为孩子写作，捐出积蓄设立国际儿童文学奖，</text>
  <text x="400" y="558" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">鼓励全世界的人为孩子们写出更多好故事。</text>
</svg>
