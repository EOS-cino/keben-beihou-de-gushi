<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="丰子恺和他的动物朋友们插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：丰子恺的动物朋友们</text>
  <line x1="180" y1="62" x2="620" y2="62" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 中心：丰子恺 -->
  <g transform="translate(400, 300)">
    <circle cx="0" cy="-40" r="28" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 眼镜 -->
    <circle cx="-10" cy="-42" r="7" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="10" cy="-42" r="7" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-3" y1="-42" x2="3" y2="-42" stroke="#7a3b14" stroke-width="1"/>
    <!-- 嘴（微笑） -->
    <path d="M-5 -30 Q0 -26 5 -30" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 胡子 -->
    <path d="M-12 -28 L-18 -26 M12 -28 L18 -26" fill="none" stroke="#3a2a1a" stroke-width="1"/>
    <!-- 头发 -->
    <path d="M-25 -55 Q-20 -68 0 -70 Q20 -68 25 -55" fill="#3a2a1a"/>
    <!-- 身体（长衫） -->
    <path d="M-22 -12 L-35 60 L35 60 L22 -12" fill="#4a90b8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 手（拿画笔） -->
    <path d="M22 0 L35 15" fill="none" stroke="#f0d0a8" stroke-width="7" stroke-linecap="round"/>
    <rect x="33" y="13" width="3" height="15" fill="#5a3a1a" transform="rotate(30 33 13)"/>

    <text x="0" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#7a3b14" font-family="serif">丰子恺</text>
  </g>

  <!-- 白鹅 -->
  <g transform="translate(170, 200)">
    <rect x="-65" y="-55" width="130" height="130" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-38" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a3b14" font-family="serif">白鹅</text>
    <!-- 简笔画鹅 -->
    <ellipse cx="0" cy="10" rx="30" ry="18" fill="#ffffff" stroke="#7a3b14" stroke-width="2"/>
    <path d="M-10 0 Q-18 -15 -12 -28" fill="none" stroke="#7a3b14" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="-10" cy="-30" r="8" fill="#ffffff" stroke="#7a3b14" stroke-width="2"/>
    <path d="M-3 -30 L8 -28 L8 -25 L-3 -27" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-13" cy="-31" r="1.5" fill="#2a2a2a"/>
    <text x="0" y="55" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">高傲的"大将军"</text>
  </g>

  <!-- 白象猫 -->
  <g transform="translate(630, 200)">
    <rect x="-65" y="-55" width="130" height="130" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-38" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a3b14" font-family="serif">白象（猫）</text>
    <!-- 简笔画猫 -->
    <ellipse cx="0" cy="15" rx="25" ry="18" fill="#ffffff" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="0" cy="-5" r="18" fill="#ffffff" stroke="#7a3b14" stroke-width="2"/>
    <!-- 耳朵 -->
    <path d="M-15 -18 L-20 -28 L-10 -22" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M15 -18 L20 -28 L10 -22" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 异色眼 -->
    <circle cx="-6" cy="-7" r="3" fill="#e8a838"/>
    <circle cx="6" cy="-7" r="3" fill="#4a90b8"/>
    <circle cx="-6" cy="-7" r="1.5" fill="#2a2a2a"/>
    <circle cx="6" cy="-7" r="1.5" fill="#2a2a2a"/>
    <!-- 胡须 -->
    <line x1="-12" y1="0" x2="-20" y2="-2" stroke="#7a3b14" stroke-width="0.8"/>
    <line x1="12" y1="0" x2="20" y2="-2" stroke="#7a3b14" stroke-width="0.8"/>
    <!-- 尾巴 -->
    <path d="M25 15 Q35 10 33 25" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <text x="0" y="55" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">一黄一蓝的眼睛</text>
  </g>

  <!-- 蚂蚁 -->
  <g transform="translate(170, 430)">
    <rect x="-65" y="-45" width="130" height="110" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-28" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a3b14" font-family="serif">蚂蚁</text>
    <!-- 蚂蚁搬食物 -->
    <g transform="translate(0, 10)">
      <ellipse cx="-8" cy="0" rx="5" ry="4" fill="#3a2a1a" stroke="#7a3b14" stroke-width="1"/>
      <ellipse cx="0" cy="0" rx="6" ry="5" fill="#3a2a1a" stroke="#7a3b14" stroke-width="1"/>
      <ellipse cx="8" cy="0" rx="5" ry="4" fill="#3a2a1a" stroke="#7a3b14" stroke-width="1"/>
      <!-- 触角 -->
      <line x1="-10" y1="-3" x2="-14" y2="-10" stroke="#7a3b14" stroke-width="1"/>
      <line x1="-6" y1="-3" x2="-8" y2="-10" stroke="#7a3b14" stroke-width="1"/>
      <!-- 腿 -->
      <line x1="-3" y1="4" x2="-6" y2="10" stroke="#7a3b14" stroke-width="1"/>
      <line x1="3" y1="4" x2="6" y2="10" stroke="#7a3b14" stroke-width="1"/>
      <!-- 搬的食物 -->
      <circle cx="-8" cy="-8" r="4" fill="#e07856"/>
    </g>
    <text x="0" y="45" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">"护生即护心"</text>
  </g>

  <!-- 杨柳 -->
  <g transform="translate(630, 430)">
    <rect x="-65" y="-45" width="130" height="110" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-28" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a3b14" font-family="serif">杨柳</text>
    <!-- 柳树 -->
    <g transform="translate(0, 15)">
      <path d="M0 20 Q-2 0 0 -20" fill="none" stroke="#5a3a1a" stroke-width="3"/>
      <!-- 下垂的柳枝 -->
      <path d="M0 -15 Q-15 -5 -20 15" fill="none" stroke="#2d6a4f" stroke-width="2"/>
      <path d="M0 -15 Q10 -5 18 15" fill="none" stroke="#2d6a4f" stroke-width="2"/>
      <path d="M0 -10 Q-20 5 -25 20" fill="none" stroke="#3d8a5f" stroke-width="1.5"/>
      <path d="M0 -10 Q15 5 22 20" fill="none" stroke="#3d8a5f" stroke-width="1.5"/>
    </g>
    <text x="0" y="45" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">"不忘本"</text>
  </g>

  <!-- 连接线 -->
  <line x1="235" y1="200" x2="345" y2="270" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="565" y1="200" x2="455" y2="270" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="235" y1="430" x2="345" y2="335" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="565" y1="430" x2="455" y2="335" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- 底部说明 -->
  <rect x="50" y="545" width="700" height="35" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="568" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">会观察动物的人，一定是热爱生活的人——蹲下来、静下来、用心去看。</text>
</svg>
