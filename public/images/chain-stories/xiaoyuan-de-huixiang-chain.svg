<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="鲁迅在三味书屋读书的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 室内背景 -->
  <rect x="0" y="0" width="800" height="450" fill="#f4e4c4" opacity="0.2"/>
  <!-- 屋顶横梁 -->
  <rect x="0" y="80" width="800" height="15" fill="#8b6f47" opacity="0.3"/>
  <!-- 匾额 -->
  <g transform="translate(400 120)">
    <rect x="-80" y="-20" width="160" height="40" fill="#8b6f47" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#2d6a4f" font-weight="700">三味书屋</text>
  </g>
  <!-- 窗户 -->
  <g transform="translate(100 180)">
    <rect x="0" y="0" width="100" height="80" fill="#4a90b8" opacity="0.1" stroke="#8b6f47" stroke-width="3"/>
    <line x1="50" y1="0" x2="50" y2="80" stroke="#8b6f47" stroke-width="2"/>
    <line x1="0" y1="40" x2="100" y2="40" stroke="#8b6f47" stroke-width="2"/>
    <!-- 窗外竹影 -->
    <g opacity="0.2">
      <rect x="15" y="5" width="3" height="35" fill="#2d6a4f"/>
      <rect x="70" y="5" width="3" height="35" fill="#2d6a4f"/>
    </g>
  </g>
  <!-- 书架 -->
  <g transform="translate(620 180)">
    <rect x="0" y="0" width="120" height="100" fill="#8b6f47" opacity="0.3"/>
    <line x1="0" y1="30" x2="120" y2="30" stroke="#8b6f47" stroke-width="2"/>
    <line x1="0" y1="65" x2="120" y2="65" stroke="#8b6f47" stroke-width="2"/>
    <!-- 书 -->
    <g>
      <rect x="5" y="5" width="8" height="22" fill="#e07856" opacity="0.5"/>
      <rect x="15" y="5" width="8" height="22" fill="#4a90b8" opacity="0.5"/>
      <rect x="25" y="5" width="8" height="22" fill="#2d6a4f" opacity="0.5"/>
      <rect x="35" y="5" width="8" height="22" fill="#e8a838" opacity="0.5"/>
      <rect x="50" y="5" width="8" height="22" fill="#e07856" opacity="0.5"/>
      <rect x="60" y="5" width="8" height="22" fill="#4a90b8" opacity="0.5"/>
      <rect x="80" y="5" width="8" height="22" fill="#2d6a4f" opacity="0.5"/>
      <rect x="90" y="5" width="8" height="22" fill="#e8a838" opacity="0.5"/>
      <rect x="100" y="5" width="8" height="22" fill="#e07856" opacity="0.5"/>
      <rect x="5" y="38" width="8" height="22" fill="#4a90b8" opacity="0.5"/>
      <rect x="15" y="38" width="8" height="22" fill="#2d6a4f" opacity="0.5"/>
      <rect x="30" y="38" width="8" height="22" fill="#e8a838" opacity="0.5"/>
      <rect x="45" y="38" width="8" height="22" fill="#e07856" opacity="0.5"/>
      <rect x="60" y="38" width="8" height="22" fill="#4a90b8" opacity="0.5"/>
      <rect x="80" y="38" width="8" height="22" fill="#2d6a4f" opacity="0.5"/>
    </g>
  </g>
  <!-- 地面 -->
  <rect x="0" y="400" width="800" height="200" fill="#dceee3" opacity="0.3"/>
  <!-- 书桌 -->
  <g transform="translate(400 380)">
    <rect x="-100" y="0" width="200" height="12" fill="#8b6f47" opacity="0.6"/>
    <rect x="-90" y="12" width="8" height="50" fill="#6b5535"/>
    <rect x="82" y="12" width="8" height="50" fill="#6b5535"/>
    <!-- 书本 -->
    <rect x="-40" y="-15" width="50" height="18" fill="#e8a838" opacity="0.4"/>
    <line x1="-15" y1="-15" x2="-15" y2="3" stroke="#8b6f47" stroke-width="1"/>
    <!-- 毛笔 -->
    <line x1="30" y1="-20" x2="35" y2="0" stroke="#6b5535" stroke-width="2"/>
    <ellipse cx="33" cy="-22" rx="3" ry="6" fill="#333"/>
    <!-- 墨台 -->
    <ellipse cx="50" cy="-5" rx="12" ry="5" fill="#333" opacity="0.5"/>
  </g>
  <!-- 小鲁迅 -->
  <g transform="translate(280 380)">
    <!-- 长衫 -->
    <path d="M-22 0 L-28 -65 L28 -65 L22 0 Z" fill="#2d6a4f"/>
    <!-- 头 -->
    <circle cx="0" cy="-82" r="15" fill="#f4d4a8"/>
    <!-- 头发 -->
    <path d="M-15 -89 Q0 -100 15 -89 L15 -82 Q0 -77 -15 -82 Z" fill="#333"/>
    <!-- 眼睛（看书） -->
    <path d="M-6 -84 Q-3 -87 0 -84" stroke="#333" stroke-width="1.5" fill="none"/>
    <path d="M0 -84 Q3 -87 6 -84" stroke="#333" stroke-width="1.5" fill="none"/>
    <!-- 嘴 -->
    <path d="M-2 -75 Q0 -73 2 -75" stroke="#333" stroke-width="1" fill="none"/>
    <!-- 手放桌上 -->
    <path d="M22 -40 L35 -15" stroke="#f4d4a8" stroke-width="6" stroke-linecap="round"/>
    <path d="M-22 -40 L-30 -15" stroke="#f4d4a8" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- 偷偷画画 -->
  <g transform="translate(340 365)">
    <rect x="0" y="0" width="25" height="18" fill="#fef9ed" stroke="#8b6f47" stroke-width="1"/>
    <!-- 简笔画 -->
    <circle cx="8" cy="7" r="3" fill="none" stroke="#e07856" stroke-width="1"/>
    <path d="M5 10 Q8 14 11 10" stroke="#e07856" stroke-width="1" fill="none"/>
    <path d="M15 5 L20 12" stroke="#2d6a4f" stroke-width="1"/>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" font-weight="700" fill="#2d6a4f">连珠小故事：鲁迅的百草园和三味书屋</text>
  <text x="400" y="82" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#7a7468">从乐园到学堂，他记住了每一个细节</text>
</svg>
