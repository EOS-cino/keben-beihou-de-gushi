<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="日月潭名称由来与形状示意图">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">日月潭的名字是怎么来的</text>
  <line x1="250" y1="56" x2="550" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 上半部分：潭的形状对比 -->

  <!-- 日潭（左） -->
  <g transform="translate(200,220)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">日潭（北）</text>
    <!-- 湖 -->
    <ellipse cx="0" cy="0" rx="80" ry="55" fill="#a8d0e8"/>
    <ellipse cx="0" cy="-3" rx="74" ry="50" fill="#c8e0f0"/>
    <!-- 太阳对比 -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#f4b942" stroke-width="3" stroke-dasharray="6,4"/>
    <g stroke="#f4b942" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-45" x2="0" y2="-55"/>
      <line x1="0" y1="45" x2="0" y2="55"/>
      <line x1="-45" y1="0" x2="-55" y2="0"/>
      <line x1="45" y1="0" x2="55" y2="0"/>
      <line x1="-32" y1="-32" x2="-40" y2="-40"/>
      <line x1="32" y1="-32" x2="40" y2="-40"/>
      <line x1="-32" y1="32" x2="-40" y2="40"/>
      <line x1="32" y1="32" x2="40" y2="40"/>
    </g>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="12" fill="#5a8aaa">形状圆圆 → 像太阳</text>
  </g>

  <!-- 光华岛（中） -->
  <g transform="translate(400,220)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">光华岛</text>
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#6a8d3f"/>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="11" fill="#6a8d3f">分隔南北</text>
    <!-- 箭头 -->
    <path d="M-30 0 L-60 0" fill="none" stroke="#c8843a" stroke-width="2" marker-end="url(#arrR1)"/>
    <path d="M30 0 L60 0" fill="none" stroke="#c8843a" stroke-width="2" marker-end="url(#arrR1)"/>
  </g>

  <!-- 月潭（右） -->
  <g transform="translate(600,220)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">月潭（南）</text>
    <!-- 湖（弯月形） -->
    <path d="M-60 -30 Q-30 -50 20 -40 Q60 -20 60 10 Q50 40 10 45 Q-30 40 -55 15 Q-70 -5 -60 -30 Z" fill="#a8d0e8"/>
    <path d="M-55 -25 Q-28 -45 18 -35 Q55 -18 55 8 Q46 35 8 40 Q-28 35 -50 12 Q-65 -3 -55 -25 Z" fill="#c8e0f0"/>
    <!-- 月亮对比 -->
    <path d="M-35 -15 Q-15 -30 5 -25 Q-5 -10 -5 10 Q-5 25 5 30 Q-15 30 -30 15 Q-40 0 -35 -15 Z" fill="none" stroke="#f4b942" stroke-width="3" stroke-dasharray="6,4"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="12" fill="#5a8aaa">形状弯弯 → 像月亮</text>
  </g>

  <!-- 分隔线 -->
  <line x1="60" y1="360" x2="740" y2="360" stroke="#c8843a" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- 下半部分：传说故事 -->
  <text x="400" y="395" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">邵族传说：追逐白鹿发现宝湖</text>

  <!-- 白鹿 -->
  <g transform="translate(180,470)">
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="#e8d8c8"/>
    <circle cx="18" cy="-10" r="10" fill="#e8d8c8"/>
    <!-- 鹿角 -->
    <path d="M20 -18 L16 -28 M22 -20 L26 -30" stroke="#8d5a36" stroke-width="2" fill="none"/>
    <!-- 腿 -->
    <line x1="-12" y1="12" x2="-12" y2="25" stroke="#8d5a36" stroke-width="2.5"/>
    <line x1="12" y1="12" x2="12" y2="25" stroke="#8d5a36" stroke-width="2.5"/>
    <!-- 眼睛 -->
    <circle cx="22" cy="-10" r="1.5" fill="#1a1a1a"/>
    <!-- 尾巴 -->
    <ellipse cx="-22" cy="-5" rx="4" ry="3" fill="#e8d8c8"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">白鹿引路</text>
  </g>

  <!-- 箭头 -->
  <path d="M230 470 L320 470" fill="none" stroke="#8d5a36" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrR1)"/>

  <!-- 邵族先民 -->
  <g transform="translate(380,470)">
    <circle cx="0" cy="-15" r="8" fill="#e0c8a8"/>
    <rect x="-6" y="-7" width="12" height="18" fill="#8d5a36" rx="2"/>
    <line x1="-6" y1="-2" x2="-12" y2="8" stroke="#e0c8a8" stroke-width="3"/>
    <line x1="6" y1="-2" x2="12" y2="8" stroke="#e0c8a8" stroke-width="3"/>
    <line x1="-3" y1="11" x2="-3" y2="25" stroke="#8d5a36" stroke-width="3"/>
    <line x1="3" y1="11" x2="3" y2="25" stroke="#8d5a36" stroke-width="3"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">先民定居</text>
  </g>

  <!-- 箭头 -->
  <path d="M430 470 L520 470" fill="none" stroke="#8d5a36" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrR1)"/>

  <!-- 命名 -->
  <g transform="translate(600,470)">
    <rect x="-60" y="-25" width="120" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
    <text x="0" y="-5" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">日潭 + 月潭</text>
    <text x="0" y="14" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">= 日月潭</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">光华岛分湖为两半：北圆如日，南弯如月，合称日月潭</text>

  <defs>
    <marker id="arrR1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#8d5a36"/>
    </marker>
  </defs>
</svg>
