  <line x1="100" y1="450" x2="700" y2="450" stroke="#8d5a36" stroke-width="1" stroke-dasharray="5 5" opacity="0.3"/>
  <circle cx="180" cy="480" r="15" fill="#c84a3a" opacity="0.15"/>
  <text x="180" y="485" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">考科举</text>
  <text x="180" y="505" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">没考上</text>
  <circle cx="320" cy="480" r="15" fill="#e07856" opacity="0.15"/>
  <text x="320" y="485" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">去长安</text>
  <text x="320" y="505" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">没机会</text>
  <circle cx="460" cy="480" r="15" fill="#6a8d3f" opacity="0.15"/>
