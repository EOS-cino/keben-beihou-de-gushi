  <rect x="185" y="218" width="30" height="40" rx="4" fill="#7ab8d8" opacity="0.4"/>
  <text x="200" y="280" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">孟浩然</text>
  <path d="M150 180 Q170 165 190 180" stroke="#8d5a36" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M500 180 Q520 165 540 180" stroke="#8d5a36" stroke-width="1.5" fill="none" opacity="0.3"/>
  <ellipse cx="520" cy="190" rx="15" ry="8" fill="#6a8d3f" opacity="0.3" transform="rotate(-20 520 190)"/>
  <ellipse cx="160" cy="195" rx="12" ry="7" fill="#4a6a2f" opacity="0.3" transform="rotate(15 160 195)"/>
  <path d="M100 420 Q150 410 200 420 Q250 430 300 420" stroke="#7ab8d8" stroke-width="4" fill="none" opacity="0.3"/>
