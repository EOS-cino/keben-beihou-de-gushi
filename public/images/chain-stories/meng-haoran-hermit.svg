  <path d="M0 350 L80 250 L140 300 L200 220 L260 280 L320 230 L380 290 L440 250 L500 300 L560 240 L620 290 L680 260 L740 300 L800 280 L800 600 L0 600z" fill="#6a8d3f" opacity="0.2"/>
