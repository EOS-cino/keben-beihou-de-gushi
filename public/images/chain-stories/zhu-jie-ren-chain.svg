<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠故事 - 传统手工玩具">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 连珠标识徽章 -->
  <g transform="translate(60,42)">
    <rect x="-44" y="-22" width="88" height="44" rx="22" fill="#3a7d5c"/>
    <circle cx="-26" cy="0" r="5" fill="#fef9ed"/><circle cx="-10" cy="0" r="5" fill="#fef9ed"/><circle cx="6" cy="0" r="5" fill="#fef9ed"/><circle cx="22" cy="0" r="5" fill="#fef9ed"/>
    <text x="40" y="5" font-family="serif" font-size="16" font-weight="bold" fill="#fef9ed">连珠</text>
  </g>
  <text x="460" y="48" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#3a7d5c">传统手工玩具</text>
  <line x1="360" y1="64" x2="560" y2="64" stroke="#3a7d5c" stroke-width="2"/>

  <!-- 中央竹节人（主题） -->
  <g transform="translate(400,300)">
    <circle cx="0" cy="0" r="80" fill="#7a3b14" opacity="0.06"/>
    <!-- 头 -->
    <rect x="-8" y="-80" width="16" height="16" rx="2" fill="#c05a30"/>
    <!-- 身体 -->
    <rect x="-10" y="-64" width="20" height="44" rx="3" fill="#7a3b14"/>
    <line x1="-10" y1="-54" x2="10" y2="-54" stroke="#2d2a24" stroke-width="1.5"/>
    <line x1="-10" y1="-44" x2="10" y2="-44" stroke="#2d2a24" stroke-width="1.5"/>
    <line x1="-10" y1="-34" x2="10" y2="-34" stroke="#2d2a24" stroke-width="1.5"/>
    <!-- 手臂 -->
    <line x1="-10" y1="-58" x2="-34" y2="-38" stroke="#7a3b14" stroke-width="7" stroke-linecap="round"/>
    <line x1="10" y1="-58" x2="34" y2="-38" stroke="#7a3b14" stroke-width="7" stroke-linecap="round"/>
    <!-- 腿 -->
    <line x1="-6" y1="-20" x2="-18" y2="20" stroke="#7a3b14" stroke-width="7" stroke-linecap="round"/>
    <line x1="6" y1="-20" x2="18" y2="20" stroke="#7a3b14" stroke-width="7" stroke-linecap="round"/>
    <!-- 线绳 -->
    <line x1="0" y1="20" x2="0" y2="80" stroke="#7a7468" stroke-width="1.2"/>
  </g>

  <!-- 玩具1：陀螺（左上） -->
  <g transform="translate(130,180)">
    <rect x="-70" y="-55" width="140" height="120" rx="8" fill="#fff" stroke="#c05a30" stroke-width="2"/>
    <g transform="translate(0,5)">
      <ellipse cx="0" cy="-10" rx="22" ry="8" fill="#c05a30" opacity="0.7"/>
      <path d="M-22 -10 Q-18 20 0 30 Q18 20 22 -10 Z" fill="#c05a30" opacity="0.8"/>
      <line x1="0" y1="30" x2="0" y2="40" stroke="#2d2a24" stroke-width="2"/>
      <path d="M-15 -10 Q0 -20 15 -10" stroke="#fef9ed" stroke-width="2" fill="none"/>
      <!-- 旋转弧线 -->
      <path d="M-30 5 Q0 -25 30 5" stroke="#c05a30" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="2 3"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">陀螺</text>
  </g>

  <!-- 玩具2：弹弓（右上） -->
  <g transform="translate(670,180)">
    <rect x="-70" y="-55" width="140" height="120" rx="8" fill="#fff" stroke="#7a3b14" stroke-width="2"/>
    <g transform="translate(0,5)">
      <path d="M-12 -25 Q-15 0 -12 25" stroke="#7a3b14" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M12 -25 Q15 0 12 25" stroke="#7a3b14" stroke-width="5" fill="none" stroke-linecap="round"/>
      <line x1="-12" y1="-25" x2="-18" y2="-35" stroke="#7a3b14" stroke-width="4"/>
      <line x1="12" y1="-25" x2="18" y2="-35" stroke="#7a3b14" stroke-width="4"/>
      <line x1="-18" y1="-35" x2="0" y2="-42" stroke="#7a3b14" stroke-width="4"/>
      <line x1="18" y1="-35" x2="0" y2="-42" stroke="#7a3b14" stroke-width="4"/>
      <!-- 橡皮筋 -->
      <line x1="-12" y1="-25" x2="-5" y2="5" stroke="#7a7468" stroke-width="1.5"/>
      <line x1="12" y1="-25" x2="5" y2="5" stroke="#7a7468" stroke-width="1.5"/>
      <circle cx="0" cy="8" r="5" fill="#2d2a24"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">弹弓</text>
  </g>

  <!-- 玩具3：沙包（左下） -->
  <g transform="translate(130,420)">
    <rect x="-70" y="-55" width="140" height="120" rx="8" fill="#fff" stroke="#3a7d5c" stroke-width="2"/>
    <g transform="translate(0,5)">
      <rect x="-18" y="-15" width="36" height="30" rx="4" fill="#3a7d5c" opacity="0.7"/>
      <line x1="-18" y1="0" x2="18" y2="0" stroke="#fef9ed" stroke-width="1.5"/>
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#fef9ed" stroke-width="1.5"/>
      <circle cx="-9" cy="-7" r="2" fill="#c05a30" opacity="0.6"/>
      <circle cx="9" cy="7" r="2" fill="#c05a30" opacity="0.6"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">沙包</text>
  </g>

  <!-- 玩具4：拨浪鼓（右下） -->
  <g transform="translate(670,420)">
    <rect x="-70" y="-55" width="140" height="120" rx="8" fill="#fff" stroke="#c05a30" stroke-width="2"/>
    <g transform="translate(0,5)">
      <circle cx="0" cy="-5" r="20" fill="#c05a30" opacity="0.7"/>
      <circle cx="0" cy="-5" r="14" fill="#c05a30" opacity="0.5"/>
      <line x1="0" y1="15" x2="0" y2="35" stroke="#7a3b14" stroke-width="4"/>
      <!-- 两侧鼓槌 -->
      <line x1="-20" y1="-5" x2="-32" y2="-18" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-33" cy="-19" r="4" fill="#7a3b14"/>
      <line x1="20" y1="-5" x2="32" y2="-18" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="33" cy="-19" r="4" fill="#7a3b14"/>
      <circle cx="-5" cy="-10" r="1.5" fill="#fef9ed"/>
      <circle cx="5" cy="0" r="1.5" fill="#fef9ed"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">拨浪鼓</text>
  </g>

  <!-- 连线到中心 -->
  <g stroke="#7a7468" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.4">
    <line x1="200" y1="200" x2="330" y2="270"/>
    <line x1="600" y1="200" x2="470" y2="270"/>
    <line x1="200" y1="400" x2="330" y2="340"/>
    <line x1="600" y1="400" x2="470" y2="340"/>
  </g>

  <!-- 中心标签 -->
  <g transform="translate(400,400)">
    <rect x="-50" y="-16" width="100" height="32" rx="16" fill="#c05a30"/>
    <text x="0" y="6" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#fef9ed">竹节人</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="17" fill="#3a7d5c" opacity="0.9">连珠小故事：巧手自制，朴素玩具中的童年欢乐</text>
</svg>
