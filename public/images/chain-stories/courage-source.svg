<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="勇气来源的多种途径插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：勇气从哪里来</text>
  <line x1="200" y1="55" x2="600" y2="55" stroke="#c8843a" stroke-width="2"/>

  <!-- 中心：心 -->
  <g transform="translate(400, 310)">
    <path d="M0 30 C-30 0 -30 -25 -15 -25 C-5 -25 0 -15 0 -10 C0 -15 5 -25 15 -25 C30 -25 30 0 0 30 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="2.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="14" fill="#fef9ed">勇气</text>
  </g>

  <!-- 四条来源，从四个方向指向中心 -->
  <!-- 1.练习（左上） -->
  <g transform="translate(150, 150)">
    <rect x="-70" y="-35" width="140" height="70" fill="#fff6df" stroke="#6a8d3f" stroke-width="2" rx="8"/>
    <text x="0" y="-12" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">练出来的信心</text>
    <!-- 阶梯 -->
    <g fill="#6a8d3f" opacity="0.6">
      <rect x="-30" y="15" width="14" height="12"/>
      <rect x="-16" y="9" width="14" height="18"/>
      <rect x="-2" y="3" width="14" height="24"/>
      <rect x="12" y="-3" width="14" height="30"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">摔过→不怕了</text>
  </g>
  <path d="M220 185 Q310 240 370 290" fill="none" stroke="#6a8d3f" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- 2.为别人（右上） -->
  <g transform="translate(650, 150)">
    <rect x="-70" y="-35" width="140" height="70" fill="#fff6df" stroke="#c84a3a" stroke-width="2" rx="8"/>
    <text x="0" y="-12" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">为了别人</text>
    <!-- 两个人 -->
    <g transform="translate(-20, 15)">
      <circle cx="0" cy="0" r="5" fill="#f0d0a8"/>
      <rect x="-4" y="5" width="8" height="10" fill="#c84a3a"/>
    </g>
    <g transform="translate(10, 15)">
      <circle cx="0" cy="0" r="5" fill="#f0d0a8"/>
      <rect x="-4" y="5" width="8" height="10" fill="#6a8d3f"/>
    </g>
    <!-- 保护手势 -->
    <path d="M-5 10 Q0 5 8 8" fill="none" stroke="#c84a3a" stroke-width="2"/>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">朋友被欺负→敢出头</text>
  </g>
  <path d="M580 185 Q490 240 430 290" fill="none" stroke="#c84a3a" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- 3.自信（左下） -->
  <g transform="translate(150, 470)">
    <rect x="-70" y="-35" width="140" height="70" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8"/>
    <text x="0" y="-12" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">相信自己做得到</text>
    <!-- 对勾 -->
    <path d="M-15 10 L-5 20 L15 -5" fill="none" stroke="#6a8d3f" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">以前做到过→现在也行</text>
  </g>
  <path d="M220 435 Q310 380 370 330" fill="none" stroke="#c8843a" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- 4.有人支持（右下） -->
  <g transform="translate(650, 470)">
    <rect x="-70" y="-35" width="140" height="70" fill="#fff6df" stroke="#7ab8d8" stroke-width="2" rx="8"/>
    <text x="0" y="-12" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">有人支持你</text>
    <!-- 握手 -->
    <g transform="translate(0, 15)">
      <circle cx="-10" cy="0" r="5" fill="#f0d0a8"/>
      <circle cx="10" cy="0" r="5" fill="#f0d0a8"/>
      <rect x="-6" y="-2" width="12" height="6" rx="2" fill="#f0d0a8"/>
    </g>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">妈妈握着手→不怕了</text>
  </g>
  <path d="M580 435 Q490 380 430 330" fill="none" stroke="#7ab8d8" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- 底部：勇敢≠鲁莽 -->
  <g transform="translate(400, 540)">
    <rect x="-200" y="-15" width="400" height="35" fill="#fff6df" stroke="#c84a3a" stroke-width="1.5" rx="6"/>
    <text x="0" y="7" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">注意：勇敢 ≠ 鲁莽——评估风险、做好准备，才是真勇敢</text>
  </g>
</svg>
