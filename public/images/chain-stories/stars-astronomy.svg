<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="牛郎星织女星插画">
  <rect width="800" height="600" fill="#1a2a4a"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#f4d842">连珠小故事：天文学中的牛郎星与织女星</text>
  <line x1="180" y1="62" x2="620" y2="62" stroke="#5a8ac4" stroke-width="2"/>

  <!-- 星空 -->
  <g fill="#fff6df">
    <circle cx="60" cy="120" r="1"/>
    <circle cx="140" cy="160" r="1.5"/>
    <circle cx="220" cy="110" r="1"/>
    <circle cx="320" cy="150" r="1"/>
    <circle cx="480" cy="140" r="1.5"/>
    <circle cx="580" cy="110" r="1"/>
    <circle cx="680" cy="160" r="1"/>
    <circle cx="740" cy="120" r="1.5"/>
    <circle cx="80" cy="250" r="1"/>
    <circle cx="720" cy="260" r="1"/>
  </g>

  <!-- 银河 -->
  <path d="M200 580 Q350 350 400 300 Q450 350 600 580 Z" fill="#3a5a8a" opacity="0.35"/>

  <!-- 夏季大三角连线 -->
  <path d="M250 230 L560 200 L450 380 Z" fill="none" stroke="#5a8ac4" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- 牛郎星（河鼓二） -->
  <g>
    <circle cx="250" cy="230" r="12" fill="#f4f4a0"/>
    <circle cx="250" cy="230" r="20" fill="#f4f4a0" opacity="0.3"/>
    <!-- 旁边两颗小星（挑着的孩子） -->
    <circle cx="230" cy="250" r="4" fill="#fff6df"/>
    <circle cx="270" cy="250" r="4" fill="#fff6df"/>
  </g>
  <rect x="180" y="180" width="140" height="24" fill="#1a2a4a" stroke="#f4d842" rx="4"/>
  <text x="250" y="197" text-anchor="middle" font-family="serif" font-size="14" fill="#f4d842">牛郎星（河鼓二）</text>
  <text x="250" y="270" text-anchor="middle" font-family="serif" font-size="12" fill="#a0c4e8">距地球 16.7 光年</text>

  <!-- 织女星（织女一） -->
  <g>
    <circle cx="560" cy="200" r="12" fill="#f4f4a0"/>
    <circle cx="560" cy="200" r="20" fill="#f4f4a0" opacity="0.3"/>
  </g>
  <rect x="490" y="150" width="140" height="24" fill="#1a2a4a" stroke="#f4d842" rx="4"/>
  <text x="560" y="167" text-anchor="middle" font-family="serif" font-size="14" fill="#f4d842">织女星（织女一）</text>
  <text x="560" y="240" text-anchor="middle" font-family="serif" font-size="12" fill="#a0c4e8">距地球 25 光年</text>

  <!-- 天津四 -->
  <g>
    <circle cx="450" cy="380" r="9" fill="#fff6df"/>
    <circle cx="450" cy="380" r="15" fill="#fff6df" opacity="0.3"/>
  </g>
  <rect x="400" y="400" width="100" height="24" fill="#1a2a4a" stroke="#5a8ac4" rx="4"/>
  <text x="450" y="417" text-anchor="middle" font-family="serif" font-size="13" fill="#a0c4e8">天津四</text>

  <!-- 两星距离标注 -->
  <line x1="262" y1="230" x2="548" y2="200" stroke="#e8783a" stroke-width="2"/>
  <rect x="340" y="195" width="120" height="28" fill="#fef9ed" stroke="#e8783a" rx="4"/>
  <text x="400" y="214" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#c45a2a">相距约 16 光年</text>

  <!-- 顶部说明框 -->
  <rect x="220" y="460" width="360" height="70" fill="#fef9ed" stroke="#5a8ac4" stroke-width="2" rx="8"/>
  <text x="400" y="485" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#2e5a8a">夏季大三角</text>
  <text x="400" y="508" text-anchor="middle" font-family="serif" font-size="13" fill="#5a4a38">牛郎星、织女星、天津四组成北方夜空的标志</text>

  <!-- 底部说明 -->
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="14" fill="#a0c4e8">神话里一年一会，现实中相距16光年——同一片星空的双重意义</text>
</svg>
