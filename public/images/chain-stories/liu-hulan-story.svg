<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="烈士纪念碑前摆满了鲜花，一群少先队员在敬礼">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空 -->
  <rect x="0" y="0" width="800" height="350" fill="#a8d0e8" opacity="0.1"/>
  <!-- 远山 -->
  <path d="M0 350 L0 280 L150 240 L300 270 L450 250 L600 280 L750 260 L800 280 L800 350 Z" fill="#4a6a2f" opacity="0.2"/>
  <!-- 地面 -->
  <path d="M0 420 Q200 410 400 420 T800 415 L800 600 L0 600 Z" fill="#6a8d3f" opacity="0.3"/>
  <path d="M0 460 Q200 450 400 460 T800 455 L800 600 L0 600 Z" fill="#4a6a2f" opacity="0.2"/>
  <!-- 纪念碑 -->
  <g transform="translate(400,250)">
    <!-- 碑基 -->
    <rect x="-80" y="120" width="160" height="20" fill="#8d8680"/>
    <rect x="-70" y="100" width="140" height="20" fill="#a09080"/>
    <!-- 碑身 -->
    <rect x="-35" y="-20" width="70" height="120" fill="#c8c4bc"/>
    <rect x="-35" y="-20" width="70" height="120" fill="none" stroke="#8d8680" stroke-width="2"/>
    <!-- 碑顶 -->
    <path d="M-40 -20 L0 -50 L40 -20 Z" fill="#a09080"/>
    <!-- 碑文 -->
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">刘胡兰</text>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">烈士纪念碑</text>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a">1932—1947</text>
  </g>
  <!-- 鲜花 -->
  <g transform="translate(400,400)">
    <!-- 花束 -->
    <g transform="translate(-30,0)">
      <circle cx="0" cy="0" r="8" fill="#c84a3a"/>
      <circle cx="0" cy="0" r="4" fill="#e07856"/>
      <line x1="0" y1="8" x2="0" y2="25" stroke="#6a8d3f" stroke-width="2"/>
    </g>
    <g transform="translate(-10,-5)">
      <circle cx="0" cy="0" r="8" fill="#f4b942"/>
      <circle cx="0" cy="0" r="4" fill="#e0a050"/>
      <line x1="0" y1="8" x2="0" y2="30" stroke="#6a8d3f" stroke-width="2"/>
    </g>
    <g transform="translate(10,0)">
      <circle cx="0" cy="0" r="8" fill="#ffffff"/>
      <circle cx="0" cy="0" r="4" fill="#f4b942"/>
      <line x1="0" y1="8" x2="0" y2="25" stroke="#6a8d3f" stroke-width="2"/>
    </g>
    <g transform="translate(30,-3)">
      <circle cx="0" cy="0" r="8" fill="#c84a3a"/>
      <circle cx="0" cy="0" r="4" fill="#e07856"/>
      <line x1="0" y1="8" x2="0" y2="28" stroke="#6a8d3f" stroke-width="2"/>
    </g>
  </g>
  <!-- 少先队员敬礼 -->
  <g transform="translate(200,440)">
    <ellipse cx="0" cy="25" rx="12" ry="15" fill="#c84a3a"/>
    <circle cx="0" cy="0" r="12" fill="#f4d4a8"/>
    <path d="M-9 -5 Q-11 -12 -6 -14" stroke="#2d2a24" stroke-width="2" fill="none"/>
    <path d="M9 -5 Q11 -12 6 -14" stroke="#2d2a24" stroke-width="2" fill="none"/>
    <circle cx="-4" cy="0" r="2" fill="#2d2a24"/>
    <circle cx="4" cy="0" r="2" fill="#2d2a24"/>
    <!-- 红领巾 -->
    <path d="M-7 8 L0 16 L7 8 Z" fill="#c84a3a"/>
    <!-- 敬礼的手 -->
    <path d="M10 12 L20 -5" stroke="#f4d4a8" stroke-width="5" stroke-linecap="round"/>
    <path d="M-10 18 L-15 35" stroke="#f4d4a8" stroke-width="5" stroke-linecap="round"/>
    <!-- 腿 -->
    <path d="M-5 38 L-7 55" stroke="#4a6a2f" stroke-width="5"/>
    <path d="M5 38 L7 55" stroke="#4a6a2f" stroke-width="5"/>
  </g>
  <g transform="translate(600,440)">
    <ellipse cx="0" cy="25" rx="12" ry="15" fill="#7ab8d8"/>
    <circle cx="0" cy="0" r="12" fill="#f4d4a8"/>
    <path d="M-9 -5 Q-11 -12 -6 -14" stroke="#2d2a24" stroke-width="2" fill="none"/>
    <path d="M9 -5 Q11 -12 6 -14" stroke="#2d2a24" stroke-width="2" fill="none"/>
    <circle cx="-4" cy="0" r="2" fill="#2d2a24"/>
    <circle cx="4" cy="0" r="2" fill="#2d2a24"/>
    <path d="M-7 8 L0 16 L7 8 Z" fill="#c84a3a"/>
    <!-- 敬礼的手 -->
    <path d="M-10 12 L-20 -5" stroke="#f4d4a8" stroke-width="5" stroke-linecap="round"/>
    <path d="M10 18 L15 35" stroke="#f4d4a8" stroke-width="5" stroke-linecap="round"/>
    <path d="M-5 38 L-7 55" stroke="#4a6a2f" stroke-width="5"/>
    <path d="M5 38 L7 55" stroke="#4a6a2f" stroke-width="5"/>
  </g>
  <!-- 松柏（象征不朽） -->
  <g transform="translate(100,400)" opacity="0.5">
    <rect x="-4" y="-30" width="8" height="50" fill="#8d5a36"/>
    <path d="M0 -70 L-20 -40 L-12 -40 L-25 -20 L-15 -20 L-30 0 L30 0 L15 -20 L25 -20 L12 -40 L20 -40 Z" fill="#4a6a2f"/>
  </g>
  <g transform="translate(700,400)" opacity="0.5">
    <rect x="-4" y="-30" width="8" height="50" fill="#8d5a36"/>
    <path d="M0 -70 L-20 -40 L-12 -40 L-25 -20 L-15 -20 L-30 0 L30 0 L15 -20 L25 -20 L12 -40 L20 -40 Z" fill="#4a6a2f"/>
  </g>
  <!-- 题词 -->
  <g transform="translate(400,520)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#c84a3a">生的伟大，死的光荣</text>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">刘胡兰的故事</text>
</svg>
