<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="蜘蛛织网过程与结构示意图">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">蜘蛛真的会织网吗</text>
  <line x="280" y1="56" x2="520" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 织网四步骤 -->
  <text x="400" y="100" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">蜘蛛织网的四个步骤</text>

  <!-- 步骤1：搭框架 -->
  <g transform="translate(160,220)">
    <rect x="-90" y="-70" width="180" height="140" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="8"/>
    <text x="0" y="-48" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#7a3b14">第一步：搭框架</text>
    <!-- V形丝线 -->
    <g stroke="#a0a0a0" stroke-width="1.5" fill="none">
      <line x1="-40" y1="30" x2="0" y2="-20"/>
      <line x1="40" y1="30" x2="0" y2="-20"/>
      <line x1="-40" y1="30" x2="40" y2="30"/>
    </g>
    <!-- 蜘蛛 -->
    <circle cx="0" cy="-20" r="4" fill="#4a2a1a"/>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">风吹丝线粘对面</text>
  </g>

  <!-- 步骤2：铺辐线 -->
  <g transform="translate(400,220)">
    <rect x="-90" y="-70" width="180" height="140" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="8"/>
    <text x="0" y="-48" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#7a3b14">第二步：铺辐线</text>
    <!-- 辐线 -->
    <g stroke="#a0a0a0" stroke-width="1.5" fill="none">
      <line x1="0" y1="0" x2="0" y2="-35"/>
      <line x1="0" y1="0" x2="30" y2="-18"/>
      <line x1="0" y1="0" x2="30" y2="18"/>
      <line x1="0" y1="0" x2="0" y2="35"/>
      <line x1="0" y1="0" x2="-30" y2="18"/>
      <line x1="0" y1="0" x2="-30" y2="-18"/>
    </g>
    <circle cx="0" cy="0" r="3" fill="#4a2a1a"/>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">从中心向外放射</text>
  </g>

  <!-- 步骤3：织螺旋丝 -->
  <g transform="translate(640,220)">
    <rect x="-90" y="-70" width="180" height="140" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="8"/>
    <text x="0" y="-48" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#7a3b14">第三步：织螺旋丝</text>
    <!-- 辐线+螺旋 -->
    <g stroke="#a0a0a0" stroke-width="1" fill="none" opacity="0.5">
      <line x1="0" y1="0" x2="0" y2="-35"/>
      <line x1="0" y1="0" x2="30" y2="-18"/>
      <line x1="0" y1="0" x2="30" y2="18"/>
      <line x1="0" y1="0" x2="0" y2="35"/>
      <line x1="0" y1="0" x2="-30" y2="18"/>
      <line x1="0" y1="0" x2="-30" y2="-18"/>
    </g>
    <path d="M0 -10 L9 -5 L9 5 L0 10 L-9 5 L-9 -5 Z M0 -20 L17 -10 L17 10 L0 20 L-17 10 L-17 -10 Z M0 -30 L26 -15 L26 15 L0 30 L-26 15 L-26 -15 Z" fill="none" stroke="#c84a3a" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#4a2a1a"/>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">带黏液的螺旋丝</text>
  </g>

  <!-- 分隔线 -->
  <line x1="60" y1="330" x2="740" y2="330" stroke="#c8843a" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- 下方：蛛丝的强度 -->
  <text x="400" y="365" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">蛛丝——自然界最强的纤维</text>

  <!-- 蛛丝 vs 钢丝对比 -->
  <g transform="translate(200,450)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">蛛丝</text>
    <path d="M-60 0 Q-30 -5 0 0 Q30 5 60 0" fill="none" stroke="#c0c0c0" stroke-width="3"/>
    <rect x="-50" y="15" width="100" height="30" fill="#e8f5d8" stroke="#6a8d3f" rx="4"/>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="12" fill="#4a6a2f">强度是钢丝的5倍</text>
  </g>

  <g transform="translate(600,450)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">钢丝</text>
    <path d="M-60 0 L60 0" fill="none" stroke="#6a6a6a" stroke-width="3"/>
    <rect x="-50" y="15" width="100" height="30" fill="#e0e0e0" stroke="#8a8a8a" rx="4"/>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="12" fill="#6a6a6a">同等粗细对比</text>
  </g>

  <!-- 蛛丝用途 -->
  <g transform="translate(400,520)">
    <rect x="-250" y="-20" width="500" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
    <text x="0" y="-2" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">蛛丝用途：捕虫·包裹卵囊·安全绳·"飞航"降落伞</text>
    <text x="0" y="16" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">科学家研究：防弹衣·医疗缝合线·人工韧带</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">蜘蛛是真正的"编织高手"——它织的不是口罩围巾，而是精巧的蛛网</text>
</svg>
