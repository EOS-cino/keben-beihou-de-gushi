<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="筷子的发明和使用场景插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：筷子是怎么发明的</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左侧：大禹折树枝（传说） -->
  <g transform="translate(170, 200)">
    <text x="0" y="-50" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">大禹折树枝</text>
    <!-- 大禹 -->
    <circle cx="0" cy="-20" r="18" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
    <path d="M-8 -28 Q0 -38 8 -28" fill="none" stroke="#2a2a2a" stroke-width="2"/>
    <circle cx="-5" cy="-20" r="2" fill="#2a2a2a"/>
    <circle cx="5" cy="-20" r="2" fill="#2a2a2a"/>
    <path d="M-3 -12 Q0 -10 3 -12" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 身体 -->
    <path d="M-15 0 L15 0 L12 60 L-12 60 Z" fill="#6a8d3f" stroke="#7a3b14" stroke-width="2"/>
    <!-- 手臂举树枝 -->
    <path d="M12 10 L35 25" fill="none" stroke="#6a8d3f" stroke-width="7" stroke-linecap="round"/>
    <circle cx="37" cy="27" r="5" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 树枝（两根） -->
    <line x1="35" y1="25" x2="60" y2="10" stroke="#8d5a36" stroke-width="3" stroke-linecap="round"/>
    <line x1="37" y1="28" x2="62" y2="15" stroke="#8d5a36" stroke-width="3" stroke-linecap="round"/>
    <!-- 热锅 -->
    <g transform="translate(0, 75)">
      <ellipse cx="0" cy="10" rx="35" ry="8" fill="#8d5a36" opacity="0.4"/>
      <path d="M-30 5 L30 5 L25 30 L-25 30 Z" fill="#5a3a1a" stroke="#3a2a0a" stroke-width="2"/>
      <ellipse cx="0" cy="5" rx="30" ry="7" fill="#c8843a"/>
      <!-- 蒸汽 -->
      <path d="M-10 0 Q-5 -10 -10 -20 M5 0 Q10 -10 5 -20" fill="none" stroke="#c8c8c8" stroke-width="2" opacity="0.6"/>
    </g>
  </g>

  <!-- 中间：筷子演变（名称变化） -->
  <g transform="translate(400, 200)">
    <text x="0" y="-50" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">名称演变</text>
    <!-- 三个阶段 -->
    <!-- 梜 -->
    <rect x="-55" y="-25" width="40" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="4"/>
    <text x="-35" y="5" text-anchor="middle" font-family="serif" font-size="22" fill="#7a3b14">梜</text>
    <text x="-35" y="40" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">商代</text>
    <!-- 箸 -->
    <rect x="-10" y="-25" width="40" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="4"/>
    <text x="10" y="5" text-anchor="middle" font-family="serif" font-size="22" fill="#7a3b14">箸</text>
    <text x="10" y="40" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">古称</text>
    <!-- 筷 -->
    <rect x="35" y="-25" width="40" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="4"/>
    <text x="55" y="5" text-anchor="middle" font-family="serif" font-size="22" fill="#7a3b14">筷</text>
    <text x="55" y="40" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">今称</text>
    <!-- 箭头 -->
    <path d="M-15 0 L-12 0" fill="none" stroke="#c8843a" stroke-width="2"/>
    <path d="M30 0 L33 0" fill="none" stroke="#c8843a" stroke-width="2"/>
    <!-- 竹字头说明 -->
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">竹字头——因多用竹木制作</text>
  </g>

  <!-- 右侧：现代筷子使用 -->
  <g transform="translate(630, 200)">
    <text x="0" y="-50" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">灵活使用</text>
    <!-- 碗 -->
    <ellipse cx="0" cy="50" rx="45" ry="10" fill="#8d5a36" opacity="0.3"/>
    <path d="M-40 45 Q-45 80 0 85 Q45 80 40 45 Z" fill="#fff8e0" stroke="#c8843a" stroke-width="2"/>
    <ellipse cx="0" cy="45" rx="40" ry="9" fill="#a8d0e8" opacity="0.3" stroke="#c8843a" stroke-width="2"/>
    <!-- 饭粒 -->
    <ellipse cx="-15" cy="48" rx="3" ry="2" fill="#fff8e0" stroke="#c8843a" stroke-width="0.5"/>
    <ellipse cx="0" cy="50" rx="3" ry="2" fill="#fff8e0" stroke="#c8843a" stroke-width="0.5"/>
    <ellipse cx="15" cy="48" rx="3" ry="2" fill="#fff8e0" stroke="#c8843a" stroke-width="0.5"/>
    <!-- 筷子（交叉握姿） -->
    <line x1="-10" y1="20" x2="-25" y2="-30" stroke="#8d5a36" stroke-width="4" stroke-linecap="round"/>
    <line x1="10" y1="20" x2="25" y2="-30" stroke="#8d5a36" stroke-width="4" stroke-linecap="round"/>
    <!-- 手 -->
    <ellipse cx="0" cy="15" rx="18" ry="12" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 下方：姜子牙传说 -->
  <g transform="translate(200, 430)">
    <text x="0" y="-10" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">姜子牙传说</text>
    <!-- 姜子牙 -->
    <circle cx="0" cy="15" r="12" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-5 8 Q0 0 5 8" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    <path d="M-10 27 L10 27 L8 55 L-8 55 Z" fill="#3a4a6a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 胡子 -->
    <path d="M-4 20 Q0 28 4 20" fill="none" stroke="#c8c8c8" stroke-width="1.5"/>
    <!-- 树枝筷子 -->
    <line x1="10" y1="35" x2="30" y2="20" stroke="#8d5a36" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="38" x2="30" y2="25" stroke="#8d5a36" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- 三千年历史标注 -->
  <g transform="translate(550, 430)">
    <rect x="-80" y="0" width="160" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="6"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">三千多年历史</text>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">考古发现证实</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="510" width="700" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">传说大禹治水时折树枝夹热食，姜子牙用树枝吃饭不烫手，</text>
  <text x="400" y="558" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">筷子从"梜"到"箸"再到"筷"，已陪伴中国人三千多年。</text>
</svg>
