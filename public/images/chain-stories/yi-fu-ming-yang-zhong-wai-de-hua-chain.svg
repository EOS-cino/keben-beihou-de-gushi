<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠小故事：会讲故事的中国名画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：会“讲故事”的中国名画</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">画在纸上的中国史</text>
  <g transform="translate(150,300)">
    <rect x="-50" y="-30" width="100" height="70" rx="4" fill="#cfe8f0" stroke="#5a8fa3" stroke-width="2"/>
    <path d="M-20,30 q0,-30 20,-30 q20,0 20,30" fill="none" stroke="#5a8fa3" stroke-width="2"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#5a8fa3">洛神赋图</text>
  </g>
  <g transform="translate(400,300)">
    <rect x="-50" y="-30" width="100" height="70" rx="4" fill="#f0e6cf" stroke="#7a4a1a" stroke-width="2"/>
    <rect x="-20" y="-10" width="40" height="30" fill="#7a4a1a"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#7a4a1a">步辇图</text>
  </g>
  <g transform="translate(650,300)">
    <rect x="-50" y="-30" width="100" height="70" rx="4" fill="#fbe9d0" stroke="#c98a3a" stroke-width="2"/>
    <path d="M120,320 Q200,250 280,320" fill="none" stroke="#c98a3a" stroke-width="2" transform="translate(-720,-20)"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#a85a2a">清明上河图</text>
  </g>
  <text x="400" y="460" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">一扇扇窗，看见古人的生活</text>
</svg>
