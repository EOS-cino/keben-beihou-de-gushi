<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠小故事：不经意间的好心">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：不经意间的好心</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">不经意的善意，串成温暖</text>
  <g transform="translate(150,300)">
    <path d="M-10,40 L10,40 L6,-30 L-6,-30 Z" fill="#e8b94a" stroke="#c98a3a" stroke-width="2"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#a8742a">落叶·书签</text>
  </g>
  <g transform="translate(400,300)">
    <path d="M-30,30 Q-30,-10 0,-20 Q30,-10 30,30 Z" fill="#7a8aa8" stroke="#3a4a6a" stroke-width="2"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#3a4a6a">帽子·遮雨</text>
  </g>
  <g transform="translate(650,300)">
    <path d="M-10,30 q10,-20 20,0" fill="none" stroke="#c0392b" stroke-width="3"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#c0392b">一句·鼓励</text>
  </g>
  <text x="400" y="460" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">小小举手之劳，也是大大的好</text>
</svg>
