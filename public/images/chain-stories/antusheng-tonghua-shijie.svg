<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-size="22" fill="#2d2d44" font-family="serif" font-weight="bold">安徒生的童话世界</text>
  <text x="400" y="70" text-anchor="middle" font-size="13" fill="#6b6b80" font-family="sans-serif">用温柔的目光注视世界</text>
  <!-- Background book -->
  <path d="M100,120 L400,100 L700,120 L700,520 L400,500 L100,520 Z" fill="#fffdf7" stroke="#e8e0d0" stroke-width="2"/>
  <line x1="400" y1="100" x2="400" y2="500" stroke="#e8e0d0" stroke-width="1"/>
  <!-- Left page: Little Mermaid -->
  <g transform="translate(250,250)">
    <text x="0" y="-80" text-anchor="middle" font-size="13" fill="#4a90b8" font-family="sans-serif" font-weight="bold">海的女儿</text>
    <!-- Mermaid -->
    <ellipse cx="0" cy="0" rx="12" ry="18" fill="#e8d0b8"/>
    <circle cx="0" cy="-25" r="10" fill="#e8d0b8"/>
    <path d="M-8,-30 Q-10,-38 0,-40 Q10,-38 8,-30" fill="#b8860b"/>
    <!-- Tail -->
    <path d="M-10,15 Q-20,40 -5,50 Q0,45 5,50 Q20,40 10,15 Z" fill="#4a90b8"/>
    <path d="M-5,50 Q-15,55 -10,48" fill="#4a90b8" opacity="0.7"/>
    <path d="M5,50 Q15,55 10,48" fill="#4a90b8" opacity="0.7"/>
    <!-- Arms -->
    <line x1="-10" y1="-5" x2="-18" y2="5" stroke="#e8d0b8" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="-5" x2="18" y2="0" stroke="#e8d0b8" stroke-width="3" stroke-linecap="round"/>
    <!-- Waves -->
    <path d="M-40,55 Q-30,50 -20,55 Q-10,50 0,55 Q10,50 20,55 Q30,50 40,55" fill="none" stroke="#4a90b8" stroke-width="2" opacity="0.5"/>
    <path d="M-40,62 Q-30,57 -20,62 Q-10,57 0,62 Q10,57 20,62 Q30,57 40,62" fill="none" stroke="#4a90b8" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Right page: Ugly Duckling -->
  <g transform="translate(550,250)">
    <text x="0" y="-80" text-anchor="middle" font-size="13" fill="#2d6a4f" font-family="sans-serif" font-weight="bold">丑小鸭</text>
    <!-- Swan -->
    <ellipse cx="0" cy="0" rx="25" ry="18" fill="#fffdf7" stroke="#d0c8b8" stroke-width="1.5"/>
    <!-- Neck -->
    <path d="M15,-5 Q25,-20 20,-35" fill="none" stroke="#d0c8b8" stroke-width="6" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="20" cy="-38" r="8" fill="#fffdf7" stroke="#d0c8b8" stroke-width="1.5"/>
    <!-- Beak -->
    <path d="M27,-38 L35,-36 L27,-34" fill="#e8a838" stroke="#b8860b" stroke-width="1"/>
    <!-- Eye -->
    <circle cx="22" cy="-40" r="1.5" fill="#2d2d44"/>
    <!-- Wing -->
    <path d="M-5,-5 Q-15,0 -10,15 Q0,10 5,0" fill="#f0ebe0" stroke="#d0c8b8" stroke-width="1"/>
    <!-- Water -->
    <path d="M-40,25 Q-30,20 -20,25 Q-10,20 0,25 Q10,20 20,25 Q30,20 40,25" fill="none" stroke="#4a90b8" stroke-width="2" opacity="0.4"/>
    <!-- Eggshell (reminder of origin) -->
    <g transform="translate(-35,-10)">
      <path d="M-8,0 Q-8,-12 0,-12 Q8,-12 8,0 Q8,5 0,5 Q-8,5 -8,0 Z" fill="#fdf3d8" stroke="#e8a838" stroke-width="1" opacity="0.6"/>
      <path d="M-6,-8 L2,-4" fill="none" stroke="#e8a838" stroke-width="1" opacity="0.4"/>
    </g>
  </g>
  <!-- Bottom: Andersen portrait -->
  <g transform="translate(400,430)">
    <text x="0" y="-60" text-anchor="middle" font-size="13" fill="#c44d2e" font-family="sans-serif" font-weight="bold">安徒生 (1805-1875)</text>
    <!-- Portrait -->
    <circle cx="0" cy="-20" r="25" fill="#e8d0b8"/>
    <!-- Hair -->
    <path d="M-22,-30 Q-25,-45 -10,-48 Q0,-50 10,-48 Q25,-45 22,-30" fill="#5a3e28"/>
    <!-- Eyes -->
    <ellipse cx="-8" cy="-22" rx="2" ry="1.5" fill="#2d2d44"/>
    <ellipse cx="8" cy="-22" rx="2" ry="1.5" fill="#2d2d44"/>
    <!-- Nose -->
    <path d="M0,-18 L-2,-12 L2,-12 Z" fill="#d4b896"/>
    <!-- Mouth -->
    <path d="M-5,-8 Q0,-5 5,-8" fill="none" stroke="#8b6f47" stroke-width="1.5"/>
    <!-- Collar -->
    <path d="M-20,5 Q-15,15 0,18 Q15,15 20,5" fill="#fffdf7" stroke="#d0c8b8" stroke-width="1.5"/>
    <!-- Body/coat -->
    <path d="M-30,5 Q-35,40 -30,60 L30,60 Q35,40 30,5" fill="#2d2d44"/>
    <!-- Bow tie -->
    <path d="M-8,8 L0,12 L8,8 L8,18 L0,14 L-8,18 Z" fill="#c44d2e"/>
  </g>
  <!-- Decorative stars -->
  <g fill="#e8a838" opacity="0.3">
    <text x="130" y="150" font-size="16">★</text>
    <text x="670" y="160" font-size="14">★</text>
    <text x="150" y="480" font-size="12">★</text>
    <text x="650" y="470" font-size="14">★</text>
  </g>
</svg>
