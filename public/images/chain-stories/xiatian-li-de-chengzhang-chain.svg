<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="万物生长的季节插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：万物生长的季节</text>
  <line x1="200" y1="55" x2="600" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左侧：竹子生长之谜 -->
  <g transform="translate(170, 250)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#2d6a4f">竹子生长之谜</text>
    <!-- 竹节同时拉长示意 -->
    <rect x="-15" y="-60" width="30" height="100" fill="none" stroke="#2d6a4f" stroke-width="2" rx="3"/>
    <line x1="-15" y1="-35" x2="15" y2="-35" stroke="#2d6a4f" stroke-width="1.5"/>
    <line x1="-15" y1="-10" x2="15" y2="-10" stroke="#2d6a4f" stroke-width="1.5"/>
    <line x1="-15" y1="15" x2="15" y2="15" stroke="#2d6a4f" stroke-width="1.5"/>
    <!-- 箭头表示同时拉长 -->
    <path d="M -25 -50 L -25 -20" fill="none" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="3,2"/>
    <path d="M -28 -25 L -25 -18 L -22 -25" fill="none" stroke="#e8a838" stroke-width="1.5"/>
    <path d="M -25 -25 L -25 5" fill="none" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="3,2"/>
    <path d="M -28 0 L -25 7 L -22 0" fill="none" stroke="#e8a838" stroke-width="1.5"/>
    <path d="M -25 0 L -25 30" fill="none" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="3,2"/>
    <path d="M -28 25 L -25 32 L -22 25" fill="none" stroke="#e8a838" stroke-width="1.5"/>
    <text x="25" y="-30" font-family="serif" font-size="10" fill="#e8a838">节间</text>
    <text x="25" y="-20" font-family="serif" font-size="10" fill="#e8a838">同时</text>
    <text x="25" y="-10" font-family="serif" font-size="10" fill="#e8a838">拉长</text>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">一天长高近1米</text>
    <text x="0" y="78" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">像火车每节同时开</text>
  </g>

  <!-- 中间：蝌蚪变青蛙 -->
  <g transform="translate(400, 250)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#4a90b8">蝌蚪变青蛙</text>
    <!-- 蝌蚪1 -->
    <g transform="translate(-80, -30)">
      <ellipse cx="0" cy="0" rx="8" ry="6" fill="#3a3a3a"/>
      <path d="M 6 0 Q 15 3 20 0" fill="none" stroke="#3a3a3a" stroke-width="2.5"/>
    </g>
    <!-- 箭头1 -->
    <path d="M -60 -30 L -40 -30" fill="none" stroke="#c8843a" stroke-width="1.5"/>
    <path d="M -45 -33 L -38 -30 L -45 -27" fill="none" stroke="#c8843a" stroke-width="1.5"/>
    <!-- 蝌蚪2（长后腿） -->
    <g transform="translate(-20, -30)">
      <ellipse cx="0" cy="0" rx="8" ry="6" fill="#3a3a3a"/>
      <path d="M 6 0 Q 14 3 18 0" fill="none" stroke="#3a3a3a" stroke-width="2"/>
      <path d="M -3 5 Q -8 10 -10 14" fill="none" stroke="#3a3a3a" stroke-width="2"/>
      <path d="M 3 5 Q 8 10 10 14" fill="none" stroke="#3a3a3a" stroke-width="2"/>
    </g>
    <!-- 箭头2 -->
    <path d="M 5 -30 L 25 -30" fill="none" stroke="#c8843a" stroke-width="1.5"/>
    <path d="M 20 -33 L 27 -30 L 20 -27" fill="none" stroke="#c8843a" stroke-width="1.5"/>
    <!-- 蝌蚪3（长前腿，尾巴短） -->
    <g transform="translate(50, -30)">
      <ellipse cx="0" cy="0" rx="9" ry="7" fill="#4a6a3a"/>
      <path d="M 6 0 Q 12 2 14 0" fill="none" stroke="#4a6a3a" stroke-width="1.5"/>
      <path d="M -4 6 Q -9 11 -11 15" fill="none" stroke="#4a6a3a" stroke-width="2"/>
      <path d="M 4 6 Q 9 11 11 15" fill="none" stroke="#4a6a3a" stroke-width="2"/>
      <path d="M -5 -4 Q -9 -8 -11 -10" fill="none" stroke="#4a6a3a" stroke-width="1.5"/>
      <path d="M 5 -4 Q 9 -8 11 -10" fill="none" stroke="#4a6a3a" stroke-width="1.5"/>
    </g>
    <!-- 箭头3 -->
    <path d="M 75 -30 L 95 -30" fill="none" stroke="#c8843a" stroke-width="1.5"/>
    <path d="M 90 -33 L 97 -30 L 90 -27" fill="none" stroke="#c8843a" stroke-width="1.5"/>
    <!-- 青蛙 -->
    <g transform="translate(110, -25)">
      <ellipse cx="0" cy="0" rx="12" ry="9" fill="#5a8a3a" stroke="#2d6a4f" stroke-width="1.5"/>
      <circle cx="-8" cy="-6" r="5" fill="#5a8a3a" stroke="#2d6a4f" stroke-width="1.5" opacity="0.8"/>
      <circle cx="8" cy="-6" r="5" fill="#5a8a3a" stroke="#2d6a4f" stroke-width="1.5" opacity="0.8"/>
      <circle cx="-8" cy="-7" r="2" fill="#2a2a2a"/>
      <circle cx="8" cy="-7" r="2" fill="#2a2a2a"/>
      <path d="M -6 3 Q 0 6 6 3" fill="none" stroke="#2d6a4f" stroke-width="1.5"/>
    </g>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">几个月完成蜕变</text>
    <text x="0" y="43" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">先长后腿·再长前腿·尾缩成蛙</text>
  </g>

  <!-- 右侧：人的成长 -->
  <g transform="translate(630, 250)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#e07856">人的成长</text>
 <!-- 小孩 -->
    <g transform="translate(-25, -20)">
      <circle cx="0" cy="0" r="7" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-5" y="7" width="10" height="15" fill="#4a90b8" stroke="#7a3b14" stroke-width="1"/>
      <line x1="-3" y1="22" x2="-3" y2="30" stroke="#5a4a2a" stroke-width="2"/>
      <line x1="3" y1="22" x2="3" y2="30" stroke="#5a4a2a" stroke-width="2"/>
    </g>
    <!-- 箭头 -->
    <path d="M -10 -5 L 10 -5" fill="none" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="3,2"/>
    <path d="M 5 -8 L 12 -5 L 5 -2" fill="none" stroke="#e8a838" stroke-width="1.5"/>
    <!-- 大孩子 -->
    <g transform="translate(25, -30)">
      <circle cx="0" cy="0" r="9" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-7" y="9" width="14" height="22" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
      <line x1="-4" y1="31" x2="-4" y2="42" stroke="#5a4a2a" stroke-width="2.5"/>
      <line x1="4" y1="31" x2="4" y2="42" stroke="#5a4a2a" stroke-width="2.5"/>
    </g>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">夏天长得最快</text>
    <text x="0" y="53" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">阳光足·活动多·营养好</text>
    <text x="0" y="70" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">身体+精神双成长</text>
  </g>

  <!-- 下方：核心道理 -->
  <g transform="translate(400, 430)">
    <rect x="-280" y="0" width="560" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">竹子靠节间拉长、蝌蚪靠蜕变成蛙、人靠知识锻炼——</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="13" fill="#c8843a">万物各有生长之道，抓住黄金期才能茁壮成长</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">万物生长的季节：从竹子到蝌蚪到人，生命都在努力长大</text>
</svg>
