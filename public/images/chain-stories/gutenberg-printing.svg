<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="古腾堡印刷术插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#5a3a1a">古腾堡与活字印刷术</text>
  <line x1="250" y1="56" x2="550" y2="56" stroke="#c9952e" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8a6a3a">——让书本飞进千家万户</text>

  <!-- 地面 -->
  <rect x="0" y="500" width="800" height="100" fill="#d4b888" stroke="#a08858" stroke-width="2"/>

  <!-- 印刷机（主体） -->
  <g transform="translate(400, 350)">
    <text x="0" y="-180" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#5a3a1a">活字印刷机</text>
    <!-- 底座 -->
    <rect x="-100" y="80" width="200" height="40" fill="#6a4a2a" stroke="#3a2a1a" stroke-width="2.5" rx="4"/>
    <!-- 立柱 -->
    <rect x="-90" y="-40" width="15" height="120" fill="#6a4a2a" stroke="#3a2a1a" stroke-width="2"/>
    <rect x="75" y="-40" width="15" height="120" fill="#6a4a2a" stroke="#3a2a1a" stroke-width="2"/>
    <!-- 顶部横梁 -->
    <rect x="-100" y="-50" width="200" height="20" fill="#6a4a2a" stroke="#3a2a1a" stroke-width="2.5" rx="3"/>
    <!-- 螺旋压杆 -->
    <rect x="-8" y="-100" width="16" height="55" fill="#8a7a5a" stroke="#4a3a1a" stroke-width="2"/>
    <!-- 螺旋纹 -->
    <line x1="-8" y1="-90" x2="8" y2="-85" stroke="#4a3a1a" stroke-width="1.5"/>
    <line x1="-8" y1="-80" x2="8" y2="-75" stroke="#4a3a1a" stroke-width="1.5"/>
    <line x1="-8" y1="-70" x2="8" y2="-65" stroke="#4a3a1a" stroke-width="1.5"/>
    <line x1="-8" y1="-60" x2="8" y2="-55" stroke="#4a3a1a" stroke-width="1.5"/>
    <!-- 转盘（操作杆） -->
    <ellipse cx="0" cy="-105" rx="35" ry="8" fill="#8a7a5a" stroke="#4a3a1a" stroke-width="2"/>
    <line x1="-35" y1="-105" x2="35" y2="-105" stroke="#4a3a1a" stroke-width="2"/>
    <!-- 压板 -->
    <rect x="-60" y="20" width="120" height="15" fill="#5a4a3a" stroke="#2a1a0a" stroke-width="2" rx="2"/>
    <!-- 印刷台（放纸和活字版的地方） -->
    <rect x="-70" y="45" width="140" height="30" fill="#8a6a3a" stroke="#4a2a1a" stroke-width="2" rx="2"/>
    <!-- 活字版（排列的小字模） -->
    <g fill="#3a3a3a">
      <rect x="-60" y="50" width="8" height="8" rx="1"/>
      <rect x="-50" y="50" width="8" height="8" rx="1"/>
      <rect x="-40" y="50" width="8" height="8" rx="1"/>
      <rect x="-30" y="50" width="8" height="8" rx="1"/>
      <rect x="-20" y="50" width="8" height="8" rx="1"/>
      <rect x="-10" y="50" width="8" height="8" rx="1"/>
      <rect x="0" y="50" width="8" height="8" rx="1"/>
      <rect x="10" y="50" width="8" height="8" rx="1"/>
      <rect x="20" y="50" width="8" height="8" rx="1"/>
      <rect x="30" y="50" width="8" height="8" rx="1"/>
      <rect x="40" y="50" width="8" height="8" rx="1"/>
      <rect x="50" y="50" width="8" height="8" rx="1"/>
      <rect x="-60" y="60" width="8" height="8" rx="1"/>
      <rect x="-50" y="60" width="8" height="8" rx="1"/>
      <rect x="-40" y="60" width="8" height="8" rx="1"/>
      <rect x="-30" y="60" width="8" height="8" rx="1"/>
      <rect x="-20" y="60" width="8" height="8" rx="1"/>
      <rect x="-10" y="60" width="8" height="8" rx="1"/>
      <rect x="0" y="60" width="8" height="8" rx="1"/>
      <rect x="10" y="60" width="8" height="8" rx="1"/>
      <rect x="20" y="60" width="8" height="8" rx="1"/>
      <rect x="30" y="60" width="8" height="8" rx="1"/>
      <rect x="40" y="60" width="8" height="8" rx="1"/>
      <rect x="50" y="60" width="8" height="8" rx="1"/>
    </g>
  </g>
  <text x="400" y="445" text-anchor="middle" font-family="serif" font-size="12" fill="#7a5a2a">活字版（可反复排列组合）</text>

  <!-- 单个活字模（放大展示，左侧） -->
  <g transform="translate(130, 300)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" fill="#5a3a1a">单个活字</text>
    <!-- 放大镜框 -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#8a6a3a" stroke-width="3"/>
    <circle cx="0" cy="0" r="46" fill="#fffdf7" opacity="0.3"/>
    <!-- 字模 -->
    <rect x="-15" y="-20" width="30" height="40" fill="#5a4a3a" stroke="#2a1a0a" stroke-width="2" rx="2"/>
    <!-- 字面（反刻） -->
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="24" fill="#f4e0a0" font-weight="bold">A</text>
    <!-- 手柄 -->
    <line x1="35" y1="35" x2="60" y2="60" stroke="#8a6a3a" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- 印好的书页（右侧） -->
  <g transform="translate(650, 300)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" fill="#5a3a1a">印好的书页</text>
    <!-- 书本 -->
    <rect x="-45" y="-40" width="90" height="70" fill="#faf5e8" stroke="#8a6a3a" stroke-width="2" rx="2"/>
    <!-- 文字行 -->
    <g stroke="#5a3a1a" stroke-width="1" fill="none">
      <line x1="-35" y1="-28" x2="35" y2="-28"/>
      <line x1="-35" y1="-18" x2="35" y2="-18"/>
      <line x1="-35" y1="-8" x2="30" y2="-8"/>
      <line x1="-35" y1="2" x2="35" y2="2"/>
      <line x1="-35" y1="12" x2="25" y2="12"/>
      <line x1="-35" y1="22" x2="35" y2="22"/>
    </g>
    <!-- 首字母装饰 -->
    <rect x="-38" y="-32" width="10" height="10" fill="#c44a3a" opacity="0.3"/>
  </g>

  <!-- 古腾堡人物（左下角） -->
  <g transform="translate(150, 460)">
    <text x="0" y="-75" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#5a3a1a">古腾堡</text>
    <!-- 头 -->
    <circle cx="0" cy="-35" r="18" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 帽子（15世纪欧洲帽） -->
    <path d="M-18 -40 Q0 -58 18 -40 L15 -35 L-15 -35 Z" fill="#4a3a2a" stroke="#2a1a0a" stroke-width="1.5"/>
    <!-- 胡子 -->
    <path d="M-10 -28 Q0 -18 10 -28" fill="none" stroke="#5a4a3a" stroke-width="2"/>
    <!-- 眼睛 -->
    <circle cx="-6" cy="-35" r="2" fill="#1a1a1a"/>
    <circle cx="6" cy="-35" r="2" fill="#1a1a1a"/>
    <!-- 身体 -->
    <path d="M-18 -18 L-25 35 L25 35 L18 -18 Z" fill="#5a4a6a" stroke="#2a3a4a" stroke-width="2"/>
    <!-- 衣领 -->
    <path d="M-6 -18 L0 -5 L6 -18" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="1.5"/>
  </g>

  <!-- 时间标注 -->
  <g transform="translate(680, 460)">
    <rect x="-55" y="-20" width="110" height="40" rx="6" fill="#fffdf7" stroke="#c9952e" stroke-width="1.5" opacity="0.85"/>
    <text x="0" y="-3" text-anchor="middle" font-family="serif" font-size="13" fill="#5a3a1a">约1450年</text>
    <text x="0" y="13" text-anchor="middle" font-family="serif" font-size="11" fill="#7a5a2a">德国·美因茨</text>
  </g>

  <!-- 连接箭头：蔡伦造纸 → 古腾堡印刷 -->
  <g transform="translate(400, 130)">
    <rect x="-160" y="0" width="320" height="45" rx="8" fill="#fffdf7" stroke="#c9952e" stroke-width="1.5" opacity="0.9"/>
    <text x="-90" y="28" text-anchor="middle" font-family="serif" font-size="13" fill="#5a3a1a">蔡伦造纸（105年）</text>
    <path d="M-30 22 L30 22" stroke="#c9952e" stroke-width="2.5" marker-end="url(#arrowG)"/>
    <text x="90" y="28" text-anchor="middle" font-family="serif" font-size="13" fill="#5a3a1a">古腾堡印刷（1450年）</text>
  </g>
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#c9952e"/>
    </marker>
  </defs>
</svg>
