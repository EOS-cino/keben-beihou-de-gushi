<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="沙漠绿洲的形成插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">沙漠里为什么有绿洲</text>
  <line x1="240" y1="56" x2="560" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——水从远方来，在地下旅行</text>

  <!-- 截面图：山→沙漠→绿洲 -->
  <!-- 天空 -->
  <rect x="0" y="90" width="800" height="100" fill="#a8d0e8" opacity="0.3"/>
  <!-- 太阳 -->
  <circle cx="700" cy="120" r="20" fill="#e07856" opacity="0.6"/>

  <!-- 山（左侧） -->
  <path d="M0 300 L100 120 L200 300 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="2"/>
  <path d="M80 160 L100 120 L120 160" fill="#fef9ed" opacity="0.7"/>
  <text x="100" y="200" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">山脉</text>
  <!-- 雨雪 -->
  <g stroke="#7ab8d8" stroke-width="2" stroke-linecap="round">
    <line x1="70" y1="140" x2="65" y2="155"/>
    <line x1="90" y1="135" x2="85" y2="150"/>
    <line x1="110" y1="140" x2="105" y2="155"/>
    <line x1="130" y1="145" x2="125" y2="160"/>
  </g>
  <text x="100" y="110" text-anchor="middle" font-family="serif" font-size="10" fill="#4a6a8f">山上雨雪</text>

  <!-- 地下结构 -->
  <!-- 地表 -->
  <rect x="0" y="300" width="800" height="300" fill="#e0c898"/>
  <!-- 不透水岩层 -->
  <path d="M0 350 Q200 340 400 350 Q600 345 800 355 L800 380 Q600 375 400 380 Q200 375 0 380 Z" fill="#7a3b14" opacity="0.4"/>
  <text x="400" y="370" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14" opacity="0.6">不透水岩层</text>

  <!-- 地下水流（从山到沙漠） -->
  <path d="M150 300 Q200 320 300 330 Q400 340 500 335 Q550 335 580 340" fill="none" stroke="#7ab8d8" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M150 300 Q200 320 300 330 Q400 340 500 335 Q550 335 580 340" fill="none" stroke="#a8d0e8" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="300" y="325" text-anchor="middle" font-family="serif" font-size="10" fill="#4a6a8f">地下水慢慢流</text>
  <text x="300" y="338" text-anchor="middle" font-family="serif" font-size="9" fill="#4a6a8f">一天只走几米</text>

  <!-- 沙漠 -->
  <rect x="200" y="300" width="600" height="300" fill="#c8843a" opacity="0.2"/>
  <!-- 沙丘 -->
  <path d="M200 310 Q300 300 400 315 Q500 305 600 320 Q700 310 800 320" fill="none" stroke="#c8843a" stroke-width="2" opacity="0.3"/>

  <!-- 绿洲（水涌出） -->
  <g transform="translate(580, 340)">
    <!-- 泉水涌出 -->
    <circle cx="0" cy="0" r="10" fill="#7ab8d8" opacity="0.6"/>
    <path d="M-8 -5 Q-12 -15 -8 -20 M0 -8 Q0 -20 0 -25 M8 -5 Q12 -15 8 -20" fill="none" stroke="#7ab8d8" stroke-width="2"/>
    <text x="40" y="-5" font-family="serif" font-size="10" fill="#4a6a8f">泉水涌出</text>
  </g>

  <!-- 绿洲地面 -->
  <ellipse cx="580" cy="380" rx="100" ry="25" fill="#6a8d3f" opacity="0.4"/>
  <!-- 水池 -->
  <ellipse cx="580" cy="385" rx="50" ry="15" fill="#7ab8d8" stroke="#4a6a8f" stroke-width="2"/>
  <ellipse cx="580" cy="383" rx="40" ry="10" fill="#a8d0e8" opacity="0.5"/>

  <!-- 椰枣树 -->
  <g transform="translate(530, 370)">
    <path d="M0 30 Q2 15 0 -20" fill="none" stroke="#8d5a36" stroke-width="6" stroke-linecap="round"/>
    <g stroke="#4a6a2f" stroke-width="2.5" fill="none">
      <path d="M0 -20 Q-15 -30 -25 -28"/>
      <path d="M0 -20 Q-18 -25 -30 -20"/>
      <path d="M0 -20 Q0 -35 0 -40"/>
      <path d="M0 -20 Q18 -25 30 -20"/>
      <path d="M0 -20 Q15 -30 25 -28"/>
    </g>
  </g>
  <g transform="translate(630, 370)">
    <path d="M0 30 Q-2 15 0 -20" fill="none" stroke="#8d5a36" stroke-width="6" stroke-linecap="round"/>
    <g stroke="#4a6a2f" stroke-width="2.5" fill="none">
      <path d="M0 -20 Q-15 -30 -25 -28"/>
      <path d="M0 -20 Q-18 -25 -30 -20"/>
      <path d="M0 -20 Q0 -35 0 -40"/>
      <path d="M0 -20 Q18 -25 30 -20"/>
      <path d="M0 -20 Q15 -30 25 -28"/>
    </g>
  </g>

  <!-- 三种水源 -->
  <g transform="translate(150, 460)">
    <rect x="-90" y="0" width="180" height="70" rx="8" fill="#fef9ed" stroke="#7ab8d8" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#7ab8d8" font-weight="bold">水源1：地下水</text>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">远处山上雨雪渗入地下</text>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">流到沙漠低洼处涌出</text>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">可能流了几十年~几百年</text>
  </g>

  <g transform="translate(400, 460)">
    <rect x="-90" y="0" width="180" height="70" rx="8" fill="#fef9ed" stroke="#6a8d3f" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#6a8d3f" font-weight="bold">水源2：河流</text>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">河流穿过沙漠</text>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">两岸就是绿洲</text>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">如尼罗河·塔里木河</text>
  </g>

  <g transform="translate(650, 460)">
    <rect x="-90" y="0" width="180" height="70" rx="8" fill="#fef9ed" stroke="#c84a3a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a" font-weight="bold">水源3：人工</text>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">打深井抽地下水</text>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">修渠引水灌溉</text>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="9" fill="#c84a3a">抽太快→地下水枯竭</text>
  </g>

  <!-- 底部标注 -->
  <g transform="translate(400, 570)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">绿洲是沙漠中的奇迹，也是脆弱的——楼兰古城就因水源枯竭被沙漠吞没</text>
  </g>
</svg>
