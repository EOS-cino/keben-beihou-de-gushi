<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="史铁生在轮椅上写作的人生故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">史铁生的写作</text>
  <line x1="310" y1="58" x2="490" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 三个人生阶段 -->

  <!-- 阶段1：21岁瘫痪 -->
  <g transform="translate(140, 170)">
    <rect x="-90" y="-80" width="180" height="170" rx="8" fill="#fff6df" stroke="#c84a3a" stroke-width="2"/>
    <text x="0" y="-58" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">21岁：双腿瘫痪</text>
    <!-- 轮椅上的人 -->
    <g transform="translate(0, 0)">
      <!-- 轮椅轮子 -->
      <circle cx="-15" cy="35" r="18" fill="none" stroke="#7a3b14" stroke-width="2"/>
      <circle cx="-15" cy="35" r="3" fill="#7a3b14"/>
      <circle cx="15" cy="35" r="18" fill="none" stroke="#7a3b14" stroke-width="2"/>
      <circle cx="15" cy="35" r="3" fill="#7a3b14"/>
      <!-- 轮椅座 -->
      <rect x="-20" y="10" width="40" height="15" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 身体 -->
      <ellipse cx="0" cy="-5" rx="12" ry="15" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 头（低垂） -->
      <circle cx="0" cy="-25" r="10" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-8 -28 Q-10 -35 0 -36 Q10 -35 8 -28" fill="#1a1a1a" stroke="#7a3b14" stroke-width="1"/>
      <!-- 眼睛（悲伤） -->
      <path d="M-4 -25 Q-2 -23 0 -25" fill="none" stroke="#7a3b14" stroke-width="1"/>
      <path d="M0 -25 Q2 -23 4 -25" fill="none" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">曾经绝望</text>
    <text x="0" y="82" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">"活着有什么意义？"</text>
  </g>

  <!-- 箭头 -->
  <path d="M235 170 L285 170" stroke="#c8843a" stroke-width="3" fill="none" marker-end="url(#ar7)"/>

  <!-- 阶段2：地坛思考 -->
  <g transform="translate(400, 170)">
    <rect x="-90" y="-80" width="180" height="170" rx="8" fill="#fff6df" stroke="#6a8d3f" stroke-width="2"/>
    <text x="0" y="-58" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">地坛：思考人生</text>
    <!-- 古树 -->
    <rect x="-3" y="-10" width="6" height="40" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="0" cy="-20" rx="30" ry="25" fill="#6a8d3f" opacity="0.5" stroke="#4a6a2f" stroke-width="1"/>
    <!-- 轮椅在树下 -->
    <g transform="translate(0, 25)">
      <circle cx="-12" cy="10" r="10" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="12" cy="10" r="10" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-15" y="-5" width="30" height="10" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1"/>
      <ellipse cx="0" cy="-15" rx="8" ry="10" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-28" r="7" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
      <!-- 仰头看天 -->
      <path d="M0 -32 Q3 -35 0 -38" fill="none" stroke="#7a3b14" stroke-width="0.5"/>
    </g>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">"地坛等了我四百年"</text>
    <text x="0" y="82" text-anchor="middle" font-family="serif" font-size="11" fill="#6a8d3f">思考生与死</text>
  </g>

  <!-- 箭头 -->
  <path d="M495 170 L545 170" stroke="#c8843a" stroke-width="3" fill="none" marker-end="url(#ar7)"/>

  <!-- 阶段3：用笔行走 -->
  <g transform="translate(660, 170)">
    <rect x="-80" y="-80" width="160" height="170" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="2"/>
    <text x="0" y="-58" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">写作：用笔行走</text>
    <!-- 桌子 -->
    <rect x="-35" y="10" width="70" height="8" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    <!-- 稿纸 -->
    <rect x="-25" y="-5" width="50" height="15" fill="#fff6df" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#c8843a" stroke-width="0.5"/>
    <line x1="-20" y1="5" x2="15" y2="5" stroke="#c8843a" stroke-width="0.5"/>
    <!-- 笔 -->
    <rect x="5" y="-8" width="20" height="4" fill="#c84a3a" stroke="#7a3b14" stroke-width="1" rx="1"/>
    <!-- 人（坐着写作） -->
    <g transform="translate(-15, -10)">
      <ellipse cx="0" cy="5" rx="10" ry="12" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="0" cy="-10" r="8" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-2" cy="-11" r="1" fill="#7a3b14"/>
      <circle cx="2" cy="-11" r="1" fill="#7a3b14"/>
      <path d="M-2 -7 Q0 -5 2 -7" fill="none" stroke="#7a3b14" stroke-width="0.8"/>
      <!-- 手握笔 -->
      <path d="M8 0 Q15 -2 20 -5" fill="none" stroke="#4a6a2f" stroke-width="4" stroke-linecap="round"/>
    </g>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">"写作是为了不自杀"</text>
    <text x="0" y="82" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">用笔走出更远的路</text>
  </g>

  <!-- 底部：名言与精神 -->
  <g transform="translate(0, 360)">
    <rect x="60" y="0" width="680" height="190" rx="10" fill="#fff6df" stroke="#c8843a" stroke-width="2"/>
    <text x="400" y="28" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">史铁生的生命哲学</text>

    <!-- 名言1 -->
    <g transform="translate(180, 60)">
      <rect x="-100" y="0" width="200" height="40" rx="4" fill="#fff6df" stroke="#6a8d3f" stroke-width="1"/>
      <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">"写作不是为了赚钱出名</text>
      <text x="0" y="33" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">是为了不自杀"</text>
    </g>

    <!-- 名言2 -->
    <g transform="translate(500, 60)">
      <rect x="-100" y="0" width="200" height="40" rx="4" fill="#fff6df" stroke="#c84a3a" stroke-width="1"/>
      <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">"生病也是生活的</text>
      <text x="0" y="33" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">一种体验"</text>
    </g>

    <!-- 名言3 -->
    <g transform="translate(340, 120)">
      <rect x="-130" y="0" width="260" height="40" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
      <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">"我一生都很幸运"</text>
      <text x="0" y="33" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">——一个双腿瘫痪、身患重病的人如是说</text>
    </g>

    <text x="400" y="180" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">身体可以被禁锢，但灵魂可以自由飞翔</text>
  </g>

  <defs>
    <marker id="ar7" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#c8843a"/>
    </marker>
  </defs>

  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">从绝望到写作——史铁生用笔走出了比双腿更远的路</text>
</svg>
