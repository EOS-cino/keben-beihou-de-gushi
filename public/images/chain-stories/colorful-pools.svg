<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="黄龙五彩池的成因插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">黄龙五彩池的成因</text>
  <line x1="250" y1="56" x2="550" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——大自然花几万年"画"出来的</text>

  <!-- 山的截面图 -->
  <!-- 山顶（石灰岩） -->
  <path d="M100 200 L300 120 L500 200 Z" fill="#d4c8a0" stroke="#8d5a36" stroke-width="2"/>
  <text x="300" y="160" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">石灰岩山体</text>

  <!-- 雨雪 -->
  <g stroke="#7ab8d8" stroke-width="2" stroke-linecap="round">
    <line x1="200" y1="100" x2="195" y2="115"/>
    <line x1="250" y1="95" x2="245" y2="110"/>
    <line x1="300" y1="90" x2="295" y2="105"/>
    <line x1="350" y1="95" x2="345" y2="110"/>
    <line x1="400" y1="100" x2="395" y2="115"/>
  </g>
  <text x="300" y="85" text-anchor="middle" font-family="serif" font-size="10" fill="#4a6a8f">雨雪渗入地下</text>

  <!-- 地下水流（溶解碳酸钙） -->
  <path d="M300 200 Q320 250 350 280 Q380 310 400 340" fill="none" stroke="#7ab8d8" stroke-width="4" stroke-dasharray="5 3" opacity="0.6"/>
  <text x="380" y="270" font-family="serif" font-size="10" fill="#4a6a8f">地下水溶解碳酸钙</text>

  <!-- 泉水涌出 -->
  <g transform="translate(400, 340)">
    <circle cx="0" cy="0" r="8" fill="#7ab8d8" opacity="0.5"/>
    <path d="M-5 -5 Q-10 -15 -5 -20" fill="none" stroke="#7ab8d8" stroke-width="2"/>
    <path d="M5 -5 Q10 -15 5 -20" fill="none" stroke="#7ab8d8" stroke-width="2"/>
    <text x="30" y="0" font-family="serif" font-size="10" fill="#4a6a8f">泉水涌出</text>
  </g>

  <!-- 钙化沉积过程 -->
  <g transform="translate(400, 380)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">CO₂逸出→碳酸钙沉淀→堆积成堤坝→水被拦住成池</text>
  </g>

  <!-- 水池（彩色） -->
  <g transform="translate(200, 420)">
    <path d="M-40 0 Q-50 12 -40 20 Q0 25 40 20 Q50 12 40 0 Q0 -5 -40 0" fill="#7ab8d8" stroke="#c8843a" stroke-width="2"/>
    <ellipse cx="0" cy="5" rx="30" ry="8" fill="#a8d0e8" opacity="0.5"/>
  </g>
  <g transform="translate(340, 430)">
    <path d="M-45 0 Q-55 12 -45 20 Q0 25 45 20 Q55 12 45 0 Q0 -5 -45 0" fill="#6a8d3f" stroke="#c8843a" stroke-width="2"/>
    <ellipse cx="0" cy="5" rx="35" ry="9" fill="#8ab060" opacity="0.5"/>
  </g>
  <g transform="translate(480, 425)">
    <path d="M-40 0 Q-50 12 -40 20 Q0 25 40 20 Q50 12 40 0 Q0 -5 -40 0" fill="#c8843a" stroke="#7a3b14" stroke-width="2"/>
    <ellipse cx="0" cy="5" rx="30" ry="8" fill="#e0a050" opacity="0.5"/>
  </g>
  <g transform="translate(610, 430)">
    <path d="M-35 0 Q-45 12 -35 20 Q0 25 35 20 Q45 12 35 0 Q0 -5 -35 0" fill="#e07856" stroke="#c8843a" stroke-width="2"/>
    <ellipse cx="0" cy="5" rx="25" ry="7" fill="#f0a080" opacity="0.5"/>
  </g>

  <!-- 颜色原因三栏 -->
  <g transform="translate(150, 490)">
    <rect x="-80" y="0" width="160" height="70" rx="8" fill="#fef9ed" stroke="#7ab8d8" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#7ab8d8" font-weight="bold">原因1：水深</text>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">浅→白偏蓝</text>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">深→绿偏蓝</text>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">白色钙化底反射光</text>
  </g>

  <g transform="translate(400, 490)">
    <rect x="-80" y="0" width="160" height="70" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a" font-weight="bold">原因2：矿物质</text>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">碳酸钙=白色</text>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">微量铁·镁等元素</text>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">不同元素反射不同色光</text>
  </g>

  <g transform="translate(650, 490)">
    <rect x="-80" y="0" width="160" height="70" rx="8" fill="#fef9ed" stroke="#6a8d3f" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#6a8d3f" font-weight="bold">原因3：藻类</text>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">绿色藻→偏绿</text>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">褐色藻→偏黄</text>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">长在池底影响颜色</text>
  </g>

  <!-- 沉积速度标注 -->
  <g transform="translate(700, 250)">
    <rect x="-70" y="0" width="140" height="50" rx="8" fill="#fef9ed" stroke="#c84a3a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a" font-weight="bold">沉积速度</text>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">每年几毫米~一两厘米</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">几万年才长成现在的样子</text>
  </g>
</svg>
