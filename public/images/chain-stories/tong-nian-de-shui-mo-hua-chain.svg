<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠小故事：诗里画里的童年">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：诗里画里的童年</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">拼起来，就是一首长诗</text>
  <g transform="translate(150,300)">
    <path d="M-20,30 q-10,-30 10,-30 q10,30 0,30" fill="#cfe6c0" stroke="#5a8a3a" stroke-width="2"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#3a6b2a">放纸鸢</text>
  </g>
  <g transform="translate(330,300)">
    <circle cx="0" cy="0" r="10" fill="#e8b94a" stroke="#c98a3a" stroke-width="2"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#a8742a">追黄蝶</text>
  </g>
  <g transform="translate(510,300)">
    <ellipse cx="0" cy="10" rx="16" ry="10" fill="#8fb86a" stroke="#3a6b2a" stroke-width="2"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#3a6b2a">剥莲蓬</text>
  </g>
  <g transform="translate(690,300)">
    <path d="M-40,40 Q0,30 40,40 L40,50 L-40,50 Z" fill="#7fb8a8" stroke="#2a6b5a" stroke-width="2"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#2a6b5a">溪边钓</text>
  </g>
  <text x="420" y="430" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">每一首，都是童年的画</text>
</svg>
