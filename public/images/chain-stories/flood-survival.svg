<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="洪水自救知识和逃生方法的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">洪水来了怎么办</text>
  <line x1="290" y1="58" x2="510" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 四个自救要点 -->

  <!-- 要点1：往高处跑 -->
  <g transform="translate(130, 140)">
    <rect x="-85" y="-70" width="170" height="150" rx="8" fill="#fff6df" stroke="#c84a3a" stroke-width="2"/>
    <text x="0" y="-48" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">1.往高处跑</text>
    <!-- 山坡 -->
    <path d="M-50 30 L0 -20 L50 30 Z" fill="#6a8d3f" opacity="0.4" stroke="#4a6a2f" stroke-width="1.5"/>
    <!-- 人跑上山 -->
    <g transform="translate(0, -5)">
      <ellipse cx="0" cy="0" rx="6" ry="8" fill="#c84a3a" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-8" r="4" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <!-- 箭头向上 -->
    <path d="M0 -15 L0 -30 M-4 -25 L0 -30 L4 -25" fill="none" stroke="#c84a3a" stroke-width="2"/>
    <!-- 洪水 -->
    <path d="M-50 30 Q-40 28 -30 30 Q-20 28 -10 30" fill="none" stroke="#8d5a36" stroke-width="2" opacity="0.4"/>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">往山坡、楼顶跑</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">不要往低处跑</text>
  </g>

  <!-- 要点2：不要蹚水 -->
  <g transform="translate(400, 140)">
    <rect x="-85" y="-70" width="170" height="150" rx="8" fill="#fff6df" stroke="#7ab8d8" stroke-width="2"/>
    <text x="0" y="-48" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">2.不要蹚水</text>
    <!-- 水面 -->
    <rect x="-50" y="0" width="100" height="30" fill="#7ab8d8" opacity="0.3"/>
    <path d="M-50 5 Q-30 3 -10 5 Q10 3 30 5 Q50 3 50 5" fill="none" stroke="#a8d0e8" stroke-width="1.5"/>
    <!-- 禁止符号 -->
    <circle cx="0" cy="-10" r="22" fill="none" stroke="#c84a3a" stroke-width="3"/>
    <line x1="-15" y1="-25" x2="15" y2="5" stroke="#c84a3a" stroke-width="3"/>
    <!-- 人被冲倒 -->
    <g transform="translate(0, 15)">
      <ellipse cx="0" cy="0" rx="6" ry="4" fill="#c84a3a" stroke="#7a3b14" stroke-width="1" opacity="0.5"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">十几厘米水能冲倒人</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">不要蹚水过河</text>
  </g>

  <!-- 要点3：爬上高处等待 -->
  <g transform="translate(670, 140)">
    <rect x="-85" y="-70" width="170" height="150" rx="8" fill="#fff6df" stroke="#6a8d3f" stroke-width="2"/>
    <text x="0" y="-48" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">3.爬高处等待</text>
    <!-- 大树 -->
    <rect x="-3" y="-15" width="6" height="45" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="0" cy="-20" rx="25" ry="20" fill="#6a8d3f" opacity="0.6" stroke="#4a6a2f" stroke-width="1"/>
    <!-- 人在树上 -->
    <g transform="translate(0, -25)">
      <ellipse cx="0" cy="0" rx="5" ry="6" fill="#c84a3a" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-6" r="3.5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <!-- 洪水 -->
    <rect x="-50" y="20" width="100" height="15" fill="#8d5a36" opacity="0.3"/>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">爬上屋顶或大树</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#6a8d3f">等待救援</text>
  </g>

  <!-- 要点4：有序过桥 -->
  <g transform="translate(265, 370)">
    <rect x="-85" y="-60" width="170" height="130" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="2"/>
    <text x="0" y="-38" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">4.有序过桥</text>
    <!-- 桥 -->
    <rect x="-50" y="0" width="100" height="6" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    <!-- 排队的人 -->
    <g transform="translate(-30, -5)">
      <ellipse cx="0" cy="0" rx="4" ry="5" fill="#c84a3a" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-5" r="3" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <g transform="translate(-15, -5)">
      <ellipse cx="0" cy="0" rx="4" ry="5" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-5" r="3" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <g transform="translate(0, -5)">
      <ellipse cx="0" cy="0" rx="4" ry="5" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-5" r="3" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <g transform="translate(15, -5)">
      <ellipse cx="0" cy="0" rx="4" ry="5" fill="#6a8d3f" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-5" r="3" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">排好队，一个一个过</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">不要挤，不要抢</text>
  </g>

  <!-- 要点5：洪水后注意 -->
  <g transform="translate(535, 370)">
    <rect x="-85" y="-60" width="170" height="130" rx="8" fill="#fff6df" stroke="#e07856" stroke-width="2"/>
    <text x="0" y="-38" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">5.洪水后注意</text>
    <text x="0" y="-15" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">等通知再回家</text>
    <text x="0" y="3" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">检查房屋是否安全</text>
    <text x="0" y="21" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">不喝生水</text>
    <text x="0" y="39" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">不吃洪水泡过的食物</text>
    <text x="0" y="57" text-anchor="middle" font-family="serif" font-size="11" fill="#e07856">小心电线漏电</text>
  </g>

  <!-- 底部总结 -->
  <rect x="80" y="500" width="640" height="60" rx="8" fill="#fff6df" stroke="#c84a3a" stroke-width="2"/>
  <text x="400" y="525" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">洪水来了：往高处跑、不蹚水、等救援</text>
  <text x="400" y="548" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">提前关注预警信息，关键时刻能救命</text>

  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">中国是洪水多发的国家——学习自救知识，保护自己和家人</text>
</svg>
