<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠小故事：伪装终究会被识破">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：伪装终究会被识破</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">靠骗得来的，终究不长久</text>
  <g transform="translate(150,300)">
    <ellipse cx="0" cy="20" rx="36" ry="24" fill="#f0e6cf" stroke="#7a4a1a" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="20" ry="18" fill="#f0e6cf" stroke="#7a4a1a" stroke-width="2"/>
    <text x="0" y="90" text-anchor="middle" font-family="serif" font-size="15" fill="#7a4a1a">披羊皮的狼</text>
  </g>
  <g transform="translate(400,300)">
    <rect x="-30" y="-20" width="60" height="50" rx="6" fill="#c0392b" stroke="#7a1a1a" stroke-width="2"/>
    <circle cx="-8" cy="-4" r="4" fill="#fbe9a8"/><circle cx="8" cy="-4" r="4" fill="#fbe9a8"/>
    <text x="0" y="90" text-anchor="middle" font-family="serif" font-size="15" fill="#c0392b">装外婆的狼</text>
  </g>
  <g transform="translate(650,300)">
    <ellipse cx="0" cy="20" rx="30" ry="20" fill="#e8b94a" stroke="#c98a3a" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="16" ry="14" fill="#e8b94a" stroke="#c98a3a" stroke-width="2"/>
    <path d="M16,10 L40,30" stroke="#c98a3a" stroke-width="2"/>
    <text x="0" y="90" text-anchor="middle" font-family="serif" font-size="15" fill="#a8742a">狐假虎威</text>
  </g>
  <text x="400" y="460" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">伪装再像，总有露馅时</text>
</svg>
