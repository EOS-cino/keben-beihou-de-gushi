<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="童第周从落后到成为大科学家的成长故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">童第周的故事</text>
  <line x1="330" y1="58" x2="470" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 四个成长阶段 -->

  <!-- 阶段1：农村少年 -->
  <g transform="translate(100, 130)">
    <rect x="-80" y="-60" width="160" height="160" rx="8" fill="#fff6df" stroke="#6a8d3f" stroke-width="2"/>
    <text x="0" y="-38" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">农村少年</text>
    <!-- 农田背景 -->
    <rect x="-60" y="-20" width="120" height="50" fill="#6a8d3f" opacity="0.2"/>
    <!-- 少年干农活 -->
    <g transform="translate(0, 10)">
      <ellipse cx="0" cy="5" rx="12" ry="8" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-8" r="8" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
      <!-- 锄头 -->
      <line x1="10" y1="0" x2="20" y2="-15" stroke="#8d5a36" stroke-width="2"/>
      <path d="M20 -15 L26 -12 L22 -8" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">17岁才上中学</text>
    <text x="0" y="72" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">家里穷，起步晚</text>
  </g>

  <!-- 箭头 -->
  <path d="M195 130 L245 130" stroke="#c8843a" stroke-width="3" fill="none" marker-end="url(#ar3)"/>

  <!-- 阶段2：苦读追赶 -->
  <g transform="translate(330, 130)">
    <rect x="-80" y="-60" width="160" height="160" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="2"/>
    <text x="0" y="-38" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">苦读追赶</text>
    <!-- 路灯下读书 -->
    <line x1="-20" y1="-15" x2="-20" y2="20" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="-20" cy="-18" r="8" fill="#e07856" opacity="0.6"/>
    <g transform="translate(10, 15)">
      <ellipse cx="0" cy="5" rx="10" ry="7" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-6" r="7" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
      <rect x="-8" y="0" width="16" height="10" fill="#fff6df" stroke="#7a3b14" stroke-width="0.5"/>
    </g>
    <!-- 成绩上升箭头 -->
    <path d="M30 -10 L40 -25 L50 -10" fill="none" stroke="#c84a3a" stroke-width="2"/>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">天不亮就起床</text>
    <text x="0" y="72" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">倒数变正数第一</text>
  </g>

  <!-- 箭头 -->
  <path d="M425 130 L475 130" stroke="#c8843a" stroke-width="3" fill="none" marker-end="url(#ar3)"/>

  <!-- 阶段3：比利时留学 -->
  <g transform="translate(560, 130)">
    <rect x="-80" y="-60" width="160" height="160" rx="8" fill="#fff6df" stroke="#7ab8d8" stroke-width="2"/>
    <text x="0" y="-38" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">比利时留学</text>
    <!-- 显微镜 -->
    <g transform="translate(-20, 10)">
      <rect x="-6" y="15" width="12" height="8" fill="#7a3b14"/>
      <rect x="-3" y="0" width="6" height="16" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-3" r="6" fill="#a8d0e8" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <!-- 玻璃针 -->
    <line x1="10" y1="15" x2="30" y2="5" stroke="#a8d0e8" stroke-width="1.5"/>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">被人看不起</text>
    <text x="0" y="72" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">自己磨针做实验</text>
  </g>

  <!-- 阶段4：世界级成果 -->
  <g transform="translate(690, 130)">
    <rect x="-70" y="-60" width="140" height="160" rx="8" fill="#fff6df" stroke="#c84a3a" stroke-width="2"/>
    <text x="0" y="-38" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">世界级成果</text>
    <!-- 童鱼 -->
    <g transform="translate(0, 10)">
      <ellipse cx="0" cy="0" rx="18" ry="9" fill="#7ab8d8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M18 0 L28 -6 L28 6 Z" fill="#7ab8d8" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-8" cy="-2" r="2" fill="#7a3b14"/>
      <text x="0" y="3" text-anchor="middle" font-family="serif" font-size="8" fill="#7a3b14">童鱼</text>
    </g>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">克隆"童鱼"</text>
    <text x="0" y="72" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">比多莉羊早30年</text>
  </g>

  <!-- 底部：回国后的艰苦条件 -->
  <g transform="translate(0, 330)">
    <rect x="60" y="0" width="680" height="200" rx="10" fill="#fff6df" stroke="#c8843a" stroke-width="2"/>
    <text x="400" y="30" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">回国后：在艰苦条件下继续研究</text>

    <!-- 三个困难与对策 -->
    <g transform="translate(170, 70)">
      <rect x="-50" y="0" width="100" height="30" rx="4" fill="#c84a3a" opacity="0.2" stroke="#c84a3a" stroke-width="1"/>
      <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">没有实验室</text>
      <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="12" fill="#6a8d3f">→ 破庙里搭一个</text>
    </g>
    <g transform="translate(400, 70)">
      <rect x="-50" y="0" width="100" height="30" rx="4" fill="#c84a3a" opacity="0.2" stroke="#c84a3a" stroke-width="1"/>
      <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">没有显微镜</text>
      <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="12" fill="#6a8d3f">→ 借钱买旧的</text>
    </g>
    <g transform="translate(630, 70)">
      <rect x="-50" y="0" width="100" height="30" rx="4" fill="#c84a3a" opacity="0.2" stroke="#c84a3a" stroke-width="1"/>
      <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">没有实验材料</text>
      <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="12" fill="#6a8d3f">→ 自己捞青蛙</text>
    </g>

    <text x="400" y="140" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">条件差不是借口，"一定要争气"的信念才是关键</text>
    <text x="400" y="170" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">从农村穷孩子到世界级科学家——努力改变命运</text>
  </g>

  <defs>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#c8843a"/>
    </marker>
  </defs>

  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">童第周用一辈子证明：中国人不比任何人差</text>
</svg>
