<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="杨桃不同角度截面形状示意图">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">杨桃到底长什么样</text>
  <line x="300" y1="56" x2="500" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 杨桃整体（3D示意） -->
  <g transform="translate(400,180)">
    <text x="0" y="-80" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">杨桃的真实形状</text>
    <!-- 杨桃主体 -->
    <ellipse cx="0" cy="0" rx="60" ry="30" fill="#e0d848" stroke="#8d7a2a" stroke-width="2"/>
    <!-- 五条棱 -->
    <path d="M-60 0 Q0 -22 60 0" fill="none" stroke="#c8a830" stroke-width="2"/>
    <path d="M-60 0 Q0 22 60 0" fill="none" stroke="#c8a830" stroke-width="2"/>
    <path d="M-55 -12 Q0 -28 55 -12" fill="none" stroke="#c8a830" stroke-width="1.5"/>
    <path d="M-55 12 Q0 28 55 12" fill="none" stroke="#c8a830" stroke-width="1.5"/>
    <path d="M-60 0 L60 0" fill="none" stroke="#c8a830" stroke-width="1" opacity="0.5"/>
    <!-- 高光 -->
    <ellipse cx="-15" cy="-10" rx="12" ry="6" fill="#f4ec68" opacity="0.5"/>
    <!-- 五条棱标注 -->
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">有五条棱的椭圆形果实</text>
  </g>

  <!-- 分隔线 -->
  <line x1="60" y1="280" x2="740" y2="280" stroke="#c8843a" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- 三种视角对比 -->
  <text x="400" y="315" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">三种视角，三种样子</text>

  <!-- 视角1：侧面 -->
  <g transform="translate(160,420)">
    <rect x="-90" y="-70" width="180" height="150" fill="#e8f5d8" stroke="#6a8d3f" stroke-width="1.5" rx="8"/>
    <text x="0" y="-48" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#4a6a2f">侧面看</text>
    <ellipse cx="0" cy="0" rx="45" ry="20" fill="#e0d848" stroke="#8d7a2a" stroke-width="2"/>
    <path d="M-45 0 Q0 -15 45 0" fill="none" stroke="#c8a830" stroke-width="1.5"/>
    <path d="M-45 0 Q0 15 45 0" fill="none" stroke="#c8a830" stroke-width="1.5"/>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="12" fill="#4a6a2f">椭圆形</text>
    <text x="0" y="58" text-anchor="middle" font-family="serif" font-size="10" fill="#4a6a2f">大多数人看到的样子</text>
  </g>

  <!-- 视角2：正面 -->
  <g transform="translate(400,420)">
    <rect x="-90" y="-70" width="180" height="150" fill="#fff0e0" stroke="#c8843a" stroke-width="1.5" rx="8"/>
    <text x="0" y="-48" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">正对一端看</text>
    <path d="M0 -35 L10 -10 L35 -7 L16 10 L22 35 L0 22 L-22 35 L-16 10 L-35 -7 L-10 -10 Z" fill="#e0d848" stroke="#8d7a2a" stroke-width="2"/>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">五角星形！</text>
    <text x="0" y="58" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">岑桑画的样子</text>
  </g>

  <!-- 视角3：横切 -->
  <g transform="translate(640,420)">
    <rect x="-90" y="-70" width="180" height="150" fill="#e0f0f8" stroke="#7ab8d8" stroke-width="1.5" rx="8"/>
    <text x="0" y="-48" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#3a6a8a">横切开</text>
    <path d="M0 -32 L9 -9 L32 -6 L15 9 L20 32 L0 20 L-20 32 L-15 9 L-32 -6 L-9 -9 Z" fill="#f4ec68" stroke="#8d7a2a" stroke-width="2"/>
    <g fill="#8d5a36">
      <ellipse cx="0" cy="-3" rx="2" ry="4"/>
      <ellipse cx="7" cy="4" rx="2" ry="4"/>
      <ellipse cx="-7" cy="4" rx="2" ry="4"/>
    </g>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="12" fill="#3a6a8a">五角星截面</text>
    <text x="0" y="58" text-anchor="middle" font-family="serif" font-size="10" fill="#3a6a8a">英文叫 star fruit</text>
  </g>

  <!-- 底部说明 -->
  <rect x="100" y="530" width="600" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <text x="400" y="552" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">同一个杨桃，不同角度看到不同样子——没有谁画错</text>
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">看到什么样就画成什么样，这就是实事求是</text>
</svg>
