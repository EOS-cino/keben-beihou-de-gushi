<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="五星红旗和义勇军进行曲设计故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a3b14" font-family="serif">连珠小故事：国旗和国歌的设计故事</text>
  <line x1="160" y1="55" x2="640" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左右分割线 -->
  <line x1="400" y1="80" x2="400" y2="500" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- ===== 左侧：五星红旗 ===== -->
  <!-- 大幅国旗 -->
  <g transform="translate(200, 200)">
    <rect x="-100" y="-60" width="200" height="130" fill="#c84030" stroke="#7a3b14" stroke-width="2"/>
    <!-- 大五角星 -->
    <g transform="translate(-55, -35)">
      <path d="M0 -18 L5 -6 L18 -6 L8 2 L12 14 L0 7 L-12 14 L-8 2 L-18 -6 L-5 -6 Z" fill="#f0d840" stroke="#c8a848" stroke-width="1"/>
    </g>
    <!-- 四颗小星 -->
    <g transform="translate(-25, -45)">
      <path d="M0 -7 L2 -2 L7 -2 L3 1 L4 6 L0 3 L-4 6 L-3 1 L-7 -2 L-2 -2 Z" fill="#f0d840"/>
    </g>
    <g transform="translate(-15, -30)">
      <path d="M0 -7 L2 -2 L7 -2 L3 1 L4 6 L0 3 L-4 6 L-3 1 L-7 -2 L-2 -2 Z" fill="#f0d840"/>
    </g>
    <g transform="translate(-15, -12)">
      <path d="M0 -7 L2 -2 L7 -2 L3 1 L4 6 L0 3 L-4 6 L-3 1 L-7 -2 L-2 -2 Z" fill="#f0d840"/>
    </g>
    <g transform="translate(-25, 2)">
      <path d="M0 -7 L2 -2 L7 -2 L3 1 L4 6 L0 3 L-4 6 L-3 1 L-7 -2 L-2 -2 Z" fill="#f0d840"/>
    </g>
  </g>

  <!-- 设计者曾联松 -->
  <g transform="translate(120, 380)">
    <!-- 身体 -->
    <path d="M -16 50 Q -18 20 -12 5 Q -6 0 0 0 Q 6 0 12 5 Q 18 20 16 50" fill="#4a5a6a" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="-10" r="12" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M -12 -12 Q -10 -24 0 -25 Q 10 -24 12 -12" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-4" cy="-10" r="1.5" fill="#7a3b14"/>
    <circle cx="4" cy="-10" r="1.5" fill="#7a3b14"/>
    <path d="M -4 -2 Q 0 0 4 -2" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 手拿设计稿 -->
    <path d="M 12 10 Q 22 15 28 25" fill="none" stroke="#4a5a6a" stroke-width="6" stroke-linecap="round"/>
    <rect x="22" y="20" width="16" height="12" fill="#fff" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="26" cy="24" r="2" fill="#c84030"/>
  </g>

  <!-- 左侧标签 -->
  <rect x="100" y="85" width="120" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="160" y="103" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">五星红旗</text>

  <!-- 标注：曾联松 -->
  <line x1="120" y1="355" x2="80" y2="320" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="20" y="298" width="120" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="80" y="316" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">设计者曾联松</text>

  <!-- 标注：大星代表党 -->
  <line x1="145" y1="165" x2="100" y2="140" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="30" y="118" width="120" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="90" y="136" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">大星代表党</text>

  <!-- 标注：小星代表人民 -->
  <line x1="175" y1="155" x2="200" y2="120" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="180" y="98" width="130" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="245" y="116" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">小星代表人民</text>

  <!-- ===== 右侧：义勇军进行曲 ===== -->
  <!-- 五线谱 -->
  <g transform="translate(600, 180)">
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-100" y1="10" x2="100" y2="10" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-100" y1="20" x2="100" y2="20" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-100" y1="30" x2="100" y2="30" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-100" y1="40" x2="100" y2="40" stroke="#7a3b14" stroke-width="1"/>
    <!-- 音符 -->
    <ellipse cx="-70" cy="25" rx="5" ry="4" fill="#7a3b14" transform="rotate(-20 -70 25)"/>
    <line x1="-65" y1="24" x2="-65" y2="0" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="-40" cy="20" rx="5" ry="4" fill="#7a3b14" transform="rotate(-20 -40 20)"/>
    <line x1="-35" y1="19" x2="-35" y2="-5" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="-10" cy="15" rx="5" ry="4" fill="#7a3b14" transform="rotate(-20 -10 15)"/>
    <line x1="-5" y1="14" x2="-5" y2="-10" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="20" cy="20" rx="5" ry="4" fill="#7a3b14" transform="rotate(-20 20 20)"/>
    <line x1="25" y1="19" x2="25" y2="-5" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="50" cy="25" rx="5" ry="4" fill="#7a3b14" transform="rotate(-20 50 25)"/>
    <line x1="55" y1="24" x2="55" y2="0" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 连音线 -->
    <path d="M-65 -2 Q-20 -12 25 -2" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <text x="600" y="145" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">义勇军进行曲</text>

  <!-- 田汉和聂耳 -->
  <g transform="translate(540, 380)">
    <!-- 田汉（作词） -->
    <g transform="translate(-30, 0)">
      <path d="M -14 45 Q -16 18 -10 5 Q -5 0 0 0 Q 5 0 10 5 Q 16 18 14 45" fill="#3a5a4a" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="0" cy="-10" r="11" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M -11 -12 Q -10 -22 0 -23 Q 10 -22 11 -12" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="-4" cy="-10" r="1.5" fill="#7a3b14"/>
      <circle cx="4" cy="-10" r="1.5" fill="#7a3b14"/>
      <path d="M -3 -3 Q 0 -1 3 -3" fill="none" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <!-- 聂耳（作曲） -->
    <g transform="translate(30, 0)">
      <path d="M -14 45 Q -16 18 -10 5 Q -5 0 0 0 Q 5 0 10 5 Q 16 18 14 45" fill="#4a5a6a" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="0" cy="-10" r="11" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M -11 -12 Q -10 -22 0 -23 Q 10 -22 11 -12" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="-4" cy="-10" r="1.5" fill="#7a3b14"/>
      <circle cx="4" cy="-10" r="1.5" fill="#7a3b14"/>
      <path d="M -3 -3 Q 0 -1 3 -3" fill="none" stroke="#7a3b14" stroke-width="1"/>
    </g>
  </g>

  <!-- 右侧标签 -->
  <rect x="540" y="85" width="120" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="600" y="103" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">义勇军进行曲</text>

  <!-- 标注：田汉作词 -->
  <line x1="510" y1="355" x2="470" y2="320" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="410" y="298" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="465" y="316" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">田汉作词</text>

  <!-- 标注：聂耳作曲 -->
  <line x1="570" y1="355" x2="610" y2="320" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="570" y="298" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="625" y="316" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">聂耳作曲</text>

  <!-- 底部说明 -->
  <rect x="50" y="525" width="700" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="548" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">国旗出自普通会计之手，国歌诞生于抗战烽火——</text>
  <text x="400" y="566" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">每一颗星、每一个音符，都承载着中国人民的奋斗与希望。</text>
</svg>
