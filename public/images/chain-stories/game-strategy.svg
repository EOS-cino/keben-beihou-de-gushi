  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a3b14" font-family="serif">顺序也是一种方法</text>
  <line x1="290" y1="54" x2="510" y2="54" stroke="#c8843a" stroke-width="1.5"/>
  <text x="400" y="74" text-anchor="middle" font-size="13" fill="#9c6b3f" font-family="serif">—— 田忌赛马中的智慧 ——</text>
  <line x1="60" y1="255" x2="740" y2="255" stroke="#d4a574" stroke-width="2" stroke-dasharray="8,4"/>
  <use href="#horse" transform="translate(155,195) scale(1.15)" color="#6b4423"/>
  <use href="#horse" transform="translate(365,205) scale(0.95)" color="#9c6b3f"/>
  <use href="#horse" transform="translate(580,215) scale(0.78)" color="#c4a06a"/>
  <text x="200" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a3b14" font-family="serif">上等马</text>
  <text x="400" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a3b14" font-family="serif">中等马</text>
  <text x="610" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a3b14" font-family="serif">下等马</text>
  <path d="M 610,300 Q 400,345 200,345" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arwr)"/>
  <text x="400" y="340" text-anchor="middle" font-size="12" fill="#c0392b" font-family="serif">下等马 → 对齐王上等马（输）</text>
  <path d="M 200,360 Q 300,390 400,390" fill="none" stroke="#2d8659" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arwg)"/>
  <text x="300" y="385" text-anchor="middle" font-size="12" fill="#2d8659" font-family="serif">上等马 → 对齐王中等马（赢）</text>
  <path d="M 400,405 Q 500,435 610,435" fill="none" stroke="#2d8659" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arwg)"/>
  <text x="500" y="430" text-anchor="middle" font-size="12" fill="#2d8659" font-family="serif">中等马 → 对齐王下等马（赢）</text>
  <rect x="280" y="455" width="240" height="36" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="400" y="478" text-anchor="middle" font-size="16" font-weight="bold" fill="#2d8659" font-family="serif">三局两胜，转败为胜！</text>
  <line x1="155" y1="170" x2="80" y2="140" stroke="#c8843a" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="30" y="128" width="80" height="24" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
  <text x="70" y="144" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">上等马</text>
  <line x1="430" y1="195" x2="500" y2="155" stroke="#c8843a" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="470" y="143" width="80" height="24" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
  <text x="510" y="159" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">中等马</text>
  <line x1="640" y1="200" x2="710" y2="170" stroke="#c8843a" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="690" y="158" width="80" height="24" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
  <text x="730" y="174" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">下等马</text>
  <line x1="560" y1="340" x2="630" y2="315" stroke="#c8843a" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="610" y="303" width="90" height="24" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
  <text x="655" y="319" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">调换顺序</text>
  <rect x="60" y="505" width="680" height="75" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
  <text x="400" y="530" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">田忌采纳孙膑的建议，调换马的出场顺序：用下等马对齐王上等马（输），</text>
  <text x="400" y="552" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">上等马对中等马（赢），中等马对下等马（赢），三局两胜转败为胜。</text>
  <text x="400" y="572" text-anchor="middle" font-size="13" font-weight="bold" fill="#c8843a" font-family="serif">可见，顺序也是一种方法。</text>
</svg>