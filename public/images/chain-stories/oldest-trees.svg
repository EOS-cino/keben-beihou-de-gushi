<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一棵巨大的古树，树干粗得要十几个人才能抱住，枝叶遮天蔽日">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空 -->
  <rect x="0" y="0" width="800" height="350" fill="#a8d0e8" opacity="0.1"/>
  <!-- 远山 -->
  <path d="M0 350 L0 280 L150 240 L300 270 L450 250 L600 280 L800 260 L800 350 Z" fill="#4a6a2f" opacity="0.2"/>
  <!-- 地面 -->
  <path d="M0 450 Q200 440 400 450 T800 445 L800 600 L0 600 Z" fill="#6a8d3f" opacity="0.3"/>
  <path d="M0 490 Q200 480 400 490 T800 485 L800 600 L0 600 Z" fill="#4a6a2f" opacity="0.2"/>
  <!-- 巨大古树 -->
  <g transform="translate(400,450)">
    <!-- 树干（非常粗） -->
    <path d="M-60 -200 Q-70 -100 -65 0 Q-60 50 -55 0 Q-50 -100 -60 -200" fill="#8d5a36"/>
    <path d="M60 -200 Q70 -100 65 0 Q60 50 55 0 Q50 -100 60 -200" fill="#8d5a36"/>
    <rect x="-65" y="-200" width="130" height="200" fill="#8d5a36"/>
    <!-- 树干纹理 -->
    <g stroke="#5a2a0a" stroke-width="2" fill="none" opacity="0.4">
      <path d="M-50 -180 Q-45 -100 -50 -20"/>
      <path d="M-30 -190 Q-25 -100 -30 -10"/>
      <path d="M0 -195 Q5 -100 0 -5"/>
      <path d="M30 -190 Q25 -100 30 -10"/>
      <path d="M50 -180 Q45 -100 50 -20"/>
    </g>
    <!-- 树洞 -->
    <ellipse cx="-20" cy="-80" rx="12" ry="18" fill="#5a2a0a" opacity="0.6"/>
    <!-- 树冠（巨大） -->
    <ellipse cx="0" cy="-250" rx="180" ry="80" fill="#6a8d3f" opacity="0.7"/>
    <ellipse cx="-80" cy="-240" rx="80" ry="50" fill="#7ba84a" opacity="0.6"/>
    <ellipse cx="80" cy="-240" rx="80" ry="50" fill="#7ba84a" opacity="0.6"/>
    <ellipse cx="0" cy="-290" rx="100" ry="50" fill="#6a8d3f" opacity="0.6"/>
    <ellipse cx="-120" cy="-260" rx="50" ry="35" fill="#7ba84a" opacity="0.5"/>
    <ellipse cx="120" cy="-260" rx="50" ry="35" fill="#7ba84a" opacity="0.5"/>
    <!-- 枝条 -->
    <g stroke="#8d5a36" stroke-width="5" fill="none" opacity="0.5">
      <path d="M-60 -200 Q-100 -220 -140 -240"/>
      <path d="M60 -200 Q100 -220 140 -240"/>
      <path d="M-40 -210 Q-60 -250 -80 -280"/>
      <path d="M40 -210 Q60 -250 80 -280"/>
    </g>
  </g>
  <!-- 人（对比树的大小） -->
  <g transform="translate(320,470)">
    <ellipse cx="0" cy="20" rx="8" ry="12" fill="#c84a3a"/>
    <circle cx="0" cy="0" r="8" fill="#f4d4a8"/>
    <path d="M-6 -3 Q-8 -10 -4 -12" stroke="#2d2a24" stroke-width="2" fill="none"/>
    <path d="M6 -3 Q8 -10 4 -12" stroke="#2d2a24" stroke-width="2" fill="none"/>
    <path d="M-6 12 L-10 30" stroke="#f4d4a8" stroke-width="3"/>
    <path d="M6 12 L10 30" stroke="#f4d4a8" stroke-width="3"/>
    <path d="M-4 32 L-6 50" stroke="#4a6a2f" stroke-width="4"/>
    <path d="M4 32 L6 50" stroke="#4a6a2f" stroke-width="4"/>
  </g>
  <g transform="translate(480,470)">
    <ellipse cx="0" cy="20" rx="8" ry="12" fill="#7ab8d8"/>
    <circle cx="0" cy="0" r="8" fill="#f4d4a8"/>
    <path d="M-6 -3 Q-8 -10 -4 -12" stroke="#2d2a24" stroke-width="2" fill="none"/>
    <path d="M6 -3 Q8 -10 4 -12" stroke="#2d2a24" stroke-width="2" fill="none"/>
    <path d="M-6 12 L-10 30" stroke="#f4d4a8" stroke-width="3"/>
    <path d="M6 12 L10 30" stroke="#f4d4a8" stroke-width="3"/>
    <path d="M-4 32 L-6 50" stroke="#4a6a2f" stroke-width="4"/>
    <path d="M4 32 L6 50" stroke="#4a6a2f" stroke-width="4"/>
  </g>
  <!-- 年轮（角落小图） -->
  <g transform="translate(130,480)" opacity="0.6">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#8d5a36" stroke-width="2"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#8d5a36" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="21" fill="none" stroke="#8d5a36" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#8d5a36" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="7" fill="none" stroke="#8d5a36" stroke-width="1.5"/>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">年轮</text>
  </g>
  <!-- 五千年标签 -->
  <g transform="translate(670,480)" opacity="0.7">
    <rect x="-40" y="-15" width="80" height="30" rx="5" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#c84a3a">5000岁</text>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">中国最古老的树</text>
</svg>
