<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="地球从火球到蓝色星球演变插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：地球是怎么形成的</text>
  <line x1="160" y1="55" x2="640" y2="55" stroke="#c8843a" stroke-width="2"/>

  <!-- 时间轴 -->
  <line x1="80" y1="340" x2="720" y2="340" stroke="#8d5a36" stroke-width="3"/>
  <polygon points="720,340 708,332 708,348" fill="#8d5a36"/>

  <!-- 阶段1：尘埃云（46亿年前） -->
  <g transform="translate(140, 200)">
    <circle cx="0" cy="0" r="50" fill="#d8c9a8" opacity="0.4"/>
    <circle cx="-20" cy="-10" r="8" fill="#8d5a36" opacity="0.6"/>
    <circle cx="15" cy="-15" r="6" fill="#8d5a36" opacity="0.6"/>
    <circle cx="10" cy="20" r="10" fill="#8d5a36" opacity="0.6"/>
    <circle cx="-25" cy="15" r="5" fill="#8d5a36" opacity="0.6"/>
    <circle cx="25" cy="5" r="4" fill="#8d5a36" opacity="0.6"/>
    <!-- 旋转箭头 -->
    <path d="M-40 -30 Q0 -55 40 -30" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="3,2"/>
    <circle cx="140" cy="0" r="6" fill="#c84a3a"/>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">尘埃聚集</text>
    <text x="0" y="90" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">46亿年前</text>
  </g>

  <!-- 阶段2：火球地球 -->
  <g transform="translate(330, 200)">
    <circle cx="0" cy="0" r="45" fill="#c84a3a" stroke="#7a3b14" stroke-width="2"/>
    <!-- 岩浆裂纹 -->
    <path d="M-30 -10 Q-10 -20 10 -5 Q25 5 30 -10" fill="none" stroke="#e07856" stroke-width="3"/>
    <path d="M-25 15 Q0 25 20 10" fill="none" stroke="#e07856" stroke-width="3"/>
    <path d="M-10 -25 Q5 -15 25 -25" fill="none" stroke="#e07856" stroke-width="2"/>
    <!-- 火焰 -->
    <path d="M-15 -40 Q-10 -55 -5 -42" fill="#e07856" opacity="0.7"/>
    <path d="M10 -42 Q15 -58 20 -44" fill="#e07856" opacity="0.7"/>
    <circle cx="0" cy="0" r="6" fill="#c84a3a"/>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">岩浆火球</text>
    <text x="0" y="90" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">冷却中</text>
  </g>

  <!-- 阶段3：海洋诞生 -->
  <g transform="translate(520, 200)">
    <circle cx="0" cy="0" r="45" fill="#7ab8d8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 陆地 -->
    <path d="M-25 -5 Q-10 -15 5 -8 Q20 -18 30 -5 Q20 5 5 0 Q-10 8 -25 -5" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1"/>
    <!-- 雨滴 -->
    <line x1="-30" y1="-40" x2="-32" y2="-30" stroke="#a8d0e8" stroke-width="2"/>
    <line x1="-15" y1="-45" x2="-17" y2="-35" stroke="#a8d0e8" stroke-width="2"/>
    <line x1="10" y1="-48" x2="8" y2="-38" stroke="#a8d0e8" stroke-width="2"/>
    <line x1="25" y1="-42" x2="23" y2="-32" stroke="#a8d0e8" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#c84a3a"/>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">海洋诞生</text>
    <text x="0" y="90" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">下雨千万年</text>
  </g>

  <!-- 阶段4：蓝色星球（今天） -->
  <g transform="translate(680, 200)">
    <circle cx="0" cy="0" r="45" fill="#a8d0e8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 大陆 -->
    <path d="M-30 -10 Q-15 -20 0 -12 Q15 -22 28 -8 Q20 5 5 0 Q-10 8 -30 -10" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <path d="M-20 15 Q-5 10 10 20 Q0 28 -15 22" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <!-- 云 -->
    <ellipse cx="-15" cy="-30" rx="12" ry="4" fill="#fef9ed" opacity="0.7"/>
    <ellipse cx="18" cy="-28" rx="10" ry="3" fill="#fef9ed" opacity="0.7"/>
    <circle cx="0" cy="0" r="6" fill="#6a8d3f"/>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">蓝色星球</text>
    <text x="0" y="90" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">今天</text>
  </g>

  <!-- 时间节点 -->
  <circle cx="140" cy="340" r="6" fill="#c84a3a"/>
  <circle cx="330" cy="340" r="6" fill="#c84a3a"/>
  <circle cx="520" cy="340" r="6" fill="#c84a3a"/>
  <circle cx="680" cy="340" r="6" fill="#6a8d3f"/>

  <!-- 蓝藻释氧 -->
  <g transform="translate(330, 410)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">蓝藻释放氧气</text>
    <circle cx="-30" cy="15" r="4" fill="#6a8d3f"/>
    <circle cx="-20" cy="12" r="3" fill="#6a8d3f"/>
    <circle cx="-10" cy="16" r="4" fill="#6a8d3f"/>
    <path d="M0 10 L10 0" stroke="#a8d0e8" stroke-width="1.5"/>
    <path d="M5 15 L15 5" stroke="#a8d0e8" stroke-width="1.5"/>
    <text x="20" y="8" font-family="serif" font-size="10" fill="#7ab8d8">O₂</text>
  </g>

  <!-- 大陆漂移 -->
  <g transform="translate(520, 410)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">大陆漂移</text>
    <path d="M-30 15 Q-15 10 0 15 Q-10 22 -30 18" fill="#6a8d3f" opacity="0.6"/>
    <path d="M-25 13 Q-10 8 5 13" fill="none" stroke="#c84a3a" stroke-width="1" stroke-dasharray="3,2"/>
    <path d="M10 18 Q25 13 40 18 Q30 25 10 21" fill="#6a8d3f" opacity="0.6"/>
    <path d="M5 16 Q20 11 35 16" fill="none" stroke="#c84a3a" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="540" width="700" height="42" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.85"/>
  <text x="400" y="566" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">从尘埃到火球，从海洋到生命——地球用了四十六亿年写成今天的样子。</text>
</svg>
