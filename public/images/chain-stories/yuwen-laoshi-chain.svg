<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="中国语文教育变迁连珠故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#2d6a4f">连珠小故事：中国语文课的变迁</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#e8a838" stroke-width="1.5"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#7a7468">从《千字文》到国文、国语，再到今天的语文</text>

  <!-- 时间轴 -->
  <line x1="100" y1="180" x2="700" y2="180" stroke="#c8943a" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- 第一格：千字文 -->
  <g transform="translate(160 290)">
    <rect x="-85" y="-90" width="170" height="180" fill="#fff6df" stroke="#8a6a3a" stroke-width="1.5" rx="8"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#8a5a14">千字文</text>
    <!-- 竖排书简 -->
    <g stroke="#5a4a2a" stroke-width="1" fill="#f0e0c0">
      <rect x="-35" y="-50" width="70" height="14"/>
      <rect x="-35" y="-34" width="70" height="14"/>
      <rect x="-35" y="-18" width="70" height="14"/>
    </g>
    <!-- 竖排小字 -->
    <g font-family="serif" font-size="7" fill="#5a4a2a">
      <text x="-28" y="-40">天地玄黄</text>
      <text x="-28" y="-24">宇宙洪荒</text>
      <text x="-28" y="-8">日月盈昃</text>
    </g>
    <!-- 蒙童读书 -->
    <g transform="translate(0 30)">
      <path d="M-8 18 Q-10 5 -5 -2 Q0 -6 5 -2 Q10 5 8 18 Z" fill="#4a90b8"/>
      <circle cx="0" cy="-8" r="6" fill="#f4d4a8"/>
      <rect x="-7" y="-14" width="14" height="3" fill="#3a3a3a"/>
    </g>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">一千五百年前</text>
    <text x="0" y="88" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">一千字不重复</text>
  </g>

  <!-- 第二格：国文（文言） -->
  <g transform="translate(330 290)">
    <rect x="-85" y="-90" width="170" height="180" fill="#fff6df" stroke="#e07856" stroke-width="1.5" rx="8"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#8a5a14">国文</text>
    <!-- 线装书 -->
    <g fill="#fef9ed" stroke="#8a6a3a" stroke-width="1.5">
      <rect x="-30" y="-50" width="60" height="50"/>
    </g>
    <line x1="-30" y1="-45" x2="30" y2="-45" stroke="#8a6a3a" stroke-width="1"/>
    <g font-family="serif" font-size="9" fill="#5a4a2a">
      <text x="-22" y="-35">学而时习之</text>
      <text x="-22" y="-22">不亦说乎</text>
      <text x="-22" y="-9">有朋自远方来</text>
    </g>
    <!-- 老先生戒尺 -->
    <g transform="translate(0 25)">
      <path d="M-10 18 Q-12 5 -6 -2 Q0 -6 6 -2 Q12 5 10 18 Z" fill="#4a5a6a"/>
      <circle cx="0" cy="-10" r="7" fill="#f4d4a8"/>
      <path d="M-8 -14 Q0 -22 8 -14" fill="#3a3a3a"/>
      <!-- 戒尺 -->
      <rect x="8" y="0" width="20" height="3" fill="#8a5a14"/>
    </g>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">清末·读论语孟子</text>
    <text x="0" y="88" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">摇头晃脑背诵</text>
  </g>

  <!-- 第三格：国语（白话） -->
  <g transform="translate(500 290)">
    <rect x="-85" y="-90" width="170" height="180" fill="#fff6df" stroke="#4a90b8" stroke-width="1.5" rx="8"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#8a5a14">国语</text>
    <!-- 新式课本 -->
    <g fill="#fef9ed" stroke="#4a90b8" stroke-width="1.5">
      <rect x="-32" y="-50" width="64" height="50"/>
    </g>
    <g font-family="serif" font-size="9" fill="#3a3a3a">
      <text x="-25" y="-36">小猫钓鱼</text>
      <text x="-25" y="-24">春天来了，</text>
      <text x="-25" y="-12">燕子飞回来了</text>
    </g>
    <!-- 插图（小鱼） -->
    <ellipse cx="18" cy="-32" rx="5" ry="2.5" fill="#4a90b8" opacity="0.7"/>
    <path d="M23 -32 L27 -35 L27 -29 Z" fill="#4a90b8" opacity="0.7"/>
    <!-- 叶圣陶 -->
    <g transform="translate(0 25)">
      <path d="M-10 18 Q-12 5 -6 -2 Q0 -6 6 -2 Q12 5 10 18 Z" fill="#2d6a4f"/>
      <circle cx="0" cy="-10" r="7" fill="#f4d4a8"/>
      <path d="M-7 -14 Q0 -22 7 -14" fill="#3a3a3a"/>
      <!-- 眼镜 -->
      <circle cx="-3" cy="-10" r="2.5" fill="none" stroke="#3a3a3a" stroke-width="1"/>
      <circle cx="3" cy="-10" r="2.5" fill="none" stroke="#3a3a3a" stroke-width="1"/>
    </g>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">二三十年代·白话文</text>
    <text x="0" y="88" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">贴近生活的小故事</text>
  </g>

  <!-- 第四格：语文（现代） -->
  <g transform="translate(660 290)">
    <rect x="-85" y="-90" width="170" height="180" fill="#fff6df" stroke="#2d6a4f" stroke-width="1.5" rx="8"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#8a5a14">语文</text>
    <!-- 现代课本 -->
    <g fill="#e07856" stroke="#8a5a14" stroke-width="1.5">
      <rect x="-32" y="-50" width="64" height="50"/>
    </g>
    <text x="0" y="-32" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#fef9ed">语文</text>
    <g font-family="serif" font-size="8" fill="#fef9ed">
      <text x="-25" y="-20">字词句篇</text>
      <text x="-25" y="-10">听说读写</text>
    </g>
    <!-- 现代学生 -->
    <g transform="translate(0 25)">
      <path d="M-9 18 Q-11 5 -5 -2 Q0 -6 5 -2 Q11 5 9 18 Z" fill="#e8a838"/>
      <circle cx="0" cy="-10" r="7" fill="#f4d4a8"/>
      <path d="M-7 -14 Q0 -22 7 -14" fill="#3a3a3a"/>
      <!-- 红领巾 -->
      <path d="M-5 -2 L0 6 L5 -2 Z" fill="#e07856"/>
    </g>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">今天·认字读书明理</text>
    <text x="0" y="88" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">会表达会思考</text>
  </g>

  <!-- 底部：不变的目的 -->
  <g transform="translate(400 460)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a14">内容方法在变，目的不变——认字、读书、明理</text>
    <!-- 一颗心 -->
    <g transform="translate(0 35)">
      <path d="M0 10 Q-15 -5 -10 -12 Q-3 -15 0 -8 Q3 -15 10 -12 Q15 -5 0 10 Z" fill="#e07856" opacity="0.7"/>
      <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="11" fill="#8a5a14">学做一个堂堂正正的人</text>
    </g>
  </g>

  <!-- 底部说明 -->
  <rect x="60" y="535" width="680" height="40" fill="#fff6df" stroke="#e8a838" stroke-width="1" rx="6" opacity="0.85"/>
  <text x="400" y="558" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a14">语文课教的从来不只是字词句篇，更是一个人的根</text>
</svg>
