<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="燕子桃花鸭子等春天信使的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#2D2A24">古诗里的春天信使</text>
  <text x="400" y="70" text-anchor="middle" font-family="serif" font-size="13" fill="#7A7468">动植物一报信，春天就来了</text>
  <line x1="280" y1="82" x2="520" y2="82" stroke="#C05A30" stroke-width="2"/>

  <!-- 燕子 -->
  <g transform="translate(150,290)">
    <rect x="-110" y="-120" width="220" height="220" rx="12" fill="#F5F0E8" stroke="#3A7D5C" stroke-width="2"/>
    <text x="0" y="-94" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#3A7D5C">燕子·飞回</text>
    <g transform="translate(0,0)">
      <path d="M0,0 C-16,-8 -28,-2 -34,6 C-26,2 -16,4 -8,8 C-4,14 0,20 4,20 C8,20 12,14 8,8 C16,4 26,2 34,6 C28,-2 16,-8 0,0 Z" fill="#2D2A24"/>
      <path d="M-30,-2 Q-20,-12 -8,-4" fill="none" stroke="#2D2A24" stroke-width="1.5"/>
    </g>
    <!-- nest mud -->
    <path d="M-20,40 Q0,28 20,40 L16,52 L-16,52 Z" fill="#7A7468" stroke="#2D2A24" stroke-width="1.5"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">啄春泥做窝</text>
    <text x="0" y="98" text-anchor="middle" font-family="serif" font-size="10" fill="#7A7468">谁家新燕啄春泥</text>
  </g>

  <!-- 桃花 -->
  <g transform="translate(400,290)">
    <rect x="-110" y="-120" width="220" height="220" rx="12" fill="#F5F0E8" stroke="#C05A30" stroke-width="2"/>
    <text x="0" y="-94" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#C05A30">桃花·盛开</text>
    <g transform="translate(0,10)">
      <rect x="-3" y="0" width="6" height="50" fill="#7A7468"/>
      <g fill="#C05A30" stroke="#2D2A24" stroke-width="1">
        <circle cx="-18" cy="-6" r="8"/><circle cx="0" cy="-14" r="9"/><circle cx="18" cy="-6" r="8"/>
        <circle cx="-10" cy="8" r="7"/><circle cx="12" cy="8" r="7"/>
      </g>
      <g fill="#E8C95A"><circle cx="0" cy="-14" r="2.5"/><circle cx="-18" cy="-6" r="2"/><circle cx="18" cy="-6" r="2"/></g>
    </g>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">花开花落</text>
    <text x="0" y="98" text-anchor="middle" font-family="serif" font-size="10" fill="#7A7468">竹外桃花三两枝</text>
  </g>

  <!-- 鸭子 -->
  <g transform="translate(650,290)">
    <rect x="-110" y="-120" width="220" height="220" rx="12" fill="#F5F0E8" stroke="#3A7D5C" stroke-width="2"/>
    <text x="0" y="-94" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#3A7D5C">鸭子·下水</text>
    <g transform="translate(0,10)">
      <path d="M-60,20 Q-30,10 0,20 T60,20" fill="none" stroke="#3A7D5C" stroke-width="2"/>
      <path d="M-60,32 Q-30,22 0,32 T60,32" fill="none" stroke="#3A7D5C" stroke-width="2" opacity="0.6"/>
      <g transform="translate(0,10)">
        <ellipse cx="0" cy="0" rx="20" ry="11" fill="#fef9ed" stroke="#2D2A24" stroke-width="1.5"/>
        <circle cx="18" cy="-5" r="9" fill="#fef9ed" stroke="#2D2A24" stroke-width="1.5"/>
        <path d="M26,-5 L34,-3 L26,-1 Z" fill="#E8C95A" stroke="#2D2A24" stroke-width="1"/>
        <circle cx="20" cy="-6" r="1.5" fill="#2D2A24"/>
      </g>
    </g>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">天天泡水里</text>
    <text x="0" y="98" text-anchor="middle" font-family="serif" font-size="10" fill="#7A7468">春江水暖鸭先知</text>
  </g>

  <g transform="translate(400,540)">
    <rect x="-290" y="-26" width="580" height="46" rx="8" fill="#F5F0E8" stroke="#C05A30" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" font-family="serif" font-size="14" fill="#2D2A24">古人没日历，靠这些信使判断季节</text>
    <text x="0" y="14" text-anchor="middle" font-family="serif" font-size="13" fill="#C05A30">下次出门，找找你身边的春天信使吧</text>
  </g>
</svg>
