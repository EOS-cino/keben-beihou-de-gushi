<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一分钟能做多少事的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">为什么一分钟很重要</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">一分钟=六十秒，里面装的东西可不少</text>

  <!-- 大时钟 -->
  <g transform="translate(400,200)">
    <circle cx="0" cy="0" r="70" fill="#fef9ed" stroke="#c8843a" stroke-width="4"/>
    <!-- 刻度 -->
    <g stroke="#7a3b14" stroke-width="2">
      <line x1="0" y1="-60" x2="0" y2="-52"/>
      <line x1="60" y1="0" x2="52" y2="0"/>
      <line x1="0" y1="60" x2="0" y2="52"/>
      <line x1="-60" y1="0" x2="-52" y2="0"/>
    </g>
    <!-- 指针 -->
    <line x1="0" y1="0" x2="0" y2="-50" stroke="#7a3b14" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="40" y2="10" stroke="#c84a3a" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="5" fill="#c84a3a"/>
    <text x="0" y="100" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14" font-weight="bold">1分钟 = 60秒</text>
  </g>

  <!-- 一分钟能做的事：四个卡片 -->
  <!-- 卡片1：心脏跳动 -->
  <g transform="translate(140,400)">
    <rect x="-85" y="-40" width="170" height="120" rx="10" fill="#fef0d8" stroke="#c84a3a" stroke-width="2"/>
    <!-- 心脏 -->
    <path d="M0 0 C-15 -20 -35 -10 -25 10 C-15 25 0 35 0 35 C0 35 15 25 25 10 C35 -10 15 -20 0 0 Z" fill="#c84a3a" transform="translate(0,-5)"/>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a" font-weight="bold">心跳约70次</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">把血液送到全身</text>
  </g>

  <!-- 卡片2：蜜蜂扇翅 -->
  <g transform="translate(330,400)">
    <rect x="-85" y="-40" width="170" height="120" rx="10" fill="#fef0d8" stroke="#e0a050" stroke-width="2"/>
    <!-- 蜜蜂 -->
    <g transform="translate(0,-5)">
      <ellipse cx="0" cy="0" rx="18" ry="12" fill="#e0a050"/>
      <line x1="-8" y1="-8" x2="-8" y2="8" stroke="#3a3a3a" stroke-width="2"/>
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#3a3a3a" stroke-width="2"/>
      <line x1="8" y1="-8" x2="8" y2="8" stroke="#3a3a3a" stroke-width="2"/>
      <!-- 翅膀振动 -->
      <ellipse cx="-5" cy="-15" rx="10" ry="5" fill="#fef9ed" opacity="0.7"/>
      <ellipse cx="8" cy="-15" rx="10" ry="5" fill="#fef9ed" opacity="0.7"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="14" fill="#e0a050" font-weight="bold">扇翅约12000次</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">飞出几百米远</text>
  </g>

  <!-- 卡片3：光绕地球 -->
  <g transform="translate(520,400)">
    <rect x="-85" y="-40" width="170" height="120" rx="10" fill="#fef0d8" stroke="#7ab8d8" stroke-width="2"/>
    <!-- 地球 -->
    <circle cx="0" cy="-5" r="20" fill="#7ab8d8"/>
    <path d="M-12 -8 Q-5 -12 2 -8 Q8 -4 14 -10" fill="none" stroke="#6a8d3f" stroke-width="2"/>
    <path d="M-8 2 Q0 -2 6 5" fill="none" stroke="#6a8d3f" stroke-width="2"/>
    <!-- 光绕圈 -->
    <ellipse cx="0" cy="-5" rx="32" ry="14" fill="none" stroke="#f4b942" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="14" fill="#7ab8d8" font-weight="bold">光绕地球7圈半</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">光速极快</text>
  </g>

  <!-- 卡片4：赶上和错过 -->
  <g transform="translate(700,400)">
    <rect x="-80" y="-40" width="160" height="120" rx="10" fill="#fef0d8" stroke="#6a8d3f" stroke-width="2"/>
    <!-- 公交车 -->
    <g transform="translate(0,-5)">
      <rect x="-25" y="-12" width="40" height="20" rx="3" fill="#6a8d3f"/>
      <rect x="-22" y="-9" width="12" height="8" fill="#a8d0e8"/>
      <circle cx="-15" cy="11" r="5" fill="#3a3a3a"/>
      <circle cx="8" cy="11" r="5" fill="#3a3a3a"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="14" fill="#6a8d3f" font-weight="bold">赶上或错过</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">就在一分钟之间</text>
  </g>

  <!-- 底部总结 -->
  <text x="400" y="555" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14" font-weight="bold">别小看"就一分钟"，一分钟连着一分钟，影响一整天</text>
  <text x="400" y="578" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">该起就起，该走就走，守时是好习惯</text>
</svg>
