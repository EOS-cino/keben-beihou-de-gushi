<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从天晴走走到普希金雨天的故事画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#7a3b14" stroke-width="2"/>
  <line x1="300" y1="300" x2="500" y2="300" stroke="#7a3b14" stroke-width="3" stroke-dasharray="8,6"/>
  <circle cx="350" cy="300" r="6" fill="#d4a017"/>
  <circle cx="400" cy="300" r="9" fill="#c8553d"/>
  <circle cx="450" cy="300" r="6" fill="#d4a017"/>
  <!-- 左珠：戴望舒晴天 -->
  <circle cx="170" cy="300" r="110" fill="#f0c068" opacity="0.3" stroke="#b5651d" stroke-width="3"/>
  <circle cx="170" cy="278" r="16" fill="#f0c419"/>
  <line x1="170" y1="254" x2="170" y2="264" stroke="#f0c419" stroke-width="2"/>
  <line x1="146" y1="278" x2="156" y2="278" stroke="#f0c419" stroke-width="2"/>
  <line x1="194" y1="278" x2="184" y2="278" stroke="#f0c419" stroke-width="2"/>
  <path d="M 150 300 q 20 -16 40 0" stroke="#3a7d44" stroke-width="2" fill="none"/>
  <text x="170" y="335" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">戴望舒·晴天</text>
  <text x="170" y="358" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">天晴去走走</text>
  <!-- 右珠：普希金雨天 -->
  <circle cx="630" cy="300" r="110" fill="#5d8aa8" opacity="0.3" stroke="#1e5f8e" stroke-width="3"/>
  <ellipse cx="630" cy="272" rx="26" ry="10" fill="#7d8a99"/>
  <line x1="618" y1="282" x2="612" y2="300" stroke="#5d8aa8" stroke-width="2"/>
  <line x1="630" y1="282" x2="624" y2="302" stroke="#5d8aa8" stroke-width="2"/>
  <line x1="642" y1="282" x2="636" y2="300" stroke="#5d8aa8" stroke-width="2"/>
  <circle cx="630" cy="305" r="6" fill="#f0c419"/>
  <text x="630" y="335" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">普希金·雨天</text>
  <text x="630" y="358" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">相信快乐会来</text>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">天晴走走，普希金的日子</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">心情好不好不全看天气，更看怎么对待日子</text>
</svg>
