<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">苏武牧羊十九年</text>
  <!-- 雪地背景 -->
  <rect x="0" y="350" width="800" height="250" fill="#fff" opacity="0.5"/>
  <!-- 远山 -->
  <path d="M0 350 L150 250 L300 320 L500 230 L700 300 L800 280 L800 350 Z" fill="#a8d0e8" opacity="0.3"/>
  <!-- 贝加尔湖 -->
  <ellipse cx="400" cy="480" rx="300" ry="40" fill="#a8d0e8" opacity="0.3"/>
  <!-- 羊群 -->
  <g transform="translate(150 420)">
    <ellipse cx="0" cy="0" rx="20" ry="15" fill="#fff" stroke="#8d5a36" stroke-width="1.5"/>
    <circle cx="-15" cy="-5" r="8" fill="#fff" stroke="#8d5a36" stroke-width="1.5"/>
    <circle cx="-17" cy="-7" r="2" fill="#1a1a2e"/>
  </g>
  <g transform="translate(220 440)">
    <ellipse cx="0" cy="0" rx="18" ry="13" fill="#fff" stroke="#8d5a36" stroke-width="1.5"/>
    <circle cx="-13" cy="-4" r="7" fill="#fff" stroke="#8d5a36" stroke-width="1.5"/>
    <circle cx="-15" cy="-6" r="2" fill="#1a1a2e"/>
  </g>
  <g transform="translate(600 430)">
    <ellipse cx="0" cy="0" rx="22" ry="16" fill="#fff" stroke="#8d5a36" stroke-width="1.5"/>
    <circle cx="-16" cy="-5" r="8" fill="#fff" stroke="#8d5a36" stroke-width="1.5"/>
    <circle cx="-18" cy="-7" r="2" fill="#1a1a2e"/>
  </g>
  <!-- 苏武 -->
  <g transform="translate(400 380)">
    <!-- 身体 -->
    <rect x="-15" y="-30" width="30" height="50" rx="5" fill="#8d5a36" opacity="0.7"/>
    <!-- 头 -->
    <circle cx="0" cy="-40" r="12" fill="#c8843a"/>
    <!-- 胡须 -->
    <path d="M-5 -32 Q0 -25 5 -32" fill="none" stroke="#fff" stroke-width="2"/>
    <!-- 节杖 -->
    <line x1="20" y1="-50" x2="20" y2="20" stroke="#7a3b14" stroke-width="3"/>
    <line x1="15" y1="-45" x2="25" y2="-45" stroke="#c84a3a" stroke-width="2"/>
    <line x1="15" y1="-38" x2="25" y2="-38" stroke="#c84a3a" stroke-width="2"/>
    <line x1="15" y1="-31" x2="25" y2="-31" stroke="#c84a3a" stroke-width="2"/>
  </g>
  <!-- 雪花 -->
  <circle cx="100" cy="150" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="250" cy="100" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="500" cy="120" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="650" cy="180" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="350" cy="200" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="700" cy="250" r="3" fill="#fff" opacity="0.8"/>
  <!-- 底部文字 -->
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36" opacity="0.6">北海牧羊 · 节杖不落</text>
</svg>
