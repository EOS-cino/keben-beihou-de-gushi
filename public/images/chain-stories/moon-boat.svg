<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="月相变化与弯月像小船的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">弯弯的月亮为什么像小船</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">月亮的亮面在变化，弯月时两头尖尖就像小船</text>

  <!-- 夜空底色 -->
  <rect x="40" y="100" width="720" height="200" fill="#2a4a6f" opacity="0.15" rx="12"/>

  <!-- 月相图：五个阶段 -->
  <!-- 1 新月 -->
  <g transform="translate(130,200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14" font-weight="bold">新月</text>
    <circle cx="0" cy="0" r="38" fill="#3a3a3a" opacity="0.25"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#8d5a36" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">几乎看不见</text>
  </g>

  <!-- 箭头 -->
  <path d="M180 200 L210 200" stroke="#c8843a" stroke-width="3" fill="none" marker-end="url(#arr)"/>

  <!-- 2 蛾眉月 -->
  <g transform="translate(270,200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14" font-weight="bold">蛾眉月</text>
    <circle cx="0" cy="0" r="38" fill="#3a3a3a" opacity="0.2"/>
    <path d="M0 -38 A38 38 0 0 1 0 38 A24 38 0 0 0 0 -38 Z" fill="#f4d97a"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">像弯眉毛</text>
  </g>

  <path d="M320 200 L350 200" stroke="#c8843a" stroke-width="3" fill="none" marker-end="url(#arr)"/>

  <!-- 3 弯月（像小船） -->
  <g transform="translate(410,200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" fill="#c84a3a" font-weight="bold">弯月</text>
    <circle cx="0" cy="0" r="38" fill="#3a3a3a" opacity="0.2"/>
    <path d="M0 -38 A38 38 0 0 1 0 38 A18 38 0 0 0 0 -38 Z" fill="#f4d97a"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a" font-weight="bold">像小船！</text>
  </g>

  <path d="M460 200 L490 200" stroke="#c8843a" stroke-width="3" fill="none" marker-end="url(#arr)"/>

  <!-- 4 凸月 -->
  <g transform="translate(550,200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14" font-weight="bold">凸月</text>
    <circle cx="0" cy="0" r="38" fill="#3a3a3a" opacity="0.2"/>
    <path d="M0 -38 A38 38 0 0 1 0 38 A12 38 0 0 0 0 -38 Z" fill="#f4d97a"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">越来越圆</text>
  </g>

  <path d="M600 200 L630 200" stroke="#c8843a" stroke-width="3" fill="none" marker-end="url(#arr)"/>

  <!-- 5 满月 -->
  <g transform="translate(690,200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14" font-weight="bold">满月</text>
    <circle cx="0" cy="0" r="38" fill="#f4d97a"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#c8843a" stroke-width="2"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">圆圆像盘子</text>
  </g>

  <!-- 下方：太阳-地球-月亮示意 -->
  <text x="400" y="350" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14" font-weight="bold">月亮靠反射太阳光发亮</text>

  <!-- 太阳 -->
  <g transform="translate(140,460)">
    <circle cx="0" cy="0" r="42" fill="#f4b942"/>
    <g stroke="#f4b942" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="-58" x2="0" y2="-72"/>
      <line x1="0" y1="58" x2="0" y2="72"/>
      <line x1="-58" y1="0" x2="-72" y2="0"/>
      <line x1="58" y1="0" x2="72" y2="0"/>
      <line x1="-41" y1="-41" x2="-51" y2="-51"/>
      <line x1="41" y1="-41" x2="51" y2="-51"/>
      <line x1="-41" y1="41" x2="-51" y2="51"/>
      <line x1="41" y1="41" x2="51" y2="51"/>
    </g>
    <text x="0" y="95" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36" font-weight="bold">太阳</text>
  </g>

  <!-- 光线 -->
  <g stroke="#f4b942" stroke-width="2" opacity="0.5" stroke-dasharray="6,4">
    <line x1="185" y1="460" x2="370" y2="460"/>
  </g>

  <!-- 地球 -->
  <g transform="translate(420,460)">
    <circle cx="0" cy="0" r="30" fill="#7ab8d8"/>
    <path d="M-18 -8 Q-8 -14 2 -6 Q12 -2 18 -12" fill="#6a8d3f" opacity="0.7"/>
    <path d="M-12 10 Q-2 6 8 14 Q14 18 18 8" fill="#6a8d3f" opacity="0.7"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36" font-weight="bold">地球</text>
  </g>

  <!-- 月亮绕地球轨道 -->
  <ellipse cx="420" cy="460" rx="90" ry="32" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- 月亮 -->
  <g transform="translate(510,460)">
    <circle cx="0" cy="0" r="16" fill="#f4d97a"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#c8843a" stroke-width="1.5"/>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36" font-weight="bold">月亮</text>
  </g>

  <!-- 说明 -->
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">月亮转到不同位置，我们看到的亮面大小不同，就有了月相变化</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#c8843a"/>
    </marker>
  </defs>
</svg>
