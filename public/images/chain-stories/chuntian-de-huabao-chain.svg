<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="春天色彩由来的自然科学故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">春天的颜色从哪里来</text>
  <line x1="220" y1="56" x2="580" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——每朵花、每片叶，都是一个小染坊</text>

  <!-- 花青素变色调色 -->
  <g transform="translate(180, 150)">
    <rect x="-120" y="0" width="240" height="180" rx="8" fill="#fef9ed" stroke="#c84a3a" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#c84a3a">花青素：变色龙</text>
    <!-- 三朵花 -->
    <g transform="translate(-60, 80)">
      <circle cx="0" cy="0" r="16" fill="#e07856" stroke="#7a3b14" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="5" fill="#e8a838"/>
      <text x="0" y="34" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">酸性·红</text>
    </g>
    <g transform="translate(0, 80)">
      <circle cx="0" cy="0" r="16" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="5" fill="#e8a838"/>
      <text x="0" y="34" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">中性·紫</text>
    </g>
    <g transform="translate(60, 80)">
      <circle cx="0" cy="0" r="16" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="5" fill="#e8a838"/>
      <text x="0" y="34" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">碱性·蓝</text>
    </g>
    <text x="0" y="160" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">随汁液酸碱变红变蓝</text>
  </g>

  <!-- 类胡萝卜素染黄 -->
  <g transform="translate(620, 150)">
    <rect x="-120" y="0" width="240" height="180" rx="8" fill="#fef9ed" stroke="#e8a838" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#e8a838">类胡萝卜素：染黄</text>
    <g transform="translate(0, 80)">
      <path d="M-30 30 L-30 -10" stroke="#2d6a4f" stroke-width="2"/>
      <path d="M0 30 L0 -20" stroke="#2d6a4f" stroke-width="2"/>
      <path d="M30 30 L30 -10" stroke="#2d6a4f" stroke-width="2"/>
      <circle cx="-30" cy="-16" r="9" fill="#e8a838" stroke="#c8843a" stroke-width="1"/>
      <circle cx="0" cy="-26" r="10" fill="#e8a838" stroke="#c8843a" stroke-width="1"/>
      <circle cx="30" cy="-16" r="9" fill="#e8a838" stroke="#c8843a" stroke-width="1"/>
    </g>
    <text x="0" y="160" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">油菜花的金黄</text>
  </g>

  <!-- 叶绿素与光合作用 -->
  <g transform="translate(400, 360)">
    <rect x="-260" y="0" width="520" height="120" rx="8" fill="#fef9ed" stroke="#2d6a4f" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#2d6a4f">叶绿素：叶子为什么绿</text>
    <!-- 阳光 -->
    <g transform="translate(-180, 60)">
      <circle cx="0" cy="0" r="14" fill="#e8a838" opacity="0.5"/>
      <circle cx="0" cy="0" r="9" fill="#e8a838"/>
      <line x1="14" y1="0" x2="40" y2="0" stroke="#e8a838" stroke-width="2" stroke-dasharray="4 3"/>
      <text x="0" y="34" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">阳光</text>
    </g>
    <!-- 叶子 -->
    <g transform="translate(0, 60)">
      <path d="M-30 0 Q0 -30 30 0 Q0 30 -30 0 Z" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
      <line x1="-30" y1="0" x2="30" y2="0" stroke="#4a6a2f" stroke-width="1"/>
      <text x="0" y="44" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">叶绿素抓阳光</text>
    </g>
    <!-- 产物 -->
    <g transform="translate(180, 60)">
      <circle cx="-15" cy="0" r="6" fill="#4a90b8" opacity="0.6"/>
      <text x="-15" y="20" text-anchor="middle" font-family="serif" font-size="8" fill="#7a3b14">水</text>
      <circle cx="15" cy="0" r="6" fill="#e07856" opacity="0.5"/>
      <text x="15" y="20" text-anchor="middle" font-family="serif" font-size="8" fill="#7a3b14">养分</text>
    </g>
    <text x="0" y="105" text-anchor="middle" font-family="serif" font-size="10" fill="#2d6a4f">光合作用：阳光+水+二氧化碳 → 养分</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 510)">
    <rect x="-300" y="0" width="600" height="60" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">春天的颜色，是植物为了活下去、传下去精心"画"的</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">春天好看，是因为春天里的一切，都在认真地活着</text>
  </g>
</svg>
