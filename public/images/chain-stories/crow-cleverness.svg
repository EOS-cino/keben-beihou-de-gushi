  <text x="400" y="488" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">乌鸦口渴了，发现瓶中有水但够不着，便衔石子投入瓶中，</text>
  <text x="400" y="510" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">水面升高后终于喝到了水。黑猩猩也会用树枝伸入蚁穴钓白蚁吃。</text>
  <text x="400" y="538" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">这些行为说明，动物遇到困难时也会动脑筋、想办法，</text>
  <text x="400" y="558" text-anchor="middle" font-size="13" font-weight="bold" fill="#c8843a" font-family="serif">使用工具解决问题并非人类独有的能力。</text>
