<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="昆虫世界的秘密插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">昆虫世界的秘密</text>
  <line x1="270" y1="56" x2="530" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——大力士·舞蹈家·变身大师</text>

  <!-- 四个秘密分格 -->
  <!-- 蚂蚁：大力士 -->
  <g transform="translate(130, 160)">
    <rect x="-100" y="0" width="200" height="170" rx="10" fill="#fef9ed" stroke="#8d5a36" stroke-width="2"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#8d5a36">蚂蚁：大力士</text>
    <!-- 蚂蚁举重 -->
    <g transform="translate(0, 80)">
      <ellipse cx="0" cy="10" rx="8" ry="5" fill="#7a3b14"/>
      <circle cx="-6" cy="5" r="5" fill="#7a3b14"/>
      <ellipse cx="6" cy="10" rx="6" ry="4" fill="#7a3b14"/>
      <!-- 举着大东西 -->
      <rect x="-15" y="-15" width="30" height="10" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
      <path d="M-10 -5 L-10 -15 M10 -5 L10 -15" stroke="#7a3b14" stroke-width="2"/>
    </g>
    <text x="0" y="130" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">举起自重50倍的东西</text>
    <text x="0" y="145" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">=人举起一辆汽车</text>
    <text x="0" y="160" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">信息素交流→排成一条线</text>
  </g>

  <!-- 蜜蜂：舞蹈家 -->
  <g transform="translate(400, 160)">
    <rect x="-100" y="0" width="200" height="170" rx="10" fill="#fef9ed" stroke="#c8843a" stroke-width="2"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#c8843a">蜜蜂：舞蹈家</text>
    <!-- 蜜蜂跳舞（8字舞） -->
    <g transform="translate(0, 80)">
      <ellipse cx="0" cy="0" rx="10" ry="6" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-4 -4 Q-5 -12 -2 -15" fill="none" stroke="#7a3b14" stroke-width="1"/>
      <path d="M4 -4 Q5 -12 2 -15" fill="none" stroke="#7a3b14" stroke-width="1"/>
      <!-- 8字舞路线 -->
      <path d="M-20 -10 Q-25 -25 -10 -25 Q5 -25 0 -10 Q-5 5 -20 -10" fill="none" stroke="#e07856" stroke-width="1.5" stroke-dasharray="3 2"/>
      <path d="M20 -10 Q25 -25 10 -25 Q-5 -25 0 -10 Q5 5 20 -10" fill="none" stroke="#e07856" stroke-width="1.5" stroke-dasharray="3 2"/>
    </g>
    <text x="0" y="130" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">圆圈舞=花蜜在附近</text>
    <text x="0" y="145" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">8字舞=花蜜在远处</text>
    <text x="0" y="160" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">直线方向=太阳和花蜜的夹角</text>
  </g>

  <!-- 蝴蝶：变身大师 -->
  <g transform="translate(670, 160)">
    <rect x="-100" y="0" width="200" height="170" rx="10" fill="#fef9ed" stroke="#6a8d3f" stroke-width="2"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#6a8d3f">蝴蝶：变身大师</text>
    <!-- 变身过程 -->
    <g transform="translate(0, 60)">
      <!-- 卵 -->
      <circle cx="-60" cy="10" r="4" fill="#c8843a"/>
      <text x="-60" y="25" text-anchor="middle" font-family="serif" font-size="8" fill="#7a3b14">卵</text>
      <!-- 毛毛虫 -->
      <g transform="translate(-25, 10)">
        <ellipse cx="0" cy="0" rx="4" ry="3" fill="#6a8d3f"/>
        <ellipse cx="6" cy="0" rx="4" ry="3" fill="#6a8d3f"/>
        <ellipse cx="12" cy="0" rx="4" ry="3" fill="#6a8d3f"/>
        <ellipse cx="18" cy="0" rx="4" ry="3" fill="#6a8d3f"/>
      </g>
      <text x="-7" y="25" text-anchor="middle" font-family="serif" font-size="8" fill="#7a3b14">幼虫</text>
      <!-- 蛹 -->
      <ellipse cx="25" cy="8" rx="5" ry="10" fill="#8d5a36"/>
      <text x="25" y="25" text-anchor="middle" font-family="serif" font-size="8" fill="#7a3b14">蛹</text>
      <!-- 蝴蝶 -->
      <g transform="translate(60, 8)">
        <ellipse cx="0" cy="0" rx="2" ry="6" fill="#7a3b14"/>
        <path d="M-2 -2 Q-10 -8 -12 -2 Q-10 2 -2 0" fill="#e07856" stroke="#7a3b14" stroke-width="0.5"/>
        <path d="M2 -2 Q10 -8 12 -2 Q10 2 2 0" fill="#e07856" stroke="#7a3b14" stroke-width="0.5"/>
      </g>
      <text x="60" y="25" text-anchor="middle" font-family="serif" font-size="8" fill="#7a3b14">蝴蝶</text>
      <!-- 箭头 -->
      <path d="M-50 5 L-40 5" stroke="#c8843a" stroke-width="1.5" fill="none"/>
      <path d="M-5 5 L15 5" stroke="#c8843a" stroke-width="1.5" fill="none"/>
      <path d="M35 5 L50 5" stroke="#c8843a" stroke-width="1.5" fill="none"/>
    </g>
    <text x="0" y="130" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">完全变态</text>
    <text x="0" y="145" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">卵→幼虫→蛹→蝴蝶</text>
    <text x="0" y="160" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">大自然最神奇的魔术</text>
  </g>

  <!-- 蟑螂：生存冠军 -->
  <g transform="translate(265, 380)">
    <rect x="-100" y="0" width="200" height="130" rx="10" fill="#fef9ed" stroke="#c84a3a" stroke-width="2"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#c84a3a">蟑螂：生存冠军</text>
    <g transform="translate(0, 60)">
      <ellipse cx="0" cy="0" rx="18" ry="10" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <ellipse cx="-12" cy="-2" rx="8" ry="6" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-18 -5 L-22 -8 M-15 -8 L-18 -12" stroke="#7a3b14" stroke-width="1" fill="none"/>
      <path d="M15 0 Q22 -5 20 -12" fill="none" stroke="#8d5a36" stroke-width="3"/>
    </g>
    <text x="0" y="95" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">活了3亿年·比恐龙还早</text>
    <text x="0" y="110" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">没头还能活一星期</text>
    <text x="0" y="125" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">什么都吃·极端环境也能活</text>
  </g>

  <!-- 法布尔 -->
  <g transform="translate(535, 380)">
    <rect x="-100" y="0" width="200" height="130" rx="10" fill="#fef9ed" stroke="#7ab8d8" stroke-width="2"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7ab8d8">法布尔</text>
    <g transform="translate(0, 55)">
      <!-- 人物 -->
      <circle cx="0" cy="-5" r="10" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <ellipse cx="0" cy="15" rx="12" ry="15" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
      <!-- 放大镜 -->
      <circle cx="20" cy="5" r="8" fill="none" stroke="#7a3b14" stroke-width="2"/>
      <line x1="26" y1="11" x2="32" y2="17" stroke="#7a3b14" stroke-width="2"/>
    </g>
    <text x="0" y="95" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">法国昆虫学家</text>
    <text x="0" y="110" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">到田野里蹲着看昆虫</text>
    <text x="0" y="125" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">写出《昆虫记》</text>
  </g>
</svg>
