<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="小镇随时代变迁的故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">小镇是怎么变的</text>
  <line x1="250" y1="56" x2="550" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——一直在变，可总有些东西倔强地不变</text>

  <!-- 时间轴 -->
  <line x1="80" y1="200" x2="720" y2="200" stroke="#c8843a" stroke-width="3"/>
  <circle cx="180" cy="200" r="8" fill="#6a8d3f"/>
  <circle cx="380" cy="200" r="8" fill="#c8843a"/>
  <circle cx="560" cy="200" r="8" fill="#c84a3a"/>
  <circle cx="680" cy="200" r="8" fill="#4a90b8"/>

  <!-- 最早：河边码头 -->
  <g transform="translate(180, 100)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#6a8d3f">最早</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">河边码头</text>
    <g transform="translate(0, 50)">
      <!-- 河 -->
      <rect x="-40" y="30" width="80" height="15" fill="#4a90b8" opacity="0.3"/>
      <!-- 小船 -->
      <path d="M-15 30 Q0 38 15 30" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 摊位 -->
      <rect x="-25" y="15" width="15" height="15" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
      <rect x="10" y="15" width="15" height="15" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
      <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">船来船往</text>
      <text x="0" y="73" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">有人住下</text>
    </g>
  </g>

  <!-- 赶集日 -->
  <g transform="translate(380, 100)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#c8843a">赶集日</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">最热闹</text>
    <g transform="translate(0, 50)">
      <!-- 摊位 -->
      <rect x="-35" y="15" width="20" height="15" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
      <rect x="-10" y="15" width="20" height="15" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
      <rect x="15" y="15" width="20" height="15" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1"/>
      <!-- 人 -->
      <circle cx="-25" cy="5" r="4" fill="#e07856"/>
      <circle cx="0" cy="3" r="4" fill="#e07856"/>
      <circle cx="25" cy="5" r="4" fill="#e07856"/>
      <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">人挤人</text>
      <text x="0" y="63" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">糖人·糖葫芦</text>
    </g>
  </g>

  <!-- 变化：超市来了 -->
  <g transform="translate(560, 100)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#c84a3a">后来</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">超市·新路</text>
    <g transform="translate(0, 50)">
      <!-- 超市 -->
      <rect x="-30" y="0" width="60" height="35" fill="#4a90b8" opacity="0.6" stroke="#7a3b14" stroke-width="1.5"/>
      <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="10" fill="#fef9ed">超市</text>
      <!-- 马路 -->
      <rect x="-35" y="40" width="70" height="8" fill="#7a3b14"/>
      <line x1="-30" y1="44" x2="-20" y2="44" stroke="#e8a838" stroke-width="1.5"/>
      <line x1="-10" y1="44" x2="0" y2="44" stroke="#e8a838" stroke-width="1.5"/>
      <line x1="10" y1="44" x2="20" y2="44" stroke="#e8a838" stroke-width="1.5"/>
      <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">年轻人去城里</text>
      <text x="0" y="78" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">老街冷清了</text>
    </g>
  </g>

  <!-- 现在：复活 -->
  <g transform="translate(680, 100)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#4a90b8">现在</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">古镇复活</text>
    <g transform="translate(0, 50)">
      <!-- 老房子+小店 -->
      <path d="M-25 35 L-25 10 L0 -5 L25 10 L25 35 Z" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-8" y="18" width="16" height="17" fill="#8d5a36"/>
      <!-- 招牌 -->
      <rect x="-15" y="5" width="30" height="8" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
      <text x="0" y="12" text-anchor="middle" font-family="serif" font-size="6" fill="#7a3b14">小店</text>
      <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">年轻人回来</text>
      <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">留住老的</text>
    </g>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 350)">
    <rect x="-320" y="0" width="640" height="200" rx="10" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">有些东西，马路和超市带不走</text>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">变了的：新马路 · 超市 · 年轻人去城里 · 洗衣机代替河边洗衣</text>
    <text x="0" y="85" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">没变的：张奶奶送糕 · 赵伯帮忙 · 老桥 · 石板路 · 饭菜香</text>
    <text x="0" y="115" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">几百年攒下来的那份"近"，没那么容易散</text>
    <text x="0" y="145" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">小镇也许回不到从前，可它正在用新的方式，把老的东西留住</text>
    <text x="0" y="175" text-anchor="middle" font-family="serif" font-size="13" fill="#2d6a4f">一直在变，可总有些东西，倔强地不变</text>
  </g>
</svg>
