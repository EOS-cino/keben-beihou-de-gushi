<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="天安门历史故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">天安门的故事</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">从明朝的承天门到新中国的象征</text>

  <!-- 天安门城楼 -->
  <g transform="translate(400,280)">
    <!-- 城台 -->
    <rect x="-150" y="20" width="300" height="100" fill="#c8843a" stroke="#8d5a36" stroke-width="2"/>
    <!-- 城楼主体 -->
    <rect x="-120" y="-50" width="240" height="70" fill="#c84a3a" stroke="#8d5a36" stroke-width="2"/>
    <!-- 屋顶第一层 -->
    <path d="M-130 -50 L-100 -85 L100 -85 L130 -50 Z" fill="#8d5a36"/>
    <!-- 屋顶第二层 -->
    <path d="M-105 -85 L-80 -115 L80 -115 L105 -85 Z" fill="#c8843a"/>
    <!-- 屋脊 -->
    <rect x="-80" y="-120" width="160" height="6" fill="#8d5a36"/>
    <!-- 门洞 -->
    <rect x="-20" y="50" width="40" height="70" rx="20" fill="#7a3b14"/>
    <rect x="-80" y="50" width="25" height="70" rx="12" fill="#7a3b14"/>
    <rect x="55" y="50" width="25" height="70" rx="12" fill="#7a3b14"/>
    <!-- 窗户 -->
    <rect x="-90" y="-35" width="20" height="25" fill="#7a3b14"/>
    <rect x="-55" y="-35" width="20" height="25" fill="#7a3b14"/>
    <rect x="35" y="-35" width="20" height="25" fill="#7a3b14"/>
    <rect x="70" y="-35" width="20" height="25" fill="#7a3b14"/>
    <!-- 柱子 -->
    <rect x="-100" y="-50" width="6" height="70" fill="#8d5a36"/>
    <rect x="94" y="-50" width="6" height="70" fill="#8d5a36"/>
    <!-- 画像位置 -->
    <rect x="-15" y="-40" width="30" height="35" fill="#fef9ed" stroke="#8d5a36" stroke-width="1"/>
    <!-- 标语 -->
    <rect x="-85" y="-15" width="55" height="12" fill="#fef9ed" opacity="0.8"/>
    <rect x="30" y="-15" width="55" height="12" fill="#fef9ed" opacity="0.8"/>
  </g>

  <!-- 旗杆和旗帜 -->
  <g transform="translate(400,440)">
    <rect x="-2" y="0" width="4" height="60" fill="#8d5a36"/>
    <rect x="2" y="5" width="30" height="20" fill="#c84a3a"/>
    <polygon points="7,10 9,15 7,15 9,20 7,20 11,15" fill="#f4b942"/>
  </g>

  <!-- 时间标注 -->
  <!-- 明朝 -->
  <g transform="translate(120,180)">
    <rect x="-70" y="-30" width="140" height="60" rx="8" fill="#fef0d8" stroke="#c8843a" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">1417年·明朝</text>
    <text x="0" y="12" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">原名"承天门"</text>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">承天启运</text>
  </g>

  <!-- 清朝 -->
  <g transform="translate(680,180)">
    <rect x="-70" y="-30" width="140" height="60" rx="8" fill="#fef0d8" stroke="#c8843a" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">1651年·清朝</text>
    <text x="0" y="12" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">改名"天安门"</text>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">安邦治国</text>
  </g>

  <!-- 开国大典 -->
  <g transform="translate(120,460)">
    <rect x="-70" y="-30" width="140" height="60" rx="8" fill="#fef0d8" stroke="#c84a3a" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a" font-weight="bold">1949年10月1日</text>
    <text x="0" y="12" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">开国大典</text>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">第一面国旗升起</text>
  </g>

  <!-- 现在 -->
  <g transform="translate(680,460)">
    <rect x="-70" y="-30" width="140" height="60" rx="8" fill="#fef0d8" stroke="#c84a3a" stroke-width="1.5"/>
    <text x="0" y="-8" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a" font-weight="bold">现在</text>
    <text x="0" y="12" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">每天日出升旗</text>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">国旗跟太阳同升</text>
  </g>

  <!-- 底部 -->
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">天安门是中国的象征，天安门广场是世界上最大的城市广场之一</text>
</svg>
