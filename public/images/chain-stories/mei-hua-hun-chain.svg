<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠故事 - 梅花的文化象征">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 连珠标识徽章 -->
  <g transform="translate(60,42)">
    <rect x="-44" y="-22" width="88" height="44" rx="22" fill="#3a7d5c"/>
    <circle cx="-26" cy="0" r="5" fill="#fef9ed"/><circle cx="-10" cy="0" r="5" fill="#fef9ed"/><circle cx="6" cy="0" r="5" fill="#fef9ed"/><circle cx="22" cy="0" r="5" fill="#fef9ed"/>
    <text x="40" y="5" font-family="serif" font-size="16" font-weight="bold" fill="#fef9ed">连珠</text>
  </g>
  <text x="460" y="48" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#3a7d5c">梅花的文化象征</text>
  <line x1="360" y1="64" x2="560" y2="64" stroke="#3a7d5c" stroke-width="2"/>

  <!-- 四君子横向排列 -->
  <!-- 梅 -->
  <g transform="translate(150,210)">
    <rect x="-75" y="-90" width="150" height="220" rx="8" fill="#fff" stroke="#c05a30" stroke-width="2"/>
    <circle cx="0" cy="-60" r="22" fill="#c05a30" opacity="0.15"/>
    <text x="0" y="-54" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#c05a30">梅</text>
    <!-- 梅树枝干 -->
    <path d="M-20 80 Q-10 40 0 0 Q5 -25 10 -50" stroke="#2d2a24" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0 0 Q-15 -10 -25 -20" stroke="#2d2a24" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M5 -25 Q20 -35 30 -45" stroke="#2d2a24" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- 花朵 -->
    <g fill="#c05a30">
      <g transform="translate(-25,-20)"><circle r="4"/><circle cx="-4" cy="-3" r="3"/><circle cx="4" cy="-3" r="3"/><circle cx="-3" cy="4" r="3"/><circle cx="3" cy="4" r="3"/></g>
      <g transform="translate(10,-50)"><circle r="4"/><circle cx="-4" cy="-3" r="3"/><circle cx="4" cy="-3" r="3"/><circle cx="-3" cy="4" r="3"/><circle cx="3" cy="4" r="3"/></g>
      <g transform="translate(30,-45)"><circle r="3.5"/><circle cx="-4" cy="-3" r="3"/><circle cx="4" cy="-3" r="3"/><circle cx="-3" cy="4" r="3"/><circle cx="3" cy="4" r="3"/></g>
    </g>
    <text x="0" y="110" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">凌寒傲雪</text>
    <text x="0" y="128" text-anchor="middle" font-family="serif" font-size="12" fill="#7a7468">坚韧不屈</text>
  </g>

  <!-- 兰 -->
  <g transform="translate(320,210)">
    <rect x="-75" y="-90" width="150" height="220" rx="8" fill="#fff" stroke="#3a7d5c" stroke-width="2"/>
    <circle cx="0" cy="-60" r="22" fill="#3a7d5c" opacity="0.15"/>
    <text x="0" y="-54" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#3a7d5c">兰</text>
    <!-- 兰叶 -->
    <path d="M0 80 Q-10 30 -20 -20 Q-25 -45 -20 -65" stroke="#3a7d5c" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0 80 Q5 30 15 -10 Q20 -40 18 -60" stroke="#3a7d5c" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0 80 Q0 30 0 -30" stroke="#3a7d5c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- 兰花 -->
    <g transform="translate(-20,-65)"><ellipse cx="0" cy="0" rx="4" ry="7" fill="#3a7d5c" opacity="0.8"/><ellipse cx="-6" cy="2" rx="3" ry="6" fill="#3a7d5c" opacity="0.6" transform="rotate(-30)"/><ellipse cx="6" cy="2" rx="3" ry="6" fill="#3a7d5c" opacity="0.6" transform="rotate(30)"/></g>
    <g transform="translate(18,-60)"><ellipse cx="0" cy="0" rx="4" ry="7" fill="#3a7d5c" opacity="0.8"/><ellipse cx="-6" cy="2" rx="3" ry="6" fill="#3a7d5c" opacity="0.6" transform="rotate(-30)"/><ellipse cx="6" cy="2" rx="3" ry="6" fill="#3a7d5c" opacity="0.6" transform="rotate(30)"/></g>
    <text x="0" y="110" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">幽谷清香</text>
    <text x="0" y="128" text-anchor="middle" font-family="serif" font-size="12" fill="#7a7468">高洁淡泊</text>
  </g>

  <!-- 竹 -->
  <g transform="translate(490,210)">
    <rect x="-75" y="-90" width="150" height="220" rx="8" fill="#fff" stroke="#3a7d5c" stroke-width="2"/>
    <circle cx="0" cy="-60" r="22" fill="#3a7d5c" opacity="0.15"/>
    <text x="0" y="-54" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#3a7d5c">竹</text>
    <!-- 竹竿 -->
    <rect x="-4" y="-30" width="8" height="110" fill="#3a7d5c" opacity="0.7"/>
    <line x1="-4" y1="10" x2="4" y2="10" stroke="#2d2a24" stroke-width="1.5"/>
    <line x1="-4" y1="40" x2="4" y2="40" stroke="#2d2a24" stroke-width="1.5"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#2d2a24" stroke-width="1.5"/>
    <!-- 竹枝叶 -->
    <path d="M0 -30 Q15 -45 30 -55" stroke="#3a7d5c" stroke-width="2" fill="none"/>
    <path d="M0 -10 Q-15 -25 -30 -30" stroke="#3a7d5c" stroke-width="2" fill="none"/>
    <ellipse cx="30" cy="-58" rx="12" ry="3" fill="#3a7d5c" transform="rotate(30 30 -58)"/>
    <ellipse cx="35" cy="-50" rx="11" ry="3" fill="#3a7d5c" opacity="0.8" transform="rotate(45 35 -50)"/>
    <ellipse cx="-30" cy="-33" rx="12" ry="3" fill="#3a7d5c" transform="rotate(-30 -30 -33)"/>
    <ellipse cx="-35" cy="-25" rx="11" ry="3" fill="#3a7d5c" opacity="0.8" transform="rotate(-45 -35 -25)"/>
    <text x="0" y="110" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">虚心劲节</text>
    <text x="0" y="128" text-anchor="middle" font-family="serif" font-size="12" fill="#7a7468">正直谦逊</text>
  </g>

  <!-- 菊 -->
  <g transform="translate(660,210)">
    <rect x="-75" y="-90" width="150" height="220" rx="8" fill="#fff" stroke="#c05a30" stroke-width="2"/>
    <circle cx="0" cy="-60" r="22" fill="#c05a30" opacity="0.15"/>
    <text x="0" y="-54" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#c05a30">菊</text>
    <!-- 菊花 -->
    <g transform="translate(0,-20)">
      <circle cx="0" cy="0" r="22" fill="#c05a30" opacity="0.2"/>
      <ellipse cx="0" cy="-14" rx="4" ry="12" fill="#c05a30" opacity="0.7"/>
      <ellipse cx="0" cy="-14" rx="4" ry="12" fill="#c05a30" opacity="0.7" transform="rotate(45)"/>
      <ellipse cx="0" cy="-14" rx="4" ry="12" fill="#c05a30" opacity="0.7" transform="rotate(90)"/>
      <ellipse cx="0" cy="-14" rx="4" ry="12" fill="#c05a30" opacity="0.7" transform="rotate(135)"/>
      <ellipse cx="0" cy="-14" rx="4" ry="12" fill="#c05a30" opacity="0.7" transform="rotate(180)"/>
      <ellipse cx="0" cy="-14" rx="4" ry="12" fill="#c05a30" opacity="0.7" transform="rotate(225)"/>
      <ellipse cx="0" cy="-14" rx="4" ry="12" fill="#c05a30" opacity="0.7" transform="rotate(270)"/>
      <ellipse cx="0" cy="-14" rx="4" ry="12" fill="#c05a30" opacity="0.7" transform="rotate(315)"/>
      <circle cx="0" cy="0" r="6" fill="#7a3b14"/>
    </g>
    <!-- 茎叶 -->
    <path d="M0 5 L0 80" stroke="#3a7d5c" stroke-width="2.5" fill="none"/>
    <ellipse cx="-12" cy="45" rx="10" ry="4" fill="#3a7d5c" opacity="0.6" transform="rotate(-30 -12 45)"/>
    <ellipse cx="14" cy="60" rx="10" ry="4" fill="#3a7d5c" opacity="0.6" transform="rotate(30 14 60)"/>
    <text x="0" y="110" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">傲霜怒放</text>
    <text x="0" y="128" text-anchor="middle" font-family="serif" font-size="12" fill="#7a7468">隐逸清雅</text>
  </g>

  <!-- 顶部标题横幅 -->
  <g transform="translate(400,100)">
    <rect x="-110" y="-22" width="220" height="40" rx="20" fill="#c05a30" opacity="0.9"/>
    <text x="0" y="6" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#fef9ed">四 君 子</text>
  </g>

  <!-- 连线装饰 -->
  <g stroke="#c05a30" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.4">
    <line x1="225" y1="100" x2="245" y2="120"/>
    <line x1="395" y1="100" x2="395" y2="120"/>
    <line x1="565" y1="100" x2="545" y2="120"/>
  </g>

  <!-- 底部诗句 -->
  <g transform="translate(400,480)">
    <rect x="-280" y="0" width="560" height="40" rx="6" fill="#7a3b14" opacity="0.08"/>
    <text x="0" y="26" text-anchor="middle" font-family="serif" font-size="17" fill="#7a3b14">"不要人夸好颜色，只留清气满乾坤"</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="17" fill="#3a7d5c" opacity="0.9">连珠小故事：梅兰竹菊，花中君子，寄托中国人品格追求</text>
</svg>
