<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="王安石与春节传统插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：王安石与春节</text>
  <line x1="200" y1="62" x2="600" y2="62" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 王安石 -->
  <g transform="translate(180, 280)">
    <circle cx="0" cy="-50" r="30" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 官帽 -->
    <path d="M-25 -65 L-20 -85 L0 -90 L20 -85 L25 -65 Z" fill="#3a2a1a" stroke="#7a3b14" stroke-width="2"/>
    <rect x="-8" y="-88" width="16" height="6" fill="#5a3a1a"/>
    <!-- 五官 -->
    <circle cx="-8" cy="-50" r="3" fill="#2a2a2a"/>
    <circle cx="8" cy="-50" r="3" fill="#2a2a2a"/>
    <path d="M-5 -38 Q0 -34 5 -38" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 胡须 -->
    <path d="M-10 -35 Q-8 -25 -5 -22 M10 -35 Q8 -25 5 -22" fill="none" stroke="#3a2a1a" stroke-width="1.5"/>
    <!-- 身体（官服） -->
    <path d="M-25 -20 L-35 60 L35 60 L25 -20" fill="#c84030" stroke="#7a3b14" stroke-width="2"/>
    <!-- 腰带 -->
    <rect x="-30" y="10" width="60" height="8" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
    <!-- 手（持卷轴） -->
    <path d="M-25 0 L-35 20" fill="none" stroke="#f0d0a8" stroke-width="8" stroke-linecap="round"/>
    <rect x="-45" y="15" width="20" height="30" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-45" y1="25" x2="-25" y2="25" stroke="#7a3b14" stroke-width="0.5"/>
    <line x1="-45" y1="35" x2="-25" y2="35" stroke="#7a3b14" stroke-width="0.5"/>

    <!-- 标注 -->
    <text x="0" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#7a3b14" font-family="serif">王安石</text>
    <text x="0" y="110" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">"拗相公"</text>
  </g>

  <!-- 变法内容 -->
  <g transform="translate(500, 180)">
    <rect x="-110" y="-50" width="220" height="120" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.9"/>
    <text x="0" y="-28" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a3b14" font-family="serif">王安石变法</text>
    <line x1="-80" y1="-20" x2="80" y2="-20" stroke="#c8843a" stroke-width="1"/>
    <text x="-90" y="0" font-size="12" fill="#7a3b14" font-family="serif">青苗法</text>
    <text x="0" y="0" font-size="11" fill="#7a3b14" font-family="serif">官府借钱给农民</text>
    <text x="-90" y="20" font-size="12" fill="#7a3b14" font-family="serif">免役法</text>
    <text x="0" y="20" font-size="11" fill="#7a3b14" font-family="serif">交钱代替服役</text>
    <text x="-90" y="40" font-size="12" fill="#7a3b14" font-family="serif">市易法</text>
    <text x="0" y="40" font-size="11" fill="#7a3b14" font-family="serif">官府调控物价</text>
    <text x="0" y="60" text-anchor="middle" font-size="11" fill="#e07856" font-family="serif">除旧弊政，推行新法</text>
  </g>

  <!-- 名句 -->
  <g transform="translate(500, 380)">
    <rect x="-130" y="-30" width="260" height="60" fill="#e8a838" opacity="0.15" stroke="#e8a838" stroke-width="2" rx="8"/>
    <text x="0" y="-8" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a3b14" font-family="serif">不畏浮云遮望眼</text>
    <text x="0" y="15" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a3b14" font-family="serif">自缘身在最高层</text>
  </g>

  <!-- 春节习俗演变 -->
  <g transform="translate(400, 500)">
    <!-- 桃符→春联 -->
    <g transform="translate(-150, 0)">
      <rect x="-15" y="-25" width="12" height="50" fill="#c84030" stroke="#7a3b14" stroke-width="1"/>
      <text x="-9" y="5" text-anchor="middle" font-size="8" fill="#fef9ed">神</text>
      <text x="-25" y="5" text-anchor="middle" font-size="9" fill="#7a3b14">桃符</text>
      <!-- 箭头 -->
      <path d="M5 0 L25 0" fill="none" stroke="#7a3b14" stroke-width="2"/>
      <path d="M22 -4 L27 0 L22 4" fill="none" stroke="#7a3b14" stroke-width="2"/>
      <!-- 春联 -->
      <rect x="30" y="-25" width="8" height="50" fill="#c84030" stroke="#7a3b14" stroke-width="1"/>
      <rect x="42" y="-25" width="8" height="50" fill="#c84030" stroke="#7a3b14" stroke-width="1"/>
      <text x="55" y="5" font-size="9" fill="#7a3b14">春联</text>
    </g>

    <!-- 屠苏酒→茶/果汁 -->
    <g transform="translate(50, 0)">
      <ellipse cx="-10" cy="-5" rx="6" ry="3" fill="#5a3a1a"/>
      <path d="M-16 -5 L-14 10 L-6 10 L-4 -5" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
      <text x="-10" y="25" text-anchor="middle" font-size="9" fill="#7a3b14">屠苏酒</text>
      <path d="M5 0 L25 0" fill="none" stroke="#7a3b14" stroke-width="2"/>
      <path d="M22 -4 L27 0 L22 4" fill="none" stroke="#7a3b14" stroke-width="2"/>
      <path d="M30 -5 L28 10 L38 10 L36 -5" fill="#4a90b8" opacity="0.6" stroke="#7a3b14" stroke-width="1"/>
      <text x="35" y="25" text-anchor="middle" font-size="9" fill="#7a3b14">茶/果汁</text>
    </g>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">王安石写的不只是过年，还有"除旧迎新"的改革精神；春节习俗在变，心意不变</text>
</svg>
