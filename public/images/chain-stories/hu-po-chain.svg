<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从琥珀化石到恐龙化石的故事画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#7a3b14" stroke-width="2"/>
  <line x1="300" y1="300" x2="500" y2="300" stroke="#7a3b14" stroke-width="3" stroke-dasharray="8,6"/>
  <circle cx="350" cy="300" r="6" fill="#d4a017"/>
  <circle cx="400" cy="300" r="9" fill="#c8553d"/>
  <circle cx="450" cy="300" r="6" fill="#d4a017"/>
  <!-- 左珠：琥珀 -->
  <circle cx="170" cy="300" r="110" fill="#d4a017" opacity="0.3" stroke="#b5651d" stroke-width="3"/>
  <ellipse cx="170" cy="290" rx="40" ry="30" fill="#e8b04e" opacity="0.7"/>
  <ellipse cx="158" cy="285" rx="6" ry="4" fill="#3a3a3a"/>
  <line x1="158" y1="285" x2="150" y2="280" stroke="#3a3a3a" stroke-width="1"/>
  <line x1="158" y1="285" x2="150" y2="290" stroke="#3a3a3a" stroke-width="1"/>
  <ellipse cx="182" cy="295" rx="6" ry="4" fill="#3a3a3a"/>
  <text x="170" y="345" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#7a3b14">琥珀</text>
  <text x="170" y="368" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">封存几万年</text>
  <!-- 右珠：化石 -->
  <circle cx="630" cy="300" r="110" fill="#8a6d3b" opacity="0.3" stroke="#5d4037" stroke-width="3"/>
  <path d="M 600 295 q 10 -20 24 -8 q 8 16 -6 22 q -14 2 -18 -14 z" fill="#5d4037" opacity="0.7"/>
  <line x1="608" y1="285" x2="612" y2="270" stroke="#3a3a3a" stroke-width="1.5"/>
  <line x1="615" y1="288" x2="618" y2="272" stroke="#3a3a3a" stroke-width="1.5"/>
  <line x1="622" y1="290" x2="624" y2="275" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="630" y="345" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#7a3b14">化石</text>
  <text x="630" y="368" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">讲述远古</text>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">琥珀封存时间，化石讲述远古</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">它们是地球给我们的"老照片"</text>
</svg>
