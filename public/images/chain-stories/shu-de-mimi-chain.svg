<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="树木年轮与森林地下菌根网络插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：树木怎样偷偷"聊天"</text>
  <line x1="150" y1="55" x2="650" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 地面线 -->
  <line x1="0" y1="220" x2="800" y2="220" stroke="#8d6f47" stroke-width="2" opacity="0.5"/>
  <rect x="0" y="220" width="800" height="240" fill="#8d6f47" opacity="0.15"/>

  <!-- 三棵树(地上) -->
  <g transform="translate(200 220)">
    <rect x="-6" y="-90" width="12" height="90" fill="#5a3a1a"/>
    <circle cx="0" cy="-110" r="34" fill="#2d6a4f" opacity="0.7"/>
    <text x="0" y="-150" text-anchor="middle" font-family="serif" font-size="12" fill="#2d6a4f">母亲树</text>
  </g>
  <g transform="translate(400 220)">
    <rect x="-5" y="-70" width="10" height="70" fill="#5a3a1a"/>
    <circle cx="0" cy="-86" r="26" fill="#2d6a4f" opacity="0.65"/>
    <text x="0" y="-126" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">小树(生病)</text>
  </g>
  <g transform="translate(600 220)">
    <rect x="-5" y="-78" width="10" height="78" fill="#5a3a1a"/>
    <circle cx="0" cy="-96" r="28" fill="#2d6a4f" opacity="0.65"/>
    <text x="0" y="-134" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">邻居树</text>
  </g>

  <!-- 地下菌根网络 -->
  <g stroke="#e8a838" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M200 220 Q300 280 400 240"/>
    <path d="M400 240 Q500 280 600 220"/>
    <path d="M200 220 Q350 320 600 240"/>
    <path d="M200 240 Q250 300 200 360"/>
    <path d="M600 240 Q650 300 600 360"/>
    <path d="M400 240 Q400 320 400 380"/>
    <path d="M250 300 Q350 340 450 320"/>
    <path d="M450 320 Q550 340 600 300"/>
  </g>
  <!-- 菌丝节点 -->
  <g fill="#e8a838" opacity="0.8">
    <circle cx="280" cy="270" r="3"/>
    <circle cx="340" cy="310" r="3"/>
    <circle cx="450" cy="290" r="3"/>
    <circle cx="520" cy="310" r="3"/>
    <circle cx="380" cy="350" r="3"/>
    <circle cx="250" cy="330" r="2.5"/>
    <circle cx="560" cy="330" r="2.5"/>
  </g>

  <!-- 养分传递(糖分) -->
  <g fill="#e07856">
    <circle cx="300" cy="262" r="4"/>
    <text x="300" y="252" text-anchor="middle" font-family="serif" font-size="9" fill="#e07856">糖分→</text>
  </g>
  <!-- 警报信号 -->
  <g transform="translate(460 280)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#c84a3a" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#c84a3a" stroke-width="1.5" opacity="0.8"/>
    <text x="0" y="3" text-anchor="middle" font-family="serif" font-size="9" fill="#c84a3a">!</text>
  </g>

  <!-- 三个要点框 -->
  <g transform="translate(140 430)">
    <rect x="0" y="0" width="170" height="40" fill="#fff6df" stroke="#2d6a4f" stroke-width="1.5" rx="6"/>
    <text x="85" y="17" text-anchor="middle" font-family="serif" font-size="11" fill="#2d6a4f">菌根共生</text>
    <text x="85" y="32" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">真菌帮吸水，树给糖</text>
  </g>
  <g transform="translate(315 430)">
    <rect x="0" y="0" width="170" height="40" fill="#fff6df" stroke="#e07856" stroke-width="1.5" rx="6"/>
    <text x="85" y="17" text-anchor="middle" font-family="serif" font-size="11" fill="#e07856">母亲树送养分</text>
    <text x="85" y="32" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">大树照顾生病小树</text>
  </g>
  <g transform="translate(490 430)">
    <rect x="0" y="0" width="170" height="40" fill="#fff6df" stroke="#c84a3a" stroke-width="1.5" rx="6"/>
    <text x="85" y="17" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">通风报信</text>
    <text x="85" y="32" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">遇虫害发化学警报</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="490" width="700" height="80" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6" opacity="0.85"/>
  <text x="400" y="518" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">真菌菌丝把整片森林的树根连成一张网——"木头宽带"。</text>
  <text x="400" y="542" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a">树和树之间能送养分、能传警报，森林是一个互相照应的大家庭。</text>
</svg>
