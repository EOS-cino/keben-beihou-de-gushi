<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="速度极限探索插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">速度的极限</text>
  <line x1="340" y1="60" x2="460" y2="60" stroke="#c8843a" stroke-width="2"/>

  <!-- 时间轴 -->
  <line x1="60" y1="330" x2="740" y2="330" stroke="#c8843a" stroke-width="3"/>
  <circle cx="120" cy="330" r="8" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
  <circle cx="300" cy="330" r="8" fill="#e07856" stroke="#7a3b14" stroke-width="2"/>
  <circle cx="480" cy="330" r="8" fill="#4a90b8" stroke="#7a3b14" stroke-width="2"/>
  <circle cx="660" cy="330" r="8" fill="#2d6a4f" stroke="#7a3b14" stroke-width="2"/>

  <!-- 节点1：突破音障 -->
  <g>
    <rect x="50" y="120" width="170" height="180" fill="#fff6df" stroke="#e8a838" stroke-width="2.5" rx="8"/>
    <text x="135" y="145" text-anchor="middle" font-family="serif" font-size="14" fill="#c8843a" font-weight="bold">1947年</text>
    <text x="135" y="163" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">突破音障</text>
    <!-- 飞机（超音速） -->
    <path d="M80 220 L130 215 L150 210 L160 215 L150 220 L130 220 L80 225 Z" fill="#e07856" stroke="#7a3b14" stroke-width="2"/>
    <path d="M105 217 L95 200 L110 215 M115 222 L125 237 L110 224" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 音爆云 -->
    <ellipse cx="80" cy="222" rx="15" ry="10" fill="#ffffff" opacity="0.6" stroke="#4a90b8" stroke-width="1.5"/>
    <!-- 速度线 -->
    <path d="M165 217 L185 215 M165 222 L185 222" stroke="#7a3b14" stroke-width="1.5" opacity="0.4"/>
    <text x="135" y="270" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">叶格驾驶X-1</text>
    <text x="135" y="285" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">超过声音速度</text>
  </g>

  <!-- 节点2：黑鸟侦察机 -->
  <g>
    <rect x="230" y="120" width="170" height="180" fill="#fff6df" stroke="#e07856" stroke-width="2.5" rx="8"/>
    <text x="315" y="145" text-anchor="middle" font-family="serif" font-size="14" fill="#e07856" font-weight="bold">1960年代</text>
    <text x="315" y="163" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">SR-71黑鸟</text>
    <!-- 黑鸟飞机 -->
    <path d="M255 225 L335 218 L360 215 L370 220 L360 222 L335 225 L255 230 Z" fill="#3a2a1a" stroke="#7a3b14" stroke-width="2"/>
    <path d="M290 222 L275 205 L300 220 M320 226 L335 240 L310 228" fill="#3a2a1a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 尾迹 -->
    <path d="M255 225 L225 228 L210 230" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
    <text x="315" y="270" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">比子弹还快</text>
    <text x="315" y="285" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">~3500km/h</text>
  </g>

  <!-- 节点3：阿波罗登月 -->
  <g>
    <rect x="410" y="120" width="170" height="180" fill="#fff6df" stroke="#4a90b8" stroke-width="2.5" rx="8"/>
    <text x="495" y="145" text-anchor="middle" font-family="serif" font-size="14" fill="#4a90b8" font-weight="bold">1969年</text>
    <text x="495" y="163" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">阿波罗飞船</text>
    <!-- 飞船 -->
    <path d="M480 230 L480 200 L490 190 L500 200 L500 230 Z" fill="#8d8d8d" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="490" cy="210" r="4" fill="#4a90b8" stroke="#7a3b14" stroke-width="1"/>
    <!-- 火焰 -->
    <path d="M483 230 L487 250 L490 235 L493 250 L497 230" fill="#e8a838" stroke="#e07856" stroke-width="1"/>
    <!-- 月球 -->
    <circle cx="540" cy="200" r="22" fill="#e8e8e8" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="535" cy="195" r="4" fill="#c8c8c8"/>
    <circle cx="545" cy="205" r="3" fill="#c8c8c8"/>
    <text x="495" y="270" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">人类最快纪录</text>
    <text x="495" y="285" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">~40000km/h</text>
  </g>

  <!-- 节点4：光速极限 -->
  <g>
    <rect x="590" y="120" width="170" height="180" fill="#fff6df" stroke="#2d6a4f" stroke-width="2.5" rx="8"/>
    <text x="675" y="145" text-anchor="middle" font-family="serif" font-size="14" fill="#2d6a4f" font-weight="bold">宇宙极限</text>
    <text x="675" y="163" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">光速</text>
    <!-- 光束 -->
    <path d="M620 220 L730 220" stroke="#e8a838" stroke-width="5" stroke-linecap="round"/>
    <path d="M620 220 L730 220" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <!-- 光源 -->
    <circle cx="620" cy="220" r="12" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="620" cy="220" r="6" fill="#ffffff"/>
    <!-- 光芒 -->
    <path d="M675 205 L675 195 M675 235 L675 245 M710 220 L720 220" stroke="#e8a838" stroke-width="2.5" stroke-linecap="round"/>
    <text x="675" y="270" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">30万km/秒</text>
    <text x="675" y="285" text-anchor="middle" font-family="serif" font-size="11" fill="#2d6a4f">无法超越</text>
  </g>

  <!-- 底部问号 -->
  <rect x="200" y="400" width="400" height="140" fill="#f5ecd8" stroke="#c8843a" stroke-width="2.5" rx="10"/>
  <text x="400" y="435" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14" font-weight="bold">还有比光更快的东西吗？</text>
  <text x="400" y="465" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">宇宙在膨胀，远处的星系远离我们的速度……</text>
  <text x="400" y="490" text-anchor="middle" font-family="serif" font-size="14" fill="#e07856">也许"超过"了光速？</text>
  <text x="400" y="520" text-anchor="middle" font-family="serif" font-size="14" fill="#2d6a4f">科学的探索，永远没有尽头</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">从突破音障到飞向月球，人类对速度的追求从未停止</text>
</svg>
