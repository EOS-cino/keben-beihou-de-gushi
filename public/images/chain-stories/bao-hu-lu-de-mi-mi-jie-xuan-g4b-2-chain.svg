<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从宝葫芦到神笔马良的故事画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#7a3b14" stroke-width="2"/>
  <line x1="300" y1="300" x2="500" y2="300" stroke="#7a3b14" stroke-width="3" stroke-dasharray="8,6"/>
  <circle cx="350" cy="300" r="6" fill="#d4a017"/>
  <circle cx="400" cy="300" r="9" fill="#c8553d"/>
  <circle cx="450" cy="300" r="6" fill="#d4a017"/>
  <!-- 左珠：宝葫芦 -->
  <circle cx="170" cy="300" r="110" fill="#d4a017" opacity="0.25" stroke="#b5651d" stroke-width="3"/>
  <ellipse cx="170" cy="305" rx="24" ry="28" fill="#8a9a5b"/>
  <ellipse cx="170" cy="278" rx="14" ry="15" fill="#8a9a5b"/>
  <rect x="165" y="262" width="10" height="6" fill="#5d4037"/>
  <text x="170" y="355" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">宝葫芦</text>
  <text x="170" y="378" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">偷懒惹麻烦</text>
  <!-- 右珠：神笔马良 -->
  <circle cx="630" cy="300" r="110" fill="#c8553d" opacity="0.2" stroke="#a83232" stroke-width="3"/>
  <path d="M 620 320 q 0 -30 6 -44" stroke="#5d4037" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 615 285 q 6 -10 16 -4 l 10 6" stroke="#3a3a3a" stroke-width="2" fill="none"/>
  <path d="M 626 276 l 10 -4 l 2 6 z" fill="#3a3a3a"/>
  <circle cx="636" cy="272" r="3" fill="#1e5f8e"/>
  <path d="M 600 290 q -10 6 -6 18" stroke="#3a7d44" stroke-width="2" fill="none"/>
  <text x="630" y="355" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">神笔马良</text>
  <text x="630" y="378" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">画物帮穷人</text>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">宝葫芦的秘密，马良的神笔</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">真正的宝物是那双肯努力、肯帮人的手</text>
</svg>
