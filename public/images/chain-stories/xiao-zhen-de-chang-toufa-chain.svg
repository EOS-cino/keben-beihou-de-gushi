<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="想象力魔法棒和五彩气泡插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：想象力的魔法</text>
  <line x1="220" y1="62" x2="580" y2="62" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 背景星星 -->
  <g opacity="0.3">
    <path d="M120 150 L125 140 L130 150 L140 155 L130 160 L125 170 L120 160 L110 155 Z" fill="#e8a838"/>
    <path d="M680 180 L683 173 L686 180 L693 183 L686 186 L683 193 L680 186 L673 183 Z" fill="#e07856"/>
    <path d="M150 450 L153 443 L156 450 L163 453 L156 456 L153 463 L150 456 L143 453 Z" fill="#4a90b8"/>
    <path d="M650 420 L653 413 L656 420 L663 423 L656 426 L653 433 L650 426 L643 423 Z" fill="#2d6a4f"/>
  </g>

  <!-- 魔法棒 -->
  <g transform="translate(400, 300)">
    <!-- 棒身 -->
    <rect x="-6" y="0" width="12" height="180" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2" rx="6" transform="rotate(-20)"/>
    <!-- 星星顶端 -->
    <g transform="translate(-65, -20)">
      <path d="M0 -30 L8 -10 L30 -8 L14 6 L20 28 L0 16 L-20 28 L-14 6 L-30 -8 L-8 -10 Z" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
      <circle cx="0" cy="0" r="6" fill="#fff6df"/>
    </g>
    <!-- 光芒线 -->
    <line x1="-65" y1="-20" x2="-100" y2="-50" stroke="#e8a838" stroke-width="2" opacity="0.6"/>
    <line x1="-65" y1="-20" x2="-30" y2="-60" stroke="#e8a838" stroke-width="2" opacity="0.6"/>
    <line x1="-65" y1="-20" x2="-110" y2="-10" stroke="#e8a838" stroke-width="2" opacity="0.6"/>
    <line x1="-65" y1="-20" x2="-90" y2="20" stroke="#e8a838" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- 想象气泡1：巧克力工厂 -->
  <g transform="translate(180, 200)">
    <circle cx="0" cy="0" r="55" fill="#e8a838" opacity="0.25" stroke="#c8843a" stroke-width="2"/>
    <!-- 巧克力 -->
    <rect x="-20" y="-10" width="40" height="25" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5" rx="3"/>
    <line x1="-10" y1="-10" x2="-10" y2="15" stroke="#5a3a1a" stroke-width="1"/>
    <line x1="0" y1="-10" x2="0" y2="15" stroke="#5a3a1a" stroke-width="1"/>
    <line x1="10" y1="-10" x2="10" y2="15" stroke="#5a3a1a" stroke-width="1"/>
    <line x1="-20" y1="2" x2="20" y2="2" stroke="#5a3a1a" stroke-width="1"/>
    <text x="0" y="38" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">巧克力工厂</text>
  </g>

  <!-- 想象气泡2：会说话的狐狸 -->
  <g transform="translate(620, 180)">
    <circle cx="0" cy="0" r="55" fill="#e07856" opacity="0.25" stroke="#c8843a" stroke-width="2"/>
    <!-- 狐狸 -->
    <ellipse cx="0" cy="5" rx="22" ry="18" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-18 -8 L-12 -20 L-5 -8 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M18 -8 L12 -20 L5 -8 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-7" cy="2" r="2.5" fill="#2a2a2a"/>
    <circle cx="7" cy="2" r="2.5" fill="#2a2a2a"/>
    <path d="M-3 10 Q0 13 3 10" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="38" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">会说话的狐狸</text>
  </g>

  <!-- 想象气泡3：长头发 -->
  <g transform="translate(150, 420)">
    <circle cx="0" cy="0" r="55" fill="#2d6a4f" opacity="0.2" stroke="#c8843a" stroke-width="2"/>
    <!-- 小女孩头 -->
    <circle cx="0" cy="-15" r="14" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-14 -18 Q-12 -32 0 -34 Q12 -32 14 -18" fill="#3a2a1a"/>
    <!-- 长头发 -->
    <path d="M-10 -5 Q-15 15 -12 35" fill="none" stroke="#3a2a1a" stroke-width="8" stroke-linecap="round"/>
    <path d="M10 -5 Q15 15 12 35" fill="none" stroke="#3a2a1a" stroke-width="8" stroke-linecap="round"/>
    <text x="0" y="38" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">长头发女孩</text>
  </g>

  <!-- 想象气泡4：铅笔走路 -->
  <g transform="translate(640, 420)">
    <circle cx="0" cy="0" r="55" fill="#4a90b8" opacity="0.2" stroke="#c8843a" stroke-width="2"/>
    <!-- 铅笔 -->
    <g transform="rotate(45)">
      <rect x="-6" y="-25" width="12" height="30" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-6" y="-35" width="12" height="10" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-6 5 L0 18 L6 5 Z" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-2 12 L0 18 L2 12 Z" fill="#2a2a2a"/>
    </g>
    <!-- 腿 -->
    <rect x="-15" y="20" width="6" height="15" fill="#2d6a4f" rx="2"/>
    <rect x="9" y="20" width="6" height="15" fill="#2d6a4f" rx="2"/>
    <text x="0" y="38" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">铅笔走路</text>
  </g>

  <!-- 连接线（气泡到魔法棒） -->
  <path d="M180 200 Q280 250 340 290" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M620 180 Q520 240 460 285" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M150 420 Q250 380 340 330" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M640 420 Q540 380 460 330" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- "假如"文字 -->
  <rect x="340" y="340" width="120" height="36" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8"/>
  <text x="400" y="364" text-anchor="middle" font-size="18" font-weight="bold" fill="#7a3b14" font-family="serif">假如……？</text>

  <!-- 底部说明 -->
  <rect x="50" y="540" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="565" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">想象力就像魔法棒，每一个"假如"后面都藏着一个全新的世界。</text>
</svg>
