<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="地球从形成到今天的年龄时间轴示意图">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="460" fill="#f3ece0"/>
  <rect x="0" y="460" width="800" height="140" fill="#e8d9c0"/>
  <!-- 标题说明 -->
  <text x="400" y="60" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14">如果把地球46亿年压缩成24小时</text>
  <!-- 时间轴（24小时） -->
  <rect x="80" y="200" width="640" height="40" rx="8" fill="#a8d0e8" stroke="#7a3b14" stroke-width="3"/>
  <!-- 渐变段：火球→冷却→有生命→人类 -->
  <rect x="80" y="200" width="80" height="40" rx="8" fill="#c84a3a"/>
  <rect x="160" y="200" width="120" height="40" fill="#c8843a"/>
  <rect x="280" y="200" width="200" height="40" fill="#6a8d3f"/>
  <rect x="480" y="200" width="200" height="40" rx="8" fill="#7ab8d8"/>
  <!-- 刻度 -->
  <line x1="80" y1="180" x2="80" y2="260" stroke="#7a3b14" stroke-width="2"/>
  <line x1="160" y1="185" x2="160" y2="255" stroke="#7a3b14" stroke-width="2"/>
  <line x1="280" y1="185" x2="280" y2="255" stroke="#7a3b14" stroke-width="2"/>
  <line x1="480" y1="185" x2="480" y2="255" stroke="#7a3b14" stroke-width="2"/>
  <line x1="720" y1="180" x2="720" y2="260" stroke="#7a3b14" stroke-width="2"/>
  <!-- 时间标注 -->
  <text x="80" y="175" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">0:00</text>
  <text x="160" y="175" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">3:00</text>
  <text x="280" y="175" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">8:00</text>
  <text x="480" y="175" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">20:00</text>
  <text x="720" y="175" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">24:00</text>
  <!-- 阶段标注 -->
  <text x="120" y="270" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">火球地球</text>
  <text x="220" y="270" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">冷却·海洋</text>
  <text x="380" y="270" text-anchor="middle" font-family="serif" font-size="13" fill="#4a6a2f">生命演化</text>
  <text x="600" y="270" text-anchor="middle" font-family="serif" font-size="13" fill="#7ab8d8">人类出现</text>
  <!-- 图标 -->
  <!-- 火球 -->
  <circle cx="120" cy="330" r="20" fill="#c84a3a" stroke="#7a3b14" stroke-width="2"/>
  <path d="M120 305 q-4 -10 0 -16 M120 305 q4 -8 0 -14" stroke="#e07856" stroke-width="3" fill="none"/>
  <!-- 海洋 -->
  <path d="M200 340 q20 -8 40 0" stroke="#7ab8d8" stroke-width="3" fill="none"/>
  <path d="M200 348 q20 -8 40 0" stroke="#7ab8d8" stroke-width="3" fill="none"/>
  <ellipse cx="220" cy="335" rx="24" ry="10" fill="#a8d0e8" stroke="#7a3b14" stroke-width="1.5"/>
  <!-- 生命（鱼） -->
  <ellipse cx="380" cy="335" rx="20" ry="11" fill="#6a8d3f" stroke="#7a3b14" stroke-width="1.5"/>
  <path d="M400 335 l12 -6 l0 12 Z" fill="#6a8d3f" stroke="#7a3b14" stroke-width="1.5"/>
  <circle cx="372" cy="332" r="2" fill="#7a3b14"/>
  <!-- 恐龙 -->
  <ellipse cx="470" cy="335" rx="22" ry="14" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1.5"/>
  <path d="M490 328 q12 -10 16 -18" stroke="#4a6a2f" stroke-width="8" fill="none" stroke-linecap="round"/>
  <circle cx="506" cy="310" r="6" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1.5"/>
  <!-- 人类（最后1秒） -->
  <circle cx="700" cy="325" r="8" fill="#e8c9a0" stroke="#7a3b14" stroke-width="1.5"/>
  <path d="M700 333 l0 16 M696 343 l-6 6 M704 343 l6 6" stroke="#7a3b14" stroke-width="2" fill="none"/>
  <!-- 放大标注：人类 -->
  <path d="M700 300 l0 -20" stroke="#c84a3a" stroke-width="2" stroke-dasharray="3 3"/>
  <rect x="640" y="280" width="120" height="22" rx="4" fill="#ffffff" stroke="#c84a3a" stroke-width="1.5"/>
  <text x="700" y="296" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">人类：最后不到1秒</text>
  <!-- 底部说明 -->
  <text x="400" y="400" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">地球约 46 亿岁 · 人类历史极其短暂</text>
  <text x="400" y="425" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">保护"适合居住的地球"，就是保护我们自己</text>
  <!-- 标题 -->
  <text x="400" y="555" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">地球的年龄</text>
</svg>
