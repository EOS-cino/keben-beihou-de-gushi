<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一颗种子在阳光和雨露下发芽长大，旁边写着鼓励二字">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空 -->
  <rect x="0" y="0" width="800" height="350" fill="#a8d0e8" opacity="0.1"/>
  <!-- 太阳 -->
  <circle cx="650" cy="100" r="35" fill="#f4b942" opacity="0.6"/>
  <g stroke="#e07856" stroke-width="2" opacity="0.3">
    <line x1="650" y1="55" x2="650" y2="45"/>
    <line x1="650" y1="145" x2="650" y2="155"/>
    <line x1="605" y1="100" x2="595" y2="100"/>
    <line x1="695" y1="100" x2="705" y2="100"/>
  </g>
  <!-- 地面 -->
  <path d="M0 420 Q200 410 400 420 T800 415 L800 600 L0 600 Z" fill="#8d5a36" opacity="0.25"/>
  <path d="M0 460 Q200 450 400 460 T800 455 L800 600 L0 600 Z" fill="#6a8d3f" opacity="0.3"/>
  <!-- 四个阶段：种子→发芽→成长→开花 -->
  <!-- 阶段1：种子 -->
  <g transform="translate(150,420)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#8d5a36"/>
    <path d="M-8 -2 Q0 -5 8 -2" stroke="#5a2a0a" stroke-width="1.5" fill="none"/>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">种子</text>
  </g>
  <!-- 阶段2：发芽 -->
  <g transform="translate(320,420)">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#8d5a36"/>
    <path d="M0 -5 Q-3 -20 -5 -35" stroke="#6a8d3f" stroke-width="3" fill="none"/>
    <ellipse cx="-5" cy="-35" rx="6" ry="4" fill="#7ba84a"/>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">发芽</text>
  </g>
  <!-- 阶段3：成长 -->
  <g transform="translate(490,420)">
    <ellipse cx="0" cy="0" rx="8" ry="6" fill="#8d5a36"/>
    <path d="M0 -3 Q-2 -30 -3 -60" stroke="#4a6a2f" stroke-width="4" fill="none"/>
    <ellipse cx="-12" cy="-40" rx="12" ry="6" fill="#6a8d3f" transform="rotate(-30 -12 -40)"/>
    <ellipse cx="8" cy="-55" rx="12" ry="6" fill="#7ba84a" transform="rotate(30 8 -55)"/>
    <ellipse cx="-8" cy="-65" rx="10" ry="5" fill="#6a8d3f" transform="rotate(-20 -8 -65)"/>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">成长</text>
  </g>
  <!-- 阶段4：开花 -->
  <g transform="translate(660,420)">
    <ellipse cx="0" cy="0" rx="7" ry="5" fill="#8d5a36"/>
    <path d="M0 -2 Q-1 -40 -2 -80" stroke="#4a6a2f" stroke-width="4" fill="none"/>
    <ellipse cx="-12" cy="-50" rx="10" ry="5" fill="#6a8d3f" transform="rotate(-30 -12 -50)"/>
    <ellipse cx="10" cy="-65" rx="10" ry="5" fill="#7ba84a" transform="rotate(30 10 -65)"/>
    <!-- 花 -->
    <g transform="translate(-2,-85)">
      <ellipse cx="0" cy="-8" rx="6" ry="10" fill="#e07856"/>
      <ellipse cx="-8" cy="0" rx="10" ry="6" fill="#e07856" transform="rotate(-30 -8 0)"/>
      <ellipse cx="8" cy="0" rx="10" ry="6" fill="#e07856" transform="rotate(30 8 0)"/>
      <ellipse cx="0" cy="8" rx="6" ry="10" fill="#c84a3a"/>
      <circle cx="0" cy="0" r="5" fill="#f4b942"/>
    </g>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">开花</text>
  </g>
  <!-- 成长箭头 -->
  <g stroke="#8d5a36" stroke-width="2" fill="none" opacity="0.3">
    <path d="M175 415 L295 415" marker-end="url(#ar3)"/>
    <path d="M345 415 L465 415" marker-end="url(#ar3)"/>
    <path d="M515 415 L635 415" marker-end="url(#ar3)"/>
  </g>
  <defs>
    <marker id="ar3" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#8d5a36" opacity="0.3"/>
    </marker>
  </defs>
  <!-- 阳光和雨露 -->
  <g opacity="0.4">
    <!-- 阳光线 -->
    <g stroke="#f4b942" stroke-width="2">
      <line x1="150" y1="380" x2="150" y2="395"/>
      <line x1="320" y1="370" x2="320" y2="390"/>
      <line x1="490" y1="340" x2="490" y2="365"/>
      <line x1="660" y1="310" x2="660" y2="335"/>
    </g>
    <!-- 雨露 -->
    <g fill="#7ab8d8">
      <circle cx="145" cy="400" r="2"/>
      <circle cx="315" cy="395" r="2"/>
      <circle cx="485" cy="370" r="2"/>
      <circle cx="655" cy="340" r="2"/>
    </g>
  </g>
  <!-- 鼓励标签 -->
  <g transform="translate(400,200)" opacity="0.7">
    <rect x="-60" y="-20" width="120" height="40" rx="10" fill="#fef9ed" stroke="#c84a3a" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#c84a3a">鼓励</text>
  </g>
  <!-- 爱心 -->
  <g transform="translate(400,280)" opacity="0.3">
    <path d="M0 10 C-15 -5 -25 -5 -25 5 C-25 18 0 30 0 30 C0 30 25 18 25 5 C25 -5 15 -5 0 10" fill="#e07856"/>
  </g>
  <!-- 大脑奖励系统（小图） -->
  <g transform="translate(120,180)" opacity="0.4">
    <ellipse cx="0" cy="0" rx="30" ry="25" fill="#f4d4a8" stroke="#8d5a36" stroke-width="1.5"/>
    <path d="M-15 -5 Q-10 -10 -5 -5 Q0 -10 5 -5 Q10 -10 15 -5" stroke="#8d5a36" stroke-width="1.5" fill="none"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">大脑奖励中心</text>
    <!-- 多巴胺小点 -->
    <g fill="#f4b942">
      <circle cx="-8" cy="5" r="2"/>
      <circle cx="5" cy="8" r="2"/>
      <circle cx="0" cy="0" r="2"/>
    </g>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">赞美为什么有力量</text>
</svg>
