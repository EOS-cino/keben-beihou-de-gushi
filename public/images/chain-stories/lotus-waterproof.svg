<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="显微镜下荷叶表面的微小凸起，水珠像珍珠一样滚落">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 左半：荷叶表面放大 -->
  <g transform="translate(200,300)">
    <!-- 荷叶表面（放大） -->
    <ellipse cx="0" cy="50" rx="150" ry="80" fill="#7ba84a"/>
    <!-- 微小凸起（纳米结构） -->
    <g fill="#6a8d3f">
      <circle cx="-100" cy="30" r="8"/>
      <circle cx="-70" cy="50" r="8"/>
      <circle cx="-40" cy="25" r="8"/>
      <circle cx="-10" cy="45" r="8"/>
      <circle cx="20" cy="30" r="8"/>
      <circle cx="50" cy="50" r="8"/>
      <circle cx="80" cy="25" r="8"/>
      <circle cx="110" cy="45" r="8"/>
      <circle cx="-85" cy="65" r="8"/>
      <circle cx="-55" cy="70" r="8"/>
      <circle cx="-25" cy="65" r="8"/>
      <circle cx="5" cy="70" r="8"/>
      <circle cx="35" cy="65" r="8"/>
      <circle cx="65" cy="70" r="8"/>
      <circle cx="95" cy="65" r="8"/>
    </g>
    <!-- 水珠（像珍珠） -->
    <g>
      <circle cx="-30" cy="10" r="20" fill="#a8d0e8" opacity="0.8"/>
      <circle cx="-34" cy="5" r="6" fill="#ffffff" opacity="0.9"/>
      <circle cx="40" cy="5" r="16" fill="#a8d0e8" opacity="0.8"/>
      <circle cx="37" cy="1" r="5" fill="#ffffff" opacity="0.9"/>
      <!-- 滚动的水珠 -->
      <circle cx="80" cy="20" r="14" fill="#a8d0e8" opacity="0.7"/>
      <circle cx="78" cy="17" r="4" fill="#ffffff" opacity="0.9"/>
      <!-- 运动轨迹 -->
      <path d="M80 20 Q100 15 120 10" stroke="#a8d0e8" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="4,3"/>
    </g>
    <!-- 放大镜边框 -->
    <circle cx="0" cy="40" r="160" fill="none" stroke="#8d5a36" stroke-width="4" opacity="0.3" stroke-dasharray="8,4"/>
    <text x="0" y="160" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" opacity="0.6">放大10000倍</text>
  </g>
  <!-- 右半：荷叶效应应用 -->
  <g transform="translate(580,300)">
    <!-- 防水涂层 -->
    <rect x="-100" y="20" width="200" height="80" rx="5" fill="#fef9ed" stroke="#8d5a36" stroke-width="2"/>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">防水涂料</text>
    <!-- 水珠弹开 -->
    <g>
      <circle cx="-40" cy="0" r="12" fill="#a8d0e8" opacity="0.7"/>
      <circle cx="0" cy="-10" r="14" fill="#a8d0e8" opacity="0.7"/>
      <circle cx="40" cy="-5" r="12" fill="#a8d0e8" opacity="0.7"/>
      <!-- 箭头表示弹开 -->
      <path d="M-40 0 L-55 -15" stroke="#7ab8d8" stroke-width="2" marker-end="url(#arrow1)"/>
      <path d="M0 -10 L0 -30" stroke="#7ab8d8" stroke-width="2"/>
      <path d="M40 -5 L55 -20" stroke="#7ab8d8" stroke-width="2"/>
    </g>
    <!-- 箭头 -->
    <defs>
      <marker id="arrow1" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
        <path d="M0 0 L8 4 L0 8 Z" fill="#7ab8d8"/>
      </marker>
    </defs>
    <!-- 标签 -->
    <text x="0" y="130" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">仿生应用</text>
  </g>
  <!-- 中间连接箭头 -->
  <g transform="translate(400,300)">
    <path d="M-30 0 L30 0" stroke="#8d5a36" stroke-width="3" marker-end="url(#arrow2)"/>
    <defs>
      <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
        <path d="M0 0 L10 5 L0 10 Z" fill="#8d5a36"/>
      </marker>
    </defs>
    <text x="0" y="-15" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">启发</text>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">荷叶为什么不怕水</text>
</svg>
