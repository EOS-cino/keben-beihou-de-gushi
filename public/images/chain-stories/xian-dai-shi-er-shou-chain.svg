<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从泰戈尔到徐志摩的诗歌传递画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#7a3b14" stroke-width="2"/>
  <line x1="300" y1="300" x2="500" y2="300" stroke="#7a3b14" stroke-width="3" stroke-dasharray="8,6"/>
  <circle cx="350" cy="300" r="6" fill="#d4a017"/>
  <circle cx="400" cy="300" r="9" fill="#c8553d"/>
  <circle cx="450" cy="300" r="6" fill="#d4a017"/>
  <!-- 左珠：泰戈尔 -->
  <circle cx="170" cy="300" r="110" fill="#e8a04e" opacity="0.3" stroke="#c8553d" stroke-width="3"/>
  <path d="M 150 270 q 20 -22 40 0 q 20 -22 40 0" stroke="#5d4037" stroke-width="3" fill="none"/>
  <text x="170" y="330" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#7a3b14">泰戈尔</text>
  <text x="170" y="360" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">飞鸟集·短诗</text>
  <!-- 右珠：徐志摩 -->
  <circle cx="630" cy="300" r="110" fill="#8fb996" opacity="0.3" stroke="#3a7d44" stroke-width="3"/>
  <ellipse cx="630" cy="270" rx="30" ry="14" fill="#ffffff" stroke="#5d4037" stroke-width="2"/>
  <text x="630" y="330" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#7a3b14">徐志摩</text>
  <text x="630" y="360" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">花牛歌·自由诗</text>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">一只诗的鸟，飞过泰戈尔和徐志摩</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">真情是会"传染"的，诗能飞过国界与时间</text>
</svg>
