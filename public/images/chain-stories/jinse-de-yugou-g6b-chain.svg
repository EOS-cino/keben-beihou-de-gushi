<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠故事 - 舍己为人的故事">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 连珠标识徽章 -->
  <g transform="translate(60,42)">
    <rect x="-44" y="-22" width="88" height="44" rx="22" fill="#3a7d5c"/>
    <circle cx="-26" cy="0" r="5" fill="#fef9ed"/><circle cx="-10" cy="0" r="5" fill="#fef9ed"/><circle cx="6" cy="0" r="5" fill="#fef9ed"/><circle cx="22" cy="0" r="5" fill="#fef9ed"/>
    <text x="40" y="5" font-family="serif" font-size="16" font-weight="bold" fill="#fef9ed">连珠</text>
  </g>
  <text x="460" y="48" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#3a7d5c">舍己为人的故事</text>
  <line x1="360" y1="64" x2="560" y2="64" stroke="#3a7d5c" stroke-width="2"/>

  <!-- 中央心形 -->
  <g transform="translate(400,300)">
    <circle cx="0" cy="0" r="60" fill="#c05a30" opacity="0.06"/>
    <path d="M0 30 C-20 10 -35 -5 -35 -20 C-35 -35 -20 -40 0 -25 C20 -40 35 -35 35 -20 C35 -5 20 10 0 30 Z" fill="#c05a30" opacity="0.85"/>
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#fef9ed">舍己</text>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="14" fill="#fef9ed">为人</text>
  </g>

  <!-- 故事1：黄继光（左上） -->
  <g transform="translate(150,180)">
    <rect x="-90" y="-50" width="180" height="100" rx="8" fill="#fff" stroke="#c05a30" stroke-width="2"/>
    <g transform="translate(-55,0)">
      <!-- 碉堡枪眼 -->
      <rect x="-16" y="-12" width="32" height="20" rx="2" fill="#7a7468" opacity="0.7"/>
      <rect x="-4" y="-8" width="8" height="12" fill="#2d2a24"/>
      <!-- 火光 -->
      <path d="M4 -2 L12 -4 L8 2 Z" fill="#c05a30"/>
      <!-- 人影扑向 -->
      <ellipse cx="-8" cy="8" rx="8" ry="4" fill="#c05a30" opacity="0.8"/>
      <circle cx="-14" cy="6" r="4" fill="#c05a30" opacity="0.8"/>
    </g>
    <text x="20" y="-20" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">黄继光</text>
    <text x="20" y="0" font-family="serif" font-size="12" fill="#7a7468">舍身堵枪眼</text>
    <text x="20" y="18" font-family="serif" font-size="12" fill="#7a7468">血肉之躯</text>
    <text x="20" y="36" font-family="serif" font-size="12" fill="#7a7468">铸就丰碑</text>
    <path d="M90 0 Q150 30 240 90" stroke="#c05a30" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.5"/>
  </g>

  <!-- 故事2：邱少云（右上） -->
  <g transform="translate(650,180)">
    <rect x="-90" y="-50" width="180" height="100" rx="8" fill="#fff" stroke="#7a3b14" stroke-width="2"/>
    <g transform="translate(-55,0)">
      <!-- 火焰 -->
      <path d="M-8 10 Q-10 -5 -4 -15 Q0 -25 -2 -10 Q4 -20 2 -5 Q8 -12 6 5 Q4 15 0 12 Q-4 15 -8 10 Z" fill="#c05a30" opacity="0.8"/>
      <path d="M-4 8 Q-6 -2 -2 -10 Q2 -18 0 -5 Q4 -12 2 3 Q0 10 -4 8 Z" fill="#c05a30"/>
      <!-- 趴伏人影 -->
      <ellipse cx="0" cy="12" rx="10" ry="3" fill="#7a3b14" opacity="0.6"/>
    </g>
    <text x="-20" y="-20" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">邱少云</text>
    <text x="-20" y="0" font-family="serif" font-size="12" fill="#7a7468">烈火焚身</text>
    <text x="-20" y="18" font-family="serif" font-size="12" fill="#7a7468">纹丝不动</text>
    <text x="-20" y="36" font-family="serif" font-size="12" fill="#7a7468">纪律如铁</text>
    <path d="M-90 0 Q-150 30 -240 90" stroke="#7a3b14" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.5"/>
  </g>

  <!-- 故事3：董存瑞（左下） -->
  <g transform="translate(150,440)">
    <rect x="-90" y="-50" width="180" height="100" rx="8" fill="#fff" stroke="#c05a30" stroke-width="2"/>
    <g transform="translate(-55,0)">
      <!-- 桥形碉堡 -->
      <path d="M-18 8 L-18 -8 Q0 -16 18 -8 L18 8 Z" fill="#7a7468" opacity="0.7"/>
      <!-- 炸药包 -->
      <rect x="-6" y="-2" width="12" height="10" rx="1" fill="#7a3b14"/>
      <line x1="-6" y1="3" x2="6" y2="3" stroke="#c05a30" stroke-width="0.8"/>
      <!-- 手托 -->
      <ellipse cx="0" cy="8" rx="6" ry="3" fill="#c05a30" opacity="0.8"/>
      <!-- 导火索 -->
      <path d="M0 -2 Q4 -10 8 -14" stroke="#c05a30" stroke-width="1.5" fill="none"/>
    </g>
    <text x="20" y="-20" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">董存瑞</text>
    <text x="20" y="0" font-family="serif" font-size="12" fill="#7a7468">手托炸药包</text>
    <text x="20" y="18" font-family="serif" font-size="12" fill="#7a7468">炸毁碉堡</text>
    <text x="20" y="36" font-family="serif" font-size="12" fill="#7a7468">壮烈牺牲</text>
    <path d="M90 0 Q150 -30 240 -90" stroke="#c05a30" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.5"/>
  </g>

  <!-- 故事4：狼牙山五壮士（右下） -->
  <g transform="translate(650,440)">
    <rect x="-90" y="-50" width="180" height="100" rx="8" fill="#fff" stroke="#7a3b14" stroke-width="2"/>
    <g transform="translate(-55,0)">
      <!-- 悬崖 -->
      <path d="M-16 12 L-16 -8 L-8 -14 L8 -14 L16 -8 L16 12 Z" fill="#7a7468" opacity="0.5"/>
      <!-- 五个人影 -->
      <circle cx="-8" cy="-8" r="2.5" fill="#7a3b14"/>
      <rect x="-9.5" y="-6" width="3" height="6" fill="#7a3b14"/>
      <circle cx="-2" cy="-10" r="2.5" fill="#7a3b14"/>
      <rect x="-3.5" y="-8" width="3" height="6" fill="#7a3b14"/>
      <circle cx="4" cy="-8" r="2.5" fill="#7a3b14"/>
      <rect x="2.5" y="-6" width="3" height="6" fill="#7a3b14"/>
      <!-- 跳崖箭头 -->
      <path d="M10 -8 Q14 0 12 10" stroke="#c05a30" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
    </g>
    <text x="-20" y="-20" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">五壮士</text>
    <text x="-20" y="0" font-family="serif" font-size="12" fill="#7a7468">狼牙山顶</text>
    <text x="-20" y="18" font-family="serif" font-size="12" fill="#7a7468">纵身跳崖</text>
    <text x="-20" y="36" font-family="serif" font-size="12" fill="#7a7468">气壮山河</text>
    <path d="M-90 0 Q-150 -30 -240 -90" stroke="#7a3b14" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.5"/>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="17" fill="#3a7d5c" opacity="0.9">连珠小故事：舍生取义，英雄用生命诠释奉献</text>
</svg>
