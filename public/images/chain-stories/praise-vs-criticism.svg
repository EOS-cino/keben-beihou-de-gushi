<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="表扬与批评天平插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：表扬和批评哪个更重要</text>
  <line x1="160" y1="62" x2="640" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 地面 -->
  <rect x="0" y="500" width="800" height="100" fill="#e8d9b8"/>

  <!-- 天平 -->
  <g>
    <!-- 支柱 -->
    <rect x="395" y="200" width="10" height="220" fill="#8d5a36"/>
    <!-- 底座 -->
    <ellipse cx="400" cy="425" rx="50" ry="12" fill="#8d5a36"/>
    <!-- 横梁 -->
    <rect x="200" y="195" width="400" height="8" fill="#8d5a36" rx="4"/>
    <!-- 支点 -->
    <polygon points="390,200 410,200 400,185" fill="#c8843a"/>
    <!-- 左盘（表扬） -->
    <line x1="250" y1="203" x2="250" y2="240" stroke="#8d5a36" stroke-width="2"/>
    <path d="M210 240 Q250 260 290 240 L285 255 Q250 270 215 255 Z" fill="#c84a3a" opacity="0.7"/>
    <ellipse cx="250" cy="240" rx="40" ry="8" fill="#c84a3a"/>
    <!-- 右盘（批评） -->
    <line x1="550" y1="203" x2="550" y2="240" stroke="#8d5a36" stroke-width="2"/>
    <path d="M510 240 Q550 260 590 240 L585 255 Q550 270 515 255 Z" fill="#4a6a2f" opacity="0.7"/>
    <ellipse cx="550" cy="240" rx="40" ry="8" fill="#4a6a2f"/>
  </g>

  <!-- 左侧：表扬（阳光/燃料） -->
  <g>
    <!-- 太阳 -->
    <circle cx="250" cy="140" r="22" fill="#f4c842"/>
    <g stroke="#f4c842" stroke-width="2.5" stroke-linecap="round">
      <line x1="250" y1="110" x2="250" y2="100"/>
      <line x1="225" y1="122" x2="218" y2="115"/>
      <line x1="275" y1="122" x2="282" y2="115"/>
      <line x1="220" y1="140" x2="210" y2="140"/>
      <line x1="280" y1="140" x2="290" y2="140"/>
    </g>
    <rect x="180" y="290" width="140" height="50" fill="#fff6df" stroke="#c84a3a" rx="6"/>
    <text x="250" y="310" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#c84a3a">表扬</text>
    <text x="250" y="328" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">给信心和勇气（燃料）</text>
  </g>

  <!-- 右侧：批评（修剪/方向盘） -->
  <g>
    <!-- 修剪剪刀 -->
    <g transform="translate(550 140)">
      <circle cx="-15" cy="0" r="8" fill="none" stroke="#4a6a2f" stroke-width="2.5"/>
      <circle cx="15" cy="0" r="8" fill="none" stroke="#4a6a2f" stroke-width="2.5"/>
      <line x1="-10" y1="5" x2="15" y2="20" stroke="#4a6a2f" stroke-width="3"/>
      <line x1="10" y1="5" x2="-15" y2="20" stroke="#4a6a2f" stroke-width="3"/>
    </g>
    <rect x="480" y="290" width="140" height="50" fill="#fff6df" stroke="#4a6a2f" rx="6"/>
    <text x="550" y="310" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#4a6a2f">批评</text>
    <text x="550" y="328" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">让清醒和进步（方向盘）</text>
  </g>

  <!-- 中间：成长型思维 -->
  <g>
    <rect x="300" y="350" width="200" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8"/>
    <text x="400" y="372" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">成长型思维</text>
    <text x="400" y="392" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">夸"努力"不夸"聪明"</text>
    <line x1="350" y1="350" x2="300" y2="340" stroke="#c84a3a" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="450" y1="350" x2="500" y2="340" stroke="#4a6a2f" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- 底部链条 -->
  <g>
    <rect x="80" y="440" width="130" height="36" fill="#fff6df" stroke="#c84a3a" rx="6"/>
    <text x="145" y="463" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">只有表扬→怕失败</text>

    <rect x="240" y="440" width="130" height="36" fill="#fff6df" stroke="#4a6a2f" rx="6"/>
    <text x="305" y="463" text-anchor="middle" font-family="serif" font-size="12" fill="#4a6a2f">只有批评→没信心</text>

    <rect x="400" y="440" width="160" height="36" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="6"/>
    <text x="480" y="463" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#7a3b14">两者结合→健康成长</text>

    <path d="M210 458 L240 458" stroke="#8d5a36" stroke-width="1.5"/>
    <path d="M370 458 L400 458" stroke="#8d5a36" stroke-width="1.5"/>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">表扬给燃料，批评给方向——一棵树既需要阳光也需要修剪，才能长得又高又正</text>
</svg>
