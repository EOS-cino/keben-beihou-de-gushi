<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="各种天然指南针原理的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：天然指南针有哪些</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 蚂蚁窝 -->
  <g transform="translate(120, 180)">
    <text x="0" y="-40" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">看蚂蚁窝</text>
    <!-- 土坡 -->
    <path d="M-35 30 Q-20 -10 0 -15 Q20 -10 35 30 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 窝口（朝南） -->
    <ellipse cx="0" cy="-10" rx="6" ry="4" fill="#3a2a1a"/>
    <!-- 蚂蚁 -->
    <circle cx="-8" cy="0" r="2" fill="#2a2a2a"/>
    <circle cx="8" cy="5" r="2" fill="#2a2a2a"/>
    <!-- 南标注 -->
    <text x="0" y="-25" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">南(窝口)</text>
  </g>

  <!-- 青苔 -->
  <g transform="translate(320, 180)">
    <text x="0" y="-40" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">看青苔</text>
    <!-- 石头 -->
    <ellipse cx="0" cy="25" rx="40" ry="18" fill="#a8a8a8" stroke="#5a5a5a" stroke-width="2"/>
    <!-- 北面青苔 -->
    <path d="M-35 20 Q-30 5 -15 0 Q-5 -3 0 0" fill="#6a8d3f" opacity="0.7"/>
    <path d="M-30 22 Q-25 12 -10 8" fill="#4a6a2f" opacity="0.6"/>
    <!-- 南面（无青苔） -->
    <text x="-25" y="-10" text-anchor="middle" font-family="serif" font-size="11" fill="#4a6a2f">北(有苔)</text>
    <text x="25" y="35" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">南(无苔)</text>
  </g>

  <!-- 年轮 -->
  <g transform="translate(520, 180)">
    <text x="0" y="-40" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">看年轮</text>
    <!-- 树桩 -->
    <ellipse cx="0" cy="20" rx="40" ry="15" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <ellipse cx="0" cy="18" rx="38" ry="13" fill="#a8783a" stroke="#5a3a1a" stroke-width="1.5"/>
    <!-- 年轮线 -->
    <ellipse cx="0" cy="18" rx="30" ry="10" fill="none" stroke="#5a3a1a" stroke-width="1"/>
    <ellipse cx="0" cy="18" rx="22" ry="7" fill="none" stroke="#5a3a1a" stroke-width="1"/>
    <ellipse cx="0" cy="18" rx="14" ry="5" fill="none" stroke="#5a3a1a" stroke-width="1"/>
    <ellipse cx="0" cy="18" rx="6" ry="3" fill="none" stroke="#5a3a1a" stroke-width="1"/>
    <!-- 标注：南宽北窄 -->
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">南(宽)</text>
    <text x="0" y="38" text-anchor="middle" font-family="serif" font-size="11" fill="#4a6a2f">北(窄)</text>
  </g>

  <!-- 月亮 -->
  <g transform="translate(700, 180)">
    <text x="0" y="-40" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">看月亮</text>
    <!-- 夜空 -->
    <rect x="-35" y="-25" width="70" height="55" fill="#3a5a7a" opacity="0.3" rx="4"/>
    <!-- 上弦月 -->
    <circle cx="0" cy="0" r="16" fill="#f8f0c8" stroke="#e8d898" stroke-width="1.5"/>
    <path d="M0 -16 Q-12 0 0 16 Q-6 0 0 -16" fill="#3a5a7a" opacity="0.6"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">亮面朝南</text>
  </g>

  <!-- 手表法 -->
  <g transform="translate(150, 380)">
    <text x="0" y="-40" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">看手表</text>
    <!-- 太阳 -->
    <circle cx="-40" cy="0" r="10" fill="#f4c842" opacity="0.7"/>
    <!-- 手表 -->
    <circle cx="10" cy="0" r="22" fill="#fff8e0" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="10" cy="0" r="18" fill="none" stroke="#c8843a" stroke-width="1"/>
    <!-- 时针指向太阳 -->
    <line x1="10" y1="0" x2="-10" y2="-8" stroke="#7a3b14" stroke-width="2.5"/>
    <!-- 12点方向 -->
    <line x1="10" y1="0" x2="10" y2="-15" stroke="#c84a3a" stroke-width="1.5"/>
    <!-- 平分线（南方） -->
    <line x1="10" y1="0" x2="0" y2="-12" stroke="#c84a3a" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">时针指太阳</text>
    <text x="0" y="44" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a">平分线=南</text>
  </g>

  <!-- 司南（古代指南针） -->
  <g transform="translate(380, 380)">
    <text x="0" y="-50" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">司南（最早指南针）</text>
    <!-- 铜盘 -->
    <ellipse cx="0" cy="20" rx="50" ry="15" fill="#c8843a" stroke="#7a3b14" stroke-width="2"/>
    <ellipse cx="0" cy="15" rx="48" ry="13" fill="#e0a868" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 方位字 -->
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">南</text>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">北</text>
    <text x="-35" y="20" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">西</text>
    <text x="35" y="20" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">东</text>
    <!-- 勺子（司南） -->
    <path d="M-15 -5 Q-10 -20 0 -22 Q10 -20 15 -5 Q10 0 0 0 Q-10 0 -15 -5 Z" fill="#3a3a3a" stroke="#1a1a1a" stroke-width="1.5"/>
    <ellipse cx="0" cy="-15" rx="8" ry="5" fill="#5a5a5a"/>
    <!-- 勺柄指南 -->
    <path d="M0 0 L0 18" stroke="#3a3a3a" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- 四大发明标注 -->
  <g transform="translate(620, 380)">
    <text x="0" y="-50" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">四大发明之一</text>
    <rect x="-60" y="-35" width="120" height="80" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="6"/>
    <text x="0" y="-10" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">指南针</text>
    <text x="0" y="10" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">造纸 · 印刷</text>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">火药 · 指南针</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="510" width="700" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">蚂蚁窝口朝南、青苔长在北面、年轮南宽北窄、月亮亮面朝南、手表平分线指南——</text>
  <text x="400" y="558" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">大自然里到处是线索，指南针更是中国古代四大发明之一。</text>
</svg>
