<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="苏轼在黄州煮东坡肉的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 背景墙 -->
  <rect x="0" y="0" width="800" height="450" fill="#f4e4c4" opacity="0.2"/>
  <!-- 简易厨房背景 -->
  <rect x="0" y="350" width="800" height="250" fill="#dceee3" opacity="0.3"/>
  <!-- 灶台 -->
  <g transform="translate(400 420)">
    <rect x="-120" y="0" width="240" height="80" fill="#8b6f47"/>
    <rect x="-120" y="0" width="240" height="15" fill="#6b5535"/>
    <!-- 灶口 -->
    <path d="M-40 80 L-40 40 Q-40 25 -20 25 L20 25 Q40 25 40 40 L40 80 Z" fill="#e07856" opacity="0.3"/>
    <!-- 火光 -->
    <g fill="#e8a838" opacity="0.6">
      <path d="M-20 80 Q-15 60 -10 75 Q-5 55 0 70 Q5 60 10 75 Q15 55 20 80 Z"/>
    </g>
    <g fill="#e07856" opacity="0.4">
      <path d="M-15 80 Q-10 65 -5 78 Q0 60 5 75 Q10 65 15 80 Z"/>
    </g>
  </g>
  <!-- 大锅 -->
  <g transform="translate(400 400)">
    <ellipse cx="0" cy="0" rx="60" ry="15" fill="#333" opacity="0.3"/>
    <path d="M-55 0 Q-55 25 -45 30 L45 30 Q55 25 55 0 Z" fill="#4a3a25"/>
    <ellipse cx="0" cy="0" rx="55" ry="12" fill="#6b5535"/>
    <!-- 锅里的肉 -->
    <ellipse cx="-15" cy="-3" rx="18" ry="8" fill="#e07856" opacity="0.8"/>
    <ellipse cx="15" cy="-2" rx="16" ry="7" fill="#c06540" opacity="0.8"/>
    <ellipse cx="0" cy="-5" rx="14" ry="6" fill="#e8a838" opacity="0.6"/>
    <!-- 蒸汽 -->
    <g stroke="#ccc" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round">
      <path d="M-20 -10 Q-25 -30 -18 -50 Q-22 -65 -15 -80"/>
      <path d="M0 -10 Q5 -30 -2 -50 Q3 -65 -5 -80"/>
      <path d="M20 -10 Q15 -30 22 -50 Q17 -65 25 -80"/>
    </g>
  </g>
  <!-- 苏轼 -->
  <g transform="translate(250 420)">
    <!-- 长袍 -->
    <path d="M-35 0 L-42 -100 Q-42 -115 -25 -120 L25 -120 Q42 -115 42 -100 L35 0 Z" fill="#2d6a4f"/>
    <!-- 腰带 -->
    <rect x="-35" y="-70" width="70" height="8" fill="#e8a838"/>
    <!-- 头 -->
    <circle cx="0" cy="-138" r="20" fill="#f4d4a8"/>
    <!-- 斗笠 -->
    <ellipse cx="0" cy="-158" rx="40" ry="8" fill="#e8a838"/>
    <path d="M-36 -158 Q0 -185 36 -158 Z" fill="#d49828"/>
    <!-- 胡须 -->
    <path d="M-6 -128 Q0 -115 6 -128" stroke="#333" stroke-width="2" fill="none"/>
    <!-- 眼睛 -->
    <circle cx="-6" cy="-140" r="2" fill="#333"/>
    <circle cx="6" cy="-140" r="2" fill="#333"/>
    <!-- 笑容 -->
    <path d="M-3 -130 Q0 -127 3 -130" stroke="#333" stroke-width="1.5" fill="none"/>
    <!-- 手拿勺子搅拌 -->
    <path d="M35 -80 Q60 -60 80 -40" stroke="#f4d4a8" stroke-width="8" stroke-linecap="round"/>
    <line x1="80" y1="-40" x2="95" y2="-55" stroke="#8b6f47" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- 竹简/书 -->
  <g transform="translate(600 380)">
    <rect x="0" y="0" width="60" height="40" fill="#e8a838" opacity="0.3" stroke="#8b6f47" stroke-width="2"/>
    <line x1="10" y1="0" x2="10" y2="40" stroke="#8b6f47" stroke-width="1"/>
    <line x1="20" y1="0" x2="20" y2="40" stroke="#8b6f47" stroke-width="1"/>
    <line x1="30" y1="0" x2="30" y2="40" stroke="#8b6f47" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="40" stroke="#8b6f47" stroke-width="1"/>
    <line x1="50" y1="0" x2="50" y2="40" stroke="#8b6f47" stroke-width="1"/>
    <text x="30" y="25" text-anchor="middle" font-size="8" fill="#6b5535">猪肉颂</text>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" font-weight="700" fill="#2d6a4f">连珠小故事：东坡肉的由来</text>
  <text x="400" y="82" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#7a7468">被贬黄州，他把便宜猪肉做成了名菜</text>
</svg>
