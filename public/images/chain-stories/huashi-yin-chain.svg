<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="化石里的秘密插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：化石里的秘密</text>
  <line x="200" y1="55" x2="600" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左侧：露西·人类起源 -->
  <g transform="translate(170, 250)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#e07856">露西·320万年前</text>
    <!-- 露西骨架（简化） -->
    <g transform="translate(0, -30)" opacity="0.7">
      <!-- 头骨 -->
      <circle cx="0" cy="-25" r="10" fill="none" stroke="#5a4a3a" stroke-width="2"/>
      <!-- 脊椎 -->
      <line x1="0" y1="-15" x2="0" y2="10" stroke="#5a4a3a" stroke-width="2"/>
      <!-- 肋骨 -->
      <path d="M -8 -10 Q -10 0 -5 5" fill="none" stroke="#5a4a3a" stroke-width="1.5"/>
      <path d="M 8 -10 Q 10 0 5 5" fill="none" stroke="#5a4a3a" stroke-width="1.5"/>
      <!-- 骨盆 -->
      <ellipse cx="0" cy="12" rx="8" ry="4" fill="none" stroke="#5a4a3a" stroke-width="2"/>
      <!-- 腿骨（直立行走） -->
      <line x1="-3" y1="16" x2="-5" y2="35" stroke="#5a4a3a" stroke-width="2.5"/>
      <line x1="3" y1="16" x2="5" y2="35" stroke="#5a4a3a" stroke-width="2.5"/>
      <!-- 臂骨 -->
      <line x1="-8" y1="-8" x2="-12" y2="10" stroke="#5a4a3a" stroke-width="2"/>
      <line x1="8" y1="-8" x2="12" y2="10" stroke="#5a4a3a" stroke-width="2"/>
    </g>
    <!-- 标注 -->
    <rect x="-60" y="20" width="120" height="24" fill="#fff6df" stroke="#e07856" stroke-width="1" rx="4"/>
    <text x="0" y="37" text-anchor="middle" font-family="serif" font-size="11" fill="#e07856">能直立行走</text>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">人类起源的重要发现</text>
    <text x="0" y="76" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">解放双手·使用工具</text>
  </g>

  <!-- 中间：沧海桑田 -->
  <g transform="translate(400, 250)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#4a90b8">沧海桑田</text>
    <!-- 海洋变高山 -->
    <g transform="translate(0, -40)">
      <!-- 海洋层 -->
      <rect x="-50" y="-15" width="100" height="15" fill="#4a90b8" opacity="0.2"/>
      <path d="M -50 -15 Q -25 -20 0 -15 Q 25 -10 50 -15" fill="none" stroke="#4a90b8" stroke-width="1.5" opacity="0.4"/>
      <!-- 海洋生物化石 -->
      <ellipse cx="-20" cy="-8" rx="4" ry="2" fill="#4a90b8" opacity="0.3"/>
      <ellipse cx="15" cy="-10" rx="3" ry="1.5" fill="#4a90b8" opacity="0.3"/>
      <!-- 岩石层 -->
      <rect x="-50" y="0" width="100" height="20" fill="#8d6a36" opacity="0.3"/>
      <line x1="-50" y1="5" x2="50" y2="5" stroke="#5a4a2a" stroke-width="0.5" opacity="0.4"/>
      <line x1="-50" y1="12" x2="50" y2="12" stroke="#5a4a2a" stroke-width="0.5" opacity="0.4"/>
      <!-- 山 -->
      <path d="M -50 20 L -20 -10 L 0 20 L 25 -15 L 50 20 Z" fill="#5a4a3a" opacity="0.3" stroke="#5a4a3a" stroke-width="1.5"/>
      <!-- 雪顶 -->
      <path d="M -25 -5 L -20 -10 L -15 -5" fill="#fff" opacity="0.5"/>
      <path d="M 20 -10 L 25 -15 L 30 -10" fill="#fff" opacity="0.5"/>
    </g>
    <!-- 箭头 -->
    <path d="M 0 15 L 0 30" fill="none" stroke="#c8843a" stroke-width="2"/>
    <path d="M -4 25 L 0 32 L 4 25" fill="none" stroke="#c8843a" stroke-width="2"/>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">海底化石出现在高山</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">喜马拉雅山曾有海洋</text>
    <text x="0" y="84" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">板块碰撞·地壳抬升</text>
  </g>

  <!-- 右侧：琥珀密码 -->
  <g transform="translate(630, 250)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#e8a838">琥珀密码</text>
    <!-- 琥珀 -->
    <g transform="translate(0, -30)">
      <ellipse cx="0" cy="0" rx="35" ry="28" fill="#e8a838" opacity="0.3" stroke="#a07820" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="30" ry="23" fill="#e8a838" opacity="0.15"/>
      <!-- 虫子 -->
      <g transform="translate(0, 0)">
        <ellipse cx="0" cy="0" rx="8" ry="4" fill="#5a4a2a" opacity="0.5"/>
        <circle cx="-7" cy="0" r="3" fill="#5a4a2a" opacity="0.5"/>
        <ellipse cx="-2" cy="-5" rx="5" ry="2.5" fill="#fff" opacity="0.2" transform="rotate(-20)"/>
        <ellipse cx="2" cy="-5" rx="5" ry="2.5" fill="#fff" opacity="0.2" transform="rotate(20)"/>
        <line x1="6" y1="0" x2="12" y2="2" stroke="#5a4a2a" stroke-width="1" opacity="0.4"/>
      </g>
      <!-- DNA螺旋 -->
      <g transform="translate(20, 15)" opacity="0.5">
        <path d="M 0 0 Q 5 -5 0 -10 Q -5 -15 0 -20" fill="none" stroke="#2d6a4f" stroke-width="1.5"/>
        <path d="M 0 0 Q -5 -5 0 -10 Q 5 -15 0 -20" fill="none" stroke="#e07856" stroke-width="1.5"/>
      </g>
    </g>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">树脂冻结的生命</text>
    <text x="0" y="38" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">翅膀纹路清晰可见</text>
    <text x="0" y="54" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">可提取远古DNA片段</text>
    <text x="0" y="70" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">来自远古的"信"</text>
  </g>

  <!-- 下方：核心精神 -->
  <g transform="translate(400, 430)">
    <rect x="-280" y="0" width="560" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">露西告诉我们人类从何而来，高山化石证明沧海桑田，琥珀封存远古DNA</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="13" fill="#c8843a">每一块化石都是一封来自远古的信——拆开它，就能读到生命的故事</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">化石里的秘密：从人类起源到地壳变迁到远古DNA——石头在说话</text>
</svg>
