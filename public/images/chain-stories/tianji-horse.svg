  <text x="490" y="408" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">策略取胜</text>
  <rect x="60" y="430" width="680" height="150" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
  <text x="400" y="458" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">田忌与齐王赛马，三局两胜。孙膑发现齐王的马略胜一筹，</text>
  <text x="400" y="480" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">便建议田忌调换出场顺序：用下等马对齐王上等马（输），</text>
  <text x="400" y="502" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">再用上等马对齐王中等马（赢），最后用中等马对齐王下等马（赢）。</text>
  <text x="400" y="530" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">同样的马，只是调换了出场顺序，就转败为胜。</text>
  <text x="400" y="558" text-anchor="middle" font-size="13" font-weight="bold" fill="#c8843a" font-family="serif">善用策略，以弱胜强，这就是智慧的力量。</text>
