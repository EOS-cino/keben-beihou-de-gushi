  <text x="60" y="329" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">文学创作</text>
  <rect x="60" y="425" width="680" height="145" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
  <text x="400" y="453" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">鲁迅的童年记忆——百草园的虫草、水乡的社戏、少年闰土的友谊——</text>
  <text x="400" y="475" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">都成为他日后文学创作的素材。记忆中的故乡人事，</text>
  <text x="400" y="497" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">经过作家的回忆与书写，化作了《朝花夕拾》《故乡》等经典作品。</text>
  <text x="400" y="525" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">真实的童年经历，经过艺术的加工与升华，便成为了打动人心的文学作品。</text>
  <text x="400" y="552" text-anchor="middle" font-size="13" font-weight="bold" fill="#c8843a" font-family="serif">童年的记忆，是文学创作最深厚的土壤。</text>
