<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一只五彩斑斓的传统风筝飞在蓝天上，旁边画着古代纸鸢的样子">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空 -->
  <rect x="0" y="0" width="800" height="450" fill="#a8d0e8" opacity="0.15"/>
  <!-- 云 -->
  <g fill="#ffffff" opacity="0.4">
    <ellipse cx="150" cy="120" rx="50" ry="15"/>
    <ellipse cx="600" cy="100" rx="60" ry="18"/>
    <ellipse cx="350" cy="80" rx="40" ry="12"/>
  </g>
  <!-- 地面 -->
  <path d="M0 480 Q200 470 400 480 T800 475 L800 600 L0 600 Z" fill="#6a8d3f" opacity="0.3"/>
  <path d="M0 520 Q200 510 400 520 T800 515 L800 600 L0 600 Z" fill="#4a6a2f" opacity="0.2"/>
  <!-- 时间线 -->
  <g transform="translate(400,540)" opacity="0.5">
    <line x1="-250" y1="0" x2="250" y2="0" stroke="#8d5a36" stroke-width="2"/>
    <g fill="#7a3b14" font-family="serif" font-size="10" text-anchor="middle">
      <circle cx="-200" cy="0" r="4" fill="#c84a3a"/>
      <text x="-200" y="-10">木鸢</text>
      <text x="-200" y="20">2000年前</text>
      <circle cx="-60" cy="0" r="4" fill="#c8843a"/>
      <text x="-60" y="-10">纸鸢</text>
      <text x="-60" y="20">东汉</text>
      <circle cx="80" cy="0" r="4" fill="#6a8d3f"/>
      <text x="80" y="-10">风筝</text>
      <text x="80" y="20">唐宋</text>
      <circle cx="220" cy="0" r="4" fill="#7ab8d8"/>
      <text x="220" y="-10">现代</text>
      <text x="220" y="20">潍坊</text>
    </g>
  </g>
  <!-- 大风筝（蝴蝶形，五彩） -->
  <g transform="translate(500,180)">
    <!-- 风筝线 -->
    <path d="M0 40 Q-10 80 -20 150 Q-30 220 -40 290" stroke="#7a3b14" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- 蝴蝶翅膀左上 -->
    <ellipse cx="-25" cy="-15" rx="28" ry="35" fill="#c84a3a" transform="rotate(-25 -25 -15)"/>
    <ellipse cx="25" cy="-15" rx="28" ry="35" fill="#c84a3a" transform="rotate(25 25 -15)"/>
    <!-- 翅膀图案 -->
    <ellipse cx="-25" cy="-15" rx="15" ry="20" fill="#f4b942" opacity="0.6" transform="rotate(-25 -25 -15)"/>
    <ellipse cx="25" cy="-15" rx="15" ry="20" fill="#f4b942" opacity="0.6" transform="rotate(25 25 -15)"/>
    <!-- 下翅 -->
    <ellipse cx="-20" cy="20" rx="18" ry="22" fill="#6a8d3f" transform="rotate(-20 -20 20)"/>
    <ellipse cx="20" cy="20" rx="18" ry="22" fill="#6a8d3f" transform="rotate(20 20 20)"/>
    <ellipse cx="-20" cy="20" rx="8" ry="12" fill="#7ba84a" opacity="0.6" transform="rotate(-20 -20 20)"/>
    <ellipse cx="20" cy="20" rx="8" ry="12" fill="#7ba84a" opacity="0.6" transform="rotate(20 20 20)"/>
    <!-- 身体 -->
    <rect x="-3" y="-25" width="6" height="50" rx="3" fill="#7a3b14"/>
    <!-- 触角 -->
    <path d="M-2 -25 Q-8 -35 -12 -40" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
    <path d="M2 -25 Q8 -35 12 -40" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
    <!-- 飘带 -->
    <path d="M0 25 Q-8 50 -5 80 Q-12 110 -3 140" stroke="#e07856" stroke-width="3" fill="none"/>
    <path d="M0 25 Q8 50 5 80 Q12 110 3 140" stroke="#f4b942" stroke-width="3" fill="none"/>
  </g>
  <!-- 古代木鸢（左上小图） -->
  <g transform="translate(150,200)" opacity="0.5">
    <rect x="-60" y="-40" width="120" height="80" rx="5" fill="#fef9ed" stroke="#8d5a36" stroke-width="1.5"/>
    <!-- 木鸢简笔画 -->
    <g transform="translate(0,0)">
      <path d="M0 -15 L-25 10 L0 5 L25 10 Z" fill="#8d5a36"/>
      <line x1="0" y1="5" x2="0" y2="20" stroke="#8d5a36" stroke-width="2"/>
      <line x1="-15" y1="3" x2="-15" y2="18" stroke="#8d5a36" stroke-width="1.5"/>
      <line x1="15" y1="3" x2="15" y2="18" stroke="#8d5a36" stroke-width="1.5"/>
    </g>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">木鸢（墨子）</text>
  </g>
  <!-- 竹哨（产生声音=风筝名字由来） -->
  <g transform="translate(150,340)" opacity="0.5">
    <rect x="-50" y="-25" width="100" height="50" rx="5" fill="#fef9ed" stroke="#8d5a36" stroke-width="1.5"/>
    <!-- 竹哨 -->
    <g transform="translate(0,0)">
      <rect x="-15" y="-8" width="30" height="10" rx="3" fill="#6a8d3f"/>
      <circle cx="10" cy="-3" r="2" fill="#2d2a24"/>
    </g>
    <!-- 声波 -->
    <g stroke="#7a3b14" stroke-width="1" fill="none" opacity="0.5">
      <path d="M15 -3 Q25 -8 22 -15"/>
      <path d="M22 -3 Q35 -8 32 -18"/>
    </g>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">竹哨发声如筝</text>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">风筝的历史</text>
</svg>
