<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="青蛙作为农田生态守护者插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">青蛙是益虫——农田生态守护者</text>
  <line x1="250" y1="56" x2="550" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 农田背景 -->
  <rect x="0" y="80" width="800" height="440" fill="#d8e8c8" opacity="0.4"/>

  <!-- 食物链标题 -->
  <text x="400" y="110" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">农田里的食物链</text>

  <!-- 害虫（左上） -->
  <g transform="translate(160,180)">
    <text x="0" y="-35" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">害虫</text>
    <!-- 蝗虫 -->
    <ellipse cx="0" cy="0" rx="20" ry="8" fill="#8a7a4a"/>
    <ellipse cx="-12" cy="-4" rx="8" ry="6" fill="#8a7a4a"/>
    <circle cx="-15" cy="-5" r="2" fill="#1a1a1a"/>
    <!-- 后腿 -->
    <path d="M8 2 L20 12 L16 14" fill="none" stroke="#6a5a3a" stroke-width="3"/>
    <!-- 翅膀 -->
    <ellipse cx="5" cy="-3" rx="10" ry="4" fill="#a89868" opacity="0.7"/>
    <!-- 吃禾苗 -->
    <g transform="translate(30,5)">
      <path d="M0 0 Q2 -15 0 -25" fill="none" stroke="#5a8a3a" stroke-width="2"/>
      <ellipse cx="0" cy="-25" rx="3" ry="8" fill="#6ab04c"/>
      <path d="M-3 -10 L-8 -8" stroke="#e84030" stroke-width="1.5"/>
    </g>
    <rect x="-45" y="25" width="90" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
    <text x="0" y="42" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">吃庄稼</text>
  </g>

  <!-- 箭头：害虫→青蛙 -->
  <path d="M200 200 Q300 230 360 280" fill="none" stroke="#8d6a3d" stroke-width="3" marker-end="url(#arr2)"/>
  <text x="270" y="225" font-family="serif" font-size="12" fill="#7a3b14">被吃掉</text>

  <!-- 青蛙（中间） -->
  <g transform="translate(400,320)">
    <text x="0" y="-55" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">青蛙（益虫）</text>
    <!-- 身体 -->
    <ellipse cx="0" cy="10" rx="38" ry="25" fill="#6ab04c"/>
    <ellipse cx="0" cy="6" rx="34" ry="21" fill="#7cc85a"/>
    <!-- 后腿 -->
    <ellipse cx="-30" cy="20" rx="16" ry="10" fill="#5a9d3e" transform="rotate(-20 -30 20)"/>
    <ellipse cx="30" cy="20" rx="16" ry="10" fill="#5a9d3e" transform="rotate(20 30 20)"/>
    <!-- 头 -->
    <ellipse cx="0" cy="-10" rx="28" ry="20" fill="#7cc85a"/>
    <!-- 眼睛 -->
    <circle cx="-12" cy="-22" r="11" fill="#7cc85a"/>
    <circle cx="12" cy="-22" r="11" fill="#7cc85a"/>
    <circle cx="-12" cy="-20" r="7" fill="#ffffff"/>
    <circle cx="12" cy="-20" r="7" fill="#ffffff"/>
    <circle cx="-12" cy="-19" r="3.5" fill="#1a1a1a"/>
    <circle cx="12" cy="-19" r="3.5" fill="#1a1a1a"/>
    <!-- 嘴 -->
    <path d="M-14 2 Q0 8 14 2" fill="none" stroke="#3d6b28" stroke-width="2"/>
    <!-- 肚子 -->
    <ellipse cx="0" cy="12" rx="22" ry="14" fill="#c8e8a8" opacity="0.6"/>
    <rect x="-50" y="45" width="100" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
    <text x="0" y="62" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">一天吃70+害虫</text>
  </g>

  <!-- 箭头：青蛙→保护禾苗 -->
  <path d="M440 310 Q520 280 580 220" fill="none" stroke="#8d6a3d" stroke-width="3" marker-end="url(#arr2)"/>
  <text x="520" y="265" font-family="serif" font-size="12" fill="#7a3b14">保护</text>

  <!-- 禾苗/庄稼（右上） -->
  <g transform="translate(620,180)">
    <text x="0" y="-35" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">禾苗·庄稼</text>
    <!-- 稻穗 -->
    <g stroke="#5a8a3a" stroke-width="3" fill="none">
      <path d="M-10 20 Q-12 -5 -10 -25"/>
      <path d="M0 20 Q2 -5 0 -30"/>
      <path d="M10 20 Q8 -5 10 -25"/>
    </g>
    <g fill="#e8c840">
      <ellipse cx="-10" cy="-25" rx="4" ry="10"/>
      <ellipse cx="0" cy="-30" rx="4" ry="12"/>
      <ellipse cx="10" cy="-25" rx="4" ry="10"/>
    </g>
    <g fill="#6ab04c">
      <ellipse cx="-15" cy="0" rx="3" ry="10" transform="rotate(-20 -15 0)"/>
      <ellipse cx="15" cy="0" rx="3" ry="10" transform="rotate(20 15 0)"/>
    </g>
    <rect x="-45" y="30" width="90" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
    <text x="0" y="47" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">健康生长</text>
  </g>

  <!-- 分隔线 -->
  <line x1="60" y1="420" x2="740" y2="420" stroke="#c8843a" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- 下方：生物防治 vs 化学农药 -->
  <text x="400" y="455" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">生物防治 vs 化学农药</text>

  <!-- 青蛙防治 -->
  <g transform="translate(200,510)">
    <rect x="-80" y="-25" width="160" height="50" fill="#e8f5d8" stroke="#5cb050" stroke-width="1.5" rx="6"/>
    <text x="0" y="-5" text-anchor="middle" font-family="serif" font-size="13" fill="#5a8a3a">青蛙吃害虫</text>
    <text x="0" y="14" text-anchor="middle" font-family="serif" font-size="11" fill="#5a8a3a">环保·免费·不污染</text>
  </g>

  <!-- 农药防治 -->
  <g transform="translate(600,510)">
    <rect x="-80" y="-25" width="160" height="50" fill="#f5e0d8" stroke="#e84030" stroke-width="1.5" rx="6"/>
    <text x="0" y="-5" text-anchor="middle" font-family="serif" font-size="13" fill="#a84020">喷洒农药</text>
    <text x="0" y="14" text-anchor="middle" font-family="serif" font-size="11" fill="#a84020">污染·花钱·害虫抗药</text>
  </g>

  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#8d6a3d"/>
    </marker>
  </defs>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="12" fill="#6b6557">保护青蛙 = 保护农田生态平衡</text>
</svg>
