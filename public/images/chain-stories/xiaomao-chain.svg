<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="老舍爱写小动物与猫的习性插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#7a3b14" font-family="serif">连珠小故事：老舍为什么爱写小动物</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#e8a838" stroke-width="1.5"/>

  <!-- 左：老舍与四合院 -->
  <rect x="20" y="75" width="380" height="440" fill="#e8a838" opacity="0.06"/>
  <!-- 四合院墙 -->
  <rect x="50" y="120" width="320" height="160" fill="#f5e0c8" opacity="0.4" stroke="#c8a878" stroke-width="2"/>
  <!-- 屋顶 -->
  <path d="M40 120 L210 70 L380 120 Z" fill="#6a4220" stroke="#4a2a10" stroke-width="2"/>
  <!-- 门 -->
  <rect x="180" y="200" width="60" height="80" fill="#6a4220" stroke="#4a2a10" stroke-width="2"/>
  <!-- 院子里的花盆 -->
  <g transform="translate(90, 320)">
    <path d="M-20 0 L-16 30 L16 30 L20 0 Z" fill="#e07856" stroke="#a04830" stroke-width="1.5"/>
    <circle cx="0" cy="-12" r="10" fill="#e8a838"/>
    <circle cx="0" cy="-12" r="5" fill="#e07856"/>
  </g>
  <g transform="translate(330, 320)">
    <path d="M-18 0 L-14 28 L14 28 L18 0 Z" fill="#e07856" stroke="#a04830" stroke-width="1.5"/>
    <rect x="-2" y="-25" width="4" height="25" fill="#2d6a4f"/>
    <circle cx="0" cy="-28" r="8" fill="#e8a838"/>
  </g>

  <!-- 老舍（坐在院子里） -->
  <g transform="translate(210, 380)">
    <!-- 椅子 -->
    <rect x="-30" y="20" width="60" height="40" fill="#6a4220" stroke="#4a2a10" stroke-width="1.5"/>
    <rect x="-30" y="-10" width="60" height="35" fill="#6a4220" stroke="#4a2a10" stroke-width="1.5" opacity="0.7"/>
    <!-- 身体 -->
    <path d="M-22 20 L-18 -20 L-12 -35 L12 -35 L18 -20 L22 20 Z" fill="#2d6a4f" stroke="#1a4a35" stroke-width="1.5"/>
    <!-- 头 -->
    <circle cx="0" cy="-55" r="22" fill="#f0d0a8" stroke="#c89060" stroke-width="1.5"/>
    <!-- 头发 -->
    <path d="M-20 -62 Q-22 -78 0 -76 Q22 -78 20 -62 Q12 -70 0 -68 Q-12 -70 -20 -62" fill="#2a2a2a"/>
    <!-- 眼镜 -->
    <circle cx="-8" cy="-55" r="7" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="8" cy="-55" r="7" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <line x1="-1" y1="-55" x2="1" y2="-55" stroke="#7a3b14" stroke-width="2"/>
    <ellipse cx="-8" cy="-55" rx="2.5" ry="2" fill="#2a2a2a"/>
    <ellipse cx="8" cy="-55" rx="2.5" ry="2" fill="#2a2a2a"/>
    <!-- 嘴（微笑） -->
    <path d="M-5 -45 Q0 -40 5 -45" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 手（逗猫） -->
    <path d="M-18 -20 L-35 -5 L-40 5" fill="none" stroke="#f0d0a8" stroke-width="7" stroke-linecap="round"/>
    <path d="M18 -20 L30 -10" fill="none" stroke="#f0d0a8" stroke-width="7" stroke-linecap="round"/>
    <text x="0" y="80" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">老舍·四合院里逗猫</text>
  </g>

  <!-- 右：老舍笔下的小动物 -->
  <rect x="420" y="75" width="360" height="440" fill="#2d6a4f" opacity="0.06"/>
  <text x="600" y="105" text-anchor="middle" font-size="15" fill="#7a3b14" font-family="serif">老舍笔下的小动物</text>

  <!-- 猫 -->
  <g transform="translate(500, 200)">
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="#e07856" stroke="#a04830" stroke-width="1.5"/>
    <circle cx="25" cy="-12" r="18" fill="#e07856" stroke="#a04830" stroke-width="1.5"/>
    <path d="M14 -22 L10 -32 L20 -26 Z" fill="#e07856" stroke="#a04830" stroke-width="1.5"/>
    <path d="M32 -24 L36 -34 L28 -28 Z" fill="#e07856" stroke="#a04830" stroke-width="1.5"/>
    <ellipse cx="20" cy="-13" rx="2.5" ry="3" fill="#2d6a4f"/>
    <ellipse cx="30" cy="-13" rx="2.5" ry="3" fill="#2d6a4f"/>
    <path d="M-30 -5 Q-50 -10 -55 -25" fill="none" stroke="#e07856" stroke-width="9" stroke-linecap="round"/>
    <text x="0" y="40" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">猫</text>
  </g>

  <!-- 母鸡带小鸡 -->
  <g transform="translate(680, 200)">
    <ellipse cx="0" cy="0" rx="24" ry="18" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="18" cy="-10" r="12" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M26 -8 L32 -6 L26 -4" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="20" cy="-12" rx="2" ry="2" fill="#2a2a2a"/>
    <!-- 红冠 -->
    <path d="M14 -20 L16 -26 L18 -20 L20 -26 L22 -20" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <!-- 小鸡 -->
    <g transform="translate(-30, 15)">
      <circle cx="0" cy="0" r="8" fill="#fff8e0" stroke="#c8a878" stroke-width="1"/>
      <circle cx="6" cy="-2" r="1.5" fill="#2a2a2a"/>
      <path d="M8 0 L11 1 L8 2" fill="#e07856"/>
    </g>
    <text x="0" y="40" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">母鸡</text>
  </g>

  <!-- 小麻雀 -->
  <g transform="translate(500, 360)">
    <ellipse cx="0" cy="0" rx="18" ry="13" fill="#6a4220" stroke="#4a2a10" stroke-width="1.5"/>
    <circle cx="14" cy="-6" r="9" fill="#6a4220" stroke="#4a2a10" stroke-width="1.5"/>
    <path d="M22 -6 L28 -5 L22 -4" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="16" cy="-8" rx="1.5" ry="1.5" fill="#2a2a2a"/>
    <path d="M-18 0 L-26 -5 L-26 5 Z" fill="#6a4220" stroke="#4a2a10" stroke-width="1.5"/>
    <text x="0" y="30" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">小麻雀</text>
  </g>

  <!-- 蚂蚁（童年伙伴） -->
  <g transform="translate(680, 370)">
    <ellipse cx="-8" cy="0" rx="5" ry="4" fill="#2a2a2a"/>
    <ellipse cx="0" cy="0" rx="6" ry="5" fill="#2a2a2a"/>
    <ellipse cx="8" cy="0" rx="4" ry="3.5" fill="#2a2a2a"/>
    <line x1="-4" y1="4" x2="-6" y2="10" stroke="#2a2a2a" stroke-width="1.5"/>
    <line x1="4" y1="4" x2="6" y2="10" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="0" y="25" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">蚂蚁</text>
  </g>

  <!-- 标注 -->
  <line x1="210" y1="345" x2="170" y2="345" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="60" y="330" width="110" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="115" y="348" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">养花又养猫</text>

  <!-- 底部说明 -->
  <rect x="50" y="540" width="700" height="40" fill="#fff6df" stroke="#e8a838" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="565" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">老舍从小和小动物做朋友，写动物其实是在写生命的丰富与温暖。</text>
</svg>
