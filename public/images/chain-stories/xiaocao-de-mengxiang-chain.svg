<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="小草根系与种子萌发力量的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：小草凭什么顶破石头</text>
  <line x1="150" y1="55" x2="650" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 地面线 -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#8d6f47" stroke-width="2" opacity="0.5"/>
  <rect x="0" y="200" width="800" height="280" fill="#8d6f47" opacity="0.18"/>

  <!-- 左：种子膨胀 -->
  <g transform="translate(180 290)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#2d6a4f">膨胀压力</text>
    <text x="0" y="-72" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">吸水后体积胀大几倍</text>
    <!-- 干种子 -->
    <g transform="translate(-50 -20)">
      <ellipse cx="0" cy="0" rx="10" ry="7" fill="#8d6f47"/>
      <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">干种子</text>
    </g>
    <!-- 箭头 -->
    <path d="M-30 -20 L-10 -20" stroke="#2d6a4f" stroke-width="2" marker-end="url(#ar2)"/>
    <defs>
      <marker id="ar2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
        <path d="M0 0 L8 4 L0 8 Z" fill="#2d6a4f"/>
      </marker>
    </defs>
    <!-- 胀大种子 -->
    <g transform="translate(30 -20)">
      <ellipse cx="0" cy="0" rx="20" ry="15" fill="#3d8a5f"/>
      <ellipse cx="0" cy="0" rx="20" ry="15" fill="none" stroke="#2d6a4f" stroke-width="2"/>
      <!-- 力量箭头(向外) -->
      <g stroke="#e07856" stroke-width="2" opacity="0.7">
        <line x1="20" y1="-10" x2="30" y2="-18"/>
        <line x1="-20" y1="-10" x2="-30" y2="-18"/>
        <line x1="20" y1="10" x2="30" y2="18"/>
        <line x1="-20" y1="10" x2="-30" y2="18"/>
      </g>
      <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">吸水膨胀</text>
    </g>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="10" fill="#e07856">能举起自身几百倍</text>
  </g>

  <!-- 中：根找路 -->
  <g transform="translate(400 290)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#2d6a4f">根会找路</text>
    <text x="0" y="-72" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">根冠像小帽子保护生长点</text>
    <!-- 石头 -->
    <g>
      <path d="M-50 0 Q-60 -30 -20 -36 Q20 -40 50 -30 Q60 -10 50 10 Z" fill="#9aa0a6" stroke="#6a7078" stroke-width="1.5"/>
    </g>
    <!-- 根绕过石头 -->
    <g stroke="#2d6a4f" stroke-width="3" fill="none">
      <path d="M0 -10 Q-30 0 -40 30 Q-30 50 -10 60"/>
      <path d="M0 -10 Q30 0 40 30 Q30 50 10 60"/>
    </g>
    <!-- 根冠(帽子) -->
    <ellipse cx="0" cy="-14" rx="6" ry="4" fill="#5a3a1a"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">碰到硬处就绕开</text>
    <text x="0" y="96" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">找有水的缝钻</text>
  </g>

  <!-- 右：根比茎长 -->
  <g transform="translate(620 200)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#2d6a4f">根比茎长得多</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">地上一小段，地下好几米</text>
    <!-- 地上小草 -->
    <g transform="translate(0 30)">
      <path d="M0 0 Q-2 -24 -8 -36" stroke="#2d6a4f" stroke-width="2.5" fill="none"/>
      <path d="M0 0 Q2 -24 8 -36" stroke="#2d6a4f" stroke-width="2.5" fill="none"/>
      <ellipse cx="-8" cy="-36" rx="5" ry="9" fill="#2d6a4f" opacity="0.8"/>
      <ellipse cx="8" cy="-36" rx="5" ry="9" fill="#3d8a5f" opacity="0.8"/>
    </g>
    <!-- 深根 -->
    <g stroke="#8d6f47" stroke-width="2.5" fill="none" opacity="0.8">
      <path d="M0 30 Q-10 80 -20 140"/>
      <path d="M0 30 Q10 80 20 140"/>
      <path d="M0 30 Q-4 100 0 180"/>
      <path d="M0 30 Q-16 60 -28 110"/>
      <path d="M0 30 Q16 60 28 110"/>
    </g>
    <!-- 标尺 -->
    <g stroke="#c84a3a" stroke-width="1" opacity="0.6">
      <line x1="40" y1="30" x2="40" y2="180"/>
      <line x1="36" y1="30" x2="44" y2="30"/>
      <line x1="36" y1="180" x2="44" y2="180"/>
    </g>
    <text x="52" y="110" font-family="serif" font-size="10" fill="#c84a3a">深</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="500" width="700" height="75" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6" opacity="0.85"/>
  <text x="400" y="528" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">种子萌发的膨胀力能撑裂铁罐，根会找路、会绕开硬处往下扎。</text>
  <text x="400" y="552" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a">"野火烧不尽，春风吹又生"——烧的只是叶，根在地下好好活着。</text>
</svg>
