<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="人类发现火的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#5a3a1a">火的发现与人类文明</text>
  <line x1="250" y1="56" x2="550" y2="56" stroke="#c9952e" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8a6a3a">——从雷电野火到钻木取火</text>

  <!-- 夜空背景 -->
  <rect x="0" y="90" width="800" height="300" fill="#2a2a3a"/>
  <!-- 星星 -->
  <g fill="#f4e8a0">
    <circle cx="80" cy="120" r="1.5"/>
    <circle cx="180" cy="110" r="1"/>
    <circle cx="280" cy="130" r="2"/>
    <circle cx="500" cy="115" r="1.5"/>
    <circle cx="620" cy="125" r="1"/>
    <circle cx="720" cy="110" r="2"/>
    <circle cx="120" cy="160" r="1"/>
    <circle cx="400" cy="140" r="1.5"/>
    <circle cx="580" cy="155" r="1"/>
  </g>

  <!-- 闪电（引发野火） -->
  <g transform="translate(150, 100)">
    <text x="0" y="-5" text-anchor="middle" font-family="serif" font-size="13" fill="#f4e060">闪电引燃</text>
    <path d="M0 5 L-10 30 L5 35 L-8 60 L10 65 L0 90" fill="none" stroke="#f4e060" stroke-width="3" stroke-linecap="round"/>
    <path d="M0 5 L-10 30 L5 35 L-8 60 L10 65 L0 90" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- 燃烧的树（野火） -->
  <g transform="translate(150, 280)">
    <!-- 树干 -->
    <rect x="-8" y="0" width="16" height="60" fill="#5a3a1a" stroke="#3a1a0a" stroke-width="2"/>
    <!-- 火焰（包裹树） -->
    <path d="M-25 0 Q-30 -30 -15 -45 Q-10 -25 -5 -50 Q0 -30 5 -50 Q10 -25 15 -45 Q30 -30 25 0 Z" fill="#f4602a" stroke="#c44020" stroke-width="2"/>
    <path d="M-18 -5 Q-22 -25 -8 -35 Q-4 -20 0 -40 Q4 -20 8 -35 Q22 -25 18 -5 Z" fill="#f4a040" stroke="#c48020" stroke-width="1.5"/>
    <path d="M-8 -10 Q-10 -20 0 -30 Q10 -20 8 -10 Z" fill="#f4e060"/>
    <!-- 火星 -->
    <circle cx="-20" cy="-40" r="2" fill="#f4a040" opacity="0.7"/>
    <circle cx="20" cy="-35" r="1.5" fill="#f4e060" opacity="0.6"/>
    <circle cx="0" cy="-55" r="2" fill="#f4a040" opacity="0.5"/>
  </g>

  <!-- 原始人（害怕地看着火） -->
  <g transform="translate(300, 340)">
    <text x="0" y="-80" text-anchor="middle" font-family="serif" font-size="13" fill="#f4e8a0">原始人（最初害怕）</text>
    <!-- 人1（后退，害怕） -->
    <circle cx="0" cy="-40" r="14" fill="#c4a070" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 蓬乱头发 -->
    <path d="M-14 -48 Q-7 -60 0 -55 Q7 -60 14 -48" fill="#3a2a1a" stroke="#1a0a00" stroke-width="1.5"/>
    <!-- 眼睛（惊恐） -->
    <circle cx="-5" cy="-42" r="3" fill="#fff" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="5" cy="-42" r="3" fill="#fff" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="-5" cy="-42" r="1.5" fill="#1a1a1a"/>
    <circle cx="5" cy="-42" r="1.5" fill="#1a1a1a"/>
    <!-- 嘴（张大） -->
    <ellipse cx="0" cy="-32" rx="3" ry="4" fill="#6a2a2a"/>
    <!-- 身体（兽皮） -->
    <path d="M-14 -26 L-18 20 L18 20 L14 -26 Z" fill="#8a6a4a" stroke="#4a2a1a" stroke-width="2"/>
    <!-- 兽皮纹理 -->
    <path d="M-10 -10 L10 -10 M-12 0 L12 0" stroke="#6a4a2a" stroke-width="1"/>
    <!-- 手臂（举起后退） -->
    <path d="M-14 -20 L-30 -35" stroke="#8a6a4a" stroke-width="8" stroke-linecap="round"/>
    <path d="M14 -20 L25 -30" stroke="#8a6a4a" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- 中间分割（时间推移） -->
  <path d="M400 200 L400 450" stroke="#c9952e" stroke-width="2" stroke-dasharray="8,5" opacity="0.5"/>
  <g transform="translate(400, 220)">
    <rect x="-40" y="0" width="80" height="30" rx="6" fill="#fef9ed" stroke="#c9952e" stroke-width="1.5"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="12" fill="#5a3a1a">后来……</text>
  </g>

  <!-- 钻木取火（右侧） -->
  <g transform="translate(580, 340)">
    <text x="0" y="-80" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#5a3a1a">钻木取火</text>
    <!-- 木板（底座） -->
    <rect x="-40" y="20" width="80" height="12" fill="#8b5a2a" stroke="#5a2a0a" stroke-width="2" rx="2"/>
    <!-- 凹槽和冒烟处 -->
    <ellipse cx="0" cy="20" rx="8" ry="3" fill="#3a1a0a"/>
    <!-- 钻棍（竖直） -->
    <rect x="-4" y="-40" width="8" height="60" fill="#a0703a" stroke="#5a3a1a" stroke-width="2" rx="2"/>
    <!-- 双手（搓动钻棍） -->
    <ellipse cx="-15" cy="-25" rx="12" ry="6" fill="#c4a070" stroke="#5a3a1a" stroke-width="1.5" transform="rotate(-20 -15 -25)"/>
    <ellipse cx="15" cy="-25" rx="12" ry="6" fill="#c4a070" stroke="#5a3a1a" stroke-width="1.5" transform="rotate(20 15 -25)"/>
    <!-- 烟 -->
    <path d="M0 18 Q-5 5 0 -5 Q5 -15 0 -25" fill="none" stroke="#d4d4d4" stroke-width="2.5" opacity="0.6"/>
    <path d="M-3 18 Q-8 8 -3 -2 Q2 -12 -3 -22" fill="none" stroke="#d4d4d4" stroke-width="2" opacity="0.4"/>
    <!-- 火星 -->
    <circle cx="-5" cy="15" r="2" fill="#f4a040" opacity="0.8"/>
    <circle cx="5" cy="12" r="1.5" fill="#f4e060" opacity="0.7"/>
    <!-- 原始人（蹲着钻火） -->
    <circle cx="0" cy="-55" r="12" fill="#c4a070" stroke="#5a3a1a" stroke-width="2"/>
    <path d="M-10 -62 Q0 -72 10 -62" fill="#3a2a1a"/>
    <circle cx="-4" cy="-55" r="1.5" fill="#1a1a1a"/>
    <circle cx="4" cy="-55" r="1.5" fill="#1a1a1a"/>
    <path d="M-3 -48 L3 -48" stroke="#5a3a1a" stroke-width="1.5"/>
  </g>

  <!-- 火的用途（底部，四个图标） -->
  <g transform="translate(0, 470)">
    <rect x="0" y="0" width="800" height="130" fill="#e8d5a8"/>
    <text x="400" y="25" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#5a3a1a">火改变了人类命运</text>
    <!-- 烹饪 -->
    <g transform="translate(130, 80)">
      <text x="0" y="-20" text-anchor="middle" font-family="serif" font-size="12" fill="#5a3a1a">烹饪食物</text>
      <!-- 烤肉串 -->
      <line x1="-15" y1="-5" x2="15" y2="-5" stroke="#8b6332" stroke-width="2"/>
      <ellipse cx="-8" cy="-5" rx="5" ry="4" fill="#a0503a"/>
      <ellipse cx="8" cy="-5" rx="5" ry="4" fill="#a0503a"/>
      <!-- 火苗 -->
      <path d="M-10 5 Q-12 15 -8 20 M0 5 Q-2 15 2 20 M10 5 Q8 15 12 20" fill="none" stroke="#f4602a" stroke-width="2"/>
    </g>
    <!-- 取暖 -->
    <g transform="translate(310, 80)">
      <text x="0" y="-20" text-anchor="middle" font-family="serif" font-size="12" fill="#5a3a1a">取暖御寒</text>
      <!-- 火堆 -->
      <path d="M-12 5 Q-15 -10 -5 -15 Q0 -5 5 -15 Q15 -10 12 5 Z" fill="#f4602a"/>
      <path d="M-7 0 Q-8 -8 0 -12 Q8 -8 7 0 Z" fill="#f4e060"/>
      <!-- 暖气波纹 -->
      <path d="M-20 -15 Q-25 -20 -20 -25" fill="none" stroke="#f4a040" stroke-width="1.5" opacity="0.5"/>
      <path d="M20 -15 Q25 -20 20 -25" fill="none" stroke="#f4a040" stroke-width="1.5" opacity="0.5"/>
    </g>
    <!-- 驱赶野兽 -->
    <g transform="translate(490, 80)">
      <text x="0" y="-20" text-anchor="middle" font-family="serif" font-size="12" fill="#5a3a1a">驱赶野兽</text>
      <!-- 火把 -->
      <line x1="0" y1="15" x2="0" y2="-5" stroke="#8b6332" stroke-width="3"/>
      <path d="M-6 -5 Q-8 -18 0 -22 Q8 -18 6 -5 Z" fill="#f4602a"/>
      <path d="M-3 -8 Q-4 -15 0 -18 Q4 -15 3 -8 Z" fill="#f4e060"/>
      <!-- 狼逃跑剪影 -->
      <path d="M20 10 L25 5 L28 8 L32 5 L30 12 L22 12 Z" fill="#3a3a3a" opacity="0.4"/>
    </g>
    <!-- 冶炼金属 -->
    <g transform="translate(670, 80)">
      <text x="0" y="-20" text-anchor="middle" font-family="serif" font-size="12" fill="#5a3a1a">冶炼金属</text>
      <!-- 金属锭 -->
      <path d="M-10 5 L-12 15 L12 15 L10 5 Z" fill="#8a8a9a" stroke="#4a4a5a" stroke-width="1.5"/>
      <path d="M-10 5 L10 5 L8 -2 L-8 -2 Z" fill="#a0a0b0" stroke="#4a4a5a" stroke-width="1.5"/>
      <!-- 火焰 -->
      <path d="M-8 -2 Q-10 -12 0 -15 Q10 -12 8 -2 Z" fill="#f4602a" opacity="0.7"/>
    </g>
  </g>
</svg>
