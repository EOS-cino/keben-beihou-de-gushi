<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="郭沫若从诗人到学者的多彩人生插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a3b14" font-family="serif">连珠小故事：郭沫若的文学世界</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 背景时间轴 -->
  <line x1="80" y1="300" x2="720" y2="300" stroke="#c8843a" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>
  <circle cx="160" cy="300" r="6" fill="#c8843a"/>
  <circle cx="340" cy="300" r="6" fill="#c8843a"/>
  <circle cx="520" cy="300" r="6" fill="#c8843a"/>
  <circle cx="680" cy="300" r="6" fill="#c8843a"/>

  <!-- 第一阶段：学医（日本） -->
  <g transform="translate(160, 200)">
    <!-- 人物 -->
    <path d="M -16 60 Q -18 25 -12 8 Q -6 0 0 0 Q 6 0 12 8 Q 18 25 16 60" fill="#4a6a8a" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="-12" r="14" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M -14 -15 Q -12 -26 0 -28 Q 12 -26 14 -15" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-5" cy="-12" r="1.5" fill="#7a3b14"/>
    <circle cx="5" cy="-12" r="1.5" fill="#7a3b14"/>
    <path d="M -4 -4 Q 0 -2 4 -4" fill="none" stroke="#7a3b14" stroke-width="1.2"/>
    <!-- 医学标志（十字） -->
    <g transform="translate(25, 30)">
      <rect x="-8" y="-8" width="16" height="16" fill="#fff" stroke="#c84030" stroke-width="1.5"/>
      <rect x="-2" y="-8" width="4" height="16" fill="#c84030"/>
      <rect x="-8" y="-2" width="16" height="4" fill="#c84030"/>
    </g>
  </g>
  <text x="160" y="330" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">留学学医</text>

  <!-- 第二阶段：女神诗集 -->
  <g transform="translate(340, 200)">
    <!-- 书本 -->
    <rect x="-25" y="-10" width="50" height="40" fill="#c84030" stroke="#7a3b14" stroke-width="2"/>
    <rect x="-22" y="-7" width="44" height="34" fill="#f0e8d8"/>
    <text x="0" y="8" text-anchor="middle" font-size="12" fill="#c84030" font-family="serif" font-weight="bold">女神</text>
    <text x="0" y="20" text-anchor="middle" font-size="8" fill="#7a3b14" font-family="serif">1921</text>
    <!-- 火焰（凤凰涅槃） -->
    <g transform="translate(0, -25)">
      <path d="M -8 5 Q -5 -10 0 -15 Q 5 -10 8 5 Q 4 0 0 -5 Q -4 0 -8 5" fill="#f0a020" stroke="#c86020" stroke-width="1"/>
      <path d="M -4 3 Q -2 -5 0 -10 Q 2 -5 4 3" fill="#f0d020"/>
    </g>
  </g>
  <text x="340" y="330" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">新诗先驱</text>

  <!-- 第三阶段：历史剧 -->
  <g transform="translate(520, 200)">
    <!-- 舞台帷幕 -->
    <path d="M -30 -20 Q -25 -25 -20 -20 L -20 30 L -30 30 Z" fill="#c84030" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M 30 -20 Q 25 -25 20 -20 L 20 30 L 30 30 Z" fill="#c84030" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-20" y="-20" width="40" height="50" fill="#f0e8d8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 屈原剪影 -->
    <g transform="translate(0, 15)">
      <path d="M -8 15 Q -10 0 -6 -10 Q -3 -15 0 -15 Q 3 -15 6 -10 Q 10 0 8 15" fill="#4a5a7a" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-18" r="7" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
      <path d="M -7 -20 Q -5 -26 0 -27 Q 5 -26 7 -20" fill="#3a3a3a"/>
    </g>
    <text x="0" y="-28" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">屈原</text>
  </g>
  <text x="520" y="330" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">历史剧创作</text>

  <!-- 第四阶段：甲骨文研究 -->
  <g transform="translate(680, 200)">
    <!-- 甲骨 -->
    <path d="M -20 -15 Q -25 0 -20 20 Q -10 25 0 22 Q 10 25 20 20 Q 25 0 20 -15 Q 10 -20 0 -18 Q -10 -20 -20 -15" fill="#e8d8b8" stroke="#8a6a3a" stroke-width="2"/>
    <!-- 甲骨文刻痕 -->
    <path d="M -8 -5 L -8 8 M -12 0 L -4 0" stroke="#5a3a1a" stroke-width="1.5"/>
    <path d="M 5 -3 L 10 5 M 3 2 L 12 2" stroke="#5a3a1a" stroke-width="1.5"/>
    <path d="M -3 10 L 5 14" stroke="#5a3a1a" stroke-width="1.5"/>
  </g>
  <text x="680" y="330" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">甲骨文研究</text>

  <!-- 底部：郭沫若人物大图 -->
  <g transform="translate(400, 440)">
    <!-- 身体 -->
    <path d="M -30 80 Q -33 30 -28 10 Q -18 -2 0 -2 Q 18 -2 28 10 Q 33 30 30 80" fill="#3a4a6a" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头 -->
    <circle cx="0" cy="-20" r="20" fill="#e8c4a0" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头发 -->
    <path d="M -20 -22 Q -18 -38 0 -40 Q 18 -38 20 -22" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 眼镜 -->
    <circle cx="-7" cy="-20" r="6" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="7" cy="-20" r="6" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-1" y1="-20" x2="1" y2="-20" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 眼睛 -->
    <circle cx="-7" cy="-20" r="1.5" fill="#7a3b14"/>
    <circle cx="7" cy="-20" r="1.5" fill="#7a3b14"/>
    <!-- 嘴 -->
    <path d="M -5 -10 Q 0 -7 5 -10" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 手拿笔 -->
    <path d="M 28 15 Q 45 20 52 35" fill="none" stroke="#3a4a6a" stroke-width="9" stroke-linecap="round"/>
    <circle cx="52" cy="36" r="5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    <line x1="52" y1="36" x2="58" y2="48" stroke="#7a3b14" stroke-width="2"/>
  </g>

  <!-- 标注 -->
  <line x1="400" y1="420" x2="400" y2="380" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="345" y="355" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="373" text-anchor="middle" font-size="15" fill="#7a3b14" font-family="serif">郭沫若</text>

  <!-- 底部说明 -->
  <rect x="50" y="545" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="570" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">从学医到新诗，从历史剧到甲骨文——郭沫若的人生如大河奔流，奔腾与平静皆是美。</text>
</svg>
