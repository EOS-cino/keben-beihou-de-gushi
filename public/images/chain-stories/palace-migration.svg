<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="故宫文物南迁">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 顶部标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a3b14" font-family="serif">故宫文物南迁</text>
  <line x1="300" y1="52" x2="500" y2="52" stroke="#c8843a" stroke-width="2"/>
  <!-- 天空 -->
  <rect x="0" y="58" width="800" height="200" fill="#f0e0c0"/>
  <!-- 故宫建筑剪影 -->
  <g transform="translate(50,80)">
    <rect x="0" y="100" width="220" height="80" fill="#9a4a2a"/>
    <path d="M-10 100 L110 40 L230 100 Z" fill="#7a3a20"/>
    <rect x="20" y="120" width="30" height="60" fill="#3d2817"/>
    <rect x="80" y="120" width="30" height="60" fill="#3d2817"/>
    <rect x="140" y="120" width="30" height="60" fill="#3d2817"/>
    <rect x="190" y="120" width="20" height="60" fill="#3d2817"/>
    <path d="M-10 100 L110 55 L230 100" fill="none" stroke="#c8843a" stroke-width="2"/>
    <rect x="95" y="70" width="30" height="30" fill="#c8843a"/>
    <path d="M90 70 L110 55 L130 70 Z" fill="#9a6a2a"/>
  </g>
  <!-- 城墙 -->
  <rect x="0" y="258" width="800" height="20" fill="#b88a5a"/>
  <!-- 地面 -->
  <rect x="0" y="278" width="800" height="280" fill="#d9c19a"/>
  <!-- 南迁路线箭头 -->
  <path d="M280 250 Q450 230 620 250" fill="none" stroke="#c8843a" stroke-width="3" stroke-dasharray="8,4"/>
  <path d="M610 244 L625 250 L610 256" fill="none" stroke="#c8843a" stroke-width="3"/>
  <!-- 木箱1 -->
  <g transform="translate(120,340)">
    <rect x="0" y="0" width="110" height="80" fill="#b67b43" stroke="#6b4a2f" stroke-width="3"/>
    <rect x="0" y="0" width="110" height="12" fill="#9a6a33"/>
    <line x1="0" y1="40" x2="110" y2="40" stroke="#8d5a36" stroke-width="2"/>
    <rect x="15" y="20" width="80" height="16" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
    <text x="55" y="32" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">故宫文物</text>
    <line x1="10" y1="50" x2="100" y2="50" stroke="#8d5a36" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="55" y="65" text-anchor="middle" font-size="9" fill="#5a3a1a" font-family="serif">第叁号箱</text>
  </g>
  <!-- 木箱2（堆叠） -->
  <g transform="translate(260,310)">
    <rect x="0" y="0" width="100" height="70" fill="#a86a38" stroke="#6b4a2f" stroke-width="3"/>
    <rect x="0" y="0" width="100" height="12" fill="#8d5a2a"/>
    <rect x="12" y="18" width="76" height="14" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
    <text x="50" y="29" text-anchor="middle" font-size="9" fill="#7a3b14" font-family="serif">珍品南迁</text>
    <line x1="10" y1="45" x2="90" y2="45" stroke="#8d5a36" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  <g transform="translate(260,380)">
    <rect x="0" y="0" width="100" height="60" fill="#b67b43" stroke="#6b4a2f" stroke-width="3"/>
    <rect x="0" y="0" width="100" height="12" fill="#9a6a33"/>
    <text x="50" y="38" text-anchor="middle" font-size="9" fill="#5a3a1a" font-family="serif">易碎品</text>
  </g>
  <!-- 搬运工人 -->
  <g transform="translate(400,360)">
    <circle cx="0" cy="-50" r="10" fill="#e8c4a0"/>
    <path d="M-3 -52 L3 -52 M-2 -48 L2 -48" stroke="#3d2817" stroke-width="1"/>
    <path d="M-12 -42 L-14 -10 L-8 -5 L8 -5 L14 -10 L12 -42 Z" fill="#5a6a4a"/>
    <path d="M-12 -38 L-25 -20" stroke="#5a6a4a" stroke-width="6" stroke-linecap="round"/>
    <path d="M12 -38 L25 -20" stroke="#5a6a4a" stroke-width="6" stroke-linecap="round"/>
    <rect x="-9" y="-5" width="7" height="25" fill="#3a4a3a"/><rect x="2" y="-5" width="7" height="25" fill="#3a4a3a"/>
    <ellipse cx="-5" cy="22" rx="5" ry="3" fill="#2d1c10"/><ellipse cx="5" cy="22" rx="5" ry="3" fill="#2d1c10"/>
    <!-- 搬的箱子 -->
    <rect x="-30" y="-35" width="25" height="20" fill="#b67b43" stroke="#6b4a2f" stroke-width="2"/>
  </g>
  <!-- 火车 -->
  <g transform="translate(530,360)">
    <rect x="0" y="20" width="180" height="55" rx="6" fill="#4a6a4a"/>
    <rect x="10" y="30" width="30" height="25" fill="#f0e0c0" stroke="#3a5a3a" stroke-width="1.5"/>
    <rect x="50" y="30" width="30" height="25" fill="#f0e0c0" stroke="#3a5a3a" stroke-width="1.5"/>
    <rect x="90" y="30" width="30" height="25" fill="#f0e0c0" stroke="#3a5a3a" stroke-width="1.5"/>
    <rect x="130" y="30" width="30" height="25" fill="#f0e0c0" stroke="#3a5a3a" stroke-width="1.5"/>
    <rect x="0" y="10" width="40" height="15" rx="4" fill="#3a5a3a"/>
    <rect x="8" y="2" width="12" height="12" fill="#2d1c10"/>
    <circle cx="30" cy="80" r="10" fill="#2d1c10"/><circle cx="80" cy="80" r="10" fill="#2d1c10"/>
    <circle cx="130" cy="80" r="10" fill="#2d1c10"/>
    <circle cx="30" cy="80" r="4" fill="#9a7548"/><circle cx="80" cy="80" r="4" fill="#9a7548"/><circle cx="130" cy="80" r="4" fill="#9a7548"/>
    <ellipse cx="14" cy="-5" rx="8" ry="6" fill="#d4c4a8" opacity="0.6"/>
  </g>
  <!-- 铁轨 -->
  <line x1="500" y1="445" x2="760" y2="445" stroke="#4a3525" stroke-width="3"/>
  <line x1="500" y1="455" x2="760" y2="455" stroke="#4a3525" stroke-width="3"/>
  <!-- 标注：文物装箱 -->
  <line x1="200" y1="340" x2="120" y2="290" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="40" y="270" width="110" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="95" y="289" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">文物装箱</text>
  <!-- 标注：南迁路线 -->
  <line x1="450" y1="235" x2="450" y2="180" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="380" y="152" width="110" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="435" y="171" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">南迁路线</text>
  <!-- 标注：保护国宝 -->
  <line x1="620" y1="380" x2="690" y2="320" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="630" y="296" width="110" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="685" y="315" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">保护国宝</text>
  <!-- 底部说明 -->
  <rect x="40" y="545" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="570" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">1933年起，故宫万余箱文物分批南迁，辗转万里，历经战火，守护中华文脉不绝。</text>
</svg>