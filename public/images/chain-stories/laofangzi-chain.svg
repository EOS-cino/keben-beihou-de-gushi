<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="中国传统民居演变与建筑智慧插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：老房子里藏着多少老手艺</text>
  <line x1="140" y1="55" x2="660" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左上：打土坯 -->
  <g transform="translate(160 180)">
    <text x="0" y="-40" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#8d6f47">打土坯</text>
    <text x="0" y="-24" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">黄土碎草夯实晒干</text>
    <!-- 木模+土坯 -->
    <rect x="-30" y="0" width="60" height="28" fill="none" stroke="#5a3a1a" stroke-width="2.5"/>
    <rect x="-28" y="2" width="56" height="24" fill="#8d6f47" opacity="0.7"/>
    <g stroke="#5a3a1a" stroke-width="0.8" opacity="0.5">
      <line x1="-10" y1="2" x2="-10" y2="26"/>
      <line x1="10" y1="2" x2="10" y2="26"/>
    </g>
    <!-- 草屑 -->
    <g stroke="#e8a838" stroke-width="1" opacity="0.7">
      <line x1="-20" y1="10" x2="-14" y2="12"/>
      <line x1="6" y1="18" x2="14" y2="20"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">冬暖夏凉会呼吸</text>
  </g>

  <!-- 右上：榫卯 -->
  <g transform="translate(640 180)">
    <text x="0" y="-40" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#5a3a1a">榫卯</text>
    <text x="0" y="-24" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">不用钉子，凹凸相扣</text>
    <!-- 榫(凸) -->
    <g transform="translate(-30 0)">
      <rect x="-20" y="-8" width="28" height="16" fill="#8d6f47"/>
      <rect x="8" y="-4" width="14" height="8" fill="#8d6f47"/>
    </g>
    <!-- 卯(凹) -->
    <g transform="translate(20 0)">
      <rect x="-8" y="-10" width="28" height="20" fill="#a87a4f"/>
      <rect x="-8" y="-4" width="10" height="8" fill="#fef9ed"/>
    </g>
    <!-- 箭头表示拼合 -->
    <path d="M-2 0 L8 0" stroke="#c84a3a" stroke-width="2" marker-end="url(#ar5)"/>
    <defs>
      <marker id="ar5" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
        <path d="M0 0 L8 4 L0 8 Z" fill="#c84a3a"/>
      </marker>
    </defs>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">摇而不倒，七千年智慧</text>
  </g>

  <!-- 左下：上梁 -->
  <g transform="translate(160 360)">
    <text x="0" y="-40" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#e07856">上梁</text>
    <text x="0" y="-24" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">挑吉日放鞭炮贴红纸</text>
    <!-- 房架 -->
    <g stroke="#5a3a1a" stroke-width="3" fill="none">
      <line x1="-30" y1="20" x2="30" y2="20"/>
      <line x1="-24" y1="20" x2="-24" y2="-20"/>
      <line x1="24" y1="20" x2="24" y2="-20"/>
    </g>
    <!-- 大梁(横) -->
    <rect x="-30" y="-24" width="60" height="8" fill="#8d5a36"/>
    <!-- 红纸 -->
    <rect x="-14" y="-22" width="28" height="6" fill="#c84a3a"/>
    <text x="0" y="-17" text-anchor="middle" font-family="serif" font-size="6" fill="#fef9ed">上梁大吉</text>
    <!-- 鞭炮 -->
    <g fill="#e07856">
      <rect x="-36" y="-4" width="3" height="8"/>
      <rect x="-32" y="-2" width="3" height="8"/>
      <rect x="34" y="-4" width="3" height="8"/>
    </g>
    <text x="0" y="44" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">梁是房子的脊梁骨</text>
  </g>

  <!-- 右下：刻柱础 -->
  <g transform="translate(640 360)">
    <text x="0" y="-40" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#8d6f47">刻柱础</text>
    <text x="0" y="-24" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">一錾一錾凿出花纹</text>
    <!-- 柱础石墩 -->
    <ellipse cx="0" cy="20" rx="28" ry="8" fill="#b8b0a0"/>
    <rect x="-26" y="-6" width="52" height="26" fill="#c8c0b0" stroke="#8d6f47" stroke-width="1.5"/>
    <ellipse cx="0" cy="-6" rx="26" ry="6" fill="#d8d0c0"/>
    <!-- 莲花纹 -->
    <g fill="none" stroke="#8d6f47" stroke-width="1.2" opacity="0.7">
      <ellipse cx="0" cy="6" rx="8" ry="10"/>
      <ellipse cx="-12" cy="6" rx="5" ry="9"/>
      <ellipse cx="12" cy="6" rx="5" ry="9"/>
      <ellipse cx="-20" cy="8" rx="3" ry="7"/>
      <ellipse cx="20" cy="8" rx="3" ry="7"/>
    </g>
    <circle cx="0" cy="6" r="3" fill="#e8a838" opacity="0.6"/>
    <!-- 凿子 -->
    <g transform="translate(-30 -20)">
      <rect x="0" y="0" width="4" height="20" fill="#5a3a1a"/>
      <rect x="-2" y="-6" width="8" height="8" fill="#9aa0a6"/>
    </g>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">莲花=洁净 云纹=吉祥</text>
  </g>

  <!-- 中间：非遗标识 -->
  <g transform="translate(400 270)">
    <rect x="-120" y="-30" width="240" height="60" fill="#fff6df" stroke="#c84a3a" stroke-width="2" rx="8"/>
    <text x="0" y="-6" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a" font-weight="bold">榫卯：国家级非物质文化遗产</text>
    <text x="0" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">故宫、应县木塔靠它扛过几百次地震</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="450" width="700" height="125" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6" opacity="0.85"/>
  <text x="400" y="478" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">土坯墙会呼吸、飞檐排水又采光、柱础防潮防腐、榫卯不用钉子。</text>
  <text x="400" y="502" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">一座老房子，把几代人的手艺、智慧、记忆，都"住"进了墙里梁里。</text>
  <text x="400" y="526" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">拆掉一座老房子容易，可那些跟着它一起消失的手艺和故事，</text>
  <text x="400" y="550" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a">就再也找不回来了——保护老房子，是保护我们"怎么住过来"的记忆。</text>
</svg>
