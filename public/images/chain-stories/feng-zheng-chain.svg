<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="风筝历史与鲁迅童年插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#7a3b14" font-family="serif">连珠小故事：风筝飞了两千年</text>
  <line x1="190" y1="55" x2="610" y2="55" stroke="#e8a838" stroke-width="1.5"/>

  <!-- 时间轴 -->
  <line x1="80" y1="300" x2="720" y2="300" stroke="#e8a838" stroke-width="3" stroke-linecap="round"/>
  <g fill="#e8a838">
    <circle cx="150" cy="300" r="8"/>
    <circle cx="320" cy="300" r="8"/>
    <circle cx="490" cy="300" r="8"/>
    <circle cx="650" cy="300" r="8"/>
  </g>

  <!-- 节点1：墨子木鸢（春秋战国） -->
  <g transform="translate(150, 300)">
    <line x1="0" y1="-8" x2="0" y2="-60" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- 木鸢（简化的鸟形风筝） -->
    <g transform="translate(0, -90)">
      <ellipse cx="0" cy="0" rx="25" ry="10" fill="#6a4220" stroke="#4a2a10" stroke-width="1.5"/>
      <path d="M-25 0 L-40 -8 L-40 8 Z" fill="#6a4220" stroke="#4a2a10" stroke-width="1.5"/>
      <ellipse cx="20" cy="-3" rx="6" ry="5" fill="#6a4220" stroke="#4a2a10" stroke-width="1.5"/>
      <circle cx="22" cy="-4" r="1.5" fill="#2a2a2a"/>
      <!-- 翅膀 -->
      <path d="M-5 -5 Q-15 -20 -25 -15" fill="none" stroke="#6a4220" stroke-width="3"/>
      <path d="M-5 5 Q-15 20 -25 15" fill="none" stroke="#6a4220" stroke-width="3"/>
    </g>
    <rect x="-60" y="20" width="120" height="50" fill="#fff6df" stroke="#e8a838" stroke-width="1.5" rx="4"/>
    <text x="0" y="40" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">墨子·木鸢</text>
    <text x="0" y="58" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">最早的木风筝</text>
  </g>

  <!-- 节点2：纸鸢（东汉后） -->
  <g transform="translate(320, 300)">
    <line x1="0" y1="-8" x2="0" y2="-60" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
    <g transform="translate(0, -90)">
      <!-- 纸鸢（菱形） -->
      <path d="M0 -22 L22 0 L0 25 L-22 0 Z" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M0 -22 L0 25 M-22 0 L22 0" stroke="#7a3b14" stroke-width="1"/>
      <path d="M0 25 L-8 45 M0 25 L0 50 M0 25 L8 45" fill="none" stroke="#e8a838" stroke-width="2"/>
    </g>
    <rect x="-60" y="20" width="120" height="50" fill="#fff6df" stroke="#e8a838" stroke-width="1.5" rx="4"/>
    <text x="0" y="40" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">纸鸢</text>
    <text x="0" y="58" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">蔡伦造纸后更轻</text>
  </g>

  <!-- 节点3：带竹哨的风筝（宋） -->
  <g transform="translate(490, 300)">
    <line x1="0" y1="-8" x2="0" y2="-60" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
    <g transform="translate(0, -90)">
      <!-- 燕子风筝 -->
      <path d="M0 -20 L25 -5 L15 15 L0 25 L-15 15 L-25 -5 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-8" cy="-5" r="2.5" fill="#2a2a2a"/>
      <circle cx="8" cy="-5" r="2.5" fill="#2a2a2a"/>
      <!-- 竹哨 -->
      <rect x="-3" y="25" width="6" height="8" fill="#6a4220" stroke="#4a2a10" stroke-width="1"/>
      <!-- 声波 -->
      <g stroke="#4a90b8" stroke-width="1.5" fill="none" opacity="0.6">
        <path d="M8 30 Q14 28 16 32"/>
        <path d="M-8 30 Q-14 28 -16 32"/>
      </g>
    </g>
    <rect x="-65" y="20" width="130" height="50" fill="#fff6df" stroke="#e8a838" stroke-width="1.5" rx="4"/>
    <text x="0" y="40" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">风筝（带哨）</text>
    <text x="0" y="58" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">风一吹嗡嗡响</text>
  </g>

  <!-- 节点4：传向世界/科学 -->
  <g transform="translate(650, 300)">
    <line x1="0" y1="-8" x2="0" y2="-60" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
    <g transform="translate(0, -90)">
      <!-- 风筝+电（富兰克林实验） -->
      <path d="M0 -20 L18 0 L0 22 L-18 0 Z" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M0 22 L0 50" fill="none" stroke="#7a3b14" stroke-width="1"/>
      <!-- 闪电 -->
      <path d="M2 30 L-4 40 L2 40 L-2 52" fill="none" stroke="#e8a838" stroke-width="2.5"/>
      <!-- 钥匙 -->
      <rect x="-4" y="50" width="8" height="10" fill="#c0c0c0" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="48" r="3" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <rect x="-65" y="20" width="130" height="50" fill="#fff6df" stroke="#e8a838" stroke-width="1.5" rx="4"/>
    <text x="0" y="40" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">传向世界</text>
    <text x="0" y="58" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">启发雷电与飞机</text>
  </g>

  <!-- 鲁迅童年（左下角小图） -->
  <g transform="translate(120, 470)">
    <rect x="-50" y="-30" width="100" height="60" fill="#fff6df" stroke="#e07856" stroke-width="1.5" rx="4" opacity="0.9"/>
    <circle cx="-15" cy="-10" r="8" fill="#f0d0a8" stroke="#c89060" stroke-width="1"/>
    <path d="M-23 -12 Q-24 -20 -15 -18 Q-7 -20 -8 -12" fill="#2a2a2a"/>
    <ellipse cx="-18" cy="-10" rx="1.5" ry="1.5" fill="#2a2a2a"/>
    <ellipse cx="-12" cy="-10" rx="1.5" ry="1.5" fill="#2a2a2a"/>
    <!-- 被踏扁的风筝 -->
    <path d="M5 0 L20 -5 L20 5 L5 8 Z" fill="#e8a838" opacity="0.5" stroke="#7a3b14" stroke-width="1"/>
    <line x1="5" y1="0" x2="25" y2="8" stroke="#7a3b14" stroke-width="1" opacity="0.5"/>
    <text x="0" y="22" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">鲁迅·童年的遗憾</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="540" width="700" height="40" fill="#fff6df" stroke="#e8a838" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="565" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">从墨子木鸢到纸鸢、带哨风筝，再到启发雷电实验——一只风筝飞了两千年。</text>
</svg>
