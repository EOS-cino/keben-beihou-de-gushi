  <text x="400" y="423" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">中医看病讲究"望闻问切"四诊合参：望是观察病人的面色和神态，</text>
  <text x="400" y="445" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">闻是听病人的声音和呼吸，问是询问症状和病史，切是按脉搏感受脉象。</text>
  <text x="400" y="473" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">四种方法从不同角度收集身体的信号，相互印证、综合判断，</text>
  <text x="400" y="495" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">医生才能准确了解病情，对症下药。</text>
  <text x="400" y="523" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">望闻问切就像侦探收集线索，线索越多，判断越准确。</text>
  <text x="400" y="555" text-anchor="middle" font-size="13" font-weight="bold" fill="#c8843a" font-family="serif">四诊合参，才能全面了解病情，这是中医的智慧。</text>
