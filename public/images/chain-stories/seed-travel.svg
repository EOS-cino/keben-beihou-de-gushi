<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="花种子随风飘走旅行的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：花种子的旅行</text>
  <line x1="200" y1="55" x2="600" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 天空 -->
  <rect x="0" y="70" width="800" height="330" fill="#a8d0e8" opacity="0.25"/>
  <!-- 太阳 -->
  <circle cx="700" cy="120" r="30" fill="#f4c842" opacity="0.7"/>

  <!-- 风（曲线表示） -->
  <g fill="none" stroke="#7ab8d8" stroke-width="2.5" opacity="0.5" stroke-linecap="round">
    <path d="M50 150 Q120 140 190 150 Q150 155 100 158"/>
    <path d="M50 200 Q130 185 210 200 Q170 208 110 210"/>
    <path d="M50 250 Q140 235 220 250"/>
  </g>

  <!-- 地面/草地 -->
  <rect x="0" y="400" width="800" height="200" fill="#6a8d3f" opacity="0.3"/>

  <!-- 方式一：蒲公英（风传播） -->
  <g transform="translate(150, 200)">
    <text x="0" y="-50" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">风传播</text>
    <!-- 茎 -->
    <line x1="0" y1="0" x2="0" y2="60" stroke="#4a6a2f" stroke-width="3"/>
    <!-- 蒲公英花球 -->
    <g>
      <circle cx="0" cy="0" r="30" fill="#fff8e0" opacity="0.6"/>
      <line x1="0" y1="0" x2="-20" y2="-20" stroke="#fff8e0" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="20" y2="-20" stroke="#fff8e0" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="-25" y2="0" stroke="#fff8e0" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="25" y2="0" stroke="#fff8e0" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="-20" y2="20" stroke="#fff8e0" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="20" y2="20" stroke="#fff8e0" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="-28" stroke="#fff8e0" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="28" stroke="#fff8e0" stroke-width="1.5"/>
      <circle cx="-20" cy="-20" r="2.5" fill="#8d5a36"/>
      <circle cx="20" cy="-20" r="2.5" fill="#8d5a36"/>
      <circle cx="-25" cy="0" r="2.5" fill="#8d5a36"/>
      <circle cx="25" cy="0" r="2.5" fill="#8d5a36"/>
      <circle cx="0" cy="-28" r="2.5" fill="#8d5a36"/>
    </g>
    <!-- 飘走的种子 -->
    <g opacity="0.7">
      <line x1="40" y1="-30" x2="48" y2="-38" stroke="#fff8e0" stroke-width="1"/>
      <circle cx="48" cy="-38" r="2" fill="#8d5a36"/>
      <line x1="55" y1="-15" x2="63" y2="-23" stroke="#fff8e0" stroke-width="1"/>
      <circle cx="63" cy="-23" r="2" fill="#8d5a36"/>
    </g>
  </g>

  <!-- 方式二：苍耳（动物传播） -->
  <g transform="translate(400, 200)">
    <text x="0" y="-50" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">动物传播</text>
    <!-- 苍耳种子（带钩） -->
    <g transform="translate(-30, 0)">
      <ellipse cx="0" cy="0" rx="12" ry="14" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
      <!-- 钩刺 -->
      <line x1="-10" y1="-10" x2="-16" y2="-16" stroke="#5a3a1a" stroke-width="1.5"/>
      <line x1="10" y1="-10" x2="16" y2="-16" stroke="#5a3a1a" stroke-width="1.5"/>
      <line x1="-12" y1="0" x2="-20" y2="0" stroke="#5a3a1a" stroke-width="1.5"/>
      <line x1="12" y1="0" x2="20" y2="0" stroke="#5a3a1a" stroke-width="1.5"/>
      <line x1="-10" y1="10" x2="-16" y2="16" stroke="#5a3a1a" stroke-width="1.5"/>
      <line x1="10" y1="10" x2="16" y2="16" stroke="#5a3a1a" stroke-width="1.5"/>
      <line x1="0" y1="-14" x2="0" y2="-22" stroke="#5a3a1a" stroke-width="1.5"/>
    </g>
    <!-- 小动物（毛上挂着种子） -->
    <g transform="translate(20, 10)">
      <ellipse cx="0" cy="10" rx="25" ry="16" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="22" cy="0" r="12" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="25" cy="-2" r="2" fill="#2a2a2a"/>
      <ellipse cx="30" cy="3" rx="3" ry="2" fill="#7a3b14"/>
      <!-- 耳朵 -->
      <ellipse cx="18" cy="-10" rx="4" ry="7" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
      <!-- 挂在身上的种子 -->
      <ellipse cx="-15" cy="5" rx="6" ry="7" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1"/>
      <line x1="-20" y1="2" x2="-24" y2="-2" stroke="#5a3a1a" stroke-width="1"/>
      <line x1="-10" y1="2" x2="-6" y2="-2" stroke="#5a3a1a" stroke-width="1"/>
      <!-- 腿 -->
      <line x1="-10" y1="25" x2="-10" y2="38" stroke="#7a3b14" stroke-width="3"/>
      <line x1="10" y1="25" x2="10" y2="38" stroke="#7a3b14" stroke-width="3"/>
    </g>
  </g>

  <!-- 方式三：椰子（水传播） -->
  <g transform="translate(650, 200)">
    <text x="0" y="-50" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">水传播</text>
    <!-- 海水 -->
    <path d="M-50 50 Q-25 45 0 50 T50 50" fill="none" stroke="#7ab8d8" stroke-width="2"/>
    <path d="M-50 60 Q-25 55 0 60 T50 60" fill="none" stroke="#7ab8d8" stroke-width="2"/>
    <!-- 椰子（漂在水上） -->
    <g transform="translate(0, 40)">
      <ellipse cx="0" cy="0" rx="18" ry="14" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
      <ellipse cx="-5" cy="-3" rx="3" ry="2" fill="#5a3a1a"/>
      <ellipse cx="5" cy="-3" rx="3" ry="2" fill="#5a3a1a"/>
      <ellipse cx="0" cy="2" rx="3" ry="2" fill="#5a3a1a"/>
      <!-- 椰子壳纤维纹理 -->
      <line x1="-15" y1="-5" x2="-12" y2="8" stroke="#5a3a1a" stroke-width="1" opacity="0.5"/>
      <line x1="12" y1="-5" x2="15" y2="8" stroke="#5a3a1a" stroke-width="1" opacity="0.5"/>
    </g>
    <!-- 水波 -->
    <ellipse cx="0" cy="42" rx="25" ry="3" fill="#a8d0e8" opacity="0.5"/>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="510" width="700" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">种子各有各的旅行办法：蒲公英借风飘，苍耳挂在动物身上，椰子漂洋过海。</text>
  <text x="400" y="558" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">一粒种子能走多远，有时连它自己都想不到。</text>
</svg>
