<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="仿生学从动植物获得灵感发明雷达潜艇魔术贴等技术的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">仿生学的奇妙故事</text>
  <line x1="280" y1="58" x2="520" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 四个仿生例子，左右两列 -->
  <!-- 例1：蝙蝠→雷达 -->
  <rect x="30" y="80" width="350" height="160" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" opacity="0.6"/>
  <text x="60" y="108" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">蝙蝠 → 雷达</text>
  <!-- 蝙蝠 -->
  <g transform="translate(110,170)">
    <ellipse cx="0" cy="0" rx="16" ry="12" fill="#5a3a4a"/>
    <path d="M-14 -2 Q-44 -24 -56 0 Q-44 8 -14 6 Z" fill="#5a3a4a"/>
    <path d="M14 -2 Q44 -24 56 0 Q44 8 14 6 Z" fill="#5a3a4a"/>
    <path d="M-6 -16 L-9 -24 L-3 -18 Z" fill="#5a3a4a"/>
    <path d="M6 -16 L9 -24 L3 -18 Z" fill="#5a3a4a"/>
  </g>
  <text x="110" y="210" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">超声波探路</text>
  <!-- 箭头 -->
  <path d="M180 170 L240 170" stroke="#c84a3a" stroke-width="3" fill="none"/>
  <path d="M232 164 L244 170 L232 176" fill="none" stroke="#c84a3a" stroke-width="3"/>
  <!-- 雷达 -->
  <g transform="translate(300,170)">
    <ellipse cx="0" cy="10" rx="30" ry="8" fill="#8d8d8d"/>
    <rect x="-3" y="-20" width="6" height="30" fill="#8d8d8d"/>
    <path d="M-3 -20 Q-20 -32 -28 -20" fill="none" stroke="#7ab8d8" stroke-width="3"/>
    <path d="M3 -20 Q20 -32 28 -20" fill="none" stroke="#7ab8d8" stroke-width="3"/>
  </g>
  <text x="300" y="210" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">无线电波探测</text>

  <!-- 例2：鱼鳔→潜艇 -->
  <rect x="420" y="80" width="350" height="160" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" opacity="0.6"/>
  <text x="450" y="108" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">鱼鳔 → 潜艇</text>
  <!-- 鱼 -->
  <g transform="translate(500,170)">
    <ellipse cx="0" cy="0" rx="30" ry="14" fill="#7ab8d8" stroke="#4a8aaa" stroke-width="1.5"/>
    <path d="M30 0 L46 -10 L46 10 Z" fill="#7ab8d8" stroke="#4a8aaa" stroke-width="1.5"/>
    <ellipse cx="-4" cy="0" rx="10" ry="6" fill="#fff6df" stroke="#4a8aaa" stroke-width="1" opacity="0.7"/>
    <circle cx="-18" cy="-3" r="2" fill="#7a3b14"/>
  </g>
  <text x="500" y="210" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">气囊控制沉浮</text>
  <!-- 箭头 -->
  <path d="M570 170 L630 170" stroke="#c84a3a" stroke-width="3" fill="none"/>
  <path d="M622 164 L634 170 L622 176" fill="none" stroke="#c84a3a" stroke-width="3"/>
  <!-- 潜艇 -->
  <g transform="translate(690,170)">
    <ellipse cx="0" cy="0" rx="34" ry="14" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <rect x="-8" y="-22" width="16" height="12" rx="2" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <circle cx="20" cy="0" r="3" fill="#fff6df"/>
    <circle cx="-20" cy="0" r="3" fill="#fff6df"/>
  </g>
  <text x="690" y="210" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">水舱控制沉浮</text>

  <!-- 例3：苍耳→魔术贴 -->
  <rect x="30" y="270" width="350" height="160" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" opacity="0.6"/>
  <text x="60" y="298" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">苍耳 → 魔术贴</text>
  <!-- 苍耳 -->
  <g transform="translate(110,360)">
    <ellipse cx="0" cy="0" rx="18" ry="14" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <g stroke="#7a3b14" stroke-width="1.5" fill="none">
      <path d="M-14 -8 L-22 -14"/>
      <path d="M14 -8 L22 -14"/>
      <path d="M0 -14 L0 -22"/>
      <path d="M-14 8 L-22 14"/>
      <path d="M14 8 L22 14"/>
    </g>
  </g>
  <text x="110" y="400" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">表面小钩子</text>
  <!-- 箭头 -->
  <path d="M180 360 L240 360" stroke="#c84a3a" stroke-width="3" fill="none"/>
  <path d="M232 354 L244 360 L232 366" fill="none" stroke="#c84a3a" stroke-width="3"/>
  <!-- 魔术贴 -->
  <g transform="translate(300,360)">
    <rect x="-30" y="-12" width="28" height="24" rx="3" fill="#c84a3a"/>
    <g stroke="#fff6df" stroke-width="1.5">
      <line x1="-26" y1="-8" x2="-26" y2="-4"/>
      <line x1="-20" y1="-8" x2="-20" y2="-4"/>
      <line x1="-14" y1="-8" x2="-14" y2="-4"/>
      <line x1="-8" y1="-8" x2="-8" y2="-4"/>
    </g>
    <rect x="2" y="-12" width="28" height="24" rx="3" fill="#6a8d3f"/>
    <g fill="#4a6a2f">
      <circle cx="9" cy="-6" r="2"/>
      <circle cx="15" cy="-6" r="2"/>
      <circle cx="21" cy="-6" r="2"/>
      <circle cx="9" cy="0" r="2"/>
      <circle cx="15" cy="0" r="2"/>
      <circle cx="21" cy="0" r="2"/>
    </g>
  </g>
  <text x="300" y="400" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">钩面粘圈面</text>

  <!-- 例4：翠鸟→高铁车头 -->
  <rect x="420" y="270" width="350" height="160" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" opacity="0.6"/>
  <text x="450" y="298" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">翠鸟 → 高铁车头</text>
  <!-- 翠鸟 -->
  <g transform="translate(500,360)">
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="#7ab8d8" stroke="#4a8aaa" stroke-width="1.5"/>
    <path d="M22 0 L42 -4 L42 4 Z" fill="#e8a838" stroke="#c8843a" stroke-width="1.5"/>
    <path d="M-22 -2 L-36 -12 L-30 4 Z" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <circle cx="10" cy="-6" r="2.5" fill="#7a3b14"/>
    <path d="M-10 8 L-20 18 L-6 12 Z" fill="#e07856"/>
  </g>
  <text x="500" y="400" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">尖嘴切开空气</text>
  <!-- 箭头 -->
  <path d="M570 360 L630 360" stroke="#c84a3a" stroke-width="3" fill="none"/>
  <path d="M622 354 L634 360 L622 366" fill="none" stroke="#c84a3a" stroke-width="3"/>
  <!-- 高铁车头 -->
  <g transform="translate(700,360)">
    <path d="M-30 12 L-30 -8 Q-10 -16 18 -8 L18 12 Z" fill="#a8d0e8" stroke="#4a8aaa" stroke-width="1.5"/>
    <rect x="-30" y="12" width="48" height="6" fill="#8d8d8d"/>
    <rect x="-20" y="-6" width="14" height="8" rx="2" fill="#fff6df" stroke="#4a8aaa" stroke-width="1"/>
  </g>
  <text x="700" y="400" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">尖头减少噪音</text>

  <!-- 底部说明 -->
  <rect x="40" y="460" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="485" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">大自然花了几百万年试验出好设计，人类只要用心观察，就能学到本领——这就是仿生学。</text>
</svg>
