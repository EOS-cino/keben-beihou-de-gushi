<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="老舍爱写小动物插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">老舍为什么爱写小动物</text>
  <line x1="220" y1="56" x2="580" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——从童年伙伴到笔下生灵</text>

  <!-- 左：童年（穷苦，和小动物玩） -->
  <g transform="translate(180, 250)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">童年</text>
    <text x="0" y="-12" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">北京穷苦满族家庭</text>
    <!-- 小院子 -->
    <rect x="-80" y="0" width="160" height="120" fill="#d4c8a0" stroke="#8d5a36" stroke-width="2" rx="3"/>
    <!-- 小老舍 -->
    <g transform="translate(-30, 50)">
      <circle cx="0" cy="-15" r="10" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <ellipse cx="0" cy="5" rx="12" ry="15" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-3" cy="-15" r="1.5" fill="#7a3b14"/>
      <circle cx="3" cy="-15" r="1.5" fill="#7a3b14"/>
    </g>
    <!-- 蚂蚁 -->
    <g transform="translate(20, 80)">
      <ellipse cx="0" cy="0" rx="3" ry="2" fill="#7a3b14"/>
      <circle cx="-4" cy="0" r="2" fill="#7a3b14"/>
      <ellipse cx="4" cy="0" rx="3" ry="2" fill="#7a3b14"/>
    </g>
    <g transform="translate(35, 85)">
      <ellipse cx="0" cy="0" rx="3" ry="2" fill="#7a3b14"/>
      <circle cx="-4" cy="0" r="2" fill="#7a3b14"/>
      <ellipse cx="4" cy="0" rx="3" ry="2" fill="#7a3b14"/>
    </g>
    <!-- 野猫 -->
    <g transform="translate(50, 40)">
      <ellipse cx="0" cy="0" rx="15" ry="10" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-12" cy="-3" r="8" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-18 -8 L-20 -15 L-14 -10 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-8 -10 L-6 -16 L-2 -10 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
      <path d="M12 -2 Q20 -8 18 -18" fill="none" stroke="#8d5a36" stroke-width="5" stroke-linecap="round"/>
    </g>
    <!-- 小鱼 -->
    <g transform="translate(-50, 90)">
      <ellipse cx="0" cy="0" rx="8" ry="4" fill="#7ab8d8" stroke="#4a6a8f" stroke-width="1"/>
      <path d="M-8 0 L-14 -3 L-14 3 Z" fill="#7ab8d8" stroke="#4a6a8f" stroke-width="1"/>
    </g>
    <text x="0" y="140" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">没玩具·和小动物玩</text>
    <text x="0" y="155" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">看蚂蚁·逗野猫·养小鱼</text>
  </g>

  <!-- 箭头 -->
  <path d="M300 310 L360 310" stroke="#c8843a" stroke-width="3" fill="none"/>
  <path d="M360 310 L352 303 L352 317 Z" fill="#c8843a"/>

  <!-- 右：成年（写小动物） -->
  <g transform="translate(560, 250)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">成年</text>
    <text x="0" y="-12" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">作家·四合院·养花养猫</text>
    <!-- 书桌 -->
    <rect x="-80" y="60" width="160" height="60" fill="#8d5a36" stroke="#7a3b14" stroke-width="2" rx="3"/>
    <!-- 稿纸 -->
    <rect x="-40" y="40" width="60" height="25" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-35" y1="48" x2="15" y2="48" stroke="#7a3b14" stroke-width="0.5"/>
    <line x1="-35" y1="53" x2="15" y2="53" stroke="#7a3b14" stroke-width="0.5"/>
    <line x1="-35" y1="58" x2="15" y2="58" stroke="#7a3b14" stroke-width="0.5"/>
    <!-- 笔 -->
    <rect x="15" y="35" width="4" height="20" fill="#7a3b14" transform="rotate(20 17 45)"/>
    <!-- 猫在桌上 -->
    <g transform="translate(40, 45)">
      <ellipse cx="0" cy="0" rx="14" ry="8" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-10" cy="-3" r="7" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-15 -7 L-17 -13 L-12 -9 Z" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-7 -9 L-5 -14 L-3 -9 Z" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="-12" cy="-3" r="1.5" fill="#7a3b14"/>
      <circle cx="-8" cy="-3" r="1.5" fill="#7a3b14"/>
      <path d="M10 -2 Q18 -8 15 -18" fill="none" stroke="#c8843a" stroke-width="5" stroke-linecap="round"/>
    </g>
    <!-- 花盆 -->
    <g transform="translate(-55, 35)">
      <path d="M-10 0 L10 0 L8 20 L-8 20 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="0" cy="-8" r="8" fill="#e07856"/>
      <circle cx="-5" cy="-5" r="5" fill="#c84a3a"/>
      <circle cx="5" cy="-6" r="5" fill="#c8843a"/>
    </g>
    <text x="0" y="140" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">写累了看花逗猫</text>
    <text x="0" y="155" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">动物不是"素材"·是真心喜欢</text>
  </g>

  <!-- 作品列表 -->
  <g transform="translate(400, 460)">
    <rect x="-280" y="0" width="560" height="90" rx="10" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14" font-weight="bold">老舍写小动物的作品</text>
    <g transform="translate(-200, 45)">
      <rect x="-50" y="0" width="100" height="30" rx="5" fill="#c8843a" opacity="0.2" stroke="#c8843a" stroke-width="1"/>
      <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">《猫》</text>
    </g>
    <g transform="translate(-67, 45)">
      <rect x="-50" y="0" width="100" height="30" rx="5" fill="#c84a3a" opacity="0.2" stroke="#c84a3a" stroke-width="1"/>
      <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">《母鸡》</text>
    </g>
    <g transform="translate(67, 45)">
      <rect x="-50" y="0" width="100" height="30" rx="5" fill="#6a8d3f" opacity="0.2" stroke="#6a8d3f" stroke-width="1"/>
      <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">《小麻雀》</text>
    </g>
    <g transform="translate(200, 45)">
      <rect x="-50" y="0" width="100" height="30" rx="5" fill="#7ab8d8" opacity="0.2" stroke="#7ab8d8" stroke-width="1"/>
      <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">《小白鼠》</text>
    </g>
  </g>
</svg>
