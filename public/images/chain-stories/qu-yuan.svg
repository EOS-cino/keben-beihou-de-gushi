<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="屈原插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" fill="#2d2a24" font-family="sans-serif" font-weight="bold">屈原与端午节</text>
  <text x="400" y="68" text-anchor="middle" font-size="14" fill="#6b6557" font-family="sans-serif">一位爱国诗人的故事，延续了两千多年的纪念</text>

  <!-- 上半部分：屈原人物 -->

  <!-- 天空/背景 -->
  <rect x="0" y="80" width="800" height="200" fill="#e8e0f0"/>

  <!-- 汨罗江 -->
  <path d="M0 260 Q200 255 400 260 Q600 265 800 258 L800 290 L0 290 Z" fill="#7ec0db"/>
  <path d="M0 270 Q150 265 300 270 Q450 275 600 270 Q700 268 800 270" fill="none" stroke="#a8d4e8" stroke-width="1.5"/>

  <!-- 屈原人物 -->
  <g transform="translate(200,160)">
    <!-- 头 -->
    <circle cx="0" cy="0" r="18" fill="#f4c8a0"/>
    <!-- 头巾/冠 -->
    <path d="M-18 -8 Q-15 -22 0 -20 Q15 -22 18 -8 Q16 -18 0 -16 Q-16 -18 -18 -8" fill="#4a3a5a"/>
    <!-- 高冠 -->
    <path d="M-12 -18 L-14 -30 L14 -30 L12 -18 Z" fill="#3a2a4a"/>
    <rect x="-15" y="-30" width="30" height="4" fill="#5a4a6a"/>
    <!-- 眼睛（悲愤） -->
    <path d="M-8 -2 L-4 -2" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M4 -2 L8 -2" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 眉毛（皱眉） -->
    <path d="M-10 -7 L-3 -5" stroke="#3a2a1a" stroke-width="1.5"/>
    <path d="M3 -5 L10 -7" stroke="#3a2a1a" stroke-width="1.5"/>
    <!-- 嘴（严肃） -->
    <path d="M-4 8 L4 8" stroke="#8d5a3d" stroke-width="1.5"/>
    <!-- 胡须 -->
    <path d="M-3 10 L-4 18 M0 10 L0 20 M3 10 L4 18" stroke="#3a2a1a" stroke-width="1"/>
    <!-- 身体（楚国大夫服饰） -->
    <path d="M-25 18 L-35 80 L35 80 L25 18 Z" fill="#4a3a6a"/>
    <!-- 广袖 -->
    <path d="M-25 22 Q-50 30 -55 50 Q-50 55 -40 45 L-25 35" fill="#4a3a6a"/>
    <path d="M25 22 Q50 30 55 50 Q50 55 40 45 L25 35" fill="#4a3a6a"/>
    <!-- 衣领 -->
    <path d="M-10 18 L0 28 L10 18" fill="#3a2a5a"/>
    <!-- 腰带 -->
    <rect x="-22" y="40" width="44" height="6" fill="#6a5a8a"/>
    <!-- 下摆 -->
    <path d="M-35 80 L-45 100 L45 100 L35 80 Z" fill="#3a2a5a"/>
    <!-- 手持竹简 -->
    <g transform="translate(-35,45)">
      <rect x="-3" y="-15" width="6" height="25" fill="#d4b848"/>
      <line x1="-3" y1="-10" x2="3" y2="-10" stroke="#a88828" stroke-width="0.5"/>
      <line x1="-3" y1="-5" x2="3" y2="-5" stroke="#a88828" stroke-width="0.5"/>
      <line x1="-3" y1="0" x2="3" y2="0" stroke="#a88828" stroke-width="0.5"/>
      <line x1="-3" y1="5" x2="3" y2="5" stroke="#a88828" stroke-width="0.5"/>
    </g>
  </g>
  <text x="200" y="280" text-anchor="middle" font-size="13" fill="#3a2a5a" font-family="sans-serif" font-weight="bold">屈原</text>
  <text x="200" y="298" text-anchor="middle" font-size="10" fill="#6b6557" font-family="sans-serif">约公元前340年—前278年</text>

  <!-- 名句 -->
  <g transform="translate(500,160)">
    <rect x="-10" y="-20" width="260" height="80" rx="8" fill="#ffffff" opacity="0.9" stroke="#4a3a6a" stroke-width="1.5"/>
    <text x="120" y="0" text-anchor="middle" font-size="14" fill="#3a2a5a" font-family="serif" font-weight="bold">"路漫漫其修远兮，</text>
    <text x="120" y="22" text-anchor="middle" font-size="14" fill="#3a2a5a" font-family="serif" font-weight="bold">吾将上下而求索。"</text>
    <text x="120" y="48" text-anchor="middle" font-size="11" fill="#6b6557" font-family="sans-serif">——屈原《离骚》</text>
  </g>

  <!-- 下半部分：端午节习俗的由来 -->

  <!-- 时间线 -->
  <line x1="80" y1="340" x2="720" y2="340" stroke="#8d6a3d" stroke-width="3"/>

  <!-- 事件1：屈原投江 -->
  <g transform="translate(150,340)">
    <circle cx="0" cy="0" r="10" fill="#4a3a6a"/>
    <text x="0" y="-20" text-anchor="middle" font-size="12" fill="#3a2a5a" font-family="sans-serif" font-weight="bold">公元前278年</text>
    <g transform="translate(0,40)">
      <!-- 江水 -->
      <rect x="-35" y="20" width="70" height="15" rx="3" fill="#7ec0db" opacity="0.6"/>
      <!-- 投江的人影 -->
      <ellipse cx="0" cy="15" rx="8" ry="5" fill="#4a3a6a" opacity="0.5"/>
      <path d="M0 15 Q5 25 0 35" fill="none" stroke="#4a3a6a" stroke-width="2" opacity="0.5"/>
      <!-- 水花 -->
      <circle cx="-10" cy="18" r="3" fill="#a8d4e8" opacity="0.7"/>
      <circle cx="10" cy="20" r="2" fill="#a8d4e8" opacity="0.7"/>
    </g>
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#6b6557" font-family="sans-serif">屈原投汨罗江</text>
  </g>

  <!-- 箭头 -->
  <path d="M200 340 L280 340" stroke="#8d6a3d" stroke-width="2.5" fill="none" marker-end="url(#arr8)"/>

  <!-- 事件2：百姓投粽 -->
  <g transform="translate(350,340)">
    <circle cx="0" cy="0" r="10" fill="#5cb070"/>
    <text x="0" y="-20" text-anchor="middle" font-size="12" fill="#3a6b28" font-family="sans-serif" font-weight="bold">百姓纪念</text>
    <g transform="translate(0,40)">
      <!-- 江水 -->
      <rect x="-35" y="20" width="70" height="15" rx="3" fill="#7ec0db" opacity="0.6"/>
      <!-- 粽子投入水中 -->
      <path d="M-5 5 L-12 18 L2 18 Z" fill="#5cb070"/>
      <path d="M8 8 L1 20 L15 20 Z" fill="#5cb070"/>
      <path d="M-15 2 L-22 15 L-8 15 Z" fill="#4a9d5e"/>
      <!-- 水花 -->
      <circle cx="-5" cy="22" r="2" fill="#a8d4e8" opacity="0.7"/>
      <circle cx="8" cy="24" r="1.5" fill="#a8d4e8" opacity="0.7"/>
    </g>
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#6b6557" font-family="sans-serif">投粽子入江</text>
    <text x="0" y="116" text-anchor="middle" font-size="10" fill="#6b6557" font-family="sans-serif">（怕鱼虾吃屈原）</text>
  </g>

  <!-- 箭头 -->
  <path d="M400 340 L480 340" stroke="#8d6a3d" stroke-width="2.5" fill="none" marker-end="url(#arr8)"/>

  <!-- 事件3：划船寻找 -->
  <g transform="translate(550,340)">
    <circle cx="0" cy="0" r="10" fill="#e36f5b"/>
    <text x="0" y="-20" text-anchor="middle" font-size="12" fill="#c84a3a" font-family="sans-serif" font-weight="bold">划船寻找</text>
    <g transform="translate(0,40)">
      <!-- 江水 -->
      <rect x="-35" y="20" width="70" height="15" rx="3" fill="#7ec0db" opacity="0.6"/>
      <!-- 小船 -->
      <path d="M-20 18 Q-25 25 -15 27 L15 27 Q25 25 20 18 Z" fill="#8d6a3d"/>
      <!-- 划船人 -->
      <circle cx="-5" cy="12" r="4" fill="#f4c8a0"/>
      <circle cx="5" cy="12" r="4" fill="#f4c8a0"/>
      <!-- 桨 -->
      <line x1="-5" y1="16" x2="-8" y2="25" stroke="#8d6a3d" stroke-width="1.5"/>
      <line x1="5" y1="16" x2="8" y2="25" stroke="#8d6a3d" stroke-width="1.5"/>
    </g>
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#6b6557" font-family="sans-serif">划船寻遗体</text>
    <text x="0" y="116" text-anchor="middle" font-size="10" fill="#6b6557" font-family="sans-serif">→ 演变为赛龙舟</text>
  </g>

  <!-- 箭头 -->
  <path d="M600 340 L680 340" stroke="#8d6a3d" stroke-width="2.5" fill="none" marker-end="url(#arr8)"/>

  <!-- 事件4：今天的端午节 -->
  <g transform="translate(720,340)">
    <circle cx="0" cy="0" r="10" fill="#f4b942"/>
    <text x="0" y="-20" text-anchor="middle" font-size="12" fill="#8d6a3d" font-family="sans-serif" font-weight="bold">今天</text>
    <g transform="translate(0,40)">
      <!-- 粽子 -->
      <path d="M-8 5 L-15 20 L1 20 Z" fill="#5cb070"/>
      <path d="M8 8 L1 20 L15 20 Z" fill="#5cb070"/>
      <path d="M-8 5 L-15 20 L1 20 Z" fill="none" stroke="#c46a2a" stroke-width="1"/>
      <!-- 龙舟小图 -->
      <path d="M-20 28 Q-25 33 -15 35 L15 35 Q25 33 20 28 Z" fill="#e36f5b"/>
    </g>
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#6b6557" font-family="sans-serif">吃粽子</text>
    <text x="0" y="116" text-anchor="middle" font-size="11" fill="#6b6557" font-family="sans-serif">赛龙舟</text>
  </g>

  <!-- 底部 -->
  <text x="400" y="510" text-anchor="middle" font-size="14" fill="#2d2a24" font-family="sans-serif" font-weight="bold">从一个人的故事，到一个民族的节日</text>
  <text x="400" y="540" text-anchor="middle" font-size="12" fill="#6b6557" font-family="sans-serif">屈原的爱国精神，通过粽子和龙舟，传递了两千多年</text>

  <defs>
    <marker id="arr8" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#8d6a3d"/>
    </marker>
  </defs>
</svg>
