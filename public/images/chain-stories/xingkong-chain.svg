<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="人类测量星空距离的故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">星星离我们有多远</text>
  <line x1="230" y1="56" x2="570" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——人类想了几千年的问题</text>

  <!-- 时间轴 -->
  <line x1="80" y1="320" x2="720" y2="320" stroke="#c8843a" stroke-width="3"/>
  <circle cx="180" cy="320" r="8" fill="#6a8d3f"/>
  <circle cx="380" cy="320" r="8" fill="#c8843a"/>
  <circle cx="560" cy="320" r="8" fill="#4a90b8"/>
  <circle cx="680" cy="320" r="8" fill="#e07856"/>

  <!-- 古代：天穹挂灯 -->
  <g transform="translate(180, 170)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#6a8d3f">古代</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">天穹挂灯</text>
    <g transform="translate(0, 50)">
      <path d="M-40 40 Q0 10 40 40" fill="none" stroke="#7a3b14" stroke-width="2"/>
      <circle cx="-20" cy="20" r="4" fill="#e8a838"/>
      <circle cx="0" cy="14" r="4" fill="#e8a838"/>
      <circle cx="20" cy="20" r="4" fill="#e8a838"/>
      <line x1="-20" y1="24" x2="-20" y2="40" stroke="#7a3b14" stroke-width="1" stroke-dasharray="2,2"/>
      <line x1="0" y1="18" x2="0" y2="40" stroke="#7a3b14" stroke-width="1" stroke-dasharray="2,2"/>
      <line x1="20" y1="24" x2="20" y2="40" stroke="#7a3b14" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">星星像天花板</text>
      <text x="0" y="73" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">上的灯</text>
    </g>
  </g>

  <!-- 视差法 -->
  <g transform="translate(380, 170)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#c8843a">1838年</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">视差法</text>
    <g transform="translate(0, 50)">
      <!-- 手指视差示意 -->
      <circle cx="-22" cy="10" r="5" fill="#4a90b8"/>
      <circle cx="22" cy="10" r="5" fill="#4a90b8"/>
      <text x="-22" y="28" text-anchor="middle" font-family="serif" font-size="8" fill="#7a3b14">左眼</text>
      <text x="22" y="28" text-anchor="middle" font-family="serif" font-size="8" fill="#7a3b14">右眼</text>
      <circle cx="-8" cy="0" r="3" fill="#c84a3a" opacity="0.5"/>
      <circle cx="8" cy="0" r="3" fill="#c84a3a" opacity="0.5"/>
      <text x="0" y="-10" text-anchor="middle" font-family="serif" font-size="8" fill="#c84a3a">手指"跳"了</text>
      <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">贝塞尔测出</text>
      <text x="0" y="63" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">天鹅座61星</text>
    </g>
  </g>

  <!-- 造父变星 -->
  <g transform="translate(560, 170)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#4a90b8">20世纪</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">造父变星</text>
    <g transform="translate(0, 50)">
      <circle cx="0" cy="10" r="8" fill="#e8a838" opacity="0.9"/>
      <circle cx="0" cy="10" r="5" fill="#fef9ed" opacity="0.6"/>
      <path d="M-15 30 Q0 25 15 30" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-15 35 Q0 40 15 35" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">亮暗有周期</text>
      <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">周期越长越亮</text>
    </g>
  </g>

  <!-- 现在 -->
  <g transform="translate(680, 170)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#e07856">现在</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">量到别的星系</text>
    <g transform="translate(0, 50)">
      <ellipse cx="0" cy="15" rx="25" ry="8" fill="#4a90b8" opacity="0.4"/>
      <ellipse cx="0" cy="15" rx="15" ry="5" fill="#e8a838" opacity="0.5"/>
      <circle cx="0" cy="15" r="3" fill="#c84a3a"/>
      <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">银河系</text>
      <text x="0" y="58" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">及更远</text>
    </g>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 420)">
    <rect x="-310" y="0" width="620" height="140" rx="10" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">星星不会说话，人类用智慧让它"开口"</text>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">视差法：地球在轨道两头看同一颗星，星星"跳"了，就能算距离</text>
    <text x="0" y="78" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">造父变星：亮度一明一暗，周期越长越亮，一比就知道多远</text>
    <text x="0" y="108" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">看星星，其实是在看"过去"——</text>
    <text x="0" y="125" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">织女星的光，是它25年前发出的</text>
  </g>
</svg>
