<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="世界各地创世神话对比">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a3b14" font-family="serif">连珠小故事：世界各地都有创世想象</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 三段分隔线 -->
  <line x1="267" y1="80" x2="267" y2="520" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.4"/>
  <line x1="533" y1="80" x2="533" y2="520" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.4"/>

  <!-- 区域底色 -->
  <rect x="10" y="80" width="247" height="380" fill="#f5e0c8" opacity="0.2"/>
  <rect x="277" y="80" width="246" height="380" fill="#d8e8e0" opacity="0.2"/>
  <rect x="543" y="80" width="247" height="380" fill="#e8d8e8" opacity="0.2"/>

  <!-- 第一区：盘古开天 -->
  <ellipse cx="133" cy="250" rx="68" ry="88" fill="none" stroke="#7a3b14" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>
  <path d="M 70 200 Q 133 150 196 200 Q 196 180 133 160 Q 70 180 70 200 Z" fill="#c4d8e8" opacity="0.5" stroke="#7a3b14" stroke-width="1.5"/>
  <path d="M 70 300 Q 133 350 196 300 Q 196 320 133 340 Q 70 320 70 300 Z" fill="#a08060" opacity="0.5" stroke="#7a3b14" stroke-width="1.5"/>
  <g transform="translate(133, 250)">
    <path d="M -15 50 Q -18 10 -15 -20 Q -10 -35 0 -38 Q 10 -35 15 -20 Q 18 10 15 50" fill="#d4a868" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="0" cy="-50" r="18" fill="#e8c4a0" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="-6" cy="-52" r="2" fill="#7a3b14"/>
    <circle cx="6" cy="-52" r="2" fill="#7a3b14"/>
    <path d="M -6 -42 Q 0 -38 6 -42" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M -15 -55 Q -20 -70 -10 -68 M 0 -68 Q 5 -75 10 -68 M 15 -55 Q 20 -70 10 -68" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M -15 -20 Q -35 -50 -30 -80" fill="none" stroke="#d4a868" stroke-width="8" stroke-linecap="round"/>
    <path d="M 15 -20 Q 35 -10 30 20" fill="none" stroke="#d4a868" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-30" cy="-82" r="6" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="30" cy="22" r="6" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M -30 -90 L -30 -100 M -33 -97 L -30 -102 L -27 -97" fill="none" stroke="#c8843a" stroke-width="1.5"/>
    <path d="M 30 30 L 30 40 M 27 37 L 30 42 L 33 37" fill="none" stroke="#c8843a" stroke-width="1.5"/>
  </g>
  <!-- 斧头 -->
  <g transform="translate(78, 200)">
    <line x1="0" y1="0" x2="15" y2="25" stroke="#7a3b14" stroke-width="2"/>
    <path d="M 10 15 L 25 10 L 28 25 L 15 30 Z" fill="#c0c0c0" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 第二区：北欧世界树 -->
  <g transform="translate(400, 280)">
    <path d="M -8 80 Q -10 20 -8 -40 Q -6 -80 0 -90 Q 6 -80 8 -40 Q 10 20 8 80" fill="#8b6914" stroke="#7a3b14" stroke-width="2"/>
    <path d="M -8 80 Q -25 90 -35 100 M -8 80 Q -15 95 -10 105 M 8 80 Q 25 90 35 100 M 8 80 Q 15 95 10 105" fill="none" stroke="#7a3b14" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="0" cy="-80" rx="50" ry="30" fill="#6a9a4a" stroke="#7a3b14" stroke-width="1.5" opacity="0.7"/>
    <ellipse cx="-25" cy="-60" rx="30" ry="20" fill="#5a8a3a" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
    <ellipse cx="25" cy="-65" rx="28" ry="18" fill="#5a8a3a" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
    <path d="M -8 -40 Q -30 -50 -45 -65" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M 8 -40 Q 30 -50 45 -65" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M -8 -20 Q -25 -25 -35 -30" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M 8 -20 Q 25 -25 35 -30" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-15" cy="-85" r="1.5" fill="#f0c040"/>
    <circle cx="10" cy="-90" r="1.5" fill="#f0c040"/>
    <circle cx="20" cy="-75" r="1" fill="#f0c040"/>
    <circle cx="-40" cy="20" r="8" fill="#c4d8e8" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
    <circle cx="0" cy="40" r="8" fill="#e8c840" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
    <circle cx="40" cy="20" r="8" fill="#a08060" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- 第三区：希腊盖亚 -->
  <g transform="translate(666, 280)">
    <ellipse cx="0" cy="80" rx="80" ry="25" fill="#a08060" stroke="#7a3b14" stroke-width="2" opacity="0.5"/>
    <path d="M -20 80 Q -25 40 -20 10 Q -15 -10 0 -15 Q 15 -10 20 10 Q 25 40 20 80" fill="#7a9a5a" stroke="#7a3b14" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="-30" r="20" fill="#e8c4a0" stroke="#7a3b14" stroke-width="2"/>
    <path d="M -18 -35 Q -30 -20 -25 0 M 18 -35 Q 30 -20 25 0" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M -15 -45 Q -20 -50 -10 -52 M 0 -53 Q 5 -58 10 -52 M 15 -45 Q 20 -50 10 -52" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M -8 -32 Q -5 -34 -2 -32" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M 2 -32 Q 5 -34 8 -32" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M -5 -22 Q 0 -18 5 -22" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M -20 10 Q -45 0 -50 -15" fill="none" stroke="#7a9a5a" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <path d="M 20 10 Q 45 0 50 -15" fill="none" stroke="#7a9a5a" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <g transform="translate(-40, 60)">
      <line x1="0" y1="0" x2="0" y2="-15" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="0" cy="-18" r="5" fill="#e85040" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <g transform="translate(35, 65)">
      <line x1="0" y1="0" x2="0" y2="-12" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="0" cy="-15" r="4" fill="#f0c040" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <ellipse cx="-20" cy="70" rx="5" ry="3" fill="#8b6914" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="25" cy="72" rx="5" ry="3" fill="#8b6914" stroke="#7a3b14" stroke-width="1"/>
  </g>

  <!-- 标注：盘古开天 -->
  <line x1="133" y1="250" x2="80" y2="160" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="20" y="130" width="120" height="30" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="4"/>
  <text x="80" y="150" text-anchor="middle" font-size="15" fill="#7a3b14" font-family="serif">盘古开天</text>

  <!-- 标注：北欧神话 -->
  <line x1="400" y1="200" x2="400" y2="140" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="340" y="110" width="120" height="30" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="4"/>
  <text x="400" y="130" text-anchor="middle" font-size="15" fill="#7a3b14" font-family="serif">北欧神话</text>

  <!-- 标注：希腊神话 -->
  <line x1="666" y1="250" x2="720" y2="160" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="660" y="130" width="120" height="30" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="4"/>
  <text x="720" y="150" text-anchor="middle" font-size="15" fill="#7a3b14" font-family="serif">希腊神话</text>

  <!-- 底部说明 -->
  <rect x="50" y="545" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="570" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">盘古开天、北欧世界树、希腊盖亚——不同文明用各自的方式想象世界的起源。</text>
</svg>