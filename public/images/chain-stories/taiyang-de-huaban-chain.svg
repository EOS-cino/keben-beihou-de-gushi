<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="植物向光性与光合作用插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#7a3b14" font-family="serif">连珠小故事：植物怎样追逐阳光</text>
  <line x1="190" y1="55" x2="610" y2="55" stroke="#e8a838" stroke-width="1.5"/>

  <!-- 太阳（左上） -->
  <circle cx="120" cy="160" r="40" fill="#e8a838" stroke="#c88820" stroke-width="2"/>
  <g stroke="#e8a838" stroke-width="3" stroke-linecap="round">
    <line x1="120" y1="108" x2="120" y2="95"/>
    <line x1="120" y1="212" x2="120" y2="225"/>
    <line x1="68" y1="160" x2="55" y2="160"/>
    <line x1="172" y1="160" x2="185" y2="160"/>
    <line x1="84" y1="124" x2="74" y2="114"/>
    <line x1="156" y1="124" x2="166" y2="114"/>
  </g>

  <!-- 阳光箭头（指向植物） -->
  <g stroke="#e8a838" stroke-width="2.5" stroke-linecap="round" opacity="0.5" stroke-dasharray="8,6">
    <line x1="155" y1="190" x2="280" y2="280"/>
    <line x1="160" y1="170" x2="300" y2="220"/>
    <line x1="150" y1="210" x2="270" y2="340"/>
  </g>

  <!-- 左：向光性实验（花盆里弯向窗外的植物） -->
  <g transform="translate(360, 440)">
    <!-- 花盆 -->
    <path d="M-35 0 L-30 50 L30 50 L35 0 Z" fill="#e07856" stroke="#a04830" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="35" ry="8" fill="#a04830"/>
    <ellipse cx="0" cy="-2" rx="30" ry="6" fill="#6a4220"/>
    <!-- 弯曲的茎（朝太阳方向弯） -->
    <path d="M0 -5 Q-20 -50 -40 -90 Q-55 -110 -65 -120" fill="none" stroke="#2d6a4f" stroke-width="6" stroke-linecap="round"/>
    <!-- 叶子 -->
    <path d="M-20 -50 Q-35 -55 -40 -45 Q-30 -40 -20 -48" fill="#2d6a4f"/>
    <path d="M-40 -90 Q-55 -95 -58 -82 Q-48 -80 -40 -88" fill="#2d6a4f"/>
    <!-- 顶端芽 -->
    <circle cx="-65" cy="-120" r="8" fill="#2d6a4f"/>
    <!-- 箭头标注弯曲方向 -->
    <path d="M-30 -80 Q-45 -90 -55 -100" fill="none" stroke="#e07856" stroke-width="2" stroke-dasharray="4,3"/>
    <path d="M-55 -100 L-50 -95 M-55 -100 L-48 -103" fill="none" stroke="#e07856" stroke-width="2"/>
  </g>

  <!-- 窗户（光源方向） -->
  <g transform="translate(80, 280)">
    <rect x="-30" y="-50" width="60" height="100" fill="#4a90b8" opacity="0.2" stroke="#7a3b14" stroke-width="2"/>
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="70" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">光源（窗）</text>
  </g>

  <!-- 右：光合作用示意 -->
  <rect x="480" y="100" width="300" height="280" fill="#2d6a4f" opacity="0.06" rx="8"/>
  <text x="630" y="125" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">光合作用：植物用阳光"做饭"</text>

  <!-- 叶片 -->
  <g transform="translate(630, 230)">
    <path d="M0 30 Q-50 10 -55 -20 Q-30 -45 0 -30 Q30 -45 55 -20 Q50 10 0 30" fill="#2d6a4f" stroke="#1a4a35" stroke-width="2"/>
    <line x1="0" y1="30" x2="0" y2="-30" stroke="#1a4a35" stroke-width="1.5"/>
    <!-- 阳光进入箭头 -->
    <g stroke="#e8a838" stroke-width="2.5" fill="none">
      <line x1="-70" y1="-40" x2="-40" y2="-25"/>
      <path d="M-45 -28 L-40 -25 L-44 -20"/>
    </g>
    <text x="-78" y="-42" text-anchor="end" font-size="11" fill="#7a3b14" font-family="serif">阳光</text>
    <!-- 水进入 -->
    <g stroke="#4a90b8" stroke-width="2.5" fill="none">
      <line x1="0" y1="50" x2="0" y2="35"/>
      <path d="M-4 40 L0 35 L4 40"/>
    </g>
    <text x="20" y="50" font-size="11" fill="#7a3b14" font-family="serif">水</text>
    <!-- 二氧化碳进入 -->
    <g stroke="#7a3b14" stroke-width="2" fill="none" opacity="0.6">
      <line x1="70" y1="-40" x2="45" y2="-25"/>
      <path d="M50 -28 L45 -25 L49 -20"/>
    </g>
    <text x="78" y="-42" font-size="11" fill="#7a3b14" font-family="serif">二氧化碳</text>
    <!-- 养分输出 -->
    <g stroke="#e8a838" stroke-width="2.5" fill="none">
      <line x1="0" y1="-40" x2="0" y2="-60"/>
      <path d="M-4 -55 L0 -60 L4 -55"/>
    </g>
    <text x="0" y="-68" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">养分</text>
    <!-- 氧气输出 -->
    <g fill="#4a90b8" opacity="0.6">
      <circle cx="40" cy="-50" r="4"/>
      <circle cx="50" cy="-40" r="3"/>
      <circle cx="35" cy="-35" r="3"/>
    </g>
    <text x="60" y="-48" font-size="11" fill="#7a3b14" font-family="serif">氧气</text>
  </g>

  <!-- 标注 -->
  <line x1="360" y1="340" x2="360" y2="300" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="285" y="272" width="150" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="360" y="290" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">向光性：朝光弯曲</text>

  <!-- 底部说明 -->
  <rect x="50" y="540" width="700" height="40" fill="#fff6df" stroke="#e8a838" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="565" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">植物朝光弯是向光性，用阳光做饭是光合作用——阳光指挥着生命的方向。</text>
</svg>
