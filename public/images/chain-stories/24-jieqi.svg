<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="二十四节气圆环插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">二十四节气是什么</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">古人把一年分成二十四份，每份约十五天</text>

  <!-- 圆环 -->
  <circle cx="400" cy="330" r="200" fill="none" stroke="#c8843a" stroke-width="2" opacity="0.4"/>
  <circle cx="400" cy="330" r="160" fill="none" stroke="#c8843a" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>

  <!-- 四季扇区底色 -->
  <!-- 春 绿 -->
  <path d="M400 330 L400 130 A200 200 0 0 1 600 330 Z" fill="#6a8d3f" opacity="0.12"/>
  <!-- 夏 红 -->
  <path d="M400 330 L600 330 A200 200 0 0 1 400 530 Z" fill="#c84a3a" opacity="0.12"/>
  <!-- 秋 黄 -->
  <path d="M400 330 L400 530 A200 200 0 0 1 200 330 Z" fill="#e0a050" opacity="0.15"/>
  <!-- 冬 蓝 -->
  <path d="M400 330 L200 330 A200 200 0 0 1 400 130 Z" fill="#7ab8d8" opacity="0.15"/>

  <!-- 四季标签 -->
  <text x="500" y="180" text-anchor="middle" font-family="serif" font-size="20" fill="#6a8d3f" font-weight="bold">春</text>
  <text x="540" y="460" text-anchor="middle" font-family="serif" font-size="20" fill="#c84a3a" font-weight="bold">夏</text>
  <text x="300" y="480" text-anchor="middle" font-family="serif" font-size="20" fill="#e0a050" font-weight="bold">秋</text>
  <text x="260" y="200" text-anchor="middle" font-family="serif" font-size="20" fill="#7ab8d8" font-weight="bold">冬</text>

  <!-- 24节气小圆点（每15度一个） -->
  <g font-family="serif" font-size="9" fill="#7a3b14">
    <!-- 春季节气：立春 雨水 惊蛰 春分 清明 谷雨 (从顶部顺时针) -->
    <g transform="translate(400,130)"><circle r="5" fill="#6a8d3f"/><text x="0" y="-12" text-anchor="middle">立春</text></g>
    <g transform="translate(500,150)"><circle r="5" fill="#6a8d3f"/><text x="14" y="-4" text-anchor="start">雨水</text></g>
    <g transform="translate(580,210)"><circle r="5" fill="#6a8d3f"/><text x="14" y="2" text-anchor="start">惊蛰</text></g>
    <g transform="translate(600,330)"><circle r="5" fill="#6a8d3f"/><text x="14" y="4" text-anchor="start">春分</text></g>

    <!-- 夏季节气 -->
    <g transform="translate(580,450)"><circle r="5" fill="#c84a3a"/><text x="14" y="6" text-anchor="start">清明</text></g>
    <g transform="translate(500,510)"><circle r="5" fill="#c84a3a"/><text x="14" y="14" text-anchor="start">谷雨</text></g>
    <g transform="translate(400,530)"><circle r="5" fill="#c84a3a"/><text x="0" y="22" text-anchor="middle">立夏</text></g>
    <g transform="translate(300,510)"><circle r="5" fill="#c84a3a"/><text x="-14" y="14" text-anchor="end">小满</text></g>

    <!-- 秋季节气 -->
    <g transform="translate(220,450)"><circle r="5" fill="#e0a050"/><text x="-14" y="6" text-anchor="end">芒种</text></g>
    <g transform="translate(200,330)"><circle r="5" fill="#e0a050"/><text x="-14" y="4" text-anchor="end">夏至</text></g>
    <g transform="translate(220,210)"><circle r="5" fill="#e0a050"/><text x="-14" y="2" text-anchor="end">小暑</text></g>
    <g transform="translate(300,150)"><circle r="5" fill="#e0a050"/><text x="-14" y="-4" text-anchor="end">大暑</text></g>

    <!-- 冬季节气 -->
    <g transform="translate(400,130)"><circle r="5" fill="#7ab8d8"/></g>
  </g>

  <!-- 中心 -->
  <circle cx="400" cy="330" r="55" fill="#fef9ed" stroke="#c8843a" stroke-width="2"/>
  <text x="400" y="320" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14" font-weight="bold">二十四</text>
  <text x="400" y="342" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14" font-weight="bold">节气</text>
  <text x="400" y="360" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">中国第五大发明</text>

  <!-- 节气歌 -->
  <rect x="60" y="540" width="680" height="50" rx="8" fill="#fef0d8" opacity="0.6"/>
  <text x="400" y="562" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">春雨惊春清谷天，夏满芒夏暑相连</text>
  <text x="400" y="582" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">秋处露秋寒霜降，冬雪雪冬小大寒</text>
</svg>
