<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从桃花水到竺可桢记物候的故事画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#7a3b14" stroke-width="2"/>
  <line x1="300" y1="300" x2="500" y2="300" stroke="#7a3b14" stroke-width="3" stroke-dasharray="8,6"/>
  <circle cx="350" cy="300" r="6" fill="#d4a017"/>
  <circle cx="400" cy="300" r="9" fill="#c8553d"/>
  <circle cx="450" cy="300" r="6" fill="#d4a017"/>
  <!-- 左珠：桃花水 -->
  <circle cx="170" cy="300" r="110" fill="#e88aa8" opacity="0.3" stroke="#c8553d" stroke-width="3"/>
  <path d="M 150 280 q 10 -20 20 0" stroke="#5d4037" stroke-width="2.5" fill="none"/>
  <circle cx="160" cy="270" r="7" fill="#e88aa8"/>
  <circle cx="175" cy="262" r="7" fill="#e88aa8"/>
  <path d="M 140 300 q 30 -8 60 0" stroke="#5d8aa8" stroke-width="3" fill="none"/>
  <text x="170" y="340" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#7a3b14">桃花水</text>
  <text x="170" y="363" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">刘湛秋·散文</text>
  <!-- 右珠：竺可桢 -->
  <circle cx="630" cy="300" r="110" fill="#8fb996" opacity="0.3" stroke="#3a7d44" stroke-width="3"/>
  <rect x="608" y="270" width="44" height="40" fill="#f5efe0" stroke="#5d4037" stroke-width="2"/>
  <line x1="615" y1="282" x2="645" y2="282" stroke="#3a3a3a" stroke-width="1.5"/>
  <line x1="615" y1="292" x2="640" y2="292" stroke="#3a3a3a" stroke-width="1.5"/>
  <line x1="615" y1="302" x2="642" y2="302" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="630" y="340" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#7a3b14">竺可桢</text>
  <text x="630" y="363" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">物候日记</text>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">三月桃花水，竺可桢的物候日记</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">认真看大自然，美与科学是一件事</text>
</svg>
