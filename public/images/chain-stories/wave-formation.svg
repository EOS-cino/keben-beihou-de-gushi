<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="海浪形成原理插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">海浪是怎么形成的</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">风、月亮和海底地震，都能制造海浪</text>

  <!-- 三种浪 -->
  <!-- 风浪 -->
  <g transform="translate(180,220)">
    <rect x="-110" y="-80" width="220" height="200" rx="10" fill="#fef0d8" stroke="#c8843a" stroke-width="1.5"/>
    <text x="0" y="-58" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14" font-weight="bold">风浪</text>
    <!-- 风线 -->
    <g stroke="#6a8d3f" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6">
      <path d="M-80 -35 Q-60 -40 -40 -32"/>
      <path d="M-70 -20 Q-50 -25 -30 -18"/>
      <path d="M-80 -5 Q-60 -10 -40 -2"/>
    </g>
    <!-- 海面 -->
    <rect x="-90" y="10" width="180" height="50" fill="#7ab8d8" opacity="0.4"/>
    <!-- 波浪 -->
    <path d="M-90 20 Q-70 10 -50 20 Q-30 30 -10 20 Q10 10 30 20 Q50 30 70 20 Q80 15 90 20" fill="none" stroke="#4a8ab8" stroke-width="2.5"/>
    <path d="M-90 35 Q-70 25 -50 35 Q-30 45 -10 35 Q10 25 30 35 Q50 45 70 35 Q80 30 90 35" fill="none" stroke="#4a8ab8" stroke-width="2" opacity="0.6"/>
    <text x="0" y="85" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">风吹水面起波纹</text>
    <text x="0" y="103" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">风越大浪越高</text>
  </g>

  <!-- 潮汐 -->
  <g transform="translate(400,220)">
    <rect x="-110" y="-80" width="220" height="200" rx="10" fill="#fef0d8" stroke="#c8843a" stroke-width="1.5"/>
    <text x="0" y="-58" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14" font-weight="bold">潮汐</text>
    <!-- 月亮 -->
    <circle cx="-50" cy="-30" r="18" fill="#fef9ed" stroke="#7ab8d8" stroke-width="2"/>
    <circle cx="-55" cy="-33" r="4" fill="#c8843a" opacity="0.3"/>
    <circle cx="-46" cy="-26" r="3" fill="#c8843a" opacity="0.3"/>
    <!-- 引力线 -->
    <line x1="-40" y1="-25" x2="-10" y2="5" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
    <!-- 地球 -->
    <circle cx="20" cy="20" r="30" fill="#a8d0e8" opacity="0.5" stroke="#4a8ab8" stroke-width="2"/>
    <!-- 海水隆起 -->
    <ellipse cx="20" cy="-12" rx="20" ry="8" fill="#7ab8d8" opacity="0.6"/>
    <text x="0" y="85" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">月亮引力拉海水</text>
    <text x="0" y="103" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">每天两次涨落潮</text>
  </g>

  <!-- 海啸 -->
  <g transform="translate(620,220)">
    <rect x="-110" y="-80" width="220" height="200" rx="10" fill="#fef0d8" stroke="#c84a3a" stroke-width="1.5"/>
    <text x="0" y="-58" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14" font-weight="bold">海啸</text>
    <!-- 海底 -->
    <path d="M-90 55 L-60 55 L-50 35 L-30 55 L90 55" fill="none" stroke="#8d5a36" stroke-width="2"/>
    <!-- 地震波 -->
    <g stroke="#c84a3a" stroke-width="2" fill="none">
      <path d="M-50 35 Q-40 25 -30 35"/>
      <path d="M-55 30 Q-40 15 -25 30" opacity="0.6"/>
      <path d="M-60 25 Q-40 5 -20 25" opacity="0.4"/>
    </g>
    <!-- 大浪 -->
    <path d="M-90 20 Q-50 -10 0 0 Q50 10 90 -5 L90 55 L-90 55 Z" fill="#c84a3a" opacity="0.3"/>
    <path d="M-90 20 Q-50 -10 0 0 Q50 10 90 -5" fill="none" stroke="#c84a3a" stroke-width="2.5"/>
    <text x="0" y="85" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">海底地震推海水</text>
    <text x="0" y="103" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">巨浪冲岸很危险</text>
  </g>

  <!-- 底部 -->
  <rect x="80" y="440" width="640" height="130" rx="10" fill="#fef0d8" opacity="0.6"/>
  <text x="400" y="468" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">课文里的浪花"跑去又跑来"</text>
  <text x="400" y="492" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">风浪涌到岸边碰到浅滩，水堆高翻倒，溅起白色水花</text>
  <text x="400" y="516" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">潮汐让海水每天涨落两次，浪花就进进退退</text>
  <text x="400" y="544" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">去海边玩要注意安全：涨潮别走远，大浪要后退</text>
</svg>
