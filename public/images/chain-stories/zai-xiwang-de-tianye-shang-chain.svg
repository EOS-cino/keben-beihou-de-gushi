<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="中国农村的变迁插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：中国农村的变迁</text>
  <line x1="200" y1="55" x2="600" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 三个时期对比 -->

  <!-- 左：旧社会 -->
  <g transform="translate(160, 260)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#5a4a3a">旧社会</text>
    <!-- 破旧草房 -->
    <rect x="-35" y="-10" width="70" height="40" fill="#c8b888" stroke="#7a3b14" stroke-width="1.5" opacity="0.7"/>
    <path d="M-40 -10 L0 -30 L40 -10 Z" fill="#8d6a36" stroke="#5a4a2a" stroke-width="1.5" opacity="0.7"/>
    <!-- 破洞 -->
    <ellipse cx="-15" cy="0" rx="5" ry="4" fill="#3a2a1a" opacity="0.5"/>
    <!-- 瘦弱的农民 -->
    <g transform="translate(15, 20)">
      <circle cx="0" cy="0" r="6" fill="#e0c8a8" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-4 6 L-6 25 L6 25 L4 6 Z" fill="#6a5040" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <!-- 干裂的土地 -->
    <line x1="-50" y1="35" x2="-30" y2="35" stroke="#a08050" stroke-width="1"/>
    <line x1="-20" y1="38" x2="0" y2="38" stroke="#a08050" stroke-width="1"/>
    <line x1="10" y1="35" x2="40" y2="35" stroke="#a08050" stroke-width="1"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">靠天吃饭·吃不饱</text>
    <text x="0" y="76" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">"锄禾日当午</text>
    <text x="0" y="89" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">汗滴禾下土"</text>
  </g>

  <!-- 中：改革开放 -->
  <g transform="translate(400, 260)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#e8a838">改革开放·1978</text>
 <!-- 小岗村手印 -->
    <rect x="-50" y="-50" width="100" height="60" fill="#fff8e0" stroke="#7a3b14" stroke-width="2" rx="3"/>
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">"生死状"</text>
    <!-- 手印 -->
    <g transform="translate(-25, -10)">
      <ellipse cx="0" cy="0" rx="6" ry="8" fill="#c84a3a" opacity="0.5"/>
      <circle cx="-3" cy="-8" r="1.5" fill="#c84a3a" opacity="0.5"/>
      <circle cx="0" cy="-9" r="1.5" fill="#c84a3a" opacity="0.5"/>
      <circle cx="3" cy="-8" r="1.5" fill="#c84a3a" opacity="0.5"/>
    </g>
    <g transform="translate(0, -5)">
      <ellipse cx="0" cy="0" rx="6" ry="8" fill="#c84a3a" opacity="0.4"/>
      <circle cx="-3" cy="-8" r="1.5" fill="#c84a3a" opacity="0.4"/>
      <circle cx="0" cy="-9" r="1.5" fill="#c84a3a" opacity="0.4"/>
      <circle cx="3" cy="-8" r="1.5" fill="#c84a3a" opacity="0.4"/>
    </g>
    <g transform="translate(25, -10)">
      <ellipse cx="0" cy="0" rx="6" ry="8" fill="#c84a3a" opacity="0.5"/>
      <circle cx="-3" cy="-8" r="1.5" fill="#c84a3a" opacity="0.5"/>
      <circle cx="0" cy="-9" r="1.5" fill="#c84a3a" opacity="0.5"/>
      <circle cx="3" cy="-8" r="1.5" fill="#c84a3a" opacity="0.5"/>
    </g>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">十八户农民按手印</text>
    <!-- 箭头 -->
    <path d="M 0 35 L 0 50" fill="none" stroke="#e8a838" stroke-width="2"/>
    <path d="M -4 45 L 0 52 L 4 45" fill="none" stroke="#e8a838" stroke-width="2"/>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">分田到户·产量翻倍</text>
    <text x="0" y="84" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">多劳多得·干劲十足</text>
  </g>

  <!-- 右：现代农村 -->
  <g transform="translate(640, 260)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#2d6a4f">现代农村</text>
    <!-- 漂亮新房 -->
    <rect x="-35" y="-10" width="70" height="40" fill="#e0c898" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-40 -10 L0 -30 L40 -10 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-8" y="5" width="16" height="25" fill="#7a3b14"/>
    <rect x="-28" y="0" width="12" height="12" fill="#e8a838" opacity="0.6" stroke="#7a3b14" stroke-width="1"/>
    <rect x="16" y="0" width="12" height="12" fill="#e8a838" opacity="0.6" stroke="#7a3b14" stroke-width="1"/>
    <!-- 拖拉机 -->
    <g transform="translate(0, 45)">
      <rect x="-12" y="-8" width="20" height="10" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-8" cy="5" r="5" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="8" cy="5" r="5" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1"/>
      <rect x="8" y="-12" width="8" height="6" fill="#4a90b8" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">机械化·特色农业</text>
    <text x="0" y="91" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">丰收·富裕·新生活</text>
  </g>

  <!-- 时间轴箭头 -->
  <g transform="translate(400, 400)">
    <line x1="-240" y1="0" x2="240" y2="0" stroke="#c8843a" stroke-width="2"/>
    <path d="M 235 -5 L 245 0 L 235 5" fill="none" stroke="#c8843a" stroke-width="2"/>
    <circle cx="-240" cy="0" r="4" fill="#5a4a3a"/>
    <circle cx="0" cy="0" r="4" fill="#e8a838"/>
    <circle cx="240" cy="0" r="4" fill="#2d6a4f"/>
  </g>

  <!-- 下方：核心精神 -->
  <g transform="translate(400, 440)">
    <rect x="-280" y="0" width="560" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">从吃不饱到丰收富裕——田野上的希望，是劳动人民用双手创造的</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="13" fill="#c8843a">改革开放调动了积极性，勤劳的农民让田野真正成为"希望的田野"</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">中国农村的变迁：从靠天吃饭到机械耕作，希望永远在劳动的田野上</text>
</svg>
