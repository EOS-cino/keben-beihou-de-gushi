<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="深海生物在黑暗中发光和奇特形态的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">深海里有什么</text>
  <line x1="320" y1="58" x2="480" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 深海黑暗背景 -->
  <rect x="0" y="72" width="800" height="460" fill="#1a1a3a" opacity="0.12"/>

  <!-- 深度标尺 -->
  <line x1="50" y1="80" x2="50" y2="520" stroke="#7a3b14" stroke-width="2"/>
  <text x="30" y="100" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">海面</text>
  <line x1="45" y1="100" x2="55" y2="100" stroke="#7a3b14" stroke-width="2"/>
  <text x="25" y="200" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">200m</text>
  <line x1="45" y1="200" x2="55" y2="200" stroke="#7a3b14" stroke-width="2"/>
  <text x="25" y="320" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">1000m</text>
  <line x1="45" y1="320" x2="55" y2="320" stroke="#7a3b14" stroke-width="2"/>
  <text x="25" y="450" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">4000m</text>
  <line x1="45" y1="450" x2="55" y2="450" stroke="#7a3b14" stroke-width="2"/>

  <!-- 深海鱼1：鮟鱇鱼（带灯笼） -->
  <g transform="translate(250, 200)">
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="#3a3a5a" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-22" cy="-3" r="10" fill="#3a3a5a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 大嘴 -->
    <path d="M-28 2 Q-20 10 -12 5" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M-25 3 L-22 8 M-20 5 L-18 9" stroke="#fff" stroke-width="1"/>
    <!-- 灯笼 -->
    <line x1="-20" y1="-12" x2="-30" y2="-30" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-33" cy="-33" r="8" fill="#ffd700" opacity="0.8" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-33" cy="-33" r="5" fill="#fff6df" opacity="0.6"/>
    <!-- 尾巴 -->
    <path d="M30 0 L42 -8 L42 8 Z" fill="#3a3a5a" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">鮟鱇鱼：灯笼诱猎物</text>
  </g>

  <!-- 深海鱼2：大嘴鱼 -->
  <g transform="translate(550, 280)">
    <ellipse cx="0" cy="0" rx="20" ry="14" fill="#2a2a4a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 超大嘴 -->
    <path d="M-18 -2 Q-5 -12 12 -8 Q18 0 12 8 Q-5 12 -18 2 Z" fill="#1a1a2a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 牙齿 -->
    <path d="M-10 -5 L-8 -2 M-5 -7 L-3 -3 M0 -8 L2 -4 M5 -7 L7 -3" stroke="#fff" stroke-width="1"/>
    <path d="M-10 5 L-8 2 M-5 7 L-3 3 M0 8 L2 4 M5 7 L7 3" stroke="#fff" stroke-width="1"/>
    <circle cx="10" cy="-5" r="2" fill="#e07856" opacity="0.8"/>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">大嘴鱼：吞下大猎物</text>
  </g>

  <!-- 深海鱼3：透明鱼 -->
  <g transform="translate(200, 380)">
    <ellipse cx="0" cy="0" rx="18" ry="10" fill="#a8d0e8" opacity="0.4" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- 内脏可见 -->
    <ellipse cx="2" cy="0" rx="6" ry="4" fill="#e07856" opacity="0.3"/>
    <circle cx="-10" cy="-2" r="2" fill="#7a3b14"/>
    <path d="M18 0 L26 -5 L26 5 Z" fill="#a8d0e8" opacity="0.3" stroke="#7a3b14" stroke-width="1"/>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">透明鱼：内脏可见</text>
  </g>

  <!-- 管虫（热泉附近） -->
  <g transform="translate(550, 420)">
    <rect x="-3" y="0" width="6" height="50" fill="#c84a3a" stroke="#7a3b14" stroke-width="1"/>
    <rect x="5" y="5" width="6" height="45" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <rect x="-11" y="-3" width="6" height="53" fill="#c84a3a" stroke="#7a3b14" stroke-width="1"/>
    <!-- 红色顶端 -->
    <ellipse cx="0" cy="0" rx="5" ry="3" fill="#c84a3a"/>
    <ellipse cx="8" cy="5" rx="5" ry="3" fill="#e07856"/>
    <ellipse cx="-8" cy="-3" rx="5" ry="3" fill="#c84a3a"/>
    <!-- 热泉 -->
    <circle cx="0" cy="60" r="15" fill="#e07856" opacity="0.2"/>
    <text x="0" y="85" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">管虫：热泉边生存</text>
  </g>

  <!-- 巨型乌贼 -->
  <g transform="translate(400, 150)">
    <ellipse cx="0" cy="0" rx="20" ry="30" fill="#4a4a6a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 大眼睛 -->
    <circle cx="-8" cy="-8" r="8" fill="#fff" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-8" cy="-8" r="5" fill="#1a1a3a"/>
    <circle cx="-7" cy="-9" r="2" fill="#fff"/>
    <!-- 触手 -->
    <path d="M5 25 Q15 40 20 55" fill="none" stroke="#4a4a6a" stroke-width="3" stroke-linecap="round"/>
    <path d="M0 28 Q5 45 0 60" fill="none" stroke="#4a4a6a" stroke-width="3" stroke-linecap="round"/>
    <path d="M-5 25 Q-15 40 -20 55" fill="none" stroke="#4a4a6a" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="-45" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">巨型乌贼：眼睛最大</text>
  </g>

  <!-- 发光点 -->
  <circle cx="120" cy="150" r="2" fill="#ffd700" opacity="0.7"/>
  <circle cx="680" cy="180" r="2" fill="#7ab8d8" opacity="0.6"/>
  <circle cx="700" cy="350" r="2" fill="#ffd700" opacity="0.6"/>
  <circle cx="100" cy="300" r="2" fill="#7ab8d8" opacity="0.5"/>
  <circle cx="650" cy="450" r="2" fill="#ffd700" opacity="0.6"/>

  <!-- 底部总结 -->
  <rect x="80" y="510" width="640" height="50" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="2"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">深海：黑暗·寒冷·高压——却生活着无数奇特生物</text>
  <text x="400" y="555" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">生物发光、巨眼大嘴、管虫热泉——地球上最后的未知世界</text>

  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">科学家估计深海可能有上百万种生物尚未被人类认识</text>
</svg>
