<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="海边城市的生活特点与风貌插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">海边城市的生活</text>
  <line x1="310" y1="58" x2="490" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 四个生活特点卡片 -->

  <!-- 卡片1：海鲜美食 -->
  <g transform="translate(40, 90)">
    <rect x="0" y="0" width="350" height="170" rx="10" fill="#fff6df" stroke="#7ab8d8" stroke-width="2"/>
    <text x="175" y="28" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">靠海吃海——海鲜是主角</text>
    <!-- 鱼 -->
    <g transform="translate(80, 80)">
      <ellipse cx="0" cy="0" rx="25" ry="12" fill="#7ab8d8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M25 0 L38 -8 L38 8 Z" fill="#7ab8d8" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-12" cy="-3" r="2" fill="#7a3b14"/>
    </g>
    <!-- 螃蟹 -->
    <g transform="translate(170, 85)">
      <ellipse cx="0" cy="0" rx="14" ry="10" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-14 -3 L-22 -8 M-14 3 L-22 8" stroke="#7a3b14" stroke-width="2"/>
      <path d="M14 -3 L22 -8 M14 3 L22 8" stroke="#7a3b14" stroke-width="2"/>
      <circle cx="-5" cy="-2" r="1.5" fill="#fff"/>
      <circle cx="5" cy="-2" r="1.5" fill="#fff"/>
    </g>
    <!-- 虾 -->
    <g transform="translate(250, 85)">
      <path d="M-15 0 Q-10 -8 0 -6 Q10 -4 15 0 Q10 6 0 4 Q-10 2 -15 0" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M15 0 L22 -5 M15 0 L22 5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <text x="175" y="130" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">清晨鱼市最热闹</text>
    <text x="175" y="150" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">鱼要活、虾要跳、蟹要肥</text>
  </g>

  <!-- 卡片2：勇敢坚韧 -->
  <g transform="translate(410, 90)">
    <rect x="0" y="0" width="350" height="170" rx="10" fill="#fff6df" stroke="#c84a3a" stroke-width="2"/>
    <text x="175" y="28" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">海浪磨砺——豪爽又坚韧</text>
    <!-- 渔民出海 -->
    <g transform="translate(100, 90)">
      <!-- 船 -->
      <path d="M-30 10 Q-30 22 -18 25 L18 25 Q30 22 30 10 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 渔民 -->
      <ellipse cx="0" cy="-5" rx="8" ry="10" fill="#c84a3a" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-18" r="7" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-7 -22 Q-7 -28 0 -29 Q7 -28 7 -22" fill="#7a3b14"/>
      <!-- 撒网 -->
      <path d="M8 -8 Q20 0 25 15" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M25 15 Q15 20 10 30 Q20 28 30 25" fill="none" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
    </g>
    <!-- 波浪 -->
    <path d="M150 100 Q170 95 190 100 Q210 95 230 100" fill="none" stroke="#7ab8d8" stroke-width="2"/>
    <path d="M150 115 Q170 110 190 115 Q210 110 230 115" fill="none" stroke="#7ab8d8" stroke-width="2"/>
    <text x="175" y="150" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">台风来了互相帮忙，邻里团结</text>
  </g>

  <!-- 卡片3：开渔节 -->
  <g transform="translate(40, 280)">
    <rect x="0" y="0" width="350" height="170" rx="10" fill="#fff6df" stroke="#6a8d3f" stroke-width="2"/>
    <text x="175" y="28" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">千帆竞发——开渔节</text>
    <!-- 多艘船 -->
    <g transform="translate(60, 90)">
      <path d="M-20 8 Q-20 16 -12 18 L12 18 Q20 16 20 8 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
      <rect x="-1" y="-12" width="3" height="20" fill="#7a3b14"/>
      <path d="M2 -10 L12 -4 L2 0 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="0.5"/>
    </g>
    <g transform="translate(130, 95)">
      <path d="M-18 7 Q-18 14 -10 16 L10 16 Q18 14 18 7 Z" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
      <rect x="-1" y="-10" width="3" height="17" fill="#7a3b14"/>
      <path d="M2 -8 L10 -3 L2 0 Z" fill="#fff6df" stroke="#7a3b14" stroke-width="0.5"/>
    </g>
    <g transform="translate(200, 90)">
      <path d="M-20 8 Q-20 16 -12 18 L12 18 Q20 16 20 8 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
      <rect x="-1" y="-12" width="3" height="20" fill="#7a3b14"/>
      <path d="M2 -10 L12 -4 L2 0 Z" fill="#6a8d3f" stroke="#7a3b14" stroke-width="0.5"/>
    </g>
    <g transform="translate(270, 95)">
      <path d="M-18 7 Q-18 14 -10 16 L10 16 Q18 14 18 7 Z" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
      <rect x="-1" y="-10" width="3" height="17" fill="#7a3b14"/>
      <path d="M2 -8 L10 -3 L2 0 Z" fill="#e07856" stroke="#7a3b14" stroke-width="0.5"/>
    </g>
    <text x="175" y="140" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">禁渔期结束，渔船齐出海</text>
  </g>

  <!-- 卡片4：防风建筑 -->
  <g transform="translate(410, 280)">
    <rect x="0" y="0" width="350" height="170" rx="10" fill="#fff6df" stroke="#c8843a" stroke-width="2"/>
    <text x="175" y="28" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">防风建筑——矮而结实</text>
    <!-- 矮房子 -->
    <g transform="translate(100, 100)">
      <rect x="-35" y="0" width="70" height="40" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-40 0 L0 -18 L40 0 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-8" y="15" width="16" height="25" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <g transform="translate(220, 105)">
      <rect x="-30" y="0" width="60" height="35" fill="#f0e0c8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-34 0 L0 -15 L34 0 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-6" y="12" width="12" height="23" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <text x="175" y="150" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">屋顶坡度大，方便排水防风</text>
  </g>

  <!-- 底部总结 -->
  <rect x="80" y="475" width="640" height="70" rx="10" fill="#fff6df" stroke="#c8843a" stroke-width="2"/>
  <text x="400" y="505" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">人和海长期相处的智慧</text>
  <text x="400" y="530" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">吃海鲜、抗台风、开渔节、防风房——海养育了人，也塑造了人</text>

  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">海边城市的生活，处处都有大海的印记</text>
</svg>
