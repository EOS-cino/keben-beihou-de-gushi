<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从梅兰芳蓄须到齐白石闭门谢客的故事画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#7a3b14" stroke-width="2"/>
  <line x1="300" y1="300" x2="500" y2="300" stroke="#7a3b14" stroke-width="3" stroke-dasharray="8,6"/>
  <circle cx="350" cy="300" r="6" fill="#d4a017"/>
  <circle cx="400" cy="300" r="9" fill="#c8553d"/>
  <circle cx="450" cy="300" r="6" fill="#d4a017"/>
  <!-- 左珠：梅兰芳蓄须 -->
  <circle cx="170" cy="300" r="110" fill="#a83232" opacity="0.25" stroke="#a83232" stroke-width="3"/>
  <ellipse cx="170" cy="278" rx="26" ry="30" fill="#f5efe0" stroke="#3a3a3a" stroke-width="2"/>
  <path d="M 150 300 q 20 16 40 0 q -6 14 -20 18 q -14 -4 -20 -18 z" fill="#3a3a3a"/>
  <text x="170" y="345" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#7a3b14">梅兰芳蓄须</text>
  <text x="170" y="368" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">不登台</text>
  <!-- 右珠：齐白石闭门 -->
  <circle cx="630" cy="300" r="110" fill="#8a9a5b" opacity="0.25" stroke="#6b8e7f" stroke-width="3"/>
  <rect x="610" y="270" width="40" height="40" fill="#f5efe0" stroke="#5d4037" stroke-width="2"/>
  <line x1="630" y1="270" x2="630" y2="310" stroke="#5d4037" stroke-width="2"/>
  <text x="615" y="295" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">不卖</text>
  <text x="645" y="295" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">官家</text>
  <text x="630" y="345" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#7a3b14">齐白石闭门</text>
  <text x="630" y="368" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">不卖画</text>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">梅兰芳蓄须，齐白石闭门</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">办法不同，骨气一样：不向坏事低头</text>
</svg>
