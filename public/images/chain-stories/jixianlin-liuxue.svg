<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="季羡林在德国十年思乡岁月插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a3b14" font-family="serif">连珠小故事：季羡林的留学生涯</text>
  <line x1="170" y1="55" x2="630" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 背景时间轴 -->
  <line x1="100" y1="300" x2="700" y2="300" stroke="#c8843a" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>
  <circle cx="180" cy="300" r="6" fill="#c8843a"/>
  <circle cx="360" cy="300" r="6" fill="#c8843a"/>
  <circle cx="540" cy="300" r="6" fill="#c8843a"/>
  <circle cx="660" cy="300" r="6" fill="#c8843a"/>

  <!-- 第一阶段：清华求学 -->
  <g transform="translate(180, 200)">
    <!-- 清华牌坊简化 -->
    <rect x="-30" y="-15" width="60" height="8" fill="#8a6a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-28" y="-7" width="8" height="30" fill="#8a6a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="20" y="-7" width="8" height="30" fill="#8a6a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="-20" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">清华</text>
    <!-- 书本 -->
    <g transform="translate(0, 35)">
      <rect x="-15" y="0" width="30" height="20" fill="#3a5a8a" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="20" stroke="#7a3b14" stroke-width="1"/>
    </g>
  </g>
  <text x="180" y="330" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">考入清华</text>

  <!-- 第二阶段：德国哥廷根 -->
  <g transform="translate(360, 200)">
    <!-- 哥廷根大学尖塔 -->
    <rect x="-25" y="-10" width="50" height="40" fill="#8a7a6a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M -25 -10 L 0 -30 L 25 -10" fill="#8a7a6a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-5" y="10" width="10" height="20" fill="#3a3a4a" stroke="#7a3b14" stroke-width="1"/>
    <!-- 梵文书 -->
    <g transform="translate(0, 45)">
      <rect x="-18" y="0" width="36" height="14" fill="#c8a848" stroke="#7a3b14" stroke-width="1.5"/>
      <text x="0" y="10" text-anchor="middle" font-size="7" fill="#7a3b14" font-family="serif">梵文</text>
    </g>
  </g>
  <text x="360" y="330" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">德国留学</text>

  <!-- 第三阶段：战火中思乡 -->
  <g transform="translate(540, 200)">
    <!-- 月亮 -->
    <circle cx="0" cy="-20" r="16" fill="#fef8e0" stroke="#c8a848" stroke-width="1.5"/>
    <!-- 防空洞/书桌 -->
    <rect x="-25" y="10" width="50" height="25" fill="#6a5a4a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 书和烛台 -->
    <rect x="-15" y="2" width="20" height="8" fill="#8a3a2a" stroke="#7a3b14" stroke-width="1"/>
    <rect x="8" y="0" width="4" height="10" fill="#c8a848"/>
    <path d="M 10 0 Q 8 -5 10 -8 Q 12 -5 10 0" fill="#f0a020"/>
  </g>
  <text x="540" y="330" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">战火思乡</text>

  <!-- 第四阶段：学成归国 -->
  <g transform="translate(660, 200)">
    <!-- 北大博雅塔简化 -->
    <path d="M -8 40 L -8 -10 L 0 -25 L 8 -10 L 8 40 Z" fill="#8a7a6a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-4" y="10" width="8" height="8" fill="#3a3a4a" stroke="#7a3b14" stroke-width="1"/>
    <text x="0" y="-30" text-anchor="middle" font-size="9" fill="#7a3b14" font-family="serif">北大</text>
  </g>
  <text x="660" y="330" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">学成归国</text>

  <!-- 底部：季羡林人物 -->
  <g transform="translate(400, 440)">
    <!-- 身体 -->
    <path d="M -28 75 Q -30 25 -25 8 Q -15 0 0 0 Q 15 0 25 8 Q 30 25 28 75" fill="#5a5a6a" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头 -->
    <circle cx="0" cy="-18" r="20" fill="#e8c4a0" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头发（稀疏） -->
    <path d="M -18 -22 Q -15 -35 0 -36 Q 15 -35 18 -22" fill="#8a8a8a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 眼镜 -->
    <circle cx="-7" cy="-18" r="6" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="7" cy="-18" r="6" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-1" y1="-18" x2="1" y2="-18" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-7" cy="-18" r="1.5" fill="#7a3b14"/>
    <circle cx="7" cy="-18" r="1.5" fill="#7a3b14"/>
    <!-- 嘴 -->
    <path d="M -5 -8 Q 0 -5 5 -8" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 手拿书 -->
    <path d="M 25 15 Q 40 20 48 32" fill="none" stroke="#5a5a6a" stroke-width="9" stroke-linecap="round"/>
    <rect x="40" y="28" width="22" height="16" fill="#c8a848" stroke="#7a3b14" stroke-width="1.5" transform="rotate(-10 51 36)"/>
    <text x="51" y="39" text-anchor="middle" font-size="7" fill="#7a3b14" font-family="serif" transform="rotate(-10 51 39)">梵文</text>
  </g>

  <!-- 标注 -->
  <line x1="400" y1="415" x2="400" y2="375" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="345" y="350" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="368" text-anchor="middle" font-size="15" fill="#7a3b14" font-family="serif">季羡林</text>

  <!-- 语言标注 -->
  <line x1="455" y1="445" x2="540" y2="420" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="520" y="398" width="160" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="600" y="416" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">精通十多种语言</text>

  <!-- 底部说明 -->
  <rect x="50" y="545" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="570" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">德国十年，战火中望月思乡——学贯中西，根始终在故乡苇坑边。</text>
</svg>
