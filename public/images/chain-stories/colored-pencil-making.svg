<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="彩色铅笔制作过程的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：彩色铅笔是怎么做的</text>
  <line x1="170" y1="55" x2="630" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#c8843a"/>
    </marker>
  </defs>

  <!-- 第一步：调配笔芯（颜料+黏土+蜡） -->
  <g transform="translate(120, 200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">调配笔芯</text>
    <!-- 三个原料碗 -->
    <ellipse cx="-25" cy="30" rx="18" ry="8" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-43 30 L-43 45 Q-25 52 -7 45 L-7 30" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="-25" y="65" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">颜料</text>

    <ellipse cx="0" cy="30" rx="18" ry="8" fill="#d8c898" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-18 30 L-18 45 Q0 52 18 45 L18 30" fill="#d8c898" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">黏土</text>

    <ellipse cx="25" cy="30" rx="18" ry="8" fill="#f0e0a0" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M7 30 L7 45 Q25 52 43 45 L43 30" fill="#f0e0a0" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="25" y="65" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">蜡</text>
    <!-- 混合箭头 -->
    <path d="M-25 20 Q0 0 25 20" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <path d="M190 230 L230 230" fill="none" stroke="#c8843a" stroke-width="2.5" marker-end="url(#arr3)"/>

  <!-- 第二步：压制笔芯 -->
  <g transform="translate(300, 200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">压制笔芯</text>
    <!-- 压制机 -->
    <rect x="-35" y="10" width="70" height="30" fill="#a8a8a8" stroke="#5a5a5a" stroke-width="2" rx="3"/>
    <rect x="-30" y="0" width="60" height="12" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <!-- 压出的彩色笔芯 -->
    <rect x="-30" y="42" width="60" height="6" fill="#c84a3a" stroke="#7a3b14" stroke-width="1" rx="2"/>
    <rect x="-30" y="50" width="60" height="6" fill="#6a8d3f" stroke="#7a3b14" stroke-width="1" rx="2"/>
    <rect x="-30" y="58" width="60" height="6" fill="#7ab8d8" stroke="#7a3b14" stroke-width="1" rx="2"/>
    <!-- 向下箭头表示压制 -->
    <path d="M0 -10 L0 5" fill="none" stroke="#5a5a5a" stroke-width="3" marker-end="url(#arr3)"/>
  </g>

  <path d="M370 230 L410 230" fill="none" stroke="#c8843a" stroke-width="2.5" marker-end="url(#arr3)"/>

  <!-- 第三步：装木条 -->
  <g transform="translate(480, 200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">装入木条</text>
    <!-- 木条（带槽） -->
    <rect x="-40" y="15" width="80" height="20" fill="#e0c898" stroke="#8d5a36" stroke-width="2" rx="2"/>
    <rect x="-38" y="25" width="76" height="6" fill="#c84a3a" rx="1"/>
    <!-- 上盖木条 -->
    <rect x="-40" y="5" width="80" height="12" fill="#e0c898" stroke="#8d5a36" stroke-width="2" rx="2"/>
    <!-- 木纹 -->
    <line x1="-35" y1="10" x2="35" y2="10" stroke="#c8843a" stroke-width="0.5" opacity="0.5"/>
    <line x1="-35" y1="32" x2="35" y2="32" stroke="#c8843a" stroke-width="0.5" opacity="0.5"/>
    <!-- 胶水 -->
    <ellipse cx="0" cy="50" rx="3" ry="2" fill="#a8d0e8" opacity="0.6"/>
  </g>

  <path d="M550 230 L590 230" fill="none" stroke="#c8843a" stroke-width="2.5" marker-end="url(#arr3)"/>

  <!-- 第四步：成品 -->
  <g transform="translate(670, 200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">成品铅笔</text>
    <!-- 一支完成的铅笔 -->
    <g transform="translate(0, 30) rotate(-20)">
      <rect x="-40" y="-7" width="70" height="14" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
      <polygon points="30,-7 30,7 45,0" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <polygon points="38,-4 38,4 45,0" fill="#2a2a2a"/>
      <rect x="-40" y="-7" width="10" height="14" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <!-- 颜色标记 -->
    <circle cx="-25" cy="55" r="4" fill="#c84a3a"/>
    <text x="-15" y="59" font-family="serif" font-size="10" fill="#7a3b14">颜色标记</text>
  </g>

  <!-- 下方：调色原理 -->
  <g transform="translate(250, 410)">
    <text x="0" y="-10" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">颜料调配</text>
    <!-- 红+黄=橙 -->
    <circle cx="-30" cy="20" r="14" fill="#c84a3a" opacity="0.7"/>
    <circle cx="-10" cy="20" r="14" fill="#f4c842" opacity="0.7"/>
    <text x="20" y="25" font-family="serif" font-size="14" fill="#7a3b14">=</text>
    <circle cx="45" cy="20" r="14" fill="#e07856"/>
  </g>

  <g transform="translate(500, 410)">
    <text x="0" y="-10" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">颜料调配</text>
    <!-- 蓝+黄=绿 -->
    <circle cx="-30" cy="20" r="14" fill="#7ab8d8" opacity="0.7"/>
    <circle cx="-10" cy="20" r="14" fill="#f4c842" opacity="0.7"/>
    <text x="20" y="25" font-family="serif" font-size="14" fill="#7a3b14">=</text>
    <circle cx="45" cy="20" r="14" fill="#6a8d3f"/>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="510" width="700" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">彩色铅笔的笔芯用颜料、黏土和蜡混合压制，再装入开槽的木条粘合，</text>
  <text x="400" y="558" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">刷漆印上颜色标记，一支能画出无数颜色的铅笔就做好了。</text>
</svg>
