<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="孟姜女千里寻夫哭长城的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空（阴沉） -->
  <rect x="0" y="0" width="800" height="350" fill="#7a8a9a" opacity="0.1"/>
  <!-- 乌云 -->
  <g fill="#7a8a9a" opacity="0.3">
    <ellipse cx="150" cy="100" rx="50" ry="25"/>
    <ellipse cx="120" cy="110" rx="35" ry="20"/>
    <ellipse cx="600" cy="90" rx="55" ry="28"/>
    <ellipse cx="570" cy="100" rx="35" ry="20"/>
    <ellipse cx="640" cy="100" rx="35" ry="20"/>
  </g>
  <!-- 远山 -->
  <path d="M0 300 Q150 240 300 280 Q450 230 600 270 Q700 250 800 290 L800 350 L0 350 Z" fill="#2d6a4f" opacity="0.2"/>
  <!-- 长城 -->
  <g transform="translate(0 320)">
    <path d="M0 30 Q100 -10 200 10 Q300 -15 400 5 Q500 -20 600 0 Q700 -10 800 15 L800 40 L0 40 Z" fill="#e07856" opacity="0.5"/>
    <!-- 城墙 -->
    <rect x="0" y="20" width="800" height="30" fill="#c06540" opacity="0.4"/>
    <!-- 垛口 -->
    <g fill="#c06540" opacity="0.4">
      <rect x="50" y="10" width="12" height="15"/>
      <rect x="80" y="10" width="12" height="15"/>
      <rect x="150" y="5" width="12" height="15"/>
      <rect x="180" y="5" width="12" height="15"/>
      <rect x="280" y="0" width="12" height="15"/>
      <rect x="310" y="0" width="12" height="15"/>
      <rect x="420" y="-5" width="12" height="15"/>
      <rect x="450" y="-5" width="12" height="15"/>
      <rect x="550" y="0" width="12" height="15"/>
      <rect x="580" y="0" width="12" height="15"/>
      <rect x="680" y="5" width="12" height="15"/>
      <rect x="710" y="5" width="12" height="15"/>
    </g>
    <!-- 塌陷处 -->
    <path d="M350 20 L360 5 L370 15 L380 -5 L390 10 L400 20 Z" fill="#fef9ed" opacity="0.6"/>
  </g>
  <!-- 地面 -->
  <rect x="0" y="380" width="800" height="220" fill="#dceee3"/>
  <rect x="0" y="430" width="800" height="170" fill="#9fc8b4" opacity="0.3"/>
  <!-- 风雪 -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="100" cy="200" r="2"/>
    <circle cx="250" cy="180" r="2"/>
    <circle cx="400" cy="220" r="2"/>
    <circle cx="550" cy="190" r="2"/>
    <circle cx="700" cy="210" r="2"/>
    <circle cx="150" cy="260" r="2"/>
    <circle cx="350" cy="280" r="2"/>
    <circle cx="500" cy="250" r="2"/>
    <circle cx="650" cy="270" r="2"/>
  </g>
  <!-- 孟姜女 -->
  <g transform="translate(400 440)">
    <!-- 跪坐身体 -->
    <path d="M-30 0 L-35 -70 L35 -70 L30 0 Z" fill="#4a90b8" opacity="0.7"/>
    <!-- 裙子铺开 -->
    <path d="M-30 0 Q-45 15 -50 25 L50 25 Q45 15 30 0 Z" fill="#4a90b8" opacity="0.5"/>
    <!-- 头 -->
    <circle cx="0" cy="-88" r="16" fill="#f4d4a8"/>
    <!-- 头发（散乱） -->
    <path d="M-16 -96 Q-5 -108 0 -100 Q5 -108 16 -96 L16 -88 Q0 -83 -16 -88 Z" fill="#333"/>
    <path d="M-14 -90 Q-20 -75 -18 -60" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M14 -90 Q20 -75 18 -60" stroke="#333" stroke-width="2" fill="none"/>
    <!-- 眼泪 -->
    <path d="M-6 -85 Q-8 -75 -6 -70" stroke="#4a90b8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M6 -85 Q8 -75 6 -70" stroke="#4a90b8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- 闭眼 -->
    <path d="M-9 -88 Q-6 -90 -3 -88" stroke="#333" stroke-width="1.5" fill="none"/>
    <path d="M3 -88 Q6 -90 9 -88" stroke="#333" stroke-width="1.5" fill="none"/>
    <!-- 嘴（哭泣） -->
    <ellipse cx="0" cy="-80" rx="3" ry="4" fill="#e07856" opacity="0.5"/>
    <!-- 手抱棉衣 -->
    <path d="M-25 -50 L-15 -35" stroke="#f4d4a8" stroke-width="6" stroke-linecap="round"/>
    <path d="M25 -50 L15 -35" stroke="#f4d4a8" stroke-width="6" stroke-linecap="round"/>
    <!-- 棉衣包袱 -->
    <rect x="-15" y="-40" width="30" height="20" rx="3" fill="#e8a838" opacity="0.5"/>
    <line x1="0" y1="-40" x2="0" y2="-20" stroke="#8b6f47" stroke-width="1.5"/>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" font-weight="700" fill="#2d6a4f">连珠小故事：孟姜女哭长城的传说</text>
  <text x="400" y="82" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#7a7468">千里送寒衣，城墙为之崩塌</text>
</svg>
