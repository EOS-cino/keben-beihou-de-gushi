<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="变身故事中各种变形角色插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：变身的故事</text>
  <line x1="220" y1="62" x2="580" y2="62" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 装饰背景 -->
  <circle cx="400" cy="320" r="200" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.3"/>

  <!-- 变身1：人变成树（夸父） -->
  <g transform="translate(180, 200)">
    <circle cx="0" cy="0" r="55" fill="#2d6a4f" opacity="0.15" stroke="#c8843a" stroke-width="2"/>
    <!-- 人形 -->
    <circle cx="-10" cy="-15" r="8" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
    <path d="M-18 -7 L-18 15 L-2 15 L-2 -7" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <!-- 箭头 -->
    <path d="M5 0 L20 0" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M17 -4 L22 0 L17 4" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 树形 -->
    <rect x="30" y="-5" width="8" height="25" fill="#8d5a36"/>
    <circle cx="34" cy="-12" r="15" fill="#2d6a4f"/>
    <text x="15" y="40" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">夸父→桃林</text>
  </g>

  <!-- 变身2：爱丽丝变大变小 -->
  <g transform="translate(580, 200)">
    <circle cx="0" cy="0" r="55" fill="#4a90b8" opacity="0.15" stroke="#c8843a" stroke-width="2"/>
    <!-- 大爱丽丝 -->
    <circle cx="-15" cy="-10" r="10" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
    <path d="M-22 -2 L-22 20 L-8 20 L-8 -2" fill="#4a90b8" stroke="#7a3b14" stroke-width="1"/>
    <!-- 箭头 -->
    <path d="M0 5 L12 5" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M9 1 L14 5 L9 9" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 小爱丽丝 -->
    <circle cx="22" cy="8" r="4" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
    <path d="M19 12 L19 20 L25 20 L25 12" fill="#4a90b8" stroke="#7a3b14" stroke-width="1"/>
    <!-- 蘑菇 -->
    <ellipse cx="5" cy="22" rx="8" ry="4" fill="#e07856"/>
    <rect x="3" y="22" width="4" height="6" fill="#fff6df"/>
    <text x="0" y="40" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">爱丽丝变大变小</text>
  </g>

  <!-- 变身3：青蛙王子 -->
  <g transform="translate(180, 420)">
    <circle cx="0" cy="0" r="55" fill="#e8a838" opacity="0.15" stroke="#c8843a" stroke-width="2"/>
    <!-- 青蛙 -->
    <ellipse cx="-15" cy="0" rx="14" ry="11" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-20" cy="-8" r="5" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-10" cy="-8" r="5" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-20" cy="-8" r="2" fill="#2a2a2a"/>
    <circle cx="-10" cy="-8" r="2" fill="#2a2a2a"/>
    <!-- 箭头 -->
    <path d="M5 0 L20 0" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M17 -4 L22 0 L17 4" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 王子 -->
    <circle cx="30" cy="-8" r="8" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
    <path d="M24 -14 L30 -18 L36 -14" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
    <path d="M24 0 L24 18 L36 18 L36 0" fill="#4a90b8" stroke="#7a3b14" stroke-width="1"/>
    <text x="10" y="40" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">青蛙→王子</text>
  </g>

  <!-- 变身4：精卫填海 -->
  <g transform="translate(580, 420)">
    <circle cx="0" cy="0" r="55" fill="#e07856" opacity="0.15" stroke="#c8843a" stroke-width="2"/>
    <!-- 女孩 -->
    <circle cx="-18" cy="-8" r="8" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
    <path d="M-24 0 L-24 18 L-12 18 L-12 0" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <!-- 箭头 -->
    <path d="M-3 5 L12 5" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M9 1 L14 5 L9 9" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 精卫鸟 -->
    <ellipse cx="22" cy="5" rx="10" ry="7" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <path d="M16 2 L8 -2 L14 5" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <path d="M28 2 L35 -2 L30 5" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="26" cy="3" r="1.5" fill="#2a2a2a"/>
    <!-- 石子 -->
    <circle cx="20" cy="18" r="3" fill="#8a8a8a"/>
    <text x="5" y="40" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">女孩→精卫鸟</text>
  </g>

  <!-- 中心：变身魔法圈 -->
  <g transform="translate(400, 320)">
    <circle cx="0" cy="0" r="45" fill="#fff6df" stroke="#e8a838" stroke-width="3"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="0" y="-5" text-anchor="middle" font-size="16" font-weight="bold" fill="#7a3b14" font-family="serif">变身</text>
    <text x="0" y="15" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">魔法</text>
    <!-- 星星装饰 -->
    <path d="M0 -35 L3 -28 L10 -28 L4 -23 L6 -16 L0 -20 L-6 -16 L-4 -23 L-10 -28 L-3 -28 Z" fill="#e8a838" opacity="0.6"/>
  </g>

  <!-- 连接线 -->
  <line x1="235" y1="200" x2="355" y2="290" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="525" y1="200" x2="445" y2="290" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="235" y1="420" x2="355" y2="350" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="525" y1="420" x2="445" y2="350" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- 底部说明 -->
  <rect x="50" y="540" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="565" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">从古到今，变身故事让我们换一个视角看世界，学会理解和勇敢。</text>
</svg>
