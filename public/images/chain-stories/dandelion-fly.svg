<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="蒲公英种子飞行传播示意图">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">蒲公英为什么能飞那么远</text>
  <line x1="250" y1="56" x2="550" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="80" width="800" height="340" fill="#d6ecf7" opacity="0.3"/>
  <!-- 草地 -->
  <rect x="0" y="460" width="800" height="140" fill="#c8e0a8" opacity="0.4"/>

  <!-- 蒲公英母株（左下） -->
  <g transform="translate(120,440)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#6a8d3f" stroke-width="3"/>
    <g fill="#ffffff" stroke="#d0d0d0" stroke-width="0.5">
      <circle cx="-8" cy="-8" r="4"/>
      <circle cx="0" cy="-12" r="4"/>
      <circle cx="8" cy="-8" r="4"/>
      <circle cx="-10" cy="0" r="4"/>
      <circle cx="10" cy="0" r="4"/>
      <circle cx="0" cy="4" r="5"/>
    </g>
    <text x="0" y="70" text-anchor="middle" font-family="serif" font-size="12" fill="#6a8d3f">蒲公英母株</text>
  </g>

  <!-- 飞行种子1 -->
  <g transform="translate(280,300)">
    <circle cx="0" cy="0" r="4" fill="#8d5a36"/>
    <g stroke="#ffffff" stroke-width="1">
      <line x1="0" y1="0" x2="-10" y2="-12"/>
      <line x1="0" y1="0" x2="-4" y2="-14"/>
      <line x1="0" y1="0" x2="4" y2="-14"/>
      <line x1="0" y1="0" x2="10" y2="-12"/>
      <line x1="0" y1="0" x2="-12" y2="-6"/>
      <line x1="0" y1="0" x2="12" y2="-6"/>
    </g>
    <!-- 涡环示意 -->
    <ellipse cx="-8" cy="-8" rx="14" ry="8" fill="none" stroke="#7ab8d8" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
    <ellipse cx="8" cy="-8" rx="14" ry="8" fill="none" stroke="#7ab8d8" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  </g>

  <!-- 飞行种子2 -->
  <g transform="translate(420,220)">
    <circle cx="0" cy="0" r="4" fill="#8d5a36"/>
    <g stroke="#ffffff" stroke-width="1">
      <line x1="0" y1="0" x2="-10" y2="-12"/>
      <line x1="0" y1="0" x2="-4" y2="-14"/>
      <line x1="0" y1="0" x2="4" y2="-14"/>
      <line x1="0" y1="0" x2="10" y2="-12"/>
      <line x1="0" y1="0" x2="-12" y2="-6"/>
      <line x1="0" y1="0" x2="12" y2="-6"/>
    </g>
  </g>

  <!-- 飞行种子3 -->
  <g transform="translate(560,280)">
    <circle cx="0" cy="0" r="4" fill="#8d5a36"/>
    <g stroke="#ffffff" stroke-width="1">
      <line x1="0" y1="0" x2="-10" y2="-12"/>
      <line x1="0" y1="0" x2="-4" y2="-14"/>
      <line x1="0" y1="0" x2="4" y2="-14"/>
      <line x1="0" y1="0" x2="10" y2="-12"/>
      <line x1="0" y1="0" x2="-12" y2="-6"/>
      <line x1="0" y1="0" x2="12" y2="-6"/>
    </g>
  </g>

  <!-- 飞行轨迹 -->
  <path d="M120 420 Q200 350 280 300 Q350 260 420 220 Q490 250 560 280 Q630 310 680 380" fill="none" stroke="#a8d0e8" stroke-width="2" stroke-dasharray="5,4" opacity="0.6"/>

  <!-- 风向箭头 -->
  <g stroke="#7ab8d8" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <path d="M200 150 L260 150" marker-end="url(#arrD1)"/>
    <path d="M380 130 L440 130" marker-end="url(#arrD1)"/>
    <path d="M520 160 L580 160" marker-end="url(#arrD1)"/>
  </g>
  <text x="600" y="135" font-family="serif" font-size="12" fill="#5a8aaa">风向</text>

  <!-- 落地发芽（右下） -->
  <g transform="translate(680,440)">
    <circle cx="0" cy="0" r="3" fill="#8d5a36"/>
    <path d="M0 0 Q-3 -15 -8 -20" fill="none" stroke="#6a8d3f" stroke-width="2"/>
    <path d="M0 0 Q3 -15 8 -20" fill="none" stroke="#6a8d3f" stroke-width="2"/>
    <ellipse cx="-8" cy="-20" rx="5" ry="3" fill="#6a8d3f" transform="rotate(-30 -8 -20)"/>
    <ellipse cx="8" cy="-20" rx="5" ry="3" fill="#6a8d3f" transform="rotate(30 8 -20)"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="11" fill="#6a8d3f">落地发芽</text>
  </g>

  <!-- 标注：冠毛结构 -->
  <rect x="200" y="370" width="180" height="50" fill="#fff6df" stroke="#c8843a" rx="5"/>
  <text x="290" y="390" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">冠毛 = 降落伞</text>
  <text x="290" y="408" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">涡环托住种子飞行</text>
  <line x1="280" y1="370" x2="275" y2="320" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 底部数据 -->
  <rect x="100" y="510" width="600" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">一棵蒲公英可结上千颗种子</text>
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">每颗种子带"小伞"，能飞数公里外安家</text>

  <defs>
    <marker id="arrD1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#7ab8d8"/>
    </marker>
  </defs>
</svg>
