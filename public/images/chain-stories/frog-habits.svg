<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="青蛙生活习性和栖息环境的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：青蛙的生活习性</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 池塘环境 -->
  <rect x="0" y="300" width="800" height="240" fill="#a8d0e8" opacity="0.4"/>
  <rect x="0" y="300" width="800" height="240" fill="#6a8d3f" opacity="0.2"/>
  <!-- 水面 -->
  <path d="M0 340 Q200 335 400 340 T800 340" fill="none" stroke="#7ab8d8" stroke-width="2"/>
  <path d="M0 370 Q200 365 400 370 T800 370" fill="none" stroke="#7ab8d8" stroke-width="2" opacity="0.7"/>

  <!-- 左上：两栖动物（蝌蚪→青蛙） -->
  <g transform="translate(130, 170)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">两栖动物</text>
    <!-- 蝌蚪 -->
    <ellipse cx="-25" cy="10" rx="8" ry="5" fill="#4a6a2f" stroke="#3a5a1f" stroke-width="1.5"/>
    <path d="M-33 10 Q-40 15 -42 20" fill="none" stroke="#4a6a2f" stroke-width="2"/>
    <!-- 箭头 -->
    <path d="M-12 10 L0 10" fill="none" stroke="#c8843a" stroke-width="2"/>
    <polygon points="0,7 5,10 0,13" fill="#c8843a"/>
    <!-- 青蛙 -->
    <g transform="translate(20, 10)">
      <ellipse cx="0" cy="0" rx="14" ry="10" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
      <ellipse cx="0" cy="3" rx="9" ry="6" fill="#a8d0a8"/>
      <circle cx="-5" cy="-7" r="4" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1"/>
      <circle cx="5" cy="-7" r="4" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1"/>
      <circle cx="-5" cy="-7" r="2" fill="#ffffff"/>
      <circle cx="5" cy="-7" r="2" fill="#ffffff"/>
    </g>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">水→陆</text>
  </g>

  <!-- 中上：捕虫高手 -->
  <g transform="translate(400, 170)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">捕虫高手</text>
    <!-- 青蛙 -->
    <g transform="translate(-10, 10)">
      <ellipse cx="0" cy="0" rx="16" ry="12" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
      <ellipse cx="0" cy="3" rx="10" ry="7" fill="#a8d0a8"/>
      <circle cx="-6" cy="-8" r="5" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1"/>
      <circle cx="6" cy="-8" r="5" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1"/>
      <circle cx="-6" cy="-8" r="2.5" fill="#ffffff"/>
      <circle cx="6" cy="-8" r="2.5" fill="#ffffff"/>
      <circle cx="-6" cy="-8" r="1.2" fill="#2a2a2a"/>
      <circle cx="6" cy="-8" r="1.2" fill="#2a2a2a"/>
      <!-- 长舌头弹出 -->
      <path d="M0 -2 Q15 -8 28 -12" fill="none" stroke="#e07856" stroke-width="3" stroke-linecap="round"/>
      <circle cx="29" cy="-12" r="3" fill="#e07856"/>
    </g>
    <!-- 苍蝇 -->
    <g transform="translate(32, -15)">
      <ellipse cx="0" cy="0" rx="5" ry="3" fill="#2a2a2a"/>
      <ellipse cx="-3" cy="-3" rx="4" ry="2" fill="#c8c8c8" opacity="0.6"/>
      <ellipse cx="3" cy="-3" rx="4" ry="2" fill="#c8c8c8" opacity="0.6"/>
    </g>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">长舌粘虫</text>
  </g>

  <!-- 右上：歌唱家 -->
  <g transform="translate(660, 170)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">夏夜歌唱</text>
    <!-- 青蛙（鼓着鸣囊） -->
    <g transform="translate(0, 10)">
      <ellipse cx="0" cy="0" rx="16" ry="12" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
      <ellipse cx="0" cy="3" rx="10" ry="7" fill="#a8d0a8"/>
      <circle cx="-6" cy="-8" r="5" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1"/>
      <circle cx="6" cy="-8" r="5" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1"/>
      <!-- 鸣囊（鼓起） -->
      <ellipse cx="0" cy="-2" rx="7" ry="5" fill="#8db04f" stroke="#4a6a2f" stroke-width="1"/>
    </g>
    <!-- 音符 -->
    <text x="-20" y="-15" font-family="serif" font-size="16" fill="#7a3b14">呱</text>
    <text x="15" y="-20" font-family="serif" font-size="14" fill="#c8843a">♪</text>
    <text x="25" y="-5" font-family="serif" font-size="12" fill="#c8843a">♪</text>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">鸣囊扩音</text>
  </g>

  <!-- 下方：冬眠 -->
  <g transform="translate(200, 420)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">冬天冬眠</text>
    <!-- 泥土 -->
    <ellipse cx="0" cy="30" rx="60" ry="12" fill="#8d5a36" opacity="0.5"/>
    <path d="M-50 25 Q-30 5 0 0 Q30 5 50 25 Q30 35 0 35 Q-30 35 -50 25 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 洞里的青蛙 -->
    <ellipse cx="0" cy="18" rx="14" ry="9" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <ellipse cx="0" cy="20" rx="9" ry="6" fill="#a8d0a8"/>
    <!-- 闭眼 -->
    <path d="M-5 14 Q-3 16 -1 14" fill="none" stroke="#4a6a2f" stroke-width="1"/>
    <path d="M1 14 Q3 16 5 14" fill="none" stroke="#4a6a2f" stroke-width="1"/>
    <!-- Zzz -->
    <text x="30" y="0" font-family="serif" font-size="14" fill="#7ab8d8">Zzz</text>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">钻进泥土沉睡</text>
  </g>

  <!-- 庄稼卫士 -->
  <g transform="translate(550, 420)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">庄稼卫士</text>
    <!-- 稻穗 -->
    <line x1="-20" y1="30" x2="-22" y2="0" stroke="#c8843a" stroke-width="2"/>
    <line x1="0" y1="30" x2="-2" y2="-5" stroke="#c8843a" stroke-width="2"/>
    <line x1="20" y1="30" x2="18" y2="0" stroke="#c8843a" stroke-width="2"/>
    <ellipse cx="-22" cy="-2" rx="4" ry="6" fill="#e0a838" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="-2" cy="-7" rx="4" ry="6" fill="#e0a838" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="18" cy="-2" rx="4" ry="6" fill="#e0a838" stroke="#7a3b14" stroke-width="1"/>
    <!-- 青蛙守护 -->
    <g transform="translate(0, 25)">
      <ellipse cx="0" cy="0" rx="12" ry="8" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
      <circle cx="-4" cy="-5" r="3.5" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1"/>
      <circle cx="4" cy="-5" r="3.5" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1"/>
      <circle cx="-4" cy="-5" r="1.5" fill="#ffffff"/>
      <circle cx="4" cy="-5" r="1.5" fill="#ffffff"/>
    </g>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">一天吃百只害虫</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="510" width="700" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">青蛙是两栖动物：小时候在水里当蝌蚪，长大后上陆捕虫，夏夜唱歌，</text>
  <text x="400" y="558" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">冬天钻进泥土冬眠——它离不开水边的湿地，泥塘就是它的家。</text>
</svg>
