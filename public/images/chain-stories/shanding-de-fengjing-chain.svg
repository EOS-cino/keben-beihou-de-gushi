<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="古今登高望远与登山的哲理故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">登高望远的故事</text>
  <line x1="280" y1="56" x2="520" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——登的不只是山，是志气</text>

  <!-- 三句名句 -->
  <g transform="translate(180, 130)">
    <rect x="-130" y="0" width="260" height="150" rx="8" fill="#fef9ed" stroke="#c84a3a" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#c84a3a">杜牧</text>
    <g transform="translate(0, 60)">
      <polygon points="-50,30 -20,30 -10,-10 10,-10 20,30 50,30" fill="#2d6a4f" opacity="0.6" stroke="#4a6a2f" stroke-width="1"/>
      <circle cx="-20" cy="0" r="5" fill="#c84a3a"/>
      <circle cx="20" cy="0" r="5" fill="#e07856"/>
    </g>
    <text x="0" y="115" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">"停车坐爱枫林晚"</text>
    <text x="0" y="132" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">"霜叶红于二月花"</text>
  </g>

  <g transform="translate(560, 130)">
    <rect x="-130" y="0" width="260" height="150" rx="8" fill="#fef9ed" stroke="#4a90b8" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#4a90b8">王之涣</text>
    <g transform="translate(0, 65)">
      <!-- 楼 -->
      <rect x="-30" y="-20" width="60" height="40" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.2"/>
      <polygon points="-40,-20 40,-20 0,-45" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.2"/>
      <rect x="-8" y="0" width="16" height="20" fill="#7a3b14"/>
      <!-- 上一层的光 -->
      <path d="M0 -45 L0 -60" stroke="#e8a838" stroke-width="2"/>
      <text x="20" y="-55" font-family="serif" font-size="9" fill="#e8a838">更上一层</text>
    </g>
    <text x="0" y="115" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">"欲穷千里目"</text>
    <text x="0" y="132" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">"更上一层楼"</text>
  </g>

  <!-- 杜甫 -->
  <g transform="translate(180, 310)">
    <rect x="-130" y="0" width="260" height="150" rx="8" fill="#fef9ed" stroke="#e8a838" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#e8a838">杜甫</text>
    <g transform="translate(0, 70)">
      <polygon points="-60,20 -20,20 0,-25 20,20 60,20" fill="#4a90b8" opacity="0.4" stroke="#4a6a2f" stroke-width="1"/>
      <polygon points="-30,20 0,-25 30,20" fill="#2d6a4f" opacity="0.7" stroke="#4a6a2f" stroke-width="1"/>
      <circle cx="0" cy="-30" r="4" fill="#c84a3a"/>
    </g>
    <text x="0" y="115" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">"会当凌绝顶"</text>
    <text x="0" y="132" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">"一览众山小"</text>
  </g>

  <!-- 徐霞客 -->
  <g transform="translate(560, 310)">
    <rect x="-130" y="0" width="260" height="150" rx="8" fill="#fef9ed" stroke="#2d6a4f" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#2d6a4f">徐霞客</text>
    <g transform="translate(0, 70)">
      <polygon points="-70,20 -30,20 0,-15 30,20 70,20" fill="#6a8d3f" opacity="0.5" stroke="#4a6a2f" stroke-width="1"/>
      <!-- 小人登山 -->
      <circle cx="-30" cy="5" r="4" fill="#e07856"/>
      <circle cx="0" cy="-12" r="4" fill="#e07856"/>
      <path d="M-30 5 L0 -12" fill="none" stroke="#c84a3a" stroke-width="1" stroke-dasharray="3 2"/>
    </g>
    <text x="0" y="115" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">一辈子登山</text>
    <text x="0" y="132" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">写下《徐霞客游记》</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 490)">
    <rect x="-320" y="0" width="640" height="80" rx="10" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">重阳登高 · 登楼 · 登山</text>
    <text x="0" y="54" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">登的不只是山，是志气：难走的路，往往通向最好的地方</text>
    <text x="0" y="74" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">再坚持一下，就能看到别人看不到的远方</text>
  </g>
</svg>
