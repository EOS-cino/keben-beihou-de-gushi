<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="人类寻找外星生命插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：人类寻找外星生命</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左侧：Wow!信号 -->
  <g transform="translate(170, 250)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#e8a838">Wow!信号·1977</text>
    <!-- 射电望远镜 -->
    <g transform="translate(0, -40)">
      <path d="M -30 0 Q 0 -25 30 0" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
      <path d="M -30 0 Q 0 -20 30 0" fill="#e8e8f0" opacity="0.3" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="0" y1="-15" x2="0" y2="30" stroke="#7a3b14" stroke-width="2.5"/>
      <line x1="-15" y1="30" x2="15" y2="30" stroke="#7a3b14" stroke-width="2.5"/>
    </g>
    <!-- 信号波形 -->
    <g transform="translate(0, 10)">
      <path d="M -50 0 L -40 0 L -35 -15 L -30 5 L -25 -20 L -20 0 L -10 0 L 0 0" fill="none" stroke="#e8a838" stroke-width="2"/>
      <text x="10" y="-5" font-family="serif" font-size="20" font-weight="bold" fill="#e8a838">Wow!</text>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">72秒异常信号</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">至今无法确认来源</text>
  </g>

  <!-- 中间：旅行者金唱片 -->
  <g transform="translate(400, 250)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#4a90b8">旅行者金唱片·1977</text>
    <!-- 唱片 -->
    <circle cx="0" cy="-20" r="35" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="0" cy="-20" r="25" fill="none" stroke="#a07820" stroke-width="0.8" opacity="0.5"/>
    <circle cx="0" cy="-20" r="18" fill="none" stroke="#a07820" stroke-width="0.8" opacity="0.5"/>
    <circle cx="0" cy="-20" r="10" fill="none" stroke="#a07820" stroke-width="0.8" opacity="0.5"/>
    <circle cx="0" cy="-20" r="4" fill="#7a3b14"/>
    <!-- 探测器 -->
    <g transform="translate(0, 30)">
      <rect x="-15" y="-5" width="30" height="10" fill="#d8c8a8" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="-15" y1="-2" x2="-25" y2="-8" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-30" y="-12" width="10" height="8" fill="#4a90b8" stroke="#7a3b14" stroke-width="1"/>
      <line x1="15" y1="-2" x2="25" y2="-8" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="20" y="-12" width="10" height="8" fill="#4a90b8" stroke="#7a3b14" stroke-width="1"/>
      <!-- 天线 -->
      <line x1="0" y1="-5" x2="0" y2="-15" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="0" cy="-17" r="3" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">55种语言问候·各种音乐</text>
    <text x="0" y="78" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">已飞出太阳系·人类的漂流瓶</text>
  </g>

  <!-- 右侧：主动发送信号 -->
  <g transform="translate(630, 250)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#e07856">主动呼叫·1974</text>
    <!-- 地球发送信号 -->
    <circle cx="0" cy="-30" r="14" fill="#4a90b8" stroke="#2a6080" stroke-width="1.5"/>
    <path d="M -8 -35 Q -3 -40 3 -35" fill="#2d6a4f" opacity="0.6"/>
    <!-- 信号波 -->
    <path d="M 14 -30 Q 25 -35 30 -30" fill="none" stroke="#e07856" stroke-width="2" opacity="0.7"/>
    <path d="M 18 -25 Q 28 -32 35 -25" fill="none" stroke="#e07856" stroke-width="1.5" opacity="0.5"/>
    <path d="M 18 -35 Q 28 -42 35 -35" fill="none" stroke="#e07856" stroke-width="1.5" opacity="0.5"/>
    <!-- 目标星团 -->
    <g transform="translate(50, -30)">
      <circle cx="0" cy="0" r="2" fill="#e8a838"/>
      <circle cx="5" cy="-3" r="1.5" fill="#e8a838"/>
      <circle cx="-4" cy="4" r="1.5" fill="#e8a838"/>
      <circle cx="6" cy="5" r="1" fill="#e8a838"/>
      <circle cx="-6" cy="-4" r="1" fill="#e8a838"/>
    </g>
    <text x="0" y="15" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">向星团发送信息</text>
    <text x="0" y="33" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">25000年到达·再等25000年回信</text>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">含DNA结构·太阳系示意图</text>
  </g>

  <!-- 下方：核心精神 -->
  <g transform="translate(400, 430)">
    <rect x="-280" y="0" width="560" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">监听信号·发送问候·携带名片——人类用各种方式寻找同伴</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="13" fill="#c8843a">宇宙太大了，探索才刚刚开始，谁也不知道未来会发现什么</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">从Wow!信号到旅行者金唱片：人类不甘孤独，一直在向宇宙呼喊"有人吗？"</text>
</svg>
