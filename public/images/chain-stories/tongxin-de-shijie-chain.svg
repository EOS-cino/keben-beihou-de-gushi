<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="童心与成人视角对比插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：为什么大人的世界会丢掉童心</text>
  <line x1="120" y1="55" x2="680" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左：孩子的大脑(亮) -->
  <g transform="translate(180 240)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#2d6a4f">孩子：每天上百个"为什么"</text>
    <!-- 大脑 -->
    <ellipse cx="0" cy="0" rx="50" ry="40" fill="#e8a838" opacity="0.3" stroke="#e8a838" stroke-width="2"/>
    <path d="M-30 -10 Q-10 -20 0 -6 Q10 -20 30 -10" stroke="#e8a838" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M-30 10 Q-10 0 0 14 Q10 0 30 10" stroke="#e8a838" stroke-width="1.5" fill="none" opacity="0.7"/>
    <!-- 亮起来的点(多巴胺) -->
    <g fill="#e8a838">
      <circle cx="-20" cy="-12" r="3"/>
      <circle cx="18" cy="-8" r="3"/>
      <circle cx="0" cy="10" r="3"/>
      <circle cx="-10" cy="18" r="2.5"/>
      <circle cx="22" cy="14" r="2.5"/>
    </g>
    <!-- 问号 -->
    <g fill="#e07856" font-family="serif" font-size="16">
      <text x="-44" y="-30">?</text>
      <text x="40" y="-28">?</text>
      <text x="-46" y="30">?</text>
      <text x="42" y="32">?</text>
    </g>
    <text x="0" y="64" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">第一次见什么都兴奋</text>
  </g>

  <!-- 中：习惯化 -->
  <g transform="translate(400 240)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">习惯化</text>
    <text x="0" y="-42" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">见多了就不再大惊小怪</text>
    <!-- 冰激凌对比 -->
    <g transform="translate(-50 0)">
      <path d="M-10 0 L10 0 L0 20 Z" fill="#e07856"/>
      <ellipse cx="0" cy="-4" rx="14" ry="10" fill="#e8a838"/>
      <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="10" fill="#e07856">第1次:太好吃了!</text>
    </g>
    <g transform="translate(50 0)">
      <path d="M-10 0 L10 0 L0 20 Z" fill="#e07856" opacity="0.6"/>
      <ellipse cx="0" cy="-4" rx="14" ry="10" fill="#e8a838" opacity="0.6"/>
      <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="10" fill="#8a8a8a">第100次:还行吧</text>
    </g>
    <!-- 箭头 -->
    <path d="M-30 0 L30 0" stroke="#c8843a" stroke-width="2" marker-end="url(#arr)"/>
    <defs>
      <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
        <path d="M0 0 L8 4 L0 8 Z" fill="#c8843a"/>
      </marker>
    </defs>
  </g>

  <!-- 右：大人的大脑(暗) -->
  <g transform="translate(620 240)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#8a8a8a">大人：每天不到十个"为什么"</text>
    <ellipse cx="0" cy="0" rx="50" ry="40" fill="#9aa0a6" opacity="0.2" stroke="#8a8a8a" stroke-width="2"/>
    <path d="M-30 -10 Q-10 -20 0 -6 Q10 -20 30 -10" stroke="#8a8a8a" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M-30 10 Q-10 0 0 14 Q10 0 30 10" stroke="#8a8a8a" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- 暗的点(少) -->
    <g fill="#8a8a8a" opacity="0.6">
      <circle cx="-14" cy="-8" r="2.5"/>
      <circle cx="16" cy="10" r="2.5"/>
    </g>
    <!-- "有用"标签 -->
    <g fill="#8a8a8a" font-family="serif" font-size="11">
      <rect x="-38" y="-32" width="36" height="16" rx="3" fill="#fff6df" stroke="#8a8a8a"/>
      <text x="-20" y="-20" text-anchor="middle">有用?</text>
      <rect x="6" y="20" width="36" height="16" rx="3" fill="#fff6df" stroke="#8a8a8a"/>
      <text x="24" y="32" text-anchor="middle">没用</text>
    </g>
    <text x="0" y="64" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">忙着"有用"顾不上看</text>
  </g>

  <!-- 底部：守护童心 -->
  <g transform="translate(400 400)">
    <rect x="-280" y="0" width="560" height="50" fill="#fff6df" stroke="#2d6a4f" stroke-width="2" rx="8"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="14" fill="#2d6a4f" font-weight="bold">爱因斯坦："我像个永远长不大的孩子。"</text>
    <text x="0" y="42" text-anchor="middle" font-family="serif" font-size="12" fill="#c8843a">丢掉童心不是长大的必然——好奇心让人更快乐、更有创造力</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="480" width="700" height="90" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6" opacity="0.85"/>
  <text x="400" y="508" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">孩子的大脑多巴胺活跃，第一次见到蚂蚁、摸到雪都会"亮起来"。</text>
  <text x="400" y="532" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">大人见多了就"习惯化"，又被"有用没用"塞满，渐渐忘了蹲下来看世界。</text>
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a">童心是会发光的东西——长大不是丢掉它，而是把它藏好。</text>
</svg>
