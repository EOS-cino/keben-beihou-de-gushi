<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="民间故事中各种误会的场景插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：民间故事里的误会</text>
  <line x1="200" y1="62" x2="600" y2="62" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 故事1：三人成虎 -->
  <g transform="translate(180, 200)">
    <rect x="-85" y="-60" width="170" height="160" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-40" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a3b14" font-family="serif">三人成虎</text>
    <!-- 三个人 -->
    <g transform="translate(-35, 0)">
      <circle cx="0" cy="0" r="10" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-8 8 L-8 30 L8 30 L8 8" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
      <text x="0" y="-15" text-anchor="middle" font-size="10" fill="#7a3b14">有虎!</text>
    </g>
    <g transform="translate(0, 0)">
      <circle cx="0" cy="0" r="10" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-8 8 L-8 30 L8 30 L8 8" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
      <text x="0" y="-15" text-anchor="middle" font-size="10" fill="#7a3b14">有虎!</text>
    </g>
    <g transform="translate(35, 0)">
      <circle cx="0" cy="0" r="10" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-8 8 L-8 30 L8 30 L8 8" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1"/>
      <text x="0" y="-15" text-anchor="middle" font-size="10" fill="#7a3b14">有虎!</text>
    </g>
    <!-- 国王（信了） -->
    <g transform="translate(0, 55)">
      <circle cx="0" cy="0" r="8" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-3 -8 L0 -12 L3 -8" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
      <text x="0" y="20" text-anchor="middle" font-size="10" fill="#e07856">信了!</text>
    </g>
    <text x="0" y="90" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">谣言说多了变成"事实"</text>
  </g>

  <!-- 故事2：堂吉诃德战风车 -->
  <g transform="translate(580, 200)">
    <rect x="-85" y="-60" width="170" height="160" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-40" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a3b14" font-family="serif">大战风车</text>
    <!-- 风车 -->
    <g transform="translate(30, 10)">
      <rect x="-8" y="0" width="16" height="50" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="6" ry="6" fill="#5a3a1a"/>
      <!-- 风车叶片 -->
      <path d="M0 0 L-30 -20 L-25 -10 Z" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M0 0 L30 20 L25 10 Z" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M0 0 L-20 30 L-10 25 Z" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M0 0 L20 -30 L10 -25 Z" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <!-- 堂吉诃德 -->
    <g transform="translate(-30, 20)">
      <circle cx="0" cy="-15" r="10" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-8 -8 L-10 25 L10 25 L8 -8" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 长矛 -->
      <line x1="10" y1="0" x2="30" y2="-15" stroke="#7a3b14" stroke-width="2"/>
      <path d="M28 -17 L33 -13 L30 -10" fill="#8a8a8a"/>
    </g>
    <text x="0" y="90" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">把风车当成巨人</text>
  </g>

  <!-- 故事3：猴蟹合战 -->
  <g transform="translate(180, 430)">
    <rect x="-85" y="-50" width="170" height="140" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-30" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a3b14" font-family="serif">猴蟹合战</text>
    <!-- 猴子 -->
    <g transform="translate(-30, 10)">
      <circle cx="0" cy="0" r="12" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-4" cy="-2" r="2" fill="#2a2a2a"/>
      <circle cx="4" cy="-2" r="2" fill="#2a2a2a"/>
      <path d="M-4 4 Q0 7 4 4" fill="none" stroke="#7a3b14" stroke-width="1"/>
      <ellipse cx="0" cy="15" rx="10" ry="8" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <!-- 螃蟹 -->
    <g transform="translate(30, 15)">
      <ellipse cx="0" cy="0" rx="12" ry="9" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-12 -3 L-20 -8 L-12 0" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M12 -3 L20 -8 L12 0" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-4" cy="-3" r="2" fill="#2a2a2a"/>
      <circle cx="4" cy="-3" r="2" fill="#2a2a2a"/>
    </g>
    <!-- 柿子 -->
    <circle cx="0" cy="45" r="6" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <text x="0" y="75" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">欺骗的误会</text>
  </g>

  <!-- 故事4：漏 -->
  <g transform="translate(580, 430)">
    <rect x="-85" y="-50" width="170" height="140" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-30" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a3b14" font-family="serif">漏</text>
    <!-- 老虎 -->
    <g transform="translate(-25, 15)">
      <ellipse cx="0" cy="0" rx="15" ry="10" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-12" cy="-3" r="8" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-14" cy="-4" r="2" fill="#2a2a2a"/>
      <circle cx="-10" cy="-4" r="2" fill="#2a2a2a"/>
    </g>
    <!-- 水滴 -->
    <g transform="translate(25, 10)">
      <ellipse cx="0" cy="0" rx="5" ry="8" fill="#4a90b8" opacity="0.6"/>
      <ellipse cx="0" cy="15" rx="4" ry="6" fill="#4a90b8" opacity="0.4"/>
      <text x="0" y="35" text-anchor="middle" font-size="10" fill="#7a3b14">漏水</text>
    </g>
    <text x="0" y="75" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">把漏水当成怪物</text>
  </g>

  <!-- 中心：误会标签 -->
  <g transform="translate(400, 320)">
    <circle cx="0" cy="0" r="40" fill="#e07856" opacity="0.15" stroke="#e07856" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-size="16" font-weight="bold" fill="#e07856" font-family="serif">误会</text>
    <text x="0" y="15" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">=?</text>
  </g>

  <!-- 连接线 -->
  <line x1="265" y1="200" x2="360" y2="300" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="495" y1="200" x2="440" y2="300" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="265" y1="430" x2="360" y2="345" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="495" y1="430" x2="440" y2="345" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- 底部说明 -->
  <rect x="50" y="545" width="700" height="35" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="568" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">民间故事用误会制造笑料，也提醒我们：不了解的事情不要瞎猜，弄清真相最重要。</text>
</svg>
