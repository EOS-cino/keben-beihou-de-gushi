<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="巴金与星空插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：巴金与星空</text>
  <line x1="200" y1="62" x2="600" y2="62" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 巴金 -->
  <g transform="translate(180, 300)">
    <circle cx="0" cy="-45" r="28" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头发 -->
    <path d="M-25 -55 Q-20 -72 0 -74 Q20 -72 25 -55" fill="#3a2a1a"/>
    <!-- 眼镜 -->
    <circle cx="-9" cy="-45" r="6" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="9" cy="-45" r="6" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-3" y1="-45" x2="3" y2="-45" stroke="#7a3b14" stroke-width="1"/>
    <!-- 嘴 -->
    <path d="M-4 -33 Q0 -30 4 -33" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 身体 -->
    <path d="M-22 -18 L-30 55 L30 55 L22 -18" fill="#3a4a5a" stroke="#7a3b14" stroke-width="2"/>
    <!-- 手（仰望星空） -->
    <path d="M-22 -5 L-35 -25" fill="none" stroke="#f0d0a8" stroke-width="7" stroke-linecap="round"/>
    <path d="M22 -5 L35 -25" fill="none" stroke="#f0d0a8" stroke-width="7" stroke-linecap="round"/>

    <text x="0" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#7a3b14" font-family="serif">巴金</text>
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">原名李尧棠</text>
  </g>

  <!-- 名言 -->
  <g transform="translate(500, 180)">
    <rect x="-150" y="-35" width="300" height="70" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.9"/>
    <text x="0" y="-12" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a3b14" font-family="serif">"我写作不是因为我有才华</text>
    <text x="0" y="10" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a3b14" font-family="serif">而是因为我有感情"</text>
    <text x="0" y="28" text-anchor="middle" font-size="11" fill="#e07856" font-family="serif">——巴金</text>
  </g>

  <!-- 三次看星空 -->
  <g transform="translate(500, 320)">
    <text x="0" y="-20" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a3b14" font-family="serif">三次看繁星</text>
    <line x1="-60" y1="-12" x2="60" y2="-12" stroke="#c8843a" stroke-width="1.5"/>

    <!-- 第一次：家乡庭院 -->
    <g transform="translate(-130, 10)">
      <rect x="-55" y="-15" width="110" height="50" fill="#e8a838" opacity="0.1" stroke="#c8843a" stroke-width="1.5" rx="6"/>
      <text x="0" y="0" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a3b14" font-family="serif">家乡庭院</text>
      <text x="0" y="15" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">温暖·亲切</text>
      <text x="0" y="28" text-anchor="middle" font-size="9" fill="#7a3b14" font-family="serif">母亲讲星星故事</text>
    </g>
    <!-- 箭头 -->
    <path d="M-70 10 L-55 10" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M-58 6 L-52 10 L-58 14" fill="none" stroke="#7a3b14" stroke-width="2"/>

    <!-- 第二次：南京菜园 -->
    <g transform="translate(0, 10)">
      <rect x="-55" y="-15" width="110" height="50" fill="#2d6a4f" opacity="0.1" stroke="#c8843a" stroke-width="1.5" rx="6"/>
      <text x="0" y="0" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a3b14" font-family="serif">南京菜园</text>
      <text x="0" y="15" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">思念·遥远</text>
      <text x="0" y="28" text-anchor="middle" font-size="9" fill="#7a3b14" font-family="serif">想起家乡和母亲</text>
    </g>
    <path d="M60 10 L75 10" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M72 6 L78 10 L72 14" fill="none" stroke="#7a3b14" stroke-width="2"/>

    <!-- 第三次：海上 -->
    <g transform="translate(130, 10)">
      <rect x="-55" y="-15" width="110" height="50" fill="#4a90b8" opacity="0.1" stroke="#c8843a" stroke-width="1.5" rx="6"/>
      <text x="0" y="0" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a3b14" font-family="serif">海上船舱</text>
      <text x="0" y="15" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">安心·摇篮</text>
      <text x="0" y="28" text-anchor="middle" font-size="9" fill="#7a3b14" font-family="serif">睡在母亲怀里</text>
    </g>
  </g>

  <!-- 星座（北斗七星） -->
  <g transform="translate(620, 450)">
    <text x="0" y="-30" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a3b14" font-family="serif">北斗七星</text>
    <g fill="#e8a838">
      <circle cx="-40" cy="0" r="3"/>
      <circle cx="-20" cy="-5" r="3"/>
      <circle cx="0" cy="-3" r="3"/>
      <circle cx="15" cy="5" r="3"/>
      <circle cx="25" cy="20" r="3"/>
      <circle cx="5" cy="25" r="3"/>
      <circle cx="-15" cy="20" r="3"/>
    </g>
    <g fill="none" stroke="#e8a838" stroke-width="1" opacity="0.5">
      <line x1="-40" y1="0" x2="-20" y2="-5"/>
      <line x1="-20" y1="-5" x2="0" y2="-3"/>
      <line x1="0" y1="-3" x2="15" y2="5"/>
      <line x1="15" y1="5" x2="25" y2="20"/>
      <line x1="25" y1="20" x2="5" y2="25"/>
      <line x1="5" y1="25" x2="-15" y2="20"/>
      <line x1="-15" y1="20" x2="-40" y2="0"/>
    </g>
  </g>

  <!-- 康德名言 -->
  <g transform="translate(180, 460)">
    <rect x="-110" y="-25" width="220" height="55" fill="#e07856" opacity="0.08" stroke="#e07856" stroke-width="1.5" rx="6"/>
    <text x="0" y="-5" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a3b14" font-family="serif">康德：</text>
    <text x="0" y="12" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">"头顶的星空，心中的道德律"</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="540" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="565" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">不管走到哪里，头顶的星星永远在那里，像老朋友一样等着你。</text>
</svg>
