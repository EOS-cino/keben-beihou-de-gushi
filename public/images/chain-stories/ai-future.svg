<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="人工智能发展历程插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：人工智能的未来</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="2"/>

  <!-- 时间轴 -->
  <line x1="80" y1="300" x2="720" y2="300" stroke="#8d5a36" stroke-width="3"/>
  <polygon points="720,300 708,293 708,307" fill="#8d5a36"/>

  <!-- 节点1：1956 达特茅斯会议 -->
  <g transform="translate(160, 300)">
    <circle cx="0" cy="0" r="8" fill="#c84a3a"/>
    <rect x="-60" y="-80" width="120" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">1956</text>
    <text x="0" y="-42" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">"人工智能"</text>
    <text x="0" y="-28" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">一词诞生</text>
    <!-- 简笔人脑 -->
    <g transform="translate(0, 30)">
      <circle cx="0" cy="0" r="14" fill="none" stroke="#7a3b14" stroke-width="2"/>
      <path d="M-8 -3 Q-4 -8 0 -3 Q4 -8 8 -3" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">概念提出</text>
    </g>
  </g>

  <!-- 节点2：1997 深蓝下棋 -->
  <g transform="translate(340, 300)">
    <circle cx="0" cy="0" r="8" fill="#c8843a"/>
    <rect x="-60" y="-80" width="120" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">1997</text>
    <text x="0" y="-42" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">深蓝战胜</text>
    <text x="0" y="-28" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">国际象棋冠军</text>
    <!-- 棋子 -->
    <g transform="translate(0, 30)">
      <rect x="-6" y="-10" width="12" height="20" rx="2" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
      <circle cx="0" cy="-12" r="5" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
      <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">机器赢了</text>
    </g>
  </g>

  <!-- 节点3：2016 AlphaGo -->
  <g transform="translate(520, 300)">
    <circle cx="0" cy="0" r="8" fill="#6a8d3f"/>
    <rect x="-60" y="-80" width="120" height="60" fill="#fff6df" stroke="#6a8d3f" stroke-width="1.5" rx="6"/>
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">2016</text>
    <text x="0" y="-42" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">AlphaGo</text>
    <text x="0" y="-28" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">战胜围棋冠军</text>
    <!-- 围棋盘 -->
    <g transform="translate(0, 30)">
      <rect x="-12" y="-12" width="24" height="24" fill="#d8c9a8" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="-4" y1="-12" x2="-4" y2="12" stroke="#7a3b14" stroke-width="0.5"/>
      <line x1="4" y1="-12" x2="4" y2="12" stroke="#7a3b14" stroke-width="0.5"/>
      <line x1="-12" y1="-4" x2="12" y2="-4" stroke="#7a3b14" stroke-width="0.5"/>
      <line x1="-12" y1="4" x2="12" y2="4" stroke="#7a3b14" stroke-width="0.5"/>
      <circle cx="-4" cy="-4" r="2.5" fill="#2a2a2a"/>
      <circle cx="4" cy="4" r="2.5" fill="#fef9ed" stroke="#7a3b14" stroke-width="0.5"/>
      <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">深度学习</text>
    </g>
  </g>

  <!-- 节点4：未来 -->
  <g transform="translate(680, 300)">
    <circle cx="0" cy="0" r="8" fill="#e07856"/>
    <rect x="-50" y="-80" width="100" height="60" fill="#fff6df" stroke="#e07856" stroke-width="1.5" rx="6"/>
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">未来？</text>
    <text x="0" y="-42" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">会画画、写作</text>
    <text x="0" y="-28" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">看病、驾驶</text>
    <!-- 问号 -->
    <g transform="translate(0, 30)">
      <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#e07856">?</text>
      <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">自我意识？</text>
    </g>
  </g>

  <!-- AI能做 vs 不能做 -->
  <g transform="translate(200, 440)">
    <rect x="-130" y="0" width="260" height="50" fill="#fff6df" stroke="#6a8d3f" stroke-width="1.5" rx="6"/>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="12" fill="#6a8d3f">AI能做：</text>
    <text x="0" y="38" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">下棋 · 写作 · 看病 · 驾驶 · 翻译</text>
  </g>

  <g transform="translate(600, 440)">
    <rect x="-130" y="0" width="260" height="50" fill="#fff6df" stroke="#c84a3a" stroke-width="1.5" rx="6"/>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">AI还不能：</text>
    <text x="0" y="38" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">真正感动 · 创造 · 道德判断 · 爱</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="520" width="700" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6" opacity="0.85"/>
  <text x="400" y="542" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">技术是中性的——</text>
  <text x="400" y="562" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">未来的关键不是机器多聪明，而是人懂得用机器为善。</text>
</svg>
