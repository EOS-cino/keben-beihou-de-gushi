<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="月球引力与潮汐原理插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">钱塘江大潮的科学原理</text>
  <line x1="260" y1="58" x2="540" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 上半部分：月球引力与潮汐 -->
  <text x="400" y="88" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#3a6a9a">月球引力拉起海水</text>

  <!-- 地球 -->
  <circle cx="400" cy="230" r="60" fill="#5a9aba" stroke="#3a6a8a" stroke-width="2"/>
  <!-- 陆地 -->
  <path d="M370 210 Q385 200 400 210 Q415 215 425 205 Q420 225 405 230 Q390 235 375 225 Z" fill="#7aaa4a" opacity="0.8"/>
  <path d="M390 250 Q405 245 420 255 Q415 265 400 262 Z" fill="#7aaa4a" opacity="0.8"/>

  <!-- 潮汐隆起（朝月球方向） -->
  <ellipse cx="400" cy="160" rx="40" ry="18" fill="#7abaca" opacity="0.7"/>
  <ellipse cx="400" cy="300" rx="40" ry="18" fill="#7abaca" opacity="0.7"/>

  <!-- 月球 -->
  <circle cx="400" cy="110" r="22" fill="#f0e8c8" stroke="#c8b888" stroke-width="1.5"/>
  <circle cx="394" cy="105" r="4" fill="#d8d0b8" opacity="0.6"/>
  <circle cx="406" cy="115" r="3" fill="#d8d0b8" opacity="0.6"/>

  <!-- 引力线 -->
  <line x1="400" y1="132" x2="400" y2="178" stroke="#c8483a" stroke-width="2" stroke-dasharray="5,3"/>
  <path d="M395 175 L400 182 L405 175" fill="none" stroke="#c8483a" stroke-width="2"/>

  <!-- 太阳（左上角） -->
  <circle cx="100" cy="120" r="18" fill="#e8a838"/>
  <g stroke="#e8a838" stroke-width="2" stroke-linecap="round">
    <line x1="100" y1="90" x2="100" y2="82"/><line x1="100" y1="158" x2="100" y2="150"/>
    <line x1="72" y1="120" x2="64" y2="120"/><line x1="136" y1="120" x2="128" y2="120"/>
  </g>
  <!-- 太阳引力线 -->
  <line x1="118" y1="132" x2="345" y2="215" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- 标注：月球 -->
  <line x1="422" y1="110" x2="480" y2="95" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="470" y="78" width="70" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="505" y="97" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">月球</text>

  <!-- 标注：涨潮 -->
  <line x1="400" y1="160" x2="300" y2="140" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="225" y="120" width="90" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="270" y="139" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">海水隆起</text>

  <!-- 标注：引力 -->
  <line x1="400" y1="155" x2="560" y2="155" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="555" y="140" width="80" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="595" y="159" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">引力</text>

  <!-- 下半部分：喇叭口地形 -->
  <text x="400" y="358" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#3a6a9a">喇叭口地形让潮水堆高</text>

  <!-- 喇叭口地形 -->
  <path d="M50 400 L200 400 L350 480 L450 480 L600 400 L750 400 L750 540 L50 540 Z" fill="#5a8aaa" opacity="0.5" stroke="#3a6a8a" stroke-width="2"/>
  <!-- 江面 -->
  <path d="M50 400 L200 400 L350 480 L450 480 L600 400 L750 400" fill="none" stroke="#3a6a8a" stroke-width="2"/>

  <!-- 潮水箭头（从宽到窄） -->
  <g fill="#fff6df" stroke="#3a7a9a" stroke-width="1.5">
    <path d="M100 430 L150 430 L145 440 L165 435 L145 430 L150 420 Z" opacity="0.8"/>
    <path d="M180 430 L240 445 L235 452 L255 449 L235 445 L240 438 Z" opacity="0.8"/>
    <path d="M280 455 L340 470 L335 476 L355 474 L335 470 L340 464 Z" opacity="0.8"/>
  </g>

  <!-- 潮头（窄处堆高） -->
  <path d="M350 480 Q380 450 400 460 Q420 450 450 480" fill="#3a7a9a" stroke="#fff6df" stroke-width="2"/>
  <g fill="#fff6df">
    <path d="M380 460 Q378 450 385 448 Q388 455 385 460 Z"/>
    <path d="M420 458 Q418 448 425 446 Q428 453 425 458 Z"/>
  </g>

  <!-- 宽度标注 -->
  <line x1="50" y1="390" x2="750" y2="390" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="120" y="382" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">宽（外海）</text>
  <line x1="350" y1="490" x2="450" y2="490" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="505" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">窄（海宁）</text>

  <!-- 标注：喇叭口 -->
  <line x1="200" y1="400" x2="160" y2="370" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="90" y="348" width="100" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="140" y="367" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">喇叭口</text>

  <!-- 标注：潮水堆高 -->
  <line x1="400" y1="455" x2="500" y2="420" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="470" y="400" width="110" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="525" y="419" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">潮水堆高</text>

  <!-- 底部说明 -->
  <rect x="40" y="556" width="720" height="36" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="579" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">月球引力造成大潮，喇叭口地形把潮水越挤越高，两者结合形成钱塘江天下奇观。</text>
</svg>
