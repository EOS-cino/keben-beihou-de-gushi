<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="物候观察日记与自然信号插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：春天的物候信号</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="2"/>

  <!-- 左：观察日记本 -->
  <g transform="translate(60, 120)">
    <rect x="0" y="0" width="240" height="340" fill="#fff6df" stroke="#8d5a36" stroke-width="2.5" rx="6"/>
    <rect x="0" y="0" width="240" height="36" fill="#8d5a36" rx="6"/>
    <text x="120" y="24" text-anchor="middle" font-family="serif" font-size="16" fill="#fef9ed">物候观察日记</text>
    <!-- 横线 -->
    <g stroke="#c8843a" stroke-width="0.8" opacity="0.4">
      <line x1="20" y1="70" x2="220" y2="70"/>
      <line x1="20" y1="100" x2="220" y2="100"/>
      <line x1="20" y1="130" x2="220" y2="130"/>
      <line x1="20" y1="160" x2="220" y2="160"/>
      <line x1="20" y1="190" x2="220" y2="190"/>
      <line x1="20" y1="220" x2="220" y2="220"/>
      <line x1="20" y1="250" x2="220" y2="250"/>
      <line x1="20" y1="280" x2="220" y2="280"/>
      <line x1="20" y1="310" x2="220" y2="310"/>
    </g>
    <!-- 记录内容 -->
    <text x="20" y="62" font-family="serif" font-size="12" fill="#7a3b14">3月5日 惊蛰</text>
    <text x="20" y="92" font-family="serif" font-size="11" fill="#8d5a36">· 迎春花初开</text>
    <text x="20" y="122" font-family="serif" font-size="11" fill="#8d5a36">· 河冰已化</text>
    <text x="20" y="152" font-family="serif" font-size="12" fill="#7a3b14">3月20日 春分</text>
    <text x="20" y="182" font-family="serif" font-size="11" fill="#8d5a36">· 柳树发芽</text>
    <text x="20" y="212" font-family="serif" font-size="11" fill="#8d5a36">· 见第一只燕子</text>
    <text x="20" y="242" font-family="serif" font-size="12" fill="#7a3b14">4月5日 清明</text>
    <text x="20" y="272" font-family="serif" font-size="11" fill="#8d5a36">· 桃花盛开</text>
    <text x="20" y="302" font-family="serif" font-size="11" fill="#8d5a36">· 青蛙鸣叫</text>
  </g>

  <!-- 右：三个物候信号 -->
  <!-- 信号1：冰化 -->
  <g transform="translate(380, 110)">
    <rect x="0" y="0" width="160" height="100" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
    <text x="80" y="22" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">信号一：冰融</text>
    <!-- 冰块+水 -->
    <path d="M30 70 L70 68 L68 88 L32 90 Z" fill="#fef9ed" opacity="0.9" stroke="#7ab8d8" stroke-width="1.5"/>
    <path d="M30 88 Q50 92 70 88 L70 95 Q50 98 30 95 Z" fill="#a8d0e8" opacity="0.6"/>
    <circle cx="80" cy="80" r="2" fill="#7ab8d8" opacity="0.6"/>
    <circle cx="90" cy="85" r="1.5" fill="#7ab8d8" opacity="0.4"/>
    <text x="120" y="78" font-family="serif" font-size="10" fill="#8d5a36">七九</text>
    <text x="120" y="92" font-family="serif" font-size="10" fill="#8d5a36">河开</text>
  </g>

  <!-- 信号2：花开 -->
  <g transform="translate(560, 110)">
    <rect x="0" y="0" width="160" height="100" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
    <text x="80" y="22" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">信号二：花开</text>
    <!-- 迎春花 -->
    <rect x="78" y="50" width="4" height="35" fill="#4a6a2f"/>
    <circle cx="68" cy="55" r="6" fill="#e07856"/>
    <circle cx="88" cy="52" r="6" fill="#e07856"/>
    <circle cx="78" cy="45" r="6" fill="#e07856"/>
    <circle cx="72" cy="62" r="5" fill="#e07856"/>
    <!-- 桃花 -->
    <circle cx="40" cy="70" r="5" fill="#c84a3a" opacity="0.7"/>
    <circle cx="50" cy="78" r="5" fill="#c84a3a" opacity="0.7"/>
    <text x="115" y="78" font-family="serif" font-size="10" fill="#8d5a36">迎春</text>
    <text x="115" y="92" font-family="serif" font-size="10" fill="#8d5a36">先开</text>
  </g>

  <!-- 信号3：燕来 -->
  <g transform="translate(380, 240)">
    <rect x="0" y="0" width="340" height="100" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
    <text x="170" y="22" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">信号三：燕归</text>
    <!-- 燕子飞行轨迹 -->
    <path d="M30 70 Q100 50 170 65 Q240 80 310 60" fill="none" stroke="#7ab8d8" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- 燕子1 -->
    <g transform="translate(60, 62)">
      <path d="M0 0 Q8 -6 16 0 Q12 4 8 2 Q4 4 0 0" fill="#5a3a1a"/>
    </g>
    <!-- 燕子2 -->
    <g transform="translate(180, 65)">
      <path d="M0 0 Q10 -8 20 0 Q15 5 10 3 Q5 5 0 0" fill="#5a3a1a"/>
    </g>
    <!-- 燕子3 -->
    <g transform="translate(280, 60)">
      <path d="M0 0 Q8 -6 16 0 Q12 4 8 2 Q4 4 0 0" fill="#5a3a1a"/>
    </g>
    <text x="170" y="92" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">南方→北方，四月到京</text>
  </g>

  <!-- 竺可桢小像 -->
  <g transform="translate(380, 380)">
    <circle cx="30" cy="30" r="20" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M12 30 Q12 15 30 15 Q48 15 48 30" fill="#5a3a1a"/>
    <circle cx="24" cy="30" r="2" fill="#2a2a2a"/>
    <circle cx="36" cy="30" r="2" fill="#2a2a2a"/>
    <path d="M25 38 Q30 41 35 38" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M15 50 L12 100 L48 100 L45 50 Z" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="30" y="120" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">竺可桢</text>
    <text x="30" y="135" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">物候学开创者</text>
  </g>

  <!-- 进度条 -->
  <g transform="translate(460, 410)">
    <text x="0" y="0" font-family="serif" font-size="12" fill="#7a3b14">春天进度条：</text>
    <rect x="0" y="10" width="260" height="14" fill="#fff6df" stroke="#c8843a" rx="7"/>
    <rect x="2" y="12" width="180" height="10" fill="#6a8d3f" rx="5"/>
    <text x="0" y="42" font-family="serif" font-size="10" fill="#8d5a36">立春</text>
    <text x="85" y="42" font-family="serif" font-size="10" fill="#8d5a36">惊蛰</text>
    <text x="170" y="42" font-family="serif" font-size="10" fill="#8d5a36">清明</text>
    <text x="250" y="42" font-family="serif" font-size="10" fill="#8d5a36">谷雨</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="545" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.85"/>
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">冰融、花开、燕归——大自然用三个信号告诉你：春天到了。</text>
</svg>
