<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="寒号鸟真实身份复齿鼯鼠科普插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">寒号鸟到底是什么鸟</text>
  <line x1="250" y1="56" x2="550" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 标题：不是鸟！ -->
  <rect x="280" y="80" width="240" height="35" fill="#f5e0d8" stroke="#c84a3a" stroke-width="2" rx="6"/>
  <text x="400" y="103" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#c84a3a">寒号鸟其实不是鸟！</text>

  <!-- 左：传说形象 -->
  <g transform="translate(180,260)">
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">传说中的寒号鸟</text>
    <!-- 崖缝 -->
    <path d="M-60 80 L-50 -40 L-30 -30 L-10 -50 L10 -35 L30 -45 L50 -30 L60 80 Z" fill="#a89888" stroke="#8d5a36" stroke-width="2"/>
    <path d="M-15 80 L-12 -10 L12 -10 L15 80 Z" fill="#5a4a3a"/>
    <!-- 挨冻的寒号鸟 -->
    <g transform="translate(0,40)">
      <ellipse cx="0" cy="0" rx="16" ry="12" fill="#8d7a5a"/>
      <circle cx="0" cy="-12" r="9" fill="#8d7a5a"/>
      <circle cx="-3" cy="-13" r="1.5" fill="#1a1a1a"/>
      <circle cx="3" cy="-13" r="1.5" fill="#1a1a1a"/>
      <!-- 翅膀（鸟的样子） -->
      <ellipse cx="-14" cy="0" rx="8" ry="4" fill="#6a5a3a" transform="rotate(-20 -14 0)"/>
      <ellipse cx="14" cy="0" rx="8" ry="4" fill="#6a5a3a" transform="rotate(20 14 0)"/>
    </g>
    <text x="0" y="105" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">冬天崖缝里哀号</text>
    <text x="0" y="120" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a">"哆啰啰，冻死我"</text>
  </g>

  <!-- 等号/对比 -->
  <text x="400" y="240" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#c8843a">→ 真相是 →</text>

  <!-- 右：真实身份 -->
  <g transform="translate(600,260)">
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">真实的复齿鼯鼠</text>
    <!-- 悬崖 -->
    <path d="M-60 80 L-50 -40 L-30 -30 L-10 -50 L10 -35 L30 -45 L50 -30 L60 80 Z" fill="#a89888" stroke="#8d5a36" stroke-width="2"/>
    <!-- 鼯鼠（滑翔姿态） -->
    <g transform="translate(0,10)">
      <!-- 身体 -->
      <ellipse cx="0" cy="0" rx="20" ry="10" fill="#8d7a5a"/>
      <!-- 头 -->
      <circle cx="-18" cy="-3" r="9" fill="#8d7a5a"/>
      <circle cx="-21" cy="-5" r="1.5" fill="#1a1a1a"/>
      <!-- 耳朵 -->
      <ellipse cx="-22" cy="-12" rx="3" ry="5" fill="#6a5a3a"/>
      <!-- 皮膜（滑翔翼） -->
      <path d="M-15 2 Q-30 15 -35 25 Q-20 20 -10 8" fill="#a89868" opacity="0.7" stroke="#6a5a3a" stroke-width="1"/>
      <path d="M5 2 Q20 15 35 25 Q20 20 10 8" fill="#a89868" opacity="0.7" stroke="#6a5a3a" stroke-width="1"/>
      <!-- 尾巴 -->
      <ellipse cx="18" cy="3" rx="12" ry="4" fill="#8d7a5a"/>
      <!-- 腿 -->
      <line x1="-8" y1="8" x2="-10" y2="18" stroke="#6a5a3a" stroke-width="2"/>
      <line x1="8" y1="8" x2="10" y2="18" stroke="#6a5a3a" stroke-width="2"/>
    </g>
    <text x="0" y="105" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">会滑翔的啮齿动物</text>
    <text x="0" y="120" text-anchor="middle" font-family="serif" font-size="10" fill="#6a8d3f">前后肢间有皮膜</text>
  </g>

  <!-- 分隔线 -->
  <line x1="60" y1="410" x2="740" y2="410" stroke="#c8843a" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- 底部：特征对比 -->
  <text x="400" y="440" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">复齿鼯鼠的小档案</text>

  <g transform="translate(150,490)">
    <rect x="-70" y="-20" width="140" height="50" fill="#e8f5d8" stroke="#6a8d3f" stroke-width="1.5" rx="5"/>
    <text x="0" y="-2" text-anchor="middle" font-family="serif" font-size="12" fill="#4a6a2f">分类：松鼠科</text>
    <text x="0" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#4a6a2f">哺乳动物·非鸟类</text>
  </g>
  <g transform="translate(400,490)">
    <rect x="-70" y="-20" width="140" height="50" fill="#e8f5d8" stroke="#6a8d3f" stroke-width="1.5" rx="5"/>
    <text x="0" y="-2" text-anchor="middle" font-family="serif" font-size="12" fill="#4a6a2f">本领：皮膜滑翔</text>
    <text x="0" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#4a6a2f">能滑翔数十米</text>
  </g>
  <g transform="translate(650,490)">
    <rect x="-70" y="-20" width="140" height="50" fill="#e8f5d8" stroke="#6a8d3f" stroke-width="1.5" rx="5"/>
    <text x="0" y="-2" text-anchor="middle" font-family="serif" font-size="12" fill="#4a6a2f">习性：夜行穴居</text>
    <text x="0" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#4a6a2f">住崖缝·冬叫</text>
  </g>

  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">古人见它在崖间"飞"，误以为是鸟，其实它是会滑翔的鼯鼠</text>
</svg>
