<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="雪花形成过程与六角形结构科学故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">雪花是怎么长出来的</text>
  <line x1="240" y1="56" x2="560" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——天上开的小花，飞了那么远到你手里</text>

  <!-- 形成过程 -->
  <g transform="translate(0, 130)">
    <line x1="80" y1="60" x2="720" y2="60" stroke="#c8843a" stroke-width="2.5"/>
    <!-- 1 水汽 -->
    <g transform="translate(150, 60)">
      <circle cx="0" cy="0" r="6" fill="#4a90b8" opacity="0.7"/>
      <circle cx="-14" cy="-10" r="4" fill="#4a90b8" opacity="0.5"/>
      <circle cx="14" cy="-8" r="4" fill="#4a90b8" opacity="0.5"/>
      <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">云里水汽</text>
    </g>
    <!-- 2 冻成冰晶 -->
    <g transform="translate(330, 60)">
      <g stroke="#4a90b8" stroke-width="1.5" fill="none">
        <line x1="-8" y1="0" x2="8" y2="0"/>
        <line x1="0" y1="-8" x2="0" y2="8"/>
      </g>
      <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">冻成小冰晶</text>
    </g>
    <!-- 3 一层层长 -->
    <g transform="translate(510, 60)">
      <g stroke="#4a90b8" stroke-width="1.5" fill="none">
        <line x1="-12" y1="0" x2="12" y2="0"/>
        <line x1="0" y1="-12" x2="0" y2="12"/>
        <line x1="-9" y1="-9" x2="9" y2="9"/>
        <line x1="-9" y1="9" x2="9" y2="-9"/>
      </g>
      <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">一层层长大</text>
    </g>
    <!-- 4 落下 -->
    <g transform="translate(680, 60)">
      <g stroke="#4a90b8" stroke-width="2" fill="none">
        <line x1="-14" y1="0" x2="14" y2="0"/>
        <line x1="0" y1="-14" x2="0" y2="14"/>
        <line x1="-10" y1="-10" x2="10" y2="10"/>
        <line x1="-10" y1="10" x2="10" y2="-10"/>
        <circle cx="0" cy="0" r="3" fill="#fef9ed"/>
      </g>
      <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">飘落成雪</text>
    </g>
  </g>

  <!-- 六角形结构 -->
  <g transform="translate(220, 320)">
    <rect x="-150" y="0" width="300" height="180" rx="8" fill="#fef9ed" stroke="#4a90b8" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#4a90b8">为什么是六个角</text>
    <g transform="translate(0, 100)" stroke="#4a90b8" stroke-width="2" fill="none">
      <line x1="-50" y1="0" x2="50" y2="0"/>
      <line x1="-25" y1="-43" x2="25" y2="43"/>
      <line x1="25" y1="-43" x2="-25" y2="43"/>
      <!-- 水分子小点 -->
      <circle cx="-40" cy="0" r="3" fill="#e07856"/>
      <circle cx="40" cy="0" r="3" fill="#e07856"/>
      <circle cx="-20" cy="-35" r="3" fill="#e07856"/>
      <circle cx="20" cy="-35" r="3" fill="#e07856"/>
      <circle cx="-20" cy="35" r="3" fill="#e07856"/>
      <circle cx="20" cy="35" r="3" fill="#e07856"/>
    </g>
    <text x="0" y="170" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">水分子按六角形排队</text>
  </g>

  <!-- 雪花本特利 -->
  <g transform="translate(580, 320)">
    <rect x="-150" y="0" width="300" height="180" rx="8" fill="#fef9ed" stroke="#2d6a4f" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#2d6a4f">"雪花本特利"</text>
    <g transform="translate(0, 90)" stroke="#4a90b8" stroke-width="1.5" fill="none">
      <line x1="-30" y1="0" x2="30" y2="0"/>
      <line x1="0" y1="-30" x2="0" y2="30"/>
      <line x1="-21" y1="-21" x2="21" y2="21"/>
      <line x1="-21" y1="21" x2="21" y2="-21"/>
      <path d="M-30 0 L-20 -8 M30 0 L20 -8" />
      <path d="M-30 0 L-20 8 M30 0 L20 8" />
    </g>
    <!-- 相机 -->
    <g transform="translate(-90, 80)">
      <rect x="-12" y="-8" width="24" height="16" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="0" r="5" fill="#7a3b14"/>
    </g>
    <text x="0" y="150" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">一辈子拍几千张雪花照</text>
    <text x="0" y="166" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">没有两片一模一样</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 530)">
    <rect x="-300" y="0" width="600" height="50" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">盖被子 · 除虫 · 浇水：一场大雪等于三件事一起办</text>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">每一片雪花都是一朵天上开的小花</text>
  </g>
</svg>
