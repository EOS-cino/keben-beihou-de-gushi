<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠小故事：快与慢的故事">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：快与慢的故事</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">不快不慢，刚刚好</text>
  <g transform="translate(150,290)">
    <ellipse cx="-20" cy="20" rx="18" ry="10" fill="#7fb85a" stroke="#4a8b3a" stroke-width="2"/>
    <circle cx="15" cy="10" r="12" fill="#f4c77a" stroke="#c98a3a" stroke-width="2"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="13" fill="#4a8b3a">龟兔赛跑</text>
  </g>
  <g transform="translate(330,290)">
    <circle cx="0" cy="10" r="12" fill="#f4c77a" stroke="#c98a3a" stroke-width="2"/>
    <path d="M0,22 L0,45 M-8,35 L0,45 L8,35" stroke="#c98a3a" stroke-width="2" fill="none"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="13" fill="#a8742a">悟空急跑</text>
  </g>
  <g transform="translate(510,290)">
    <circle cx="0" cy="10" r="12" fill="#d8e8d8" stroke="#5a8b5a" stroke-width="2"/>
    <path d="M0,22 L0,45" stroke="#5a8b5a" stroke-width="2"/>
    <path d="M-10,30 Q0,25 10,30" stroke="#5a8b5a" stroke-width="2" fill="none"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="13" fill="#5a8b5a">唐僧慢行</text>
  </g>
  <g transform="translate(670,290)">
    <rect x="-12" y="0" width="24" height="30" rx="4" fill="#cfe8f0" stroke="#5a8fa3" stroke-width="2"/>
    <line x1="-6" y1="10" x2="6" y2="10" stroke="#5a8fa3" stroke-width="1"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="13" fill="#5a8fa3">裁缝未裁</text>
  </g>
  <text x="400" y="460" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">把握分寸，刚刚好</text>
</svg>
