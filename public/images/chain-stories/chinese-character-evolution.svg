<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="汉字从甲骨文到楷书的演变插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：汉字的演变历程</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="2"/>

  <!-- 以"日""月""山"三字为例展示演变 -->
  <!-- 列标题 -->
  <text x="180" y="100" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">甲骨文</text>
  <text x="320" y="100" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">金文</text>
  <text x="460" y="100" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">小篆</text>
  <text x="600" y="100" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">楷书</text>

  <!-- 箭头 -->
  <g stroke="#c8843a" stroke-width="2" fill="#c8843a">
    <line x1="220" y1="95" x2="280" y2="95"/>
    <polygon points="280,95 272,91 272,99"/>
    <line x1="360" y1="95" x2="420" y2="95"/>
    <polygon points="420,95 412,91 412,99"/>
    <line x1="500" y1="95" x2="560" y2="95"/>
    <polygon points="560,95 552,91 552,99"/>
  </g>

  <!-- 第一行：日 -->
  <text x="100" y="170" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14">日</text>
  <!-- 甲骨文 日：圆圈加点 -->
  <g transform="translate(180, 160)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="4" fill="#7a3b14"/>
  </g>
  <!-- 金文 日 -->
  <g transform="translate(320, 160)">
    <ellipse cx="0" cy="0" rx="20" ry="22" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="4" fill="#7a3b14"/>
  </g>
  <!-- 小篆 日 -->
  <g transform="translate(460, 160)">
    <rect x="-18" y="-20" width="36" height="40" rx="8" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#7a3b14" stroke-width="2.5"/>
  </g>
  <!-- 楷书 日 -->
  <g transform="translate(600, 160)">
    <rect x="-18" y="-20" width="36" height="40" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#7a3b14" stroke-width="2.5"/>
    <line x1="-18" y1="-7" x2="18" y2="-7" stroke="#7a3b14" stroke-width="1.5" opacity="0.4"/>
    <line x1="-18" y1="7" x2="18" y2="7" stroke="#7a3b14" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- 第二行：月 -->
  <text x="100" y="270" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14">月</text>
  <!-- 甲骨文 月：弯月形 -->
  <g transform="translate(180, 260)">
    <path d="M-5 -22 Q-20 -10 -18 5 Q-15 20 -5 22" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <path d="M-5 -22 Q5 -10 3 5 Q0 20 -5 22" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <line x1="-10" y1="-5" x2="-2" y2="-5" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <!-- 金文 月 -->
  <g transform="translate(320, 260)">
    <path d="M0 -22 Q-18 -10 -15 5 Q-12 20 0 22 Q5 15 3 0 Q2 -12 0 -22" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <line x1="-8" y1="-5" x2="0" y2="-5" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <!-- 小篆 月 -->
  <g transform="translate(460, 260)">
    <path d="M5 -20 Q-15 -10 -12 5 Q-10 20 5 22" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <path d="M5 -20 Q12 -10 10 5 Q8 20 5 22" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <line x1="-5" y1="-5" x2="5" y2="-5" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-5" y1="8" x2="5" y2="8" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <!-- 楷书 月 -->
  <g transform="translate(600, 260)">
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="32" fill="#7a3b14" font-weight="bold">月</text>
  </g>

  <!-- 第三行：山 -->
  <text x="100" y="380" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14">山</text>
  <!-- 甲骨文 山：三峰 -->
  <g transform="translate(180, 370)">
    <path d="M-22 15 L-15 -10 L-8 15 M-8 15 L0 -18 L8 15 M8 15 L15 -10 L22 15" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <line x1="-22" y1="15" x2="22" y2="15" stroke="#7a3b14" stroke-width="2.5"/>
  </g>
  <!-- 金文 山 -->
  <g transform="translate(320, 370)">
    <path d="M-20 18 L-12 -8 L-4 18 M-4 18 L4 -15 L12 18 M12 18 L20 -8 L20 18" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <line x1="-20" y1="18" x2="20" y2="18" stroke="#7a3b14" stroke-width="2.5"/>
  </g>
  <!-- 小篆 山 -->
  <g transform="translate(460, 370)">
    <path d="M-18 18 L-18 -5 L-10 -15 L-2 -5 L-2 18 M-2 18 L-2 -10 L6 -20 L14 -10 L14 18" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <line x1="-18" y1="18" x2="14" y2="18" stroke="#7a3b14" stroke-width="2.5"/>
  </g>
  <!-- 楷书 山 -->
  <g transform="translate(600, 370)">
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="32" fill="#7a3b14" font-weight="bold">山</text>
  </g>

  <!-- 时间标注 -->
  <text x="180" y="460" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">商·约3300年前</text>
  <text x="320" y="460" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">周·约3000年前</text>
  <text x="460" y="460" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">秦·约2200年前</text>
  <text x="600" y="460" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">汉至今</text>

  <!-- 底部说明 -->
  <rect x="50" y="500" width="700" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6" opacity="0.85"/>
  <text x="400" y="525" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">从甲骨文的"画"到楷书的"字"，</text>
  <text x="400" y="548" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">形状在变，意思没变——这就是汉字活了三千年的秘密。</text>
</svg>
