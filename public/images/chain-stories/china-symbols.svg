  <text x="400" y="350" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">天安门 齿轮</text>
  <text x="400" y="370" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">麦穗 金星</text>
  <text x="620" y="350" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">起来 不愿做</text>
  <text x="620" y="370" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">奴隶的人们</text>
  <text x="400" y="510" text-anchor="middle" font-family="serif" font-size="18" fill="#c84a3a">祖国的三张名片</text>
  <text x="400" y="540" text-anchor="middle" font-family="serif" font-size="16" fill="#4a6a2f">每个中国人都应该认识</text>
