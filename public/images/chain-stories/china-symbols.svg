  <polygon points="390,165 395,175 405,175 397,180 400,190 390,184 380,190 383,180 375,175 385,175" fill="#c8843a" opacity="0.5"/>
  <polygon points="415,165 418,173 426,173 420,178 422,186 415,181 408,186 410,178 404,173 412,173" fill="#c8843a" opacity="0.5"/>
  <path d="M370 200 Q385 210 400 205 Q415 200 430 210" stroke="#c8843a" stroke-width="2" fill="none"/>
  <circle cx="360" cy="200" r="8" fill="#8d5a36" opacity="0.3"/>
