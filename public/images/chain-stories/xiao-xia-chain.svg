<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="池塘里各种小生命的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：池塘里的小生命</text>
  <line x1="200" y1="62" x2="600" y2="62" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 池塘水面 -->
  <ellipse cx="400" cy="350" rx="350" ry="180" fill="#a8d0e8" opacity="0.3"/>
  <ellipse cx="400" cy="350" rx="340" ry="170" fill="#7ab8d8" opacity="0.2"/>

  <!-- 水面波纹 -->
  <path d="M100 300 Q200 295 300 300 Q400 305 500 300 Q600 295 700 300" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <path d="M150 380 Q250 375 350 380 Q450 385 550 380 Q650 375 700 380" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>

  <!-- 池塘边水草 -->
  <path d="M80 450 Q85 400 82 370" fill="none" stroke="#2d6a4f" stroke-width="3"/>
  <path d="M90 450 Q95 410 92 380" fill="none" stroke="#2d6a4f" stroke-width="2"/>
  <path d="M720 450 Q715 400 718 370" fill="none" stroke="#2d6a4f" stroke-width="3"/>
  <path d="M710 450 Q705 410 708 380" fill="none" stroke="#2d6a4f" stroke-width="2"/>

  <!-- 荷叶 -->
  <ellipse cx="150" cy="280" rx="40" ry="15" fill="#2d6a4f" opacity="0.6" stroke="#1a4a3a" stroke-width="1.5"/>
  <path d="M150 280 L130 270" fill="none" stroke="#1a4a3a" stroke-width="1"/>
  <ellipse cx="650" cy="290" rx="35" ry="13" fill="#2d6a4f" opacity="0.6" stroke="#1a4a3a" stroke-width="1.5"/>

  <!-- 1. 水黾（水面滑行） -->
  <g transform="translate(300, 280)">
    <ellipse cx="0" cy="0" rx="8" ry="3" fill="#3a2a1a" stroke="#7a3b14" stroke-width="1"/>
    <!-- 长腿 -->
    <line x1="-5" y1="0" x2="-18" y2="-8" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-5" y1="2" x2="-18" y2="8" stroke="#7a3b14" stroke-width="1"/>
    <line x1="5" y1="0" x2="18" y2="-8" stroke="#7a3b14" stroke-width="1"/>
    <line x1="5" y1="2" x2="18" y2="8" stroke="#7a3b14" stroke-width="1"/>
    <!-- 水面凹痕 -->
    <ellipse cx="0" cy="5" rx="15" ry="3" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.5"/>
    <text x="0" y="25" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">水黾</text>
  </g>

  <!-- 2. 蝌蚪 -->
  <g transform="translate(200, 380)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 尾巴 -->
    <path d="M-10 0 Q-25 -3 -30 0 Q-25 3 -10 0" fill="#3a3a3a" opacity="0.7"/>
    <!-- 眼睛 -->
    <circle cx="5" cy="-2" r="2" fill="#ffffff"/>
    <circle cx="5" cy="-2" r="1" fill="#2a2a2a"/>
    <text x="0" y="25" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">蝌蚪</text>
  </g>

  <!-- 3. 螺蛳 -->
  <g transform="translate(550, 420)">
    <!-- 螺壳 -->
    <path d="M0 0 Q-15 -5 -15 -15 Q-15 -25 0 -25 Q15 -25 15 -15 Q15 -5 5 0" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-5 -10 Q-10 -12 -10 -17 Q-10 -22 -3 -22 Q5 -22 5 -17 Q5 -12 0 -10" fill="none" stroke="#5a3a1a" stroke-width="1"/>
    <!-- 身体伸出 -->
    <ellipse cx="10" cy="-3" rx="6" ry="3" fill="#e8d5b0" stroke="#7a3b14" stroke-width="1"/>
    <text x="0" y="15" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">螺蛳</text>
  </g>

  <!-- 4. 水虿（蜻蜓幼虫） -->
  <g transform="translate(450, 350)">
    <ellipse cx="0" cy="0" rx="14" ry="7" fill="#3d8a5f" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 头 -->
    <ellipse cx="-12" cy="0" rx="6" ry="5" fill="#3d8a5f" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 弹射嘴 -->
    <path d="M-18 0 L-25 -3 L-18 3" fill="#3d8a5f" stroke="#7a3b14" stroke-width="1"/>
    <!-- 眼睛 -->
    <circle cx="-14" cy="-2" r="1.5" fill="#2a2a2a"/>
    <!-- 尾巴 -->
    <rect x="10" y="-2" width="15" height="4" fill="#3d8a5f" stroke="#7a3b14" stroke-width="1"/>
    <text x="0" y="20" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">水虿</text>
  </g>

  <!-- 5. 小虾 -->
  <g transform="translate(350, 430)">
    <path d="M0 0 Q8 -3 14 0 Q18 5 14 10 Q8 13 0 10 Q-3 5 0 0" fill="#e8a838" opacity="0.7" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-3 2 L-12 -3 L-10 5 L-12 8 Z" fill="#e8a838" opacity="0.7" stroke="#7a3b14" stroke-width="1"/>
    <line x1="14" y1="3" x2="28" y2="-5" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
    <line x1="14" y1="7" x2="28" y2="12" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
    <circle cx="12" cy="3" r="1.5" fill="#2a2a2a"/>
    <text x="5" y="25" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">小虾</text>
  </g>

  <!-- 6. 蜻蜓（飞在上方） -->
  <g transform="translate(600, 200)">
    <ellipse cx="0" cy="0" rx="10" ry="3" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 翅膀 -->
    <ellipse cx="-3" cy="-8" rx="12" ry="3" fill="#ffffff" opacity="0.6" stroke="#7a3b14" stroke-width="1" transform="rotate(-15 -3 -8)"/>
    <ellipse cx="3" cy="-8" rx="12" ry="3" fill="#ffffff" opacity="0.6" stroke="#7a3b14" stroke-width="1" transform="rotate(15 3 -8)"/>
    <ellipse cx="-3" cy="8" rx="10" ry="3" fill="#ffffff" opacity="0.5" stroke="#7a3b14" stroke-width="1" transform="rotate(15 -3 8)"/>
    <ellipse cx="3" cy="8" rx="10" ry="3" fill="#ffffff" opacity="0.5" stroke="#7a3b14" stroke-width="1" transform="rotate(-15 3 8)"/>
    <!-- 头 -->
    <circle cx="-10" cy="0" r="3" fill="#4a90b8" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-12" cy="-1" r="1.5" fill="#2a2a2a"/>
    <text x="0" y="25" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">蜻蜓</text>
  </g>

  <!-- 标题标注 -->
  <rect x="280" y="100" width="240" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.9"/>
  <text x="400" y="126" text-anchor="middle" font-size="16" font-weight="bold" fill="#7a3b14" font-family="serif">一个池塘 = 一个微缩世界</text>

  <!-- 底部说明 -->
  <rect x="50" y="540" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="565" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">水黾、蝌蚪、螺蛳、水虿、小虾……每一种小生命都有自己的角色，构成完整的生态。</text>
</svg>
