<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="中国科学家群像插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：中国科学家的故事</text>
  <line x1="190" y1="62" x2="610" y2="62" stroke="#4a6a2f" stroke-width="2"/>

  <!-- 地面 -->
  <rect x="0" y="500" width="800" height="100" fill="#e8d9b8"/>

  <!-- 中心主题 -->
  <rect x="260" y="95" width="280" height="50" fill="#fff6df" stroke="#4a6a2f" stroke-width="2" rx="8"/>
  <text x="400" y="120" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#4a6a2f">不怕苦·不怕失败·报效祖国</text>
  <text x="400" y="137" text-anchor="middle" font-family="serif" font-size="11" fill="#6a8d3f">科学没有国界，科学家有祖国</text>

  <!-- 钱学森（左） -->
  <g>
    <line x1="320" y1="145" x2="160" y2="190" stroke="#4a6a2f" stroke-width="1.5" stroke-dasharray="5,4"/>
    <rect x="50" y="190" width="220" height="170" fill="#fff6df" stroke="#4a6a2f" rx="6"/>
    <text x="160" y="212" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#4a6a2f">钱学森</text>
    <text x="160" y="228" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">"中国航天之父"</text>
    <!-- 火箭 -->
    <g transform="translate(160 270)">
      <path d="M0 -25 L8 -10 L8 15 L-8 15 L-8 -10 Z" fill="#c84a3a" stroke="#8d2a1a" stroke-width="1"/>
      <path d="M-8 10 L-15 20 L-8 15 Z" fill="#c8843a"/>
      <path d="M8 10 L15 20 L8 15 Z" fill="#c8843a"/>
      <circle cx="0" cy="-5" r="3" fill="#a8d0e8"/>
      <!-- 火焰 -->
      <path d="M-5 15 L0 28 L5 15" fill="#f4c842"/>
      <path d="M-3 15 L0 22 L3 15" fill="#e07856"/>
    </g>
    <text x="160" y="320" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">被软禁5年·坚持回国</text>
    <text x="160" y="335" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">从零开始研制导弹火箭</text>
    <text x="160" y="350" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">让中国航天从无到有</text>
  </g>

  <!-- 袁隆平（中） -->
  <g>
    <line x1="400" y1="145" x2="400" y2="190" stroke="#4a6a2f" stroke-width="1.5" stroke-dasharray="5,4"/>
    <rect x="290" y="190" width="220" height="170" fill="#fff6df" stroke="#6a8d3f" rx="6"/>
    <text x="400" y="212" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#4a6a2f">袁隆平</text>
    <text x="400" y="228" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">"杂交水稻之父"</text>
    <!-- 稻穗 -->
    <g transform="translate(400 275)">
      <path d="M0 25 Q-2 0 -8 -20" stroke="#6a8d3f" stroke-width="2" fill="none"/>
      <path d="M0 25 Q2 0 8 -20" stroke="#6a8d3f" stroke-width="2" fill="none"/>
      <path d="M0 25 Q0 0 0 -22" stroke="#6a8d3f" stroke-width="2" fill="none"/>
      <!-- 稻粒 -->
      <g fill="#f4c842">
        <ellipse cx="-8" cy="-20" rx="2" ry="4"/>
        <ellipse cx="-5" cy="-15" rx="2" ry="4"/>
        <ellipse cx="0" cy="-22" rx="2" ry="4"/>
        <ellipse cx="5" cy="-15" rx="2" ry="4"/>
        <ellipse cx="8" cy="-20" rx="2" ry="4"/>
        <ellipse cx="-3" cy="-10" rx="2" ry="4"/>
        <ellipse cx="3" cy="-10" rx="2" ry="4"/>
      </g>
    </g>
    <text x="400" y="320" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">泡在稻田里·顶着烈日</text>
    <text x="400" y="335" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">培育高产杂交水稻</text>
    <text x="400" y="350" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">让几亿人不再挨饿</text>
  </g>

  <!-- 屠呦呦（右） -->
  <g>
    <line x1="480" y1="145" x2="640" y2="190" stroke="#4a6a2f" stroke-width="1.5" stroke-dasharray="5,4"/>
    <rect x="530" y="190" width="220" height="170" fill="#fff6df" stroke="#c8843a" rx="6"/>
    <text x="640" y="212" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#8d5a36">屠呦呦</text>
    <text x="640" y="228" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">诺贝尔奖·青蒿素</text>
    <!-- 青蒿+试管 -->
    <g transform="translate(640 275)">
      <!-- 青蒿叶 -->
      <path d="M-15 20 Q-20 0 -15 -20" stroke="#6a8d3f" stroke-width="2" fill="none"/>
      <ellipse cx="-22" cy="-5" rx="5" ry="10" fill="#6a8d3f" transform="rotate(-30 -22 -5)"/>
      <ellipse cx="-22" cy="10" rx="5" ry="8" fill="#6a8d3f" transform="rotate(-30 -22 10)"/>
      <!-- 试管 -->
      <path d="M5 -15 L5 15 Q5 22 12 22 Q19 22 19 15 L19 -15" fill="none" stroke="#a8a8a8" stroke-width="1.5"/>
      <path d="M7 5 L17 5 L17 15 Q17 20 12 20 Q7 20 7 15 Z" fill="#6a8d3f" opacity="0.5"/>
      <!-- 诺奖奖章 -->
      <circle cx="30" cy="-5" r="10" fill="#f4c842" stroke="#c8843a" stroke-width="1.5"/>
      <text x="30" y="-1" text-anchor="middle" font-family="serif" font-size="7" fill="#8d5a36">诺</text>
    </g>
    <text x="640" y="320" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">从中医古籍找灵感</text>
    <text x="640" y="335" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">以身试药·默默无闻几十年</text>
    <text x="640" y="350" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">挽救数百万疟疾患者</text>
  </g>

  <!-- 底部共同品质 -->
  <g>
    <rect x="100" y="390" width="600" height="70" fill="#fff6df" stroke="#4a6a2f" stroke-width="1.5" rx="8"/>
    <text x="400" y="415" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">三位科学家的共同品质</text>
    <g>
      <rect x="130" y="428" width="120" height="24" fill="#fff" stroke="#4a6a2f" rx="4"/>
      <text x="190" y="444" text-anchor="middle" font-family="serif" font-size="11" fill="#4a6a2f">不怕苦不怕失败</text>
      <rect x="280" y="428" width="120" height="24" fill="#fff" stroke="#4a6a2f" rx="4"/>
      <text x="340" y="444" text-anchor="middle" font-family="serif" font-size="11" fill="#4a6a2f">不为名利</text>
      <rect x="430" y="428" width="120" height="24" fill="#fff" stroke="#4a6a2f" rx="4"/>
      <text x="490" y="444" text-anchor="middle" font-family="serif" font-size="11" fill="#4a6a2f">报效祖国</text>
      <rect x="580" y="428" width="100" height="24" fill="#fff" stroke="#4a6a2f" rx="4"/>
      <text x="630" y="444" text-anchor="middle" font-family="serif" font-size="11" fill="#4a6a2f">一辈子一件事</text>
    </g>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="14" fill="#4a6a2f">钱学森造火箭上天，袁隆平种水稻饱人，屠呦呦制药救人——科学家的祖国在心中</text>
</svg>
