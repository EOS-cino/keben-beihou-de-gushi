<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="蜜蜂跳八字舞、狼嚎叫、大象用次声波交流的对比画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 三格分割 -->
  <line x1="270" y1="90" x2="270" y2="540" stroke="#8d5a36" stroke-width="1.5" opacity="0.2"/>
  <line x1="530" y1="90" x2="530" y2="540" stroke="#8d5a36" stroke-width="1.5" opacity="0.2"/>
  <!-- 第一格：蜜蜂跳八字舞 -->
  <g transform="translate(135,280)">
    <!-- 蜂巢六边形 -->
    <g fill="#f4b942" opacity="0.3" stroke="#8d5a36" stroke-width="1">
      <polygon points="-60,-60 -40,-70 -20,-60 -20,-40 -40,-30 -60,-40"/>
      <polygon points="-20,-60 0,-70 20,-60 20,-40 0,-30 -20,-40"/>
      <polygon points="20,-60 40,-70 60,-60 60,-40 40,-30 20,-40"/>
      <polygon points="-60,-40 -40,-30 -20,-40 -20,-20 -40,-10 -60,-20"/>
      <polygon points="20,-40 40,-30 60,-20 60,0 40,10 20,0"/>
    </g>
    <!-- 八字舞轨迹 -->
    <path d="M0 20 Q-30 -10 -30 -40 Q-30 -60 0 -50 Q30 -60 30 -40 Q30 -10 0 20" stroke="#c84a3a" stroke-width="2.5" fill="none" stroke-dasharray="5,3"/>
    <!-- 蜜蜂 -->
    <g transform="translate(0,20)">
      <ellipse cx="0" cy="0" rx="8" ry="5" fill="#f4b942"/>
      <rect x="-6" y="-3" width="3" height="6" fill="#2d2a24"/>
      <rect x="0" y="-3" width="3" height="6" fill="#2d2a24"/>
      <ellipse cx="-3" cy="-4" rx="5" ry="3" fill="#ffffff" opacity="0.6"/>
      <ellipse cx="3" cy="-4" rx="5" ry="3" fill="#ffffff" opacity="0.6"/>
    </g>
    <!-- 花朵指示 -->
    <g transform="translate(50,-50)">
      <circle cx="0" cy="0" r="6" fill="#e07856"/>
      <circle cx="0" cy="0" r="3" fill="#f4b942"/>
    </g>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">蜜蜂跳舞</text>
    <text x="0" y="98" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36" opacity="0.7">告诉同伴花蜜在哪</text>
  </g>
  <!-- 第二格：狼嚎叫 -->
  <g transform="translate(400,280)">
    <!-- 月亮 -->
    <circle cx="50" cy="-60" r="18" fill="#fef9ed" opacity="0.6"/>
    <!-- 山 -->
    <path d="M-80 40 L-40 -10 L0 30 L40 -20 L80 40 Z" fill="#4a6a2f" opacity="0.4"/>
    <!-- 狼 -->
    <g transform="translate(-20,20)">
      <!-- 身体 -->
      <ellipse cx="0" cy="10" rx="25" ry="15" fill="#8d8680"/>
      <!-- 头（仰起嚎叫） -->
      <ellipse cx="-15" cy="-10" rx="12" ry="10" fill="#8d8680" transform="rotate(-30 -15 -10)"/>
      <!-- 耳朵 -->
      <path d="M-22 -20 L-25 -28 L-18 -22" fill="#8d8680" transform="rotate(-30 -15 -10)"/>
      <path d="M-12 -22 L-10 -30 L-8 -22" fill="#8d8680" transform="rotate(-30 -15 -10)"/>
      <!-- 嘴（张开嚎叫） -->
      <path d="M-25 -8 L-30 -12 L-28 -4" fill="#2d2a24" transform="rotate(-30 -15 -10)"/>
      <!-- 尾巴 -->
      <path d="M20 5 Q35 -5 30 -15" stroke="#8d8680" stroke-width="6" fill="none"/>
      <!-- 腿 -->
      <rect x="-12" y="22" width="5" height="15" fill="#8d8680"/>
      <rect x="8" y="22" width="5" height="15" fill="#8d8680"/>
    </g>
    <!-- 声波 -->
    <g stroke="#7a3b14" stroke-width="1.5" fill="none" opacity="0.4">
      <path d="M-45 -20 Q-55 -25 -50 -35"/>
      <path d="M-55 -25 Q-70 -30 -65 -45"/>
      <path d="M-65 -35 Q-85 -40 -80 -55"/>
    </g>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">狼嚎叫</text>
    <text x="0" y="98" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36" opacity="0.7">声音传几公里远</text>
  </g>
  <!-- 第三格：大象次声波 -->
  <g transform="translate(665,280)">
    <!-- 地面 -->
    <path d="M-80 50 Q0 45 80 50 L80 80 L-80 80 Z" fill="#8d5a36" opacity="0.2"/>
    <!-- 大象 -->
    <g transform="translate(-10,10)">
      <!-- 身体 -->
      <ellipse cx="0" cy="0" rx="30" ry="22" fill="#a09080"/>
      <!-- 头 -->
      <circle cx="-25" cy="-5" r="18" fill="#a09080"/>
      <!-- 耳朵 -->
      <ellipse cx="-30" cy="-10" rx="12" ry="15" fill="#a09080" transform="rotate(-20 -30 -10)"/>
      <!-- 鼻子 -->
      <path d="M-38 -5 Q-45 10 -40 25 Q-35 30 -30 25" stroke="#a09080" stroke-width="8" fill="none"/>
      <!-- 腿 -->
      <rect x="-15" y="18" width="8" height="20" fill="#a09080"/>
      <rect x="5" y="18" width="8" height="20" fill="#a09080"/>
      <!-- 尾巴 -->
      <path d="M28 5 Q38 10 35 20" stroke="#a09080" stroke-width="3" fill="none"/>
      <!-- 眼睛 -->
      <circle cx="-28" cy="-8" r="2" fill="#2d2a24"/>
    </g>
    <!-- 次声波（地面传播） -->
    <g stroke="#c84a3a" stroke-width="2" fill="none" opacity="0.3">
      <path d="M-10 35 Q-30 38 -50 35 Q-70 38 -80 35"/>
      <path d="M-10 42 Q-30 45 -50 42 Q-70 45 -80 42"/>
      <path d="M-10 49 Q-30 52 -50 49 Q-70 52 -80 49"/>
    </g>
    <!-- 远处的大象（收到信号） -->
    <g transform="translate(55,30)" opacity="0.5">
      <ellipse cx="0" cy="0" rx="12" ry="9" fill="#a09080"/>
      <circle cx="-10" cy="-2" r="7" fill="#a09080"/>
    </g>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">大象次声波</text>
    <text x="0" y="98" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36" opacity="0.7">地面传十几公里</text>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">动物之间怎么交流</text>
</svg>
