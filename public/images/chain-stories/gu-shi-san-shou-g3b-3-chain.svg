<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠小故事：古诗里的三个节日">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：古诗里的三个节日</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">一本中国人的“岁时记”</text>
  <g transform="translate(130,300)">
    <rect x="-40" y="-30" width="80" height="70" rx="6" fill="#c0392b" stroke="#7a1a1a" stroke-width="2"/>
    <text x="0" y="10" text-anchor="middle" font-family="serif" font-size="16" fill="#fff">春节</text>
  </g>
  <g transform="translate(270,300)">
    <rect x="-40" y="-30" width="80" height="70" rx="6" fill="#7fb8d8" stroke="#2a5a7a" stroke-width="2"/>
    <text x="0" y="10" text-anchor="middle" font-family="serif" font-size="16" fill="#fff">清明</text>
  </g>
  <g transform="translate(410,300)">
    <rect x="-40" y="-30" width="80" height="70" rx="6" fill="#5a8a3a" stroke="#3a6b2a" stroke-width="2"/>
    <text x="0" y="10" text-anchor="middle" font-family="serif" font-size="16" fill="#fff">端午</text>
  </g>
  <g transform="translate(550,300)">
    <rect x="-40" y="-30" width="80" height="70" rx="6" fill="#e8a0b0" stroke="#a85a6a" stroke-width="2"/>
    <text x="0" y="10" text-anchor="middle" font-family="serif" font-size="16" fill="#fff">七夕</text>
  </g>
  <g transform="translate(690,300)">
    <rect x="-40" y="-30" width="80" height="70" rx="6" fill="#e8b94a" stroke="#c98a3a" stroke-width="2"/>
    <text x="0" y="10" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">中秋</text>
  </g>
  <text x="410" y="400" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">一年到头，都有诗相伴</text>
</svg>
