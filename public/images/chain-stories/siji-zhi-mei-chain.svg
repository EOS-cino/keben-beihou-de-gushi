<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="清少纳言与枕草子插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：清少纳言与《枕草子》</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左侧：清少纳言与皇后对话 -->
  <g transform="translate(170, 240)">
    <text x="0" y="-85" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">宫廷问答</text>
    <!-- 皇后 -->
    <g transform="translate(-50, -30)">
      <circle cx="0" cy="0" r="14" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
      <path d="M-10 -8 Q0 -18 10 -8" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-4" cy="-2" r="1.5" fill="#2a2a2a"/>
      <circle cx="4" cy="-2" r="1.5" fill="#2a2a2a"/>
      <path d="M-3 5 Q0 7 3 5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 十二单衣 -->
      <path d="M-18 12 L-22 50 L22 50 L18 12 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-15 12 L-18 45 L18 45 L15 12 Z" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <!-- 清少纳言 -->
    <g transform="translate(50, -30)">
      <circle cx="0" cy="0" r="14" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
      <path d="M-10 -8 Q0 -16 10 -8" fill="#2a2a2a" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-4" cy="-2" r="1.5" fill="#2a2a2a"/>
      <circle cx="4" cy="-2" r="1.5" fill="#2a2a2a"/>
      <path d="M-3 5 Q0 7 3 5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 衣服 -->
      <path d="M-16 12 L-20 50 L20 50 L16 12 Z" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <!-- 对话气泡 -->
    <rect x="-90" y="55" width="180" height="30" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">"春天和秋天，哪个更好？"</text>
  </g>

  <!-- 中间：枕草子书 -->
  <g transform="translate(400, 240)">
    <text x="0" y="-85" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">枕草子</text>
    <!-- 和风书本 -->
    <rect x="-50" y="-50" width="100" height="100" fill="#fff8e0" stroke="#7a3b14" stroke-width="2.5" rx="3"/>
    <!-- 装订线 -->
    <line x1="-50" y1="-25" x2="50" y2="-25" stroke="#c8843a" stroke-width="1"/>
    <line x1="-50" y1="25" x2="50" y2="25" stroke="#c8843a" stroke-width="1"/>
    <!-- 文字行 -->
    <line x1="-38" y1="-38" x2="38" y2="-38" stroke="#7a3b14" stroke-width="0.6" opacity="0.5"/>
    <line x1="-38" y1="-30" x2="30" y2="-30" stroke="#7a3b14" stroke-width="0.6" opacity="0.5"/>
    <line x1="-38" y1="-18" x2="38" y2="-18" stroke="#7a3b14" stroke-width="0.6" opacity="0.5"/>
    <line x1="-38" y1="-10" x2="25" y2="-10" stroke="#7a3b14" stroke-width="0.6" opacity="0.5"/>
    <line x1="-38" y1="2" x2="38" y2="2" stroke="#7a3b14" stroke-width="0.6" opacity="0.5"/>
    <line x1="-38" y1="10" x2="30" y2="10" stroke="#7a3b14" stroke-width="0.6" opacity="0.5"/>
    <line x1="-38" y1="18" x2="35" y2="18" stroke="#7a3b14" stroke-width="0.6" opacity="0.5"/>
    <line x1="-38" y1="32" x2="28" y2="32" stroke="#7a3b14" stroke-width="0.6" opacity="0.5"/>
    <line x1="-38" y1="40" x2="35" y2="40" stroke="#7a3b14" stroke-width="0.6" opacity="0.5"/>
    <!-- 书名 -->
    <text x="0" y="-58" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a">枕草子</text>
    <!-- 印章 -->
    <rect x="28" y="38" width="16" height="16" fill="#c84a3a" stroke="#7a3b14" stroke-width="1"/>
    <text x="36" y="50" text-anchor="middle" font-family="serif" font-size="9" fill="#fff8e0">清</text>
    <!-- 双璧标注 -->
    <text x="0" y="70" text-anchor="middle" font-family="serif" font-size="12" fill="#c8843a">与《源氏物语》并称"双璧"</text>
  </g>

  <!-- 右侧：发现日常之美 -->
  <g transform="translate(630, 240)">
    <text x="0" y="-85" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">日常之美</text>
    <!-- 萤火虫 -->
    <circle cx="-20" cy="-40" r="3" fill="#e8a838"/>
    <circle cx="-20" cy="-40" r="6" fill="#e8a838" opacity="0.2"/>
    <circle cx="20" cy="-30" r="2.5" fill="#e8a838"/>
    <circle cx="20" cy="-30" r="5" fill="#e8a838" opacity="0.15"/>
    <!-- 朝霞 -->
    <path d="M -35 -10 Q 0 -20 35 -10" fill="none" stroke="#e07856" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="-5" r="8" fill="#e8a838" opacity="0.5"/>
    <!-- 归鸦 -->
    <path d="M -25 15 Q -22 11 -19 15 Q -16 11 -13 15" fill="none" stroke="#3a3a3a" stroke-width="1.2"/>
    <path d="M 10 20 Q 13 16 16 20 Q 19 16 22 20" fill="none" stroke="#3a3a3a" stroke-width="1.2"/>
    <!-- 炭火 -->
    <ellipse cx="0" cy="40" rx="20" ry="5" fill="#5a4a2a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-6" cy="37" r="3" fill="#e07856" opacity="0.7"/>
    <circle cx="6" cy="37" r="3" fill="#e8a838" opacity="0.6"/>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">萤火·朝霞·归鸦·炭火</text>
  </g>

  <!-- 下方：核心精神 -->
  <g transform="translate(400, 430)">
    <rect x="-280" y="0" width="560" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">美不一定在远方——清晨的红霞、夏夜的萤火、秋天的归鸦、冬日的炭火</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="13" fill="#c8843a">只要有一颗安静细腻的心，日常的每个瞬间都有美</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">清少纳言：一千年前用细腻的笔，写下生活中最动人的瞬间</text>
</svg>
