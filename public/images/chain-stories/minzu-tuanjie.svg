<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="中国五十六个民族插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">中国五十六个民族</text>
  <line x1="290" y1="58" x2="510" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 中国地图轮廓（简化） -->
  <path d="M180 180 Q220 150 280 155 Q340 145 400 160 Q470 150 530 175 Q580 185 620 220 Q640 260 625 310 Q610 360 570 390 Q520 420 460 415 Q400 425 350 410 Q300 400 260 370 Q220 340 195 300 Q175 260 180 220 Z" fill="#f0e0c0" stroke="#c8843a" stroke-width="2.5"/>
  <!-- 海南岛 -->
  <ellipse cx="470" cy="445" rx="18" ry="12" fill="#f0e0c0" stroke="#c8843a" stroke-width="2"/>
  <!-- 台湾 -->
  <ellipse cx="600" cy="360" rx="10" ry="20" fill="#f0e0c0" stroke="#c8843a" stroke-width="2"/>

  <!-- 五十六朵花分布在地图上 -->
  <g>
    <!-- 花朵1 红 -->
    <g transform="translate(250,220)"><circle r="6" fill="#c8483a"/><circle r="3" fill="#e8a838"/></g>
    <!-- 花朵2 黄 -->
    <g transform="translate(310,200)"><circle r="6" fill="#e8a838"/><circle r="3" fill="#c8483a"/></g>
    <!-- 花朵3 蓝 -->
    <g transform="translate(370,230)"><circle r="6" fill="#3a6a9a"/><circle r="3" fill="#fff6df"/></g>
    <!-- 花朵4 绿 -->
    <g transform="translate(430,210)"><circle r="6" fill="#5a8a3a"/><circle r="3" fill="#e8a838"/></g>
    <!-- 花朵5 紫 -->
    <g transform="translate(490,240)"><circle r="6" fill="#8a4a9a"/><circle r="3" fill="#fff6df"/></g>
    <!-- 花朵6 粉 -->
    <g transform="translate(550,220)"><circle r="6" fill="#d4648a"/><circle r="3" fill="#e8a838"/></g>
    <!-- 花朵7 橙 -->
    <g transform="translate(280,280)"><circle r="6" fill="#e8783a"/><circle r="3" fill="#fff6df"/></g>
    <!-- 花朵8 青 -->
    <g transform="translate(340,300)"><circle r="6" fill="#3a9a8a"/><circle r="3" fill="#e8a838"/></g>
    <!-- 花朵9 红 -->
    <g transform="translate(410,290)"><circle r="6" fill="#c8483a"/><circle r="3" fill="#fff6df"/></g>
    <!-- 花朵10 蓝 -->
    <g transform="translate(480,310)"><circle r="6" fill="#3a6a9a"/><circle r="3" fill="#e8a838"/></g>
    <!-- 花朵11 绿 -->
    <g transform="translate(540,300)"><circle r="6" fill="#5a8a3a"/><circle r="3" fill="#fff6df"/></g>
    <!-- 花朵12 黄 -->
    <g transform="translate(300,350)"><circle r="6" fill="#e8a838"/><circle r="3" fill="#c8483a"/></g>
    <!-- 花朵13 粉 -->
    <g transform="translate(370,360)"><circle r="6" fill="#d4648a"/><circle r="3" fill="#fff6df"/></g>
    <!-- 花朵14 紫 -->
    <g transform="translate(440,370)"><circle r="6" fill="#8a4a9a"/><circle r="3" fill="#e8a838"/></g>
    <!-- 花朵15 橙 -->
    <g transform="translate(510,360)"><circle r="6" fill="#e8783a"/><circle r="3" fill="#fff6df"/></g>
    <!-- 海南花 -->
    <g transform="translate(470,445)"><circle r="5" fill="#d4648a"/><circle r="2.5" fill="#e8a838"/></g>
    <!-- 台湾花 -->
    <g transform="translate(600,360)"><circle r="5" fill="#3a9a8a"/><circle r="2.5" fill="#fff6df"/></g>
  </g>

  <!-- 三个民族人物形象 -->
  <!-- 蒙古族（摔跤手） -->
  <g transform="translate(120,460)">
    <circle cx="0" cy="-45" r="11" fill="#e8c4a0"/>
    <path d="M-11 -52 Q0 -64 11 -52 Z" fill="#3a6a9a"/>
    <rect x="-13" y="-34" width="26" height="28" rx="4" fill="#3a6a9a"/>
    <path d="M-13 -28 L-22 -18 M13 -28 L22 -18" stroke="#3a6a9a" stroke-width="5" stroke-linecap="round"/>
    <rect x="-6" y="-6" width="12" height="18" fill="#5a3a1a"/>
    <circle cx="-4" cy="-47" r="1.3" fill="#3d2817"/><circle cx="4" cy="-47" r="1.3" fill="#3d2817"/>
  </g>
  <!-- 傣族（孔雀舞） -->
  <g transform="translate(400,470)">
    <circle cx="0" cy="-48" r="11" fill="#e8c4a0"/>
    <path d="M-12 -56 Q0 -68 12 -56 Z" fill="#3a9a8a"/>
    <rect x="-12" y="-37" width="24" height="26" rx="4" fill="#3a9a8a"/>
    <!-- 孔雀裙摆 -->
    <path d="M-12 -11 L-22 10 L22 10 L12 -11 Z" fill="#3a9a8a" opacity="0.8"/>
    <path d="M-8 -11 L-12 5 M0 -11 L0 8 M8 -11 L12 5" stroke="#e8a838" stroke-width="1.5"/>
    <!-- 手臂孔雀状 -->
    <path d="M-12 -30 L-30 -40 L-28 -50" stroke="#3a9a8a" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="-4" cy="-50" r="1.3" fill="#3d2817"/><circle cx="4" cy="-50" r="1.3" fill="#3d2817"/>
  </g>
  <!-- 藏族 -->
  <g transform="translate(680,460)">
    <circle cx="0" cy="-45" r="11" fill="#e8c4a0"/>
    <ellipse cx="0" cy="-58" rx="14" ry="6" fill="#c8483a"/>
    <rect x="-13" y="-34" width="26" height="28" rx="4" fill="#c8483a"/>
    <path d="M-13 -30 L-22 -20 M13 -30 L22 -20" stroke="#c8483a" stroke-width="5" stroke-linecap="round"/>
    <rect x="-7" y="-6" width="14" height="18" fill="#5a3a1a"/>
    <circle cx="-4" cy="-47" r="1.3" fill="#3d2817"/><circle cx="4" cy="-47" r="1.3" fill="#3d2817"/>
  </g>

  <!-- 标注：五十六朵花 -->
  <line x1="430" y1="210" x2="520" y2="150" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="490" y="120" width="120" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="550" y="139" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">五十六朵花</text>

  <!-- 标注：中国地图 -->
  <line x1="250" y1="220" x2="160" y2="180" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="60" y="160" width="100" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="110" y="179" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">中国版图</text>

  <!-- 标注：各民族 -->
  <line x1="400" y1="470" x2="400" y2="430" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="335" y="408" width="130" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="400" y="427" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">各民族服饰</text>

  <!-- 底部说明 -->
  <rect x="40" y="548" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="573" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">中国有五十六个民族，像五十六朵花开在中华大地上，各有各的色彩，共同组成一个大家庭。</text>
</svg>
