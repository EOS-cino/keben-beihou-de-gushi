<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="名人故居牌匾与老屋插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：名人故居的意义</text>
  <line x1="200" y1="55" x2="600" y2="55" stroke="#c8843a" stroke-width="2"/>

  <!-- 地面 -->
  <rect x="0" y="440" width="800" height="160" fill="#d8c9a8" opacity="0.5"/>

  <!-- 左：鲁迅故居 -->
  <g transform="translate(60, 180)">
    <!-- 屋顶 -->
    <path d="M0 80 L80 30 L160 80 Z" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="2"/>
    <path d="M-10 80 L170 80 L160 95 L0 95 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 墙 -->
    <rect x="15" y="95" width="130" height="160" fill="#e8d5b0" stroke="#7a3b14" stroke-width="2"/>
    <!-- 门 -->
    <rect x="60" y="170" width="40" height="85" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 窗 -->
    <rect x="30" y="120" width="30" height="30" fill="#a8d0e8" stroke="#7a3b14" stroke-width="2"/>
    <rect x="100" y="120" width="30" height="30" fill="#a8d0e8" stroke="#7a3b14" stroke-width="2"/>
    <line x1="45" y1="120" x2="45" y2="150" stroke="#7a3b14" stroke-width="1"/>
    <line x1="115" y1="120" x2="115" y2="150" stroke="#7a3b14" stroke-width="1"/>
    <!-- 牌匾 -->
    <rect x="35" y="100" width="90" height="22" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <text x="80" y="116" text-anchor="middle" font-family="serif" font-size="13" fill="#fef9ed">鲁迅故居</text>
  </g>
  <text x="140" y="470" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">绍兴·百草园</text>

  <!-- 中：老舍故居 -->
  <g transform="translate(320, 200)">
    <path d="M0 70 L70 25 L140 70 Z" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="2"/>
    <path d="M-8 70 L148 70 L140 82 L0 82 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="12" y="82" width="116" height="140" fill="#e8d5b0" stroke="#7a3b14" stroke-width="2"/>
    <rect x="50" y="150" width="36" height="72" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="25" y="105" width="26" height="26" fill="#a8d0e8" stroke="#7a3b14" stroke-width="2"/>
    <rect x="89" y="105" width="26" height="26" fill="#a8d0e8" stroke="#7a3b14" stroke-width="2"/>
    <rect x="30" y="88" width="80" height="20" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <text x="70" y="102" text-anchor="middle" font-family="serif" font-size="12" fill="#fef9ed">老舍故居</text>
    <!-- 柿子树 -->
    <rect x="135" y="120" width="8" height="80" fill="#5a3a1a"/>
    <circle cx="139" cy="110" r="25" fill="#6a8d3f"/>
    <circle cx="130" cy="100" r="4" fill="#e07856"/>
    <circle cx="148" cy="105" r="4" fill="#e07856"/>
    <circle cx="140" cy="120" r="4" fill="#e07856"/>
  </g>
  <text x="390" y="470" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">北京·丹柿小院</text>

  <!-- 右：郭沫若故居 -->
  <g transform="translate(570, 190)">
    <path d="M0 75 L75 28 L150 75 Z" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="2"/>
    <path d="M-8 75 L158 75 L150 88 L0 88 Z" fill="#8d5a36" stroke="#5a3b14" stroke-width="2"/>
    <rect x="12" y="88" width="126" height="150" fill="#e8d5b0" stroke="#7a3b14" stroke-width="2"/>
    <rect x="55" y="160" width="38" height="78" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="25" y="110" width="28" height="28" fill="#a8d0e8" stroke="#7a3b14" stroke-width="2"/>
    <rect x="93" y="110" width="28" height="28" fill="#a8d0e8" stroke="#7a3b14" stroke-width="2"/>
    <rect x="32" y="94" width="86" height="20" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <text x="75" y="108" text-anchor="middle" font-family="serif" font-size="12" fill="#fef9ed">郭沫若故居</text>
  </g>
  <text x="645" y="470" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">乐山·沙湾</text>

  <!-- 连接虚线 -->
  <path d="M220 360 Q400 320 560 360" fill="none" stroke="#c8843a" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>

  <!-- 中间图标：书桌刻"早" -->
  <g transform="translate(360, 360)">
    <rect x="0" y="0" width="80" height="12" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5" rx="2"/>
    <rect x="8" y="12" width="6" height="30" fill="#8d5a36"/>
    <rect x="66" y="12" width="6" height="30" fill="#8d5a36"/>
    <text x="40" y="9" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">早</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="540" width="700" height="42" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="566" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">名人故居不是空房子——桌椅门窗里，藏着伟大的人也曾普通过的证据。</text>
</svg>
