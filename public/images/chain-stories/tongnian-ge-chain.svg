<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="不同年代的童年游戏对比插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">爸爸妈妈小时候玩什么</text>
  <line x1="200" y1="56" x2="600" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——没有手机，玩得一点也不少</text>

  <!-- 四个游戏卡片 -->
  <!-- 跳皮筋 -->
  <g transform="translate(150, 140)">
    <rect x="-80" y="0" width="160" height="180" rx="10" fill="#fef9ed" stroke="#c8843a" stroke-width="2"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#2d6a4f">跳皮筋</text>
    <g transform="translate(0, 60)">
      <!-- 撑皮筋的人 -->
      <g transform="translate(-40, 0)">
        <circle cx="0" cy="0" r="8" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
        <ellipse cx="0" cy="20" rx="10" ry="14" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
        <path d="M8 10 L35 30" stroke="#e07856" stroke-width="2"/>
      </g>
      <g transform="translate(40, 0)">
        <circle cx="0" cy="0" r="8" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
        <ellipse cx="0" cy="20" rx="10" ry="14" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5"/>
        <path d="M-8 10 L-35 30" stroke="#e07856" stroke-width="2"/>
      </g>
      <!-- 皮筋 -->
      <line x1="-32" y1="30" x2="32" y2="30" stroke="#e8a838" stroke-width="3"/>
      <!-- 跳的人 -->
      <g transform="translate(0, 35)">
        <circle cx="0" cy="-5" r="7" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
        <ellipse cx="0" cy="10" rx="8" ry="10" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
        <path d="M-6 18 Q-10 25 -8 35" fill="none" stroke="#e8a838" stroke-width="3"/>
        <path d="M6 18 Q10 25 8 35" fill="none" stroke="#e8a838" stroke-width="3"/>
      </g>
    </g>
    <text x="0" y="160" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">马兰开花二十一</text>
  </g>

  <!-- 弹珠 -->
  <g transform="translate(400, 140)">
    <rect x="-80" y="0" width="160" height="180" rx="10" fill="#fef9ed" stroke="#c8843a" stroke-width="2"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#c8843a">弹玻璃球</text>
    <g transform="translate(0, 60)">
      <!-- 地面 -->
      <ellipse cx="0" cy="50" rx="60" ry="12" fill="#c8843a" opacity="0.3"/>
      <!-- 玻璃球 -->
      <circle cx="-25" cy="45" r="9" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5" opacity="0.8"/>
      <circle cx="-27" cy="43" r="3" fill="#fef9ed" opacity="0.8"/>
      <circle cx="10" cy="48" r="9" fill="#e07856" stroke="#7a3b14" stroke-width="1.5" opacity="0.8"/>
      <circle cx="8" cy="46" r="3" fill="#fef9ed" opacity="0.8"/>
      <circle cx="30" cy="50" r="7" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5" opacity="0.8"/>
      <!-- 洞 -->
      <ellipse cx="35" cy="52" rx="6" ry="3" fill="#7a3b14"/>
      <!-- 手 -->
      <g transform="translate(-40, 20)">
        <ellipse cx="0" cy="0" rx="10" ry="6" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
        <path d="M8 -2 Q15 0 18 5" fill="none" stroke="#e07856" stroke-width="3" stroke-linecap="round"/>
      </g>
      <!-- 弹射线 -->
      <path d="M-20 25 Q0 35 8 45" fill="none" stroke="#c84a3a" stroke-width="1.5" stroke-dasharray="2,2"/>
    </g>
    <text x="0" y="160" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">弹进洞就赢</text>
  </g>

  <!-- 滚铁环 -->
  <g transform="translate(650, 140)">
    <rect x="-80" y="0" width="160" height="180" rx="10" fill="#fef9ed" stroke="#c8843a" stroke-width="2"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#4a90b8">滚铁环</text>
    <g transform="translate(0, 60)">
      <!-- 铁环 -->
      <circle cx="20" cy="40" r="22" fill="none" stroke="#7a3b14" stroke-width="4"/>
      <!-- 钩 -->
      <path d="M-5 30 Q5 35 0 45 Q-3 50 5 55" fill="none" stroke="#8d5a36" stroke-width="3"/>
      <!-- 孩子 -->
      <g transform="translate(-15, 10)">
        <circle cx="0" cy="0" r="8" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
        <ellipse cx="0" cy="18" rx="10" ry="14" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5"/>
        <path d="M8 10 Q15 20 12 30" fill="none" stroke="#2d6a4f" stroke-width="3" stroke-linecap="round"/>
      </g>
      <!-- 叮当 -->
      <text x="40" y="20" font-family="serif" font-size="11" fill="#e8a838">叮当</text>
    </g>
    <text x="0" y="160" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">推着满街跑</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 400)">
    <rect x="-320" y="0" width="640" height="150" rx="10" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">那时候的玩具，多是"自己发明"的</text>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">跳皮筋 · 弹玻璃球 · 滚铁环 · 翻花绳 · 丢沙包 · 跳房子</text>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">没有屏幕隔着，大家面对面跑、面对面笑、面对面吵架又和好</text>
    <text x="0" y="110" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">最怀念的不是某个玩具，而是"一群人一起玩"的那种热闹</text>
    <text x="0" y="132" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">等你长大了，你的孩子问你"小时候玩什么"，你也会有说不完的故事</text>
  </g>
</svg>
