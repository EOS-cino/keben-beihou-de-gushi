<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="小个子大英雄的各色人物插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：小个子大英雄</text>
  <line x1="200" y1="62" x2="600" y2="62" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 中心大字 -->
  <g transform="translate(400, 320)">
    <circle cx="0" cy="0" r="55" fill="#e07856" opacity="0.12" stroke="#e07856" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-size="18" font-weight="bold" fill="#e07856" font-family="serif">小个子</text>
    <text x="0" y="15" text-anchor="middle" font-size="18" font-weight="bold" fill="#e07856" font-family="serif">大英雄</text>
  </g>

  <!-- 英雄1：晏婴 -->
  <g transform="translate(160, 200)">
    <rect x="-70" y="-55" width="140" height="150" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-35" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a3b14" font-family="serif">晏婴</text>
    <!-- 小个子晏婴 -->
    <g transform="translate(-20, 0)">
      <circle cx="0" cy="-15" r="10" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-3 -22 L0 -27 L3 -22" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-8 -8 L-10 20 L10 20 L8 -8" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <!-- 大门 -->
    <g transform="translate(25, 0)">
      <rect x="-15" y="-25" width="30" height="50" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <text x="0" y="5" text-anchor="middle" font-size="9" fill="#fff6df">大门</text>
    </g>
    <text x="0" y="75" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">矮个子外交家</text>
  </g>

  <!-- 英雄2：拇指汤姆 -->
  <g transform="translate(640, 200)">
    <rect x="-70" y="-55" width="140" height="150" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-35" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a3b14" font-family="serif">拇指汤姆</text>
    <!-- 大拇指 -->
    <g transform="translate(0, 0)">
      <rect x="-8" y="-10" width="16" height="30" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5" rx="8"/>
      <circle cx="0" cy="-15" r="6" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="-2" cy="-16" r="1" fill="#2a2a2a"/>
      <circle cx="2" cy="-16" r="1" fill="#2a2a2a"/>
      <path d="M-2 -12 Q0 -10 2 -12" fill="none" stroke="#7a3b14" stroke-width="0.5"/>
    </g>
    <!-- 对比：大人手 -->
    <g transform="translate(-35, 15)" opacity="0.3">
      <ellipse cx="0" cy="0" rx="20" ry="12" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <text x="0" y="75" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">拇指大的冒险家</text>
  </g>

  <!-- 英雄3：孙悟空变小 -->
  <g transform="translate(160, 430)">
    <rect x="-70" y="-50" width="140" height="130" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-30" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a3b14" font-family="serif">孙悟空</text>
    <!-- 小虫子悟空 -->
    <g transform="translate(0, 5)">
      <ellipse cx="0" cy="0" rx="12" ry="8" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-8" cy="-3" r="5" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-10" cy="-4" r="1.5" fill="#2a2a2a"/>
      <circle cx="-6" cy="-4" r="1.5" fill="#2a2a2a"/>
      <!-- 翅膀 -->
      <ellipse cx="3" cy="-8" rx="6" ry="3" fill="#fff6df" opacity="0.7" transform="rotate(-20 3 -8)"/>
      <ellipse cx="3" cy="8" rx="6" ry="3" fill="#fff6df" opacity="0.7" transform="rotate(20 3 8)"/>
    </g>
    <text x="0" y="55" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">变小钻进妖怪洞</text>
  </g>

  <!-- 英雄4：居里夫人 -->
  <g transform="translate(640, 430)">
    <rect x="-70" y="-50" width="140" height="130" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-30" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a3b14" font-family="serif">居里夫人</text>
    <!-- 居里夫人 -->
    <g transform="translate(0, 5)">
      <circle cx="0" cy="-15" r="10" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-8 -22 Q-5 -28 0 -28 Q5 -28 8 -22" fill="#3a2a1a"/>
      <circle cx="-3" cy="-15" r="1.5" fill="#2a2a2a"/>
      <circle cx="3" cy="-15" r="1.5" fill="#2a2a2a"/>
      <path d="M-8 -8 L-10 15 L10 15 L8 -8" fill="#4a4a4a" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 试管 -->
      <rect x="-3" y="5" width="6" height="15" fill="#4a90b8" opacity="0.5" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <text x="0" y="55" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">小个子大科学家</text>
  </g>

  <!-- 连接线 -->
  <line x1="230" y1="200" x2="345" y2="290" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="570" y1="200" x2="455" y2="290" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="230" y1="430" x2="345" y2="355" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="570" y1="430" x2="455" y2="355" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- 底部说明 -->
  <rect x="50" y="545" width="700" height="35" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="568" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">个子大小从来不是决定成就的因素，智慧和勇气才是真正的力量。</text>
</svg>
