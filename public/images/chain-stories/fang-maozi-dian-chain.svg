<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="改变习惯的各种发明插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：改变习惯的故事</text>
  <line x1="200" y1="62" x2="600" y2="62" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 时间线 -->
  <line x1="80" y1="320" x2="720" y2="320" stroke="#c8843a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="80" cy="320" r="8" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
  <circle cx="280" cy="320" r="8" fill="#e07856" stroke="#7a3b14" stroke-width="2"/>
  <circle cx="480" cy="320" r="8" fill="#2d6a4f" stroke="#7a3b14" stroke-width="2"/>
  <circle cx="720" cy="320" r="8" fill="#4a90b8" stroke="#7a3b14" stroke-width="2"/>

  <!-- 故事1：叉子（手抓→刀叉） -->
  <g transform="translate(80, 180)">
    <!-- 旧：手抓饭 -->
    <circle cx="-20" cy="0" r="8" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-28 8 L-28 25 L-12 25 L-12 8" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <path d="M-20 8 L-20 18" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 箭头向下 -->
    <path d="M-20 40 L-20 60" fill="none" stroke="#7a3b14" stroke-width="2" stroke-dasharray="3,3"/>
    <path d="M-24 55 L-20 62 L-16 55" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 新：刀叉 -->
    <g transform="translate(0, 80)">
      <rect x="-3" y="0" width="2" height="20" fill="#8a8a8a"/>
      <rect x="0" y="0" width="2" height="20" fill="#8a8a8a"/>
      <rect x="3" y="0" width="2" height="20" fill="#8a8a8a"/>
      <rect x="-2" y="20" width="6" height="15" fill="#8a8a8a"/>
    </g>
    <text x="-5" y="130" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">手抓→刀叉</text>
  </g>

  <!-- 故事2：雨伞（嘲笑→流行） -->
  <g transform="translate(280, 180)">
    <!-- 旧：淋雨 -->
    <g transform="translate(-15, 0)">
      <circle cx="0" cy="0" r="8" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-8 8 L-8 25 L8 25 L8 8" fill="#4a90b8" stroke="#7a3b14" stroke-width="1"/>
      <!-- 雨滴 -->
      <line x1="-15" y1="-10" x2="-18" y2="-3" stroke="#4a90b8" stroke-width="2"/>
      <line x1="15" y1="-10" x2="12" y2="-3" stroke="#4a90b8" stroke-width="2"/>
      <line x1="0" y1="-15" x2="-2" y2="-8" stroke="#4a90b8" stroke-width="2"/>
    </g>
    <!-- 箭头 -->
    <path d="M-15 40 L-15 60" fill="none" stroke="#7a3b14" stroke-width="2" stroke-dasharray="3,3"/>
    <path d="M-19 55 L-15 62 L-11 55" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 新：雨伞 -->
    <g transform="translate(-15, 85)">
      <path d="M-20 5 Q-20 -15 0 -18 Q20 -15 20 5 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="0" y1="-18" x2="0" y2="20" stroke="#7a3b14" stroke-width="2"/>
      <path d="M0 20 Q5 25 8 20" fill="none" stroke="#7a3b14" stroke-width="2"/>
    </g>
    <text x="-5" y="130" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">淋雨→打伞</text>
  </g>

  <!-- 故事3：自行车（奔跑机→脚踏车） -->
  <g transform="translate(480, 180)">
    <!-- 旧：奔跑机 -->
    <g transform="translate(-15, 0)">
      <circle cx="-12" cy="20" r="10" fill="none" stroke="#7a3b14" stroke-width="2"/>
      <circle cx="12" cy="20" r="10" fill="none" stroke="#7a3b14" stroke-width="2"/>
      <line x1="-12" y1="20" x2="12" y2="20" stroke="#7a3b14" stroke-width="2"/>
      <line x1="0" y1="20" x2="0" y2="-5" stroke="#7a3b14" stroke-width="2"/>
      <circle cx="0" cy="-10" r="5" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <!-- 箭头 -->
    <path d="M-15 45 L-15 65" fill="none" stroke="#7a3b14" stroke-width="2" stroke-dasharray="3,3"/>
    <path d="M-19 60 L-15 67 L-11 60" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 新：自行车 -->
    <g transform="translate(-15, 90)">
      <circle cx="-12" cy="15" r="10" fill="none" stroke="#2d6a4f" stroke-width="2"/>
      <circle cx="12" cy="15" r="10" fill="none" stroke="#2d6a4f" stroke-width="2"/>
      <path d="M-12 15 L0 -5 L12 15" fill="none" stroke="#2d6a4f" stroke-width="2"/>
      <line x1="0" y1="-5" x2="8" y2="-10" stroke="#2d6a4f" stroke-width="2"/>
      <circle cx="0" cy="-12" r="4" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <text x="-5" y="130" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">奔跑机→自行车</text>
  </g>

  <!-- 故事4：书信→电子邮件 -->
  <g transform="translate(720, 180)">
    <!-- 旧：信封 -->
    <g transform="translate(-15, 0)">
      <rect x="-15" y="-5" width="30" height="22" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-15 -5 L0 8 L15 -5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <!-- 箭头 -->
    <path d="M-15 35 L-15 55" fill="none" stroke="#7a3b14" stroke-width="2" stroke-dasharray="3,3"/>
    <path d="M-19 50 L-15 57 L-11 50" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 新：电子邮件 -->
    <g transform="translate(-15, 80)">
      <rect x="-18" y="0" width="36" height="24" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5" rx="3"/>
      <path d="M-18 0 L0 12 L18 0" fill="none" stroke="#fff6df" stroke-width="1.5"/>
      <text x="0" y="38" text-anchor="middle" font-size="10" fill="#fff6df" font-family="serif">@</text>
    </g>
    <text x="-5" y="130" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">书信→电子邮件</text>
  </g>

  <!-- 底部文字 -->
  <rect x="100" y="460" width="600" height="80" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="8" opacity="0.8"/>
  <text x="400" y="490" text-anchor="middle" font-size="16" font-weight="bold" fill="#7a3b14" font-family="serif">"从来如此"挡不住"确实更好"</text>
  <text x="400" y="515" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">好的改变一开始可能被嘲笑，但好用终究会被接受</text>

  <!-- 底部说明 -->
  <text x="400" y="570" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">从刀叉到雨伞，从自行车到电子邮件，改变习惯的故事一直在发生</text>
</svg>
