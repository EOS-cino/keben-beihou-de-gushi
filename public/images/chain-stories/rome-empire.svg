<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="罗马帝国从兴起到衰落的历程插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">罗马帝国的兴衰</text>
  <line x1="290" y1="58" x2="510" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 时间轴 -->
  <line x1="80" y1="320" x2="720" y2="320" stroke="#c8843a" stroke-width="3"/>
  <path d="M712 312 L724 320 L712 328" fill="none" stroke="#c8843a" stroke-width="3"/>

  <!-- 阶段1：小城邦 -->
  <circle cx="160" cy="320" r="10" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
  <text x="160" y="300" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">公元前8世纪</text>
  <text x="160" y="350" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">小城邦</text>
  <!-- 小村子 -->
  <g transform="translate(160,200)">
    <rect x="-20" y="-10" width="40" height="30" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-24 -10 L0 -26 L24 -10 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-4" y="0" width="8" height="20" fill="#7a3b14"/>
    <!-- 几间小屋 -->
    <rect x="-50" y="0" width="20" height="20" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
    <path d="M-52 0 L-40 -10 L-28 0 Z" fill="#8d5a36"/>
    <rect x="30" y="0" width="20" height="20" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
    <path d="M28 0 L40 -10 L52 0 Z" fill="#8d5a36"/>
  </g>
  <text x="160" y="250" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">台伯河边的小村</text>

  <!-- 阶段2：共和国 -->
  <circle cx="340" cy="320" r="10" fill="#e8a838" stroke="#c8843a" stroke-width="2"/>
  <text x="340" y="300" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">公元前6-1世纪</text>
  <text x="340" y="350" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">共和国扩张</text>
  <!-- 地中海 -->
  <g transform="translate(340,200)">
    <ellipse cx="0" cy="0" rx="50" ry="30" fill="#5a8aaa" opacity="0.5"/>
    <path d="M-30 -5 Q-10 -15 10 -5 Q25 0 30 10" fill="none" stroke="#6a8d3f" stroke-width="2"/>
    <path d="M-20 5 Q0 -5 20 5" fill="none" stroke="#6a8d3f" stroke-width="2"/>
    <!-- 罗马标记 -->
    <circle cx="0" cy="0" r="6" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 扩张箭头 -->
    <path d="M0 0 L-35 -15" stroke="#c84a3a" stroke-width="1.5" marker-end="url(#a1)"/>
    <path d="M0 0 L35 -15" stroke="#c84a3a" stroke-width="1.5"/>
    <path d="M0 0 L0 25" stroke="#c84a3a" stroke-width="1.5"/>
  </g>
  <text x="340" y="250" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">地中海成内湖</text>

  <!-- 阶段3：帝国鼎盛 -->
  <circle cx="520" cy="320" r="10" fill="#c84a3a" stroke="#7a3b14" stroke-width="2"/>
  <text x="520" y="300" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">公元1-2世纪</text>
  <text x="520" y="350" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">帝国鼎盛</text>
  <!-- 大帝国版图 -->
  <g transform="translate(520,200)">
    <path d="M-60 -20 Q-30 -30 0 -25 Q30 -30 60 -20 Q65 0 50 15 Q20 25 -10 20 Q-40 25 -55 10 Q-65 -5 -60 -20 Z" fill="#c84a3a" opacity="0.4" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="3" text-anchor="middle" font-family="serif" font-size="9" fill="#fff6df">罗马</text>
  </g>
  <text x="520" y="250" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">横跨欧亚非</text>

  <!-- 阶段4：分裂衰亡 -->
  <circle cx="680" cy="320" r="10" fill="#8d8d7a" stroke="#6a6a5a" stroke-width="2"/>
  <text x="680" y="300" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">公元476年</text>
  <text x="680" y="350" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">西罗马灭亡</text>
  <!-- 分裂 -->
  <g transform="translate(680,200)">
    <path d="M-40 -15 Q-20 -20 -5 -10 Q-10 5 -25 10 Q-40 5 -40 -15 Z" fill="#8d8d7a" opacity="0.5" stroke="#7a3b14" stroke-width="1"/>
    <path d="M5 -10 Q20 -20 40 -15 Q40 5 25 10 Q10 5 5 -10 Z" fill="#8d8d7a" opacity="0.3" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- 裂缝 -->
    <path d="M0 -15 L0 10" stroke="#c84a3a" stroke-width="2" stroke-dasharray="3,2"/>
  </g>
  <text x="680" y="250" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">东西分裂</text>

  <!-- 留下的遗产 -->
  <rect x="80" y="400" width="640" height="80" rx="8" fill="#e8f0e6" stroke="#6a8d3f" stroke-width="1.5" opacity="0.6"/>
  <text x="400" y="425" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#4a6a2f">帝国虽亡，遗产犹在</text>
  <g transform="translate(0,440)">
    <text x="180" y="0" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">罗马大道</text>
    <text x="180" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">有些至今能走</text>
    <text x="400" y="0" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">罗马法</text>
    <text x="400" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">影响现代法律</text>
    <text x="620" y="0" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">拉丁语</text>
    <text x="620" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">变成法语西语等</text>
  </g>

  <!-- 底部说明 -->
  <rect x="40" y="528" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="553" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">从小村子到大帝国，再到分裂衰亡——罗马走了一千多年，伟大的东西急不得。</text>
</svg>
