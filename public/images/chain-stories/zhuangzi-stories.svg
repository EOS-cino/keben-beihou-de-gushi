<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">庄子的寓言世界</text>
  <!-- 蝴蝶 -->
  <g transform="translate(200 200)">
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="#e07856" opacity="0.7"/>
    <ellipse cx="-20" cy="-10" rx="18" ry="15" fill="#e8a838" opacity="0.6"/>
    <ellipse cx="20" cy="-10" rx="18" ry="15" fill="#e8a838" opacity="0.6"/>
    <ellipse cx="-15" cy="10" rx="12" ry="10" fill="#c84a3a" opacity="0.5"/>
    <ellipse cx="15" cy="10" rx="12" ry="10" fill="#c84a3a" opacity="0.5"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#7a3b14" stroke-width="2"/>
  </g>
  <!-- 牛和厨师 -->
  <g transform="translate(500 180)">
    <ellipse cx="0" cy="20" rx="50" ry="25" fill="#8d5a36" opacity="0.4"/>
    <circle cx="-40" cy="10" r="15" fill="#8d5a36" opacity="0.5"/>
    <path d="M-50 5 L-55 -5 M-30 5 L-25 -5" stroke="#7a3b14" stroke-width="2"/>
    <!-- 刀 -->
    <line x1="30" y1="0" x2="60" y2="-20" stroke="#a8d0e8" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- 鲲鹏 -->
  <g transform="translate(400 380)">
    <path d="M-80 0 Q-40 -30 0 -10 Q40 -30 80 0 Q40 20 0 10 Q-40 20 -80 0" fill="#4a6a2f" opacity="0.3"/>
    <path d="M-60 -5 Q-30 -20 0 -8" fill="none" stroke="#4a6a2f" stroke-width="2"/>
    <path d="M0 -8 Q30 -20 60 -5" fill="none" stroke="#4a6a2f" stroke-width="2"/>
  </g>
  <!-- 装饰文字 -->
  <text x="200" y="280" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">庄周梦蝶</text>
  <text x="500" y="260" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">庖丁解牛</text>
  <text x="400" y="430" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">鲲鹏展翅</text>
  <!-- 底部装饰 -->
  <line x1="100" y1="500" x2="700" y2="500" stroke="#c8843a" stroke-width="2" opacity="0.3"/>
  <text x="400" y="530" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36" opacity="0.6">庄子用故事讲道理</text>
</svg>
