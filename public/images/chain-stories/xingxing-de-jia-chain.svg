<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="古代天文学家在观星台观测星空的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 夜空 -->
  <rect x="0" y="0" width="800" height="400" fill="#4a90b8" opacity="0.15"/>
  <!-- 星星 -->
  <g fill="#e8a838" opacity="0.7">
    <circle cx="80" cy="60" r="2"/>
    <circle cx="150" cy="90" r="2.5"/>
    <circle cx="220" cy="50" r="2"/>
    <circle cx="300" cy="80" r="3"/>
    <circle cx="380" cy="60" r="2"/>
    <circle cx="460" cy="90" r="2.5"/>
    <circle cx="540" cy="50" r="2"/>
    <circle cx="620" cy="80" r="3"/>
    <circle cx="700" cy="60" r="2"/>
    <circle cx="100" cy="140" r="2"/>
    <circle cx="200" cy="160" r="2.5"/>
    <circle cx="350" cy="140" r="2"/>
    <circle cx="500" cy="160" r="2.5"/>
    <circle cx="650" cy="140" r="2"/>
  </g>
  <!-- 北斗七星 -->
  <g fill="#e07856" opacity="0.8">
    <circle cx="120" cy="200" r="4"/>
    <circle cx="160" cy="190" r="4"/>
    <circle cx="200" cy="195" r="4"/>
    <circle cx="235" cy="210" r="4"/>
    <circle cx="260" cy="240" r="4"/>
    <circle cx="290" cy="260" r="4"/>
    <circle cx="325" cy="255" r="4"/>
  </g>
  <!-- 连线 -->
  <g stroke="#e07856" stroke-width="1.5" opacity="0.4" fill="none">
    <line x1="120" y1="200" x2="160" y2="190"/>
    <line x1="160" y1="190" x2="200" y2="195"/>
    <line x1="200" y1="195" x2="235" y2="210"/>
    <line x1="235" y1="210" x2="260" y2="240"/>
    <line x1="260" y1="240" x2="290" y2="260"/>
    <line x1="290" y1="260" x2="325" y2="255"/>
  </g>
  <!-- 观星台 -->
  <g transform="translate(500 400)">
    <!-- 台基 -->
    <path d="M-100 0 L-80 -40 L80 -40 L100 0 Z" fill="#8b6f47" opacity="0.6"/>
    <rect x="-80" y="-40" width="160" height="40" fill="#a08560" opacity="0.5"/>
    <!-- 柱子 -->
    <rect x="-60" y="-100" width="10" height="60" fill="#8b6f47" opacity="0.6"/>
    <rect x="50" y="-100" width="10" height="60" fill="#8b6f47" opacity="0.6"/>
    <!-- 屋顶 -->
    <path d="M-70 -100 L0 -140 L70 -100 Z" fill="#e07856" opacity="0.6"/>
    <!-- 浑天仪（简化） -->
    <g transform="translate(0 -70)">
      <circle cx="0" cy="0" r="20" fill="none" stroke="#e8a838" stroke-width="2" opacity="0.6"/>
      <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="#e8a838" stroke-width="1.5" opacity="0.5"/>
      <ellipse cx="0" cy="0" rx="8" ry="20" fill="none" stroke="#e8a838" stroke-width="1.5" opacity="0.5"/>
      <circle cx="0" cy="0" r="3" fill="#e8a838" opacity="0.7"/>
    </g>
  </g>
  <!-- 地面 -->
  <rect x="0" y="400" width="800" height="200" fill="#dceee3"/>
  <rect x="0" y="440" width="800" height="160" fill="#9fc8b4" opacity="0.3"/>
  <!-- 古代天文学家 -->
  <g transform="translate(250 400)">
    <!-- 长袍 -->
    <path d="M-30 0 L-35 -90 L35 -90 L30 0 Z" fill="#2d6a4f"/>
    <!-- 腰带 -->
    <rect x="-30" y="-60" width="60" height="6" fill="#e8a838"/>
    <!-- 头 -->
    <circle cx="0" cy="-108" r="18" fill="#f4d4a8"/>
    <!-- 帽子 -->
    <path d="M-18 -118 Q0 -135 18 -118 L15 -110 Q0 -105 -15 -110 Z" fill="#333"/>
    <rect x="-3" y="-138" width="6" height="15" fill="#333"/>
    <!-- 眼睛朝上 -->
    <path d="M-7 -112 Q-4 -116 -1 -112" stroke="#333" stroke-width="1.5" fill="none"/>
    <path d="M1 -112 Q4 -116 7 -112" stroke="#333" stroke-width="1.5" fill="none"/>
    <!-- 手指天空 -->
    <path d="M30 -60 L55 -90" stroke="#f4d4a8" stroke-width="7" stroke-linecap="round"/>
    <path d="M-30 -60 L-45 -40" stroke="#f4d4a8" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- 竹简 -->
  <g transform="translate(150 420)">
    <rect x="0" y="0" width="40" height="30" fill="#e8a838" opacity="0.3" stroke="#8b6f47" stroke-width="1.5"/>
    <line x1="8" y1="0" x2="8" y2="30" stroke="#8b6f47" stroke-width="0.8"/>
    <line x1="16" y1="0" x2="16" y2="30" stroke="#8b6f47" stroke-width="0.8"/>
    <line x1="24" y1="0" x2="24" y2="30" stroke="#8b6f47" stroke-width="0.8"/>
    <line x1="32" y1="0" x2="32" y2="30" stroke="#8b6f47" stroke-width="0.8"/>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" font-weight="700" fill="#2d6a4f">连珠小故事：古人怎么给星星起名字</text>
  <text x="400" y="82" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#7a7468">观星台上，古人把星星连成图案编成故事</text>
</svg>
