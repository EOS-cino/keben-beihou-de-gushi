<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="古诗词中的丁香李商隐李璟等诗人插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a3b14" font-family="serif">连珠小故事：古诗词中的丁香</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 古卷背景 -->
  <rect x="40" y="80" width="720" height="440" fill="#f5ecd8" opacity="0.3" rx="8"/>
  <rect x="40" y="80" width="720" height="440" fill="none" stroke="#c8a868" stroke-width="1.5" rx="8" opacity="0.5"/>

  <!-- 左侧：李商隐 -->
  <g transform="translate(180, 200)">
    <!-- 人物 -->
    <path d="M -20 60 Q -22 25 -16 8 Q -8 0 0 0 Q 8 0 16 8 Q 22 25 20 60" fill="#4a5a6a" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="-12" r="14" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 唐代幞头 -->
    <path d="M -14 -14 Q -14 -26 0 -28 Q 14 -26 14 -14 L 16 -10 L -16 -10 Z" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-5" cy="-12" r="1.5" fill="#7a3b14"/>
    <circle cx="5" cy="-12" r="1.5" fill="#7a3b14"/>
    <path d="M -4 -4 Q 0 -2 4 -4" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 手持卷轴 -->
    <path d="M 16 15 Q 25 20 30 30" fill="none" stroke="#4a5a6a" stroke-width="7" stroke-linecap="round"/>
    <rect x="25" y="25" width="6" height="20" fill="#c8a868" stroke="#7a3b14" stroke-width="1" transform="rotate(20 28 35)"/>
  </g>
  <!-- 诗句 -->
  <rect x="80" y="290" width="200" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="4" opacity="0.9"/>
  <text x="180" y="310" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">芭蕉不展丁香结</text>
  <text x="180" y="328" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">同向春风各自愁</text>
  <text x="180" y="344" text-anchor="middle" font-size="10" fill="#c8843a" font-family="serif">——李商隐《代赠》</text>

  <!-- 中间：李璟 -->
  <g transform="translate(400, 200)">
    <!-- 人物 -->
    <path d="M -20 60 Q -22 25 -16 8 Q -8 0 0 0 Q 8 0 16 8 Q 22 25 20 60" fill="#5a4a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="-12" r="14" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 南唐冠帽 -->
    <path d="M -14 -16 Q -14 -28 0 -30 Q 14 -28 14 -16 L 10 -12 L -10 -12 Z" fill="#8a3a2a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-5" cy="-12" r="1.5" fill="#7a3b14"/>
    <circle cx="5" cy="-12" r="1.5" fill="#7a3b14"/>
    <path d="M -4 -4 Q 0 -2 4 -4" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 手 -->
    <path d="M -16 15 Q -25 20 -30 30" fill="none" stroke="#5a4a3a" stroke-width="7" stroke-linecap="round"/>
    <path d="M 16 15 Q 25 20 30 30" fill="none" stroke="#5a4a3a" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- 诗句 -->
  <rect x="300" y="290" width="200" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="4" opacity="0.9"/>
  <text x="400" y="310" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">青鸟不传云外信</text>
  <text x="400" y="328" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">丁香空结雨中愁</text>
  <text x="400" y="344" text-anchor="middle" font-size="10" fill="#c8843a" font-family="serif">——李璟《摊破浣溪沙》</text>

  <!-- 右侧：杜甫 -->
  <g transform="translate(620, 200)">
    <!-- 人物 -->
    <path d="M -20 60 Q -22 25 -16 8 Q -8 0 0 0 Q 8 0 16 8 Q 22 25 20 60" fill="#3a5a4a" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="-12" r="14" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M -14 -14 Q -14 -26 0 -28 Q 14 -26 14 -14 L 16 -10 L -16 -10 Z" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-5" cy="-12" r="1.5" fill="#7a3b14"/>
    <circle cx="5" cy="-12" r="1.5" fill="#7a3b14"/>
    <path d="M -4 -4 Q 0 -2 4 -4" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 捋须 -->
    <path d="M 16 15 Q 22 22 20 35" fill="none" stroke="#3a5a4a" stroke-width="7" stroke-linecap="round"/>
    <path d="M 18 30 Q 15 38 12 42" fill="none" stroke="#e8e8e8" stroke-width="2"/>
  </g>
  <!-- 诗句 -->
  <rect x="520" y="290" width="200" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="4" opacity="0.9"/>
  <text x="620" y="310" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">丁香体柔弱</text>
  <text x="620" y="328" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">乱结枝蔓稠</text>
  <text x="620" y="344" text-anchor="middle" font-size="10" fill="#c8843a" font-family="serif">——杜甫</text>

  <!-- 底部：丁香花装饰 -->
  <g transform="translate(400, 430)">
    <!-- 丁香花穗 -->
    <line x1="0" y1="60" x2="0" y2="-20" stroke="#6a8a3a" stroke-width="2"/>
    <g transform="translate(-30, 0)">
      <ellipse cx="0" cy="0" rx="10" ry="15" fill="#d8b8d8" opacity="0.8"/>
      <circle cx="-3" cy="-5" r="3" fill="#c8a0c8" stroke="#a878a8" stroke-width="0.8"/>
      <circle cx="3" cy="-3" r="3" fill="#c8a0c8" stroke="#a878a8" stroke-width="0.8"/>
      <circle cx="0" cy="3" r="3" fill="#c8a0c8" stroke="#a878a8" stroke-width="0.8"/>
    </g>
    <g transform="translate(0, -10)">
      <ellipse cx="0" cy="0" rx="12" ry="18" fill="#f0e0f0" opacity="0.9"/>
      <circle cx="-4" cy="-6" r="3.5" fill="#fff" stroke="#d8c8d8" stroke-width="0.8"/>
      <circle cx="4" cy="-4" r="3.5" fill="#fff" stroke="#d8c8d8" stroke-width="0.8"/>
      <circle cx="0" cy="4" r="3.5" fill="#fff" stroke="#d8c8d8" stroke-width="0.8"/>
      <circle cx="-3" cy="10" r="3" fill="#fff" stroke="#d8c8d8" stroke-width="0.8"/>
    </g>
    <g transform="translate(30, 0)">
      <ellipse cx="0" cy="0" rx="10" ry="15" fill="#d8b8d8" opacity="0.8"/>
      <circle cx="3" cy="-5" r="3" fill="#c8a0c8" stroke="#a878a8" stroke-width="0.8"/>
      <circle cx="-3" cy="-3" r="3" fill="#c8a0c8" stroke="#a878a8" stroke-width="0.8"/>
      <circle cx="0" cy="3" r="3" fill="#c8a0c8" stroke="#a878a8" stroke-width="0.8"/>
    </g>
    <!-- 叶子 -->
    <ellipse cx="-20" cy="40" rx="10" ry="5" fill="#6a8a3a" stroke="#4a6a2a" stroke-width="1" transform="rotate(-30 -20 40)"/>
    <ellipse cx="20" cy="40" rx="10" ry="5" fill="#6a8a3a" stroke="#4a6a2a" stroke-width="1" transform="rotate(30 20 40)"/>
  </g>

  <!-- 标注 -->
  <line x1="400" y1="400" x2="400" y2="380" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="345" y="358" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="376" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">丁香=愁的象征</text>

  <!-- 底部说明 -->
  <rect x="50" y="545" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="570" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">古人见丁香花苞紧抱如结，便以"丁香结"喻愁——千年诗心，一花相承。</text>
</svg>
