<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="星座是怎么来的连珠故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 夜空背景 -->
  <rect x="0" y="0" width="800" height="600" fill="#1a2a4a" opacity="0.12"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#8a5a14">连珠小故事：星座是怎么来的</text>
  <line x1="200" y1="55" x2="600" y2="55" stroke="#e8a838" stroke-width="1.5"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#7a7468">从古巴比伦的天上日历，到希腊神话，再到中国二十八宿</text>

  <!-- 第一格：古巴比伦（十二星座） -->
  <g transform="translate(170 270)">
    <rect x="-95" y="-90" width="190" height="190" fill="#fff6df" stroke="#e8a838" stroke-width="1.5" rx="8"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#8a5a14">古巴比伦·天上日历</text>
    <!-- 黄道带圆环 -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#e8a838" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#e8a838" stroke-width="1" opacity="0.5"/>
    <!-- 十二等分 -->
    <g stroke="#e8a838" stroke-width="1" opacity="0.5">
      <line x1="0" y1="-40" x2="0" y2="-32"/>
      <line x1="0" y1="40" x2="0" y2="32"/>
      <line x1="-40" y1="0" x2="-32" y2="0"/>
      <line x1="40" y1="0" x2="32" y2="0"/>
      <line x1="-28" y1="-28" x2="-22" y2="-22"/>
      <line x1="28" y1="-28" x2="22" y2="-22"/>
      <line x1="-28" y1="28" x2="-22" y2="22"/>
      <line x1="28" y1="28" x2="22" y2="22"/>
    </g>
    <!-- 星点 -->
    <g fill="#e8a838">
      <circle cx="0" cy="-36" r="2"/>
      <circle cx="36" cy="0" r="2"/>
      <circle cx="0" cy="36" r="2"/>
      <circle cx="-36" cy="0" r="2"/>
      <circle cx="25" cy="-25" r="1.5"/>
      <circle cx="-25" cy="-25" r="1.5"/>
      <circle cx="25" cy="25" r="1.5"/>
      <circle cx="-25" cy="25" r="1.5"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">十二黄道星座</text>
    <text x="0" y="76" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">判农时的"日历"</text>
  </g>

  <!-- 箭头 -->
  <path d="M270 270 L320 270" stroke="#c8943a" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- 第二格：希腊神话（猎户座） -->
  <g transform="translate(400 270)">
    <rect x="-95" y="-90" width="190" height="190" fill="#fff6df" stroke="#e07856" stroke-width="1.5" rx="8"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#8a5a14">希腊·猎户座</text>
    <!-- 猎户座连线（人形） -->
    <g stroke="#e07856" stroke-width="1.5" fill="none">
      <line x1="-20" y1="-30" x2="20" y2="-30"/>
      <line x1="-20" y1="-30" x2="-25" y2="0"/>
      <line x1="20" y1="-30" x2="25" y2="0"/>
      <line x1="-25" y1="0" x2="25" y2="0"/>
      <line x1="-25" y1="0" x2="-30" y2="35"/>
      <line x1="25" y1="0" x2="30" y2="35"/>
      <line x1="0" y1="-30" x2="0" y2="20"/>
    </g>
    <!-- 星点 -->
    <g fill="#e8a838">
      <circle cx="-20" cy="-30" r="3"/>
      <circle cx="20" cy="-30" r="3"/>
      <circle cx="-25" cy="0" r="3"/>
      <circle cx="25" cy="0" r="3"/>
      <circle cx="-30" cy="35" r="2.5"/>
      <circle cx="30" cy="35" r="2.5"/>
      <circle cx="0" cy="20" r="2.5"/>
    </g>
    <!-- 腰带三星 -->
    <g fill="#e07856">
      <circle cx="-8" cy="-5" r="2"/>
      <circle cx="0" cy="-3" r="2"/>
      <circle cx="8" cy="-1" r="2"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">猎人俄里翁的故事</text>
    <text x="0" y="76" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">星星连成图，编成神话</text>
  </g>

  <!-- 箭头 -->
  <path d="M500 270 L550 270" stroke="#c8943a" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- 第三格：中国二十八宿 -->
  <g transform="translate(630 270)">
    <rect x="-95" y="-90" width="190" height="190" fill="#fff6df" stroke="#2d6a4f" stroke-width="1.5" rx="8"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#8a5a14">中国·二十八宿</text>
 <!-- 四象（四方） -->
    <!-- 北玄武 -->
    <g transform="translate(0 -35)">
      <circle cx="-30" cy="0" r="3" fill="#4a90b8"/>
      <text x="-30" y="-8" text-anchor="middle" font-family="serif" font-size="9" fill="#4a90b8">玄武·北</text>
    </g>
    <!-- 南朱雀 -->
    <g transform="translate(0 35)">
      <circle cx="-30" cy="0" r="3" fill="#e07856"/>
      <text x="-30" y="14" text-anchor="middle" font-family="serif" font-size="9" fill="#e07856">朱雀·南</text>
    </g>
    <!-- 东青龙 -->
    <g transform="translate(-50 0)">
      <circle cx="0" cy="-15" r="3" fill="#2d6a4f"/>
      <text x="0" y="-22" text-anchor="middle" font-family="serif" font-size="9" fill="#2d6a4f">青龙·东</text>
    </g>
    <!-- 西白虎 -->
    <g transform="translate(50 0)">
      <circle cx="0" cy="-15" r="3" fill="#fef9ed" stroke="#8a5a14" stroke-width="1"/>
      <text x="0" y="-22" text-anchor="middle" font-family="serif" font-size="9" fill="#8a5a14">白虎·西</text>
    </g>
    <!-- 北斗七星（中央） -->
    <g fill="#e8a838">
      <circle cx="-12" cy="-5" r="1.5"/>
      <circle cx="-4" cy="-2" r="1.5"/>
      <circle cx="3" cy="0" r="1.5"/>
      <circle cx="10" cy="5" r="1.5"/>
    </g>
    <path d="M-12 -5 L-4 -2 L3 0 L10 5" stroke="#e8a838" stroke-width="0.8" opacity="0.6"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">月亮二十八天住一圈</text>
    <text x="0" y="76" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">斗柄指东，天下皆春</text>
  </g>

  <!-- 底部：找北极星 -->
  <g transform="translate(400 470)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a14">同一片星空，不同的故事——都是人类想理解头顶的世界</text>
    <!-- 北斗找北极星示意 -->
    <g transform="translate(0 40)">
      <path d="M-50 0 L-30 -5 L-10 -2 L10 5 L25 0 L40 8" stroke="#e8a838" stroke-width="1.2" fill="none" opacity="0.7"/>
      <g fill="#e8a838">
        <circle cx="-50" cy="0" r="2"/>
        <circle cx="-30" cy="-5" r="2"/>
        <circle cx="-10" cy="-2" r="2"/>
        <circle cx="10" cy="5" r="2"/>
        <circle cx="25" cy="0" r="2"/>
        <circle cx="40" cy="8" r="2"/>
      </g>
      <!-- 延长线找北极星 -->
      <line x1="10" y1="5" x2="55" y2="20" stroke="#e07856" stroke-width="1.5" stroke-dasharray="3,3"/>
      <circle cx="55" cy="20" r="3" fill="#e07856"/>
      <text x="62" y="22" font-family="serif" font-size="10" fill="#e07856">北极星</text>
    </g>
  </g>

  <!-- 底部说明 -->
  <rect x="60" y="545" width="680" height="40" fill="#fff6df" stroke="#e8a838" stroke-width="1" rx="6" opacity="0.85"/>
  <text x="400" y="568" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a14">星座是人类给星空写的诗，让冰冷的星星有了温度和意义</text>
</svg>
