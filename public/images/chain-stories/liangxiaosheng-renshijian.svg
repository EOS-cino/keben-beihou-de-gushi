<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="梁晓声从贫寒少年到著名作家插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a3b14" font-family="serif">连珠小故事：梁晓声和《人世间》</text>
  <line x1="170" y1="55" x2="630" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 时间轴 -->
  <line x1="100" y1="290" x2="700" y2="290" stroke="#c8843a" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>
  <circle cx="170" cy="290" r="6" fill="#c8843a"/>
  <circle cx="340" cy="290" r="6" fill="#c8843a"/>
  <circle cx="510" cy="290" r="6" fill="#c8843a"/>
  <circle cx="660" cy="290" r="6" fill="#c8843a"/>

  <!-- 第一阶段：贫寒少年 -->
  <g transform="translate(170, 200)">
    <!-- 破旧房屋 -->
    <path d="M -30 20 L -30 -10 L 0 -25 L 30 -10 L 30 20 Z" fill="#b89868" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-10" y="0" width="20" height="20" fill="#8a6a3a" stroke="#7a3b14" stroke-width="1"/>
    <!-- 烟囱 -->
    <rect x="15" y="-20" width="8" height="12" fill="#8a6a3a" stroke="#7a3b14" stroke-width="1"/>
    <!-- 小人（少年梁晓声读书） -->
    <g transform="translate(-15, 25)">
      <circle cx="0" cy="0" r="6" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
      <path d="M -4 6 Q -5 16 -3 22 Q 0 24 3 22 Q 5 16 4 6" fill="#4a6a8a" stroke="#7a3b14" stroke-width="1"/>
      <!-- 小书 -->
      <rect x="3" y="10" width="8" height="6" fill="#f0e8d8" stroke="#7a3b14" stroke-width="0.8"/>
    </g>
  </g>
  <text x="170" y="320" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">贫寒少年</text>

  <!-- 第二阶段：复旦大学 -->
  <g transform="translate(340, 200)">
    <!-- 大学校门 -->
    <rect x="-35" y="-20" width="10" height="40" fill="#b89868" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="25" y="-20" width="10" height="40" fill="#b89868" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M -35 -20 Q 0 -35 35 -20" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-size="9" fill="#7a3b14" font-family="serif">复旦</text>
    <!-- 学士帽 -->
    <g transform="translate(0, 25)">
      <path d="M -12 -2 L 0 -8 L 12 -2 L 0 4 Z" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1"/>
      <rect x="-3" y="-2" width="6" height="8" fill="#3a3a3a"/>
      <line x1="6" y1="-2" x2="12" y2="2" stroke="#c84030" stroke-width="1.5"/>
      <circle cx="12" cy="2" r="2" fill="#c84030"/>
    </g>
  </g>
  <text x="340" y="320" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">考入复旦</text>

  <!-- 第三阶段：写作生涯 -->
  <g transform="translate(510, 200)">
    <!-- 书桌和书堆 -->
    <rect x="-30" y="15" width="60" height="6" fill="#8a6a3a" stroke="#7a3b14" stroke-width="1"/>
    <rect x="-25" y="5" width="40" height="10" fill="#c84030" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-22" y="-5" width="40" height="10" fill="#3a5a8a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-20" y="-15" width="36" height="10" fill="#4a7a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 笔 -->
    <line x1="15" y1="-15" x2="25" y2="-25" stroke="#7a3b14" stroke-width="2"/>
    <path d="M 25 -25 L 28 -28 L 26 -22" fill="#7a3b14"/>
    <!-- 文字 -->
    <text x="0" y="0" text-anchor="middle" font-size="7" fill="#fff" font-family="serif">作品</text>
  </g>
  <text x="510" y="320" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">笔耕不辍</text>

  <!-- 第四阶段：人世间 -->
  <g transform="translate(660, 200)">
    <!-- 《人世间》书 -->
    <rect x="-22" y="-18" width="44" height="40" fill="#8a3a2a" stroke="#7a3b14" stroke-width="2"/>
    <rect x="-19" y="-15" width="38" height="34" fill="#f0e8d8"/>
    <text x="0" y="-2" text-anchor="middle" font-size="11" fill="#8a3a2a" font-family="serif" font-weight="bold">人世间</text>
    <text x="0" y="10" text-anchor="middle" font-size="7" fill="#7a3b14" font-family="serif">茅盾文学奖</text>
    <!-- 奖牌 -->
    <g transform="translate(0, 28)">
      <circle cx="0" cy="0" r="8" fill="#f0c840" stroke="#c8843a" stroke-width="1.5"/>
      <text x="0" y="3" text-anchor="middle" font-size="8" fill="#7a3b14" font-family="serif">奖</text>
    </g>
  </g>
  <text x="660" y="320" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">《人世间》</text>

  <!-- 底部：梁晓声人物 -->
  <g transform="translate(400, 440)">
    <!-- 身体 -->
    <path d="M -28 75 Q -30 25 -25 8 Q -15 0 0 0 Q 15 0 25 8 Q 30 25 28 75" fill="#4a5a6a" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头 -->
    <circle cx="0" cy="-18" r="20" fill="#e8c4a0" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头发 -->
    <path d="M -20 -20 Q -18 -36 0 -38 Q 18 -36 20 -20" fill="#5a4a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 眼镜 -->
    <circle cx="-7" cy="-18" r="6" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="7" cy="-18" r="6" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-1" y1="-18" x2="1" y2="-18" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-7" cy="-18" r="1.5" fill="#7a3b14"/>
    <circle cx="7" cy="-18" r="1.5" fill="#7a3b14"/>
    <!-- 嘴 -->
    <path d="M -5 -8 Q 0 -5 5 -8" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 手拿书 -->
    <path d="M 25 15 Q 40 25 45 40" fill="none" stroke="#4a5a6a" stroke-width="9" stroke-linecap="round"/>
    <rect x="38" y="35" width="20" height="14" fill="#8a3a2a" stroke="#7a3b14" stroke-width="1.5" transform="rotate(-15 48 42)"/>
  </g>

  <!-- 标注 -->
  <line x1="400" y1="415" x2="400" y2="375" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="345" y="350" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="368" text-anchor="middle" font-size="15" fill="#7a3b14" font-family="serif">梁晓声</text>

  <!-- 底部说明 -->
  <rect x="50" y="545" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="570" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">从贫寒少年到著名作家——母亲的一元五角买书钱，换来了一辈子的笔耕与《人世间》。</text>
</svg>
