<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="青蛙变态发育过程插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" fill="#2d2a24" font-family="sans-serif" font-weight="bold">青蛙的变态发育过程</text>
  <text x="400" y="68" text-anchor="middle" font-size="14" fill="#6b6557" font-family="sans-serif">从卵到青蛙的五个阶段</text>

  <!-- 底部水池 -->
  <rect x="0" y="440" width="800" height="160" fill="#7ec0db" opacity="0.3"/>
  <path d="M0 440 Q200 430 400 440 T800 440" fill="none" stroke="#5da8c8" stroke-width="2"/>

  <!-- 阶段1：蛙卵 -->
  <g transform="translate(110,280)">
    <text x="0" y="-70" text-anchor="middle" font-size="14" fill="#2d5a1a" font-family="sans-serif" font-weight="bold">① 蛙卵</text>
    <!-- 卵团 -->
    <ellipse cx="0" cy="0" rx="50" ry="35" fill="#b8d8a8" opacity="0.5"/>
    <circle cx="-20" cy="-10" r="10" fill="#3a3a2a"/>
    <circle cx="-20" cy="-10" r="5" fill="#5a5a3a"/>
    <circle cx="0" cy="-5" r="10" fill="#3a3a2a"/>
    <circle cx="0" cy="-5" r="5" fill="#5a5a3a"/>
    <circle cx="18" cy="-12" r="10" fill="#3a3a2a"/>
    <circle cx="18" cy="-12" r="5" fill="#5a5a3a"/>
    <circle cx="-12" cy="12" r="10" fill="#3a3a2a"/>
    <circle cx="-12" cy="12" r="5" fill="#5a5a3a"/>
    <circle cx="10" cy="14" r="10" fill="#3a3a2a"/>
    <circle cx="10" cy="14" r="5" fill="#5a5a3a"/>
    <!-- 水面线 -->
    <line x1="-55" y1="40" x2="55" y2="40" stroke="#5da8c8" stroke-width="2"/>
  </g>

  <!-- 箭头1 -->
  <path d="M180 280 L230 280" stroke="#8d6a3d" stroke-width="3" fill="none" marker-end="url(#arrow1)"/>

  <!-- 阶段2：小蝌蚪 -->
  <g transform="translate(290,280)">
    <text x="0" y="-70" text-anchor="middle" font-size="14" fill="#2d5a1a" font-family="sans-serif" font-weight="bold">② 蝌蚪</text>
    <ellipse cx="0" cy="0" rx="28" ry="20" fill="#2a2a2a"/>
    <ellipse cx="0" cy="-4" rx="22" ry="15" fill="#3a3a3a"/>
    <path d="M24 0 Q55 -12 78 4 Q65 6 24 8" fill="#2a2a2a"/>
    <circle cx="-10" cy="-5" r="4" fill="#ffffff" opacity="0.8"/>
    <circle cx="8" cy="-5" r="4" fill="#ffffff" opacity="0.8"/>
    <circle cx="-10" cy="-4" r="2" fill="#1a1a1a"/>
    <circle cx="8" cy="-4" r="2" fill="#1a1a1a"/>
    <line x1="-55" y1="40" x2="55" y2="40" stroke="#5da8c8" stroke-width="2"/>
  </g>

  <!-- 箭头2 -->
  <path d="M370 280 L420 280" stroke="#8d6a3d" stroke-width="3" fill="none" marker-end="url(#arrow1)"/>

  <!-- 阶段3：长后腿的蝌蚪 -->
  <g transform="translate(480,280)">
    <text x="0" y="-70" text-anchor="middle" font-size="14" fill="#2d5a1a" font-family="sans-serif" font-weight="bold">③ 长后腿</text>
    <ellipse cx="0" cy="0" rx="26" ry="18" fill="#2a2a2a"/>
    <ellipse cx="0" cy="-3" rx="20" ry="14" fill="#3a3a3a"/>
    <path d="M22 0 Q50 -10 70 4 Q58 6 22 7" fill="#2a2a2a"/>
    <!-- 后腿 -->
    <ellipse cx="-18" cy="15" rx="6" ry="14" fill="#6ab04c" transform="rotate(-30 -18 15)"/>
    <ellipse cx="18" cy="15" rx="6" ry="14" fill="#6ab04c" transform="rotate(30 18 15)"/>
    <circle cx="-10" cy="-5" r="3.5" fill="#ffffff" opacity="0.8"/>
    <circle cx="7" cy="-5" r="3.5" fill="#ffffff" opacity="0.8"/>
    <line x1="-50" y1="40" x2="50" y2="40" stroke="#5da8c8" stroke-width="2"/>
  </g>

  <!-- 箭头3 -->
  <path d="M560 280 L610 280" stroke="#8d6a3d" stroke-width="3" fill="none" marker-end="url(#arrow1)"/>

  <!-- 阶段4：长前腿的小青蛙 -->
  <g transform="translate(680,280)">
    <text x="0" y="-70" text-anchor="middle" font-size="14" fill="#2d5a1a" font-family="sans-serif" font-weight="bold">④ 幼蛙</text>
    <ellipse cx="0" cy="5" rx="30" ry="22" fill="#6ab04c"/>
    <ellipse cx="0" cy="2" rx="26" ry="18" fill="#7cc85a"/>
    <!-- 短尾巴 -->
    <path d="M26 5 Q40 0 48 8 Q38 10 26 10" fill="#5a9d3e"/>
    <!-- 后腿 -->
    <ellipse cx="-22" cy="20" rx="8" ry="14" fill="#5a9d3e" transform="rotate(-25 -22 20)"/>
    <ellipse cx="22" cy="20" rx="8" ry="14" fill="#5a9d3e" transform="rotate(25 22 20)"/>
    <!-- 前腿 -->
    <ellipse cx="-15" cy="22" rx="5" ry="10" fill="#6ab04c"/>
    <ellipse cx="15" cy="22" rx="5" ry="10" fill="#6ab04c"/>
    <!-- 眼睛 -->
    <circle cx="-10" cy="-10" r="6" fill="#7cc85a"/>
    <circle cx="10" cy="-10" r="6" fill="#7cc85a"/>
    <circle cx="-10" cy="-9" r="3" fill="#1a1a1a"/>
    <circle cx="10" cy="-9" r="3" fill="#1a1a1a"/>
    <line x1="-50" y1="40" x2="50" y2="40" stroke="#5da8c8" stroke-width="2"/>
  </g>

  <!-- 向下箭头到成蛙 -->
  <path d="M680 340 Q680 380 500 400" stroke="#8d6a3d" stroke-width="3" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow1)"/>

  <!-- 阶段5：成蛙 -->
  <g transform="translate(400,490)">
    <text x="0" y="-50" text-anchor="middle" font-size="14" fill="#2d5a1a" font-family="sans-serif" font-weight="bold">⑤ 成蛙</text>
    <!-- 荷叶 -->
    <ellipse cx="0" cy="25" rx="80" ry="20" fill="#3d8b4e"/>
    <ellipse cx="0" cy="22" rx="76" ry="16" fill="#5cb070"/>
    <!-- 身体 -->
    <ellipse cx="0" cy="-5" rx="45" ry="30" fill="#6ab04c"/>
    <ellipse cx="0" cy="-8" rx="40" ry="26" fill="#7cc85a"/>
    <!-- 后腿 -->
    <ellipse cx="-38" cy="10" rx="18" ry="11" fill="#5a9d3e" transform="rotate(-25 -38 10)"/>
    <ellipse cx="38" cy="10" rx="18" ry="11" fill="#5a9d3e" transform="rotate(25 38 10)"/>
    <!-- 前腿 -->
    <ellipse cx="-22" cy="15" rx="7" ry="14" fill="#6ab04c"/>
    <ellipse cx="22" cy="15" rx="7" ry="14" fill="#6ab04c"/>
    <!-- 头部 -->
    <ellipse cx="0" cy="-28" rx="32" ry="22" fill="#7cc85a"/>
    <!-- 眼睛 -->
    <circle cx="-14" cy="-40" r="11" fill="#7cc85a"/>
    <circle cx="14" cy="-40" r="11" fill="#7cc85a"/>
    <circle cx="-14" cy="-38" r="7" fill="#ffffff"/>
    <circle cx="14" cy="-38" r="7" fill="#ffffff"/>
    <circle cx="-14" cy="-37" r="4" fill="#1a1a1a"/>
    <circle cx="14" cy="-37" r="4" fill="#1a1a1a"/>
    <!-- 嘴巴 -->
    <path d="M-16 -22 Q0 -14 16 -22" fill="none" stroke="#3d6b28" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#8d6a3d"/>
    </marker>
  </defs>

  <!-- 说明文字 -->
  <text x="400" y="565" text-anchor="middle" font-size="13" fill="#6b6557" font-family="sans-serif">蝌蚪用鳃呼吸、靠尾巴游泳 → 青蛙用肺呼吸、靠四肢跳跃</text>
</svg>
