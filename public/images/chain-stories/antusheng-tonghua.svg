<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="安徒生童话老房子插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">安徒生童话里的温暖</text>
  <line x1="270" y1="58" x2="530" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 背景：丹麦小镇 -->
  <rect x="0" y="64" width="800" height="240" fill="#d8e0e8"/>
  <!-- 远处尖塔 -->
  <rect x="100" y="120" width="30" height="100" fill="#b8a888"/>
  <path d="M100 120 L115 90 L130 120 Z" fill="#8d5a36"/>
  <!-- 远处房屋 -->
  <rect x="180" y="160" width="60" height="60" fill="#d8b888"/>
  <path d="M175 160 L210 130 L245 160 Z" fill="#c8483a"/>
  <rect x="600" y="155" width="70" height="65" fill="#d8b888"/>
  <path d="M595 155 L635 125 L675 155 Z" fill="#3a6a9a"/>

  <!-- 地面 -->
  <rect x="0" y="304" width="800" height="256" fill="#c8a878"/>

  <!-- 安徒生（坐姿） -->
  <g transform="translate(180,380)">
    <!-- 帽子 -->
    <ellipse cx="0" cy="-95" rx="18" ry="5" fill="#3d2817"/>
    <path d="M-12 -95 Q0 -110 12 -95 Z" fill="#3d2817"/>
    <!-- 头 -->
    <ellipse cx="0" cy="-80" rx="14" ry="17" fill="#e8c4a0"/>
    <!-- 头发 -->
    <path d="M-14 -88 Q-10 -98 0 -98 Q10 -98 14 -88" fill="#c8a878"/>
    <!-- 眼睛 -->
    <circle cx="-5" cy="-80" r="1.5" fill="#3d2817"/><circle cx="5" cy="-80" r="1.5" fill="#3d2817"/>
    <!-- 鼻子 -->
    <path d="M0 -78 L-2 -72 L2 -72" fill="none" stroke="#c8a080" stroke-width="1"/>
    <!-- 嘴 -->
    <path d="M-3 -68 Q0 -65 3 -68" fill="none" stroke="#8d5a36" stroke-width="1"/>
    <!-- 身体（坐姿） -->
    <path d="M-20 -63 L-25 -20 L-15 -10 L15 -10 L25 -20 L20 -63 Z" fill="#3a6a9a"/>
    <!-- 手臂（拿书） -->
    <path d="M-20 -50 L-35 -35 L-30 -20" stroke="#3a6a9a" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M20 -50 L35 -35 L30 -20" stroke="#3a6a9a" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- 书 -->
    <rect x="-35" y="-25" width="70" height="20" fill="#fff6df" stroke="#8d5a36" stroke-width="1.5"/>
    <line x1="0" y1="-25" x2="0" y2="-5" stroke="#c8843a" stroke-width="1"/>
    <!-- 腿 -->
    <path d="M-12 -10 L-15 20 L-20 25" stroke="#5a3a1a" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M12 -10 L15 20 L20 25" stroke="#5a3a1a" stroke-width="8" fill="none" stroke-linecap="round"/>
    <ellipse cx="-22" cy="27" rx="8" ry="3" fill="#2d1c10"/>
    <ellipse cx="22" cy="27" rx="8" ry="3" fill="#2d1c10"/>
  </g>

  <!-- 丑小鸭 -->
  <g transform="translate(330,440)">
    <ellipse cx="0" cy="0" rx="16" ry="11" fill="#e8e0d0" stroke="#aaaab8" stroke-width="1"/>
    <circle cx="13" cy="-8" r="9" fill="#e8e0d0" stroke="#aaaab8" stroke-width="1"/>
    <path d="M22 -8 L28 -6 L22 -4 Z" fill="#e8a838"/>
    <circle cx="11" cy="-9" r="1.5" fill="#3d2817"/>
    <!-- 翅膀 -->
    <ellipse cx="-3" cy="-2" rx="8" ry="5" fill="#d8d0c0" transform="rotate(-20 -3 -2)"/>
  </g>

  <!-- 拇指姑娘（花上） -->
  <g transform="translate(480,400)">
    <!-- 花茎 -->
    <path d="M0 50 Q-2 25 0 0" fill="none" stroke="#5a8a3a" stroke-width="3"/>
    <!-- 花瓣 -->
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="#e8a838"/>
    <ellipse cx="0" cy="-5" rx="18" ry="10" fill="#f0c438"/>
    <!-- 拇指姑娘 -->
    <circle cx="0" cy="-5" r="5" fill="#e8c4a0"/>
    <rect x="-3" y="-1" width="6" height="8" fill="#d4648a" rx="2"/>
    <circle cx="-1.5" cy="-6" r="0.8" fill="#3d2817"/><circle cx="1.5" cy="-6" r="0.8" fill="#3d2817"/>
  </g>

  <!-- 卖火柴的小女孩 -->
  <g transform="translate(620,430)">
    <circle cx="0" cy="-40" r="11" fill="#e8c4a0"/>
    <path d="M-11 -48 Q0 -60 11 -48 Z" fill="#c8483a"/>
    <rect x="-11" y="-29" width="22" height="24" rx="3" fill="#c8483a"/>
    <rect x="-5" y="-5" width="10" height="16" fill="#5a3a1a"/>
    <!-- 火柴 -->
    <rect x="11" y="-25" width="3" height="20" fill="#8d5a36" transform="rotate(20 11 -25)"/>
    <circle cx="20" cy="-30" r="4" fill="#e8a838"/>
    <path d="M20 -34 Q22 -40 20 -44 Q18 -40 20 -34" fill="#e8783a" opacity="0.7"/>
    <circle cx="-4" cy="-42" r="1.3" fill="#3d2817"/><circle cx="4" cy="-42" r="1.3" fill="#3d2817"/>
  </g>

  <!-- 标注：安徒生 -->
  <line x1="180" y1="380" x2="110" y2="340" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="40" y="320" width="90" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="85" y="339" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">安徒生</text>

  <!-- 标注：丑小鸭 -->
  <line x1="330" y1="440" x2="330" y2="400" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="285" y="375" width="90" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="330" y="394" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">丑小鸭</text>

  <!-- 标注：拇指姑娘 -->
  <line x1="480" y1="400" x2="480" y2="360" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="430" y="335" width="100" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="480" y="354" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">拇指姑娘</text>

  <!-- 标注：卖火柴的小女孩 -->
  <line x1="620" y1="430" x2="680" y2="390" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="640" y="365" width="140" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="710" y="384" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">卖火柴的小女孩</text>

  <!-- 底部说明 -->
  <rect x="40" y="548" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="573" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">安徒生童话里，弱小而善良的角色总能找到温暖，这和老屋帮助小动物的故事一样动人。</text>
</svg>
