<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="河流孕育人类文明连珠故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#4a90b8">连珠小故事：河流孕育的文明</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#e8a838" stroke-width="1.5"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#7a7468">四大文明都诞生在大河边——河养育文明，文明依河而生</text>

  <!-- 顶部：四大文明大河 -->
  <g transform="translate(400 170)">
    <!-- 四条河 -->
    <!-- 尼罗河 -->
    <g transform="translate(-225 0)">
      <path d="M-30 20 Q-20 30 -10 25 Q0 20 10 30 Q20 40 30 30" fill="none" stroke="#4a90b8" stroke-width="4"/>
      <text x="0" y="-8" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#8a5a14">尼罗河</text>
      <text x="0" y="6" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">古埃及</text>
      <!-- 金字塔 -->
      <path d="M-8 20 L0 8 L8 20 Z" fill="#e8a838" opacity="0.7"/>
    </g>
    <!-- 两河 -->
    <g transform="translate(-75 0)">
      <path d="M-25 25 Q-15 30 -5 25 Q5 20 15 30 Q25 40 35 30" fill="none" stroke="#4a90b8" stroke-width="3"/>
      <path d="M-25 15 Q-15 20 -5 15 Q5 10 15 20" fill="none" stroke="#4a90b8" stroke-width="3"/>
      <text x="5" y="-8" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#8a5a14">两河</text>
      <text x="5" y="6" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">古巴比伦</text>
      <!-- 楔形文字块 -->
      <rect x="-6" y="14" width="12" height="6" fill="#8a6a3a" opacity="0.6"/>
    </g>
    <!-- 恒河 -->
    <g transform="translate(75 0)">
      <path d="M-30 25 Q-20 30 -10 25 Q0 20 10 30 Q20 40 30 30" fill="none" stroke="#4a90b8" stroke-width="4"/>
      <text x="0" y="-8" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#8a5a14">恒河</text>
      <text x="0" y="6" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">古印度</text>
      <!-- 神庙 -->
      <path d="M-6 20 L-6 14 L0 8 L6 14 L6 20 Z" fill="#e07856" opacity="0.6"/>
    </g>
    <!-- 黄河 -->
    <g transform="translate(225 0)">
      <path d="M-30 25 Q-20 30 -10 25 Q0 20 10 30 Q20 40 30 30" fill="none" stroke="#e8a838" stroke-width="4"/>
      <text x="0" y="-8" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#8a5a14">黄河</text>
      <text x="0" y="6" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">中华文明</text>
      <!-- 鼎 -->
      <path d="M-7 20 L-7 12 L7 12 L7 20 M-9 12 L9 12 M-7 20 L-9 22 M7 20 L9 22" fill="none" stroke="#8a6a3a" stroke-width="1.5"/>
    </g>
  </g>

  <!-- 中间：黄河孕育 -->
  <g transform="translate(400 320)">
    <rect x="-180" y="-50" width="360" height="100" fill="#fff6df" stroke="#e8a838" stroke-width="1.5" rx="8"/>
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#8a5a14">黄河——中华民族的母亲河</text>
    <!-- 黄河奔流 -->
    <path d="M-150 0 Q-100 -15 -50 0 Q0 15 50 0 Q100 -15 150 0" fill="none" stroke="#e8a838" stroke-width="5" opacity="0.7"/>
    <path d="M-150 8 Q-100 -7 -50 8 Q0 23 50 8 Q100 -7 150 8" fill="none" stroke="#e8a838" stroke-width="3" opacity="0.4"/>
    <!-- 沿河城市标记 -->
    <g fill="#e07856">
      <circle cx="-120" cy="-5" r="3"/>
      <circle cx="-40" cy="3" r="3"/>
      <circle cx="40" cy="3" r="3"/>
      <circle cx="120" cy="-5" r="3"/>
    </g>
    <text x="-120" y="22" text-anchor="middle" font-family="serif" font-size="9" fill="#7a7468">西安</text>
    <text x="-40" y="22" text-anchor="middle" font-family="serif" font-size="9" fill="#7a7468">洛阳</text>
    <text x="40" y="22" text-anchor="middle" font-family="serif" font-size="9" fill="#7a7468">开封</text>
    <text x="120" y="22" text-anchor="middle" font-family="serif" font-size="9" fill="#7a7468">济南</text>
    <text x="0" y="42" text-anchor="middle" font-family="serif" font-size="11" fill="#7a7468">冲积平原肥沃，祖先定居耕种建村立国</text>
  </g>

  <!-- 底部：河是路 + 治水 -->
  <g transform="translate(200 450)">
    <rect x="-90" y="-35" width="180" height="80" fill="#fff6df" stroke="#4a90b8" stroke-width="1.5" rx="8"/>
    <text x="0" y="-18" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#8a5a14">河是"路"</text>
    <!-- 船 -->
    <path d="M-30 10 Q0 18 30 10 L26 4 L-26 4 Z" fill="#8a6a3a"/>
    <rect x="-2" y="-8" width="4" height="12" fill="#5a4a2a"/>
    <path d="M2 -8 L14 -4 L2 0" fill="#e07856" opacity="0.7"/>
    <!-- 水波 -->
    <path d="M-40 18 Q-20 22 0 18 Q20 14 40 18" fill="none" stroke="#4a90b8" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="36" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">运河连通五大水系</text>
  </g>

  <g transform="translate(600 450)">
    <rect x="-90" y="-35" width="180" height="80" fill="#fff6df" stroke="#e07856" stroke-width="1.5" rx="8"/>
    <text x="0" y="-18" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#8a5a14">河要"治"</text>
    <!-- 大坝 -->
    <path d="M-40 10 L-40 -20 L0 -25 L40 -20 L40 10 Z" fill="#8a6a3a" stroke="#5a4a2a" stroke-width="1.5"/>
    <!-- 水流 -->
    <path d="M-40 0 Q-50 5 -55 10" fill="none" stroke="#4a90b8" stroke-width="2"/>
    <path d="M40 0 Q50 5 55 10" fill="none" stroke="#4a90b8" stroke-width="2"/>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="10" fill="#7a7468">大禹治水→都江堰→三峡</text>
  </g>

  <!-- 底部说明 -->
  <rect x="60" y="535" width="680" height="40" fill="#fff6df" stroke="#e8a838" stroke-width="1" rx="6" opacity="0.85"/>
  <text x="400" y="558" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a14">每一条河，都是一段文明的起点——既依赖它，又防备它</text>
</svg>
