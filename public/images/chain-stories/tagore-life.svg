<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="泰戈尔的诗意人生插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">泰戈尔的诗意人生</text>
  <line x1="250" y1="56" x2="550" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——从印度加尔各答到诺贝尔奖</text>

  <!-- 时间轴 -->
  <line x1="80" y1="350" x2="720" y2="350" stroke="#c8843a" stroke-width="3"/>
  <circle cx="150" cy="350" r="8" fill="#6a8d3f"/>
  <circle cx="320" cy="350" r="8" fill="#c8843a"/>
  <circle cx="500" cy="350" r="8" fill="#e07856"/>
  <circle cx="650" cy="350" r="8" fill="#7ab8d8"/>

  <!-- 1861：出生 -->
  <g transform="translate(150, 200)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#6a8d3f">1861年</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">出生于印度</text>
    <text x="0" y="33" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">加尔各答</text>
    <!-- 小房子 -->
    <g transform="translate(0, 80)">
      <path d="M-25 40 L-25 10 L0 -10 L25 10 L25 40 Z" fill="#c8843a" stroke="#7a3b14" stroke-width="2"/>
      <rect x="-8" y="20" width="16" height="20" fill="#8d5a36"/>
      <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">文化世家</text>
      <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">14个孩子中最小</text>
    </g>
  </g>

  <!-- 17岁：发表长诗 -->
  <g transform="translate(320, 200)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#c8843a">17岁</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">发表第一首</text>
    <text x="0" y="33" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">长诗</text>
    <!-- 书和笔 -->
    <g transform="translate(0, 80)">
      <rect x="-20" y="20" width="40" height="30" fill="#fef9ed" stroke="#7a3b14" stroke-width="2"/>
      <line x1="-15" y1="28" x2="15" y2="28" stroke="#7a3b14" stroke-width="0.5"/>
      <line x1="-15" y1="33" x2="15" y2="33" stroke="#7a3b14" stroke-width="0.5"/>
      <line x1="-15" y1="38" x2="15" y2="38" stroke="#7a3b14" stroke-width="0.5"/>
      <path d="M15 25 L25 20 L25 45 L15 40" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
      <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">写诗·写小说</text>
      <text x="0" y="78" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">还谱曲·画画</text>
    </g>
  </g>

  <!-- 1913：诺贝尔奖 -->
  <g transform="translate(500, 200)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#e07856">1913年</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">诺贝尔文学奖</text>
    <text x="0" y="33" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">第一位亚洲人</text>
    <!-- 奖牌 -->
    <g transform="translate(0, 90)">
      <circle cx="0" cy="0" r="22" fill="#c8843a" stroke="#7a3b14" stroke-width="2"/>
      <circle cx="0" cy="0" r="16" fill="#e07856" opacity="0.5"/>
      <text x="0" y="4" text-anchor="middle" font-family="serif" font-size="9" fill="#fef9ed">Nobel</text>
      <path d="M-15 -15 L-25 -25 M15 -15 L25 -25" stroke="#c8843a" stroke-width="2"/>
      <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">《吉檀迦利》</text>
      <text x="0" y="53" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">英文自译出版</text>
    </g>
  </g>

  <!-- 1924：访华 -->
  <g transform="translate(650, 200)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7ab8d8">1924年</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">访问中国</text>
    <text x="0" y="33" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">影响冰心等作家</text>
    <!-- 中印友谊 -->
    <g transform="translate(0, 90)">
      <circle cx="-15" cy="0" r="12" fill="#e07856" opacity="0.5" stroke="#7a3b14" stroke-width="1.5"/>
      <text x="-15" y="3" text-anchor="middle" font-family="serif" font-size="8" fill="#7a3b14">印</text>
      <path d="M-3 0 L3 0" stroke="#c8843a" stroke-width="2"/>
      <path d="M3 0 L0 -3 M3 0 L0 3" stroke="#c8843a" stroke-width="2" fill="none"/>
      <circle cx="15" cy="0" r="12" fill="#c84a3a" opacity="0.5" stroke="#7a3b14" stroke-width="1.5"/>
      <text x="15" y="3" text-anchor="middle" font-family="serif" font-size="8" fill="#fef9ed">中</text>
      <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">与徐志摩·林徽因</text>
      <text x="0" y="43" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">成为朋友</text>
    </g>
  </g>

  <!-- 底部标注 -->
  <g transform="translate(400, 460)">
    <rect x="-280" y="0" width="560" height="100" rx="10" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">泰戈尔的一生</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">写诗·写小说·写剧本·谱曲（印度和孟加拉国国歌都是他写的曲子）·画画</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">《新月集》写童真和母爱，《飞鸟集》短小精悍</text>
    <text x="0" y="88" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">"好的文字没有国界——一首小诗可以从印度飘到中国，再飘向世界"</text>
  </g>
</svg>
