<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠小故事：说话算话的人">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：说话算话的人</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">从古到今，说到做到</text>
  <g transform="translate(150,280)">
    <ellipse cx="0" cy="30" rx="35" ry="20" fill="#f0d8b8" stroke="#a8742a" stroke-width="2"/>
    <circle cx="-20" cy="18" r="6" fill="#c98a3a"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#a8742a">曾子杀猪</text>
  </g>
  <g transform="translate(330,280)">
    <rect x="-25" y="10" width="50" height="35" rx="4" fill="#f6dca0" stroke="#c98a3a" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="serif" font-size="20" fill="#c98a3a">金</text>
    <text x="0" y="70" text-anchor="middle" font-family="serif" font-size="14" fill="#a8742a">季布一诺</text>
  </g>
  <g transform="translate(510,280)">
    <circle cx="0" cy="20" r="18" fill="#fbe9c8" stroke="#c98a3a" stroke-width="2"/>
    <rect x="-8" y="38" width="16" height="20" fill="#7fb8d8" stroke="#2a5a7a" stroke-width="1"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#5a8fa3">宋庆龄等友</text>
  </g>
  <g transform="translate(670,280)">
    <path d="M0,10 L0,40 M-15,25 L0,40 L15,25" stroke="#5a8b5a" stroke-width="2" fill="none"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="14" fill="#5a8b5a">一诺千金</text>
  </g>
  <text x="400" y="460" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">每一颗珠子，都在说：说到做到</text>
</svg>
