<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="水循环与雨的形成过程插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">雨是怎么形成的</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">水在天上和地面之间不停循环，就变成了雨</text>

  <!-- 天空 -->
  <rect x="0" y="90" width="800" height="320" fill="#a8d0e8" opacity="0.3"/>
  <!-- 海洋/地面水 -->
  <rect x="0" y="410" width="800" height="100" fill="#7ab8d8" opacity="0.5"/>
  <path d="M0 410 Q200 402 400 410 T800 410" fill="none" stroke="#7ab8d8" stroke-width="2"/>
  <text x="100" y="465" text-anchor="middle" font-family="serif" font-size="14" fill="#2d5a7a" font-weight="bold">海洋·江河</text>

  <!-- 太阳 -->
  <g transform="translate(120,150)">
    <circle cx="0" cy="0" r="32" fill="#f4b942"/>
    <g stroke="#f4b942" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-44" x2="0" y2="-56"/>
      <line x1="0" y1="44" x2="0" y2="56"/>
      <line x1="-44" y1="0" x2="-56" y2="0"/>
      <line x1="44" y1="0" x2="56" y2="0"/>
      <line x1="-31" y1="-31" x2="-40" y2="-40"/>
      <line x1="31" y1="-31" x2="40" y2="-40"/>
    </g>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36" font-weight="bold">太阳晒</text>
  </g>

  <!-- 步骤1：蒸发 -->
  <g>
    <!-- 蒸发箭头（向上） -->
    <path d="M200 400 Q210 340 200 280 Q195 240 210 200" fill="none" stroke="#7ab8d8" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#ar3)"/>
    <text x="170" y="330" text-anchor="middle" font-family="serif" font-size="13" fill="#2d5a7a" font-weight="bold">①蒸发</text>
    <text x="170" y="348" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">水变水蒸气上升</text>
    <!-- 小水蒸气点 -->
    <circle cx="195" cy="370" r="3" fill="#a8d0e8" opacity="0.6"/>
    <circle cx="208" cy="350" r="2.5" fill="#a8d0e8" opacity="0.6"/>
    <circle cx="200" cy="320" r="3" fill="#a8d0e8" opacity="0.6"/>
  </g>

  <!-- 步骤2：成云 -->
  <g transform="translate(380,180)">
    <text x="0" y="-50" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14" font-weight="bold">②成云</text>
    <text x="0" y="-32" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">水蒸气变回小水滴</text>
    <!-- 云 -->
    <ellipse cx="-30" cy="0" rx="35" ry="22" fill="#8d8a82"/>
    <ellipse cx="0" cy="-8" rx="40" ry="26" fill="#a0a09a"/>
    <ellipse cx="30" cy="0" rx="35" ry="22" fill="#8d8a82"/>
    <ellipse cx="0" cy="5" rx="50" ry="18" fill="#6a6862" opacity="0.6"/>
    <!-- 小水滴聚集 -->
    <circle cx="-10" cy="10" r="3" fill="#7ab8d8"/>
    <circle cx="5" cy="14" r="3.5" fill="#7ab8d8"/>
    <circle cx="-5" cy="18" r="2.5" fill="#7ab8d8"/>
  </g>

  <!-- 步骤3：水滴变大落下成雨 -->
  <g>
    <path d="M380 230 Q390 320 400 400" fill="none" stroke="#7ab8d8" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#ar3)"/>
    <text x="440" y="320" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14" font-weight="bold">③下雨</text>
    <text x="440" y="338" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">水滴太大托不住</text>
    <!-- 雨滴 -->
    <path d="M385 270 Q382 278 385 284 Q388 278 385 270 Z" fill="#7ab8d8"/>
    <path d="M400 300 Q397 308 400 314 Q403 308 400 300 Z" fill="#7ab8d8"/>
    <path d="M395 340 Q392 348 395 354 Q398 348 395 340 Z" fill="#7ab8d8"/>
  </g>

  <!-- 步骤4：雨水回到地面/大海 -->
  <g>
    <text x="640" y="320" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14" font-weight="bold">④回流</text>
    <text x="640" y="338" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">雨落回地面和大海</text>
    <!-- 大雨滴落下 -->
    <path d="M620 250 Q616 262 620 270 Q624 262 620 250 Z" fill="#7ab8d8"/>
    <path d="M650 280 Q646 292 650 300 Q654 292 650 280 Z" fill="#7ab8d8"/>
    <path d="M630 330 Q626 342 630 350 Q634 342 630 330 Z" fill="#7ab8d8"/>
    <path d="M660 360 Q656 372 660 380 Q664 372 660 360 Z" fill="#7ab8d8"/>
    <!-- 水流入海箭头 -->
    <path d="M680 410 Q720 415 760 412" fill="none" stroke="#7ab8d8" stroke-width="3" marker-end="url(#ar3)"/>
  </g>

  <!-- 循环大箭头（从海回到蒸发） -->
  <path d="M760 430 Q780 300 600 200 Q400 130 220 200" fill="none" stroke="#c8843a" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.5" marker-end="url(#ar3)"/>

  <!-- 底部说明 -->
  <rect x="60" y="520" width="680" height="60" rx="10" fill="#fef0d8" opacity="0.6"/>
  <text x="400" y="548" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">蒸发 → 成云 → 下雨 → 回流 → 再蒸发</text>
  <text x="400" y="568" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">这就是大自然的水循环，水永远不会用完</text>

  <defs>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#7ab8d8"/>
    </marker>
  </defs>
</svg>
