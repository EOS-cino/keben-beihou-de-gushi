<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一棵常青的杉树挂满彩灯和星星">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 夜空背景 -->
  <rect x="0" y="0" width="800" height="480" fill="#1a2a3a"/>
  <rect x="0" y="480" width="800" height="120" fill="#fef9ed"/>
  <!-- 星星 -->
  <circle cx="100" cy="80" r="2" fill="#ffffff"/>
  <circle cx="200" cy="120" r="1.5" fill="#ffffff"/>
  <circle cx="680" cy="90" r="2" fill="#ffffff"/>
  <circle cx="720" cy="160" r="1.5" fill="#ffffff"/>
  <circle cx="120" cy="200" r="1.5" fill="#ffffff"/>
  <circle cx="700" cy="240" r="2" fill="#ffffff"/>
  <circle cx="60" cy="300" r="1.5" fill="#ffffff"/>
  <circle cx="760" cy="320" r="2" fill="#ffffff"/>
  <text x="150" y="60" font-family="serif" font-size="14" fill="#ffffff" opacity="0.7">✦</text>
  <text x="620" y="60" font-family="serif" font-size="14" fill="#ffffff" opacity="0.7">✦</text>
  <!-- 雪地 -->
  <path d="M0 480 Q400 460 800 480 L800 520 L0 520 Z" fill="#ffffff" opacity="0.9"/>
  <!-- 圣诞树（常青杉树） -->
  <path d="M400 100 L280 280 L350 280 L240 400 L330 400 L220 480 L580 480 L470 400 L560 400 L450 280 L520 280 Z" fill="#4a6a2f" stroke="#7a3b14" stroke-width="3"/>
  <!-- 树层次 -->
  <path d="M400 100 L330 200 L470 200 Z" fill="#6a8d3f"/>
  <path d="M400 200 L300 300 L500 300 Z" fill="#6a8d3f" opacity="0.8"/>
  <!-- 树干 -->
  <rect x="385" y="480" width="30" height="40" fill="#8d5a36"/>
  <!-- 顶星 -->
  <path d="M400 60 l10 22 l24 3 l-17 17 l4 24 l-21 -12 l-21 12 l4 -24 l-17 -17 l24 -3 Z" fill="#f4d97a" stroke="#c8843a" stroke-width="2"/>
  <!-- 彩灯串 -->
  <path d="M340 250 Q400 240 460 250" stroke="#c84a3a" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M310 350 Q400 340 490 350" stroke="#7ab8d8" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M280 430 Q400 420 520 430" stroke="#f4d97a" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- 彩灯 -->
  <circle cx="340" cy="250" r="5" fill="#c84a3a"/>
  <circle cx="380" cy="245" r="5" fill="#f4d97a"/>
  <circle cx="420" cy="245" r="5" fill="#7ab8d8"/>
  <circle cx="460" cy="250" r="5" fill="#e07856"/>
  <circle cx="310" cy="350" r="5" fill="#7ab8d8"/>
  <circle cx="355" cy="345" r="5" fill="#c84a3a"/>
  <circle cx="400" cy="343" r="5" fill="#f4d97a"/>
  <circle cx="445" cy="345" r="5" fill="#e07856"/>
  <circle cx="490" cy="350" r="5" fill="#7ab8d8"/>
  <circle cx="280" cy="430" r="5" fill="#f4d97a"/>
  <circle cx="330" cy="425" r="5" fill="#c84a3a"/>
  <circle cx="380" cy="423" r="5" fill="#7ab8d8"/>
  <circle cx="430" cy="423" r="5" fill="#e07856"/>
  <circle cx="480" cy="425" r="5" fill="#f4d97a"/>
  <circle cx="520" cy="430" r="5" fill="#c84a3a"/>
  <!-- 礼盒 -->
  <rect x="250" y="490" width="50" height="40" fill="#c84a3a" stroke="#7a3b14" stroke-width="2"/>
  <rect x="270" y="490" width="10" height="40" fill="#f4d97a"/>
  <rect x="500" y="495" width="45" height="35" fill="#7ab8d8" stroke="#7a3b14" stroke-width="2"/>
  <rect x="518" y="495" width="9" height="35" fill="#c84a3a"/>
  <!-- 蜡烛（起源：马丁路德点蜡烛） -->
  <rect x="620" y="470" width="10" height="30" fill="#f3ece0" stroke="#7a3b14" stroke-width="1.5"/>
  <path d="M625 470 q-4 -8 0 -16 q4 8 0 16 Z" fill="#f4d97a"/>
  <!-- 标题 -->
  <text x="400" y="555" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">圣诞树的由来</text>
</svg>
