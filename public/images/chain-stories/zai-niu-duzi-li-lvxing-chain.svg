<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠小故事：牛有四个胃的秘密">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：牛有四个胃的秘密</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">动物们“藏”着多少科学</text>
  <g transform="translate(140,300)">
    <ellipse cx="0" cy="10" rx="60" ry="34" fill="#d8a868" stroke="#7a4a1a" stroke-width="2"/>
    <path d="M-40,-10 q-20,-40 0,-50 q20,10 10,40" fill="#e8b94a" stroke="#a85a2a" stroke-width="2"/>
    <text x="0" y="100" text-anchor="middle" font-family="serif" font-size="16" fill="#7a4a1a">骆驼·存水</text>
  </g>
  <g transform="translate(400,290)">
    <rect x="-50" y="-20" width="100" height="40" rx="6" fill="#8fb86a" stroke="#3a6b2a" stroke-width="2"/>
    <path d="M-50,-10 q-20,-30 -36,-20" fill="none" stroke="#3a6b2a" stroke-width="3"/>
    <text x="0" y="100" text-anchor="middle" font-family="serif" font-size="16" fill="#3a6b2a">啄木鸟·护脑</text>
  </g>
  <g transform="translate(660,300)">
    <ellipse cx="0" cy="10" rx="50" ry="30" fill="#7fb8a8" stroke="#2a6b5a" stroke-width="2"/>
    <path d="M50,5 q10,-10 0,-20" fill="none" stroke="#2a6b5a" stroke-width="2"/>
    <circle cx="-10" cy="4" r="4" fill="#3a2a1a"/>
    <text x="0" y="100" text-anchor="middle" font-family="serif" font-size="16" fill="#2a6b5a">变色龙·变色</text>
  </g>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">大自然是一本读不完的科学书</text>
</svg>
