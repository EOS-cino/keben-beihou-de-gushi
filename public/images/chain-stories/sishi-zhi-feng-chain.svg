<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="风在古诗词里插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：风在古诗词里</text>
  <line x1="200" y1="55" x2="600" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左上：春风得意 -->
  <g transform="translate(200, 170)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#2d6a4f">春风·希望</text>
    <!-- 卷轴 -->
    <rect x="-90" y="-40" width="180" height="80" fill="#fff8e0" stroke="#7a3b14" stroke-width="2" rx="3"/>
    <rect x="-95" y="-40" width="10" height="80" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <rect x="85" y="-40" width="10" height="80" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">春风又绿江南岸</text>
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">——王安石</text>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">春风得意马蹄疾</text>
    <!-- 柳叶 -->
    <ellipse cx="-70" cy="-50" rx="2" ry="6" fill="#7aaa5a" transform="rotate(-30 -70 -50)"/>
    <ellipse cx="70" cy="-50" rx="2" ry="6" fill="#7aaa5a" transform="rotate(30 70 -50)"/>
  </g>

  <!-- 右上：秋风萧瑟 -->
  <g transform="translate(600, 170)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#e8a838">秋风·伤感</text>
    <rect x="-90" y="-40" width="180" height="80" fill="#fff8e0" stroke="#7a3b14" stroke-width="2" rx="3"/>
    <rect x="-95" y="-40" width="10" height="80" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <rect x="85" y="-40" width="10" height="80" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">秋风萧瑟天气凉</text>
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">——曹丕</text>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">北风卷地白草折</text>
    <!-- 落叶 -->
    <ellipse cx="-70" cy="-50" rx="3" ry="5" fill="#e8a838" opacity="0.6" transform="rotate(45 -70 -50)"/>
    <ellipse cx="70" cy="-50" rx="3" ry="5" fill="#c8843a" opacity="0.5" transform="rotate(-45 70 -50)"/>
  </g>

  <!-- 中间：李峤《风》 -->
  <g transform="translate(400, 340)">
    <rect x="-160" y="-65" width="320" height="130" fill="#fff6df" stroke="#c8843a" stroke-width="2.5" rx="8"/>
    <text x="0" y="-40" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#c84a3a">李峤《风》</text>
    <text x="0" y="-15" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">解落三秋叶，能开二月花。</text>
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">过江千尺浪，入竹万竿斜。</text>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="12" fill="#c8843a">全诗无"风"字，句句在写风</text>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="12" fill="#c8843a">叶落·花开·浪起·竹斜——侧面描写</text>
  </g>

  <!-- 下方：五行配五方 -->
  <g transform="translate(400, 470)">
    <rect x="-280" y="0" width="560" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
    <text x="-210" y="30" text-anchor="middle" font-family="serif" font-size="13" fill="#2d6a4f">东风·春·木·青</text>
    <text x="-70" y="30" text-anchor="middle" font-family="serif" font-size="13" fill="#e07856">南风·夏·火·赤</text>
    <text x="70" y="30" text-anchor="middle" font-family="serif" font-size="13" fill="#e8a838">西风·秋·金·白</text>
    <text x="210" y="30" text-anchor="middle" font-family="serif" font-size="13" fill="#4a90b8">北风·冬·水·黑</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">风看不见摸不着，但叶动、花开、浪起、竹斜——古人用变化写出了风</text>
</svg>
