<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="地动仪插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" fill="#2d2a24" font-family="sans-serif" font-weight="bold">张衡与地动仪</text>
  <text x="400" y="68" text-anchor="middle" font-size="14" fill="#6b6557" font-family="sans-serif">世界上最早的地震检测仪器</text>

  <!-- 底座台子 -->
  <ellipse cx="400" cy="520" rx="200" ry="20" fill="#d4c4a8"/>
  <rect x="220" y="490" width="360" height="30" rx="5" fill="#b8a888"/>

  <!-- 地动仪主体（铜樽形） -->
  <defs>
    <linearGradient id="bronzeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8d6a3d"/>
      <stop offset="30%" stop-color="#c4a060"/>
      <stop offset="50%" stop-color="#d4b878"/>
      <stop offset="70%" stop-color="#c4a060"/>
      <stop offset="100%" stop-color="#8d6a3d"/>
    </linearGradient>
  </defs>

  <!-- 樽身 -->
  <path d="M280 200 Q260 200 255 230 L255 420 Q255 470 280 475 L520 475 Q545 470 545 420 L545 230 Q540 200 520 200 Z" fill="url(#bronzeGrad)" stroke="#6b4a2d" stroke-width="2"/>
  <!-- 顶部开口 -->
  <ellipse cx="400" cy="200" rx="120" ry="20" fill="#6b4a2d"/>
  <ellipse cx="400" cy="200" rx="115" ry="16" fill="#4a3520"/>
  <!-- 底部 -->
  <ellipse cx="400" cy="475" rx="120" ry="18" fill="#8d6a3d"/>

  <!-- 装饰纹路 -->
  <path d="M260 280 Q400 290 540 280" fill="none" stroke="#6b4a2d" stroke-width="2"/>
  <path d="M260 390 Q400 400 540 390" fill="none" stroke="#6b4a2d" stroke-width="2"/>
  <!-- 纹饰图案 -->
  <g opacity="0.4">
    <circle cx="320" cy="335" r="12" fill="none" stroke="#6b4a2d" stroke-width="1.5"/>
    <circle cx="400" cy="335" r="12" fill="none" stroke="#6b4a2d" stroke-width="1.5"/>
    <circle cx="480" cy="335" r="12" fill="none" stroke="#6b4a2d" stroke-width="1.5"/>
  </g>

  <!-- 八条龙（四个方向可见） -->
  <!-- 左龙 -->
  <g transform="translate(255,310)">
    <path d="M0 0 Q-20 -5 -35 -15 Q-45 -10 -50 0 Q-45 5 -35 8 Q-20 10 0 5" fill="#c4a060" stroke="#6b4a2d" stroke-width="1.5"/>
    <circle cx="-48" cy="-3" r="4" fill="#6b4a2d"/>
    <!-- 龙嘴含球 -->
    <circle cx="-55" cy="0" r="6" fill="#e8a040" stroke="#8d6a3d" stroke-width="1"/>
  </g>
  <!-- 右龙 -->
  <g transform="translate(545,310)">
    <path d="M0 0 Q20 -5 35 -15 Q45 -10 50 0 Q45 5 35 8 Q20 10 0 5" fill="#c4a060" stroke="#6b4a2d" stroke-width="1.5"/>
    <circle cx="48" cy="-3" r="4" fill="#6b4a2d"/>
    <circle cx="55" cy="0" r="6" fill="#e8a040" stroke="#8d6a3d" stroke-width="1"/>
  </g>
  <!-- 左下龙 -->
  <g transform="translate(265,400)">
    <path d="M0 0 Q-15 -3 -28 -10 Q-38 -5 -42 3 Q-38 8 -28 10 Q-15 8 0 3" fill="#c4a060" stroke="#6b4a2d" stroke-width="1.5"/>
    <circle cx="-40" cy="0" r="3.5" fill="#6b4a2d"/>
    <circle cx="-46" cy="3" r="5" fill="#e8a040" stroke="#8d6a3d" stroke-width="1"/>
  </g>
  <!-- 右下龙 -->
  <g transform="translate(535,400)">
    <path d="M0 0 Q15 -3 28 -10 Q38 -5 42 3 Q38 8 28 10 Q15 8 0 3" fill="#c4a060" stroke="#6b4a2d" stroke-width="1.5"/>
    <circle cx="40" cy="0" r="3.5" fill="#6b4a2d"/>
    <circle cx="46" cy="3" r="5" fill="#e8a040" stroke="#8d6a3d" stroke-width="1"/>
  </g>

  <!-- 蟾蜍（左） -->
  <g transform="translate(180,500)">
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="#5a7a3a"/>
    <ellipse cx="0" cy="-3" rx="18" ry="11" fill="#6b8a4a"/>
    <circle cx="-7" cy="-10" r="6" fill="#6b8a4a"/>
    <circle cx="7" cy="-10" r="6" fill="#6b8a4a"/>
    <circle cx="-7" cy="-10" r="3" fill="#1a1a1a"/>
    <circle cx="7" cy="-10" r="3" fill="#1a1a1a"/>
    <!-- 张嘴接球 -->
    <ellipse cx="-18" cy="-2" rx="8" ry="5" fill="#3a4a2a"/>
    <circle cx="-22" cy="-2" r="5" fill="#e8a040" stroke="#8d6a3d" stroke-width="1"/>
  </g>
  <text x="180" y="535" text-anchor="middle" font-size="12" fill="#3a5a1a" font-family="sans-serif">蟾蜍</text>

  <!-- 蟾蜍（右） -->
  <g transform="translate(620,500)">
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="#5a7a3a"/>
    <ellipse cx="0" cy="-3" rx="18" ry="11" fill="#6b8a4a"/>
    <circle cx="-7" cy="-10" r="6" fill="#6b8a4a"/>
    <circle cx="7" cy="-10" r="6" fill="#6b8a4a"/>
    <circle cx="-7" cy="-10" r="3" fill="#1a1a1a"/>
    <circle cx="7" cy="-10" r="3" fill="#1a1a1a"/>
    <ellipse cx="18" cy="-2" rx="8" ry="5" fill="#3a4a2a"/>
  </g>
  <text x="620" y="535" text-anchor="middle" font-size="12" fill="#3a5a1a" font-family="sans-serif">蟾蜍</text>

  <!-- 龙标注 -->
  <text x="195" y="295" text-anchor="middle" font-size="12" fill="#6b4a2d" font-family="sans-serif">龙</text>
  <text x="605" y="295" text-anchor="middle" font-size="12" fill="#6b4a2d" font-family="sans-serif">龙</text>

  <!-- 铜球掉落动画示意（虚线） -->
  <path d="M200 313 L185 485" fill="none" stroke="#e36f5b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="140" y="400" text-anchor="middle" font-size="11" fill="#e36f5b" font-family="sans-serif">铜球掉落</text>

  <!-- 地震方向标注 -->
  <text x="400" y="570" text-anchor="middle" font-size="13" fill="#6b6557" font-family="sans-serif">哪个方向地震，那条龙的铜球就落入蟾蜍口中</text>

  <!-- 张衡人物（左上角小图） -->
  <g transform="translate(100,130)">
    <text x="0" y="-15" text-anchor="middle" font-size="12" fill="#2d2a24" font-family="sans-serif" font-weight="bold">张衡</text>
    <!-- 头 -->
    <circle cx="0" cy="0" r="14" fill="#f4c8a0"/>
    <path d="M-14 -5 Q-10 -18 0 -14 Q10 -18 14 -5 Q12 -12 0 -10 Q-12 -12 -14 -5" fill="#2a1a0a"/>
    <!-- 眼睛 -->
    <circle cx="-5" cy="-2" r="1.5" fill="#1a1a1a"/>
    <circle cx="5" cy="-2" r="1.5" fill="#1a1a1a"/>
    <!-- 胡子 -->
    <path d="M-4 6 Q0 10 4 6" fill="none" stroke="#2a1a0a" stroke-width="1"/>
    <!-- 身体（汉服） -->
    <path d="M-18 14 L-22 50 L22 50 L18 14 Z" fill="#4a5a8a"/>
    <path d="M-18 14 L0 20 L18 14" fill="none" stroke="#3a4a7a" stroke-width="1"/>
    <!-- 领子 -->
    <path d="M-8 14 L0 24 L8 14" fill="#6b7ab8"/>
  </g>
</svg>
