  <text x="400" y="488" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">鲧用堵的方法治水，堤坝被洪水冲垮，水患更加严重；</text>
  <text x="400" y="510" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">禹改用疏导的方法，开凿河渠引导洪水入海，终于治水成功。</text>
  <text x="400" y="538" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">堵不如疏，与其和水硬拼，不如顺应水的本性，因势利导。</text>
  <text x="400" y="558" text-anchor="middle" font-size="13" font-weight="bold" fill="#c8843a" font-family="serif">治水的智慧，也是处世的智慧。</text>
