<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="王愿坚的革命故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">连珠小故事：王愿坚的革命故事</text>
  <line x1="180" y1="55" x2="620" y2="55" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 左侧：七根火柴 -->
  <g transform="translate(170, 240)">
    <text x="0" y="-80" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#e07856">七根火柴</text>
    <!-- 草地背景 -->
    <rect x="-80" y="-50" width="160" height="100" fill="#d8e8c8" opacity="0.3" rx="6"/>
    <!-- 手掌中的火柴 -->
    <g transform="translate(0, 0)">
      <!-- 手掌 -->
      <path d="M -25 10 Q -30 -5 -20 -8 L 20 -8 Q 30 -5 25 10 Q 20 20 0 20 Q -20 20 -25 10" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 火柴 -->
      <line x1="-15" y1="-8" x2="-15" y2="-25" stroke="#5a4a2a" stroke-width="1.5"/>
      <circle cx="-15" cy="-27" r="2.5" fill="#c84a3a"/>
      <line x1="-7" y1="-8" x2="-7" y2="-28" stroke="#5a4a2a" stroke-width="1.5"/>
      <circle cx="-7" cy="-30" r="2.5" fill="#c84a3a"/>
      <line x1="1" y1="-8" x2="1" y2="-26" stroke="#5a4a2a" stroke-width="1.5"/>
      <circle cx="1" cy="-28" r="2.5" fill="#c84a3a"/>
      <line x1="9" y1="-8" x2="9" y2="-27" stroke="#5a4a2a" stroke-width="1.5"/>
      <circle cx="9" cy="-29" r="2.5" fill="#c84a3a"/>
      <line x1="17" y1="-8" x2="17" y2="-25" stroke="#5a4a2a" stroke-width="1.5"/>
      <circle cx="17" cy="-27" r="2.5" fill="#c84a3a"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">草地上的生命之火</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">比命还重的七根火柴</text>
  </g>

  <!-- 中间：以小见大 -->
  <g transform="translate(400, 240)">
    <text x="0" y="-80" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">以小见大</text>
    <!-- 小物品 -->
    <g transform="translate(-50, -30)">
      <!-- 火柴 -->
      <line x1="0" y1="0" x2="0" y2="-15" stroke="#5a4a2a" stroke-width="1.5"/>
      <circle cx="0" cy="-17" r="2" fill="#c84a3a"/>
      <text x="0" y="15" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">火柴</text>
    </g>
    <g transform="translate(0, -30)">
      <!-- 书 -->
      <rect x="-8" y="-12" width="16" height="12" fill="#fff8e0" stroke="#7a3b14" stroke-width="1"/>
      <text x="0" y="15" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">书本</text>
    </g>
    <g transform="translate(50, -30)">
      <!-- 灯 -->
      <ellipse cx="0" cy="-10" rx="6" ry="4" fill="#e8a838" opacity="0.7"/>
      <line x1="0" y1="-6" x2="0" y2="0" stroke="#5a4a2a" stroke-width="1.5"/>
      <text x="0" y="15" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">灯光</text>
    </g>
    <!-- 箭头向下 -->
    <path d="M 0 25 L 0 45" fill="none" stroke="#c8843a" stroke-width="2"/>
    <path d="M -5 40 L 0 45 L 5 40" fill="none" stroke="#c8843a" stroke-width="2"/>
    <!-- 大精神 -->
    <rect x="-70" y="50" width="140" height="40" fill="#fff6df" stroke="#c84a3a" stroke-width="2" rx="6"/>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">牺牲·信念·理想</text>
    <text x="0" y="84" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">小细节承载大精神</text>
  </g>

  <!-- 右侧：亲历战争 -->
  <g transform="translate(630, 240)">
    <text x="0" y="-80" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">亲历战争</text>
    <!-- 王愿坚剪影 -->
    <g transform="translate(0, -20)">
      <circle cx="0" cy="0" r="14" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
      <path d="M-10 -6 Q0 -14 10 -6" fill="none" stroke="#2a2a2a" stroke-width="2"/>
      <circle cx="-4" cy="-2" r="1.5" fill="#2a2a2a"/>
      <circle cx="4" cy="-2" r="1.5" fill="#2a2a2a"/>
      <path d="M-3 5 Q0 7 3 5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 身体 -->
      <path d="M-14 12 L-18 50 L18 50 L14 12 Z" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 笔 -->
      <line x1="12" y1="20" x2="20" y2="10" stroke="#7a3b14" stroke-width="2"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">十几岁参加革命</text>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">每个故事都有真实原型</text>
  </g>

  <!-- 下方：核心精神 -->
  <g transform="translate(400, 430)">
    <rect x="-280" y="0" width="560" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">不写大战役的全景，写一个战士、一根火柴、一盏灯、一本书</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="13" fill="#c8843a">那些不识字的战士知道自己在为什么而战——为了让后来的人过上好日子</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">王愿坚：用小细节写大精神，让后人记住那些为理想献出生命的普通人</text>
</svg>
