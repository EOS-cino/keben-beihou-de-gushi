<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠故事 - 风筝与古代游戏">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 连珠标识徽章 -->
  <g transform="translate(60,42)">
    <rect x="-44" y="-22" width="88" height="44" rx="22" fill="#3a7d5c"/>
    <circle cx="-26" cy="0" r="5" fill="#fef9ed"/><circle cx="-10" cy="0" r="5" fill="#fef9ed"/><circle cx="6" cy="0" r="5" fill="#fef9ed"/><circle cx="22" cy="0" r="5" fill="#fef9ed"/>
    <text x="40" y="5" font-family="serif" font-size="16" font-weight="bold" fill="#fef9ed">连珠</text>
  </g>
  <text x="460" y="48" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#3a7d5c">风筝与古代游戏</text>
  <line x1="360" y1="64" x2="560" y2="64" stroke="#3a7d5c" stroke-width="2"/>

  <!-- 顶部：风筝种类展示 -->
  <g transform="translate(400,170)">
    <text x="0" y="-80" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#c05a30">风 筝 种 类</text>
    <line x1="-80" y1="-72" x2="80" y2="-72" stroke="#c05a30" stroke-width="1.5"/>
  </g>

  <!-- 风筝1：沙燕 -->
  <g transform="translate(140,170)">
    <rect x="-70" y="-50" width="140" height="130" rx="8" fill="#fff" stroke="#c05a30" stroke-width="2"/>
    <g transform="translate(0,10)">
      <path d="M0 -10 L-22 -25 L-28 -5 L-22 15 Z" fill="#c05a30"/>
      <path d="M0 -10 L22 -25 L28 -5 L22 15 Z" fill="#c05a30"/>
      <circle cx="0" cy="-18" r="12" fill="#c05a30"/>
      <circle cx="-4" cy="-20" r="2" fill="#fef9ed"/><circle cx="4" cy="-20" r="2" fill="#fef9ed"/>
      <path d="M0 15 Q-4 28 -6 40 M0 15 Q4 28 6 40" stroke="#7a3b14" stroke-width="1.2" fill="none"/>
    </g>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">沙燕风筝</text>
  </g>

  <!-- 风筝2：蜈蚣 -->
  <g transform="translate(330,170)">
    <rect x="-70" y="-50" width="140" height="130" rx="8" fill="#fff" stroke="#3a7d5c" stroke-width="2"/>
    <g transform="translate(0,10)">
      <circle cx="0" cy="-25" r="14" fill="#3a7d5c" opacity="0.8"/>
      <circle cx="-3" cy="-28" r="2" fill="#fef9ed"/><circle cx="3" cy="-28" r="2" fill="#fef9ed"/>
      <circle cx="-6" cy="-20" r="4" fill="#3a7d5c" opacity="0.7"/>
      <circle cx="6" cy="-20" r="4" fill="#3a7d5c" opacity="0.7"/>
      <circle cx="0" cy="-5" r="10" fill="#3a7d5c" opacity="0.7"/>
      <circle cx="0" cy="12" r="10" fill="#3a7d5c" opacity="0.7"/>
      <circle cx="0" cy="29" r="9" fill="#3a7d5c" opacity="0.7"/>
      <line x1="-10" y1="-5" x2="-16" y2="-5" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="10" y1="-5" x2="16" y2="-5" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="-10" y1="12" x2="-16" y2="12" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="10" y1="12" x2="16" y2="12" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">蜈蚣风筝</text>
  </g>

  <!-- 风筝3：金鱼 -->
  <g transform="translate(520,170)">
    <rect x="-70" y="-50" width="140" height="130" rx="8" fill="#fff" stroke="#c05a30" stroke-width="2"/>
    <g transform="translate(0,10)">
      <ellipse cx="0" cy="0" rx="22" ry="16" fill="#c05a30" opacity="0.8"/>
      <path d="M-22 0 Q-35 -10 -40 0 Q-35 10 -22 0" fill="#c05a30" opacity="0.6"/>
      <path d="M20 -8 Q32 -18 35 -5 M20 8 Q32 18 35 5" stroke="#c05a30" stroke-width="3" fill="none" opacity="0.7"/>
      <circle cx="8" cy="-5" r="4" fill="#fef9ed"/>
      <circle cx="8" cy="-5" r="2" fill="#2d2a24"/>
      <path d="M-10 5 Q-5 10 0 5 Q5 10 10 5" stroke="#fef9ed" stroke-width="1.5" fill="none"/>
    </g>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">金鱼风筝</text>
  </g>

  <!-- 风筝4：八卦 -->
  <g transform="translate(710,170)">
    <rect x="-70" y="-50" width="140" height="130" rx="8" fill="#fff" stroke="#3a7d5c" stroke-width="2"/>
    <g transform="translate(0,10)">
      <rect x="-22" y="-22" width="44" height="44" fill="#3a7d5c" opacity="0.7"/>
      <circle cx="0" cy="0" r="16" fill="#fef9ed"/>
      <path d="M0 -16 A16 16 0 0 1 0 16 A8 8 0 0 1 0 0 A8 8 0 0 0 0 -16 Z" fill="#2d2a24"/>
      <circle cx="0" cy="-12" r="3" fill="#2d2a24"/>
      <circle cx="0" cy="12" r="3" fill="#fef9ed"/>
    </g>
    <text x="0" y="68" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">八卦风筝</text>
  </g>

  <!-- 底部：古代游戏 -->
  <g transform="translate(400,420)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#c05a30">古 代 游 戏</text>
    <line x1="-80" y1="-22" x2="80" y2="-22" stroke="#c05a30" stroke-width="1.5"/>
  </g>

  <!-- 游戏1：蹴鞠 -->
  <g transform="translate(150,470)">
    <circle cx="0" cy="0" r="30" fill="#c05a30" opacity="0.15"/>
    <circle cx="0" cy="0" r="20" fill="#c05a30" opacity="0.7"/>
    <path d="M-20 0 L0 -20 L20 0 L0 20 Z" stroke="#fef9ed" stroke-width="1.5" fill="none"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#fef9ed" stroke-width="1"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#fef9ed" stroke-width="1"/>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">蹴鞠</text>
  </g>

  <!-- 游戏2：投壶 -->
  <g transform="translate(320,470)">
    <circle cx="0" cy="0" r="30" fill="#3a7d5c" opacity="0.15"/>
    <path d="M-10 -15 L-12 15 L12 15 L10 -15 Z" fill="#3a7d5c" opacity="0.7"/>
    <ellipse cx="0" cy="-15" rx="10" ry="3" fill="#2d2a24"/>
    <line x1="-3" y1="-25" x2="-3" y2="-18" stroke="#7a3b14" stroke-width="2"/>
    <line x1="3" y1="-25" x2="3" y2="-18" stroke="#7a3b14" stroke-width="2"/>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">投壶</text>
  </g>

  <!-- 游戏3：踢毽子 -->
  <g transform="translate(480,470)">
    <circle cx="0" cy="0" r="30" fill="#c05a30" opacity="0.15"/>
    <circle cx="0" cy="-8" r="6" fill="#c05a30" opacity="0.8"/>
    <path d="M-6 -8 Q-14 0 -16 12 M0 -2 Q-2 8 -4 18 M6 -8 Q14 0 16 12 M0 -2 Q2 8 4 18" stroke="#c05a30" stroke-width="1.5" fill="none" opacity="0.7"/>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">踢毽子</text>
  </g>

  <!-- 游戏4：抖空竹 -->
  <g transform="translate(640,470)">
    <circle cx="0" cy="0" r="30" fill="#3a7d5c" opacity="0.15"/>
    <ellipse cx="0" cy="0" rx="8" ry="16" fill="#3a7d5c" opacity="0.7"/>
    <rect x="-4" y="-8" width="8" height="16" fill="#7a3b14"/>
    <line x1="-15" y1="-20" x2="15" y2="-20" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-15" y1="20" x2="15" y2="20" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">抖空竹</text>
  </g>

  <!-- 连线装饰 -->
  <g stroke="#7a7468" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.4">
    <line x1="210" y1="240" x2="260" y2="290"/>
    <line x1="400" y1="240" x2="400" y2="290"/>
    <line x1="590" y1="240" x2="540" y2="290"/>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="17" fill="#3a7d5c" opacity="0.9">连珠小故事：纸鸢蹴鞠，古人的春日雅趣</text>
</svg>
