<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="喜鹊报喜传说与习性插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">喜鹊真的能报喜吗</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">喜鹊爱叫是天性，"报喜"是人给它的美好愿望</text>

  <!-- 左：喜鹊的习性 -->
  <g>
    <rect x="40" y="100" width="350" height="430" rx="12" fill="#fef0d8" opacity="0.6"/>
    <text x="215" y="130" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14" font-weight="bold">喜鹊的真实习性</text>

    <!-- 大喜鹊 -->
    <g transform="translate(215,230)">
      <ellipse cx="0" cy="10" rx="40" ry="28" fill="#3a3a3a"/>
      <ellipse cx="0" cy="14" rx="22" ry="16" fill="#fef9ed"/>
      <circle cx="-28" cy="-10" r="20" fill="#3a3a3a"/>
      <circle cx="-34" cy="-12" r="4" fill="#fef9ed"/>
      <circle cx="-34" cy="-12" r="2" fill="#1a1a1a"/>
      <path d="M-44 -10 L-54 -8 L-44 -6 Z" fill="#c8843a"/>
      <!-- 翅膀 -->
      <ellipse cx="10" cy="5" rx="20" ry="14" fill="#2a2a2a" transform="rotate(-15 10 5)"/>
      <!-- 蓝色翅尖 -->
      <path d="M25 0 Q35 -5 38 5 Q30 8 25 8 Z" fill="#4a6a7f" opacity="0.7"/>
      <!-- 尾巴长 -->
      <path d="M35 15 L75 5 L75 20 Z" fill="#3a3a3a"/>
      <path d="M70 8 L75 5 L75 20 L70 17 Z" fill="#4a6a7f" opacity="0.5"/>
      <!-- 腿 -->
      <line x1="-5" y1="38" x2="-5" y2="50" stroke="#c8843a" stroke-width="3"/>
      <line x1="8" y1="38" x2="8" y2="50" stroke="#c8843a" stroke-width="3"/>
    </g>

    <!-- 习性要点 -->
    <g font-family="serif" font-size="13" fill="#7a3b14">
      <circle cx="70" cy="330" r="4" fill="#6a8d3f"/>
      <text x="82" y="334">爱叫：早晚叽叽喳喳交流</text>
      <circle cx="70" cy="360" r="4" fill="#6a8d3f"/>
      <text x="82" y="364">聪明：能认出镜子里的自己</text>
      <circle cx="70" cy="390" r="4" fill="#6a8d3f"/>
      <text x="82" y="394">记仇：谁欺负它就记住</text>
      <circle cx="70" cy="420" r="4" fill="#6a8d3f"/>
      <text x="82" y="424">筑巢：用树枝搭窝，用好几年</text>
      <circle cx="70" cy="450" r="4" fill="#6a8d3f"/>
      <text x="82" y="454">住得近：喜欢在人家附近树上</text>
    </g>
    <text x="215" y="500" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">叫声响亮+住得近=人们常听到</text>
  </g>

  <!-- 右：报喜的传说 -->
  <g>
    <rect x="410" y="100" width="350" height="430" rx="12" fill="#fef0d8" opacity="0.6"/>
    <text x="585" y="130" text-anchor="middle" font-family="serif" font-size="18" fill="#c84a3a" font-weight="bold">"报喜"的传说</text>

    <!-- 喜鹊在枝头叫，下面人家 -->
    <g transform="translate(585,220)">
      <!-- 树枝 -->
      <line x1="-80" y1="0" x2="80" y2="-5" stroke="#7a3b14" stroke-width="5" stroke-linecap="round"/>
      <!-- 喜鹊 -->
      <g transform="translate(-20,-15)">
        <ellipse cx="0" cy="0" rx="18" ry="13" fill="#3a3a3a"/>
        <ellipse cx="2" cy="3" rx="10" ry="8" fill="#fef9ed"/>
        <circle cx="-13" cy="-6" r="10" fill="#3a3a3a"/>
        <circle cx="-16" cy="-7" r="2.5" fill="#fef9ed"/>
        <path d="M-22 -6 L-28 -5 L-22 -4 Z" fill="#c8843a"/>
        <path d="M15 3 L32 -2 L32 8 Z" fill="#3a3a3a"/>
      </g>
      <!-- 叫声 -->
      <text x="20" y="-25" font-family="serif" font-size="14" fill="#c84a3a" font-weight="bold">喳喳喳！</text>
    </g>

    <!-- 房子 -->
    <g transform="translate(585,360)">
      <rect x="-50" y="-30" width="100" height="60" fill="#c8843a" opacity="0.7"/>
      <path d="M-60 -30 L0 -65 L60 -30 Z" fill="#7a3b14"/>
      <rect x="-12" y="-10" width="24" height="40" fill="#7a3b14"/>
      <rect x="-40" y="-20" width="18" height="18" fill="#a8d0e8"/>
      <rect x="22" y="-20" width="18" height="18" fill="#a8d0e8"/>
    </g>
    <!-- 人听到叫声高兴 -->
    <g transform="translate(640,345)">
      <circle cx="0" cy="0" r="10" fill="#f0c8a0"/>
      <circle cx="-3" cy="-1" r="1.5" fill="#1a1a1a"/>
      <circle cx="3" cy="-1" r="1.5" fill="#1a1a1a"/>
      <path d="M-3 3 Q0 6 3 3" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    </g>
    <text x="640" y="325" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">"有喜事啦！"</text>

    <!-- 说明 -->
    <g font-family="serif" font-size="13" fill="#7a3b14">
      <circle cx="440" cy="430" r="4" fill="#c84a3a"/>
      <text x="452" y="434">名字带"喜"字，听着吉利</text>
      <circle cx="440" cy="460" r="4" fill="#c84a3a"/>
      <text x="452" y="464">叫声响亮，听了心情好</text>
      <circle cx="440" cy="490" r="4" fill="#c84a3a"/>
      <text x="452" y="494">乌鸦是亲戚却被当不吉利</text>
    </g>
    <text x="585" y="515" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">吉不吉利是人贴的标签，和鸟无关</text>
  </g>
</svg>
