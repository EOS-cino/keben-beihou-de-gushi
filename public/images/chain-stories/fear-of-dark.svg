<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="孩子怕黑心理与克服恐惧插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">为什么孩子会怕黑</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">怕黑不是胆小，是大脑在"保护"你</text>

  <!-- 上半部分：为什么怕黑 -->
  <rect x="40" y="100" width="720" height="200" rx="12" fill="#1f2a3a" opacity="0.08"/>
  <text x="400" y="130" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14" font-weight="bold">原因一：远古本能</text>

  <!-- 远古场景 -->
  <g transform="translate(160,210)">
    <!-- 黑夜 -->
    <rect x="-80" y="-50" width="160" height="100" fill="#1f2a3a" opacity="0.3" rx="8"/>
    <!-- 猛兽眼睛 -->
    <ellipse cx="-25" cy="-10" rx="6" ry="8" fill="#f4b942"/>
    <ellipse cx="25" cy="-10" rx="6" ry="8" fill="#f4b942"/>
    <ellipse cx="-25" cy="-10" rx="2" ry="4" fill="#1a1a1a"/>
    <ellipse cx="25" cy="-10" rx="2" ry="4" fill="#1a1a1a"/>
    <!-- 猛兽轮廓 -->
    <path d="M-50 30 Q-40 -25 0 -30 Q40 -25 50 30 Z" fill="#3a2a1a" opacity="0.5"/>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">远古：夜里真有猛兽</text>
  </g>

  <path d="M260 210 L320 210" stroke="#c8843a" stroke-width="3" fill="none" marker-end="url(#ar4)"/>
  <text x="290" y="200" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">几十万年</text>

  <!-- 现代孩子 -->
  <g transform="translate(420,210)">
    <rect x="-70" y="-50" width="140" height="100" fill="#1f2a3a" opacity="0.2" rx="8"/>
    <!-- 躲被窝的孩子 -->
    <path d="M-40 30 Q-40 -10 0 -15 Q40 -10 40 30 Z" fill="#c84a3a"/>
    <circle cx="0" cy="-20" r="14" fill="#f0c8a0"/>
    <ellipse cx="-5" cy="-22" rx="2" ry="3" fill="#1a1a1a"/>
    <ellipse cx="5" cy="-22" rx="2" ry="3" fill="#1a1a1a"/>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">现代：本能还在</text>
  </g>

  <path d="M500 210 L560 210" stroke="#c8843a" stroke-width="3" fill="none" marker-end="url(#ar4)"/>

  <!-- 大脑警报 -->
  <g transform="translate(660,210)">
    <rect x="-70" y="-50" width="140" height="100" fill="#fef0d8" stroke="#c84a3a" stroke-width="2" rx="8"/>
    <!-- 大脑 -->
    <ellipse cx="0" cy="-5" rx="30" ry="25" fill="#e07856"/>
    <path d="M-15 -15 Q-5 -20 5 -15 M-10 0 Q0 -5 10 0 M-15 10 Q-5 5 5 10" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 警报 -->
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a" font-weight="bold">警报！小心！</text>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">大脑在保护你</text>
  </g>

  <!-- 原因二：想象力 -->
  <rect x="40" y="320" width="340" height="220" rx="12" fill="#fef0d8" opacity="0.5"/>
  <text x="210" y="350" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14" font-weight="bold">原因二：想象力丰富</text>
  <g transform="translate(210,420)">
    <!-- 黑影 -->
    <path d="M-60 40 Q-50 -20 0 -30 Q50 -20 60 40 Z" fill="#3a3a4a" opacity="0.5"/>
    <!-- 孩子想象成怪物 -->
    <ellipse cx="-20" cy="-5" rx="5" ry="7" fill="#c84a3a"/>
    <ellipse cx="20" cy="-5" rx="5" ry="7" fill="#c84a3a"/>
    <path d="M-15 15 Q0 25 15 15" fill="none" stroke="#c84a3a" stroke-width="2"/>
    <!-- 其实是 -->
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">黑影→想象成怪物</text>
  </g>
  <text x="210" y="515" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">孩子分不清想象和现实</text>

  <!-- 解决办法 -->
  <rect x="400" y="320" width="360" height="220" rx="12" fill="#fef0d8" opacity="0.5"/>
  <text x="580" y="350" text-anchor="middle" font-family="serif" font-size="16" fill="#6a8d3f" font-weight="bold">怎么办？亲自去看</text>
  <g transform="translate(580,420)">
    <!-- 爸爸拉孩子 -->
    <g transform="translate(-25,0)">
      <ellipse cx="0" cy="0" rx="12" ry="16" fill="#4a6a2f"/>
      <circle cx="0" cy="-22" r="10" fill="#f0c8a0"/>
      <path d="M-3 -24 Q-1 -26 1 -24" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M-1 -18 Q1 -16 3 -18" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </g>
    <g transform="translate(25,5)">
      <ellipse cx="0" cy="0" rx="10" ry="13" fill="#c84a3a"/>
      <circle cx="0" cy="-18" r="9" fill="#f0c8a0"/>
      <path d="M-3 -20 Q-1 -22 1 -20" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M-2 -14 Q0 -12 2 -14" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </g>
    <!-- 发现花 -->
    <g transform="translate(70,20)">
      <path d="M0 20 L0 0" stroke="#6a8d3f" stroke-width="2"/>
      <circle cx="0" cy="-3" r="6" fill="#e07856"/>
    </g>
  </g>
  <text x="580" y="490" text-anchor="middle" font-family="serif" font-size="12" fill="#6a8d3f">陪孩子走进黑夜</text>
  <text x="580" y="510" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">看见没有怪物→警报关闭</text>

  <defs>
    <marker id="ar4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#c8843a"/>
    </marker>
  </defs>
</svg>
