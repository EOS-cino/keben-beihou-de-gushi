<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="兵马俑发现过程插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：地下军团的发现</text>
  <line x1="180" y1="62" x2="620" y2="62" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 时间线 -->
  <line x1="80" y1="320" x2="720" y2="320" stroke="#c8843a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="120" cy="320" r="8" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
  <circle cx="320" cy="320" r="8" fill="#e07856" stroke="#7a3b14" stroke-width="2"/>
  <circle cx="520" cy="320" r="8" fill="#2d6a4f" stroke="#7a3b14" stroke-width="2"/>
  <circle cx="700" cy="320" r="8" fill="#4a90b8" stroke="#7a3b14" stroke-width="2"/>

  <!-- 发现1：1974兵马俑 -->
  <g transform="translate(120, 180)">
    <!-- 农民打井 -->
    <rect x="-55" y="-50" width="110" height="130" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-33" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a3b14" font-family="serif">1974年</text>
    <!-- 农民 -->
    <g transform="translate(-15, 0)">
      <circle cx="0" cy="-10" r="8" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-8 -15 Q-6 -22 0 -22 Q6 -22 8 -15" fill="#3a2a1a"/>
      <path d="M-6 -2 L-8 20 L8 20 L6 -2" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
      <!-- 锄头 -->
      <line x1="8" y1="5" x2="20" y2="-5" stroke="#5a3a1a" stroke-width="2"/>
      <path d="M18 -5 L25 -8 L22 0" fill="#8a8a8a" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <!-- 井 -->
    <ellipse cx="20" cy="25" rx="12" ry="4" fill="#3a2a1a"/>
    <rect x="8" y="25" width="24" height="15" fill="#5a3a1a" opacity="0.5"/>
    <!-- 陶俑头（从井里露出） -->
    <circle cx="20" cy="22" r="6" fill="#a88a6a" stroke="#5a3a1a" stroke-width="1"/>
    <text x="0" y="60" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">农民打井发现</text>
  </g>

  <!-- 发现2：马王堆 -->
  <g transform="translate(320, 180)">
    <rect x="-55" y="-50" width="110" height="130" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-33" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a3b14" font-family="serif">1972年</text>
    <!-- 棺椁 -->
    <rect x="-25" y="0" width="50" height="30" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <rect x="-20" y="5" width="40" height="20" fill="#a88a6a" stroke="#5a3a1a" stroke-width="1"/>
    <!-- 女尸（简笔） -->
    <ellipse cx="0" cy="15" rx="8" ry="4" fill="#e8d5b0" opacity="0.6"/>
    <!-- 丝绸 -->
    <path d="M-20 15 Q-10 12 0 15 Q10 18 20 15" fill="none" stroke="#e07856" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="-15" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">马王堆汉墓</text>
    <text x="0" y="60" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">两千年不腐女尸</text>
  </g>

  <!-- 发现3：三星堆 -->
  <g transform="translate(520, 180)">
    <rect x="-55" y="-50" width="110" height="130" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-33" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a3b14" font-family="serif">1986年</text>
    <!-- 青铜面具 -->
    <g transform="translate(0, 10)">
      <rect x="-25" y="-10" width="50" height="30" fill="#4a90b8" opacity="0.6" stroke="#5a3a1a" stroke-width="1.5" rx="5"/>
      <!-- 突出的大眼 -->
      <ellipse cx="-12" cy="2" rx="6" ry="4" fill="#3a6a8a" stroke="#5a3a1a" stroke-width="1"/>
      <ellipse cx="12" cy="2" rx="6" ry="4" fill="#3a6a8a" stroke="#5a3a1a" stroke-width="1"/>
      <circle cx="-12" cy="2" r="2" fill="#2a2a2a"/>
      <circle cx="12" cy="2" r="2" fill="#2a2a2a"/>
      <!-- 大嘴 -->
      <path d="M-10 12 Q0 16 10 12" fill="none" stroke="#5a3a1a" stroke-width="1.5"/>
      <!-- 大耳 -->
      <path d="M-25 -5 L-32 0 L-25 5" fill="#4a90b8" opacity="0.6" stroke="#5a3a1a" stroke-width="1"/>
      <path d="M25 -5 L32 0 L25 5" fill="#4a90b8" opacity="0.6" stroke="#5a3a1a" stroke-width="1"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">三星堆青铜面具</text>
  </g>

  <!-- 发现4：海昏侯墓 -->
  <g transform="translate(700, 180)">
    <rect x="-55" y="-50" width="110" height="130" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8" opacity="0.8"/>
    <text x="0" y="-33" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a3b14" font-family="serif">2001年</text>
    <!-- 金饼 -->
    <ellipse cx="-10" cy="10" rx="10" ry="5" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="10" cy="15" rx="10" ry="5" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="22" rx="10" ry="5" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 竹简 -->
    <g transform="translate(0, -10)">
      <rect x="-15" y="0" width="3" height="20" fill="#8d5a36" stroke="#5a3a1a" stroke-width="0.5"/>
      <rect x="-10" y="0" width="3" height="20" fill="#8d5a36" stroke="#5a3a1a" stroke-width="0.5"/>
      <rect x="-5" y="0" width="3" height="20" fill="#8d5a36" stroke="#5a3a1a" stroke-width="0.5"/>
      <rect x="0" y="0" width="3" height="20" fill="#8d5a36" stroke="#5a3a1a" stroke-width="0.5"/>
      <rect x="5" y="0" width="3" height="20" fill="#8d5a36" stroke="#5a3a1a" stroke-width="0.5"/>
      <rect x="10" y="0" width="3" height="20" fill="#8d5a36" stroke="#5a3a1a" stroke-width="0.5"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-size="10" fill="#7a3b14" font-family="serif">海昏侯金器竹简</text>
  </g>

  <!-- 底部文字 -->
  <rect x="100" y="460" width="600" height="80" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="8" opacity="0.8"/>
  <text x="400" y="490" text-anchor="middle" font-size="16" font-weight="bold" fill="#7a3b14" font-family="serif">历史不只在书本里，还在泥土下</text>
  <text x="400" y="515" text-anchor="middle" font-size="13" fill="#7a3b14" font-family="serif">每一次发掘，都像打开一封古人写给我们的信</text>

  <!-- 底部说明 -->
  <text x="400" y="570" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">从兵马俑到马王堆，从三星堆到海昏侯——地下还埋着无数等待发现的故事</text>
</svg>
