<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="古人悲秋壮秋思秋诗意对比插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#2D2A24">古人怎样写秋天</text>
  <text x="400" y="70" text-anchor="middle" font-family="serif" font-size="13" fill="#7A7468">景一样，心不同</text>
  <line x1="300" y1="82" x2="500" y2="82" stroke="#C05A30" stroke-width="2"/>

  <!-- 悲秋 -->
  <g transform="translate(150,300)">
    <rect x="-110" y="-120" width="220" height="240" rx="12" fill="#F5F0E8" stroke="#7A7468" stroke-width="2"/>
    <text x="0" y="-94" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7A7468">李清照·悲秋</text>
    <!-- single falling leaf -->
    <g transform="translate(0,0) rotate(20)">
      <path d="M0,0 C-12,-6 -18,-16 -14,-26 C-6,-28 0,-22 0,-16 C0,-22 6,-28 14,-26 C18,-16 12,-6 0,0 Z" fill="#7A7468" opacity="0.7"/>
    </g>
    <!-- lone figure -->
    <g transform="translate(0,40)">
      <circle cx="0" cy="0" r="7" fill="#2D2A24"/>
      <path d="M-8,6 L8,6 L6,30 L-6,30 Z" fill="#2D2A24"/>
    </g>
    <text x="0" y="90" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">寻寻觅觅</text>
    <text x="0" y="108" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">冷冷清清</text>
  </g>

  <!-- 壮秋 -->
  <g transform="translate(400,300)">
    <rect x="-110" y="-120" width="220" height="240" rx="12" fill="#F5F0E8" stroke="#C05A30" stroke-width="2"/>
    <text x="0" y="-94" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#C05A30">曹操·壮秋</text>
    <!-- sea waves -->
    <path d="M-80,30 Q-50,10 -20,30 T40,30 T100,30" fill="none" stroke="#3A7D5C" stroke-width="3"/>
    <path d="M-80,50 Q-50,30 -20,50 T40,50 T100,50" fill="none" stroke="#3A7D5C" stroke-width="3" opacity="0.7"/>
    <path d="M-80,70 Q-50,50 -20,70 T40,70 T100,70" fill="none" stroke="#3A7D5C" stroke-width="3" opacity="0.5"/>
    <text x="0" y="100" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">秋风萧瑟</text>
    <text x="0" y="118" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">洪波涌起</text>
  </g>

  <!-- 思秋 -->
  <g transform="translate(650,300)">
    <rect x="-110" y="-120" width="220" height="240" rx="12" fill="#F5F0E8" stroke="#3A7D5C" stroke-width="2"/>
    <text x="0" y="-94" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#3A7D5C">王维·思秋</text>
    <!-- moon -->
    <circle cx="0" cy="-30" r="20" fill="#E0D9CE"/>
    <!-- person looking up -->
    <g transform="translate(0,50)">
      <circle cx="0" cy="0" r="7" fill="#E0D9CE" stroke="#2D2A24" stroke-width="1.5"/>
      <path d="M-8,6 L8,6 L6,34 L-6,34 Z" fill="#3A7D5C"/>
    </g>
    <text x="0" y="100" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">独在异乡为异客</text>
    <text x="0" y="118" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">每逢佳节倍思亲</text>
  </g>

  <g transform="translate(400,540)">
    <rect x="-290" y="-26" width="580" height="46" rx="8" fill="#F5F0E8" stroke="#C05A30" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" font-family="serif" font-size="14" fill="#2D2A24">写景，其实是在写人、写心</text>
    <text x="0" y="14" text-anchor="middle" font-family="serif" font-size="13" fill="#C05A30">心里高兴，满山红叶就是热烈；心里难过，一片落叶就是凄凉</text>
  </g>
</svg>
