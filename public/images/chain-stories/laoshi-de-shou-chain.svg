<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="历代尊师重道与师生情谊的故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">那些被老师牵过的手</text>
  <line x1="220" y1="56" x2="580" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——一只手牵一只手，一代人牵一代人</text>

  <!-- 时间轴 -->
  <line x1="80" y1="150" x2="720" y2="150" stroke="#c8843a" stroke-width="3"/>
  <g font-family="serif" fill="#7a3b14">
    <circle cx="160" cy="150" r="7" fill="#c84a3a"/>
    <text x="160" y="135" text-anchor="middle" font-size="11">孔子·颜回</text>
    <circle cx="400" cy="150" r="7" fill="#2d6a4f"/>
    <text x="400" y="135" text-anchor="middle" font-size="11">陶行知</text>
    <circle cx="640" cy="150" r="7" fill="#4a90b8"/>
    <text x="640" y="135" text-anchor="middle" font-size="11">乡村教师</text>
  </g>

  <!-- 孔子与颜回 -->
  <g transform="translate(160, 200)">
    <rect x="-110" y="0" width="220" height="160" rx="8" fill="#fef9ed" stroke="#c84a3a" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#c84a3a">两千多年前</text>
    <g transform="translate(-30, 80)">
      <circle cx="0" cy="0" r="12" fill="#e07856" stroke="#7a3b14" stroke-width="1.2"/>
      <ellipse cx="0" cy="30" rx="18" ry="22" fill="#7a3b14"/>
    </g>
    <g transform="translate(35, 90)">
      <circle cx="0" cy="0" r="10" fill="#e8a838" stroke="#7a3b14" stroke-width="1.2"/>
      <ellipse cx="0" cy="24" rx="14" ry="18" fill="#6a8d3f"/>
    </g>
    <!-- 牵手 -->
    <path d="M-12 95 Q0 100 22 90" fill="none" stroke="#c84a3a" stroke-width="3"/>
    <text x="0" y="145" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">孔子疼颜回如子</text>
  </g>

  <!-- 陶行知 -->
  <g transform="translate(400, 200)">
    <rect x="-110" y="0" width="220" height="160" rx="8" fill="#fef9ed" stroke="#2d6a4f" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#2d6a4f">近代</text>
    <g transform="translate(0, 70)">
      <circle cx="0" cy="0" r="12" fill="#e07856" stroke="#7a3b14" stroke-width="1.2"/>
      <ellipse cx="0" cy="30" rx="18" ry="22" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.2"/>
      <!-- 心 -->
      <path d="M22 25 a5 5 0 0 1 10 0 a5 5 0 0 1 10 0 q0 7 -10 13 q-10 -6 -10 -13" fill="#c84a3a" transform="scale(0.8)"/>
    </g>
    <text x="0" y="135" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">"捧着一颗心来，</text>
    <text x="0" y="150" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">不带半根草去"</text>
  </g>

  <!-- 乡村教师 -->
  <g transform="translate(640, 200)">
    <rect x="-110" y="0" width="220" height="160" rx="8" fill="#fef9ed" stroke="#4a90b8" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#4a90b8">大山深处</text>
    <g transform="translate(0, 75)">
      <circle cx="0" cy="0" r="11" fill="#e07856" stroke="#7a3b14" stroke-width="1.2"/>
      <ellipse cx="0" cy="28" rx="16" ry="20" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.2"/>
      <!-- 一群孩子 -->
      <circle cx="-30" cy="48" r="6" fill="#e8a838"/>
      <circle cx="-15" cy="52" r="6" fill="#e07856"/>
      <circle cx="15" cy="52" r="6" fill="#e8a838"/>
      <circle cx="30" cy="48" r="6" fill="#e07856"/>
    </g>
    <text x="0" y="145" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">一个老师，一所小学</text>
  </g>

  <!-- 程门立雪 -->
  <g transform="translate(400, 400)">
    <rect x="-280" y="0" width="560" height="90" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14" font-weight="bold">程门立雪 · 一日为师，终身为父</text>
    <text x="0" y="52" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">尊师，是中国人传了几千年的老规矩</text>
    <text x="0" y="74" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">老师的手千千万万，却都一样：稳稳牵住每一个孩子</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 520)">
    <rect x="-300" y="0" width="600" height="50" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">被牵过的孩子长大了，也成了老师</text>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">伸出自己的手，去牵下一代</text>
  </g>
</svg>
