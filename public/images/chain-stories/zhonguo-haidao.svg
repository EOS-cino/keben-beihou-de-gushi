<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="中国南海诸岛插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">中国的海岛</text>
  <line x1="320" y1="58" x2="480" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 中国地图轮廓（简化，突出南海） -->
  <path d="M150 120 Q200 100 280 110 Q360 100 440 120 Q500 130 540 160 Q560 200 545 250 Q530 300 500 330 Q460 360 420 370 Q380 380 350 375 Q320 380 300 400 Q280 420 270 450 L260 470 Q240 460 220 440 Q200 410 190 380 Q175 340 165 300 Q155 250 150 200 Z" fill="#f0e0c0" stroke="#c8843a" stroke-width="2.5"/>
  <!-- 海南岛 -->
  <ellipse cx="340" cy="420" rx="30" ry="18" fill="#f0e0c0" stroke="#c8843a" stroke-width="2"/>
  <!-- 台湾 -->
  <ellipse cx="560" cy="240" rx="12" ry="24" fill="#f0e0c0" stroke="#c8843a" stroke-width="2"/>

  <!-- 南海九段线区域 -->
  <rect x="250" y="400" width="320" height="160" fill="#c8e8f0" opacity="0.5" stroke="#3a8aba" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- 南海诸岛点 -->
  <!-- 西沙群岛 -->
  <g fill="#c8483a">
    <circle cx="340" cy="445" r="4"/>
    <circle cx="355" cy="455" r="3"/>
    <circle cx="325" cy="455" r="3"/>
    <circle cx="345" cy="465" r="3"/>
  </g>
  <!-- 东沙群岛 -->
  <g fill="#3a6a9a"><circle cx="470" cy="430" r="3"/></g>
  <!-- 中沙群岛 -->
  <g fill="#5a8a3a">
    <circle cx="420" cy="470" r="3"/>
    <circle cx="430" cy="478" r="2.5"/>
  </g>
  <!-- 南沙群岛 -->
  <g fill="#e8a838">
    <circle cx="380" cy="520" r="3"/>
    <circle cx="395" cy="530" r="3"/>
    <circle cx="365" cy="530" r="2.5"/>
    <circle cx="410" cy="525" r="2.5"/>
    <circle cx="385" cy="540" r="2.5"/>
  </g>

  <!-- 椰子树（海南岛） -->
  <g transform="translate(340,415)">
    <rect x="-2" y="-5" width="4" height="20" fill="#8d5a36"/>
    <path d="M0 -5 Q-15 -15 -20 -10 M0 -5 Q15 -15 20 -10 M0 -5 Q-5 -20 -12 -20 M0 -5 Q5 -20 12 -20" fill="none" stroke="#3a8a4a" stroke-width="2.5"/>
    <circle cx="-3" cy="-8" r="3" fill="#8d5a36"/>
    <circle cx="3" cy="-8" r="3" fill="#8d5a36"/>
  </g>

  <!-- 小船（渔民） -->
  <g transform="translate(300,500)">
    <path d="M-15 0 Q-12 6 0 6 L12 6 Q15 0 15 0 Z" fill="#8d5a36"/>
    <rect x="-1" y="-12" width="2" height="12" fill="#5a3a1a"/>
    <path d="M1 -12 L10 -2 L1 -2 Z" fill="#fff6df" stroke="#8d5a36" stroke-width="1"/>
  </g>

  <!-- 标注：海南岛 -->
  <line x1="340" y1="420" x2="280" y2="390" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="210" y="370" width="90" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="255" y="389" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">海南岛</text>

  <!-- 标注：西沙群岛 -->
  <line x1="345" y1="455" x2="290" y2="470" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="200" y="455" width="100" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="250" y="474" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">西沙群岛</text>

  <!-- 标注：南沙群岛 -->
  <line x1="390" y1="530" x2="450" y2="540" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="440" y="525" width="100" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="490" y="544" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">南沙群岛</text>

  <!-- 标注：中国大陆 -->
  <line x1="300" y1="200" x2="200" y2="160" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="120" y="140" width="100" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="170" y="159" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">中国大陆</text>

  <!-- 更路簿（右下角小图） -->
  <g transform="translate(620,430)">
    <rect x="0" y="0" width="80" height="60" fill="#fff6df" stroke="#8d5a36" stroke-width="2" rx="3"/>
    <line x1="40" y1="0" x2="40" y2="60" stroke="#c8843a" stroke-width="1.5"/>
    <g stroke="#7a3b14" stroke-width="0.7" opacity="0.6">
      <line x1="5" y1="10" x2="35" y2="10"/><line x1="5" y1="18" x2="35" y2="18"/>
      <line x1="5" y1="26" x2="32" y2="26"/><line x1="5" y1="34" x2="35" y2="34"/>
      <line x1="5" y1="42" x2="30" y2="42"/><line x1="5" y1="50" x2="35" y2="50"/>
      <line x1="45" y1="10" x2="75" y2="10"/><line x1="45" y1="18" x2="75" y2="18"/>
      <line x1="45" y1="26" x2="72" y2="26"/><line x1="45" y1="34" x2="75" y2="34"/>
    </g>
    <!-- 罗盘 -->
    <circle cx="60" cy="48" r="8" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <path d="M60 40 L60 56 M52 48 L68 48" stroke="#7a3b14" stroke-width="1"/>
  </g>
  <text x="660" y="505" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">更路簿</text>

  <!-- 底部说明 -->
  <rect x="40" y="556" width="720" height="36" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="579" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">中国有六千多个海岛，南海的东沙、西沙、中沙、南沙群岛是祖国蓝色国土上的明珠。</text>
</svg>
