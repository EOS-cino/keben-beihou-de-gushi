<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="不同动物脚趾数量和脚印形状插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">动物脚印的秘密</text>
  <text x="400" y="66" text-anchor="middle" font-family="serif" font-size="14" fill="#6b6557">脚趾数量和形状决定了脚印的样子</text>

  <!-- 鸡：3前1后 -->
  <g transform="translate(130,200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">鸡（3趾前1趾后）</text>
    <!-- 脚印 -->
    <g fill="#8a6a4a" transform="translate(0,0)">
      <path d="M0 0 L-4 -30 L0 -33 L4 -30 Z"/>
      <path d="M0 0 L-22 -22 L-27 -15 L-20 -12 Z"/>
      <path d="M0 0 L22 -22 L27 -15 L20 -12 Z"/>
      <path d="M0 0 L-3 18 L3 18 Z"/>
    </g>
    <!-- 脚趾标注 -->
    <line x1="0" y1="-30" x2="-50" y2="-50" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="-55" y="-48" font-family="serif" font-size="11" fill="#7a3b14">前趾×3</text>
    <line x1="0" y1="15" x2="50" y2="30" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="52" y="34" font-family="serif" font-size="11" fill="#7a3b14">后趾×1</text>
    <!-- 像竹叶 -->
    <rect x="-40" y="50" width="80" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
    <text x="0" y="67" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">→ 像竹叶</text>
  </g>

  <!-- 狗：4趾+肉垫 -->
  <g transform="translate(330,200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">狗（4趾+肉垫）</text>
    <!-- 脚印 -->
    <g fill="#8a6a4a" transform="translate(0,0)">
      <ellipse cx="0" cy="8" rx="12" ry="9"/>
      <circle cx="-14" cy="-8" r="6"/>
      <circle cx="14" cy="-8" r="6"/>
      <circle cx="-8" cy="-20" r="6"/>
      <circle cx="8" cy="-20" r="6"/>
    </g>
    <!-- 标注 -->
    <line x1="14" y1="-8" x2="55" y2="-25" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="57" y="-22" font-family="serif" font-size="11" fill="#7a3b14">脚趾×4</text>
    <line x1="0" y1="15" x2="-50" y2="35" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="-80" y="38" font-family="serif" font-size="11" fill="#7a3b14">掌垫×1</text>
    <rect x="-40" y="50" width="80" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
    <text x="0" y="67" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">→ 像梅花</text>
  </g>

  <!-- 鸭：3趾有蹼 -->
  <g transform="translate(530,200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">鸭（3趾有蹼）</text>
    <!-- 脚印 -->
    <g fill="#8a6a4a" transform="translate(0,0)">
      <path d="M0 0 L-6 -28 L-15 -22 L-12 -12 L-25 -14 L-20 -2 L0 8 Z"/>
      <path d="M0 0 L6 -28 L15 -22 L12 -12 L25 -14 L20 -2 L0 8 Z"/>
      <path d="M0 0 L-3 15 L3 15 Z"/>
    </g>
    <!-- 标注 -->
    <line x1="-18" y1="-15" x2="-60" y2="-30" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="-85" y="-27" font-family="serif" font-size="11" fill="#7a3b14">蹼连脚趾</text>
    <line x1="18" y1="-15" x2="60" y2="-30" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="62" y="-27" font-family="serif" font-size="11" fill="#7a3b14">方便划水</text>
    <rect x="-40" y="50" width="80" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
    <text x="0" y="67" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">→ 像枫叶</text>
  </g>

  <!-- 马：1趾（蹄） -->
  <g transform="translate(700,200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">马（1趾=蹄）</text>
    <!-- 脚印 -->
    <g fill="#8a6a4a" transform="translate(0,0)">
      <path d="M-14 0 Q0 -18 14 0 Q10 6 0 4 Q-10 6 -14 0 Z"/>
    </g>
    <!-- 标注 -->
    <line x1="0" y1="-15" x2="0" y2="-40" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="0" y="-44" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">单蹄</text>
    <rect x="-45" y="50" width="90" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
    <text x="0" y="67" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">→ 像月牙</text>
  </g>

  <!-- 分隔线 -->
  <line x1="60" y1="320" x2="740" y2="320" stroke="#c8843a" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- 下方：进化解释 -->
  <text x="400" y="360" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">脚的形状是适应环境的结果</text>

  <!-- 鸭蹼划水 -->
  <g transform="translate(160,440)">
    <rect x="-50" y="20" width="100" height="30" fill="#7ec0db" opacity="0.4" rx="4"/>
    <text x="0" y="-5" text-anchor="middle" font-family="serif" font-size="13" fill="#3a7a9a">鸭蹼→划水</text>
    <path d="M-20 15 L-25 5 L-15 0 L0 5 L15 0 L25 5 L20 15 Z" fill="#5cb070"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="11" fill="#6b6557">水边生活</text>
  </g>

  <!-- 马蹄奔跑 -->
  <g transform="translate(400,440)">
    <text x="0" y="-5" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a30">马蹄→奔跑</text>
    <ellipse cx="0" cy="8" rx="16" ry="10" fill="#6a4a2a"/>
    <ellipse cx="0" cy="5" rx="13" ry="7" fill="#8a6a4a"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="11" fill="#6b6557">草原奔跑</text>
  </g>

  <!-- 狗垫无声 -->
  <g transform="translate(640,440)">
    <text x="0" y="-5" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a30">狗垫→无声</text>
    <ellipse cx="0" cy="8" rx="12" ry="9" fill="#c89060"/>
    <circle cx="-10" cy="-5" r="5" fill="#c89060"/>
    <circle cx="10" cy="-5" r="5" fill="#c89060"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="11" fill="#6b6557">方便捕猎</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">每种脚印都是一本小小的"进化日记"</text>
</svg>
