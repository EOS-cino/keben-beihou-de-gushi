<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从范成大写田园到陶渊明归园田的故事画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#7a3b14" stroke-width="2"/>
  <line x1="300" y1="300" x2="500" y2="300" stroke="#7a3b14" stroke-width="3" stroke-dasharray="8,6"/>
  <circle cx="350" cy="300" r="6" fill="#d4a017"/>
  <circle cx="400" cy="300" r="9" fill="#c8553d"/>
  <circle cx="450" cy="300" r="6" fill="#d4a017"/>
  <!-- 左珠：范成大 -->
  <circle cx="170" cy="300" r="110" fill="#e8a04e" opacity="0.3" stroke="#b5651d" stroke-width="3"/>
  <circle cx="160" cy="285" r="8" fill="#d4a017"/>
  <circle cx="180" cy="280" r="8" fill="#c8553d"/>
  <path d="M 145 305 q 25 -20 50 0" stroke="#3a7d44" stroke-width="2" fill="none"/>
  <text x="170" y="345" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#7a3b14">范成大</text>
  <text x="170" y="368" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">写农家四季</text>
  <!-- 右珠：陶渊明 -->
  <circle cx="630" cy="300" r="110" fill="#8fb996" opacity="0.3" stroke="#3a7d44" stroke-width="3"/>
  <line x1="615" y1="300" x2="615" y2="270" stroke="#3a7d44" stroke-width="2"/>
  <ellipse cx="615" cy="270" rx="6" ry="4" fill="#3a7d44"/>
  <path d="M 620 290 q 14 -4 18 -16" stroke="#5d4037" stroke-width="2" fill="none"/>
  <circle cx="640" cy="275" r="3" fill="#c8553d"/>
  <text x="630" y="345" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#7a3b14">陶渊明</text>
  <text x="630" y="368" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">采菊东篱</text>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">范成大写田园，遇见陶渊明</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">把乡村当成心里最舒服的地方</text>
</svg>
