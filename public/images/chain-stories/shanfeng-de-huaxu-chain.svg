<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="风的形成与风向知识连珠故事插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#2d6a4f">连珠小故事：风是怎么来的</text>
  <line x1="200" y1="55" x2="600" y2="55" stroke="#e8a838" stroke-width="1.5"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#7a7468">从风神的口袋，到温度差，再到山谷的风</text>

  <!-- 第一格：风神想象 -->
  <g transform="translate(160 260)">
    <rect x="-90" y="-90" width="180" height="180" fill="#fff6df" stroke="#4a90b8" stroke-width="1.5" rx="8"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#8a5a14">古人·风神</text>
    <!-- 风神（鼓嘴吹） -->
    <g transform="translate(0 10)">
      <path d="M-16 30 Q-18 5 -10 -8 Q0 -14 10 -8 Q18 5 16 30 Z" fill="#4a90b8"/>
      <circle cx="0" cy="-22" r="14" fill="#f4d4a8"/>
      <path d="M-12 -28 Q0 -40 12 -28 L12 -22 Q0 -18 -12 -22 Z" fill="#3a3a3a"/>
      <!-- 鼓起的嘴 -->
      <ellipse cx="0" cy="-16" rx="5" ry="4" fill="#e07856" opacity="0.6"/>
    </g>
    <!-- 吹出的风 -->
    <g stroke="#4a90b8" stroke-width="2" fill="none" opacity="0.6">
      <path d="M14 -10 Q30 -8 46 -12"/>
      <path d="M16 0 Q34 2 50 -2"/>
      <path d="M14 10 Q30 12 44 8"/>
    </g>
    <!-- 口袋 -->
    <path d="M40 30 Q50 25 56 30 L52 40 Q46 42 40 40 Z" fill="#8a6a3a" opacity="0.5"/>
    <text x="0" y="78" text-anchor="middle" font-family="serif" font-size="11" fill="#7a7468">想象风是神仙吹的</text>
  </g>

  <!-- 箭头 -->
  <path d="M255 260 L305 260" stroke="#c8943a" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- 第二格：温度差形成风 -->
  <g transform="translate(400 260)">
    <rect x="-90" y="-90" width="180" height="180" fill="#fff6df" stroke="#e07856" stroke-width="1.5" rx="8"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#8a5a14">科学·温度差</text>
    <!-- 太阳 -->
    <circle cx="0" cy="-50" r="12" fill="#e8a838"/>
    <g stroke="#e8a838" stroke-width="1.5">
      <line x1="0" y1="-64" x2="0" y2="-68"/>
      <line x1="-12" y1="-50" x2="-16" y2="-50"/>
      <line x1="12" y1="-50" x2="16" y2="-50"/>
    </g>
    <!-- 地面（左热右冷） -->
    <rect x="-60" y="30" width="55" height="20" fill="#e07856" opacity="0.5"/>
    <rect x="5" y="30" width="55" height="20" fill="#4a90b8" opacity="0.4"/>
    <text x="-32" y="44" text-anchor="middle" font-family="serif" font-size="9" fill="#fff">热</text>
    <text x="32" y="44" text-anchor="middle" font-family="serif" font-size="9" fill="#fff">冷</text>
    <!-- 热空气上升 -->
    <g stroke="#e07856" stroke-width="1.5" fill="none">
      <path d="M-30 25 Q-28 5 -30 -15" marker-end="url(#ar3)"/>
    </g>
    <text x="-30" y="-20" text-anchor="middle" font-family="serif" font-size="9" fill="#e07856">热气升</text>
    <!-- 冷空气流过来 -->
    <g stroke="#4a90b8" stroke-width="1.5" fill="none">
      <path d="M40 10 Q0 20 -35 22" marker-end="url(#ar3)"/>
    </g>
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="9" fill="#4a90b8">冷气来补</text>
    <text x="0" y="78" text-anchor="middle" font-family="serif" font-size="11" fill="#7a7468">空气流动就是风</text>
  </g>

  <!-- 箭头 -->
  <path d="M495 260 L545 260" stroke="#c8943a" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- 第三格：山风与谷风 -->
  <g transform="translate(640 260)">
    <rect x="-90" y="-90" width="180" height="180" fill="#fff6df" stroke="#2d6a4f" stroke-width="1.5" rx="8"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#8a5a14">山风与谷风</text>
    <!-- 山形 -->
    <path d="M-70 40 L-20 -20 L20 -20 L70 40 Z" fill="#9fc8b4" opacity="0.5"/>
    <path d="M-70 40 L-20 -20 L20 -20 L70 40 Z" fill="none" stroke="#2d6a4f" stroke-width="1.5"/>
    <!-- 太阳（白天） -->
    <circle cx="0" cy="-50" r="8" fill="#e8a838" opacity="0.7"/>
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="9" fill="#8a5a14">白天</text>
    <!-- 谷风箭头（从谷底往山上） -->
    <g stroke="#e07856" stroke-width="1.8" fill="none">
      <path d="M-25 25 Q-22 5 -15 -10" marker-end="url(#ar3)"/>
      <path d="M25 25 Q22 5 15 -10" marker-end="url(#ar3)"/>
    </g>
    <text x="-40" y="20" font-family="serif" font-size="9" fill="#e07856">谷风</text>
    <text x="40" y="20" font-family="serif" font-size="9" fill="#e07856" text-anchor="end">↑</text>
    <text x="0" y="78" text-anchor="middle" font-family="serif" font-size="11" fill="#7a7468">白天谷风上山</text>
  </g>

  <!-- 底部：风向标 -->
  <g transform="translate(400 460)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a14">古人观察风向：渔民看风出海，农民看风判天气</text>
    <!-- 风向标 -->
    <g transform="translate(0 35)">
      <circle cx="0" cy="0" r="6" fill="#8a6a3a"/>
      <path d="M0 0 L30 -8 L24 0 L30 8 Z" fill="#e07856" stroke="#8a5a14" stroke-width="1"/>
      <line x1="-25" y1="0" x2="25" y2="0" stroke="#8a6a3a" stroke-width="1" opacity="0.4"/>
      <line x1="0" y1="-25" x2="0" y2="25" stroke="#8a6a3a" stroke-width="1" opacity="0.4"/>
      <text x="-30" y="3" font-family="serif" font-size="9" fill="#7a7468">西</text>
      <text x="28" y="3" font-family="serif" font-size="9" fill="#7a7468">东</text>
    </g>
  </g>

  <!-- 底部说明 -->
  <rect x="60" y="545" width="680" height="40" fill="#fff6df" stroke="#e8a838" stroke-width="1" rx="6" opacity="0.85"/>
  <text x="400" y="568" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a14">从风神的口袋到温度差——科学一步步揭开自然之谜</text>

  <defs>
    <marker id="ar3" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#5a4a2a"/>
    </marker>
  </defs>
</svg>
