<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠小故事：小物件里的大精神">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事：小物件里的大精神</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">小物件，藏着大精神</text>
  <g transform="translate(150,300)">
    <path d="M-30,30 L30,30 L24,-20 L-24,-20 Z" fill="#8fb86a" stroke="#3a6b2a" stroke-width="2"/>
    <path d="M-30,-10 L30,-10" stroke="#3a6b2a" stroke-width="3"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="16" fill="#3a6b2a">朱德的扁担</text>
  </g>
  <g transform="translate(400,300)">
    <path d="M-20,-30 L20,-30 L24,40 L-24,40 Z" fill="#cfe8f0" stroke="#5a8fa3" stroke-width="2"/>
    <path d="M-18,-10 l8,4 -8,4" fill="none" stroke="#5a8fa3" stroke-width="2"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="16" fill="#5a8fa3">总理的睡衣</text>
  </g>
  <g transform="translate(650,300)">
    <path d="M-30,30 L30,30 L20,-20 L-20,-20 Z" fill="#c0392b" stroke="#7a1a1a" stroke-width="2"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="16" fill="#c0392b">让出的棉衣</text>
  </g>
  <text x="400" y="460" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">普通的东西，因为人而了不起</text>
</svg>
