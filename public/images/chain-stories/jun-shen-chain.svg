<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="连珠故事 - 钢铁意志的故事">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 连珠标识徽章 -->
  <g transform="translate(60,42)">
    <rect x="-44" y="-22" width="88" height="44" rx="22" fill="#3a7d5c"/>
    <circle cx="-26" cy="0" r="5" fill="#fef9ed"/><circle cx="-10" cy="0" r="5" fill="#fef9ed"/><circle cx="6" cy="0" r="5" fill="#fef9ed"/><circle cx="22" cy="0" r="5" fill="#fef9ed"/>
    <text x="40" y="5" font-family="serif" font-size="16" font-weight="bold" fill="#fef9ed">连珠</text>
  </g>
  <text x="460" y="48" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#3a7d5c">钢铁意志的故事</text>
  <line x1="360" y1="64" x2="560" y2="64" stroke="#3a7d5c" stroke-width="2"/>

  <!-- 中央徽章 -->
  <g transform="translate(400,300)">
    <circle cx="0" cy="0" r="60" fill="#c05a30" opacity="0.08"/>
    <circle cx="0" cy="0" r="44" fill="#c05a30"/>
    <text x="0" y="-4" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#fef9ed">意志</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="14" fill="#fef9ed">如钢</text>
  </g>

  <!-- 故事1：关羽刮骨疗毒（左上） -->
  <g transform="translate(150,170)">
    <rect x="-90" y="-55" width="180" height="110" rx="8" fill="#fff" stroke="#c05a30" stroke-width="2"/>
    <g transform="translate(-55,0)">
      <!-- 手臂 -->
      <rect x="-4" y="-20" width="30" height="8" rx="3" fill="#c05a30" opacity="0.8"/>
      <!-- 刀 -->
      <line x1="10" y1="-16" x2="24" y2="-28" stroke="#7a7468" stroke-width="2.5"/>
      <!-- 棋盘 -->
      <rect x="-18" y="6" width="24" height="20" rx="1" fill="#7a3b14" opacity="0.6"/>
      <line x1="-18" y1="13" x2="6" y2="13" stroke="#fef9ed" stroke-width="0.5"/>
      <line x1="-18" y1="20" x2="6" y2="20" stroke="#fef9ed" stroke-width="0.5"/>
      <line x1="-12" y1="6" x2="-12" y2="26" stroke="#fef9ed" stroke-width="0.5"/>
      <line x1="-3" y1="6" x2="-3" y2="26" stroke="#fef9ed" stroke-width="0.5"/>
    </g>
    <text x="20" y="-25" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">刮骨疗毒</text>
    <text x="20" y="-5" font-family="serif" font-size="12" fill="#7a7468">关羽笑对弈棋</text>
    <text x="20" y="13" font-family="serif" font-size="12" fill="#7a7468">华佗刀刮骨</text>
    <text x="20" y="31" font-family="serif" font-size="12" fill="#7a7468">面不改色</text>
    <path d="M90 0 Q150 30 240 90" stroke="#c05a30" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.5"/>
  </g>

  <!-- 故事2：苏武牧羊（右上） -->
  <g transform="translate(650,170)">
    <rect x="-90" y="-55" width="180" height="110" rx="8" fill="#fff" stroke="#7a3b14" stroke-width="2"/>
    <g transform="translate(-55,0)">
      <!-- 羊 -->
      <ellipse cx="0" cy="0" rx="14" ry="10" fill="#fef9ed" stroke="#7a7468" stroke-width="1"/>
      <circle cx="-12" cy="-2" r="6" fill="#fef9ed" stroke="#7a7468" stroke-width="1"/>
      <circle cx="-14" cy="-4" r="1.5" fill="#2d2a24"/>
      <line x1="-6" y1="8" x2="-6" y2="14" stroke="#7a7468" stroke-width="1.5"/>
      <line x1="6" y1="8" x2="6" y2="14" stroke="#7a7468" stroke-width="1.5"/>
      <!-- 节杖 -->
      <line x1="16" y1="-15" x2="16" y2="18" stroke="#7a3b14" stroke-width="2.5"/>
      <rect x="14" y="-18" width="4" height="6" fill="#c05a30"/>
    </g>
    <text x="-20" y="-25" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">苏武牧羊</text>
    <text x="-20" y="-5" font-family="serif" font-size="12" fill="#7a7468">北海十九年</text>
    <text x="-20" y="13" font-family="serif" font-size="12" fill="#7a7468">持节不屈</text>
    <text x="-20" y="31" font-family="serif" font-size="12" fill="#7a7468">忠心不改</text>
    <path d="M-90 0 Q-150 30 -240 90" stroke="#7a3b14" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.5"/>
  </g>

  <!-- 故事3：司马迁著书（左下） -->
  <g transform="translate(150,440)">
    <rect x="-90" y="-55" width="180" height="110" rx="8" fill="#fff" stroke="#c05a30" stroke-width="2"/>
    <g transform="translate(-55,0)">
      <!-- 竹简 -->
      <rect x="-16" y="-15" width="4" height="30" rx="1" fill="#7a3b14"/>
      <rect x="-10" y="-15" width="4" height="30" rx="1" fill="#7a3b14"/>
      <rect x="-4" y="-15" width="4" height="30" rx="1" fill="#7a3b14"/>
      <rect x="2" y="-15" width="4" height="30" rx="1" fill="#7a3b14"/>
      <rect x="8" y="-15" width="4" height="30" rx="1" fill="#7a3b14"/>
      <line x1="-16" y1="-5" x2="12" y2="-5" stroke="#c05a30" stroke-width="1"/>
      <line x1="-16" y1="5" x2="12" y2="5" stroke="#c05a30" stroke-width="1"/>
      <!-- 毛笔 -->
      <line x1="16" y1="-20" x2="22" y2="5" stroke="#2d2a24" stroke-width="1.5"/>
      <path d="M22 5 L24 12 L20 12 Z" fill="#2d2a24"/>
    </g>
    <text x="20" y="-25" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">忍辱著书</text>
    <text x="20" y="-5" font-family="serif" font-size="12" fill="#7a7468">司马迁受刑</text>
    <text x="20" y="13" font-family="serif" font-size="12" fill="#7a7468">发愤著史记</text>
    <text x="20" y="31" font-family="serif" font-size="12" fill="#7a7468">千古绝唱</text>
    <path d="M90 0 Q150 -30 240 -90" stroke="#c05a30" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.5"/>
  </g>

  <!-- 故事4：勾践卧薪尝胆（右下） -->
  <g transform="translate(650,440)">
    <rect x="-90" y="-55" width="180" height="110" rx="8" fill="#fff" stroke="#7a3b14" stroke-width="2"/>
    <g transform="translate(-55,0)">
      <!-- 柴薪 -->
      <rect x="-18" y="5" width="36" height="6" fill="#7a3b14" opacity="0.6"/>
      <line x1="-15" y1="5" x2="-12" y2="11" stroke="#2d2a24" stroke-width="1"/>
      <line x1="-5" y1="5" x2="-2" y2="11" stroke="#2d2a24" stroke-width="1"/>
      <line x1="5" y1="5" x2="8" y2="11" stroke="#2d2a24" stroke-width="1"/>
      <!-- 苦胆 -->
      <ellipse cx="0" cy="-10" rx="7" ry="10" fill="#3a7d5c" opacity="0.7"/>
      <line x1="0" y1="-20" x2="0" y2="-16" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="0" y1="-20" x2="14" y2="-22" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <text x="-20" y="-25" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">卧薪尝胆</text>
    <text x="-20" y="-5" font-family="serif" font-size="12" fill="#7a7468">勾践卧柴薪</text>
    <text x="-20" y="13" font-family="serif" font-size="12" fill="#7a7468">每饭尝苦胆</text>
    <text x="-20" y="31" font-family="serif" font-size="12" fill="#7a7468">终复国仇</text>
    <path d="M-90 0 Q-150 -30 -240 -90" stroke="#7a3b14" stroke-width="1.5" fill="none" stroke-dasharray="3 4" opacity="0.5"/>
  </g>

  <!-- 装饰：光芒线 -->
  <g stroke="#c05a30" stroke-width="1.5" opacity="0.3">
    <line x1="340" y1="300" x2="310" y2="300"/>
    <line x1="460" y1="300" x2="490" y2="300"/>
    <line x1="400" y1="260" x2="400" y2="240"/>
    <line x1="400" y1="340" x2="400" y2="360"/>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="17" fill="#3a7d5c" opacity="0.9">连珠小故事：古往今来，钢铁意志成就非凡人生</text>
</svg>
