<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="二十四节气转盘围着一年的农事活动转">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 中心圆 -->
  <circle cx="400" cy="300" r="180" fill="none" stroke="#8d5a36" stroke-width="3" opacity="0.3"/>
  <circle cx="400" cy="300" r="140" fill="none" stroke="#8d5a36" stroke-width="1.5" opacity="0.2"/>
  <circle cx="400" cy="300" r="100" fill="none" stroke="#8d5a36" stroke-width="1.5" opacity="0.2"/>
  <!-- 中心太阳 -->
  <circle cx="400" cy="300" r="35" fill="#f4b942" opacity="0.7"/>
  <g stroke="#e07856" stroke-width="2" opacity="0.5">
    <line x1="400" y1="255" x2="400" y2="240"/>
    <line x1="400" y1="345" x2="400" y2="360"/>
    <line x1="355" y1="300" x2="340" y2="300"/>
    <line x1="445" y1="300" x2="460" y2="300"/>
    <line x1="368" y1="268" x2="357" y2="257"/>
    <line x1="432" y1="268" x2="443" y2="257"/>
    <line x1="368" y1="332" x2="357" y2="343"/>
    <line x1="432" y1="332" x2="443" y2="343"/>
  </g>
  <!-- 二十四节气（简化为四季+主要节气） -->
  <!-- 春 -->
  <g transform="translate(400,130)">
    <rect x="-35" y="-15" width="70" height="24" rx="5" fill="#7ba84a"/>
    <text x="0" y="2" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#fef9ed">春·播种</text>
  </g>
  <g transform="translate(290,165)" opacity="0.7">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="10" fill="#6a8d3f">惊蛰</text>
  </g>
  <g transform="translate(510,165)" opacity="0.7">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="10" fill="#6a8d3f">清明</text>
  </g>
  <!-- 夏 -->
  <g transform="translate(570,300)">
    <rect x="-35" y="-12" width="70" height="24" rx="5" fill="#e07856"/>
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#fef9ed">夏·除草</text>
  </g>
  <g transform="translate(545,230)" opacity="0.7">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="10" fill="#e07856">芒种</text>
  </g>
  <g transform="translate(545,370)" opacity="0.7">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="10" fill="#e07856">夏至</text>
  </g>
  <!-- 秋 -->
  <g transform="translate(400,470)">
    <rect x="-35" y="-15" width="70" height="24" rx="5" fill="#c8843a"/>
    <text x="0" y="2" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#fef9ed">秋·丰收</text>
  </g>
  <g transform="translate(290,435)" opacity="0.7">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">秋分</text>
  </g>
  <g transform="translate(510,435)" opacity="0.7">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a">霜降</text>
  </g>
  <!-- 冬 -->
  <g transform="translate(230,300)">
    <rect x="-35" y="-12" width="70" height="24" rx="5" fill="#7ab8d8"/>
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#fef9ed">冬·休息</text>
  </g>
  <g transform="translate(255,230)" opacity="0.7">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="10" fill="#7ab8d8">冬至</text>
  </g>
  <g transform="translate(255,370)" opacity="0.7">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="10" fill="#7ab8d8">大寒</text>
  </g>
  <!-- 四角小图：现代农机 -->
  <g transform="translate(100,120)" opacity="0.5">
    <rect x="-20" y="-10" width="40" height="20" rx="3" fill="#8d5a36"/>
    <circle cx="-12" cy="12" r="6" fill="#2d2a24"/>
    <circle cx="12" cy="12" r="6" fill="#2d2a24"/>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">拖拉机</text>
  </g>
  <g transform="translate(700,120)" opacity="0.5">
    <rect x="-15" y="-10" width="30" height="20" rx="3" fill="#8d5a36"/>
    <circle cx="-10" cy="12" r="5" fill="#2d2a24"/>
    <circle cx="10" cy="12" r="5" fill="#2d2a24"/>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">收割机</text>
  </g>
  <g transform="translate(100,500)" opacity="0.5">
    <path d="M-15 5 L15 5 L10 18 L-10 18 Z" fill="#8d5a36"/>
    <rect x="-3" y="-8" width="6" height="13" fill="#8d5a36"/>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">插秧机</text>
  </g>
  <g transform="translate(700,500)" opacity="0.5">
    <circle cx="0" cy="0" r="12" fill="#f4b942"/>
    <path d="M-8 8 Q0 15 8 8" stroke="#6a8d3f" stroke-width="2" fill="none"/>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">杂交水稻</text>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">四季农事的变化</text>
</svg>
