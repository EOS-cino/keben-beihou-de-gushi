<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="人类认识星星与星座故事的科学插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">人类是怎样认识星星的</text>
  <line x1="220" y1="56" x2="580" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——一望就是几千年的那条路</text>

  <!-- 时间轴 -->
  <line x1="80" y1="140" x2="720" y2="140" stroke="#c8843a" stroke-width="3"/>
  <g font-family="serif" fill="#7a3b14">
    <circle cx="140" cy="140" r="7" fill="#e8a838"/>
    <text x="140" y="125" text-anchor="middle" font-size="11">认路定农时</text>
    <circle cx="310" cy="140" r="7" fill="#c84a3a"/>
    <text x="310" y="125" text-anchor="middle" font-size="11">编星座故事</text>
    <circle cx="480" cy="140" r="7" fill="#4a90b8"/>
    <text x="480" y="125" text-anchor="middle" font-size="11">哥白尼伽利略</text>
    <circle cx="650" cy="140" r="7" fill="#2d6a4f"/>
    <text x="650" y="125" text-anchor="middle" font-size="11">太空望远镜</text>
  </g>

  <!-- 认路定农时 -->
  <g transform="translate(140, 175)">
    <rect x="-90" y="0" width="180" height="130" rx="8" fill="#fef9ed" stroke="#e8a838" stroke-width="1.5"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="11" font-weight="bold" fill="#e8a838">看星认路</text>
    <g transform="translate(0, 70)">
      <circle cx="0" cy="-15" r="3" fill="#e8a838"/>
      <circle cx="-12" cy="0" r="3" fill="#e8a838"/>
      <circle cx="12" cy="0" r="3" fill="#e8a838"/>
      <polyline points="-12,0 0,-15 12,0" stroke="#7a3b14" stroke-width="1" fill="none"/>
      <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="8" fill="#7a3b14">北斗指北</text>
    </g>
    <text x="0" y="115" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">航海走沙漠靠星</text>
  </g>

  <!-- 星座故事 -->
  <g transform="translate(310, 175)">
    <rect x="-90" y="0" width="180" height="130" rx="8" fill="#fef9ed" stroke="#c84a3a" stroke-width="1.5"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="11" font-weight="bold" fill="#c84a3a">编星座</text>
    <g transform="translate(0, 70)" stroke="#7a3b14" stroke-width="1" fill="none">
      <circle cx="-20" cy="-10" r="3" fill="#e8a838"/>
      <circle cx="0" cy="0" r="3" fill="#e8a838"/>
      <circle cx="20" cy="-8" r="3" fill="#e8a838"/>
      <circle cx="-10" cy="15" r="3" fill="#e8a838"/>
      <polyline points="-20,-10 0,0 20,-8 -10,15 -20,-10"/>
    </g>
    <text x="0" y="105" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">连星想象成图案</text>
    <text x="0" y="120" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">二十八宿·十二星座</text>
  </g>

  <!-- 哥白尼伽利略 -->
  <g transform="translate(480, 175)">
    <rect x="-90" y="0" width="180" height="130" rx="8" fill="#fef9ed" stroke="#4a90b8" stroke-width="1.5"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="11" font-weight="bold" fill="#4a90b8">地球绕太阳</text>
    <g transform="translate(0, 70)">
      <circle cx="0" cy="0" r="10" fill="#e8a838" stroke="#c8843a" stroke-width="1.2"/>
      <ellipse cx="0" cy="0" rx="30" ry="30" fill="none" stroke="#4a90b8" stroke-width="1" stroke-dasharray="3 3"/>
      <circle cx="30" cy="0" r="5" fill="#4a90b8" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <text x="0" y="105" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">哥白尼：日心说</text>
    <text x="0" y="120" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">伽利略：望远镜</text>
  </g>

  <!-- 太空望远镜 -->
  <g transform="translate(650, 175)">
    <rect x="-90" y="0" width="180" height="130" rx="8" fill="#fef9ed" stroke="#2d6a4f" stroke-width="1.5"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="11" font-weight="bold" fill="#2d6a4f">看见更远</text>
    <g transform="translate(0, 65)">
      <!-- 望远镜 -->
      <rect x="-6" y="-20" width="12" height="40" fill="#7a3b14" stroke="#c8843a" stroke-width="1.2"/>
      <circle cx="0" cy="-22" r="8" fill="#4a90b8" opacity="0.6" stroke="#7a3b14" stroke-width="1"/>
      <!-- 远方星系 -->
      <ellipse cx="35" cy="-15" rx="10" ry="4" fill="#e8a838" opacity="0.5"/>
      <circle cx="35" cy="-15" r="3" fill="#e8a838"/>
    </g>
    <text x="0" y="105" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">光年量距离</text>
    <text x="0" y="120" text-anchor="middle" font-family="serif" font-size="9" fill="#8d5a36">越了解，问题越多</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 360)">
    <rect x="-320" y="0" width="640" height="120" rx="10" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">"那些星星后面，还有什么呢？"</text>
    <text x="0" y="54" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">孩子的问题，和几千年前古人问的一模一样</text>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">人类认识星星走了几千年，这条路还没走完</text>
    <text x="0" y="105" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">下一个大答案，也许从一个孩子抬头问"为什么"开始</text>
  </g>
</svg>
