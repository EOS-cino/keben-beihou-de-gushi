<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="故宫文物南迁时装箱搬运的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空 -->
  <rect x="0" y="0" width="800" height="300" fill="#7a8a9a" opacity="0.08"/>
  <!-- 故宫角楼（远景） -->
  <g transform="translate(650 250)" opacity="0.3">
    <rect x="-40" y="0" width="80" height="50" fill="#e07856"/>
    <path d="M-45 0 L0 -30 L45 0 Z" fill="#c06540"/>
    <rect x="-15" y="-40" width="30" height="15" fill="#c06540"/>
    <path d="M-20 -40 L0 -55 L20 -40 Z" fill="#e07856"/>
  </g>
  <!-- 火车（远景） -->
  <g transform="translate(100 230)" opacity="0.3">
    <rect x="0" y="0" width="80" height="30" fill="#333"/>
    <circle cx="15" cy="32" r="6" fill="#333"/>
    <circle cx="65" cy="32" r="6" fill="#333"/>
    <rect x="85" y="5" width="50" height="25" fill="#6b5535"/>
    <circle cx="95" cy="32" r="6" fill="#333"/>
    <circle cx="125" cy="32" r="6" fill="#333"/>
    <!-- 蒸汽 -->
    <ellipse cx="10" cy="-10" rx="10" ry="6" fill="#ffffff" opacity="0.4"/>
    <ellipse cx="5" cy="-20" rx="8" ry="5" fill="#ffffff" opacity="0.3"/>
  </g>
  <!-- 地面 -->
  <rect x="0" y="300" width="800" height="300" fill="#dceee3"/>
  <rect x="0" y="350" width="800" height="250" fill="#9fc8b4" opacity="0.3"/>
  <!-- 木箱堆 -->
  <g transform="translate(400 400)">
    <!-- 大木箱1 -->
    <rect x="-80" y="-30" width="70" height="50" fill="#8b6f47" opacity="0.6"/>
    <rect x="-80" y="-30" width="70" height="8" fill="#6b5535"/>
    <line x1="-45" y1="-22" x2="-45" y2="20" stroke="#6b5535" stroke-width="1"/>
    <text x="-45" y="0" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="8" fill="#fef9ed">故博</text>
    <!-- 大木箱2 -->
    <rect x="-10" y="-30" width="70" height="50" fill="#8b6f47" opacity="0.5"/>
    <rect x="-10" y="-30" width="70" height="8" fill="#6b5535"/>
    <line x1="25" y1="-22" x2="25" y2="20" stroke="#6b5535" stroke-width="1"/>
    <!-- 叠在上面的箱 -->
    <rect x="-50" y="-60" width="60" height="35" fill="#a08560" opacity="0.5"/>
    <rect x="-50" y="-60" width="60" height="6" fill="#6b5535"/>
    <line x1="-20" y1="-54" x2="-20" y2="-28" stroke="#6b5535" stroke-width="1"/>
    <!-- 稻草露出来 -->
    <g fill="#e8a838" opacity="0.4">
      <path d="M-45 -30 Q-42 -35 -40 -30"/>
      <path d="M-35 -30 Q-32 -36 -30 -30"/>
    </g>
  </g>
  <!-- 搬运工人1 -->
  <g transform="translate(250 440)">
    <!-- 身体 -->
    <path d="M-20 0 L-25 -60 L25 -60 L20 0 Z" fill="#2d6a4f" opacity="0.7"/>
    <!-- 头 -->
    <circle cx="0" cy="-75" r="14" fill="#f4d4a8"/>
    <!-- 帽子 -->
    <path d="M-14 -82 Q0 -93 14 -82 L12 -76 Q0 -72 -12 -76 Z" fill="#333"/>
    <!-- 眼睛 -->
    <circle cx="-5" cy="-76" r="1.5" fill="#333"/>
    <circle cx="5" cy="-76" r="1.5" fill="#333"/>
    <!-- 嘴（用力） -->
    <path d="M-3 -67 L3 -67" stroke="#333" stroke-width="1.5"/>
    <!-- 手搬箱子 -->
    <path d="M20 -40 L40 -25" stroke="#f4d4a8" stroke-width="7" stroke-linecap="round"/>
    <path d="M-20 -40 L-35 -25" stroke="#f4d4a8" stroke-width="7" stroke-linecap="round"/>
    <!-- 小箱子 -->
    <rect x="30" y="-35" width="30" height="22" fill="#8b6f47" opacity="0.6"/>
  </g>
  <!-- 搬运工人2 -->
  <g transform="translate(560 440)">
    <path d="M-20 0 L-25 -60 L25 -60 L20 0 Z" fill="#4a90b8" opacity="0.6"/>
    <circle cx="0" cy="-75" r="14" fill="#f4d4a8"/>
    <path d="M-14 -82 Q0 -93 14 -82 L12 -76 Q0 -72 -12 -76 Z" fill="#333"/>
    <circle cx="-5" cy="-76" r="1.5" fill="#333"/>
    <circle cx="5" cy="-76" r="1.5" fill="#333"/>
    <path d="M-3 -67 L3 -67" stroke="#333" stroke-width="1.5"/>
    <!-- 背箱子 -->
    <rect x="-25" y="-80" width="50" height="30" fill="#8b6f47" opacity="0.5"/>
    <path d="M-20 -40 L-35 -25" stroke="#f4d4a8" stroke-width="7" stroke-linecap="round"/>
    <path d="M20 -40 L35 -25" stroke="#f4d4a8" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- 棉絮/稻草 -->
  <g fill="#e8a838" opacity="0.3">
    <ellipse cx="350" cy="420" rx="8" ry="3"/>
    <ellipse cx="450" cy="430" rx="6" ry="2"/>
    <ellipse cx="380" cy="440" rx="7" ry="2.5"/>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="24" font-weight="700" fill="#2d6a4f">连珠小故事：老房子搬家的故事</text>
  <text x="400" y="82" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#7a7468">上万箱文物辗转万里，一件未丢</text>
</svg>
