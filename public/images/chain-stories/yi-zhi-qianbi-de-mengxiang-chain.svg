<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="文具们秘密生活的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">连珠小故事：文具们的秘密生活</text>
  <line x1="200" y1="62" x2="600" y2="62" stroke="#c8843a" stroke-width="1.5"/>

  <!-- 月亮和星星（夜晚） -->
  <g transform="translate(680, 100)" opacity="0.5">
    <circle cx="0" cy="0" r="20" fill="#fef9ed" stroke="#e8a838" stroke-width="1.5"/>
    <circle cx="-5" cy="-3" r="4" fill="#e8d5b0" opacity="0.5"/>
  </g>
  <path d="M120 100 L123 93 L126 100 L133 103 L126 106 L123 113 L120 106 L113 103 Z" fill="#e8a838" opacity="0.4"/>
  <path d="M250 90 L252 85 L254 90 L259 92 L254 94 L252 99 L250 94 L245 92 Z" fill="#e8a838" opacity="0.3"/>

  <!-- 文具盒（打开的） -->
  <g transform="translate(400, 380)">
    <!-- 盒盖 -->
    <path d="M-180 -60 L-180 -100 L180 -100 L180 -60" fill="#4a90b8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 盒身 -->
    <rect x="-180" y="-60" width="360" height="80" fill="#6ab0d8" stroke="#7a3b14" stroke-width="2" rx="5"/>
    <rect x="-180" y="-60" width="360" height="10" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 橡皮擦（照镜子） -->
  <g transform="translate(180, 250)">
    <rect x="-25" y="-15" width="50" height="30" fill="#e07856" stroke="#7a3b14" stroke-width="2" rx="4"/>
    <rect x="-20" y="-10" width="40" height="8" fill="#fff6df" stroke="#7a3b14" stroke-width="1"/>
    <!-- 镜子 -->
    <ellipse cx="35" cy="0" rx="15" ry="22" fill="#a8d0e8" opacity="0.5" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 悲伤表情 -->
    <circle cx="-8" cy="-3" r="2" fill="#2a2a2a"/>
    <circle cx="8" cy="-3" r="2" fill="#2a2a2a"/>
    <path d="M-5 8 Q0 5 5 8" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 对话 -->
    <text x="0" y="-30" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">"我又瘦了…"</text>
    <text x="0" y="40" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a3b14" font-family="serif">橡皮擦</text>
  </g>

  <!-- 尺子（笔直躺着） -->
  <g transform="translate(400, 230)">
    <rect x="-80" y="-8" width="160" height="16" fill="#fff6df" stroke="#7a3b14" stroke-width="2" rx="2"/>
    <!-- 刻度 -->
    <line x1="-70" y1="-8" x2="-70" y2="-2" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-50" y1="-8" x2="-50" y2="-2" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-30" y1="-8" x2="-30" y2="-2" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-10" y1="-8" x2="-10" y2="-2" stroke="#7a3b14" stroke-width="1"/>
    <line x1="10" y1="-8" x2="10" y2="-2" stroke="#7a3b14" stroke-width="1"/>
    <line x1="30" y1="-8" x2="30" y2="-2" stroke="#7a3b14" stroke-width="1"/>
    <line x1="50" y1="-8" x2="50" y2="-2" stroke="#7a3b14" stroke-width="1"/>
    <line x1="70" y1="-8" x2="70" y2="-2" stroke="#7a3b14" stroke-width="1"/>
    <!-- 数字 -->
    <text x="-70" y="8" text-anchor="middle" font-size="7" fill="#7a3b14">0</text>
    <text x="-30" y="8" text-anchor="middle" font-size="7" fill="#7a3b14">5</text>
    <text x="10" y="8" text-anchor="middle" font-size="7" fill="#7a3b14">10</text>
    <text x="50" y="8" text-anchor="middle" font-size="7" fill="#7a3b14">15</text>
    <text x="0" y="-25" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">"我必须保持笔直！"</text>
    <text x="0" y="35" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a3b14" font-family="serif">尺子</text>
  </g>

  <!-- 卷笔刀和铅笔 -->
  <g transform="translate(620, 250)">
    <!-- 卷笔刀 -->
    <rect x="-20" y="-15" width="40" height="30" fill="#2d6a4f" stroke="#7a3b14" stroke-width="2" rx="3"/>
    <rect x="-8" y="-8" width="16" height="10" fill="#3a2a1a" stroke="#7a3b14" stroke-width="1"/>
    <!-- 铅笔（刚削好，精神焕发） -->
    <g transform="translate(-45, 0) rotate(-20)">
      <rect x="-4" y="-20" width="8" height="25" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-4 5 L0 15 L4 5 Z" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-1 11 L0 15 L1 11 Z" fill="#2a2a2a"/>
    </g>
    <text x="0" y="-30" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">"焕然一新！"</text>
    <text x="0" y="35" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a3b14" font-family="serif">卷笔刀&amp;铅笔</text>
  </g>

  <!-- 彩笔家族（吵架） -->
  <g transform="translate(400, 480)">
    <text x="0" y="-15" text-anchor="middle" font-size="12" fill="#7a3b14" font-family="serif">彩笔家族的争论</text>
    <!-- 红笔 -->
    <g transform="translate(-90, 0)">
      <rect x="-5" y="-25" width="10" height="40" fill="#e07856" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
      <path d="M-5 15 L0 25 L5 15" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
      <text x="0" y="40" text-anchor="middle" font-size="9" fill="#e07856" font-family="serif">我最红!</text>
    </g>
    <!-- 蓝笔 -->
    <g transform="translate(-30, 0)">
      <rect x="-5" y="-25" width="10" height="40" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
      <path d="M-5 15 L0 25 L5 15" fill="#4a90b8" stroke="#7a3b14" stroke-width="1"/>
      <text x="0" y="40" text-anchor="middle" font-size="9" fill="#4a90b8" font-family="serif">我最大!</text>
    </g>
    <!-- 绿笔 -->
    <g transform="translate(30, 0)">
      <rect x="-5" y="-25" width="10" height="40" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
      <path d="M-5 15 L0 25 L5 15" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1"/>
      <text x="0" y="40" text-anchor="middle" font-size="9" fill="#2d6a4f" font-family="serif">我最重要!</text>
    </g>
    <!-- 白笔 -->
    <g transform="translate(90, 0)">
      <rect x="-5" y="-25" width="10" height="40" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
      <path d="M-5 15 L0 25 L5 15" fill="#fff6df" stroke="#7a3b14" stroke-width="1"/>
      <text x="0" y="40" text-anchor="middle" font-size="8" fill="#7a3b14" font-family="serif">没我纸是空的!</text>
    </g>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="545" width="700" height="35" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="568" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">每一样文具都有自己的价值，没有谁比谁更重要——合作才能画出美丽的画。</text>
</svg>
