<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="植物花叶果关系示意图">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">植物的花和果实有什么关系</text>
  <line x1="230" y1="56" x2="570" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 中心：一棵植物 -->
  <g transform="translate(400,340)">
    <!-- 根 -->
    <g stroke="#8d5a36" stroke-width="2" fill="none">
      <path d="M0 120 Q-10 140 -20 155"/>
      <path d="M0 120 Q10 140 20 155"/>
      <path d="M0 120 Q-5 145 -15 160"/>
      <path d="M0 120 Q5 145 15 160"/>
      <path d="M0 120 L0 160"/>
    </g>
    <ellipse cx="0" cy="160" rx="50" ry="10" fill="#d8c8a8" opacity="0.4"/>
    <text x="0" y="180" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">根：吸收水分</text>

    <!-- 茎 -->
    <rect x="-4" y="20" width="8" height="100" fill="#6a8d3f" rx="2"/>
    <text x="40" y="80" font-family="serif" font-size="11" fill="#6a8d3f">茎：运输养分</text>

    <!-- 叶子（左） -->
    <g transform="translate(-60,50)">
      <path d="M0 0 Q-25 -15 -30 0 Q-25 15 0 10 Q25 15 30 0 Q25 -15 0 0" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
      <line x1="-30" y1="0" x2="30" y2="0" stroke="#4a6a2f" stroke-width="1"/>
      <text x="0" y="-25" text-anchor="middle" font-family="serif" font-size="11" fill="#4a6a2f">叶：光合作用</text>
      <text x="0" y="-12" text-anchor="middle" font-family="serif" font-size="9" fill="#4a6a2f">制造养分</text>
    </g>

    <!-- 叶子（右） -->
    <g transform="translate(60,40)">
      <path d="M0 0 Q-25 -15 -30 0 Q-25 15 0 10 Q25 15 30 0 Q25 -15 0 0" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
      <line x1="-30" y1="0" x2="30" y2="0" stroke="#4a6a2f" stroke-width="1"/>
    </g>

    <!-- 花 -->
    <g transform="translate(-30,0)">
      <ellipse cx="0" cy="0" rx="8" ry="5" fill="#ffffff" stroke="#c8843a" stroke-width="1"/>
      <ellipse cx="-6" cy="-3" rx="6" ry="4" fill="#ffffff" stroke="#c8843a" stroke-width="1"/>
      <ellipse cx="6" cy="-3" rx="6" ry="4" fill="#ffffff" stroke="#c8843a" stroke-width="1"/>
      <circle cx="0" cy="0" r="3" fill="#f4b942"/>
      <text x="0" y="-15" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">花：授粉繁殖</text>
    </g>

    <!-- 果实 -->
    <g transform="translate(30,10)">
      <path d="M0 0 Q-3 -6 0 -9 Q-10 -11 -11 -3 Q-13 5 -9 11 Q-4 16 0 16 Q4 16 9 11 Q13 5 11 -3 Q10 -11 0 -9 Q3 -6 0 0" fill="#a8c860" stroke="#6a8d3f" stroke-width="1.5"/>
      <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="11" fill="#4a6a2f">果实：保护种子</text>
    </g>
  </g>

  <!-- 箭头：叶→果（养分输送） -->
  <path d="M340 310 Q380 280 425 300" fill="none" stroke="#c8843a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrFR1)"/>
  <text x="365" y="275" font-family="serif" font-size="10" fill="#c8843a">输送养分</text>

  <!-- 箭头：花→果（发育） -->
  <path d="M375 340 Q400 330 425 345" fill="none" stroke="#c8843a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrFR1)"/>
  <text x="385" y="325" font-family="serif" font-size="10" fill="#c8843a">花发育成果实</text>

  <!-- 上方：关系说明 -->
  <rect x="100" y="90" width="600" height="100" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <text x="400" y="115" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">植物各部分紧密相连</text>
  <text x="400" y="140" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">根吸收水分 → 茎运输养分 → 叶制造养料 → 花授粉繁殖 → 果实保护种子</text>
  <text x="400" y="162" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">叶子被虫咬坏 = 工厂停工 = 果实得不到养分 = 葫芦掉落</text>

  <!-- 下方：蚜虫危害 -->
  <rect x="100" y="500" width="600" height="70" fill="#f5e0d8" stroke="#c84a3a" stroke-width="1.5" rx="6"/>
  <text x="400" y="525" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">蚜虫吸食叶汁 → 叶子枯黄 → 无法光合作用 → 养分断供</text>
  <text x="400" y="550" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">→ 花无法授粉 → 果实发育不良 → 葫芦全部掉落</text>

  <defs>
    <marker id="arrFR1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#c8843a"/>
    </marker>
  </defs>
</svg>
