<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从蝙蝠实验到雷达发明再到仿生学的故事画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">连珠小故事</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#7a3b14" stroke-width="2"/>
  <line x1="300" y1="300" x2="500" y2="300" stroke="#7a3b14" stroke-width="3" stroke-dasharray="8,6"/>
  <circle cx="350" cy="300" r="6" fill="#d4a017"/>
  <circle cx="400" cy="300" r="9" fill="#c8553d"/>
  <circle cx="450" cy="300" r="6" fill="#d4a017"/>
  <!-- 左珠：蝙蝠回声 -->
  <circle cx="170" cy="300" r="110" fill="#5d8aa8" opacity="0.3" stroke="#1e5f8e" stroke-width="3"/>
  <path d="M 150 270 q 16 -20 32 0 q 16 -20 32 0 q -16 8 -32 8 q -16 0 -32 -8 z" fill="#3a3a3a"/>
  <path d="M 215 275 q 30 -6 50 0" stroke="#1e5f8e" stroke-width="2" fill="none"/>
  <text x="170" y="330" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#7a3b14">蝙蝠</text>
  <text x="170" y="360" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">回声定位</text>
  <!-- 右珠：仿生发明 -->
  <circle cx="630" cy="300" r="110" fill="#8fb996" opacity="0.3" stroke="#3a7d44" stroke-width="3"/>
  <circle cx="615" cy="275" r="10" fill="#3a7d44"/>
  <circle cx="645" cy="275" r="10" fill="#3a7d44"/>
  <circle cx="630" cy="300" r="10" fill="#3a7d44"/>
  <text x="630" y="335" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#7a3b14">仿生学</text>
  <text x="630" y="360" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">苍耳→魔术贴</text>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">一只蝙蝠"教"人类造雷达</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">向大自然"请教"，把本领变成发明</text>
</svg>
