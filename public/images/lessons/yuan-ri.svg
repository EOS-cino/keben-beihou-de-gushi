<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="古代春节放爆竹、喝屠苏酒插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">元日</text>
  <line x1="350" y1="62" x2="450" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 诗句 -->
  <text x="400" y="95" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" opacity="0.7">爆竹声中一岁除，春风送暖入屠苏</text>

  <!-- 朝阳 -->
  <circle cx="650" cy="150" r="45" fill="#e8a838" opacity="0.8"/>
  <circle cx="650" cy="150" r="35" fill="#f0c040" opacity="0.6"/>
  <!-- 光芒 -->
  <line x1="650" y1="90" x2="650" y2="75" stroke="#e8a838" stroke-width="2" opacity="0.5"/>
  <line x1="710" y1="150" x2="725" y2="150" stroke="#e8a838" stroke-width="2" opacity="0.5"/>
  <line x1="600" y1="100" x2="590" y2="90" stroke="#e8a838" stroke-width="2" opacity="0.5"/>
  <line x1="700" y1="100" x2="710" y2="90" stroke="#e8a838" stroke-width="2" opacity="0.5"/>

  <!-- 古代房屋 -->
  <g transform="translate(400, 0)">
    <!-- 屋顶 -->
    <path d="M-140 280 L0 180 L140 280 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 瓦片 -->
    <path d="M-120 280 L0 200 L120 280" fill="none" stroke="#6a4220" stroke-width="1.5"/>
    <path d="M-90 260 L0 220 L90 260" fill="none" stroke="#6a4220" stroke-width="1.5"/>
    <!-- 墙 -->
    <rect x="-110" y="280" width="220" height="180" fill="#d4a574" stroke="#7a3b14" stroke-width="2"/>
    <!-- 门 -->
    <rect x="-35" y="340" width="70" height="120" fill="#5a3a1a" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="20" cy="400" r="3" fill="#e8a838"/>
    <!-- 门上桃符（红色） -->
    <rect x="-55" y="345" width="18" height="60" fill="#c84030" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="37" y="345" width="18" height="60" fill="#c84030" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="-46" y="380" text-anchor="middle" font-size="10" fill="#fef9ed" font-family="serif">神</text>
    <text x="46" y="380" text-anchor="middle" font-size="10" fill="#fef9ed" font-family="serif">荼</text>
    <!-- 窗户 -->
    <rect x="-95" y="300" width="40" height="35" fill="#e8a838" opacity="0.5" stroke="#7a3b14" stroke-width="2"/>
    <line x1="-75" y1="300" x2="-75" y2="335" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-95" y1="317" x2="-55" y2="317" stroke="#7a3b14" stroke-width="1"/>
    <rect x="55" y="300" width="40" height="35" fill="#e8a838" opacity="0.5" stroke="#7a3b14" stroke-width="2"/>
    <line x1="75" y1="300" x2="75" y2="335" stroke="#7a3b14" stroke-width="1"/>
    <line x1="55" y1="317" x2="95" y2="317" stroke="#7a3b14" stroke-width="1"/>
  </g>

  <!-- 爆竹 -->
  <g transform="translate(150, 350)">
    <!-- 爆竹串 -->
    <rect x="-5" y="-40" width="10" height="15" fill="#c84030" stroke="#7a3b14" stroke-width="1"/>
    <rect x="-5" y="-22" width="10" height="15" fill="#c84030" stroke="#7a3b14" stroke-width="1"/>
    <rect x="-5" y="-4" width="10" height="15" fill="#c84030" stroke="#7a3b14" stroke-width="1"/>
    <rect x="-5" y="14" width="10" height="15" fill="#c84030" stroke="#7a3b14" stroke-width="1"/>
    <rect x="-5" y="32" width="10" height="15" fill="#c84030" stroke="#7a3b14" stroke-width="1"/>
    <!-- 引线 -->
    <path d="M0 -40 Q5 -50 10 -55" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 火花 -->
    <circle cx="10" cy="-55" r="4" fill="#e8a838" opacity="0.8"/>
    <circle cx="15" cy="-58" r="2" fill="#e07856"/>
    <circle cx="5" cy="-60" r="2" fill="#e8a838"/>
    <!-- 爆炸效果 -->
    <path d="M-15 -55 L-20 -60 M-15 -50 L-22 -48 M15 -52 L22 -55" fill="none" stroke="#e8a838" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- 一家人喝屠苏酒 -->
  <g transform="translate(580, 420)">
    <!-- 桌子 -->
    <rect x="-50" y="20" width="100" height="10" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-45" y="30" width="6" height="30" fill="#8d5a36"/>
    <rect x="39" y="30" width="6" height="30" fill="#8d5a36"/>
    <!-- 酒壶 -->
    <ellipse cx="0" cy="10" rx="12" ry="5" fill="#5a3a1a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-12 10 L-10 -5 Q-10 -10 0 -10 Q10 -10 10 -5 L12 10" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="-10" rx="8" ry="3" fill="#5a3a1a"/>
    <path d="M10 0 Q18 0 18 8" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 酒杯 -->
    <path d="M-25 5 L-23 15 L-17 15 L-15 5 Z" fill="#e8a838" opacity="0.7" stroke="#7a3b14" stroke-width="1"/>
    <path d="M25 5 L23 15 L17 15 L15 5 Z" fill="#e8a838" opacity="0.7" stroke="#7a3b14" stroke-width="1"/>

    <!-- 小孩（先喝） -->
    <g transform="translate(-60, -20)">
      <circle cx="0" cy="0" r="14" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-14 -5 Q-12 -18 0 -20 Q12 -18 14 -5" fill="#3a2a1a"/>
      <circle cx="-4" cy="0" r="2" fill="#2a2a2a"/>
      <circle cx="4" cy="0" r="2" fill="#2a2a2a"/>
      <path d="M-3 8 Q0 11 3 8" fill="none" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-8 12 L-10 40 L10 40 L8 12" fill="#c84030" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 手拿杯 -->
      <path d="M8 18 L20 22" fill="none" stroke="#f0d0a8" stroke-width="5" stroke-linecap="round"/>
    </g>

    <!-- 大人 -->
    <g transform="translate(60, -20)">
      <circle cx="0" cy="0" r="16" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-16 -5 Q-14 -20 0 -22 Q14 -20 16 -5" fill="#3a2a1a"/>
      <circle cx="-5" cy="0" r="2" fill="#2a2a2a"/>
      <circle cx="5" cy="0" r="2" fill="#2a2a2a"/>
      <path d="M-4 9 Q0 12 4 9" fill="none" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-10 14 L-12 42 L12 42 L10 14" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
  </g>

  <!-- 标注：爆竹 -->
  <line x1="150" y1="310" x2="100" y2="270" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="55" y="248" width="90" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="100" y="265" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">爆竹声声</text>

  <!-- 标注：屠苏酒 -->
  <line x1="580" y1="400" x2="660" y2="350" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="630" y="325" width="90" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="675" y="342" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">屠苏酒</text>

  <!-- 标注：新桃符 -->
  <line x1="345" y1="375" x2="280" y2="330" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="225" y="308" width="90" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="270" y="325" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">新桃符</text>

  <!-- 底部说明 -->
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">爆竹、屠苏酒、朝阳、新桃符——二十八字画出古代春节的热闹喜庆</text>
</svg>
