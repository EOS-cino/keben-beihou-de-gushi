<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="渔夫妻子在风暴夜收养邻居孤儿的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">穷人</text>
  <line x1="370" y1="56" x2="430" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 风暴夜空 -->
  <rect x="0" y="72" width="800" height="200" fill="#2a2a4a" opacity="0.12"/>
  <!-- 风的线条 -->
  <path d="M 0 100 Q 200 90 400 100 Q 600 90 800 100" fill="none" stroke="#4a90b8" stroke-width="1.5" opacity="0.2"/>
  <path d="M 0 130 Q 200 120 400 130 Q 600 120 800 130" fill="none" stroke="#4a90b8" stroke-width="1" opacity="0.15"/>
  <!-- 海浪 -->
  <path d="M 0 220 Q 100 210 200 220 Q 300 230 400 220 Q 500 210 600 220 Q 700 230 800 220 L 800 250 L 0 250 Z" fill="#4a90b8" opacity="0.15"/>
  <path d="M 0 235 Q 100 225 200 235 Q 300 245 400 235 Q 500 225 600 235 Q 700 245 800 235" fill="none" stroke="#4a90b8" stroke-width="1.5" opacity="0.2"/>

  <!-- 左侧：桑娜的小屋 -->
  <g transform="translate(200, 340)">
    <!-- 屋子 -->
    <rect x="-80" y="0" width="160" height="90" fill="#e0c898" stroke="#7a3b14" stroke-width="2"/>
    <path d="M-90 0 L0 -35 L90 0 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 烟囱 -->
    <rect x="40" y="-30" width="14" height="20" fill="#7a3b14" stroke="#5a3a1a" stroke-width="1.5"/>
    <!-- 烟 -->
    <path d="M 47 -30 Q 50 -42 45 -52 Q 42 -62 48 -70" fill="none" stroke="#c8c8c8" stroke-width="2" opacity="0.4"/>
    <!-- 门 -->
    <rect x="-15" y="40" width="30" height="50" fill="#7a3b14" stroke="#5a3a1a" stroke-width="1.5"/>
    <!-- 窗（透出暖光） -->
    <rect x="-60" y="20" width="28" height="28" fill="#e8a838" opacity="0.6" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-46" y1="20" x2="-46" y2="48" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-60" y1="34" x2="-32" y2="34" stroke="#7a3b14" stroke-width="1"/>
    <rect x="32" y="20" width="28" height="28" fill="#e8a838" opacity="0.5" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="46" y1="20" x2="46" y2="48" stroke="#7a3b14" stroke-width="1"/>
    <line x1="32" y1="34" x2="60" y2="34" stroke="#7a3b14" stroke-width="1"/>
    <!-- 光晕 -->
    <circle cx="-46" cy="34" r="30" fill="#e8a838" opacity="0.06"/>
    <circle cx="46" cy="34" r="30" fill="#e8a838" opacity="0.06"/>
    <!-- 标注 -->
    <text x="0" y="115" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">桑娜的家·五个孩子</text>
  </g>

  <!-- 右侧：西蒙家（暗） -->
  <g transform="translate(600, 340)">
    <rect x="-80" y="0" width="160" height="90" fill="#c8b888" stroke="#7a3b14" stroke-width="2" opacity="0.7"/>
    <path d="M-90 0 L0 -35 L90 0 Z" fill="#6d4a26" stroke="#5a3a1a" stroke-width="2" opacity="0.8"/>
    <!-- 门（半开） -->
    <rect x="-15" y="40" width="30" height="50" fill="#5a3a1a" stroke="#5a3a1a" stroke-width="1.5" opacity="0.8"/>
    <!-- 窗（暗淡） -->
    <rect x="-60" y="20" width="28" height="28" fill="#3a3a4a" opacity="0.5" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="32" y="20" width="28" height="28" fill="#3a3a4a" opacity="0.4" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 标注 -->
    <text x="0" y="115" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">西蒙的家·已故去</text>
  </g>

  <!-- 中间：桑娜抱着两个孩子 -->
  <g transform="translate(400, 330)">
    <!-- 桑娜 -->
    <g transform="translate(0, 0)">
      <!-- 头 -->
      <circle cx="0" cy="-50" r="16" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
      <!-- 头巾 -->
      <path d="M-14 -55 Q0 -68 14 -55 L14 -48 Q0 -58 -14 -48 Z" fill="#4a4060" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-5" cy="-50" r="1.5" fill="#2a2a2a"/>
      <circle cx="5" cy="-50" r="1.5" fill="#2a2a2a"/>
      <path d="M-4 -42 Q0 -40 4 -42" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 身体 -->
      <path d="M-20 -34 L-28 30 L28 30 L20 -34 Z" fill="#6a5040" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 手臂（抱着孩子） -->
      <path d="M-20 -28 Q-30 -10 -22 5" fill="none" stroke="#6a5040" stroke-width="6" stroke-linecap="round"/>
      <path d="M20 -28 Q30 -10 22 5" fill="none" stroke="#6a5040" stroke-width="6" stroke-linecap="round"/>
      <!-- 怀里的孩子 -->
      <g transform="translate(-12, 0)">
        <circle cx="0" cy="0" r="8" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
        <circle cx="-2" cy="0" r="1" fill="#2a2a2a"/>
        <circle cx="2" cy="0" r="1" fill="#2a2a2a"/>
        <path d="M-2 4 Q0 5 2 4" fill="none" stroke="#7a3b14" stroke-width="1"/>
        <ellipse cx="0" cy="12" rx="8" ry="10" fill="#e0c898" stroke="#7a3b14" stroke-width="1"/>
      </g>
      <g transform="translate(12, 5)">
        <circle cx="0" cy="0" r="7" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
        <circle cx="-2" cy="0" r="1" fill="#2a2a2a"/>
        <circle cx="2" cy="0" r="1" fill="#2a2a2a"/>
        <ellipse cx="0" cy="10" rx="7" ry="8" fill="#d8c098" stroke="#7a3b14" stroke-width="1"/>
      </g>
    </g>
    <!-- 心形（善良） -->
    <path d="M0 55 Q-12 45 -12 38 Q-12 30 -4 30 Q0 30 0 35 Q0 30 4 30 Q12 30 12 38 Q12 45 0 55" fill="#e07856" opacity="0.5" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 底部说明 -->
  <rect x="100" y="510" width="600" height="55" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6" opacity="0.8"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">自己揭不开锅，却收养了邻居的孤儿——</text>
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">穷人虽然物质贫乏，善良却比金子还亮</text>
</svg>
