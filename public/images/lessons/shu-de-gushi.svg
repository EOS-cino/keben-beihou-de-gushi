<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一棵大树四季变化的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 四季分割线 -->
  <line x1="400" y1="100" x2="400" y2="520" stroke="#e8a838" stroke-width="2" opacity="0.2" stroke-dasharray="8 6"/>
  <line x1="50" y1="310" x2="750" y2="310" stroke="#e8a838" stroke-width="2" opacity="0.2" stroke-dasharray="8 6"/>
  <!-- 季节标签 -->
  <text x="225" y="130" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#7a7468">春</text>
  <text x="575" y="130" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#7a7468">夏</text>
  <text x="225" y="340" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#7a7468">秋</text>
  <text x="575" y="340" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#7a7468">冬</text>
  <!-- 春天的树 -->
  <g transform="translate(225 250)">
    <rect x="-4" y="0" width="8" height="55" fill="#8b6f47"/>
    <path d="M0 0 Q-15 -20 -30 -30" stroke="#8b6f47" stroke-width="3" fill="none"/>
    <path d="M0 0 Q15 -20 30 -30" stroke="#8b6f47" stroke-width="3" fill="none"/>
    <circle cx="-25" cy="-30" r="12" fill="#9fc8b4" opacity="0.6"/>
    <circle cx="25" cy="-30" r="12" fill="#9fc8b4" opacity="0.6"/>
    <circle cx="0" cy="-40" r="15" fill="#9fc8b4" opacity="0.6"/>
    <!-- 嫩芽 -->
    <g fill="#2d6a4f" opacity="0.8">
      <circle cx="-20" cy="-35" r="3"/>
      <circle cx="20" cy="-35" r="3"/>
      <circle cx="0" cy="-48" r="3"/>
      <circle cx="-30" cy="-25" r="2.5"/>
      <circle cx="30" cy="-25" r="2.5"/>
    </g>
  </g>
  <!-- 夏天的树 -->
  <g transform="translate(575 250)">
    <rect x="-4" y="0" width="8" height="55" fill="#8b6f47"/>
    <path d="M0 0 Q-20 -25 -40 -40" stroke="#8b6f47" stroke-width="3" fill="none"/>
    <path d="M0 0 Q20 -25 40 -40" stroke="#8b6f47" stroke-width="3" fill="none"/>
    <circle cx="-30" cy="-40" r="20" fill="#2d6a4f" opacity="0.7"/>
    <circle cx="30" cy="-40" r="20" fill="#2d6a4f" opacity="0.7"/>
    <circle cx="0" cy="-55" r="25" fill="#2d6a4f" opacity="0.7"/>
    <circle cx="-15" cy="-35" r="15" fill="#2d6a4f" opacity="0.6"/>
    <circle cx="15" cy="-35" r="15" fill="#2d6a4f" opacity="0.6"/>
  </g>
  <!-- 秋天的树 -->
  <g transform="translate(225 460)">
    <rect x="-4" y="0" width="8" height="55" fill="#8b6f47"/>
    <path d="M0 0 Q-15 -20 -30 -30" stroke="#8b6f47" stroke-width="3" fill="none"/>
    <path d="M0 0 Q15 -20 30 -30" stroke="#8b6f47" stroke-width="3" fill="none"/>
    <circle cx="-25" cy="-30" r="15" fill="#e8a838" opacity="0.6"/>
    <circle cx="25" cy="-30" r="15" fill="#e8a838" opacity="0.6"/>
    <circle cx="0" cy="-42" r="18" fill="#e07856" opacity="0.5"/>
    <!-- 落叶 -->
    <g fill="#e8a838" opacity="0.7">
      <ellipse cx="-40" cy="20" rx="5" ry="3" transform="rotate(30 -40 20)"/>
      <ellipse cx="35" cy="30" rx="5" ry="3" transform="rotate(-20 35 30)"/>
      <ellipse cx="-20" cy="40" rx="4" ry="2" transform="rotate(45 -20 40)"/>
    </g>
    <g fill="#e07856" opacity="0.6">
      <ellipse cx="45" cy="10" rx="5" ry="3" transform="rotate(-30 45 10)"/>
      <ellipse cx="-35" cy="45" rx="4" ry="2" transform="rotate(20 -35 45)"/>
    </g>
  </g>
  <!-- 冬天的树 -->
  <g transform="translate(575 460)">
    <rect x="-4" y="0" width="8" height="55" fill="#8b6f47"/>
    <path d="M0 0 Q-15 -20 -30 -30" stroke="#8b6f47" stroke-width="3" fill="none"/>
    <path d="M0 0 Q15 -20 30 -30" stroke="#8b6f47" stroke-width="3" fill="none"/>
    <path d="M0 -10 Q-10 -25 -20 -35" stroke="#8b6f47" stroke-width="2" fill="none"/>
    <path d="M0 -10 Q10 -25 20 -35" stroke="#8b6f47" stroke-width="2" fill="none"/>
    <!-- 雪花 -->
    <g fill="#ffffff" opacity="0.8">
      <circle cx="-25" cy="-30" r="3"/>
      <circle cx="25" cy="-30" r="3"/>
      <circle cx="0" cy="-38" r="3"/>
      <circle cx="-15" cy="-25" r="2"/>
      <circle cx="15" cy="-25" r="2"/>
    </g>
    <!-- 雪地 -->
    <ellipse cx="0" cy="5" rx="35" ry="6" fill="#ffffff" opacity="0.6"/>
  </g>
  <!-- 地面 -->
  <rect x="0" y="520" width="800" height="80" fill="#9fc8b4" opacity="0.2"/>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="700" fill="#2d6a4f">树的故事</text>
  <text x="400" y="82" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#7a7468">一棵树从种子到参天，要经历多少事</text>
</svg>
