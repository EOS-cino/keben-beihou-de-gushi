<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="火山喷发场景插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">山上的火山</text>
  <line x1="300" y1="56" x2="500" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——地球内部的"火炉"在呼吸</text>

  <!-- 天空（被火山灰染红） -->
  <rect x="0" y="90" width="800" height="250" fill="#e07856" opacity="0.2"/>
  <rect x="0" y="90" width="800" height="100" fill="#c84a3a" opacity="0.15"/>

  <!-- 火山灰云 -->
  <ellipse cx="400" cy="160" rx="120" ry="50" fill="#8d5a36" opacity="0.5"/>
  <ellipse cx="350" cy="140" rx="60" ry="35" fill="#7a3b14" opacity="0.4"/>
  <ellipse cx="450" cy="150" rx="70" ry="40" fill="#8d5a36" opacity="0.5"/>
  <ellipse cx="500" cy="170" rx="50" ry="30" fill="#7a3b14" opacity="0.3"/>

  <!-- 火山喷发（岩浆喷出） -->
  <g transform="translate(400, 220)">
    <!-- 喷出的岩浆 -->
    <path d="M-20 0 Q-30 -40 -15 -70 Q0 -90 15 -70 Q30 -40 20 0 Z" fill="#c84a3a" opacity="0.8"/>
    <path d="M-10 -20 Q-15 -50 -5 -65 Q5 -50 10 -20" fill="#e07856"/>
    <!-- 飞溅的岩浆块 -->
    <circle cx="-40" cy="-30" r="6" fill="#e07856"/>
    <circle cx="45" cy="-40" r="5" fill="#e07856"/>
    <circle cx="-55" cy="-10" r="4" fill="#c84a3a"/>
    <circle cx="50" cy="-15" r="7" fill="#c84a3a"/>
    <circle cx="-30" cy="-60" r="4" fill="#e07856"/>
    <circle cx="35" cy="-55" r="5" fill="#c84a3a"/>
  </g>

  <!-- 火山体 -->
  <path d="M150 500 L300 250 L350 220 L400 200 L450 220 L500 250 L650 500 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="2.5"/>
  <!-- 火山口 -->
  <ellipse cx="400" cy="220" rx="50" ry="15" fill="#c84a3a"/>
  <ellipse cx="400" cy="218" rx="40" ry="10" fill="#e07856"/>
  <!-- 火山纹理 -->
  <path d="M250 350 L280 320 L300 350" fill="none" stroke="#7a3b14" stroke-width="2" opacity="0.4"/>
  <path d="M500 350 L520 320 L540 350" fill="none" stroke="#7a3b14" stroke-width="2" opacity="0.4"/>
  <path d="M200 420 L230 390 L250 420" fill="none" stroke="#7a3b14" stroke-width="2" opacity="0.4"/>
  <path d="M550 420 L570 390 L590 420" fill="none" stroke="#7a3b14" stroke-width="2" opacity="0.4"/>

  <!-- 熔岩流（顺山坡流下） -->
  <path d="M400 230 Q380 280 370 330 Q360 380 350 430 Q345 460 340 490" fill="none" stroke="#c84a3a" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
  <path d="M400 230 Q380 280 370 330 Q360 380 350 430 Q345 460 340 490" fill="none" stroke="#e07856" stroke-width="6" stroke-linecap="round"/>

  <path d="M400 230 Q420 290 430 350 Q440 410 445 460 Q448 480 450 500" fill="none" stroke="#c84a3a" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <path d="M400 230 Q420 290 430 350 Q440 410 445 460 Q448 480 450 500" fill="none" stroke="#e07856" stroke-width="5" stroke-linecap="round"/>

  <!-- 地面 -->
  <rect x="0" y="500" width="800" height="100" fill="#d4c8a0"/>
  <rect x="0" y="500" width="800" height="100" fill="#8d5a36" opacity="0.15"/>

  <!-- 烟雾 -->
  <g opacity="0.4">
    <ellipse cx="200" cy="300" rx="40" ry="20" fill="#8d5a36"/>
    <ellipse cx="600" cy="310" rx="45" ry="22" fill="#8d5a36"/>
    <ellipse cx="180" cy="350" rx="30" ry="15" fill="#7a3b14"/>
    <ellipse cx="620" cy="360" rx="35" ry="18" fill="#7a3b14"/>
  </g>

  <!-- 标注：地球内部 -->
  <g transform="translate(120, 420)">
    <rect x="-60" y="0" width="120" height="70" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14" font-weight="bold">地下深处</text>
    <text x="0" y="38" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">岩浆库 1000°C+</text>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">寻找裂缝往上冲</text>
  </g>

  <!-- 标注：火山口 -->
  <g transform="translate(680, 250)">
    <rect x="-60" y="0" width="120" height="50" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14" font-weight="bold">火山口</text>
    <text x="0" y="38" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">岩浆喷出地表</text>
  </g>
  <line x1="620" y1="240" x2="450" y2="220" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- 底部标注 -->
  <g transform="translate(400, 575)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">活火山 · 死火山 · 休眠火山——地球在"呼吸"</text>
  </g>
</svg>
