<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="繁星夜空与母亲怀抱的画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">短诗三首</text>
  <text x="400" y="80" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">繁星 · 冰心</text>
  <line x1="220" y1="95" x2="580" y2="95" stroke="#7a3b14" stroke-width="1.5"/>
  <!-- 夜空 -->
  <rect x="0" y="110" width="800" height="280" fill="#2c3e50" opacity="0.18"/>
  <!-- 繁星 -->
  <circle cx="120" cy="160" r="2.5" fill="#7a3b14"/>
  <circle cx="180" cy="200" r="2" fill="#7a3b14"/>
  <circle cx="250" cy="150" r="3" fill="#7a3b14"/>
  <circle cx="320" cy="190" r="2" fill="#7a3b14"/>
  <circle cx="400" cy="140" r="3" fill="#7a3b14"/>
  <circle cx="480" cy="180" r="2" fill="#7a3b14"/>
  <circle cx="560" cy="150" r="3" fill="#7a3b14"/>
  <circle cx="640" cy="200" r="2" fill="#7a3b14"/>
  <circle cx="700" cy="160" r="2.5" fill="#7a3b14"/>
  <circle cx="220" cy="240" r="2" fill="#7a3b14"/>
  <circle cx="360" cy="260" r="2" fill="#7a3b14"/>
  <circle cx="540" cy="250" r="2" fill="#7a3b14"/>
  <circle cx="660" cy="270" r="2" fill="#7a3b14"/>
  <!-- 母亲与孩子 -->
  <ellipse cx="400" cy="440" rx="120" ry="70" fill="#c8553d" opacity="0.4"/>
  <circle cx="330" cy="400" r="30" fill="#f5d9a0"/>
  <path d="M 300 396 q 30 -16 60 0" stroke="#3a3a3a" stroke-width="2" fill="none"/>
  <circle cx="340" cy="470" r="24" fill="#f5d9a0"/>
  <path d="M 320 466 q 20 -12 40 0" stroke="#3a3a3a" stroke-width="1.5" fill="none"/>
  <!-- 母亲手臂环抱 -->
  <path d="M 360 430 q 40 30 80 0" stroke="#a83232" stroke-width="6" fill="none" stroke-linecap="round"/>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14">繁星点点，母亲怀里最安全</text>
</svg>
