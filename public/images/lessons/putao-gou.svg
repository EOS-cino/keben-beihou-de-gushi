<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="葡萄架下挂满了一串串紫红绿色的葡萄，维吾尔族老乡笑着招呼客人">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空 -->
  <rect x="0" y="0" width="800" height="250" fill="#f4b942" opacity="0.1"/>
  <!-- 烈日 -->
  <circle cx="680" cy="80" r="35" fill="#e07856" opacity="0.6"/>
  <g stroke="#e07856" stroke-width="2" opacity="0.4">
    <line x1="680" y1="30" x2="680" y2="15"/>
    <line x1="680" y1="130" x2="680" y2="145"/>
    <line x1="630" y1="80" x2="615" y2="80"/>
    <line x1="730" y1="80" x2="745" y2="80"/>
    <line x1="645" y1="45" x2="635" y2="35"/>
    <line x1="715" y1="45" x2="725" y2="35"/>
  </g>
  <!-- 葡萄架 -->
  <rect x="80" y="180" width="16" height="280" fill="#8d5a36"/>
  <rect x="704" y="180" width="16" height="280" fill="#8d5a36"/>
  <!-- 横梁 -->
  <rect x="80" y="180" width="640" height="16" fill="#8d5a36"/>
  <!-- 葡萄藤叶 -->
  <g fill="#6a8d3f" opacity="0.8">
    <ellipse cx="150" cy="170" rx="35" ry="20"/>
    <ellipse cx="250" cy="165" rx="40" ry="22"/>
    <ellipse cx="350" cy="170" rx="38" ry="20"/>
    <ellipse cx="450" cy="165" rx="40" ry="22"/>
    <ellipse cx="550" cy="170" rx="35" ry="20"/>
    <ellipse cx="650" cy="165" rx="38" ry="22"/>
  </g>
  <g fill="#7ba84a" opacity="0.6">
    <ellipse cx="200" cy="160" rx="25" ry="15"/>
    <ellipse cx="400" cy="155" rx="30" ry="18"/>
    <ellipse cx="600" cy="160" rx="25" ry="15"/>
  </g>
  <!-- 葡萄串 - 紫色 -->
  <g transform="translate(180,210)">
    <g fill="#7a3b8a">
      <circle cx="0" cy="0" r="8"/><circle cx="-10" cy="8" r="8"/><circle cx="10" cy="8" r="8"/>
      <circle cx="-15" cy="18" r="8"/><circle cx="0" cy="18" r="8"/><circle cx="15" cy="18" r="8"/>
      <circle cx="-8" cy="28" r="7"/><circle cx="8" cy="28" r="7"/>
      <circle cx="0" cy="38" r="6"/>
    </g>
    <g fill="#a06bb0" opacity="0.5">
      <circle cx="-2" cy="-2" r="3"/><circle cx="-12" cy="6" r="3"/><circle cx="8" cy="6" r="3"/>
    </g>
  </g>
  <!-- 葡萄串 - 红色 -->
  <g transform="translate(330,210)">
    <g fill="#c84a3a">
      <circle cx="0" cy="0" r="8"/><circle cx="-10" cy="8" r="8"/><circle cx="10" cy="8" r="8"/>
      <circle cx="-15" cy="18" r="8"/><circle cx="0" cy="18" r="8"/><circle cx="15" cy="18" r="8"/>
      <circle cx="-8" cy="28" r="7"/><circle cx="8" cy="28" r="7"/>
    </g>
    <g fill="#e07856" opacity="0.5">
      <circle cx="-2" cy="-2" r="3"/><circle cx="8" cy="6" r="3"/>
    </g>
  </g>
  <!-- 葡萄串 - 绿色 -->
  <g transform="translate(480,210)">
    <g fill="#6a8d3f">
      <circle cx="0" cy="0" r="8"/><circle cx="-10" cy="8" r="8"/><circle cx="10" cy="8" r="8"/>
      <circle cx="-15" cy="18" r="8"/><circle cx="0" cy="18" r="8"/><circle cx="15" cy="18" r="8"/>
      <circle cx="-8" cy="28" r="7"/><circle cx="8" cy="28" r="7"/>
      <circle cx="0" cy="38" r="6"/>
    </g>
    <g fill="#9bc06a" opacity="0.5">
      <circle cx="-2" cy="-2" r="3"/><circle cx="-12" cy="6" r="3"/>
    </g>
  </g>
  <!-- 葡萄串 - 紫红 -->
  <g transform="translate(620,210)">
    <g fill="#8d3a5a">
      <circle cx="0" cy="0" r="8"/><circle cx="-10" cy="8" r="8"/><circle cx="10" cy="8" r="8"/>
      <circle cx="-15" cy="18" r="8"/><circle cx="0" cy="18" r="8"/><circle cx="15" cy="18" r="8"/>
      <circle cx="-8" cy="28" r="7"/><circle cx="8" cy="28" r="7"/>
    </g>
  </g>
  <!-- 地面 -->
  <path d="M0 460 Q200 450 400 460 T800 455 L800 600 L0 600 Z" fill="#c8843a" opacity="0.3"/>
  <!-- 维吾尔族老乡 -->
  <g transform="translate(400,400)">
    <!-- 小花帽 -->
    <path d="M-15 -50 L15 -50 L12 -62 L-12 -62 Z" fill="#7a3b14"/>
    <path d="M-12 -62 Q0 -68 12 -62" fill="#c84a3a"/>
    <!-- 脸 -->
    <circle cx="0" cy="-35" r="18" fill="#f4d4a8"/>
    <!-- 胡子 -->
    <path d="M-8 -25 Q0 -18 8 -25" stroke="#2d2a24" stroke-width="2" fill="none"/>
    <path d="M-5 -20 Q0 -12 5 -20" stroke="#2d2a24" stroke-width="1.5" fill="none"/>
    <!-- 眼睛笑 -->
    <path d="M-8 -38 Q-5 -41 -2 -38" stroke="#2d2a24" stroke-width="1.5" fill="none"/>
    <path d="M2 -38 Q5 -41 8 -38" stroke="#2d2a24" stroke-width="1.5" fill="none"/>
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="28" ry="35" fill="#6a8d3f"/>
    <!-- 手臂招呼 -->
    <path d="M-25 -5 L-45 -20" stroke="#f4d4a8" stroke-width="7" stroke-linecap="round"/>
    <path d="M25 -5 L40 10" stroke="#f4d4a8" stroke-width="7" stroke-linecap="round"/>
    <!-- 手里端葡萄 -->
    <circle cx="40" cy="8" r="6" fill="#7a3b8a"/>
    <circle cx="46" cy="12" r="5" fill="#7a3b8a"/>
    <circle cx="36" cy="14" r="5" fill="#7a3b8a"/>
  </g>
  <!-- 阴房（远处） -->
  <g transform="translate(120,380)" opacity="0.6">
    <rect x="-25" y="-30" width="50" height="50" fill="#8d5a36" opacity="0.5"/>
    <path d="M-30 -30 L0 -50 L30 -30 Z" fill="#7a3b14" opacity="0.5"/>
    <!-- 通风孔 -->
    <g fill="#fef9ed" opacity="0.6">
      <rect x="-18" y="-20" width="6" height="8"/>
      <rect x="-6" y="-20" width="6" height="8"/>
      <rect x="6" y="-20" width="6" height="8"/>
      <rect x="-18" y="-5" width="6" height="8"/>
      <rect x="-6" y="-5" width="6" height="8"/>
      <rect x="6" y="-5" width="6" height="8"/>
    </g>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">葡萄沟</text>
</svg>
