<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="四季最美时刻插画：春黎明、夏夜晚、秋黄昏、冬早晨">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">四季之美</text>
  <line x1="350" y1="52" x2="450" y2="52" stroke="#c8843a" stroke-width="2"/>

  <!-- 四个象限 -->
  <!-- 春·黎明（左上） -->
  <g transform="translate(200, 180)">
    <rect x="-150" y="-90" width="300" height="170" fill="#fce8e8" opacity="0.4" rx="8"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#e07856">春·黎明</text>
    <!-- 黎明天空渐变 -->
    <rect x="-130" y="-55" width="260" height="80" fill="#f8d8c8" opacity="0.5" rx="4"/>
    <rect x="-130" y="-55" width="260" height="30" fill="#e8a8b8" opacity="0.4" rx="4"/>
    <!-- 朝霞 -->
    <ellipse cx="-40" cy="-30" rx="50" ry="12" fill="#e07856" opacity="0.3"/>
    <ellipse cx="30" cy="-35" rx="40" ry="10" fill="#e8a838" opacity="0.3"/>
    <!-- 太阳初升 -->
    <circle cx="-60" cy="-20" r="14" fill="#e8a838" opacity="0.7"/>
    <!-- 彩云 -->
    <path d="M -20 -40 Q 0 -48 20 -40 Q 40 -48 60 -40" fill="none" stroke="#e07856" stroke-width="2" opacity="0.5"/>
    <path d="M -30 -28 Q 0 -36 30 -28" fill="none" stroke="#e8a838" stroke-width="2" opacity="0.4"/>
    <!-- 地平线 -->
    <line x1="-130" y1="25" x2="130" y2="25" stroke="#2d6a4f" stroke-width="2"/>
    <!-- 小草 -->
    <path d="M -100 25 L -100 15" stroke="#2d6a4f" stroke-width="1.5"/>
    <path d="M -90 25 L -90 18" stroke="#2d6a4f" stroke-width="1.5"/>
    <path d="M 80 25 L 80 15" stroke="#2d6a4f" stroke-width="1.5"/>
    <path d="M 90 25 L 90 18" stroke="#2d6a4f" stroke-width="1.5"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">东方渐红，彩云流转</text>
  </g>

  <!-- 夏·夜晚（右上） -->
  <g transform="translate(600, 180)">
    <rect x="-150" y="-90" width="300" height="170" fill="#1a1a3a" opacity="0.12" rx="8"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#4a90b8">夏·夜晚</text>
    <!-- 夜空 -->
    <rect x="-130" y="-55" width="260" height="80" fill="#2a2a5a" opacity="0.15" rx="4"/>
    <!-- 月亮 -->
    <circle cx="-50" cy="-25" r="16" fill="#f0e8c8" opacity="0.8"/>
    <circle cx="-55" cy="-28" r="3" fill="#e0d8b8" opacity="0.5"/>
    <!-- 星星 -->
    <circle cx="20" cy="-40" r="1.5" fill="#e8a838"/>
    <circle cx="50" cy="-30" r="1" fill="#e8a838"/>
    <circle cx="80" cy="-45" r="1.5" fill="#e8a838"/>
    <circle cx="100" cy="-25" r="1" fill="#e8a838"/>
    <!-- 萤火虫 -->
    <circle cx="0" cy="10" r="3" fill="#e8a838" opacity="0.8"/>
    <circle cx="0" cy="10" r="6" fill="#e8a838" opacity="0.2"/>
    <circle cx="40" cy="0" r="2.5" fill="#e8a838" opacity="0.7"/>
    <circle cx="40" cy="0" r="5" fill="#e8a838" opacity="0.15"/>
    <circle cx="-30" cy="5" r="2" fill="#e8a838" opacity="0.6"/>
    <circle cx="-30" cy="5" r="4" fill="#e8a838" opacity="0.12"/>
    <circle cx="70" cy="8" r="2" fill="#e8a838" opacity="0.6"/>
    <!-- 草丛 -->
    <path d="M -130 25 Q -100 15 -80 25 Q -50 15 -20 25 Q 10 15 40 25 Q 70 15 100 25 Q 120 18 130 25" fill="none" stroke="#2d6a4f" stroke-width="2"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">萤火虫一闪一闪，如星如灯</text>
  </g>

  <!-- 秋·黄昏（左下） -->
  <g transform="translate(200, 420)">
    <rect x="-150" y="-90" width="300" height="170" fill="#f8e0c8" opacity="0.4" rx="8"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#e8a838">秋·黄昏</text>
    <!-- 黄昏天空 -->
    <rect x="-130" y="-55" width="260" height="80" fill="#f0c898" opacity="0.4" rx="4"/>
    <rect x="-130" y="-55" width="260" height="25" fill="#e07856" opacity="0.2" rx="4"/>
    <!-- 夕阳 -->
    <circle cx="50" cy="-15" r="18" fill="#e07856" opacity="0.6"/>
    <!-- 远山 -->
    <path d="M -130 25 L -80 0 L -40 15 L 0 -5 L 50 10 L 100 -5 L 130 25 Z" fill="#8d5a36" opacity="0.4"/>
    <!-- 归鸦 -->
    <g transform="translate(-60, -35)">
      <path d="M -6 0 Q -3 -4 0 -2 Q 3 -4 6 0" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
    </g>
    <g transform="translate(-40, -42)">
      <path d="M -5 0 Q -2.5 -3 0 -1.5 Q 2.5 -3 5 0" fill="none" stroke="#3a3a3a" stroke-width="1.2"/>
    </g>
    <!-- 大雁人字形 -->
    <g transform="translate(20, -40)">
      <path d="M -8 0 Q -4 -3 0 0 Q 4 -3 8 0" fill="none" stroke="#3a3a3a" stroke-width="1.2"/>
    </g>
    <g transform="translate(0, -35)">
      <path d="M -6 0 Q -3 -2 0 0 Q 3 -2 6 0" fill="none" stroke="#3a3a3a" stroke-width="1"/>
    </g>
    <g transform="translate(40, -35)">
      <path d="M -6 0 Q -3 -2 0 0 Q 3 -2 6 0" fill="none" stroke="#3a3a3a" stroke-width="1"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">夕阳染山，归鸦点点</text>
  </g>

  <!-- 冬·早晨（右下） -->
  <g transform="translate(600, 420)">
    <rect x="-150" y="-90" width="300" height="170" fill="#e8e8f0" opacity="0.4" rx="8"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#4a90b8">冬·早晨</text>
    <!-- 雪地 -->
    <rect x="-130" y="-55" width="260" height="80" fill="#f0f0f8" opacity="0.5" rx="4"/>
    <!-- 雪花 -->
    <circle cx="-80" cy="-40" r="2" fill="#fff" stroke="#4a90b8" stroke-width="0.8"/>
    <circle cx="-40" cy="-35" r="1.5" fill="#fff" stroke="#4a90b8" stroke-width="0.8"/>
    <circle cx="0" cy="-42" r="2" fill="#fff" stroke="#4a90b8" stroke-width="0.8"/>
    <circle cx="40" cy="-38" r="1.5" fill="#fff" stroke="#4a90b8" stroke-width="0.8"/>
    <circle cx="80" cy="-40" r="2" fill="#fff" stroke="#4a90b8" stroke-width="0.8"/>
    <!-- 炭火盆 -->
    <g transform="translate(0, 5)">
      <ellipse cx="0" cy="10" rx="30" ry="8" fill="#5a4a2a" stroke="#7a3b14" stroke-width="1.5"/>
      <ellipse cx="0" cy="6" rx="28" ry="6" fill="#3a2a1a"/>
      <!-- 炭火 -->
      <circle cx="-10" cy="5" r="4" fill="#e07856" opacity="0.7"/>
      <circle cx="0" cy="4" r="5" fill="#e8a838" opacity="0.6"/>
      <circle cx="10" cy="5" r="4" fill="#e07856" opacity="0.5"/>
      <!-- 白灰 -->
      <ellipse cx="-8" cy="2" rx="5" ry="2" fill="#e8e8e0" opacity="0.6"/>
      <ellipse cx="8" cy="3" rx="4" ry="1.5" fill="#e8e8e0" opacity="0.5"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">雪落无声，炭火渐白</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="580" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">春黎明·夏夜晚·秋黄昏·冬早晨——每个季节都有最美的时刻</text>
</svg>
