<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="三首春景古诗意境插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#2D2A24">古诗三首·春</text>
  <text x="400" y="70" text-anchor="middle" font-family="serif" font-size="13" fill="#7A7468">绝句 · 惠崇春江晚景 · 三衢道中</text>
  <line x1="300" y1="82" x2="500" y2="82" stroke="#C05A30" stroke-width="2"/>

  <!-- 绝句 -->
  <g transform="translate(150,320)">
    <rect x="-115" y="-140" width="230" height="280" rx="10" fill="#F5F0E8" stroke="#3A7D5C" stroke-width="2"/>
    <text x="0" y="-114" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#3A7D5C">绝句</text>
    <!-- willow -->
    <rect x="-50" y="-20" width="6" height="80" fill="#7A7468"/>
    <path d="M-47,-20 Q-60,0 -55,30 M-47,-20 Q-34,0 -39,30 M-47,-16 Q-52,10 -48,40" stroke="#3A7D5C" stroke-width="2" fill="none"/>
    <!-- two orioles -->
    <ellipse cx="-44" cy="-30" rx="7" ry="5" fill="#E8C95A" stroke="#2D2A24" stroke-width="1"/>
    <ellipse cx="-30" cy="-38" rx="7" ry="5" fill="#E8C95A" stroke="#2D2A24" stroke-width="1"/>
    <!-- egrets flying -->
    <g transform="translate(30,-50)" fill="none" stroke="#2D2A24" stroke-width="1.5">
      <path d="M0,0 L6,-4 L12,0 M12,0 L18,-4 L24,0"/>
    </g>
    <g transform="translate(30,-30)" fill="none" stroke="#2D2A24" stroke-width="1.5">
      <path d="M0,0 L6,-4 L12,0 M12,0 L18,-4 L24,0"/>
    </g>
    <!-- snow mountain -->
    <path d="M-90,80 L-40,20 L0,80 Z" fill="#F5F0E8" stroke="#2D2A24" stroke-width="1.5"/>
    <path d="M-55,40 L-40,20 L-25,40 Z" fill="#fef9ed"/>
    <text x="0" y="110" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">两个黄鹂鸣翠柳</text>
  </g>

  <!-- 惠崇春江晚景 -->
  <g transform="translate(400,320)">
    <rect x="-115" y="-140" width="230" height="280" rx="10" fill="#F5F0E8" stroke="#C05A30" stroke-width="2"/>
    <text x="0" y="-114" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#C05A30">惠崇春江晚景</text>
    <!-- water -->
    <path d="M-90,40 Q-45,30 0,40 T90,40" fill="none" stroke="#3A7D5C" stroke-width="2"/>
    <path d="M-90,55 Q-45,45 0,55 T90,55" fill="none" stroke="#3A7D5C" stroke-width="2" opacity="0.6"/>
    <!-- duck -->
    <g transform="translate(-20,30)">
      <ellipse cx="0" cy="0" rx="16" ry="9" fill="#fef9ed" stroke="#2D2A24" stroke-width="1.5"/>
      <circle cx="14" cy="-4" r="7" fill="#fef9ed" stroke="#2D2A24" stroke-width="1.5"/>
      <path d="M20,-4 L26,-2 L20,0 Z" fill="#E8C95A" stroke="#2D2A24" stroke-width="1"/>
    </g>
    <g transform="translate(30,42)">
      <ellipse cx="0" cy="0" rx="14" ry="8" fill="#fef9ed" stroke="#2D2A24" stroke-width="1.5"/>
      <circle cx="12" cy="-3" r="6" fill="#fef9ed" stroke="#2D2A24" stroke-width="1.5"/>
    </g>
    <!-- bamboo + peach -->
    <rect x="-70" y="-40" width="4" height="60" fill="#3A7D5C"/>
    <circle cx="-78" cy="-30" r="5" fill="#3A7D5C"/>
    <circle cx="-64" cy="-20" r="5" fill="#3A7D5C"/>
    <g fill="#C05A30">
      <circle cx="40" cy="-20" r="6"/><circle cx="52" cy="-12" r="5"/><circle cx="34" cy="-8" r="5"/>
    </g>
    <text x="0" y="110" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">春江水暖鸭先知</text>
  </g>

  <!-- 三衢道中 -->
  <g transform="translate(650,320)">
    <rect x="-115" y="-140" width="230" height="280" rx="10" fill="#F5F0E8" stroke="#7A7468" stroke-width="2"/>
    <text x="0" y="-114" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7A7468">三衢道中</text>
    <!-- green shade trees -->
    <circle cx="-50" cy="0" r="22" fill="#3A7D5C"/>
    <circle cx="-20" cy="-10" r="24" fill="#3A7D5C"/>
    <circle cx="20" cy="-5" r="22" fill="#3A7D5C"/>
    <circle cx="50" cy="5" r="20" fill="#3A7D5C"/>
    <rect x="-52" y="20" width="6" height="40" fill="#7A7468"/>
    <rect x="18" y="15" width="6" height="45" fill="#7A7468"/>
    <!-- path -->
    <path d="M-80,80 Q-20,60 20,75 Q60,90 80,70" fill="none" stroke="#E0D9CE" stroke-width="5"/>
    <!-- oriole -->
    <ellipse cx="20" cy="-35" rx="6" ry="4" fill="#E8C95A" stroke="#2D2A24" stroke-width="1"/>
    <text x="0" y="110" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">绿阴不减来时路</text>
  </g>
</svg>
