<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="孩子仰望满天星斗的科学插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 夜空 -->
  <rect x="0" y="0" width="800" height="480" fill="#1a2a4a" opacity="0.88"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#fef9ed">星空下</text>
  <line x1="370" y1="60" x2="430" y2="60" stroke="#e8a838" stroke-width="2"/>

  <!-- 满天星斗 -->
  <g fill="#fef9ed">
    <circle cx="80" cy="100" r="1.5"/>
    <circle cx="140" cy="80" r="2"/>
    <circle cx="210" cy="120" r="1.2"/>
    <circle cx="270" cy="90" r="1.8"/>
    <circle cx="330" cy="130" r="1"/>
    <circle cx="390" cy="100" r="2.2"/>
    <circle cx="460" cy="140" r="1.3"/>
    <circle cx="520" cy="90" r="1.6"/>
    <circle cx="580" cy="120" r="1.2"/>
    <circle cx="640" cy="100" r="2"/>
    <circle cx="700" cy="140" r="1.4"/>
    <circle cx="740" cy="90" r="1.2"/>
    <circle cx="100" cy="180" r="1.5"/>
    <circle cx="180" cy="200" r="1.2"/>
    <circle cx="250" cy="170" r="1.8"/>
    <circle cx="350" cy="210" r="1"/>
    <circle cx="430" cy="180" r="1.5"/>
    <circle cx="510" cy="220" r="1.3"/>
    <circle cx="590" cy="190" r="1.6"/>
    <circle cx="670" cy="210" r="1.2"/>
    <circle cx="720" cy="180" r="1.4"/>
    <circle cx="60" cy="260" r="1.2"/>
    <circle cx="130" cy="290" r="1.5"/>
    <circle cx="200" cy="270" r="1"/>
    <circle cx="290" cy="300" r="1.3"/>
    <circle cx="380" cy="280" r="1.6"/>
    <circle cx="470" cy="300" r="1.2"/>
    <circle cx="560" cy="270" r="1.4"/>
    <circle cx="640" cy="300" r="1"/>
    <circle cx="710" cy="280" r="1.5"/>
  </g>

  <!-- 亮星（带光晕） -->
  <g>
    <circle cx="160" cy="250" r="3" fill="#fef9ed"/>
    <circle cx="160" cy="250" r="8" fill="none" stroke="#fef9ed" stroke-width="0.6" opacity="0.5"/>
    <circle cx="600" cy="160" r="3.5" fill="#e8a838"/>
    <circle cx="600" cy="160" r="9" fill="none" stroke="#e8a838" stroke-width="0.6" opacity="0.5"/>
    <circle cx="450" cy="240" r="3" fill="#fef9ed"/>
    <circle cx="450" cy="240" r="8" fill="none" stroke="#fef9ed" stroke-width="0.6" opacity="0.5"/>
    <circle cx="300" cy="350" r="2.5" fill="#e07856"/>
    <circle cx="300" cy="350" r="7" fill="none" stroke="#e07856" stroke-width="0.6" opacity="0.5"/>
  </g>

  <!-- 北斗七星（连线） -->
  <g>
    <line x1="180" y1="320" x2="240" y2="340" stroke="#e8a838" stroke-width="1.2" opacity="0.6"/>
    <line x1="240" y1="340" x2="290" y2="335" stroke="#e8a838" stroke-width="1.2" opacity="0.6"/>
    <line x1="290" y1="335" x2="330" y2="360" stroke="#e8a838" stroke-width="1.2" opacity="0.6"/>
    <line x1="330" y1="360" x2="370" y2="380" stroke="#e8a838" stroke-width="1.2" opacity="0.6"/>
    <line x1="370" y1="380" x2="390" y2="420" stroke="#e8a838" stroke-width="1.2" opacity="0.6"/>
    <line x1="390" y1="420" x2="350" y2="440" stroke="#e8a838" stroke-width="1.2" opacity="0.6"/>
    <g fill="#e8a838">
      <circle cx="180" cy="320" r="2.5"/>
      <circle cx="240" cy="340" r="2.5"/>
      <circle cx="290" cy="335" r="2.5"/>
      <circle cx="330" cy="360" r="2.5"/>
      <circle cx="370" cy="380" r="2.5"/>
      <circle cx="390" cy="420" r="2.5"/>
      <circle cx="350" cy="440" r="2.5"/>
    </g>
  </g>
  <!-- 北极星 -->
  <line x1="240" y1="340" x2="290" y2="335" stroke="none"/>
  <line x1="240" y1="340" x2="290" y2="335"/>
  <line x1="290" y1="335" x2="340" y2="330" stroke="#e07856" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
  <circle cx="340" cy="330" r="3.5" fill="#e07856"/>
  <circle cx="340" cy="330" r="8" fill="none" stroke="#e07856" stroke-width="0.6" opacity="0.5"/>

  <!-- 地平线山影 -->
  <path d="M0 480 L160 440 L320 470 L480 430 L640 465 L800 445 L800 600 L0 600 Z" fill="#2d4a3a"/>
  <rect x="0" y="480" width="800" height="120" fill="#1a3a2a" opacity="0.5"/>

  <!-- 仰望的孩子 -->
  <g transform="translate(560 540)">
    <!-- 凉席 -->
    <ellipse cx="0" cy="30" rx="50" ry="8" fill="#a88a5a" opacity="0.6"/>
    <line x1="-40" y1="30" x2="40" y2="30" stroke="#7a6a4a" stroke-width="0.8"/>
    <!-- 仰躺身体 -->
    <path d="M-30 25 Q-34 5 -20 -5 Q0 -10 20 -5 Q34 5 30 25 Z" fill="#4a90b8"/>
    <!-- 头（仰着） -->
    <circle cx="-26" cy="-12" r="13" fill="#f4d4a8"/>
    <path d="M-38 -16 Q-26 -28 -14 -16 L-14 -10 Q-26 -6 -38 -10 Z" fill="#3a3a3a"/>
    <!-- 眼睛（向上看） -->
    <circle cx="-30" cy="-14" r="1.5" fill="#2a2a2a"/>
    <circle cx="-22" cy="-14" r="1.5" fill="#2a2a2a"/>
    <!-- 手指（指向北斗） -->
    <path d="M30 5 Q60 -10 80 -30" fill="none" stroke="#4a90b8" stroke-width="6" stroke-linecap="round"/>
    <circle cx="82" cy="-32" r="4" fill="#f4d4a8"/>
  </g>

  <!-- 爷爷（旁边） -->
  <g transform="translate(220 530)">
    <path d="M-18 20 Q-20 0 -12 -10 Q0 -14 12 -10 Q20 0 18 20 Z" fill="#2d6a4f"/>
    <circle cx="0" cy="-24" r="12" fill="#f4d4a8"/>
    <path d="M-12 -28 Q0 -38 12 -28 L12 -22 Q0 -18 -12 -22 Z" fill="#e8e8e8"/>
    <path d="M-5 -24 Q0 -22 5 -24" fill="none" stroke="#2a2a2a" stroke-width="1.3"/>
    <path d="M-4 -18 Q0 -16 4 -18" fill="none" stroke="#8a4a3a" stroke-width="1.2"/>
    <!-- 蒲扇 -->
    <path d="M14 -14 Q30 -20 34 -8 Q30 0 14 -6 Z" fill="#e8a838" stroke="#8a5a14" stroke-width="1"/>
  </g>

  <!-- 标注：北斗七星 -->
  <line x1="285" y1="380" x2="285" y2="430" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="220" y="432" width="130" height="26" fill="#1a2a4a" stroke="#e8a838" rx="4"/>
  <text x="285" y="450" text-anchor="middle" font-family="serif" font-size="13" fill="#e8a838">北斗七星——认路的勺子</text>

  <!-- 标注：北极星 -->
  <line x1="340" y1="332" x2="450" y2="300" stroke="#e07856" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="440" y="282" width="110" height="26" fill="#1a2a4a" stroke="#e07856" rx="4"/>
  <text x="495" y="300" text-anchor="middle" font-family="serif" font-size="13" fill="#e07856">北极星——指方向</text>

  <!-- 底部说明 -->
  <rect x="80" y="558" width="640" height="32" fill="#fef9ed" stroke="#e8a838" stroke-width="1" rx="6" opacity="0.92"/>
  <text x="400" y="578" text-anchor="middle" font-family="serif" font-size="14" fill="#8a5a14">仰望星空，看到的星光，是光走了亿万年才到我们眼里</text>
</svg>
