<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="纪昌盯针眼练射箭的古代画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">纪昌学射</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#7a3b14" stroke-width="2"/>
  <!-- 织布机梭子（上方） -->
  <rect x="120" y="130" width="560" height="14" fill="#8a6d3b" opacity="0.5"/>
  <ellipse cx="400" cy="137" rx="40" ry="10" fill="#5d4037"/>
  <line x1="400" y1="127" x2="400" y2="147" stroke="#3a3a3a" stroke-width="2"/>
  <!-- 纪昌躺卧盯视 -->
  <ellipse cx="400" cy="320" rx="180" ry="40" fill="#3a7d44" opacity="0.4"/>
  <circle cx="400" cy="280" r="34" fill="#f5d9a0"/>
  <path d="M 374 274 q 26 -14 52 0" stroke="#3a3a3a" stroke-width="2" fill="none"/>
  <!-- 大眼睛（盯视） -->
  <ellipse cx="388" cy="282" rx="10" ry="12" fill="#ffffff" stroke="#3a3a3a" stroke-width="2"/>
  <ellipse cx="412" cy="282" rx="10" ry="12" fill="#ffffff" stroke="#3a3a3a" stroke-width="2"/>
  <circle cx="388" cy="284" r="4" fill="#3a3a3a"/>
  <circle cx="412" cy="284" r="4" fill="#3a3a3a"/>
  <!-- 视线虚线指向梭子 -->
  <line x1="400" y1="270" x2="400" y2="160" stroke="#c8553d" stroke-width="1.5" stroke-dasharray="6,5"/>
  <!-- 弓箭（右侧） -->
  <path d="M 640 200 q 60 80 0 160" stroke="#5d4037" stroke-width="5" fill="none"/>
  <line x1="640" y1="200" x2="640" y2="360" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="630" y1="280" x2="720" y2="280" stroke="#7a3b14" stroke-width="2"/>
  <polygon points="720,280 712,274 712,286" fill="#7a3b14"/>
  <!-- 虱子放大图 -->
  <circle cx="240" cy="180" r="22" fill="none" stroke="#7a3b14" stroke-width="2" stroke-dasharray="3,3"/>
  <circle cx="240" cy="180" r="6" fill="#3a3a3a"/>
  <line x1="218" y1="180" x2="200" y2="180" stroke="#7a3b14" stroke-width="1.5"/>
  <line x1="262" y1="180" x2="280" y2="180" stroke="#7a3b14" stroke-width="1.5"/>
  <text x="240" y="155" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">虱→车轮</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14">练眼五年，方成神射手</text>
</svg>
