<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="浩瀚宇宙中地球与其他星球探索生命的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#4a90b8">宇宙生命之谜</text>
  <line x1="320" y1="56" x2="480" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 宇宙背景 -->
  <rect x="0" y="72" width="800" height="420" fill="#1a1a3a" opacity="0.08" rx="8"/>
  <!-- 星星 -->
  <circle cx="80" cy="100" r="1.5" fill="#e8a838"/>
  <circle cx="150" cy="130" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="250" cy="90" r="1.5" fill="#e8a838"/>
  <circle cx="350" cy="110" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="500" cy="95" r="1.5" fill="#e8a838"/>
  <circle cx="600" cy="120" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="700" cy="100" r="1.5" fill="#e8a838"/>
  <circle cx="100" cy="200" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="730" cy="180" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="50" cy="300" r="1.5" fill="#e8a838" opacity="0.6"/>
  <circle cx="750" cy="350" r="1" fill="#fff" opacity="0.4"/>

  <!-- 左侧：地球（有生命） -->
  <g transform="translate(180, 280)">
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#2d6a4f">地球·已知唯一</text>
    <!-- 地球 -->
    <circle cx="0" cy="0" r="55" fill="#4a90b8" stroke="#2a6080" stroke-width="2"/>
    <!-- 大陆 -->
    <path d="M -30 -20 Q -15 -30 0 -25 Q 10 -15 5 0 Q -10 5 -25 -5 Z" fill="#2d6a4f" opacity="0.8"/>
    <path d="M 10 10 Q 25 5 30 20 Q 20 30 10 25 Z" fill="#2d6a4f" opacity="0.7"/>
    <path d="M -20 25 Q -10 20 -5 30 Q -15 35 -25 30 Z" fill="#2d6a4f" opacity="0.6"/>
    <!-- 大气层光晕 -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#4a90b8" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="65" fill="none" stroke="#4a90b8" stroke-width="1" opacity="0.15"/>
    <!-- 生命标志 -->
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="13" fill="#2d6a4f">有水·有大气·有生命</text>
  </g>

  <!-- 中间：火星（探索中） -->
  <g transform="translate(400, 280)">
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#e07856">火星·探索中</text>
    <!-- 火星 -->
    <circle cx="0" cy="0" r="45" fill="#e07856" stroke="#a05030" stroke-width="2" opacity="0.8"/>
    <!-- 表面纹理 -->
    <ellipse cx="-15" cy="-10" rx="12" ry="6" fill="#c06840" opacity="0.5"/>
    <ellipse cx="10" cy="15" rx="15" ry="8" fill="#c06840" opacity="0.4"/>
    <ellipse cx="-5" cy="20" rx="8" ry="4" fill="#a05030" opacity="0.5"/>
    <!-- 探测器 -->
    <g transform="translate(30, -25)">
      <rect x="-5" y="-3" width="10" height="6" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
      <line x1="-8" y1="0" x2="-5" y2="0" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="5" y1="0" x2="8" y2="0" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="1.5" fill="#2a2a2a"/>
    </g>
    <!-- 问号 -->
    <text x="0" y="10" text-anchor="middle" font-family="serif" font-size="30" fill="#fff" opacity="0.5">?</text>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="13" fill="#e07856">曾有水·尚未发现生命</text>
  </g>

  <!-- 右侧：遥远星系（未知） -->
  <g transform="translate(620, 280)">
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#4a90b8">遥远星系·未知</text>
    <!-- 适居带行星 -->
    <circle cx="0" cy="0" r="35" fill="#4a90b8" stroke="#2a6080" stroke-width="2" opacity="0.5" stroke-dasharray="4,3"/>
    <!-- 恒星 -->
    <circle cx="-50" cy="-30" r="12" fill="#e8a838" opacity="0.8"/>
    <circle cx="-50" cy="-30" r="20" fill="#e8a838" opacity="0.15"/>
    <!-- 适居带圈 -->
    <ellipse cx="-50" cy="-30" rx="55" ry="40" fill="none" stroke="#2d6a4f" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
    <text x="-50" y="25" text-anchor="middle" font-family="serif" font-size="10" fill="#2d6a4f">适居带</text>
    <!-- 问号 -->
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="28" fill="#4a90b8" opacity="0.5">?</text>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="13" fill="#4a90b8">有候选者·太远无法到达</text>
  </g>

  <!-- 底部：生命存在条件 -->
  <g transform="translate(400, 460)">
    <rect x="-320" y="0" width="640" height="55" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">生命存在的条件：适宜的温度 · 液态水 · 大气层 · 能量来源</text>
    <text x="0" y="44" text-anchor="middle" font-family="serif" font-size="13" fill="#c8843a">宇宙有上千亿个星系，地球只是沧海一粟——我们孤独吗？</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="14" fill="#4a90b8">浩瀚宇宙中，地球是已知唯一有生命的星球——探索才刚刚开始</text>
</svg>
