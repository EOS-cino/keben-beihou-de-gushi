<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="安静的池子和奔腾的河流对比插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">池子与河流</text>
  <line x1="290" y1="62" x2="510" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="70" width="800" height="200" fill="#e8f0f8" opacity="0.3"/>

  <!-- 远山 -->
  <path d="M0 250 L100 180 L200 220 L320 160 L440 210 L560 170 L680 210 L800 180 L800 280 L0 280 Z" fill="#c8dcc8" opacity="0.4"/>

  <!-- 左侧：池子（安静、干涸） -->
  <g transform="translate(200, 0)">
    <!-- 池子轮廓 -->
    <ellipse cx="0" cy="420" rx="130" ry="50" fill="#8a7a5a" opacity="0.3"/>
    <ellipse cx="0" cy="415" rx="120" ry="42" fill="#a89878" opacity="0.4"/>
    <!-- 少量的水（快干了） -->
    <ellipse cx="0" cy="425" rx="80" ry="20" fill="#7ab8a8" opacity="0.3"/>
    <!-- 青苔 -->
    <ellipse cx="-40" cy="410" rx="20" ry="8" fill="#2d6a4f" opacity="0.4"/>
    <ellipse cx="30" cy="415" rx="25" ry="10" fill="#2d6a4f" opacity="0.4"/>
    <ellipse cx="-10" cy="430" rx="15" ry="6" fill="#3d8a5f" opacity="0.3"/>
    <!-- 草 -->
    <path d="M-90 400 L-92 380 L-88 380" fill="none" stroke="#2d6a4f" stroke-width="2"/>
    <path d="M-85 405 L-87 385 L-83 385" fill="none" stroke="#2d6a4f" stroke-width="2"/>
    <path d="M85 400 L83 380 L87 380" fill="none" stroke="#2d6a4f" stroke-width="2"/>
    <path d="M75 405 L73 385 L77 385" fill="none" stroke="#2d6a4f" stroke-width="2"/>

    <!-- 池子的"脸"（拟人） -->
    <g transform="translate(0, 380)">
      <ellipse cx="-15" cy="0" rx="4" ry="3" fill="#7a3b14" opacity="0.5"/>
      <ellipse cx="15" cy="0" rx="4" ry="3" fill="#7a3b14" opacity="0.5"/>
      <path d="M-8 10 Q0 6 8 10" fill="none" stroke="#7a3b14" stroke-width="1.5" opacity="0.5"/>
    </g>

    <!-- 标注 -->
    <text x="0" y="320" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">池子</text>
    <text x="0" y="340" text-anchor="middle" font-family="serif" font-size="12" fill="#8a7a5a">安逸→干涸</text>
  </g>

  <!-- 中间分隔 -->
  <path d="M400 280 L400 500" fill="none" stroke="#c8843a" stroke-width="2" stroke-dasharray="8,5" opacity="0.3"/>

  <!-- 右侧：河流（奔腾、清澈） -->
  <g transform="translate(600, 0)">
    <!-- 河流 -->
    <path d="M-120 280 Q-100 350 -80 380 Q-50 420 0 440 Q50 460 100 430 Q130 410 140 380" fill="none" stroke="#4a90b8" stroke-width="50" stroke-linecap="round" opacity="0.6"/>
    <path d="M-120 280 Q-100 350 -80 380 Q-50 420 0 440 Q50 460 100 430 Q130 410 140 380" fill="none" stroke="#7ab8d8" stroke-width="40" stroke-linecap="round" opacity="0.5"/>
    <!-- 水波纹 -->
    <path d="M-100 320 Q-80 315 -60 320 Q-40 325 -20 320" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <path d="M-40 380 Q-20 375 0 380 Q20 385 40 380" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <path d="M20 430 Q40 425 60 430 Q80 435 100 430" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <!-- 水花 -->
    <circle cx="-80" cy="310" r="3" fill="#ffffff" opacity="0.7"/>
    <circle cx="-60" cy="305" r="2" fill="#ffffff" opacity="0.6"/>
    <circle cx="50" cy="420" r="3" fill="#ffffff" opacity="0.7"/>
    <circle cx="70" cy="415" r="2" fill="#ffffff" opacity="0.6"/>

    <!-- 小船 -->
    <g transform="translate(-30, 370)">
      <path d="M-15 5 L-12 -5 L12 -5 L15 5 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
      <rect x="-1" y="-15" width="2" height="12" fill="#5a3a1a"/>
      <path d="M1 -15 L10 -8 L1 -5" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    </g>

    <!-- 河流的"脸"（拟人） -->
    <g transform="translate(30, 400)">
      <ellipse cx="-8" cy="0" rx="3" ry="2.5" fill="#ffffff" opacity="0.8"/>
      <ellipse cx="8" cy="0" rx="3" ry="2.5" fill="#ffffff" opacity="0.8"/>
      <path d="M-5 6 Q0 10 5 6" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    </g>

    <!-- 标注 -->
    <text x="0" y="280" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#2d6a4f">河流</text>
    <text x="0" y="300" text-anchor="middle" font-family="serif" font-size="12" fill="#4a90b8">奋斗→长青</text>
  </g>

  <!-- 对话气泡：池子 -->
  <g transform="translate(120, 200)">
    <path d="M0 0 Q0 -15 15 -15 L100 -15 Q115 -15 115 0 L115 20 Q115 35 100 35 L40 35 L25 48 L30 35 L15 35 Q0 35 0 20 Z" fill="#fff6df" stroke="#c8843a" stroke-width="2"/>
    <text x="57" y="5" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">你太累了，</text>
    <text x="57" y="22" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">歇歇吧！</text>
  </g>

  <!-- 对话气泡：河流 -->
  <g transform="translate(560, 200)">
    <path d="M0 0 Q0 -15 15 -15 L100 -15 Q115 -15 115 0 L115 20 Q115 35 100 35 L40 35 L25 48 L30 35 L15 35 Q0 35 0 20 Z" fill="#fff6df" stroke="#c8843a" stroke-width="2"/>
    <text x="57" y="5" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">流动才能</text>
    <text x="57" y="22" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">保持清澈！</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">池子贪图安逸最终干涸，河流不断奔流永远清澈——选择不同，结果不同</text>
</svg>
