<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="未来城市与人工智能插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">未来的世界</text>
  <line x1="310" y1="62" x2="490" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="70" width="800" height="250" fill="#a8d0e8" opacity="0.25"/>
  <!-- 太阳/能源 -->
  <circle cx="120" cy="130" r="25" fill="#e07856" opacity="0.5"/>

  <!-- 未来城市天际线 -->
  <g transform="translate(0, 320)">
    <!-- 摩天楼群 -->
    <rect x="50" y="-120" width="40" height="120" fill="#8d5a36" opacity="0.5" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="100" y="-160" width="35" height="160" fill="#7ab8d8" opacity="0.4" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="145" y="-100" width="30" height="100" fill="#8d5a36" opacity="0.5" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 高楼窗户灯 -->
    <g fill="#e07856" opacity="0.7">
      <rect x="58" y="-110" width="4" height="4"/>
      <rect x="68" y="-95" width="4" height="4"/>
      <rect x="58" y="-80" width="4" height="4"/>
      <rect x="108" y="-145" width="4" height="4"/>
      <rect x="118" y="-130" width="4" height="4"/>
      <rect x="108" y="-110" width="4" height="4"/>
    </g>
    <!-- 太空塔 -->
    <rect x="600" y="-180" width="30" height="180" fill="#c8843a" opacity="0.4" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="615" cy="-185" r="8" fill="#e07856" opacity="0.7"/>
    <rect x="640" y="-130" width="35" height="130" fill="#7ab8d8" opacity="0.4" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="685" y="-100" width="30" height="100" fill="#8d5a36" opacity="0.5" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 飞行汽车 -->
  <g transform="translate(300, 180)">
    <ellipse cx="0" cy="0" rx="30" ry="12" fill="#7ab8d8" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-12" y="-14" width="24" height="12" rx="4" fill="#a8d0e8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 光束 -->
    <ellipse cx="-18" cy="14" rx="5" ry="3" fill="#e07856" opacity="0.6"/>
    <ellipse cx="18" cy="14" rx="5" ry="3" fill="#e07856" opacity="0.6"/>
    <!-- 速度线 -->
    <line x1="-35" y1="-3" x2="-50" y2="-3" stroke="#c8843a" stroke-width="1.5" opacity="0.5"/>
    <line x1="-35" y1="5" x2="-48" y2="5" stroke="#c8843a" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- 月球（右上） -->
  <g transform="translate(700, 120)">
    <circle cx="0" cy="0" r="22" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5" opacity="0.8"/>
    <circle cx="-5" cy="-3" r="4" fill="#d8c9a8" opacity="0.5"/>
    <circle cx="6" cy="5" r="3" fill="#d8c9a8" opacity="0.5"/>
    <!-- 火箭飞向月球 -->
    <g transform="translate(-40, 20)">
      <path d="M0 8 L0 0 Q0 -8 5 -8 Q10 -8 10 0 L10 8 Z" fill="#fef9ed" stroke="#7a3b14" stroke-width="1"/>
      <path d="M0 6 L-4 10 L0 8 M10 6 L14 10 L10 8" fill="#c84a3a"/>
      <path d="M3 8 Q5 14 5 8 M7 8 Q5 14 5 8" fill="#e07856"/>
    </g>
  </g>

  <!-- 地面 -->
  <rect x="0" y="380" width="800" height="220" fill="#d8c9a8"/>

  <!-- 机器人管家（左下） -->
  <g transform="translate(160, 420)">
    <!-- 头 -->
    <rect x="-18" y="-50" width="36" height="30" rx="6" fill="#fef9ed" stroke="#7a3b14" stroke-width="2"/>
    <!-- 眼睛（屏幕） -->
    <rect x="-12" y="-42" width="24" height="14" rx="2" fill="#1a2a4a"/>
    <circle cx="-5" cy="-35" r="3" fill="#7ab8d8"/>
    <circle cx="5" cy="-35" r="3" fill="#7ab8d8"/>
    <!-- 天线 -->
    <line x1="0" y1="-50" x2="0" y2="-58" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="0" cy="-60" r="3" fill="#e07856"/>
    <!-- 身体 -->
    <rect x="-22" y="-20" width="44" height="50" rx="6" fill="#fef9ed" stroke="#7a3b14" stroke-width="2"/>
    <!-- 胸前屏幕 -->
    <rect x="-10" y="-10" width="20" height="14" rx="2" fill="#a8d0e8" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-7" y1="-6" x2="7" y2="-6" stroke="#7ab8d8" stroke-width="1"/>
    <line x1="-7" y1="-2" x2="4" y2="-2" stroke="#7ab8d8" stroke-width="1"/>
    <!-- 手臂 -->
    <rect x="-32" y="-15" width="8" height="30" rx="3" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="24" y="-15" width="8" height="30" rx="3" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 托盘（早餐） -->
    <rect x="28" y="10" width="30" height="4" fill="#8d5a36"/>
    <circle cx="35" cy="6" r="4" fill="#e07856"/>
    <ellipse cx="48" cy="7" rx="5" ry="3" fill="#fef9ed"/>
    <!-- 腿 -->
    <rect x="-14" y="30" width="8" height="25" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="6" y="30" width="8" height="25" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <line x1="200" y1="410" x2="240" y2="380" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="210" y="355" width="100" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="260" y="372" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">AI管家</text>

  <!-- 自动驾驶校车（右下） -->
  <g transform="translate(550, 460)">
    <rect x="-50" y="-25" width="100" height="35" rx="8" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
    <!-- 窗户 -->
    <rect x="-42" y="-20" width="18" height="14" rx="2" fill="#a8d0e8"/>
    <rect x="-20" y="-20" width="18" height="14" rx="2" fill="#a8d0e8"/>
    <rect x="2" y="-20" width="18" height="14" rx="2" fill="#a8d0e8"/>
    <rect x="24" y="-20" width="18" height="14" rx="2" fill="#a8d0e8"/>
    <!-- 雷达 -->
    <circle cx="0" cy="-30" r="4" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <path d="M-8 -30 Q0 -38 8 -30" fill="none" stroke="#e07856" stroke-width="1" opacity="0.5"/>
    <!-- 轮子 -->
    <circle cx="-30" cy="12" r="8" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="1.5"/>
    <circle cx="30" cy="12" r="8" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="1.5"/>
    <!-- 无方向盘标注 -->
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">自动驾驶</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="540" width="700" height="42" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.85"/>
  <text x="400" y="566" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">飞行汽车、AI管家、太空旅行——未来的世界很酷，但善良和想象力永远是人的底色。</text>
</svg>
