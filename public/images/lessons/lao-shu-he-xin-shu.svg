<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一棵老树和一棵小树对话的寓言插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">老树和新树</text>
  <line x1="320" y1="56" x2="480" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——一场暴风雨后的领悟</text>

  <!-- 天空 -->
  <rect x="0" y="90" width="800" height="320" fill="#4a90b8" opacity="0.1"/>

  <!-- 地面 -->
  <rect x="0" y="410" width="800" height="190" fill="#c8843a" opacity="0.3"/>
  <path d="M0 410 Q200 400 400 410 Q600 420 800 410 L800 600 L0 600 Z" fill="#6a8d3f" opacity="0.3"/>

  <!-- 老树（左） -->
  <g transform="translate(250, 410)">
    <!-- 树干（粗、皱） -->
    <path d="M-30 0 Q-35 -80 -25 -180 Q-20 -220 -15 -250 L15 -250 Q20 -220 25 -180 Q35 -80 30 0 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="2"/>
    <!-- 树皮裂纹 -->
    <path d="M-15 -100 Q-10 -120 -15 -150" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M10 -80 Q15 -110 10 -140" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-5 -160 Q0 -190 -5 -210" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 树冠 -->
    <ellipse cx="-20" cy="-260" rx="50" ry="40" fill="#2d6a4f" opacity="0.8"/>
    <ellipse cx="20" cy="-270" rx="45" ry="38" fill="#4a6a2f" opacity="0.8"/>
    <ellipse cx="0" cy="-285" rx="40" ry="35" fill="#2d6a4f" opacity="0.7"/>
    <!-- 枯枝 -->
    <path d="M-25 -200 L-60 -230 L-65 -240" fill="none" stroke="#8d5a36" stroke-width="2"/>
    <path d="M25 -210 L55 -240" fill="none" stroke="#8d5a36" stroke-width="2"/>
    <!-- 深根 -->
    <path d="M-30 0 Q-50 20 -70 40" fill="none" stroke="#8d5a36" stroke-width="4" stroke-linecap="round"/>
    <path d="M30 0 Q50 20 70 40" fill="none" stroke="#8d5a36" stroke-width="4" stroke-linecap="round"/>
    <path d="M-15 0 Q-25 25 -35 50" fill="none" stroke="#8d5a36" stroke-width="3" stroke-linecap="round"/>
    <path d="M15 0 Q25 25 35 50" fill="none" stroke="#8d5a36" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="70" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#7a3b14">老树</text>
    <text x="0" y="86" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">根深·稳重</text>
  </g>

  <!-- 小树（右） -->
  <g transform="translate(560, 410)">
    <!-- 树干（细、直） -->
    <rect x="-6" y="-150" width="12" height="150" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <!-- 树冠 -->
    <ellipse cx="0" cy="-160" rx="30" ry="28" fill="#4a6a2f" opacity="0.85"/>
    <ellipse cx="-10" cy="-170" rx="20" ry="18" fill="#6a8d3f" opacity="0.8"/>
    <ellipse cx="12" cy="-165" rx="18" ry="16" fill="#6a8d3f" opacity="0.8"/>
    <!-- 浅根 -->
    <path d="M-6 0 Q-15 10 -20 20" fill="none" stroke="#6a8d3f" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M6 0 Q15 10 20 20" fill="none" stroke="#6a8d3f" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#7a3b14">新树</text>
    <text x="0" y="61" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">根浅·骄傲</text>
  </g>

  <!-- 对话气泡 -->
  <g transform="translate(560, 220)">
    <rect x="-90" y="-25" width="100" height="30" rx="8" fill="#fef9ed" stroke="#c84a3a" stroke-width="1.5"/>
    <text x="-40" y="-6" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a">你老又慢！</text>
    <path d="M-40 5 L-45 15 L-35 12 Z" fill="#fef9ed" stroke="#c84a3a" stroke-width="1.5"/>
  </g>

  <g transform="translate(250, 220)">
    <rect x="-10" y="-25" width="100" height="30" rx="8" fill="#fef9ed" stroke="#2d6a4f" stroke-width="1.5"/>
    <text x="40" y="-6" text-anchor="middle" font-family="serif" font-size="10" fill="#2d6a4f">（笑了笑）</text>
    <path d="M40 5 L45 15 L35 12 Z" fill="#fef9ed" stroke="#2d6a4f" stroke-width="1.5"/>
  </g>

  <!-- 暴风雨 -->
  <g transform="translate(400, 120)" opacity="0.5">
    <path d="M-100 0 L-80 30 L-90 30 L-70 60" fill="none" stroke="#e8a838" stroke-width="3" stroke-linecap="round"/>
    <path d="M0 -10 L20 20 L10 20 L30 50" fill="none" stroke="#e8a838" stroke-width="3" stroke-linecap="round"/>
    <path d="M80 0 L100 30 L90 30 L110 60" fill="none" stroke="#e8a838" stroke-width="3" stroke-linecap="round"/>
    <!-- 雨线 -->
    <line x1="-60" y1="40" x2="-65" y2="60" stroke="#4a90b8" stroke-width="2"/>
    <line x1="40" y1="50" x2="35" y2="70" stroke="#4a90b8" stroke-width="2"/>
    <line x1="60" y1="30" x2="55" y2="50" stroke="#4a90b8" stroke-width="2"/>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 530)">
    <rect x="-300" y="0" width="600" height="55" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">老，不等于没用；年轻，也不等于什么都行</text>
    <text x="0" y="42" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">老树有老树的智慧，新树有新树的活力，谁也离不开谁</text>
  </g>
</svg>
