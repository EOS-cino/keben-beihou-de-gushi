<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="灯笼和字谜卡片配汉字的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">猜字谜</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">左边绿，右边红，左右相遇起凉风</text>

  <!-- 灯笼 -->
  <g transform="translate(150,200)">
    <!-- 挂绳 -->
    <line x1="0" y1="-80" x2="0" y2="-50" stroke="#8d5a36" stroke-width="2"/>
    <!-- 灯笼身 -->
    <ellipse cx="0" cy="0" rx="45" ry="50" fill="#c84a3a" stroke="#8d5a36" stroke-width="2"/>
    <rect x="-35" y="-52" width="70" height="8" rx="3" fill="#8d5a36"/>
    <rect x="-35" y="44" width="70" height="8" rx="3" fill="#8d5a36"/>
    <!-- 灯笼纹 -->
    <ellipse cx="0" cy="0" rx="45" ry="50" fill="none" stroke="#f4b942" stroke-width="1" opacity="0.5"/>
    <line x1="-30" y1="-30" x2="30" y2="-30" stroke="#f4b942" stroke-width="1" opacity="0.4"/>
    <line x1="-35" y1="0" x2="35" y2="0" stroke="#f4b942" stroke-width="1" opacity="0.4"/>
    <line x1="-30" y1="30" x2="30" y2="30" stroke="#f4b942" stroke-width="1" opacity="0.4"/>
    <!-- 穗子 -->
    <line x1="0" y1="52" x2="0" y2="75" stroke="#f4b942" stroke-width="2"/>
    <line x1="-8" y1="52" x2="-8" y2="72" stroke="#f4b942" stroke-width="1.5"/>
    <line x1="8" y1="52" x2="8" y2="72" stroke="#f4b942" stroke-width="1.5"/>
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#f4b942">谜</text>
  </g>

  <!-- 字谜卡片：秋 -->
  <g transform="translate(400,300)">
    <rect x="-120" y="-100" width="240" height="200" rx="12" fill="#fef0d8" stroke="#c8843a" stroke-width="2"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">谜底揭晓</text>
    <!-- 禾（绿） -->
    <text x="-40" y="10" text-anchor="middle" font-family="serif" font-size="48" font-weight="bold" fill="#6a8d3f">禾</text>
    <text x="-40" y="40" text-anchor="middle" font-family="serif" font-size="11" fill="#6a8d3f">绿色·喜雨</text>
    <!-- 火（红） -->
    <text x="40" y="10" text-anchor="middle" font-family="serif" font-size="48" font-weight="bold" fill="#c84a3a">火</text>
    <text x="40" y="40" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">红色·怕水</text>
    <!-- 等号 -->
    <text x="0" y="70" text-anchor="middle" font-family="serif" font-size="20" fill="#c8843a">禾 + 火 =</text>
    <text x="0" y="95" text-anchor="middle" font-family="serif" font-size="36" font-weight="bold" fill="#7a3b14">秋</text>
  </g>

  <!-- 另一个灯笼 -->
  <g transform="translate(650,200)">
    <line x1="0" y1="-80" x2="0" y2="-50" stroke="#8d5a36" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="45" ry="50" fill="#e07856" stroke="#8d5a36" stroke-width="2"/>
    <rect x="-35" y="-52" width="70" height="8" rx="3" fill="#8d5a36"/>
    <rect x="-35" y="44" width="70" height="8" rx="3" fill="#8d5a36"/>
    <ellipse cx="0" cy="0" rx="45" ry="50" fill="none" stroke="#f4b942" stroke-width="1" opacity="0.5"/>
    <line x1="-30" y1="-30" x2="30" y2="-30" stroke="#f4b942" stroke-width="1" opacity="0.4"/>
    <line x1="-35" y1="0" x2="35" y2="0" stroke="#f4b942" stroke-width="1" opacity="0.4"/>
    <line x1="-30" y1="30" x2="30" y2="30" stroke="#f4b942" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="52" x2="0" y2="75" stroke="#f4b942" stroke-width="2"/>
    <line x1="-8" y1="52" x2="-8" y2="72" stroke="#f4b942" stroke-width="1.5"/>
    <line x1="8" y1="52" x2="8" y2="72" stroke="#f4b942" stroke-width="1.5"/>
    <text x="0" y="8" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#f4b942">猜</text>
  </g>

  <!-- 底部 -->
  <rect x="100" y="460" width="600" height="100" rx="10" fill="#fef0d8" opacity="0.6" stroke="#c8843a" stroke-width="1.5"/>
  <text x="400" y="490" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">字谜把认字变成了猜谜游戏</text>
  <text x="400" y="515" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">把字拆成几个部分，用每个部分的特点编成谜面</text>
  <text x="400" y="540" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">猜谜的过程就是观察、拆解、组合、推理的过程</text>
</svg>
