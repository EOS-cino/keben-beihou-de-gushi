<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="故宫建筑全景插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="32" font-weight="bold" fill="#8a2a1a">故宫博物院</text>
  <line x1="300" y1="62" x2="500" y2="62" stroke="#c4a83a" stroke-width="2"/>

  <!-- 天空云 -->
  <g fill="#fff6df" opacity="0.8">
    <ellipse cx="120" cy="110" rx="50" ry="16"/>
    <ellipse cx="680" cy="130" rx="55" ry="18"/>
  </g>

  <!-- 护城河 -->
  <rect x="0" y="520" width="800" height="40" fill="#7ab8d8"/>
  <path d="M0 520 Q400 510 800 520" fill="none" stroke="#5a9ac8" stroke-width="2"/>

  <!-- 城墙基座 -->
  <rect x="60" y="440" width="680" height="90" fill="#a83828" stroke="#7a1a14" stroke-width="2"/>
  <!-- 城墙纹理 -->
  <g stroke="#8a2818" stroke-width="1" opacity="0.5">
    <line x1="60" y1="470" x2="740" y2="470"/>
    <line x1="60" y1="500" x2="740" y2="500"/>
    <line x1="150" y1="440" x2="150" y2="530"/>
    <line x1="250" y1="440" x2="250" y2="530"/>
    <line x1="350" y1="440" x2="350" y2="530"/>
    <line x1="450" y1="440" x2="450" y2="530"/>
    <line x1="550" y1="440" x2="550" y2="530"/>
    <line x1="650" y1="440" x2="650" y2="530"/>
  </g>

  <!-- 午门（中央大门） -->
  <rect x="360" y="400" width="80" height="40" fill="#8a2818" stroke="#5a1a14" stroke-width="2"/>
  <!-- 门钉 -->
  <g fill="#f4c842">
    <circle cx="375" cy="412" r="2.5"/>
    <circle cx="390" cy="412" r="2.5"/>
    <circle cx="405" cy="412" r="2.5"/>
    <circle cx="420" cy="412" r="2.5"/>
    <circle cx="375" cy="425" r="2.5"/>
    <circle cx="390" cy="425" r="2.5"/>
    <circle cx="405" cy="425" r="2.5"/>
    <circle cx="420" cy="425" r="2.5"/>
  </g>

  <!-- 太和殿（中央主殿，最高最大） -->
  <g>
    <!-- 台基 -->
    <rect x="300" y="380" width="200" height="60" fill="#d8c8a8" stroke="#a8884a" stroke-width="2"/>
    <rect x="310" y="390" width="180" height="50" fill="#e8d8b8"/>
    <!-- 殿身 -->
    <rect x="320" y="300" width="160" height="90" fill="#b83828" stroke="#7a1a14" stroke-width="2"/>
    <!-- 柱子 -->
    <g fill="#8a2818">
      <rect x="335" y="310" width="8" height="70"/>
      <rect x="370" y="310" width="8" height="70"/>
      <rect x="405" y="310" width="8" height="70"/>
      <rect x="440" y="310" width="8" height="70"/>
      <rect x="465" y="310" width="8" height="70"/>
    </g>
    <!-- 门窗 -->
    <rect x="348" y="320" width="20" height="50" fill="#5a1a14"/>
    <rect x="383" y="320" width="20" height="50" fill="#5a1a14"/>
    <rect x="418" y="320" width="20" height="50" fill="#5a1a14"/>
    <!-- 屋顶（重檐庑殿顶） -->
    <path d="M300 300 L400 230 L500 300 Z" fill="#f4c842" stroke="#c4a01a" stroke-width="2"/>
    <path d="M320 300 L400 250 L480 300 Z" fill="#e8b832"/>
    <!-- 上层屋顶 -->
    <path d="M340 250 L400 200 L460 250 Z" fill="#f4c842" stroke="#c4a01a" stroke-width="2"/>
    <!-- 屋脊 -->
    <line x1="400" y1="200" x2="400" y2="190" stroke="#8a6a1a" stroke-width="3"/>
    <!-- 屋脊小兽 -->
    <g fill="#8a6a1a">
      <circle cx="370" cy="248" r="3"/>
      <circle cx="380" cy="244" r="3"/>
      <circle cx="390" cy="240" r="3"/>
      <circle cx="410" cy="240" r="3"/>
      <circle cx="420" cy="244" r="3"/>
      <circle cx="430" cy="248" r="3"/>
    </g>
    <!-- 匾额 -->
    <rect x="370" y="270" width="60" height="20" fill="#5a1a14" stroke="#f4c842" stroke-width="1.5"/>
    <text x="400" y="284" text-anchor="middle" font-family="serif" font-size="11" fill="#f4c842">太和殿</text>
  </g>

  <!-- 左侧配殿 -->
  <g>
    <rect x="100" y="400" width="160" height="40" fill="#d8c8a8" stroke="#a8884a" stroke-width="1.5"/>
    <rect x="110" y="350" width="140" height="55" fill="#b83828" stroke="#7a1a14" stroke-width="1.5"/>
    <path d="M100 350 L180 310 L260 350 Z" fill="#f4c842" stroke="#c4a01a" stroke-width="1.5"/>
    <g fill="#5a1a14">
      <rect x="125" y="365" width="15" height="35"/>
      <rect x="155" y="365" width="15" height="35"/>
      <rect x="185" y="365" width="15" height="35"/>
      <rect x="215" y="365" width="15" height="35"/>
    </g>
  </g>

  <!-- 右侧配殿 -->
  <g>
    <rect x="540" y="400" width="160" height="40" fill="#d8c8a8" stroke="#a8884a" stroke-width="1.5"/>
    <rect x="550" y="350" width="140" height="55" fill="#b83828" stroke="#7a1a14" stroke-width="1.5"/>
    <path d="M540 350 L620 310 L700 350 Z" fill="#f4c842" stroke="#c4a01a" stroke-width="1.5"/>
    <g fill="#5a1a14">
      <rect x="565" y="365" width="15" height="35"/>
      <rect x="595" y="365" width="15" height="35"/>
      <rect x="625" y="365" width="15" height="35"/>
      <rect x="655" y="365" width="15" height="35"/>
    </g>
  </g>

  <!-- 角楼（左） -->
  <g>
    <rect x="60" y="410" width="40" height="30" fill="#b83828" stroke="#7a1a14" stroke-width="1.5"/>
    <path d="M55 410 L80 380 L105 410 Z" fill="#f4c842" stroke="#c4a01a" stroke-width="1.5"/>
  </g>
  <!-- 角楼（右） -->
  <g>
    <rect x="700" y="410" width="40" height="30" fill="#b83828" stroke="#7a1a14" stroke-width="1.5"/>
    <path d="M695 410 L720 380 L745 410 Z" fill="#f4c842" stroke="#c4a01a" stroke-width="1.5"/>
  </g>

  <!-- 文字标注 -->
  <line x1="400" y1="200" x2="400" y2="160" stroke="#8a2a1a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="340" y="135" width="120" height="26" fill="#fff6df" stroke="#c4a83a" rx="4"/>
  <text x="400" y="153" text-anchor="middle" font-family="serif" font-size="14" fill="#8a2a1a">太和殿（主殿）</text>

  <line x1="180" y1="310" x2="180" y2="270" stroke="#8a2a1a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="130" y="248" width="100" height="24" fill="#fff6df" stroke="#c4a83a" rx="4"/>
  <text x="180" y="265" text-anchor="middle" font-family="serif" font-size="13" fill="#8a2a1a">配殿</text>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="16" fill="#8a2a1a">红墙黄瓦，重檐庑殿——六百年紫禁城的中轴全景</text>
</svg>
