<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="雷锋帮助别人的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" fill="#2d2a24" font-family="sans-serif" font-weight="bold">雷锋叔叔，你在哪里</text>

  <!-- 天空 -->
  <rect x="0" y="60" width="800" height="280" fill="#d6ecf7"/>
  <!-- 太阳 -->
  <circle cx="680" cy="110" r="28" fill="#f4b942"/>
  <circle cx="680" cy="110" r="36" fill="#f4b942" opacity="0.25"/>
  <!-- 云朵 -->
  <ellipse cx="130" cy="100" rx="40" ry="15" fill="#ffffff" opacity="0.85"/>
  <ellipse cx="160" cy="92" rx="28" ry="11" fill="#ffffff" opacity="0.85"/>

  <!-- 远山 -->
  <path d="M0 340 L120 250 L220 300 L340 230 L460 290 L580 240 L700 290 L800 260 L800 340 Z" fill="#8aaa8a" opacity="0.5"/>
  <path d="M0 340 L100 290 L200 320 L320 270 L440 310 L560 280 L680 310 L800 290 L800 340 Z" fill="#6b8a6a" opacity="0.6"/>

  <!-- 地面 -->
  <path d="M0 340 L800 340 L800 600 L0 600 Z" fill="#7a9a5a"/>
  <path d="M0 350 Q200 345 400 350 Q600 355 800 348 L800 600 L0 600 Z" fill="#6b8a4a"/>

  <!-- 小路 -->
  <path d="M100 600 Q200 500 300 450 Q400 410 500 400 Q600 395 700 390" fill="none" stroke="#c4a468" stroke-width="30" stroke-linecap="round" opacity="0.7"/>
  <path d="M100 600 Q200 500 300 450 Q400 410 500 400 Q600 395 700 390" fill="none" stroke="#d4b878" stroke-width="24" stroke-linecap="round"/>

  <!-- 路边小草 -->
  <g fill="#4a7a3a">
    <path d="M80 580 L78 565 L82 565 Z M85 580 L83 568 L87 568 Z"/>
    <path d="M250 470 L248 455 L252 455 Z M255 470 L253 458 L257 458 Z"/>
    <path d="M450 410 L448 395 L452 395 Z"/>
    <path d="M600 395 L598 380 L602 380 Z"/>
  </g>

  <!-- 雷锋背着大娘（场景1：小路上） -->
  <g transform="translate(300,380)">
    <!-- 大娘 -->
    <g transform="translate(-15,-50)">
      <!-- 头 -->
      <circle cx="0" cy="0" r="14" fill="#f4c8a0"/>
      <!-- 头发（白发） -->
      <path d="M-14 -5 Q-10 -16 0 -14 Q10 -16 14 -5 Q12 -12 0 -10 Q-12 -12 -14 -5" fill="#c8c8c8"/>
      <!-- 眼睛 -->
      <circle cx="-5" cy="-2" r="1.5" fill="#1a1a1a"/>
      <circle cx="5" cy="-2" r="1.5" fill="#1a1a1a"/>
      <!-- 嘴 -->
      <path d="M-3 5 Q0 7 3 5" fill="none" stroke="#8d5a3d" stroke-width="1"/>
      <!-- 身体（深色衣服） -->
      <path d="M-16 14 L-20 50 L20 50 L16 14 Z" fill="#6b4a5a"/>
      <!-- 手臂搭在雷锋肩上 -->
      <path d="M-16 18 L-30 25" fill="none" stroke="#6b4a5a" stroke-width="6" stroke-linecap="round"/>
    </g>
    <text x="-15" y="10" text-anchor="middle" font-size="11" fill="#6b6557" font-family="sans-serif">大娘</text>

    <!-- 雷锋 -->
    <g transform="translate(15,-55)">
      <!-- 头 -->
      <circle cx="0" cy="0" r="15" fill="#f4c8a0"/>
      <!-- 军帽（雷锋帽） -->
      <path d="M-15 -5 Q-12 -18 0 -16 Q12 -18 15 -5 L15 -2 L-15 -2 Z" fill="#4a6a3a"/>
      <ellipse cx="0" cy="-3" rx="15" ry="4" fill="#3a5a2a"/>
      <!-- 帽徽（红星） -->
      <path d="M0 -12 L2 -8 L6 -8 L3 -5 L4 -1 L0 -3 L-4 -1 L-3 -5 L-6 -8 L-2 -8 Z" fill="#e36f5b"/>
      <!-- 眼睛 -->
      <circle cx="-5" cy="-1" r="1.5" fill="#1a1a1a"/>
      <circle cx="5" cy="-1" r="1.5" fill="#1a1a1a"/>
      <!-- 嘴（微笑） -->
      <path d="M-4 6 Q0 9 4 6" fill="none" stroke="#8d5a3d" stroke-width="1.5"/>
      <!-- 身体（军装） -->
      <path d="M-17 14 L-22 55 L22 55 L17 14 Z" fill="#5a7a3a"/>
      <!-- 领子 -->
      <path d="M-8 14 L0 22 L8 14" fill="#4a6a2a"/>
      <!-- 手臂（背着大娘） -->
      <path d="M-17 20 L-35 30" fill="none" stroke="#5a7a3a" stroke-width="7" stroke-linecap="round"/>
      <path d="M17 20 L25 40" fill="none" stroke="#5a7a3a" stroke-width="7" stroke-linecap="round"/>
    </g>
    <text x="15" y="10" text-anchor="middle" font-size="11" fill="#3a5a1a" font-family="sans-serif" font-weight="bold">雷锋</text>

    <!-- 脚印 -->
    <ellipse cx="0" cy="60" rx="6" ry="3" fill="#a88848" opacity="0.5"/>
    <ellipse cx="-15" cy="65" rx="5" ry="2.5" fill="#a88848" opacity="0.4"/>
  </g>

  <!-- 场景标注 -->
  <g transform="translate(300,310)">
    <rect x="-70" y="-20" width="140" height="24" rx="12" fill="#ffffff" opacity="0.9" stroke="#5a7a3a" stroke-width="1.5"/>
    <text x="0" y="-3" text-anchor="middle" font-size="11" fill="#3a5a1a" font-family="sans-serif">背着大娘走泥路</text>
  </g>

  <!-- 场景2：河边护送孩子（右侧小场景） -->
  <g transform="translate(600,400)">
    <!-- 河流 -->
    <path d="M-60 50 Q-30 45 0 50 Q30 55 60 50" fill="none" stroke="#7ec0db" stroke-width="12" stroke-linecap="round"/>
    <path d="M-50 48 Q-20 43 10 48" fill="none" stroke="#a8d4e8" stroke-width="2"/>

    <!-- 雷锋抱孩子 -->
    <g transform="translate(0,-20)">
      <!-- 雷锋 -->
      <circle cx="0" cy="0" r="12" fill="#f4c8a0"/>
      <path d="M-12 -4 Q-10 -14 0 -12 Q10 -14 12 -4 L12 -1 L-12 -1 Z" fill="#4a6a3a"/>
      <ellipse cx="0" cy="-2" rx="12" ry="3" fill="#3a5a2a"/>
      <circle cx="-4" cy="-1" r="1.2" fill="#1a1a1a"/>
      <circle cx="4" cy="-1" r="1.2" fill="#1a1a1a"/>
      <path d="M-13 10 L-16 35 L16 35 L13 10 Z" fill="#5a7a3a"/>
      <!-- 怀里的孩子 -->
      <circle cx="-12" cy="15" r="8" fill="#f4c8a0"/>
      <circle cx="-14" cy="14" r="1" fill="#1a1a1a"/>
      <circle cx="-10" cy="14" r="1" fill="#1a1a1a"/>
      <path d="M-18 20 L-8 20 L-8 30 L-18 30 Z" fill="#e8a040"/>
      <!-- 手臂抱孩子 -->
      <path d="M-13 15 Q-20 18 -18 25" fill="none" stroke="#5a7a3a" stroke-width="5" stroke-linecap="round"/>
    </g>
    <!-- 雨滴 -->
    <g fill="#a8c8e8" opacity="0.6">
      <line x1="-30" y1="-40" x2="-32" y2="-30" stroke="#a8c8e8" stroke-width="1.5"/>
      <line x1="20" y1="-45" x2="18" y2="-35" stroke="#a8c8e8" stroke-width="1.5"/>
      <line x1="35" y1="-30" x2="33" y2="-20" stroke="#a8c8e8" stroke-width="1.5"/>
      <line x1="-15" y1="-50" x2="-17" y2="-40" stroke="#a8c8e8" stroke-width="1.5"/>
    </g>
  </g>
  <g transform="translate(600,340)">
    <rect x="-70" y="-12" width="140" height="24" rx="12" fill="#ffffff" opacity="0.9" stroke="#5a7a3a" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#3a5a1a" font-family="sans-serif">冒雨护送孩子</text>
  </g>

  <!-- 底部：爱心传递 -->
  <g transform="translate(400,540)">
    <text x="0" y="0" text-anchor="middle" font-size="14" fill="#e36f5b" font-family="sans-serif" font-weight="bold">哪里需要献出爱心，雷锋叔叔就出现在哪里</text>
    <!-- 爱心 -->
    <path d="M-120 15 C-130 5 -130 -10 -120 -10 C-115 -10 -112 -5 -110 0 C-108 -5 -105 -10 -100 -10 C-90 -10 -90 5 -100 15 L-110 25 Z" fill="#e36f5b" opacity="0.7"/>
    <path d="M120 15 C110 5 110 -10 120 -10 C125 -10 128 -5 130 0 C132 -5 135 -10 140 -10 C150 -10 150 5 140 15 L130 25 Z" fill="#e36f5b" opacity="0.7"/>
  </g>
</svg>
