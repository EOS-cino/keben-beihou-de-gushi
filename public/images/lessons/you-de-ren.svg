<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="两种人生态度对比插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">有的人</text>
  <line x1="370" y1="56" x2="430" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 开头名句 -->
  <rect x="150" y="75" width="500" height="35" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <text x="400" y="98" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">"有的人活着，他已经死了；有的人死了，他还活着。"</text>

  <!-- 左侧：骑在人民头上的人 -->
  <g transform="translate(200, 320)">
    <text x="0" y="-130" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#e07856">骑在人民头上的人</text>
    <!-- 高高在上的人 -->
    <g transform="translate(0, -80)">
      <circle cx="0" cy="0" r="14" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
      <path d="M-3 -3 L3 -3" stroke="#2a2a2a" stroke-width="2"/>
      <path d="M-4 5 Q0 3 4 5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 身体（昂首挺胸） -->
      <path d="M-12 14 L-16 50 L16 50 L12 14 Z" fill="#5a3a3a" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <!-- 被骑的人（弯腰） -->
    <g transform="translate(0, 0)">
      <circle cx="0" cy="-15" r="10" fill="#d8c8a8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M 0 -5 Q -8 5 -12 20 Q -8 25 -4 28" fill="none" stroke="#8d5a36" stroke-width="5" stroke-linecap="round"/>
      <path d="M -4 28 L -4 45" stroke="#5a4a2a" stroke-width="3"/>
    </g>
    <!-- 石碑（名字被砸） -->
    <g transform="translate(60, 20)">
      <rect x="-15" y="-30" width="30" height="50" fill="#a0a0a0" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="-10" y1="-20" x2="10" y2="-20" stroke="#7a3b14" stroke-width="1" opacity="0.3"/>
      <line x1="-10" y1="-10" x2="10" y2="-10" stroke="#7a3b14" stroke-width="1" opacity="0.3"/>
      <!-- 裂纹 -->
      <path d="M -8 -25 L 0 -15 L -5 -5 L 5 5 L -3 15" fill="none" stroke="#5a3a3a" stroke-width="1.5"/>
    </g>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="13" fill="#e07856">"我多伟大"</text>
    <text x="0" y="100" text-anchor="middle" font-family="serif" font-size="12" fill="#c8843a">名字比尸首烂得更早</text>
  </g>

  <!-- 中间VS -->
  <text x="400" y="260" text-anchor="middle" font-family="serif" font-size="36" fill="#c8843a" opacity="0.3">VS</text>

  <!-- 右侧：俯身为人民的人 -->
  <g transform="translate(600, 320)">
    <text x="0" y="-130" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#2d6a4f">俯身为人民的人</text>
    <!-- 弯腰服务的人 -->
    <g transform="translate(0, -60)">
      <circle cx="0" cy="0" r="14" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
      <circle cx="-4" cy="-2" r="1.5" fill="#2a2a2a"/>
      <circle cx="4" cy="-2" r="1.5" fill="#2a2a2a"/>
      <path d="M-4 5 Q0 7 4 5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 弯腰身体 -->
      <path d="M 0 14 Q -8 25 -12 40 Q -8 45 -4 48" fill="none" stroke="#2d6a4f" stroke-width="6" stroke-linecap="round"/>
      <path d="M -12 40 Q -18 45 -22 50" fill="none" stroke="#2d6a4f" stroke-width="4" stroke-linecap="round"/>
      <path d="M -4 48 L -4 65" stroke="#5a4a2a" stroke-width="3"/>
    </g>
    <!-- 野草（春风吹又生） -->
    <g transform="translate(-50, 30)">
      <path d="M 0 0 Q -2 -10 -5 -15" fill="none" stroke="#2d6a4f" stroke-width="2"/>
      <path d="M 0 0 Q 2 -8 5 -12" fill="none" stroke="#2d6a4f" stroke-width="2"/>
      <path d="M 0 0 Q 0 -12 0 -18" fill="none" stroke="#2d6a4f" stroke-width="2"/>
    </g>
    <g transform="translate(50, 30)">
      <path d="M 0 0 Q -2 -10 -5 -15" fill="none" stroke="#2d6a4f" stroke-width="2"/>
      <path d="M 0 0 Q 2 -8 5 -12" fill="none" stroke="#2d6a4f" stroke-width="2"/>
      <path d="M 0 0 Q 0 -12 0 -18" fill="none" stroke="#2d6a4f" stroke-width="2"/>
    </g>
    <g transform="translate(0, 35)">
      <path d="M 0 0 Q -3 -12 -7 -18" fill="none" stroke="#2d6a4f" stroke-width="2"/>
      <path d="M 0 0 Q 3 -10 7 -15" fill="none" stroke="#2d6a4f" stroke-width="2"/>
      <path d="M 0 0 Q 0 -14 0 -22" fill="none" stroke="#2d6a4f" stroke-width="2"/>
    </g>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="13" fill="#2d6a4f">"甘为孺子牛"</text>
    <text x="0" y="100" text-anchor="middle" font-family="serif" font-size="12" fill="#c8843a">春风吹到的地方，野草青青</text>
  </g>

  <!-- 底部说明 -->
  <rect x="100" y="510" width="600" height="55" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6" opacity="0.8"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">自私的人终被遗忘，奉献的人永远活在人心——</text>
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">人的价值不在于活了多久，而在于为别人做了什么</text>
</svg>
