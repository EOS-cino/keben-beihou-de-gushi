<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="老人在山坡上种树、身后青山连绵的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">青山不老 · 一辈子的坚持</text>
  <line x1="250" y1="62" x2="550" y2="62" stroke="#6a8d3f" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="70" width="800" height="250" fill="#fef9ed"/>
  <!-- 太阳 -->
  <circle cx="680" cy="130" r="30" fill="#f4c842" opacity="0.8"/>
  <circle cx="680" cy="130" r="22" fill="#f4d842"/>

  <!-- 远山（青山） -->
  <g fill="#4a6a2f" opacity="0.5">
    <path d="M0 320 Q100 240 200 280 Q300 230 400 270 Q500 220 600 260 Q700 240 800 290 L800 400 L0 400 Z"/>
  </g>
  <g fill="#6a8d3f" opacity="0.7">
    <path d="M0 360 Q120 300 250 340 Q380 290 500 330 Q620 300 800 350 L800 420 L0 420 Z"/>
  </g>

  <!-- 近处山坡 -->
  <path d="M0 420 Q200 380 400 410 Q600 390 800 420 L800 600 L0 600 Z" fill="#8d5a36"/>
  <path d="M0 450 Q200 415 400 440 Q600 425 800 450 L800 600 L0 600 Z" fill="#c8843a" opacity="0.6"/>

  <!-- 已种好的树（左侧成林） -->
  <g>
    <g fill="#4a6a2f">
      <ellipse cx="80" cy="380" rx="20" ry="25"/>
      <rect x="77" y="395" width="6" height="30" fill="#5a3a1a"/>
      <ellipse cx="130" cy="375" rx="18" ry="22"/>
      <rect x="127" y="390" width="5" height="30" fill="#5a3a1a"/>
      <ellipse cx="180" cy="385" rx="22" ry="28"/>
      <rect x="177" y="400" width="6" height="30" fill="#5a3a1a"/>
      <ellipse cx="230" cy="378" rx="16" ry="20"/>
      <rect x="227" y="390" width="5" height="30" fill="#5a3a1a"/>
    </g>
    <g fill="#6a8d3f" opacity="0.6">
      <ellipse cx="105" cy="385" rx="14" ry="18"/>
      <ellipse cx="155" cy="380" rx="12" ry="16"/>
      <ellipse cx="205" cy="388" rx="15" ry="19"/>
    </g>
  </g>

  <!-- 老人 -->
  <g>
    <!-- 身体（弯腰） -->
    <path d="M440 470 Q430 440 445 410 L475 415 Q485 445 480 475 Z" fill="#7a3b14"/>
    <!-- 头 -->
    <circle cx="455" cy="400" r="16" fill="#f0d0a8"/>
    <!-- 白发 -->
    <path d="M440 395 Q455 382 470 395 L470 402 L440 402 Z" fill="#e8e0d0"/>
    <!-- 皱纹 -->
    <g stroke="#8d5a36" stroke-width="0.8">
      <path d="M448 397 Q452 399 456 397"/>
      <path d="M458 397 Q462 399 466 397"/>
    </g>
    <!-- 眼睛 -->
    <circle cx="450" cy="402" r="1.5" fill="#2a2a2a"/>
    <circle cx="462" cy="402" r="1.5" fill="#2a2a2a"/>
    <!-- 嘴 -->
    <path d="M451 408 Q456 411 461 408" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 手臂（拿铁锹） -->
    <path d="M445 425 L420 455 L425 462 L450 435 Z" fill="#8d5a36"/>
    <!-- 铁锹 -->
    <line x1="420" y1="455" x2="395" y2="500" stroke="#5a3a1a" stroke-width="4" stroke-linecap="round"/>
    <path d="M388 495 L400 495 L405 515 L383 515 Z" fill="#a8a8a8" stroke="#5a5a5a" stroke-width="1.5"/>
    <!-- 另一只手 -->
    <path d="M475 430 L490 460 L485 468 L470 440 Z" fill="#8d5a36"/>
  </g>

  <!-- 新种的小树苗 -->
  <g>
    <rect x="510" y="470" width="4" height="30" fill="#5a3a1a"/>
    <ellipse cx="512" cy="465" rx="10" ry="14" fill="#6a8d3f"/>
    <ellipse cx="512" cy="460" rx="7" ry="10" fill="#4a6a2f"/>
    <!-- 培土 -->
    <ellipse cx="512" cy="500" rx="15" ry="5" fill="#5a3a1a" opacity="0.5"/>
  </g>

  <!-- 几棵更多的小树苗 -->
  <g>
    <rect x="560" y="475" width="3" height="22" fill="#5a3a1a"/>
    <ellipse cx="561" cy="472" rx="8" ry="11" fill="#6a8d3f"/>
    <rect x="600" y="478" width="3" height="20" fill="#5a3a1a"/>
    <ellipse cx="601" cy="475" rx="7" ry="9" fill="#6a8d3f"/>
  </g>

  <!-- 标注 -->
  <rect x="80" y="330" width="100" height="24" fill="#fff6df" stroke="#4a6a2f" rx="4"/>
  <text x="130" y="346" text-anchor="middle" font-family="serif" font-size="13" fill="#4a6a2f">已长成的林</text>
  <line x1="130" y1="354" x2="130" y2="370" stroke="#4a6a2f" stroke-width="1.5" stroke-dasharray="3,2"/>

  <rect x="380" y="350" width="80" height="24" fill="#fff6df" stroke="#7a3b14" rx="4"/>
  <text x="420" y="366" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">老人种树</text>
  <line x1="450" y1="374" x2="455" y2="395" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="3,2"/>

  <rect x="475" y="520" width="80" height="24" fill="#fff6df" stroke="#6a8d3f" rx="4"/>
  <text x="515" y="536" text-anchor="middle" font-family="serif" font-size="13" fill="#6a8d3f">新种树苗</text>
  <line x1="510" y1="520" x2="512" y2="505" stroke="#6a8d3f" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">老人终会老去，可他种下的青山不会老</text>
</svg>
