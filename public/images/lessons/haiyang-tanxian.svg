<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="探险船与海洋分层插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">海洋探险</text>
  <line x1="320" y1="62" x2="480" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="70" width="800" height="80" fill="#a8d0e8" opacity="0.4"/>
  <!-- 太阳 -->
  <circle cx="120" cy="110" r="30" fill="#e07856" opacity="0.7"/>

  <!-- 海洋分层 -->
  <!-- 表层（透光层） -->
  <rect x="0" y="150" width="800" height="120" fill="#a8d0e8"/>
  <!-- 中层（微光层） -->
  <rect x="0" y="270" width="800" height="120" fill="#7ab8d8"/>
  <!-- 深层（无光层） -->
  <rect x="0" y="390" width="800" height="130" fill="#3a5a78"/>
  <!-- 海底 -->
  <rect x="0" y="520" width="800" height="80" fill="#2a3a4a"/>
  <!-- 海底起伏 -->
  <path d="M0 540 Q150 510 300 535 Q450 560 600 525 Q700 505 800 530 L800 600 L0 600 Z" fill="#5a3a1a" opacity="0.6"/>

  <!-- 探险船 -->
  <g transform="translate(480, 130)">
    <path d="M0 20 L80 20 L70 45 L10 45 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="20" y="0" width="40" height="22" fill="#fff6df" stroke="#7a3b14" stroke-width="2"/>
    <rect x="35" y="-20" width="6" height="22" fill="#5a3a1a"/>
    <circle cx="38" cy="-22" r="6" fill="#c84a3a"/>
    <!-- 桅杆天线 -->
    <line x1="60" y1="0" x2="75" y2="-15" stroke="#5a3a1a" stroke-width="2"/>
  </g>

  <!-- 阳光射线 -->
  <g stroke="#fef9ed" stroke-width="2" opacity="0.5">
    <line x1="200" y1="150" x2="180" y2="270"/>
    <line x1="280" y1="150" x2="260" y2="270"/>
    <line x1="360" y1="150" x2="350" y2="270"/>
  </g>

  <!-- 表层鱼群 -->
  <g fill="#c8843a">
    <path d="M150 200 Q160 195 170 200 Q160 205 150 200"/>
    <path d="M180 210 Q190 205 200 210 Q190 215 180 210"/>
    <path d="M140 220 Q150 215 160 220 Q150 225 140 220"/>
  </g>

  <!-- 潜水器（中层下潜） -->
  <g transform="translate(300, 330)">
    <ellipse cx="0" cy="0" rx="40" ry="22" fill="#e07856" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="-10" cy="-3" r="8" fill="#a8d0e8" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="15" cy="-3" r="6" fill="#a8d0e8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 机械臂 -->
    <line x1="40" y1="5" x2="60" y2="15" stroke="#7a3b14" stroke-width="3"/>
    <!-- 探照灯光锥 -->
    <path d="M-40 0 L-90 -20 L-90 20 Z" fill="#fef9ed" opacity="0.25"/>
  </g>

  <!-- 深层发光生物 -->
  <g>
    <!-- 发光水母 -->
    <ellipse cx="150" cy="450" rx="18" ry="12" fill="#7ab8d8" opacity="0.7" stroke="#a8d0e8" stroke-width="1"/>
    <line x1="140" y1="460" x2="135" y2="480" stroke="#a8d0e8" stroke-width="1.5" opacity="0.6"/>
    <line x1="150" y1="462" x2="150" y2="485" stroke="#a8d0e8" stroke-width="1.5" opacity="0.6"/>
    <line x1="160" y1="460" x2="165" y2="480" stroke="#a8d0e8" stroke-width="1.5" opacity="0.6"/>
    <circle cx="150" cy="445" r="3" fill="#fef9ed" opacity="0.8"/>
    <!-- 发光鱼 -->
    <ellipse cx="600" cy="470" rx="20" ry="10" fill="#3a5a78" stroke="#a8d0e8" stroke-width="1"/>
    <path d="M580 470 L570 463 L570 477 Z" fill="#3a5a78"/>
    <circle cx="612" cy="467" r="3" fill="#e07856"/>
    <line x1="595" y1="478" x2="590" y2="495" stroke="#a8d0e8" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- 深度标注线 -->
  <line x1="50" y1="150" x2="50" y2="520" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="10" y="200" width="70" height="20" fill="#fff6df" stroke="#c8843a" rx="3"/>
  <text x="45" y="214" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">透光层</text>
  <rect x="10" y="320" width="70" height="20" fill="#fff6df" stroke="#c8843a" rx="3"/>
  <text x="45" y="334" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">微光层</text>
  <rect x="10" y="440" width="70" height="20" fill="#fff6df" stroke="#c8843a" rx="3"/>
  <text x="45" y="454" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">无光层</text>

  <!-- 底部说明 -->
  <text x="400" y="580" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">从阳光明媚的海面到漆黑的万米深渊，海洋是地球最后的秘境</text>
</svg>
