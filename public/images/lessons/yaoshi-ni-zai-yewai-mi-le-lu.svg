<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="太阳、树叶、积雪等天然指南针的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">要是你在野外迷了路</text>
  <line x1="230" y1="62" x2="570" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 方向罗盘（中心） -->
  <g transform="translate(400, 320)">
    <circle cx="0" cy="0" r="80" fill="#fff6df" stroke="#c8843a" stroke-width="3"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#c8843a" stroke-width="1" stroke-dasharray="3,3"/>
    <!-- 指针 -->
    <polygon points="0,-60 8,0 0,10 -8,0" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <polygon points="0,60 8,0 0,-10 -8,0" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="#7a3b14"/>
    <!-- 方向字 -->
    <text x="0" y="-65" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#c84a3a">北</text>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#4a6a2f">南</text>
    <text x="-75" y="5" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">西</text>
    <text x="75" y="5" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">东</text>
  </g>

  <!-- 左上：太阳辨别方向 -->
  <g transform="translate(130, 130)">
    <text x="60" y="-10" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">看太阳</text>
    <!-- 太阳（南方） -->
    <circle cx="100" cy="30" r="22" fill="#f4c842" stroke="#e0a838" stroke-width="2"/>
    <g stroke="#f4c842" stroke-width="2" stroke-linecap="round">
      <line x1="100" y1="3" x2="100" y2="-5"/>
      <line x1="100" y1="57" x2="100" y2="65"/>
      <line x1="73" y1="30" x2="65" y2="30"/>
      <line x1="127" y1="30" x2="135" y2="30"/>
    </g>
    <!-- 树和影子 -->
    <rect x="38" y="40" width="8" height="40" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <circle cx="42" cy="35" r="18" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <!-- 影子（指向北方） -->
    <ellipse cx="20" cy="82" rx="22" ry="5" fill="#5a3a1a" opacity="0.4"/>
    <!-- 标注 -->
    <text x="100" y="20" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">南</text>
    <text x="15" y="75" text-anchor="middle" font-family="serif" font-size="11" fill="#4a6a2f">北(影)</text>
  </g>

  <!-- 右上：树叶疏密辨别方向 -->
  <g transform="translate(530, 130)">
    <text x="70" y="-10" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">看树叶</text>
    <!-- 大树 -->
    <rect x="62" y="50" width="12" height="50" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <!-- 南面（右）叶子密 -->
    <circle cx="90" cy="40" r="14" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <circle cx="100" cy="50" r="12" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <circle cx="95" cy="30" r="11" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <!-- 北面（左）叶子稀 -->
    <circle cx="50" cy="45" r="9" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5" opacity="0.6"/>
    <circle cx="45" cy="35" r="7" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5" opacity="0.6"/>
    <!-- 标注 -->
    <text x="110" y="70" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">南(密)</text>
    <text x="35" y="70" text-anchor="middle" font-family="serif" font-size="11" fill="#4a6a2f">北(稀)</text>
  </g>

  <!-- 左下：积雪辨别方向 -->
  <g transform="translate(130, 400)">
    <text x="70" y="-10" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">看积雪</text>
    <!-- 沟渠截面 -->
    <path d="M0 50 Q20 20 40 30 L40 50 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <path d="M40 30 Q60 20 80 50 L80 50 L40 50 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <!-- 北边坡（左）雪化得快 -->
    <path d="M0 50 Q20 20 40 30" fill="none" stroke="#a8d0e8" stroke-width="3"/>
    <text x="20" y="15" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a">北(化快)</text>
    <!-- 南边坡（右）雪化得慢 -->
    <path d="M40 30 Q60 20 80 50" fill="none" stroke="#ffffff" stroke-width="6"/>
    <path d="M40 30 Q60 20 80 50" fill="none" stroke="#a8d0e8" stroke-width="3"/>
    <text x="60" y="15" text-anchor="middle" font-family="serif" font-size="10" fill="#4a6a2f">南(化慢)</text>
  </g>

  <!-- 右下：北极星辨别方向 -->
  <g transform="translate(530, 400)">
    <text x="70" y="-10" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">看北极星</text>
    <!-- 夜空 -->
    <rect x="0" y="0" width="140" height="80" fill="#3a5a7a" opacity="0.4" rx="4"/>
    <!-- 北斗七星 -->
    <g fill="#fff8e0">
      <circle cx="20" cy="55" r="2.5"/>
      <circle cx="35" cy="50" r="2.5"/>
      <circle cx="50" cy="48" r="2.5"/>
      <circle cx="62" cy="55" r="2.5"/>
      <circle cx="70" cy="65" r="2.5"/>
      <circle cx="82" cy="68" r="2.5"/>
      <circle cx="92" cy="60" r="2.5"/>
    </g>
    <!-- 连线 -->
    <path d="M20 55 L35 50 L50 48 L62 55 L70 65 L82 68 L92 60" fill="none" stroke="#fff8e0" stroke-width="1" opacity="0.5"/>
    <!-- 北极星 -->
    <circle cx="120" cy="35" r="4" fill="#f4c842"/>
    <g stroke="#f4c842" stroke-width="1.5" opacity="0.7">
      <line x1="120" y1="28" x2="120" y2="22"/>
      <line x1="120" y1="42" x2="120" y2="48"/>
      <line x1="113" y1="35" x2="107" y2="35"/>
      <line x1="127" y1="35" x2="133" y2="35"/>
    </g>
    <!-- 指引线 -->
    <path d="M92 60 L120 35" fill="none" stroke="#f4c842" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="120" y="20" text-anchor="middle" font-family="serif" font-size="10" fill="#f4c842">北极星</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">太阳、树叶、积雪、北极星——大自然里有很多天然的指南针，帮你辨别方向</text>
</svg>
