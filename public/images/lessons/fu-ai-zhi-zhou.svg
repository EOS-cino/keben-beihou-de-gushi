<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="父亲摇着小船送儿子上学的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">父爱之舟 · 摇摇晃晃的深情</text>
  <line x1="220" y1="62" x2="580" y2="62" stroke="#7ab8d8" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="70" width="800" height="300" fill="#fef9ed"/>
  <!-- 远山 -->
  <g fill="#6a8d3f" opacity="0.3">
    <path d="M0 320 Q150 250 300 300 Q450 260 600 290 Q700 270 800 310 L800 370 L0 370 Z"/>
  </g>
  <g fill="#4a6a2f" opacity="0.4">
    <path d="M0 350 Q200 300 400 340 Q600 310 800 350 L800 400 L0 400 Z"/>
  </g>

  <!-- 水面 -->
  <rect x="0" y="370" width="800" height="230" fill="#a8d0e8"/>
  <!-- 水波纹 -->
  <g stroke="#7ab8d8" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M50 420 Q80 415 110 420 Q140 425 170 420"/>
    <path d="M250 440 Q280 435 310 440 Q340 445 370 440"/>
    <path d="M500 430 Q530 425 560 430 Q590 435 620 430"/>
    <path d="M650 460 Q680 455 710 460 Q740 465 770 460"/>
    <path d="M100 480 Q130 475 160 480"/>
    <path d="M400 490 Q430 485 460 490"/>
    <path d="M550 510 Q580 505 610 510"/>
  </g>

  <!-- 小船 -->
  <g>
    <!-- 船身 -->
    <path d="M250 440 Q260 480 350 485 Q450 485 540 470 Q545 455 530 445 L270 430 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 船舱内部 -->
    <path d="M280 445 Q290 465 340 468 Q430 468 510 458 L510 448 L280 440 Z" fill="#c8843a" opacity="0.5"/>
    <!-- 船板纹理 -->
    <g stroke="#5a3a1a" stroke-width="1" opacity="0.4">
      <line x1="300" y1="445" x2="305" y2="470"/>
      <line x1="350" y1="448" x2="355" y2="475"/>
      <line x1="400" y1="450" x2="405" y2="478"/>
      <line x1="450" y1="450" x2="455" y2="475"/>
      <line x1="500" y1="448" x2="505" y2="468"/>
    </g>
  </g>

  <!-- 父亲（船尾摇橹） -->
  <g>
    <!-- 身体 -->
    <path d="M300 440 L305 380 L335 380 L340 440 Z" fill="#4a6a2f"/>
    <!-- 手臂摇橹 -->
    <path d="M335 395 L370 420 L375 432 L340 410 Z" fill="#6a8d3f"/>
    <!-- 橹 -->
    <line x1="375" y1="425" x2="420" y2="470" stroke="#8d5a36" stroke-width="5" stroke-linecap="round"/>
    <path d="M415 465 Q425 475 430 490 Q420 495 410 485 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <!-- 头 -->
    <circle cx="320" cy="365" r="16" fill="#f0d0a8"/>
    <!-- 帽子 -->
    <path d="M305 358 Q320 345 335 358 L333 362 L307 362 Z" fill="#5a3a1a"/>
    <!-- 表情 -->
    <circle cx="315" cy="365" r="1.5" fill="#2a2a2a"/>
    <circle cx="325" cy="365" r="1.5" fill="#2a2a2a"/>
    <path d="M315 372 Q320 375 325 372" fill="none" stroke="#7a3b14" stroke-width="1.2"/>
    <!-- 汗滴 -->
    <ellipse cx="338" cy="360" rx="2" ry="4" fill="#7ab8d8" opacity="0.7"/>
  </g>

  <!-- 少年（船头） -->
  <g>
    <!-- 身体 -->
    <path d="M440 440 L445 390 L470 390 L475 440 Z" fill="#c84a3a"/>
    <!-- 书包 -->
    <rect x="448" y="395" width="18" height="22" fill="#8d5a36" rx="3"/>
    <!-- 头 -->
    <circle cx="458" cy="375" r="14" fill="#f0d0a8"/>
    <!-- 头发 -->
    <path d="M445 370 Q458 358 471 370 L470 374 L446 374 Z" fill="#2a1a0a"/>
    <!-- 表情 -->
    <circle cx="453" cy="375" r="1.5" fill="#2a2a2a"/>
    <circle cx="463" cy="375" r="1.5" fill="#2a2a2a"/>
    <path d="M453 382 Q458 385 463 382" fill="none" stroke="#7a3b14" stroke-width="1.2"/>
  </g>

  <!-- 月亮（梦境感） -->
  <circle cx="680" cy="130" r="35" fill="#fff6df" stroke="#c8a83a" stroke-width="1.5" opacity="0.8"/>
  <g fill="#c8a83a" opacity="0.3">
    <circle cx="670" cy="125" r="5"/>
    <circle cx="690" cy="135" r="4"/>
  </g>

  <!-- 标注 -->
  <rect x="270" y="340" width="80" height="24" fill="#fff6df" stroke="#4a6a2f" rx="4"/>
  <text x="310" y="356" text-anchor="middle" font-family="serif" font-size="13" fill="#4a6a2f">父亲（摇橹）</text>

  <rect x="415" y="345" width="80" height="24" fill="#fff6df" stroke="#c84a3a" rx="4"/>
  <text x="455" y="361" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">少年（求学）</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">一只小船摇摇晃晃，载着父亲说不出口的爱</text>
</svg>
