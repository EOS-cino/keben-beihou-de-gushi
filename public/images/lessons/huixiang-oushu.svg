<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="老年贺知章回乡与儿童对话的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">回乡偶书</text>
  <line x1="350" y1="56" x2="450" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 诗句 -->
  <rect x="150" y="75" width="500" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <text x="400" y="98" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">少小离家老大回，乡音无改鬓毛衰。</text>
  <text x="400" y="118" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">儿童相见不相识，笑问客从何处来。</text>

  <!-- 乡村背景 -->
  <!-- 远山 -->
  <path d="M 0 250 L 100 200 L 200 230 L 350 190 L 500 220 L 650 195 L 800 230 L 800 280 L 0 280 Z" fill="#2d6a4f" opacity="0.15"/>
  <!-- 村子 -->
  <g transform="translate(120, 250)">
    <rect x="-25" y="0" width="50" height="35" fill="#e0c898" stroke="#7a3b14" stroke-width="1.5" opacity="0.7"/>
    <path d="M-30 0 L0 -18 L30 0 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5" opacity="0.7"/>
  </g>
  <g transform="translate(680, 255)">
    <rect x="-25" y="0" width="50" height="35" fill="#e0c898" stroke="#7a3b14" stroke-width="1.5" opacity="0.7"/>
    <path d="M-30 0 L0 -18 L30 0 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5" opacity="0.7"/>
  </g>
  <!-- 大树 -->
  <g transform="translate(80, 290)">
    <path d="M 0 0 Q -2 -30 -4 -60" fill="none" stroke="#5a4a2a" stroke-width="4"/>
    <circle cx="-4" cy="-65" r="25" fill="#2d6a4f" opacity="0.5"/>
    <circle cx="-15" cy="-55" r="18" fill="#2d6a4f" opacity="0.4"/>
    <circle cx="10" cy="-60" r="20" fill="#2d6a4f" opacity="0.4"/>
  </g>
  <g transform="translate(720, 295)">
    <path d="M 0 0 Q 2 -30 4 -60" fill="none" stroke="#5a4a2a" stroke-width="4"/>
    <circle cx="4" cy="-65" r="25" fill="#2d6a4f" opacity="0.5"/>
    <circle cx="15" cy="-55" r="18" fill="#2d6a4f" opacity="0.4"/>
    <circle cx="-10" cy="-60" r="20" fill="#2d6a4f" opacity="0.4"/>
  </g>

  <!-- 地面 -->
  <rect x="0" y="300" width="800" height="200" fill="#d8c8a8" opacity="0.2"/>

  <!-- 贺知章（白发老人） -->
  <g transform="translate(320, 380)">
    <!-- 头 -->
    <circle cx="0" cy="-50" r="16" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 白发 -->
    <path d="M-14 -55 Q0 -70 14 -55 L14 -50 Q0 -60 -14 -50 Z" fill="#e8e8e8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 鬓毛衰（白鬓角） -->
    <path d="M-14 -48 Q-16 -42 -14 -38" fill="#e8e8e8" stroke="#7a3b14" stroke-width="1"/>
    <path d="M14 -48 Q16 -42 14 -38" fill="#e8e8e8" stroke="#7a3b14" stroke-width="1"/>
    <!-- 胡须 -->
    <path d="M-6 -40 Q0 -30 6 -40" fill="none" stroke="#e8e8e8" stroke-width="2"/>
    <circle cx="-5" cy="-50" r="1.5" fill="#2a2a2a"/>
    <circle cx="5" cy="-50" r="1.5" fill="#2a2a2a"/>
    <path d="M-3 -42 Q0 -40 3 -42" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 身体 -->
    <path d="M-18 -34 L-24 30 L24 30 L18 -34 Z" fill="#4a4060" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 拐杖 -->
    <line x1="20" y1="-10" x2="28" y2="40" stroke="#5a4a2a" stroke-width="3"/>
    <path d="M18 -12 Q20 -16 24 -14" fill="none" stroke="#5a4a2a" stroke-width="3"/>
  </g>

  <!-- 儿童 -->
  <g transform="translate(480, 410)">
    <!-- 孩子1 -->
    <g transform="translate(-20, 0)">
      <circle cx="0" cy="-20" r="10" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 小辫子 -->
      <circle cx="0" cy="-28" r="3" fill="#2a2a2a"/>
      <circle cx="-5" cy="-18" r="1.2" fill="#2a2a2a"/>
      <circle cx="5" cy="-18" r="1.2" fill="#2a2a2a"/>
      <path d="M-3 -12 Q0 -10 3 -12" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-7 -8 L-9 15 L9 15 L7 -8 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="-4" y1="15" x2="-4" y2="28" stroke="#5a4a2a" stroke-width="2.5"/>
      <line x1="4" y1="15" x2="4" y2="28" stroke="#5a4a2a" stroke-width="2.5"/>
      <!-- 手指指向老人 -->
      <line x1="-7" y1="0" x2="-15" y2="-5" stroke="#f0d0a8" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- 孩子2 -->
    <g transform="translate(20, 5)">
      <circle cx="0" cy="-15" r="8" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="-3" cy="-15" r="1" fill="#2a2a2a"/>
      <circle cx="3" cy="-15" r="1" fill="#2a2a2a"/>
      <path d="M-2 -10 Q0 -8 2 -10" fill="none" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-6 -7 L-8 12 L8 12 L6 -7 Z" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="-3" y1="12" x2="-3" y2="22" stroke="#5a4a2a" stroke-width="2"/>
      <line x1="3" y1="12" x2="3" y2="22" stroke="#5a4a2a" stroke-width="2"/>
    </g>
  </g>

  <!-- 对话气泡 -->
  <g transform="translate(500, 360)">
    <rect x="-70" y="-20" width="140" height="30" fill="#fff8e0" stroke="#e07856" stroke-width="1.5" rx="6"/>
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="12" fill="#e07856">"客从何处来？"</text>
  </g>

  <!-- 底部说明 -->
  <rect x="100" y="510" width="600" height="55" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6" opacity="0.8"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">少小离家老大回——五十年乡音未改，鬓毛已衰，</text>
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">孩子们笑着问"客从何处来"，家乡已成他乡</text>
</svg>
