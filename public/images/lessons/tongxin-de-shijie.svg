<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="孩子蹲在草地上观察石头和蚂蚁的纯真场景">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空 -->
  <rect x="0" y="0" width="800" height="300" fill="#4a90b8" opacity="0.1"/>
  <!-- 云朵像绵羊 -->
  <g fill="#fff" opacity="0.85">
    <ellipse cx="180" cy="110" rx="34" ry="20"/>
    <ellipse cx="210" cy="118" rx="26" ry="16"/>
    <ellipse cx="155" cy="120" rx="22" ry="14"/>
    <circle cx="170" cy="112" r="4" fill="#7a3b14" opacity="0.4"/>
    <circle cx="200" cy="112" r="4" fill="#7a3b14" opacity="0.4"/>
  </g>
  <g fill="#fff" opacity="0.7">
    <ellipse cx="580" cy="90" rx="30" ry="18"/>
    <ellipse cx="606" cy="98" rx="22" ry="14"/>
  </g>
  <text x="180" y="155" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14" opacity="0.6">"那是一群绵羊在跑！"</text>
  <!-- 草地 -->
  <path d="M0 320 Q400 300 800 320 L800 600 L0 600 Z" fill="#2d6a4f" opacity="0.18"/>
  <path d="M0 360 Q400 348 800 360 L800 600 L0 600 Z" fill="#2d6a4f" opacity="0.22"/>
  <!-- 小草 -->
  <g stroke="#2d6a4f" stroke-width="2" opacity="0.5" fill="none">
    <path d="M60 440 Q62 430 64 440"/>
    <path d="M120 460 Q122 450 124 460"/>
    <path d="M620 470 Q622 460 624 470"/>
    <path d="M700 445 Q702 435 704 445"/>
    <path d="M380 470 Q382 460 384 470"/>
  </g>
  <!-- 蹲着的孩子 -->
  <g transform="translate(420 380)">
    <!-- 身体 -->
    <ellipse cx="0" cy="60" rx="36" ry="26" fill="#e07856"/>
    <!-- 头 -->
    <circle cx="0" cy="10" r="26" fill="#f0d0a8"/>
    <!-- 头发 -->
    <path d="M-24 6 Q-26 -18 0 -20 Q26 -18 24 6 Q20 -6 0 -8 Q-20 -6 -24 6 Z" fill="#3a2a1a"/>
    <!-- 眼睛(向下看) -->
    <path d="M-10 14 Q-7 18 -4 14" stroke="#2a2a2a" stroke-width="2" fill="none"/>
    <path d="M4 14 Q7 18 10 14" stroke="#2a2a2a" stroke-width="2" fill="none"/>
    <!-- 嘴 -->
    <path d="M-4 24 Q0 27 4 24" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
    <!-- 手 -->
    <circle cx="-30" cy="46" r="9" fill="#f0d0a8"/>
    <circle cx="30" cy="46" r="9" fill="#f0d0a8"/>
    <!-- 腿 -->
    <ellipse cx="-18" cy="92" rx="14" ry="10" fill="#4a90b8"/>
    <ellipse cx="18" cy="92" rx="14" ry="10" fill="#4a90b8"/>
  </g>
  <!-- 发光的石头(恐龙蛋) -->
  <g transform="translate(310 470)">
    <ellipse cx="0" cy="0" rx="34" ry="26" fill="#9aa0a6"/>
    <ellipse cx="-6" cy="-6" rx="12" ry="8" fill="#c0c4c8" opacity="0.7"/>
    <path d="M-22 -8 Q-8 -18 6 -10 Q20 -2 14 10" stroke="#e8a838" stroke-width="2" fill="none" opacity="0.8"/>
    <path d="M-16 4 Q0 -6 14 2" stroke="#e8a838" stroke-width="1.5" fill="none" opacity="0.6"/>
    <circle cx="20" cy="-12" r="3" fill="#e8a838" opacity="0.9"/>
  </g>
  <text x="310" y="520" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14" opacity="0.7">"这是恐龙蛋！"</text>
  <!-- 蚂蚁队伍 -->
  <g transform="translate(160 510)">
    <g fill="#3a2a1a">
      <circle cx="0" cy="0" r="3"/>
      <circle cx="14" cy="-2" r="3"/>
      <circle cx="28" cy="-4" r="3"/>
      <circle cx="42" cy="-2" r="3"/>
      <circle cx="56" cy="0" r="3"/>
      <circle cx="70" cy="2" r="3"/>
    </g>
    <g stroke="#3a2a1a" stroke-width="1" fill="none" opacity="0.6">
      <path d="M3 0 L11 -2"/>
      <path d="M17 -2 L25 -4"/>
      <path d="M31 -4 L39 -2"/>
      <path d="M45 -2 L53 0"/>
      <path d="M59 0 L67 2"/>
    </g>
    <!-- 米粒 -->
    <ellipse cx="-12" cy="2" rx="5" ry="2.5" fill="#e8a838"/>
  </g>
  <!-- 大人视角(虚影) -->
  <g transform="translate(640 300)" opacity="0.3">
    <rect x="-2" y="0" width="4" height="60" fill="#8d5a36"/>
    <circle cx="0" cy="-10" r="12" fill="#f0d0a8"/>
    <rect x="-10" y="2" width="20" height="30" fill="#7a7468"/>
    <text x="0" y="90" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">"快走吧"</text>
  </g>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#2d6a4f">童心的世界</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">童心是会发光的东西，别让它熄灭</text>
</svg>
