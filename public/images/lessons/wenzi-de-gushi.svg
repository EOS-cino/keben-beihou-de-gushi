<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从结绳到甲骨文的文字演变插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">文字的故事</text>
  <line x1="310" y1="62" x2="490" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 时间轴 -->
  <line x1="80" y1="330" x2="720" y2="330" stroke="#8d5a36" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="720,330 708,323 708,337" fill="#8d5a36"/>

  <!-- 阶段1：结绳记事 -->
  <g transform="translate(150, 180)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">结绳记事</text>
    <!-- 绳子 -->
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#8d5a36" stroke-width="3"/>
    <line x1="-40" y1="0" x2="-40" y2="80" stroke="#8d5a36" stroke-width="3"/>
    <line x1="40" y1="0" x2="40" y2="80" stroke="#8d5a36" stroke-width="3"/>
    <!-- 结 -->
    <circle cx="-40" cy="20" r="7" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-40" cy="45" r="5" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-40" cy="65" r="9" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="40" cy="25" r="6" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="40" cy="55" r="8" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 标注 -->
    <text x="-55" y="25" font-family="serif" font-size="9" fill="#8d5a36">小事</text>
    <text x="-58" y="68" font-family="serif" font-size="9" fill="#8d5a36">大事</text>
    <circle cx="0" cy="150" r="5" fill="#c84a3a"/>
    <text x="0" y="175" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">远古</text>
  </g>

  <!-- 阶段2：图画/符号 -->
  <g transform="translate(340, 180)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">图画符号</text>
    <!-- 岩画 -->
    <rect x="-50" y="-10" width="100" height="90" fill="#d8c9a8" stroke="#7a3b14" stroke-width="2" rx="4"/>
    <!-- 太阳 -->
    <circle cx="-25" cy="15" r="10" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="-25" cy="15" r="3" fill="#7a3b14"/>
    <g stroke="#7a3b14" stroke-width="1.5">
      <line x1="-25" y1="2" x2="-25" y2="-2"/>
      <line x1="-25" y1="28" x2="-25" y2="32"/>
      <line x1="-38" y1="15" x2="-42" y2="15"/>
      <line x1="-12" y1="15" x2="-8" y2="15"/>
    </g>
    <!-- 牛 -->
    <ellipse cx="20" cy="20" rx="14" ry="8" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M8 18 L4 12 M10 16 L6 10" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="34" y1="22" x2="38" y2="30" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="28" y1="28" x2="28" y2="35" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 山 -->
    <path d="M-30 65 L-15 45 L0 65 L15 45 L30 65" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="0" cy="150" r="5" fill="#c84a3a"/>
    <text x="0" y="175" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">原始</text>
  </g>

  <!-- 阶段3：甲骨文 -->
  <g transform="translate(530, 180)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">甲骨文</text>
    <!-- 龟甲 -->
    <path d="M-45 0 Q-45 -15 0 -20 Q45 -15 45 0 Q45 50 0 70 Q-45 50 -45 0 Z" fill="#d8c9a8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 龟甲纹路 -->
    <path d="M-30 10 L30 10 M-25 25 L25 25 M-20 40 L20 40" stroke="#c8843a" stroke-width="1" opacity="0.5"/>
    <!-- 甲骨文字 -->
    <g fill="#7a3b14" font-family="serif" font-size="16">
      <text x="-15" y="15">日</text>
      <text x="5" y="15">月</text>
      <text x="-15" y="35">山</text>
      <text x="5" y="35">水</text>
    </g>
    <!-- 裂纹 -->
    <path d="M-20 -5 Q0 5 20 -5" fill="none" stroke="#c84a3a" stroke-width="1.5"/>
    <circle cx="0" cy="150" r="5" fill="#c84a3a"/>
    <text x="0" y="175" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">商朝</text>
  </g>

  <!-- 阶段4：竹简 -->
  <g transform="translate(680, 180)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">竹简</text>
    <g>
      <rect x="-25" y="-10" width="8" height="90" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1"/>
      <rect x="-15" y="-10" width="8" height="90" fill="#a06a3a" stroke="#5a3a1a" stroke-width="1"/>
      <rect x="-5" y="-10" width="8" height="90" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1"/>
      <rect x="5" y="-10" width="8" height="90" fill="#a06a3a" stroke="#5a3a1a" stroke-width="1"/>
      <rect x="15" y="-10" width="8" height="90" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1"/>
      <!-- 串绳 -->
      <line x1="-25" y1="5" x2="23" y2="5" stroke="#c84a3a" stroke-width="2"/>
      <line x1="-25" y1="65" x2="23" y2="65" stroke="#c84a3a" stroke-width="2"/>
      <!-- 字 -->
      <text x="-11" y="25" font-family="serif" font-size="8" fill="#5a3a1a">学</text>
      <text x="-1" y="25" font-family="serif" font-size="8" fill="#5a3a1a">而</text>
      <text x="9" y="25" font-family="serif" font-size="8" fill="#5a3a1a">时</text>
    </g>
    <circle cx="0" cy="150" r="5" fill="#6a8d3f"/>
    <text x="0" y="175" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">周秦汉</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="540" width="700" height="42" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.85"/>
  <text x="400" y="566" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">从绳结到图画，从甲骨到竹简——文字让记忆不再害怕遗忘。</text>
</svg>
