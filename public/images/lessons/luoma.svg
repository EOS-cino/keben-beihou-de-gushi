<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="古罗马城建筑和罗马大道的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">罗马不是一天建成的</text>
  <line x1="280" y1="58" x2="520" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="64" width="800" height="240" fill="#d8e0e8"/>
  <!-- 远山 -->
  <path d="M0 304 Q200 260 400 290 Q600 255 800 295 L800 304 L0 304 Z" fill="#9aa8a0" opacity="0.4"/>

  <!-- 斗兽场（主体） -->
  <g transform="translate(400,300)">
    <!-- 外圈椭圆 -->
    <ellipse cx="0" cy="60" rx="180" ry="30" fill="#8d7a5a" opacity="0.4"/>
    <path d="M-160 60 Q-160 -80 -100 -100 Q0 -110 100 -100 Q160 -80 160 60" fill="#c8b898" stroke="#7a3b14" stroke-width="2"/>
    <!-- 拱门层（第一层） -->
    <g fill="#7a3b14" opacity="0.7">
      <path d="M-140 -10 Q-130 -40 -120 -10 Z"/>
      <path d="M-110 -10 Q-100 -40 -90 -10 Z"/>
      <path d="M-80 -10 Q-70 -40 -60 -10 Z"/>
      <path d="M-50 -10 Q-40 -40 -30 -10 Z"/>
      <path d="M-20 -10 Q-10 -40 0 -10 Z"/>
      <path d="M10 -10 Q20 -40 30 -10 Z"/>
      <path d="M40 -10 Q50 -40 60 -10 Z"/>
      <path d="M70 -10 Q80 -40 90 -10 Z"/>
      <path d="M100 -10 Q110 -40 120 -10 Z"/>
    </g>
    <!-- 第二层拱门 -->
    <g fill="#7a3b14" opacity="0.5">
      <path d="M-130 -50 Q-122 -75 -114 -50 Z"/>
      <path d="M-100 -50 Q-92 -75 -84 -50 Z"/>
      <path d="M-70 -50 Q-62 -75 -54 -50 Z"/>
      <path d="M-40 -50 Q-32 -75 -24 -50 Z"/>
      <path d="M-10 -50 Q-2 -75 6 -50 Z"/>
      <path d="M20 -50 Q28 -75 36 -50 Z"/>
      <path d="M50 -50 Q58 -75 66 -50 Z"/>
      <path d="M80 -50 Q88 -75 96 -50 Z"/>
      <path d="M110 -50 Q118 -75 126 -50 Z"/>
    </g>
    <!-- 顶层 -->
    <rect x="-140" y="-95" width="280" height="12" fill="#b8a878" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 断裂部分（右侧残缺） -->
    <path d="M130 -10 Q140 -30 150 -5 L155 60 L130 60 Z" fill="#fef9ed"/>
  </g>

  <!-- 罗马大道（透视） -->
  <g transform="translate(400,460)">
    <path d="M-200 0 L-60 -40 L60 -40 L200 0 L200 50 L-200 50 Z" fill="#c8b898" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 石板缝 -->
    <g stroke="#8d7a5a" stroke-width="1">
      <line x1="-160" y1="0" x2="-160" y2="50"/>
      <line x1="-120" y1="-10" x2="-120" y2="50"/>
      <line x1="-80" y1="-25" x2="-80" y2="50"/>
      <line x1="-40" y1="-35" x2="-40" y2="50"/>
      <line x1="0" y1="-40" x2="0" y2="50"/>
      <line x1="40" y1="-35" x2="40" y2="50"/>
      <line x1="80" y1="-25" x2="80" y2="50"/>
      <line x1="120" y1="-10" x2="120" y2="50"/>
      <line x1="160" y1="0" x2="160" y2="50"/>
    </g>
    <!-- 路边排水沟 -->
    <rect x="-205" y="0" width="6" height="50" fill="#8d7a5a"/>
    <rect x="199" y="0" width="6" height="50" fill="#8d7a5a"/>
  </g>

  <!-- 引水渠（左侧远景） -->
  <g transform="translate(120,340)">
    <g fill="#c8b898" stroke="#7a3b14" stroke-width="1.5">
      <rect x="-50" y="0" width="10" height="80"/>
      <rect x="-20" y="0" width="10" height="80"/>
      <rect x="10" y="0" width="10" height="80"/>
      <rect x="40" y="0" width="10" height="80"/>
      <rect x="-55" y="-10" width="110" height="14"/>
      <!-- 拱 -->
      <path d="M-40 0 Q-30 -20 -20 0" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-10 0 Q0 -20 10 0" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M20 0 Q30 -20 40 0" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
  </g>

  <!-- 标注：斗兽场 -->
  <line x1="450" y1="220" x2="540" y2="180" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="520" y="160" width="100" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="570" y="179" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">斗兽场</text>

  <!-- 标注：罗马大道 -->
  <line x1="300" y1="470" x2="220" y2="510" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="140" y="496" width="100" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="190" y="515" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">罗马大道</text>

  <!-- 标注：引水渠 -->
  <line x1="120" y1="330" x2="60" y2="300" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="20" y="286" width="90" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="65" y="305" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">引水渠</text>

  <!-- 底部说明 -->
  <rect x="40" y="528" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="553" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">斗兽场、罗马大道、引水渠——都是几百年一砖一瓦建起来的，所以罗马不是一天建成的。</text>
</svg>
