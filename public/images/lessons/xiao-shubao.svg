<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一个打开的小书包里面装着文具的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">小书包</text>

  <!-- 书包主体 -->
  <g transform="translate(400,340)">
    <!-- 背带 -->
    <path d="M-120 -80 Q-160 -120 -130 -160" fill="none" stroke="#c8843a" stroke-width="8" stroke-linecap="round"/>
    <path d="M120 -80 Q160 -120 130 -160" fill="none" stroke="#c8843a" stroke-width="8" stroke-linecap="round"/>
    <!-- 书包身 -->
    <rect x="-150" y="-80" width="300" height="240" rx="25" fill="#e07856"/>
    <rect x="-150" y="-80" width="300" height="240" rx="25" fill="none" stroke="#c84a3a" stroke-width="3"/>
    <!-- 书包盖 -->
    <path d="M-150 -80 Q-150 -110 -120 -110 L120 -110 Q150 -110 150 -80 L150 -50 L-150 -50 Z" fill="#c84a3a"/>
    <!-- 拉链 -->
    <line x1="-140" y1="-50" x2="140" y2="-50" stroke="#8d5a36" stroke-width="2"/>
    <circle cx="0" cy="-50" r="8" fill="#f4b942" stroke="#8d5a36" stroke-width="1.5"/>
    <!-- 前口袋 -->
    <rect x="-80" y="20" width="160" height="100" rx="12" fill="#c84a3a" stroke="#8d5a36" stroke-width="2"/>
    <line x1="-70" y1="50" x2="70" y2="50" stroke="#8d5a36" stroke-width="1.5"/>
    <circle cx="0" cy="50" r="6" fill="#f4b942" stroke="#8d5a36" stroke-width="1"/>
  </g>

  <!-- 飞出来的文具 -->
  <!-- 铅笔 -->
  <g transform="translate(160,200) rotate(-20)">
    <rect x="0" y="0" width="120" height="16" fill="#f4b942"/>
    <polygon points="120,0 120,16 140,8" fill="#8d5a36"/>
    <polygon points="140,4 140,12 148,8" fill="#3a2a1a"/>
    <rect x="0" y="0" width="20" height="16" fill="#e07856"/>
    <rect x="0" y="2" width="8" height="12" fill="#c84a3a"/>
    <text x="60" y="-10" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">铅笔</text>
  </g>

  <!-- 橡皮 -->
  <g transform="translate(620,180)">
    <rect x="0" y="0" width="60" height="35" rx="4" fill="#e07856"/>
    <rect x="0" y="0" width="60" height="12" rx="4" fill="#fef9ed" stroke="#c8843a" stroke-width="1"/>
    <text x="30" y="55" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">橡皮</text>
  </g>

  <!-- 尺子 -->
  <g transform="translate(580,420) rotate(15)">
    <rect x="0" y="0" width="140" height="22" rx="3" fill="#a8d0e8" stroke="#7ab8d8" stroke-width="1.5"/>
    <g stroke="#4a8ab8" stroke-width="1">
      <line x1="15" y1="0" x2="15" y2="8"/>
      <line x1="30" y1="0" x2="30" y2="6"/>
      <line x1="45" y1="0" x2="45" y2="8"/>
      <line x1="60" y1="0" x2="60" y2="6"/>
      <line x1="75" y1="0" x2="75" y2="8"/>
      <line x1="90" y1="0" x2="90" y2="6"/>
      <line x1="105" y1="0" x2="105" y2="8"/>
      <line x1="120" y1="0" x2="120" y2="6"/>
    </g>
    <text x="70" y="40" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">尺子</text>
  </g>

  <!-- 作业本 -->
  <g transform="translate(130,430) rotate(-10)">
    <rect x="0" y="0" width="90" height="110" rx="4" fill="#fef9ed" stroke="#c8843a" stroke-width="2"/>
    <line x1="10" y1="25" x2="80" y2="25" stroke="#a8d0e8" stroke-width="1"/>
    <line x1="10" y1="45" x2="80" y2="45" stroke="#a8d0e8" stroke-width="1"/>
    <line x1="10" y1="65" x2="80" y2="65" stroke="#a8d0e8" stroke-width="1"/>
    <line x1="10" y1="85" x2="80" y2="85" stroke="#a8d0e8" stroke-width="1"/>
    <text x="45" y="130" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">作业本</text>
  </g>

  <!-- 底部文字 -->
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">上课静悄悄，下课不乱跑</text>
</svg>
