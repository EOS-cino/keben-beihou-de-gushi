<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="雨后泥路小草凤蝶与新阳的画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">在天晴了的时候</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#3a7d44" stroke-width="2"/>
  <!-- 太阳从云后 -->
  <ellipse cx="160" cy="160" rx="80" ry="26" fill="#e8eef2"/>
  <circle cx="180" cy="160" r="40" fill="#f0c068"/>
  <line x1="180" y1="100" x2="180" y2="120" stroke="#f0c068" stroke-width="3"/>
  <line x1="120" y1="160" x2="140" y2="160" stroke="#f0c068" stroke-width="3"/>
  <line x1="240" y1="160" x2="220" y2="160" stroke="#f0c068" stroke-width="3"/>
  <!-- 残雨滴 -->
  <circle cx="300" cy="140" r="3" fill="#5d8aa8"/>
  <circle cx="360" cy="120" r="2.5" fill="#5d8aa8"/>
  <circle cx="500" cy="130" r="3" fill="#5d8aa8"/>
  <!-- 泥路 -->
  <path d="M 0 460 q 200 -40 400 0 q 200 40 400 0 l 0 140 l -800 0 z" fill="#8a6d3b" opacity="0.5"/>
  <!-- 小草 -->
  <path d="M 150 460 q 0 -40 6 -60" stroke="#3a7d44" stroke-width="3" fill="none"/>
  <path d="M 160 460 q 4 -36 0 -56" stroke="#3a7d44" stroke-width="3" fill="none"/>
  <circle cx="156" cy="400" r="3" fill="#5d8aa8"/>
  <path d="M 300 470 q 0 -40 6 -60" stroke="#3a7d44" stroke-width="3" fill="none"/>
  <path d="M 312 470 q 4 -36 0 -56" stroke="#3a7d44" stroke-width="3" fill="none"/>
  <path d="M 500 460 q 0 -40 6 -60" stroke="#3a7d44" stroke-width="3" fill="none"/>
  <path d="M 512 460 q 4 -36 0 -56" stroke="#3a7d44" stroke-width="3" fill="none"/>
  <path d="M 640 470 q 0 -40 6 -60" stroke="#3a7d44" stroke-width="3" fill="none"/>
  <!-- 小白菊 -->
  <circle cx="430" cy="440" r="16" fill="#ffffff" stroke="#e88aa8" stroke-width="2"/>
  <circle cx="430" cy="440" r="6" fill="#f0c419"/>
  <line x1="430" y1="456" x2="430" y2="490" stroke="#3a7d44" stroke-width="2"/>
  <!-- 凤蝶 -->
  <ellipse cx="560" cy="350" rx="8" ry="14" fill="#3a3a3a"/>
  <path d="M 552 340 q -26 -20 -34 6 q 6 18 30 14 z" fill="#e8a04e"/>
  <path d="M 568 340 q 26 -20 34 6 q -6 18 -30 14 z" fill="#e8a04e"/>
  <path d="M 552 356 q -22 8 -28 26 q 14 4 28 -10 z" fill="#c8553d"/>
  <path d="M 568 356 q 22 8 28 26 q -14 4 -28 -10 z" fill="#c8553d"/>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14">雨后小径，请到田野走走</text>
</svg>
