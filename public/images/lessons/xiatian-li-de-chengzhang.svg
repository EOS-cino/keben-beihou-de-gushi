<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="夏天万物飞速生长的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#2d6a4f">夏天里的成长</text>
  <line x1="330" y1="56" x2="470" y2="56" stroke="#e8a838" stroke-width="2"/>

  <!-- 太阳 -->
  <circle cx="680" cy="120" r="30" fill="#e8a838" opacity="0.6"/>
  <circle cx="680" cy="120" r="22" fill="#e8a838" opacity="0.8"/>
  <line x1="680" y1="75" x2="680" y2="85" stroke="#e8a838" stroke-width="2" opacity="0.5"/>
  <line x1="680" y1="155" x2="680" y2="165" stroke="#e8a838" stroke-width="2" opacity="0.5"/>
  <line x1="635" y1="120" x2="645" y2="120" stroke="#e8a838" stroke-width="2" opacity="0.5"/>
  <line x1="715" y1="120" x2="725" y2="120" stroke="#e8a838" stroke-width="2" opacity="0.5"/>

  <!-- 左侧：竹子飞长 -->
  <g transform="translate(150, 320)">
    <text x="0" y="-180" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#2d6a4f">竹子·一夜长高</text>
    <!-- 竹竿 -->
    <rect x="-4" y="-150" width="8" height="150" fill="#5a8a3a" stroke="#2d6a4f" stroke-width="1.5"/>
    <!-- 竹节 -->
    <ellipse cx="0" cy="-120" rx="5" ry="2" fill="#2d6a4f"/>
    <ellipse cx="0" cy="-80" rx="5" ry="2" fill="#2d6a4f"/>
    <ellipse cx="0" cy="-40" rx="5" ry="2" fill="#2d6a4f"/>
    <!-- 竹叶 -->
    <path d="M 4 -130 Q 20 -135 28 -125" fill="none" stroke="#2d6a4f" stroke-width="2"/>
    <ellipse cx="24" cy="-128" rx="8" ry="2.5" fill="#5a8a3a" transform="rotate(-15 24 -128)"/>
    <path d="M -4 -100 Q -20 -105 -28 -95" fill="none" stroke="#2d6a4f" stroke-width="2"/>
    <ellipse cx="-24" cy="-98" rx="8" ry="2.5" fill="#5a8a3a" transform="rotate(15 -24 -98)"/>
    <path d="M 4 -60 Q 18 -65 26 -55" fill="none" stroke="#2d6a4f" stroke-width="2"/>
    <ellipse cx="22" cy="-58" rx="7" ry="2" fill="#5a8a3a" transform="rotate(-15 22 -58)"/>
    <!-- 生长箭头 -->
    <path d="M 20 -140 L 20 -80" fill="none" stroke="#e8a838" stroke-width="2" stroke-dasharray="4,3"/>
    <path d="M 16 -85 L 20 -75 L 24 -85" fill="none" stroke="#e8a838" stroke-width="2"/>
    <text x="35" y="-105" font-family="serif" font-size="11" fill="#e8a838">↑1米/天</text>
  </g>

  <!-- 中间：瓜藤蔓延 -->
  <g transform="translate(380, 340)">
    <text x="0" y="-160" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#2d6a4f">瓜藤·一天几寸</text>
    <!-- 瓜藤 -->
    <path d="M -80 0 Q -60 -20 -40 -5 Q -20 10 0 -15 Q 20 -30 40 -10 Q 60 5 80 -20" fill="none" stroke="#2d6a4f" stroke-width="3"/>
    <!-- 叶子 -->
    <ellipse cx="-60" cy="-15" rx="10" ry="7" fill="#5a8a3a" stroke="#2d6a4f" stroke-width="1" transform="rotate(-20 -60 -15)"/>
    <ellipse cx="-20" cy="0" rx="10" ry="7" fill="#5a8a3a" stroke="#2d6a4f" stroke-width="1" transform="rotate(15 -20 0)"/>
    <ellipse cx="20" cy="-22" rx="10" ry="7" fill="#5a8a3a" stroke="#2d6a4f" stroke-width="1" transform="rotate(-15 20 -22)"/>
    <ellipse cx="60" cy="-8" rx="10" ry="7" fill="#5a8a3a" stroke="#2d6a4f" stroke-width="1" transform="rotate(20 60 -8)"/>
    <!-- 小瓜 -->
    <ellipse cx="0" cy="-10" rx="6" ry="8" fill="#e8a838" stroke="#a07820" stroke-width="1"/>
    <line x1="-3" y1="-16" x2="-5" y2="-22" stroke="#2d6a4f" stroke-width="1.5"/>
    <!-- 蔓延箭头 -->
    <path d="M -70 20 L 70 -30" fill="none" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="11" fill="#e8a838">→ 蔓延生长</text>
  </g>

  <!-- 右侧：小猫长大 -->
  <g transform="translate(620, 340)">
    <text x="0" y="-160" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#2d6a4f">小猫·长肉长毛</text>
    <!-- 小猫 -->
    <g transform="translate(-30, -20)">
      <ellipse cx="0" cy="0" rx="14" ry="11" fill="#e07856" stroke="#a05030" stroke-width="1.5"/>
      <circle cx="-10" cy="-8" r="8" fill="#e07856" stroke="#a05030" stroke-width="1.5"/>
      <path d="M-14 -14 L-12 -18 L-9 -14" fill="#e07856" stroke="#a05030" stroke-width="1"/>
      <path d="M-8 -14 L-6 -18 L-3 -14" fill="#e07856" stroke="#a05030" stroke-width="1"/>
      <circle cx="-12" cy="-8" r="1.5" fill="#2a2a2a"/>
      <circle cx="-7" cy="-8" r="1.5" fill="#2a2a2a"/>
      <path d="M-11 -4 L-9 -2 L-7 -4" fill="none" stroke="#2a2a2a" stroke-width="1"/>
      <path d="M 10 0 Q 18 -2 22 2" fill="none" stroke="#a05030" stroke-width="2"/>
    </g>
    <!-- 箭头 -->
    <path d="M -5 -10 L 15 -10" fill="none" stroke="#e8a838" stroke-width="2" stroke-dasharray="4,3"/>
    <path d="M 10 -14 L 18 -10 L 10 -6" fill="none" stroke="#e8a838" stroke-width="2"/>
    <!-- 大猫 -->
    <g transform="translate(35, 0)">
      <ellipse cx="0" cy="0" rx="20" ry="15" fill="#e07856" stroke="#a05030" stroke-width="1.5"/>
      <circle cx="-14" cy="-10" r="11" fill="#e07856" stroke="#a05030" stroke-width="1.5"/>
      <path d="M-19 -18 L-16 -23 L-12 -18" fill="#e07856" stroke="#a05030" stroke-width="1"/>
      <path d="M-12 -18 L-9 -23 L-5 -18" fill="#e07856" stroke="#a05030" stroke-width="1"/>
      <circle cx="-17" cy="-10" r="2" fill="#2a2a2a"/>
      <circle cx="-10" cy="-10" r="2" fill="#2a2a2a"/>
      <path d="M-15 -4 L-13 -1 L-11 -4" fill="none" stroke="#2a2a2a" stroke-width="1"/>
      <path d="M 15 0 Q 25 -3 30 3" fill="none" stroke="#a05030" stroke-width="2.5"/>
    </g>
  </g>

  <!-- 底部：人的成长 -->
  <g transform="translate(400, 480)">
    <rect x="-280" y="0" width="560" height="50" fill="#fff6df" stroke="#e8a838" stroke-width="2" rx="8"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">"六月六，看谷秀"——万物有生长的黄金期，人也有</text>
    <text x="0" y="42" text-anchor="middle" font-family="serif" font-size="13" fill="#e8a838">少年时期就是人生的"夏天"：身体在长，知识在长，本领在长</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="14" fill="#2d6a4f">夏天是万物生长的季节——抓住黄金期，努力生长</text>
</svg>
