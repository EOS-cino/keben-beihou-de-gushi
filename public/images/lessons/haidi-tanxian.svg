<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="潜水器在海底探险、鱼群游动插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">海底探险</text>
  <line x1="330" y1="60" x2="470" y2="60" stroke="#e8a838" stroke-width="2"/>

  <!-- 海水（由浅到深） -->
  <rect x="0" y="80" width="800" height="120" fill="#4a90b8" opacity="0.3"/>
  <rect x="0" y="200" width="800" height="120" fill="#4a90b8" opacity="0.5"/>
  <rect x="0" y="320" width="800" height="120" fill="#2d6a4f" opacity="0.4"/>
  <rect x="0" y="440" width="800" height="120" fill="#1a3a4a" opacity="0.5"/>

  <!-- 海面光线 -->
  <g stroke="#fff8c8" stroke-width="2" opacity="0.3" stroke-linecap="round">
    <line x1="120" y1="80" x2="100" y2="220"/>
    <line x1="280" y1="80" x2="260" y2="200"/>
    <line x1="500" y1="80" x2="520" y2="210"/>
    <line x1="660" y1="80" x2="680" y2="200"/>
  </g>

  <!-- 海底地面 -->
  <path d="M0 520 Q200 500 400 515 Q600 525 800 510 L800 560 L0 560 Z" fill="#c8a878" opacity="0.6"/>

  <!-- 潜水器 -->
  <g transform="translate(400, 300)">
    <!-- 主体 -->
    <ellipse cx="0" cy="0" rx="70" ry="45" fill="#e8a838" stroke="#7a3b14" stroke-width="3"/>
    <ellipse cx="0" cy="0" rx="70" ry="45" fill="none" stroke="#c88820" stroke-width="1.5" opacity="0.5"/>
    <!-- 舷窗 -->
    <circle cx="-25" cy="-5" r="14" fill="#4a90b8" stroke="#7a3b14" stroke-width="3"/>
    <circle cx="-25" cy="-5" r="9" fill="#a8d8e8"/>
    <circle cx="20" cy="-5" r="12" fill="#4a90b8" stroke="#7a3b14" stroke-width="3"/>
    <circle cx="20" cy="-5" r="8" fill="#a8d8e8"/>
    <!-- 探照灯 -->
    <circle cx="60" cy="0" r="10" fill="#fff8c8" stroke="#7a3b14" stroke-width="2"/>
    <path d="M68 0 L120 -25 L120 25 Z" fill="#fff8c8" opacity="0.25"/>
    <!-- 机械臂 -->
    <path d="M-60 10 L-90 25 L-95 40" fill="none" stroke="#7a3b14" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-95" cy="42" r="6" fill="#6a4220" stroke="#7a3b14" stroke-width="2"/>
    <!-- 螺旋桨 -->
    <circle cx="-70" cy="0" r="8" fill="#6a4220" stroke="#7a3b14" stroke-width="2"/>
    <line x1="-78" y1="0" x2="-62" y2="0" stroke="#7a3b14" stroke-width="3"/>
    <line x1="-70" y1="-8" x2="-70" y2="8" stroke="#7a3b14" stroke-width="3"/>
    <!-- 顶部舱口 -->
    <rect x="-12" y="-48" width="24" height="10" fill="#6a4220" stroke="#7a3b14" stroke-width="2" rx="2"/>
  </g>

  <!-- 鱼群（浅层，彩色） -->
  <g transform="translate(150, 180)">
    <ellipse cx="0" cy="0" rx="18" ry="9" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-18 0 L-28 -7 L-28 7 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="8" cy="-2" r="2" fill="#2a2a2a"/>
    <path d="M5 4 Q12 7 18 4" fill="none" stroke="#7a3b14" stroke-width="1"/>
  </g>
  <g transform="translate(200, 210)">
    <ellipse cx="0" cy="0" rx="14" ry="7" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-14 0 L-22 -5 L-22 5 Z" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="6" cy="-1" r="1.5" fill="#2a2a2a"/>
  </g>
  <g transform="translate(620, 190)">
    <ellipse cx="0" cy="0" rx="16" ry="8" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-16 0 L-24 -6 L-24 6 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="7" cy="-2" r="2" fill="#2a2a2a"/>
  </g>

  <!-- 深海发光鱼 -->
  <g transform="translate(150, 400)">
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="#2d6a4f" opacity="0.8" stroke="#1a4a35" stroke-width="1.5"/>
    <path d="M-20 0 L-30 -8 L-30 8 Z" fill="#2d6a4f" opacity="0.8" stroke="#1a4a35" stroke-width="1.5"/>
    <!-- 发光灯笼 -->
    <line x1="15" y1="-10" x2="28" y2="-22" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="30" cy="-24" r="6" fill="#e8a838" opacity="0.8"/>
    <circle cx="30" cy="-24" r="3" fill="#fff8c8"/>
    <circle cx="8" cy="-2" r="3" fill="#e8a838"/>
  </g>

  <!-- 水母 -->
  <g transform="translate(640, 380)">
    <path d="M-22 0 Q-22 -25 0 -25 Q22 -25 22 0 Z" fill="#e07856" opacity="0.5" stroke="#7a3b14" stroke-width="1.5"/>
    <g stroke="#e07856" stroke-width="2" stroke-linecap="round" opacity="0.6" fill="none">
      <path d="M-15 0 Q-18 15 -12 30"/>
      <path d="M-5 0 Q-8 18 -2 35"/>
      <path d="M5 0 Q8 18 2 35"/>
      <path d="M15 0 Q18 15 12 30"/>
    </g>
  </g>

  <!-- 珊瑚 -->
  <g transform="translate(100, 500)">
    <path d="M0 30 L0 -10 M-10 30 L-10 0 M10 30 L10 -5 M-5 -10 L-5 -25 M5 -5 L5 -20" fill="none" stroke="#e07856" stroke-width="6" stroke-linecap="round"/>
    <circle cx="-5" cy="-25" r="4" fill="#e8a838"/>
    <circle cx="5" cy="-20" r="4" fill="#e8a838"/>
  </g>
  <g transform="translate(680, 510)">
    <path d="M0 20 L-10 -5 M0 20 L0 -10 M0 20 L10 -5 M-5 -5 L-8 -18 M5 -5 L8 -18" fill="none" stroke="#e07856" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- 海草 -->
  <g fill="none" stroke="#2d6a4f" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <path d="M250 530 Q255 490 248 450 Q252 420 258 400"/>
    <path d="M560 530 Q555 490 562 455 Q558 425 552 405"/>
  </g>

  <!-- 气泡 -->
  <g fill="none" stroke="#a8d8e8" stroke-width="1.5" opacity="0.7">
    <circle cx="320" cy="350" r="5"/>
    <circle cx="330" cy="320" r="3"/>
    <circle cx="480" cy="360" r="4"/>
    <circle cx="470" cy="330" r="6"/>
    <circle cx="475" cy="300" r="3"/>
  </g>

  <!-- 标注 -->
  <line x1="400" y1="255" x2="400" y2="215" stroke="#fef9ed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="340" y="188" width="120" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="400" y="206" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">载人潜水器</text>

  <line x1="150" y1="388" x2="90" y2="360" stroke="#fef9ed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="30" y="335" width="110" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="85" y="353" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">深海发光鱼</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">从阳光浅海到漆黑深海，每一层都藏着奇妙的生命</text>
</svg>
