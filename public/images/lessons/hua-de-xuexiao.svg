<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="雨后花孩子们从地下跑出来跳舞插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">花的学校</text>
  <line x1="320" y1="56" x2="480" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——花孩子们冲出地下学校，在草地上跳舞</text>

  <!-- 天空（雨后） -->
  <rect x="0" y="90" width="800" height="200" fill="#a8d0e8" opacity="0.6"/>
  <!-- 乌云 -->
  <ellipse cx="150" cy="130" rx="60" ry="25" fill="#8d5a36" opacity="0.3"/>
  <ellipse cx="200" cy="140" rx="50" ry="20" fill="#8d5a36" opacity="0.3"/>
  <ellipse cx="600" cy="125" rx="55" ry="22" fill="#8d5a36" opacity="0.3"/>
  <ellipse cx="650" cy="135" rx="45" ry="18" fill="#8d5a36" opacity="0.3"/>
  <!-- 雨滴 -->
  <g stroke="#7ab8d8" stroke-width="2" stroke-linecap="round">
    <line x1="120" y1="160" x2="115" y2="180"/>
    <line x1="160" y1="155" x2="155" y2="175"/>
    <line x1="200" y1="165" x2="195" y2="185"/>
    <line x1="580" y1="160" x2="575" y2="180"/>
    <line x1="620" y1="155" x2="615" y2="175"/>
    <line x1="660" y1="165" x2="655" y2="185"/>
  </g>
  <!-- 彩虹 -->
  <path d="M300 280 Q400 120 500 280" fill="none" stroke="#c84a3a" stroke-width="4" opacity="0.5"/>
  <path d="M310 280 Q400 135 490 280" fill="none" stroke="#e07856" stroke-width="4" opacity="0.5"/>
  <path d="M320 280 Q400 150 480 280" fill="none" stroke="#c8843a" stroke-width="4" opacity="0.5"/>
  <path d="M330 280 Q400 165 470 280" fill="none" stroke="#6a8d3f" stroke-width="4" opacity="0.5"/>
  <path d="M340 280 Q400 180 460 280" fill="none" stroke="#7ab8d8" stroke-width="4" opacity="0.5"/>

  <!-- 草地 -->
  <rect x="0" y="290" width="800" height="310" fill="#6a8d3f" opacity="0.3"/>
  <rect x="0" y="350" width="800" height="250" fill="#6a8d3f" opacity="0.4"/>
  <!-- 地下（学校） -->
  <rect x="0" y="420" width="800" height="180" fill="#8d5a36" opacity="0.25"/>

  <!-- 地下学校 -->
  <g transform="translate(400, 500)">
    <rect x="-120" y="-30" width="240" height="60" rx="5" fill="#8d5a36" opacity="0.2" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14" opacity="0.6">地下学校</text>
    <!-- 小花苞在地下 -->
    <circle cx="-80" cy="-10" r="5" fill="#c8843a" opacity="0.5"/>
    <circle cx="-50" cy="-15" r="5" fill="#e07856" opacity="0.5"/>
    <circle cx="-20" cy="-10" r="5" fill="#c84a3a" opacity="0.5"/>
    <circle cx="20" cy="-12" r="5" fill="#c8843a" opacity="0.5"/>
    <circle cx="50" cy="-15" r="5" fill="#e07856" opacity="0.5"/>
    <circle cx="80" cy="-10" r="5" fill="#c84a3a" opacity="0.5"/>
  </g>

  <!-- 花孩子们从地下冲出来 -->
  <!-- 花1（红色，跳舞） -->
  <g transform="translate(180, 360)">
    <path d="M0 60 Q-5 30 0 0" fill="none" stroke="#4a6a2f" stroke-width="3"/>
    <ellipse cx="-8" cy="30" rx="8" ry="4" fill="#6a8d3f" transform="rotate(-30 -8 30)"/>
    <ellipse cx="8" cy="20" rx="8" ry="4" fill="#6a8d3f" transform="rotate(30 8 20)"/>
    <circle cx="0" cy="-5" r="15" fill="#c84a3a"/>
    <circle cx="0" cy="-5" r="8" fill="#e07856"/>
    <circle cx="0" cy="-8" r="3" fill="#c8843a"/>
    <!-- 手臂 -->
    <path d="M-5 5 Q-20 -10 -25 -25" fill="none" stroke="#4a6a2f" stroke-width="2.5"/>
    <path d="M5 5 Q20 -10 25 -25" fill="none" stroke="#4a6a2f" stroke-width="2.5"/>
  </g>

  <!-- 花2（黄色，跳跃） -->
  <g transform="translate(320, 340)">
    <path d="M0 80 Q3 40 0 0" fill="none" stroke="#4a6a2f" stroke-width="3"/>
    <ellipse cx="-10" cy="40" rx="7" ry="3.5" fill="#6a8d3f" transform="rotate(-40 -10 40)"/>
    <ellipse cx="10" cy="30" rx="7" ry="3.5" fill="#6a8d3f" transform="rotate(40 10 30)"/>
    <circle cx="0" cy="-8" r="14" fill="#c8843a"/>
    <circle cx="0" cy="-8" r="7" fill="#e07856"/>
    <circle cx="0" cy="-10" r="3" fill="#7a3b14"/>
    <path d="M-5 0 Q-15 -15 -20 -30" fill="none" stroke="#4a6a2f" stroke-width="2.5"/>
    <path d="M5 0 Q15 -15 20 -30" fill="none" stroke="#4a6a2f" stroke-width="2.5"/>
  </g>

  <!-- 花3（紫色，仰头看天） -->
  <g transform="translate(480, 350)">
    <path d="M0 70 Q-3 35 0 0" fill="none" stroke="#4a6a2f" stroke-width="3"/>
    <ellipse cx="-8" cy="35" rx="7" ry="3.5" fill="#6a8d3f" transform="rotate(-30 -8 35)"/>
    <ellipse cx="8" cy="25" rx="7" ry="3.5" fill="#6a8d3f" transform="rotate(30 8 25)"/>
    <circle cx="0" cy="-10" r="13" fill="#7a3b8f"/>
    <circle cx="0" cy="-10" r="7" fill="#a878b8"/>
    <circle cx="0" cy="-12" r="3" fill="#c8843a"/>
    <!-- 仰头看天 -->
    <path d="M-3 -15 Q-8 -30 -5 -45" fill="none" stroke="#4a6a2f" stroke-width="2"/>
    <path d="M3 -15 Q8 -30 5 -45" fill="none" stroke="#4a6a2f" stroke-width="2"/>
  </g>

  <!-- 花4（粉色，刚冒头） -->
  <g transform="translate(620, 380)">
    <path d="M0 50 Q0 25 0 0" fill="none" stroke="#4a6a2f" stroke-width="2.5"/>
    <circle cx="0" cy="-5" r="10" fill="#e07856"/>
    <circle cx="0" cy="-5" r="5" fill="#c84a3a"/>
    <ellipse cx="-6" cy="20" rx="5" ry="3" fill="#6a8d3f"/>
  </g>

  <!-- 草 -->
  <g stroke="#4a6a2f" stroke-width="2" fill="none">
    <path d="M100 390 Q105 370 100 350"/>
    <path d="M250 395 Q255 375 250 355"/>
    <path d="M400 390 Q405 370 400 350"/>
    <path d="M550 395 Q555 375 550 355"/>
    <path d="M700 390 Q705 370 700 350"/>
  </g>

  <!-- 天上的妈妈（太阳/光） -->
  <g transform="translate(400, 130)">
    <circle cx="0" cy="0" r="25" fill="#e07856" opacity="0.6"/>
    <circle cx="0" cy="0" r="15" fill="#c8843a"/>
    <g stroke="#e07856" stroke-width="2" opacity="0.5">
      <line x1="0" y1="-30" x2="0" y2="-40"/>
      <line x1="25" y1="-15" x2="35" y2="-20"/>
      <line x1="-25" y1="-15" x2="-35" y2="-20"/>
      <line x1="30" y1="0" x2="40" y2="0"/>
      <line x1="-30" y1="0" x2="-40" y2="0"/>
    </g>
    <text x="0" y="-50" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">妈妈在天上</text>
  </g>

  <!-- 标注 -->
  <g transform="translate(400, 575)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">雨后放假 · 冲出地面 · 草地跳舞 · 仰望天空找妈妈</text>
  </g>
</svg>
