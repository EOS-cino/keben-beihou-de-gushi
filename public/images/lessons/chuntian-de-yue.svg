<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="孩子在春天树下等候燕子的成长插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#2d6a4f">春天的约</text>
  <line x1="354" y1="60" x2="446" y2="60" stroke="#e8a838" stroke-width="2"/>

  <!-- 春天天空 -->
  <rect x="0" y="72" width="800" height="300" fill="#4a90b8" opacity="0.08"/>
  <!-- 云 -->
  <ellipse cx="150" cy="130" rx="42" ry="14" fill="#fff" opacity="0.6"/>
  <ellipse cx="620" cy="110" rx="48" ry="15" fill="#fff" opacity="0.6"/>

  <!-- 飞来的燕子 -->
  <g transform="translate(540 150)">
    <path d="M -16 0 Q -8 -8 0 -5 Q 8 -8 16 0 Q 8 3 0 0 Q -8 3 -16 0" fill="#3a3a3a"/>
    <path d="M -10 0 Q -16 6 -20 12" fill="none" stroke="#3a3a3a" stroke-width="2"/>
    <path d="M 10 0 Q 16 6 20 12" fill="none" stroke="#3a3a3a" stroke-width="2"/>
    <!-- 飞行轨迹 -->
    <path d="M -60 10 Q -30 -8 0 0" fill="none" stroke="#e07856" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>
  </g>
  <g transform="translate(220 180) scale(0.8)">
    <path d="M -14 0 Q -7 -7 0 -4 Q 7 -7 14 0 Q 7 3 0 0 Q -7 3 -14 0" fill="#3a3a3a"/>
    <path d="M -9 0 Q -14 5 -17 10" fill="none" stroke="#3a3a3a" stroke-width="1.8"/>
    <path d="M 9 0 Q 14 5 17 10" fill="none" stroke="#3a3a3a" stroke-width="1.8"/>
  </g>

  <!-- 屋檐与燕窝 -->
  <g transform="translate(150 250)">
    <!-- 屋檐 -->
    <path d="M0 0 L180 0 L160 30 L20 30 Z" fill="#8a5a3a" stroke="#5a3a1a" stroke-width="1.5"/>
    <rect x="20" y="30" width="140" height="8" fill="#a87a5a"/>
    <!-- 燕窝（泥巢） -->
    <path d="M70 38 Q70 56 90 60 Q110 56 110 38 Z" fill="#8a6a3a" stroke="#5a4a2a" stroke-width="1.5"/>
    <ellipse cx="90" cy="50" rx="12" ry="6" fill="#5a4a2a"/>
    <!-- 燕窝旁的燕子 -->
    <g transform="translate(90 40)">
      <ellipse cx="0" cy="0" rx="8" ry="5" fill="#3a3a3a"/>
      <circle cx="-3" cy="-5" r="4" fill="#3a3a3a"/>
      <path d="M-7 -5 L-12 -8" stroke="#3a3a3a" stroke-width="2"/>
    </g>
  </g>

  <!-- 老槐树（右侧） -->
  <g transform="translate(620 420)">
    <path d="M -16 60 Q -20 0 -14 -50 Q -10 -90 -8 -120 L 8 -120 Q 10 -90 14 -50 Q 20 0 16 60 Z" fill="#8a6a3a" stroke="#5a4a2a" stroke-width="1.5"/>
    <circle cx="-20" cy="-110" r="32" fill="#3a7a5a"/>
    <circle cx="10" cy="-130" r="38" fill="#2d6a4f"/>
    <circle cx="25" cy="-100" r="30" fill="#3a7a5a"/>
    <!-- 嫩芽 -->
    <g fill="#e8a838">
      <circle cx="-25" cy="-120" r="2.5"/>
      <circle cx="15" cy="-140" r="2.5"/>
      <circle cx="-5" cy="-105" r="2"/>
    </g>
  </g>

  <!-- 迎春花（左下） -->
  <g transform="translate(80 440)">
    <rect x="-2" y="0" width="4" height="40" fill="#5a4a2a"/>
    <path d="M0 10 Q-15 5 -25 0" fill="none" stroke="#5a4a2a" stroke-width="2"/>
    <path d="M0 5 Q15 0 25 -5" fill="none" stroke="#5a4a2a" stroke-width="2"/>
    <g fill="#e8a838">
      <circle cx="-22" cy="2" r="4"/>
      <circle cx="22" cy="-3" r="4"/>
      <circle cx="-10" cy="12" r="3.5"/>
      <circle cx="10" cy="8" r="3.5"/>
    </g>
  </g>

  <!-- 柳树新芽（背景） -->
  <g transform="translate(420 300)">
    <path d="M0 0 Q-2 -30 -5 -60" fill="none" stroke="#5a4a2a" stroke-width="3"/>
    <path d="M-5 -50 Q-18 -45 -30 -40" fill="none" stroke="#5a4a2a" stroke-width="1.5"/>
    <g fill="#7aaa5a">
      <ellipse cx="-25" cy="-42" rx="2" ry="5" transform="rotate(-30 -25 -42)"/>
      <ellipse cx="5" cy="-58" rx="2" ry="5"/>
    </g>
  </g>

  <!-- 地面 -->
  <rect x="0" y="470" width="800" height="130" fill="#dceee3"/>
  <g fill="#2d6a4f" opacity="0.5">
    <path d="M120 490 Q124 478 120 470 Q128 478 132 490 Z"/>
    <path d="M300 500 Q304 488 300 480 Q308 488 312 500 Z"/>
    <path d="M500 495 Q504 483 500 475 Q508 483 512 495 Z"/>
    <path d="M680 492 Q684 480 680 472 Q688 480 692 492 Z"/>
  </g>

  <!-- 等候的男孩 -->
  <g transform="translate(330 470)">
    <path d="M-16 50 Q-18 18 -10 6 Q0 2 10 6 Q18 18 16 50 Z" fill="#4a90b8" stroke="#3a7090" stroke-width="1.5"/>
    <circle cx="0" cy="-12" r="13" fill="#f4d4a8"/>
    <path d="M-12 -16 Q0 -26 12 -16 L12 -10 Q0 -6 -12 -10 Z" fill="#3a3a3a"/>
    <!-- 仰头看燕窝 -->
    <path d="M-6 -14 L-8 -17" stroke="#2a2a2a" stroke-width="1.5"/>
    <path d="M6 -14 L8 -17" stroke="#2a2a2a" stroke-width="1.5"/>
    <path d="M-3 -8 Q0 -5 3 -8" fill="none" stroke="#8a4a3a" stroke-width="1.3"/>
    <!-- 手（指着燕窝） -->
    <path d="M-14 8 Q-30 -2 -44 -10" fill="none" stroke="#4a90b8" stroke-width="6" stroke-linecap="round"/>
    <circle cx="-46" cy="-11" r="4" fill="#f4d4a8"/>
  </g>

  <!-- 骑车赶来的朋友（远处） -->
  <g transform="translate(100 490)">
    <!-- 自行车 -->
    <circle cx="-15" cy="10" r="10" fill="none" stroke="#3a3a3a" stroke-width="2"/>
    <circle cx="15" cy="10" r="10" fill="none" stroke="#3a3a3a" stroke-width="2"/>
    <line x1="-15" y1="10" x2="15" y2="10" stroke="#3a3a3a" stroke-width="1.5"/>
    <line x1="15" y1="10" x2="5" y2="-8" stroke="#3a3a3a" stroke-width="1.5"/>
    <line x1="-15" y1="10" x2="5" y2="-8" stroke="#3a3a3a" stroke-width="1.5"/>
    <!-- 人 -->
    <circle cx="5" cy="-14" r="6" fill="#f4d4a8"/>
    <path d="M0 -8 L5 0 L10 -8 Z" fill="#e07856"/>
    <!-- 汗珠 -->
    <circle cx="0" cy="-16" r="1.5" fill="#4a90b8"/>
  </g>

  <!-- 标注 -->
  <line x1="540" y1="150" x2="540" y2="200" stroke="#e07856" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="480" y="204" width="120" height="26" fill="#fff6df" stroke="#e07856" rx="4"/>
  <text x="540" y="222" text-anchor="middle" font-family="serif" font-size="13" fill="#e07856">燕子归来</text>

  <line x1="240" y1="300" x2="240" y2="270" stroke="#8a5a14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="180" y="244" width="120" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="240" y="262" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a14">屋檐下的旧巢</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="15" fill="#2d6a4f">燕子回来了，朋友也来了——春天的约，守住了</text>
</svg>
