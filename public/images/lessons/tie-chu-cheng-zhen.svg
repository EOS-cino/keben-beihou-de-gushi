<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="老婆婆磨铁杵、李白在旁边的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#5a3a1a">铁杵成针</text>
  <line x1="310" y1="56" x2="490" y2="56" stroke="#c9952e" stroke-width="3"/>

  <!-- 天空 -->
  <rect x="0" y="65" width="800" height="260" fill="#c4dae8"/>
  <!-- 远山 -->
  <path d="M0 325 L100 250 L200 325 Z" fill="#8aa098" opacity="0.5"/>
  <path d="M150 325 L300 230 L450 325 Z" fill="#7a9088" opacity="0.5"/>
  <path d="M400 325 L550 260 L700 325 Z" fill="#8aa098" opacity="0.5"/>

  <!-- 溪流 -->
  <path d="M0 360 Q200 340 400 355 Q600 370 800 350 L800 400 Q600 420 400 405 Q200 390 0 410 Z" fill="#7ab0c8" stroke="#5a90a8" stroke-width="2"/>
  <!-- 水波纹 -->
  <g stroke="#a0c8d8" stroke-width="1.5" fill="none">
    <path d="M50 375 Q80 372 110 375"/>
    <path d="M200 370 Q230 367 260 370"/>
    <path d="M400 378 Q430 375 460 378"/>
    <path d="M580 372 Q610 369 640 372"/>
    <path d="M700 380 Q730 377 760 380"/>
  </g>
  <text x="700" y="395" text-anchor="middle" font-family="serif" font-size="14" fill="#3a6080">溪 水</text>

  <!-- 地面（河岸） -->
  <path d="M0 410 L800 410 L800 600 L0 600 Z" fill="#a8c870" stroke="#7a9a4a" stroke-width="2"/>
  <!-- 小草 -->
  <g stroke="#5a8a2a" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M50 415 L48 400 M58 415 L60 402"/>
    <path d="M350 415 L348 400 M358 415 L360 402"/>
    <path d="M650 415 L648 400 M658 415 L660 402"/>
  </g>

  <!-- 磨石（大石头） -->
  <ellipse cx="280" cy="470" rx="90" ry="25" fill="#9a9a9a" stroke="#5a5a5a" stroke-width="2.5"/>
  <path d="M190 470 Q190 440 280 435 Q370 440 370 470" fill="#b0b0b0" stroke="#5a5a5a" stroke-width="2.5"/>
  <ellipse cx="280" cy="438" rx="80" ry="12" fill="#c0c0c0" stroke="#7a7a7a" stroke-width="2"/>
  <!-- 磨痕 -->
  <path d="M220 440 Q280 435 340 440" fill="none" stroke="#7a7a7a" stroke-width="1.5"/>
  <path d="M230 445 Q280 442 330 445" fill="none" stroke="#7a7a7a" stroke-width="1"/>

  <!-- 铁杵（粗铁棍，一头被磨细） -->
  <g transform="translate(280, 430)">
    <!-- 主体（粗的一头在右） -->
    <path d="M-60 5 L-60 -5 Q-40 -10 -20 -8 L40 -6 Q55 -4 60 0 L60 0 Q55 4 40 6 L-20 8 Q-40 10 -60 5 Z" fill="#6a6a7a" stroke="#3a3a4a" stroke-width="2.5"/>
    <!-- 高光 -->
    <path d="M-50 -3 L40 -2" stroke="#a0a0b0" stroke-width="2" opacity="0.6"/>
    <!-- 被磨的一头（左边变细变亮） -->
    <ellipse cx="-60" cy="0" rx="8" ry="4" fill="#c0c0d0" stroke="#7a7a8a" stroke-width="1.5"/>
    <!-- 磨出的火花/粉末 -->
    <circle cx="-70" cy="-8" r="2" fill="#d4c060" opacity="0.8"/>
    <circle cx="-75" cy="3" r="1.5" fill="#d4c060" opacity="0.6"/>
    <circle cx="-68" cy="10" r="1.5" fill="#d4c060" opacity="0.7"/>
  </g>
  <text x="280" y="510" text-anchor="middle" font-family="serif" font-size="14" fill="#5a3a1a">铁杵（正在磨）</text>

  <!-- 绣花针（对比图，右上角） -->
  <g transform="translate(620, 200)">
    <text x="0" y="-20" text-anchor="middle" font-family="serif" font-size="14" fill="#5a3a1a">目标：绣花针</text>
    <!-- 放大镜框 -->
    <circle cx="0" cy="10" r="45" fill="none" stroke="#8a6a3a" stroke-width="3"/>
    <circle cx="0" cy="10" r="42" fill="#fffdf7" opacity="0.3"/>
    <!-- 针 -->
    <line x1="-25" y1="10" x2="25" y2="10" stroke="#c0c0d0" stroke-width="3" stroke-linecap="round"/>
    <!-- 针眼 -->
    <ellipse cx="25" cy="10" rx="4" ry="3" fill="none" stroke="#8a8a9a" stroke-width="1.5"/>
    <!-- 线 -->
    <path d="M29 10 Q35 20 30 30 Q25 40 35 45" fill="none" stroke="#c44a6a" stroke-width="1.5"/>
    <!-- 手柄 -->
    <line x1="32" y1="32" x2="55" y2="55" stroke="#8a6a3a" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- 老婆婆（弯腰磨铁杵） -->
  <g transform="translate(380, 410)">
    <text x="-20" y="-100" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#5a3a1a">老婆婆</text>
    <!-- 头（低头弯腰） -->
    <ellipse cx="-20" cy="-60" rx="18" ry="20" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 白发髻 -->
    <path d="M-38 -65 Q-20 -85 -2 -65 Q-10 -75 -20 -78 Q-30 -75 -38 -65" fill="#e8e8e8" stroke="#aaa" stroke-width="1.5"/>
    <circle cx="-20" cy="-80" r="6" fill="#e8e8e8" stroke="#aaa" stroke-width="1.5"/>
    <!-- 脸（朝下） -->
    <path d="M-28 -55 Q-20 -48 -12 -55" fill="none" stroke="#5a3a1a" stroke-width="1.5"/>
    <circle cx="-25" cy="-58" r="1.5" fill="#1a1a1a"/>
    <circle cx="-15" cy="-58" r="1.5" fill="#1a1a1a"/>
    <!-- 身体（弯腰） -->
    <path d="M-35 -45 Q-40 -20 -30 10 L10 10 L20 -20 Q10 -45 -5 -45 Z" fill="#7a5a4a" stroke="#3a2a1a" stroke-width="2"/>
    <!-- 手臂（伸向磨石） -->
    <path d="M-35 -30 Q-60 -20 -80 0" fill="none" stroke="#7a5a4a" stroke-width="12" stroke-linecap="round"/>
    <circle cx="-82" cy="2" r="8" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 另一只手 -->
    <path d="M-30 -25 Q-50 -10 -65 5" fill="none" stroke="#7a5a4a" stroke-width="12" stroke-linecap="round"/>
    <circle cx="-67" cy="7" r="8" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
  </g>

  <!-- 小李白（站在旁边惊讶地看着） -->
  <g transform="translate(560, 380)">
    <text x="0" y="-130" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#5a3a1a">李白（少年）</text>
    <!-- 头 -->
    <circle cx="0" cy="-95" r="20" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 发髻 -->
    <path d="M-18 -100 Q0 -120 18 -100" fill="#3a2a1a" stroke="#1a0a00" stroke-width="1.5"/>
    <circle cx="0" cy="-118" r="8" fill="#3a2a1a" stroke="#1a0a00" stroke-width="1.5"/>
    <!-- 眼睛（惊讶，大眼睛） -->
    <circle cx="-7" cy="-95" r="4" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="7" cy="-95" r="4" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="-7" cy="-95" r="2" fill="#1a1a1a"/>
    <circle cx="7" cy="-95" r="2" fill="#1a1a1a"/>
    <!-- 嘴（张开惊讶） -->
    <ellipse cx="0" cy="-82" rx="3" ry="4" fill="#6a3a2a"/>
    <!-- 身体（小书童装） -->
    <path d="M-22 -75 L-30 30 L30 30 L22 -75 Z" fill="#4a6a8a" stroke="#2a3a5a" stroke-width="2"/>
    <!-- 衣领 -->
    <path d="M-8 -75 L0 -55 L8 -75" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 腰带 -->
    <rect x="-25" y="-15" width="50" height="8" fill="#c9952e"/>
    <!-- 手臂（一只指向铁杵） -->
    <path d="M-22 -60 Q-50 -50 -70 -35" fill="none" stroke="#4a6a8a" stroke-width="12" stroke-linecap="round"/>
    <circle cx="-72" cy="-33" r="8" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 书包/书卷（在身后） -->
    <rect x="20" y="-50" width="15" height="40" fill="#c4a070" stroke="#7a5a20" stroke-width="1.5" rx="2"/>
  </g>

  <!-- 对话气泡（李白） -->
  <path d="M460 250 Q460 225 490 225 L580 225 Q610 225 610 250 L610 275 Q610 285 600 285 L520 285 L505 298 L510 285 L470 285 Q460 285 460 275 Z" fill="#fffdf7" stroke="#5a3a1a" stroke-width="2"/>
  <text x="535" y="250" text-anchor="middle" font-family="serif" font-size="13" fill="#5a3a1a">"这么粗，</text>
  <text x="535" y="268" text-anchor="middle" font-family="serif" font-size="13" fill="#5a3a1a">什么时候能磨成针？"</text>

  <!-- 老婆婆回答气泡 -->
  <path d="M180 300 Q180 275 210 275 L340 275 Q370 275 370 300 L370 330 Q370 340 360 340 L260 340 L245 353 L250 340 L190 340 Q180 340 180 330 Z" fill="#fffdf7" stroke="#5a3a1a" stroke-width="2"/>
  <text x="275" y="300" text-anchor="middle" font-family="serif" font-size="13" fill="#5a3a1a">"只要功夫深，</text>
  <text x="275" y="318" text-anchor="middle" font-family="serif" font-size="13" fill="#5a3a1a">铁杵磨成针！"</text>
</svg>
