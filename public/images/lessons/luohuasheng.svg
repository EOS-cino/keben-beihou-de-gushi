<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="花生地、餐桌和灯光插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">落花生</text>
  <line x1="320" y1="62" x2="480" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="80" width="800" height="220" fill="#e8f0d8"/>
  <!-- 远山 -->
  <path d="M0 300 L120 230 L240 270 L360 220 L480 260 L600 225 L720 265 L800 240 L800 320 L0 320 Z" fill="#c8d8b0" opacity="0.6"/>

  <!-- 地面（花生地） -->
  <rect x="0" y="300" width="800" height="300" fill="#d8b878"/>
  <!-- 土壤纹理 -->
  <path d="M0 320 Q200 315 400 320 T800 320" fill="none" stroke="#b89858" stroke-width="2"/>
  <path d="M0 350 Q150 345 300 350 T600 350 T800 350" fill="none" stroke="#b89858" stroke-width="2"/>

  <!-- 地下截面（显示花生果实） -->
  <rect x="80" y="380" width="640" height="200" fill="#c8a868" opacity="0.4"/>
  <line x1="80" y1="380" x2="720" y2="380" stroke="#a88848" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- 花生植株1 -->
  <!-- 茎 -->
  <path d="M180 380 Q175 320 170 280 Q168 250 175 220" fill="none" stroke="#5a8a3a" stroke-width="4"/>
  <!-- 叶子 -->
  <ellipse cx="160" cy="260" rx="18" ry="12" fill="#6a9a4a" stroke="#4a7a2a" stroke-width="1.5" transform="rotate(-30 160 260)"/>
  <ellipse cx="190" cy="250" rx="18" ry="12" fill="#6a9a4a" stroke="#4a7a2a" stroke-width="1.5" transform="rotate(20 190 250)"/>
  <ellipse cx="155" cy="230" rx="16" ry="11" fill="#7aaa5a" stroke="#4a7a2a" stroke-width="1.5" transform="rotate(-20 155 230)"/>
  <ellipse cx="185" cy="225" rx="16" ry="11" fill="#7aaa5a" stroke="#4a7a2a" stroke-width="1.5" transform="rotate(25 185 225)"/>
  <ellipse cx="170" cy="205" rx="14" ry="10" fill="#6a9a4a" stroke="#4a7a2a" stroke-width="1.5"/>
  <!-- 小黄花 -->
  <circle cx="172" cy="195" r="6" fill="#f4c842" stroke="#c89030" stroke-width="1"/>
  <circle cx="172" cy="195" r="2.5" fill="#c89030"/>
  <!-- 地下花生果实 -->
  <g>
    <ellipse cx="170" cy="430" rx="14" ry="22" fill="#e8d098" stroke="#b89858" stroke-width="1.5" transform="rotate(-10 170 430)"/>
    <ellipse cx="170" cy="445" rx="14" ry="22" fill="#e8d098" stroke="#b89858" stroke-width="1.5" transform="rotate(10 170 445)"/>
    <ellipse cx="170" cy="460" rx="14" ry="20" fill="#e8d098" stroke="#b89858" stroke-width="1.5" transform="rotate(-5 170 460)"/>
    <line x1="170" y1="415" x2="170" y2="475" stroke="#c8a868" stroke-width="1"/>
  </g>

  <!-- 花生植株2 -->
  <path d="M400 380 Q395 320 390 270 Q388 240 395 210" fill="none" stroke="#5a8a3a" stroke-width="4"/>
  <ellipse cx="380" cy="250" rx="18" ry="12" fill="#6a9a4a" stroke="#4a7a2a" stroke-width="1.5" transform="rotate(-30 380 250)"/>
  <ellipse cx="410" cy="240" rx="18" ry="12" fill="#6a9a4a" stroke="#4a7a2a" stroke-width="1.5" transform="rotate(20 410 240)"/>
  <ellipse cx="375" cy="220" rx="16" ry="11" fill="#7aaa5a" stroke="#4a7a2a" stroke-width="1.5" transform="rotate(-20 375 220)"/>
  <ellipse cx="405" cy="215" rx="16" ry="11" fill="#7aaa5a" stroke="#4a7a2a" stroke-width="1.5" transform="rotate(25 405 215)"/>
  <ellipse cx="390" cy="195" rx="14" ry="10" fill="#6a9a4a" stroke="#4a7a2a" stroke-width="1.5"/>
  <circle cx="392" cy="185" r="6" fill="#f4c842" stroke="#c89030" stroke-width="1"/>
  <circle cx="392" cy="185" r="2.5" fill="#c89030"/>
  <!-- 地下花生果实 -->
  <g>
    <ellipse cx="390" cy="425" rx="14" ry="22" fill="#e8d098" stroke="#b89858" stroke-width="1.5" transform="rotate(-12 390 425)"/>
    <ellipse cx="390" cy="440" rx="14" ry="22" fill="#e8d098" stroke="#b89858" stroke-width="1.5" transform="rotate(8 390 440)"/>
    <ellipse cx="390" cy="455" rx="14" ry="20" fill="#e8d098" stroke="#b89858" stroke-width="1.5" transform="rotate(-8 390 455)"/>
    <ellipse cx="390" cy="470" rx="13" ry="18" fill="#e8d098" stroke="#b89858" stroke-width="1.5" transform="rotate(5 390 470)"/>
    <line x1="390" y1="410" x2="390" y2="485" stroke="#c8a868" stroke-width="1"/>
  </g>

  <!-- 花生植株3 -->
  <path d="M620 380 Q615 330 610 280 Q608 250 615 220" fill="none" stroke="#5a8a3a" stroke-width="4"/>
  <ellipse cx="600" cy="260" rx="18" ry="12" fill="#6a9a4a" stroke="#4a7a2a" stroke-width="1.5" transform="rotate(-30 600 260)"/>
  <ellipse cx="630" cy="250" rx="18" ry="12" fill="#6a9a4a" stroke="#4a7a2a" stroke-width="1.5" transform="rotate(20 630 250)"/>
  <ellipse cx="595" cy="230" rx="16" ry="11" fill="#7aaa5a" stroke="#4a7a2a" stroke-width="1.5" transform="rotate(-20 595 230)"/>
  <ellipse cx="625" cy="225" rx="16" ry="11" fill="#7aaa5a" stroke="#4a7a2a" stroke-width="1.5" transform="rotate(25 625 225)"/>
  <circle cx="612" cy="205" r="6" fill="#f4c842" stroke="#c89030" stroke-width="1"/>
  <circle cx="612" cy="205" r="2.5" fill="#c89030"/>
  <g>
    <ellipse cx="610" cy="430" rx="14" ry="22" fill="#e8d098" stroke="#b89858" stroke-width="1.5" transform="rotate(-10 610 430)"/>
    <ellipse cx="610" cy="445" rx="14" ry="22" fill="#e8d098" stroke="#b89858" stroke-width="1.5" transform="rotate(10 610 445)"/>
    <ellipse cx="610" cy="460" rx="14" ry="20" fill="#e8d098" stroke="#b89858" stroke-width="1.5" transform="rotate(-5 610 460)"/>
    <line x1="610" y1="415" x2="610" y2="475" stroke="#c8a868" stroke-width="1"/>
  </g>

  <!-- 父亲（右侧人物） -->
  <!-- 身体 -->
  <path d="M545 510 L555 410 L605 410 L615 510 Z" fill="#3a6a4a"/>
  <!-- 头 -->
  <circle cx="580" cy="390" r="22" fill="#f0d0a8"/>
  <!-- 头发 -->
  <path d="M558 385 Q580 362 602 385 L602 378 Q580 356 558 378 Z" fill="#3a3a3a"/>
  <!-- 眼睛 -->
  <circle cx="572" cy="389" r="2.5" fill="#2a2a2a"/>
  <circle cx="588" cy="389" r="2.5" fill="#2a2a2a"/>
  <!-- 嘴（微笑） -->
  <path d="M573 400 Q580 405 587 400" fill="none" stroke="#7a3b14" stroke-width="2"/>
  <!-- 手臂（拿着花生讲解） -->
  <path d="M555 425 L520 450" fill="none" stroke="#3a6a4a" stroke-width="10" stroke-linecap="round"/>
  <circle cx="518" cy="452" r="7" fill="#f0d0a8"/>
  <!-- 手中的花生 -->
  <ellipse cx="515" cy="445" rx="8" ry="14" fill="#e8d098" stroke="#b89858" stroke-width="1.5" transform="rotate(-20 515 445)"/>

  <!-- 孩子（左侧人物，较小） -->
  <!-- 身体 -->
  <path d="M260 510 L268 440 L298 440 L306 510 Z" fill="#c84030"/>
  <!-- 头 -->
  <circle cx="284" cy="422" r="17" fill="#f0d0a8"/>
  <!-- 头发 -->
  <path d="M267 418 Q284 400 301 418 L301 412 Q284 396 267 412 Z" fill="#2a2a2a"/>
  <!-- 眼睛 -->
  <circle cx="278" cy="422" r="2" fill="#2a2a2a"/>
  <circle cx="290" cy="422" r="2" fill="#2a2a2a"/>
  <!-- 嘴 -->
  <path d="M279 430 Q284 433 289 430" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
  <!-- 手臂（举起听讲） -->
  <path d="M298 455 L320 435" fill="none" stroke="#c84030" stroke-width="8" stroke-linecap="round"/>
  <circle cx="322" cy="433" r="5" fill="#f0d0a8"/>

  <!-- 父亲标注 -->
  <line x1="580" y1="365" x2="580" y2="320" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="535" y="295" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="580" y="313" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">父亲</text>

  <!-- 孩子标注 -->
  <line x1="284" y1="402" x2="284" y2="360" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="239" y="335" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="284" y="353" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">孩子们</text>

  <!-- 花生果实标注 -->
  <line x1="390" y1="490" x2="390" y2="530" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="335" y="535" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="390" y="553" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">地下果实</text>

  <!-- 花生植株标注 -->
  <line x1="175" y1="200" x2="175" y2="160" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="120" y="135" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="175" y="153" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">花生植株</text>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">花生扎根地下，朴实无华，父亲以此教导孩子做踏实有用之人</text>
</svg>