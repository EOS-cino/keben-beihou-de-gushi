<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="四季场景插画：春草、夏荷、秋穗、冬雪人">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">四季</text>
  <line x1="340" y1="56" x2="460" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 分隔十字线 -->
  <line x1="400" y1="80" x2="400" y2="540" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="40" y1="310" x2="760" y2="310" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- ===== 春：草芽 ===== -->
  <rect x="40" y="80" width="360" height="230" fill="#e8f5d8" opacity="0.5"/>
  <text x="220" y="105" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#5a8a3a">春</text>
  <!-- 土地 -->
  <rect x="40" y="270" width="360" height="40" fill="#c4a878"/>
  <!-- 草芽 -->
  <path d="M180 270 Q175 240 185 220 Q195 240 190 270" fill="#6ab04c"/>
  <path d="M210 270 Q205 245 215 228 Q225 245 220 270" fill="#7cc85a"/>
  <path d="M240 270 Q235 250 243 235 Q251 250 248 270" fill="#6ab04c"/>
  <path d="M160 270 Q156 255 162 243 Q168 255 165 270" fill="#7cc85a"/>
  <path d="M270 270 Q266 252 274 240 Q282 252 278 270" fill="#6ab04c"/>
  <!-- 小鸟 -->
  <g transform="translate(300,150)">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#f4b942"/>
    <circle cx="14" cy="-4" r="9" fill="#f4b942"/>
    <circle cx="16" cy="-5" r="2.5" fill="#1a1a1a"/>
    <path d="M22 -4 L30 -2 L22 0" fill="#e89030"/>
    <path d="M-5 2 Q-20 -8 -30 0" fill="none" stroke="#8a6a3a" stroke-width="2"/>
  </g>
  <!-- 标注 -->
  <line x1="195" y1="225" x2="120" y2="180" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="55" y="165" width="80" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="95" y="183" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">草芽尖尖</text>

  <!-- ===== 夏：荷叶 ===== -->
  <rect x="440" y="80" width="320" height="230" fill="#d6ecf7" opacity="0.5"/>
  <text x="600" y="105" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#3a7a9a">夏</text>
  <!-- 水面 -->
  <rect x="440" y="250" width="320" height="60" fill="#7ec0db" opacity="0.5"/>
  <!-- 荷叶 -->
  <ellipse cx="600" cy="230" rx="90" ry="30" fill="#3d8b4e"/>
  <ellipse cx="600" cy="225" rx="86" ry="26" fill="#5cb070"/>
  <path d="M600 225 L545 210 M600 225 L655 210 M600 225 L540 230 M600 225 L660 230" stroke="#3d8b4e" stroke-width="2"/>
  <!-- 荷花 -->
  <g transform="translate(680,195)">
    <ellipse cx="0" cy="0" rx="7" ry="22" fill="#f8c8d8" transform="rotate(-25)"/>
    <ellipse cx="0" cy="0" rx="7" ry="22" fill="#f4a8c0" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="7" ry="22" fill="#f8c8d8" transform="rotate(25)"/>
    <circle cx="0" cy="0" r="6" fill="#f4b942"/>
  </g>
  <!-- 青蛙 -->
  <g transform="translate(580,200)">
    <ellipse cx="0" cy="8" rx="22" ry="15" fill="#6ab04c"/>
    <ellipse cx="0" cy="5" rx="20" ry="13" fill="#7cc85a"/>
    <circle cx="-8" cy="-6" r="7" fill="#7cc85a"/>
    <circle cx="8" cy="-6" r="7" fill="#7cc85a"/>
    <circle cx="-8" cy="-5" r="4" fill="#ffffff"/>
    <circle cx="8" cy="-5" r="4" fill="#ffffff"/>
    <circle cx="-8" cy="-4" r="2" fill="#1a1a1a"/>
    <circle cx="8" cy="-4" r="2" fill="#1a1a1a"/>
  </g>
  <!-- 标注 -->
  <line x1="600" y1="200" x2="690" y2="150" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="640" y="135" width="80" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="680" y="153" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">荷叶圆圆</text>

  <!-- ===== 秋：谷穗 ===== -->
  <rect x="40" y="310" width="360" height="230" fill="#f5e6c8" opacity="0.5"/>
  <text x="220" y="340" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#b8860b">秋</text>
  <!-- 田地 -->
  <rect x="40" y="500" width="360" height="40" fill="#c4a878"/>
  <!-- 谷穗茎 -->
  <path d="M220 500 Q218 420 220 370" fill="none" stroke="#8a9a4a" stroke-width="4"/>
  <!-- 谷穗 -->
  <g transform="translate(220,360)">
    <ellipse cx="0" cy="0" rx="16" ry="40" fill="#e8c840"/>
    <ellipse cx="-6" cy="-10" rx="6" ry="10" fill="#d4b020"/>
    <ellipse cx="6" cy="-5" rx="6" ry="10" fill="#d4b020"/>
    <ellipse cx="-6" cy="10" rx="6" ry="10" fill="#d4b020"/>
    <ellipse cx="6" cy="15" rx="6" ry="10" fill="#d4b020"/>
    <line x1="0" y1="-40" x2="0" y2="-55" stroke="#b8901a" stroke-width="2"/>
  </g>
  <!-- 弯曲的茎 -->
  <path d="M220 500 Q215 430 225 380 Q230 365 222 355" fill="none" stroke="#8a9a4a" stroke-width="4"/>
  <!-- 其他谷穗 -->
  <g transform="translate(160,420)">
    <path d="M0 80 Q-2 40 0 10" fill="none" stroke="#8a9a4a" stroke-width="3"/>
    <ellipse cx="0" cy="0" rx="10" ry="25" fill="#e8c840"/>
  </g>
  <g transform="translate(290,430)">
    <path d="M0 70 Q3 35 0 5" fill="none" stroke="#8a9a4a" stroke-width="3"/>
    <ellipse cx="0" cy="0" rx="10" ry="25" fill="#e8c840"/>
  </g>
  <!-- 标注 -->
  <line x1="220" y1="360" x2="130" y2="400" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="55" y="388" width="80" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="95" y="406" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">谷穗弯弯</text>

  <!-- ===== 冬：雪人 ===== -->
  <rect x="440" y="310" width="320" height="230" fill="#e8eef5" opacity="0.6"/>
  <text x="600" y="340" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#5a6a8a">冬</text>
  <!-- 雪地 -->
  <rect x="440" y="500" width="320" height="40" fill="#ffffff" opacity="0.8"/>
  <!-- 雪花 -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="480" cy="370" r="3"/>
    <circle cx="530" cy="395" r="2.5"/>
    <circle cx="700" cy="380" r="3"/>
    <circle cx="660" cy="360" r="2.5"/>
    <circle cx="570" cy="360" r="2"/>
  </g>
  <!-- 雪人 -->
  <g transform="translate(600,460)">
    <!-- 底部大球 -->
    <circle cx="0" cy="0" r="42" fill="#ffffff" stroke="#d0d8e0" stroke-width="2"/>
    <!-- 上部小球 -->
    <circle cx="0" cy="-55" r="30" fill="#ffffff" stroke="#d0d8e0" stroke-width="2"/>
    <!-- 胡萝卜鼻子 -->
    <path d="M0 -58 L18 -52 L0 -50 Z" fill="#e89030"/>
    <!-- 眼睛 -->
    <circle cx="-10" cy="-65" r="3" fill="#1a1a1a"/>
    <circle cx="10" cy="-65" r="3" fill="#1a1a1a"/>
    <!-- 嘴 -->
    <circle cx="-8" cy="-48" r="2" fill="#1a1a1a"/>
    <circle cx="0" cy="-46" r="2" fill="#1a1a1a"/>
    <circle cx="8" cy="-48" r="2" fill="#1a1a1a"/>
    <!-- 纽扣 -->
    <circle cx="0" cy="-8" r="3" fill="#1a1a1a"/>
    <circle cx="0" cy="8" r="3" fill="#1a1a1a"/>
    <!-- 围巾 -->
    <rect x="-28" y="-30" width="56" height="10" fill="#c84030" rx="2"/>
    <rect x="20" y="-30" width="8" height="25" fill="#c84030"/>
    <!-- 水桶帽子 -->
    <rect x="-20" y="-92" width="40" height="14" fill="#5a4a3a" rx="2"/>
    <rect x="-26" y="-80" width="52" height="8" fill="#6a5a4a" rx="2"/>
  </g>
  <!-- 标注 -->
  <line x1="600" y1="410" x2="700" y2="400" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="640" y="388" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="685" y="406" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">雪人挺肚</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">草芽尖尖说春天，荷叶圆圆说夏天，谷穗弯弯说秋天，雪人挺肚说冬天</text>
</svg>
