<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="乡间田野里一头老牛和一群白鹅的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">牛和鹅</text>
  <line x1="320" y1="60" x2="480" y2="60" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="70" width="800" height="280" fill="#e8f0e6"/>
  <!-- 远山 -->
  <path d="M0 300 Q200 220 400 270 Q600 210 800 280 L800 350 L0 350 Z" fill="#6a8d3f" opacity="0.35"/>
  <!-- 稻田 -->
  <rect x="0" y="330" width="800" height="270" fill="#e8a838" opacity="0.35"/>
  <path d="M0 360 Q400 340 800 360 L800 600 L0 600 Z" fill="#8d5a36" opacity="0.3"/>

  <!-- 太阳 -->
  <circle cx="680" cy="130" r="36" fill="#e8a838" opacity="0.7"/>
  <circle cx="680" cy="130" r="24" fill="#e8a838"/>

  <!-- 云朵 -->
  <ellipse cx="150" cy="120" rx="40" ry="18" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="180" cy="115" rx="30" ry="15" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="450" cy="100" rx="36" ry="16" fill="#ffffff" opacity="0.7"/>

  <!-- 土路 -->
  <path d="M100 600 Q300 480 500 440 Q650 410 760 380" fill="none" stroke="#c8a878" stroke-width="50" stroke-linecap="round" opacity="0.6"/>

  <!-- 老牛 -->
  <g>
    <!-- 身体 -->
    <ellipse cx="220" cy="430" rx="90" ry="55" fill="#8d6a4a" stroke="#5a3a1a" stroke-width="2.5"/>
    <!-- 头 -->
    <ellipse cx="130" cy="400" rx="42" ry="36" fill="#8d6a4a" stroke="#5a3a1a" stroke-width="2.5"/>
    <!-- 牛角 -->
    <path d="M108 372 q-12 -18 -4 -30" stroke="#5a3a1a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M152 372 q12 -18 4 -30" stroke="#5a3a1a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- 眼睛 -->
    <ellipse cx="118" cy="395" rx="5" ry="6" fill="#3a2a1a"/>
    <ellipse cx="142" cy="395" rx="5" ry="6" fill="#3a2a1a"/>
    <!-- 鼻孔 -->
    <circle cx="112" cy="412" r="2.5" fill="#5a3a1a"/>
    <circle cx="126" cy="412" r="2.5" fill="#5a3a1a"/>
    <!-- 嘴 -->
    <path d="M108 418 q12 6 24 0" stroke="#5a3a1a" stroke-width="2" fill="none"/>
    <!-- 腿 -->
    <rect x="170" y="470" width="18" height="60" fill="#8d6a4a" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="210" y="475" width="18" height="55" fill="#8d6a4a" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="260" y="470" width="18" height="60" fill="#8d6a4a" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="295" y="475" width="18" height="55" fill="#8d6a4a" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 尾巴 -->
    <path d="M305 415 q30 10 35 40" stroke="#5a3a1a" stroke-width="4" fill="none" stroke-linecap="round"/>
    <ellipse cx="340" cy="455" rx="6" ry="8" fill="#5a3a1a"/>
  </g>

  <!-- 白鹅群 -->
  <g>
    <!-- 鹅1（领头，伸长脖子） -->
    <ellipse cx="560" cy="450" rx="45" ry="32" fill="#ffffff" stroke="#7a3b14" stroke-width="2"/>
    <path d="M540 440 Q515 410 505 370" stroke="#ffffff" stroke-width="22" fill="none" stroke-linecap="round"/>
    <path d="M540 440 Q515 410 505 370" stroke="#7a3b14" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
    <ellipse cx="503" cy="362" rx="16" ry="13" fill="#ffffff" stroke="#7a3b14" stroke-width="2"/>
    <!-- 鹅嘴 -->
    <path d="M490 358 L475 362 L490 368 Z" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 鹅眼 -->
    <circle cx="505" cy="360" r="2.5" fill="#3a2a1a"/>
    <!-- 翅膀 -->
    <path d="M570 430 q20 -5 30 10 q-15 10 -30 5 Z" fill="#f0f0e8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 腿 -->
    <path d="M555 480 L552 510" stroke="#e8a838" stroke-width="4" stroke-linecap="round"/>
    <path d="M575 480 L578 510" stroke="#e8a838" stroke-width="4" stroke-linecap="round"/>

    <!-- 鹅2 -->
    <ellipse cx="650" cy="470" rx="38" ry="28" fill="#ffffff" stroke="#7a3b14" stroke-width="2"/>
    <path d="M635 462 Q620 440 615 410" stroke="#ffffff" stroke-width="18" fill="none" stroke-linecap="round"/>
    <ellipse cx="613" cy="404" rx="13" ry="11" fill="#ffffff" stroke="#7a3b14" stroke-width="2"/>
    <path d="M602 402 L590 406 L602 410 Z" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="615" cy="402" r="2" fill="#3a2a1a"/>
    <path d="M660 455 q16 -4 24 8 q-12 8 -24 4 Z" fill="#f0f0e8" stroke="#7a3b14" stroke-width="1.5"/>

    <!-- 鹅3 -->
    <ellipse cx="720" cy="490" rx="34" ry="25" fill="#ffffff" stroke="#7a3b14" stroke-width="2"/>
    <path d="M708 483 Q696 465 692 440" stroke="#ffffff" stroke-width="16" fill="none" stroke-linecap="round"/>
    <ellipse cx="691" cy="435" rx="12" ry="10" fill="#ffffff" stroke="#7a3b14" stroke-width="2"/>
    <path d="M681 433 L670 437 L681 441 Z" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="693" cy="433" r="2" fill="#3a2a1a"/>
  </g>

  <!-- 池塘 -->
  <ellipse cx="600" cy="540" rx="180" ry="30" fill="#4a90b8" opacity="0.5"/>
  <path d="M540 535 q10 -3 20 0 M620 545 q10 -3 20 0" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- 标注：牛 -->
  <line x1="220" y1="370" x2="220" y2="330" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="190" y="308" width="60" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="220" y="325" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">老牛</text>

  <!-- 标注：鹅 -->
  <line x1="560" y1="340" x2="560" y2="300" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="530" y="278" width="60" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="560" y="295" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">白鹅</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">牛怕人、鹅不怕人——换个角度看，事情也许完全不一样</text>
</svg>
