<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="冰心回忆童年读书场景插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">忆读书</text>
  <line x1="360" y1="60" x2="440" y2="60" stroke="#c8843a" stroke-width="2"/>

  <!-- 书架背景 -->
  <rect x="0" y="70" width="800" height="530" fill="#f5ecd8"/>
  <!-- 书架隔板 -->
  <line x1="0" y1="220" x2="800" y2="220" stroke="#8d6a4a" stroke-width="3"/>
  <line x1="0" y1="380" x2="800" y2="380" stroke="#8d6a4a" stroke-width="3"/>

  <!-- 书架上的书（第一层） -->
  <g>
    <rect x="40" y="90" width="22" height="125" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="64" y="90" width="22" height="125" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="88" y="95" width="20" height="120" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="110" y="90" width="24" height="125" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="136" y="92" width="20" height="123" fill="#8d2a2a" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="75" y="160" text-anchor="middle" font-family="serif" font-size="10" fill="#fef9ed" transform="rotate(-90 75 160)">三国演义</text>
    <text x="122" y="160" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14" transform="rotate(-90 122 160)">水浒传</text>
    <!-- 更多书 -->
    <rect x="640" y="90" width="22" height="125" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="664" y="92" width="20" height="123" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="688" y="90" width="24" height="125" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="714" y="95" width="20" height="120" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="736" y="90" width="22" height="125" fill="#8d2a2a" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 小冰心（七岁，趴桌读书） -->
  <g>
    <!-- 桌子 -->
    <rect x="200" y="400" width="400" height="15" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="220" y="415" width="12" height="100" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <rect x="568" y="415" width="12" height="100" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <!-- 小冰心趴着 -->
    <!-- 身体（趴在桌上） -->
    <path d="M320 400 L320 360 Q350 345 400 345 Q450 345 480 360 L480 400" fill="#e07856" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头（低头看书） -->
    <circle cx="400" cy="340" r="26" fill="#e8c9a0" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头发（小女孩辫子） -->
    <path d="M376 335 q24 -20 48 0" fill="#3a2a1a"/>
    <ellipse cx="374" cy="345" rx="6" ry="12" fill="#3a2a1a"/>
    <ellipse cx="426" cy="345" rx="6" ry="12" fill="#3a2a1a"/>
    <!-- 眼睛（盯着书） -->
    <ellipse cx="390" cy="343" rx="3" ry="4" fill="#3a2a1a"/>
    <ellipse cx="410" cy="343" rx="3" ry="4" fill="#3a2a1a"/>
    <!-- 嘴（微张，入迷） -->
    <ellipse cx="400" cy="355" rx="3" ry="2" fill="#7a3b14"/>
    <!-- 书（摊开在桌上） -->
    <g transform="translate(350 385)">
      <path d="M0 0 L50 0 L50 20 L0 20 Z" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="25" y1="0" x2="25" y2="20" stroke="#7a3b14" stroke-width="1"/>
      <line x1="3" y1="5" x2="22" y2="5" stroke="#5a3a1a" stroke-width="0.8"/>
      <line x1="3" y1="10" x2="22" y2="10" stroke="#5a3a1a" stroke-width="0.8"/>
      <line x1="3" y1="15" x2="22" y2="15" stroke="#5a3a1a" stroke-width="0.8"/>
      <line x1="28" y1="5" x2="47" y2="5" stroke="#5a3a1a" stroke-width="0.8"/>
      <line x1="28" y1="10" x2="47" y2="10" stroke="#5a3a1a" stroke-width="0.8"/>
      <line x1="28" y1="15" x2="47" y2="15" stroke="#5a3a1a" stroke-width="0.8"/>
    </g>
    <!-- 手指着书 -->
    <path d="M340 380 q-5 5 -8 12" stroke="#e07856" stroke-width="7" fill="none" stroke-linecap="round"/>
    <ellipse cx="330" cy="392" rx="5" ry="4" fill="#e8c9a0" stroke="#7a3b14" stroke-width="1"/>
  </g>

  <!-- 感叹气泡 -->
  <g>
    <ellipse cx="520" cy="310" rx="60" ry="35" fill="#fff6df" stroke="#e07856" stroke-width="2"/>
    <text x="520" y="305" text-anchor="middle" font-family="serif" font-size="14" fill="#e07856" font-weight="bold">关羽太</text>
    <text x="520" y="325" text-anchor="middle" font-family="serif" font-size="14" fill="#e07856" font-weight="bold">厉害了！</text>
    <path d="M470 330 L450 350" stroke="#e07856" stroke-width="1.5" fill="none"/>
  </g>

  <!-- 九字箴言（底部） -->
  <rect x="150" y="510" width="500" height="55" fill="#fff6df" stroke="#c8843a" stroke-width="2.5" rx="8"/>
  <text x="400" y="545" text-anchor="middle" font-family="serif" font-size="24" fill="#7a3b14" font-weight="bold">读书好 · 多读书 · 读好书</text>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">冰心用一生的读书经验，送给所有孩子九个字</text>
</svg>
