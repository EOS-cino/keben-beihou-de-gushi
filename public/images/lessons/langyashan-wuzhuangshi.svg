<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="五壮士在狼牙山顶的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="32" font-weight="bold" fill="#8a2a1a">狼牙山五壮士</text>
  <line x1="240" y1="62" x2="560" y2="62" stroke="#c44a3a" stroke-width="2"/>

  <!-- 天空云 -->
  <g fill="#fff6df" opacity="0.7">
    <ellipse cx="120" cy="120" rx="50" ry="18"/>
    <ellipse cx="680" cy="140" rx="55" ry="20"/>
  </g>

  <!-- 远山层 -->
  <path d="M0 500 L80 380 L160 440 L260 360 L360 430 L460 350 L560 420 L660 360 L800 440 L800 600 L0 600 Z" fill="#c8b8a8" opacity="0.5"/>

  <!-- 狼牙山主峰（险峻，狼牙状） -->
  <path d="M250 540 L300 300 L340 380 L380 200 L420 360 L460 280 L500 420 L540 540 Z" fill="#7a6a5a" stroke="#4a3a2a" stroke-width="2"/>
  <!-- 狼牙状尖峰 -->
  <polygon points="380,200 395,160 410,200" fill="#8a7a6a" stroke="#4a3a2a" stroke-width="2"/>
  <polygon points="460,280 475,240 490,280" fill="#8a7a6a" stroke="#4a3a2a" stroke-width="2"/>
  <polygon points="300,300 315,265 330,300" fill="#8a7a6a" stroke="#4a3a2a" stroke-width="2"/>

  <!-- 山石纹理 -->
  <g stroke="#5a4a3a" stroke-width="1.5" fill="none">
    <path d="M320 400 L350 380 L370 410"/>
    <path d="M400 300 L430 280"/>
    <path d="M440 380 L470 360"/>
  </g>

  <!-- 悬崖边缘（顶峰平台） -->
  <path d="M360 340 L470 340 L470 360 L360 360 Z" fill="#6a5a4a"/>
  <!-- 悬崖断面 -->
  <path d="M360 360 L340 540 L470 540 L470 360" fill="#5a4a3a"/>
  <g stroke="#3a2a1a" stroke-width="1" fill="none" opacity="0.6">
    <path d="M370 380 L360 500"/>
    <path d="M400 380 L395 520"/>
    <path d="M430 380 L440 510"/>
    <path d="M455 380 L460 500"/>
  </g>

  <!-- 五壮士（站在顶峰，背影/侧影） -->
  <!-- 壮士1（班长，举拳） -->
  <g>
    <path d="M378 340 L380 285 L400 285 L402 340 Z" fill="#4a6a4a"/>
    <path d="M400 295 L420 270 L425 278 L405 305 Z" fill="#5a7a5a"/>
    <circle cx="391" cy="272" r="12" fill="#f0d0a8"/>
    <path d="M381 268 Q391 260 401 268 L401 264 Q391 256 381 264 Z" fill="#3a2a1a"/>
  </g>
  <!-- 壮士2 -->
  <g>
    <path d="M402 340 L404 290 L420 290 L422 340 Z" fill="#4a6a4a"/>
    <circle cx="412" cy="278" r="11" fill="#f0d0a8"/>
    <path d="M403 274 Q412 267 421 274 L421 270 Q412 263 403 270 Z" fill="#3a2a1a"/>
  </g>
  <!-- 壮士3 -->
  <g>
    <path d="M422 340 L424 295 L438 295 L440 340 Z" fill="#4a6a4a"/>
    <circle cx="431" cy="284" r="10" fill="#f0d0a8"/>
    <path d="M423 280 Q431 274 439 280 L439 277 Q431 270 423 277 Z" fill="#3a2a1a"/>
  </g>
  <!-- 壮士4 -->
  <g>
    <path d="M440 340 L442 300 L454 300 L456 340 Z" fill="#4a6a4a"/>
    <circle cx="448" cy="290" r="10" fill="#f0d0a8"/>
    <path d="M440 286 Q448 280 456 286 L456 283 Q448 276 440 283 Z" fill="#3a2a1a"/>
  </g>
  <!-- 壮士5 -->
  <g>
    <path d="M456 340 L458 305 L470 305 L472 340 Z" fill="#4a6a4a"/>
    <circle cx="464" cy="296" r="9" fill="#f0d0a8"/>
    <path d="M457 292 Q464 287 471 292 L471 289 Q464 283 457 289 Z" fill="#3a2a1a"/>
  </g>

  <!-- 红旗 -->
  <line x1="391" y1="272" x2="391" y2="200" stroke="#5a3a1a" stroke-width="3"/>
  <path d="M391 200 L440 210 L435 230 L391 225 Z" fill="#c4282a" stroke="#8a1a1a" stroke-width="1.5"/>
  <!-- 旗上五角星 -->
  <polygon points="410,212 413,219 420,219 414,223 416,230 410,226 404,230 406,223 400,219 407,219" fill="#f4d842"/>

  <!-- 砸碎的枪支（地上） -->
  <g stroke="#3a2a1a" stroke-width="3" fill="none">
    <path d="M340 350 L360 348"/>
    <path d="M345 355 L355 352"/>
  </g>
  <rect x="335" y="345" width="20" height="4" fill="#5a3a1a" transform="rotate(-10 345 347)"/>

  <!-- 文字标注 -->
  <line x1="391" y1="200" x2="391" y2="160" stroke="#8a2a1a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="330" y="135" width="120" height="26" fill="#fff6df" stroke="#c44a3a" rx="4"/>
  <text x="390" y="153" text-anchor="middle" font-family="serif" font-size="14" fill="#8a2a1a">五壮士·棋盘陀</text>

  <rect x="560" y="380" width="120" height="26" fill="#fff6df" stroke="#c44a3a" rx="4"/>
  <text x="620" y="398" text-anchor="middle" font-family="serif" font-size="14" fill="#8a2a1a">万丈悬崖</text>
  <line x1="560" y1="393" x2="475" y2="430" stroke="#8a2a1a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#8a2a1a">弹尽粮绝，五壮士砸碎武器，纵身跳下悬崖，宁死不屈</text>
</svg>
