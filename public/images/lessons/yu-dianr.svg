<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="大雨点儿和小雨点儿从云中落下，浇灌花草的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">雨点儿</text>

  <!-- 天空 -->
  <rect x="0" y="70" width="800" height="280" fill="#a8d0e8" opacity="0.5"/>

  <!-- 乌云 -->
  <g fill="#8d8a82">
    <ellipse cx="200" cy="140" rx="80" ry="38"/>
    <ellipse cx="280" cy="125" rx="70" ry="42"/>
    <ellipse cx="360" cy="145" rx="75" ry="36"/>
    <ellipse cx="500" cy="135" rx="85" ry="40"/>
    <ellipse cx="580" cy="150" rx="65" ry="34"/>
    <ellipse cx="640" cy="140" rx="55" ry="32"/>
  </g>
  <g fill="#6a6862" opacity="0.6">
    <ellipse cx="240" cy="155" rx="60" ry="25"/>
    <ellipse cx="540" cy="160" rx="70" ry="26"/>
  </g>

  <!-- 大雨点儿 -->
  <g transform="translate(220,240)">
    <path d="M0 -18 Q-14 5 0 18 Q14 5 0 -18 Z" fill="#7ab8d8"/>
    <ellipse cx="-4" cy="-8" rx="3" ry="5" fill="#a8d0e8"/>
    <!-- 脸 -->
    <circle cx="-5" cy="2" r="2" fill="#1a1a1a"/>
    <circle cx="5" cy="2" r="2" fill="#1a1a1a"/>
    <path d="M-4 8 Q0 12 4 8" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14" font-weight="bold">大雨点儿</text>
  </g>

  <!-- 小雨点儿 -->
  <g transform="translate(360,260)">
    <path d="M0 -12 Q-9 3 0 12 Q9 3 0 -12 Z" fill="#7ab8d8"/>
    <ellipse cx="-3" cy="-5" rx="2" ry="3" fill="#a8d0e8"/>
    <circle cx="-3" cy="1" r="1.5" fill="#1a1a1a"/>
    <circle cx="3" cy="1" r="1.5" fill="#1a1a1a"/>
    <path d="M-2 5 Q0 8 2 5" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>
    <text x="0" y="32" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14" font-weight="bold">小雨点儿</text>
  </g>

  <!-- 对话气泡 -->
  <g>
    <rect x="250" y="200" width="90" height="30" rx="8" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="295" y="220" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">你要去哪儿？</text>
  </g>

  <!-- 其他雨点 -->
  <g fill="#7ab8d8">
    <path d="M120 280 Q116 290 120 298 Q124 290 120 280 Z"/>
    <path d="M450 300 Q446 310 450 318 Q454 310 450 300 Z"/>
    <path d="M560 270 Q556 280 560 288 Q564 280 560 270 Z"/>
    <path d="M680 290 Q676 300 680 308 Q684 300 680 290 Z"/>
    <path d="M80 320 Q77 328 80 334 Q83 328 80 320 Z"/>
    <path d="M620 320 Q617 328 620 334 Q623 328 620 320 Z"/>
  </g>

  <!-- 地面 -->
  <rect x="0" y="400" width="800" height="200" fill="#8d5a36" opacity="0.2"/>

  <!-- 左边：有花有草的地方（小雨点儿去的地方） -->
  <g transform="translate(200,440)">
    <text x="0" y="-15" text-anchor="middle" font-family="serif" font-size="13" fill="#6a8d3f" font-weight="bold">有花有草的地方</text>
    <!-- 草 -->
    <path d="M-50 60 L-50 40 M-45 60 L-45 42 M-40 60 L-40 38" stroke="#6a8d3f" stroke-width="3" stroke-linecap="round"/>
    <path d="M-20 60 L-20 35 M-15 60 L-15 38 M-10 60 L-10 32" stroke="#6a8d3f" stroke-width="3" stroke-linecap="round"/>
    <path d="M20 60 L20 38 M25 60 L25 35 M30 60 L30 40" stroke="#6a8d3f" stroke-width="3" stroke-linecap="round"/>
    <path d="M50 60 L50 42 M55 60 L55 38" stroke="#6a8d3f" stroke-width="3" stroke-linecap="round"/>
    <!-- 花 -->
    <g transform="translate(-30,30)">
      <circle cx="0" cy="0" r="6" fill="#c84a3a"/>
      <circle cx="0" cy="0" r="2.5" fill="#f4b942"/>
      <line x1="0" y1="6" x2="0" y2="30" stroke="#6a8d3f" stroke-width="2"/>
    </g>
    <g transform="translate(15,28)">
      <circle cx="0" cy="0" r="6" fill="#e07856"/>
      <circle cx="0" cy="0" r="2.5" fill="#f4b942"/>
      <line x1="0" y1="6" x2="0" y2="32" stroke="#6a8d3f" stroke-width="2"/>
    </g>
    <!-- 小雨点落下 -->
    <path d="M0 0 Q-3 8 0 14 Q3 8 0 0 Z" fill="#7ab8d8"/>
  </g>

  <!-- 右边：没有花没有草的地方（大雨点儿去的地方），长出新芽 -->
  <g transform="translate(600,440)">
    <text x="0" y="-15" text-anchor="middle" font-family="serif" font-size="13" fill="#c8843a" font-weight="bold">没有花没有草的地方</text>
    <!-- 光秃秃的土地，刚长出小芽 -->
    <ellipse cx="-40" cy="58" rx="8" ry="4" fill="#8d5a36" opacity="0.4"/>
    <path d="M-40 58 L-40 45 Q-44 42 -42 38" fill="none" stroke="#6a8d3f" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="-10" cy="58" rx="8" ry="4" fill="#8d5a36" opacity="0.4"/>
    <path d="M-10 58 L-10 40 Q-6 36 -10 32" fill="none" stroke="#6a8d3f" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="20" cy="58" rx="8" ry="4" fill="#8d5a36" opacity="0.4"/>
    <path d="M20 58 L20 48 Q24 44 22 40" fill="none" stroke="#6a8d3f" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="45" cy="58" rx="8" ry="4" fill="#8d5a36" opacity="0.4"/>
    <path d="M45 58 L45 42 Q41 38 45 34" fill="none" stroke="#6a8d3f" stroke-width="3" stroke-linecap="round"/>
    <!-- 大雨点落下 -->
    <path d="M0 0 Q-5 10 0 18 Q5 10 0 0 Z" fill="#7ab8d8"/>
  </g>

  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">花更红了，草更绿了，荒地也长出了花草</text>
</svg>
