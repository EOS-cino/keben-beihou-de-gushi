<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="蓝天白云下孩子仰望天空的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空 -->
  <rect x="0" y="0" width="800" height="450" fill="#4a90b8" opacity="0.12"/>
  <!-- 云朵 -->
  <g fill="#ffffff" opacity="0.9">
    <!-- 棉花糖云 -->
    <ellipse cx="150" cy="120" rx="50" ry="30"/>
    <ellipse cx="120" cy="130" rx="35" ry="25"/>
    <ellipse cx="180" cy="130" rx="35" ry="25"/>
    <ellipse cx="150" cy="105" rx="30" ry="20"/>
  </g>
  <g fill="#ffffff" opacity="0.85">
    <ellipse cx="600" cy="100" rx="60" ry="35"/>
    <ellipse cx="565" cy="110" rx="40" ry="28"/>
    <ellipse cx="635" cy="110" rx="40" ry="28"/>
    <ellipse cx="600" cy="80" rx="35" ry="22"/>
  </g>
  <g fill="#ffffff" opacity="0.7">
    <ellipse cx="400" cy="180" rx="45" ry="25"/>
    <ellipse cx="375" cy="188" rx="30" ry="20"/>
    <ellipse cx="425" cy="188" rx="30" ry="20"/>
  </g>
  <!-- 乌云 -->
  <g fill="#7a8a9a" opacity="0.6">
    <ellipse cx="650" cy="250" rx="55" ry="30"/>
    <ellipse cx="620" cy="260" rx="35" ry="22"/>
    <ellipse cx="680" cy="260" rx="35" ry="22"/>
  </g>
  <!-- 雨滴 -->
  <g fill="#4a90b8" opacity="0.5">
    <line x1="620" y1="290" x2="615" y2="310" stroke="#4a90b8" stroke-width="2" stroke-linecap="round"/>
    <line x1="640" y1="295" x2="635" y2="320" stroke="#4a90b8" stroke-width="2" stroke-linecap="round"/>
    <line x1="660" y1="290" x2="655" y2="315" stroke="#4a90b8" stroke-width="2" stroke-linecap="round"/>
    <line x1="680" y1="295" x2="675" y2="318" stroke="#4a90b8" stroke-width="2" stroke-linecap="round"/>
    <line x1="700" y1="290" x2="695" y2="312" stroke="#4a90b8" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- 太阳 -->
  <circle cx="100" cy="80" r="25" fill="#e8a838" opacity="0.7"/>
  <!-- 地面 -->
  <path d="M0 450 Q400 430 800 450 L800 600 L0 600 Z" fill="#dceee3"/>
  <path d="M0 490 Q400 470 800 490 L800 600 L0 600 Z" fill="#9fc8b4" opacity="0.4"/>
  <!-- 草地装饰 -->
  <g fill="#2d6a4f" opacity="0.6">
    <path d="M100 500 Q105 470 100 455 Q110 470 115 500 Z"/>
    <path d="M700 500 Q705 470 700 455 Q710 470 715 500 Z"/>
    <path d="M200 510 Q205 480 200 465 Q210 480 215 510 Z"/>
  </g>
  <!-- 孩子仰望天空 -->
  <g transform="translate(350 490)">
    <!-- 身体 -->
    <path d="M-22 0 L-28 -70 L28 -70 L22 0 Z" fill="#e07856"/>
    <!-- 头 -->
    <circle cx="0" cy="-90" r="20" fill="#f4d4a8"/>
    <!-- 头发 -->
    <path d="M-20 -98 Q0 -115 20 -98 L20 -90 Q0 -85 -20 -90 Z" fill="#333"/>
    <!-- 眼睛朝上 -->
    <path d="M-8 -98 Q-5 -102 -2 -98" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M2 -98 Q5 -102 8 -98" stroke="#333" stroke-width="2" fill="none"/>
    <!-- 嘴 -->
    <path d="M-3 -88 Q0 -85 3 -88" stroke="#333" stroke-width="1.5" fill="none"/>
    <!-- 手指天空 -->
    <path d="M28 -60 L50 -90" stroke="#f4d4a8" stroke-width="7" stroke-linecap="round"/>
    <path d="M-28 -60 L-40 -40" stroke="#f4d4a8" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="700" fill="#2d6a4f">云朵的心事</text>
  <text x="400" y="82" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#7a7468">天上那些白白的云，到底在想什么</text>
</svg>
