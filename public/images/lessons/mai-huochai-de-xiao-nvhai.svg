<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- Night sky -->
  <rect width="800" height="400" fill="#2d2d44" opacity="0.15"/>
  <!-- Snow -->
  <ellipse cx="400" cy="560" rx="400" ry="50" fill="#f0f0f5" opacity="0.8"/>
  <ellipse cx="400" cy="540" rx="380" ry="30" fill="#fff" opacity="0.6"/>
  <!-- Snowflakes -->
  <g fill="#fff" opacity="0.7">
    <circle cx="100" cy="80" r="3"/>
    <circle cx="200" cy="120" r="2"/>
    <circle cx="300" cy="60" r="2.5"/>
    <circle cx="500" cy="90" r="3"/>
    <circle cx="600" cy="130" r="2"/>
    <circle cx="700" cy="70" r="2.5"/>
    <circle cx="150" cy="200" r="2"/>
    <circle cx="450" cy="180" r="2"/>
    <circle cx="650" cy="220" r="2.5"/>
    <circle cx="80" cy="300" r="2"/>
    <circle cx="720" cy="280" r="2"/>
  </g>
  <!-- Distant warm houses -->
  <g transform="translate(580,350)" opacity="0.7">
    <rect x="0" y="0" width="80" height="60" fill="#8b6f47"/>
    <path d="M-5,0 L40,-30 L85,0 Z" fill="#c44d2e"/>
    <rect x="25" y="20" width="15" height="20" fill="#fdd835" opacity="0.8"/>
    <rect x="55" y="20" width="15" height="20" fill="#fdd835" opacity="0.6"/>
  </g>
  <g transform="translate(680,370)" opacity="0.6">
    <rect x="0" y="0" width="60" height="45" fill="#7a5f3a"/>
    <path d="M-5,0 L30,-25 L65,0 Z" fill="#a04030"/>
    <rect x="15" y="15" width="12" height="15" fill="#fdd835" opacity="0.7"/>
  </g>
  <!-- Wall corner -->
  <path d="M0,500 L0,200 L120,200 L120,500" fill="#c4b8a8" stroke="#a89888" stroke-width="2"/>
  <rect x="0" y="200" width="120" height="300" fill="#d4c8b8" opacity="0.5"/>
  <!-- Little girl -->
  <g transform="translate(180,420)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="25" ry="35" fill="#5a6a8a"/>
    <!-- Dress -->
    <path d="M-22,-10 Q-30,30 -35,60 L35,60 Q30,30 22,-10 Z" fill="#6a7a9a"/>
    <!-- Apron -->
    <path d="M-12,-5 Q-15,30 -18,55 L18,55 Q15,30 12,-5 Z" fill="#d4c8b8" opacity="0.7"/>
    <!-- Head -->
    <circle cx="0" cy="-45" r="18" fill="#e8d0b8"/>
    <!-- Hair -->
    <path d="M-16,-55 Q-18,-65 -10,-68 Q0,-72 10,-68 Q18,-65 16,-55 Q16,-48 12,-45" fill="#b8860b"/>
    <path d="M-14,-50 Q-16,-40 -12,-35" fill="none" stroke="#b8860b" stroke-width="3"/>
    <path d="M14,-50 Q16,-40 12,-35" fill="none" stroke="#b8860b" stroke-width="3"/>
    <!-- Eyes closed (peaceful) -->
    <path d="M-8,-48 Q-5,-46 -2,-48" fill="none" stroke="#2d2d44" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M2,-48 Q5,-46 8,-48" fill="none" stroke="#2d2d44" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Smile -->
    <path d="M-4,-38 Q0,-35 4,-38" fill="none" stroke="#c44d2e" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Rosy cheeks -->
    <circle cx="-10" cy="-42" r="4" fill="#e07856" opacity="0.4"/>
    <circle cx="10" cy="-42" r="4" fill="#e07856" opacity="0.4"/>
    <!-- Bare feet -->
    <ellipse cx="-12" cy="62" rx="8" ry="5" fill="#e8d0b8"/>
    <ellipse cx="12" cy="62" rx="8" ry="5" fill="#e8d0b8"/>
    <!-- Hand holding match -->
    <line x1="20" y1="0" x2="30" y2="-10" stroke="#e8d0b8" stroke-width="5" stroke-linecap="round"/>
    <!-- Match -->
    <line x1="30" y1="-10" x2="38" y2="-25" stroke="#8b6f47" stroke-width="2"/>
    <!-- Flame -->
    <path d="M36,-25 Q34,-35 38,-40 Q42,-35 40,-25 Z" fill="#e8a838"/>
    <path d="M37,-27 Q36,-33 38,-36 Q40,-33 39,-27 Z" fill="#fdd835"/>
    <!-- Glow around flame -->
    <circle cx="38" cy="-32" r="20" fill="#fdd835" opacity="0.15"/>
    <circle cx="38" cy="-32" r="12" fill="#e8a838" opacity="0.2"/>
  </g>
  <!-- Scattered matches -->
  <g transform="translate(130,490)">
    <line x1="0" y1="0" x2="15" y2="-3" stroke="#8b6f47" stroke-width="2"/>
    <circle cx="15" cy="-3" r="2" fill="#c44d2e"/>
  </g>
  <g transform="translate(250,495)">
    <line x1="0" y1="0" x2="-12" y2="4" stroke="#8b6f47" stroke-width="2"/>
    <circle cx="-12" cy="4" r="2" fill="#c44d2e"/>
  </g>
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-size="22" fill="#2d2d44" font-family="serif" font-weight="bold">卖火柴的小女孩</text>
  <text x="400" y="75" text-anchor="middle" font-size="13" fill="#6b6b80" font-family="sans-serif">除夕夜里微弱的火光</text>
</svg>
