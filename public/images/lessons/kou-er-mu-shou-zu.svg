<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="口耳目手足五个身体部位配汉字的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">口耳目手足</text>

  <!-- 口 -->
  <g transform="translate(170,180)">
    <rect x="-65" y="-55" width="130" height="110" rx="10" fill="#fef0d8" stroke="#c8843a" stroke-width="1.5"/>
    <!-- 嘴巴 -->
    <path d="M-30 -5 Q-30 20 0 20 Q30 20 30 -5 Q30 -15 0 -15 Q-30 -15 -30 -5 Z" fill="#e07856" stroke="#8d5a36" stroke-width="2"/>
    <path d="M-28 0 Q0 5 28 0" fill="none" stroke="#8d5a36" stroke-width="1.5"/>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">口</text>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">吃饭·说话</text>
  </g>

  <!-- 耳 -->
  <g transform="translate(330,180)">
    <rect x="-65" y="-55" width="130" height="110" rx="10" fill="#fef0d8" stroke="#c8843a" stroke-width="1.5"/>
    <!-- 耳朵 -->
    <path d="M-10 -25 Q-25 -20 -25 0 Q-25 15 -15 20 Q-5 22 0 15 L-5 10 Q-15 8 -15 0 Q-15 -10 -5 -12 Q5 -10 5 0 L10 -5 Q10 -25 -10 -25 Z" fill="#f4c8a0" stroke="#8d5a36" stroke-width="2"/>
    <path d="M-12 -10 Q-18 -5 -18 5" fill="none" stroke="#8d5a36" stroke-width="1.5"/>
    <text x="15" y="40" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">耳</text>
    <text x="15" y="60" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">听声音</text>
  </g>

  <!-- 目 -->
  <g transform="translate(490,180)">
    <rect x="-65" y="-55" width="130" height="110" rx="10" fill="#fef0d8" stroke="#c8843a" stroke-width="1.5"/>
    <!-- 眼睛 -->
    <ellipse cx="0" cy="-5" rx="32" ry="18" fill="#fef9ed" stroke="#8d5a36" stroke-width="2"/>
    <circle cx="0" cy="-5" r="10" fill="#4a6a2f"/>
    <circle cx="3" cy="-8" r="3" fill="#fef9ed"/>
    <line x1="-35" y1="-20" x2="-20" y2="-18" stroke="#8d5a36" stroke-width="2"/>
    <line x1="35" y1="-20" x2="20" y2="-18" stroke="#8d5a36" stroke-width="2"/>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">目</text>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">看东西</text>
  </g>

  <!-- 手 -->
  <g transform="translate(650,180)">
    <rect x="-65" y="-55" width="130" height="110" rx="10" fill="#fef0d8" stroke="#c8843a" stroke-width="1.5"/>
    <!-- 手 -->
    <g transform="translate(0,-5)">
      <rect x="-18" y="0" width="6" height="25" rx="3" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <rect x="-9" y="-3" width="6" height="28" rx="3" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <rect x="0" y="-5" width="6" height="30" rx="3" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <rect x="9" y="-3" width="6" height="28" rx="3" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <path d="M-20 22 Q-22 32 -10 35 L15 35 Q22 32 20 22 Z" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <ellipse cx="-22" cy="28" rx="6" ry="10" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5" transform="rotate(-30 -22 28)"/>
    </g>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">手</text>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">做事·写字</text>
  </g>

  <!-- 足 -->
  <g transform="translate(400,400)">
    <rect x="-65" y="-55" width="130" height="110" rx="10" fill="#fef0d8" stroke="#c8843a" stroke-width="1.5"/>
    <!-- 脚 -->
    <g transform="translate(0,-10)">
      <rect x="-8" y="-20" width="16" height="35" rx="4" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <ellipse cx="0" cy="25" rx="22" ry="12" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <line x1="-8" y1="18" x2="8" y2="18" stroke="#8d5a36" stroke-width="1" opacity="0.5"/>
    </g>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">足</text>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">走路·站立</text>
  </g>

  <!-- 底部姿势口诀 -->
  <rect x="80" y="490" width="640" height="80" rx="10" fill="#fef0d8" opacity="0.6" stroke="#c8843a" stroke-width="1.5"/>
  <text x="400" y="520" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14" font-weight="bold">站如松，坐如钟，行如风，卧如弓</text>
  <text x="400" y="548" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">站着像松树一样直，坐着像钟一样稳</text>
</svg>
