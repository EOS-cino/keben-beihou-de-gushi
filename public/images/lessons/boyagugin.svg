<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="伯牙弹琴、子期聆听的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#3a4a6a">伯牙鼓琴 · 高山流水</text>
  <line x1="240" y1="62" x2="560" y2="62" stroke="#6a8ab8" stroke-width="2"/>

  <!-- 远山（高山） -->
  <path d="M0 380 L100 250 L180 320 L280 200 L380 290 L480 220 L580 300 L680 240 L800 320 L800 500 L0 500 Z" fill="#a8b8c8" opacity="0.5"/>
  <!-- 主峰（泰山感） -->
  <polygon points="250,500 320,180 390,500" fill="#8a9ab8" stroke="#5a6a8a" stroke-width="2"/>
  <polygon points="320,180 340,220 300,220" fill="#6a7a98"/>
  <polygon points="430,500 490,240 550,500" fill="#8a9ab8" stroke="#5a6a8a" stroke-width="2"/>

  <!-- 流水（江河） -->
  <path d="M0 460 Q200 440 400 460 Q600 480 800 450" fill="none" stroke="#5a9ad8" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <path d="M0 470 Q200 455 400 475 Q600 490 800 465" fill="none" stroke="#7ab4e8" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- 水波纹 -->
  <g stroke="#7ab4e8" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M100 465 Q120 460 140 465"/>
    <path d="M250 470 Q270 465 290 470"/>
    <path d="M500 475 Q520 470 540 475"/>
    <path d="M650 460 Q670 455 690 460"/>
  </g>

  <!-- 地面 -->
  <rect x="0" y="490" width="800" height="110" fill="#e8d9b8"/>

  <!-- 伯牙（左侧，弹琴） -->
  <g>
    <!-- 坐姿身体 -->
    <path d="M210 490 L215 400 L260 400 L265 490 Z" fill="#3a5a7a"/>
    <!-- 宽袖 -->
    <path d="M215 410 L180 460 L188 470 L225 425 Z" fill="#4a6a8a"/>
    <path d="M260 410 L295 440 L290 450 L255 425 Z" fill="#4a6a8a"/>
    <!-- 头 -->
    <circle cx="238" cy="382" r="18" fill="#f0d0a8"/>
    <!-- 冠帽 -->
    <path d="M222 374 Q238 360 254 374 L254 368 Q238 356 222 368 Z" fill="#2a3a5a"/>
    <rect x="230" y="362" width="16" height="10" fill="#2a3a5a"/>
    <!-- 表情（专注） -->
    <circle cx="232" cy="382" r="2" fill="#2a2a2a"/>
    <circle cx="244" cy="382" r="2" fill="#2a2a2a"/>
    <path d="M232 392 Q238 394 244 392" fill="none" stroke="#5a3a1a" stroke-width="1.5"/>
    <!-- 胡须 -->
    <path d="M234 395 Q238 402 242 395" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
    <!-- 手（弹琴） -->
    <ellipse cx="280" cy="430" rx="8" ry="6" fill="#f0d0a8"/>
    <ellipse cx="300" cy="425" rx="8" ry="6" fill="#f0d0a8"/>
  </g>

  <!-- 古琴 -->
  <g>
    <!-- 琴身 -->
    <path d="M270 440 L420 432 L425 452 L275 460 Z" fill="#6a4a2a" stroke="#3a2a14" stroke-width="2"/>
    <!-- 琴面高光 -->
    <path d="M275 442 L418 435 L420 440 L277 448 Z" fill="#8a6a3a"/>
    <!-- 琴弦 -->
    <g stroke="#e8d8b8" stroke-width="1">
      <line x1="280" y1="442" x2="420" y2="435"/>
      <line x1="280" y1="445" x2="420" y2="438"/>
      <line x1="280" y1="448" x2="420" y2="441"/>
      <line x1="280" y1="451" x2="420" y2="444"/>
      <line x1="280" y1="454" x2="420" y2="447"/>
      <line x1="280" y1="457" x2="420" y2="450"/>
    </g>
    <!-- 琴徽（圆点标记） -->
    <g fill="#f4d842">
      <circle cx="320" cy="441" r="2"/>
      <circle cx="350" cy="439" r="2"/>
      <circle cx="380" cy="437" r="2"/>
    </g>
  </g>

  <!-- 音符（从琴上飘出） -->
  <g fill="#6a8ab8">
    <text x="340" y="380" font-family="serif" font-size="24">&#9835;</text>
    <text x="380" y="360" font-family="serif" font-size="20">&#9834;</text>
    <text x="360" y="340" font-family="serif" font-size="22">&#9835;</text>
  </g>
  <!-- 音波 -->
  <g stroke="#6a8ab8" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M340 410 Q350 395 360 410"/>
    <path d="M370 405 Q380 390 390 405"/>
  </g>

  <!-- 钟子期（右侧，聆听） -->
  <g>
    <!-- 坐姿身体 -->
    <path d="M510 490 L515 410 L555 410 L560 490 Z" fill="#5a4a3a"/>
    <path d="M515 420 L490 460 L498 470 L525 435 Z" fill="#6a5a4a"/>
    <path d="M555 420 L580 450 L575 460 L550 435 Z" fill="#6a5a4a"/>
    <!-- 头 -->
    <circle cx="535" cy="392" r="17" fill="#f0d0a8"/>
    <!-- 头巾（樵夫打扮） -->
    <path d="M520 384 Q535 372 550 384 L550 378 Q535 366 520 378 Z" fill="#4a3020"/>
    <!-- 表情（陶醉/赞叹） -->
    <circle cx="529" cy="392" r="2" fill="#2a2a2a"/>
    <circle cx="541" cy="392" r="2" fill="#2a2a2a"/>
    <path d="M528 402 Q535 406 542 402" fill="none" stroke="#5a3a1a" stroke-width="1.5"/>
    <!-- 柴担（旁边） -->
    <line x1="595" y1="400" x2="595" y2="490" stroke="#7a5a3a" stroke-width="4"/>
    <g fill="#6a4a2a">
      <ellipse cx="595" cy="420" rx="18" ry="8"/>
      <ellipse cx="595" cy="450" rx="18" ry="8"/>
    </g>
  </g>

  <!-- 文字标注 -->
  <line x1="238" y1="362" x2="238" y2="320" stroke="#3a4a6a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="188" y="295" width="100" height="26" fill="#fff6df" stroke="#6a8ab8" rx="4"/>
  <text x="238" y="313" text-anchor="middle" font-family="serif" font-size="14" fill="#3a4a6a">伯牙（鼓琴）</text>

  <line x1="535" y1="372" x2="535" y2="320" stroke="#3a4a6a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="485" y="295" width="100" height="26" fill="#fff6df" stroke="#6a8ab8" rx="4"/>
  <text x="535" y="313" text-anchor="middle" font-family="serif" font-size="14" fill="#3a4a6a">钟子期（聆听）</text>

  <rect x="310" y="135" width="180" height="26" fill="#fff6df" stroke="#6a8ab8" rx="4"/>
  <text x="400" y="153" text-anchor="middle" font-family="serif" font-size="14" fill="#3a4a6a">高山流水 · 知音难觅</text>

  <!-- 底部说明 -->
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="16" fill="#3a4a6a">伯牙鼓琴志在高山流水，子期一听便知——这就是知音</text>
</svg>
