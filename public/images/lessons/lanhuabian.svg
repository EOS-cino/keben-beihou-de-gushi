<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="民间艺人舞动花鞭表演的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">拦花鞭</text>
  <line x1="350" y1="58" x2="450" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 背景：庙会 -->
  <rect x="0" y="64" width="800" height="200" fill="#f0e0c8"/>
  <!-- 灯笼 -->
  <g transform="translate(120,120)">
    <line x1="0" y1="-30" x2="0" y2="-10" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="18" ry="22" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-10" y="-6" width="20" height="4" fill="#e8a838"/>
    <rect x="-10" y="2" width="20" height="4" fill="#e8a838"/>
    <line x1="0" y1="22" x2="0" y2="34" stroke="#e8a838" stroke-width="1.5"/>
  </g>
  <g transform="translate(680,120)">
    <line x1="0" y1="-30" x2="0" y2="-10" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="18" ry="22" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-10" y="-6" width="20" height="4" fill="#e8a838"/>
    <rect x="-10" y="2" width="20" height="4" fill="#e8a838"/>
    <line x1="0" y1="22" x2="0" y2="34" stroke="#e8a838" stroke-width="1.5"/>
  </g>
  <!-- 锣鼓 -->
  <g transform="translate(80,260)">
    <ellipse cx="0" cy="0" rx="22" ry="8" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-3" y="0" width="6" height="20" fill="#8d5a36"/>
  </g>
  <g transform="translate(720,260)">
    <ellipse cx="0" cy="0" rx="22" ry="8" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-3" y="0" width="6" height="20" fill="#8d5a36"/>
  </g>
  <text x="80" y="240" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">咚咚锵</text>
  <text x="720" y="240" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">咚咚锵</text>

  <!-- 地面 -->
  <rect x="0" y="420" width="800" height="180" fill="#c8b878"/>
  <rect x="0" y="420" width="800" height="10" fill="#8d5a36" opacity="0.4"/>

  <!-- 老艺人 -->
  <g transform="translate(380,360)">
    <!-- 头 -->
    <circle cx="0" cy="-60" r="20" fill="#e8c4a0"/>
    <!-- 白发 -->
    <path d="M-18 -68 Q0 -84 18 -68" fill="#d8d8d8"/>
    <!-- 眼睛笑 -->
    <path d="M-10 -62 Q-6 -58 -2 -62" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M2 -62 Q6 -58 10 -62" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M-6 -50 Q0 -45 6 -50" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 胡子 -->
    <path d="M-8 -48 Q0 -40 8 -48" fill="#d8d8d8"/>
    <!-- 身体 -->
    <path d="M-26 -40 L-36 50 L36 50 L26 -40 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 腰带 -->
    <rect x="-30" y="-10" width="60" height="8" fill="#e8a838"/>
    <!-- 腿 -->
    <rect x="-18" y="50" width="12" height="40" fill="#3a4a6a"/>
    <rect x="6" y="50" width="12" height="40" fill="#3a4a6a"/>
    <!-- 举鞭的手臂 -->
    <path d="M26 -30 Q60 -50 90 -70" stroke="#c84a3a" stroke-width="12" fill="none" stroke-linecap="round"/>
    <ellipse cx="92" cy="-72" rx="8" ry="6" fill="#e8c4a0"/>
  </g>

  <!-- 花鞭 -->
  <g transform="translate(472,288)">
    <!-- 鞭杆 -->
    <line x1="0" y1="0" x2="80" y2="-60" stroke="#8d5a36" stroke-width="6" stroke-linecap="round"/>
    <!-- 杆上的彩花 -->
    <g>
      <circle cx="15" cy="-11" r="8" fill="#e07856"/>
      <circle cx="30" cy="-22" r="8" fill="#6a8d3f"/>
      <circle cx="45" cy="-34" r="8" fill="#e8a838"/>
      <circle cx="60" cy="-45" r="8" fill="#c84a3a"/>
    </g>
    <!-- 鞭梢彩带（甩开的弧线） -->
    <path d="M80 -60 Q120 -40 140 -10 Q150 10 130 30" fill="none" stroke="#e07856" stroke-width="4" stroke-linecap="round"/>
    <path d="M80 -60 Q115 -30 130 0 Q138 20 120 40" fill="none" stroke="#6a8d3f" stroke-width="3" stroke-linecap="round"/>
    <path d="M80 -60 Q110 -20 120 10 Q126 30 110 45" fill="none" stroke="#e8a838" stroke-width="3" stroke-linecap="round"/>
    <!-- 转动的花 -->
    <ellipse cx="130" cy="20" rx="14" ry="6" fill="#c84a3a" opacity="0.6"/>
    <ellipse cx="125" cy="35" rx="12" ry="5" fill="#e07856" opacity="0.6"/>
  </g>

  <!-- 小徒弟（旁边看） -->
  <g transform="translate(620,400)">
    <circle cx="0" cy="-30" r="14" fill="#e8c4a0"/>
    <path d="M-12 -34 Q0 -44 12 -34" fill="#3a2a1a"/>
    <!-- 眼睛发光 -->
    <circle cx="-5" cy="-30" r="2.5" fill="#7a3b14"/>
    <circle cx="5" cy="-30" r="2.5" fill="#7a3b14"/>
    <path d="M-4 -22 Q0 -19 4 -22" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-10 -16 L-12 30 L12 30 L10 -16 Z" fill="#6a8d3f"/>
    <rect x="-6" y="30" width="5" height="20" fill="#3a4a6a"/>
    <rect x="1" y="30" width="5" height="20" fill="#3a4a6a"/>
  </g>

  <!-- 围观人群 -->
  <g transform="translate(150,440)">
    <circle cx="0" cy="-10" r="8" fill="#e8c4a0"/>
    <rect x="-7" y="-2" width="14" height="16" rx="2" fill="#3a6a9a"/>
  </g>
  <g transform="translate(180,445)">
    <circle cx="0" cy="-10" r="8" fill="#e8c4a0"/>
    <rect x="-7" y="-2" width="14" height="16" rx="2" fill="#5a8a3a"/>
  </g>

  <!-- 标注：花鞭 -->
  <line x1="100" y1="240" x2="160" y2="270" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="40" y="220" width="90" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="85" y="239" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">花鞭</text>

  <!-- 标注：彩花 -->
  <line x1="525" y1="252" x2="580" y2="220" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="560" y="200" width="90" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="605" y="219" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">彩花</text>

  <!-- 底部说明 -->
  <rect x="40" y="528" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="553" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">一根缠满彩花的鞭子，在老艺人手里舞成会飞的花——这就是民间艺术的魅力。</text>
</svg>
