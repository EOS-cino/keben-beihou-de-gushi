    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="14" fill="#7a4a1a">老山羊</text>
  </g>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">花言巧语，骗不过细看</text>
