  <g transform="translate(400,330)">
    <ellipse cx="0" cy="20" rx="50" ry="30" fill="#7a7a7a" stroke="#3a3a3a" stroke-width="2"/>
    <ellipse cx="0" cy="-6" rx="26" ry="22" fill="#9a9a9a" stroke="#3a3a3a" stroke-width="2"/>
    <path d="M-20,-22 L-30,-34 L-16,-24 Z" fill="#7a7a7a" stroke="#3a3a3a" stroke-width="2"/>
    <path d="M20,-22 L30,-34 L16,-24 Z" fill="#7a7a7a" stroke="#3a3a3a" stroke-width="2"/>
    <circle cx="-8" cy="-6" r="3" fill="#3a2a1a"/><circle cx="8" cy="-6" r="3" fill="#3a2a1a"/>
    <path d="M50,10 q20,5 30,-10" fill="none" stroke="#3a3a3a" stroke-width="4"/>
