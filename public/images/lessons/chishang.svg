<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="小娃撑小船偷采白莲、浮萍被划开一道的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">池上</text>

  <!-- 水面 -->
  <rect x="0" y="100" width="800" height="500" fill="#7ab8d8" opacity="0.4"/>
  <!-- 水波纹 -->
  <path d="M0 150 Q100 144 200 150 T400 150 T600 150 T800 150" fill="none" stroke="#a8d0e8" stroke-width="2"/>
  <path d="M0 480 Q120 474 240 480 T480 480 T720 480 T800 480" fill="none" stroke="#a8d0e8" stroke-width="2" opacity="0.6"/>

  <!-- 浮萍（铺满水面，中间被划开一道） -->
  <g fill="#6a8d3f">
    <!-- 左侧浮萍 -->
    <circle cx="60" cy="250" r="6"/><circle cx="90" cy="270" r="5"/><circle cx="50" cy="290" r="6"/>
    <circle cx="80" cy="310" r="5"/><circle cx="110" cy="250" r="5"/><circle cx="40" cy="350" r="6"/>
    <circle cx="70" cy="380" r="5"/><circle cx="100" cy="400" r="6"/><circle cx="50" cy="430" r="5"/>
    <circle cx="130" cy="280" r="5"/><circle cx="150" cy="320" r="6"/><circle cx="120" cy="360" r="5"/>
    <circle cx="160" cy="390" r="6"/><circle cx="180" cy="260" r="5"/><circle cx="200" cy="300" r="6"/>
    <circle cx="170" cy="340" r="5"/><circle cx="190" cy="420" r="5"/><circle cx="140" cy="450" r="6"/>
    <circle cx="220" cy="370" r="5"/><circle cx="240" cy="410" r="6"/><circle cx="210" cy="450" r="5"/>
    <circle cx="60" cy="500" r="6"/><circle cx="100" cy="520" r="5"/><circle cx="150" cy="500" r="6"/>
    <circle cx="200" cy="530" r="5"/><circle cx="250" cy="510" r="6"/>
    <!-- 右侧浮萍 -->
    <circle cx="560" cy="250" r="6"/><circle cx="590" cy="270" r="5"/><circle cx="620" cy="250" r="6"/>
    <circle cx="650" cy="290" r="5"/><circle cx="680" cy="270" r="6"/><circle cx="710" cy="310" r="5"/>
    <circle cx="740" cy="290" r="6"/><circle cx="580" cy="320" r="5"/><circle cx="610" cy="350" r="6"/>
    <circle cx="640" cy="380" r="5"/><circle cx="670" cy="350" r="6"/><circle cx="700" cy="400" r="5"/>
    <circle cx="730" cy="370" r="6"/><circle cx="570" cy="400" r="5"/><circle cx="600" cy="430" r="6"/>
    <circle cx="630" cy="450" r="5"/><circle cx="660" cy="430" r="6"/><circle cx="690" cy="460" r="5"/>
    <circle cx="720" cy="440" r="6"/><circle cx="750" cy="420" r="5"/>
    <circle cx="560" cy="490" r="6"/><circle cx="600" cy="510" r="5"/><circle cx="640" cy="500" r="6"/>
    <circle cx="680" cy="520" r="5"/><circle cx="720" cy="500" r="6"/><circle cx="750" cy="530" r="5"/>
  </g>

  <!-- 浮萍被划开的一道水路（中间空白带） -->
  <path d="M280 200 Q350 350 420 500" fill="none" stroke="#a8d0e8" stroke-width="40" opacity="0.5"/>
  <path d="M280 200 Q350 350 420 500" fill="none" stroke="#7ab8d8" stroke-width="2" opacity="0.6"/>

  <!-- 小船（沿水路） -->
  <g transform="translate(350,340)">
    <!-- 船身 -->
    <path d="M-45 10 Q-38 28 0 30 Q38 28 45 10 Z" fill="#7a3b14"/>
    <path d="M-45 10 Q-38 26 0 28 Q38 26 45 10" fill="none" stroke="#5a2a10" stroke-width="1.5"/>
    <!-- 船内 -->
    <path d="M-38 12 Q-32 22 0 23 Q32 22 38 12 Z" fill="#8d5a36"/>
    <!-- 采的白莲 -->
    <g transform="translate(-15,5)">
      <ellipse cx="0" cy="0" rx="10" ry="8" fill="#fef9ed"/>
      <circle cx="-3" cy="-2" r="2" fill="#f4b942"/>
      <circle cx="3" cy="-2" r="2" fill="#f4b942"/>
      <circle cx="0" cy="3" r="2" fill="#f4b942"/>
    </g>
    <g transform="translate(12,3)">
      <ellipse cx="0" cy="0" rx="9" ry="7" fill="#fef9ed"/>
      <circle cx="-2" cy="-1" r="1.5" fill="#f4b942"/>
      <circle cx="2" cy="-1" r="1.5" fill="#f4b942"/>
    </g>
    <!-- 小娃 -->
    <g transform="translate(0,-12)">
      <!-- 身体 -->
      <ellipse cx="0" cy="0" rx="11" ry="12" fill="#c84a3a"/>
      <!-- 头 -->
      <circle cx="0" cy="-15" r="10" fill="#f0c8a0"/>
      <!-- 头发（小揪揪） -->
      <path d="M-8 -22 Q-4 -28 0 -25 Q4 -28 8 -22" fill="#3a2a1a"/>
      <circle cx="0" cy="-26" r="4" fill="#c84a3a"/>
      <!-- 眼睛 -->
      <circle cx="-3" cy="-15" r="1.5" fill="#1a1a1a"/>
      <circle cx="3" cy="-15" r="1.5" fill="#1a1a1a"/>
      <!-- 偷笑的嘴 -->
      <path d="M-3 -10 Q0 -8 3 -10" fill="none" stroke="#7a3b14" stroke-width="1.2"/>
      <!-- 撑篙的手 -->
      <line x1="10" y1="-2" x2="25" y2="-15" stroke="#f0c8a0" stroke-width="3" stroke-linecap="round"/>
      <!-- 竹篙 -->
      <line x1="25" y1="-15" x2="40" y2="20" stroke="#8d5a36" stroke-width="3"/>
    </g>
  </g>

  <!-- 远处的白莲 -->
  <g transform="translate(620,180)">
    <ellipse cx="0" cy="10" rx="12" ry="8" fill="#4a6a2f"/>
    <ellipse cx="0" cy="8" rx="10" ry="6" fill="#6a8d3f"/>
    <g transform="translate(0,-15)">
      <ellipse cx="0" cy="0" rx="6" ry="16" fill="#fef9ed" transform="rotate(-30)"/>
      <ellipse cx="0" cy="0" rx="6" ry="16" fill="#f0e8d8" transform="rotate(0)"/>
      <ellipse cx="0" cy="0" rx="6" ry="16" fill="#fef9ed" transform="rotate(30)"/>
      <circle cx="0" cy="0" r="5" fill="#f4b942"/>
    </g>
  </g>
  <g transform="translate(680,220)">
    <ellipse cx="0" cy="8" rx="10" ry="6" fill="#4a6a2f"/>
    <g transform="translate(0,-10)">
      <ellipse cx="0" cy="0" rx="5" ry="13" fill="#fef9ed" transform="rotate(-25)"/>
      <ellipse cx="0" cy="0" rx="5" ry="13" fill="#f0e8d8" transform="rotate(25)"/>
      <circle cx="0" cy="0" r="4" fill="#f4b942"/>
    </g>
  </g>

  <!-- 诗句 -->
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">小娃撑小艇，偷采白莲回。浮萍一道开。</text>
</svg>
