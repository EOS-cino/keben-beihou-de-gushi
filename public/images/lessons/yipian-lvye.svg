<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一片绿叶在阳光下进行光合作用的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">一片绿叶</text>
  <line x1="350" y1="58" x2="450" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="64" width="800" height="300" fill="#d8e8f0"/>
  <!-- 太阳 -->
  <circle cx="650" cy="150" r="40" fill="#e8a838"/>
  <g stroke="#e8a838" stroke-width="3" stroke-linecap="round">
    <line x1="650" y1="90" x2="650" y2="75"/>
    <line x1="650" y1="225" x2="650" y2="210"/>
    <line x1="585" y1="150" x2="570" y2="150"/>
    <line x1="730" y1="150" x2="715" y2="150"/>
    <line x1="604" y1="104" x2="593" y2="93"/>
    <line x1="696" y1="196" x2="707" y2="207"/>
    <line x1="604" y1="196" x2="593" y2="207"/>
    <line x1="696" y1="104" x2="707" y2="93"/>
  </g>

  <!-- 阳光照射线 -->
  <g stroke="#e8a838" stroke-width="2" stroke-dasharray="6,4" opacity="0.5">
    <line x1="620" y1="180" x2="430" y2="280"/>
    <line x1="600" y1="200" x2="400" y2="290"/>
    <line x1="640" y1="190" x2="460" y2="270"/>
  </g>

  <!-- 树枝 -->
  <path d="M100 400 Q200 350 350 320" fill="none" stroke="#8d5a36" stroke-width="8" stroke-linecap="round"/>

  <!-- 大叶子（主体） -->
  <g transform="translate(400,300)">
    <path d="M0 0 Q-60 -50 -90 -20 Q-100 20 -60 50 Q-20 60 0 30 Q20 60 60 50 Q100 20 90 -20 Q60 -50 0 0 Z" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
    <!-- 叶脉 -->
    <path d="M-80 30 Q0 10 80 30" fill="none" stroke="#4a6a2f" stroke-width="2"/>
    <path d="M-60 10 Q-30 -10 0 -5" fill="none" stroke="#4a6a2f" stroke-width="1.5"/>
    <path d="M60 10 Q30 -10 0 -5" fill="none" stroke="#4a6a2f" stroke-width="1.5"/>
    <path d="M-50 40 Q-20 25 0 20" fill="none" stroke="#4a6a2f" stroke-width="1.5"/>
    <path d="M50 40 Q20 25 0 20" fill="none" stroke="#4a6a2f" stroke-width="1.5"/>
    <!-- 叶绿素颗粒 -->
    <g fill="#4a6a2f" opacity="0.5">
      <circle cx="-40" cy="10" r="4"/>
      <circle cx="-20" cy="20" r="4"/>
      <circle cx="0" cy="5" r="4"/>
      <circle cx="20" cy="20" r="4"/>
      <circle cx="40" cy="10" r="4"/>
      <circle cx="-30" cy="35" r="3"/>
      <circle cx="30" cy="35" r="3"/>
    </g>
  </g>

  <!-- 气孔（放大） -->
  <g transform="translate(400,300)">
    <ellipse cx="-50" cy="-15" rx="6" ry="3" fill="#4a6a2f"/>
    <ellipse cx="30" cy="-20" rx="6" ry="3" fill="#4a6a2f"/>
    <ellipse cx="50" cy="30" rx="6" ry="3" fill="#4a6a2f"/>
  </g>

  <!-- 二氧化碳进入（箭头） -->
  <g transform="translate(250,250)">
    <circle cx="0" cy="0" r="6" fill="#8d8d7a" opacity="0.6"/>
    <text x="0" y="-12" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">CO₂</text>
    <path d="M8 0 Q20 5 30 10" fill="none" stroke="#8d8d7a" stroke-width="2"/>
    <path d="M26 6 L32 12 L24 14" fill="none" stroke="#8d8d7a" stroke-width="2"/>
  </g>

  <!-- 氧气放出（气泡） -->
  <g transform="translate(450,250)">
    <circle cx="0" cy="0" r="7" fill="none" stroke="#7ab8d8" stroke-width="2"/>
    <circle cx="15" cy="-15" r="5" fill="none" stroke="#7ab8d8" stroke-width="2"/>
    <circle cx="25" cy="-30" r="4" fill="none" stroke="#7ab8d8" stroke-width="2"/>
    <text x="40" y="-20" font-family="serif" font-size="10" fill="#7a3b14">O₂</text>
  </g>

  <!-- 水从根部上来 -->
  <g transform="translate(150,400)">
    <path d="M0 0 Q50 -30 100 -60" fill="none" stroke="#7ab8d8" stroke-width="3" stroke-dasharray="4,3"/>
    <text x="-20" y="5" font-family="serif" font-size="11" fill="#7a3b14">水</text>
    <path d="M95 -55 L100 -62 L105 -55" fill="none" stroke="#7ab8d8" stroke-width="2"/>
  </g>

  <!-- 标注：叶绿素 -->
  <line x1="360" y1="310" x2="280" y2="360" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="210" y="346" width="100" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="260" y="365" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">叶绿素</text>

  <!-- 标注：阳光 -->
  <line x1="500" y1="240" x2="570" y2="200" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="540" y="180" width="80" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="580" y="199" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">阳光</text>

  <!-- 地面 -->
  <rect x="0" y="440" width="800" height="160" fill="#b89868" opacity="0.5"/>
  <rect x="0" y="440" width="800" height="8" fill="#8d5a36" opacity="0.4"/>

  <!-- 底部说明 -->
  <rect x="40" y="528" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="553" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">叶子用阳光、水和二氧化碳造出养料和氧气——一片绿叶，养活自己也养活世界。</text>
</svg>
