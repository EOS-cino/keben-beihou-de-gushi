<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="金木水火土五种元素环绕排列的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">金木水火土</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">一二三四五，金木水火土</text>

  <!-- 五行圆环 -->
  <circle cx="400" cy="330" r="170" fill="none" stroke="#c8843a" stroke-width="2" opacity="0.3" stroke-dasharray="5,4"/>

  <!-- 金（上） -->
  <g transform="translate(400,180)">
    <circle r="55" fill="#fef0d8" stroke="#c8843a" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#8d5a36">金</text>
    <!-- 金币 -->
    <circle cx="0" cy="18" r="14" fill="none" stroke="#c8843a" stroke-width="2.5"/>
    <rect x="-3" y="8" width="6" height="20" fill="#c8843a"/>
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">1</text>
  </g>

  <!-- 木（右上） -->
  <g transform="translate(560,250)">
    <circle r="55" fill="#fef0d8" stroke="#6a8d3f" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#4a6a2f">木</text>
    <!-- 小树 -->
    <rect x="-3" y="8" width="6" height="18" fill="#7a3b14"/>
    <path d="M0 28 L-16 8 L-8 8 L-20 -8 L-10 -8 L0 -22 L10 -8 L20 -8 L8 8 L16 8 Z" fill="#6a8d3f"/>
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">2</text>
  </g>

  <!-- 水（右下） -->
  <g transform="translate(560,410)">
    <circle r="55" fill="#fef0d8" stroke="#7ab8d8" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#4a8ab8">水</text>
    <!-- 水滴 -->
    <path d="M0 26 Q-14 14 -14 2 Q-14 -12 0 -12 Q14 -12 14 2 Q14 14 0 26 Z" fill="#a8d0e8"/>
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">3</text>
  </g>

  <!-- 火（左下） -->
  <g transform="translate(240,410)">
    <circle r="55" fill="#fef0d8" stroke="#c84a3a" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#c84a3a">火</text>
    <!-- 火焰 -->
    <path d="M0 26 Q-12 14 -10 0 Q-8 -8 -4 -14 Q-2 -6 0 -16 Q2 -6 4 -14 Q8 -8 10 0 Q12 14 0 26 Z" fill="#e07856"/>
    <path d="M0 22 Q-6 12 -5 2 Q-3 -4 0 -10 Q3 -4 5 2 Q6 12 0 22 Z" fill="#f4b942"/>
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">4</text>
  </g>

  <!-- 土（左上） -->
  <g transform="translate(240,250)">
    <circle r="55" fill="#fef0d8" stroke="#8d5a36" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#8d5a36">土</text>
    <!-- 土地 -->
    <path d="M-22 22 L22 22 L18 8 L-18 8 Z" fill="#8d5a36"/>
    <path d="M-18 8 L-12 -4 L12 -4 L18 8 Z" fill="#a8703a"/>
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">5</text>
  </g>

  <!-- 中心 -->
  <circle cx="400" cy="330" r="45" fill="#fef9ed" stroke="#c8843a" stroke-width="2"/>
  <text x="400" y="325" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14" font-weight="bold">五行</text>
  <text x="400" y="348" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">万物之属</text>

  <!-- 底部 -->
  <rect x="120" y="530" width="560" height="50" rx="8" fill="#fef0d8" opacity="0.6"/>
  <text x="400" y="552" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">天地分上下，日月照今古</text>
  <text x="400" y="572" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">古人用五行把万物分成五大类</text>
</svg>
