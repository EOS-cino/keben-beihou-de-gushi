<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="寒号鸟在崖缝里挨冻、喜鹊在树上温暖的窝里的对比插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">寒号鸟</text>
  <line x1="350" y1="56" x2="450" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 冬天天空 -->
  <rect x="0" y="80" width="800" height="200" fill="#c8d8e0" opacity="0.4"/>
  <!-- 雪花 -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="100" cy="120" r="3"/>
    <circle cx="250" cy="100" r="2.5"/>
    <circle cx="400" cy="130" r="3"/>
    <circle cx="550" cy="110" r="2.5"/>
    <circle cx="680" cy="140" r="3"/>
    <circle cx="180" cy="180" r="2"/>
    <circle cx="480" cy="190" r="2.5"/>
    <circle cx="620" cy="200" r="2"/>
  </g>
  <!-- 寒风线 -->
  <g stroke="#a8b8c8" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <path d="M50 150 Q80 145 110 150"/>
    <path d="M60 170 Q90 165 120 170"/>
    <path d="M500 160 Q530 155 560 160"/>
  </g>

  <!-- 左侧：喜鹊温暖的窝 -->
  <g transform="translate(180,280)">
    <!-- 大树 -->
    <rect x="-12" y="60" width="24" height="120" fill="#8d5a36"/>
    <!-- 树冠 -->
    <ellipse cx="0" cy="40" rx="60" ry="50" fill="#4a6a2f"/>
    <ellipse cx="-20" cy="30" rx="35" ry="30" fill="#6a8d3f"/>
    <ellipse cx="20" cy="35" rx="35" ry="30" fill="#6a8d3f"/>
    <!-- 鸟窝 -->
    <ellipse cx="30" cy="55" rx="28" ry="14" fill="#6a5a3a"/>
    <ellipse cx="30" cy="52" rx="24" ry="10" fill="#8d7a5a"/>
    <!-- 喜鹊 -->
    <g transform="translate(30,40)">
      <ellipse cx="0" cy="5" rx="14" ry="10" fill="#2a2a2a"/>
      <circle cx="8" cy="-5" r="8" fill="#2a2a2a"/>
      <ellipse cx="8" cy="-8" rx="5" ry="3" fill="#ffffff"/>
      <circle cx="10" cy="-6" r="1.5" fill="#ffffff"/>
      <path d="M14 -5 L20 -4" stroke="#f4b942" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- 温暖标记 -->
    <text x="30" y="90" text-anchor="middle" font-family="serif" font-size="12" fill="#6a8d3f">温暖的窝</text>
  </g>

  <!-- 中间分隔 -->
  <line x1="400" y1="120" x2="400" y2="480" stroke="#c8843a" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- 右侧：寒号鸟在崖缝挨冻 -->
  <g transform="translate(580,300)">
    <!-- 悬崖 -->
    <path d="M-100 200 L-100 50 L-80 40 L-60 60 L-40 30 L-20 50 L0 35 L20 55 L40 40 L60 60 L80 45 L100 55 L100 200 Z" fill="#a89888" stroke="#8d5a36" stroke-width="2"/>
    <!-- 崖缝 -->
    <path d="M-20 200 L-15 80 L15 80 L20 200 Z" fill="#5a4a3a"/>
    <!-- 寒号鸟（缩在崖缝里） -->
    <g transform="translate(0,150)">
      <ellipse cx="0" cy="0" rx="18" ry="14" fill="#8d7a5a"/>
      <circle cx="0" cy="-12" r="10" fill="#8d7a5a"/>
      <!-- 眼睛（可怜） -->
      <circle cx="-3" cy="-13" r="2" fill="#1a1a1a"/>
      <circle cx="3" cy="-13" r="2" fill="#1a1a1a"/>
      <!-- 眼泪 -->
      <circle cx="-3" cy="-9" r="1.5" fill="#7ab8d8"/>
      <!-- 瑟瑟发抖线 -->
      <g stroke="#7ab8d8" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
        <path d="M-25 -5 Q-28 -3 -25 0"/>
        <path d="M25 -5 Q28 -3 25 0"/>
      </g>
    </g>
    <!-- 叫声气泡 -->
    <rect x="30" y="120" width="130" height="40" fill="#fff6df" stroke="#c8843a" rx="6"/>
    <text x="95" y="138" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">哆啰啰，哆啰啰</text>
    <text x="95" y="153" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">寒风冻死我！</text>
    <text x="0" y="220" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">崖缝挨冻</text>
  </g>

  <!-- 秋天场景（底部小图） -->
  <rect x="60" y="470" width="680" height="100" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <text x="400" y="495" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">秋天时：喜鹊忙着垒窝，寒号鸟只顾玩耍睡觉</text>
  <!-- 喜鹊衔树枝 -->
  <g transform="translate(180,540)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#2a2a2a"/>
    <circle cx="8" cy="-5" r="6" fill="#2a2a2a"/>
    <line x1="14" y1="-3" x2="25" y2="-5" stroke="#8d5a36" stroke-width="2"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="10" fill="#6a8d3f">勤劳垒窝</text>
  </g>
  <!-- 寒号鸟睡觉 -->
  <g transform="translate(580,540)">
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="#8d7a5a"/>
    <circle cx="-8" cy="-5" r="7" fill="#8d7a5a"/>
    <path d="M-10 -7 Q-8 -5 -6 -7" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <text x="5" y="-12" font-family="serif" font-size="10" fill="#8d7a5a">Zzz</text>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a">得过且过</text>
  </g>
</svg>
