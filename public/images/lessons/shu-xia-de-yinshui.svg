<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="大树下人们围着石槽喝凉水的夏日生活插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">树下的饮水</text>
  <line x1="330" y1="56" x2="470" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——一口凉水，凉在嘴里，暖在心里</text>

  <!-- 烈日 -->
  <g transform="translate(120, 130)">
    <circle cx="0" cy="0" r="24" fill="#e8a838" opacity="0.5"/>
    <circle cx="0" cy="0" r="16" fill="#e8a838" stroke="#c8843a" stroke-width="1.5"/>
    <g stroke="#e8a838" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="-26" x2="0" y2="-34"/>
      <line x1="0" y1="26" x2="0" y2="34"/>
      <line x1="-26" y1="0" x2="-34" y2="0"/>
      <line x1="26" y1="0" x2="34" y2="0"/>
      <line x1="-18" y1="-18" x2="-24" y2="-24"/>
      <line x1="18" y1="18" x2="24" y2="24"/>
    </g>
  </g>

  <!-- 大榕树 -->
  <g transform="translate(400, 220)">
    <rect x="-18" y="0" width="36" height="200" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="-20" rx="170" ry="90" fill="#2d6a4f" stroke="#4a6a2f" stroke-width="1.5"/>
    <ellipse cx="-90" cy="0" rx="70" ry="55" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <ellipse cx="90" cy="-5" rx="65" ry="50" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <text x="0" y="-115" text-anchor="middle" font-family="serif" font-size="12" fill="#2d6a4f">大榕树，像一把撑开的绿伞</text>
  </g>

  <!-- 凉荫 -->
  <ellipse cx="400" cy="430" rx="180" ry="30" fill="#2d6a4f" opacity="0.15"/>

  <!-- 石槽与井 -->
  <g transform="translate(400, 410)">
    <!-- 井 -->
    <g transform="translate(-120, -10)">
      <rect x="-18" y="0" width="36" height="40" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-25" y="-8" width="50" height="10" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <text x="0" y="56" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">老井</text>
    </g>
    <!-- 石槽 -->
    <g transform="translate(20, 10)">
      <path d="M-70 0 L70 0 L60 30 L-60 30 Z" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="70" ry="12" fill="#4a90b8" opacity="0.6" stroke="#7a3b14" stroke-width="1.5"/>
      <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="11" fill="#4a90b8">石槽盛满凉水</text>
    </g>
    <!-- 葫芦瓢 -->
    <g transform="translate(70, -8)">
      <ellipse cx="0" cy="0" rx="10" ry="8" fill="#e8a838" stroke="#7a3b14" stroke-width="1.2"/>
      <path d="M-2 -8 Q0 -16 4 -14" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
  </g>

  <!-- 喝水的伯伯 -->
  <g transform="translate(250, 390)">
    <circle cx="0" cy="0" r="12" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="40" rx="20" ry="26" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="22" cy="30" rx="10" ry="7" fill="#e07856" stroke="#7a3b14" stroke-width="1.2"/>
    <rect x="-32" y="-6" width="14" height="10" fill="#7a3b14"/>
    <rect x="20" y="64" width="7" height="36" fill="#7a3b14"/>
    <rect x="-3" y="64" width="7" height="36" fill="#7a3b14"/>
    <text x="0" y="115" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">挑担伯伯</text>
  </g>

  <!-- 喝水的孩子 -->
  <g transform="translate(540, 410)">
    <circle cx="0" cy="0" r="10" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="34" rx="16" ry="20" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="20" rx="14" ry="8" fill="#e07856" stroke="#7a3b14" stroke-width="1.2" transform="rotate(-30 0 20)"/>
    <rect x="-3" y="54" width="6" height="26" fill="#7a3b14"/>
    <rect x="8" y="54" width="6" height="26" fill="#7a3b14"/>
    <text x="0" y="98" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">放学的孩子</text>
  </g>

  <!-- 蝉鸣 -->
  <g transform="translate(300, 230)">
    <text x="0" y="0" font-family="serif" font-size="13" fill="#6a8d3f">知了——知了——</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 530)">
    <rect x="-300" y="0" width="600" height="50" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">谁渴了谁来，不收一分钱</text>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">把方便留给陌生人，是老石槽传下来的善</text>
  </g>
</svg>
