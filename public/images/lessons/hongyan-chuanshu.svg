<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">鸿雁传书</text>
  <!-- 天空背景 -->
  <rect x="0" y="60" width="800" height="340" fill="#a8d0e8" opacity="0.2"/>
  <!-- 山脉 -->
  <path d="M0 400 L100 280 L200 350 L320 250 L450 330 L580 270 L700 320 L800 290 L800 400 Z" fill="#6a8d3f" opacity="0.3"/>
  <path d="M0 400 L80 340 L180 380 L300 320 L420 370 L550 330 L680 360 L800 340 L800 400 Z" fill="#4a6a2f" opacity="0.4"/>
  <!-- 河流 -->
  <path d="M100 500 Q300 480 500 510 Q650 525 800 490" fill="none" stroke="#7ab8d8" stroke-width="8" opacity="0.5"/>
  <!-- 大雁 -->
  <g transform="translate(300 150)">
    <path d="M0 0 Q15 -20 30 0 Q45 -20 60 0" fill="none" stroke="#7a3b14" stroke-width="3" stroke-linecap="round"/>
    <path d="M20 -5 Q30 -25 40 -5" fill="none" stroke="#7a3b14" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="30" cy="5" rx="8" ry="4" fill="#7a3b14"/>
    <!-- 信封 -->
    <rect x="22" y="8" width="16" height="10" fill="#fdfaf3" stroke="#8d5a36" stroke-width="1.5"/>
    <path d="M22 8 L30 13 L38 8" fill="none" stroke="#8d5a36" stroke-width="1"/>
  </g>
  <!-- 第二只大雁 -->
  <g transform="translate(450 200)">
    <path d="M0 0 Q12 -15 24 0 Q36 -15 48 0" fill="none" stroke="#8d5a36" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="24" cy="4" rx="6" ry="3" fill="#8d5a36"/>
  </g>
  <!-- 第三只大雁 -->
  <g transform="translate(550 130)">
    <path d="M0 0 Q10 -12 20 0 Q30 -12 40 0" fill="none" stroke="#8d5a36" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="20" cy="3" rx="5" ry="2.5" fill="#8d5a36"/>
  </g>
  <!-- 地面 -->
  <rect x="0" y="500" width="800" height="100" fill="#c8843a" opacity="0.15"/>
  <!-- 草 -->
  <path d="M50 520 Q55 500 60 520" fill="none" stroke="#6a8d3f" stroke-width="2"/>
  <path d="M150 530 Q155 510 160 530" fill="none" stroke="#6a8d3f" stroke-width="2"/>
  <path d="M650 525 Q655 505 660 525" fill="none" stroke="#6a8d3f" stroke-width="2"/>
  <path d="M720 535 Q725 515 730 535" fill="none" stroke="#6a8d3f" stroke-width="2"/>
</svg>
