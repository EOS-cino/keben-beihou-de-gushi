<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="太阳照耀地球、光芒万丈的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">太阳 · 万物之源</text>
  <line x1="260" y1="62" x2="540" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 太阳光芒 -->
  <g stroke="#e07856" stroke-width="4" stroke-linecap="round">
    <line x1="400" y1="120" x2="400" y2="80"/>
    <line x1="340" y1="140" x2="310" y2="110"/>
    <line x1="460" y1="140" x2="490" y2="110"/>
    <line x1="300" y1="180" x2="260" y2="160"/>
    <line x1="500" y1="180" x2="540" y2="160"/>
    <line x1="290" y1="230" x2="245" y2="225"/>
    <line x1="510" y1="230" x2="555" y2="225"/>
  </g>

  <!-- 太阳本体 -->
  <circle cx="400" cy="220" r="80" fill="#e07856"/>
  <circle cx="400" cy="220" r="70" fill="#f4a832"/>
  <circle cx="400" cy="220" r="55" fill="#f4d842"/>
  <!-- 太阳表面纹理 -->
  <g fill="#e07856" opacity="0.4">
    <circle cx="380" cy="200" r="8"/>
    <circle cx="420" cy="210" r="6"/>
    <circle cx="395" cy="235" r="7"/>
    <circle cx="415" cy="240" r="5"/>
  </g>

  <!-- 光线射向地球 -->
  <g stroke="#f4c842" stroke-width="2" stroke-dasharray="6,4" opacity="0.6">
    <line x1="360" y1="290" x2="250" y2="400"/>
    <line x1="400" y1="300" x2="400" y2="420"/>
    <line x1="440" y1="290" x2="550" y2="400"/>
  </g>

  <!-- 地球 -->
  <circle cx="400" cy="470" r="60" fill="#a8d0e8"/>
  <!-- 大陆 -->
  <g fill="#6a8d3f">
    <path d="M370 450 Q380 440 395 445 Q410 450 405 465 Q395 475 380 470 Q368 462 370 450 Z"/>
    <path d="M415 460 Q430 455 440 470 Q435 485 420 480 Q410 472 415 460 Z"/>
    <path d="M385 490 Q400 488 408 500 Q400 510 390 505 Z"/>
  </g>
  <!-- 地球轨道线 -->
  <ellipse cx="400" cy="470" rx="75" ry="20" fill="none" stroke="#7ab8d8" stroke-width="1" opacity="0.4"/>

  <!-- 标注 -->
  <rect x="340" y="100" width="120" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="118" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">太阳（大火球）</text>

  <rect x="350" y="540" width="100" height="26" fill="#fff6df" stroke="#7ab8d8" rx="4"/>
  <text x="400" y="558" text-anchor="middle" font-family="serif" font-size="14" fill="#4a6a2f">地球</text>

  <!-- 距离标注 -->
  <text x="150" y="360" font-family="serif" font-size="13" fill="#8d5a36">一亿五千万千米</text>
  <line x1="150" y1="370" x2="340" y2="370" stroke="#8d5a36" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="460" y1="370" x2="620" y2="370" stroke="#8d5a36" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">太阳又远又大又热，它的光和热是地球生命的源泉</text>
</svg>
