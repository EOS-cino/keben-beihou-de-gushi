<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="不同颜色的云朵在天空中的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">云朵的颜色</text>
  <line x="300" y1="56" x2="500" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——阳光和水滴的魔术</text>

  <!-- 白云（左上） -->
  <g transform="translate(180, 170)">
    <text x="0" y="-50" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">白云</text>
    <ellipse cx="0" cy="0" rx="50" ry="25" fill="#fef9ed" stroke="#c8843a" stroke-width="2"/>
    <ellipse cx="-30" cy="-5" rx="25" ry="18" fill="#fef9ed" stroke="#c8843a" stroke-width="2"/>
    <ellipse cx="30" cy="-8" rx="28" ry="20" fill="#fef9ed" stroke="#c8843a" stroke-width="2"/>
    <ellipse cx="10" cy="-20" rx="20" ry="15" fill="#fef9ed" stroke="#c8843a" stroke-width="2"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">小水滴散射所有光→白色</text>
  </g>

  <!-- 乌云（右上） -->
  <g transform="translate(600, 170)">
    <text x="0" y="-50" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">乌云</text>
    <ellipse cx="0" cy="0" rx="55" ry="28" fill="#5a4a3a" stroke="#7a3b14" stroke-width="2"/>
    <ellipse cx="-35" cy="-5" rx="28" ry="20" fill="#5a4a3a" stroke="#7a3b14" stroke-width="2"/>
    <ellipse cx="35" cy="-8" rx="30" ry="22" fill="#5a4a3a" stroke="#7a3b14" stroke-width="2"/>
    <ellipse cx="10" cy="-22" rx="22" ry="16" fill="#5a4a3a" stroke="#7a3b14" stroke-width="2"/>
    <!-- 雨滴 -->
    <g stroke="#7ab8d8" stroke-width="2" stroke-linecap="round">
      <line x1="-30" y1="25" x2="-33" y2="40"/>
      <line x1="-10" y1="28" x2="-13" y2="43"/>
      <line x1="10" y1="25" x2="7" y2="40"/>
      <line x1="30" y1="28" x2="27" y2="43"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">云太厚阳光穿不过→黑色</text>
  </g>

  <!-- 晚霞（中间大图） -->
  <g transform="translate(400, 350)">
    <text x="0" y="-80" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a" font-weight="bold">晚霞</text>
    <!-- 红色云 -->
    <ellipse cx="-60" cy="0" rx="45" ry="22" fill="#c84a3a" opacity="0.7" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="-80" cy="-5" rx="25" ry="15" fill="#e07856" opacity="0.7"/>
    <ellipse cx="-40" cy="-10" rx="20" ry="14" fill="#e07856" opacity="0.7"/>

    <ellipse cx="20" cy="5" rx="50" ry="25" fill="#e07856" opacity="0.7" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="-5" rx="25" ry="16" fill="#c8843a" opacity="0.7"/>
    <ellipse cx="40" cy="-8" rx="22" ry="15" fill="#c8843a" opacity="0.7"/>

    <ellipse cx="90" cy="0" rx="40" ry="20" fill="#c84a3a" opacity="0.6" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="75" cy="-5" rx="20" ry="13" fill="#e07856" opacity="0.6"/>

    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">傍晚阳光斜射，蓝光被散射掉，只剩红光和橙光照在云上</text>
  </g>

  <!-- 太阳（落山） -->
  <g transform="translate(700, 400)">
    <circle cx="0" cy="0" r="30" fill="#e07856" opacity="0.8"/>
    <circle cx="0" cy="0" r="22" fill="#c8843a"/>
    <!-- 阳光射线（斜射） -->
    <g stroke="#e07856" stroke-width="2" opacity="0.4">
      <line x1="-25" y1="-15" x2="-50" y2="-30"/>
      <line x1="-30" y1="0" x2="-55" y2="0"/>
      <line x1="-25" y1="15" x2="-50" y2="30"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">夕阳</text>
  </g>

  <!-- 光路示意（从太阳到云） -->
  <g opacity="0.3">
    <path d="M670 390 Q550 360 460 345" fill="none" stroke="#e07856" stroke-width="3" stroke-dasharray="5 3"/>
  </g>

  <!-- 科学原理标注 -->
  <g transform="translate(150, 420)">
    <rect x="-90" y="0" width="180" height="80" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14" font-weight="bold">云的颜色=</text>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">阳光 + 水滴大小</text>
    <text x="0" y="52" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">+ 云的厚度</text>
    <text x="0" y="69" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">+ 大气层散射</text>
  </g>

  <!-- 底部标注 -->
  <g transform="translate(400, 575)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">"朝霞不出门，晚霞行千里"——看云的颜色，猜天气</text>
  </g>
</svg>
