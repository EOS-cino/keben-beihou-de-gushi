<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="三个年轻人围在井边讨论幸福的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">幸福是什么</text>
  <line x1="330" y1="60" x2="470" y2="60" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="70" width="800" height="250" fill="#e8f0e6"/>
  <!-- 远山 -->
  <path d="M0 280 Q200 220 400 260 Q600 210 800 270 L800 320 L0 320 Z" fill="#6a8d3f" opacity="0.3"/>
  <!-- 太阳 -->
  <circle cx="120" cy="130" r="30" fill="#e8a838" opacity="0.7"/>
  <circle cx="120" cy="130" r="20" fill="#e8a838"/>

  <!-- 树林 -->
  <g>
    <rect x="60" y="280" width="10" height="60" fill="#5a3a1a"/>
    <circle cx="65" cy="270" r="28" fill="#2d6a4f"/>
    <rect x="720" y="280" width="10" height="60" fill="#5a3a1a"/>
    <circle cx="725" cy="270" r="28" fill="#2d6a4f"/>
  </g>

  <!-- 草地 -->
  <path d="M0 320 Q400 300 800 320 L800 600 L0 600 Z" fill="#6a8d3f" opacity="0.4"/>

  <!-- 老井（中间） -->
  <g>
    <!-- 井口 -->
    <ellipse cx="400" cy="400" rx="60" ry="20" fill="#3a2a1a"/>
    <ellipse cx="400" cy="395" rx="55" ry="16" fill="#4a90b8" opacity="0.7"/>
    <!-- 水波 -->
    <path d="M370 393 q15 -3 30 0 M410 396 q15 -3 30 0" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- 井壁（石头） -->
    <path d="M340 400 L345 470 L455 470 L460 400" fill="#8d6a4a" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 石头纹理 -->
    <path d="M345 420 L455 420 M345 440 L455 440" stroke="#5a3a1a" stroke-width="1"/>
    <line x1="380" y1="400" x2="380" y2="470" stroke="#5a3a1a" stroke-width="1"/>
    <line x1="420" y1="400" x2="420" y2="470" stroke="#5a3a1a" stroke-width="1"/>
  </g>

  <!-- 牧童1（医生，左边） -->
  <g>
    <rect x="180" y="400" width="40" height="70" rx="6" fill="#ffffff" stroke="#7a3b14" stroke-width="2"/>
    <!-- 听诊器 -->
    <path d="M195 420 q5 10 10 0" stroke="#4a90b8" stroke-width="2" fill="none"/>
    <circle cx="200" cy="430" r="4" fill="#4a90b8"/>
    <circle cx="200" cy="390" r="20" fill="#e8c9a0" stroke="#7a3b14" stroke-width="2"/>
    <path d="M185 387 q15 -12 30 0" fill="#3a2a1a"/>
    <circle cx="193" cy="390" r="2" fill="#3a2a1a"/>
    <circle cx="207" cy="390" r="2" fill="#3a2a1a"/>
    <path d="M193 398 q7 3 14 0" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
    <rect x="186" y="470" width="12" height="35" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="202" y="470" width="12" height="35" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 标签 -->
    <rect x="160" y="520" width="80" height="24" fill="#fff6df" stroke="#2d6a4f" rx="4"/>
    <text x="200" y="537" text-anchor="middle" font-family="serif" font-size="13" fill="#2d6a4f">医生·治病</text>
  </g>

  <!-- 牧童2（工人，右边） -->
  <g>
    <rect x="580" y="400" width="40" height="70" rx="6" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="600" cy="390" r="20" fill="#e8c9a0" stroke="#7a3b14" stroke-width="2"/>
    <path d="M585 387 q15 -12 30 0" fill="#5a3a1a"/>
    <circle cx="593" cy="390" r="2" fill="#3a2a1a"/>
    <circle cx="607" cy="390" r="2" fill="#3a2a1a"/>
    <path d="M593 398 q7 3 14 0" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
    <!-- 安全帽 -->
    <path d="M583 382 q17 -14 34 0" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="583" y="380" width="34" height="5" fill="#e07856"/>
    <rect x="586" y="470" width="12" height="35" fill="#5a3a1a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="602" y="470" width="12" height="35" fill="#5a3a1a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 扳手 -->
    <rect x="625" y="410" width="6" height="30" fill="#8d8d8d" stroke="#5a5a5a" stroke-width="1" transform="rotate(30 628 425)"/>
    <rect x="560" y="520" width="80" height="24" fill="#fff6df" stroke="#e8a838" rx="4"/>
    <text x="600" y="537" text-anchor="middle" font-family="serif" font-size="13" fill="#c8843a">工人·制造</text>
  </g>

  <!-- 牧童3（农民，中间靠后） -->
  <g>
    <rect x="380" y="280" width="40" height="60" rx="6" fill="#2d6a4f" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="400" cy="265" r="18" fill="#e8c9a0" stroke="#7a3b14" stroke-width="2"/>
    <path d="M387 262 q13 -10 26 0" fill="#3a2a1a"/>
    <circle cx="394" cy="265" r="2" fill="#3a2a1a"/>
    <circle cx="406" cy="265" r="2" fill="#3a2a1a"/>
    <path d="M394 272 q6 3 12 0" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
    <!-- 草帽 -->
    <ellipse cx="400" cy="252" rx="26" ry="6" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M385 252 q15 -12 30 0" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 麦穗 -->
    <path d="M430 290 q5 -8 0 -16 M435 295 q5 -8 0 -16" stroke="#e8a838" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="380" y="510" width="80" height="24" fill="#fff6df" stroke="#2d6a4f" rx="4"/>
    <text x="420" y="527" text-anchor="middle" font-family="serif" font-size="13" fill="#2d6a4f">农民·种粮</text>
  </g>

  <!-- 智慧姑娘（上方，半透明） -->
  <g opacity="0.7">
    <ellipse cx="400" cy="130" rx="20" ry="22" fill="#e8c9a0" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M385 125 q15 -14 30 0" fill="#e8a838"/>
    <circle cx="394" cy="130" r="2" fill="#3a2a1a"/>
    <circle cx="406" cy="130" r="2" fill="#3a2a1a"/>
    <path d="M394 140 q6 3 12 0" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
    <path d="M380 150 q20 30 40 0" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
    <!-- 光环 -->
    <ellipse cx="400" cy="128" rx="30" ry="32" fill="none" stroke="#e8a838" stroke-width="2" opacity="0.4" stroke-dasharray="4,3"/>
  </g>

  <!-- 十年标注 -->
  <text x="400" y="180" text-anchor="middle" font-family="serif" font-size="16" fill="#c8843a" font-weight="bold">十年后重逢</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">靠自己的劳动为别人带来好处，就是幸福</text>
</svg>
