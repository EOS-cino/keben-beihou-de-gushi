<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="牛郎织女鹊桥相会插画">
  <rect width="800" height="600" fill="#1a2a4a"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#f4d842">牛郎织女 · 鹊桥相会</text>
  <line x1="220" y1="62" x2="580" y2="62" stroke="#f4a842" stroke-width="2"/>

  <!-- 星空背景小星 -->
  <g fill="#fff6df">
    <circle cx="80" cy="120" r="1.5"/>
    <circle cx="150" cy="90" r="1"/>
    <circle cx="220" cy="140" r="1.5"/>
    <circle cx="300" cy="100" r="1"/>
    <circle cx="500" cy="95" r="1.5"/>
    <circle cx="580" cy="130" r="1"/>
    <circle cx="680" cy="100" r="1.5"/>
    <circle cx="740" cy="150" r="1"/>
    <circle cx="60" cy="200" r="1"/>
    <circle cx="120" cy="260" r="1.5"/>
    <circle cx="700" cy="220" r="1"/>
    <circle cx="750" cy="280" r="1.5"/>
    <circle cx="40" cy="350" r="1"/>
    <circle cx="760" cy="380" r="1"/>
  </g>

  <!-- 银河（斜跨夜空） -->
  <path d="M100 580 Q300 350 400 300 Q500 350 700 580 Z" fill="#3a5a8a" opacity="0.4"/>
  <path d="M150 580 Q320 380 400 330 Q480 380 650 580 Z" fill="#5a7ab8" opacity="0.3"/>
  <!-- 银河里的星点 -->
  <g fill="#fff6df" opacity="0.7">
    <circle cx="200" cy="450" r="1"/>
    <circle cx="260" cy="400" r="1.5"/>
    <circle cx="320" cy="370" r="1"/>
    <circle cx="480" cy="370" r="1.5"/>
    <circle cx="540" cy="400" r="1"/>
    <circle cx="600" cy="450" r="1.5"/>
    <circle cx="240" cy="490" r="1"/>
    <circle cx="560" cy="490" r="1"/>
  </g>

  <!-- 鹊桥（喜鹊搭成的桥，横跨银河） -->
  <path d="M250 380 Q400 320 550 380" fill="none" stroke="#5a4a3a" stroke-width="4"/>
  <!-- 喜鹊们 -->
  <g>
    <!-- 喜鹊1 -->
    <ellipse cx="280" cy="368" rx="14" ry="8" fill="#2a2a2a"/>
    <circle cx="290" cy="365" r="5" fill="#2a2a2a"/>
    <polygon points="295,365 302,363 302,367" fill="#f4a842"/>
    <path d="M275 365 L268 358 M275 370 L268 376" stroke="#2a2a2a" stroke-width="1.5"/>
    <!-- 喜鹊2 -->
    <ellipse cx="330" cy="350" rx="14" ry="8" fill="#2a2a2a"/>
    <circle cx="340" cy="347" r="5" fill="#2a2a2a"/>
    <polygon points="345,347 352,345 352,349" fill="#f4a842"/>
    <!-- 喜鹊3 -->
    <ellipse cx="400" cy="338" rx="14" ry="8" fill="#2a2a2a"/>
    <circle cx="410" cy="335" r="5" fill="#2a2a2a"/>
    <polygon points="415,335 422,333 422,337" fill="#f4a842"/>
    <!-- 喜鹊4 -->
    <ellipse cx="470" cy="350" rx="14" ry="8" fill="#2a2a2a"/>
    <circle cx="480" cy="347" r="5" fill="#2a2a2a"/>
    <polygon points="485,347 492,345 492,349" fill="#f4a842"/>
    <!-- 喜鹊5 -->
    <ellipse cx="520" cy="368" rx="14" ry="8" fill="#2a2a2a"/>
    <circle cx="530" cy="365" r="5" fill="#2a2a2a"/>
    <polygon points="535,365 542,363 542,367" fill="#f4a842"/>
  </g>

  <!-- 牛郎（左侧，挑着两个孩子） -->
  <g>
    <!-- 身体 -->
    <path d="M180 460 L185 390 L215 390 L220 460 Z" fill="#4a6a3a"/>
    <circle cx="200" cy="372" r="16" fill="#f0d0a8"/>
    <path d="M186 364 Q200 352 214 364 L214 358 Q200 346 186 358 Z" fill="#3a2a1a"/>
    <!-- 扁担 -->
    <line x1="160" y1="400" x2="240" y2="400" stroke="#7a5a3a" stroke-width="4"/>
    <!-- 孩子筐左 -->
    <ellipse cx="155" cy="415" rx="14" ry="10" fill="#8a6a3a"/>
    <circle cx="155" cy="408" r="7" fill="#f0d0a8"/>
    <!-- 孩子筐右 -->
    <ellipse cx="245" cy="415" rx="14" ry="10" fill="#8a6a3a"/>
    <circle cx="245" cy="408" r="7" fill="#f0d0a8"/>
    <!-- 牛郎星标注 -->
    <circle cx="200" cy="372" r="3" fill="#f4d842" opacity="0.6"/>
  </g>

  <!-- 织女（右侧） -->
  <g>
    <!-- 身体（仙女裙） -->
    <path d="M580 460 L585 380 L625 380 L630 460 Z" fill="#c45a8a"/>
    <path d="M575 460 L635 460 L640 470 L570 470 Z" fill="#a04a7a"/>
    <circle cx="605" cy="362" r="16" fill="#f0d0a8"/>
    <!-- 发髻 -->
    <ellipse cx="605" cy="348" rx="10" ry="8" fill="#3a2a1a"/>
    <circle cx="605" cy="344" r="4" fill="#f4a842"/>
    <!-- 飘带 -->
    <path d="M625 390 Q660 410 650 450" fill="none" stroke="#f4a842" stroke-width="3"/>
    <!-- 织女星标注 -->
    <circle cx="605" cy="362" r="3" fill="#f4d842" opacity="0.6"/>
  </g>

  <!-- 文字标注 -->
  <line x1="200" y1="356" x2="200" y2="300" stroke="#f4d842" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="150" y="275" width="100" height="26" fill="#1a2a4a" stroke="#f4a842" rx="4"/>
  <text x="200" y="293" text-anchor="middle" font-family="serif" font-size="15" fill="#f4d842">牛郎·牛郎星</text>

  <line x1="605" y1="346" x2="605" y2="300" stroke="#f4d842" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="555" y="275" width="100" height="26" fill="#1a2a4a" stroke="#f4a842" rx="4"/>
  <text x="605" y="293" text-anchor="middle" font-family="serif" font-size="15" fill="#f4d842">织女·织女星</text>

  <rect x="320" y="300" width="160" height="26" fill="#1a2a4a" stroke="#f4a842" rx="4"/>
  <text x="400" y="318" text-anchor="middle" font-family="serif" font-size="14" fill="#f4d842">喜鹊搭成的鹊桥</text>

  <!-- 底部说明 -->
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="16" fill="#f4d842">银河两岸，牛郎挑儿带女，与织女在鹊桥上一年一会</text>
</svg>
