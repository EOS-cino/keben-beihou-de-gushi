<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="彩色铅笔画出五彩世界的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">彩色的梦</text>
  <line x1="340" y1="62" x2="460" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 画纸（背景） -->
  <rect x="60" y="90" width="680" height="440" fill="#ffffff" stroke="#c8843a" stroke-width="2" rx="4" opacity="0.6"/>

  <!-- 彩色铅笔画的画 -->
  <!-- 草地 -->
  <path d="M60 460 Q400 430 740 460 L740 530 L60 530 Z" fill="#6a8d3f" opacity="0.5"/>
  <!-- 太阳 -->
  <circle cx="680" cy="150" r="35" fill="#f4c842" stroke="#e0a838" stroke-width="2"/>
  <g stroke="#f4c842" stroke-width="3" stroke-linecap="round">
    <line x1="680" y1="100" x2="680" y2="85"/>
    <line x1="680" y1="200" x2="680" y2="215"/>
    <line x1="630" y1="150" x2="615" y2="150"/>
    <line x1="730" y1="150" x2="745" y2="150"/>
    <line x1="645" y1="115" x2="635" y2="105"/>
    <line x1="715" y1="115" x2="725" y2="105"/>
    <line x1="645" y1="185" x2="635" y2="195"/>
    <line x1="715" y1="185" x2="725" y2="195"/>
  </g>

  <!-- 蓝天 -->
  <rect x="60" y="90" width="680" height="120" fill="#a8d0e8" opacity="0.3"/>

  <!-- 彩色铅笔（排列在画上） -->
  <!-- 红色铅笔 -->
  <g transform="translate(120, 200) rotate(20)">
    <rect x="0" y="0" width="16" height="180" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <polygon points="0,0 16,0 8,-20" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <polygon points="4,-8 12,-8 8,-20" fill="#2a2a2a"/>
    <rect x="0" y="170" width="16" height="12" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <!-- 橙色铅笔 -->
  <g transform="translate(160, 210) rotate(15)">
    <rect x="0" y="0" width="16" height="180" fill="#e07856" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <polygon points="0,0 16,0 8,-20" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <polygon points="4,-8 12,-8 8,-20" fill="#2a2a2a"/>
    <rect x="0" y="170" width="16" height="12" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <!-- 黄色铅笔 -->
  <g transform="translate(200, 215) rotate(10)">
    <rect x="0" y="0" width="16" height="180" fill="#f4c842" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <polygon points="0,0 16,0 8,-20" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <polygon points="4,-8 12,-8 8,-20" fill="#2a2a2a"/>
    <rect x="0" y="170" width="16" height="12" fill="#e0a838" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <!-- 绿色铅笔 -->
  <g transform="translate(240, 218) rotate(5)">
    <rect x="0" y="0" width="16" height="180" fill="#6a8d3f" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <polygon points="0,0 16,0 8,-20" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <polygon points="4,-8 12,-8 8,-20" fill="#2a2a2a"/>
    <rect x="0" y="170" width="16" height="12" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <!-- 蓝色铅笔 -->
  <g transform="translate(280, 218) rotate(0)">
    <rect x="0" y="0" width="16" height="180" fill="#7ab8d8" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <polygon points="0,0 16,0 8,-20" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <polygon points="4,-8 12,-8 8,-20" fill="#2a2a2a"/>
    <rect x="0" y="170" width="16" height="12" fill="#a8d0e8" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 画出的花朵 -->
  <g transform="translate(450, 380)">
    <circle cx="0" cy="0" r="14" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="#f4c842"/>
    <line x1="0" y1="14" x2="0" y2="60" stroke="#4a6a2f" stroke-width="3"/>
    <path d="M0 40 Q-10 35 -15 45" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
  </g>
  <g transform="translate(520, 400)">
    <circle cx="0" cy="0" r="12" fill="#f4c842" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="#7a3b14"/>
    <line x1="0" y1="12" x2="0" y2="55" stroke="#4a6a2f" stroke-width="3"/>
  </g>
  <g transform="translate(580, 390)">
    <circle cx="0" cy="0" r="13" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="#f4c842"/>
    <line x1="0" y1="13" x2="0" y2="58" stroke="#4a6a2f" stroke-width="3"/>
    <path d="M0 35 Q12 30 17 40" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
  </g>

  <!-- 小鸟 -->
  <g transform="translate(380, 160)">
    <ellipse cx="0" cy="0" rx="16" ry="11" fill="#7ab8d8" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="14" cy="-3" r="7" fill="#7ab8d8" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="16" cy="-4" r="2" fill="#2a2a2a"/>
    <polygon points="20,-3 28,-2 20,1" fill="#f4c842" stroke="#7a3b14" stroke-width="1"/>
    <path d="M-5 0 Q-15 -8 -20 0" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 树 -->
  <g transform="translate(620, 350)">
    <rect x="-6" y="0" width="12" height="60" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <circle cx="0" cy="-10" r="30" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
    <circle cx="-15" cy="-5" r="18" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
    <circle cx="15" cy="-5" r="18" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
  </g>

  <!-- 标注：彩色铅笔 -->
  <line x1="200" y1="200" x2="200" y2="120" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="135" y="95" width="130" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="200" y="113" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">彩色铅笔</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">脚尖滑过的地方，草坪绿了，野花红了，天空蓝了——这是彩色的梦</text>
</svg>
