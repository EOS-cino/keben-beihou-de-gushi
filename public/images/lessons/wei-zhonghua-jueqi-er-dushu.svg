<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="少年周恩来在课堂立志读书插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#7a3b14">为中华之崛起而读书</text>
  <line x1="200" y1="62" x2="600" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 教室墙壁 -->
  <rect x="0" y="80" width="800" height="440" fill="#f0e8d0"/>
  <!-- 墙裙 -->
  <rect x="0" y="400" width="800" height="120" fill="#d8c8a0"/>

  <!-- 黑板 -->
  <rect x="200" y="110" width="400" height="180" fill="#2a4a2a" stroke="#8a6a3a" stroke-width="6"/>
  <!-- 黑板边框装饰 -->
  <rect x="195" y="105" width="410" height="190" fill="none" stroke="#6a4a2a" stroke-width="2"/>
  <!-- 黑板上的字 -->
  <text x="400" y="170" text-anchor="middle" font-family="serif" font-size="24" fill="#f8f0c8" font-weight="bold">为中华之崛起</text>
  <text x="400" y="210" text-anchor="middle" font-family="serif" font-size="24" fill="#f8f0c8" font-weight="bold">而读书</text>
  <line x1="320" y1="230" x2="480" y2="230" stroke="#f8f0c8" stroke-width="2"/>
  <text x="400" y="265" text-anchor="middle" font-family="serif" font-size="14" fill="#d8c898">—— 周恩来</text>

  <!-- 地面 -->
  <rect x="0" y="520" width="800" height="80" fill="#c8a878"/>

  <!-- 课桌（少年周恩来的书桌） -->
  <!-- 桌面 -->
  <rect x="250" y="420" width="200" height="15" fill="#8a5a30" stroke="#5a3a10" stroke-width="2"/>
  <!-- 桌腿 -->
  <rect x="260" y="435" width="12" height="85" fill="#8a5a30" stroke="#5a3a10" stroke-width="2"/>
  <rect x="428" y="435" width="12" height="85" fill="#8a5a30" stroke="#5a3a10" stroke-width="2"/>
  <!-- 抽屉 -->
  <rect x="255" y="415" width="190" height="10" fill="#6a4220" stroke="#5a3a10" stroke-width="1.5"/>

  <!-- 书本（桌上） -->
  <!-- 打开的书 -->
  <path d="M280 415 L280 405 L360 405 L360 415 Z" fill="#fff8e0" stroke="#8a6a30" stroke-width="1.5"/>
  <path d="M360 415 L360 405 L440 405 L440 415 Z" fill="#fff8e0" stroke="#8a6a30" stroke-width="1.5"/>
  <!-- 书页线条 -->
  <line x1="290" y1="408" x2="350" y2="408" stroke="#c8a860" stroke-width="0.8"/>
  <line x1="290" y1="411" x2="350" y2="411" stroke="#c8a860" stroke-width="0.8"/>
  <line x1="370" y1="408" x2="430" y2="408" stroke="#c8a860" stroke-width="0.8"/>
  <line x1="370" y1="411" x2="430" y2="411" stroke="#c8a860" stroke-width="0.8"/>
  <!-- 书脊 -->
  <line x1="360" y1="405" x2="360" y2="415" stroke="#8a6a30" stroke-width="2"/>

  <!-- 叠放的书 -->
  <rect x="300" y="395" width="80" height="10" fill="#c84030" stroke="#8a2010" stroke-width="1.5"/>
  <rect x="310" y="385" width="60" height="10" fill="#2e5a8a" stroke="#1e3a5a" stroke-width="1.5"/>

  <!-- 笔筒 -->
  <rect x="445" y="395" width="20" height="25" fill="#6a4220" stroke="#3a2010" stroke-width="1.5"/>
  <line x1="450" y1="395" x2="450" y2="380" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="455" y1="395" x2="455" y2="375" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="460" y1="395" x2="460" y2="382" stroke="#c84030" stroke-width="2"/>

  <!-- 少年周恩来（坐在课桌后，目光坚定） -->
  <!-- 身体 -->
  <path d="M330 420 L335 350 L385 350 L390 420 Z" fill="#1e3a5a"/>
  <!-- 衣领 -->
  <path d="M335 350 L360 365 L385 350" fill="none" stroke="#0e2a4a" stroke-width="2"/>
  <!-- 头 -->
  <circle cx="360" cy="325" r="22" fill="#f0d0a8"/>
  <!-- 头发 -->
  <path d="M338 322 Q360 300 382 322 L382 314 Q360 296 338 314 Z" fill="#2a2a2a"/>
  <!-- 眼睛（坚定有神） -->
  <ellipse cx="353" cy="325" rx="2.5" ry="2.5" fill="#2a2a2a"/>
  <ellipse cx="367" cy="325" rx="2.5" ry="2.5" fill="#2a2a2a"/>
  <!-- 眉毛 -->
  <path d="M348 318 L358 320" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M362 320 L372 318" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 嘴（坚定） -->
  <path d="M353 337 Q360 340 367 337" fill="none" stroke="#7a3b14" stroke-width="2"/>
  <!-- 手臂（放在桌上） -->
  <path d="M335 365 L310 410" fill="none" stroke="#1e3a5a" stroke-width="10" stroke-linecap="round"/>
  <circle cx="308" cy="412" r="8" fill="#f0d0a8"/>
  <path d="M385 365 L410 410" fill="none" stroke="#1e3a5a" stroke-width="10" stroke-linecap="round"/>
  <circle cx="412" cy="412" r="8" fill="#f0d0a8"/>

  <!-- 其他同学（背景，模糊） -->
  <!-- 同学1 -->
  <circle cx="100" cy="380" r="14" fill="#f0d0a8" opacity="0.6"/>
  <path d="M88 380 Q100 368 112 380 L112 374 Q100 364 88 374 Z" fill="#2a2a2a" opacity="0.6"/>
  <path d="M90 394 L93 430 L107 430 L110 394 Z" fill="#3a6a4a" opacity="0.6"/>

  <!-- 同学2 -->
  <circle cx="600" cy="380" r="14" fill="#f0d0a8" opacity="0.6"/>
  <path d="M588 380 Q600 368 612 380 L612 374 Q600 364 588 374 Z" fill="#2a2a2a" opacity="0.6"/>
  <path d="M590 394 L593 430 L607 430 L610 394 Z" fill="#c84030" opacity="0.6"/>

  <!-- 同学3 -->
  <circle cx="700" cy="380" r="14" fill="#f0d0a8" opacity="0.6"/>
  <path d="M688 380 Q700 368 712 380 L712 374 Q700 364 688 374 Z" fill="#2a2a2a" opacity="0.6"/>
  <path d="M690 394 L693 430 L707 430 L710 394 Z" fill="#2e5a8a" opacity="0.6"/>

  <!-- 国旗（墙上） -->
  <rect x="60" y="120" width="80" height="55" fill="#c84030" stroke="#8a2010" stroke-width="2"/>
  <!-- 五星 -->
  <g fill="#f4c842">
    <polygon points="85,140 88,148 96,148 90,153 92,161 85,156 78,161 80,153 74,148 82,148"/>
    <circle cx="105" cy="135" r="2.5"/>
    <circle cx="112" cy="142" r="2.5"/>
    <circle cx="112" cy="152" r="2.5"/>
    <circle cx="105" cy="158" r="2.5"/>
  </g>
  <!-- 旗杆 -->
  <line x1="60" y1="110" x2="60" y2="190" stroke="#5a3a10" stroke-width="3"/>

  <!-- 周恩来标注 -->
  <line x1="360" y1="300" x2="360" y2="265" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="305" y="240" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="360" y="258" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">少年周恩来</text>

  <!-- 书桌标注 -->
  <line x1="350" y1="435" x2="350" y2="470" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="305" y="475" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="350" y="493" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">书桌</text>

  <!-- 书本标注 -->
  <line x1="400" y1="400" x2="470" y2="370" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="475" y="357" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="520" y="375" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">书本</text>

  <!-- 黑板标注 -->
  <line x1="600" y1="200" x2="660" y2="200" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="665" y="187" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="710" y="205" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">黑板</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">少年周恩来在课堂上立下宏愿：为中华之崛起而读书</text>
</svg>