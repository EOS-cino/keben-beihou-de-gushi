<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="巨人劈开混沌、天地初开插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">开天辟地</text>
  <line x1="300" y1="60" x2="500" y2="60" stroke="#e8a838" stroke-width="2"/>

  <!-- 天（上方清气） -->
  <rect x="0" y="80" width="800" height="210" fill="#4a90b8" opacity="0.35"/>
  <!-- 云朵 -->
  <g fill="#f8f8f0" opacity="0.85">
    <ellipse cx="130" cy="150" rx="42" ry="18"/>
    <ellipse cx="165" cy="142" rx="30" ry="15"/>
    <ellipse cx="590" cy="135" rx="46" ry="20"/>
    <ellipse cx="625" cy="128" rx="30" ry="15"/>
    <ellipse cx="360" cy="110" rx="36" ry="16"/>
  </g>
  <!-- 太阳 -->
  <circle cx="690" cy="175" r="34" fill="#e8a838" stroke="#c88820" stroke-width="2"/>
  <g stroke="#e8a838" stroke-width="3" stroke-linecap="round">
    <line x1="690" y1="128" x2="690" y2="113"/>
    <line x1="690" y1="222" x2="690" y2="237"/>
    <line x1="643" y1="175" x2="628" y2="175"/>
    <line x1="737" y1="175" x2="752" y2="175"/>
  </g>

  <!-- 地（下方浊气） -->
  <rect x="0" y="390" width="800" height="210" fill="#c8a878"/>
  <path d="M0 410 Q200 405 400 410 T800 410" fill="none" stroke="#a88858" stroke-width="2"/>
  <path d="M0 450 Q200 445 400 450 T800 450" fill="none" stroke="#a88858" stroke-width="2"/>
  <path d="M0 490 Q200 485 400 490 T800 490" fill="none" stroke="#a88858" stroke-width="2"/>
  <!-- 山石 -->
  <g fill="#a88868" stroke="#8a6848" stroke-width="1.5">
    <ellipse cx="110" cy="510" rx="32" ry="16"/>
    <ellipse cx="670" cy="518" rx="36" ry="18"/>
    <ellipse cx="210" cy="545" rx="26" ry="12"/>
    <ellipse cx="590" cy="548" rx="28" ry="14"/>
  </g>

  <!-- 天地分开的发光缝隙 -->
  <rect x="0" y="298" width="800" height="22" fill="#f8e898" opacity="0.6"/>
  <rect x="0" y="303" width="800" height="12" fill="#fff8c8" opacity="0.85"/>
  <g stroke="#e8a838" stroke-width="2" opacity="0.5">
    <line x1="120" y1="303" x2="120" y2="282"/>
    <line x1="220" y1="303" x2="220" y2="278"/>
    <line x1="320" y1="303" x2="320" y2="282"/>
    <line x1="480" y1="303" x2="480" y2="282"/>
    <line x1="580" y1="303" x2="580" y2="278"/>
    <line x1="680" y1="303" x2="680" y2="282"/>
  </g>

  <!-- 巨人（顶天立地） -->
  <!-- 躯干 -->
  <path d="M362 390 L367 265 L433 265 L438 390 Z" fill="#e07856" stroke="#a04830" stroke-width="2.5"/>
  <path d="M382 285 Q400 295 418 285" fill="none" stroke="#c05828" stroke-width="1.5"/>
  <path d="M385 325 Q400 335 415 325" fill="none" stroke="#c05828" stroke-width="1.5"/>
  <!-- 头 -->
  <circle cx="400" cy="238" r="28" fill="#f0d0a8" stroke="#c89060" stroke-width="2"/>
  <!-- 头发 -->
  <path d="M375 230 Q400 200 425 230 Q430 215 425 205 Q400 185 375 205 Q370 215 375 230" fill="#2a2a2a"/>
  <path d="M378 212 Q370 197 365 187" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <path d="M422 212 Q430 197 435 187" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- 眼睛 -->
  <ellipse cx="390" cy="238" rx="3.5" ry="3" fill="#2a2a2a"/>
  <ellipse cx="410" cy="238" rx="3.5" ry="3" fill="#2a2a2a"/>
  <!-- 眉毛 -->
  <path d="M383 231 L395 233" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <path d="M405 233 L417 231" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- 嘴 -->
  <path d="M391 251 Q400 255 409 251" fill="none" stroke="#7a3b14" stroke-width="2"/>
  <!-- 双臂上举 -->
  <path d="M367 275 L312 222 L292 202" fill="none" stroke="#e07856" stroke-width="16" stroke-linecap="round"/>
  <circle cx="290" cy="200" r="12" fill="#f0d0a8" stroke="#c89060" stroke-width="2"/>
  <path d="M433 275 L488 222 L508 202" fill="none" stroke="#e07856" stroke-width="16" stroke-linecap="round"/>
  <circle cx="510" cy="200" r="12" fill="#f0d0a8" stroke="#c89060" stroke-width="2"/>
  <!-- 双腿踏地 -->
  <path d="M372 390 L357 448 L352 488" fill="none" stroke="#e07856" stroke-width="16" stroke-linecap="round"/>
  <path d="M428 390 L443 448 L448 488" fill="none" stroke="#e07856" stroke-width="16" stroke-linecap="round"/>
  <ellipse cx="347" cy="493" rx="18" ry="10" fill="#f0d0a8" stroke="#c89060" stroke-width="2"/>
  <ellipse cx="453" cy="493" rx="18" ry="10" fill="#f0d0a8" stroke="#c89060" stroke-width="2"/>

  <!-- 斧头 -->
  <line x1="290" y1="200" x2="252" y2="152" stroke="#6a4220" stroke-width="6" stroke-linecap="round"/>
  <path d="M242 147 L272 142 L277 167 L262 177 L247 167 Z" fill="#b0b0b0" stroke="#6a6a6a" stroke-width="2.5"/>
  <path d="M252 150 L267 152 L264 162" fill="none" stroke="#e0e0e0" stroke-width="2"/>

  <!-- 标注 -->
  <line x1="400" y1="205" x2="400" y2="165" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="358" y="140" width="84" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="400" y="158" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">盘古</text>

  <line x1="150" y1="150" x2="150" y2="108" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="108" y="82" width="84" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="150" y="100" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">天（清气）</text>

  <line x1="150" y1="450" x2="150" y2="488" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="108" y="494" width="84" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="150" y="512" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">地（浊气）</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">巨人劈开混沌，清气上升为天，浊气下沉为地，顶天立地万八千年</text>
</svg>
