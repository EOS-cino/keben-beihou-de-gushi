<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="雪地里的芦花鞋与少年背影的画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">芦花鞋</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#5d8aa8" stroke-width="2"/>
  <!-- 雪天 -->
  <rect x="0" y="100" width="800" height="260" fill="#e8eef2"/>
  <circle cx="180" cy="150" r="3" fill="#ffffff" stroke="#9bb7c4"/>
  <circle cx="320" cy="130" r="3" fill="#ffffff" stroke="#9bb7c4"/>
  <circle cx="460" cy="160" r="3" fill="#ffffff" stroke="#9bb7c4"/>
  <circle cx="600" cy="140" r="3" fill="#ffffff" stroke="#9bb7c4"/>
  <circle cx="680" cy="170" r="3" fill="#ffffff" stroke="#9bb7c4"/>
  <!-- 雪地 -->
  <rect x="0" y="360" width="800" height="240" fill="#ffffff" stroke="#9bb7c4" stroke-width="1"/>
  <!-- 背着鞋的少年背影 -->
  <ellipse cx="400" cy="240" rx="36" ry="40" fill="#3a3a3a"/>
  <rect x="372" y="276" width="56" height="90" fill="#5d4037"/>
  <!-- 一捆芦花鞋（背上） -->
  <ellipse cx="400" cy="230" rx="70" ry="30" fill="#f5efe0" stroke="#8a6d3b" stroke-width="1.5"/>
  <ellipse cx="360" cy="225" rx="20" ry="14" fill="#f5efe0" stroke="#8a6d3b" stroke-width="1.5"/>
  <ellipse cx="400" cy="215" rx="20" ry="14" fill="#f5efe0" stroke="#8a6d3b" stroke-width="1.5"/>
  <ellipse cx="440" cy="225" rx="20" ry="14" fill="#f5efe0" stroke="#8a6d3b" stroke-width="1.5"/>
  <!-- 芦花绒 -->
  <circle cx="360" cy="220" r="2" fill="#d8c89a"/>
  <circle cx="400" cy="210" r="2" fill="#d8c89a"/>
  <circle cx="440" cy="220" r="2" fill="#d8c89a"/>
  <!-- 脚印 -->
  <ellipse cx="370" cy="395" rx="8" ry="5" fill="#9bb7c4"/>
  <ellipse cx="430" cy="395" rx="8" ry="5" fill="#9bb7c4"/>
  <ellipse cx="350" cy="425" rx="8" ry="5" fill="#9bb7c4" opacity="0.7"/>
  <ellipse cx="450" cy="425" rx="8" ry="5" fill="#9bb7c4" opacity="0.7"/>
  <ellipse cx="330" cy="455" rx="8" ry="5" fill="#9bb7c4" opacity="0.5"/>
  <ellipse cx="470" cy="455" rx="8" ry="5" fill="#9bb7c4" opacity="0.5"/>
  <!-- 一双芦花鞋（前景） -->
  <ellipse cx="200" cy="470" rx="34" ry="16" fill="#f5efe0" stroke="#8a6d3b" stroke-width="2"/>
  <ellipse cx="200" cy="470" rx="14" ry="7" fill="#d8c89a"/>
  <ellipse cx="260" cy="475" rx="34" ry="16" fill="#f5efe0" stroke="#8a6d3b" stroke-width="2"/>
  <ellipse cx="260" cy="475" rx="14" ry="7" fill="#d8c89a"/>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14">雪天里，一串温暖的脚印</text>
</svg>
