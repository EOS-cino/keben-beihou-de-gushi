<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="农夫拔高禾苗、禾苗枯萎的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" fill="#2d2a24" font-family="sans-serif" font-weight="bold">揠苗助长</text>

  <!-- 天空 -->
  <rect x="0" y="60" width="800" height="240" fill="#d6ecf7"/>
  <!-- 太阳 -->
  <circle cx="680" cy="110" r="28" fill="#f4b942"/>
  <circle cx="680" cy="110" r="36" fill="#f4b942" opacity="0.25"/>
  <!-- 云朵 -->
  <ellipse cx="130" cy="100" rx="40" ry="15" fill="#ffffff" opacity="0.85"/>

  <!-- 地面/田地 -->
  <path d="M0 300 L800 300 L800 600 L0 600 Z" fill="#8a7a5a"/>
  <path d="M0 310 Q200 305 400 310 Q600 315 800 308 L800 600 L0 600 Z" fill="#7a6a4a"/>
  <!-- 田垄纹理 -->
  <g stroke="#6b5a3a" stroke-width="1.5" opacity="0.4">
    <line x1="0" y1="340" x2="800" y2="340"/>
    <line x1="0" y1="380" x2="800" y2="380"/>
    <line x1="0" y1="420" x2="800" y2="420"/>
    <line x1="0" y1="460" x2="800" y2="460"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="540" x2="800" y2="540"/>
  </g>

  <!-- 左半边：被拔高的禾苗（枯萎） -->
  <g transform="translate(200,310)">
    <text x="0" y="-10" text-anchor="middle" font-size="13" fill="#c84a3a" font-family="sans-serif" font-weight="bold">拔高后 → 枯萎</text>
    <!-- 枯萎的禾苗 -->
    <g transform="translate(-60,30)">
      <path d="M0 80 Q-2 40 0 0" fill="none" stroke="#8d7a3d" stroke-width="3"/>
      <path d="M0 40 Q-10 30 -15 15" fill="none" stroke="#a89858" stroke-width="2"/>
      <path d="M0 30 Q10 20 15 5" fill="none" stroke="#a89858" stroke-width="2"/>
      <path d="M0 0 Q-5 -10 -8 -20" fill="none" stroke="#8d7a3d" stroke-width="2"/>
      <!-- 卷曲的枯叶 -->
      <ellipse cx="-8" cy="-15" rx="3" ry="8" fill="#a89858" transform="rotate(-30 -8 -15)"/>
      <ellipse cx="8" cy="-10" rx="3" ry="8" fill="#a89858" transform="rotate(30 8 -10)"/>
    </g>
    <g transform="translate(-30,30)">
      <path d="M0 80 Q2 40 0 0" fill="none" stroke="#8d7a3d" stroke-width="3"/>
      <path d="M0 45 Q-12 35 -18 20" fill="none" stroke="#a89858" stroke-width="2"/>
      <path d="M0 35 Q12 25 18 10" fill="none" stroke="#a89858" stroke-width="2"/>
      <ellipse cx="-10" cy="-12" rx="3" ry="8" fill="#a89858" transform="rotate(-40 -10 -12)"/>
      <ellipse cx="10" cy="-8" rx="3" ry="8" fill="#a89858" transform="rotate(40 10 -8)"/>
    </g>
    <g transform="translate(0,30)">
      <path d="M0 80 Q-1 40 0 0" fill="none" stroke="#8d7a3d" stroke-width="3"/>
      <path d="M0 40 Q-10 30 -15 15" fill="none" stroke="#a89858" stroke-width="2"/>
      <path d="M0 30 Q10 20 15 5" fill="none" stroke="#a89858" stroke-width="2"/>
      <ellipse cx="-8" cy="-15" rx="3" ry="8" fill="#a89858" transform="rotate(-30 -8 -15)"/>
      <ellipse cx="8" cy="-10" rx="3" ry="8" fill="#a89858" transform="rotate(30 8 -10)"/>
    </g>
    <g transform="translate(30,30)">
      <path d="M0 80 Q1 40 0 0" fill="none" stroke="#8d7a3d" stroke-width="3"/>
      <path d="M0 45 Q-12 35 -18 20" fill="none" stroke="#a89858" stroke-width="2"/>
      <path d="M0 35 Q12 25 18 10" fill="none" stroke="#a89858" stroke-width="2"/>
      <ellipse cx="-10" cy="-12" rx="3" ry="8" fill="#a89858" transform="rotate(-40 -10 -12)"/>
      <ellipse cx="10" cy="-8" rx="3" ry="8" fill="#a89858" transform="rotate(40 10 -8)"/>
    </g>
    <g transform="translate(60,30)">
      <path d="M0 80 Q-2 40 0 0" fill="none" stroke="#8d7a3d" stroke-width="3"/>
      <path d="M0 40 Q-10 30 -15 15" fill="none" stroke="#a89858" stroke-width="2"/>
      <path d="M0 30 Q10 20 15 5" fill="none" stroke="#a89858" stroke-width="2"/>
      <ellipse cx="-8" cy="-15" rx="3" ry="8" fill="#a89858" transform="rotate(-30 -8 -15)"/>
      <ellipse cx="8" cy="-10" rx="3" ry="8" fill="#a89858" transform="rotate(30 8 -10)"/>
    </g>
    <!-- 根部露出泥土（被拔起） -->
    <g transform="translate(0,110)">
      <ellipse cx="-30" cy="0" rx="8" ry="3" fill="#5a4a2a"/>
      <ellipse cx="0" cy="0" rx="8" ry="3" fill="#5a4a2a"/>
      <ellipse cx="30" cy="0" rx="8" ry="3" fill="#5a4a2a"/>
    </g>
  </g>

  <!-- 中间分隔线 -->
  <line x1="400" y1="300" x2="400" y2="560" stroke="#8d6a3d" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- 右半边：正常生长的禾苗（对比） -->
  <g transform="translate(600,310)">
    <text x="0" y="-10" text-anchor="middle" font-size="13" fill="#3a6b28" font-family="sans-serif" font-weight="bold">正常生长 → 健康</text>
    <!-- 健康的禾苗 -->
    <g transform="translate(-60,30)">
      <path d="M0 110 L0 50" fill="none" stroke="#4a8a3a" stroke-width="3"/>
      <path d="M0 70 Q-10 60 -15 45" fill="none" stroke="#5cb070" stroke-width="2.5"/>
      <path d="M0 60 Q10 50 15 35" fill="none" stroke="#5cb070" stroke-width="2.5"/>
      <path d="M0 50 Q-8 40 -12 25" fill="none" stroke="#6ab04c" stroke-width="2"/>
      <path d="M0 45 Q8 35 12 20" fill="none" stroke="#6ab04c" stroke-width="2"/>
      <ellipse cx="0" cy="45" rx="3" ry="10" fill="#7cc85a"/>
    </g>
    <g transform="translate(-30,30)">
      <path d="M0 110 L0 55" fill="none" stroke="#4a8a3a" stroke-width="3"/>
      <path d="M0 75 Q-10 65 -15 50" fill="none" stroke="#5cb070" stroke-width="2.5"/>
      <path d="M0 65 Q10 55 15 40" fill="none" stroke="#5cb070" stroke-width="2.5"/>
      <path d="M0 55 Q-8 45 -12 30" fill="none" stroke="#6ab04c" stroke-width="2"/>
      <path d="M0 50 Q8 40 12 25" fill="none" stroke="#6ab04c" stroke-width="2"/>
      <ellipse cx="0" cy="50" rx="3" ry="10" fill="#7cc85a"/>
    </g>
    <g transform="translate(0,30)">
      <path d="M0 110 L0 50" fill="none" stroke="#4a8a3a" stroke-width="3"/>
      <path d="M0 70 Q-10 60 -15 45" fill="none" stroke="#5cb070" stroke-width="2.5"/>
      <path d="M0 60 Q10 50 15 35" fill="none" stroke="#5cb070" stroke-width="2.5"/>
      <path d="M0 50 Q-8 40 -12 25" fill="none" stroke="#6ab04c" stroke-width="2"/>
      <path d="M0 45 Q8 35 12 20" fill="none" stroke="#6ab04c" stroke-width="2"/>
      <ellipse cx="0" cy="45" rx="3" ry="10" fill="#7cc85a"/>
    </g>
    <g transform="translate(30,30)">
      <path d="M0 110 L0 55" fill="none" stroke="#4a8a3a" stroke-width="3"/>
      <path d="M0 75 Q-10 65 -15 50" fill="none" stroke="#5cb070" stroke-width="2.5"/>
      <path d="M0 65 Q10 55 15 40" fill="none" stroke="#5cb070" stroke-width="2.5"/>
      <path d="M0 55 Q-8 45 -12 30" fill="none" stroke="#6ab04c" stroke-width="2"/>
      <path d="M0 50 Q8 40 12 25" fill="none" stroke="#6ab04c" stroke-width="2"/>
      <ellipse cx="0" cy="50" rx="3" ry="10" fill="#7cc85a"/>
    </g>
    <g transform="translate(60,30)">
      <path d="M0 110 L0 50" fill="none" stroke="#4a8a3a" stroke-width="3"/>
      <path d="M0 70 Q-10 60 -15 45" fill="none" stroke="#5cb070" stroke-width="2.5"/>
      <path d="M0 60 Q10 50 15 35" fill="none" stroke="#5cb070" stroke-width="2.5"/>
      <path d="M0 50 Q-8 40 -12 25" fill="none" stroke="#6ab04c" stroke-width="2"/>
      <path d="M0 45 Q8 35 12 20" fill="none" stroke="#6ab04c" stroke-width="2"/>
      <ellipse cx="0" cy="45" rx="3" ry="10" fill="#7cc85a"/>
    </g>
  </g>

  <!-- 农夫（正在拔苗） -->
  <g transform="translate(200,200)">
    <!-- 头 -->
    <circle cx="0" cy="0" r="14" fill="#f4c8a0"/>
    <!-- 草帽 -->
    <ellipse cx="0" cy="-8" rx="22" ry="6" fill="#c4a468"/>
    <path d="M-12 -8 Q-10 -18 0 -16 Q10 -18 12 -8" fill="#d4b878"/>
    <!-- 眼睛 -->
    <circle cx="-5" cy="-1" r="1.5" fill="#1a1a1a"/>
    <circle cx="5" cy="-1" r="1.5" fill="#1a1a1a"/>
    <!-- 嘴（得意） -->
    <path d="M-4 6 Q0 10 4 6" fill="none" stroke="#8d5a3d" stroke-width="1.5"/>
    <!-- 身体 -->
    <path d="M-16 14 L-20 50 L20 50 L16 14 Z" fill="#8d6a3d"/>
    <!-- 弯腰拔苗的手臂 -->
    <path d="M16 18 Q25 30 30 45" fill="none" stroke="#8d6a3d" stroke-width="6" stroke-linecap="round"/>
    <path d="M-16 18 Q-25 30 -30 45" fill="none" stroke="#8d6a3d" stroke-width="6" stroke-linecap="round"/>
    <!-- 汗滴 -->
    <ellipse cx="18" cy="-5" rx="2" ry="4" fill="#7ec0db" opacity="0.7"/>
  </g>
  <text x="200" y="265" text-anchor="middle" font-size="11" fill="#6b4a2d" font-family="sans-serif" font-weight="bold">农夫</text>

  <!-- 底部说明 -->
  <g transform="translate(400,560)">
    <rect x="-200" y="-20" width="400" height="30" rx="8" fill="#ffffff" opacity="0.85" stroke="#8d6a3d" stroke-width="1"/>
    <text x="0" y="0" text-anchor="middle" font-size="13" fill="#6b6557" font-family="sans-serif">急于求成反而坏事——尊重自然规律，才能让禾苗好好生长</text>
  </g>
</svg>
