<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="孩子从怕黑到在月光下散步看见花草小鸟的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">夜色</text>

  <!-- 分割线 -->
  <line x1="400" y1="80" x2="400" y2="560" stroke="#c8843a" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- 左边：从前怕黑 -->
  <text x="200" y="110" text-anchor="middle" font-family="serif" font-size="18" fill="#8d5a36" font-weight="bold">从前·怕黑</text>
  <rect x="40" y="120" width="360" height="430" fill="#1f2a3a" opacity="0.85"/>
  <!-- 窗户 -->
  <rect x="120" y="200" width="160" height="180" fill="#0a1020" stroke="#7a3b14" stroke-width="6"/>
  <line x1="200" y1="200" x2="200" y2="380" stroke="#7a3b14" stroke-width="4"/>
  <line x1="120" y1="290" x2="280" y2="290" stroke="#7a3b14" stroke-width="4"/>
  <!-- 窗外黑影（像怪物） -->
  <path d="M130 370 Q150 320 170 370 Z" fill="#3a3a4a" opacity="0.7"/>
  <path d="M210 370 Q235 310 260 370 Z" fill="#3a3a4a" opacity="0.7"/>
  <!-- 月亮小 -->
  <circle cx="255" cy="230" r="14" fill="#f4d97a" opacity="0.6"/>

  <!-- 躲在被窝的孩子 -->
  <g transform="translate(200,440)">
    <!-- 被子 -->
    <path d="M-80 40 Q-80 -10 -40 -15 Q0 -20 40 -15 Q80 -10 80 40 Z" fill="#c84a3a"/>
    <path d="M-80 40 Q-80 -10 -40 -15 Q0 -20 40 -15 Q80 -10 80 40" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 露出的脸 -->
    <circle cx="0" cy="-20" r="18" fill="#f0c8a0"/>
    <!-- 害怕的眼睛 -->
    <ellipse cx="-6" cy="-22" rx="3" ry="4" fill="#1a1a1a"/>
    <ellipse cx="6" cy="-22" rx="3" ry="4" fill="#1a1a1a"/>
    <!-- 害怕的嘴 -->
    <ellipse cx="0" cy="-12" rx="3" ry="4" fill="#1a1a1a"/>
  </g>
  <text x="200" y="510" text-anchor="middle" font-family="serif" font-size="13" fill="#fef9ed">心咚咚跳，不敢往外瞧</text>

  <!-- 右边：后来不怕 -->
  <text x="600" y="110" text-anchor="middle" font-family="serif" font-size="18" fill="#6a8d3f" font-weight="bold">后来·不怕了</text>
  <rect x="400" y="120" width="360" height="430" fill="#2a3a5a" opacity="0.7"/>

  <!-- 月亮 -->
  <circle cx="680" cy="180" r="36" fill="#f4d97a"/>
  <circle cx="670" cy="172" r="6" fill="#e0c060" opacity="0.5"/>
  <circle cx="690" cy="190" r="4" fill="#e0c060" opacity="0.5"/>
  <!-- 星星 -->
  <g fill="#fef9ed">
    <circle cx="440" cy="160" r="2"/>
    <circle cx="500" cy="140" r="2.5"/>
    <circle cx="560" cy="170" r="2"/>
    <circle cx="620" cy="150" r="2"/>
    <circle cx="470" cy="200" r="1.5"/>
  </g>

  <!-- 爸爸拉孩子散步 -->
  <g transform="translate(520,400)">
    <!-- 爸爸 -->
    <g transform="translate(-30,0)">
      <ellipse cx="0" cy="0" rx="16" ry="22" fill="#4a6a2f"/>
      <circle cx="0" cy="-30" r="14" fill="#f0c8a0"/>
      <line x1="-8" y1="-34" x2="-4" y2="-32" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="4" y1="-34" x2="8" y2="-32" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M-4 -24 Q0 -22 4 -24" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
      <!-- 腿 -->
      <line x1="-6" y1="22" x2="-8" y2="50" stroke="#4a6a2f" stroke-width="6"/>
      <line x1="6" y1="22" x2="8" y2="50" stroke="#4a6a2f" stroke-width="6"/>
      <!-- 手拉孩子 -->
      <line x1="14" y1="0" x2="28" y2="0" stroke="#f0c8a0" stroke-width="5" stroke-linecap="round"/>
    </g>
    <!-- 孩子 -->
    <g transform="translate(30,5)">
      <ellipse cx="0" cy="0" rx="12" ry="16" fill="#c84a3a"/>
      <circle cx="0" cy="-22" r="11" fill="#f0c8a0"/>
      <!-- 笑眼 -->
      <path d="M-5 -24 Q-3 -26 -1 -24" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
      <path d="M1 -24 Q3 -26 5 -24" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
      <path d="M-3 -18 Q0 -16 3 -18" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
      <line x1="-5" y1="16" x2="-6" y2="38" stroke="#c84a3a" stroke-width="5"/>
      <line x1="5" y1="16" x2="6" y2="38" stroke="#c84a3a" stroke-width="5"/>
    </g>
  </g>

  <!-- 微笑的花草 -->
  <g transform="translate(450,470)">
    <path d="M0 30 L0 5" stroke="#6a8d3f" stroke-width="3"/>
    <circle cx="0" cy="0" r="7" fill="#e07856"/>
    <circle cx="0" cy="0" r="3" fill="#f4b942"/>
    <!-- 微笑 -->
    <path d="M-3 1 Q0 4 3 1" fill="none" stroke="#7a3b14" stroke-width="1"/>
  </g>
  <g transform="translate(640,475)">
    <path d="M0 25 L0 5" stroke="#6a8d3f" stroke-width="3"/>
    <circle cx="0" cy="0" r="6" fill="#c84a3a"/>
    <path d="M-2 1 Q0 3 2 1" fill="none" stroke="#7a3b14" stroke-width="1"/>
  </g>
  <!-- 草 -->
  <path d="M420 500 L420 485 M430 500 L430 480 M470 500 L470 488 M580 500 L580 482 M600 500 L600 486 M680 500 L680 484 M700 500 L700 488" stroke="#6a8d3f" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 小鸟在月光下睡觉 -->
  <g transform="translate(620,250)">
    <line x1="-30" y1="0" x2="30" y2="-3" stroke="#7a3b14" stroke-width="4"/>
    <ellipse cx="0" cy="-8" rx="14" ry="10" fill="#3a3a3a"/>
    <circle cx="-10" cy="-12" r="8" fill="#3a3a3a"/>
    <!-- 闭眼睡觉 -->
    <path d="M-13 -13 Q-10 -15 -7 -13" fill="none" stroke="#fef9ed" stroke-width="1.2"/>
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="11" fill="#fef9ed">zzZ</text>
  </g>

  <text x="600" y="540" text-anchor="middle" font-family="serif" font-size="13" fill="#fef9ed">花草微笑，小鸟在月光下睡觉</text>
</svg>
