<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一个粗瓷大碗">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">一个粗瓷大碗</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">一只粗碗，盛满深情</text>
  <g transform="translate(400,300)">
    <path d="M-110,-30 Q-110,40 0,60 Q110,40 110,-30 Z" fill="#c9b89a" stroke="#7a4a1a" stroke-width="4"/>
    <ellipse cx="0" cy="-30" rx="110" ry="30" fill="#d9c9a8" stroke="#7a4a1a" stroke-width="4"/>
    <path d="M-70,-20 Q0,-10 70,-20" fill="none" stroke="#7a4a1a" stroke-width="2"/>
    <path d="M-50,10 Q0,20 50,10" fill="none" stroke="#7a4a1a" stroke-width="2"/>
  </g>
  <text x="400" y="430" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">粗瓷大碗</text>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="18" fill="#8a6a3a">普通的碗，不普通的人</text>
</svg>
