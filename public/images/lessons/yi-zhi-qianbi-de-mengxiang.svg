<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="铅笔梦想变成各种东西的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">一支铅笔的梦想</text>
  <line x1="270" y1="62" x2="530" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 中心：铅笔 -->
  <g transform="translate(400, 320)">
    <!-- 梦想气泡背景 -->
    <circle cx="0" cy="0" r="60" fill="#e8a838" opacity="0.1" stroke="#e8a838" stroke-width="2" stroke-dasharray="5,3"/>
    <!-- 铅笔 -->
    <g transform="rotate(-30)">
      <!-- 笔身 -->
      <rect x="-10" y="-40" width="20" height="60" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
      <!-- 笔头木头 -->
      <path d="M-10 20 L0 40 L10 20 Z" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
      <!-- 笔芯 -->
      <path d="M-3 33 L0 40 L3 33 Z" fill="#2a2a2a"/>
      <!-- 橡皮头 -->
      <rect x="-10" y="-50" width="20" height="10" fill="#e07856" stroke="#7a3b14" stroke-width="2" rx="2"/>
      <!-- 金属圈 -->
      <rect x="-10" y="-42" width="20" height="4" fill="#c0c0c0" stroke="#7a3b14" stroke-width="1"/>
      <!-- 条纹 -->
      <line x1="-10" y1="-20" x2="10" y2="-20" stroke="#c8843a" stroke-width="1"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#c8843a" stroke-width="1"/>
    </g>
    <text x="0" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a3b14" font-family="serif">铅笔</text>
    <!-- Zzz -->
    <text x="50" y="-50" font-size="16" fill="#e07856" opacity="0.6" font-family="serif">Zzz...</text>
  </g>

  <!-- 梦想1：撑船的篙 -->
  <g transform="translate(160, 200)">
    <circle cx="0" cy="0" r="50" fill="#4a90b8" opacity="0.12" stroke="#c8843a" stroke-width="2"/>
    <!-- 水面 -->
    <path d="M-35 15 Q-20 12 -5 15 Q10 18 25 15 Q35 12 40 15" fill="none" stroke="#4a90b8" stroke-width="2"/>
    <!-- 小船 -->
    <path d="M-25 15 L-20 25 L20 25 L25 15 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 篙（铅笔变长） -->
    <line x1="-10" y1="-25" x2="15" y2="20" stroke="#e8a838" stroke-width="5" stroke-linecap="round"/>
    <line x1="-10" y1="-25" x2="15" y2="20" stroke="#7a3b14" stroke-width="1" opacity="0.5"/>
    <text x="0" y="45" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">撑船的篙</text>
  </g>

  <!-- 梦想2：钓鱼竿 -->
  <g transform="translate(640, 200)">
    <circle cx="0" cy="0" r="50" fill="#2d6a4f" opacity="0.12" stroke="#c8843a" stroke-width="2"/>
    <!-- 水面 -->
    <path d="M-35 20 Q-20 17 -5 20 Q10 23 25 20 Q35 17 40 20" fill="none" stroke="#4a90b8" stroke-width="2"/>
    <!-- 钓鱼竿（铅笔弯曲） -->
    <path d="M-20 -25 Q0 -15 20 -5" fill="none" stroke="#e8a838" stroke-width="5" stroke-linecap="round"/>
    <!-- 鱼线 -->
    <line x1="20" y1="-5" x2="25" y2="18" stroke="#7a3b14" stroke-width="1" stroke-dasharray="2,2"/>
    <!-- 小鱼 -->
    <ellipse cx="25" cy="22" rx="8" ry="4" fill="#4a90b8" stroke="#2d6a4f" stroke-width="1"/>
    <path d="M33 22 L38 18 L38 26" fill="#4a90b8" stroke="#2d6a4f" stroke-width="1"/>
    <text x="0" y="45" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">钓鱼竿</text>
  </g>

  <!-- 梦想3：指挥棒 -->
  <g transform="translate(160, 440)">
    <circle cx="0" cy="0" r="50" fill="#e07856" opacity="0.12" stroke="#c8843a" stroke-width="2"/>
    <!-- 指挥棒 -->
    <line x1="-15" y1="20" x2="15" y2="-25" stroke="#e8a838" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-15" cy="20" r="5" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 音符 -->
    <g transform="translate(20, 0)">
      <ellipse cx="0" cy="10" rx="4" ry="3" fill="#7a3b14" transform="rotate(-20)"/>
      <line x1="4" y1="8" x2="4" y2="-10" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M4 -10 Q12 -8 10 0" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <g transform="translate(-25, -5)">
      <ellipse cx="0" cy="10" rx="4" ry="3" fill="#7a3b14" transform="rotate(-20)"/>
      <line x1="4" y1="8" x2="4" y2="-10" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <text x="0" y="45" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">指挥棒</text>
  </g>

  <!-- 梦想4：画笔 -->
  <g transform="translate(640, 440)">
    <circle cx="0" cy="0" r="50" fill="#e8a838" opacity="0.12" stroke="#c8843a" stroke-width="2"/>
    <!-- 画笔 -->
    <rect x="-3" y="-20" width="6" height="30" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-3 10 L0 25 L3 10 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 颜料点 -->
    <circle cx="-20" cy="-10" r="4" fill="#e07856" opacity="0.6"/>
    <circle cx="20" cy="-5" r="4" fill="#4a90b8" opacity="0.6"/>
    <circle cx="-15" cy="15" r="3" fill="#2d6a4f" opacity="0.6"/>
    <circle cx="18" cy="18" r="3" fill="#e8a838" opacity="0.6"/>
    <text x="0" y="45" text-anchor="middle" font-size="11" fill="#7a3b14" font-family="serif">画笔</text>
  </g>

  <!-- 连接线（梦想线） -->
  <line x1="210" y1="200" x2="345" y2="290" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="590" y1="200" x2="455" y2="290" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="210" y1="440" x2="345" y2="355" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="590" y1="440" x2="455" y2="355" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- 底部说明 -->
  <rect x="50" y="540" width="700" height="40" fill="#fff6df" stroke="#c8843a" stroke-width="1" rx="6" opacity="0.8"/>
  <text x="400" y="565" text-anchor="middle" font-size="14" fill="#7a3b14" font-family="serif">一支铅笔有无数种可能，就像每个人都有很多梦想——敢想就是第一步。</text>
</svg>
