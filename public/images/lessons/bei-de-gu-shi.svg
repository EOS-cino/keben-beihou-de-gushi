<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="“贝”的故事：贝壳与汉字">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">“贝”的故事</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">一个贝壳字里的财富秘密</text>
  <g transform="translate(150,230)">
    <path d="M0,40 Q40,-40 80,40 Q40,80 0,40 Z" fill="#f4c77a" stroke="#c98a3a" stroke-width="3"/>
    <path d="M12,46 L68,46" stroke="#c98a3a" stroke-width="2"/>
    <path d="M20,38 L60,38" stroke="#c98a3a" stroke-width="1.5"/>
  </g>
  <text x="400" y="300" text-anchor="middle" font-family="serif" font-size="140" font-weight="bold" fill="#7a3b14">贝</text>
  <g transform="translate(540,220)">
    <path d="M0,30 Q35,-30 70,30 Q35,60 0,30 Z" fill="#f6dca0" stroke="#c98a3a" stroke-width="3"/>
    <path d="M10,35 L60,35" stroke="#c98a3a" stroke-width="2"/>
  </g>
  <text x="400" y="430" text-anchor="middle" font-family="serif" font-size="26" fill="#5a6b3a">财 · 货 · 购 · 账 · 贵 · 贱</text>
  <text x="400" y="478" text-anchor="middle" font-family="serif" font-size="16" fill="#8a6a3a">这些字都带着“贝”，都和钱财有关</text>
</svg>
