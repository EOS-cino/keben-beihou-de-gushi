<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="公园白桦树上停着一只灰雀，树下站着一位戴鸭舌帽的人">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空渐变 -->
  <rect x="0" y="0" width="800" height="420" fill="#e8f0e6"/>
  <!-- 地面 -->
  <path d="M0 420 Q400 400 800 420 L800 600 L0 600 Z" fill="#c8843a" opacity="0.35"/>
  <path d="M0 460 Q400 440 800 460 L800 600 L0 600 Z" fill="#8d5a36" opacity="0.3"/>
  <!-- 白桦树干 -->
  <rect x="330" y="120" width="34" height="320" fill="#f3ece0" stroke="#7a3b14" stroke-width="3"/>
  <rect x="436" y="160" width="28" height="280" fill="#f3ece0" stroke="#7a3b14" stroke-width="3"/>
  <!-- 树干纹理 -->
  <path d="M334 180 q14 6 26 0 M334 240 q14 6 26 0 M334 300 q14 6 26 0" stroke="#7a3b14" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M440 200 q10 5 20 0 M440 260 q10 5 20 0" stroke="#7a3b14" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- 树枝 -->
  <path d="M347 150 Q400 130 470 175" stroke="#7a3b14" stroke-width="5" fill="none"/>
  <path d="M347 200 Q310 175 270 165" stroke="#7a3b14" stroke-width="4" fill="none"/>
  <!-- 灰雀 -->
  <ellipse cx="455" cy="168" rx="20" ry="15" fill="#6a8d3f"/>
  <circle cx="473" cy="162" r="9" fill="#6a8d3f"/>
  <path d="M481 161 l8 2 l-8 4 Z" fill="#c84a3a"/>
  <ellipse cx="450" cy="172" rx="10" ry="8" fill="#e07856"/>
  <path d="M440 175 l-12 6 l14 2 Z" fill="#4a6a2f"/>
  <circle cx="475" cy="160" r="2" fill="#7a3b14"/>
  <!-- 戴鸭舌帽的人 -->
  <ellipse cx="250" cy="395" rx="22" ry="26" fill="#e8c9a0"/>
  <path d="M228 388 q22 -18 44 0 l4 -8 q-26 -22 -52 0 Z" fill="#7a3b14"/>
  <rect x="226" y="386" width="48" height="6" fill="#7a3b14"/>
  <circle cx="242" cy="395" r="2" fill="#7a3b14"/>
  <circle cx="258" cy="395" r="2" fill="#7a3b14"/>
  <path d="M244 405 q6 4 12 0" stroke="#7a3b14" stroke-width="2" fill="none"/>
  <!-- 大衣 -->
  <path d="M222 418 q28 -8 56 0 l10 90 l-76 0 Z" fill="#8d5a36"/>
  <path d="M250 420 l0 80" stroke="#7a3b14" stroke-width="2"/>
  <!-- 长椅 -->
  <rect x="150" y="470" width="120" height="10" fill="#8d5a36"/>
  <rect x="160" y="480" width="8" height="40" fill="#8d5a36"/>
  <rect x="252" y="480" width="8" height="40" fill="#8d5a36"/>
  <!-- 雪点 -->
  <circle cx="120" cy="80" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="560" cy="60" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="680" cy="120" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="200" cy="200" r="2" fill="#ffffff" opacity="0.7"/>
  <!-- 标题 -->
  <text x="400" y="555" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">灰 雀</text>
</svg>
