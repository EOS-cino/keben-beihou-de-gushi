<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="金色的鱼钩 - 老班长钓鱼">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题栏 -->
  <rect x="0" y="0" width="800" height="74" fill="#7a3b14" opacity="0.12"/>
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">金色的鱼钩</text>
  <line x1="310" y1="64" x2="490" y2="64" stroke="#c05a30" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="74" width="800" height="200" fill="#3a7d5c" opacity="0.06"/>
  <!-- 远山 -->
  <path d="M0 250 Q120 200 250 230 Q380 190 520 220 Q650 195 800 235 L800 280 L0 280 Z" fill="#3a7d5c" opacity="0.15"/>
  <path d="M0 270 Q150 240 300 260 Q450 235 600 255 Q700 245 800 265 L800 290 L0 290 Z" fill="#3a7d5c" opacity="0.2"/>

  <!-- 草地 -->
  <path d="M0 300 Q200 280 400 295 T800 290 L800 514 L0 514 Z" fill="#3a7d5c" opacity="0.18"/>
  <path d="M0 360 Q200 340 400 355 T800 350 L800 514 L0 514 Z" fill="#3a7d5c" opacity="0.12"/>

  <!-- 水塘 -->
  <ellipse cx="550" cy="400" rx="180" ry="50" fill="#3a7d5c" opacity="0.25"/>
  <ellipse cx="550" cy="395" rx="170" ry="42" fill="#3a7d5c" opacity="0.15"/>
  <!-- 水波纹 -->
  <g stroke="#3a7d5c" stroke-width="1" fill="none" opacity="0.3">
    <path d="M460 390 Q490 385 520 390"/>
    <path d="M580 400 Q610 395 640 400"/>
    <path d="M500 410 Q530 405 560 410"/>
  </g>

  <!-- 老班长（侧面，持竿钓鱼） -->
  <g transform="translate(280,340)">
    <!-- 身体（旧军装） -->
    <path d="M-26 -20 L26 -20 L34 60 L-34 60 Z" fill="#3a7d5c" opacity="0.8"/>
    <!-- 补丁 -->
    <rect x="-18" y="10" width="12" height="12" fill="#3a7d5c" opacity="0.5" stroke="#7a3b14" stroke-width="0.5" stroke-dasharray="2 2"/>
    <!-- 头 -->
    <circle cx="0" cy="-40" r="20" fill="#c05a30" opacity="0.85"/>
    <!-- 军帽 -->
    <path d="M-20 -46 Q0 -62 20 -46 L20 -38 L-20 -38 Z" fill="#3a7d5c"/>
    <rect x="-22" y="-40" width="44" height="5" fill="#3a7d5c"/>
    <!-- 五星 -->
    <path d="M0 -54 L-2 -49 L-7 -49 L-3 -46 L-5 -41 L0 -44 L5 -41 L3 -46 L7 -49 L2 -49 Z" fill="#c05a30"/>
    <!-- 眼睛望向水面 -->
    <circle cx="8" cy="-40" r="2" fill="#2d2a24"/>
    <path d="M-2 -32 Q2 -29 6 -32" stroke="#2d2a24" stroke-width="1.5" fill="none"/>
    <!-- 胡须 -->
    <path d="M-4 -30 Q0 -24 4 -30" stroke="#fef9ed" stroke-width="2" fill="none"/>
    <!-- 持竿的手臂 -->
    <path d="M26 -10 Q60 -20 90 -30" stroke="#3a7d5c" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- 另一只手 -->
    <path d="M-26 -10 Q-40 0 -44 15" stroke="#3a7d5c" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- 腿 -->
    <rect x="-22" y="58" width="16" height="40" fill="#3a7d5c" opacity="0.8"/>
    <rect x="6" y="58" width="16" height="40" fill="#3a7d5c" opacity="0.8"/>
  </g>

  <!-- 钓鱼竿 -->
  <line x1="370" y1="310" x2="540" y2="390" stroke="#7a3b14" stroke-width="3" stroke-linecap="round"/>
  <!-- 钓鱼线 -->
  <line x1="540" y1="390" x2="545" y2="395" stroke="#7a7468" stroke-width="1"/>

  <!-- 金色鱼钩（特写放大，左下） -->
  <g transform="translate(150,440)">
    <circle cx="0" cy="0" r="55" fill="#c05a30" opacity="0.06"/>
    <!-- 鱼钩 -->
    <path d="M0 -30 L0 10 Q0 25 -12 25 Q-24 25 -24 10" stroke="#c05a30" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- 钩尖 -->
    <path d="M-24 10 L-20 4 L-16 10" stroke="#c05a30" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- 倒刺 -->
    <line x1="-24" y1="10" x2="-18" y2="14" stroke="#c05a30" stroke-width="2"/>
    <!-- 线绑处 -->
    <circle cx="0" cy="-30" r="3" fill="#7a3b14"/>
    <!-- 光芒 -->
    <g stroke="#c05a30" stroke-width="1.5" opacity="0.4">
      <line x1="10" y1="-20" x2="22" y2="-28"/>
      <line x1="-30" y1="0" x2="-42" y2="0"/>
      <line x1="-10" y1="30" x2="-18" y2="40"/>
      <line x1="14" y1="10" x2="24" y2="16"/>
    </g>
    <text x="0" y="52" text-anchor="middle" font-family="serif" font-size="13" fill="#c05a30">缝衣针弯成</text>
  </g>

  <!-- 钓到的鱼（水中） -->
  <g transform="translate(545,395)">
    <ellipse cx="0" cy="0" rx="16" ry="7" fill="#c05a30" opacity="0.7"/>
    <path d="M16 0 L26 -6 L26 6 Z" fill="#c05a30" opacity="0.7"/>
    <circle cx="-8" cy="-2" r="2" fill="#fef9ed"/>
    <path d="M-4 2 Q0 5 4 2" stroke="#fef9ed" stroke-width="1" fill="none"/>
  </g>
  <!-- 水面鱼影2 -->
  <g transform="translate(620,410)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="12" ry="5" fill="#3a7d5c"/>
    <path d="M12 0 L20 -4 L20 4 Z" fill="#3a7d5c"/>
  </g>

  <!-- 远处篝火/炊烟 -->
  <g transform="translate(700,330)" opacity="0.6">
    <!-- 炊烟 -->
    <path d="M0 0 Q-5 -15 0 -25 Q5 -35 0 -50" stroke="#7a7468" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M-4 0 Q-8 -12 -4 -22 Q0 -30 -4 -42" stroke="#7a7468" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- 火堆 -->
    <ellipse cx="0" cy="5" rx="12" ry="4" fill="#7a3b14" opacity="0.5"/>
    <path d="M-8 0 Q0 -12 8 0 Z" fill="#c05a30" opacity="0.6"/>
    <path d="M-4 -2 Q0 -10 4 -2 Z" fill="#c05a30" opacity="0.8"/>
  </g>

  <!-- 草丛装饰 -->
  <g stroke="#3a7d5c" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M60 470 Q62 460 64 470"/>
    <path d="M70 475 Q72 463 74 475"/>
    <path d="M380 450 Q382 440 384 450"/>
    <path d="M420 460 Q422 448 424 460"/>
  </g>

  <rect x="0" y="514" width="800" height="86" fill="#fef9ed"/>
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14" opacity="0.85">缝衣针弯成金鱼钩，草地深处鱼汤暖人心</text>
</svg>
