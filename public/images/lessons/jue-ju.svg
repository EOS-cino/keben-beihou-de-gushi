<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="黄鹂鸣翠柳、白鹭上青天的春日插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">绝句</text>
  <line x1="370" y1="62" x2="430" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 青天 -->
  <rect x="0" y="80" width="800" height="320" fill="#a8d0e8" opacity="0.5"/>

  <!-- 远山（西岭雪） -->
  <path d="M0 360 L80 280 L160 320 L240 250 L320 300 L400 260 L480 290 L560 240 L640 290 L720 270 L800 310 L800 400 L0 400 Z" fill="#d8e8e8" opacity="0.6"/>
  <!-- 雪峰 -->
  <path d="M100 300 L160 250 L220 300 Z" fill="#ffffff" opacity="0.8" stroke="#c8d8d8" stroke-width="1"/>
  <path d="M380 290 L440 240 L500 290 Z" fill="#ffffff" opacity="0.8" stroke="#c8d8d8" stroke-width="1"/>
  <path d="M560 270 L620 220 L680 270 Z" fill="#ffffff" opacity="0.8" stroke="#c8d8d8" stroke-width="1"/>

  <!-- 地面 -->
  <rect x="0" y="400" width="800" height="200" fill="#6a8d3f" opacity="0.3"/>

  <!-- 翠柳（左侧大树） -->
  <g transform="translate(150, 200)">
    <rect x="-8" y="0" width="16" height="220" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 柳枝 -->
    <path d="M-5 20 Q-25 70 -30 150" fill="none" stroke="#6a8d3f" stroke-width="2.5"/>
    <path d="M0 15 Q-10 80 -15 160" fill="none" stroke="#6a8d3f" stroke-width="2.5"/>
    <path d="M5 20 Q20 70 25 150" fill="none" stroke="#6a8d3f" stroke-width="2.5"/>
    <path d="M0 15 Q15 80 20 160" fill="none" stroke="#6a8d3f" stroke-width="2.5"/>
    <path d="M-3 18 Q-35 60 -45 140" fill="none" stroke="#4a6a2f" stroke-width="2"/>
    <path d="M3 18 Q35 60 45 140" fill="none" stroke="#4a6a2f" stroke-width="2"/>
    <!-- 柳叶 -->
    <ellipse cx="-30" cy="150" rx="3" ry="9" fill="#6a8d3f" transform="rotate(20 -30 150)"/>
    <ellipse cx="-15" cy="160" rx="3" ry="9" fill="#6a8d3f" transform="rotate(15 -15 160)"/>
    <ellipse cx="25" cy="150" rx="3" ry="9" fill="#6a8d3f" transform="rotate(-20 25 150)"/>
    <ellipse cx="20" cy="160" rx="3" ry="9" fill="#6a8d3f" transform="rotate(-15 20 160)"/>
    <ellipse cx="-45" cy="140" rx="3" ry="8" fill="#4a6a2f" transform="rotate(30 -45 140)"/>
    <ellipse cx="45" cy="140" rx="3" ry="8" fill="#4a6a2f" transform="rotate(-30 45 140)"/>
    <!-- 树冠 -->
    <ellipse cx="0" cy="5" rx="45" ry="25" fill="#6a8d3f" opacity="0.6"/>
  </g>

  <!-- 两个黄鹂（站在柳枝上） -->
  <g transform="translate(120, 230)">
    <ellipse cx="0" cy="0" rx="14" ry="10" fill="#f4c842" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="3" rx="8" ry="6" fill="#f4a838"/>
    <circle cx="12" cy="-5" r="8" fill="#f4c842" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="14" cy="-6" r="2" fill="#2a2a2a"/>
    <polygon points="19,-5 26,-4 19,-2" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <!-- 翅膀 -->
    <path d="M-5 -3 Q-15 0 -12 8 Q-8 5 -3 5" fill="#e0a838" stroke="#7a3b14" stroke-width="1"/>
    <!-- 张嘴唱歌 -->
    <path d="M19 -7 Q22 -10 24 -8" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 音符 -->
    <text x="25" y="-15" font-family="serif" font-size="14" fill="#7a3b14">♪</text>
  </g>
  <g transform="translate(170, 215)">
    <ellipse cx="0" cy="0" rx="13" ry="9" fill="#f4c842" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="3" rx="7" ry="5" fill="#f4a838"/>
    <circle cx="-11" cy="-5" r="8" fill="#f4c842" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-13" cy="-6" r="2" fill="#2a2a2a"/>
    <polygon points="-18,-5 -25,-4 -18,-2" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <path d="M5 -3 Q15 0 12 8 Q8 5 3 5" fill="#e0a838" stroke="#7a3b14" stroke-width="1"/>
    <text x="-30" y="-15" font-family="serif" font-size="14" fill="#7a3b14">♪</text>
  </g>

  <!-- 一行白鹭（飞上青天） -->
  <g transform="translate(450, 150)">
    <ellipse cx="0" cy="0" rx="20" ry="6" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="18" cy="-2" r="6" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
    <polygon points="24,-2 32,0 24,2" fill="#f4c842" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="20" cy="-3" r="1" fill="#2a2a2a"/>
    <!-- 翅膀展开 -->
    <path d="M0 -2 Q-10 -15 -20 -10 Q-10 -5 0 -2" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M5 2 Q-5 12 -15 8 Q-5 4 5 2" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 长腿 -->
    <line x1="-5" y1="5" x2="-8" y2="18" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-2" y1="5" x2="-4" y2="18" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <g transform="translate(530, 130)">
    <ellipse cx="0" cy="0" rx="18" ry="5" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="16" cy="-2" r="5" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
    <polygon points="21,-2 28,0 21,2" fill="#f4c842" stroke="#7a3b14" stroke-width="1"/>
    <path d="M0 -2 Q-8 -12 -18 -8 Q-8 -4 0 -2" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M5 2 Q-3 10 -13 6 Q-3 3 5 2" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <g transform="translate(610, 110)">
    <ellipse cx="0" cy="0" rx="18" ry="5" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="16" cy="-2" r="5" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
    <polygon points="21,-2 28,0 21,2" fill="#f4c842" stroke="#7a3b14" stroke-width="1"/>
    <path d="M0 -2 Q-8 -12 -18 -8 Q-8 -4 0 -2" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M5 2 Q-3 10 -13 6 Q-3 3 5 2" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 窗户（含西岭雪） -->
  <g transform="translate(280, 410)">
    <rect x="0" y="0" width="160" height="120" fill="#a8d0e8" opacity="0.4" stroke="#8d5a36" stroke-width="6"/>
    <line x1="80" y1="0" x2="80" y2="120" stroke="#8d5a36" stroke-width="4"/>
    <line x1="0" y1="60" x2="160" y2="60" stroke="#8d5a36" stroke-width="4"/>
    <!-- 窗外的雪山 -->
    <path d="M10 100 L40 50 L70 100 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M85 100 L115 45 L150 100 Z" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- 门口的船 -->
  <g transform="translate(560, 470)">
    <path d="M0 20 Q5 35 60 35 Q115 35 120 20 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <line x1="60" y1="20" x2="60" y2="-25" stroke="#8d5a36" stroke-width="3"/>
    <path d="M60 -22 L95 5 L60 5 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M60 -22 L30 5 L60 5 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 标注：黄鹂 -->
  <line x1="140" y1="225" x2="80" y2="180" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="30" y="155" width="100" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="80" y="173" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">两个黄鹂</text>

  <!-- 标注：白鹭 -->
  <line x1="530" y1="130" x2="600" y2="80" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="545" y="55" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="600" y="73" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">一行白鹭</text>

  <!-- 标注：窗含雪 -->
  <line x1="360" y1="410" x2="360" y2="370" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="300" y="345" width="120" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="360" y="363" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">窗含西岭雪</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">两个黄鹂鸣翠柳，一行白鹭上青天。窗含西岭千秋雪，门泊东吴万里船</text>
</svg>
