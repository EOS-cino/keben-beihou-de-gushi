<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="扁鹊为蔡桓侯诊病的古代画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">扁鹊治病</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#7a3b14" stroke-width="2"/>
  <!-- 古代屏风 -->
  <rect x="100" y="140" width="600" height="320" fill="#8a6d3b" opacity="0.2" stroke="#7a3b14" stroke-width="2"/>
  <line x1="300" y1="140" x2="300" y2="460" stroke="#7a3b14" stroke-width="1"/>
  <line x1="500" y1="140" x2="500" y2="460" stroke="#7a3b14" stroke-width="1"/>
  <!-- 蔡桓侯（坐者） -->
  <ellipse cx="560" cy="360" rx="50" ry="60" fill="#c8553d" opacity="0.6"/>
  <circle cx="560" cy="290" r="28" fill="#f5d9a0"/>
  <path d="M 532 286 q 28 -16 56 0" stroke="#3a3a3a" stroke-width="2" fill="none"/>
  <line x1="548" y1="294" x2="544" y2="298" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="572" y1="294" x2="576" y2="298" stroke="#3a3a3a" stroke-width="2"/>
  <path d="M 548 312 q 12 6 24 0" stroke="#3a3a3a" stroke-width="2" fill="none"/>
  <!-- 扁鹊（站立行礼） -->
  <ellipse cx="220" cy="380" rx="40" ry="70" fill="#3a7d44" opacity="0.6"/>
  <circle cx="220" cy="300" r="26" fill="#f5d9a0"/>
  <path d="M 196 296 q 24 -14 48 0" stroke="#3a3a3a" stroke-width="2" fill="none"/>
  <circle cx="210" cy="300" r="2.5" fill="#3a3a3a"/>
  <circle cx="230" cy="300" r="2.5" fill="#3a3a3a"/>
  <path d="M 210 316 q 10 4 20 0" stroke="#3a3a3a" stroke-width="1.5" fill="none"/>
  <!-- 行礼的手 -->
  <path d="M 200 360 q 30 10 50 -10" stroke="#f5d9a0" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- 四次时间标记 -->
  <circle cx="170" cy="490" r="6" fill="#c8553d"/>
  <circle cx="290" cy="490" r="6" fill="#c8553d"/>
  <circle cx="410" cy="490" r="6" fill="#c8553d"/>
  <circle cx="530" cy="490" r="6" fill="#3a3a3a"/>
  <text x="350" y="520" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">皮肤 → 皮肉 → 肠胃 → 骨髓</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14">小病不治，拖成大祸</text>
</svg>
