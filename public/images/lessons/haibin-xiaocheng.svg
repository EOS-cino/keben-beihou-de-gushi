<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="海滨小城的海滩、渔船、凤凰树和街道风光插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">海滨小城</text>
  <line x1="350" y1="58" x2="450" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="72" width="800" height="180" fill="#a8d0e8" opacity="0.35"/>
  <!-- 太阳 -->
  <circle cx="650" cy="130" r="25" fill="#e07856" opacity="0.6"/>
  <circle cx="650" cy="130" r="18" fill="#e07856" opacity="0.8"/>

  <!-- 海鸥 -->
  <path d="M120 120 Q130 112 140 120 Q150 112 160 120" fill="none" stroke="#7a3b14" stroke-width="2"/>
  <path d="M250 100 Q258 94 266 100 Q274 94 282 100" fill="none" stroke="#7a3b14" stroke-width="1.5"/>

  <!-- 大海 -->
  <rect x="0" y="252" width="800" height="100" fill="#7ab8d8" opacity="0.4"/>
  <!-- 海浪 -->
  <path d="M0 260 Q100 255 200 260 Q300 255 400 260 Q500 255 600 260 Q700 255 800 260" fill="none" stroke="#a8d0e8" stroke-width="1.5" opacity="0.6"/>
  <path d="M0 280 Q100 275 200 280 Q300 275 400 280 Q500 275 600 280 Q700 275 800 280" fill="none" stroke="#a8d0e8" stroke-width="1.5" opacity="0.5"/>
  <path d="M0 310 Q100 305 200 310 Q300 305 400 310 Q500 305 600 310 Q700 305 800 310" fill="none" stroke="#a8d0e8" stroke-width="1.5" opacity="0.4"/>

  <!-- 渔船 -->
  <g transform="translate(180, 270)">
    <path d="M-30 10 Q-30 20 -20 22 L20 22 Q30 20 30 10 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-3" y="-15" width="6" height="25" fill="#7a3b14"/>
    <path d="M3 -12 L18 -5 L3 0 Z" fill="#fff6df" stroke="#7a3b14" stroke-width="1"/>
  </g>
  <g transform="translate(500, 280)">
    <path d="M-25 8 Q-25 16 -16 18 L16 18 Q25 16 25 8 Z" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-2" y="-12" width="5" height="20" fill="#7a3b14"/>
    <path d="M3 -10 L15 -4 L3 2 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1"/>
  </g>

  <!-- 沙滩 -->
  <rect x="0" y="352" width="800" height="80" fill="#e0c898" opacity="0.5"/>

  <!-- 贝壳 -->
  <g transform="translate(100, 380)">
    <path d="M-8 0 Q0 -10 8 0 Q4 5 0 4 Q-4 5 -8 0" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
    <line x1="0" y1="-8" x2="0" y2="3" stroke="#c8843a" stroke-width="0.5"/>
  </g>
  <g transform="translate(250, 395)">
    <path d="M-6 0 Q0 -8 6 0 Q3 4 0 3 Q-3 4 -6 0" fill="#e07856" opacity="0.6" stroke="#7a3b14" stroke-width="1"/>
  </g>
  <g transform="translate(380, 385)">
    <path d="M-7 0 Q0 -9 7 0 Q3 4 0 3 Q-3 4 -7 0" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
  </g>

  <!-- 捡贝壳的孩子 -->
  <g transform="translate(600, 375)">
    <ellipse cx="0" cy="15" rx="12" ry="15" fill="#c84a3a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="0" cy="-5" r="9" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-3" cy="-6" r="1" fill="#7a3b14"/>
    <circle cx="3" cy="-6" r="1" fill="#7a3b14"/>
    <path d="M-3 -1 Q0 1 3 -1" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 弯腰捡贝壳 -->
    <path d="M-10 5 Q-20 10 -25 18" fill="none" stroke="#c84a3a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-26" cy="20" r="3" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
  </g>

  <!-- 小城区域 -->
  <rect x="0" y="432" width="800" height="168" fill="#f0e0c8" opacity="0.3"/>

  <!-- 凤凰树（红花） -->
  <g transform="translate(120, 480)">
    <rect x="-4" y="0" width="8" height="60" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="0" cy="-10" rx="40" ry="35" fill="#6a8d3f" opacity="0.7" stroke="#4a6a2f" stroke-width="1"/>
    <!-- 红花 -->
    <circle cx="-20" cy="-25" r="6" fill="#c84a3a"/>
    <circle cx="10" cy="-30" r="7" fill="#c84a3a"/>
    <circle cx="25" cy="-15" r="5" fill="#e07856"/>
    <circle cx="-10" cy="-5" r="6" fill="#c84a3a"/>
    <circle cx="20" cy="0" r="5" fill="#e07856"/>
    <circle cx="-25" cy="-5" r="5" fill="#c84a3a"/>
    <!-- 落花 -->
    <circle cx="-30" cy="55" r="3" fill="#c84a3a" opacity="0.6"/>
    <circle cx="30" cy="58" r="3" fill="#e07856" opacity="0.6"/>
  </g>

  <!-- 房屋 -->
  <g transform="translate(350, 470)">
    <rect x="-40" y="0" width="80" height="55" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-45 0 L0 -25 L45 0 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-10" y="20" width="20" height="35" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    <rect x="-30" y="10" width="14" height="14" fill="#a8d0e8" stroke="#7a3b14" stroke-width="1"/>
    <rect x="16" y="10" width="14" height="14" fill="#a8d0e8" stroke="#7a3b14" stroke-width="1"/>
  </g>

  <!-- 榕树 -->
  <g transform="translate(580, 490)">
    <rect x="-5" y="0" width="10" height="50" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="0" cy="-15" rx="50" ry="40" fill="#4a6a2f" opacity="0.7" stroke="#4a6a2f" stroke-width="1"/>
    <!-- 气根 -->
    <path d="M-30 10 Q-32 30 -28 45" fill="none" stroke="#8d5a36" stroke-width="2"/>
    <path d="M25 15 Q28 35 24 48" fill="none" stroke="#8d5a36" stroke-width="2"/>
  </g>

  <!-- 标注：大海 -->
  <rect x="20" y="225" width="80" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="60" y="242" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">蔚蓝大海</text>

  <!-- 标注：沙滩 -->
  <rect x="300" y="360" width="80" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="340" y="377" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">金色沙滩</text>

  <!-- 标注：凤凰树 -->
  <rect x="50" y="440" width="80" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="90" y="457" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">凤凰花开</text>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">从大海到街道——这座海滨小城又美丽又整洁</text>
</svg>
