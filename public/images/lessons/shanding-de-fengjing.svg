<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="登山者站在山顶远眺云海群山的散文插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">山顶的风景</text>
  <line x1="330" y1="56" x2="470" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——爬得越高，看得越远</text>

  <!-- 天空 -->
  <rect x="0" y="90" width="800" height="260" fill="#4a90b8" opacity="0.1"/>
  <!-- 太阳 -->
  <circle cx="660" cy="140" r="26" fill="#e8a838" opacity="0.6"/>

  <!-- 远山层层 -->
  <polygon points="0,360 150,220 300,360" fill="#6a8d3f" opacity="0.4"/>
  <polygon points="200,360 380,200 560,360" fill="#4a90b8" opacity="0.35"/>
  <polygon points="450,360 620,240 800,360" fill="#6a8d3f" opacity="0.4"/>

  <!-- 云海 -->
  <g transform="translate(0, 300)" opacity="0.7">
    <ellipse cx="120" cy="0" rx="80" ry="18" fill="#fef9ed"/>
    <ellipse cx="300" cy="10" rx="100" ry="20" fill="#fef9ed"/>
    <ellipse cx="520" cy="0" rx="90" ry="18" fill="#fef9ed"/>
    <ellipse cx="700" cy="12" rx="80" ry="16" fill="#fef9ed"/>
    <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">云在脚下飘</text>
  </g>

  <!-- 主山 -->
  <polygon points="280,420 400,150 520,420" fill="#2d6a4f" stroke="#4a6a2f" stroke-width="2"/>
  <polygon points="400,150 440,200 360,200" fill="#fef9ed" opacity="0.8"/>
  <text x="400" y="180" text-anchor="middle" font-family="serif" font-size="11" fill="#2d6a4f">山顶</text>

  <!-- 石阶 -->
  <g transform="translate(400, 420)">
    <polygon points="-30,0 30,0 40,12 -20,12" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
    <polygon points="-50,12 30,12 42,26 -38,26" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
    <polygon points="-72,26 26,26 44,42 -54,42" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
    <text x="-20" y="60" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">石阶到头了</text>
  </g>

  <!-- 站在山顶的人 -->
  <g transform="translate(400, 240)">
    <circle cx="0" cy="0" r="9" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="26" rx="13" ry="18" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-18 12 Q-30 6 -34 16" fill="none" stroke="#4a90b8" stroke-width="5" stroke-linecap="round"/>
    <path d="M18 12 Q30 6 34 16" fill="none" stroke="#4a90b8" stroke-width="5" stroke-linecap="round"/>
    <text x="0" y="-18" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a">张开胳膊</text>
  </g>

  <!-- 地面 -->
  <rect x="0" y="440" width="800" height="50" fill="#6a8d3f" opacity="0.3"/>

  <!-- 底部引言 -->
  <g transform="translate(400, 510)">
    <rect x="-300" y="0" width="600" height="60" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">天地真大，自己真小，可这双脚走上了这么大的山</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">难走的路，往往通向最好的地方</text>
  </g>
</svg>
