<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="太空中一颗蓝白相间的地球，周围是漆黑的宇宙和星星">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 宇宙背景 -->
  <rect x="0" y="0" width="800" height="500" fill="#1a2a3a"/>
  <rect x="0" y="500" width="800" height="100" fill="#fef9ed"/>
  <!-- 星星 -->
  <circle cx="80" cy="80" r="2" fill="#ffffff"/>
  <circle cx="160" cy="140" r="1.5" fill="#ffffff"/>
  <circle cx="240" cy="60" r="2" fill="#ffffff"/>
  <circle cx="640" cy="90" r="2" fill="#ffffff"/>
  <circle cx="720" cy="160" r="1.5" fill="#ffffff"/>
  <circle cx="120" cy="240" r="1.5" fill="#ffffff"/>
  <circle cx="700" cy="280" r="2" fill="#ffffff"/>
  <circle cx="60" cy="340" r="1.5" fill="#ffffff"/>
  <circle cx="760" cy="380" r="2" fill="#ffffff"/>
  <circle cx="200" cy="380" r="1.5" fill="#ffffff"/>
  <circle cx="560" cy="420" r="1.5" fill="#ffffff"/>
  <text x="300" y="120" font-family="serif" font-size="14" fill="#ffffff" opacity="0.7">✦</text>
  <text x="500" y="200" font-family="serif" font-size="12" fill="#ffffff" opacity="0.6">✦</text>
  <!-- 地球 -->
  <circle cx="400" cy="270" r="150" fill="#7ab8d8" stroke="#7a3b14" stroke-width="3"/>
  <!-- 大陆 -->
  <path d="M320 200 Q360 180 400 200 Q430 220 420 250 Q390 260 360 245 Q330 235 320 200 Z" fill="#6a8d3f"/>
  <path d="M440 280 Q480 270 500 300 Q490 330 460 335 Q435 320 440 280 Z" fill="#6a8d3f"/>
  <path d="M340 320 Q380 315 400 340 Q380 360 350 355 Q325 345 340 320 Z" fill="#4a6a2f"/>
  <path d="M300 260 Q320 255 330 275 Q315 285 300 280 Z" fill="#6a8d3f"/>
  <!-- 云 -->
  <ellipse cx="380" cy="180" rx="30" ry="10" fill="#ffffff" opacity="0.6"/>
  <ellipse cx="460" cy="240" rx="26" ry="8" fill="#ffffff" opacity="0.5"/>
  <ellipse cx="350" cy="370" rx="28" ry="9" fill="#ffffff" opacity="0.5"/>
  <!-- 高光 -->
  <ellipse cx="350" cy="220" rx="30" ry="40" fill="#ffffff" opacity="0.15"/>
  <!-- 地球光环 -->
  <ellipse cx="400" cy="270" rx="180" ry="40" fill="none" stroke="#a8d0e8" stroke-width="2" opacity="0.4"/>
  <!-- 小卫星 -->
  <rect x="600" y="180" width="20" height="14" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
  <rect x="590" y="183" width="8" height="8" fill="#7ab8d8"/>
  <rect x="622" y="183" width="8" height="8" fill="#7ab8d8"/>
  <path d="M610 194 l0 16 M606 210 l8 0" stroke="#7a3b14" stroke-width="1.5"/>
  <!-- 标注 -->
  <text x="400" y="490" text-anchor="middle" font-family="serif" font-size="18" fill="#c84a3a">只有一个家</text>
  <!-- 标题 -->
  <text x="400" y="555" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">只有一个地球</text>
</svg>
