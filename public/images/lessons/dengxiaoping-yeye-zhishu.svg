<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="邓小平爷爷在天坛公园亲手植树的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">邓小平爷爷植树</text>
  <line x1="270" y1="62" x2="530" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="80" width="800" height="240" fill="#a8d0e8" opacity="0.35"/>
  <!-- 太阳 -->
  <circle cx="680" cy="130" r="35" fill="#f4c842" opacity="0.8"/>

  <!-- 天坛祈年殿（远景） -->
  <g opacity="0.7">
    <rect x="540" y="240" width="160" height="40" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M530 240 L620 180 L710 240 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M545 200 L620 150 L695 200 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="600" y="280" width="40" height="60" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="620" cy="135" r="8" fill="#f4c842"/>
  </g>

  <!-- 地面 -->
  <rect x="0" y="320" width="800" height="280" fill="#6a8d3f" opacity="0.3"/>
  <!-- 土地（树坑区域） -->
  <ellipse cx="320" cy="470" rx="100" ry="25" fill="#8d5a36" opacity="0.5"/>

  <!-- 小柏树 -->
  <rect x="312" y="430" width="16" height="50" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
  <!-- 树冠（三层） -->
  <path d="M280 430 L320 360 L360 430 Z" fill="#4a6a2f" stroke="#3a5a1f" stroke-width="2"/>
  <path d="M285 390 L320 330 L355 390 Z" fill="#6a8d3f" stroke="#3a5a1f" stroke-width="2"/>
  <path d="M290 355 L320 305 L350 355 Z" fill="#6a8d3f" stroke="#3a5a1f" stroke-width="2"/>

  <!-- 邓小平爷爷 -->
  <!-- 身体（深色外套） -->
  <path d="M180 470 L185 380 L225 380 L230 470 Z" fill="#3a4a6a" stroke="#2a3a5a" stroke-width="2"/>
  <!-- 头 -->
  <circle cx="205" cy="360" r="20" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
  <!-- 头发（花白） -->
  <path d="M187 352 Q205 335 223 352 Q220 345 205 340 Q190 345 187 352" fill="#c8c8c8"/>
  <!-- 眼睛 -->
  <circle cx="199" cy="358" r="2" fill="#2a2a2a"/>
  <circle cx="211" cy="358" r="2" fill="#2a2a2a"/>
  <!-- 嘴（微笑） -->
  <path d="M200 368 Q205 372 210 368" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
  <!-- 手臂（握铁锹） -->
  <path d="M225 395 L260 430" fill="none" stroke="#3a4a6a" stroke-width="10" stroke-linecap="round"/>
  <path d="M185 395 L165 440" fill="none" stroke="#3a4a6a" stroke-width="10" stroke-linecap="round"/>
  <circle cx="262" cy="432" r="6" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>

  <!-- 铁锹 -->
  <line x1="270" y1="430" x2="220" y2="510" stroke="#8d5a36" stroke-width="6" stroke-linecap="round"/>
  <path d="M205 500 L235 510 L230 540 L210 540 Z" fill="#a8a8a8" stroke="#5a5a5a" stroke-width="2"/>

  <!-- 水桶 -->
  <g>
    <path d="M420 460 L425 510 L460 510 L465 460 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <ellipse cx="442" cy="460" rx="22" ry="6" fill="#a8d0e8" stroke="#5a3a1a" stroke-width="2"/>
    <path d="M425 460 Q442 445 460 460" fill="none" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 水滴 -->
    <ellipse cx="475" cy="490" rx="3" ry="6" fill="#7ab8d8" opacity="0.7"/>
    <ellipse cx="485" cy="500" rx="2.5" ry="5" fill="#7ab8d8" opacity="0.6"/>
  </g>

  <!-- 标注：邓小平爷爷 -->
  <line x1="205" y1="340" x2="120" y2="270" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="50" y="245" width="130" height="28" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="115" y="264" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">邓小平爷爷</text>

  <!-- 标注：小柏树 -->
  <line x1="320" y1="320" x2="400" y2="250" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="360" y="225" width="100" height="28" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="410" y="244" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">小柏树</text>

  <!-- 标注：天坛 -->
  <line x1="620" y1="180" x2="620" y2="120" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="575" y="95" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="620" y="113" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">天坛公园</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">1987年春天，邓小平爷爷在天坛公园亲手种下一棵小柏树，一丝不苟</text>
</svg>
