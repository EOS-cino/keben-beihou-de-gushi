<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="海边浪花拍打沙滩孩子玩耍的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">浪花</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">浪花像调皮的小娃娃，跑去又跑来</text>

  <!-- 天空 -->
  <rect x="0" y="80" width="800" height="200" fill="#a8d0e8" opacity="0.2"/>
  <!-- 太阳 -->
  <circle cx="680" cy="140" r="30" fill="#f4b942" opacity="0.8"/>
  <!-- 海鸥 -->
  <g fill="none" stroke="#7a3b14" stroke-width="2" stroke-linecap="round">
    <path d="M150 130 Q158 122 166 130 Q174 122 182 130"/>
    <path d="M250 110 Q256 104 262 110 Q268 104 274 110"/>
  </g>

  <!-- 大海 -->
  <rect x="0" y="280" width="800" height="140" fill="#7ab8d8" opacity="0.4"/>
  <!-- 海面波纹 -->
  <g fill="none" stroke="#4a8ab8" stroke-width="1.5" opacity="0.4">
    <path d="M0 300 Q100 295 200 300 Q300 305 400 300 Q500 295 600 300 Q700 305 800 300"/>
    <path d="M0 330 Q100 325 200 330 Q300 335 400 330 Q500 325 600 330 Q700 335 800 330"/>
    <path d="M0 360 Q100 355 200 360 Q300 365 400 360 Q500 355 600 360 Q700 365 800 360"/>
  </g>

  <!-- 浪花（白色泡沫） -->
  <g fill="#fef9ed" stroke="#7ab8d8" stroke-width="1.5">
    <path d="M100 390 Q120 375 140 385 Q160 375 180 390 Q200 380 220 390 L220 400 L100 400 Z"/>
    <path d="M300 395 Q320 380 340 390 Q360 380 380 395 Q400 385 420 395 L420 405 L300 405 Z"/>
    <path d="M500 390 Q520 375 540 385 Q560 375 580 390 Q600 380 620 390 L620 400 L500 400 Z"/>
    <path d="M650 395 Q670 380 690 390 Q710 380 730 395 L730 405 L650 405 Z"/>
  </g>

  <!-- 沙滩 -->
  <path d="M0 400 Q200 395 400 400 Q600 405 800 400 L800 600 L0 600 Z" fill="#f4b942" opacity="0.5"/>
  <path d="M0 410 Q200 405 400 410 Q600 415 800 410 L800 600 L0 600 Z" fill="#e0a050" opacity="0.4"/>

  <!-- 孩子 -->
  <g transform="translate(350,470)">
    <circle cx="0" cy="-50" r="16" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
    <!-- 笑脸 -->
    <circle cx="-5" cy="-52" r="2" fill="#3a2a1a"/>
    <circle cx="5" cy="-52" r="2" fill="#3a2a1a"/>
    <path d="M-6 -45 Q0 -40 6 -45" fill="none" stroke="#8d5a36" stroke-width="1.5"/>
    <!-- 身体 -->
    <path d="M-14 -34 L-18 20 L18 20 L14 -34 Z" fill="#e07856"/>
    <!-- 手举起 -->
    <path d="M-14 -28 L-30 -45" stroke="#f4c8a0" stroke-width="6" stroke-linecap="round"/>
    <path d="M14 -28 L30 -40" stroke="#f4c8a0" stroke-width="6" stroke-linecap="round"/>
    <!-- 腿 -->
    <rect x="-10" y="20" width="7" height="25" fill="#4a6a2f"/>
    <rect x="3" y="20" width="7" height="25" fill="#4a6a2f"/>
  </g>

  <!-- 贝壳 -->
  <g transform="translate(500,490)">
    <path d="M0 0 Q-12 -8 -8 -18 Q0 -22 8 -18 Q12 -8 0 0 Z" fill="#e07856" stroke="#c84a3a" stroke-width="1.5"/>
    <path d="M0 -2 L0 -18 M-4 -4 L-4 -16 M4 -4 L4 -16" stroke="#c84a3a" stroke-width="1" opacity="0.5"/>
  </g>
  <g transform="translate(550,510)">
    <path d="M0 0 Q-10 -6 -7 -14 Q0 -17 7 -14 Q10 -6 0 0 Z" fill="#f4b942" stroke="#c8843a" stroke-width="1.5"/>
  </g>
  <g transform="translate(200,500)">
    <path d="M0 0 Q-10 -6 -7 -14 Q0 -17 7 -14 Q10 -6 0 0 Z" fill="#fef9ed" stroke="#7ab8d8" stroke-width="1.5"/>
  </g>

  <!-- 底部 -->
  <rect x="150" y="540" width="500" height="45" rx="8" fill="#fef0d8" opacity="0.7"/>
  <text x="400" y="568" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">浪花跑去又跑来，留下贝壳和小虾</text>
</svg>
