<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一棵挂满心愿卡的圣诞树，树下摆着礼盒">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 背景墙 -->
  <rect x="0" y="0" width="800" height="460" fill="#f3ece0"/>
  <rect x="0" y="460" width="800" height="140" fill="#e8d9c0"/>
  <!-- 窗户/雪景 -->
  <rect x="560" y="60" width="200" height="140" fill="#a8d0e8" stroke="#7a3b14" stroke-width="4"/>
  <circle cx="610" cy="100" r="4" fill="#ffffff"/>
  <circle cx="660" cy="130" r="4" fill="#ffffff"/>
  <circle cx="720" cy="90" r="4" fill="#ffffff"/>
  <circle cx="700" cy="160" r="4" fill="#ffffff"/>
  <!-- 圣诞树 -->
  <path d="M400 120 L300 250 L360 250 L260 370 L340 370 L240 470 L560 470 L460 370 L540 370 L440 250 L500 250 Z" fill="#4a6a2f" stroke="#7a3b14" stroke-width="3"/>
  <path d="M400 120 L340 200 L460 200 Z" fill="#6a8d3f"/>
  <!-- 树干 -->
  <rect x="385" y="470" width="30" height="40" fill="#8d5a36"/>
  <!-- 星星 -->
  <path d="M400 90 l8 18 l20 2 l-14 14 l4 20 l-18 -10 l-18 10 l4 -20 l-14 -14 l20 -2 Z" fill="#f4d97a" stroke="#c8843a" stroke-width="2"/>
  <!-- 彩灯 -->
  <circle cx="360" cy="240" r="5" fill="#c84a3a"/>
  <circle cx="440" cy="250" r="5" fill="#e07856"/>
  <circle cx="320" cy="330" r="5" fill="#f4d97a"/>
  <circle cx="480" cy="330" r="5" fill="#c84a3a"/>
  <circle cx="400" cy="300" r="5" fill="#7ab8d8"/>
  <circle cx="300" cy="420" r="5" fill="#e07856"/>
  <circle cx="500" cy="420" r="5" fill="#f4d97a"/>
  <circle cx="400" cy="400" r="5" fill="#c84a3a"/>
  <!-- 心愿卡 -->
  <rect x="350" y="270" width="30" height="22" fill="#ffffff" stroke="#c84a3a" stroke-width="2"/>
  <line x1="365" y1="265" x2="365" y2="272" stroke="#7a3b14" stroke-width="1.5"/>
  <line x1="356" y1="278" x2="374" y2="278" stroke="#7a3b14" stroke-width="1"/>
  <line x1="356" y1="283" x2="372" y2="283" stroke="#7a3b14" stroke-width="1"/>
  <rect x="420" y="350" width="30" height="22" fill="#ffffff" stroke="#c84a3a" stroke-width="2"/>
  <line x1="435" y1="345" x2="435" y2="352" stroke="#7a3b14" stroke-width="1.5"/>
  <line x1="426" y1="358" x2="444" y2="358" stroke="#7a3b14" stroke-width="1"/>
  <rect x="330" y="390" width="30" height="22" fill="#ffffff" stroke="#c84a3a" stroke-width="2"/>
  <line x1="345" y1="385" x2="345" y2="392" stroke="#7a3b14" stroke-width="1.5"/>
  <!-- 礼盒 -->
  <rect x="250" y="470" width="60" height="50" fill="#c84a3a" stroke="#7a3b14" stroke-width="2"/>
  <rect x="275" y="470" width="10" height="50" fill="#f4d97a"/>
  <path d="M270 470 q10 -14 20 0 q10 -14 20 0" stroke="#f4d97a" stroke-width="3" fill="none"/>
  <rect x="490" y="475" width="55" height="45" fill="#7ab8d8" stroke="#7a3b14" stroke-width="2"/>
  <rect x="512" y="475" width="10" height="45" fill="#c84a3a"/>
  <!-- 洋娃娃 -->
  <circle cx="160" cy="460" r="18" fill="#e8c9a0"/>
  <path d="M142 450 q18 -16 36 0 Z" fill="#c84a3a"/>
  <circle cx="154" cy="458" r="2" fill="#7a3b14"/>
  <circle cx="166" cy="458" r="2" fill="#7a3b14"/>
  <path d="M156 466 q4 3 8 0" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
  <path d="M148 478 q12 -8 24 0 l4 40 l-32 0 Z" fill="#e07856"/>
  <!-- 标题 -->
  <text x="400" y="555" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">给予树</text>
</svg>
