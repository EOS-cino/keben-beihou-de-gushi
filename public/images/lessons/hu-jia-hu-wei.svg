<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="狐狸走在老虎前面、百兽惊逃的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">狐假虎威</text>
  <line x1="340" y1="56" x2="460" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 森林背景 -->
  <rect x="0" y="80" width="800" height="440" fill="#d8e8c8" opacity="0.4"/>
  <!-- 远处树木 -->
  <g opacity="0.4">
    <rect x="60" y="200" width="12" height="80" fill="#6a4a2a"/>
    <circle cx="66" cy="195" r="30" fill="#5a8a3a"/>
    <rect x="700" y="210" width="12" height="70" fill="#6a4a2a"/>
    <circle cx="706" cy="205" r="28" fill="#5a8a3a"/>
  </g>
  <!-- 地面 -->
  <rect x="0" y="420" width="800" height="100" fill="#c4a878" opacity="0.5"/>
  <!-- 小草 -->
  <g stroke="#5a8a3a" stroke-width="2" fill="none">
    <path d="M50 440 Q48 425 52 415"/>
    <path d="M750 445 Q748 430 752 420"/>
    <path d="M300 460 Q298 445 302 435"/>
  </g>

  <!-- 狐狸（走在前面，昂首挺胸） -->
  <g transform="translate(280,380)">
    <!-- 尾巴 -->
    <path d="M-30 5 Q-60 -5 -65 -30 Q-55 -25 -45 -15" fill="#e88030"/>
    <ellipse cx="-55" cy="-20" rx="12" ry="8" fill="#f0a050" transform="rotate(-30 -55 -20)"/>
    <!-- 尾尖白色 -->
    <ellipse cx="-62" cy="-28" rx="6" ry="5" fill="#ffffff"/>
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="32" ry="20" fill="#e88030"/>
    <ellipse cx="0" cy="-3" rx="28" ry="16" fill="#f0a050"/>
    <!-- 肚子 -->
    <ellipse cx="5" cy="5" rx="18" ry="12" fill="#fff0d8"/>
    <!-- 前腿 -->
    <rect x="-8" y="15" width="8" height="20" fill="#d87020" rx="2"/>
    <rect x="8" y="15" width="8" height="20" fill="#d87020" rx="2"/>
    <!-- 后腿 -->
    <ellipse cx="-18" cy="22" rx="8" ry="12" fill="#d87020"/>
    <ellipse cx="18" cy="22" rx="8" ry="12" fill="#d87020"/>
    <!-- 头 -->
    <path d="M20 -5 L45 -15 L50 -5 L48 10 L35 15 L22 10 Z" fill="#e88030"/>
    <path d="M22 -3 L42 -12 L46 -3 L44 8 L35 12 L24 8 Z" fill="#f0a050"/>
    <!-- 耳朵 -->
    <path d="M28 -12 L25 -25 L35 -18 Z" fill="#d87020"/>
    <path d="M40 -14 L42 -27 L48 -18 Z" fill="#d87020"/>
    <path d="M30 -14 L28 -22 L33 -18 Z" fill="#f0a050"/>
    <!-- 眼睛（得意） -->
    <ellipse cx="35" cy="-5" rx="2.5" ry="2" fill="#1a1a1a"/>
    <!-- 鼻子 -->
    <circle cx="48" cy="0" r="2.5" fill="#1a1a1a"/>
    <!-- 嘴（微笑） -->
    <path d="M42 5 Q46 8 48 5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 白色脸颊 -->
    <ellipse cx="38" cy="5" rx="6" ry="4" fill="#fff0d8"/>
  </g>

  <!-- 老虎（跟在后面，威风凛凛） -->
  <g transform="translate(480,370)">
    <!-- 尾巴 -->
    <path d="M-35 0 Q-65 -10 -70 -35 Q-60 -30 -50 -20" fill="#e89030"/>
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="45" ry="28" fill="#e89030"/>
    <ellipse cx="0" cy="-3" rx="40" ry="24" fill="#f4a840"/>
    <!-- 虎纹 -->
    <g stroke="#5a3a10" stroke-width="3" fill="none">
      <path d="M-20 -20 L-15 -10"/>
      <path d="M-5 -22 L0 -12"/>
      <path d="M10 -20 L15 -10"/>
      <path d="M-25 10 L-18 18"/>
      <path d="M5 12 L12 20"/>
      <path d="M20 8 L25 16"/>
    </g>
    <!-- 肚子 -->
    <ellipse cx="5" cy="8" rx="22" ry="14" fill="#f8d8a0"/>
    <!-- 腿 -->
    <rect x="-15" y="20" width="12" height="25" fill="#d88020" rx="2"/>
    <rect x="10" y="20" width="12" height="25" fill="#d88020" rx="2"/>
    <ellipse cx="-25" cy="30" rx="10" ry="14" fill="#d88020"/>
    <ellipse cx="25" cy="30" rx="10" ry="14" fill="#d88020"/>
    <!-- 头 -->
    <circle cx="40" cy="-5" r="28" fill="#f4a840"/>
    <!-- 虎纹（头） -->
    <path d="M30 -25 L28 -18" stroke="#5a3a10" stroke-width="3"/>
    <path d="M50 -25 L52 -18" stroke="#5a3a10" stroke-width="3"/>
    <path d="M40 -28 L40 -20" stroke="#5a3a10" stroke-width="3"/>
    <!-- 耳朵 -->
    <circle cx="25" cy="-25" r="8" fill="#e89030"/>
    <circle cx="55" cy="-25" r="8" fill="#e89030"/>
    <circle cx="25" cy="-25" r="4" fill="#f8d8a0"/>
    <circle cx="55" cy="-25" r="4" fill="#f8d8a0"/>
    <!-- 王字纹 -->
    <line x1="35" y1="-15" x2="45" y2="-15" stroke="#5a3a10" stroke-width="2.5"/>
    <line x1="40" y1="-18" x2="40" y2="-8" stroke="#5a3a10" stroke-width="2.5"/>
    <line x1="35" y1="-8" x2="45" y2="-8" stroke="#5a3a10" stroke-width="2.5"/>
    <!-- 眼睛 -->
    <ellipse cx="32" cy="0" rx="4" ry="3.5" fill="#ffffff"/>
    <ellipse cx="48" cy="0" rx="4" ry="3.5" fill="#ffffff"/>
    <circle cx="32" cy="0" r="2.5" fill="#1a1a1a"/>
    <circle cx="48" cy="0" r="2.5" fill="#1a1a1a"/>
    <!-- 鼻子 -->
    <path d="M38 8 L42 8 L40 12 Z" fill="#5a3a10"/>
    <!-- 嘴 -->
    <path d="M40 12 Q35 18 30 14 M40 12 Q45 18 50 14" fill="none" stroke="#5a3a10" stroke-width="2"/>
    <!-- 胡须 -->
    <line x1="25" y1="10" x2="15" y2="8" stroke="#5a3a10" stroke-width="1"/>
    <line x1="55" y1="10" x2="65" y2="8" stroke="#5a3a10" stroke-width="1"/>
  </g>

  <!-- 惊逃的小动物 -->
  <g transform="translate(680,400)">
    <!-- 小鹿（背影逃跑） -->
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#c89060"/>
    <ellipse cx="-12" cy="-8" rx="8" ry="10" fill="#c89060"/>
    <path d="M-15 -16 L-12 -25 M-9 -16 L-6 -25" stroke="#6a4a2a" stroke-width="2"/>
    <rect x="-5" y="10" width="5" height="15" fill="#b88050"/>
    <rect x="5" y="10" width="5" height="15" fill="#b88050"/>
    <!-- 惊吓符号 -->
    <text x="15" y="-20" font-size="16" fill="#e84030">!</text>
  </g>
  <g transform="translate(640,440)">
    <!-- 小兔（逃跑） -->
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#f0e8d8"/>
    <ellipse cx="-5" cy="-8" rx="4" ry="10" fill="#f0e8d8"/>
    <ellipse cx="2" cy="-8" rx="4" ry="10" fill="#f0e8d8"/>
    <text x="12" y="-12" font-size="14" fill="#e84030">!</text>
  </g>

  <!-- 标注：狐狸 -->
  <line x1="280" y1="360" x2="200" y2="300" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="130" y="285" width="100" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="180" y="303" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">狐狸（假威风）</text>

  <!-- 标注：老虎 -->
  <line x1="480" y1="350" x2="480" y2="290" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="415" y="275" width="130" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="480" y="293" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">老虎（真威风）</text>

  <!-- 标注：百兽 -->
  <line x1="670" y1="390" x2="670" y2="330" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="610" y="315" width="120" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="670" y="333" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">百兽（怕老虎）</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">百兽怕的是老虎，不是狐狸——狐狸借了老虎的威风</text>
</svg>
