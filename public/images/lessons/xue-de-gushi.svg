<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="雪花飘落覆盖村庄树木的冬日插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">雪的故事</text>
  <line x1="350" y1="56" x2="450" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——每一片雪花，都藏着一个故事</text>

  <!-- 灰白天空 -->
  <rect x="0" y="90" width="800" height="260" fill="#4a90b8" opacity="0.08"/>

  <!-- 飘落的雪花（六角形） -->
  <g stroke="#4a90b8" stroke-width="1.5" fill="none" opacity="0.7">
    <g transform="translate(150, 140)"><line x1="-7" y1="0" x2="7" y2="0"/><line x1="0" y1="-7" x2="0" y2="7"/><line x1="-5" y1="-5" x2="5" y2="5"/><line x1="-5" y1="5" x2="5" y2="-5"/></g>
    <g transform="translate(300, 110)"><line x1="-7" y1="0" x2="7" y2="0"/><line x1="0" y1="-7" x2="0" y2="7"/><line x1="-5" y1="-5" x2="5" y2="5"/><line x1="-5" y1="5" x2="5" y2="-5"/></g>
    <g transform="translate(500, 130)"><line x1="-7" y1="0" x2="7" y2="0"/><line x1="0" y1="-7" x2="0" y2="7"/><line x1="-5" y1="-5" x2="5" y2="5"/><line x1="-5" y1="5" x2="5" y2="-5"/></g>
    <g transform="translate(650, 150)"><line x1="-7" y1="0" x2="7" y2="0"/><line x1="0" y1="-7" x2="0" y2="7"/><line x1="-5" y1="-5" x2="5" y2="5"/><line x1="-5" y1="5" x2="5" y2="-5"/></g>
    <g transform="translate(220, 200)"><line x1="-7" y1="0" x2="7" y2="0"/><line x1="0" y1="-7" x2="0" y2="7"/><line x1="-5" y1="-5" x2="5" y2="5"/><line x1="-5" y1="5" x2="5" y2="-5"/></g>
    <g transform="translate(580, 220)"><line x1="-7" y1="0" x2="7" y2="0"/><line x1="0" y1="-7" x2="0" y2="7"/><line x1="-5" y1="-5" x2="5" y2="5"/><line x1="-5" y1="5" x2="5" y2="-5"/></g>
  </g>
  <text x="120" y="180" font-family="serif" font-size="11" fill="#4a90b8">六角形的雪花</text>

  <!-- 雪覆盖的村庄 -->
  <g transform="translate(180, 280)">
    <polygon points="0,0 70,0 90,-30 -20,-30" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="0" y="0" width="70" height="70" fill="#e8a838" opacity="0.6" stroke="#8d5a36" stroke-width="1.5"/>
    <rect x="25" y="30" width="20" height="40" fill="#7a3b14"/>
    <rect x="10" y="15" width="15" height="15" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
    <rect x="45" y="15" width="15" height="15" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
  </g>
  <g transform="translate(520, 290)">
    <polygon points="0,0 80,0 100,-34 -20,-34" fill="#7a3b14"/>
    <rect x="0" y="0" width="80" height="60" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="30" y="25" width="20" height="35" fill="#e8a838"/>
  </g>

  <!-- 雪覆盖的树 -->
  <g transform="translate(400, 320)">
    <rect x="-6" y="0" width="12" height="40" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    <polygon points="-30,0 30,0 0,-50" fill="#2d6a4f" stroke="#4a6a2f" stroke-width="1.5"/>
    <polygon points="-30,-15 30,-15 0,-65" fill="#2d6a4f" stroke="#4a6a2f" stroke-width="1.5"/>
    <polygon points="-28,-30 28,-30 0,-78" fill="#2d6a4f" stroke="#4a6a2f" stroke-width="1.5"/>
    <!-- 树顶雪 -->
    <polygon points="-10,-65 10,-65 0,-78" fill="#fef9ed"/>
  </g>

  <!-- 雪地 -->
  <rect x="0" y="380" width="800" height="100" fill="#fef9ed" stroke="#4a90b8" stroke-width="1" opacity="0.9"/>
  <ellipse cx="400" cy="385" rx="500" ry="20" fill="#fef9ed"/>

  <!-- 雪人 -->
  <g transform="translate(380, 380)">
    <circle cx="0" cy="-15" r="16" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="-42" r="11" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-3" cy="-44" r="1.8" fill="#7a3b14"/>
    <circle cx="3" cy="-44" r="1.8" fill="#7a3b14"/>
    <polygon points="0,-42 7,-40 0,-38" fill="#e07856" stroke="#7a3b14" stroke-width="0.8"/>
    <!-- 红围巾 -->
    <path d="M-11 -33 Q0 -30 11 -33 L9 -25 Q0 -23 -9 -25 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <text x="0" y="10" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a">雪人傻笑</text>
  </g>

  <!-- 麦田被子 -->
  <g transform="translate(680, 400)">
    <rect x="-50" y="0" width="100" height="30" fill="#fef9ed" stroke="#4a90b8" stroke-width="1"/>
    <text x="0" y="-6" text-anchor="middle" font-family="serif" font-size="10" fill="#2d6a4f">雪是麦苗的被子</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 500)">
    <rect x="-300" y="0" width="600" height="70" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">瑞雪兆丰年 · 保暖、除虫、浇水</text>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">冬天的雪，是春天丰收的铺垫</text>
  </g>
</svg>
