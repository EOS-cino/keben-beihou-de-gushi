<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一块奶酪">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">一块奶酪</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">一小块奶酪，照出纪律</text>
  <g transform="translate(400,300)">
    <path d="M-120,30 L120,30 L100,-20 L-100,-20 Z" fill="#f4c77a" stroke="#c98a3a" stroke-width="3"/>
    <circle cx="-40" cy="-4" r="8" fill="#fbe9c8"/><circle cx="30" cy="2" r="6" fill="#fbe9c8"/><circle cx="70" cy="-8" r="5" fill="#fbe9c8"/>
    <path d="M110,30 l18,-6 -4,16 z" fill="#f4c77a" stroke="#c98a3a" stroke-width="2"/>
  </g>
  <g transform="translate(400,360)" fill="#3a2a1a">
    <ellipse cx="-60" cy="0" rx="10" ry="6"/><ellipse cx="-30" cy="0" rx="10" ry="6"/><ellipse cx="0" cy="0" rx="10" ry="6"/><ellipse cx="30" cy="0" rx="10" ry="6"/><ellipse cx="60" cy="0" rx="10" ry="6"/>
  </g>
  <g transform="translate(560,360)">
    <ellipse cx="0" cy="6" rx="10" ry="6" fill="#3a2a1a"/>
    <circle cx="0" cy="-6" r="6" fill="#3a2a1a"/>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">队长</text>
  </g>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">要求别人做到的，自己先做到</text>
