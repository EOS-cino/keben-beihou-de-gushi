<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="棉花姑娘和七星瓢虫吃蚜虫的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">棉花姑娘</text>

  <!-- 天空 -->
  <rect x="0" y="70" width="800" height="250" fill="#a8d0e8" opacity="0.3"/>
  <!-- 田地 -->
  <rect x="0" y="400" width="800" height="200" fill="#6a8d3f" opacity="0.2"/>

  <!-- 左：生病的棉花（有蚜虫） -->
  <g transform="translate(180,380)">
    <text x="0" y="-130" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a" font-weight="bold">生病了</text>
    <!-- 茎 -->
    <line x1="0" y1="60" x2="0" y2="-80" stroke="#4a6a2f" stroke-width="5"/>
    <!-- 叶子（发黄） -->
    <path d="M0 -20 Q-35 -30 -40 -5 Q-25 5 0 -20 Z" fill="#c8a040"/>
    <path d="M0 -50 Q35 -60 40 -35 Q25 -25 0 -50 Z" fill="#b89030"/>
    <path d="M0 -10 Q-30 -5 -35 15 Q-20 20 0 -10 Z" fill="#c8a040"/>
    <!-- 蚜虫（小黑点） -->
    <g fill="#3a3a3a">
      <circle cx="-25" cy="-15" r="3"/>
      <circle cx="-18" cy="-10" r="2.5"/>
      <circle cx="-30" cy="-8" r="3"/>
      <circle cx="20" cy="-45" r="3"/>
      <circle cx="28" cy="-40" r="2.5"/>
      <circle cx="15" cy="-38" r="3"/>
      <circle cx="-20" cy="0" r="2.5"/>
      <circle cx="-28" cy="8" r="3"/>
    </g>
    <!-- 棉花姑娘的脸（难过） -->
    <g transform="translate(0,-70)">
      <circle cx="0" cy="0" r="16" fill="#f0c8a0"/>
      <path d="M-6 -3 Q-4 -5 -2 -3" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
      <path d="M2 -3 Q4 -5 6 -3" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
      <path d="M-4 5 Q0 3 4 5" fill="none" stroke="#7a3b14" stroke-width="1.2"/>
    </g>
    <text x="0" y="85" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">叶子上爬满蚜虫</text>
  </g>

  <!-- 中间：请帮忙的动物们 -->
  <g transform="translate(400,200)">
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14" font-weight="bold">请谁来帮忙？</text>
    <!-- 燕子 -->
    <g transform="translate(-90,-50)">
      <path d="M0 0 Q-12 -8 -20 0 Q-12 4 0 0" fill="#3a3a3a"/>
      <path d="M0 0 Q12 -8 20 0 Q12 4 0 0" fill="#3a3a3a"/>
      <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">燕子：只会捉飞虫</text>
    </g>
    <!-- 啄木鸟 -->
    <g transform="translate(0,-50)">
      <ellipse cx="0" cy="0" rx="12" ry="9" fill="#8d5a36"/>
      <circle cx="-8" cy="-5" r="7" fill="#8d5a36"/>
      <path d="M-14 -5 L-20 -4 L-14 -3 Z" fill="#c8843a"/>
      <path d="M5 -8 L12 -12 L10 -4 Z" fill="#c84a3a"/>
      <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">啄木鸟：捉树干虫</text>
    </g>
    <!-- 青蛙 -->
    <g transform="translate(90,-50)">
      <ellipse cx="0" cy="0" rx="14" ry="11" fill="#6a8d3f"/>
      <circle cx="-8" cy="-8" r="6" fill="#6a8d3f"/>
      <circle cx="8" cy="-8" r="6" fill="#6a8d3f"/>
      <circle cx="-8" cy="-9" r="2.5" fill="#fef9ed"/>
      <circle cx="8" cy="-9" r="2.5" fill="#fef9ed"/>
      <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="10" fill="#8d5a36">青蛙：捉稻田虫</text>
    </g>
    <!-- 都帮不了 -->
    <text x="0" y="10" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">都帮不了忙……</text>
  </g>

  <!-- 右：七星瓢虫治好病 -->
  <g transform="translate(620,380)">
    <text x="0" y="-130" text-anchor="middle" font-family="serif" font-size="14" fill="#6a8d3f" font-weight="bold">病好了！</text>
    <!-- 茎 -->
    <line x1="0" y1="60" x2="0" y2="-80" stroke="#4a6a2f" stroke-width="5"/>
    <!-- 绿叶 -->
    <path d="M0 -20 Q-35 -30 -40 -5 Q-25 5 0 -20 Z" fill="#6a8d3f"/>
    <path d="M0 -50 Q35 -60 40 -35 Q25 -25 0 -50 Z" fill="#6a8d3f"/>
    <!-- 雪白棉花 -->
    <g transform="translate(0,-75)">
      <circle cx="-8" cy="0" r="12" fill="#fef9ed" stroke="#e0d8c8" stroke-width="1"/>
      <circle cx="8" cy="0" r="12" fill="#fef9ed" stroke="#e0d8c8" stroke-width="1"/>
      <circle cx="0" cy="-8" r="12" fill="#fef9ed" stroke="#e0d8c8" stroke-width="1"/>
      <circle cx="0" cy="4" r="10" fill="#fef9ed" stroke="#e0d8c8" stroke-width="1"/>
    </g>
    <!-- 棉花姑娘的脸（笑） -->
    <g transform="translate(0,-75)">
      <path d="M-5 -2 Q-3 -4 -1 -2" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
      <path d="M1 -2 Q3 -4 5 -2" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
      <path d="M-4 4 Q0 8 4 4" fill="none" stroke="#7a3b14" stroke-width="1.2"/>
    </g>
    <!-- 七星瓢虫 -->
    <g transform="translate(-25,-15)">
      <ellipse cx="0" cy="0" rx="10" ry="8" fill="#c84a3a"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#3a3a3a" stroke-width="1.5"/>
      <circle cx="-5" cy="-3" r="1.8" fill="#3a3a3a"/>
      <circle cx="5" cy="-3" r="1.8" fill="#3a3a3a"/>
      <circle cx="-5" cy="3" r="1.8" fill="#3a3a3a"/>
      <circle cx="5" cy="3" r="1.8" fill="#3a3a3a"/>
      <circle cx="0" cy="-5" r="1.5" fill="#3a3a3a"/>
      <circle cx="0" cy="5" r="1.5" fill="#3a3a3a"/>
      <circle cx="0" cy="-8" r="3" fill="#3a3a3a"/>
    </g>
    <text x="0" y="85" text-anchor="middle" font-family="serif" font-size="11" fill="#6a8d3f">七星瓢虫吃光蚜虫</text>
  </g>

  <!-- 飞来的七星瓢虫群 -->
  <g transform="translate(450,350)">
    <ellipse cx="0" cy="0" rx="8" ry="6" fill="#c84a3a"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#3a3a3a" stroke-width="1"/>
    <circle cx="-4" cy="-2" r="1.5" fill="#3a3a3a"/>
    <circle cx="4" cy="-2" r="1.5" fill="#3a3a3a"/>
    <circle cx="-4" cy="2" r="1.5" fill="#3a3a3a"/>
    <circle cx="4" cy="2" r="1.5" fill="#3a3a3a"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a" font-weight="bold">七星瓢虫来啦！</text>
  </g>

  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">找对了"医生"，棉花姑娘长出了雪白的棉花</text>
</svg>
