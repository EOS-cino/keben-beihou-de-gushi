<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一张世界地图上，南美洲和非洲的海岸线被高亮标注，似乎能拼在一起">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 墙背景 -->
  <rect x="0" y="0" width="800" height="460" fill="#f3ece0"/>
  <rect x="0" y="460" width="800" height="140" fill="#e8d9c0"/>
  <!-- 地图框 -->
  <rect x="60" y="50" width="680" height="380" fill="#a8d0e8" stroke="#7a3b14" stroke-width="5"/>
  <!-- 经纬线 -->
  <line x1="60" y1="240" x2="740" y2="240" stroke="#7ab8d8" stroke-width="1" opacity="0.6"/>
  <line x1="400" y1="50" x2="400" y2="430" stroke="#7ab8d8" stroke-width="1" opacity="0.6"/>
  <line x1="60" y1="145" x2="740" y2="145" stroke="#7ab8d8" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="335" x2="740" y2="335" stroke="#7ab8d8" stroke-width="1" opacity="0.4"/>
  <!-- 非洲大陆 -->
  <path d="M360 150 Q330 160 320 200 Q310 250 340 290 Q360 320 380 300 Q400 270 410 230 Q415 190 400 160 Q380 145 360 150 Z" fill="#6a8d3f" stroke="#7a3b14" stroke-width="2.5"/>
  <!-- 南美洲大陆 -->
  <path d="M200 230 Q180 250 175 290 Q180 340 210 370 Q240 360 250 320 Q255 280 240 250 Q225 225 200 230 Z" fill="#c8843a" stroke="#7a3b14" stroke-width="2.5"/>
  <!-- 高亮海岸线（非洲西岸） -->
  <path d="M320 200 Q310 250 340 290" stroke="#c84a3a" stroke-width="4" fill="none"/>
  <!-- 高亮海岸线（南美东岸） -->
  <path d="M210 250 Q220 290 210 370" stroke="#c84a3a" stroke-width="4" fill="none"/>
  <!-- 拼合箭头 -->
  <path d="M250 290 q40 -10 70 10" stroke="#e07856" stroke-width="3" fill="none" stroke-dasharray="6 4"/>
  <path d="M316 296 l-10 -6 l2 10 Z" fill="#e07856"/>
  <!-- 标注 -->
  <text x="200" y="215" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">南美洲</text>
  <text x="385" y="135" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">非洲</text>
  <!-- 放大镜 -->
  <circle cx="270" cy="300" r="42" fill="none" stroke="#8d5a36" stroke-width="5" opacity="0.7"/>
  <circle cx="270" cy="300" r="42" fill="#ffffff" opacity="0.15"/>
  <line x1="300" y1="330" x2="330" y2="360" stroke="#8d5a36" stroke-width="7" stroke-linecap="round"/>
  <!-- 其他大陆轮廓（简化） -->
  <path d="M480 130 Q560 120 640 140 Q680 160 660 200 Q600 210 540 200 Q490 190 480 130 Z" fill="#6a8d3f" stroke="#7a3b14" stroke-width="2" opacity="0.7"/>
  <path d="M500 320 Q560 310 620 330 Q640 360 600 380 Q540 375 510 360 Z" fill="#c8843a" stroke="#7a3b14" stroke-width="2" opacity="0.7"/>
  <!-- 灯泡（灵感） -->
  <circle cx="660" cy="430" r="18" fill="#f4d97a" stroke="#7a3b14" stroke-width="2"/>
  <rect x="652" y="446" width="16" height="8" fill="#8d5a36"/>
  <path d="M660 414 l0 -12 M672 422 l8 -8 M648 422 l-8 -8" stroke="#f4d97a" stroke-width="2.5"/>
  <!-- 标题 -->
  <text x="400" y="555" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">世界地图引出的发现</text>
</svg>
