<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="游子望着月亮思念家乡的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">乡心</text>
  <line x1="370" y1="58" x2="430" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 夜空 -->
  <rect x="0" y="64" width="800" height="460" fill="#3a4a6a" opacity="0.85"/>
  <!-- 星星 -->
  <g fill="#fff6df">
    <circle cx="100" cy="120" r="2"/>
    <circle cx="200" cy="90" r="1.5"/>
    <circle cx="320" cy="140" r="2"/>
    <circle cx="560" cy="100" r="1.5"/>
    <circle cx="680" cy="130" r="2"/>
    <circle cx="740" cy="90" r="1.5"/>
    <circle cx="150" cy="200" r="1.5"/>
    <circle cx="620" cy="180" r="2"/>
  </g>

  <!-- 月亮 -->
  <circle cx="600" cy="180" r="50" fill="#f0e8c8" stroke="#c8b888" stroke-width="2"/>
  <circle cx="588" cy="170" r="8" fill="#e0d8b8" opacity="0.6"/>
  <circle cx="612" cy="190" r="6" fill="#e0d8b8" opacity="0.6"/>
  <circle cx="600" cy="200" r="5" fill="#e0d8b8" opacity="0.5"/>

  <!-- 远处家乡（虚影/回忆） -->
  <g opacity="0.5">
    <!-- 老屋 -->
    <rect x="80" y="320" width="80" height="60" fill="#c8843a"/>
    <path d="M70 320 L120 280 L170 320 Z" fill="#8d5a36"/>
    <rect x="110" y="340" width="20" height="40" fill="#7a3b14"/>
    <!-- 炊烟 -->
    <path d="M120 280 Q115 260 122 245 Q128 230 120 215" fill="none" stroke="#fff6df" stroke-width="2" opacity="0.6"/>
    <!-- 老树 -->
    <rect x="200" y="320" width="8" height="60" fill="#8d5a36"/>
    <path d="M175 320 Q204 270 233 320 Z" fill="#6a8d3f" opacity="0.7"/>
  </g>
  <text x="160" y="410" text-anchor="middle" font-family="serif" font-size="13" fill="#fff6df" opacity="0.7">记忆中的家</text>

  <!-- 游子（窗前背影） -->
  <g transform="translate(400,360)">
    <!-- 窗框 -->
    <rect x="-80" y="-60" width="160" height="120" fill="none" stroke="#c8843a" stroke-width="4"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#c8843a" stroke-width="3"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#c8843a" stroke-width="3"/>
    <!-- 游子背影 -->
    <circle cx="0" cy="-90" r="18" fill="#3a2a1a"/>
    <path d="M-22 -72 L-30 20 L30 20 L22 -72 Z" fill="#5a3a1a"/>
  </g>

  <!-- 思乡的线（月亮到家乡） -->
  <path d="M560 200 Q350 280 200 320" fill="none" stroke="#fff6df" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- 地面 -->
  <rect x="0" y="500" width="800" height="60" fill="#2a2a3a"/>

  <!-- 标注：月亮 -->
  <line x1="640" y1="180" x2="710" y2="180" stroke="#fff6df" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <rect x="700" y="166" width="80" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="740" y="185" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">故乡月</text>

  <!-- 标注：炊烟 -->
  <line x1="122" y1="250" x2="60" y2="220" stroke="#fff6df" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <rect x="20" y="206" width="80" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="60" y="225" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">炊烟</text>

  <!-- 底部说明 -->
  <rect x="40" y="528" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.9"/>
  <text x="400" y="553" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">游子望月思乡，月亮、炊烟、乡音，都是心里放不下的家乡。</text>
</svg>
