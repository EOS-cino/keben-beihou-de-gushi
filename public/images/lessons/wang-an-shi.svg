<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="王安石读书与变法插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">王安石</text>
  <line x1="340" y1="60" x2="460" y2="60" stroke="#e8a838" stroke-width="2"/>

  <!-- 室内背景 -->
  <rect x="0" y="80" width="800" height="520" fill="#f5e0c8" opacity="0.25"/>
  <!-- 窗户 -->
  <rect x="560" y="110" width="180" height="140" fill="#4a90b8" opacity="0.25" stroke="#7a3b14" stroke-width="2.5"/>
  <line x1="650" y1="110" x2="650" y2="250" stroke="#7a3b14" stroke-width="2"/>
  <line x1="560" y1="180" x2="740" y2="180" stroke="#7a3b14" stroke-width="2"/>
  <!-- 窗外竹子 -->
  <g stroke="#2d6a4f" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <line x1="590" y1="250" x2="585" y2="120"/>
    <line x1="620" y1="250" x2="625" y2="115"/>
  </g>
  <g fill="#2d6a4f" opacity="0.7">
    <ellipse cx="580" cy="150" rx="10" ry="4" transform="rotate(-30 580 150)"/>
    <ellipse cx="628" cy="140" rx="10" ry="4" transform="rotate(30 628 140)"/>
    <ellipse cx="585" cy="190" rx="10" ry="4" transform="rotate(-30 585 190)"/>
  </g>

  <!-- 书案 -->
  <rect x="120" y="380" width="380" height="20" fill="#6a4220" stroke="#4a2a10" stroke-width="2"/>
  <rect x="130" y="400" width="20" height="100" fill="#6a4220"/>
  <rect x="470" y="400" width="20" height="100" fill="#6a4220"/>

  <!-- 书卷 -->
  <g transform="translate(160, 350)">
    <rect x="0" y="0" width="120" height="30" fill="#fff8e0" stroke="#c88820" stroke-width="1.5" rx="3"/>
    <line x1="10" y1="10" x2="110" y2="10" stroke="#c8a878" stroke-width="1"/>
    <line x1="10" y1="18" x2="100" y2="18" stroke="#c8a878" stroke-width="1"/>
    <line x1="10" y1="26" x2="105" y2="26" stroke="#c8a878" stroke-width="1"/>
  </g>
  <g transform="translate(320, 355)">
    <rect x="0" y="0" width="100" height="25" fill="#fff8e0" stroke="#c88820" stroke-width="1.5" rx="3"/>
    <line x1="8" y1="9" x2="92" y2="9" stroke="#c8a878" stroke-width="1"/>
    <line x1="8" y1="16" x2="85" y2="16" stroke="#c8a878" stroke-width="1"/>
  </g>

  <!-- 砚台与毛笔 -->
  <g transform="translate(420, 360)">
    <ellipse cx="0" cy="10" rx="22" ry="8" fill="#3a3a3a" stroke="#1a1a1a" stroke-width="1.5"/>
    <ellipse cx="0" cy="8" rx="16" ry="5" fill="#1a1a1a"/>
    <line x1="-5" y1="5" x2="-30" y2="-25" stroke="#6a4220" stroke-width="3" stroke-linecap="round"/>
    <path d="M-30 -25 L-34 -30 L-26 -28 Z" fill="#2a2a2a"/>
  </g>

  <!-- 王安石（人物） -->
  <g transform="translate(310, 250)">
    <!-- 身体（长袍） -->
    <path d="M-40 130 L-30 30 L-20 -10 L20 -10 L30 30 L40 130 Z" fill="#2d6a4f" stroke="#1a4a35" stroke-width="2"/>
    <!-- 衣领 -->
    <path d="M-20 -10 L0 15 L20 -10" fill="#f0d0a8" stroke="#c89060" stroke-width="1.5"/>
    <!-- 腰带 -->
    <rect x="-32" y="60" width="64" height="10" fill="#e8a838" stroke="#c88820" stroke-width="1"/>
    <!-- 头 -->
    <circle cx="0" cy="-40" r="32" fill="#f0d0a8" stroke="#c89060" stroke-width="2"/>
    <!-- 帽子（宋代官帽） -->
    <path d="M-32 -50 Q-34 -78 0 -80 Q34 -78 32 -50 Z" fill="#3a3a3a" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M-40 -58 L-60 -54 L-58 -48 L-38 -52" fill="#3a3a3a" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M40 -58 L60 -54 L58 -48 L38 -52" fill="#3a3a3a" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- 胡须 -->
    <path d="M-12 -25 Q0 -8 12 -25" fill="none" stroke="#3a3a3a" stroke-width="2"/>
    <path d="M-8 -22 Q0 -12 8 -22 Q6 -2 0 2 Q-6 -2 -8 -22" fill="#3a3a3a" opacity="0.7"/>
    <!-- 眼睛 -->
    <ellipse cx="-10" cy="-42" rx="3" ry="2.5" fill="#2a2a2a"/>
    <ellipse cx="10" cy="-42" rx="3" ry="2.5" fill="#2a2a2a"/>
    <!-- 眉毛（坚毅） -->
    <path d="M-16 -50 L-4 -48" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M4 -48 L16 -50" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 嘴 -->
    <path d="M-5 -30 Q0 -27 5 -30" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 手（持卷） -->
    <path d="M-30 30 L-50 60 L-55 75" fill="none" stroke="#f0d0a8" stroke-width="10" stroke-linecap="round"/>
    <path d="M30 30 L50 55 L55 70" fill="none" stroke="#f0d0a8" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- 墙上卷轴（变法奏折） -->
  <g transform="translate(620, 320)">
    <rect x="-8" y="-60" width="16" height="6" fill="#6a4220"/>
    <rect x="-40" y="-54" width="80" height="120" fill="#fff8e0" stroke="#c88820" stroke-width="1.5"/>
    <line x1="-30" y1="-40" x2="30" y2="-40" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-30" y1="-28" x2="25" y2="-28" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-30" y1="-16" x2="30" y2="-16" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-30" y1="-4" x2="20" y2="-4" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-30" y1="8" x2="28" y2="8" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-30" y1="20" x2="22" y2="20" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-30" y1="32" x2="28" y2="32" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-30" y1="44" x2="18" y2="44" stroke="#7a3b14" stroke-width="1"/>
    <rect x="-8" y="66" width="16" height="6" fill="#6a4220"/>
    <text x="0" y="-58" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">变法</text>
  </g>

  <!-- 标注 -->
  <line x1="310" y1="210" x2="310" y2="170" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="255" y="142" width="110" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="310" y="160" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">拗相公王安石</text>

  <line x1="620" y1="320" x2="620" y2="280" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="570" y="255" width="100" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="620" y="273" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">变法奏折</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">既是敢改革的拗相公，又是会炼字的大诗人</text>
</svg>
