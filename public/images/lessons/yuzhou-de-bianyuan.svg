<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="浩瀚宇宙星空和星系插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">宇宙的边缘</text>
  <line x1="300" y1="56" x2="500" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——从地球出发，走向无尽的星空</text>

  <!-- 宇宙背景（深色） -->
  <rect x="0" y="90" width="800" height="510" fill="#1a1a3a"/>
  <rect x="0" y="90" width="800" height="510" fill="#4a4a8f" opacity="0.3"/>

  <!-- 星星 -->
  <g fill="#fef9ed">
    <circle cx="50" cy="120" r="1.5"/>
    <circle cx="120" cy="110" r="1"/>
    <circle cx="200" cy="130" r="2"/>
    <circle cx="280" cy="115" r="1"/>
    <circle cx="350" cy="125" r="1.5"/>
    <circle cx="450" cy="110" r="1"/>
    <circle cx="550" cy="130" r="2"/>
    <circle cx="650" cy="115" r="1"/>
    <circle cx="730" cy="125" r="1.5"/>
    <circle cx="80" cy="180" r="1"/>
    <circle cx="180" cy="170" r="1.5"/>
    <circle cx="300" cy="180" r="1"/>
    <circle cx="500" cy="175" r="1.5"/>
    <circle cx="620" cy="185" r="1"/>
    <circle cx="720" cy="170" r="2"/>
    <circle cx="30" cy="250" r="1"/>
    <circle cx="150" cy="260" r="1.5"/>
    <circle cx="780" cy="250" r="1"/>
    <circle cx="60" cy="350" r="1.5"/>
    <circle cx="750" cy="340" r="1"/>
    <circle cx="100" cy="450" r="1"/>
    <circle cx="700" cy="460" r="1.5"/>
    <circle cx="40" cy="550" r="1"/>
    <circle cx="760" cy="540" r="1.5"/>
  </g>
  <!-- 亮星 -->
  <g>
    <circle cx="100" cy="200" r="3" fill="#fef9ed"/>
    <circle cx="100" cy="200" r="6" fill="#fef9ed" opacity="0.2"/>
    <circle cx="700" cy="300" r="3" fill="#e07856"/>
    <circle cx="700" cy="300" r="7" fill="#e07856" opacity="0.2"/>
    <circle cx="200" cy="400" r="2.5" fill="#a8d0e8"/>
    <circle cx="200" cy="400" r="5" fill="#a8d0e8" opacity="0.2"/>
  </g>

  <!-- 中心：地球 -->
  <g transform="translate(400, 350)">
    <circle cx="0" cy="0" r="25" fill="#7ab8d8" stroke="#4a6a8f" stroke-width="2"/>
    <path d="M-15 -5 Q-10 -10 -5 -5 Q0 0 5 -8 Q10 -3 15 -2 Q10 5 0 8 Q-10 5 -15 -5" fill="#6a8d3f" opacity="0.7"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="12" fill="#fef9ed">地球</text>
  </g>

  <!-- 第一圈：太阳系 -->
  <circle cx="400" cy="350" r="80" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- 太阳 -->
  <circle cx="470" cy="330" r="8" fill="#e07856"/>
  <circle cx="470" cy="330" r="12" fill="#e07856" opacity="0.3"/>
  <text x="490" y="325" font-family="serif" font-size="10" fill="#c8843a">太阳</text>
  <text x="400" y="280" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a" opacity="0.7">太阳系（光走8分钟到地球）</text>

  <!-- 第二圈：恒星邻居 -->
  <circle cx="400" cy="350" r="150" fill="none" stroke="#7ab8d8" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>
  <circle cx="280" cy="300" r="3" fill="#fef9ed"/>
  <text x="260" y="290" font-family="serif" font-size="10" fill="#7ab8d8">比邻星</text>
  <text x="260" y="305" font-family="serif" font-size="9" fill="#7ab8d8" opacity="0.7">4.2光年</text>

  <!-- 第三圈：银河系 -->
  <circle cx="400" cy="350" r="230" fill="none" stroke="#6a8d3f" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.3"/>
  <!-- 银河系旋臂 -->
  <g transform="translate(400, 350)" opacity="0.3">
    <ellipse cx="0" cy="0" rx="200" ry="60" fill="none" stroke="#6a8d3f" stroke-width="8"/>
    <ellipse cx="0" cy="0" rx="150" ry="45" fill="none" stroke="#6a8d3f" stroke-width="6"/>
  </g>
  <text x="400" y="160" text-anchor="middle" font-family="serif" font-size="11" fill="#6a8d3f">银河系（直径10万光年，2000亿颗恒星）</text>

  <!-- 第四圈：可观测宇宙 -->
  <circle cx="400" cy="350" r="310" fill="none" stroke="#c84a3a" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.2"/>
  <!-- 其他星系 -->
  <g transform="translate(120, 500)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="15" ry="6" fill="#c8843a" transform="rotate(30)"/>
  </g>
  <g transform="translate(680, 500)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="12" ry="5" fill="#e07856" transform="rotate(-20)"/>
  </g>
  <text x="400" y="580" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a" opacity="0.7">可观测宇宙（直径930亿光年，约2万亿个星系）</text>

  <!-- 疑问标注 -->
  <g transform="translate(100, 150)">
    <rect x="-70" y="0" width="140" height="45" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14" font-weight="bold">宇宙有边缘吗？</text>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">边缘外面是什么？</text>
  </g>
</svg>
