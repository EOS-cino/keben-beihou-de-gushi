<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="笼中鸟与自由飞翔的鸟儿对比插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">鸟</text>
  <line x1="370" y1="58" x2="430" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空背景 -->
  <rect x="0" y="72" width="800" height="280" fill="#e8e8f0" opacity="0.25"/>
  <!-- 云 -->
  <ellipse cx="200" cy="120" rx="50" ry="14" fill="#fff" opacity="0.5"/>
  <ellipse cx="520" cy="105" rx="55" ry="16" fill="#fff" opacity="0.5"/>

  <!-- 左侧：自由飞翔的鸟 -->
  <g transform="translate(220, 180)">
    <!-- 飞翔的鸟1 -->
    <path d="M -30 0 Q -15 -12 0 -8 Q 15 -12 30 0 Q 15 4 0 0 Q -15 4 -30 0" fill="#2d6a4f" stroke="#1a4a30" stroke-width="1.5"/>
    <path d="M -20 0 Q -28 8 -32 14" fill="none" stroke="#2d6a4f" stroke-width="2.5"/>
    <path d="M 20 0 Q 28 8 32 14" fill="none" stroke="#2d6a4f" stroke-width="2.5"/>
    <circle cx="0" cy="-4" r="2" fill="#e8a838"/>
    <!-- 飞行轨迹 -->
    <path d="M -60 10 Q -30 -20 0 -8 Q 30 -20 60 10" fill="none" stroke="#c8843a" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  </g>
  <g transform="translate(340, 140)">
    <path d="M -22 0 Q -11 -9 0 -6 Q 11 -9 22 0 Q 11 3 0 0 Q -11 3 -22 0" fill="#4a90b8" stroke="#2a6080" stroke-width="1.5"/>
    <path d="M -15 0 Q -20 6 -23 10" fill="none" stroke="#4a90b8" stroke-width="2"/>
    <path d="M 15 0 Q 20 6 23 10" fill="none" stroke="#4a90b8" stroke-width="2"/>
  </g>
  <!-- 树枝上的鸟 -->
  <g transform="translate(150, 280)">
    <!-- 树枝 -->
    <path d="M -50 0 Q 0 -5 50 0" fill="none" stroke="#5a4a2a" stroke-width="4"/>
    <!-- 鸟 -->
    <ellipse cx="0" cy="-18" rx="14" ry="11" fill="#e07856" stroke="#a05030" stroke-width="1.5"/>
    <circle cx="-8" cy="-24" r="7" fill="#e07856" stroke="#a05030" stroke-width="1.5"/>
    <circle cx="-10" cy="-25" r="1.5" fill="#2a2a2a"/>
    <path d="M -14 -24 L -20 -23 L -14 -21" fill="#e8a838" stroke="#a05030" stroke-width="1"/>
    <!-- 翅膀 -->
    <path d="M 2 -22 Q 12 -28 18 -20" fill="#c06840" stroke="#a05030" stroke-width="1.5"/>
    <!-- 尾巴 -->
    <path d="M 12 -16 L 22 -14 L 12 -12" fill="#e07856" stroke="#a05030" stroke-width="1.5"/>
    <!-- 腿 -->
    <line x1="-3" y1="-8" x2="-3" y2="0" stroke="#5a4a2a" stroke-width="2"/>
    <line x1="3" y1="-8" x2="3" y2="0" stroke="#5a4a2a" stroke-width="2"/>
    <!-- 音符 -->
    <text x="20" y="-40" font-family="serif" font-size="20" fill="#2d6a4f" opacity="0.6">♪</text>
    <text x="35" y="-50" font-family="serif" font-size="16" fill="#2d6a4f" opacity="0.5">♫</text>
  </g>

  <!-- 右侧：笼中鸟 -->
  <g transform="translate(580, 250)">
    <!-- 鸟笼 -->
    <ellipse cx="0" cy="-80" rx="45" ry="12" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <!-- 笼顶 -->
    <path d="M -45 -80 Q 0 -130 45 -80" fill="none" stroke="#7a3b14" stroke-width="2.5"/>
    <line x1="0" y1="-128" x2="0" y2="-110" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="0" cy="-132" r="4" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 笼身竖线 -->
    <line x1="-45" y1="-80" x2="-45" y2="20" stroke="#7a3b14" stroke-width="2"/>
    <line x1="-30" y1="-78" x2="-30" y2="20" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-15" y1="-76" x2="-15" y2="20" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="0" y1="-75" x2="0" y2="20" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="15" y1="-76" x2="15" y2="20" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="30" y1="-78" x2="30" y2="20" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="45" y1="-80" x2="45" y2="20" stroke="#7a3b14" stroke-width="2"/>
    <!-- 笼底 -->
    <rect x="-50" y="20" width="100" height="10" fill="#8d5a36" stroke="#7a3b14" stroke-width="2" rx="2"/>
    <!-- 笼中鸟 -->
    <g transform="translate(0, -20)">
      <ellipse cx="0" cy="0" rx="12" ry="9" fill="#4a90b8" stroke="#2a6080" stroke-width="1.5"/>
      <circle cx="-7" cy="-6" r="6" fill="#4a90b8" stroke="#2a6080" stroke-width="1.5"/>
      <circle cx="-9" cy="-7" r="1.2" fill="#2a2a2a"/>
      <path d="M -12 -6 L -17 -5 L -12 -4" fill="#e8a838" stroke="#2a6080" stroke-width="0.8"/>
      <!-- 垂下的翅膀 -->
      <path d="M 3 -2 Q 8 4 6 8" fill="#3a7090" stroke="#2a6080" stroke-width="1"/>
      <!-- 栖木 -->
      <line x1="-18" y1="10" x2="18" y2="10" stroke="#5a4a2a" stroke-width="3"/>
      <line x1="-2" y1="9" x2="-2" y2="10" stroke="#5a4a2a" stroke-width="2"/>
      <line x1="2" y1="9" x2="2" y2="10" stroke="#5a4a2a" stroke-width="2"/>
    </g>
    <!-- 望向天空的眼睛方向线 -->
    <path d="M -10 -28 Q -20 -50 -30 -70" fill="none" stroke="#c8843a" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  </g>

  <!-- 地面 -->
  <rect x="0" y="400" width="800" height="160" fill="#d8c8a8" opacity="0.25"/>

  <!-- 标注：自由 -->
  <rect x="100" y="330" width="120" height="28" fill="#fff6df" stroke="#2d6a4f" stroke-width="1.5" rx="4"/>
  <text x="160" y="349" text-anchor="middle" font-family="serif" font-size="14" fill="#2d6a4f">天空中的鸟·自由</text>

  <!-- 标注：困顿 -->
  <rect x="520" y="330" width="120" height="28" fill="#fff6df" stroke="#e07856" stroke-width="1.5" rx="4"/>
  <text x="580" y="349" text-anchor="middle" font-family="serif" font-size="14" fill="#e07856">笼中的鸟·困顿</text>

  <!-- 中间对比箭头 -->
  <g transform="translate(400, 200)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="40" fill="#c8843a" opacity="0.4">VS</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">爱鸟不是占有——让它在天空飞翔，才是真正的爱</text>
</svg>
