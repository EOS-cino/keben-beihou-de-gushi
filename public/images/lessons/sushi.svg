<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="苏轼戴斗笠站在竹林前的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 竹林背景 -->
  <g opacity="0.35">
    <rect x="80" y="120" width="14" height="380" rx="4" fill="#2d6a4f"/>
    <rect x="140" y="80" width="12" height="420" rx="4" fill="#2d6a4f"/>
    <rect x="200" y="150" width="10" height="350" rx="4" fill="#2d6a4f"/>
    <rect x="600" y="100" width="12" height="400" rx="4" fill="#2d6a4f"/>
    <rect x="660" y="140" width="14" height="360" rx="4" fill="#2d6a4f"/>
    <rect x="720" y="90" width="10" height="410" rx="4" fill="#2d6a4f"/>
  </g>
  <!-- 竹叶 -->
  <g fill="#2d6a4f" opacity="0.5">
    <ellipse cx="87" cy="130" rx="18" ry="6" transform="rotate(30 87 130)"/>
    <ellipse cx="146" cy="90" rx="20" ry="6" transform="rotate(-20 146 90)"/>
    <ellipse cx="606" cy="110" rx="18" ry="6" transform="rotate(25 606 110)"/>
    <ellipse cx="666" cy="150" rx="20" ry="6" transform="rotate(-15 666 150)"/>
  </g>
  <!-- 地面 -->
  <path d="M0 500 Q400 470 800 500 L800 600 L0 600 Z" fill="#dceee3"/>
  <!-- 苏轼人物 -->
  <g transform="translate(400 500)">
    <!-- 长袍 -->
    <path d="M-55 -180 Q-60 -50 -70 0 L-50 0 L-30 -60 L30 -60 L50 0 L70 0 Q60 -50 55 -180 Z" fill="#4a90b8"/>
    <!-- 腰带 -->
    <rect x="-55" y="-100" width="110" height="12" fill="#e8a838"/>
    <!-- 头部 -->
    <circle cx="0" cy="-210" r="28" fill="#f4d4a8"/>
    <!-- 斗笠 -->
    <ellipse cx="0" cy="-235" rx="55" ry="12" fill="#e8a838"/>
    <path d="M-50 -235 Q0 -275 50 -235 Z" fill="#d49828"/>
    <!-- 胡须 -->
    <path d="M-8 -195 Q0 -175 8 -195" stroke="#333" stroke-width="2" fill="none"/>
    <!-- 眼睛 -->
    <circle cx="-8" cy="-215" r="2" fill="#333"/>
    <circle cx="8" cy="-215" r="2" fill="#333"/>
    <!-- 手持卷轴 -->
    <rect x="55" y="-120" width="8" height="60" rx="2" fill="#e07856"/>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="700" fill="#2d6a4f">苏轼</text>
  <text x="400" y="82" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#7a7468">竹杖芒鞋轻胜马，谁怕？</text>
</svg>
