<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="听听，秋的声音">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">听听，秋的声音</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">竖起耳朵，捡秋天的声音</text>
  <g transform="translate(160,250)">
    <path d="M0,80 L0,10 Q0,-10 18,-10 L22,-10 Q40,-10 40,10 L40,80 Z" fill="#8fb86a" stroke="#3a6b2a" stroke-width="2"/>
    <path d="M-10,80 L50,80" stroke="#5a3a1a" stroke-width="4"/>
  </g>
  <text x="180" y="360" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">刷刷</text>
  <g transform="translate(560,230)">
    <path d="M0,0 Q30,-20 70,-10 Q40,10 0,0 Z" fill="#7a8aa8" stroke="#3a4a6a" stroke-width="2"/>
    <path d="M0,5 Q30,-15 70,-5 Q40,15 0,5 Z" fill="#9aa8c0" stroke="#3a4a6a" stroke-width="2"/>
  </g>
  <text x="560" y="300" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">嘎嘎·叮咛</text>
  <ellipse cx="400" cy="430" rx="60" ry="30" fill="#c98a3a"/>
  <path d="M370,425 q15,-12 30,0" fill="none" stroke="#3a2a1a" stroke-width="2"/>
  <text x="400" y="500" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">秋天是一首听不完的歌</text>
</svg>
