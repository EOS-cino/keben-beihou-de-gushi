<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="铺满金色巴掌的水泥道">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">铺满金色巴掌的水泥道</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">落叶把水泥道铺成金色</text>
  <rect x="80" y="160" width="640" height="300" rx="10" fill="#d9c9a8" stroke="#a88a4a" stroke-width="2"/>
  <g fill="#e8b94a" stroke="#c98a3a" stroke-width="2">
    <path d="M180,230 l24,-30 l34,8 l-14,30 l14,30 l-34,8 l-24,-30 l-24,30 l-34,-8 l14,-30 l-14,-30 l34,-8 z"/>
    <path d="M420,300 l24,-30 l34,8 l-14,30 l14,30 l-34,8 l-24,-30 l-24,30 l-34,-8 l14,-30 l-14,-30 l34,-8 z"/>
    <path d="M560,400 l20,-26 l28,7 l-12,26 l12,26 l-28,7 l-20,-26 l-20,26 l-28,-7 l12,-26 l-12,-26 l28,-7 z"/>
    <path d="M260,410 l20,-26 l28,7 l-12,26 l12,26 l-28,7 l-20,-26 l-20,26 l-28,-7 l12,-26 l-12,-26 l28,-7 z"/>
  </g>
  <ellipse cx="320" cy="380" rx="40" ry="16" fill="#9fc8d8" opacity="0.7"/>
  <text x="400" y="510" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">每一片落叶，都是一只金色的小巴掌</text>
</svg>
