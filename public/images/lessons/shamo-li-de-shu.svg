<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="沙漠中挺立的胡杨树插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">沙漠里的树</text>
  <line x1="300" y1="60" x2="500" y2="60" stroke="#e8a838" stroke-width="2"/>

  <!-- 天空（沙漠的烈日） -->
  <rect x="0" y="80" width="800" height="320" fill="#e8a838" opacity="0.2"/>
  <rect x="0" y="80" width="800" height="100" fill="#e07856" opacity="0.1"/>
  <!-- 太阳 -->
  <circle cx="650" cy="160" r="42" fill="#e8a838" stroke="#c88820" stroke-width="2"/>
  <g stroke="#e8a838" stroke-width="3" stroke-linecap="round" opacity="0.6">
    <line x1="650" y1="108" x2="650" y2="95"/>
    <line x1="650" y1="212" x2="650" y2="225"/>
    <line x1="598" y1="160" x2="585" y2="160"/>
    <line x1="702" y1="160" x2="715" y2="160"/>
  </g>

  <!-- 沙丘（远近层次） -->
  <path d="M0 400 Q150 340 350 380 Q500 410 700 360 Q780 345 800 370 L800 560 L0 560 Z" fill="#e8a838" opacity="0.4"/>
  <path d="M0 440 Q200 400 400 430 Q600 455 800 410 L800 560 L0 560 Z" fill="#e07856" opacity="0.3"/>
  <path d="M0 480 Q250 460 500 485 Q700 500 800 475 L800 560 L0 560 Z" fill="#c88820" opacity="0.35"/>

  <!-- 沙丘纹理 -->
  <g fill="none" stroke="#c88820" stroke-width="1.5" opacity="0.4">
    <path d="M50 420 Q150 410 250 420"/>
    <path d="M400 440 Q500 432 600 442"/>
    <path d="M100 500 Q200 492 300 500"/>
    <path d="M450 510 Q550 502 650 510"/>
  </g>

  <!-- 胡杨树（主树，高大） -->
  <g transform="translate(380, 470)">
    <!-- 树干（粗壮、扭曲） -->
    <path d="M-18 0 Q-22 -60 -14 -120 Q-10 -180 -16 -240 Q-12 -280 -8 -300" fill="none" stroke="#6a4220" stroke-width="22" stroke-linecap="round"/>
    <path d="M-18 0 Q-22 -60 -14 -120 Q-10 -180 -16 -240 Q-12 -280 -8 -300" fill="none" stroke="#4a2a10" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
    <!-- 树皮纹理 -->
    <g stroke="#4a2a10" stroke-width="1.5" fill="none" opacity="0.6">
      <path d="M-20 -50 Q-15 -55 -18 -70"/>
      <path d="M-12 -120 Q-16 -130 -10 -145"/>
      <path d="M-18 -200 Q-12 -210 -16 -225"/>
    </g>
    <!-- 主枝 -->
    <path d="M-12 -200 Q20 -215 45 -225" fill="none" stroke="#6a4220" stroke-width="10" stroke-linecap="round"/>
    <path d="M-14 -160 Q-40 -170 -60 -185" fill="none" stroke="#6a4220" stroke-width="9" stroke-linecap="round"/>
    <path d="M-10 -250 Q15 -260 35 -265" fill="none" stroke="#6a4220" stroke-width="8" stroke-linecap="round"/>
    <!-- 树冠（胡杨叶，金黄与绿混合） -->
    <g>
      <ellipse cx="-8" cy="-305" rx="40" ry="30" fill="#e8a838" opacity="0.85"/>
      <ellipse cx="35" cy="-260" rx="32" ry="24" fill="#e8a838" opacity="0.8"/>
      <ellipse cx="-55" cy="-190" rx="28" ry="22" fill="#2d6a4f" opacity="0.75"/>
      <ellipse cx="45" cy="-225" rx="26" ry="20" fill="#2d6a4f" opacity="0.7"/>
      <ellipse cx="-20" cy="-260" rx="24" ry="18" fill="#e8a838" opacity="0.7"/>
      <ellipse cx="20" cy="-290" rx="22" ry="16" fill="#2d6a4f" opacity="0.7"/>
    </g>
    <!-- 零散叶子 -->
    <g fill="#e8a838">
      <circle cx="-30" cy="-280" r="4"/>
      <circle cx="50" cy="-240" r="3.5"/>
      <circle cx="-40" cy="-220" r="3.5"/>
      <circle cx="10" cy="-270" r="3"/>
    </g>
  </g>

  <!-- 小胡杨树（远处） -->
  <g transform="translate(150, 500)">
    <path d="M0 0 Q-2 -40 0 -80" fill="none" stroke="#6a4220" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="0" cy="-90" rx="22" ry="18" fill="#2d6a4f" opacity="0.7"/>
    <ellipse cx="-12" cy="-80" rx="14" ry="11" fill="#e8a838" opacity="0.6"/>
  </g>
  <g transform="translate(620, 510)">
    <path d="M0 0 Q2 -35 0 -70" fill="none" stroke="#6a4220" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="0" cy="-80" rx="20" ry="16" fill="#e8a838" opacity="0.7"/>
    <ellipse cx="12" cy="-72" rx="12" ry="10" fill="#2d6a4f" opacity="0.6"/>
  </g>

  <!-- 梭梭树（矮小灌木） -->
  <g transform="translate(250, 530)">
    <path d="M0 0 L-5 -25 M0 0 L5 -28 M0 0 L0 -30" fill="none" stroke="#6a4220" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="0" cy="-30" rx="14" ry="10" fill="#2d6a4f" opacity="0.6"/>
  </g>

  <!-- 风沙 -->
  <g fill="none" stroke="#c88820" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <path d="M50 350 Q150 345 250 355"/>
    <path d="M100 380 Q200 375 300 385"/>
    <path d="M500 360 Q600 355 700 365"/>
  </g>

  <!-- 树根（露出沙面，展示发达根系） -->
  <g fill="none" stroke="#6a4220" stroke-width="5" stroke-linecap="round" opacity="0.7">
    <path d="M362 470 Q340 478 320 485"/>
    <path d="M398 470 Q420 478 445 482"/>
    <path d="M370 472 Q360 490 350 505"/>
  </g>

  <!-- 标注 -->
  <line x1="380" y1="180" x2="380" y2="140" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="320" y="112" width="120" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="380" y="130" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">三百岁的胡杨</text>

  <line x1="360" y1="495" x2="300" y2="525" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="220" y="510" width="110" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="275" y="528" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">发达的根系</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">胡杨扎根沙漠，根深叶蜡，是风沙里不倒的绿色英雄</text>
</svg>
