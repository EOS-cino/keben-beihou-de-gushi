<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="车胤借萤火虫光读书的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#5a3a1a">囊萤夜读</text>
  <line x1="310" y1="56" x2="490" y2="56" stroke="#c9952e" stroke-width="3"/>

  <!-- 夜空背景 -->
  <rect x="0" y="65" width="800" height="535" fill="#1a2a3a"/>
  <!-- 星星 -->
  <g fill="#f4e8a0">
    <circle cx="80" cy="100" r="1.5"/>
    <circle cx="150" cy="85" r="2"/>
    <circle cx="220" cy="110" r="1.5"/>
    <circle cx="300" cy="90" r="1"/>
    <circle cx="500" cy="95" r="2"/>
    <circle cx="580" cy="80" r="1.5"/>
    <circle cx="660" cy="105" r="1"/>
    <circle cx="730" cy="90" r="2"/>
    <circle cx="120" cy="140" r="1"/>
    <circle cx="400" cy="100" r="1.5"/>
    <circle cx="620" cy="130" r="1"/>
    <circle cx="700" cy="150" r="1.5"/>
  </g>
  <!-- 月亮 -->
  <circle cx="680" cy="130" r="30" fill="#f4e8a0" opacity="0.9"/>
  <circle cx="690" cy="125" r="28" fill="#1a2a3a"/>

  <!-- 草地 -->
  <path d="M0 480 Q200 460 400 475 Q600 490 800 470 L800 600 L0 600 Z" fill="#2a4a2a"/>
  <!-- 草丛 -->
  <g stroke="#3a6a3a" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M50 475 L48 455 M58 477 L60 458 M66 475 L64 460"/>
    <path d="M200 470 L198 450 M208 472 L210 453 M218 470 L216 455"/>
    <path d="M550 480 L548 460 M558 482 L560 463 M568 480 L566 465"/>
    <path d="M700 472 L698 452 M708 474 L710 455 M718 472 L716 457"/>
  </g>

  <!-- 飞舞的萤火虫 -->
  <g>
    <!-- 萤火虫1 -->
    <circle cx="120" cy="200" r="5" fill="#f4e860" opacity="0.9"/>
    <circle cx="120" cy="200" r="10" fill="#f4e860" opacity="0.3"/>
    <ellipse cx="116" cy="200" rx="4" ry="2" fill="#3a4a2a"/>
    <!-- 萤火虫2 -->
    <circle cx="180" cy="250" r="4" fill="#f4e860" opacity="0.9"/>
    <circle cx="180" cy="250" r="9" fill="#f4e860" opacity="0.3"/>
    <ellipse cx="177" cy="250" rx="3.5" ry="2" fill="#3a4a2a"/>
    <!-- 萤火虫3 -->
    <circle cx="90" cy="300" r="5" fill="#f4e860" opacity="0.9"/>
    <circle cx="90" cy="300" r="11" fill="#f4e860" opacity="0.3"/>
    <ellipse cx="86" cy="300" rx="4" ry="2" fill="#3a4a2a"/>
    <!-- 萤火虫4 -->
    <circle cx="200" cy="180" r="4" fill="#f4e860" opacity="0.9"/>
    <circle cx="200" cy="180" r="9" fill="#f4e860" opacity="0.3"/>
    <!-- 萤火虫5 -->
    <circle cx="150" cy="350" r="4" fill="#f4e860" opacity="0.9"/>
    <circle cx="150" cy="350" r="9" fill="#f4e860" opacity="0.3"/>
    <!-- 萤火虫6 -->
    <circle cx="250" cy="320" r="3" fill="#f4e860" opacity="0.9"/>
    <circle cx="250" cy="320" r="7" fill="#f4e860" opacity="0.3"/>
    <!-- 飞行轨迹 -->
    <path d="M120 200 Q140 230 180 250" fill="none" stroke="#f4e860" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>
    <path d="M180 250 Q130 280 90 300" fill="none" stroke="#f4e860" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>
  </g>
  <text x="160" y="160" text-anchor="middle" font-family="serif" font-size="14" fill="#f4e860">萤火虫</text>

  <!-- 车胤（坐在案前读书） -->
  <g transform="translate(450, 300)">
    <text x="60" y="-80" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#f4e8a0">车胤</text>
    <!-- 头 -->
    <ellipse cx="60" cy="-40" rx="22" ry="26" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 头巾 -->
    <path d="M38 -50 Q60 -68 82 -50 L80 -42 L40 -42 Z" fill="#4a3a2a" stroke="#2a1a0a" stroke-width="1.5"/>
    <!-- 眼睛（专注看书） -->
    <path d="M50 -42 L55 -42" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M65 -42 L70 -42" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 嘴 -->
    <line x1="57" y1="-28" x2="63" y2="-28" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 身体 -->
    <path d="M38 -15 L28 80 L92 80 L82 -15 Z" fill="#5a4a3a" stroke="#2a1a0a" stroke-width="2"/>
    <!-- 衣领 -->
    <path d="M52 -15 L60 5 L68 -15" fill="#f4d4a8" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 腰带 -->
    <rect x="32" y="30" width="56" height="8" fill="#8a6a3a"/>

    <!-- 书案（桌子） -->
    <rect x="-20" y="85" width="180" height="12" fill="#8b6332" stroke="#5a3a1a" stroke-width="2" rx="2"/>
    <rect x="-10" y="97" width="8" height="50" fill="#8b6332" stroke="#5a3a1a" stroke-width="1.5"/>
    <rect x="152" y="97" width="8" height="50" fill="#8b6332" stroke="#5a3a1a" stroke-width="1.5"/>

    <!-- 竹简（摊开在桌上） -->
    <rect x="10" y="75" width="120" height="14" fill="#c4a070" stroke="#7a5a20" stroke-width="1.5" rx="2"/>
    <line x1="25" y1="77" x2="25" y2="87" stroke="#7a5a20" stroke-width="1"/>
    <line x1="40" y1="77" x2="40" y2="87" stroke="#7a5a20" stroke-width="1"/>
    <line x1="55" y1="77" x2="55" y2="87" stroke="#7a5a20" stroke-width="1"/>
    <line x1="70" y1="77" x2="70" y2="87" stroke="#7a5a20" stroke-width="1"/>
    <line x1="85" y1="77" x2="85" y2="87" stroke="#7a5a20" stroke-width="1"/>
    <line x1="100" y1="77" x2="100" y2="87" stroke="#7a5a20" stroke-width="1"/>
    <line x1="115" y1="77" x2="115" y2="87" stroke="#7a5a20" stroke-width="1"/>

    <!-- 萤火虫纱袋（挂在上方发光） -->
    <g transform="translate(70, -10)">
      <!-- 光晕 -->
      <circle cx="0" cy="0" r="45" fill="#f4e860" opacity="0.15"/>
      <circle cx="0" cy="0" r="30" fill="#f4e860" opacity="0.25"/>
      <!-- 纱袋 -->
      <ellipse cx="0" cy="5" rx="22" ry="28" fill="#f4e860" opacity="0.5" stroke="#d4c040" stroke-width="2"/>
      <ellipse cx="0" cy="5" rx="22" ry="28" fill="none" stroke="#8a7a20" stroke-width="1.5" stroke-dasharray="2,2"/>
      <!-- 袋口绳子 -->
      <path d="M-22 -18 Q0 -25 22 -18" fill="none" stroke="#8a6a3a" stroke-width="2"/>
      <line x1="0" y1="-25" x2="0" y2="-50" stroke="#8a6a3a" stroke-width="2"/>
      <!-- 袋内萤火虫光点 -->
      <circle cx="-8" cy="0" r="3" fill="#f4e860"/>
      <circle cx="6" cy="-3" r="3" fill="#f4e860"/>
      <circle cx="0" cy="10" r="3" fill="#f4e860"/>
      <circle cx="-5" cy="15" r="2.5" fill="#f4e860"/>
      <circle cx="8" cy="8" r="2.5" fill="#f4e860"/>
      <circle cx="-10" cy="12" r="2" fill="#f4e860"/>
      <circle cx="3" cy="18" r="2" fill="#f4e860"/>
    </g>
    <text x="70" y="-75" text-anchor="middle" font-family="serif" font-size="13" fill="#f4e860">囊（纱袋）</text>
    <path d="M70 -68 L70 -55" stroke="#f4e860" stroke-width="1.5"/>
  </g>

  <!-- 标注 -->
  <text x="400" y="540" text-anchor="middle" font-family="serif" font-size="15" fill="#a0c0a0">借萤火之光，读圣贤之书</text>
</svg>
