<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一个人在窗前静听夜色的散文插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 夜色背景 -->
  <rect x="0" y="0" width="800" height="600" fill="#2a3a5a" opacity="0.12"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#4a5a6a">夜的冥想</text>
  <line x1="354" y1="60" x2="446" y2="60" stroke="#e8a838" stroke-width="2"/>

  <!-- 窗外夜空 -->
  <rect x="60" y="90" width="680" height="340" fill="#1a2a4a" opacity="0.5"/>
  <!-- 月亮 -->
  <circle cx="640" cy="150" r="34" fill="#fef8e0" opacity="0.85"/>
  <circle cx="650" cy="142" r="6" fill="#e8d8a0" opacity="0.4"/>
  <circle cx="630" cy="158" r="4" fill="#e8d8a0" opacity="0.4"/>
  <!-- 星星 -->
  <g fill="#fef8e0" opacity="0.8">
    <circle cx="140" cy="120" r="1.5"/>
    <circle cx="240" cy="100" r="2"/>
    <circle cx="360" cy="130" r="1.5"/>
    <circle cx="480" cy="110" r="1.5"/>
    <circle cx="560" cy="180" r="2"/>
    <circle cx="100" cy="180" r="1.5"/>
    <circle cx="300" cy="200" r="1.5"/>
    <circle cx="200" cy="160" r="2"/>
  </g>

  <!-- 窗外远山剪影 -->
  <path d="M60 380 L200 320 L340 360 L480 310 L620 350 L740 320 L740 430 L60 430 Z" fill="#2d4a3a" opacity="0.6"/>

  <!-- 窗框（大窗） -->
  <rect x="90" y="110" width="620" height="320" fill="none" stroke="#8a6a3a" stroke-width="4"/>
  <line x1="400" y1="110" x2="400" y2="430" stroke="#8a6a3a" stroke-width="3"/>
  <line x1="90" y1="270" x2="710" y2="270" stroke="#8a6a3a" stroke-width="3"/>

  <!-- 屋内墙壁 -->
  <rect x="0" y="430" width="800" height="170" fill="#e8d4b0"/>
  <rect x="0" y="430" width="800" height="170" fill="#4a5a6a" opacity="0.08"/>

  <!-- 坐在窗前的人（背影） -->
  <g transform="translate(400 460)">
    <!-- 椅子 -->
    <rect x="-35" y="20" width="70" height="10" fill="#8a6a3a"/>
    <rect x="-35" y="-30" width="10" height="60" fill="#8a6a3a"/>
    <rect x="25" y="-30" width="10" height="60" fill="#8a6a3a"/>
    <rect x="-35" y="30" width="8" height="40" fill="#6a5a3a"/>
    <rect x="27" y="30" width="8" height="40" fill="#6a5a3a"/>
    <!-- 人（背影） -->
    <path d="M-22 20 Q-26 -10 -18 -25 Q0 -32 18 -25 Q26 -10 22 20 Z" fill="#4a5a6a"/>
    <circle cx="0" cy="-40" r="16" fill="#3a4a5a"/>
    <!-- 头发 -->
    <path d="M-16 -44 Q0 -58 16 -44 L16 -38 Q0 -34 -16 -38 Z" fill="#2a3a4a"/>
  </g>

  <!-- 声音的具象化（从窗外飘进来的音符/波纹） -->
  <!-- 虫鸣（窗外草丛） -->
  <g transform="translate(180 350)" opacity="0.7">
    <path d="M0 0 Q4 -6 8 0 Q12 -6 16 0" fill="none" stroke="#7aaa5a" stroke-width="1.5"/>
    <path d="M0 6 Q4 0 8 6 Q12 0 16 6" fill="none" stroke="#7aaa5a" stroke-width="1.2"/>
    <ellipse cx="8" cy="3" rx="3" ry="2" fill="#2d6a4f" opacity="0.5"/>
  </g>
  <!-- 钟声（屋里） -->
  <g transform="translate(120 470)" opacity="0.7">
    <rect x="0" y="0" width="30" height="40" fill="#8a6a3a" rx="4" stroke="#5a4a2a" stroke-width="1.5"/>
    <circle cx="15" cy="20" r="8" fill="none" stroke="#5a4a2a" stroke-width="1"/>
    <line x1="15" y1="12" x2="15" y2="20" stroke="#5a4a2a" stroke-width="1.5"/>
    <line x1="15" y1="20" x2="20" y2="22" stroke="#5a4a2a" stroke-width="1"/>
    <!-- 声波 -->
    <path d="M35 20 Q42 15 45 20" fill="none" stroke="#e8a838" stroke-width="1.2" opacity="0.6"/>
    <path d="M35 25 Q44 20 47 25" fill="none" stroke="#e8a838" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- 飘进窗的声音波纹 -->
  <g fill="none" stroke="#e8a838" stroke-width="1.5" opacity="0.5">
    <path d="M560 280 Q500 320 440 360"/>
    <path d="M580 300 Q520 340 460 380"/>
  </g>

  <!-- 月光柱 -->
  <path d="M600 184 L500 460 L680 460 Z" fill="#fef8e0" opacity="0.18"/>

  <!-- 气味示意（花香曲线） -->
  <g fill="none" stroke="#e07856" stroke-width="1.2" opacity="0.5">
    <path d="M260 300 Q255 280 260 260 Q265 240 260 220"/>
    <path d="M280 300 Q285 280 280 260 Q275 240 280 220"/>
  </g>
  <g fill="#e07856" opacity="0.5">
    <circle cx="260" cy="220" r="2"/>
    <circle cx="280" cy="220" r="2"/>
  </g>

  <!-- 标注 -->
  <line x1="180" y1="350" x2="120" y2="320" stroke="#2d6a4f" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="40" y="302" width="100" height="26" fill="#fff6df" stroke="#2d6a4f" rx="4"/>
  <text x="90" y="320" text-anchor="middle" font-family="serif" font-size="13" fill="#2d6a4f">虫鸣唧唧</text>

  <line x1="135" y1="470" x2="180" y2="500" stroke="#8a5a14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="180" y="494" width="100" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="230" y="512" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a14">钟声嘀嗒</text>

  <line x1="270" y1="260" x2="330" y2="230" stroke="#8a5a14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="310" y="210" width="110" height="26" fill="#fff6df" stroke="#e07856" rx="4"/>
  <text x="365" y="228" text-anchor="middle" font-family="serif" font-size="13" fill="#e07856">夜的清香</text>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="15" fill="#4a5a6a">世界安静下来，耳朵和心才真正醒过来</text>
</svg>
