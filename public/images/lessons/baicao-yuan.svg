<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="百草园里捉蟋蟀和摘覆盆子插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">从百草园到三味书屋</text>
  <line x1="250" y1="56" x2="550" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——鲁迅童年的乐园与书塾</text>

  <!-- 左半：百草园 -->
  <rect x="0" y="90" width="390" height="510" fill="#e8f0d8"/>
  <text x="195" y="115" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#4a6a2f">百草园</text>

  <!-- 皂荚树 -->
  <rect x="100" y="280" width="16" height="120" fill="#8d5a36"/>
  <ellipse cx="108" cy="250" rx="50" ry="55" fill="#4a6a2f"/>
  <ellipse cx="90" cy="230" rx="30" ry="35" fill="#6a8d3f"/>
  <ellipse cx="130" cy="240" rx="35" ry="40" fill="#6a8d3f"/>
  <text x="108" y="420" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">皂荚树</text>

  <!-- 石井栏 -->
  <ellipse cx="250" cy="370" rx="35" ry="12" fill="#a8a090" stroke="#7a3b14" stroke-width="2"/>
  <ellipse cx="250" cy="368" rx="28" ry="8" fill="#7ab8d8" opacity="0.5"/>
  <text x="250" y="395" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">石井栏</text>

  <!-- 菜畦 -->
  <rect x="20" y="430" width="100" height="30" rx="3" fill="#6a8d3f" opacity="0.5" stroke="#4a6a2f" stroke-width="1"/>
  <rect x="130" y="430" width="100" height="30" rx="3" fill="#6a8d3f" opacity="0.5" stroke="#4a6a2f" stroke-width="1"/>
  <rect x="240" y="430" width="100" height="30" rx="3" fill="#6a8d3f" opacity="0.5" stroke="#4a6a2f" stroke-width="1"/>
  <text x="180" y="475" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">碧绿的菜畦</text>

  <!-- 覆盆子（红色小果） -->
  <g transform="translate(300, 340)">
    <path d="M0 30 Q-5 15 0 0" fill="none" stroke="#4a6a2f" stroke-width="2"/>
    <ellipse cx="-5" cy="10" rx="6" ry="4" fill="#6a8d3f"/>
    <circle cx="0" cy="-5" r="6" fill="#c84a3a"/>
    <circle cx="-3" cy="-8" r="3" fill="#e07856"/>
    <circle cx="3" cy="-3" r="3" fill="#e07856"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">覆盆子</text>
  </g>

  <!-- 蟋蟀 -->
  <g transform="translate(200, 500)">
    <ellipse cx="0" cy="0" rx="12" ry="6" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <circle cx="-10" cy="-3" r="6" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <path d="M-12 -8 Q-15 -15 -18 -12" fill="none" stroke="#4a6a2f" stroke-width="1.5"/>
    <path d="M-8 -8 Q-5 -15 -2 -12" fill="none" stroke="#4a6a2f" stroke-width="1.5"/>
    <line x1="8" y1="3" x2="15" y2="8" stroke="#4a6a2f" stroke-width="2"/>
    <line x1="5" y1="5" x2="10" y2="12" stroke="#4a6a2f" stroke-width="2"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">蟋蟀</text>
  </g>

  <!-- 小鲁迅（蹲着观察） -->
  <g transform="translate(80, 490)">
    <circle cx="0" cy="-30" r="12" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-8 -38 Q0 -45 8 -38" fill="#7a3b14"/>
    <circle cx="-4" cy="-30" r="2" fill="#7a3b14"/>
    <circle cx="4" cy="-30" r="2" fill="#7a3b14"/>
    <path d="M-3 -24 Q0 -22 3 -24" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="0" cy="-5" rx="15" ry="20" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-10 15 Q-15 25 -12 35" fill="none" stroke="#c8843a" stroke-width="5" stroke-linecap="round"/>
    <path d="M10 15 Q15 25 12 35" fill="none" stroke="#c8843a" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- 右半：三味书屋 -->
  <rect x="410" y="90" width="390" height="510" fill="#f0e0c8"/>
  <text x="605" y="115" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#8d5a36">三味书屋</text>

  <!-- 屋顶 -->
  <path d="M430 180 L605 130 L780 180 L780 195 L430 195 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="2"/>
  <!-- 墙 -->
  <rect x="440" y="195" width="330" height="280" fill="#e8d8c0" stroke="#7a3b14" stroke-width="2"/>
  <!-- 门 -->
  <rect x="570" y="280" width="70" height="195" fill="#8d5a36" stroke="#7a3b14" stroke-width="2"/>
  <line x1="605" y1="280" x2="605" y2="475" stroke="#7a3b14" stroke-width="1.5"/>
  <circle cx="595" cy="380" r="2" fill="#c8843a"/>
  <circle cx="615" cy="380" r="2" fill="#c8843a"/>

  <!-- 窗 -->
  <rect x="460" y="220" width="80" height="60" fill="#a8d0e8" stroke="#7a3b14" stroke-width="2"/>
  <line x1="500" y1="220" x2="500" y2="280" stroke="#7a3b14" stroke-width="1.5"/>
  <line x1="460" y1="250" x2="540" y2="250" stroke="#7a3b14" stroke-width="1.5"/>
  <rect x="670" y="220" width="80" height="60" fill="#a8d0e8" stroke="#7a3b14" stroke-width="2"/>
  <line x1="710" y1="220" x2="710" y2="280" stroke="#7a3b14" stroke-width="1.5"/>
  <line x1="670" y1="250" x2="750" y2="250" stroke="#7a3b14" stroke-width="1.5"/>

  <!-- 匾额 -->
  <rect x="540" y="200" width="130" height="25" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
  <text x="605" y="218" text-anchor="middle" font-family="serif" font-size="13" fill="#fef9ed">三味书屋</text>

  <!-- 先生桌子和书 -->
  <rect x="480" y="490" width="80" height="50" fill="#8d5a36" stroke="#7a3b14" stroke-width="2"/>
  <rect x="495" y="475" width="50" height="20" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
  <line x1="500" y1="482" x2="540" y2="482" stroke="#7a3b14" stroke-width="0.5"/>
  <line x1="500" y1="488" x2="540" y2="488" stroke="#7a3b14" stroke-width="0.5"/>
  <!-- 笔墨 -->
  <rect x="545" y="480" width="8" height="15" fill="#7a3b14"/>
  <ellipse cx="549" cy="478" rx="5" ry="3" fill="#7a3b14"/>

  <!-- 先生（摇头念书） -->
  <g transform="translate(520, 440)">
    <circle cx="0" cy="0" r="15" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-12 -10 Q0 -18 12 -10" fill="#7a3b14"/>
    <path d="M-10 -5 Q0 -12 10 -5" fill="#7a3b14" opacity="0.5"/>
    <line x1="-5" cy="-2" x2="-3" y2="-2" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="3" y1="-2" x2="5" y2="-2" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-3 5 Q0 8 3 5" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="0" cy="25" rx="18" ry="22" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="25" y="-5" font-family="serif" font-size="11" fill="#7a3b14">仁远乎哉…</text>
  </g>

  <!-- 小鲁迅（偷偷画画） -->
  <g transform="translate(700, 490)">
    <circle cx="0" cy="-30" r="12" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-8 -38 Q0 -45 8 -38" fill="#7a3b14"/>
    <circle cx="-4" cy="-30" r="2" fill="#7a3b14"/>
    <circle cx="4" cy="-30" r="2" fill="#7a3b14"/>
    <ellipse cx="0" cy="-5" rx="15" ry="20" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 偷偷画画的手 -->
    <path d="M10 5 Q20 10 25 5" fill="none" stroke="#c8843a" stroke-width="4" stroke-linecap="round"/>
    <rect x="22" y="0" width="15" height="10" fill="#fef9ed" stroke="#7a3b14" stroke-width="1"/>
    <text x="30" y="-15" font-family="serif" font-size="10" fill="#7a3b14">偷偷画画</text>
  </g>

  <!-- 箭头 -->
  <path d="M395 350 L415 350" stroke="#c8843a" stroke-width="4" fill="none"/>
  <path d="M415 350 L408 343 L408 357 Z" fill="#c8843a"/>
</svg>
