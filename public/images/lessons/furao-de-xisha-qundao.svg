<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="西沙群岛海水珊瑚海鸟插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">富饶的西沙群岛</text>
  <line x1="280" y1="58" x2="520" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 上层：海面（五光十色） -->
  <text x="400" y="84" text-anchor="middle" font-family="serif" font-size="14" fill="#3a6a9a">海面 · 五光十色</text>
  <rect x="0" y="90" width="800" height="120" fill="#3a6aba"/>
  <!-- 不同色块 -->
  <rect x="0" y="90" width="160" height="120" fill="#2a5a9a"/>
  <rect x="160" y="90" width="160" height="120" fill="#4a8aca"/>
  <rect x="320" y="90" width="160" height="120" fill="#5acaba"/>
  <rect x="480" y="90" width="160" height="120" fill="#8adada"/>
  <rect x="640" y="90" width="160" height="120" fill="#e8c878"/>
  <!-- 波浪线 -->
  <g stroke="#fff6df" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M0 130 Q40 120 80 130 Q120 140 160 130"/>
    <path d="M200 150 Q240 140 280 150 Q320 160 360 150"/>
    <path d="M440 135 Q480 125 520 135 Q560 145 600 135"/>
    <path d="M640 145 Q680 135 720 145 Q760 155 800 145"/>
  </g>

  <!-- 中层：海底 -->
  <text x="400" y="232" text-anchor="middle" font-family="serif" font-size="14" fill="#3a6a9a">海底 · 珊瑚与鱼群</text>
  <rect x="0" y="238" width="800" height="200" fill="#4a9aba"/>
  <!-- 沙底 -->
  <path d="M0 420 Q200 405 400 415 Q600 425 800 410 L800 438 L0 438 Z" fill="#e8d8a8"/>
  <!-- 珊瑚（鹿角状） -->
  <g transform="translate(120,400)">
    <path d="M0 0 L0 -30 M0 -15 L-12 -25 M0 -15 L12 -25 M-12 -25 L-18 -35 M12 -25 L18 -35 M0 -30 L-8 -40 M0 -30 L8 -40" fill="none" stroke="#d4648a" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- 珊瑚（菊花状） -->
  <g transform="translate(250,410)">
    <circle cx="0" cy="-10" r="18" fill="#e8783a" opacity="0.8"/>
    <circle cx="-8" cy="-18" r="8" fill="#e8783a"/>
    <circle cx="8" cy="-18" r="8" fill="#e8783a"/>
    <circle cx="0" cy="-25" r="7" fill="#e8783a"/>
    <circle cx="0" cy="-10" r="6" fill="#d4583a"/>
  </g>
  <!-- 珊瑚（紫色） -->
  <g transform="translate(600,405)">
    <path d="M0 0 L-5 -20 L-10 -30 M0 0 L0 -25 L-3 -35 M0 0 L5 -20 L10 -30 M0 0 L8 -22 L12 -32" fill="none" stroke="#8a4a9a" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- 海参 -->
  <g transform="translate(420,425)">
    <ellipse cx="0" cy="0" rx="22" ry="7" fill="#8d6a4a"/>
    <g stroke="#6a4a2a" stroke-width="1" fill="none">
      <line x1="-15" y1="-4" x2="-15" y2="-7"/><line x1="-8" y1="-5" x2="-8" y2="-8"/>
      <line x1="0" y1="-5" x2="0" y2="-8"/><line x1="8" y1="-5" x2="8" y2="-8"/><line x1="15" y1="-4" x2="15" y2="-7"/>
    </g>
  </g>
  <!-- 鱼群 -->
  <g transform="translate(350,300)">
    <ellipse cx="0" cy="0" rx="12" ry="6" fill="#e8a838"/>
    <path d="M-12 0 L-20 -4 L-20 4 Z" fill="#e8a838"/>
    <circle cx="7" cy="-1" r="1.5" fill="#3d2817"/>
    <path d="M-2 -4 L2 -4 M-2 4 L2 4" stroke="#c8843a" stroke-width="1"/>
  </g>
  <g transform="translate(400,320)">
    <ellipse cx="0" cy="0" rx="10" ry="5" fill="#3a8aba"/>
    <path d="M-10 0 L-17 -3 L-17 3 Z" fill="#3a8aba"/>
    <circle cx="6" cy="-1" r="1.2" fill="#3d2817"/>
  </g>
  <g transform="translate(500,290)">
    <ellipse cx="0" cy="0" rx="11" ry="5" fill="#d4648a"/>
    <path d="M-11 0 L-18 -3 L-18 3 Z" fill="#d4648a"/>
    <circle cx="6" cy="-1" r="1.2" fill="#3d2817"/>
  </g>
  <g transform="translate(530,330)">
    <ellipse cx="0" cy="0" rx="9" ry="4" fill="#5a8a3a"/>
    <path d="M-9 0 L-15 -3 L-15 3 Z" fill="#5a8a3a"/>
  </g>
  <!-- 海龟 -->
  <g transform="translate(700,340)">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#5a8a4a"/>
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="#7aa86a"/>
    <path d="M-14 0 L-14 -3 M-7 -5 L-7 -8 M0 -6 L0 -9 M7 -5 L7 -8 M14 0 L14 -3" stroke="#3a6a2a" stroke-width="1"/>
    <ellipse cx="18" cy="-2" rx="6" ry="4" fill="#5a8a4a"/>
    <circle cx="21" cy="-3" r="1" fill="#3d2817"/>
    <path d="M-15 5 L-20 10 M15 5 L20 10" stroke="#5a8a4a" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- 下层：海岛与海鸟 -->
  <text x="400" y="460" text-anchor="middle" font-family="serif" font-size="14" fill="#5a8a3a">海岛 · 树林与海鸟</text>
  <rect x="0" y="466" width="800" height="80" fill="#a8d8e8"/>
  <!-- 岛屿 -->
  <ellipse cx="400" cy="540" rx="200" ry="30" fill="#e8d8a8"/>
  <!-- 树 -->
  <g transform="translate(320,500)">
    <rect x="-3" y="0" width="6" height="25" fill="#8d5a36"/>
    <ellipse cx="0" cy="-5" rx="20" ry="15" fill="#3a8a4a"/>
    <ellipse cx="-10" cy="0" rx="12" ry="9" fill="#5a9a4a"/>
    <ellipse cx="10" cy="0" rx="12" ry="9" fill="#5a9a4a"/>
  </g>
  <g transform="translate(480,505)">
    <rect x="-3" y="0" width="6" height="22" fill="#8d5a36"/>
    <ellipse cx="0" cy="-5" rx="18" ry="13" fill="#3a8a4a"/>
    <ellipse cx="-8" cy="0" rx="10" ry="8" fill="#5a9a4a"/>
    <ellipse cx="8" cy="0" rx="10" ry="8" fill="#5a9a4a"/>
  </g>
  <!-- 海鸟 -->
  <g fill="#7a3b14" transform="translate(380,475)">
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="#fff6df" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="7" cy="-2" r="3" fill="#fff6df" stroke="#7a3b14" stroke-width="1"/>
    <path d="M10 -2 L14 -1 L10 0" fill="#e8a838"/>
    <path d="M-3 -2 L-10 -6 M-3 2 L-10 6" stroke="#fff6df" stroke-width="2"/>
  </g>
  <g fill="#7a3b14" transform="translate(430,485)">
    <ellipse cx="0" cy="0" rx="7" ry="4" fill="#fff6df" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="6" cy="-2" r="2.5" fill="#fff6df" stroke="#7a3b14" stroke-width="1"/>
    <path d="M-2 -1 L-8 -4 M-2 1 L-8 4" stroke="#fff6df" stroke-width="1.5"/>
  </g>
  <!-- 飞翔的海鸟 -->
  <g fill="#7a3b14">
    <path d="M180 490 Q188 484 196 490 Q188 494 180 490 Z"/>
    <path d="M580 480 Q588 474 596 480 Q588 484 580 480 Z"/>
    <path d="M640 495 Q648 489 656 495 Q648 499 640 495 Z"/>
  </g>

  <!-- 标注：五光十色海水 -->
  <line x1="240" y1="150" x2="240" y2="180" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="160" y="182" width="160" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="240" y="201" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">五光十色海水</text>

  <!-- 标注：珊瑚 -->
  <line x1="120" y1="380" x2="80" y2="350" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="10" y="330" width="80" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="50" y="349" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">珊瑚</text>

  <!-- 标注：海鸟 -->
  <line x1="380" y1="475" x2="380" y2="445" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="335" y="425" width="90" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="380" y="444" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">海鸟</text>

  <!-- 底部说明 -->
  <rect x="40" y="556" width="720" height="36" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="579" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">西沙群岛海水五光十色，海底有珊瑚和鱼群，岛上有树林和海鸟，风景优美、物产丰富。</text>
</svg>
