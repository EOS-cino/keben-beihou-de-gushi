<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="故里老宅与院落插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">故里</text>
  <line x1="340" y1="62" x2="460" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 远山 -->
  <path d="M0 280 L150 220 L300 260 L500 210 L700 250 L800 230 L800 320 L0 320 Z" fill="#8d5a36" opacity="0.2"/>

  <!-- 院墙 -->
  <rect x="80" y="300" width="640" height="180" fill="#e8d5b0" stroke="#7a3b14" stroke-width="2"/>
  <!-- 墙面斑驳 -->
  <rect x="80" y="300" width="640" height="180" fill="#c8843a" opacity="0.08"/>
  <rect x="200" y="330" width="60" height="40" fill="#c8843a" opacity="0.12"/>
  <rect x="500" y="380" width="80" height="50" fill="#c8843a" opacity="0.1"/>

  <!-- 瓦顶院墙 -->
  <path d="M70 300 L100 280 L700 280 L730 300 Z" fill="#5a3a1a"/>
  <line x1="120" y1="280" x2="120" y2="300" stroke="#3a2a1a" stroke-width="1"/>
  <line x1="200" y1="280" x2="200" y2="300" stroke="#3a2a1a" stroke-width="1"/>
  <line x1="400" y1="280" x2="400" y2="300" stroke="#3a2a1a" stroke-width="1"/>
  <line x1="600" y1="280" x2="600" y2="300" stroke="#3a2a1a" stroke-width="1"/>
  <line x1="680" y1="280" x2="680" y2="300" stroke="#3a2a1a" stroke-width="1"/>

  <!-- 木门 -->
  <rect x="350" y="340" width="100" height="140" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
  <line x1="400" y1="340" x2="400" y2="480" stroke="#5a3a1a" stroke-width="2"/>
  <!-- 门环 -->
  <circle cx="385" cy="410" r="6" fill="none" stroke="#c8843a" stroke-width="2"/>
  <circle cx="415" cy="410" r="6" fill="none" stroke="#c8843a" stroke-width="2"/>
  <!-- 门框刻痕 -->
  <line x1="345" y1="400" x2="355" y2="400" stroke="#7a3b14" stroke-width="2"/>
  <line x1="345" y1="420" x2="355" y2="420" stroke="#7a3b14" stroke-width="2"/>
  <line x1="345" y1="440" x2="355" y2="440" stroke="#7a3b14" stroke-width="2"/>

  <!-- 桂花树 -->
  <rect x="180" y="380" width="14" height="100" fill="#5a3a1a"/>
  <circle cx="187" cy="360" r="45" fill="#6a8d3f"/>
  <circle cx="160" cy="375" r="30" fill="#4a6a2f"/>
  <circle cx="215" cy="375" r="32" fill="#6a8d3f"/>
  <!-- 桂花点 -->
  <circle cx="175" cy="350" r="3" fill="#e07856"/>
  <circle cx="200" cy="345" r="3" fill="#e07856"/>
  <circle cx="190" cy="370" r="3" fill="#e07856"/>
  <circle cx="210" cy="360" r="3" fill="#e07856"/>
  <circle cx="165" cy="365" r="3" fill="#e07856"/>

  <!-- 井台 -->
  <ellipse cx="600" cy="450" rx="40" ry="12" fill="#8a8a8a" opacity="0.3"/>
  <rect x="565" y="420" width="70" height="35" rx="4" fill="#a0a0a0" stroke="#6a6a6a" stroke-width="2"/>
  <ellipse cx="600" cy="420" rx="35" ry="10" fill="#3a4a5a"/>
  <ellipse cx="600" cy="418" rx="30" ry="7" fill="#1a2a3a"/>

  <!-- 青石板路 -->
  <path d="M400 480 L380 540 L420 540 Z" fill="#b0a890" opacity="0.6"/>

  <!-- 燕子 -->
  <path d="M520 150 Q530 145 540 150 Q535 155 530 153 Q525 155 520 150" fill="#5a3a1a"/>
  <path d="M560 130 Q570 125 580 130 Q575 135 570 133 Q565 135 560 130" fill="#5a3a1a"/>

  <!-- 标注：老门 -->
  <line x1="400" y1="340" x2="400" y2="300" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="355" y="275" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="293" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">斑驳老门</text>

  <!-- 标注：桂花树 -->
  <line x1="187" y1="360" x2="120" y2="320" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="60" y="300" width="100" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="110" y="318" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">桂花树</text>

  <!-- 底部说明 -->
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">推开斑驳的老门，院子里的一草一木都在替你记着童年</text>
</svg>
