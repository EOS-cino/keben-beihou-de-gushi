<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="巨人的花园里春天和孩子们玩耍的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">巨人的花园</text>
  <line x1="330" y1="60" x2="470" y2="60" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="70" width="800" height="250" fill="#e8f0e6"/>
  <!-- 太阳 -->
  <circle cx="680" cy="130" r="34" fill="#e8a838" opacity="0.7"/>
  <circle cx="680" cy="130" r="22" fill="#e8a838"/>

  <!-- 左半边：春天（有孩子） -->
  <!-- 草地 -->
  <path d="M0 320 Q200 300 400 320 L400 600 L0 600 Z" fill="#6a8d3f" opacity="0.5"/>
  <!-- 树（开花） -->
  <g>
    <rect x="80" y="340" width="14" height="80" fill="#5a3a1a"/>
    <circle cx="87" cy="320" r="40" fill="#2d6a4f"/>
    <circle cx="70" cy="310" r="22" fill="#3a7a5f"/>
    <circle cx="100" cy="315" r="20" fill="#3a7a5f"/>
    <!-- 花朵 -->
    <circle cx="75" cy="300" r="6" fill="#e07856"/>
    <circle cx="95" cy="295" r="5" fill="#e07856"/>
    <circle cx="87" cy="285" r="5" fill="#e0584a"/>
    <circle cx="105" cy="330" r="5" fill="#e07856"/>
    <circle cx="65" cy="325" r="4" fill="#e0584a"/>
  </g>
  <!-- 花 -->
  <g>
    <circle cx="50" cy="450" r="6" fill="#e8a838"/><circle cx="50" cy="450" r="2.5" fill="#fff6df"/>
    <circle cx="150" cy="470" r="6" fill="#e07856"/><circle cx="150" cy="470" r="2.5" fill="#fff6df"/>
    <circle cx="220" cy="440" r="6" fill="#4a90b8"/><circle cx="220" cy="440" r="2.5" fill="#fff6df"/>
    <circle cx="300" cy="460" r="6" fill="#e07856"/><circle cx="300" cy="460" r="2.5" fill="#fff6df"/>
  </g>

  <!-- 孩子1（在树上） -->
  <g>
    <circle cx="180" cy="330" r="14" fill="#e8c9a0" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M168 327 q12 -10 24 0" fill="#3a2a1a"/>
    <circle cx="175" cy="330" r="2" fill="#3a2a1a"/>
    <circle cx="185" cy="330" r="2" fill="#3a2a1a"/>
    <path d="M175 338 q5 3 10 0" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
    <rect x="172" y="344" width="16" height="20" rx="3" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <!-- 孩子2（在草地上） -->
  <g>
    <circle cx="280" cy="440" r="14" fill="#e8c9a0" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M268 437 q12 -10 24 0" fill="#5a3a1a"/>
    <circle cx="275" cy="440" r="2" fill="#3a2a1a"/>
    <circle cx="285" cy="440" r="2" fill="#3a2a1a"/>
    <path d="M275 448 q5 3 10 0" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
    <rect x="272" y="454" width="16" height="22" rx="3" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="272" y="476" width="7" height="18" fill="#4a90b8"/>
    <rect x="281" y="476" width="7" height="18" fill="#4a90b8"/>
  </g>

  <!-- 中间高墙（被推倒一半） -->
  <g>
    <rect x="380" y="200" width="40" height="400" fill="#8d6a4a" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 砖纹 -->
    <line x1="380" y1="260" x2="420" y2="260" stroke="#5a3a1a" stroke-width="1"/>
    <line x1="380" y1="320" x2="420" y2="320" stroke="#5a3a1a" stroke-width="1"/>
    <line x1="380" y1="380" x2="420" y2="380" stroke="#5a3a1a" stroke-width="1"/>
    <line x1="380" y1="440" x2="420" y2="440" stroke="#5a3a1a" stroke-width="1"/>
    <!-- 推倒的砖块 -->
    <rect x="420" y="480" width="30" height="20" fill="#8d6a4a" stroke="#5a3a1a" stroke-width="1.5" transform="rotate(20 435 490)"/>
    <rect x="440" y="500" width="28" height="18" fill="#8d6a4a" stroke="#5a3a1a" stroke-width="1.5" transform="rotate(-15 454 509)"/>
    <!-- 禁止入内牌子（倒下） -->
    <rect x="395" y="540" width="50" height="30" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5" transform="rotate(-25 420 555)"/>
    <text x="420" y="560" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14" transform="rotate(-25 420 555)">禁止入内</text>
  </g>

  <!-- 右半边：冬天（无孩子） -->
  <rect x="420" y="70" width="380" height="250" fill="#d8e0e8"/>
  <!-- 雪地 -->
  <path d="M420 320 Q600 300 800 320 L800 600 L420 600 Z" fill="#e8eef5"/>
  <!-- 枯树 -->
  <g>
    <rect x="560" y="340" width="12" height="80" fill="#5a3a1a"/>
    <path d="M566 340 L540 300 M566 340 L590 310 M566 350 L550 330 M566 350 L585 335" stroke="#5a3a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- 雪在树枝上 -->
    <ellipse cx="540" cy="298" rx="8" ry="4" fill="#ffffff" opacity="0.8"/>
    <ellipse cx="590" cy="308" rx="8" ry="4" fill="#ffffff" opacity="0.8"/>
  </g>
  <!-- 雪花 -->
  <g fill="#ffffff">
    <circle cx="480" cy="150" r="3"/>
    <circle cx="540" cy="200" r="2.5"/>
    <circle cx="620" cy="170" r="3"/>
    <circle cx="700" cy="220" r="2.5"/>
    <circle cx="750" cy="160" r="3"/>
    <circle cx="500" cy="250" r="2"/>
    <circle cx="660" cy="260" r="2.5"/>
  </g>
  <!-- 北风线条 -->
  <path d="M460 120 q30 10 60 0 M580 140 q30 10 60 0 M700 110 q20 8 40 0" stroke="#4a90b8" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- 巨人（站在右边，冷） -->
  <g>
    <!-- 身体（大） -->
    <rect x="680" y="350" width="70" height="120" rx="10" fill="#8d6a4a" stroke="#5a3a1a" stroke-width="2.5"/>
    <!-- 头 -->
    <circle cx="715" cy="320" r="28" fill="#e8c9a0" stroke="#7a3b14" stroke-width="2.5"/>
    <!-- 头发 -->
    <path d="M690 315 q25 -22 50 0" fill="#3a2a1a"/>
    <!-- 眼睛（发愁） -->
    <path d="M703 318 q5 -3 10 0" stroke="#7a3b14" stroke-width="2" fill="none"/>
    <path d="M717 318 q5 -3 10 0" stroke="#7a3b14" stroke-width="2" fill="none"/>
    <!-- 嘴（哆嗦） -->
    <path d="M708 335 q7 2 14 0" stroke="#7a3b14" stroke-width="2" fill="none"/>
    <!-- 围巾 -->
    <rect x="690" y="345" width="50" height="12" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 手臂（抱紧自己） -->
    <path d="M680 380 q-15 20 -5 50" stroke="#8d6a4a" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M750 380 q15 20 5 50" stroke="#8d6a4a" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- 腿 -->
    <rect x="688" y="470" width="24" height="60" fill="#5a3a1a" stroke="#7a3b14" stroke-width="2"/>
    <rect x="720" y="470" width="24" height="60" fill="#5a3a1a" stroke="#7a3b14" stroke-width="2"/>
  </g>

  <!-- 标注 -->
  <rect x="60" y="510" width="100" height="26" fill="#fff6df" stroke="#2d6a4f" rx="4"/>
  <text x="110" y="528" text-anchor="middle" font-family="serif" font-size="14" fill="#2d6a4f" font-weight="bold">分享=春天</text>

  <rect x="640" y="540" width="110" height="26" fill="#fff6df" stroke="#4a90b8" rx="4"/>
  <text x="695" y="558" text-anchor="middle" font-family="serif" font-size="14" fill="#4a90b8" font-weight="bold">自私=冬天</text>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">推倒自私的高墙，春天和笑声就会回到花园里</text>
</svg>
