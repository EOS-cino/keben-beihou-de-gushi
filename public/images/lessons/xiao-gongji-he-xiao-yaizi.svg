<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="小公鸡和小鸭子在一起的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" fill="#2d2a24" font-family="sans-serif" font-weight="bold">小公鸡和小鸭子</text>

  <!-- 天空 -->
  <rect x="0" y="60" width="800" height="240" fill="#d6ecf7"/>
  <!-- 太阳 -->
  <circle cx="680" cy="110" r="28" fill="#f4b942"/>
  <circle cx="680" cy="110" r="36" fill="#f4b942" opacity="0.25"/>
  <!-- 云朵 -->
  <ellipse cx="130" cy="100" rx="40" ry="15" fill="#ffffff" opacity="0.85"/>
  <ellipse cx="160" cy="92" rx="28" ry="11" fill="#ffffff" opacity="0.85"/>

  <!-- 远山 -->
  <path d="M0 300 L120 240 L250 280 L400 220 L550 270 L700 240 L800 260 L800 300 Z" fill="#8aaa8a" opacity="0.5"/>

  <!-- 草地（左岸） -->
  <path d="M0 300 L450 300 L450 380 Q400 385 350 380 L0 380 Z" fill="#7a9a5a"/>
  <path d="M0 300 L450 300 L450 320 L0 320 Z" fill="#6b8a4a"/>

  <!-- 河流 -->
  <path d="M450 300 L800 300 L800 380 L450 380 Z" fill="#7ec0db"/>
  <path d="M470 320 Q550 315 630 320 Q710 325 780 320" fill="none" stroke="#a8d4e8" stroke-width="2"/>
  <path d="M470 345 Q550 340 630 345 Q710 350 780 345" fill="none" stroke="#a8d4e8" stroke-width="2"/>
  <path d="M470 365 Q550 360 630 365 Q710 370 780 365" fill="none" stroke="#a8d4e8" stroke-width="2"/>

  <!-- 地面延伸 -->
  <rect x="0" y="380" width="800" height="220" fill="#7a9a5a"/>
  <rect x="0" y="380" width="800" height="20" fill="#6b8a4a"/>

  <!-- 小草 -->
  <g fill="#4a7a3a">
    <path d="M80 390 L78 378 L82 378 Z M85 390 L83 380 L87 380 Z"/>
    <path d="M200 390 L198 378 L202 378 Z"/>
    <path d="M350 390 L348 378 L352 378 Z"/>
    <path d="M550 390 L548 378 L552 378 Z"/>
    <path d="M700 390 L698 378 L702 378 Z"/>
  </g>

  <!-- 小花 -->
  <g transform="translate(120,385)">
    <circle cx="0" cy="0" r="4" fill="#f4a8c0"/>
    <circle cx="0" cy="0" r="2" fill="#f4b942"/>
  </g>
  <g transform="translate(380,385)">
    <circle cx="0" cy="0" r="4" fill="#e8a0c8"/>
    <circle cx="0" cy="0" r="2" fill="#f4b942"/>
  </g>

  <!-- 小公鸡（在草地上） -->
  <g transform="translate(200,340)">
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="35" ry="28" fill="#e8a040"/>
    <ellipse cx="0" cy="-3" rx="30" ry="23" fill="#f4b942"/>
    <!-- 翅膀 -->
    <path d="M-5 -5 Q5 -15 20 -8 Q15 5 -5 5" fill="#d48820"/>
    <!-- 头 -->
    <circle cx="-25" cy="-15" r="16" fill="#f4b942"/>
    <!-- 鸡冠 -->
    <path d="M-30 -28 Q-28 -35 -25 -30 Q-22 -38 -19 -30 Q-16 -36 -13 -28" fill="#e36f5b"/>
    <!-- 喙 -->
    <path d="M-38 -15 L-45 -12 L-38 -9" fill="#e8a040"/>
    <!-- 眼睛 -->
    <circle cx="-28" cy="-17" r="3" fill="#ffffff"/>
    <circle cx="-28" cy="-17" r="1.5" fill="#1a1a1a"/>
    <!-- 肉垂 -->
    <ellipse cx="-35" cy="-8" rx="3" ry="5" fill="#e36f5b"/>
    <!-- 腿（尖爪） -->
    <path d="M-10 25 L-10 45 M-10 45 L-14 48 M-10 45 L-6 48" stroke="#e8a040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M10 25 L10 45 M10 45 L6 48 M10 45 L14 48" stroke="#e8a040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- 尾巴 -->
    <path d="M30 -10 Q45 -15 50 -5 Q45 5 30 0" fill="#d48820"/>
    <path d="M32 -8 Q42 -12 46 -3" fill="#c47a10"/>
  </g>
  <text x="200" y="410" text-anchor="middle" font-size="12" fill="#8d6a3d" font-family="sans-serif" font-weight="bold">小公鸡</text>
  <!-- 本领标注 -->
  <g transform="translate(200,425)">
    <rect x="-55" y="0" width="110" height="20" rx="10" fill="#fff4e0" stroke="#e8a040" stroke-width="1"/>
    <text x="0" y="14" text-anchor="middle" font-size="10" fill="#8d6a3d" font-family="sans-serif">尖爪刨土找虫子</text>
  </g>

  <!-- 小鸭子（在水里游泳） -->
  <g transform="translate(600,350)">
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="35" ry="22" fill="#ffffff"/>
    <ellipse cx="0" cy="-3" rx="30" ry="18" fill="#f8f8f0"/>
    <!-- 翅膀 -->
    <path d="M-5 -5 Q5 -15 18 -8 Q12 5 -5 3" fill="#e8e8d8"/>
    <!-- 头 -->
    <circle cx="-28" cy="-12" r="14" fill="#ffffff"/>
    <!-- 扁嘴 -->
    <path d="M-40 -12 L-50 -10 L-50 -6 L-40 -8" fill="#e8a040"/>
    <!-- 眼睛 -->
    <circle cx="-30" cy="-14" r="2.5" fill="#ffffff"/>
    <circle cx="-30" cy="-14" r="1.5" fill="#1a1a1a"/>
    <!-- 水面线 -->
    <ellipse cx="0" cy="18" rx="38" ry="6" fill="#a8d4e8" opacity="0.6"/>
    <!-- 水波纹 -->
    <path d="M-40 22 Q-20 20 0 22 Q20 24 40 22" fill="none" stroke="#a8d4e8" stroke-width="1.5"/>
    <path d="M-35 28 Q-15 26 5 28 Q25 30 35 28" fill="none" stroke="#a8d4e8" stroke-width="1" opacity="0.6"/>
    <!-- 尾巴 -->
    <path d="M30 -5 Q40 -8 42 0 Q38 5 30 2" fill="#e8e8d8"/>
    <!-- 脚蹼（在水下隐约可见） -->
    <ellipse cx="-5" cy="20" rx="6" ry="3" fill="#e8a040" opacity="0.5"/>
    <ellipse cx="10" cy="20" rx="6" ry="3" fill="#e8a040" opacity="0.5"/>
  </g>
  <text x="600" y="410" text-anchor="middle" font-size="12" fill="#2d5a8a" font-family="sans-serif" font-weight="bold">小鸭子</text>
  <!-- 本领标注 -->
  <g transform="translate(600,425)">
    <rect x="-55" y="0" width="110" height="20" rx="10" fill="#e8f0ff" stroke="#4a7ab8" stroke-width="1"/>
    <text x="0" y="14" text-anchor="middle" font-size="10" fill="#2d5a8a" font-family="sans-serif">有蹼会游泳捉鱼</text>
  </g>

  <!-- 虫子（小公鸡找到的） -->
  <g transform="translate(280,380)">
    <ellipse cx="0" cy="0" rx="8" ry="3" fill="#d48820"/>
    <ellipse cx="-6" cy="-1" rx="3" ry="2" fill="#c47a10"/>
    <ellipse cx="6" cy="-1" rx="3" ry="2" fill="#c47a10"/>
    <circle cx="-8" cy="-1" r="1" fill="#1a1a1a"/>
  </g>
  <text x="280" y="395" text-anchor="middle" font-size="9" fill="#8d6a3d" font-family="sans-serif">虫子</text>

  <!-- 鱼（小鸭子捉到的） -->
  <g transform="translate(680,360)">
    <ellipse cx="0" cy="0" rx="10" ry="5" fill="#7ec0db"/>
    <ellipse cx="0" cy="-1" rx="8" ry="3.5" fill="#a8d4e8"/>
    <path d="M10 0 L16 -4 L16 4 Z" fill="#7ec0db"/>
    <circle cx="-5" cy="-1" r="1" fill="#1a1a1a"/>
  </g>
  <text x="680" y="378" text-anchor="middle" font-size="9" fill="#2d5a8a" font-family="sans-serif">小鱼</text>

  <!-- 互相帮助的箭头 -->
  <g transform="translate(400,470)">
    <!-- 左箭头：公鸡给鸭子虫子 -->
    <path d="M-100 0 L-30 0" stroke="#e8a040" stroke-width="2.5" fill="none" marker-end="url(#arr6)"/>
    <text x="-65" y="-8" text-anchor="middle" font-size="10" fill="#8d6a3d" font-family="sans-serif">分虫子</text>
    <!-- 右箭头：鸭子给公鸡鱼 -->
    <path d="M30 0 L100 0" stroke="#4a7ab8" stroke-width="2.5" fill="none" marker-end="url(#arr6)"/>
    <text x="65" y="-8" text-anchor="middle" font-size="10" fill="#2d5a8a" font-family="sans-serif">分小鱼</text>
    <!-- 中心爱心 -->
    <path d="M0 5 C-6 -2 -6 -8 0 -8 C6 -8 6 -2 0 5 Z" fill="#e36f5b" opacity="0.7"/>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="530" text-anchor="middle" font-size="14" fill="#2d2a24" font-family="sans-serif" font-weight="bold">各有各的本领，互相帮助才是好朋友</text>

  <!-- 脚部对比特写 -->
  <g transform="translate(150,520)">
    <text x="0" y="-5" text-anchor="middle" font-size="10" fill="#8d6a3d" font-family="sans-serif" font-weight="bold">公鸡的脚（尖爪）</text>
    <path d="M0 0 L0 15 M0 15 L-6 20 M0 15 L0 20 M0 15 L6 20" stroke="#e8a040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="translate(650,520)">
    <text x="0" y="-5" text-anchor="middle" font-size="10" fill="#2d5a8a" font-family="sans-serif" font-weight="bold">鸭子的脚（有蹼）</text>
    <path d="M0 0 L0 15" stroke="#e8a040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M-6 15 L6 15 L6 20 Q3 22 0 20 Q-3 22 -6 20 Z" fill="#e8a040" opacity="0.7"/>
  </g>

  <defs>
    <marker id="arr6" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#8d6a3d"/>
    </marker>
  </defs>
</svg>
