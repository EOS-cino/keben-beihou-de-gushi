<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="风吹白杨树、叶子哗哗响插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">小风和白杨树</text>
  <line x1="290" y1="60" x2="510" y2="60" stroke="#e8a838" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="80" width="800" height="280" fill="#4a90b8" opacity="0.18"/>
  <!-- 云朵 -->
  <g fill="#f8f8f0" opacity="0.8">
    <ellipse cx="140" cy="130" rx="40" ry="16"/>
    <ellipse cx="170" cy="124" rx="28" ry="13"/>
    <ellipse cx="600" cy="120" rx="44" ry="18"/>
    <ellipse cx="630" cy="114" rx="28" ry="13"/>
  </g>
  <!-- 太阳 -->
  <circle cx="680" cy="160" r="28" fill="#e8a838" stroke="#c88820" stroke-width="2"/>

  <!-- 地面/草地 -->
  <rect x="0" y="440" width="800" height="160" fill="#2d6a4f" opacity="0.35"/>
  <path d="M0 445 Q200 440 400 445 T800 445" fill="none" stroke="#2d6a4f" stroke-width="2" opacity="0.5"/>
  <!-- 草 -->
  <g stroke="#2d6a4f" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="80" y1="470" x2="78" y2="455"/>
    <line x1="90" y1="472" x2="92" y2="458"/>
    <line x1="250" y1="468" x2="248" y2="453"/>
    <line x1="260" y1="470" x2="262" y2="456"/>
    <line x1="540" y1="470" x2="538" y2="455"/>
    <line x1="700" y1="472" x2="702" y2="458"/>
  </g>

  <!-- 白杨树1（高大挺拔） -->
  <g transform="translate(220, 440)">
    <rect x="-10" y="-280" width="20" height="280" fill="#6a4220"/>
    <!-- 树冠（椭圆形，高耸） -->
    <ellipse cx="0" cy="-300" rx="55" ry="90" fill="#2d6a4f"/>
    <ellipse cx="-20" cy="-280" rx="30" ry="50" fill="#2d6a4f" opacity="0.85"/>
    <ellipse cx="25" cy="-290" rx="28" ry="48" fill="#2d6a4f" opacity="0.85"/>
    <!-- 叶子细节（翻动的亮点） -->
    <g fill="#e8a838" opacity="0.6">
      <circle cx="-15" cy="-320" r="4"/>
      <circle cx="20" cy="-310" r="4"/>
      <circle cx="-5" cy="-340" r="3.5"/>
      <circle cx="30" cy="-340" r="3.5"/>
      <circle cx="-25" cy="-290" r="3.5"/>
    </g>
  </g>

  <!-- 白杨树2 -->
  <g transform="translate(560, 440)">
    <rect x="-9" y="-260" width="18" height="260" fill="#6a4220"/>
    <ellipse cx="0" cy="-280" rx="50" ry="85" fill="#2d6a4f"/>
    <ellipse cx="-18" cy="-265" rx="28" ry="48" fill="#2d6a4f" opacity="0.85"/>
    <ellipse cx="22" cy="-275" rx="26" ry="45" fill="#2d6a4f" opacity="0.85"/>
    <g fill="#e8a838" opacity="0.6">
      <circle cx="-12" cy="-300" r="4"/>
      <circle cx="18" cy="-295" r="4"/>
      <circle cx="0" cy="-325" r="3.5"/>
      <circle cx="25" cy="-320" r="3.5"/>
    </g>
  </g>

  <!-- 白杨树3（小一些，远处） -->
  <g transform="translate(390, 440)">
    <rect x="-6" y="-200" width="12" height="200" fill="#6a4220"/>
    <ellipse cx="0" cy="-215" rx="38" ry="65" fill="#2d6a4f" opacity="0.8"/>
  </g>

  <!-- 风的线条（从左到右） -->
  <g fill="none" stroke="#4a90b8" stroke-width="3" stroke-linecap="round" opacity="0.55">
    <path d="M60 200 Q200 190 340 200 Q400 205 440 200"/>
    <path d="M80 240 Q220 232 360 242 Q420 246 460 240"/>
    <path d="M100 280 Q240 274 380 282"/>
    <path d="M500 210 Q600 205 720 215"/>
    <path d="M520 250 Q620 245 740 252"/>
  </g>
  <!-- 风的小箭头/卷曲 -->
  <g fill="none" stroke="#4a90b8" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
    <path d="M440 200 Q455 195 450 210"/>
    <path d="M460 240 Q475 235 470 250"/>
  </g>

  <!-- 飘飞的种子（白色绒毛） -->
  <g fill="#f8f8f0" stroke="#c8c8b8" stroke-width="0.8">
    <g transform="translate(300, 350)">
      <circle cx="0" cy="0" r="3"/>
      <line x1="0" y1="0" x2="-6" y2="-8" stroke="#c8c8b8" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="6" y2="-8" stroke="#c8c8b8" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="0" y2="-10" stroke="#c8c8b8" stroke-width="0.8"/>
    </g>
    <g transform="translate(360, 380)">
      <circle cx="0" cy="0" r="3"/>
      <line x1="0" y1="0" x2="-6" y2="-8" stroke="#c8c8b8" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="6" y2="-8" stroke="#c8c8b8" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="0" y2="-10" stroke="#c8c8b8" stroke-width="0.8"/>
    </g>
    <g transform="translate(420, 360)">
      <circle cx="0" cy="0" r="3"/>
      <line x1="0" y1="0" x2="-6" y2="-8" stroke="#c8c8b8" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="6" y2="-8" stroke="#c8c8b8" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="0" y2="-10" stroke="#c8c8b8" stroke-width="0.8"/>
    </g>
  </g>

  <!-- 小风（拟人化，调皮的小精灵） -->
  <g transform="translate(130, 250)">
    <circle cx="0" cy="0" r="26" fill="#4a90b8" opacity="0.4"/>
    <circle cx="0" cy="0" r="18" fill="#a8d8e8" opacity="0.7"/>
    <ellipse cx="-6" cy="-3" rx="2.5" ry="3" fill="#2d6a4f"/>
    <ellipse cx="6" cy="-3" rx="2.5" ry="3" fill="#2d6a4f"/>
    <path d="M-6 6 Q0 10 6 6" fill="none" stroke="#2d6a4f" stroke-width="2" stroke-linecap="round"/>
    <!-- 鼓起的腮帮 -->
    <circle cx="-12" cy="4" r="6" fill="#a8d8e8" opacity="0.6"/>
  </g>

  <!-- 标注 -->
  <line x1="130" y1="278" x2="130" y2="320" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="85" y="325" width="90" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="130" y="343" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">调皮的小风</text>

  <line x1="220" y1="160" x2="220" y2="120" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="170" y="92" width="100" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="220" y="110" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">挺拔的白杨</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">小风一吹，白杨叶哗啦啦响，还帮种子飞向远方</text>
</svg>
