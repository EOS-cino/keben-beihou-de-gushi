<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一双手和一个大脑发光的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">两件宝</text>
  <text x="400" y="74" text-anchor="middle" font-family="serif" font-size="16" fill="#8d5a36">人有两件宝，双手和大脑</text>

  <!-- 左：双手 -->
  <g transform="translate(230,320)">
    <!-- 光环 -->
    <circle r="120" fill="none" stroke="#f4b942" stroke-width="2" opacity="0.3" stroke-dasharray="4,3"/>
    <circle r="100" fill="#fef0d8" opacity="0.5"/>
    <!-- 左手 -->
    <g transform="translate(-35,0)">
      <rect x="-12" y="-50" width="8" height="50" rx="4" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <rect x="-2" y="-55" width="8" height="55" rx="4" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <rect x="8" y="-52" width="8" height="52" rx="4" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <rect x="18" y="-45" width="8" height="45" rx="4" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <!-- 手掌 -->
      <path d="M-18 0 Q-20 25 -5 35 L30 35 Q40 30 38 5 Q35 -5 25 -5 L-12 -5 Z" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <!-- 拇指 -->
      <ellipse cx="-18" cy="10" rx="8" ry="14" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5" transform="rotate(-30 -18 10)"/>
    </g>
    <!-- 右手 -->
    <g transform="translate(35,0)">
      <rect x="4" y="-50" width="8" height="50" rx="4" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <rect x="-6" y="-55" width="8" height="55" rx="4" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <rect x="-16" y="-52" width="8" height="52" rx="4" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <rect x="-26" y="-45" width="8" height="45" rx="4" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <path d="M-30 5 Q-32 30 -17 35 L18 35 Q28 30 26 5 Q23 -5 13 -5 L-24 -5 Z" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5"/>
      <ellipse cx="28" cy="10" rx="8" ry="14" fill="#f4c8a0" stroke="#8d5a36" stroke-width="1.5" transform="rotate(30 28 10)"/>
    </g>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#c8843a">双手</text>
    <text x="0" y="105" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">会做工</text>
  </g>

  <!-- 加号 -->
  <text x="400" y="330" text-anchor="middle" font-family="serif" font-size="48" font-weight="bold" fill="#c8843a">+</text>

  <!-- 右：大脑 -->
  <g transform="translate(570,320)">
    <circle r="120" fill="none" stroke="#7ab8d8" stroke-width="2" opacity="0.3" stroke-dasharray="4,3"/>
    <circle r="100" fill="#a8d0e8" opacity="0.2"/>
    <!-- 大脑形状 -->
    <path d="M-50 -30 Q-60 -50 -35 -55 Q-30 -65 -10 -58 Q0 -65 15 -58 Q35 -65 40 -50 Q55 -45 48 -25 Q55 -5 45 10 Q50 30 30 35 Q20 45 0 40 Q-20 45 -30 35 Q-50 30 -45 10 Q-55 -5 -50 -30 Z" fill="#f4c8a0" stroke="#8d5a36" stroke-width="2"/>
    <!-- 脑回纹路 -->
    <g fill="none" stroke="#8d5a36" stroke-width="1.5" opacity="0.6">
      <path d="M-35 -30 Q-25 -35 -15 -28"/>
      <path d="M-10 -40 Q0 -45 10 -38"/>
      <path d="M15 -30 Q25 -35 35 -25"/>
      <path d="M-30 -10 Q-20 -15 -10 -8"/>
      <path d="M5 -15 Q15 -20 25 -12"/>
      <path d="M-25 10 Q-15 5 -5 12"/>
      <path d="M10 5 Q20 0 30 8"/>
      <path d="M-15 25 Q-5 20 5 27"/>
    </g>
    <!-- 闪电（思考） -->
    <path d="M-5 -65 L5 -50 L-2 -48 L8 -30 L-3 -45 L4 -47 Z" fill="#f4b942" stroke="#c8843a" stroke-width="1"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#4a8ab8">大脑</text>
    <text x="0" y="105" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">会思考</text>
  </g>

  <!-- 底部 -->
  <rect x="150" y="470" width="500" height="90" rx="10" fill="#fef0d8" opacity="0.6"/>
  <text x="400" y="500" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14" font-weight="bold">动手不动脑，事情做不好</text>
  <text x="400" y="528" text-anchor="middle" font-family="serif" font-size="15" fill="#c84a3a" font-weight="bold">动手又动脑，才能有创造</text>
</svg>
