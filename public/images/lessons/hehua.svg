<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="满池荷花盛开、花苞绽放、蜻蜓飞舞的美丽场景插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">荷花</text>
  <line x1="380" y1="58" x2="420" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="72" width="800" height="160" fill="#a8d0e8" opacity="0.2"/>

  <!-- 水池 -->
  <rect x="0" y="232" width="800" height="300" fill="#7ab8d8" opacity="0.2"/>
  <path d="M0 250 Q100 245 200 250 Q300 245 400 250 Q500 245 600 250 Q700 245 800 250" fill="none" stroke="#a8d0e8" stroke-width="1.5" opacity="0.4"/>

  <!-- 荷叶1（大圆盘） -->
  <g transform="translate(200, 340)">
    <ellipse cx="0" cy="0" rx="70" ry="25" fill="#6a8d3f" opacity="0.7" stroke="#4a6a2f" stroke-width="1.5"/>
    <ellipse cx="0" cy="-3" rx="65" ry="22" fill="#6a8d3f" opacity="0.5"/>
    <!-- 叶脉 -->
    <line x1="0" y1="-3" x2="-55" y2="5" stroke="#4a6a2f" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="-3" x2="55" y2="5" stroke="#4a6a2f" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="-3" x2="0" y2="20" stroke="#4a6a2f" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="-3" x2="-35" y2="-15" stroke="#4a6a2f" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="-3" x2="35" y2="-15" stroke="#4a6a2f" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- 荷叶2 -->
  <g transform="translate(550, 360)">
    <ellipse cx="0" cy="0" rx="60" ry="22" fill="#4a6a2f" opacity="0.6" stroke="#4a6a2f" stroke-width="1.5"/>
    <ellipse cx="0" cy="-3" rx="55" ry="19" fill="#6a8d3f" opacity="0.4"/>
  </g>

  <!-- 荷叶3（小） -->
  <g transform="translate(400, 390)">
    <ellipse cx="0" cy="0" rx="45" ry="16" fill="#6a8d3f" opacity="0.5" stroke="#4a6a2f" stroke-width="1"/>
  </g>

  <!-- 荷花1：全开 -->
  <g transform="translate(300, 280)">
    <!-- 花瓣（外层） -->
    <ellipse cx="0" cy="-15" rx="8" ry="20" fill="#fff" stroke="#e07856" stroke-width="1" opacity="0.9"/>
    <ellipse cx="-15" cy="-8" rx="8" ry="18" fill="#fff" stroke="#e07856" stroke-width="1" opacity="0.9" transform="rotate(-30 -15 -8)"/>
    <ellipse cx="15" cy="-8" rx="8" ry="18" fill="#fff" stroke="#e07856" stroke-width="1" opacity="0.9" transform="rotate(30 15 -8)"/>
    <ellipse cx="-18" cy="5" rx="8" ry="16" fill="#fff6df" stroke="#e07856" stroke-width="1" opacity="0.9" transform="rotate(-60 -18 5)"/>
    <ellipse cx="18" cy="5" rx="8" ry="16" fill="#fff6df" stroke="#e07856" stroke-width="1" opacity="0.9" transform="rotate(60 18 5)"/>
    <!-- 花瓣（内层） -->
    <ellipse cx="-6" cy="-8" rx="6" ry="14" fill="#fff" stroke="#e07856" stroke-width="0.5" opacity="0.8" transform="rotate(-15 -6 -8)"/>
    <ellipse cx="6" cy="-8" rx="6" ry="14" fill="#fff" stroke="#e07856" stroke-width="0.5" opacity="0.8" transform="rotate(15 6 -8)"/>
    <!-- 莲蓬 -->
    <ellipse cx="0" cy="-2" rx="8" ry="6" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-3" cy="-3" r="1.5" fill="#4a6a2f"/>
    <circle cx="3" cy="-3" r="1.5" fill="#4a6a2f"/>
    <circle cx="0" cy="0" r="1.5" fill="#4a6a2f"/>
  </g>

  <!-- 荷花2：半开 -->
  <g transform="translate(500, 270)">
    <ellipse cx="0" cy="-10" rx="7" ry="16" fill="#fff" stroke="#e07856" stroke-width="1" opacity="0.9"/>
    <ellipse cx="-10" cy="-5" rx="7" ry="14" fill="#fff" stroke="#e07856" stroke-width="1" opacity="0.9" transform="rotate(-25 -10 -5)"/>
    <ellipse cx="10" cy="-5" rx="7" ry="14" fill="#fff" stroke="#e07856" stroke-width="1" opacity="0.9" transform="rotate(25 10 -5)"/>
    <!-- 花骨朵中心 -->
    <ellipse cx="0" cy="0" rx="6" ry="12" fill="#fff6df" stroke="#e07856" stroke-width="1"/>
  </g>

  <!-- 荷花3：花骨朵 -->
  <g transform="translate(620, 300)">
    <ellipse cx="0" cy="0" rx="10" ry="20" fill="#fff6df" stroke="#e07856" stroke-width="1.5" opacity="0.9"/>
    <path d="M-8 -10 Q0 -18 8 -10" fill="#fff" stroke="#e07856" stroke-width="1" opacity="0.8"/>
    <!-- 茎 -->
    <line x1="0" y1="20" x2="0" y2="60" stroke="#6a8d3f" stroke-width="2"/>
  </g>

  <!-- 蜻蜓 -->
  <g transform="translate(380, 200)">
    <ellipse cx="0" cy="0" rx="10" ry="3" fill="#7ab8d8" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-8" cy="-1" r="3" fill="#7ab8d8" stroke="#7a3b14" stroke-width="1"/>
    <!-- 翅膀 -->
    <ellipse cx="-2" cy="-6" rx="10" ry="3" fill="#fff" opacity="0.6" stroke="#7a3b14" stroke-width="0.5"/>
    <ellipse cx="2" cy="-6" rx="10" ry="3" fill="#fff" opacity="0.6" stroke="#7a3b14" stroke-width="0.5"/>
    <ellipse cx="-2" cy="5" rx="8" ry="2.5" fill="#fff" opacity="0.5" stroke="#7a3b14" stroke-width="0.5"/>
    <ellipse cx="2" cy="5" rx="8" ry="2.5" fill="#fff" opacity="0.5" stroke="#7a3b14" stroke-width="0.5"/>
  </g>

  <!-- 小鱼 -->
  <g transform="translate(150, 450)">
    <ellipse cx="0" cy="0" rx="12" ry="5" fill="#e07856" opacity="0.7" stroke="#7a3b14" stroke-width="1"/>
    <path d="M12 0 L20 -4 L20 4 Z" fill="#e07856" opacity="0.7" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-6" cy="-1" r="1.5" fill="#7a3b14"/>
    <!-- 气泡 -->
    <circle cx="-20" cy="-10" r="3" fill="#fff" opacity="0.5" stroke="#7ab8d8" stroke-width="0.5"/>
    <circle cx="-28" cy="-18" r="2" fill="#fff" opacity="0.4" stroke="#7ab8d8" stroke-width="0.5"/>
  </g>

  <!-- 标注：三种姿态 -->
  <rect x="230" y="240" width="90" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="275" y="257" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">全展开</text>

  <rect x="440" y="230" width="90" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="485" y="247" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">才展开</text>

  <rect x="580" y="265" width="90" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="625" y="282" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">花骨朵</text>

  <!-- 底部说明 -->
  <text x="400" y="540" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">如果把眼前的一池荷花看作一大幅活的画</text>
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">那画家的本领可真了不起——叶圣陶</text>
</svg>
