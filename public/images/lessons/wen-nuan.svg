<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="奶奶给孩子围围巾的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 背景墙 -->
  <rect x="0" y="0" width="800" height="450" fill="#f4e4c4" opacity="0.3"/>
  <!-- 窗户 -->
  <g transform="translate(120 120)">
    <rect x="0" y="0" width="120" height="100" fill="#4a90b8" opacity="0.2" stroke="#8b6f47" stroke-width="4"/>
    <line x1="60" y1="0" x2="60" y2="100" stroke="#8b6f47" stroke-width="3"/>
    <line x1="0" y1="50" x2="120" y2="50" stroke="#8b6f47" stroke-width="3"/>
    <!-- 雪花 -->
    <g fill="#ffffff" opacity="0.8">
      <circle cx="20" cy="20" r="3"/>
      <circle cx="80" cy="35" r="2.5"/>
      <circle cx="40" cy="70" r="3"/>
      <circle cx="95" cy="80" r="2"/>
    </g>
  </g>
  <!-- 挂钟 -->
  <g transform="translate(620 130)">
    <circle cx="0" cy="0" r="35" fill="#fef9ed" stroke="#8b6f47" stroke-width="4"/>
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="15" y2="5" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="#333"/>
    <text x="0" y="-18" text-anchor="middle" font-size="10" fill="#333">12</text>
    <text x="20" y="5" text-anchor="middle" font-size="10" fill="#333">3</text>
  </g>
  <!-- 地面 -->
  <rect x="0" y="450" width="800" height="150" fill="#dceee3" opacity="0.4"/>
  <!-- 奶奶 -->
  <g transform="translate(300 450)">
    <!-- 身体 -->
    <path d="M-40 0 L-50 -120 Q-50 -140 -30 -145 L30 -145 Q50 -140 50 -120 L40 0 Z" fill="#2d6a4f"/>
    <!-- 围裙 -->
    <path d="M-30 -60 L-35 0 L35 0 L30 -60 Z" fill="#e8a838" opacity="0.7"/>
    <!-- 头 -->
    <circle cx="0" cy="-165" r="25" fill="#f4d4a8"/>
    <!-- 头发（白发） -->
    <path d="M-25 -175 Q0 -195 25 -175 L25 -165 Q0 -160 -25 -165 Z" fill="#e0e0e0"/>
    <circle cx="0" cy="-190" r="15" fill="#e0e0e0"/>
    <!-- 眼睛（弯弯笑眼） -->
    <path d="M-10 -168 Q-7 -172 -4 -168" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M4 -168 Q7 -172 10 -168" stroke="#333" stroke-width="2" fill="none"/>
    <!-- 嘴 -->
    <path d="M-5 -158 Q0 -153 5 -158" stroke="#333" stroke-width="1.5" fill="none"/>
    <!-- 手（给孩子围围巾） -->
    <path d="M40 -100 Q70 -80 90 -70" stroke="#f4d4a8" stroke-width="10" stroke-linecap="round"/>
    <path d="M40 -120 Q65 -100 85 -85" stroke="#f4d4a8" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- 孩子 -->
  <g transform="translate(460 450)">
    <!-- 身体 -->
    <path d="M-25 0 L-30 -80 L30 -80 L25 0 Z" fill="#e07856"/>
    <!-- 头 -->
    <circle cx="0" cy="-100" r="20" fill="#f4d4a8"/>
    <!-- 头发 -->
    <path d="M-20 -108 Q0 -125 20 -108 L20 -100 Q0 -95 -20 -100 Z" fill="#333"/>
    <!-- 眼睛 -->
    <path d="M-8 -102 Q-5 -106 -2 -102" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M2 -102 Q5 -106 8 -102" stroke="#333" stroke-width="2" fill="none"/>
    <!-- 嘴（笑） -->
    <path d="M-4 -92 Q0 -87 4 -92" stroke="#333" stroke-width="1.5" fill="none"/>
    <!-- 围巾 -->
    <path d="M-25 -85 Q-15 -75 0 -80 Q15 -75 25 -85" stroke="#e8a838" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M20 -80 Q30 -60 25 -45" stroke="#e8a838" stroke-width="10" fill="none" stroke-linecap="round"/>
  </g>
  <!-- 暖气符号 -->
  <g opacity="0.3">
    <path d="M380 300 Q390 280 400 300 Q410 280 420 300" stroke="#e07856" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M380 320 Q390 300 400 320 Q410 300 420 320" stroke="#e07856" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="700" fill="#2d6a4f">温暖</text>
  <text x="400" y="82" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#7a7468">一双手套、一碗热汤，还有说不出口的爱</text>
</svg>
