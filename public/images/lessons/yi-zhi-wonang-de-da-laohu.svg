<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="舞台上一个孩子套着老虎头套表演的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">一只窝囊的大老虎</text>
  <line x1="280" y1="60" x2="520" y2="60" stroke="#c8843a" stroke-width="2"/>

  <!-- 舞台幕布 -->
  <rect x="0" y="70" width="800" height="40" fill="#8d2a2a"/>
  <path d="M0 110 Q40 90 80 110 Q120 90 160 110 Q200 90 240 110 Q280 90 320 110 Q360 90 400 110 Q440 90 480 110 Q520 90 560 110 Q600 90 640 110 Q680 90 720 110 Q760 90 800 110 Z" fill="#8d2a2a"/>
  <!-- 幕布两侧 -->
  <rect x="0" y="70" width="50" height="430" fill="#a83838"/>
  <rect x="750" y="70" width="50" height="430" fill="#a83838"/>
  <path d="M50 70 Q40 300 50 500 L80 500 Q70 300 80 70 Z" fill="#8d2a2a"/>
  <path d="M750 70 Q760 300 750 500 L720 500 Q730 300 720 70 Z" fill="#8d2a2a"/>

  <!-- 舞台地板 -->
  <rect x="50" y="470" width="700" height="60" fill="#c8a878"/>
  <line x1="50" y1="470" x2="750" y2="470" stroke="#8d6a4a" stroke-width="3"/>

  <!-- 聚光灯 -->
  <path d="M400 110 L280 470 L520 470 Z" fill="#fff6df" opacity="0.25"/>

  <!-- 大老虎（孩子扮演，趴在地上） -->
  <g>
    <!-- 身体（趴着） -->
    <ellipse cx="400" cy="445" rx="90" ry="40" fill="#e8a838" stroke="#7a3b14" stroke-width="2.5"/>
    <!-- 虎纹 -->
    <path d="M360 420 q10 15 0 30 M390 415 q10 18 0 32 M420 420 q10 15 0 30" stroke="#5a3a1a" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- 头套 -->
    <ellipse cx="320" cy="440" rx="45" ry="42" fill="#e8a838" stroke="#7a3b14" stroke-width="2.5"/>
    <!-- 耳朵 -->
    <path d="M290 408 L280 392 L302 402 Z" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
    <path d="M350 408 L360 392 L338 402 Z" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
    <!-- 王字纹 -->
    <line x1="310" y1="420" x2="330" y2="420" stroke="#5a3a1a" stroke-width="3"/>
    <line x1="312" y1="428" x2="328" y2="428" stroke="#5a3a1a" stroke-width="3"/>
    <line x1="320" y1="415" x2="320" y2="435" stroke="#5a3a1a" stroke-width="3"/>
    <!-- 眼睛（从头套缝隙露出孩子的眼睛） -->
    <circle cx="308" cy="448" r="5" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="332" cy="448" r="5" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="308" cy="448" r="2.5" fill="#3a2a1a"/>
    <circle cx="332" cy="448" r="2.5" fill="#3a2a1a"/>
    <!-- 鼻子嘴 -->
    <ellipse cx="320" cy="462" rx="8" ry="5" fill="#5a3a1a"/>
    <path d="M312 470 q8 5 16 0" stroke="#5a3a1a" stroke-width="2" fill="none"/>
    <!-- 胡须 -->
    <line x1="295" y1="460" x2="278" y2="458" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="295" y1="465" x2="278" y2="468" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="345" y1="460" x2="362" y2="458" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="345" y1="465" x2="362" y2="468" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 前腿（趴着） -->
    <rect x="345" y="470" width="20" height="30" rx="6" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
    <rect x="375" y="470" width="20" height="30" rx="6" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
    <!-- 尾巴 -->
    <path d="M485 440 q30 -5 40 -30" stroke="#e8a838" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M485 440 q30 -5 40 -30" stroke="#7a3b14" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- 观众席（小头像） -->
  <g>
    <circle cx="150" cy="540" r="14" fill="#e8c9a0" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M138 538 q12 -10 24 0" fill="#3a2a1a"/>
    <path d="M143 545 q7 4 14 0" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
    <circle cx="200" cy="545" r="14" fill="#e8c9a0" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M188 543 q12 -10 24 0" fill="#5a3a1a"/>
    <path d="M193 550 q7 5 14 0" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
    <circle cx="600" cy="540" r="14" fill="#e8c9a0" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M588 538 q12 -10 24 0" fill="#3a2a1a"/>
    <path d="M593 545 q7 4 14 0" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
    <circle cx="650" cy="545" r="14" fill="#e8c9a0" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M638 543 q12 -10 24 0" fill="#5a3a1a"/>
    <path d="M643 550 q7 5 14 0" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
    <!-- 笑的符号 -->
    <text x="175" y="525" font-family="serif" font-size="18" fill="#e07856">哈哈</text>
    <text x="610" y="525" font-family="serif" font-size="18" fill="#e07856">哈哈</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">笨拙的大老虎不会跳，却逗笑了全场观众</text>
</svg>
