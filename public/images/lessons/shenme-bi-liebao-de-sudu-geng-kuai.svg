<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="猎豹、飞机、火箭和光的速度对比插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">什么比猎豹的速度更快</text>
  <line x1="250" y1="60" x2="550" y2="60" stroke="#c8843a" stroke-width="2"/>

  <!-- 速度阶梯（从下到上，从左到右） -->
  <!-- 阶梯背景 -->
  <g>
    <rect x="40" y="470" width="150" height="80" fill="#e8a838" opacity="0.2" rx="6"/>
    <rect x="200" y="410" width="150" height="140" fill="#e07856" opacity="0.2" rx="6"/>
    <rect x="360" y="340" width="150" height="210" fill="#4a90b8" opacity="0.2" rx="6"/>
    <rect x="520" y="260" width="120" height="290" fill="#2d6a4f" opacity="0.2" rx="6"/>
    <rect x="650" y="160" width="120" height="390" fill="#c8843a" opacity="0.2" rx="6"/>
  </g>

  <!-- 1. 猎豹 -->
  <g>
    <!-- 猎豹身体 -->
    <ellipse cx="115" cy="500" rx="40" ry="18" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
    <ellipse cx="80" cy="495" rx="18" ry="15" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
    <!-- 斑点 -->
    <circle cx="100" cy="495" r="3" fill="#5a3a1a"/>
    <circle cx="120" cy="500" r="3" fill="#5a3a1a"/>
    <circle cx="135" cy="495" r="3" fill="#5a3a1a"/>
    <!-- 腿（奔跑） -->
    <path d="M95 515 L85 540 M105 518 L100 545 M130 518 L140 542 M145 515 L155 538" stroke="#7a3b14" stroke-width="4" stroke-linecap="round"/>
    <!-- 尾巴 -->
    <path d="M155 495 q20 -5 25 -20" stroke="#e8a838" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- 速度线 -->
    <path d="M55 490 L40 488 M55 500 L40 500" stroke="#7a3b14" stroke-width="1.5" opacity="0.4"/>
    <text x="115" y="560" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14" font-weight="bold">猎豹</text>
    <text x="115" y="575" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">~110km/h</text>
  </g>

  <!-- 2. 游隼 -->
  <g>
    <!-- 游隼（俯冲） -->
    <ellipse cx="275" cy="450" rx="25" ry="10" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="2" transform="rotate(-20 275 450)"/>
    <!-- 翅膀收拢 -->
    <path d="M260 445 L235 430 M290 455 L315 440" stroke="#5a3a1a" stroke-width="6" fill="none" stroke-linecap="round" transform="rotate(-20 275 450)"/>
    <circle cx="258" cy="446" r="6" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="1.5" transform="rotate(-20 275 450)"/>
    <!-- 俯冲线 -->
    <path d="M250 420 L230 400 M260 425 L245 405" stroke="#e07856" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,2"/>
    <text x="275" y="560" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14" font-weight="bold">游隼</text>
    <text x="275" y="575" text-anchor="middle" font-family="serif" font-size="11" fill="#e07856">~320km/h</text>
  </g>

  <!-- 3. 喷气式飞机 -->
  <g>
    <!-- 飞机 -->
    <path d="M420 400 L470 395 L490 390 L500 395 L490 400 L470 400 L420 405 Z" fill="#4a90b8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 机翼 -->
    <path d="M445 397 L435 380 L450 395 M455 400 L465 415 L450 402" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 尾翼 -->
    <path d="M425 400 L418 388 L428 398" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 尾迹 -->
    <path d="M420 400 L370 405 L350 408" stroke="#ffffff" stroke-width="4" fill="none" opacity="0.6" stroke-linecap="round"/>
    <text x="435" y="560" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14" font-weight="bold">喷气飞机</text>
    <text x="435" y="575" text-anchor="middle" font-family="serif" font-size="11" fill="#4a90b8">~1000km/h</text>
  </g>

  <!-- 4. 火箭 -->
  <g>
    <!-- 火箭 -->
    <path d="M580 340 L580 290 L590 280 L600 290 L600 340 Z" fill="#e07856" stroke="#7a3b14" stroke-width="2"/>
    <path d="M580 340 L570 360 L590 340 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M600 340 L610 360 L590 340 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 窗户 -->
    <circle cx="590" cy="305" r="4" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 火焰 -->
    <path d="M583 340 L580 365 L590 345 L600 365 L597 340" fill="#e8a838" stroke="#e07856" stroke-width="1.5"/>
    <path d="M586 345 L590 360 L594 345" fill="#e07856"/>
    <text x="580" y="560" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14" font-weight="bold">火箭</text>
    <text x="580" y="575" text-anchor="middle" font-family="serif" font-size="11" fill="#2d6a4f">~40000km/h</text>
  </g>

  <!-- 5. 光 -->
  <g>
    <!-- 光线 -->
    <path d="M680 200 L740 200" stroke="#e8a838" stroke-width="4" stroke-linecap="round"/>
    <path d="M680 200 L740 200" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <!-- 光芒 -->
    <path d="M710 185 L710 175 M710 215 L710 225 M695 200 L685 200 M725 200 L735 200" stroke="#e8a838" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 光源 -->
    <circle cx="680" cy="200" r="10" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="680" cy="200" r="5" fill="#ffffff"/>
    <text x="710" y="560" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14" font-weight="bold">光</text>
    <text x="710" y="575" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">30万km/秒</text>
  </g>

  <!-- 递进箭头 -->
  <g>
    <path d="M190 490 L200 470" stroke="#7a3b14" stroke-width="2" fill="none" marker-end="url(#ar1)"/>
    <path d="M350 440 L360 400" stroke="#7a3b14" stroke-width="2" fill="none" marker-end="url(#ar1)"/>
    <path d="M510 380 L520 340" stroke="#7a3b14" stroke-width="2" fill="none" marker-end="url(#ar1)"/>
    <path d="M640 280 L660 220" stroke="#7a3b14" stroke-width="2" fill="none" marker-end="url(#ar1)"/>
  </g>
  <defs>
    <marker id="ar1" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#7a3b14"/>
    </marker>
  </defs>

  <!-- 底部说明 -->
  <text x="400" y="100" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">从猎豹到光，速度一级比一级快</text>
</svg>
