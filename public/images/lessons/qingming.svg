<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="清明时节雨中行人问路插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">清明</text>
  <line x1="350" y1="62" x2="450" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 诗句 -->
  <text x="400" y="95" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" opacity="0.7">清明时节雨纷纷，路上行人欲断魂</text>

  <!-- 灰蒙蒙的天空 -->
  <rect x="0" y="105" width="800" height="250" fill="#a8b0b8" opacity="0.15"/>

  <!-- 细雨 -->
  <g opacity="0.35">
    <line x1="80" y1="120" x2="75" y2="140" stroke="#6a8a9a" stroke-width="1"/>
    <line x1="150" y1="130" x2="145" y2="150" stroke="#6a8a9a" stroke-width="1"/>
    <line x1="220" y1="115" x2="215" y2="135" stroke="#6a8a9a" stroke-width="1"/>
    <line x1="300" y1="125" x2="295" y2="145" stroke="#6a8a9a" stroke-width="1"/>
    <line x1="400" y1="120" x2="395" y2="140" stroke="#6a8a9a" stroke-width="1"/>
    <line x1="480" y1="130" x2="475" y2="150" stroke="#6a8a9a" stroke-width="1"/>
    <line x1="560" y1="115" x2="555" y2="135" stroke="#6a8a9a" stroke-width="1"/>
    <line x1="640" y1="125" x2="635" y2="145" stroke="#6a8a9a" stroke-width="1"/>
    <line x1="720" y1="120" x2="715" y2="140" stroke="#6a8a9a" stroke-width="1"/>
    <line x1="100" y1="160" x2="95" y2="180" stroke="#6a8a9a" stroke-width="1"/>
    <line x1="260" y1="165" x2="255" y2="185" stroke="#6a8a9a" stroke-width="1"/>
    <line x1="420" y1="160" x2="415" y2="180" stroke="#6a8a9a" stroke-width="1"/>
    <line x1="600" y1="165" x2="595" y2="185" stroke="#6a8a9a" stroke-width="1"/>
    <line x1="700" y1="170" x2="695" y2="190" stroke="#6a8a9a" stroke-width="1"/>
  </g>

  <!-- 远山（朦胧） -->
  <path d="M0 320 L100 260 L200 290 L320 240 L440 280 L560 250 L680 280 L800 260 L800 350 L0 350 Z" fill="#b8c8c0" opacity="0.3"/>

  <!-- 柳树 -->
  <g transform="translate(100, 200)">
    <path d="M0 180 Q-5 100 0 0" fill="none" stroke="#5a3a1a" stroke-width="6"/>
    <!-- 柳枝 -->
    <path d="M0 20 Q-20 40 -30 80" fill="none" stroke="#2d6a4f" stroke-width="2"/>
    <path d="M0 30 Q15 50 25 90" fill="none" stroke="#2d6a4f" stroke-width="2"/>
    <path d="M0 10 Q-25 30 -40 70" fill="none" stroke="#3d8a5f" stroke-width="2"/>
    <path d="M0 15 Q20 35 35 75" fill="none" stroke="#3d8a5f" stroke-width="2"/>
    <path d="M0 5 Q-15 25 -25 60" fill="none" stroke="#2d6a4f" stroke-width="1.5"/>
    <!-- 嫩芽 -->
    <ellipse cx="-30" cy="80" rx="3" ry="1.5" fill="#4d9a6f"/>
    <ellipse cx="25" cy="90" rx="3" ry="1.5" fill="#4d9a6f"/>
    <ellipse cx="-40" cy="70" rx="3" ry="1.5" fill="#4d9a6f"/>
  </g>

  <!-- 行人（悲伤赶路） -->
  <g transform="translate(320, 380)">
    <!-- 斗笠 -->
    <ellipse cx="0" cy="-45" rx="25" ry="8" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <!-- 头 -->
    <circle cx="0" cy="-35" r="14" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 眼睛（低垂，悲伤） -->
    <path d="M-6 -35 Q-4 -33 -2 -35" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M2 -35 Q4 -33 6 -35" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 嘴（抿着） -->
    <line x1="-3" y1="-27" x2="3" y2="-27" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 身体 -->
    <path d="M-12 -22 L-15 30 L15 30 L12 -22" fill="#6a8a9a" stroke="#7a3b14" stroke-width="2"/>
    <!-- 手臂（拢在胸前） -->
    <path d="M-12 -15 L-5 5" fill="none" stroke="#6a8a9a" stroke-width="8" stroke-linecap="round"/>
    <path d="M12 -15 L5 5" fill="none" stroke="#6a8a9a" stroke-width="8" stroke-linecap="round"/>
    <!-- 腿 -->
    <rect x="-10" y="28" width="8" height="35" fill="#3a4a5a" rx="2"/>
    <rect x="2" y="28" width="8" height="35" fill="#3a4a5a" rx="2"/>
  </g>

  <!-- 牧童骑黄牛 -->
  <g transform="translate(560, 400)">
    <!-- 黄牛 -->
    <ellipse cx="0" cy="0" rx="60" ry="32" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
    <!-- 花斑 -->
    <ellipse cx="-10" cy="-8" rx="12" ry="8" fill="#d49030" opacity="0.5"/>
    <!-- 头 -->
    <ellipse cx="-55" cy="-10" rx="25" ry="22" fill="#e8a838" stroke="#7a3b14" stroke-width="2"/>
    <!-- 角 -->
    <path d="M-68 -28 Q-72 -38 -65 -40" fill="none" stroke="#7a3b14" stroke-width="3" stroke-linecap="round"/>
    <path d="M-48 -30 Q-44 -40 -50 -42" fill="none" stroke="#7a3b14" stroke-width="3" stroke-linecap="round"/>
    <!-- 眼睛 -->
    <circle cx="-58" cy="-12" r="3" fill="#2a2a2a"/>
    <!-- 鼻子 -->
    <ellipse cx="-72" cy="-5" rx="6" ry="5" fill="#d49030" stroke="#7a3b14" stroke-width="1"/>
    <!-- 腿 -->
    <rect x="-35" y="28" width="12" height="30" fill="#d49030" rx="2"/>
    <rect x="-10" y="28" width="12" height="30" fill="#e8a838" rx="2"/>
    <rect x="15" y="28" width="12" height="30" fill="#d49030" rx="2"/>
    <rect x="35" y="28" width="12" height="30" fill="#e8a838" rx="2"/>
    <!-- 尾巴 -->
    <path d="M58 -5 Q75 5 70 25" fill="none" stroke="#7a3b14" stroke-width="3" stroke-linecap="round"/>

    <!-- 牧童（骑在牛背上） -->
    <g transform="translate(5, -40)">
      <!-- 斗笠 -->
      <ellipse cx="0" cy="-20" rx="18" ry="6" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1"/>
      <!-- 头 -->
      <circle cx="0" cy="-12" r="11" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 眼睛（笑） -->
      <path d="M-4 -13 Q-2 -15 0 -13" fill="none" stroke="#7a3b14" stroke-width="1"/>
      <path d="M0 -13 Q2 -15 4 -13" fill="none" stroke="#7a3b14" stroke-width="1"/>
      <!-- 嘴（笑） -->
      <path d="M-3 -7 Q0 -4 3 -7" fill="none" stroke="#7a3b14" stroke-width="1"/>
      <!-- 身体 -->
      <path d="M-8 -2 L-10 15 L10 15 L8 -2" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 手（遥指） -->
      <path d="M8 5 L30 -10" fill="none" stroke="#f0d0a8" stroke-width="5" stroke-linecap="round"/>
      <circle cx="32" cy="-12" r="4" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
    </g>
  </g>

  <!-- 杏花村（远处） -->
  <g transform="translate(700, 300)" opacity="0.7">
    <!-- 杏花树 -->
    <ellipse cx="-20" cy="0" rx="25" ry="20" fill="#f0c8d0" opacity="0.6"/>
    <ellipse cx="10" cy="-5" rx="22" ry="18" fill="#f0c8d0" opacity="0.6"/>
    <ellipse cx="-5" cy="10" rx="20" ry="15" fill="#f0b8c8" opacity="0.5"/>
    <!-- 酒旗 -->
    <line x1="30" y1="-20" x2="30" y2="20" stroke="#7a3b14" stroke-width="2"/>
    <path d="M30 -20 L50 -15 L50 -5 L30 -10" fill="#e07856" opacity="0.7" stroke="#7a3b14" stroke-width="1"/>
    <text x="40" y="-10" text-anchor="middle" font-size="8" fill="#fef9ed">酒</text>
  </g>

  <!-- 标注：行人 -->
  <line x1="320" y1="340" x2="260" y2="300" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="200" y="278" width="100" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="250" y="295" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">行人欲断魂</text>

  <!-- 标注：牧童遥指 -->
  <line x1="590" y1="350" x2="620" y2="310" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="575" y="288" width="100" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="625" y="305" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">牧童遥指</text>

  <!-- 标注：杏花村 -->
  <line x1="700" y1="280" x2="700" y2="240" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="650" y="215" width="100" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="700" y="232" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">杏花村</text>

  <!-- 底部说明 -->
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">从雨纷纷的悲伤到杏花村的温暖，二十八字写出清明的哀思与希望</text>
</svg>
