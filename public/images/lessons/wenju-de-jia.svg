<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="文具盒里整整齐齐放着铅笔橡皮的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">文具的家</text>

  <!-- 上：乱丢的文具 -->
  <text x="400" y="100" text-anchor="middle" font-family="serif" font-size="16" fill="#c84a3a" font-weight="bold">以前：文具到处丢</text>
  <rect x="40" y="110" width="720" height="130" fill="#fef0d8" opacity="0.5" rx="8"/>
  <!-- 散落的文具 -->
  <g transform="translate(120,170)">
    <rect x="-40" y="-3" width="80" height="6" fill="#e0a050" rx="2"/>
    <rect x="-40" y="-3" width="14" height="6" fill="#c84a3a"/>
    <polygon points="-40,-3 -48,0 -40,3" fill="#3a3a3a"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">铅笔（丢在桌角）</text>
  </g>
  <g transform="translate(320,175) rotate(15)">
    <rect x="-18" y="-8" width="36" height="16" fill="#e07856" rx="4"/>
    <rect x="-18" y="-8" width="36" height="5" fill="#fef9ed"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">橡皮（不见了）</text>
  </g>
  <g transform="translate(520,170) rotate(-10)">
    <rect x="-30" y="-2" width="60" height="4" fill="#8d5a36"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">尺子（乱放）</text>
  </g>
  <!-- 问号 -->
  <text x="680" y="180" text-anchor="middle" font-family="serif" font-size="30" fill="#c84a3a" font-weight="bold">?</text>

  <!-- 中：妈妈的话 -->
  <rect x="200" y="260" width="400" height="50" rx="10" fill="#fef9ed" stroke="#6a8d3f" stroke-width="2"/>
  <text x="400" y="282" text-anchor="middle" font-family="serif" font-size="14" fill="#6a8d3f" font-weight="bold">妈妈说：你有一个家，文具也有一个家</text>
  <text x="400" y="300" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">每天放学，把它们送回家</text>

  <!-- 下：文具盒（文具的家） -->
  <text x="400" y="345" text-anchor="middle" font-family="serif" font-size="16" fill="#6a8d3f" font-weight="bold">现在：文具盒整整齐齐</text>

  <!-- 文具盒 -->
  <g transform="translate(400,470)">
    <!-- 盒身 -->
    <rect x="-220" y="-50" width="440" height="100" rx="12" fill="#c84a3a" stroke="#7a3b14" stroke-width="3"/>
    <rect x="-210" y="-42" width="420" height="84" rx="8" fill="#fef0d8"/>
    <!-- 盒盖分割线 -->
    <line x1="-220" y1="-50" x2="220" y2="-50" stroke="#7a3b14" stroke-width="3"/>

    <!-- 铅笔1 -->
    <g transform="translate(-160,0)">
      <rect x="-50" y="-4" width="100" height="8" fill="#e0a050" rx="2"/>
      <rect x="-50" y="-4" width="18" height="8" fill="#c84a3a"/>
      <polygon points="-50,-4 -60,0 -50,4" fill="#3a3a3a"/>
      <rect x="38" y="-4" width="12" height="8" fill="#7ab8d8"/>
      <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">铅笔</text>
    </g>
    <!-- 铅笔2 -->
    <g transform="translate(-30,0)">
      <rect x="-50" y="-4" width="100" height="8" fill="#6a8d3f" rx="2"/>
      <rect x="-50" y="-4" width="18" height="8" fill="#4a6a2f"/>
      <polygon points="-50,-4 -60,0 -50,4" fill="#3a3a3a"/>
      <rect x="38" y="-4" width="12" height="8" fill="#e07856"/>
    </g>
    <!-- 橡皮 -->
    <g transform="translate(90,0)">
      <rect x="-25" y="-10" width="50" height="20" fill="#e07856" rx="4"/>
      <rect x="-25" y="-10" width="50" height="7" fill="#fef9ed"/>
      <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">橡皮</text>
    </g>
    <!-- 尺子 -->
    <g transform="translate(170,0)">
      <rect x="-35" y="-3" width="70" height="6" fill="#7ab8d8"/>
      <g stroke="#fef9ed" stroke-width="1">
        <line x1="-30" y1="-3" x2="-30" y2="0"/>
        <line x1="-20" y1="-3" x2="-20" y2="0"/>
        <line x1="-10" y1="-3" x2="-10" y2="0"/>
        <line x1="0" y1="-3" x2="0" y2="0"/>
        <line x1="10" y1="-3" x2="10" y2="0"/>
        <line x1="20" y1="-3" x2="20" y2="0"/>
        <line x1="30" y1="-3" x2="30" y2="0"/>
      </g>
      <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">尺子</text>
    </g>
  </g>

  <!-- 小房子装饰（表示"家"） -->
  <g transform="translate(400,470)" opacity="0.15">
    <path d="M-220 -50 L0 -90 L220 -50" fill="none" stroke="#6a8d3f" stroke-width="2"/>
  </g>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="15" fill="#6a8d3f" font-weight="bold">文具盒就是文具的家，整整齐齐再也没丢过</text>
</svg>
