<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="春天里燕子在柳树和花丛间飞舞的场景插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">燕子</text>
  <line x1="380" y1="58" x2="420" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="72" width="800" height="300" fill="#a8d0e8" opacity="0.25"/>

  <!-- 太阳 -->
  <circle cx="680" cy="120" r="22" fill="#e07856" opacity="0.5"/>

  <!-- 云朵 -->
  <ellipse cx="120" cy="110" rx="35" ry="12" fill="#fff" opacity="0.6"/>
  <ellipse cx="500" cy="95" rx="40" ry="13" fill="#fff" opacity="0.5"/>

  <!-- 柳树 -->
  <g transform="translate(120, 200)">
    <rect x="-5" y="0" width="10" height="180" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    <!-- 柳枝 -->
    <path d="M-5 30 Q-20 80 -15 160" fill="none" stroke="#6a8d3f" stroke-width="2"/>
    <path d="M0 25 Q-15 70 -10 150" fill="none" stroke="#6a8d3f" stroke-width="2"/>
    <path d="M5 30 Q20 80 15 160" fill="none" stroke="#6a8d3f" stroke-width="2"/>
    <path d="M0 20 Q15 60 20 140" fill="none" stroke="#4a6a2f" stroke-width="2"/>
    <!-- 柳叶 -->
    <ellipse cx="-15" cy="80" rx="3" ry="8" fill="#6a8d3f" opacity="0.7" transform="rotate(-20 -15 80)"/>
    <ellipse cx="-10" cy="110" rx="3" ry="8" fill="#6a8d3f" opacity="0.7" transform="rotate(-15 -10 110)"/>
    <ellipse cx="15" cy="90" rx="3" ry="8" fill="#4a6a2f" opacity="0.7" transform="rotate(20 15 90)"/>
    <ellipse cx="18" cy="120" rx="3" ry="8" fill="#6a8d3f" opacity="0.7" transform="rotate(15 18 120)"/>
  </g>

  <!-- 桃花 -->
  <g transform="translate(680, 250)">
    <rect x="-3" y="0" width="6" height="120" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-12" cy="10" r="6" fill="#e07856" opacity="0.8"/>
    <circle cx="8" cy="-5" r="7" fill="#c84a3a" opacity="0.8"/>
    <circle cx="0" cy="20" r="5" fill="#e07856" opacity="0.7"/>
    <circle cx="-8" cy="35" r="6" fill="#c84a3a" opacity="0.7"/>
    <circle cx="12" cy="25" r="5" fill="#e07856" opacity="0.7"/>
  </g>

  <!-- 飞行的燕子1 -->
  <g transform="translate(300, 180)">
    <ellipse cx="0" cy="0" rx="16" ry="6" fill="#1a1a1a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-12" cy="-2" r="6" fill="#1a1a1a" stroke="#7a3b14" stroke-width="1"/>
    <!-- 剪刀尾巴 -->
    <path d="M16 0 L28 -6 M16 0 L28 6" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    <!-- 翅膀（展开飞行） -->
    <path d="M-2 -3 Q-10 -18 -18 -12" fill="#1a1a1a" stroke="#7a3b14" stroke-width="1"/>
    <path d="M2 -3 Q10 -18 18 -12" fill="#1a1a1a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-14" cy="-3" r="1" fill="#fff"/>
  </g>

  <!-- 飞行的燕子2（掠过水面） -->
  <g transform="translate(480, 300)">
    <ellipse cx="0" cy="0" rx="14" ry="5" fill="#1a1a1a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-10" cy="-1" r="5" fill="#1a1a1a" stroke="#7a3b14" stroke-width="1"/>
    <path d="M14 0 L24 -5 M14 0 L24 5" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    <path d="M-1 -2 Q-8 -15 -15 -10" fill="#1a1a1a" stroke="#7a3b14" stroke-width="1"/>
    <path d="M1 -2 Q8 -15 15 -10" fill="#1a1a1a" stroke="#7a3b14" stroke-width="1"/>
  </g>

  <!-- 水面波纹 -->
  <path d="M440 320 Q460 318 480 320 Q500 322 520 320" fill="none" stroke="#7ab8d8" stroke-width="1.5" opacity="0.5"/>
  <path d="M450 330 Q470 328 490 330 Q510 332 530 330" fill="none" stroke="#7ab8d8" stroke-width="1" opacity="0.4"/>

  <!-- 电线上的燕子（五线谱） -->
  <g transform="translate(0, 400)">
    <!-- 电线 -->
    <line x1="50" y1="20" x2="750" y2="20" stroke="#7a3b14" stroke-width="2"/>
    <line x1="50" y1="35" x2="750" y2="35" stroke="#7a3b14" stroke-width="2"/>
    <line x1="50" y1="50" x2="750" y2="50" stroke="#7a3b14" stroke-width="2"/>
    <!-- 电线杆 -->
    <rect x="48" y="0" width="4" height="80" fill="#8d5a36"/>
    <rect x="748" y="0" width="4" height="80" fill="#8d5a36"/>
    <!-- 燕子停在电线上（音符） -->
    <g transform="translate(200, 20)">
      <ellipse cx="0" cy="0" rx="8" ry="5" fill="#1a1a1a"/>
      <path d="M8 0 L16 -3 M8 0 L16 3" stroke="#1a1a1a" stroke-width="1.5"/>
    </g>
    <g transform="translate(320, 35)">
      <ellipse cx="0" cy="0" rx="8" ry="5" fill="#1a1a1a"/>
      <path d="M8 0 L16 -3 M8 0 L16 3" stroke="#1a1a1a" stroke-width="1.5"/>
    </g>
    <g transform="translate(440, 20)">
      <ellipse cx="0" cy="0" rx="8" ry="5" fill="#1a1a1a"/>
      <path d="M8 0 L16 -3 M8 0 L16 3" stroke="#1a1a1a" stroke-width="1.5"/>
    </g>
    <g transform="translate(560, 50)">
      <ellipse cx="0" cy="0" rx="8" ry="5" fill="#1a1a1a"/>
      <path d="M8 0 L16 -3 M8 0 L16 3" stroke="#1a1a1a" stroke-width="1.5"/>
    </g>
  </g>

  <!-- 标注：剪刀尾巴 -->
  <line x1="330" y1="180" x2="370" y2="140" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="350" y="115" width="100" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="133" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">剪刀尾巴</text>

  <!-- 标注：五线谱 -->
  <line x1="400" y1="400" x2="400" y2="370" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="330" y="348" width="140" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="366" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">五线谱上的音符</text>

  <!-- 底部说明 -->
  <text x="400" y="540" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">一身乌黑光亮的羽毛，一对俊俏轻快的翅膀</text>
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">小燕子从南方赶来，为春光增添了许多生机</text>
</svg>
