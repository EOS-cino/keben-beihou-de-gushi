<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="鲁滨逊漂流记 - 荒岛生存">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题栏 -->
  <rect x="0" y="0" width="800" height="74" fill="#7a3b14" opacity="0.12"/>
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">鲁滨逊漂流记（节选）</text>
  <line x1="280" y1="64" x2="520" y2="64" stroke="#c05a30" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="74" width="800" height="180" fill="#3a7d5c" opacity="0.06"/>
  <!-- 太阳 -->
  <circle cx="650" cy="150" r="30" fill="#c05a30" opacity="0.2"/>
  <circle cx="650" cy="150" r="20" fill="#c05a30" opacity="0.3"/>
  <!-- 海鸥 -->
  <g stroke="#2d2a24" stroke-width="2" fill="none" opacity="0.5">
    <path d="M120 130 Q126 124 132 130 Q138 124 144 130"/>
    <path d="M250 110 Q255 105 260 110 Q265 105 270 110"/>
  </g>

  <!-- 海洋 -->
  <rect x="0" y="250" width="800" height="160" fill="#3a7d5c" opacity="0.15"/>
  <rect x="0" y="250" width="800" height="80" fill="#3a7d5c" opacity="0.1"/>
  <!-- 海浪 -->
  <g stroke="#3a7d5c" stroke-width="2" fill="none" opacity="0.3">
    <path d="M0 280 Q50 275 100 280 T200 280 T300 280 T400 280 T500 280 T600 280 T700 280 T800 280"/>
    <path d="M0 310 Q60 305 120 310 T240 310 T360 310 T480 310 T600 310 T720 310 T800 310"/>
    <path d="M0 340 Q40 335 80 340 T160 340 T240 340 T320 340 T400 340 T480 340 T560 340 T640 340 T720 340 T800 340"/>
    <path d="M0 370 Q50 365 100 370 T200 370 T300 370 T400 370 T500 370 T600 370 T700 370 T800 370"/>
  </g>

  <!-- 荒岛 -->
  <ellipse cx="400" cy="430" rx="280" ry="80" fill="#c05a30" opacity="0.15"/>
  <ellipse cx="400" cy="420" rx="260" ry="60" fill="#7a3b14" opacity="0.2"/>
  <!-- 岛屿沙地 -->
  <path d="M140 430 Q200 390 400 395 Q600 390 660 430 Q600 460 400 455 Q200 460 140 430 Z" fill="#c05a30" opacity="0.18"/>

  <!-- 棚屋（左中岛上） -->
  <g transform="translate(260,380)">
    <!-- 棚屋主体 -->
    <path d="M-35 0 L35 0 L35 35 L-35 35 Z" fill="#7a3b14" opacity="0.6"/>
    <!-- 屋顶（茅草） -->
    <path d="M-45 0 L0 -35 L45 0 Z" fill="#3a7d5c" opacity="0.7"/>
    <line x1="-35" y1="-10" x2="35" y2="-10" stroke="#7a3b14" stroke-width="1" opacity="0.5"/>
    <line x1="-25" y1="-20" x2="25" y2="-20" stroke="#7a3b14" stroke-width="1" opacity="0.5"/>
    <!-- 门 -->
    <rect x="-8" y="12" width="16" height="23" rx="1" fill="#2d2a24" opacity="0.7"/>
    <!-- 窗 -->
    <rect x="15" y="8" width="12" height="12" fill="#fef9ed" stroke="#7a3b14" stroke-width="1"/>
    <line x1="21" y1="8" x2="21" y2="20" stroke="#7a3b14" stroke-width="0.8"/>
    <line x1="15" y1="14" x2="27" y2="14" stroke="#7a3b14" stroke-width="0.8"/>
    <!-- 木桩围栏 -->
    <g fill="#7a3b14" opacity="0.5">
      <rect x="-55" y="30" width="3" height="14"/>
      <rect x="-45" y="32" width="3" height="12"/>
      <rect x="-35" y="33" width="3" height="11"/>
    </g>
  </g>

  <!-- 篝火（棚屋旁） -->
  <g transform="translate(340,400)" opacity="0.7">
    <ellipse cx="0" cy="8" rx="14" ry="4" fill="#7a7468" opacity="0.4"/>
    <line x1="-10" y1="6" x2="10" y2="6" stroke="#7a3b14" stroke-width="2"/>
    <path d="M-7 5 Q-4 -8 0 -14 Q4 -8 7 5 Q3 0 0 3 Q-3 0 -7 5 Z" fill="#c05a30" opacity="0.8"/>
    <path d="M-3 3 Q-1 -5 0 -10 Q1 -5 3 3 Z" fill="#c05a30"/>
  </g>

  <!-- 鲁滨逊（右中岛上，手持工具） -->
  <g transform="translate(460,400)">
    <!-- 身体（兽皮衣） -->
    <path d="M-22 -20 L22 -20 L28 40 L-28 40 Z" fill="#7a3b14" opacity="0.75"/>
    <!-- 兽皮毛边 -->
    <path d="M-22 -20 L-18 -14 L-14 -20 L-10 -14 L-6 -20 L-2 -14 L2 -20 L6 -14 L10 -20 L14 -14 L18 -20" stroke="#2d2a24" stroke-width="1" fill="none"/>
    <!-- 头 -->
    <circle cx="0" cy="-38" r="16" fill="#c05a30" opacity="0.85"/>
    <!-- 胡须 -->
    <path d="M-8 -30 Q0 -22 8 -30" stroke="#2d2a24" stroke-width="2" fill="none"/>
    <!-- 头发/帽子 -->
    <path d="M-16 -44 Q0 -56 16 -44 L16 -38 L-16 -38 Z" fill="#2d2a24" opacity="0.7"/>
    <!-- 眼睛望向远方 -->
    <circle cx="-5" cy="-40" r="2" fill="#2d2a24"/><circle cx="5" cy="-40" r="2" fill="#2d2a24"/>
    <!-- 手臂（持斧） -->
    <path d="M22 -10 Q40 -5 50 5" stroke="#7a3b14" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- 斧头 -->
    <line x1="50" y1="5" x2="62" y2="-5" stroke="#7a3b14" stroke-width="3"/>
    <path d="M62 -5 L70 -10 L68 0 L60 0 Z" fill="#7a7468"/>
    <!-- 另一只手 -->
    <path d="M-22 -10 Q-35 0 -38 15" stroke="#7a3b14" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- 腿 -->
    <rect x="-18" y="38" width="13" height="28" fill="#7a3b14" opacity="0.75"/>
    <rect x="5" y="38" width="13" height="28" fill="#7a3b14" opacity="0.75"/>
  </g>

  <!-- 椰子树（右侧） -->
  <g transform="translate(580,400)">
    <!-- 树干（弯曲） -->
    <path d="M0 0 Q-5 -40 5 -80 Q10 -100 0 -120" stroke="#7a3b14" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- 树干纹理 -->
    <line x1="-3" y1="-30" x2="3" y2="-30" stroke="#2d2a24" stroke-width="1" opacity="0.5"/>
    <line x1="-2" y1="-60" x2="4" y2="-60" stroke="#2d2a24" stroke-width="1" opacity="0.5"/>
    <line x1="-1" y1="-90" x2="3" y2="-90" stroke="#2d2a24" stroke-width="1" opacity="0.5"/>
    <!-- 椰子叶 -->
    <path d="M0 -120 Q-30 -135 -50 -125 Q-30 -120 0 -120" fill="#3a7d5c" opacity="0.8"/>
    <path d="M0 -120 Q30 -135 50 -125 Q30 -120 0 -120" fill="#3a7d5c" opacity="0.8"/>
    <path d="M0 -120 Q-20 -145 -35 -150 Q-15 -135 0 -120" fill="#3a7d5c" opacity="0.7"/>
    <path d="M0 -120 Q20 -145 35 -150 Q15 -135 0 -120" fill="#3a7d5c" opacity="0.7"/>
    <path d="M0 -120 Q0 -145 0 -160 Q3 -145 0 -120" fill="#3a7d5c" opacity="0.7"/>
    <!-- 椰果 -->
    <circle cx="-6" cy="-115" r="4" fill="#7a3b14"/>
    <circle cx="6" cy="-113" r="4" fill="#7a3b14"/>
  </g>

  <!-- 远处破船 -->
  <g transform="translate(120,300)" opacity="0.4">
    <path d="M-20 0 L20 0 L15 10 L-15 10 Z" fill="#7a3b14"/>
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#7a3b14" stroke-width="2"/>
    <path d="M0 -18 L10 -10 L0 -8 Z" fill="#7a3b14" opacity="0.6"/>
    <!-- 断桅 -->
    <line x1="0" y1="0" x2="-8" y2="-15" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 日历标记（在荒岛上刻记日子） -->
  <g transform="translate(180,330)" opacity="0.6">
    <rect x="-25" y="-18" width="50" height="36" rx="2" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="-25" y1="-8" x2="25" y2="-8" stroke="#7a3b14" stroke-width="1"/>
    <text x="0" y="6" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">记日</text>
    <!-- 刻痕 -->
    <line x1="-18" y1="12" x2="-14" y2="12" stroke="#2d2a24" stroke-width="1.5"/>
    <line x1="-10" y1="12" x2="-6" y2="12" stroke="#2d2a24" stroke-width="1.5"/>
    <line x1="-2" y1="12" x2="2" y2="12" stroke="#2d2a24" stroke-width="1.5"/>
    <line x1="6" y1="12" x2="10" y2="12" stroke="#2d2a24" stroke-width="1.5"/>
    <line x1="14" y1="12" x2="18" y2="12" stroke="#2d2a24" stroke-width="1.5"/>
  </g>

  <!-- 海滩 -->
  <path d="M140 430 Q200 460 400 455 Q600 460 660 430 L800 460 L800 514 L0 514 Z" fill="#c05a30" opacity="0.1"/>

  <rect x="0" y="514" width="800" height="86" fill="#fef9ed"/>
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14" opacity="0.85">荒岛独居二十八载，以双手与智慧战胜孤独</text>
</svg>
