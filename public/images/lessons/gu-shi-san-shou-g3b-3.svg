<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="古诗三首：三个节日">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">古诗三首</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">三首诗，三个传统节日</text>
  <g transform="translate(140,300)">
    <rect x="-40" y="-20" width="80" height="60" rx="4" fill="#c0392b" stroke="#7a1a1a" stroke-width="2"/>
    <path d="M-20,-30 L20,-30 L0,-50 Z" fill="#e8b94a" stroke="#c98a3a" stroke-width="2"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">元日·春节</text>
  </g>
  <g transform="translate(400,300)">
    <path d="M-20,-40 q-10,20 0,30 q10,-10 0,-30" fill="#7fb8d8"/>
    <path d="M20,-40 q10,20 0,30 q-10,-10 0,-30" fill="#7fb8d8"/>
    <circle cx="0" cy="20" r="10" fill="#e8a0b0"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">清明·雨纷纷</text>
  </g>
  <g transform="translate(660,300)">
    <path d="M-40,50 L0,-40 L40,50 Z" fill="#8fb86a" stroke="#3a6b2a" stroke-width="2"/>
    <circle cx="0" cy="10" r="6" fill="#e8b94a"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">重阳·登高</text>
  </g>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">每逢佳节倍思亲</text>
</svg>
