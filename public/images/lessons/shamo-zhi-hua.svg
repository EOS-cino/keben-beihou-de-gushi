<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="沙漠中盛开的短命花与仙人掌插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">沙漠之花</text>
  <line x1="320" y1="56" x2="480" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——等雨的花，开得最艳</text>

  <!-- 天空 -->
  <rect x="0" y="90" width="800" height="280" fill="#e8a838" opacity="0.15"/>
  <!-- 太阳 -->
  <circle cx="650" cy="160" r="35" fill="#e8a838" opacity="0.7"/>
  <circle cx="650" cy="160" r="25" fill="#e07856" opacity="0.6"/>

  <!-- 沙丘 -->
  <path d="M0 370 Q200 320 400 350 Q600 380 800 340 L800 600 L0 600 Z" fill="#c8843a" opacity="0.5"/>
  <path d="M0 420 Q150 390 350 410 Q550 430 800 400 L800 600 L0 600 Z" fill="#c8843a" opacity="0.6"/>

  <!-- 仙人掌 -->
  <g transform="translate(150, 340)">
    <rect x="-12" y="0" width="24" height="100" rx="12" fill="#2d6a4f" stroke="#1a4a2f" stroke-width="2"/>
    <rect x="-30" y="30" width="18" height="40" rx="9" fill="#2d6a4f" stroke="#1a4a2f" stroke-width="2"/>
    <rect x="12" y="20" width="18" height="50" rx="9" fill="#2d6a4f" stroke="#1a4a2f" stroke-width="2"/>
    <!-- 刺 -->
    <line x1="-8" y1="20" x2="-12" y2="15" stroke="#fef9ed" stroke-width="1"/>
    <line x1="8" y1="30" x2="12" y2="25" stroke="#fef9ed" stroke-width="1"/>
    <line x1="-8" y1="50" x2="-12" y2="45" stroke="#fef9ed" stroke-width="1"/>
    <line x1="8" y1="60" x2="12" y2="55" stroke="#fef9ed" stroke-width="1"/>
    <!-- 花 -->
    <circle cx="0" cy="-5" r="8" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="-5" r="4" fill="#fef9ed"/>
    <text x="0" y="120" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">仙人掌：存水</text>
  </g>

  <!-- 短命花盛开 -->
  <g transform="translate(450, 440)">
    <!-- 花丛 -->
    <g transform="translate(-40, 0)">
      <path d="M0 20 L0 0" stroke="#2d6a4f" stroke-width="2"/>
      <circle cx="0" cy="-5" r="7" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="0" cy="-5" r="3" fill="#fef9ed"/>
    </g>
    <g transform="translate(-15, -5)">
      <path d="M0 25 L0 0" stroke="#2d6a4f" stroke-width="2"/>
      <circle cx="0" cy="-5" r="8" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="0" cy="-5" r="3" fill="#fef9ed"/>
    </g>
    <g transform="translate(10, 5)">
      <path d="M0 20 L0 0" stroke="#2d6a4f" stroke-width="2"/>
      <circle cx="0" cy="-5" r="7" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="0" cy="-5" r="3" fill="#fef9ed"/>
    </g>
    <g transform="translate(35, -3)">
      <path d="M0 23 L0 0" stroke="#2d6a4f" stroke-width="2"/>
      <circle cx="0" cy="-5" r="8" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="0" cy="-5" r="3" fill="#fef9ed"/>
    </g>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">短命花：一场雨就开</text>
  </g>

  <!-- 种子（埋在沙里） -->
  <g transform="translate(680, 470)">
    <ellipse cx="0" cy="0" rx="4" ry="3" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="15" cy="5" rx="3" ry="2" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="-12" cy="6" rx="3" ry="2" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">种子：等雨</text>
  </g>

  <!-- 雨滴 -->
  <g opacity="0.6">
    <path d="M300 120 L295 135 L305 135 Z" fill="#4a90b8"/>
    <path d="M350 110 L345 125 L355 125 Z" fill="#4a90b8"/>
    <path d="M400 130 L395 145 L405 145 Z" fill="#4a90b8"/>
    <path d="M500 115 L495 130 L505 130 Z" fill="#4a90b8"/>
    <text x="400" y="180" text-anchor="middle" font-family="serif" font-size="11" fill="#4a90b8">一场雨来了</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 540)">
    <rect x="-300" y="0" width="600" height="50" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">等的时候安静得像不存在，开的时候热烈得让人想哭</text>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">生命在最干的地方，找到了最倔强的活法</text>
  </g>
</svg>
