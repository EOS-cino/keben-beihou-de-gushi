<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="清贫 - 方志敏与铜板">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题栏 -->
  <rect x="0" y="0" width="800" height="74" fill="#7a3b14" opacity="0.12"/>
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="32" font-weight="bold" fill="#7a3b14">清 贫</text>
  <line x1="320" y1="64" x2="480" y2="64" stroke="#c05a30" stroke-width="2"/>

  <!-- 背景 -->
  <rect x="0" y="74" width="800" height="440" fill="#7a7468" opacity="0.05"/>

  <!-- 方志敏形象（中） -->
  <g transform="translate(400,340)">
    <!-- 身体（朴素军装） -->
    <path d="M-32 -20 L32 -20 L40 80 L-40 80 Z" fill="#3a7d5c" opacity="0.85"/>
    <!-- 补丁 -->
    <rect x="-20" y="20" width="14" height="14" fill="#3a7d5c" opacity="0.5" stroke="#7a3b14" stroke-width="0.5" stroke-dasharray="2 2"/>
    <rect x="8" y="40" width="12" height="12" fill="#3a7d5c" opacity="0.5" stroke="#7a3b14" stroke-width="0.5" stroke-dasharray="2 2"/>
    <!-- 领口 -->
    <path d="M-12 -20 L0 -8 L12 -20" stroke="#c05a30" stroke-width="2" fill="none"/>
    <!-- 领章 -->
    <rect x="-14" y="-20" width="8" height="6" fill="#c05a30"/>
    <rect x="6" y="-20" width="8" height="6" fill="#c05a30"/>
    <!-- 头 -->
    <circle cx="0" cy="-40" r="22" fill="#c05a30" opacity="0.85"/>
    <!-- 军帽 -->
    <path d="M-22 -46 Q0 -64 22 -46 L22 -38 L-22 -38 Z" fill="#3a7d5c"/>
    <rect x="-24" y="-40" width="48" height="5" fill="#3a7d5c"/>
    <!-- 五星 -->
    <path d="M0 -54 L-2 -49 L-7 -49 L-3 -46 L-5 -41 L0 -44 L5 -41 L3 -46 L7 -49 L2 -49 Z" fill="#c05a30"/>
    <!-- 眼神坚毅 -->
    <circle cx="-7" cy="-42" r="2" fill="#2d2a24"/><circle cx="7" cy="-42" r="2" fill="#2d2a24"/>
    <path d="M-5 -32 Q0 -29 5 -32" stroke="#2d2a24" stroke-width="1.5" fill="none"/>
    <!-- 手臂张开（被搜身） -->
    <path d="M-32 -10 Q-55 0 -65 20" stroke="#3a7d5c" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M32 -10 Q55 0 65 20" stroke="#3a7d5c" stroke-width="10" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 国民党士兵搜身（左） -->
  <g transform="translate(180,360)" opacity="0.8">
    <path d="M-26 -15 L26 -15 L32 60 L-32 60 Z" fill="#7a7468"/>
    <rect x="-22" y="-36" width="44" height="24" rx="4" fill="#7a7468"/>
    <circle cx="0" cy="-50" r="16" fill="#c05a30" opacity="0.7"/>
    <!-- 军帽 -->
    <path d="M-16 -56 Q0 -68 16 -56 L16 -50 L-16 -50 Z" fill="#7a7468"/>
    <!-- 惊讶表情 -->
    <circle cx="-5" cy="-50" r="2" fill="#2d2a24"/><circle cx="5" cy="-50" r="2" fill="#2d2a24"/>
    <ellipse cx="0" cy="-42" rx="3" ry="4" fill="#2d2a24" opacity="0.5"/>
    <!-- 搜身的手 -->
    <path d="M26 -5 Q50 0 60 15" stroke="#7a7468" stroke-width="9" fill="none" stroke-linecap="round"/>
    <circle cx="62" cy="18" r="8" fill="#c05a30" opacity="0.7"/>
  </g>

  <!-- 国民党士兵（右） -->
  <g transform="translate(620,360)" opacity="0.8">
    <path d="M-26 -15 L26 -15 L32 60 L-32 60 Z" fill="#7a7468"/>
    <rect x="-22" y="-36" width="44" height="24" rx="4" fill="#7a7468"/>
    <circle cx="0" cy="-50" r="16" fill="#c05a30" opacity="0.7"/>
    <path d="M-16 -56 Q0 -68 16 -56 L16 -50 L-16 -50 Z" fill="#7a7468"/>
    <circle cx="-5" cy="-50" r="2" fill="#2d2a24"/><circle cx="5" cy="-50" r="2" fill="#2d2a24"/>
    <ellipse cx="0" cy="-42" rx="3" ry="4" fill="#2d2a24" opacity="0.5"/>
    <!-- 搜身的手 -->
    <path d="M-26 -5 Q-50 0 -60 15" stroke="#7a7468" stroke-width="9" fill="none" stroke-linecap="round"/>
    <circle cx="-62" cy="18" r="8" fill="#c05a30" opacity="0.7"/>
  </g>

  <!-- 地上的铜板（搜出的全部家当） -->
  <g transform="translate(400,460)">
    <!-- 散落铜板 -->
    <g>
      <circle cx="-40" cy="0" r="14" fill="#c05a30" opacity="0.8" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-44" y="-3" width="8" height="6" fill="#7a3b14" rx="1"/>
      <circle cx="-40" cy="0" r="3" fill="#7a3b14"/>
    </g>
    <g>
      <circle cx="-12" cy="-5" r="13" fill="#c05a30" opacity="0.75" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-16" y="-8" width="8" height="6" fill="#7a3b14" rx="1"/>
    </g>
    <g>
      <circle cx="15" cy="2" r="14" fill="#c05a30" opacity="0.8" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="11" y="-1" width="8" height="6" fill="#7a3b14" rx="1"/>
      <circle cx="15" cy="2" r="3" fill="#7a3b14"/>
    </g>
    <g>
      <circle cx="42" cy="-3" r="13" fill="#c05a30" opacity="0.7" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="38" y="-6" width="8" height="6" fill="#7a3b14" rx="1"/>
    </g>
    <g>
      <circle cx="-25" cy="14" r="11" fill="#c05a30" opacity="0.65" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-29" y="11" width="8" height="6" fill="#7a3b14" rx="1"/>
    </g>
    <g>
      <circle cx="30" cy="15" r="11" fill="#c05a30" opacity="0.7" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="26" y="12" width="8" height="6" fill="#7a3b14" rx="1"/>
    </g>
  </g>

  <!-- 标注：全部家当 -->
  <g transform="translate(400,200)">
    <rect x="-90" y="-26" width="180" height="48" rx="8" fill="#fff" stroke="#c05a30" stroke-width="1.5"/>
    <text x="0" y="-6" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#c05a30">全部家当</text>
    <text x="0" y="14" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">几块铜板而已</text>
  </g>
  <!-- 箭头指向铜板 -->
  <path d="M400 226 L400 440" stroke="#c05a30" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.5" fill="none"/>

  <!-- 地面 -->
  <rect x="0" y="490" width="800" height="24" fill="#7a7468" opacity="0.15"/>

  <rect x="0" y="514" width="800" height="86" fill="#fef9ed"/>
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14" opacity="0.85">矜持不苟，舍己为公，清贫洁白是本色</text>
</svg>
