<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="曹植七步成诗与豆萁相煎插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">七步诗</text>
  <line x1="370" y1="56" x2="430" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 诗句 -->
  <rect x="120" y="75" width="560" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <text x="400" y="98" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">萁在釜下燃，豆在釜中泣。本自同根生，相煎何太急？</text>
  <text x="400" y="118" text-anchor="middle" font-family="serif" font-size="12" fill="#c8843a">——曹植</text>

  <!-- 左侧：煮豆燃萁（核心比喻） -->
  <g transform="translate(220, 340)">
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#e07856">煮豆燃萁</text>
    <!-- 釜（锅） -->
    <ellipse cx="0" cy="0" rx="50" ry="15" fill="#5a4a2a" stroke="#7a3b14" stroke-width="2"/>
    <path d="M -50 0 Q -45 30 0 35 Q 45 30 50 0" fill="#8d5a36" stroke="#7a3b14" stroke-width="2"/>
    <!-- 锅里的豆子 -->
    <circle cx="-15" cy="-5" r="5" fill="#e8a838" stroke="#a07820" stroke-width="1"/>
    <circle cx="5" cy="-3" r="5" fill="#e8a838" stroke="#a07820" stroke-width="1"/>
    <circle cx="18" cy="-6" r="4" fill="#e8a838" stroke="#a07820" stroke-width="1"/>
    <circle cx="-5" cy="-8" r="4" fill="#e8a838" stroke="#a07820" stroke-width="1"/>
    <!-- 豆子的眼泪 -->
    <ellipse cx="-15" cy="0" rx="1" ry="3" fill="#4a90b8" opacity="0.6"/>
    <ellipse cx="5" cy="2" rx="1" ry="3" fill="#4a90b8" opacity="0.6"/>
    <!-- 锅下的火（豆萁燃烧） -->
    <g transform="translate(0, 40)">
      <!-- 火焰 -->
      <path d="M -20 0 Q -15 -15 -10 -5 Q -5 -20 0 -8 Q 5 -18 10 -5 Q 15 -15 20 0" fill="#e07856" opacity="0.7"/>
      <path d="M -15 0 Q -10 -10 -5 -3 Q 0 -12 5 -3 Q 10 -10 15 0" fill="#e8a838" opacity="0.6"/>
      <!-- 豆萁（秸秆） -->
      <line x1="-25" y1="5" x2="-20" y2="-5" stroke="#5a4a2a" stroke-width="2"/>
      <line x1="-15" y1="8" x2="-10" y2="-2" stroke="#5a4a2a" stroke-width="2"/>
      <line x1="10" y1="8" x2="15" y2="-2" stroke="#5a4a2a" stroke-width="2"/>
      <line x1="20" y1="5" x2="25" y2="-5" stroke="#5a4a2a" stroke-width="2"/>
    </g>
    <!-- 标注 -->
    <rect x="-70" y="65" width="140" height="28" fill="#fff6df" stroke="#e07856" stroke-width="1.5" rx="4"/>
    <text x="0" y="84" text-anchor="middle" font-family="serif" font-size="12" fill="#e07856">萁燃豆泣·同根相煎</text>
  </g>

  <!-- 右侧：七步成诗 -->
  <g transform="translate(580, 340)">
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#4a90b8">七步成诗</text>
    <!-- 曹植 -->
    <g transform="translate(0, -50)">
      <circle cx="0" cy="0" r="16" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
      <path d="M-10 -6 Q0 -14 10 -6" fill="none" stroke="#2a2a2a" stroke-width="2"/>
      <circle cx="-5" cy="-2" r="1.5" fill="#2a2a2a"/>
      <circle cx="5" cy="-2" r="1.5" fill="#2a2a2a"/>
      <path d="M-3 5 Q0 3 3 5" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-16 16 L-20 55 L20 55 L16 16 Z" fill="#4a4060" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <!-- 七步脚印 -->
    <g transform="translate(0, 30)">
      <ellipse cx="-60" cy="0" rx="6" ry="3" fill="#c8843a" opacity="0.4"/>
      <ellipse cx="-40" cy="5" rx="6" ry="3" fill="#c8843a" opacity="0.5"/>
      <ellipse cx="-20" cy="0" rx="6" ry="3" fill="#c8843a" opacity="0.6"/>
      <ellipse cx="0" cy="5" rx="6" ry="3" fill="#c8843a" opacity="0.7"/>
      <ellipse cx="20" cy="0" rx="6" ry="3" fill="#c8843a" opacity="0.8"/>
      <ellipse cx="40" cy="5" rx="6" ry="3" fill="#c8843a" opacity="0.9"/>
      <ellipse cx="60" cy="0" rx="6" ry="3" fill="#c8843a"/>
      <!-- 步数标注 -->
      <text x="-60" y="20" text-anchor="middle" font-family="serif" font-size="9" fill="#c8843a">1</text>
      <text x="-40" y="25" text-anchor="middle" font-family="serif" font-size="9" fill="#c8843a">2</text>
      <text x="-20" y="20" text-anchor="middle" font-family="serif" font-size="9" fill="#c8843a">3</text>
      <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="9" fill="#c8843a">4</text>
      <text x="20" y="20" text-anchor="middle" font-family="serif" font-size="9" fill="#c8843a">5</text>
      <text x="40" y="25" text-anchor="middle" font-family="serif" font-size="9" fill="#c8843a">6</text>
      <text x="60" y="20" text-anchor="middle" font-family="serif" font-size="9" fill="#c8843a">7</text>
    </g>
    <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">七步之内·悲愤成诗</text>
  </g>

  <!-- 底部说明 -->
  <rect x="100" y="510" width="600" height="55" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6" opacity="0.8"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">豆秸和豆子同根而生，豆秸却当柴烧煮豆子——</text>
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">亲兄弟本自同根生，相煎何太急？</text>
</svg>
