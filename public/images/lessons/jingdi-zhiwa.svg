<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">井底之蛙</text>
  <!-- 井壁 -->
  <ellipse cx="400" cy="300" rx="180" ry="220" fill="none" stroke="#8d5a36" stroke-width="6"/>
  <ellipse cx="400" cy="300" rx="160" ry="200" fill="none" stroke="#c8843a" stroke-width="3"/>
  <!-- 井底水面 -->
  <ellipse cx="400" cy="480" rx="140" ry="30" fill="#a8d0e8" opacity="0.5"/>
  <!-- 井口圆形天空 -->
  <circle cx="400" cy="120" r="90" fill="#a8d0e8"/>
  <circle cx="400" cy="120" r="90" fill="none" stroke="#7ab8d8" stroke-width="3"/>
  <!-- 云朵 -->
  <ellipse cx="370" cy="100" rx="25" ry="12" fill="#fff" opacity="0.7"/>
  <ellipse cx="420" cy="130" rx="20" ry="10" fill="#fff" opacity="0.6"/>
  <!-- 青蛙 -->
  <ellipse cx="400" cy="440" rx="40" ry="28" fill="#6a8d3f"/>
  <ellipse cx="380" cy="425" rx="12" ry="14" fill="#6a8d3f"/>
  <ellipse cx="420" cy="425" rx="12" ry="14" fill="#6a8d3f"/>
  <circle cx="380" cy="422" r="6" fill="#fff"/>
  <circle cx="420" cy="422" r="6" fill="#fff"/>
  <circle cx="380" cy="424" r="3" fill="#1a1a2e"/>
  <circle cx="420" cy="424" r="3" fill="#1a1a2e"/>
  <path d="M385 445 Q400 455 415 445" fill="none" stroke="#4a6a2f" stroke-width="2"/>
  <!-- 草 -->
  <path d="M310 470 Q315 450 320 470" fill="none" stroke="#6a8d3f" stroke-width="2"/>
  <path d="M480 470 Q485 455 490 470" fill="none" stroke="#6a8d3f" stroke-width="2"/>
</svg>
