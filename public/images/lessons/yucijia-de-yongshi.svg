<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="孩子吃鱼卡到刺去看医生的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">鱼刺卡的勇士</text>
  <line x1="310" y1="58" x2="490" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 左：饭桌吃鱼 -->
  <rect x="30" y="80" width="350" height="420" rx="10" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" opacity="0.5"/>
  <text x="205" y="110" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">饭桌上卡了刺</text>

  <!-- 桌子 -->
  <rect x="70" y="320" width="270" height="14" rx="3" fill="#8d5a36"/>
  <rect x="80" y="334" width="8" height="80" fill="#8d5a36"/>
  <rect x="322" y="334" width="8" height="80" fill="#8d5a36"/>
  <!-- 盘子里的鱼 -->
  <ellipse cx="205" cy="316" rx="70" ry="22" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <g transform="translate(205,316)">
    <path d="M-50 0 Q-30 -12 0 -10 Q30 -12 50 0 Q30 12 0 10 Q-30 12 -50 0 Z" fill="#a8d0e8" stroke="#4a8aaa" stroke-width="1.5"/>
    <path d="M-50 0 L-62 -10 L-62 10 Z" fill="#a8d0e8" stroke="#4a8aaa" stroke-width="1.5"/>
    <circle cx="35" cy="-3" r="2.5" fill="#7a3b14"/>
    <!-- 鱼刺 -->
    <g stroke="#fff6df" stroke-width="1.5">
      <line x1="-30" y1="-6" x2="-30" y2="6"/>
      <line x1="-15" y1="-8" x2="-15" y2="8"/>
      <line x1="0" y1="-9" x2="0" y2="9"/>
      <line x1="15" y1="-8" x2="15" y2="8"/>
    </g>
  </g>

  <!-- 孩子（捂脖子） -->
  <g transform="translate(205,230)">
    <circle cx="0" cy="0" r="26" fill="#e8c4a0"/>
    <!-- 痛苦表情 -->
    <path d="M-10 -6 Q-6 -10 -2 -6" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M2 -6 Q6 -10 10 -6" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <path d="M-8 8 Q0 4 8 8" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 捂脖子 -->
    <ellipse cx="-18" cy="30" rx="10" ry="8" fill="#e8c4a0"/>
    <ellipse cx="18" cy="30" rx="10" ry="8" fill="#e8c4a0"/>
    <!-- 身体 -->
    <path d="M-22 26 L-30 80 L30 80 L22 26 Z" fill="#c84a3a"/>
  </g>
  <!-- 痛感符号 -->
  <text x="250" y="210" font-family="serif" font-size="20" fill="#c84a3a">!</text>
  <text x="160" y="210" font-family="serif" font-size="20" fill="#c84a3a">!</text>

  <!-- 土办法（打叉） -->
  <g transform="translate(110,400)">
    <rect x="-50" y="-14" width="100" height="28" rx="4" fill="#fff6df" stroke="#c84a3a" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">吞饭团 ✗</text>
  </g>
  <g transform="translate(300,400)">
    <rect x="-50" y="-14" width="100" height="28" rx="4" fill="#fff6df" stroke="#c84a3a" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">喝醋 ✗</text>
  </g>

  <!-- 右：医院取刺 -->
  <rect x="420" y="80" width="350" height="420" rx="10" fill="#e8f0e6" opacity="0.5"/>
  <text x="595" y="110" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">医院一夹就好</text>

  <!-- 医生 -->
  <g transform="translate(540,250)">
    <!-- 白大褂 -->
    <path d="M-30 30 L-40 120 L40 120 L30 30 Z" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="24" fill="#e8c4a0"/>
    <!-- 口罩 -->
    <rect x="-14" y="2" width="28" height="14" rx="3" fill="#a8d0e8" stroke="#7a3b14" stroke-width="1"/>
    <!-- 眼睛 -->
    <circle cx="-8" cy="-6" r="2.5" fill="#7a3b14"/>
    <circle cx="8" cy="-6" r="2.5" fill="#7a3b14"/>
    <!-- 听诊器 -->
    <path d="M-10 30 Q-20 50 -14 60" fill="none" stroke="#4a8aaa" stroke-width="2"/>
    <circle cx="-14" cy="62" r="5" fill="#4a8aaa"/>
  </g>
  <!-- 医生举着镊子 -->
  <path d="M565 250 Q600 230 640 220" fill="none" stroke="#8d8d8d" stroke-width="3" stroke-linecap="round"/>
  <path d="M636 216 L644 218 M636 224 L644 222" stroke="#8d8d8d" stroke-width="2"/>

  <!-- 病人张嘴 -->
  <g transform="translate(660,260)">
    <circle cx="0" cy="0" r="22" fill="#e8c4a0"/>
    <ellipse cx="0" cy="8" rx="10" ry="7" fill="#3a2a1a"/>
    <!-- 嘴里的鱼刺 -->
    <path d="M-2 6 L8 -2" stroke="#fff6df" stroke-width="2"/>
    <path d="M0 8 L6 0" stroke="#e8a838" stroke-width="1.5"/>
  </g>

  <!-- 灯光 -->
  <path d="M640 180 L660 250 L680 180 Z" fill="#fff6df" opacity="0.3"/>

  <!-- 对勾 -->
  <g transform="translate(595,400)">
    <rect x="-60" y="-14" width="120" height="28" rx="4" fill="#fff6df" stroke="#6a8d3f" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="12" fill="#4a6a2f">找医生取刺 ✓</text>
  </g>

  <!-- 中间箭头 -->
  <path d="M385 290 L415 290" stroke="#c84a3a" stroke-width="3"/>
  <path d="M408 282 L420 290 L408 298" fill="none" stroke="#c84a3a" stroke-width="3"/>

  <!-- 底部说明 -->
  <rect x="40" y="528" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="553" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">卡了鱼刺别瞎折腾，吞饭喝醋都不对——找医生，一夹就好。</text>
</svg>
