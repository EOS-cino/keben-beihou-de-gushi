<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="春雨落在嫩芽屋檐与小河上的清新场景">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 阴沉天空 -->
  <rect x="0" y="0" width="800" height="300" fill="#9fb0bc" opacity="0.28"/>
  <!-- 雨丝 -->
  <g stroke="#4a90b8" stroke-width="1.5" opacity="0.45" stroke-linecap="round">
    <line x1="100" y1="40" x2="92" y2="80"/>
    <line x1="180" y1="60" x2="172" y2="100"/>
    <line x1="260" y1="30" x2="252" y2="70"/>
    <line x1="340" y1="50" x2="332" y2="90"/>
    <line x1="420" y1="40" x2="412" y2="80"/>
    <line x1="500" y1="60" x2="492" y2="100"/>
    <line x1="580" y1="35" x2="572" y2="75"/>
    <line x1="660" y1="55" x2="652" y2="95"/>
    <line x1="740" y1="40" x2="732" y2="80"/>
    <line x1="140" y1="120" x2="132" y2="160"/>
    <line x1="300" y1="130" x2="292" y2="170"/>
    <line x1="480" y1="120" x2="472" y2="160"/>
    <line x1="640" y1="130" x2="632" y2="170"/>
  </g>
  <!-- 远山 -->
  <path d="M0 280 Q200 240 400 270 Q600 245 800 275 L800 320 L0 320 Z" fill="#9fc8b4" opacity="0.4"/>
  <!-- 屋檐 -->
  <g transform="translate(180 250)">
    <path d="M-90 0 L0 -40 L90 0 L80 4 L0 -34 L-80 4 Z" fill="#e07856"/>
    <rect x="-72" y="0" width="144" height="50" fill="#f4e4c4" stroke="#8d5a36" stroke-width="2"/>
    <rect x="-20" y="14" width="40" height="36" fill="#8d5a36"/>
    <!-- 檐角滴水 -->
    <ellipse cx="-80" cy="6" rx="4" ry="6" fill="#4a90b8" opacity="0.7"/>
    <ellipse cx="80" cy="6" rx="4" ry="6" fill="#4a90b8" opacity="0.7"/>
    <circle cx="-80" cy="24" r="3" fill="#4a90b8" opacity="0.6"/>
    <circle cx="80" cy="24" r="3" fill="#4a90b8" opacity="0.6"/>
    <circle cx="-80" cy="42" r="4" fill="#4a90b8" opacity="0.7"/>
  </g>
  <!-- 水洼涟漪 -->
  <g transform="translate(100 340)" stroke="#4a90b8" fill="none" opacity="0.5">
    <ellipse cx="0" cy="0" rx="20" ry="5" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="12" ry="3" stroke-width="1"/>
  </g>
  <!-- 嫩芽小草 -->
  <g transform="translate(420 330)">
    <path d="M0 0 Q-2 -28 -10 -42" stroke="#2d6a4f" stroke-width="3" fill="none"/>
    <path d="M0 0 Q2 -28 10 -42" stroke="#2d6a4f" stroke-width="3" fill="none"/>
    <ellipse cx="-10" cy="-42" rx="6" ry="10" fill="#2d6a4f" opacity="0.8"/>
    <ellipse cx="10" cy="-42" rx="6" ry="10" fill="#2d6a4f" opacity="0.8"/>
    <!-- 雨滴落在芽上 -->
    <circle cx="-10" cy="-30" r="2.5" fill="#4a90b8" opacity="0.8"/>
    <circle cx="10" cy="-36" r="2" fill="#4a90b8" opacity="0.8"/>
  </g>
  <g transform="translate(380 335)">
    <path d="M0 0 Q-1 -20 -6 -30" stroke="#2d6a4f" stroke-width="2.5" fill="none"/>
    <ellipse cx="-6" cy="-30" rx="4" ry="7" fill="#3d8a5f" opacity="0.8"/>
  </g>
  <g transform="translate(460 335)">
    <path d="M0 0 Q1 -22 7 -32" stroke="#2d6a4f" stroke-width="2.5" fill="none"/>
    <ellipse cx="7" cy="-32" rx="4" ry="7" fill="#3d8a5f" opacity="0.8"/>
  </g>
  <!-- 小河 -->
  <path d="M0 380 Q400 365 800 380 L800 520 L0 520 Z" fill="#4a90b8" opacity="0.3"/>
  <g stroke="#4a90b8" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M80 420 Q160 416 240 420"/>
    <path d="M360 440 Q440 436 520 440"/>
    <path d="M600 430 Q680 426 760 430"/>
  </g>
  <!-- 河面涟漪 -->
  <g transform="translate(300 450)" stroke="#fef9ed" fill="none" opacity="0.6">
    <ellipse cx="0" cy="0" rx="16" ry="4" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="8" ry="2" stroke-width="1"/>
  </g>
  <g transform="translate(540 470)" stroke="#fef9ed" fill="none" opacity="0.6">
    <ellipse cx="0" cy="0" rx="14" ry="3.5" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="7" ry="2" stroke-width="1"/>
  </g>
  <!-- 鸭子 -->
  <g transform="translate(640 430)">
    <ellipse cx="0" cy="0" rx="16" ry="9" fill="#e8a838" opacity="0.85"/>
    <circle cx="14" cy="-6" r="7" fill="#e8a838" opacity="0.85"/>
    <path d="M20 -6 L26 -5 L20 -3 Z" fill="#e07856"/>
    <circle cx="16" cy="-7" r="1" fill="#2a2a2a"/>
  </g>
  <!-- 雨滴音符 -->
  <text x="250" y="200" font-family="serif" font-size="14" fill="#4a90b8" opacity="0.7">嗒嗒</text>
  <text x="560" y="210" font-family="serif" font-size="14" fill="#4a90b8" opacity="0.7">滴答</text>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#2d6a4f">春雨的歌</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">沙沙沙，春雨落下来，给大地唱一首醒来的歌</text>
</svg>
