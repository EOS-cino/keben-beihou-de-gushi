<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="斑驳老屋木门石阶与青苔的怀旧场景">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空 -->
  <rect x="0" y="0" width="800" height="200" fill="#4a90b8" opacity="0.1"/>
  <!-- 远山 -->
  <path d="M0 180 Q200 150 400 175 Q600 155 800 178 L800 210 L0 210 Z" fill="#9fc8b4" opacity="0.4"/>
  <!-- 地面 -->
  <rect x="0" y="450" width="800" height="150" fill="#8d6f47" opacity="0.3"/>
  <!-- 老房子主体 -->
  <g transform="translate(400 350)">
    <!-- 屋顶(飞檐) -->
    <path d="M-180 -60 Q-160 -120 0 -140 Q160 -120 180 -60 L165 -54 Q150 -110 0 -128 Q-150 -110 -165 -54 Z" fill="#e07856"/>
    <path d="M-180 -60 L-200 -50 L-175 -48 Z" fill="#c06540"/>
    <path d="M180 -60 L200 -50 L175 -48 Z" fill="#c06540"/>
    <!-- 瓦片纹理 -->
    <g stroke="#c06540" stroke-width="1.5" fill="none" opacity="0.6">
      <path d="M-160 -100 Q0 -118 160 -100"/>
      <path d="M-150 -84 Q0 -100 150 -84"/>
      <path d="M-140 -68 Q0 -82 140 -68"/>
    </g>
    <!-- 墙(土坯) -->
    <rect x="-150" y="-54" width="300" height="160" fill="#e8d4a8" stroke="#8d5a36" stroke-width="2.5"/>
    <!-- 土坯纹理 -->
    <g stroke="#8d6f47" stroke-width="0.8" opacity="0.4" fill="none">
      <line x1="-150" y1="-20" x2="150" y2="-20"/>
      <line x1="-150" y1="14" x2="150" y2="14"/>
      <line x1="-150" y1="48" x2="150" y2="48"/>
      <line x1="-150" y1="82" x2="150" y2="82"/>
      <line x1="-100" y1="-54" x2="-100" y2="106"/>
      <line x1="-50" y1="-54" x2="-50" y2="106"/>
      <line x1="0" y1="-54" x2="0" y2="106"/>
      <line x1="50" y1="-54" x2="50" y2="106"/>
      <line x1="100" y1="-54" x2="100" y2="106"/>
    </g>
    <!-- 裂纹(时间脚印) -->
    <g stroke="#8d5a36" stroke-width="1.2" fill="none" opacity="0.5">
      <path d="M-120 -40 Q-110 -20 -118 0 Q-108 20 -116 50"/>
      <path d="M120 -30 Q112 -10 120 10 Q110 30 118 60"/>
    </g>
    <!-- 木门(吱呀) -->
    <rect x="-40" y="-10" width="80" height="92" fill="#5a3a1a" stroke="#3a2210" stroke-width="2"/>
    <g stroke="#3a2210" stroke-width="1" opacity="0.6">
      <line x1="-40" y1="20" x2="40" y2="20"/>
      <line x1="-40" y1="50" x2="40" y2="50"/>
      <line x1="0" y1="-10" x2="0" y2="82"/>
    </g>
    <circle cx="24" cy="40" r="3" fill="#e8a838"/>
    <!-- 门槛(磨亮) -->
    <rect x="-44" y="82" width="88" height="8" fill="#3a2210"/>
    <ellipse cx="0" cy="86" rx="30" ry="2" fill="#e8a838" opacity="0.6"/>
    <!-- 窗 -->
    <rect x="-120" y="-30" width="50" height="44" fill="#4a90b8" opacity="0.5" stroke="#8d5a36" stroke-width="2"/>
    <line x1="-95" y1="-30" x2="-95" y2="14" stroke="#8d5a36" stroke-width="1.5"/>
    <line x1="-120" y1="-8" x2="-70" y2="-8" stroke="#8d5a36" stroke-width="1.5"/>
    <rect x="70" y="-30" width="50" height="44" fill="#4a90b8" opacity="0.5" stroke="#8d5a36" stroke-width="2"/>
    <line x1="95" y1="-30" x2="95" y2="14" stroke="#8d5a36" stroke-width="1.5"/>
    <line x1="70" y1="-8" x2="120" y2="-8" stroke="#8d5a36" stroke-width="1.5"/>
  </g>
  <!-- 柱础(石墩花纹) -->
  <g transform="translate(220 452)">
    <ellipse cx="0" cy="0" rx="22" ry="8" fill="#c8c0b0"/>
    <rect x="-20" y="-12" width="40" height="14" fill="#b8b0a0" stroke="#8d6f47" stroke-width="1.5"/>
    <circle cx="0" cy="-5" r="4" fill="none" stroke="#8d6f47" stroke-width="1" opacity="0.6"/>
  </g>
  <g transform="translate(580 452)">
    <ellipse cx="0" cy="0" rx="22" ry="8" fill="#c8c0b0"/>
    <rect x="-20" y="-12" width="40" height="14" fill="#b8b0a0" stroke="#8d6f47" stroke-width="1.5"/>
    <circle cx="0" cy="-5" r="4" fill="none" stroke="#8d6f47" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- 青苔 -->
  <g fill="#2d6a4f" opacity="0.5">
    <ellipse cx="180" cy="470" rx="20" ry="6"/>
    <ellipse cx="620" cy="470" rx="22" ry="7"/>
    <ellipse cx="300" cy="490" rx="14" ry="4"/>
    <ellipse cx="500" cy="490" rx="16" ry="5"/>
  </g>
  <!-- 老树 -->
  <g transform="translate(110 420)">
    <rect x="-5" y="0" width="10" height="60" fill="#5a3a1a"/>
    <path d="M0 0 Q-20 -10 -34 -28" stroke="#5a3a1a" stroke-width="4" fill="none"/>
    <path d="M0 0 Q20 -10 34 -28" stroke="#5a3a1a" stroke-width="4" fill="none"/>
    <circle cx="0" cy="-18" r="28" fill="#2d6a4f" opacity="0.5"/>
  </g>
  <!-- 标注 -->
  <text x="270" y="270" font-family="serif" font-size="11" fill="#7a3b14" opacity="0.7">飞檐</text>
  <text x="460" y="380" font-family="serif" font-size="11" fill="#7a3b14" opacity="0.7">柱础</text>
  <text x="180" y="500" font-family="serif" font-size="11" fill="#2d6a4f" opacity="0.7">青苔</text>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#5a3a1a">老房子</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">墙上的裂纹是时间的脚印，每一道都讲着故事</text>
</svg>
