<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="夏日雷阵雨后彩虹挂天边的自然插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">夏日的雨</text>
  <line x1="350" y1="56" x2="450" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——来得急，去得快，淋出一道彩虹</text>

  <!-- 乌云与雷 -->
  <g transform="translate(220, 150)">
    <ellipse cx="0" cy="0" rx="80" ry="34" fill="#7a3b14" opacity="0.6"/>
    <ellipse cx="-50" cy="10" rx="45" ry="22" fill="#7a3b14" opacity="0.5"/>
    <ellipse cx="55" cy="8" rx="48" ry="24" fill="#7a3b14" opacity="0.5"/>
    <!-- 闪电 -->
    <path d="M0 30 L-12 55 L-2 55 L-14 80" fill="none" stroke="#e8a838" stroke-width="3.5" stroke-linecap="round"/>
    <text x="-30" y="100" font-family="serif" font-size="11" fill="#c84a3a">轰隆！一个响雷</text>
  </g>

  <!-- 雨帘 -->
  <g stroke="#4a90b8" stroke-width="2" opacity="0.6" stroke-linecap="round">
    <line x1="160" y1="200" x2="150" y2="250"/>
    <line x1="190" y1="195" x2="180" y2="248"/>
    <line x1="260" y1="210" x2="252" y2="262"/>
    <line x1="300" y1="200" x2="292" y2="255"/>
    <line x1="340" y1="215" x2="332" y2="268"/>
    <line x1="160" y1="270" x2="150" y2="320"/>
    <line x1="220" y1="275" x2="212" y2="325"/>
    <line x1="290" y1="265" x2="282" y2="318"/>
  </g>

  <!-- 彩虹 -->
  <g transform="translate(560, 320)" fill="none" stroke-width="9">
    <path d="M-110 0 A110 110 0 0 1 110 0" stroke="#c84a3a"/>
    <path d="M-100 0 A100 100 0 0 1 100 0" stroke="#e07856"/>
    <path d="M-90 0 A90 90 0 0 1 90 0" stroke="#e8a838"/>
    <path d="M-80 0 A80 80 0 0 1 80 0" stroke="#6a8d3f"/>
    <path d="M-70 0 A70 70 0 0 1 70 0" stroke="#4a90b8"/>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">雨后彩虹，七色桥</text>
  </g>

  <!-- 重新出来的太阳 -->
  <g transform="translate(680, 130)">
    <circle cx="0" cy="0" r="22" fill="#e8a838" opacity="0.5"/>
    <circle cx="0" cy="0" r="15" fill="#e8a838" stroke="#c8843a" stroke-width="1.5"/>
  </g>

  <!-- 地面 -->
  <rect x="0" y="380" width="800" height="70" fill="#6a8d3f" opacity="0.3"/>

  <!-- 洗亮的树 -->
  <g transform="translate(120, 320)">
    <rect x="-6" y="0" width="12" height="70" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.2"/>
    <circle cx="0" cy="-10" r="28" fill="#2d6a4f" stroke="#4a6a2f" stroke-width="1.5"/>
    <circle cx="-18" cy="0" r="18" fill="#6a8d3f"/>
    <circle cx="18" cy="-2" r="18" fill="#6a8d3f"/>
    <text x="0" y="85" text-anchor="middle" font-family="serif" font-size="10" fill="#2d6a4f">树叶洗得绿亮</text>
  </g>

  <!-- 水洼 -->
  <g transform="translate(400, 415)">
    <ellipse cx="0" cy="0" rx="70" ry="12" fill="#4a90b8" opacity="0.5"/>
    <text x="0" y="-18" text-anchor="middle" font-family="serif" font-size="10" fill="#4a90b8">地上的水洼</text>
  </g>

  <!-- 三个阶段标注 -->
  <g transform="translate(0, 470)" font-family="serif" font-size="12">
    <rect x="60" y="0" width="180" height="30" rx="6" fill="#fef9ed" stroke="#c84a3a" stroke-width="1.2"/>
    <text x="150" y="20" text-anchor="middle" fill="#c84a3a">闷 → 猛 → 爽</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 530)">
    <rect x="-300" y="0" width="600" height="50" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">夏日的雨像个急性子的孩子，来得急去得快</text>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">暴风雨后常有彩虹，难过的后面有希望</text>
  </g>
</svg>
