<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="古诗意境中秋山红叶金黄稻田的诗词插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">秋色</text>
  <line x1="370" y1="56" x2="430" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——一首古诗里的满眼秋光</text>

  <!-- 天空 -->
  <rect x="0" y="90" width="800" height="220" fill="#4a90b8" opacity="0.08"/>

  <!-- 远山 -->
  <polygon points="0,320 200,200 400,320" fill="#6a8d3f" opacity="0.45"/>
  <polygon points="250,320 480,180 700,320" fill="#4a90b8" opacity="0.35"/>

  <!-- 大雁南飞 -->
  <g transform="translate(180, 140)" fill="#7a3b14">
    <path d="M0 0 Q-10 -6 -16 -2 Q-10 1 0 4 Q10 1 16 -2 Q10 -6 0 0"/>
    <text x="0" y="-12" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">雁阵"人"字</text>
  </g>
  <g transform="translate(230, 155)" fill="#7a3b14" opacity="0.8">
    <path d="M0 0 Q-8 -5 -13 -2 Q-8 1 0 3 Q8 1 13 -2 Q8 -5 0 0"/>
  </g>
  <g transform="translate(280, 148)" fill="#7a3b14" opacity="0.8">
    <path d="M0 0 Q-8 -5 -13 -2 Q-8 1 0 3 Q8 1 13 -2 Q8 -5 0 0"/>
  </g>

  <!-- 红叶枫树 -->
  <g transform="translate(180, 280)">
    <rect x="-7" y="0" width="14" height="80" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.2"/>
    <circle cx="-18" cy="-5" r="20" fill="#c84a3a"/>
    <circle cx="15" cy="-10" r="22" fill="#e07856"/>
    <circle cx="0" cy="-25" r="20" fill="#c84a3a"/>
    <circle cx="-10" cy="10" r="14" fill="#e8a838"/>
    <text x="0" y="-50" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">霜叶红于二月花</text>
  </g>

  <!-- 飘落的红叶 -->
  <g transform="translate(280, 200)">
    <path d="M0 0 Q6 -3 9 3 Q6 6 0 4 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="0.8"/>
    <path d="M40 30 Q46 27 49 33 Q46 36 40 34 Z" fill="#e07856" stroke="#7a3b14" stroke-width="0.8"/>
  </g>

  <!-- 金黄稻田 -->
  <g transform="translate(500, 300)">
    <rect x="-90" y="0" width="180" height="60" fill="#e8a838" opacity="0.5"/>
    <path d="M-80 0 Q-60 -25 -40 0" fill="none" stroke="#c8843a" stroke-width="2"/>
    <path d="M-50 0 Q-30 -28 -10 0" fill="none" stroke="#c8843a" stroke-width="2"/>
    <path d="M-20 0 Q0 -26 20 0" fill="none" stroke="#c8843a" stroke-width="2"/>
    <path d="M20 0 Q40 -28 60 0" fill="none" stroke="#c8843a" stroke-width="2"/>
    <path d="M55 0 Q70 -24 80 0" fill="none" stroke="#c8843a" stroke-width="2"/>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">稻穗黄，铺一地金子</text>
  </g>

  <!-- 青江 -->
  <g transform="translate(0, 360)">
    <rect x="0" y="0" width="800" height="50" fill="#4a90b8" opacity="0.35"/>
    <path d="M0 20 Q200 14 400 20 Q600 26 800 20" fill="none" stroke="#4a90b8" stroke-width="1.5"/>
    <text x="650" y="15" font-family="serif" font-size="11" fill="#4a90b8">秋风凉的江</text>
  </g>

  <!-- 诗句竖排 -->
  <g transform="translate(60, 130)" font-family="serif" fill="#7a3b14">
    <rect x="-8" y="-20" width="40" height="160" rx="4" fill="#fef9ed" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
    <text x="20" y="0" font-size="15" text-anchor="middle">霜</text>
    <text x="20" y="25" font-size="15" text-anchor="middle">叶</text>
    <text x="20" y="50" font-size="15" text-anchor="middle">红</text>
    <text x="20" y="75" font-size="15" text-anchor="middle">稻</text>
    <text x="20" y="100" font-size="15" text-anchor="middle">黄</text>
    <text x="20" y="125" font-size="15" text-anchor="middle">雁</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 470)">
    <rect x="-300" y="0" width="600" height="70" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">先读颜色，再读景物，最后读诗人的心</text>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">秋还是那个秋，诗人的心不一样，秋天就不一样</text>
  </g>
</svg>
