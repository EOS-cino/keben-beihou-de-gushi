<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="黄山奇石景观插画，猴子观海、仙桃石等奇石">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">黄山奇石</text>
  <line x1="340" y1="56" x2="460" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="80" width="800" height="300" fill="#d6ecf7" opacity="0.4"/>
  <!-- 云海 -->
  <ellipse cx="200" cy="380" rx="120" ry="25" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="250" cy="370" rx="80" ry="18" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="550" cy="385" rx="140" ry="28" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="600" cy="375" rx="90" ry="20" fill="#ffffff" opacity="0.7"/>

  <!-- 远山 -->
  <path d="M0 380 L100 250 L180 320 L280 200 L380 300 L480 220 L580 310 L680 240 L800 340 L800 400 L0 400 Z" fill="#a8b8c8" opacity="0.4"/>

  <!-- 仙桃石（左） -->
  <g transform="translate(160,300)">
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">仙桃石</text>
    <!-- 石盘 -->
    <ellipse cx="0" cy="40" rx="55" ry="12" fill="#8d7a6a"/>
    <rect x="-50" y="30" width="100" height="15" fill="#a89888" rx="2"/>
    <!-- 桃形巨石 -->
    <path d="M0 -40 Q-40 -35 -45 -10 Q-50 20 -30 35 Q0 45 30 35 Q50 20 45 -10 Q40 -35 0 -40 Z" fill="#c8a878" stroke="#8d5a36" stroke-width="2"/>
    <!-- 桃尖 -->
    <path d="M0 -40 Q-5 -50 0 -55 Q5 -50 0 -40" fill="#c8a878" stroke="#8d5a36" stroke-width="1.5"/>
    <!-- 高光 -->
    <ellipse cx="-15" cy="-10" rx="10" ry="15" fill="#e0c898" opacity="0.5"/>
  </g>

  <!-- 猴子观海（中） -->
  <g transform="translate(400,280)">
    <text x="0" y="-80" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">猴子观海</text>
    <!-- 山头基座 -->
    <path d="M-50 60 L-40 20 L-30 10 L30 10 L40 20 L50 60 Z" fill="#a89888" stroke="#8d5a36" stroke-width="2"/>
    <!-- 猴身 -->
    <ellipse cx="0" cy="-10" rx="22" ry="28" fill="#8d7a5a"/>
    <!-- 猴头 -->
    <circle cx="0" cy="-35" r="16" fill="#8d7a5a"/>
    <!-- 猴脸 -->
    <ellipse cx="0" cy="-30" rx="10" ry="8" fill="#c8b89a"/>
    <!-- 眼睛 -->
    <circle cx="-4" cy="-33" r="2" fill="#1a1a1a"/>
    <circle cx="4" cy="-33" r="2" fill="#1a1a1a"/>
    <!-- 前爪搭在膝上 -->
    <ellipse cx="-18" cy="5" rx="8" ry="6" fill="#8d7a5a"/>
    <ellipse cx="18" cy="5" rx="8" ry="6" fill="#8d7a5a"/>
    <!-- 注视云海 -->
    <line x1="0" y1="-33" x2="0" y2="-50" stroke="#7a3b14" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
  </g>

  <!-- 仙人指路（右） -->
  <g transform="translate(630,290)">
    <text x="0" y="-90" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">仙人指路</text>
    <!-- 峰顶基座 -->
    <path d="M-35 50 L-25 10 L25 10 L35 50 Z" fill="#a89888" stroke="#8d5a36" stroke-width="2"/>
    <!-- 仙人身体（细长石柱） -->
    <rect x="-8" y="-30" width="16" height="45" fill="#c8a878" stroke="#8d5a36" stroke-width="2" rx="3"/>
    <!-- 仙人头 -->
    <circle cx="0" cy="-38" r="10" fill="#c8a878" stroke="#8d5a36" stroke-width="2"/>
    <!-- 指路手臂 -->
    <rect x="0" y="-20" width="30" height="8" fill="#c8a878" stroke="#8d5a36" stroke-width="2" rx="3"/>
    <circle cx="32" cy="-16" r="5" fill="#c8a878" stroke="#8d5a36" stroke-width="2"/>
    <!-- 指向箭头 -->
    <path d="M40 -16 L55 -16" stroke="#c84a3a" stroke-width="2" stroke-dasharray="3,2" marker-end="url(#arrH1)"/>
  </g>

  <!-- 松树点缀 -->
  <g transform="translate(80,360)">
    <path d="M0 0 L0 -25" stroke="#4a6a2f" stroke-width="3"/>
    <path d="M0 -10 L-12 -18" stroke="#4a6a2f" stroke-width="2"/>
    <path d="M0 -15 L12 -22" stroke="#4a6a2f" stroke-width="2"/>
    <ellipse cx="-8" cy="-20" rx="6" ry="4" fill="#6a8d3f"/>
    <ellipse cx="8" cy="-24" rx="6" ry="4" fill="#6a8d3f"/>
  </g>
  <g transform="translate(720,360)">
    <path d="M0 0 L0 -25" stroke="#4a6a2f" stroke-width="3"/>
    <path d="M0 -10 L-12 -18" stroke="#4a6a2f" stroke-width="2"/>
    <path d="M0 -15 L12 -22" stroke="#4a6a2f" stroke-width="2"/>
    <ellipse cx="-8" cy="-20" rx="6" ry="4" fill="#6a8d3f"/>
    <ellipse cx="8" cy="-24" rx="6" ry="4" fill="#6a8d3f"/>
  </g>

  <!-- 太阳 -->
  <circle cx="700" cy="130" r="22" fill="#f4b942" opacity="0.8"/>

  <!-- 底部说明 -->
  <rect x="100" y="500" width="600" height="70" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <text x="400" y="525" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">黄山奇石：仙桃石、猴子观海、仙人指路、金鸡叫天都……</text>
  <text x="400" y="548" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">那些叫不出名字的奇形怪状的岩石，正等你去给它们起名字呢</text>

  <defs>
    <marker id="arrH1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#c84a3a"/>
    </marker>
  </defs>
</svg>
