<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="四格画面：春天播种、夏天除草、秋天丰收、冬天休息">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 四格分割线 -->
  <line x1="400" y1="80" x2="400" y2="560" stroke="#8d5a36" stroke-width="2" opacity="0.3"/>
  <line x1="50" y1="320" x2="750" y2="320" stroke="#8d5a36" stroke-width="2" opacity="0.3"/>
  <!-- 春 -->
  <g transform="translate(200,200)">
    <rect x="-140" y="-110" width="280" height="220" fill="#a8d0e8" opacity="0.1"/>
    <!-- 太阳 -->
    <circle cx="-100" cy="-80" r="18" fill="#f4b942" opacity="0.7"/>
    <!-- 田地 -->
    <path d="M-130 60 Q0 50 130 60 L130 100 L-130 100 Z" fill="#6a8d3f" opacity="0.5"/>
    <!-- 嫩芽 -->
    <g fill="#7ba84a">
      <path d="M-80 55 L-78 35 L-76 55 Z"/>
      <path d="M-50 58 L-48 38 L-46 58 Z"/>
      <path d="M-20 55 L-18 35 L-16 55 Z"/>
      <path d="M10 58 L12 38 L14 58 Z"/>
      <path d="M40 55 L42 35 L44 55 Z"/>
      <path d="M70 58 L72 38 L74 58 Z"/>
    </g>
    <!-- 农民播种 -->
    <g transform="translate(0,30)">
      <ellipse cx="0" cy="10" rx="10" ry="12" fill="#8d5a36"/>
      <circle cx="0" cy="-8" r="9" fill="#f4d4a8"/>
      <path d="M-8 -12 Q-10 -20 -5 -22" stroke="#2d2a24" stroke-width="2" fill="none"/>
      <path d="M8 -12 Q10 -20 5 -22" stroke="#2d2a24" stroke-width="2" fill="none"/>
      <path d="M-8 5 L-15 20" stroke="#f4d4a8" stroke-width="4"/>
      <path d="M8 5 L18 -5" stroke="#f4d4a8" stroke-width="4"/>
      <!-- 种子 -->
      <circle cx="20" cy="0" r="2" fill="#8d5a36"/>
      <circle cx="25" cy="5" r="2" fill="#8d5a36"/>
    </g>
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">春·播种</text>
  </g>
  <!-- 夏 -->
  <g transform="translate(600,200)">
    <rect x="-140" y="-110" width="280" height="220" fill="#f4b942" opacity="0.08"/>
    <!-- 烈日 -->
    <circle cx="-100" cy="-80" r="22" fill="#e07856" opacity="0.7"/>
    <g stroke="#e07856" stroke-width="2" opacity="0.5">
      <line x1="-100" y1="-110" x2="-100" y2="-120"/>
      <line x1="-100" y1="-50" x2="-100" y2="-40"/>
      <line x1="-130" y1="-80" x2="-140" y2="-80"/>
      <line x1="-70" y1="-80" x2="-60" y2="-80"/>
    </g>
    <!-- 稻田 -->
    <path d="M-130 60 Q0 50 130 60 L130 100 L-130 100 Z" fill="#6a8d3f" opacity="0.6"/>
    <!-- 稻苗 -->
    <g stroke="#4a6a2f" stroke-width="2">
      <line x1="-80" y1="55" x2="-82" y2="30"/>
      <line x1="-50" y1="58" x2="-52" y2="33"/>
      <line x1="-20" y1="55" x2="-22" y2="30"/>
      <line x1="10" y1="58" x2="8" y2="33"/>
      <line x1="40" y1="55" x2="38" y2="30"/>
      <line x1="70" y1="58" x2="68" y2="33"/>
    </g>
    <!-- 农民弯腰除草 -->
    <g transform="translate(0,35)">
      <ellipse cx="0" cy="5" rx="10" ry="8" fill="#8d5a36" transform="rotate(-20)"/>
      <circle cx="-8" cy="-5" r="8" fill="#f4d4a8"/>
      <path d="M-5 -8 Q-3 -15 0 -17" stroke="#2d2a24" stroke-width="2" fill="none"/>
      <path d="M-10 0 L-18 12" stroke="#f4d4a8" stroke-width="4"/>
      <path d="M5 5 L15 15" stroke="#f4d4a8" stroke-width="4"/>
    </g>
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">夏·除草</text>
  </g>
  <!-- 秋 -->
  <g transform="translate(200,440)">
    <rect x="-140" y="-110" width="280" height="220" fill="#f4b942" opacity="0.12"/>
    <!-- 金色稻田 -->
    <path d="M-130 60 Q0 50 130 60 L130 100 L-130 100 Z" fill="#f4b942" opacity="0.5"/>
    <!-- 金色稻穗 -->
    <g fill="#c8843a">
      <ellipse cx="-80" cy="40" rx="4" ry="12"/>
      <ellipse cx="-50" cy="42" rx="4" ry="12"/>
      <ellipse cx="-20" cy="40" rx="4" ry="12"/>
      <ellipse cx="10" cy="42" rx="4" ry="12"/>
      <ellipse cx="40" cy="40" rx="4" ry="12"/>
      <ellipse cx="70" cy="42" rx="4" ry="12"/>
    </g>
    <!-- 农民收割，笑盈盈 -->
    <g transform="translate(0,30)">
      <ellipse cx="0" cy="10" rx="10" ry="12" fill="#8d5a36"/>
      <circle cx="0" cy="-8" r="9" fill="#f4d4a8"/>
      <path d="M-8 -12 Q-10 -20 -5 -22" stroke="#2d2a24" stroke-width="2" fill="none"/>
      <path d="M8 -12 Q10 -20 5 -22" stroke="#2d2a24" stroke-width="2" fill="none"/>
      <circle cx="-4" cy="-8" r="1.5" fill="#2d2a24"/>
      <circle cx="4" cy="-8" r="1.5" fill="#2d2a24"/>
      <path d="M-4 -3 Q0 1 4 -3" stroke="#2d2a24" stroke-width="1.5" fill="none"/>
      <!-- 镰刀 -->
      <path d="M8 5 L20 -5 Q25 0 20 10" stroke="#8d5a36" stroke-width="3" fill="none"/>
    </g>
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">秋·丰收</text>
  </g>
  <!-- 冬 -->
  <g transform="translate(600,440)">
    <rect x="-140" y="-110" width="280" height="220" fill="#a8d0e8" opacity="0.15"/>
    <!-- 雪花 -->
    <g fill="#ffffff" opacity="0.8">
      <circle cx="-100" cy="-80" r="3"/>
      <circle cx="-70" cy="-60" r="2"/>
      <circle cx="-40" cy="-85" r="3"/>
      <circle cx="-10" cy="-65" r="2"/>
      <circle cx="20" cy="-80" r="3"/>
      <circle cx="50" cy="-60" r="2"/>
      <circle cx="80" cy="-85" r="3"/>
      <circle cx="100" cy="-60" r="2"/>
    </g>
    <!-- 雪地 -->
    <path d="M-130 60 Q0 50 130 60 L130 100 L-130 100 Z" fill="#ffffff" opacity="0.7"/>
    <!-- 房子 -->
    <g transform="translate(-60,30)">
      <rect x="-20" y="-15" width="40" height="30" fill="#8d5a36"/>
      <path d="M-25 -15 L0 -35 L25 -15 Z" fill="#c84a3a"/>
      <rect x="-5" y="0" width="10" height="15" fill="#7a3b14"/>
      <!-- 烟囱冒烟 -->
      <rect x="8" y="-30" width="6" height="10" fill="#8d5a36"/>
      <circle cx="11" cy="-35" r="4" fill="#ffffff" opacity="0.5"/>
      <circle cx="14" cy="-42" r="5" fill="#ffffff" opacity="0.4"/>
    </g>
    <!-- 农民围着火炉 -->
    <g transform="translate(40,40)">
      <ellipse cx="0" cy="10" rx="10" ry="12" fill="#8d5a36"/>
      <circle cx="0" cy="-8" r="9" fill="#f4d4a8"/>
      <path d="M-4 -8 Q0 -3 4 -8" stroke="#2d2a24" stroke-width="1.5" fill="none"/>
      <circle cx="-4" cy="-8" r="1.5" fill="#2d2a24"/>
      <circle cx="4" cy="-8" r="1.5" fill="#2d2a24"/>
    </g>
    <text x="0" y="-100" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">冬·休息</text>
  </g>
  <!-- 标题 -->
  <text x="400" y="45" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">田家四季歌</text>
</svg>
