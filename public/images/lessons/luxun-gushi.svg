<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="鲁迅伏案写作与童年百草园插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">鲁迅的故事</text>
  <line x1="280" y1="56" x2="520" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——从百草园的少年到拿笔的战士</text>

  <!-- 左半：童年百草园 -->
  <rect x="0" y="90" width="390" height="510" fill="#e8f0d8"/>
  <text x="195" y="115" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#4a6a2f">童年的百草园</text>

  <!-- 皂荚树 -->
  <rect x="80" y="280" width="14" height="110" fill="#8d5a36"/>
  <ellipse cx="87" cy="255" rx="45" ry="50" fill="#2d6a4f"/>
  <ellipse cx="70" cy="240" rx="28" ry="32" fill="#4a6a2f"/>
  <ellipse cx="105" cy="245" rx="32" ry="36" fill="#4a6a2f"/>

  <!-- 菜畦 -->
  <rect x="20" y="420" width="90" height="26" rx="3" fill="#6a8d3f" opacity="0.5" stroke="#4a6a2f" stroke-width="1"/>
  <rect x="120" y="420" width="90" height="26" rx="3" fill="#6a8d3f" opacity="0.5" stroke="#4a6a2f" stroke-width="1"/>
  <text x="115" y="465" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">碧绿的菜畦</text>

  <!-- 蟋蟀罐 -->
  <g transform="translate(260, 400)">
    <ellipse cx="0" cy="20" rx="28" ry="10" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-28 20 Q-28 -5 0 -8 Q28 -5 28 20" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">捉蟋蟀</text>
  </g>

  <!-- 小鲁迅 -->
  <g transform="translate(150, 470)">
    <circle cx="0" cy="-30" r="12" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-8 -38 Q0 -45 8 -38" fill="#7a3b14"/>
    <circle cx="-4" cy="-30" r="2" fill="#7a3b14"/>
    <circle cx="4" cy="-30" r="2" fill="#7a3b14"/>
    <path d="M-3 -24 Q0 -22 3 -24" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="0" cy="-5" rx="15" ry="20" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-10 15 Q-15 25 -12 35" fill="none" stroke="#c8843a" stroke-width="5" stroke-linecap="round"/>
    <path d="M10 15 Q15 25 12 35" fill="none" stroke="#c8843a" stroke-width="5" stroke-linecap="round"/>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">少年鲁迅</text>
  </g>

  <!-- 右半：伏案写作 -->
  <rect x="410" y="90" width="390" height="510" fill="#f0e0c8"/>
  <text x="605" y="115" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#8d5a36">拿笔的鲁迅</text>

  <!-- 窗户 -->
  <rect x="440" y="150" width="100" height="70" fill="#4a90b8" opacity="0.4" stroke="#7a3b14" stroke-width="2"/>
  <line x1="490" y1="150" x2="490" y2="220" stroke="#7a3b14" stroke-width="1.5"/>
  <line x1="440" y1="185" x2="540" y2="185" stroke="#7a3b14" stroke-width="1.5"/>

  <!-- 书桌 -->
  <rect x="470" y="380" width="260" height="20" fill="#8d5a36" stroke="#7a3b14" stroke-width="2"/>
  <rect x="490" y="400" width="14" height="100" fill="#8d5a36"/>
  <rect x="696" y="400" width="14" height="100" fill="#8d5a36"/>

  <!-- 书和稿纸 -->
  <rect x="540" y="360" width="90" height="22" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
  <line x1="548" y1="368" x2="622" y2="368" stroke="#7a3b14" stroke-width="0.5"/>
  <line x1="548" y1="374" x2="622" y2="374" stroke="#7a3b14" stroke-width="0.5"/>
  <rect x="500" y="365" width="40" height="16" fill="#c84a3a" stroke="#7a3b14" stroke-width="1"/>

  <!-- 毛笔 -->
  <rect x="635" y="340" width="5" height="40" fill="#7a3b14"/>
  <path d="M635 380 L637.5 392 L640 380 Z" fill="#7a3b14"/>
  <rect x="633" y="335" width="9" height="8" fill="#c8843a"/>

  <!-- 墨砚 -->
  <ellipse cx="680" cy="375" rx="18" ry="8" fill="#3a2a1a" stroke="#7a3b14" stroke-width="1.5"/>

  <!-- 鲁迅伏案 -->
  <g transform="translate(560, 320)">
    <circle cx="0" cy="0" r="18" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-14 -8 Q-4 -22 14 -8 Q16 -2 12 4" fill="#7a3b14"/>
    <circle cx="-5" cy="2" r="2" fill="#7a3b14"/>
    <circle cx="6" cy="2" r="2" fill="#7a3b14"/>
    <!-- 胡须 -->
    <path d="M-6 10 Q0 14 6 10" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-8 12 L-10 16 M0 14 L0 18 M8 12 L10 16" stroke="#7a3b14" stroke-width="1"/>
    <!-- 身体伏案 -->
    <path d="M-20 18 Q-30 40 -15 60 L25 60 Q40 40 20 18 Z" fill="#4a4a4a" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="40" y="-10" font-family="serif" font-size="11" fill="#7a3b14">写文章</text>
  </g>

  <!-- 箭头 -->
  <path d="M395 350 L415 350" stroke="#c8843a" stroke-width="4" fill="none"/>
  <path d="M415 350 L408 343 L408 357 Z" fill="#c8843a"/>
  <text x="405" y="335" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">成长</text>
</svg>
