<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="弯弯的月亮像小船，孩子在月船上仰望星空的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">小小的船</text>

  <!-- 夜空背景 -->
  <rect x="0" y="70" width="800" height="530" fill="#1f3a5f"/>
  <rect x="0" y="70" width="800" height="530" fill="#2a4a6f" opacity="0.5"/>

  <!-- 星星 -->
  <g fill="#fef9ed">
    <circle cx="120" cy="130" r="3"/>
    <circle cx="200" cy="100" r="2.5"/>
    <circle cx="280" cy="160" r="3.5"/>
    <circle cx="360" cy="120" r="2"/>
    <circle cx="520" cy="150" r="3"/>
    <circle cx="620" cy="110" r="2.5"/>
    <circle cx="700" cy="170" r="3"/>
    <circle cx="160" cy="220" r="2.5"/>
    <circle cx="660" cy="240" r="3"/>
    <circle cx="100" cy="300" r="2"/>
    <circle cx="730" cy="320" r="2.5"/>
    <circle cx="240" cy="280" r="2"/>
    <circle cx="580" cy="300" r="2.5"/>
  </g>
  <!-- 闪闪的大星星 -->
  <g fill="#fef9ed">
    <path d="M150 200 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z"/>
    <path d="M640 180 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/>
    <path d="M420 250 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/>
  </g>

  <!-- 弯弯的月亮（像小船） -->
  <g transform="translate(400,360)">
    <!-- 月亮船身 -->
    <path d="M-160 0 Q-140 70 0 75 Q140 70 160 0 Q120 -20 0 -22 Q-120 -20 -160 0 Z" fill="#f4d97a"/>
    <path d="M-160 0 Q-140 70 0 75 Q140 70 160 0" fill="none" stroke="#c8843a" stroke-width="3"/>
    <!-- 月亮船内 -->
    <path d="M-140 5 Q-120 55 0 58 Q120 55 140 5 Q105 -8 0 -10 Q-105 -8 -140 5 Z" fill="#fef0b8"/>
    <!-- 桅杆 -->
    <line x1="0" y1="-22" x2="0" y2="-120" stroke="#8d5a36" stroke-width="4"/>
    <!-- 小帆 -->
    <path d="M0 -110 L60 -85 L0 -60 Z" fill="#fef9ed" stroke="#8d5a36" stroke-width="2"/>
  </g>

  <!-- 坐在月亮船里的孩子 -->
  <g transform="translate(400,345)">
    <!-- 身体 -->
    <ellipse cx="0" cy="10" rx="22" ry="20" fill="#c84a3a"/>
    <!-- 头 -->
    <circle cx="0" cy="-18" r="16" fill="#f0c8a0"/>
    <!-- 头发 -->
    <path d="M-16 -22 Q-14 -34 0 -34 Q14 -34 16 -22 Q12 -28 0 -28 Q-12 -28 -16 -22 Z" fill="#3a2a1a"/>
    <!-- 眼睛 -->
    <circle cx="-6" cy="-18" r="2" fill="#1a1a1a"/>
    <circle cx="6" cy="-18" r="2" fill="#1a1a1a"/>
    <!-- 笑嘴 -->
    <path d="M-5 -12 Q0 -9 5 -12" fill="none" stroke="#7a3b14" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 手臂举起 -->
    <ellipse cx="-20" cy="0" rx="6" ry="14" fill="#c84a3a" transform="rotate(-30 -20 0)"/>
    <ellipse cx="20" cy="0" rx="6" ry="14" fill="#c84a3a" transform="rotate(30 20 0)"/>
  </g>

  <!-- 地面剪影 -->
  <path d="M0 600 L0 540 Q100 520 200 535 Q350 515 500 535 Q650 520 800 540 L800 600 Z" fill="#7a3b14" opacity="0.85"/>
  <!-- 小树剪影 -->
  <path d="M120 540 L120 510 M110 520 Q120 500 130 520" fill="none" stroke="#4a6a2f" stroke-width="3"/>
  <ellipse cx="120" cy="505" rx="18" ry="22" fill="#4a6a2f"/>
  <path d="M680 540 L680 515 M670 525 Q680 505 690 525" fill="none" stroke="#4a6a2f" stroke-width="3"/>
  <ellipse cx="680" cy="510" rx="16" ry="20" fill="#4a6a2f"/>

  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#fef9ed">弯弯的月儿小小的船</text>
</svg>
