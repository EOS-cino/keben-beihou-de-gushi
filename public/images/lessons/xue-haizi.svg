<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="雪孩子和小白兔在雪地里玩耍的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">雪孩子</text>
  <line x1="350" y1="56" x2="450" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 冬天天空 -->
  <rect x="0" y="80" width="800" height="300" fill="#d6ecf7" opacity="0.4"/>
  <!-- 雪花 -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="100" cy="120" r="3"/>
    <circle cx="200" cy="100" r="2.5"/>
    <circle cx="350" cy="130" r="3"/>
    <circle cx="500" cy="110" r="2.5"/>
    <circle cx="650" cy="140" r="3"/>
    <circle cx="150" cy="200" r="2"/>
    <circle cx="450" cy="190" r="2.5"/>
    <circle cx="600" cy="210" r="2"/>
    <circle cx="280" cy="160" r="2"/>
    <circle cx="720" cy="180" r="2.5"/>
  </g>
  <!-- 雪地 -->
  <path d="M0 380 Q200 360 400 375 Q600 365 800 380 L800 600 L0 600 Z" fill="#ffffff" opacity="0.8"/>
  <path d="M0 390 Q200 370 400 385 Q600 375 800 390" fill="none" stroke="#d0e0e8" stroke-width="1"/>

  <!-- 小木屋（右后） -->
  <g transform="translate(620,300)">
    <rect x="-40" y="0" width="80" height="60" fill="#8d5a36"/>
    <path d="M-50 0 L0 -35 L50 0 Z" fill="#c84a3a"/>
    <rect x="-8" y="20" width="16" height="40" fill="#6a4a2a"/>
    <rect x="-35" y="10" width="16" height="16" fill="#f4b942"/>
    <rect x="19" y="10" width="16" height="16" fill="#f4b942"/>
    <!-- 烟囱冒烟 -->
    <rect x="15" y="-30" width="10" height="15" fill="#6a4a2a"/>
    <ellipse cx="22" cy="-40" rx="8" ry="5" fill="#d0d0d0" opacity="0.5"/>
    <ellipse cx="25" cy="-50" rx="10" ry="6" fill="#d0d0d0" opacity="0.4"/>
  </g>

  <!-- 雪孩子（左） -->
  <g transform="translate(280,340)">
    <!-- 底部大球 -->
    <ellipse cx="0" cy="60" rx="45" ry="40" fill="#ffffff" stroke="#d0e0e8" stroke-width="2"/>
    <!-- 上部小球（头） -->
    <circle cx="0" cy="0" r="32" fill="#ffffff" stroke="#d0e0e8" stroke-width="2"/>
    <!-- 眼睛（龙眼核） -->
    <circle cx="-10" cy="-5" r="4" fill="#4a2a1a"/>
    <circle cx="10" cy="-5" r="4" fill="#4a2a1a"/>
    <!-- 胡萝卜鼻子 -->
    <path d="M0 0 L18 5 L0 8 Z" fill="#e07856" stroke="#c84a3a" stroke-width="1"/>
    <!-- 嘴巴（弧线） -->
    <path d="M-8 12 Q0 18 8 12" fill="none" stroke="#4a2a1a" stroke-width="2" stroke-linecap="round"/>
    <!-- 围巾 -->
    <rect x="-25" y="22" width="50" height="10" fill="#c84a3a" rx="2"/>
    <rect x="20" y="28" width="8" height="20" fill="#c84a3a"/>
    <!-- 纽扣 -->
    <circle cx="0" cy="45" r="3" fill="#4a2a1a"/>
    <circle cx="0" cy="60" r="3" fill="#4a2a1a"/>
    <circle cx="0" cy="75" r="3" fill="#4a2a1a"/>
    <!-- 树枝手臂 -->
    <path d="M-40 45 L-65 25 M-58 30 L-55 18 M-62 35 L-70 28" stroke="#8d5a36" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M40 45 L65 25 M58 30 L55 18 M62 35 L70 28" stroke="#8d5a36" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 小白兔（右） -->
  <g transform="translate(440,400)">
    <!-- 身体 -->
    <ellipse cx="0" cy="10" rx="22" ry="16" fill="#ffffff" stroke="#d0e0e8" stroke-width="1.5"/>
    <!-- 头 -->
    <circle cx="5" cy="-10" r="14" fill="#ffffff" stroke="#d0e0e8" stroke-width="1.5"/>
    <!-- 长耳朵 -->
    <ellipse cx="0" cy="-28" rx="4" ry="12" fill="#ffffff" stroke="#d0e0e8" stroke-width="1.5"/>
    <ellipse cx="10" cy="-28" rx="4" ry="12" fill="#ffffff" stroke="#d0e0e8" stroke-width="1.5"/>
    <ellipse cx="0" cy="-28" rx="2" ry="8" fill="#f5c8c8"/>
    <ellipse cx="10" cy="-28" rx="2" ry="8" fill="#f5c8c8"/>
    <!-- 眼睛 -->
    <circle cx="2" cy="-12" r="2.5" fill="#c84a3a"/>
    <circle cx="12" cy="-12" r="2.5" fill="#c84a3a"/>
    <!-- 鼻子 -->
    <circle cx="14" cy="-6" r="1.5" fill="#e07856"/>
    <!-- 尾巴 -->
    <circle cx="-18" cy="8" r="6" fill="#ffffff" stroke="#d0e0e8" stroke-width="1"/>
    <!-- 腿 -->
    <ellipse cx="-8" cy="25" rx="5" ry="4" fill="#ffffff" stroke="#d0e0e8" stroke-width="1"/>
    <ellipse cx="8" cy="25" rx="5" ry="4" fill="#ffffff" stroke="#d0e0e8" stroke-width="1"/>
  </g>

  <!-- 雪孩子和小白兔之间的爱心 -->
  <g transform="translate(370,360)" opacity="0.6">
    <path d="M0 5 Q-8 -5 -5 -10 Q0 -12 0 -5 Q0 -12 5 -10 Q8 -5 0 5" fill="#e07856"/>
  </g>

  <!-- 底部：结局提示 -->
  <rect x="100" y="510" width="600" height="65" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <text x="400" y="535" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">雪孩子冲进火海救出小白兔，自己化成了水</text>
  <text x="400" y="558" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">水变成水汽升上天空，变成一朵白云，守护着小白兔</text>
</svg>
