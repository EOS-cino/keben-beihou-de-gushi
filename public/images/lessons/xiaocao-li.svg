<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="草丛中蚂蚁和瓢虫的微观世界插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 草地背景 -->
  <rect x="0" y="350" width="800" height="250" fill="#dceee3"/>
  <rect x="0" y="420" width="800" height="180" fill="#9fc8b4" opacity="0.4"/>
  <!-- 放大镜效果圆 -->
  <circle cx="400" cy="350" r="220" fill="#fef9ed" opacity="0.6"/>
  <circle cx="400" cy="350" r="220" fill="none" stroke="#e8a838" stroke-width="4" opacity="0.3"/>
  <!-- 草叶 -->
  <g fill="#2d6a4f">
    <path d="M150 500 Q155 380 145 350 Q160 380 165 500 Z"/>
    <path d="M200 510 Q210 400 195 360 Q215 400 220 510 Z"/>
    <path d="M580 510 Q590 400 575 360 Q595 400 600 510 Z"/>
    <path d="M630 500 Q635 380 625 350 Q640 380 645 500 Z"/>
    <path d="M680 510 Q690 400 675 370 Q695 400 700 510 Z"/>
    <path d="M100 510 Q110 410 95 380 Q115 410 120 510 Z"/>
  </g>
  <!-- 放大区域内的草叶 -->
  <g fill="#2d6a4f" opacity="0.8">
    <path d="M300 480 Q310 350 295 300 Q320 350 325 480 Z"/>
    <path d="M480 480 Q490 350 475 300 Q500 350 505 480 Z"/>
    <path d="M380 490 Q385 370 375 320 Q395 370 400 490 Z"/>
    <path d="M420 490 Q425 370 415 320 Q435 370 440 490 Z"/>
  </g>
  <!-- 蚂蚁队列 -->
  <g transform="translate(350 420)">
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="#333"/>
    <circle cx="-10" cy="0" r="4" fill="#333"/>
    <circle cx="8" cy="0" r="4" fill="#333"/>
    <line x1="-4" y1="-3" x2="-8" y2="-8" stroke="#333" stroke-width="1.5"/>
    <line x1="4" y1="-3" x2="8" y2="-8" stroke="#333" stroke-width="1.5"/>
    <line x1="-4" y1="3" x2="-8" y2="8" stroke="#333" stroke-width="1.5"/>
    <line x1="4" y1="3" x2="8" y2="8" stroke="#333" stroke-width="1.5"/>
  </g>
  <g transform="translate(380 425)">
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="#333"/>
    <circle cx="-10" cy="0" r="4" fill="#333"/>
    <circle cx="8" cy="0" r="4" fill="#333"/>
    <line x1="-4" y1="-3" x2="-8" y2="-8" stroke="#333" stroke-width="1.5"/>
    <line x1="4" y1="-3" x2="8" y2="-8" stroke="#333" stroke-width="1.5"/>
  </g>
  <g transform="translate(410 420)">
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="#333"/>
    <circle cx="-10" cy="0" r="4" fill="#333"/>
    <circle cx="8" cy="0" r="4" fill="#333"/>
  </g>
  <!-- 瓢虫 -->
  <g transform="translate(320 340)">
    <ellipse cx="0" cy="0" rx="18" ry="15" fill="#e07856"/>
    <path d="M0 -15 L0 15" stroke="#333" stroke-width="2"/>
    <circle cx="-6" cy="-3" r="3" fill="#333"/>
    <circle cx="6" cy="-3" r="3" fill="#333"/>
    <circle cx="-6" cy="6" r="2.5" fill="#333"/>
    <circle cx="6" cy="6" r="2.5" fill="#333"/>
    <circle cx="0" cy="-15" r="5" fill="#333"/>
    <path d="M-3 -18 Q0 -22 3 -18" stroke="#333" stroke-width="1" fill="none"/>
  </g>
  <!-- 蚱蜢 -->
  <g transform="translate(500 360)">
    <ellipse cx="0" cy="0" rx="14" ry="5" fill="#2d6a4f"/>
    <circle cx="-12" cy="-2" r="5" fill="#2d6a4f"/>
    <path d="M-8 2 Q-15 15 -20 25" stroke="#2d6a4f" stroke-width="3" fill="none"/>
    <path d="M10 -2 Q25 -8 35 -5" stroke="#2d6a4f" stroke-width="2" fill="none"/>
    <line x1="-10" y1="-5" x2="-18" y2="-12" stroke="#2d6a4f" stroke-width="1.5"/>
  </g>
  <!-- 放大镜 -->
  <g transform="translate(560 200)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#e8a838" stroke-width="6"/>
    <circle cx="0" cy="0" r="50" fill="#fef9ed" opacity="0.2"/>
    <line x1="35" y1="35" x2="65" y2="65" stroke="#e8a838" stroke-width="8" stroke-linecap="round"/>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="700" fill="#2d6a4f">小草里</text>
  <text x="400" y="82" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#7a7468">蹲下来，草丛里藏着一个小世界</text>
</svg>
