<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="小马在河边犹豫、老牛和松鼠在旁边的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" fill="#2d2a24" font-family="sans-serif" font-weight="bold">小马过河</text>

  <!-- 天空 -->
  <rect x="0" y="60" width="800" height="220" fill="#d6ecf7"/>
  <!-- 太阳 -->
  <circle cx="680" cy="110" r="28" fill="#f4b942"/>
  <circle cx="680" cy="110" r="36" fill="#f4b942" opacity="0.25"/>
  <!-- 云朵 -->
  <ellipse cx="130" cy="100" rx="40" ry="15" fill="#ffffff" opacity="0.85"/>
  <ellipse cx="160" cy="92" rx="28" ry="11" fill="#ffffff" opacity="0.85"/>

  <!-- 远山 -->
  <path d="M0 280 L120 220 L250 260 L400 200 L550 250 L700 220 L800 240 L800 280 Z" fill="#8aaa8a" opacity="0.5"/>

  <!-- 左岸（草地） -->
  <path d="M0 280 L350 280 Q340 290 330 300 L0 300 Z" fill="#7a9a5a"/>
  <path d="M0 280 L330 280 L0 290 Z" fill="#6b8a4a"/>

  <!-- 河流 -->
  <path d="M330 280 Q400 275 470 280 L470 400 Q400 405 330 400 Z" fill="#7ec0db"/>
  <!-- 水波纹 -->
  <path d="M340 310 Q380 305 420 310 Q460 315 460 310" fill="none" stroke="#a8d4e8" stroke-width="2"/>
  <path d="M340 340 Q380 335 420 340 Q460 345 460 340" fill="none" stroke="#a8d4e8" stroke-width="2"/>
  <path d="M340 370 Q380 365 420 370 Q460 375 460 370" fill="none" stroke="#a8d4e8" stroke-width="2"/>

  <!-- 右岸（草地） -->
  <path d="M470 280 L800 280 L800 600 L470 600 L470 400 Z" fill="#7a9a5a"/>
  <path d="M470 280 L800 280 L800 300 L470 300 Z" fill="#6b8a4a"/>

  <!-- 地面延伸 -->
  <rect x="0" y="400" width="330" height="200" fill="#7a9a5a"/>
  <rect x="470" y="400" width="330" height="200" fill="#7a9a5a"/>

  <!-- 小马（站在左岸河边犹豫） -->
  <g transform="translate(250,330)">
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="40" ry="28" fill="#b8704a"/>
    <ellipse cx="0" cy="-3" rx="36" ry="24" fill="#c8855a"/>
    <!-- 脖子 -->
    <path d="M-25 -10 Q-35 -30 -30 -50 L-20 -50 Q-15 -30 -15 -10" fill="#b8704a"/>
    <!-- 头 -->
    <ellipse cx="-32" cy="-55" rx="15" ry="12" fill="#c8855a"/>
    <!-- 耳朵 -->
    <path d="M-38 -65 L-40 -72 L-35 -68 Z" fill="#b8704a"/>
    <path d="M-28 -65 L-26 -72 L-30 -68 Z" fill="#b8704a"/>
    <!-- 鬃毛 -->
    <path d="M-28 -45 Q-25 -50 -22 -45 Q-20 -52 -17 -47 Q-15 -54 -12 -48" fill="#6b4a2d"/>
    <!-- 眼睛 -->
    <circle cx="-35" cy="-55" r="2" fill="#1a1a1a"/>
    <!-- 鼻孔 -->
    <ellipse cx="-42" cy="-52" rx="1.5" ry="2" fill="#6b4a2d"/>
    <!-- 嘴 -->
    <path d="M-42 -48 Q-38 -46 -35 -48" fill="none" stroke="#6b4a2d" stroke-width="1"/>
    <!-- 前腿（一只抬起犹豫） -->
    <rect x="-15" y="20" width="7" height="30" fill="#b8704a"/>
    <path d="M-5 22 Q-2 28 -5 35 Q-8 30 -5 22" fill="#b8704a"/>
    <!-- 后腿 -->
    <rect x="15" y="20" width="7" height="30" fill="#b8704a"/>
    <rect x="25" y="20" width="7" height="30" fill="#b8704a"/>
    <!-- 尾巴 -->
    <path d="M38 -5 Q50 0 48 20 Q45 25 42 20" fill="#6b4a2d"/>
    <!-- 麦袋 -->
    <ellipse cx="5" cy="-5" rx="15" ry="10" fill="#d4b848"/>
    <text x="5" y="-2" text-anchor="middle" font-size="8" fill="#6b5520" font-family="sans-serif">麦</text>
  </g>
  <text x="250" y="400" text-anchor="middle" font-size="12" fill="#6b4a2d" font-family="sans-serif" font-weight="bold">小马</text>

  <!-- 犹豫思考气泡 -->
  <g transform="translate(180,250)">
    <circle cx="0" cy="0" r="3" fill="#ffffff" stroke="#8d6a3d" stroke-width="1"/>
    <circle cx="8" cy="-5" r="4" fill="#ffffff" stroke="#8d6a3d" stroke-width="1"/>
    <ellipse cx="25" cy="-15" rx="30" ry="18" fill="#ffffff" stroke="#8d6a3d" stroke-width="1.5"/>
    <text x="25" y="-18" text-anchor="middle" font-size="10" fill="#6b6557" font-family="sans-serif">水到底</text>
    <text x="25" y="-6" text-anchor="middle" font-size="10" fill="#6b6557" font-family="sans-serif">有多深？</text>
  </g>

  <!-- 老牛（右岸，高大） -->
  <g transform="translate(620,310)">
    <!-- 身体（大） -->
    <ellipse cx="0" cy="0" rx="55" ry="38" fill="#8d6a4a"/>
    <ellipse cx="0" cy="-3" rx="50" ry="33" fill="#a08560"/>
    <!-- 花斑 -->
    <ellipse cx="-15" cy="-5" rx="12" ry="8" fill="#ffffff" opacity="0.6"/>
    <ellipse cx="20" cy="5" rx="10" ry="7" fill="#ffffff" opacity="0.6"/>
    <!-- 头 -->
    <ellipse cx="-50" cy="-15" rx="22" ry="18" fill="#a08560"/>
    <!-- 牛角 -->
    <path d="M-60 -28 Q-65 -38 -58 -40" fill="none" stroke="#e8e0c8" stroke-width="4" stroke-linecap="round"/>
    <path d="M-42 -28 Q-38 -38 -44 -40" fill="none" stroke="#e8e0c8" stroke-width="4" stroke-linecap="round"/>
    <!-- 耳朵 -->
    <ellipse cx="-62" cy="-20" rx="5" ry="8" fill="#8d6a4a" transform="rotate(-30 -62 -20)"/>
    <!-- 眼睛 -->
    <circle cx="-52" cy="-18" r="2.5" fill="#1a1a1a"/>
    <!-- 鼻孔 -->
    <ellipse cx="-65" cy="-10" rx="2" ry="3" fill="#6b4a2d"/>
    <!-- 嘴 -->
    <path d="M-68 -5 Q-62 -2 -55 -5" fill="none" stroke="#6b4a2d" stroke-width="1.5"/>
    <!-- 腿（粗壮） -->
    <rect x="-25" y="30" width="10" height="35" fill="#8d6a4a"/>
    <rect x="-5" y="30" width="10" height="35" fill="#8d6a4a"/>
    <rect x="15" y="30" width="10" height="35" fill="#8d6a4a"/>
    <rect x="35" y="30" width="10" height="35" fill="#8d6a4a"/>
    <!-- 尾巴 -->
    <path d="M50 0 Q60 10 58 30" fill="none" stroke="#8d6a4a" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="58" cy="32" rx="4" ry="6" fill="#6b4a2d"/>
  </g>
  <text x="620" y="400" text-anchor="middle" font-size="12" fill="#6b4a2d" font-family="sans-serif" font-weight="bold">老牛</text>

  <!-- 老牛对话气泡 -->
  <g transform="translate(530,240)">
    <path d="M0 0 Q0 -18 18 -18 L85 -18 Q103 -18 103 0 L103 8 Q103 18 93 18 L25 18 L10 28 L15 18 L10 18 Q0 18 0 8 Z" fill="#ffffff" stroke="#5a9d3e" stroke-width="1.5"/>
    <text x="51" y="-3" text-anchor="middle" font-size="10" fill="#3a6b28" font-family="sans-serif">水很浅</text>
    <text x="51" y="10" text-anchor="middle" font-size="10" fill="#3a6b28" font-family="sans-serif">刚没小腿</text>
  </g>

  <!-- 松鼠（在树上，矮小） -->
  <g transform="translate(120,200)">
    <!-- 树干 -->
    <rect x="-5" y="0" width="10" height="120" fill="#6b4a2d"/>
    <!-- 树枝 -->
    <path d="M0 20 Q-15 15 -25 20" fill="none" stroke="#6b4a2d" stroke-width="4"/>
    <!-- 松鼠身体 -->
    <g transform="translate(-20,15)">
      <!-- 尾巴（大蓬松） -->
      <path d="M5 0 Q-15 -10 -20 10 Q-25 25 -15 30 Q-5 25 5 15" fill="#c46a2a"/>
      <path d="M-10 5 Q-18 0 -20 12" fill="none" stroke="#a85520" stroke-width="2"/>
      <!-- 身体 -->
      <ellipse cx="5" cy="10" rx="10" ry="12" fill="#c46a2a"/>
      <!-- 头 -->
      <circle cx="10" cy="0" r="8" fill="#d47a3a"/>
      <!-- 耳朵 -->
      <path d="M6 -7 L4 -12 L8 -9 Z" fill="#c46a2a"/>
      <path d="M14 -7 L16 -12 L12 -9 Z" fill="#c46a2a"/>
      <!-- 眼睛 -->
      <circle cx="13" cy="0" r="1.5" fill="#1a1a1a"/>
      <!-- 嘴（张大喊） -->
      <ellipse cx="16" cy="4" rx="2" ry="1.5" fill="#6b4a2d"/>
    </g>
  </g>
  <text x="100" y="340" text-anchor="middle" font-size="11" fill="#8d4a1a" font-family="sans-serif" font-weight="bold">松鼠</text>

  <!-- 松鼠对话气泡 -->
  <g transform="translate(150,160)">
    <path d="M0 0 Q0 -18 18 -18 L80 -18 Q98 -18 98 0 L98 8 Q98 18 88 18 L25 18 L15 28 L20 18 L10 18 Q0 18 0 8 Z" fill="#ffffff" stroke="#e36f5b" stroke-width="1.5"/>
    <text x="49" y="-3" text-anchor="middle" font-size="10" fill="#c84a3a" font-family="sans-serif">水很深！</text>
    <text x="49" y="10" text-anchor="middle" font-size="10" fill="#c84a3a" font-family="sans-serif">会淹死的！</text>
  </g>

  <!-- 河水深度标注 -->
  <g transform="translate(400,440)">
    <line x1="0" y1="0" x2="0" y2="-40" stroke="#4a7ab8" stroke-width="2"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#4a7ab8" stroke-width="2"/>
    <line x1="-5" y1="-40" x2="5" y2="-40" stroke="#4a7ab8" stroke-width="2"/>
    <text x="15" y="-18" font-size="10" fill="#2d5a8a" font-family="sans-serif">河水</text>
  </g>

  <!-- 底部对比标注 -->
  <g transform="translate(0,500)">
    <rect x="60" y="0" width="200" height="50" rx="8" fill="#e8f5e8" stroke="#5a9d3e" stroke-width="1.5"/>
    <text x="160" y="20" text-anchor="middle" font-size="11" fill="#3a6b28" font-family="sans-serif" font-weight="bold">老牛（高大）→ 水浅</text>
    <text x="160" y="38" text-anchor="middle" font-size="10" fill="#6b6557" font-family="sans-serif">水只到小腿</text>

    <rect x="300" y="0" width="200" height="50" rx="8" fill="#fff0e8" stroke="#e36f5b" stroke-width="1.5"/>
    <text x="400" y="20" text-anchor="middle" font-size="11" fill="#c84a3a" font-family="sans-serif" font-weight="bold">松鼠（矮小）→ 水深</text>
    <text x="400" y="38" text-anchor="middle" font-size="10" fill="#6b6557" font-family="sans-serif">水能淹没</text>

    <rect x="540" y="0" width="200" height="50" rx="8" fill="#e8f0ff" stroke="#4a7ab8" stroke-width="1.5"/>
    <text x="640" y="20" text-anchor="middle" font-size="11" fill="#2d5a8a" font-family="sans-serif" font-weight="bold">小马（中等）→ 刚好</text>
    <text x="640" y="38" text-anchor="middle" font-size="10" fill="#6b6557" font-family="sans-serif">自己试了才知道</text>
  </g>
</svg>
