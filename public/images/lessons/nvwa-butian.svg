<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="女娲炼五色石补天的壮丽神话场景插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">女娲补天</text>
  <line x1="350" y1="58" x2="450" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空（有窟窿） -->
  <rect x="0" y="72" width="800" height="250" fill="#a8d0e8" opacity="0.2"/>
  <!-- 天上的窟窿 -->
  <path d="M300 80 Q280 100 290 130 Q270 150 300 160 Q320 140 340 160 Q360 140 340 120 Q360 100 330 90 Q320 75 300 80 Z" fill="#1a1a3a" opacity="0.3" stroke="#7a3b14" stroke-width="2"/>
  <!-- 雨水从窟窿落下 -->
  <line x1="300" y1="160" x2="295" y2="200" stroke="#7ab8d8" stroke-width="2" opacity="0.5"/>
  <line x1="320" y1="160" x2="318" y2="210" stroke="#7ab8d8" stroke-width="2" opacity="0.5"/>
  <line x1="335" y1="155" x2="332" y2="195" stroke="#7ab8d8" stroke-width="2" opacity="0.4"/>

  <!-- 五色石 -->
  <g transform="translate(150, 200)">
    <circle cx="0" cy="0" r="12" fill="#6a8d3f" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">青</text>
  </g>
  <g transform="translate(190, 210)">
    <circle cx="0" cy="0" r="12" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">红</text>
  </g>
  <g transform="translate(230, 200)">
    <circle cx="0" cy="0" r="12" fill="#e0c898" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">黄</text>
  </g>
  <g transform="translate(150, 250)">
    <circle cx="0" cy="0" r="12" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">白</text>
  </g>
  <g transform="translate(190, 260)">
    <circle cx="0" cy="0" r="12" fill="#1a1a1a" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">黑</text>
  </g>

  <!-- 熔炼炉火 -->
  <g transform="translate(190, 320)">
    <!-- 火焰 -->
    <path d="M-30 0 Q-25 -20 -15 -15 Q-10 -30 0 -20 Q5 -35 15 -25 Q20 -15 30 -10 Q25 5 0 5 Q-25 5 -30 0" fill="#e07856" opacity="0.7" stroke="#c84a3a" stroke-width="1"/>
    <path d="M-20 -5 Q-15 -15 -5 -12 Q0 -22 8 -15 Q12 -8 15 -5 Q10 0 0 0 Q-15 0 -20 -5" fill="#ffd700" opacity="0.6"/>
    <!-- 石浆 -->
    <ellipse cx="0" cy="10" rx="25" ry="6" fill="#c8843a" opacity="0.8" stroke="#7a3b14" stroke-width="1"/>
  </g>

  <!-- 女娲（飞向天空补天） -->
  <g transform="translate(450, 180)">
    <!-- 身体 -->
    <ellipse cx="0" cy="10" rx="18" ry="25" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 头 -->
    <circle cx="0" cy="-18" r="14" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 头发 -->
    <path d="M-12 -22 Q-14 -30 -8 -32 M12 -22 Q14 -30 8 -32" fill="#1a1a1a" stroke="#7a3b14" stroke-width="1"/>
    <!-- 眼睛（坚定） -->
    <circle cx="-4" cy="-18" r="1.5" fill="#7a3b14"/>
    <circle cx="4" cy="-18" r="1.5" fill="#7a3b14"/>
    <!-- 嘴 -->
    <path d="M-3 -12 Q0 -10 3 -12" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 手臂（举石浆补天） -->
    <path d="M-12 -5 Q-25 -15 -35 -25" fill="none" stroke="#c84a3a" stroke-width="6" stroke-linecap="round"/>
    <path d="M12 -5 Q25 -10 35 -20" fill="none" stroke="#c84a3a" stroke-width="6" stroke-linecap="round"/>
    <!-- 手中的石浆 -->
    <ellipse cx="-37" cy="-27" rx="8" ry="5" fill="#c8843a" opacity="0.8" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="37" cy="-22" rx="8" ry="5" fill="#c8843a" opacity="0.8" stroke="#7a3b14" stroke-width="1"/>
    <!-- 蛇尾（下半身） -->
    <path d="M0 35 Q-10 50 -5 65 Q5 75 15 70 Q25 60 20 50" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M0 35 Q10 50 5 65" fill="none" stroke="#7a3b14" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- 大龟（四足撑天） -->
  <g transform="translate(650, 380)">
    <ellipse cx="0" cy="0" rx="35" ry="20" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <ellipse cx="0" cy="-5" rx="30" ry="15" fill="#4a6a2f" opacity="0.5"/>
    <!-- 龟头 -->
    <ellipse cx="30" cy="-2" rx="8" ry="6" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <circle cx="33" cy="-3" r="1.5" fill="#7a3b14"/>
    <!-- 龟足（断了两条） -->
    <rect x="-25" y="15" width="8" height="15" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1"/>
    <rect x="17" y="15" width="8" height="15" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1"/>
    <!-- 断裂处 -->
    <line x1="-25" y1="15" x2="-17" y2="15" stroke="#c84a3a" stroke-width="2"/>
    <line x1="17" y1="15" x2="25" y2="15" stroke="#c84a3a" stroke-width="2"/>
  </g>

  <!-- 地面裂缝 -->
  <path d="M0 480 L800 480" stroke="#7a3b14" stroke-width="2" fill="none"/>
  <path d="M100 480 L120 510 L140 480" fill="none" stroke="#7a3b14" stroke-width="2"/>
  <path d="M400 480 L420 505 L440 480" fill="none" stroke="#7a3b14" stroke-width="2"/>
  <path d="M600 480 L620 512 L640 480" fill="none" stroke="#7a3b14" stroke-width="2"/>

  <!-- 洪水 -->
  <path d="M0 500 Q50 495 100 500 Q150 495 200 500" fill="none" stroke="#7ab8d8" stroke-width="3" opacity="0.4"/>
  <path d="M300 505 Q350 500 400 505 Q450 500 500 505" fill="none" stroke="#7ab8d8" stroke-width="3" opacity="0.4"/>

  <!-- 标注：五色石 -->
  <line x1="190" y1="190" x2="100" y2="150" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="30" y="128" width="100" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="80" y="146" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">炼五色石</text>

  <!-- 标注：补天 -->
  <line x1="430" y1="160" x2="380" y2="120" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="340" y="98" width="80" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="380" y="116" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">补苍天</text>

  <!-- 标注：龟足撑天 -->
  <line x1="630" y1="370" x2="700" y2="330" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="660" y="308" width="120" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="720" y="326" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">断龟足撑天</text>

  <!-- 底部说明 -->
  <text x="400" y="555" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">炼五色石以补苍天，断鳌足以立四极</text>
  <text x="400" y="580" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">女娲用智慧和力量拯救了人类——上古神话中的伟大女神</text>
</svg>
