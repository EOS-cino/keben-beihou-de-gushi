<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="春节、端午、中秋等传统节日场景插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">传统节日</text>
  <line x1="330" y1="62" x2="470" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 分隔线 -->
  <line x1="267" y1="90" x2="267" y2="540" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.5"/>
  <line x1="533" y1="90" x2="533" y2="540" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.5"/>

  <!-- 第一格：春节 -->
  <text x="133" y="115" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">春节</text>
  <!-- 鞭炮 -->
  <g transform="translate(80, 150)">
    <rect x="0" y="0" width="14" height="50" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <rect x="18" y="5" width="14" height="50" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <rect x="36" y="0" width="14" height="50" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <rect x="54" y="5" width="14" height="50" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <line x1="7" y1="0" x2="35" y2="-15" stroke="#f4c842" stroke-width="2"/>
    <line x1="43" y1="0" x2="65" y2="-15" stroke="#f4c842" stroke-width="2"/>
  </g>
  <!-- 春联 -->
  <rect x="60" y="230" width="18" height="90" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
  <rect x="190" y="230" width="18" height="90" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
  <rect x="60" y="220" width="148" height="18" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
  <text x="69" y="280" font-family="serif" font-size="14" fill="#f4c842" writing-mode="tb">福</text>
  <text x="199" y="280" font-family="serif" font-size="14" fill="#f4c842" writing-mode="tb">春</text>
  <!-- 灯笼 -->
  <ellipse cx="133" cy="370" rx="28" ry="22" fill="#c84a3a" stroke="#7a3b14" stroke-width="2"/>
  <rect x="125" y="346" width="16" height="6" fill="#f4c842" stroke="#7a3b14" stroke-width="1.5"/>
  <rect x="125" y="390" width="16" height="6" fill="#f4c842" stroke="#7a3b14" stroke-width="1.5"/>
  <line x1="133" y1="340" x2="133" y2="320" stroke="#7a3b14" stroke-width="2"/>
  <line x1="133" y1="396" x2="133" y2="415" stroke="#f4c842" stroke-width="2"/>
  <text x="133" y="375" text-anchor="middle" font-family="serif" font-size="14" fill="#f4c842">春</text>

  <!-- 第二格：端午 -->
  <text x="400" y="115" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">端午</text>
  <!-- 龙舟 -->
  <g transform="translate(310, 200)">
    <path d="M0 40 Q5 55 60 55 Q115 55 120 40 L115 40 Q110 48 60 48 Q10 48 5 40 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="2"/>
    <path d="M0 40 L-10 30 L5 38 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M120 40 L130 30 L115 38 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 龙头 -->
    <circle cx="10" cy="28" r="6" fill="#f4c842" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 划船人 -->
    <circle cx="40" cy="20" r="7" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M35 27 L45 27 L43 42 L37 42 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="75" cy="20" r="7" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M70 27 L80 27 L78 42 L72 42 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 桨 -->
    <line x1="45" y1="35" x2="55" y2="50" stroke="#8d5a36" stroke-width="3"/>
    <line x1="80" y1="35" x2="90" y2="50" stroke="#8d5a36" stroke-width="3"/>
  </g>
  <!-- 水 -->
  <path d="M300 270 Q340 265 380 270 T460 270 T500 270" fill="none" stroke="#7ab8d8" stroke-width="2"/>
  <path d="M300 280 Q340 275 380 280 T460 280 T500 280" fill="none" stroke="#7ab8d8" stroke-width="2"/>
  <!-- 粽子 -->
  <g transform="translate(370, 330)">
    <path d="M0 40 L30 0 L60 40 Z" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
    <path d="M10 38 L30 10 L50 38 Z" fill="#a8d0a8" opacity="0.5"/>
    <line x1="30" y1="0" x2="30" y2="-15" stroke="#c8843a" stroke-width="2"/>
    <line x1="0" y1="40" x2="-10" y2="48" stroke="#c8843a" stroke-width="2"/>
  </g>
  <text x="400" y="400" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">粽子</text>

  <!-- 第三格：中秋 -->
  <text x="667" y="115" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">中秋</text>
  <!-- 月亮 -->
  <circle cx="667" cy="180" r="40" fill="#f8f0c8" stroke="#e8d898" stroke-width="2"/>
  <circle cx="655" cy="170" r="7" fill="#e8e0b0" opacity="0.5"/>
  <circle cx="675" cy="185" r="5" fill="#e8e0b0" opacity="0.5"/>
  <!-- 月饼 -->
  <g transform="translate(627, 280)">
    <ellipse cx="40" cy="40" rx="38" ry="14" fill="#c8843a" stroke="#7a3b14" stroke-width="2"/>
    <rect x="2" y="28" width="76" height="20" fill="#e0a868" stroke="#7a3b14" stroke-width="2"/>
    <ellipse cx="40" cy="28" rx="38" ry="14" fill="#f0c890" stroke="#7a3b14" stroke-width="2"/>
    <text x="40" y="33" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">月</text>
    <!-- 花纹 -->
    <line x1="10" y1="38" x2="20" y2="38" stroke="#7a3b14" stroke-width="1"/>
    <line x1="60" y1="38" x2="70" y2="38" stroke="#7a3b14" stroke-width="1"/>
  </g>
  <!-- 一家人赏月 -->
  <g transform="translate(610, 420)">
    <circle cx="20" cy="20" r="10" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M12 30 L28 30 L26 60 L14 60 Z" fill="#3a5a7a" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="60" cy="18" r="9" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M53 27 L67 27 L65 55 L55 55 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="95" cy="22" r="8" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M89 30 L101 30 L99 55 L91 55 Z" fill="#6a8d3f" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <text x="667" y="500" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">团圆赏月</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">春节放鞭炮、端午赛龙舟吃粽子、中秋赏月吃月饼——每个节日都有自己的习俗</text>
</svg>
