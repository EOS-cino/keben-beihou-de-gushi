<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="孩子仰望星空与银河插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">星空</text>
  <line x1="340" y1="56" x2="460" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——抬头看星星，你能看见多远</text>

  <!-- 夜空背景 -->
  <rect x="0" y="90" width="800" height="380" fill="#1a2a4a"/>
  <rect x="0" y="90" width="800" height="380" fill="#4a90b8" opacity="0.15"/>

  <!-- 银河 -->
  <path d="M100 470 Q300 250 500 200 Q650 170 760 150" fill="none" stroke="#fef9ed" stroke-width="40" opacity="0.18" stroke-linecap="round"/>
  <path d="M100 470 Q300 250 500 200 Q650 170 760 150" fill="none" stroke="#e8a838" stroke-width="20" opacity="0.12" stroke-linecap="round"/>

  <!-- 星星 -->
  <circle cx="120" cy="140" r="2.5" fill="#fef9ed"/>
  <circle cx="180" cy="180" r="3" fill="#fef9ed"/>
  <circle cx="240" cy="120" r="2" fill="#fef9ed"/>
  <circle cx="300" cy="160" r="3.5" fill="#e8a838"/>
  <circle cx="360" cy="200" r="2" fill="#fef9ed"/>
  <circle cx="420" cy="130" r="2.5" fill="#fef9ed"/>
  <circle cx="480" cy="250" r="3" fill="#fef9ed"/>
  <circle cx="540" cy="170" r="2" fill="#fef9ed"/>
  <circle cx="600" cy="220" r="3.5" fill="#e8a838"/>
  <circle cx="660" cy="140" r="2" fill="#fef9ed"/>
  <circle cx="720" cy="200" r="2.5" fill="#fef9ed"/>
  <circle cx="150" cy="260" r="2" fill="#fef9ed"/>
  <circle cx="220" cy="300" r="2.5" fill="#fef9ed"/>
  <circle cx="380" cy="280" r="2" fill="#fef9ed"/>
  <circle cx="500" cy="320" r="2" fill="#fef9ed"/>
  <circle cx="620" cy="290" r="2.5" fill="#fef9ed"/>
  <circle cx="700" cy="340" r="2" fill="#fef9ed"/>

  <!-- 北斗七星连线 -->
  <g stroke="#e8a838" stroke-width="1.5" opacity="0.7" fill="#e8a838">
    <line x1="540" y1="170" x2="600" y2="220" fill="none"/>
    <line x1="600" y1="220" x2="660" y2="140" fill="none"/>
    <line x1="660" y1="140" x2="720" y2="200" fill="none"/>
    <line x1="720" y1="200" x2="700" y2="340" fill="none"/>
    <line x1="700" y1="340" x2="620" y2="290" fill="none"/>
    <line x1="620" y1="290" x2="540" y2="170" fill="none"/>
    <circle cx="540" cy="170" r="4"/>
    <circle cx="600" cy="220" r="4"/>
    <circle cx="660" cy="140" r="4"/>
    <circle cx="720" cy="200" r="4"/>
    <circle cx="700" cy="340" r="4"/>
    <circle cx="620" cy="290" r="4"/>
    <text x="630" y="380" text-anchor="middle" font-family="serif" font-size="11" fill="#e8a838">北斗七星</text>
  </g>

  <!-- 地面 -->
  <rect x="0" y="470" width="800" height="130" fill="#2d6a4f" opacity="0.3"/>
  <path d="M0 470 Q200 450 400 470 Q600 490 800 470 L800 600 L0 600 Z" fill="#4a6a2f" opacity="0.5"/>

  <!-- 竹席 -->
  <rect x="250" y="490" width="300" height="80" fill="#c8843a" opacity="0.6" rx="5"/>
  <line x1="280" y1="490" x2="280" y2="570" stroke="#8d5a36" stroke-width="1"/>
  <line x1="320" y1="490" x2="320" y2="570" stroke="#8d5a36" stroke-width="1"/>
  <line x1="360" y1="490" x2="360" y2="570" stroke="#8d5a36" stroke-width="1"/>
  <line x1="400" y1="490" x2="400" y2="570" stroke="#8d5a36" stroke-width="1"/>
  <line x1="440" y1="490" x2="440" y2="570" stroke="#8d5a36" stroke-width="1"/>
  <line x1="480" y1="490" x2="480" y2="570" stroke="#8d5a36" stroke-width="1"/>
  <line x1="520" y1="490" x2="520" y2="570" stroke="#8d5a36" stroke-width="1"/>

  <!-- 躺着的孩子 -->
  <g transform="translate(400, 500)">
    <circle cx="-40" cy="-5" r="12" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-44" cy="-7" r="2" fill="#fef9ed"/>
    <circle cx="-38" cy="-7" r="2" fill="#fef9ed"/>
    <path d="M-46 -2 Q-42 0 -38 -2" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="0" cy="-2" rx="42" ry="12" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="-30" y="20" text-anchor="middle" font-family="serif" font-size="10" fill="#fef9ed">仰望星空</text>
  </g>

  <!-- 奶奶和蒲扇 -->
  <g transform="translate(560, 490)">
    <circle cx="0" cy="-15" r="12" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-10 -22 Q0 -30 10 -22" fill="#7a3b14"/>
    <ellipse cx="0" cy="10" rx="16" ry="20" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M15 0 Q35 -10 40 5" fill="none" stroke="#c8843a" stroke-width="4" stroke-linecap="round"/>
    <path d="M40 5 Q50 -5 55 5 Q50 15 40 10 Z" fill="#c8843a" stroke="#7a3b14" stroke-width="1"/>
  </g>

  <!-- 闪烁标注 -->
  <text x="150" y="430" font-family="serif" font-size="12" fill="#e8a838">一闪一闪</text>
  <text x="150" y="448" font-family="serif" font-size="10" fill="#fef9ed" opacity="0.8">（大气在搅动星光）</text>
</svg>
