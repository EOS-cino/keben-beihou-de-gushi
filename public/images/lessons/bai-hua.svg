<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="雪中白桦树挺立的画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">白桦</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#5d8aa8" stroke-width="2"/>
  <!-- 雪空 -->
  <rect x="0" y="100" width="800" height="240" fill="#e8eef2"/>
  <!-- 雪花 -->
  <circle cx="150" cy="160" r="3" fill="#ffffff" stroke="#9bb7c4"/>
  <circle cx="300" cy="140" r="3" fill="#ffffff" stroke="#9bb7c4"/>
  <circle cx="450" cy="170" r="3" fill="#ffffff" stroke="#9bb7c4"/>
  <circle cx="600" cy="150" r="3" fill="#ffffff" stroke="#9bb7c4"/>
  <circle cx="680" cy="180" r="3" fill="#ffffff" stroke="#9bb7c4"/>
  <circle cx="220" cy="220" r="2.5" fill="#ffffff" stroke="#9bb7c4"/>
  <circle cx="520" cy="230" r="2.5" fill="#ffffff" stroke="#9bb7c4"/>
  <!-- 太阳 -->
  <circle cx="660" cy="180" r="30" fill="#f0c068" opacity="0.8"/>
  <!-- 白桦树 -->
  <rect x="350" y="160" width="40" height="300" fill="#f5efe0" stroke="#9bb7c4" stroke-width="1.5"/>
  <line x1="355" y1="200" x2="385" y2="200" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="352" y1="240" x2="388" y2="240" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="358" y1="280" x2="382" y2="280" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="352" y1="320" x2="388" y2="320" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="358" y1="360" x2="382" y2="360" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="352" y1="400" x2="388" y2="400" stroke="#3a3a3a" stroke-width="2"/>
  <!-- 枝 -->
  <path d="M 370 180 q -30 -20 -50 -10" stroke="#3a3a3a" stroke-width="2.5" fill="none"/>
  <path d="M 370 170 q 30 -20 50 -10" stroke="#3a3a3a" stroke-width="2.5" fill="none"/>
  <!-- 雪挂（流苏） -->
  <ellipse cx="350" cy="175" rx="10" ry="6" fill="#ffffff" stroke="#9bb7c4"/>
  <ellipse cx="390" cy="175" rx="10" ry="6" fill="#ffffff" stroke="#9bb7c4"/>
  <!-- 地面雪 -->
  <rect x="0" y="460" width="800" height="140" fill="#ffffff" stroke="#9bb7c4" stroke-width="1"/>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14">银霜流苏，玉立雪中</text>
</svg>
