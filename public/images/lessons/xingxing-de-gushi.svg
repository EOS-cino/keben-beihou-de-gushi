<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="星空与仰望的孩子插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">星星的故事</text>
  <line x1="310" y1="62" x2="490" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 夜空 -->
  <rect x="0" y="70" width="800" height="400" fill="#1a2a4a"/>
  <rect x="0" y="70" width="800" height="400" fill="#2a3a5a" opacity="0.5"/>

  <!-- 银河 -->
  <path d="M100 80 Q300 250 500 180 Q650 140 750 200 L750 280 Q600 250 450 320 Q250 380 100 250 Z" fill="#a8d0e8" opacity="0.12"/>

  <!-- 星星（大小不一） -->
  <g fill="#fef9ed">
    <circle cx="120" cy="120" r="2"/>
    <circle cx="200" cy="100" r="1.5"/>
    <circle cx="280" cy="140" r="2.5"/>
    <circle cx="350" cy="90" r="1.5"/>
    <circle cx="420" cy="130" r="2"/>
    <circle cx="500" cy="100" r="3"/>
    <circle cx="580" cy="140" r="1.5"/>
    <circle cx="650" cy="90" r="2"/>
    <circle cx="720" cy="130" r="2.5"/>
    <circle cx="80" cy="180" r="1.5"/>
    <circle cx="160" cy="200" r="2"/>
    <circle cx="240" cy="220" r="1.5"/>
    <circle cx="600" cy="200" r="2"/>
    <circle cx="680" cy="220" r="1.5"/>
    <circle cx="100" cy="280" r="2"/>
    <circle cx="700" cy="280" r="2"/>
    <circle cx="50" cy="350" r="1.5"/>
    <circle cx="750" cy="350" r="2"/>
  </g>
  <!-- 亮星（带光芒） -->
  <g>
    <circle cx="300" cy="160" r="4" fill="#fef9ed"/>
    <path d="M300 150 L300 170 M290 160 L310 160" stroke="#fef9ed" stroke-width="1" opacity="0.6"/>
    <circle cx="550" cy="180" r="4" fill="#fef9ed"/>
    <path d="M550 170 L550 190 M540 180 L560 180" stroke="#fef9ed" stroke-width="1" opacity="0.6"/>
    <circle cx="450" cy="250" r="3.5" fill="#e07856"/>
    <circle cx="200" cy="300" r="3" fill="#fef9ed"/>
  </g>

  <!-- 北斗七星连线 -->
  <g stroke="#c8843a" stroke-width="1.5" opacity="0.6" fill="none">
    <line x1="520" y1="220" x2="560" y2="240"/>
    <line x1="560" y1="240" x2="600" y2="245"/>
    <line x1="600" y1="245" x2="630" y2="270"/>
    <line x1="630" y1="270" x2="660" y2="260"/>
    <line x1="660" y1="260" x2="690" y2="285"/>
    <line x1="690" y1="285" x2="710" y2="265"/>
  </g>
  <g fill="#fef9ed">
    <circle cx="520" cy="220" r="3"/>
    <circle cx="560" cy="240" r="3"/>
    <circle cx="600" cy="245" r="3"/>
    <circle cx="630" cy="270" r="3"/>
    <circle cx="660" cy="260" r="3"/>
    <circle cx="690" cy="285" r="3"/>
    <circle cx="710" cy="265" r="3"/>
  </g>

  <!-- 地面 -->
  <path d="M0 440 Q200 420 400 440 Q600 460 800 430 L800 600 L0 600 Z" fill="#4a6a2f" opacity="0.5"/>
  <rect x="0" y="450" width="800" height="150" fill="#d8c9a8"/>

  <!-- 院子竹席 -->
  <ellipse cx="400" cy="500" rx="120" ry="20" fill="#8d5a36" opacity="0.3"/>

  <!-- 孩子（躺在席上看星星） -->
  <g transform="translate(340, 470)">
    <!-- 身体（躺着） -->
    <ellipse cx="60" cy="20" rx="55" ry="12" fill="#c84a3a"/>
    <!-- 头 -->
    <circle cx="10" cy="15" r="14" fill="#f0d0a8"/>
    <!-- 头发 -->
    <path d="M0 12 Q0 0 10 0 Q22 2 22 14" fill="#2a2a2a"/>
    <!-- 眼睛（向上看） -->
    <circle cx="8" cy="12" r="2" fill="#2a2a2a"/>
    <!-- 手（指天） -->
    <path d="M40 12 L20 -10" fill="none" stroke="#c84a3a" stroke-width="6" stroke-linecap="round"/>
    <circle cx="18" cy="-12" r="5" fill="#f0d0a8"/>
  </g>

  <!-- 爷爷（坐旁边摇扇） -->
  <g transform="translate(560, 440)">
    <path d="M-15 20 L-12 70 L12 70 L15 20 Z" fill="#6a8d3f"/>
    <circle cx="0" cy="8" r="12" fill="#f0d0a8"/>
    <path d="M-12 8 Q-12 -4 0 -4 Q12 -4 12 8" fill="#5a3a1a"/>
    <circle cx="-4" cy="8" r="1.5" fill="#2a2a2a"/>
    <circle cx="4" cy="8" r="1.5" fill="#2a2a2a"/>
    <path d="M-3 14 Q0 16 3 14" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 蒲扇 -->
    <path d="M15 25 Q35 15 40 30 Q35 40 15 35" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <line x1="20" y1="32" x2="12" y2="40" stroke="#5a3a1a" stroke-width="2"/>
  </g>

  <!-- 标注：银河 -->
  <line x1="400" y1="200" x2="400" y2="150" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="360" y="120" width="80" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="137" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">银河</text>

  <!-- 标注：北斗 -->
  <line x1="615" y1="255" x2="615" y2="310" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="565" y="315" width="100" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="615" y="332" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">北斗七星</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">夏夜竹席上，一老一小仰望星空——每一颗星都是一个故事</text>
</svg>
