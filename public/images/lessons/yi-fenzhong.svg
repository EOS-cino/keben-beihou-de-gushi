<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="元元多睡一分钟导致迟到、后悔的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">一分钟</text>

  <!-- 因果链条：4个场景 -->
  <line x1="40" y1="320" x2="760" y2="320" stroke="#c8843a" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- 场景1：多睡一分钟 -->
  <g transform="translate(130,200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">①多睡一分钟</text>
    <!-- 床 -->
    <rect x="-60" y="20" width="120" height="40" fill="#8d5a36" rx="4"/>
    <rect x="-60" y="10" width="120" height="14" fill="#c84a3a" rx="4"/>
    <!-- 被子 -->
    <path d="M-50 20 Q-50 0 -20 -2 Q20 -2 50 20 Z" fill="#e07856"/>
    <!-- 元元的头 -->
    <circle cx="-20" cy="-5" r="14" fill="#f0c8a0"/>
    <!-- 闭眼 -->
    <path d="M-25 -7 Q-22 -9 -19 -7" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <path d="M-15 -7 Q-12 -9 -9 -7" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <!-- 闹钟 -->
    <g transform="translate(40,-15)">
      <circle cx="0" cy="0" r="14" fill="#fef9ed" stroke="#c84a3a" stroke-width="2"/>
      <line x1="0" y1="0" x2="0" y2="-8" stroke="#7a3b14" stroke-width="2"/>
      <line x1="0" y1="0" x2="6" y2="2" stroke="#7a3b14" stroke-width="2"/>
      <circle cx="0" cy="0" r="2" fill="#c84a3a"/>
      <!-- 铃铛 -->
      <circle cx="-10" cy="-12" r="4" fill="#c84a3a"/>
      <circle cx="10" cy="-12" r="4" fill="#c84a3a"/>
    </g>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">"就一分钟……"</text>
  </g>

  <path d="M200 200 L240 200" stroke="#c84a3a" stroke-width="2.5" fill="none" marker-end="url(#ar7)"/>

  <!-- 场景2：红灯 -->
  <g transform="translate(330,200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">②赶上红灯</text>
    <!-- 红绿灯 -->
    <rect x="-15" y="-40" width="30" height="70" rx="6" fill="#3a3a3a"/>
    <circle cx="0" cy="-25" r="8" fill="#c84a3a"/>
    <circle cx="0" cy="-5" r="8" fill="#4a4a3a" opacity="0.3"/>
    <circle cx="0" cy="15" r="8" fill="#4a4a3a" opacity="0.3"/>
    <!-- 杆 -->
    <rect x="-2" y="30" width="4" height="20" fill="#3a3a3a"/>
    <!-- 元元叹气 -->
    <g transform="translate(-40,30)">
      <ellipse cx="0" cy="0" rx="10" ry="12" fill="#4a6a2f"/>
      <circle cx="0" cy="-15" r="9" fill="#f0c8a0"/>
      <path d="M-3 -17 Q-1 -19 1 -17" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M-1 -11 Q1 -9 3 -11" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <!-- 叹气 -->
      <text x="-15" y="-25" font-family="serif" font-size="14" fill="#8d5a36">唉~</text>
    </g>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">"要是早一分钟"</text>
  </g>

  <path d="M400 200 L440 200" stroke="#c84a3a" stroke-width="2.5" fill="none" marker-end="url(#ar7)"/>

  <!-- 场景3：错过公交 -->
  <g transform="translate(540,200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">③错过汽车</text>
    <!-- 公共汽车开走 -->
    <g transform="translate(20,20)">
      <rect x="-40" y="-20" width="60" height="30" rx="4" fill="#7ab8d8"/>
      <rect x="-35" y="-15" width="18" height="12" fill="#a8d0e8"/>
      <rect x="-12" y="-15" width="18" height="12" fill="#a8d0e8"/>
      <circle cx="-25" cy="15" r="7" fill="#3a3a3a"/>
      <circle cx="5" cy="15" r="7" fill="#3a3a3a"/>
      <!-- 开走箭头 -->
      <path d="M30 0 L50 0" stroke="#c84a3a" stroke-width="2" fill="none" marker-end="url(#ar7)"/>
    </g>
    <!-- 元元追 -->
    <g transform="translate(-40,30)">
      <ellipse cx="0" cy="0" rx="9" ry="11" fill="#4a6a2f"/>
      <circle cx="0" cy="-13" r="8" fill="#f0c8a0"/>
      <path d="M-3 -15 Q-1 -17 1 -15" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <ellipse cx="0" cy="-8" rx="2" ry="2.5" fill="#1a1a1a"/>
      <!-- 跑 -->
      <path d="M-15 -5 L-8 -5" stroke="#8d5a36" stroke-width="1.5" opacity="0.5"/>
    </g>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">"要是早一分钟"</text>
  </g>

  <path d="M620 200 L660 200" stroke="#c84a3a" stroke-width="2.5" fill="none" marker-end="url(#ar7)"/>

  <!-- 场景4：迟到后悔 -->
  <g transform="translate(730,200)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a" font-weight="bold">④迟到后悔</text>
    <!-- 教室门 -->
    <rect x="-30" y="-30" width="60" height="70" fill="#8d5a36" rx="2"/>
    <rect x="-25" y="-25" width="50" height="60" fill="#c8843a"/>
    <circle cx="18" cy="5" r="2" fill="#7a3b14"/>
    <!-- 元元红着脸低头 -->
    <g transform="translate(0,55)">
      <ellipse cx="0" cy="0" rx="10" ry="12" fill="#4a6a2f"/>
      <circle cx="0" cy="-13" r="9" fill="#f0c8a0"/>
      <!-- 红脸 -->
      <ellipse cx="-4" cy="-11" rx="3" ry="2" fill="#e07856" opacity="0.6"/>
      <ellipse cx="4" cy="-11" rx="3" ry="2" fill="#e07856" opacity="0.6"/>
      <!-- 低头 -->
      <path d="M-3 -15 Q-1 -17 1 -15" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M-3 -9 Q0 -7 3 -9" fill="none" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">非常后悔</text>
  </g>

  <!-- 底部：第二天 -->
  <rect x="60" y="380" width="680" height="160" rx="12" fill="#fef0d8" opacity="0.6"/>
  <text x="400" y="410" text-anchor="middle" font-family="serif" font-size="18" fill="#6a8d3f" font-weight="bold">第二天：闹钟一响就起床</text>
  <!-- 元元笑着到校 -->
  <g transform="translate(300,470)">
    <ellipse cx="0" cy="0" rx="12" ry="14" fill="#4a6a2f"/>
    <circle cx="0" cy="-18" r="11" fill="#f0c8a0"/>
    <path d="M-4 -20 Q-2 -22 0 -20" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <path d="M0 -20 Q2 -22 4 -20" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <path d="M-3 -14 Q0 -11 3 -14" fill="none" stroke="#7a3b14" stroke-width="1.2"/>
    <!-- 书包 -->
    <rect x="8" y="-5" width="12" height="16" rx="2" fill="#c84a3a"/>
  </g>
  <text x="300" y="510" text-anchor="middle" font-family="serif" font-size="13" fill="#6a8d3f">元元笑了</text>
  <!-- 箭头 -->
  <path d="M380 470 L440 470" stroke="#6a8d3f" stroke-width="2.5" fill="none" marker-end="url(#ar7)"/>
  <!-- 学校 -->
  <g transform="translate(520,470)">
    <rect x="-40" y="-25" width="80" height="50" fill="#e0a050"/>
    <path d="M-45 -25 L0 -50 L45 -25 Z" fill="#c84a3a"/>
    <rect x="-8" y="-10" width="16" height="35" fill="#7a3b14"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="13" fill="#6a8d3f">准时到校</text>
  </g>
  <text x="660" y="475" text-anchor="middle" font-family="serif" font-size="14" fill="#6a8d3f" font-weight="bold">守时</text>
  <text x="660" y="495" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">是好习惯</text>

  <defs>
    <marker id="ar7" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#c84a3a"/>
    </marker>
  </defs>
</svg>
