<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="亚洲不同文明的代表性建筑和人物插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">亚洲的故事</text>
  <line x1="330" y1="58" x2="470" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 三个文明分区 -->
  <!-- 1 中国文明 -->
  <rect x="30" y="80" width="240" height="420" rx="8" fill="#fff6df" stroke="#c84a3a" stroke-width="1.5" opacity="0.6"/>
  <text x="150" y="110" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">中国文明</text>
  <text x="150" y="130" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">黄河流域</text>
  <!-- 长城/城楼 -->
  <g transform="translate(150,220)">
    <rect x="-60" y="0" width="120" height="50" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-60 0 L-60 -15 L-45 -15 L-45 -5 L-30 -5 L-30 -15 L-15 -15 L-15 -5 L0 -5 L0 -15 L15 -15 L15 -5 L30 -5 L30 -15 L45 -15 L45 -5 L60 -5 L60 0 Z" fill="#8d5a36"/>
    <rect x="-10" y="20" width="20" height="30" fill="#7a3b14"/>
    <path d="M-60 0 Q-50 -20 0 -22 Q50 -20 60 0" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <!-- 贡献 -->
  <g transform="translate(150,330)">
    <rect x="-80" y="0" width="70" height="24" rx="4" fill="#e8f0e6" stroke="#6a8d3f" stroke-width="1"/>
    <text x="-45" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">丝绸</text>
    <rect x="10" y="0" width="70" height="24" rx="4" fill="#e8f0e6" stroke="#6a8d3f" stroke-width="1"/>
    <text x="45" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">造纸术</text>
    <rect x="-80" y="32" width="70" height="24" rx="4" fill="#e8f0e6" stroke="#6a8d3f" stroke-width="1"/>
    <text x="-45" y="48" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">瓷器</text>
    <rect x="10" y="32" width="70" height="24" rx="4" fill="#e8f0e6" stroke="#6a8d3f" stroke-width="1"/>
    <text x="45" y="48" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">印刷术</text>
  </g>

  <!-- 2 印度文明 -->
  <rect x="280" y="80" width="240" height="420" rx="8" fill="#e8f0e6" stroke="#6a8d3f" stroke-width="1.5" opacity="0.5"/>
  <text x="400" y="110" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">印度文明</text>
  <text x="400" y="130" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">印度河流域</text>
  <!-- 泰姬陵式建筑 -->
  <g transform="translate(400,220)">
    <rect x="-50" y="10" width="100" height="40" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-30 10 Q-30 -10 0 -25 Q30 -10 30 10" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="-28" r="4" fill="#e8a838"/>
    <!-- 左右小塔 -->
    <path d="M-45 10 Q-45 -2 -38 -8 L-30 10" fill="#fff6df" stroke="#7a3b14" stroke-width="1"/>
    <path d="M45 10 Q45 -2 38 -8 L30 10" fill="#fff6df" stroke="#7a3b14" stroke-width="1"/>
  </g>
  <!-- 贡献 -->
  <g transform="translate(400,330)">
    <rect x="-80" y="0" width="70" height="24" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
    <text x="-45" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">数字0-9</text>
    <rect x="10" y="0" width="70" height="24" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
    <text x="45" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">佛教</text>
    <rect x="-80" y="32" width="70" height="24" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
    <text x="-45" y="48" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">棉花种植</text>
    <rect x="10" y="32" width="70" height="24" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
    <text x="45" y="48" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">象棋雏形</text>
  </g>

  <!-- 3 两河文明 -->
  <rect x="530" y="80" width="240" height="420" rx="8" fill="#d8e0e8" stroke="#4a8aaa" stroke-width="1.5" opacity="0.5"/>
  <text x="650" y="110" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">两河文明</text>
  <text x="650" y="130" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">幼发拉底河·底格里斯河</text>
  <!-- 楔形文字泥板/金字形神塔 -->
  <g transform="translate(650,220)">
    <path d="M-50 50 L-35 20 L-20 20 L-20 0 L20 0 L20 20 L35 20 L50 50 Z" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 泥板 -->
    <rect x="-30" y="60" width="60" height="30" rx="2" fill="#d8c8a8" stroke="#7a3b14" stroke-width="1.5"/>
    <g stroke="#7a3b14" stroke-width="1">
      <path d="M-22 68 L-18 64 L-18 72"/>
      <path d="M-12 68 L-8 64 L-8 72"/>
      <path d="M-2 68 L2 64 L2 72"/>
      <path d="M8 68 L12 64 L12 72"/>
      <path d="M18 68 L22 64 L22 72"/>
    </g>
  </g>
  <!-- 贡献 -->
  <g transform="translate(650,330)">
    <rect x="-80" y="0" width="70" height="24" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
    <text x="-45" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">成文法典</text>
    <rect x="10" y="0" width="70" height="24" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
    <text x="45" y="16" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">六十进制</text>
    <rect x="-80" y="32" width="70" height="24" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
    <text x="-45" y="48" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">楔形文字</text>
    <rect x="10" y="32" width="70" height="24" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1"/>
    <text x="45" y="48" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">天文历法</text>
  </g>

  <!-- 交流箭头 -->
  <g stroke="#c84a3a" stroke-width="2" fill="none" opacity="0.6">
    <path d="M270 300 L280 300" marker-end="url(#a2)"/>
    <path d="M520 300 L530 300" marker-end="url(#a2)"/>
    <path d="M530 310 L520 310" marker-end="url(#a2)"/>
    <path d="M280 310 L270 310" marker-end="url(#a2)"/>
  </g>

  <!-- 底部说明 -->
  <rect x="40" y="528" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="553" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">中国、印度、两河——亚洲孕育了多个古老文明，它们因交流而丰富，因互学而进步。</text>
</svg>
