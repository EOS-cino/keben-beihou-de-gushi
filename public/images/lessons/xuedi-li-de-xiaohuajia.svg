<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="雪地里动物脚印插画：竹叶、梅花、枫叶、月牙">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">雪地里的小画家</text>
  <line x1="290" y1="56" x2="510" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 雪地背景 -->
  <rect x="0" y="80" width="800" height="460" fill="#f0f4f8"/>
  <!-- 雪花 -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="100" cy="120" r="3"/>
    <circle cx="200" cy="100" r="2.5"/>
    <circle cx="350" cy="115" r="3"/>
    <circle cx="500" cy="105" r="2.5"/>
    <circle cx="650" cy="125" r="3"/>
    <circle cx="720" cy="100" r="2"/>
    <circle cx="150" cy="160" r="2"/>
    <circle cx="600" cy="150" r="2.5"/>
  </g>

  <!-- 小鸡脚印（竹叶） -->
  <g transform="translate(150,250)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">小鸡画竹叶</text>
    <!-- 竹叶形脚印 -->
    <g fill="#8a6a4a">
      <path d="M0 0 L-4 -25 L0 -28 L4 -25 Z"/>
      <path d="M0 0 L-18 -18 L-22 -12 L-16 -10 Z" transform="rotate(-15)"/>
      <path d="M0 0 L18 -18 L22 -12 L16 -10 Z" transform="rotate(15)"/>
    </g>
    <g fill="#8a6a4a" transform="translate(0,35)">
      <path d="M0 0 L-4 -25 L0 -28 L4 -25 Z"/>
      <path d="M0 0 L-18 -18 L-22 -12 L-16 -10 Z" transform="rotate(-15)"/>
      <path d="M0 0 L18 -18 L22 -12 L16 -10 Z" transform="rotate(15)"/>
    </g>
    <g fill="#8a6a4a" transform="translate(0,70)">
      <path d="M0 0 L-4 -25 L0 -28 L4 -25 Z"/>
      <path d="M0 0 L-18 -18 L-22 -12 L-16 -10 Z" transform="rotate(-15)"/>
      <path d="M0 0 L18 -18 L22 -12 L16 -10 Z" transform="rotate(15)"/>
    </g>
    <!-- 小鸡 -->
    <g transform="translate(0,-70)">
      <ellipse cx="0" cy="0" rx="14" ry="12" fill="#f4d840"/>
      <circle cx="-2" cy="-8" r="8" fill="#f4d840"/>
      <path d="M-8 -10 L-14 -8 L-8 -6" fill="#e89030"/>
      <circle cx="-4" cy="-10" r="1.5" fill="#1a1a1a"/>
    </g>
  </g>

  <!-- 小狗脚印（梅花） -->
  <g transform="translate(350,250)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">小狗画梅花</text>
    <!-- 梅花形脚印 -->
    <g fill="#8a6a4a">
      <ellipse cx="0" cy="5" rx="10" ry="8"/>
      <circle cx="-12" cy="-8" r="5"/>
      <circle cx="12" cy="-8" r="5"/>
      <circle cx="-7" cy="-18" r="5"/>
      <circle cx="7" cy="-18" r="5"/>
    </g>
    <g fill="#8a6a4a" transform="translate(0,40)">
      <ellipse cx="0" cy="5" rx="10" ry="8"/>
      <circle cx="-12" cy="-8" r="5"/>
      <circle cx="12" cy="-8" r="5"/>
      <circle cx="-7" cy="-18" r="5"/>
      <circle cx="7" cy="-18" r="5"/>
    </g>
    <g fill="#8a6a4a" transform="translate(0,80)">
      <ellipse cx="0" cy="5" rx="10" ry="8"/>
      <circle cx="-12" cy="-8" r="5"/>
      <circle cx="12" cy="-8" r="5"/>
      <circle cx="-7" cy="-18" r="5"/>
      <circle cx="7" cy="-18" r="5"/>
    </g>
    <!-- 小狗 -->
    <g transform="translate(0,-70)">
      <ellipse cx="0" cy="0" rx="16" ry="12" fill="#c89060"/>
      <circle cx="-8" cy="-8" r="6" fill="#c89060"/>
      <circle cx="8" cy="-8" r="6" fill="#c89060"/>
      <ellipse cx="-10" cy="-14" rx="4" ry="7" fill="#b88050"/>
      <ellipse cx="10" cy="-14" rx="4" ry="7" fill="#b88050"/>
      <circle cx="-5" cy="-2" r="1.5" fill="#1a1a1a"/>
      <circle cx="5" cy="-2" r="1.5" fill="#1a1a1a"/>
    </g>
  </g>

  <!-- 小鸭脚印（枫叶） -->
  <g transform="translate(550,250)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">小鸭画枫叶</text>
    <!-- 枫叶形脚印（带蹼） -->
    <g fill="#8a6a4a">
      <path d="M0 0 L-5 -22 L-12 -18 L-10 -10 L-20 -12 L-16 -2 L0 5 Z"/>
      <path d="M0 0 L5 -22 L12 -18 L10 -10 L20 -12 L16 -2 L0 5 Z"/>
    </g>
    <g fill="#8a6a4a" transform="translate(0,40)">
      <path d="M0 0 L-5 -22 L-12 -18 L-10 -10 L-20 -12 L-16 -2 L0 5 Z"/>
      <path d="M0 0 L5 -22 L12 -18 L10 -10 L20 -12 L16 -2 L0 5 Z"/>
    </g>
    <g fill="#8a6a4a" transform="translate(0,80)">
      <path d="M0 0 L-5 -22 L-12 -18 L-10 -10 L-20 -12 L-16 -2 L0 5 Z"/>
      <path d="M0 0 L5 -22 L12 -18 L10 -10 L20 -12 L16 -2 L0 5 Z"/>
    </g>
    <!-- 小鸭 -->
    <g transform="translate(0,-70)">
      <ellipse cx="0" cy="0" rx="14" ry="11" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
      <circle cx="-2" cy="-10" r="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
      <path d="M-10 -10 L-16 -8 L-10 -6" fill="#e89030"/>
      <circle cx="-4" cy="-12" r="1.5" fill="#1a1a1a"/>
    </g>
  </g>

  <!-- 小马脚印（月牙） -->
  <g transform="translate(680,300)">
    <text x="0" y="-40" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">小马画月牙</text>
    <!-- 月牙形蹄印 -->
    <g fill="#8a6a4a">
      <path d="M-12 0 Q0 -15 12 0 Q8 5 0 3 Q-8 5 -12 0 Z"/>
    </g>
    <g fill="#8a6a4a" transform="translate(0,35)">
      <path d="M-12 0 Q0 -15 12 0 Q8 5 0 3 Q-8 5 -12 0 Z"/>
    </g>
    <g fill="#8a6a4a" transform="translate(0,70)">
      <path d="M-12 0 Q0 -15 12 0 Q8 5 0 3 Q-8 5 -12 0 Z"/>
    </g>
    <!-- 小马 -->
    <g transform="translate(0,-70)">
      <ellipse cx="0" cy="0" rx="16" ry="10" fill="#8a5a30"/>
      <ellipse cx="-10" cy="-8" rx="8" ry="10" fill="#8a5a30"/>
      <path d="M-14 -16 L-12 -22 L-10 -16" fill="#6a4a20"/>
      <path d="M-8 -16 L-6 -22 L-4 -16" fill="#6a4a20"/>
      <circle cx="-12" cy="-6" r="1.5" fill="#1a1a1a"/>
    </g>
  </g>

  <!-- 青蛙冬眠标注 -->
  <g transform="translate(120,480)">
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="#8a7a5a" opacity="0.5"/>
    <ellipse cx="0" cy="-3" rx="22" ry="12" fill="#6ab04c" opacity="0.6"/>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">青蛙在洞里冬眠</text>
  </g>

  <!-- 标注 -->
  <line x1="150" y1="200" x2="80" y2="170" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="20" y="155" width="70" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="55" y="173" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">像竹叶</text>

  <line x1="350" y1="200" x2="350" y2="160" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="310" y="145" width="80" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="350" y="163" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">像梅花</text>

  <line x1="550" y1="200" x2="620" y2="160" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="580" y="145" width="80" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="620" y="163" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">像枫叶</text>

  <line x1="680" y1="250" x2="730" y2="220" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="700" y="205" width="80" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="740" y="223" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">像月牙</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">不用颜料不用笔，几步就成一幅画</text>
</svg>
