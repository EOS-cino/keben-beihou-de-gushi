<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="小朋友和影子的插画，阳光从不同方向照射">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">影子</text>
  <line x1="360" y1="56" x2="440" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="80" width="800" height="320" fill="#d6ecf7"/>
  <!-- 地面 -->
  <rect x="0" y="400" width="800" height="200" fill="#e8d8b8"/>

  <!-- 太阳（左上方） -->
  <circle cx="150" cy="160" r="40" fill="#f4b942"/>
  <circle cx="150" cy="160" r="52" fill="#f4b942" opacity="0.25"/>
  <!-- 太阳光线 -->
  <g stroke="#f4b942" stroke-width="3" stroke-linecap="round">
    <line x1="150" y1="100" x2="150" y2="85"/>
    <line x1="150" y1="220" x2="150" y2="235"/>
    <line x1="90" y1="160" x2="75" y2="160"/>
    <line x1="210" y1="160" x2="225" y2="160"/>
    <line x1="108" y1="118" x2="97" y2="107"/>
    <line x1="192" y1="118" x2="203" y2="107"/>
  </g>

  <!-- 光线方向（从太阳到小朋友） -->
  <path d="M190 195 L420 380" fill="none" stroke="#f4b942" stroke-width="2" stroke-dasharray="8,5" opacity="0.5"/>

  <!-- 小朋友 -->
  <g transform="translate(440,400)">
    <!-- 头 -->
    <circle cx="0" cy="-110" r="22" fill="#f0d0a8"/>
    <!-- 头发 -->
    <path d="M-22 -118 Q0 -140 22 -118 L22 -108 Q0 -125 -22 -108 Z" fill="#3a2a1a"/>
    <!-- 眼睛 -->
    <circle cx="-8" cy="-112" r="2.5" fill="#1a1a1a"/>
    <circle cx="8" cy="-112" r="2.5" fill="#1a1a1a"/>
    <!-- 嘴 -->
    <path d="M-5 -100 Q0 -96 5 -100" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 身体 -->
    <rect x="-20" y="-88" width="40" height="55" fill="#c84030" rx="4"/>
    <!-- 手臂 -->
    <rect x="-35" y="-85" width="15" height="45" fill="#c84030" rx="4"/>
    <rect x="20" y="-85" width="15" height="45" fill="#c84030" rx="4"/>
    <!-- 手 -->
    <circle cx="-27" cy="-38" r="7" fill="#f0d0a8"/>
    <circle cx="27" cy="-38" r="7" fill="#f0d0a8"/>
    <!-- 腿 -->
    <rect x="-18" y="-33" width="14" height="35" fill="#3a5a7a"/>
    <rect x="4" y="-33" width="14" height="35" fill="#3a5a7a"/>
    <!-- 鞋 -->
    <ellipse cx="-11" cy="3" rx="10" ry="5" fill="#2a2a2a"/>
    <ellipse cx="11" cy="3" rx="10" ry="5" fill="#2a2a2a"/>
  </g>

  <!-- 影子（在小朋友右后方，即太阳的相反方向） -->
  <g transform="translate(440,400)" opacity="0.35">
    <ellipse cx="55" cy="0" rx="12" ry="4" fill="#1a1a1a"/>
    <path d="M30 0 L80 -2 L85 -90 L75 -100 L40 -100 L30 -90 Z" fill="#1a1a1a" opacity="0.6"/>
    <ellipse cx="60" cy="-100" rx="18" ry="14" fill="#1a1a1a" opacity="0.6"/>
  </g>

  <!-- 标注：太阳 -->
  <line x1="150" y1="115" x2="150" y2="90" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="105" y="68" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="150" y="86" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">光源·太阳</text>

  <!-- 标注：小朋友 -->
  <line x1="440" y1="290" x2="440" y2="260" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="395" y="238" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="440" y="256" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">我</text>

  <!-- 标注：影子 -->
  <line x1="510" y1="350" x2="580" y2="320" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="560" y="305" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="605" y="323" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">影子·小黑狗</text>

  <!-- 方位指示 -->
  <text x="700" y="430" font-family="serif" font-size="13" fill="#7a3b14">光从左来</text>
  <text x="700" y="450" font-family="serif" font-size="13" fill="#7a3b14">影在右后</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">影子在前，影子在后，影子常常跟着我，就像一条小黑狗</text>
</svg>
