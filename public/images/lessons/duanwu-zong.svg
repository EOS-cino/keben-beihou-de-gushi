<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="粽子和端午节元素的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" fill="#2d2a24" font-family="sans-serif" font-weight="bold">端午粽</text>

  <!-- 天空 -->
  <rect x="0" y="60" width="800" height="200" fill="#d6ecf7"/>
  <!-- 太阳 -->
  <circle cx="680" cy="110" r="28" fill="#f4b942"/>
  <circle cx="680" cy="110" r="36" fill="#f4b942" opacity="0.25"/>
  <!-- 云朵 -->
  <ellipse cx="130" cy="100" rx="40" ry="15" fill="#ffffff" opacity="0.85"/>

  <!-- 远山 -->
  <path d="M0 260 L150 200 L300 240 L450 190 L600 230 L800 210 L800 260 Z" fill="#8aaa8a" opacity="0.5"/>

  <!-- 地面/桌面 -->
  <path d="M0 260 L800 260 L800 600 L0 600 Z" fill="#e8d8b8"/>
  <path d="M0 270 Q200 265 400 270 Q600 275 800 268 L800 600 L0 600 Z" fill="#d4c4a8"/>

  <!-- 箬竹叶（散落在桌上） -->
  <g transform="translate(100,380)">
    <path d="M0 0 Q20 -15 50 -10 Q40 5 0 0" fill="#4a8a3a"/>
    <path d="M0 0 Q20 -15 50 -10" fill="none" stroke="#3a6b28" stroke-width="1"/>
  </g>
  <g transform="translate(680,390)">
    <path d="M0 0 Q-20 -15 -50 -10 Q-40 5 0 0" fill="#4a8a3a"/>
    <path d="M0 0 Q-20 -15 -50 -10" fill="none" stroke="#3a6b28" stroke-width="1"/>
  </g>
  <text x="100" y="410" text-anchor="middle" font-size="10" fill="#3a6b28" font-family="sans-serif">箬竹叶</text>
  <text x="680" y="420" text-anchor="middle" font-size="10" fill="#3a6b28" font-family="sans-serif">箬竹叶</text>

  <!-- 粽子1（剥开的，展示内部） -->
  <g transform="translate(250,380)">
    <!-- 粽子三角锥形 -->
    <path d="M0 0 L-40 50 L40 50 Z" fill="#5cb070"/>
    <path d="M0 0 L-40 50 L0 50 Z" fill="#4a9d5e"/>
    <path d="M0 0 L40 50 L0 50 Z" fill="#6ab04c"/>
    <!-- 剥开的部分（露出糯米） -->
    <path d="M-15 20 L15 20 L10 45 L-10 45 Z" fill="#fef8e8"/>
    <path d="M-12 25 L12 25 L8 42 L-8 42 Z" fill="#fff8d8"/>
    <!-- 红枣 -->
    <ellipse cx="-3" cy="30" rx="5" ry="4" fill="#c84a3a"/>
    <ellipse cx="4" cy="36" rx="4" ry="3" fill="#c84a3a"/>
    <!-- 丝线 -->
    <path d="M-35 30 Q0 25 35 30" fill="none" stroke="#c46a2a" stroke-width="2"/>
    <text x="0" y="70" text-anchor="middle" font-size="11" fill="#3a6b28" font-family="sans-serif" font-weight="bold">剥开的粽子</text>
  </g>

  <!-- 粽子2（包好的） -->
  <g transform="translate(420,390)">
    <path d="M0 0 L-35 45 L35 45 Z" fill="#5cb070"/>
    <path d="M0 0 L-35 45 L0 45 Z" fill="#4a9d5e"/>
    <path d="M0 0 L35 45 L0 45 Z" fill="#6ab04c"/>
    <!-- 丝线缠绕 -->
    <path d="M-30 15 Q0 10 30 15" fill="none" stroke="#c46a2a" stroke-width="2"/>
    <path d="M-25 30 Q0 25 25 30" fill="none" stroke="#c46a2a" stroke-width="2"/>
    <path d="M-20 40 Q0 38 20 40" fill="none" stroke="#c46a2a" stroke-width="1.5"/>
    <text x="0" y="65" text-anchor="middle" font-size="11" fill="#3a6b28" font-family="sans-serif" font-weight="bold">包好的粽子</text>
  </g>

  <!-- 粽子3（小的） -->
  <g transform="translate(550,400)">
    <path d="M0 0 L-28 38 L28 38 Z" fill="#5cb070"/>
    <path d="M0 0 L-28 38 L0 38 Z" fill="#4a9d5e"/>
    <path d="M0 0 L28 38 L0 38 Z" fill="#6ab04c"/>
    <path d="M-22 18 Q0 14 22 18" fill="none" stroke="#c46a2a" stroke-width="1.5"/>
    <path d="M-18 28 Q0 25 18 28" fill="none" stroke="#c46a2a" stroke-width="1.5"/>
  </g>

  <!-- 食材标注 -->
  <g transform="translate(120,480)">
    <!-- 糯米 -->
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#fff8d8"/>
    <circle cx="-4" cy="-2" r="2.5" fill="#ffffff" stroke="#e8d8a8" stroke-width="0.5"/>
    <circle cx="3" cy="0" r="2.5" fill="#ffffff" stroke="#e8d8a8" stroke-width="0.5"/>
    <circle cx="-1" cy="3" r="2.5" fill="#ffffff" stroke="#e8d8a8" stroke-width="0.5"/>
    <text x="0" y="20" text-anchor="middle" font-size="10" fill="#6b6557" font-family="sans-serif">白白的糯米</text>
  </g>

  <g transform="translate(250,480)">
    <!-- 红枣 -->
    <ellipse cx="0" cy="0" rx="8" ry="6" fill="#c84a3a"/>
    <ellipse cx="-2" cy="-2" rx="3" ry="2" fill="#e36f5b" opacity="0.6"/>
    <text x="0" y="20" text-anchor="middle" font-size="10" fill="#6b6557" font-family="sans-serif">红红的枣子</text>
  </g>

  <g transform="translate(380,480)">
    <!-- 箬竹叶 -->
    <path d="M0 0 Q15 -12 35 -8 Q25 5 0 0" fill="#4a8a3a"/>
    <text x="18" y="20" text-anchor="middle" font-size="10" fill="#6b6557" font-family="sans-serif">青青的箬竹叶</text>
  </g>

  <g transform="translate(520,480)">
    <!-- 丝线 -->
    <path d="M0 0 Q10 -5 20 0 Q30 5 40 0" fill="none" stroke="#c46a2a" stroke-width="2.5"/>
    <text x="20" y="20" text-anchor="middle" font-size="10" fill="#6b6557" font-family="sans-serif">细细的丝线</text>
  </g>

  <!-- 龙舟（右上角小图） -->
  <g transform="translate(640,180)">
    <!-- 龙舟简化 -->
    <path d="M-40 0 Q-45 10 -35 12 L35 12 Q45 10 40 0 Z" fill="#e36f5b"/>
    <path d="M-40 0 L40 0" stroke="#c84a3a" stroke-width="2"/>
    <!-- 龙头 -->
    <path d="M-40 0 Q-50 -5 -48 -10 Q-42 -8 -40 -3" fill="#e36f5b"/>
    <circle cx="-45" cy="-5" r="1.5" fill="#1a1a1a"/>
    <!-- 龙尾 -->
    <path d="M40 0 Q50 -5 48 -12" fill="none" stroke="#e36f5b" stroke-width="3"/>
    <!-- 划船的人 -->
    <circle cx="-15" cy="-8" r="4" fill="#f4c8a0"/>
    <circle cx="5" cy="-8" r="4" fill="#f4c8a0"/>
    <circle cx="20" cy="-8" r="4" fill="#f4c8a0"/>
    <!-- 桨 -->
    <line x1="-15" y1="-4" x2="-18" y2="8" stroke="#8d6a3d" stroke-width="1.5"/>
    <line x1="5" y1="-4" x2="2" y2="8" stroke="#8d6a3d" stroke-width="1.5"/>
    <line x1="20" y1="-4" x2="17" y2="8" stroke="#8d6a3d" stroke-width="1.5"/>
    <text x="0" y="30" text-anchor="middle" font-size="10" fill="#c84a3a" font-family="sans-serif">赛龙舟</text>
  </g>

  <!-- 艾草（左上角） -->
  <g transform="translate(80,180)">
    <path d="M0 30 L0 -10" stroke="#4a8a3a" stroke-width="2"/>
    <ellipse cx="-5" cy="0" rx="3" ry="8" fill="#5cb070" transform="rotate(-20 -5 0)"/>
    <ellipse cx="5" cy="-5" rx="3" ry="8" fill="#5cb070" transform="rotate(20 5 -5)"/>
    <ellipse cx="-5" cy="10" rx="3" ry="8" fill="#5cb070" transform="rotate(-20 -5 10)"/>
    <ellipse cx="5" cy="5" rx="3" ry="8" fill="#5cb070" transform="rotate(20 5 5)"/>
    <text x="0" y="45" text-anchor="middle" font-size="10" fill="#3a6b28" font-family="sans-serif">挂艾草</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="560" text-anchor="middle" font-size="14" fill="#2d2a24" font-family="sans-serif" font-weight="bold">端午节：包粽子、赛龙舟、挂艾草——纪念爱国诗人屈原</text>
</svg>
