<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="孩子仰望星空数星星的插画">
  <rect width="800" height="600" fill="#1a1a3e"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" fill="#fef9ed" font-family="sans-serif" font-weight="bold">数星星的孩子</text>

  <!-- 星空背景渐变 -->
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d2e"/>
      <stop offset="60%" stop-color="#1e2a5e"/>
      <stop offset="100%" stop-color="#2d3a6e"/>
    </linearGradient>
  </defs>
  <rect x="0" y="60" width="800" height="400" fill="url(#skyGrad)"/>

  <!-- 星星（大小不一） -->
  <circle cx="80" cy="100" r="2" fill="#ffffff"/>
  <circle cx="150" cy="85" r="1.5" fill="#ffffff"/>
  <circle cx="200" cy="120" r="2.5" fill="#fff4b8"/>
  <circle cx="260" cy="90" r="1.5" fill="#ffffff"/>
  <circle cx="320" cy="110" r="2" fill="#ffffff"/>
  <circle cx="380" cy="80" r="1.5" fill="#ffffff"/>
  <circle cx="440" cy="130" r="2" fill="#fff4b8"/>
  <circle cx="500" cy="95" r="1.5" fill="#ffffff"/>
  <circle cx="560" cy="115" r="2.5" fill="#ffffff"/>
  <circle cx="620" cy="85" r="1.5" fill="#ffffff"/>
  <circle cx="680" cy="125" r="2" fill="#fff4b8"/>
  <circle cx="730" cy="100" r="1.5" fill="#ffffff"/>
  <circle cx="100" cy="160" r="1.5" fill="#ffffff"/>
  <circle cx="180" cy="180" r="2" fill="#ffffff"/>
  <circle cx="250" cy="165" r="1.5" fill="#ffffff"/>
  <circle cx="350" cy="175" r="2" fill="#fff4b8"/>
  <circle cx="450" cy="160" r="1.5" fill="#ffffff"/>
  <circle cx="550" cy="185" r="2" fill="#ffffff"/>
  <circle cx="650" cy="170" r="1.5" fill="#ffffff"/>
  <circle cx="720" cy="190" r="2" fill="#fff4b8"/>
  <circle cx="60" cy="220" r="1.5" fill="#ffffff"/>
  <circle cx="130" cy="240" r="2" fill="#ffffff"/>
  <circle cx="300" cy="230" r="1.5" fill="#ffffff"/>
  <circle cx="480" cy="245" r="2" fill="#fff4b8"/>
  <circle cx="600" cy="225" r="1.5" fill="#ffffff"/>
  <circle cx="700" cy="250" r="1.5" fill="#ffffff"/>

  <!-- 北斗七星（连线标注） -->
  <g>
    <circle cx="120" cy="300" r="4" fill="#fff4b8"/>
    <circle cx="170" cy="280" r="4" fill="#fff4b8"/>
    <circle cx="225" cy="285" r="4" fill="#fff4b8"/>
    <circle cx="275" cy="305" r="4" fill="#fff4b8"/>
    <circle cx="310" cy="345" r="4" fill="#fff4b8"/>
    <circle cx="350" cy="370" r="4" fill="#fff4b8"/>
    <circle cx="400" cy="365" r="4" fill="#fff4b8"/>
    <!-- 连线 -->
    <path d="M120 300 L170 280 L225 285 L275 305 L310 345 L350 370 L400 365" fill="none" stroke="#fff4b8" stroke-width="1.5" opacity="0.6"/>
    <text x="260" y="270" text-anchor="middle" font-size="13" fill="#fff4b8" font-family="sans-serif" font-weight="bold">北斗七星</text>
  </g>

  <!-- 月亮 -->
  <g transform="translate(640,160)">
    <circle cx="0" cy="0" r="35" fill="#fef0c8"/>
    <circle cx="8" cy="-5" r="33" fill="#1e2a5e"/>
    <circle cx="-12" cy="8" r="4" fill="#e8d8a8" opacity="0.5"/>
    <circle cx="-5" cy="15" r="3" fill="#e8d8a8" opacity="0.5"/>
  </g>
  <text x="640" y="215" text-anchor="middle" font-size="12" fill="#c8c8e8" font-family="sans-serif">月亮</text>

  <!-- 地面 -->
  <path d="M0 460 Q200 440 400 455 Q600 465 800 445 L800 600 L0 600 Z" fill="#2d4a2e"/>
  <path d="M0 470 Q200 455 400 465 Q600 475 800 460 L800 600 L0 600 Z" fill="#1d3a1e"/>

  <!-- 房子（远处） -->
  <g transform="translate(580,400)">
    <rect x="0" y="20" width="80" height="55" fill="#8d6a3d"/>
    <path d="M-10 25 L40 -10 L90 25 Z" fill="#6b4a2d"/>
    <rect x="30" y="40" width="20" height="35" fill="#4a3520"/>
    <rect x="8" y="35" width="14" height="14" fill="#f4b942" opacity="0.7"/>
    <rect x="58" y="35" width="14" height="14" fill="#f4b942" opacity="0.7"/>
  </g>

  <!-- 树 -->
  <g transform="translate(100,380)">
    <rect x="-5" y="40" width="10" height="50" fill="#5a3d2a"/>
    <circle cx="0" cy="30" r="30" fill="#2d6b3e"/>
    <circle cx="-15" cy="40" r="22" fill="#3d8b4e"/>
    <circle cx="15" cy="40" r="22" fill="#3d8b4e"/>
  </g>

  <!-- 孩子（躺在竹席上仰望星空） -->
  <g transform="translate(280,470)">
    <!-- 竹席 -->
    <ellipse cx="60" cy="55" rx="90" ry="15" fill="#c4a468" opacity="0.6"/>
    <!-- 身体 -->
    <ellipse cx="60" cy="40" rx="55" ry="14" fill="#4a7ab8"/>
    <!-- 腿 -->
    <ellipse cx="105" cy="42" rx="25" ry="10" fill="#3a6aa8"/>
    <!-- 头 -->
    <circle cx="15" cy="30" r="18" fill="#f4c8a0"/>
    <!-- 头发 -->
    <path d="M0 25 Q5 10 15 12 Q25 10 30 25 Q28 18 15 16 Q5 18 0 25" fill="#2a1a0a"/>
    <!-- 眼睛（向上看） -->
    <circle cx="10" cy="24" r="2" fill="#1a1a1a"/>
    <circle cx="20" cy="24" r="2" fill="#1a1a1a"/>
    <!-- 嘴 -->
    <path d="M12 33 Q15 35 18 33" fill="none" stroke="#8d5a3d" stroke-width="1.5"/>
    <!-- 手臂指向天空 -->
    <path d="M30 35 Q5 15 -15 0" fill="none" stroke="#f4c8a0" stroke-width="8" stroke-linecap="round"/>
    <!-- 指向星星的虚线 -->
    <path d="M-15 0 L-50 -80" fill="none" stroke="#fff4b8" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  </g>
  <text x="340" y="545" text-anchor="middle" font-size="13" fill="#fef9ed" font-family="sans-serif">小张衡</text>

  <!-- 萤火虫 -->
  <circle cx="500" cy="420" r="3" fill="#fff4b8" opacity="0.8"/>
  <circle cx="520" cy="400" r="2" fill="#fff4b8" opacity="0.6"/>
  <circle cx="490" cy="395" r="2.5" fill="#fff4b8" opacity="0.7"/>
</svg>
