<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="月亮变成小船载着孩子飞过夜空插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">月亮船</text>
  <line x1="340" y1="56" x2="460" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——划过银河，去找最亮的星</text>

  <!-- 夜空 -->
  <rect x="0" y="90" width="800" height="510" fill="#1a2a4a"/>
  <rect x="0" y="90" width="800" height="510" fill="#4a90b8" opacity="0.1"/>

  <!-- 星星 -->
  <circle cx="100" cy="140" r="2" fill="#fef9ed"/>
  <circle cx="200" cy="120" r="2.5" fill="#fef9ed"/>
  <circle cx="300" cy="150" r="2" fill="#fef9ed"/>
  <circle cx="500" cy="130" r="2.5" fill="#e8a838"/>
  <circle cx="600" cy="160" r="2" fill="#fef9ed"/>
  <circle cx="700" cy="130" r="2.5" fill="#fef9ed"/>
  <circle cx="150" cy="220" r="2" fill="#fef9ed"/>
  <circle cx="650" cy="240" r="2" fill="#fef9ed"/>
  <circle cx="120" cy="320" r="2" fill="#fef9ed"/>
  <circle cx="680" cy="340" r="2" fill="#fef9ed"/>

  <!-- 银河 -->
  <path d="M50 500 Q300 300 550 250 Q700 220 780 200" fill="none" stroke="#fef9ed" stroke-width="50" opacity="0.1" stroke-linecap="round"/>

  <!-- 云朵山 -->
  <g opacity="0.5">
    <ellipse cx="120" cy="450" rx="60" ry="25" fill="#fef9ed"/>
    <ellipse cx="160" cy="440" rx="50" ry="30" fill="#fef9ed"/>
    <ellipse cx="640" cy="470" rx="55" ry="22" fill="#fef9ed"/>
    <ellipse cx="680" cy="460" rx="45" ry="28" fill="#fef9ed"/>
  </g>

  <!-- 月亮船 -->
  <g transform="translate(400, 300)">
    <!-- 船身（弯月形） -->
    <path d="M-90 0 Q-70 -50 0 -55 Q70 -50 90 0 Q60 20 0 20 Q-60 20 -90 0 Z" fill="#e8a838" opacity="0.9" stroke="#c8843a" stroke-width="2"/>
    <path d="M-90 0 Q-70 -50 0 -55 Q70 -50 90 0" fill="#fef9ed" opacity="0.4"/>
    <!-- 船里的光 -->
    <ellipse cx="0" cy="-15" rx="60" ry="20" fill="#fef9ed" opacity="0.3"/>

    <!-- 老爷爷 -->
    <g transform="translate(-30, -25)">
      <circle cx="0" cy="0" r="10" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-8 -5 Q0 -12 8 -5" fill="#fef9ed"/>
      <circle cx="-3" cy="0" r="1.5" fill="#7a3b14"/>
      <circle cx="3" cy="0" r="1.5" fill="#7a3b14"/>
      <!-- 白胡子 -->
      <path d="M-6 5 Q0 18 6 5 Q4 12 0 15 Q-4 12 -6 5" fill="#fef9ed" stroke="#7a3b14" stroke-width="0.5"/>
      <ellipse cx="0" cy="18" rx="14" ry="16" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    </g>

    <!-- 小禾 -->
    <g transform="translate(30, -20)">
      <circle cx="0" cy="0" r="9" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-7 -4 Q0 -10 7 -4" fill="#7a3b14"/>
      <circle cx="-3" cy="0" r="1.5" fill="#7a3b14"/>
      <circle cx="3" cy="0" r="1.5" fill="#7a3b14"/>
      <path d="M-2 4 Q0 6 2 4" fill="none" stroke="#7a3b14" stroke-width="1"/>
      <ellipse cx="0" cy="18" rx="12" ry="14" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 抓船舷的手 -->
      <path d="M-12 12 Q-18 8 -20 0" fill="none" stroke="#e07856" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- 船桨 -->
    <path d="M90 0 Q110 10 115 25" fill="none" stroke="#8d5a36" stroke-width="3"/>
    <ellipse cx="118" cy="28" rx="6" ry="10" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
  </g>

  <!-- 萤火虫般的星星 -->
  <g>
    <circle cx="320" cy="280" r="3" fill="#e8a838"/>
    <circle cx="320" cy="280" r="6" fill="#e8a838" opacity="0.3"/>
    <circle cx="480" cy="310" r="3" fill="#e8a838"/>
    <circle cx="480" cy="310" r="6" fill="#e8a838" opacity="0.3"/>
    <circle cx="350" cy="350" r="2.5" fill="#e8a838"/>
    <circle cx="450" cy="360" r="2.5" fill="#e8a838"/>
  </g>

  <!-- 地面小房子和灯光 -->
  <g transform="translate(400, 540)">
    <path d="M-25 0 L-25 -25 L0 -40 L25 -25 L25 0 Z" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-8" y="-15" width="16" height="15" fill="#e8a838"/>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="10" fill="#fef9ed">家的灯光</text>
  </g>

  <!-- 标注 -->
  <text x="560" y="200" font-family="serif" font-size="12" fill="#e8a838">去找最亮的星</text>
  <path d="M540 210 Q500 240 470 270" fill="none" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="3,3"/>
</svg>
