<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="小雪节气飘着细雪的村庄与红梅">
  <rect width="800" height="600" fill="#fef9ed"/>
  <rect x="0" y="0" width="800" height="300" fill="#4a90b8" opacity="0.08"/>
  <!-- 灰蒙蒙天空 -->
  <rect x="0" y="0" width="800" height="220" fill="#c8d4dc" opacity="0.3"/>
  <!-- 远山浮白 -->
  <path d="M0 230 Q160 170 320 220 Q480 180 640 215 Q740 195 800 225 L800 260 L0 260 Z" fill="#dce4e8" opacity="0.7"/>
  <!-- 村庄老屋 -->
  <g transform="translate(230 290)">
    <path d="M-70 0 L0 -55 L70 0 Z" fill="#e07856"/>
    <rect x="-58" y="0" width="116" height="70" fill="#f4e4c4" stroke="#8d5a36" stroke-width="2"/>
    <rect x="-16" y="28" width="32" height="42" fill="#8d5a36"/>
    <rect x="-46" y="14" width="22" height="20" fill="#4a90b8" opacity="0.5"/>
    <rect x="24" y="14" width="22" height="20" fill="#4a90b8" opacity="0.5"/>
    <rect x="22" y="-46" width="12" height="20" fill="#8d5a36"/>
    <path d="M28 -46 Q26 -62 31 -72 Q27 -82 33 -92" stroke="#ccc" stroke-width="2.5" fill="none" opacity="0.6" stroke-linecap="round"/>
  </g>
  <!-- 挂着的腊肉 -->
  <g transform="translate(330 280)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#8d5a36" stroke-width="1.5"/>
    <rect x="-7" y="10" width="14" height="34" rx="3" fill="#c84a3a" opacity="0.8"/>
    <rect x="-7" y="10" width="14" height="6" fill="#8d5a36"/>
  </g>
  <g transform="translate(358 282)">
    <line x1="0" y1="-8" x2="0" y2="12" stroke="#8d5a36" stroke-width="1.5"/>
    <rect x="-6" y="12" width="12" height="30" rx="3" fill="#c84a3a" opacity="0.75"/>
    <rect x="-6" y="12" width="12" height="5" fill="#8d5a36"/>
  </g>
  <!-- 腊梅 -->
  <g transform="translate(560 360)">
    <rect x="-3" y="0" width="6" height="70" fill="#8d6f47"/>
    <path d="M0 10 Q-26 0 -46 -14" stroke="#8d6f47" stroke-width="3" fill="none"/>
    <path d="M0 18 Q26 8 46 -6" stroke="#8d6f47" stroke-width="3" fill="none"/>
    <circle cx="-40" cy="-10" r="6" fill="#e8a838"/>
    <circle cx="40" cy="-2" r="5" fill="#e8a838"/>
    <circle cx="-18" cy="2" r="5" fill="#e8a838"/>
    <circle cx="20" cy="10" r="4" fill="#e8a838"/>
    <circle cx="-2" cy="-4" r="4" fill="#e8a838"/>
    <circle cx="-40" cy="-10" r="2" fill="#c0651a"/>
    <circle cx="40" cy="-2" r="1.5" fill="#c0651a"/>
  </g>
  <!-- 光秃老槐树 -->
  <g transform="translate(110 360)">
    <rect x="-4" y="0" width="8" height="80" fill="#7a5a3a"/>
    <path d="M0 5 Q-24 -6 -42 -26" stroke="#7a5a3a" stroke-width="3.5" fill="none"/>
    <path d="M0 5 Q24 -6 42 -26" stroke="#7a5a3a" stroke-width="3.5" fill="none"/>
    <path d="M0 2 Q-12 -22 -20 -44" stroke="#7a5a3a" stroke-width="2.5" fill="none"/>
    <path d="M0 2 Q12 -22 20 -44" stroke="#7a5a3a" stroke-width="2.5" fill="none"/>
  </g>
  <!-- 地面 -->
  <rect x="0" y="450" width="800" height="150" fill="#e8a838" opacity="0.12"/>
  <rect x="0" y="450" width="800" height="150" fill="#9fc8b4" opacity="0.15"/>
  <!-- 细雪 -->
  <g fill="#fff" stroke="#c8d4dc" stroke-width="0.5">
    <circle cx="120" cy="120" r="2.5"/>
    <circle cx="220" cy="80" r="2"/>
    <circle cx="320" cy="140" r="2.5"/>
    <circle cx="420" cy="90" r="2"/>
    <circle cx="520" cy="130" r="2.5"/>
    <circle cx="620" cy="70" r="2"/>
    <circle cx="700" cy="120" r="2.5"/>
    <circle cx="170" cy="200" r="2"/>
    <circle cx="380" cy="190" r="2"/>
    <circle cx="580" cy="200" r="2.5"/>
    <circle cx="80" cy="240" r="2"/>
    <circle cx="480" cy="240" r="2"/>
    <circle cx="680" cy="220" r="2.5"/>
  </g>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#2d6a4f">小雪的记忆</text>
  <text x="400" y="520" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">小雪腌菜大雪腌肉，冬天的味道从这里开始</text>
  <text x="400" y="548" text-anchor="middle" font-family="serif" font-size="14" fill="#c8843a">第二十个节气 · 天地闭塞而成冬</text>
</svg>
