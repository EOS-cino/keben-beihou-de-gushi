<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一个孩子趴在窗台上望着天空，旁边挂着一件绿色的新雨衣">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 室内墙 -->
  <rect x="0" y="0" width="800" height="460" fill="#f3ece0"/>
  <rect x="0" y="460" width="800" height="140" fill="#e8d9c0"/>
  <!-- 窗户 -->
  <rect x="200" y="60" width="400" height="280" fill="#a8d0e8" stroke="#7a3b14" stroke-width="6"/>
  <line x1="400" y1="60" x2="400" y2="340" stroke="#7a3b14" stroke-width="4"/>
  <line x1="200" y1="200" x2="600" y2="200" stroke="#7a3b14" stroke-width="4"/>
  <!-- 窗外天空云 -->
  <ellipse cx="280" cy="120" rx="40" ry="20" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="320" cy="130" rx="30" ry="16" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="500" cy="110" rx="35" ry="18" fill="#ffffff" opacity="0.8"/>
  <!-- 乌云（盼雨） -->
  <ellipse cx="480" cy="260" rx="50" ry="26" fill="#8d5a36" opacity="0.4"/>
  <ellipse cx="520" cy="270" rx="36" ry="20" fill="#8d5a36" opacity="0.4"/>
  <!-- 雨滴 -->
  <line x1="460" y1="290" x2="455" y2="305" stroke="#7ab8d8" stroke-width="2"/>
  <line x1="490" y1="295" x2="485" y2="310" stroke="#7ab8d8" stroke-width="2"/>
  <line x1="520" y1="295" x2="515" y2="310" stroke="#7ab8d8" stroke-width="2"/>
  <line x1="540" y1="290" x2="535" y2="305" stroke="#7ab8d8" stroke-width="2"/>
  <!-- 窗台 -->
  <rect x="180" y="340" width="440" height="20" fill="#8d5a36" stroke="#7a3b14" stroke-width="2"/>
  <!-- 孩子（趴在窗台） -->
  <ellipse cx="400" cy="380" rx="40" ry="26" fill="#c84a3a"/>
  <!-- 头 -->
  <ellipse cx="400" cy="355" rx="24" ry="26" fill="#e8c9a0"/>
  <path d="M376 348 q24 -18 48 0 q-24 -10 -48 0 Z" fill="#7a3b14"/>
  <!-- 眼睛望窗外 -->
  <circle cx="414" cy="356" r="2.5" fill="#7a3b14"/>
  <circle cx="430" cy="356" r="2.5" fill="#7a3b14"/>
  <!-- 嘴嘟囔 -->
  <path d="M422 368 q4 -2 8 0" stroke="#7a3b14" stroke-width="1.5" fill="none"/>
  <!-- 手趴窗台 -->
  <ellipse cx="360" cy="350" rx="10" ry="7" fill="#e8c9a0"/>
  <ellipse cx="440" cy="350" rx="10" ry="7" fill="#e8c9a0"/>
  <!-- 新雨衣（挂在墙上） -->
  <!-- 衣架钩 -->
  <path d="M120 200 q6 -10 0 -16 q-6 -6 0 -10" stroke="#7a3b14" stroke-width="2.5" fill="none"/>
  <!-- 雨衣 -->
  <path d="M90 210 Q120 200 150 210 L160 360 Q120 370 80 360 Z" fill="#6a8d3f" stroke="#7a3b14" stroke-width="2.5"/>
  <!-- 雨衣帽子 -->
  <path d="M100 210 Q120 185 140 210" fill="#6a8d3f" stroke="#7a3b14" stroke-width="2.5"/>
  <!-- 雨衣袖子 -->
  <path d="M90 230 q-16 30 -10 60" stroke="#6a8d3f" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M150 230 q16 30 10 60" stroke="#6a8d3f" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- 雨衣扣子 -->
  <circle cx="120" cy="250" r="3" fill="#7a3b14"/>
  <circle cx="120" cy="280" r="3" fill="#7a3b14"/>
  <circle cx="120" cy="310" r="3" fill="#7a3b14"/>
  <!-- 标注：新雨衣 -->
  <rect x="40" y="380" width="80" height="22" rx="4" fill="#ffffff" stroke="#7a3b14" stroke-width="1.5"/>
  <text x="80" y="396" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">新雨衣</text>
  <path d="M120 390 l20 -20" stroke="#7a3b14" stroke-width="1.5" fill="none" stroke-dasharray="3 3"/>
  <!-- 标题 -->
  <text x="400" y="555" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">盼</text>
</svg>
