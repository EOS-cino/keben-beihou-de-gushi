<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="夜空中繁星闪烁、孩子仰望星空的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 夜空背景 -->
  <rect x="0" y="0" width="800" height="420" rx="0" fill="#4a90b8" opacity="0.15"/>
  <!-- 星星 -->
  <g fill="#e8a838">
    <circle cx="100" cy="80" r="3"/>
    <circle cx="180" cy="120" r="2"/>
    <circle cx="250" cy="60" r="4"/>
    <circle cx="320" cy="100" r="2.5"/>
    <circle cx="400" cy="50" r="3.5"/>
    <circle cx="480" cy="90" r="2"/>
    <circle cx="550" cy="70" r="3"/>
    <circle cx="620" cy="110" r="2.5"/>
    <circle cx="690" cy="60" r="4"/>
    <circle cx="730" cy="130" r="2"/>
    <circle cx="60" cy="160" r="2.5"/>
    <circle cx="140" cy="200" r="3"/>
    <circle cx="220" cy="170" r="2"/>
    <circle cx="300" cy="220" r="3.5"/>
    <circle cx="380" cy="180" r="2"/>
    <circle cx="460" cy="230" r="2.5"/>
    <circle cx="540" cy="190" r="3"/>
    <circle cx="610" cy="240" r="2"/>
    <circle cx="680" cy="200" r="3.5"/>
    <circle cx="750" cy="250" r="2.5"/>
  </g>
  <!-- 闪烁的大星星 -->
  <g fill="#e07856">
    <path d="M200 140 L205 155 L220 155 L208 165 L213 180 L200 170 L187 180 L192 165 L180 155 L195 155 Z"/>
    <path d="M580 160 L584 172 L597 172 L587 180 L591 192 L580 184 L569 192 L573 180 L563 172 L576 172 Z"/>
    <path d="M450 110 L453 120 L464 120 L455 126 L458 136 L450 130 L442 136 L445 126 L436 120 L447 120 Z"/>
  </g>
  <!-- 银河 -->
  <path d="M50 300 Q400 200 750 320" stroke="#e8a838" stroke-width="30" fill="none" opacity="0.12" stroke-linecap="round"/>
  <!-- 地面 -->
  <path d="M0 420 Q400 400 800 420 L800 600 L0 600 Z" fill="#dceee3"/>
  <path d="M0 460 Q400 440 800 460 L800 600 L0 600 Z" fill="#9fc8b4" opacity="0.5"/>
  <!-- 孩子 -->
  <g transform="translate(400 460)">
    <!-- 身体 -->
    <path d="M-25 0 L-30 -80 L30 -80 L25 0 Z" fill="#2d6a4f"/>
    <!-- 头 -->
    <circle cx="0" cy="-100" r="22" fill="#f4d4a8"/>
    <!-- 头发 -->
    <path d="M-22 -110 Q0 -130 22 -110 L22 -100 Q0 -95 -22 -100 Z" fill="#333"/>
    <!-- 眼睛朝上 -->
    <path d="M-8 -108 Q-5 -112 -2 -108" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M2 -108 Q5 -112 8 -108" stroke="#333" stroke-width="2" fill="none"/>
    <!-- 手臂举起 -->
    <path d="M-25 -70 L-45 -110" stroke="#f4d4a8" stroke-width="8" stroke-linecap="round"/>
    <path d="M25 -70 L45 -110" stroke="#f4d4a8" stroke-width="8" stroke-linecap="round"/>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="700" fill="#2d6a4f">星星的家</text>
  <text x="400" y="82" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#7a7468">抬头看天，每一颗星星都藏着故事</text>
</svg>
