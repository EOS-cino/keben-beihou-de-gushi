<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="读不完的大书">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">读不完的大书</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">大自然是一本永远读不完的书</text>
  <g transform="translate(160,300)">
    <circle cx="0" cy="0" r="30" fill="#fbe9a8" stroke="#c98a3a" stroke-width="2"/>
    <path d="M-40,30 Q0,10 40,30" fill="none" stroke="#7a8aa8" stroke-width="3"/>
    <text x="0" y="90" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">天空·日月</text>
  </g>
  <g transform="translate(400,300)">
    <rect x="-30" y="-20" width="60" height="80" rx="4" fill="#8fb86a" stroke="#3a6b2a" stroke-width="2"/>
    <path d="M-30,-20 q30,10 60,0" fill="none" stroke="#3a6b2a" stroke-width="2"/>
    <text x="0" y="100" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">草木·葱翠</text>
  </g>
  <g transform="translate(640,300)">
    <ellipse cx="0" cy="10" rx="24" ry="16" fill="#d8a868" stroke="#7a4a1a" stroke-width="2"/>
    <circle cx="-14" cy="-6" r="10" fill="#e8c098" stroke="#7a4a1a" stroke-width="2"/>
    <text x="0" y="90" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">鸟兽·虫鱼</text>
  </g>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">最好的课堂，就在窗外</text>
</svg>
