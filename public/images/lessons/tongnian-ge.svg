<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="孩子们唱着歌在田野奔跑的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">童年歌</text>
  <line x1="340" y1="56" x2="460" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——一首歌，陪着一整个童年</text>

  <!-- 天空 -->
  <rect x="0" y="90" width="800" height="280" fill="#4a90b8" opacity="0.12"/>
  <!-- 夕阳 -->
  <circle cx="650" cy="170" r="30" fill="#e8a838" opacity="0.6"/>
  <!-- 云 -->
  <ellipse cx="200" cy="150" rx="40" ry="15" fill="#fef9ed" opacity="0.7"/>
  <ellipse cx="500" cy="130" rx="50" ry="18" fill="#fef9ed" opacity="0.6"/>

  <!-- 田野 -->
  <path d="M0 370 Q200 340 400 360 Q600 380 800 350 L800 600 L0 600 Z" fill="#2d6a4f" opacity="0.3"/>
  <path d="M0 430 Q200 410 400 420 Q600 440 800 410 L800 600 L0 600 Z" fill="#2d6a4f" opacity="0.4"/>

  <!-- 炊烟 -->
  <g transform="translate(120, 200)">
    <path d="M0 80 L0 40 Q-5 30 0 20 Q5 10 0 0" fill="none" stroke="#8d5a36" stroke-width="3" opacity="0.4"/>
    <path d="M-3 60 Q-8 50 -3 40" fill="none" stroke="#8d5a36" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- 小房子 -->
  <g transform="translate(120, 280)">
    <path d="M-25 0 L-25 -25 L0 -40 L25 -25 L25 0 Z" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-8" y="-15" width="16" height="15" fill="#e8a838"/>
  </g>

  <!-- 奶奶和小时候的"我" -->
  <g transform="translate(280, 360)">
    <!-- 竹椅 -->
    <rect x="-20" y="20" width="40" height="30" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5" rx="3"/>
    <!-- 奶奶 -->
    <circle cx="0" cy="0" r="12" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-9 -5 Q0 -13 9 -5" fill="#7a3b14"/>
    <circle cx="-4" cy="0" r="1.5" fill="#7a3b14"/>
    <circle cx="4" cy="0" r="1.5" fill="#7a3b14"/>
    <path d="M-3 5 Q0 7 3 5" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="0" cy="25" rx="16" ry="18" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 小时候的我坐在膝上 -->
    <g transform="translate(0, 15)">
      <circle cx="0" cy="0" r="7" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <ellipse cx="0" cy="12" rx="8" ry="8" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <!-- 音符 -->
    <text x="25" y="-5" font-family="serif" font-size="16" fill="#c84a3a">♪</text>
    <text x="35" y="5" font-family="serif" font-size="14" fill="#e8a838">♫</text>
    <text x="20" y="55" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">摇啊摇</text>
  </g>

  <!-- 跑着唱歌的孩子 -->
  <g transform="translate(520, 400)">
    <circle cx="0" cy="-30" r="10" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-7 -35 Q0 -42 7 -35" fill="#7a3b14"/>
    <circle cx="-3" cy="-30" r="1.5" fill="#7a3b14"/>
    <circle cx="3" cy="-30" r="1.5" fill="#7a3b14"/>
    <path d="M-2 -24 Q0 -22 2 -24" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="0" cy="-8" rx="11" ry="14" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-8 5 Q-15 15 -18 25" fill="none" stroke="#2d6a4f" stroke-width="4" stroke-linecap="round"/>
    <path d="M8 5 Q18 12 22 5" fill="none" stroke="#2d6a4f" stroke-width="4" stroke-linecap="round"/>
    <text x="20" y="-20" font-family="serif" font-size="14" fill="#e8a838">♫</text>
  </g>

  <g transform="translate(580, 410)">
    <circle cx="0" cy="-28" r="10" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-7 -33 Q0 -40 7 -33" fill="#7a3b14"/>
    <ellipse cx="0" cy="-6" rx="11" ry="14" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M8 5 Q18 12 22 5" fill="none" stroke="#c8843a" stroke-width="4" stroke-linecap="round"/>
    <path d="M-8 5 Q-15 15 -18 25" fill="none" stroke="#c8843a" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- 长大后的"我" -->
  <g transform="translate(700, 400)">
    <circle cx="0" cy="-30" r="11" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-8 -35 Q0 -44 8 -35" fill="#7a3b14"/>
    <circle cx="-3" cy="-30" r="1.5" fill="#7a3b14"/>
    <circle cx="3" cy="-30" r="1.5" fill="#7a3b14"/>
    <ellipse cx="0" cy="-5" rx="13" ry="18" fill="#4a4a4a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 收音机 -->
    <rect x="15" y="0" width="20" height="14" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5" rx="2"/>
    <circle cx="25" cy="7" r="3" fill="#7a3b14"/>
    <text x="25" y="-10" text-anchor="middle" font-family="serif" font-size="9" fill="#c84a3a">♪</text>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">长大后再听</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 540)">
    <rect x="-300" y="0" width="600" height="50" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">童年会过去，人会长大</text>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">可那首歌的旋律，一直留在心里，像一盏小小的灯</text>
  </g>
</svg>
