<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="海力布变成石头的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#5a4a8a">猎人海力布 · 化石救乡</text>
  <line x1="220" y1="62" x2="580" y2="62" stroke="#8a7ab8" stroke-width="2"/>

  <!-- 远山 -->
  <path d="M0 460 L100 360 L200 420 L320 340 L440 410 L560 350 L680 420 L800 380 L800 600 L0 600 Z" fill="#c8b8d8" opacity="0.5"/>
  <!-- 崩塌的山石（右上） -->
  <g fill="#9a8a78">
    <polygon points="620,180 660,170 670,210 630,220"/>
    <polygon points="660,220 700,215 705,250 665,255"/>
    <polygon points="590,210 620,205 625,240 595,245"/>
  </g>

  <!-- 地面 -->
  <rect x="0" y="490" width="800" height="110" fill="#e8d9b8"/>
  <path d="M0 490 Q400 480 800 490" fill="none" stroke="#c4a86a" stroke-width="2"/>

  <!-- 海力布（正在变成石头，下半身已是石头） -->
  <!-- 石头底座（下半身已石化） -->
  <path d="M340 490 L330 420 Q350 400 390 400 Q430 400 450 420 L440 490 Z" fill="#9a8a78" stroke="#6a5a48" stroke-width="2"/>
  <!-- 石头纹理 -->
  <g stroke="#7a6a58" stroke-width="1.5" fill="none">
    <path d="M345 450 Q390 440 435 450"/>
    <path d="M350 470 Q390 462 430 470"/>
    <path d="M360 430 Q390 425 420 430"/>
  </g>
  <!-- 石化正在向上蔓延（腰部过渡） -->
  <path d="M345 420 Q390 405 435 420 Q430 390 390 388 Q350 390 345 420 Z" fill="#b0a08c" opacity="0.7"/>

  <!-- 上半身（还是人形，但僵硬） -->
  <!-- 身体 -->
  <path d="M360 388 L365 320 L415 320 L420 388 Z" fill="#6a8a5a"/>
  <!-- 手臂（张开，像在呼喊） -->
  <path d="M365 330 L310 300 L305 312 L362 345 Z" fill="#7a9a6a"/>
  <path d="M415 330 L470 300 L475 312 L418 345 Z" fill="#7a9a6a"/>
  <!-- 头 -->
  <circle cx="390" cy="295" r="22" fill="#f0d0a8"/>
  <!-- 头巾 -->
  <path d="M370 286 Q390 270 410 286 L410 280 Q390 266 370 280 Z" fill="#4a3020"/>
  <!-- 表情（坚定而痛苦） -->
  <circle cx="382" cy="294" r="2.5" fill="#2a2a2a"/>
  <circle cx="398" cy="294" r="2.5" fill="#2a2a2a"/>
  <path d="M382 308 Q390 314 398 308" fill="none" stroke="#7a3b14" stroke-width="2"/>
  <!-- 石化斑点蔓延到脸上 -->
  <circle cx="378" cy="300" r="4" fill="#9a8a78" opacity="0.6"/>
  <circle cx="402" cy="302" r="3" fill="#9a8a78" opacity="0.6"/>

  <!-- 宝石（从口中落下） -->
  <polygon points="390,318 396,328 390,338 384,328" fill="#5ac8e8" stroke="#2a8ab8" stroke-width="1.5"/>
  <text x="408" y="332" font-family="serif" font-size="13" fill="#2a8ab8">宝石</text>

  <!-- 乡亲们（右侧，惊恐/悲痛） -->
  <!-- 乡亲1 -->
  <g>
    <path d="M560 490 L565 410 L600 410 L605 490 Z" fill="#c47a3a"/>
    <path d="M565 420 L540 440 L545 450 L570 435 Z" fill="#d48a4a"/>
    <circle cx="582" cy="392" r="16" fill="#f0d0a8"/>
    <path d="M568 384 Q582 372 596 384 L596 378 Q582 366 568 378 Z" fill="#3a2a1a"/>
    <!-- 惊恐表情 -->
    <circle cx="576" cy="391" r="2.5" fill="#2a2a2a"/>
    <circle cx="588" cy="391" r="2.5" fill="#2a2a2a"/>
    <ellipse cx="582" cy="402" rx="4" ry="5" fill="#7a3b14"/>
  </g>
  <!-- 乡亲2（抱小孩） -->
  <g>
    <path d="M650 490 L655 420 L690 420 L695 490 Z" fill="#8a5a3a"/>
    <circle cx="672" cy="402" r="15" fill="#f0d0a8"/>
    <path d="M659 394 Q672 382 685 394 L685 388 Q672 376 659 388 Z" fill="#5a3a2a"/>
    <circle cx="667" cy="401" r="2" fill="#2a2a2a"/>
    <circle cx="677" cy="401" r="2" fill="#2a2a2a"/>
    <path d="M667 410 Q672 413 677 410" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 文字标注 -->
  <line x1="390" y1="270" x2="390" y2="220" stroke="#5a4a8a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="330" y="195" width="120" height="26" fill="#fff6df" stroke="#8a7ab8" rx="4"/>
  <text x="390" y="213" text-anchor="middle" font-family="serif" font-size="15" fill="#5a4a8a">海力布（石化中）</text>

  <line x1="600" y1="390" x2="640" y2="340" stroke="#5a4a8a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="600" y="318" width="90" height="24" fill="#fff6df" stroke="#8a7ab8" rx="4"/>
  <text x="645" y="335" text-anchor="middle" font-family="serif" font-size="14" fill="#5a4a8a">惊恐的乡亲</text>

  <!-- 底部说明 -->
  <text x="400" y="565" text-anchor="middle" font-family="serif" font-size="16" fill="#5a4a8a">海力布说出秘密，身体渐渐化为石头，换来乡亲们的平安</text>
</svg>
