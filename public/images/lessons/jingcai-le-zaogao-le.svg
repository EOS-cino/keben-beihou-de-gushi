<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="母亲惊喜地夸奖、父亲严肃地评价孩子诗作的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">"精彩极了"和"糟糕透了"</text>
  <line x1="200" y1="62" x2="600" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 分界线 -->
  <line x1="400" y1="100" x2="400" y2="540" stroke="#c8843a" stroke-width="2" stroke-dasharray="8,5" opacity="0.4"/>

  <!-- 左侧：母亲（精彩极了） -->
  <g>
    <!-- 背景圆 -->
    <circle cx="200" cy="300" r="120" fill="#fff6df" opacity="0.5"/>
    <!-- 母亲身体 -->
    <path d="M170 440 L175 340 L225 340 L230 440 Z" fill="#c84a3a"/>
    <!-- 手臂（拥抱姿势） -->
    <path d="M175 360 L140 380 L145 395 L180 375 Z" fill="#e07856"/>
    <path d="M225 360 L260 380 L255 395 L220 375 Z" fill="#e07856"/>
    <!-- 头 -->
    <circle cx="200" cy="315" r="28" fill="#f0d0a8"/>
    <!-- 头发 -->
    <path d="M172 310 Q200 285 228 310 L228 320 L172 320 Z" fill="#5a3a1a"/>
    <ellipse cx="172" cy="325" rx="6" ry="15" fill="#5a3a1a"/>
    <ellipse cx="228" cy="325" rx="6" ry="15" fill="#5a3a1a"/>
    <!-- 表情（惊喜开心） -->
    <circle cx="190" cy="315" r="3" fill="#2a2a2a"/>
    <circle cx="210" cy="315" r="3" fill="#2a2a2a"/>
    <path d="M188 328 Q200 338 212 328" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 红心 -->
    <path d="M200 270 Q195 260 190 265 Q185 270 200 285 Q215 270 210 265 Q205 260 200 270 Z" fill="#c84a3a"/>
    <!-- 诗稿 -->
    <rect x="160" y="395" width="80" height="50" fill="#fff" stroke="#8d5a36" stroke-width="1.5" rx="2"/>
    <g stroke="#8d5a36" stroke-width="0.8">
      <line x1="168" y1="405" x2="232" y2="405"/>
      <line x1="168" y1="415" x2="228" y2="415"/>
      <line x1="168" y1="425" x2="235" y2="425"/>
      <line x1="168" y1="435" x2="225" y2="435"/>
    </g>
    <!-- 标注 -->
    <rect x="120" y="220" width="160" height="36" fill="#fff6df" stroke="#c84a3a" stroke-width="2" rx="6"/>
    <text x="200" y="244" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#c84a3a">"精彩极了！"</text>
    <!-- 小太阳 -->
    <g fill="#f4c842">
      <circle cx="120" cy="180" r="12"/>
      <g stroke="#f4c842" stroke-width="2" stroke-linecap="round">
        <line x1="120" y1="160" x2="120" y2="150"/>
        <line x1="105" y1="170" x2="98" y2="163"/>
        <line x1="135" y1="170" x2="142" y2="163"/>
      </g>
    </g>
  </g>

  <!-- 右侧：父亲（糟糕透了） -->
  <g>
    <!-- 背景圆 -->
    <circle cx="600" cy="300" r="120" fill="#fff6df" opacity="0.5"/>
    <!-- 父亲身体 -->
    <path d="M570 440 L575 340 L625 340 L630 440 Z" fill="#4a6a2f"/>
    <!-- 手臂（交叉） -->
    <path d="M575 360 L555 390 L565 398 L585 370 Z" fill="#6a8d3f"/>
    <path d="M625 360 L645 390 L635 398 L615 370 Z" fill="#6a8d3f"/>
    <!-- 头 -->
    <circle cx="600" cy="315" r="28" fill="#f0d0a8"/>
    <!-- 头发 -->
    <path d="M572 310 Q600 288 628 310 L628 318 L572 318 Z" fill="#2a1a0a"/>
    <!-- 眼镜 -->
    <circle cx="590" cy="315" r="7" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    <circle cx="610" cy="315" r="7" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    <line x1="597" y1="315" x2="603" y2="315" stroke="#2a2a2a" stroke-width="1.5"/>
    <!-- 眼睛 -->
    <circle cx="590" cy="315" r="2" fill="#2a2a2a"/>
    <circle cx="610" cy="315" r="2" fill="#2a2a2a"/>
    <!-- 表情（严肃皱眉） -->
    <path d="M584 308 L592 312" stroke="#2a2a2a" stroke-width="1.5"/>
    <path d="M608 312 L616 308" stroke="#2a2a2a" stroke-width="1.5"/>
    <line x1="592" y1="330" x2="608" y2="330" stroke="#7a3b14" stroke-width="2"/>
    <!-- 诗稿 -->
    <rect x="560" y="395" width="80" height="50" fill="#fff" stroke="#8d5a36" stroke-width="1.5" rx="2"/>
    <g stroke="#8d5a36" stroke-width="0.8">
      <line x1="568" y1="405" x2="632" y2="405"/>
      <line x1="568" y1="415" x2="628" y2="415"/>
      <line x1="568" y1="425" x2="635" y2="425"/>
      <line x1="568" y1="435" x2="625" y2="435"/>
    </g>
    <!-- 红叉 -->
    <g stroke="#c84a3a" stroke-width="3" stroke-linecap="round">
      <line x1="575" y1="400" x2="625" y2="440"/>
      <line x1="625" y1="400" x2="575" y2="440"/>
    </g>
    <!-- 标注 -->
    <rect x="520" y="220" width="160" height="36" fill="#fff6df" stroke="#4a6a2f" stroke-width="2" rx="6"/>
    <text x="600" y="244" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#4a6a2f">"糟糕透了。"</text>
    <!-- 小云 -->
    <g fill="#c8d8e8" opacity="0.7">
      <ellipse cx="680" cy="180" rx="18" ry="10"/>
      <ellipse cx="690" cy="175" rx="12" ry="8"/>
    </g>
  </g>

  <!-- 中间：孩子 -->
  <g>
    <circle cx="400" cy="470" r="22" fill="#f0d0a8"/>
    <path d="M380 465 Q400 450 420 465 L420 472 L380 472 Z" fill="#2a1a0a"/>
    <circle cx="393" cy="470" r="2" fill="#2a2a2a"/>
    <circle cx="407" cy="470" r="2" fill="#2a2a2a"/>
    <path d="M393 478 Q400 482 407 478" fill="none" stroke="#7a3b14" stroke-width="1.2"/>
    <path d="M385 492 L390 540 L410 540 L415 492 Z" fill="#7ab8d8"/>
    <!-- 问号 -->
    <text x="400" y="440" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#c8843a">?</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">母亲给信心，父亲让清醒——两种爱，缺一不可</text>
</svg>
