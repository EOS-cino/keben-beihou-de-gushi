<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="雷雨前后天气变化场景插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">雷雨</text>
  <line x="350" y1="56" x2="450" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 三段：雷雨前（左）、雷雨中（中）、雷雨后（右） -->

  <!-- 雷雨前 -->
  <g transform="translate(140,300)">
    <text x="0" y="-160" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">雷雨前</text>
    <!-- 乌云天空 -->
    <rect x="-100" y="-140" width="200" height="160" fill="#5a5a6a" opacity="0.3" rx="4"/>
    <!-- 乌云 -->
    <ellipse cx="-20" cy="-100" rx="50" ry="20" fill="#3a3a4a" opacity="0.7"/>
    <ellipse cx="20" cy="-95" rx="45" ry="18" fill="#3a3a4a" opacity="0.7"/>
    <ellipse cx="0" cy="-110" rx="40" ry="16" fill="#4a4a5a" opacity="0.6"/>
    <text x="0" y="-70" text-anchor="middle" font-family="serif" font-size="10" fill="#5a5a6a">乌云压下来</text>
    <!-- 闪电 -->
    <path d="M-30 -60 L-25 -40 L-35 -35 L-20 -15 L-25 -30 L-15 -35 Z" fill="#f4ec68" stroke="#c8843a" stroke-width="1"/>
    <!-- 大风 -->
    <g stroke="#7a7a8a" stroke-width="2" stroke-linecap="round" opacity="0.5">
      <path d="M-60 -20 Q-40 -25 -20 -20"/>
      <path d="M-50 -5 Q-30 -10 -10 -5"/>
      <path d="M10 -20 Q30 -25 50 -20"/>
    </g>
    <text x="40" y="-15" font-family="serif" font-size="10" fill="#5a5a6a">大风</text>
    <!-- 树乱摆 -->
    <g transform="translate(0,30)">
      <rect x="-3" y="0" width="6" height="30" fill="#8d5a36"/>
      <ellipse cx="-8" cy="-5" rx="12" ry="10" fill="#6a8d3f" transform="rotate(-20 -8 -5)"/>
      <ellipse cx="8" cy="-3" rx="12" ry="10" fill="#6a8d3f" transform="rotate(20 8 -3)"/>
    </g>
    <!-- 蜘蛛垂下 -->
    <g transform="translate(-50,10)">
      <line x1="0" y1="-20" x2="0" y2="10" stroke="#8d7a6a" stroke-width="1"/>
      <circle cx="0" cy="12" r="3" fill="#4a2a1a"/>
    </g>
    <text x="-50" y="30" font-family="serif" font-size="9" fill="#7a3b14">蜘蛛逃走</text>
  </g>

  <!-- 分隔线1 -->
  <line x1="265" y1="120" x2="265" y2="460" stroke="#c8843a" stroke-width="1" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- 雷雨中 -->
  <g transform="translate(400,300)">
    <text x="0" y="-160" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">雷雨中</text>
    <!-- 暗天空 -->
    <rect x="-100" y="-140" width="200" height="160" fill="#3a3a4a" opacity="0.3" rx="4"/>
    <!-- 乌云 -->
    <ellipse cx="-20" cy="-100" rx="55" ry="22" fill="#2a2a3a" opacity="0.7"/>
    <ellipse cx="25" cy="-95" rx="50" ry="20" fill="#2a2a3a" opacity="0.7"/>
    <!-- 大闪电 -->
    <path d="M-10 -75 L5 -40 L-10 -30 L15 10 L0 -20 L15 -30 Z" fill="#f4ec68" stroke="#c8843a" stroke-width="1.5"/>
    <!-- 大雨 -->
    <g stroke="#7ab8d8" stroke-width="2" stroke-linecap="round" opacity="0.7">
      <line x1="-60" y1="-50" x2="-65" y2="-20"/>
      <line x1="-40" y1="-55" x2="-45" y2="-25"/>
      <line x1="-20" y1="-50" x2="-25" y2="-20"/>
      <line x1="0" y1="-55" x2="-5" y2="-25"/>
      <line x1="20" y1="-50" x2="15" y2="-20"/>
      <line x1="40" y1="-55" x2="35" y2="-25"/>
      <line x1="60" y1="-50" x2="55" y2="-20"/>
      <line x1="-50" y1="-15" x2="-55" y2="15"/>
      <line x1="-30" y1="-20" x2="-35" y2="10"/>
      <line x1="-10" y1="-15" x2="-15" y2="15"/>
      <line x1="10" y1="-20" x2="5" y2="10"/>
      <line x1="30" y1="-15" x2="25" y2="15"/>
      <line x1="50" y1="-20" x2="45" y2="10"/>
    </g>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="12" fill="#5a8aaa">哗，哗，哗</text>
    <text x="0" y="38" text-anchor="middle" font-family="serif" font-size="10" fill="#5a5a6a">树啊房子啊都看不清</text>
  </g>

  <!-- 分隔线2 -->
  <line x1="525" y1="120" x2="525" y2="460" stroke="#c8843a" stroke-width="1" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- 雷雨后 -->
  <g transform="translate(660,300)">
    <text x="0" y="-160" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">雷雨后</text>
    <!-- 晴朗天空 -->
    <rect x="-100" y="-140" width="200" height="160" fill="#d6ecf7" opacity="0.4" rx="4"/>
    <!-- 太阳 -->
    <circle cx="-50" cy="-100" r="16" fill="#f4b942"/>
    <g stroke="#f4b942" stroke-width="2" stroke-linecap="round" opacity="0.6">
      <line x1="-50" y1="-120" x2="-50" y2="-125"/>
      <line x1="-50" y1="-80" x2="-50" y2="-75"/>
      <line x1="-70" y1="-100" x2="-75" y2="-100"/>
      <line x1="-30" y1="-100" x2="-25" y2="-100"/>
    </g>
    <!-- 彩虹 -->
    <g fill="none" stroke-width="3">
      <path d="M-60 -50 Q0 -100 60 -50" stroke="#c84a3a"/>
      <path d="M-55 -50 Q0 -95 55 -50" stroke="#e07856"/>
      <path d="M-50 -50 Q0 -90 50 -50" stroke="#f4b942"/>
      <path d="M-45 -50 Q0 -85 45 -50" stroke="#6a8d3f"/>
      <path d="M-40 -50 Q0 -80 40 -50" stroke="#7ab8d8"/>
    </g>
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">彩虹挂天空</text>
    <!-- 蝉 -->
    <g transform="translate(-40,10)">
      <ellipse cx="0" cy="0" rx="8" ry="5" fill="#6a5a3a"/>
      <ellipse cx="0" cy="-3" rx="6" ry="4" fill="#8d7a5a"/>
      <path d="M-5 -2 Q-10 -5 -12 -2" fill="none" stroke="#c0c0c0" stroke-width="1" opacity="0.5"/>
      <path d="M5 -2 Q10 -5 12 -2" fill="none" stroke="#c0c0c0" stroke-width="1" opacity="0.5"/>
    </g>
    <text x="-40" y="25" font-family="serif" font-size="9" fill="#7a3b14">蝉叫了</text>
    <!-- 青蛙 -->
    <g transform="translate(40,15)">
      <ellipse cx="0" cy="3" rx="10" ry="7" fill="#6ab04c"/>
      <circle cx="-4" cy="-4" r="4" fill="#6ab04c"/>
      <circle cx="4" cy="-4" r="4" fill="#6ab04c"/>
      <circle cx="-4" cy="-5" r="1.5" fill="#1a1a1a"/>
      <circle cx="4" cy="-5" r="1.5" fill="#1a1a1a"/>
    </g>
    <text x="40" y="30" font-family="serif" font-size="9" fill="#7a3b14">青蛙叫</text>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="10" fill="#6a8d3f">空气清新</text>
  </g>

  <!-- 底部说明 -->
  <rect x="80" y="490" width="640" height="80" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <text x="400" y="515" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">雷雨前：乌云压顶·大风·闪电雷声　→　雷雨中：大雨倾盆·看不清</text>
  <text x="400" y="540" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">　→　雷雨后：太阳出来·彩虹·蝉叫蛙鸣·空气清新</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">按时间顺序写景：前→中→后，条理清晰</text>
</svg>
