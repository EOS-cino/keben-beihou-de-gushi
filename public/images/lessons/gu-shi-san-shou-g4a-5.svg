<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="边塞明月、葡萄美酒与江东壮士的画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">古诗三首</text>
  <text x="400" y="80" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">出塞 · 凉州词 · 夏日绝句</text>
  <line x1="220" y1="95" x2="580" y2="95" stroke="#7a3b14" stroke-width="1.5"/>
  <!-- 出塞：边关明月 -->
  <rect x="60" y="120" width="180" height="200" fill="#2c3e50" opacity="0.12"/>
  <circle cx="150" cy="170" r="28" fill="#e8dca0" opacity="0.85"/>
  <polygon points="80,320 120,230 160,320" fill="#5d4037" opacity="0.6"/>
  <polygon points="140,320 190,210 240,320" fill="#5d4037" opacity="0.7"/>
  <text x="150" y="350" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">出塞</text>
  <!-- 凉州词：夜光杯酒 -->
  <ellipse cx="400" cy="240" rx="44" ry="14" fill="#7a3b14" opacity="0.3"/>
  <path d="M 356 200 l 12 60 l 64 0 l 12 -60 z" fill="#c8553d" opacity="0.5" stroke="#7a3b14" stroke-width="2"/>
  <ellipse cx="400" cy="200" rx="44" ry="12" fill="#8e3b2e"/>
  <path d="M 412 210 q 30 10 30 40 q 0 24 -28 24" stroke="#7a3b14" stroke-width="3" fill="none"/>
  <text x="400" y="350" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">凉州词</text>
  <!-- 夏日绝句：江边项羽 -->
  <path d="M 560 320 q 60 -20 120 0" stroke="#5d8aa8" stroke-width="3" fill="none"/>
  <path d="M 560 300 q 60 -18 120 0" stroke="#5d8aa8" stroke-width="2" fill="none" opacity="0.6"/>
  <circle cx="680" cy="220" r="16" fill="#3a3a3a"/>
  <rect x="672" y="236" width="16" height="44" fill="#3a3a3a"/>
  <line x1="660" y1="250" x2="700" y2="250" stroke="#7a3b14" stroke-width="4"/>
  <text x="620" y="350" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">夏日绝句</text>
  <line x1="100" y1="400" x2="700" y2="400" stroke="#7a3b14" stroke-width="1" opacity="0.3"/>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">但使龙城飞将在，生当作人杰</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14">边塞风沙 · 英雄气节</text>
</svg>
