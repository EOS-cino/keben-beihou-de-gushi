<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="农夫修补羊圈、羊在旁边的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-size="24" fill="#2d2a24" font-family="sans-serif" font-weight="bold">亡羊补牢</text>

  <!-- 天空 -->
  <rect x="0" y="60" width="800" height="260" fill="#d6ecf7"/>
  <!-- 太阳 -->
  <circle cx="680" cy="110" r="28" fill="#f4b942"/>
  <circle cx="680" cy="110" r="36" fill="#f4b942" opacity="0.25"/>
  <!-- 云朵 -->
  <ellipse cx="130" cy="100" rx="40" ry="15" fill="#ffffff" opacity="0.85"/>
  <ellipse cx="160" cy="92" rx="28" ry="11" fill="#ffffff" opacity="0.85"/>

  <!-- 远山 -->
  <path d="M0 320 L150 240 L300 290 L450 220 L600 280 L800 250 L800 320 Z" fill="#8aaa8a" opacity="0.5"/>

  <!-- 地面 -->
  <path d="M0 320 L800 320 L800 600 L0 600 Z" fill="#7a9a5a"/>
  <path d="M0 330 Q200 325 400 330 Q600 335 800 328 L800 600 L0 600 Z" fill="#6b8a4a"/>

  <!-- 羊圈（木栅栏围成的） -->
  <g transform="translate(400,400)">
    <!-- 羊圈后围栏 -->
    <rect x="-150" y="-80" width="300" height="100" fill="#d4c4a8" opacity="0.3"/>
    <!-- 木栅栏柱子 -->
    <g fill="#8d6a3d">
      <rect x="-150" y="-80" width="8" height="100"/>
      <rect x="-110" y="-80" width="8" height="100"/>
      <rect x="-70" y="-80" width="8" height="100"/>
      <rect x="-30" y="-80" width="8" height="100"/>
      <rect x="10" y="-80" width="8" height="100"/>
      <rect x="50" y="-80" width="8" height="100"/>
      <rect x="90" y="-80" width="8" height="100"/>
      <rect x="130" y="-80" width="8" height="100"/>
    </g>
    <!-- 横向木条 -->
    <rect x="-150" y="-60" width="290" height="6" fill="#6b4a2d"/>
    <rect x="-150" y="-20" width="290" height="6" fill="#6b4a2d"/>

    <!-- 破洞（被狼咬出的缺口） -->
    <g transform="translate(-50,-50)">
      <rect x="-15" y="-15" width="30" height="40" fill="#fef9ed"/>
      <!-- 断裂的木桩 -->
      <rect x="-15" y="-15" width="8" height="15" fill="#8d6a3d"/>
      <rect x="7" y="-15" width="8" height="12" fill="#8d6a3d"/>
      <!-- 狼牙啃痕 -->
      <path d="M-12 10 L-8 15 L-4 10 L0 15 L4 10 L8 15 L12 10" fill="none" stroke="#8d6a3d" stroke-width="1.5"/>
    </g>

    <!-- 新补上的木板（颜色较新） -->
    <g transform="translate(-50,-50)">
      <rect x="-16" y="-16" width="32" height="42" fill="#c4a060" opacity="0.85"/>
      <rect x="-16" y="-16" width="32" height="42" fill="none" stroke="#8d6a3d" stroke-width="2" stroke-dasharray="4,2"/>
      <!-- 钉子 -->
      <circle cx="-10" cy="-10" r="2" fill="#5a5a5a"/>
      <circle cx="10" cy="-10" r="2" fill="#5a5a5a"/>
      <circle cx="-10" cy="20" r="2" fill="#5a5a5a"/>
      <circle cx="10" cy="20" r="2" fill="#5a5a5a"/>
    </g>
    <text x="-50" y="-75" text-anchor="middle" font-size="11" fill="#e36f5b" font-family="sans-serif" font-weight="bold">补好的洞</text>
  </g>

  <!-- 羊（在羊圈里） -->
  <g transform="translate(330,390)">
    <!-- 羊身 -->
    <ellipse cx="0" cy="0" rx="25" ry="18" fill="#f0e8d8"/>
    <ellipse cx="0" cy="-3" rx="22" ry="15" fill="#ffffff"/>
    <!-- 羊头 -->
    <ellipse cx="-22" cy="-5" rx="10" ry="8" fill="#e8d8c8"/>
    <!-- 羊耳 -->
    <ellipse cx="-28" cy="-10" rx="4" ry="6" fill="#d4c4a8" transform="rotate(-30 -28 -10)"/>
    <!-- 眼睛 -->
    <circle cx="-24" cy="-5" r="1.5" fill="#1a1a1a"/>
    <!-- 羊腿 -->
    <rect x="-12" y="14" width="4" height="12" fill="#8d7a5a"/>
    <rect x="-2" y="14" width="4" height="12" fill="#8d7a5a"/>
    <rect x="8" y="14" width="4" height="12" fill="#8d7a5a"/>
    <!-- 羊毛纹理 -->
    <circle cx="-5" cy="-5" r="5" fill="#f0e8d8"/>
    <circle cx="8" cy="-3" r="5" fill="#f0e8d8"/>
    <circle cx="0" cy="5" r="5" fill="#f0e8d8"/>
  </g>
  <text x="330" y="430" text-anchor="middle" font-size="11" fill="#6b6557" font-family="sans-serif">羊</text>

  <g transform="translate(470,395)">
    <ellipse cx="0" cy="0" rx="22" ry="16" fill="#f0e8d8"/>
    <ellipse cx="0" cy="-3" rx="19" ry="13" fill="#ffffff"/>
    <ellipse cx="20" cy="-5" rx="9" ry="7" fill="#e8d8c8"/>
    <ellipse cx="25" cy="-10" rx="3.5" ry="5" fill="#d4c4a8" transform="rotate(30 25 -10)"/>
    <circle cx="22" cy="-5" r="1.5" fill="#1a1a1a"/>
    <rect x="-10" y="12" width="4" height="10" fill="#8d7a5a"/>
    <rect x="0" y="12" width="4" height="10" fill="#8d7a5a"/>
    <rect x="8" y="12" width="4" height="10" fill="#8d7a5a"/>
  </g>

  <!-- 农夫（正在修补） -->
  <g transform="translate(340,340)">
    <!-- 头 -->
    <circle cx="0" cy="0" r="14" fill="#f4c8a0"/>
    <!-- 草帽 -->
    <ellipse cx="0" cy="-8" rx="22" ry="6" fill="#c4a468"/>
    <path d="M-12 -8 Q-10 -18 0 -16 Q10 -18 12 -8" fill="#d4b878"/>
    <!-- 眼睛 -->
    <circle cx="-5" cy="-1" r="1.5" fill="#1a1a1a"/>
    <circle cx="5" cy="-1" r="1.5" fill="#1a1a1a"/>
    <!-- 嘴（认真） -->
    <path d="M-3 6 L3 6" fill="none" stroke="#8d5a3d" stroke-width="1.5"/>
    <!-- 身体 -->
    <path d="M-16 14 L-20 50 L20 50 L16 14 Z" fill="#8d6a3d"/>
    <!-- 手臂（举锤子） -->
    <path d="M16 18 L30 5" fill="none" stroke="#8d6a3d" stroke-width="6" stroke-linecap="round"/>
    <path d="M-16 18 L-25 30" fill="none" stroke="#8d6a3d" stroke-width="6" stroke-linecap="round"/>
    <!-- 锤子 -->
    <g transform="translate(35,0)">
      <rect x="-2" y="-15" width="4" height="20" fill="#6b4a2d"/>
      <rect x="-8" y="-20" width="16" height="10" rx="2" fill="#8d8d8d"/>
      <rect x="-8" y="-20" width="16" height="5" rx="2" fill="#a0a0a0"/>
    </g>
  </g>
  <text x="340" y="400" text-anchor="middle" font-size="11" fill="#6b4a2d" font-family="sans-serif" font-weight="bold">农夫</text>

  <!-- 狼脚印（从洞口延伸出去） -->
  <g transform="translate(350,470)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="4" ry="3" fill="#5a5a5a"/>
    <ellipse cx="15" cy="8" rx="4" ry="3" fill="#5a5a5a"/>
    <ellipse cx="30" cy="16" rx="4" ry="3" fill="#5a5a5a"/>
    <ellipse cx="45" cy="24" rx="4" ry="3" fill="#5a5a5a"/>
  </g>
  <text x="400" y="510" text-anchor="middle" font-size="10" fill="#6b6557" font-family="sans-serif">狼脚印</text>

  <!-- 邻居（在旁边劝说） -->
  <g transform="translate(600,360)">
    <!-- 头 -->
    <circle cx="0" cy="0" r="13" fill="#f4c8a0"/>
    <path d="M-13 -4 Q-11 -14 0 -12 Q11 -14 13 -4 Q11 -10 0 -8 Q-11 -10 -13 -4" fill="#3a2a1a"/>
    <circle cx="-4" cy="-1" r="1.5" fill="#1a1a1a"/>
    <circle cx="4" cy="-1" r="1.5" fill="#1a1a1a"/>
    <path d="M-3 6 Q0 8 3 6" fill="none" stroke="#8d5a3d" stroke-width="1"/>
    <!-- 身体 -->
    <path d="M-15 12 L-18 45 L18 45 L15 12 Z" fill="#4a6a8a"/>
    <!-- 手指方向（指着洞） -->
    <path d="M-15 18 L-35 25" fill="none" stroke="#4a6a8a" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="600" y="415" text-anchor="middle" font-size="11" fill="#2d5a8a" font-family="sans-serif">邻居</text>

  <!-- 对话气泡 -->
  <g transform="translate(540,300)">
    <path d="M0 0 Q0 -20 20 -20 L100 -20 Q120 -20 120 0 L120 10 Q120 20 110 20 L30 20 L15 32 L20 20 L10 20 Q0 20 0 10 Z" fill="#ffffff" stroke="#4a6a8a" stroke-width="1.5"/>
    <text x="60" y="-3" text-anchor="middle" font-size="11" fill="#2d5a8a" font-family="sans-serif">赶紧把洞</text>
    <text x="60" y="12" text-anchor="middle" font-size="11" fill="#2d5a8a" font-family="sans-serif">补上吧！</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="560" text-anchor="middle" font-size="14" fill="#6b6557" font-family="sans-serif">亡羊补牢，为时未晚——出了问题及时补救，还不算晚</text>
</svg>
