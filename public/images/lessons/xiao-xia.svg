<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="水缸里小虾游来游去的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">小虾</text>
  <line x1="350" y1="62" x2="450" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 院子背景 -->
  <rect x="0" y="70" width="800" height="200" fill="#e8f0f8" opacity="0.2"/>
  <!-- 远处植物 -->
  <path d="M50 280 Q60 220 70 280" fill="none" stroke="#2d6a4f" stroke-width="3"/>
  <ellipse cx="60" cy="230" rx="15" ry="20" fill="#2d6a4f" opacity="0.5"/>
  <path d="M740 280 Q750 210 760 280" fill="none" stroke="#2d6a4f" stroke-width="3"/>
  <ellipse cx="750" cy="220" rx="15" ry="22" fill="#2d6a4f" opacity="0.5"/>

  <!-- 水缸 -->
  <g transform="translate(400, 380)">
    <!-- 缸口（椭圆） -->
    <ellipse cx="0" cy="-80" rx="180" ry="35" fill="#7ab8a8" opacity="0.3"/>
    <ellipse cx="0" cy="-80" rx="180" ry="35" fill="none" stroke="#7a3b14" stroke-width="3"/>
    <!-- 缸身 -->
    <path d="M-180 -80 Q-200 0 -160 80 L160 80 Q200 0 180 -80" fill="#d4a574" stroke="#7a3b14" stroke-width="3"/>
    <!-- 缸口内沿 -->
    <ellipse cx="0" cy="-80" rx="170" ry="28" fill="#4a90b8" opacity="0.5"/>
    <!-- 水面 -->
    <ellipse cx="0" cy="-78" rx="165" ry="25" fill="#7ab8d8" opacity="0.4"/>
    <!-- 水波纹 -->
    <path d="M-120 -78 Q-80 -82 -40 -78 Q0 -74 40 -78 Q80 -82 120 -78" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <!-- 缸底石头 -->
    <ellipse cx="-60" cy="60" rx="30" ry="15" fill="#8a8a8a" opacity="0.6"/>
    <ellipse cx="40" cy="65" rx="25" ry="12" fill="#9a8a7a" opacity="0.6"/>
    <ellipse cx="90" cy="55" rx="20" ry="10" fill="#8a7a6a" opacity="0.6"/>
    <!-- 青苔 -->
    <ellipse cx="-60" cy="50" rx="20" ry="6" fill="#2d6a4f" opacity="0.4"/>
    <ellipse cx="40" cy="58" rx="18" ry="5" fill="#2d6a4f" opacity="0.4"/>

    <!-- 小虾1（闲游的） -->
    <g transform="translate(-80, -30)">
      <path d="M0 0 Q10 -3 18 0 Q22 5 18 10 Q10 13 0 10 Q-3 5 0 0" fill="#e8a838" opacity="0.7" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 尾巴 -->
      <path d="M-3 2 L-12 -3 L-10 5 L-12 8 Z" fill="#e8a838" opacity="0.7" stroke="#7a3b14" stroke-width="1"/>
      <!-- 头/触须 -->
      <line x1="18" y1="3" x2="32" y2="-5" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
      <line x1="18" y1="7" x2="32" y2="12" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
      <!-- 眼睛 -->
      <circle cx="16" cy="3" r="1.5" fill="#2a2a2a"/>
      <!-- 钳子 -->
      <path d="M8 0 L15 -5" fill="none" stroke="#e8a838" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- 小虾2（打架的） -->
    <g transform="translate(30, -10)">
      <path d="M0 0 Q10 -3 18 0 Q22 5 18 10 Q10 13 0 10 Q-3 5 0 0" fill="#e07856" opacity="0.7" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-3 2 L-12 -3 L-10 5 L-12 8 Z" fill="#e07856" opacity="0.7" stroke="#7a3b14" stroke-width="1"/>
      <line x1="18" y1="3" x2="35" y2="-8" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
      <line x1="18" y1="7" x2="35" y2="15" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
      <circle cx="16" cy="3" r="1.5" fill="#2a2a2a"/>
      <!-- 钳子举起（打架） -->
      <path d="M8 -2 L18 -10" fill="none" stroke="#e07856" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M18 -10 L22 -15 L20 -8" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    </g>

    <!-- 小虾3（另一只打架的） -->
    <g transform="translate(70, -15)">
      <path d="M0 0 Q-10 -3 -18 0 Q-22 5 -18 10 Q-10 13 0 10 Q3 5 0 0" fill="#4a90b8" opacity="0.6" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M3 2 L12 -3 L10 5 L12 8 Z" fill="#4a90b8" opacity="0.6" stroke="#7a3b14" stroke-width="1"/>
      <line x1="-18" y1="3" x2="-32" y2="-5" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
      <circle cx="-16" cy="3" r="1.5" fill="#2a2a2a"/>
      <!-- 钳子举起 -->
      <path d="M-8 -2 L-18 -10" fill="none" stroke="#4a90b8" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M-18 -10 L-22 -15 L-20 -8" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    </g>

    <!-- 水花（打架溅起） -->
    <circle cx="55" cy="-25" r="3" fill="#ffffff" opacity="0.7"/>
    <circle cx="50" cy="-30" r="2" fill="#ffffff" opacity="0.5"/>
    <circle cx="60" cy="-28" r="2" fill="#ffffff" opacity="0.6"/>

    <!-- 小虾4（缸底发呆的） -->
    <g transform="translate(-30, 45)">
      <path d="M0 0 Q8 -2 14 0 Q18 4 14 8 Q8 10 0 8 Q-2 4 0 0" fill="#e8a838" opacity="0.5" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-2 1 L-8 -2 L-7 4 L-8 6 Z" fill="#e8a838" opacity="0.5" stroke="#7a3b14" stroke-width="1"/>
      <line x1="14" y1="2" x2="24" y2="-3" stroke="#7a3b14" stroke-width="1" opacity="0.5"/>
      <circle cx="12" cy="2" r="1" fill="#2a2a2a"/>
    </g>
  </g>

  <!-- 观察的孩子（趴在缸沿） -->
  <g transform="translate(150, 320)">
    <!-- 头 -->
    <circle cx="0" cy="0" r="22" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头发 -->
    <path d="M-22 -5 Q-20 -25 0 -27 Q20 -25 22 -5 Q15 -15 0 -13 Q-15 -15 -22 -5" fill="#3a2a1a"/>
    <!-- 眼睛（好奇） -->
    <circle cx="-7" cy="0" r="3" fill="#2a2a2a"/>
    <circle cx="7" cy="0" r="3" fill="#2a2a2a"/>
    <!-- 嘴（微笑） -->
    <path d="M-5 10 Q0 14 5 10" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 手（趴在缸沿） -->
    <path d="M15 15 L40 5" fill="none" stroke="#f0d0a8" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- 标注：打架的小虾 -->
  <line x1="430" y1="370" x2="520" y2="310" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="490" y="285" width="100" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="540" y="303" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">小虾打架</text>

  <!-- 标注：观察 -->
  <line x1="150" y1="320" x2="100" y2="270" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="55" y="248" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="100" y="266" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">仔细观察</text>

  <!-- 底部说明 -->
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">一口水缸就是一个热闹的小世界，仔细观察才能发现小生命的大趣味</text>
</svg>
