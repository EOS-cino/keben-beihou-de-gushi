<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="天安门城楼、五星红旗升起、人群欢呼的开国大典场景插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">开国大典</text>
  <line x1="330" y1="58" x2="470" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="72" width="800" height="280" fill="#f0e8d8" opacity="0.3"/>
  <!-- 灯笼装饰 -->
  <g transform="translate(200, 110)">
    <ellipse cx="0" cy="0" rx="12" ry="16" fill="#c84030" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-4" y="-18" width="8" height="4" fill="#c8a848" stroke="#7a3b14" stroke-width="1"/>
    <rect x="-4" y="14" width="8" height="4" fill="#c8a848" stroke="#7a3b14" stroke-width="1"/>
    <line x1="0" y1="-22" x2="0" y2="-35" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <g transform="translate(600, 110)">
    <ellipse cx="0" cy="0" rx="12" ry="16" fill="#c84030" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-4" y="-18" width="8" height="4" fill="#c8a848" stroke="#7a3b14" stroke-width="1"/>
    <rect x="-4" y="14" width="8" height="4" fill="#c8a848" stroke="#7a3b14" stroke-width="1"/>
    <line x1="0" y1="-22" x2="0" y2="-35" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 天安门城楼 -->
  <!-- 城台 -->
  <rect x="150" y="280" width="500" height="120" fill="#c8a878" stroke="#7a3b14" stroke-width="2"/>
  <!-- 城门洞 -->
  <path d="M370 400 L370 340 Q400 320 430 340 L430 400 Z" fill="#8a3a2a" stroke="#7a3b14" stroke-width="2"/>
  <!-- 城楼主体 -->
  <rect x="180" y="200" width="440" height="80" fill="#c84030" stroke="#7a3b14" stroke-width="2"/>
  <!-- 城楼屋顶 -->
  <path d="M160 200 L400 150 L640 200 Z" fill="#8a3a2a" stroke="#7a3b14" stroke-width="2"/>
  <!-- 屋顶翘檐 -->
  <path d="M160 200 Q150 195 155 205" fill="#8a3a2a" stroke="#7a3b14" stroke-width="1.5"/>
  <path d="M640 200 Q650 195 645 205" fill="#8a3a2a" stroke="#7a3b14" stroke-width="1.5"/>
  <!-- 屋脊 -->
  <line x1="400" y1="150" x2="400" y2="140" stroke="#7a3b14" stroke-width="2"/>
  <!-- 城楼柱子 -->
  <line x1="220" y1="200" x2="220" y2="280" stroke="#7a3b14" stroke-width="2"/>
  <line x1="280" y1="200" x2="280" y2="280" stroke="#7a3b14" stroke-width="2"/>
  <line x1="340" y1="200" x2="340" y2="280" stroke="#7a3b14" stroke-width="2"/>
  <line x1="460" y1="200" x2="460" y2="280" stroke="#7a3b14" stroke-width="2"/>
  <line x1="520" y1="200" x2="520" y2="280" stroke="#7a3b14" stroke-width="2"/>
  <line x1="580" y1="200" x2="580" y2="280" stroke="#7a3b14" stroke-width="2"/>

  <!-- 城楼上的领导人（剪影） -->
  <g transform="translate(400, 210)">
    <!-- 毛泽东（中央，较高） -->
    <path d="M -6 50 Q -7 20 -5 5 Q 0 0 5 5 Q 7 20 6 50" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="0" cy="-5" r="7" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1"/>
    <!-- 话筒 -->
    <line x1="8" y1="10" x2="15" y2="15" stroke="#7a3b14" stroke-width="2"/>
    <circle cx="16" cy="16" r="3" fill="#5a5a5a" stroke="#7a3b14" stroke-width="1"/>
  </g>
  <!-- 其他领导人剪影 -->
  <g transform="translate(340, 215)" opacity="0.7">
    <path d="M -5 45 Q -6 18 -4 5 Q 0 0 4 5 Q 6 18 5 45" fill="#4a4a4a"/>
    <circle cx="0" cy="-3" r="6" fill="#4a4a4a"/>
  </g>
  <g transform="translate(460, 215)" opacity="0.7">
    <path d="M -5 45 Q -6 18 -4 5 Q 0 0 4 5 Q 6 18 5 45" fill="#4a4a4a"/>
    <circle cx="0" cy="-3" r="6" fill="#4a4a4a"/>
  </g>

  <!-- 城楼标语牌位置 -->
  <rect x="200" y="240" width="120" height="20" fill="#c84030" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
  <text x="260" y="255" text-anchor="middle" font-size="9" fill="#fef9ed" font-family="serif">中华人民共和国万岁</text>
  <rect x="480" y="240" width="120" height="20" fill="#c84030" stroke="#7a3b14" stroke-width="1" opacity="0.6"/>
  <text x="540" y="255" text-anchor="middle" font-size="9" fill="#fef9ed" font-family="serif">世界人民大团结万岁</text>

  <!-- 旗杆和五星红旗 -->
  <g transform="translate(700, 280)">
    <line x1="0" y1="120" x2="0" y2="-20" stroke="#7a3b14" stroke-width="3"/>
    <!-- 五星红旗 -->
    <rect x="2" y="-15" width="50" height="34" fill="#c84030" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 大星 -->
    <path d="M15 -5 L17 0 L22 0 L18 3 L20 8 L15 5 L10 8 L12 3 L8 0 L13 0 Z" fill="#f0d840" stroke="#c8a848" stroke-width="0.5"/>
    <!-- 小星 -->
    <circle cx="28" cy="-8" r="1.5" fill="#f0d840"/>
    <circle cx="32" cy="-3" r="1.5" fill="#f0d840"/>
    <circle cx="32" cy="3" r="1.5" fill="#f0d840"/>
    <circle cx="28" cy="7" r="1.5" fill="#f0d840"/>
  </g>

  <!-- 广场人群 -->
  <rect x="0" y="400" width="800" height="160" fill="#e0d8c0" opacity="0.3"/>
  <!-- 人群（简化） -->
  <g opacity="0.6">
    <g transform="translate(80, 450)"><circle cx="0" cy="0" r="5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/><path d="M -4 8 Q -5 3 -3 0 Q 0 -1 3 0 Q 5 3 4 8" fill="#4a5a6a" stroke="#7a3b14" stroke-width="1"/></g>
    <g transform="translate(120, 460)"><circle cx="0" cy="0" r="5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/><path d="M -4 8 Q -5 3 -3 0 Q 0 -1 3 0 Q 5 3 4 8" fill="#8a3a2a" stroke="#7a3b14" stroke-width="1"/></g>
    <g transform="translate(160, 455)"><circle cx="0" cy="0" r="5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/><path d="M -4 8 Q -5 3 -3 0 Q 0 -1 3 0 Q 5 3 4 8" fill="#3a5a8a" stroke="#7a3b14" stroke-width="1"/></g>
    <g transform="translate(200, 465)"><circle cx="0" cy="0" r="5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/><path d="M -4 8 Q -5 3 -3 0 Q 0 -1 3 0 Q 5 3 4 8" fill="#4a7a3a" stroke="#7a3b14" stroke-width="1"/></g>
    <g transform="translate(240, 460)"><circle cx="0" cy="0" r="5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/><path d="M -4 8 Q -5 3 -3 0 Q 0 -1 3 0 Q 5 3 4 8" fill="#8a3a2a" stroke="#7a3b14" stroke-width="1"/></g>
    <g transform="translate(280, 470)"><circle cx="0" cy="0" r="5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/><path d="M -4 8 Q -5 3 -3 0 Q 0 -1 3 0 Q 5 3 4 8" fill="#4a5a6a" stroke="#7a3b14" stroke-width="1"/></g>
    <g transform="translate(500, 460)"><circle cx="0" cy="0" r="5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/><path d="M -4 8 Q -5 3 -3 0 Q 0 -1 3 0 Q 5 3 4 8" fill="#3a5a8a" stroke="#7a3b14" stroke-width="1"/></g>
    <g transform="translate(540, 470)"><circle cx="0" cy="0" r="5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/><path d="M -4 8 Q -5 3 -3 0 Q 0 -1 3 0 Q 5 3 4 8" fill="#8a3a2a" stroke="#7a3b14" stroke-width="1"/></g>
    <g transform="translate(580, 465)"><circle cx="0" cy="0" r="5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/><path d="M -4 8 Q -5 3 -3 0 Q 0 -1 3 0 Q 5 3 4 8" fill="#4a7a3a" stroke="#7a3b14" stroke-width="1"/></g>
    <g transform="translate(620, 475)"><circle cx="0" cy="0" r="5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/><path d="M -4 8 Q -5 3 -3 0 Q 0 -1 3 0 Q 5 3 4 8" fill="#4a5a6a" stroke="#7a3b14" stroke-width="1"/></g>
  </g>
  <!-- 小红旗 -->
  <g transform="translate(100, 430)"><line x1="0" y1="20" x2="0" y2="0" stroke="#7a3b14" stroke-width="1.5"/><path d="M0 0 L12 4 L0 8" fill="#c84030"/></g>
  <g transform="translate(260, 425)"><line x1="0" y1="25" x2="0" y2="0" stroke="#7a3b14" stroke-width="1.5"/><path d="M0 0 L12 4 L0 8" fill="#c84030"/></g>
  <g transform="translate(560, 430)"><line x1="0" y1="25" x2="0" y2="0" stroke="#7a3b14" stroke-width="1.5"/><path d="M0 0 L12 4 L0 8" fill="#c84030"/></g>

  <!-- 标注：天安门城楼 -->
  <line x1="400" y1="195" x2="400" y2="150" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="335" y="128" width="130" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="146" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">天安门城楼</text>

  <!-- 标注：毛主席宣告 -->
  <line x1="408" y1="200" x2="470" y2="170" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="460" y="148" width="120" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="520" y="166" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">毛主席宣告</text>

  <!-- 标注：五星红旗 -->
  <line x1="705" y1="265" x2="740" y2="230" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="690" y="208" width="100" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="740" y="226" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">五星红旗</text>

  <!-- 标注：三十万群众 -->
  <line x1="200" y1="440" x2="100" y2="410" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="30" y="388" width="120" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="90" y="406" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">三十万群众</text>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">1949年10月1日，天安门城楼上宣告新中国成立——中国人民从此站起来了</text>
</svg>
