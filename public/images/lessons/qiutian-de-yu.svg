<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="秋雨打开秋天大门五彩缤纷插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">秋天的雨</text>
  <line x1="330" y1="58" x2="470" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="64" width="800" height="200" fill="#e8d8b8"/>
  <!-- 云 -->
  <ellipse cx="180" cy="120" rx="55" ry="26" fill="#b8a888" opacity="0.7"/>
  <ellipse cx="240" cy="115" rx="45" ry="22" fill="#a89878" opacity="0.7"/>
  <ellipse cx="580" cy="125" rx="50" ry="24" fill="#b8a888" opacity="0.7"/>
  <!-- 雨滴 -->
  <g stroke="#7a8aaa" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="170" y1="150" x2="166" y2="172"/>
    <line x1="210" y1="145" x2="206" y2="167"/>
    <line x1="250" y1="148" x2="246" y2="170"/>
    <line x1="570" y1="155" x2="566" y2="177"/>
    <line x1="610" y1="150" x2="606" y2="172"/>
    <line x1="400" y1="135" x2="396" y2="157"/>
  </g>

  <!-- 秋天的大门 -->
  <g transform="translate(400,300)">
    <!-- 门框 -->
    <rect x="-90" y="-120" width="180" height="200" fill="#8d5a36" stroke="#5a3a1a" stroke-width="3" rx="4"/>
    <!-- 门板（半开） -->
    <rect x="-85" y="-115" width="80" height="190" fill="#a86a38" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="5" y="-115" width="80" height="190" fill="#b8784a" stroke="#5a3a1a" stroke-width="2" transform="skewX(-8)"/>
    <!-- 门把手 -->
    <circle cx="-15" cy="-20" r="4" fill="#e8a838"/>
    <circle cx="20" cy="-20" r="4" fill="#e8a838"/>
    <!-- 门内透出的光和颜色 -->
    <rect x="-5" y="-110" width="12" height="180" fill="#e8a838" opacity="0.5"/>
  </g>

  <!-- 钥匙 -->
  <g transform="translate(400,180)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#e8a838" stroke-width="5"/>
    <rect x="-3" y="10" width="6" height="30" fill="#e8a838"/>
    <rect x="-3" y="30" width="12" height="5" fill="#e8a838"/>
    <rect x="-3" y="38" width="8" height="5" fill="#e8a838"/>
  </g>

  <!-- 地面 -->
  <rect x="0" y="420" width="800" height="140" fill="#c8a878"/>

  <!-- 银杏树（黄叶） -->
  <g transform="translate(120,360)">
    <rect x="-4" y="0" width="8" height="70" fill="#8d5a36"/>
    <ellipse cx="0" cy="-15" rx="40" ry="35" fill="#e8c438"/>
    <ellipse cx="-20" cy="-5" rx="22" ry="18" fill="#e8a838"/>
    <ellipse cx="20" cy="-10" rx="22" ry="18" fill="#e8c438"/>
    <!-- 银杏叶（扇形） -->
    <path d="M-30 -30 Q-35 -40 -25 -42 Q-20 -38 -22 -30 Z" fill="#f0d038"/>
    <path d="M30 -35 Q35 -45 25 -47 Q20 -43 22 -35 Z" fill="#f0d038"/>
  </g>

  <!-- 枫树（红叶） -->
  <g transform="translate(680,360)">
    <rect x="-4" y="0" width="8" height="70" fill="#8d5a36"/>
    <ellipse cx="0" cy="-15" rx="38" ry="33" fill="#c8483a"/>
    <ellipse cx="-18" cy="-5" rx="20" ry="16" fill="#d4584a"/>
    <ellipse cx="18" cy="-8" rx="20" ry="16" fill="#c8483a"/>
  </g>

  <!-- 落叶 -->
  <g>
    <path d="M250 450 Q255 445 260 450 Q255 455 250 450 Z" fill="#e8a838"/>
    <path d="M320 470 Q326 464 332 470 Q326 476 320 470 Z" fill="#c8483a"/>
    <path d="M480 455 Q486 449 492 455 Q486 461 480 455 Z" fill="#e8c438"/>
    <path d="M560 475 Q566 469 572 475 Q566 481 560 475 Z" fill="#d4584a"/>
  </g>

  <!-- 果实（柿子） -->
  <circle cx="200" cy="440" r="10" fill="#d4583a"/>
  <circle cx="220" cy="450" r="9" fill="#e8583a"/>
  <circle cx="600" cy="445" r="10" fill="#d4583a"/>

  <!-- 标注：钥匙 -->
  <line x1="400" y1="180" x2="470" y2="150" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="455" y="125" width="90" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="500" y="144" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">钥匙</text>

  <!-- 标注：秋天的大门 -->
  <line x1="400" y1="300" x2="540" y2="280" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="525" y="258" width="110" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="580" y="277" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">秋天的大门</text>

  <!-- 标注：银杏黄 -->
  <line x1="120" y1="345" x2="80" y2="310" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="10" y="290" width="90" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="55" y="309" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">银杏黄</text>

  <!-- 标注：枫叶红 -->
  <line x1="680" y1="345" x2="730" y2="310" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="700" y="290" width="90" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="745" y="309" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">枫叶红</text>

  <!-- 底部说明 -->
  <rect x="40" y="548" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="573" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">秋天的雨像一把钥匙，打开秋天的大门，把银杏染黄、枫叶染红，世界变得五彩缤纷。</text>
</svg>
