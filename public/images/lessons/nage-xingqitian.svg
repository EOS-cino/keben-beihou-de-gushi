<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="孩子在院子里等待母亲、从早到晚时光流逝的场景插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">那个星期天</text>
  <line x1="320" y1="58" x2="480" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 四个时段：早晨、中午、下午、黄昏 -->

  <!-- 时段1：早晨（兴奋等待） -->
  <g transform="translate(120, 150)">
    <rect x="-85" y="-70" width="170" height="150" rx="8" fill="#fff6df" stroke="#e07856" stroke-width="2"/>
    <text x="0" y="-48" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">早晨：兴奋</text>
    <!-- 朝阳 -->
    <circle cx="-40" cy="-25" r="12" fill="#e07856" opacity="0.6"/>
    <!-- 院子 -->
    <rect x="-55" y="10" width="110" height="30" fill="#6a8d3f" opacity="0.2"/>
    <!-- 孩子（蹦跳） -->
    <g transform="translate(0, 5)">
      <ellipse cx="0" cy="0" rx="8" ry="10" fill="#c84a3a" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-10" r="6" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="-2" cy="-11" r="1" fill="#7a3b14"/>
      <circle cx="2" cy="-11" r="1" fill="#7a3b14"/>
      <path d="M-2 -7 Q0 -5 2 -7" fill="none" stroke="#7a3b14" stroke-width="0.8"/>
      <!-- 蹦跳 -->
      <path d="M-5 10 Q-8 15 -10 20" fill="none" stroke="#c84a3a" stroke-width="3"/>
      <path d="M5 10 Q10 12 12 8" fill="none" stroke="#c84a3a" stroke-width="3"/>
    </g>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">"走吧！"</text>
    <text x="0" y="72" text-anchor="middle" font-family="serif" font-size="11" fill="#e07856">心里像小鸟扑翅膀</text>
  </g>

  <!-- 箭头 -->
  <path d="M210 150 L250 150" stroke="#c8843a" stroke-width="2" fill="none" marker-end="url(#ar6)"/>

  <!-- 时段2：中午（焦急） -->
  <g transform="translate(340, 150)">
    <rect x="-85" y="-70" width="170" height="150" rx="8" fill="#fff6df" stroke="#c8843a" stroke-width="2"/>
    <text x="0" y="-48" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">中午：焦急</text>
    <!-- 烈日 -->
    <circle cx="-40" cy="-25" r="12" fill="#c8843a" opacity="0.7"/>
    <line x1="-52" y1="-25" x2="-56" y2="-25" stroke="#c8843a" stroke-width="1.5"/>
    <line x1="-28" y1="-25" x2="-24" y2="-25" stroke="#c8843a" stroke-width="1.5"/>
    <line x1="-40" y1="-37" x2="-40" y2="-41" stroke="#c8843a" stroke-width="1.5"/>
    <!-- 蚂蚁 -->
    <rect x="-55" y="10" width="110" height="30" fill="#e0c898" opacity="0.3"/>
    <g transform="translate(-20, 20)">
      <ellipse cx="0" cy="0" rx="3" ry="1.5" fill="#7a3b14"/>
      <circle cx="3" cy="0" r="1.5" fill="#7a3b14"/>
      <line x1="-2" y1="0" x2="-5" y2="-2" stroke="#7a3b14" stroke-width="0.5"/>
    </g>
    <g transform="translate(10, 25)">
      <ellipse cx="0" cy="0" rx="3" ry="1.5" fill="#7a3b14"/>
      <circle cx="3" cy="0" r="1.5" fill="#7a3b14"/>
    </g>
    <!-- 孩子蹲着看蚂蚁 -->
    <g transform="translate(20, 5)">
      <ellipse cx="0" cy="5" rx="8" ry="6" fill="#c84a3a" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="0" cy="-5" r="6" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="-2" cy="-6" r="1" fill="#7a3b14"/>
      <circle cx="2" cy="-6" r="1" fill="#7a3b14"/>
    </g>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">"等一会儿"</text>
    <text x="0" y="72" text-anchor="middle" font-family="serif" font-size="11" fill="#c8843a">看蚂蚁搬家</text>
  </g>

  <!-- 箭头 -->
  <path d="M430 150 L470 150" stroke="#c8843a" stroke-width="2" fill="none" marker-end="url(#ar6)"/>

  <!-- 时段3：下午（惆怅） -->
  <g transform="translate(560, 150)">
    <rect x="-85" y="-70" width="170" height="150" rx="8" fill="#fff6df" stroke="#7ab8d8" stroke-width="2"/>
    <text x="0" y="-48" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#7a3b14">下午：惆怅</text>
    <!-- 云 -->
    <ellipse cx="-35" cy="-25" rx="15" ry="6" fill="#fff" opacity="0.6" stroke="#7ab8d8" stroke-width="0.5"/>
    <ellipse cx="35" cy="-30" rx="12" ry="5" fill="#fff" opacity="0.5"/>
    <!-- 院子 -->
    <rect x="-55" y="10" width="110" height="30" fill="#6a8d3f" opacity="0.15"/>
    <!-- 孩子看天 -->
    <g transform="translate(0, 10)">
      <ellipse cx="0" cy="0" rx="8" ry="8" fill="#c84a3a" stroke="#7a3b14" stroke-width="1" opacity="0.8"/>
      <circle cx="0" cy="-10" r="6" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
      <!-- 仰头看天 -->
      <path d="M0 -16 Q-3 -20 0 -22" fill="none" stroke="#7a3b14" stroke-width="0.5"/>
    </g>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">看云慢慢飘</text>
    <text x="0" y="72" text-anchor="middle" font-family="serif" font-size="11" fill="#7ab8d8">时间好慢</text>
  </g>

  <!-- 箭头 -->
  <path d="M650 150 L690 150" stroke="#c8843a" stroke-width="2" fill="none" marker-end="url(#ar6)"/>

  <!-- 时段4：黄昏（绝望与理解） -->
  <g transform="translate(730, 150)">
    <rect x="-55" y="-70" width="110" height="150" rx="8" fill="#fff6df" stroke="#4a6a2f" stroke-width="2"/>
    <text x="0" y="-48" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">黄昏</text>
    <!-- 夕阳 -->
    <circle cx="0" cy="-25" r="10" fill="#8d5a36" opacity="0.5"/>
    <!-- 长影子 -->
    <ellipse cx="0" cy="20" rx="20" ry="4" fill="#7a3b14" opacity="0.1"/>
    <!-- 孩子蹲在母亲身边 -->
    <g transform="translate(-5, 10)">
      <ellipse cx="0" cy="0" rx="6" ry="5" fill="#c84a3a" stroke="#7a3b14" stroke-width="1" opacity="0.7"/>
      <circle cx="0" cy="-7" r="4" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-2 -8 Q0 -6 2 -8" fill="none" stroke="#7a3b14" stroke-width="0.5"/>
    </g>
    <!-- 母亲洗衣服 -->
    <g transform="translate(15, 12)">
      <ellipse cx="0" cy="0" rx="7" ry="6" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1" opacity="0.7"/>
      <circle cx="0" cy="-8" r="5" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
      <!-- 盆 -->
      <ellipse cx="0" cy="8" rx="12" ry="4" fill="#7ab8d8" opacity="0.3" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">蹲在母亲身边</text>
    <text x="0" y="70" text-anchor="middle" font-family="serif" font-size="10" fill="#4a6a2f">理解了辛苦</text>
  </g>

  <!-- 底部：心情变化曲线 -->
  <g transform="translate(0, 350)">
    <rect x="60" y="0" width="680" height="200" rx="10" fill="#fff6df" stroke="#c8843a" stroke-width="2"/>
    <text x="400" y="28" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">等待中的心理变化</text>

    <!-- 曲线 -->
    <path d="M120 120 Q200 60 280 90 Q360 110 440 130 Q520 150 600 170" fill="none" stroke="#c84a3a" stroke-width="3"/>
    <!-- 节点 -->
    <circle cx="120" cy="120" r="8" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="120" y="145" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">兴奋</text>
    <circle cx="280" cy="90" r="8" fill="#c8843a" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="280" y="75" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">焦急</text>
    <circle cx="440" cy="130" r="8" fill="#7ab8d8" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="440" y="155" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">惆怅</text>
    <circle cx="600" cy="170" r="8" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1.5"/>
    <text x="600" y="190" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">理解</text>

    <text x="400" y="100" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">时间在流逝，心情在变化</text>
  </g>

  <defs>
    <marker id="ar6" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#c8843a"/>
    </marker>
  </defs>

  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">那个星期天——等待中的时间，特别漫长，也特别难忘</text>
</svg>
