<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="蜘蛛在树上挂招牌开店的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">蜘蛛开店</text>
  <line x="320" y1="56" x2="480" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="80" width="800" height="220" fill="#d6ecf7" opacity="0.3"/>

  <!-- 大树 -->
  <g transform="translate(150,200)">
    <rect x="-15" y="0" width="30" height="200" fill="#8d5a36"/>
    <ellipse cx="0" cy="-20" rx="70" ry="55" fill="#4a6a2f"/>
    <ellipse cx="-30" cy="-30" rx="40" ry="35" fill="#6a8d3f"/>
    <ellipse cx="30" cy="-25" rx="40" ry="35" fill="#6a8d3f"/>
  </g>

  <!-- 蜘蛛网（在树上） -->
  <g transform="translate(150,180)" stroke="#c0c0c0" stroke-width="1" fill="none" opacity="0.5">
    <line x1="0" y1="0" x2="0" y2="-50"/>
    <line x1="0" y1="0" x2="40" y2="-30"/>
    <line x1="0" y1="0" x2="40" y2="20"/>
    <line x1="0" y1="0" x2="0" y2="40"/>
    <line x1="0" y1="0" x2="-40" y2="20"/>
    <line x1="0" y1="0" x2="-40" y2="-30"/>
    <path d="M0 -20 L17 -13 L20 0 L17 13 L0 20 L-17 13 L-20 0 L-17 -13 Z"/>
    <path d="M0 -35 L30 -22 L35 0 L30 22 L0 35 L-30 22 L-35 0 L-30 -22 Z"/>
  </g>

  <!-- 蜘蛛 -->
  <g transform="translate(150,180)">
    <ellipse cx="0" cy="0" rx="10" ry="8" fill="#4a2a1a"/>
    <circle cx="0" cy="-8" r="7" fill="#4a2a1a"/>
    <!-- 腿 -->
    <g stroke="#4a2a1a" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M-8 -2 L-18 -8 L-22 -4"/>
      <path d="M8 -2 L18 -8 L22 -4"/>
      <path d="M-8 2 L-20 4 L-24 10"/>
      <path d="M8 2 L20 4 L24 10"/>
      <path d="M-6 5 L-14 14 L-18 18"/>
      <path d="M6 5 L14 14 L18 18"/>
      <path d="M-4 7 L-8 20 L-12 24"/>
      <path d="M4 7 L8 20 L12 24"/>
    </g>
    <!-- 眼睛 -->
    <circle cx="-3" cy="-9" r="1.5" fill="#ffffff"/>
    <circle cx="3" cy="-9" r="1.5" fill="#ffffff"/>
  </g>

  <!-- 三块招牌 -->
  <!-- 招牌1：口罩店 -->
  <g transform="translate(350,180)">
    <rect x="-70" y="-25" width="140" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="4"/>
    <text x="0" y="-5" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">口罩编织店</text>
    <text x="0" y="14" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">每位顾客一元钱</text>
    <!-- 挂绳 -->
    <line x1="-50" y1="-25" x2="-50" y2="-50" stroke="#8d5a36" stroke-width="1.5"/>
    <line x1="50" y1="-25" x2="50" y2="-50" stroke="#8d5a36" stroke-width="1.5"/>
    <!-- 河马顾客 -->
    <g transform="translate(0,60)">
      <ellipse cx="0" cy="0" rx="30" ry="22" fill="#a89888"/>
      <ellipse cx="-18" cy="-5" rx="12" ry="10" fill="#a89888"/>
      <ellipse cx="18" cy="-5" rx="12" ry="10" fill="#a89888"/>
      <!-- 大嘴巴 -->
      <ellipse cx="0" cy="8" rx="18" ry="6" fill="#6a4a3a"/>
      <circle cx="-8" cy="-8" r="2" fill="#1a1a1a"/>
      <circle cx="8" cy="-8" r="2" fill="#1a1a1a"/>
      <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a">河马：嘴巴太大！</text>
    </g>
  </g>

  <!-- 招牌2：围巾店 -->
  <g transform="translate(560,180)">
    <rect x="-70" y="-25" width="140" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="4"/>
    <text x="0" y="-5" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">围巾编织店</text>
    <text x="0" y="14" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">每位顾客一元钱</text>
    <line x1="-50" y1="-25" x2="-50" y2="-50" stroke="#8d5a36" stroke-width="1.5"/>
    <line x1="50" y1="-25" x2="50" y2="-50" stroke="#8d5a36" stroke-width="1.5"/>
    <!-- 长颈鹿顾客 -->
    <g transform="translate(0,60)">
      <rect x="-3" y="-30" width="6" height="35" fill="#e0c848"/>
      <ellipse cx="0" cy="10" rx="20" ry="15" fill="#e0c848"/>
      <circle cx="0" cy="-35" r="10" fill="#e0c848"/>
      <!-- 斑纹 -->
      <g fill="#8d7a2a">
        <circle cx="-2" cy="-20" r="2"/>
        <circle cx="2" cy="-10" r="2"/>
        <circle cx="-2" cy="0" r="2"/>
      </g>
      <circle cx="-3" cy="-37" r="1.5" fill="#1a1a1a"/>
      <circle cx="3" cy="-37" r="1.5" fill="#1a1a1a"/>
      <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a">长颈鹿：脖子太长！</text>
    </g>
  </g>

  <!-- 招牌3：袜子店 -->
  <g transform="translate(350,380)">
    <rect x="-70" y="-25" width="140" height="50" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="4"/>
    <text x="0" y="-5" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#7a3b14">袜子编织店</text>
    <text x="0" y="14" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">每位顾客一元钱</text>
    <line x1="-50" y1="-25" x2="-50" y2="-50" stroke="#8d5a36" stroke-width="1.5"/>
    <line x1="50" y1="-25" x2="50" y2="-50" stroke="#8d5a36" stroke-width="1.5"/>
    <!-- 蜈蚣顾客 -->
    <g transform="translate(0,60)">
      <ellipse cx="0" cy="0" rx="35" ry="8" fill="#c84a3a"/>
      <circle cx="-30" cy="-2" r="6" fill="#c84a3a"/>
      <circle cx="-28" cy="-4" r="1.5" fill="#1a1a1a"/>
      <!-- 很多脚 -->
      <g stroke="#8d5a36" stroke-width="1.5" stroke-linecap="round">
        <line x1="-25" y1="5" x2="-28" y2="15"/>
        <line x1="-18" y1="6" x2="-21" y2="16"/>
        <line x1="-11" y1="6" x2="-14" y2="16"/>
        <line x1="-4" y1="6" x2="-7" y2="16"/>
        <line x1="3" y1="6" x2="0" y2="16"/>
        <line x1="10" y1="6" x2="7" y2="16"/>
        <line x1="17" y1="6" x2="14" y2="16"/>
        <line x1="24" y1="6" x2="21" y2="16"/>
        <line x1="-25" y1="-5" x2="-28" y2="-15"/>
        <line x1="-18" y1="-6" x2="-21" y2="-16"/>
        <line x1="-11" y1="-6" x2="-14" y2="-16"/>
        <line x1="-4" y1="-6" x2="-7" y2="-16"/>
        <line x1="3" y1="-6" x2="0" y2="-16"/>
        <line x1="10" y1="-6" x2="7" y2="-16"/>
        <line x1="17" y1="-6" x2="14" y2="-16"/>
        <line x1="24" y1="-6" x2="21" y2="-16"/>
      </g>
      <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a">蜈蚣：42只脚！</text>
    </g>
  </g>

  <!-- 蜘蛛逃跑 -->
  <g transform="translate(600,400)">
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">吓得跑回网上！</text>
    <!-- 逃跑轨迹 -->
    <path d="M-100 0 Q-50 -20 0 -10" fill="none" stroke="#c84a3a" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrZ1)"/>
    <!-- 蜘蛛跑回网上 -->
    <ellipse cx="10" cy="-5" rx="8" ry="6" fill="#4a2a1a"/>
    <circle cx="10" cy="-12" r="6" fill="#4a2a1a"/>
    <g stroke="#4a2a1a" stroke-width="1.5" fill="none">
      <path d="M4 -8 L-2 -14"/>
      <path d="M16 -8 L22 -14"/>
      <path d="M4 -2 L-4 2"/>
      <path d="M16 -2 L24 2"/>
    </g>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">口罩店→围巾店→袜子店，每次遇到困难就换——做事要有始有终</text>

  <defs>
    <marker id="arrZ1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#c84a3a"/>
    </marker>
  </defs>
</svg>
