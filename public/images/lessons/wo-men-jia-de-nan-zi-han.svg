<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="小男孩买东西与成长的小画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">我们家的男子汉</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#b5651d" stroke-width="2"/>
  <!-- 柜台 -->
  <rect x="120" y="320" width="560" height="40" fill="#8a6d3b" opacity="0.7"/>
  <rect x="120" y="280" width="560" height="40" fill="#a89060" opacity="0.5"/>
  <!-- 货架商品 -->
  <rect x="160" y="240" width="40" height="40" fill="#c8553d"/>
  <rect x="220" y="240" width="40" height="40" fill="#3a7d44"/>
  <rect x="280" y="240" width="40" height="40" fill="#1e5f8e"/>
  <rect x="480" y="240" width="40" height="40" fill="#d4a017"/>
  <rect x="540" y="240" width="40" height="40" fill="#a83232"/>
  <rect x="600" y="240" width="40" height="40" fill="#6b8e7f"/>
  <!-- 小男孩踮脚 -->
  <ellipse cx="400" cy="300" rx="22" ry="18" fill="#f0c419"/>
  <circle cx="400" cy="240" r="22" fill="#f5d9a0"/>
  <path d="M 380 236 q 20 -12 40 0" stroke="#3a3a3a" stroke-width="2" fill="none"/>
  <circle cx="392" cy="240" r="2" fill="#3a3a3a"/>
  <circle cx="408" cy="240" r="2" fill="#3a3a3a"/>
  <path d="M 392 252 q 8 4 16 0" stroke="#3a3a3a" stroke-width="1.5" fill="none"/>
  <rect x="388" y="262" width="24" height="50" fill="#1e5f8e"/>
  <rect x="392" y="312" width="8" height="30" fill="#3a3a3a"/>
  <rect x="404" y="312" width="8" height="30" fill="#3a3a3a"/>
  <!-- 踮脚 -->
  <ellipse cx="396" cy="346" rx="6" ry="3" fill="#3a3a3a"/>
  <ellipse cx="408" cy="346" rx="6" ry="3" fill="#3a3a3a"/>
  <!-- 攥钱的手 -->
  <circle cx="376" cy="285" r="7" fill="#f5d9a0" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- 山楂片 -->
  <circle cx="350" cy="320" r="6" fill="#c8553d"/>
  <circle cx="362" cy="316" r="6" fill="#c8553d"/>
  <circle cx="356" cy="330" r="6" fill="#c8553d"/>
  <!-- 橘子水（抱怀里） -->
  <rect x="412" y="276" width="18" height="36" rx="3" fill="#f0c419" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="400" y="420" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14">三个小标题，一个真实的小男孩</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">在小事里，一点点学着独立</text>
</svg>
