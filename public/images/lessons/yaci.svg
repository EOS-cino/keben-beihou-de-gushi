<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="小女孩换牙奶奶讲述扔牙民俗的温馨插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">雅齿</text>
  <line x1="350" y1="56" x2="450" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——一颗小牙，牵出一串老规矩</text>

  <!-- 屋顶与房屋 -->
  <g transform="translate(120, 200)">
    <polygon points="0,0 120,0 150,-50 -30,-50" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="0" y="0" width="120" height="120" fill="#e8a838" opacity="0.5" stroke="#8d5a36" stroke-width="1.5"/>
    <rect x="45" y="40" width="30" height="80" fill="#7a3b14"/>
    <circle cx="68" cy="80" r="3" fill="#e8a838"/>
    <rect x="15" y="20" width="25" height="25" fill="#4a90b8" opacity="0.7" stroke="#7a3b14" stroke-width="1"/>
    <rect x="80" y="20" width="25" height="25" fill="#4a90b8" opacity="0.7" stroke="#7a3b14" stroke-width="1"/>
    <text x="60" y="155" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">老屋的屋顶</text>
  </g>

  <!-- 飞向屋顶的小牙 -->
  <g transform="translate(280, 230)">
    <path d="M0 0 Q40 -40 90 -30" fill="none" stroke="#c8843a" stroke-width="2" stroke-dasharray="4 4"/>
    <polygon points="0,-3 12,0 0,3 4,0" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.2"/>
    <text x="40" y="-45" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">小牙飞上屋顶</text>
  </g>

  <!-- 奶奶和小雅 -->
  <g transform="translate(440, 300)">
    <!-- 奶奶 -->
    <g transform="translate(60, 0)">
      <circle cx="0" cy="0" r="18" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-18 0 Q-22 6 -16 8" fill="none" stroke="#8d5a36" stroke-width="1.5"/>
      <ellipse cx="0" cy="45" rx="26" ry="32" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
      <!-- 摊开的手 -->
      <ellipse cx="20" cy="40" rx="14" ry="9" fill="#e07856" stroke="#7a3b14" stroke-width="1.2"/>
      <text x="0" y="95" text-anchor="middle" font-family="serif" font-size="11" fill="#2d6a4f">奶奶</text>
    </g>
    <!-- 小雅 -->
    <g transform="translate(-10, 30)">
      <circle cx="0" cy="0" r="14" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-14 2 Q-18 -8 -6 -12" fill="none" stroke="#7a3b14" stroke-width="2"/>
      <ellipse cx="0" cy="42" rx="20" ry="26" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
      <ellipse cx="-22" cy="34" rx="12" ry="8" fill="#e8a838" stroke="#7a3b14" stroke-width="1.2"/>
      <text x="0" y="85" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">小雅</text>
    </g>
  </g>

  <!-- 地面 -->
  <rect x="0" y="470" width="800" height="60" fill="#6a8d3f" opacity="0.25"/>

  <!-- 小草 -->
  <g transform="translate(0, 470)">
    <path d="M120 0 L122 -10 L124 0" stroke="#2d6a4f" stroke-width="2" fill="none"/>
    <path d="M340 0 L342 -12 L344 0" stroke="#2d6a4f" stroke-width="2" fill="none"/>
    <path d="M620 0 L622 -10 L624 0" stroke="#2d6a4f" stroke-width="2" fill="none"/>
    <path d="M700 0 L702 -8 L704 0" stroke="#2d6a4f" stroke-width="2" fill="none"/>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 510)">
    <rect x="-300" y="0" width="600" height="60" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">上牙扔屋顶 · 下牙扔床底 · 盼新牙长得齐又好</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">扔的是心意，长出来的是自己</text>
  </g>
</svg>
