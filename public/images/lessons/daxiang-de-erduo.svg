<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="大象耷拉着大耳朵的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">大象的耳朵</text>
  <line x="300" y1="56" x2="500" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="80" width="800" height="220" fill="#d6ecf7" opacity="0.3"/>
  <!-- 草地 -->
  <rect x="0" y="380" width="800" height="220" fill="#c8e0a8" opacity="0.4"/>
  <!-- 太阳 -->
  <circle cx="680" cy="130" r="24" fill="#f4b942" opacity="0.8"/>

  <!-- 大象（中间） -->
  <g transform="translate(400,340)">
    <!-- 身体 -->
    <ellipse cx="0" cy="60" rx="90" ry="60" fill="#a89888"/>
    <!-- 腿 -->
    <rect x="-60" y="100" width="25" height="50" fill="#8d7a6a" rx="3"/>
    <rect x="-20" y="100" width="25" height="50" fill="#8d7a6a" rx="3"/>
    <rect x="15" y="100" width="25" height="50" fill="#8d7a6a" rx="3"/>
    <rect x="50" y="100" width="25" height="50" fill="#8d7a6a" rx="3"/>
    <!-- 耷拉的耳朵（左） -->
    <path d="M-55 0 Q-95 10 -100 50 Q-95 80 -70 75 Q-55 60 -50 30 Z" fill="#a89888" stroke="#8d7a6a" stroke-width="2"/>
    <!-- 耷拉的耳朵（右） -->
    <path d="M55 0 Q95 10 100 50 Q95 80 70 75 Q55 60 50 30 Z" fill="#a89888" stroke="#8d7a6a" stroke-width="2"/>
    <!-- 耳朵血管纹路 -->
    <g stroke="#8d7a6a" stroke-width="1" fill="none" opacity="0.5">
      <path d="M-60 15 Q-80 30 -85 55"/>
      <path d="M-65 20 Q-78 40 -75 65"/>
      <path d="M60 15 Q80 30 85 55"/>
      <path d="M65 20 Q78 40 75 65"/>
    </g>
    <!-- 头 -->
    <ellipse cx="0" cy="10" rx="55" ry="45" fill="#a89888"/>
    <!-- 长鼻子 -->
    <path d="M0 30 Q-5 70 -15 100 Q-10 110 0 105 Q10 100 5 90" fill="#a89888" stroke="#8d7a6a" stroke-width="2"/>
    <!-- 鼻子褶皱 -->
    <g stroke="#8d7a6a" stroke-width="1" fill="none" opacity="0.4">
      <line x1="-3" y1="50" x2="3" y2="50"/>
      <line x1="-6" y1="65" x2="0" y2="65"/>
      <line x1="-10" y1="80" x2="-4" y2="80"/>
      <line x1="-12" y1="95" x2="-6" y2="95"/>
    </g>
    <!-- 眼睛 -->
    <circle cx="-18" cy="0" r="5" fill="#ffffff"/>
    <circle cx="18" cy="0" r="5" fill="#ffffff"/>
    <circle cx="-18" cy="1" r="3" fill="#1a1a1a"/>
    <circle cx="18" cy="1" r="3" fill="#1a1a1a"/>
    <!-- 象牙 -->
    <path d="M-15 35 Q-25 50 -22 60" fill="none" stroke="#f4ecdc" stroke-width="4" stroke-linecap="round"/>
    <path d="M15 35 Q25 50 22 60" fill="none" stroke="#f4ecdc" stroke-width="4" stroke-linecap="round"/>
    <!-- 嘴 -->
    <path d="M-8 25 Q0 30 8 25" fill="none" stroke="#6a5a4a" stroke-width="1.5"/>
    <!-- 尾巴 -->
    <path d="M85 50 Q100 55 95 80" fill="none" stroke="#8d7a6a" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- 小兔子（左下） -->
  <g transform="translate(130,440)">
    <ellipse cx="0" cy="10" rx="18" ry="13" fill="#e8d8c8"/>
    <circle cx="5" cy="-8" r="11" fill="#e8d8c8"/>
    <!-- 竖耳朵 -->
    <ellipse cx="0" cy="-25" rx="4" ry="14" fill="#e8d8c8" stroke="#c8b8a8" stroke-width="1"/>
    <ellipse cx="10" cy="-25" rx="4" ry="14" fill="#e8d8c8" stroke="#c8b8a8" stroke-width="1"/>
    <ellipse cx="0" cy="-25" rx="2" ry="10" fill="#f5c8c8"/>
    <ellipse cx="10" cy="-25" rx="2" ry="10" fill="#f5c8c8"/>
    <circle cx="8" cy="-8" r="1.5" fill="#c84a3a"/>
    <circle cx="2" cy="-5" r="1" fill="#e07856"/>
    <text x="5" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">"耳朵竖着才对！"</text>
  </g>

  <!-- 小羊（右下） -->
  <g transform="translate(670,440)">
    <ellipse cx="0" cy="10" rx="20" ry="15" fill="#f0e8d8"/>
    <circle cx="-8" cy="-8" r="12" fill="#e8d8c8"/>
    <!-- 竖耳朵 -->
    <ellipse cx="-14" cy="-18" rx="3.5" ry="10" fill="#e8d8c8" transform="rotate(-15 -14 -18)"/>
    <ellipse cx="-4" cy="-20" rx="3.5" ry="10" fill="#e8d8c8" transform="rotate(10 -4 -20)"/>
    <circle cx="-10" cy="-8" r="1.5" fill="#1a1a1a"/>
    <!-- 羊毛卷 -->
    <circle cx="5" cy="0" r="6" fill="#f0e8d8" stroke="#d0c8b8" stroke-width="1"/>
    <circle cx="12" cy="8" r="6" fill="#f0e8d8" stroke="#d0c8b8" stroke-width="1"/>
    <text x="0" y="35" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">"是不是有毛病？"</text>
  </g>

  <!-- 标注：耷拉的耳朵 -->
  <line x1="300" y1="350" x2="220" y2="280" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="160" y="260" width="120" height="24" fill="#fff6df" stroke="#c8843a" rx="3"/>
  <text x="220" y="277" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">耷拉着的大耳朵</text>

  <!-- 底部说明 -->
  <rect x="120" y="520" width="560" height="55" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6"/>
  <text x="400" y="543" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">"人家是人家，我是我"</text>
  <text x="400" y="563" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">大象明白了：耷拉着的耳朵能挡虫散热，就是最好的</text>
</svg>
