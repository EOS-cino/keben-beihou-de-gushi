<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="冀中平原地道战剖面示意图插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">冀中的地道战</text>
  <line x1="310" y1="60" x2="490" y2="60" stroke="#c8843a" stroke-width="2"/>

  <!-- 地面线 -->
  <rect x="0" y="70" width="800" height="180" fill="#e8f0e6"/>
  <!-- 地面（土层） -->
  <rect x="0" y="250" width="800" height="350" fill="#d8c8a8"/>

  <!-- 村庄（地面上） -->
  <!-- 房屋1 -->
  <g>
    <rect x="80" y="170" width="100" height="80" fill="#f0e8d8" stroke="#7a3b14" stroke-width="2"/>
    <path d="M70 170 L130 130 L190 170 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="110" y="195" width="20" height="55" fill="#7a3b14"/>
    <rect x="140" y="185" width="25" height="20" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
  </g>
  <!-- 房屋2 -->
  <g>
    <rect x="600" y="175" width="90" height="75" fill="#f0e8d8" stroke="#7a3b14" stroke-width="2"/>
    <path d="M592 175 L645 140 L698 175 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="625" y="200" width="18" height="50" fill="#7a3b14"/>
  </g>
  <!-- 水井 -->
  <ellipse cx="300" cy="245" rx="20" ry="8" fill="#3a2a1a"/>
  <rect x="285" y="225" width="30" height="25" fill="#8d6a4a" stroke="#5a3a1a" stroke-width="1.5"/>
  <!-- 磨盘 -->
  <ellipse cx="480" cy="245" rx="25" ry="10" fill="#8d8d8d" stroke="#5a5a5a" stroke-width="1.5"/>
  <ellipse cx="480" cy="242" rx="20" ry="7" fill="#a0a0a0"/>

  <!-- 地道系统（地下） -->
  <!-- 主干道 -->
  <path d="M130 320 L130 380 L670 380 L670 320" fill="none" stroke="#5a3a1a" stroke-width="20" stroke-linecap="round" opacity="0.3"/>
  <path d="M130 320 L130 380 L670 380 L670 320" fill="none" stroke="#3a2a1a" stroke-width="16" stroke-linecap="round"/>

  <!-- 支道1（连房屋1） -->
  <path d="M130 320 L130 250" fill="none" stroke="#3a2a1a" stroke-width="14" stroke-linecap="round"/>
  <!-- 支道2（连水井） -->
  <path d="M300 380 L300 250" fill="none" stroke="#3a2a1a" stroke-width="14" stroke-linecap="round"/>
  <!-- 支道3（连磨盘） -->
  <path d="M480 380 L480 250" fill="none" stroke="#3a2a1a" stroke-width="14" stroke-linecap="round"/>
  <!-- 支道4（连房屋2） -->
  <path d="M670 320 L670 250" fill="none" stroke="#3a2a1a" stroke-width="14" stroke-linecap="round"/>

  <!-- 横向连接道 -->
  <path d="M300 380 L480 380" fill="none" stroke="#3a2a1a" stroke-width="14"/>

  <!-- 陷坑（在支道2旁边） -->
  <rect x="340" y="370" width="30" height="40" rx="4" fill="#2a1a0a" stroke="#5a3a1a" stroke-width="2"/>
  <path d="M340 370 L355 385 L370 370" fill="none" stroke="#5a3a1a" stroke-width="1.5"/>

  <!-- 挡板（防毒） -->
  <rect x="200" y="372" width="8" height="36" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
  <text x="204" y="425" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">挡板</text>

  <!-- 孑口（窄口） -->
  <rect x="400" y="374" width="16" height="32" fill="#2a1a0a" stroke="#e07856" stroke-width="2"/>
  <text x="408" y="425" text-anchor="middle" font-family="serif" font-size="10" fill="#e07856" font-weight="bold">孑口</text>

  <!-- 通风口 -->
  <path d="M550 380 L560 270" fill="none" stroke="#4a90b8" stroke-width="3" stroke-dasharray="4,3"/>
  <circle cx="560" cy="265" r="5" fill="#4a90b8" opacity="0.5"/>
  <text x="575" y="320" font-family="serif" font-size="10" fill="#4a90b8">通风口</text>

  <!-- 民兵（在地道里） -->
  <g>
    <circle cx="250" cy="375" r="8" fill="#e8c9a0" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="244" y="383" width="12" height="14" rx="2" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1"/>
    <!-- 枪 -->
    <line x1="258" y1="385" x2="275" y2="380" stroke="#5a3a1a" stroke-width="2"/>
  </g>

  <!-- 出击口（从地面突然出来） -->
  <path d="M130 250 L130 230" fill="none" stroke="#e07856" stroke-width="3" stroke-dasharray="3,2"/>
  <circle cx="130" cy="225" r="6" fill="#e8c9a0" stroke="#e07856" stroke-width="2"/>
  <text x="130" y="215" text-anchor="middle" font-family="serif" font-size="10" fill="#e07856" font-weight="bold">出击口</text>

  <!-- 入口标注 -->
  <text x="130" y="265" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">灶台入口</text>
  <text x="300" y="265" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">水井入口</text>
  <text x="480" y="265" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">磨盘入口</text>
  <text x="670" y="265" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">房屋入口</text>

  <!-- 陷坑标注 -->
  <text x="355" y="425" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">陷坑</text>

  <!-- 地面标注 -->
  <line x1="20" y1="250" x2="60" y2="250" stroke="#7a3b14" stroke-width="2"/>
  <text x="40" y="245" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">地面</text>

  <!-- 敌人（地面上，困惑） -->
  <g>
    <rect x="380" y="195" width="24" height="40" rx="3" fill="#8d8d8d" stroke="#5a5a5a" stroke-width="1.5"/>
    <circle cx="392" cy="185" r="12" fill="#e8c9a0" stroke="#5a5a5a" stroke-width="1.5"/>
    <!-- 钢盔 -->
    <path d="M380 182 q12 -10 24 0" fill="#5a5a5a" stroke="#3a3a3a" stroke-width="1"/>
    <!-- 困惑表情 -->
    <path d="M387 184 q3 -2 5 0" stroke="#3a2a1a" stroke-width="1.5" fill="none"/>
    <path d="M394 184 q3 -2 5 0" stroke="#3a2a1a" stroke-width="1.5" fill="none"/>
    <text x="392" y="195" text-anchor="middle" font-family="serif" font-size="10" fill="#3a2a1a">?</text>
    <!-- 问号气泡 -->
    <circle cx="415" cy="175" r="12" fill="#fff6df" stroke="#e07856" stroke-width="1.5"/>
    <text x="415" y="180" text-anchor="middle" font-family="serif" font-size="14" fill="#e07856" font-weight="bold">?</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">地下的"长城"：四通八达的地道，让敌人有来无回</text>
</svg>
