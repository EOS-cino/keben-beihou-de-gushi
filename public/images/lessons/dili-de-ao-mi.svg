<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="地球板块与地形剖面插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">地理的奥秘</text>
  <line x1="310" y1="62" x2="490" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 上半：地球板块俯视 -->
  <text x="400" y="95" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">板块运动</text>
  <!-- 地球圆 -->
  <circle cx="400" cy="200" r="90" fill="#a8d0e8" stroke="#7a3b14" stroke-width="2"/>
  <!-- 陆地 -->
  <path d="M340 170 Q360 150 390 160 Q420 145 450 165 Q470 180 455 200 Q430 215 400 205 Q370 215 345 195 Z" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
  <path d="M370 230 Q390 225 410 235 Q425 245 415 255 Q395 260 375 250 Z" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
  <!-- 板块边界虚线 -->
  <path d="M320 180 Q350 200 330 230" fill="none" stroke="#c84a3a" stroke-width="2" stroke-dasharray="5,3"/>
  <path d="M470 175 Q450 210 480 240" fill="none" stroke="#c84a3a" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- 挤压箭头 -->
  <path d="M300 200 L325 200" stroke="#e07856" stroke-width="3" fill="none"/>
  <polygon points="325,200 318,195 318,205" fill="#e07856"/>
  <path d="M500 200 L475 200" stroke="#e07856" stroke-width="3" fill="none"/>
  <polygon points="475,200 482,195 482,205" fill="#e07856"/>
  <text x="280" y="195" font-family="serif" font-size="11" fill="#e07856">挤压</text>
  <text x="510" y="195" font-family="serif" font-size="11" fill="#e07856">挤压</text>

  <!-- 下半：地形剖面 -->
  <text x="400" y="325" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">地形剖面</text>
  <!-- 地壳层 -->
  <rect x="50" y="420" width="700" height="120" fill="#8d5a36" opacity="0.3"/>
  <!-- 地表起伏 -->
  <path d="M50 420 L120 420 L160 360 L200 340 L240 360 L280 420 L380 420 L420 350 L460 330 L500 350 L540 420 L620 420 L660 390 L700 400 L750 420" fill="#4a6a2f" stroke="#4a6a2f" stroke-width="2"/>
  <!-- 山 -->
  <path d="M160 360 L200 340 L240 360 Z" fill="#6a8d3f"/>
  <path d="M180 350 L200 340 L220 350" fill="#fef9ed" opacity="0.7"/>
  <!-- 海洋 -->
  <rect x="280" y="400" width="100" height="20" fill="#a8d0e8" opacity="0.6"/>
  <path d="M280 400 Q330 395 380 400" fill="none" stroke="#7ab8d8" stroke-width="1.5"/>
  <!-- 平原 -->
  <rect x="540" y="418" width="80" height="4" fill="#6a8d3f"/>

  <!-- 标注 -->
  <line x1="200" y1="340" x2="200" y2="300" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="160" y="275" width="80" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="200" y="291" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">高山</text>

  <line x1="330" y1="400" x2="330" y2="370" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="295" y="345" width="70" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="330" y="361" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">海洋</text>

  <line x1="580" y1="418" x2="580" y2="385" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="540" y="360" width="80" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="580" y="376" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">平原</text>

  <!-- 化石标记（山上） -->
  <g transform="translate(195, 348)">
    <path d="M0 0 Q3 -3 6 0 Q3 3 0 0" fill="#fef9ed" stroke="#7a3b14" stroke-width="0.8"/>
  </g>
  <line x1="198" y1="348" x2="270" y2="310" stroke="#7a3b14" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="275" y="313" font-family="serif" font-size="10" fill="#7a3b14">海洋化石</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">板块挤压造高山，风化侵蚀削山平——地球表面永远在变</text>
</svg>
