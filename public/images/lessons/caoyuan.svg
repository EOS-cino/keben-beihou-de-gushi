<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="内蒙古草原风光、蒙古包、马群和热情迎客插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">草原</text>
  <line x1="370" y1="58" x2="430" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="72" width="800" height="240" fill="#c4d8e8" opacity="0.35"/>
  <!-- 白云 -->
  <ellipse cx="150" cy="120" rx="50" ry="16" fill="#fff" opacity="0.7"/>
  <ellipse cx="180" cy="130" rx="35" ry="12" fill="#fff" opacity="0.6"/>
  <ellipse cx="600" cy="110" rx="55" ry="18" fill="#fff" opacity="0.7"/>
  <ellipse cx="630" cy="120" rx="35" ry="12" fill="#fff" opacity="0.6"/>

  <!-- 远处山丘 -->
  <path d="M0 310 Q200 270 400 290 Q600 270 800 300 L800 340 L0 340 Z" fill="#a8c898" opacity="0.4"/>

  <!-- 草原（一碧千里） -->
  <rect x="0" y="310" width="800" height="240" fill="#8aba5a" opacity="0.4"/>
  <rect x="0" y="340" width="800" height="210" fill="#7aaa4a" opacity="0.3"/>

  <!-- 草地纹理 -->
  <path d="M0 380 Q100 375 200 380 Q300 375 400 380 Q500 375 600 380 Q700 375 800 380" fill="none" stroke="#6a9a3a" stroke-width="1" opacity="0.3"/>
  <path d="M0 430 Q100 425 200 430 Q300 425 400 430 Q500 425 600 430 Q700 425 800 430" fill="none" stroke="#6a9a3a" stroke-width="1" opacity="0.3"/>

  <!-- 羊群（白色大花） -->
  <g opacity="0.85">
    <g transform="translate(120, 360)">
      <ellipse cx="0" cy="0" rx="12" ry="8" fill="#fff" stroke="#d8d8d8" stroke-width="1"/>
      <circle cx="10" cy="-3" r="5" fill="#e8e8e8" stroke="#d8d8d8" stroke-width="1"/>
      <circle cx="9" cy="-4" r="1.5" fill="#5a5a5a"/>
    </g>
    <g transform="translate(160, 370)">
      <ellipse cx="0" cy="0" rx="10" ry="7" fill="#fff" stroke="#d8d8d8" stroke-width="1"/>
      <circle cx="8" cy="-2" r="4" fill="#e8e8e8" stroke="#d8d8d8" stroke-width="1"/>
    </g>
    <g transform="translate(200, 365)">
      <ellipse cx="0" cy="0" rx="11" ry="8" fill="#fff" stroke="#d8d8d8" stroke-width="1"/>
      <circle cx="9" cy="-3" r="5" fill="#e8e8e8" stroke="#d8d8d8" stroke-width="1"/>
      <circle cx="8" cy="-4" r="1.5" fill="#5a5a5a"/>
    </g>
    <g transform="translate(250, 375)">
      <ellipse cx="0" cy="0" rx="10" ry="7" fill="#fff" stroke="#d8d8d8" stroke-width="1"/>
      <circle cx="8" cy="-2" r="4" fill="#e8e8e8" stroke="#d8d8d8" stroke-width="1"/>
    </g>
  </g>

  <!-- 蒙古包 -->
  <g transform="translate(550, 400)">
    <!-- 主体 -->
    <path d="M -40 30 Q -40 -10 0 -25 Q 40 -10 40 30 Z" fill="#f0e8d0" stroke="#7a3b14" stroke-width="2"/>
    <!-- 门 -->
    <path d="M -10 30 Q -10 10 0 5 Q 10 10 10 30 Z" fill="#c8a868" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 顶部装饰 -->
    <circle cx="0" cy="-20" r="4" fill="#c84030" stroke="#7a3b14" stroke-width="1"/>
    <!-- 纹饰 -->
    <path d="M -30 10 Q -20 5 -10 10" fill="none" stroke="#c8843a" stroke-width="1.5"/>
    <path d="M 10 10 Q 20 5 30 10" fill="none" stroke="#c8843a" stroke-width="1.5"/>
    <path d="M -35 20 Q -20 15 0 20 Q 20 15 35 20" fill="none" stroke="#c8843a" stroke-width="1.5"/>
  </g>

  <!-- 骑马迎客的蒙古族牧民 -->
  <g transform="translate(300, 380)">
    <!-- 马 -->
    <ellipse cx="0" cy="10" rx="28" ry="12" fill="#8a5a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 马腿 -->
    <line x1="-18" y1="20" x2="-18" y2="38" stroke="#8a5a3a" stroke-width="4"/>
    <line x1="-8" y1="22" x2="-8" y2="38" stroke="#8a5a3a" stroke-width="4"/>
    <line x1="10" y1="22" x2="10" y2="38" stroke="#8a5a3a" stroke-width="4"/>
    <line x1="20" y1="20" x2="20" y2="38" stroke="#8a5a3a" stroke-width="4"/>
    <!-- 马头 -->
    <ellipse cx="28" cy="0" rx="10" ry="7" fill="#8a5a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M 33 -5 L 36 -12 L 38 -5" fill="#8a5a3a" stroke="#7a3b14" stroke-width="1"/>
    <!-- 马尾 -->
    <path d="M -28 8 Q -35 15 -33 25" fill="none" stroke="#8a5a3a" stroke-width="3"/>
    <!-- 骑手 -->
    <path d="M -5 -5 Q -8 -15 -5 -22 Q 0 -25 5 -22 Q 8 -15 5 -5" fill="#c84030" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="-28" r="8" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 帽子 -->
    <path d="M -8 -30 Q -8 -38 0 -39 Q 8 -38 8 -30" fill="#c84030" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="-30" rx="10" ry="3" fill="#c84030" stroke="#7a3b14" stroke-width="1"/>
    <!-- 眼睛 -->
    <circle cx="-3" cy="-28" r="1" fill="#7a3b14"/>
    <circle cx="3" cy="-28" r="1" fill="#7a3b14"/>
    <!-- 嘴（笑） -->
    <path d="M -3 -23 Q 0 -21 3 -23" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 手臂（挥手） -->
    <path d="M 5 -15 Q 15 -20 20 -28" fill="none" stroke="#c84030" stroke-width="5" stroke-linecap="round"/>
    <circle cx="20" cy="-29" r="4" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
  </g>

  <!-- 飘带（襟飘带舞） -->
  <path d="M 320 360 Q 340 355 360 365 Q 380 360 395 370" fill="none" stroke="#c84030" stroke-width="2" opacity="0.5"/>
  <path d="M 310 370 Q 330 365 350 375" fill="none" stroke="#3a5a8a" stroke-width="2" opacity="0.4"/>

  <!-- 标注：一碧千里 -->
  <line x1="100" y1="350" x2="60" y2="310" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="10" y="288" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="65" y="306" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">一碧千里</text>

  <!-- 标注：羊群 -->
  <line x1="180" y1="370" x2="180" y2="330" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="130" y="308" width="100" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="180" y="326" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">羊群如花</text>

  <!-- 标注：蒙古包 -->
  <line x1="550" y1="375" x2="620" y2="340" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="590" y="318" width="100" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="640" y="336" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">蒙古包</text>

  <!-- 标注：骑马迎客 -->
  <line x1="300" y1="350" x2="250" y2="310" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="200" y="288" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="255" y="306" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">骑马迎客</text>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">天苍苍野茫茫，蒙古族人民热情迎客——蒙汉情深何忍别，天涯碧草话斜阳</text>
</svg>
