<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="夜空繁星与孩子用望远镜观星的科学插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">夜晚的星星</text>
  <line x1="330" y1="56" x2="470" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——抬头那一下，就遇上了宇宙</text>

  <!-- 夜空 -->
  <rect x="0" y="90" width="800" height="320" fill="#4a90b8" opacity="0.25"/>

  <!-- 满天星 -->
  <g fill="#e8a838">
    <circle cx="120" cy="140" r="2.5"/>
    <circle cx="200" cy="120" r="2"/>
    <circle cx="280" cy="160" r="3"/>
    <circle cx="360" cy="110" r="2"/>
    <circle cx="440" cy="140" r="2.5"/>
    <circle cx="520" cy="120" r="2"/>
    <circle cx="600" cy="150" r="3"/>
    <circle cx="680" cy="130" r="2"/>
    <circle cx="160" cy="200" r="2"/>
    <circle cx="240" cy="220" r="2.5"/>
    <circle cx="340" cy="200" r="2"/>
    <circle cx="500" cy="210" r="2.5"/>
    <circle cx="620" cy="220" r="2"/>
    <circle cx="720" cy="180" r="2.5"/>
    <circle cx="100" cy="260" r="2"/>
    <circle cx="420" cy="240" r="2"/>
    <circle cx="560" cy="260" r="2.5"/>
  </g>

  <!-- 北斗七星连线 -->
  <g transform="translate(0, 0)">
    <circle cx="150" cy="300" r="4" fill="#e8a838" stroke="#c8843a" stroke-width="1"/>
    <circle cx="200" cy="285" r="4" fill="#e8a838" stroke="#c8843a" stroke-width="1"/>
    <circle cx="250" cy="295" r="4" fill="#e8a838" stroke="#c8843a" stroke-width="1"/>
    <circle cx="290" cy="320" r="4" fill="#e8a838" stroke="#c8843a" stroke-width="1"/>
    <circle cx="330" cy="345" r="4" fill="#e8a838" stroke="#c8843a" stroke-width="1"/>
    <circle cx="370" cy="335" r="4" fill="#e8a838" stroke="#c8843a" stroke-width="1"/>
    <circle cx="410" cy="315" r="4" fill="#e8a838" stroke="#c8843a" stroke-width="1"/>
    <polyline points="150,300 200,285 250,295 290,320 330,345 370,335 410,315" fill="none" stroke="#fef9ed" stroke-width="1.5" opacity="0.8"/>
    <text x="280" y="380" text-anchor="middle" font-family="serif" font-size="12" fill="#e8a838">北斗七星，像一把勺子</text>
  </g>

  <!-- 北极星 -->
  <g transform="translate(470, 250)">
    <polygon points="0,-14 4,-4 14,-4 6,4 9,14 0,8 -9,14 -6,4 -14,-4 -4,-4" fill="#e07856" stroke="#c84a3a" stroke-width="1"/>
    <text x="0" y="-22" text-anchor="middle" font-family="serif" font-size="10" fill="#e07856">北极星</text>
    <path d="M410 315 L0 0" stroke="#fef9ed" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
  </g>

  <!-- 孩子观星 -->
  <g transform="translate(580, 400)">
    <!-- 躺椅 -->
    <rect x="-50" y="0" width="100" height="10" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.2"/>
    <rect x="-50" y="10" width="10" height="30" fill="#8d5a36"/>
    <rect x="40" y="10" width="10" height="30" fill="#8d5a36"/>
    <!-- 孩子 -->
    <circle cx="-10" cy="-12" r="9" fill="#e8a838" stroke="#7a3b14" stroke-width="1.2"/>
    <ellipse cx="0" cy="-6" rx="30" ry="10" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.2"/>
    <!-- 望远镜 -->
    <g transform="translate(20, -20) rotate(-30)">
      <rect x="0" y="-4" width="40" height="8" fill="#7a3b14" stroke="#c8843a" stroke-width="1.2"/>
      <circle cx="40" cy="0" r="6" fill="#e8a838" stroke="#c8843a" stroke-width="1.2"/>
    </g>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a">孩子抬头看星星</text>
  </g>

  <!-- 爷爷 -->
  <g transform="translate(450, 410)">
    <circle cx="0" cy="-10" r="9" fill="#e07856" stroke="#7a3b14" stroke-width="1.2"/>
    <ellipse cx="0" cy="12" rx="14" ry="16" fill="#6a8d3f" stroke="#7a3b14" stroke-width="1.2"/>
    <text x="0" y="45" text-anchor="middle" font-family="serif" font-size="10" fill="#2d6a4f">爷爷</text>
  </g>

  <!-- 问答气泡 -->
  <g transform="translate(180, 440)">
    <rect x="-70" y="-18" width="140" height="36" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.2"/>
    <text x="0" y="-2" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">星星是什么？</text>
    <text x="0" y="12" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">为什么会眨眼？</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 510)">
    <rect x="-300" y="0" width="600" height="60" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">星星自己发光，眨眼是空气在捣鬼</text>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">好奇心，是科学探索的起点</text>
  </g>
</svg>
