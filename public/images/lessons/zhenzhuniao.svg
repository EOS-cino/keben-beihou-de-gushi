<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="珍珠鸟在书桌上和主人亲近、趴在肩头睡着的温馨场景插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">珍珠鸟</text>
  <line x1="360" y1="58" x2="440" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 窗户光线 -->
  <rect x="500" y="80" width="250" height="200" fill="#a8d0e8" opacity="0.15"/>
  <line x1="625" y1="80" x2="625" y2="280" stroke="#7a3b14" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="180" x2="750" y2="180" stroke="#7a3b14" stroke-width="1" opacity="0.3"/>

  <!-- 鸟笼（窗台上） -->
  <g transform="translate(620, 200)">
    <rect x="-40" y="-50" width="80" height="70" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <line x1="-40" y1="-35" x2="40" y2="-35" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-40" y1="-20" x2="40" y2="-20" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-40" y1="-5" x2="40" y2="-5" stroke="#7a3b14" stroke-width="1"/>
    <line x1="-25" y1="-50" x2="-25" y2="20" stroke="#7a3b14" stroke-width="1"/>
    <line x1="0" y1="-50" x2="0" y2="20" stroke="#7a3b14" stroke-width="1"/>
    <line x1="25" y1="-50" x2="25" y2="20" stroke="#7a3b14" stroke-width="1"/>
    <!-- 笼顶 -->
    <path d="M-40 -50 Q0 -65 40 -50" fill="none" stroke="#7a3b14" stroke-width="2"/>
    <!-- 干草窝 -->
    <ellipse cx="0" cy="15" rx="25" ry="8" fill="#c8843a" opacity="0.5" stroke="#7a3b14" stroke-width="1"/>
  </g>

  <!-- 书桌 -->
  <rect x="50" y="380" width="500" height="12" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
  <rect x="60" y="392" width="8" height="80" fill="#8d5a36"/>
  <rect x="530" y="392" width="8" height="80" fill="#8d5a36"/>

  <!-- 稿纸 -->
  <rect x="100" y="340" width="180" height="40" fill="#fff6df" stroke="#7a3b14" stroke-width="1"/>
  <line x1="110" y1="352" x2="270" y2="352" stroke="#c8843a" stroke-width="0.5"/>
  <line x1="110" y1="362" x2="270" y2="362" stroke="#c8843a" stroke-width="0.5"/>
  <line x1="110" y1="372" x2="250" y2="372" stroke="#c8843a" stroke-width="0.5"/>

  <!-- 笔 -->
  <rect x="280" y="345" width="80" height="6" fill="#c84a3a" stroke="#7a3b14" stroke-width="1" rx="2"/>
  <path d="M360 348 L368 345 L368 351 Z" fill="#7a3b14"/>

  <!-- 茶杯 -->
  <g transform="translate(400, 360)">
    <path d="M-12 0 L-10 20 Q0 24 10 20 L12 0 Z" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="12" ry="4" fill="#a8d0e8" opacity="0.5" stroke="#7a3b14" stroke-width="1"/>
    <path d="M12 5 Q18 5 18 12 Q18 18 12 18" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 作者（伏案写作） -->
  <g transform="translate(250, 300)">
    <!-- 身体 -->
    <path d="M-30 80 Q-40 40 -30 10 Q0 0 30 10 Q40 40 30 80" fill="#4a6a2f" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 头（低头写作） -->
    <circle cx="0" cy="-5" r="18" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 头发 -->
    <path d="M-16 -10 Q-18 -22 0 -24 Q18 -22 16 -10" fill="#1a1a1a" stroke="#7a3b14" stroke-width="1"/>
    <!-- 眼睛（低头看稿纸） -->
    <path d="M-6 -2 Q-4 0 -2 -2" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <path d="M2 -2 Q4 0 6 -2" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 手臂（写字） -->
    <path d="M-25 20 Q-15 40 -5 60" fill="none" stroke="#4a6a2f" stroke-width="8" stroke-linecap="round"/>
    <path d="M25 20 Q20 40 15 60" fill="none" stroke="#4a6a2f" stroke-width="8" stroke-linecap="round"/>
    <!-- 手 -->
    <ellipse cx="-5" cy="62" rx="6" ry="4" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    <ellipse cx="15" cy="62" rx="6" ry="4" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
  </g>

  <!-- 小珍珠鸟（趴在肩上睡着了） -->
  <g transform="translate(225, 285)">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#a8b8c8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 珍珠斑点 -->
    <circle cx="-3" cy="-2" r="1.5" fill="#fff" opacity="0.8"/>
    <circle cx="2" cy="0" r="1.5" fill="#fff" opacity="0.8"/>
    <circle cx="-1" cy="3" r="1.2" fill="#fff" opacity="0.8"/>
    <!-- 头 -->
    <circle cx="-8" cy="-3" r="6" fill="#a8b8c8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 红嘴 -->
    <path d="M-13 -3 L-16 -2 L-13 -1" fill="#c84a3a" stroke="#7a3b14" stroke-width="0.5"/>
    <!-- 闭眼（睡着了） -->
    <path d="M-9 -5 Q-7 -3 -5 -5" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 红脚 -->
    <line x1="3" y1="6" x2="5" y2="10" stroke="#c84a3a" stroke-width="1.5"/>
    <line x1="6" y1="6" x2="8" y2="10" stroke="#c84a3a" stroke-width="1.5"/>
    <!-- zzz -->
    <text x="-25" y="-15" font-family="serif" font-size="12" fill="#7ab8d8" opacity="0.6">z</text>
    <text x="-20" y="-22" font-family="serif" font-size="10" fill="#7ab8d8" opacity="0.5">z</text>
  </g>

  <!-- 另一只小鸟（在桌上蹦跳） -->
  <g transform="translate(180, 370)">
    <ellipse cx="0" cy="0" rx="8" ry="6" fill="#a8b8c8" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-6" cy="-3" r="5" fill="#a8b8c8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-11 -3 L-13 -2 L-11 -1" fill="#c84a3a"/>
    <circle cx="-7" cy="-4" r="1" fill="#7a3b14"/>
    <line x1="2" y1="5" x2="4" y2="9" stroke="#c84a3a" stroke-width="1.5"/>
    <line x1="5" y1="5" x2="7" y2="9" stroke="#c84a3a" stroke-width="1.5"/>
  </g>

  <!-- 绿萝垂蔓 -->
  <g transform="translate(580, 80)">
    <path d="M0 0 Q-5 30 0 60 Q5 90 -3 120 Q3 150 0 180" fill="none" stroke="#6a8d3f" stroke-width="2"/>
    <ellipse cx="-5" cy="40" rx="6" ry="3" fill="#6a8d3f" opacity="0.7" transform="rotate(-20 -5 40)"/>
    <ellipse cx="3" cy="80" rx="6" ry="3" fill="#4a6a2f" opacity="0.7" transform="rotate(15 3 80)"/>
    <ellipse cx="-3" cy="120" rx="6" ry="3" fill="#6a8d3f" opacity="0.7" transform="rotate(-15 -3 120)"/>
  </g>

  <!-- 标注：信赖 -->
  <rect x="100" y="250" width="200" height="36" rx="6" fill="#fff6df" stroke="#c84a3a" stroke-width="2"/>
  <text x="200" y="274" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#7a3b14">信赖，往往创造出</text>

  <!-- 底部说明 -->
  <text x="400" y="510" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">美好的境界</text>
  <text x="400" y="540" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">小鸟从怕人到趴在肩头睡着——信任是一点点建立起来的</text>
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">不去打扰，不去强迫，给它空间和时间，它自然会靠近你</text>
</svg>
