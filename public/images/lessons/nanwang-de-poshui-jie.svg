<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="周总理和傣族人民一起泼水欢庆的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#7a3b14">难忘的泼水节</text>
  <line x1="300" y1="56" x2="500" y2="56" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="80" width="800" height="260" fill="#d6ecf7"/>
  <!-- 太阳 -->
  <circle cx="680" cy="130" r="28" fill="#f4b942" opacity="0.8"/>

  <!-- 凤凰花树（左） -->
  <g transform="translate(80,300)">
    <rect x="-6" y="0" width="12" height="100" fill="#6a4a2a"/>
    <path d="M0 0 Q-30 -20 -40 -50 Q-20 -35 0 -40" fill="none" stroke="#5a3a10" stroke-width="4"/>
    <path d="M0 0 Q30 -20 40 -50 Q20 -35 0 -40" fill="none" stroke="#5a3a10" stroke-width="4"/>
    <!-- 红花 -->
    <g fill="#e84030">
      <circle cx="-30" cy="-45" r="8"/>
      <circle cx="-15" cy="-55" r="7"/>
      <circle cx="10" cy="-50" r="8"/>
      <circle cx="25" cy="-40" r="7"/>
      <circle cx="-40" cy="-30" r="6"/>
      <circle cx="35" cy="-25" r="6"/>
      <circle cx="0" cy="-60" r="7"/>
    </g>
  </g>
  <!-- 凤凰花树（右） -->
  <g transform="translate(720,300)">
    <rect x="-6" y="0" width="12" height="100" fill="#6a4a2a"/>
    <path d="M0 0 Q-30 -20 -40 -50" fill="none" stroke="#5a3a10" stroke-width="4"/>
    <path d="M0 0 Q30 -20 40 -50" fill="none" stroke="#5a3a10" stroke-width="4"/>
    <g fill="#e84030">
      <circle cx="-30" cy="-45" r="8"/>
      <circle cx="15" cy="-55" r="7"/>
      <circle cx="-10" cy="-50" r="8"/>
      <circle cx="30" cy="-40" r="7"/>
      <circle cx="0" cy="-60" r="7"/>
    </g>
  </g>

  <!-- 地面 -->
  <rect x="0" y="400" width="800" height="200" fill="#c8e8a8" opacity="0.5"/>

  <!-- 周总理（中间） -->
  <g transform="translate(380,340)">
    <!-- 头 -->
    <circle cx="0" cy="-55" r="16" fill="#f0d0a8"/>
    <!-- 头发 -->
    <path d="M-16 -60 Q0 -75 16 -60 L16 -55 Q0 -67 -16 -55 Z" fill="#3a3a3a"/>
    <!-- 眼睛（笑） -->
    <path d="M-7 -55 Q-5 -53 -3 -55" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M3 -55 Q5 -53 7 -55" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- 嘴（笑） -->
    <path d="M-5 -47 Q0 -43 5 -47" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 傣族头巾（粉红） -->
    <path d="M-16 -62 Q0 -70 16 -62 L16 -58 Q0 -66 -16 -58 Z" fill="#e880a0"/>
    <!-- 身体（白布衫） -->
    <path d="M-18 -40 L-22 15 L22 15 L18 -40 Z" fill="#f8f8f0"/>
    <!-- 对襟 -->
    <line x1="0" y1="-40" x2="0" y2="15" stroke="#d0d0c0" stroke-width="1.5"/>
    <!-- 腿 -->
    <rect x="-12" y="15" width="9" height="35" fill="#3a5a7a"/>
    <rect x="3" y="15" width="9" height="35" fill="#3a5a7a"/>
    <!-- 手臂（端银碗） -->
    <path d="M-18 -33 L-28 -15 L-20 -5" fill="none" stroke="#f8f8f0" stroke-width="10" stroke-linecap="round"/>
    <path d="M18 -33 L28 -15 L20 -5" fill="none" stroke="#f8f8f0" stroke-width="10" stroke-linecap="round"/>
    <circle cx="-20" cy="-3" r="6" fill="#f0d0a8"/>
    <circle cx="20" cy="-3" r="6" fill="#f0d0a8"/>
    <!-- 银碗 -->
    <ellipse cx="0" cy="-8" rx="15" ry="6" fill="#d0d0d8" stroke="#a0a0a8" stroke-width="1.5"/>
    <ellipse cx="0" cy="-10" rx="12" ry="4" fill="#e8e8f0"/>
    <!-- 水花（从碗里泼出） -->
    <g fill="#4ab8c8" opacity="0.7">
      <circle cx="20" cy="-15" r="3"/>
      <circle cx="35" cy="-25" r="2.5"/>
      <circle cx="45" cy="-35" r="2"/>
      <circle cx="-20" cy="-15" r="3"/>
      <circle cx="-35" cy="-25" r="2.5"/>
      <circle cx="-45" cy="-35" r="2"/>
    </g>
  </g>

  <!-- 傣族群众（左） -->
  <g transform="translate(180,370)">
    <!-- 头 -->
    <circle cx="0" cy="-40" r="12" fill="#f0d0a8"/>
    <!-- 头发 -->
    <path d="M-12 -45 Q0 -55 12 -45" fill="#3a2a1a"/>
    <!-- 眼睛 -->
    <path d="M-5 -40 Q-3 -38 -1 -40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M1 -40 Q3 -38 5 -40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <!-- 嘴 -->
    <path d="M-3 -34 Q0 -32 3 -34" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 身体（筒裙） -->
    <path d="M-12 -28 L-15 20 L15 20 L12 -28 Z" fill="#e84080"/>
    <path d="M-12 -28 L-15 0 L15 0 L12 -28 Z" fill="#c82060" opacity="0.5"/>
    <!-- 腿 -->
    <rect x="-8" y="20" width="6" height="20" fill="#3a5a7a"/>
    <rect x="2" y="20" width="6" height="20" fill="#3a5a7a"/>
    <!-- 手臂（泼水） -->
    <path d="M12 -22 L30 -30" fill="none" stroke="#e84080" stroke-width="7" stroke-linecap="round"/>
    <circle cx="31" cy="-31" r="5" fill="#f0d0a8"/>
    <!-- 水盆 -->
    <ellipse cx="35" cy="-35" rx="12" ry="5" fill="#8a6a4a"/>
    <!-- 水花 -->
    <g fill="#4ab8c8" opacity="0.6">
      <circle cx="55" cy="-40" r="3"/>
      <circle cx="70" cy="-50" r="2.5"/>
      <circle cx="80" cy="-60" r="2"/>
    </g>
  </g>

  <!-- 傣族群众（右） -->
  <g transform="translate(580,370)">
    <circle cx="0" cy="-40" r="12" fill="#f0d0a8"/>
    <path d="M-12 -45 Q0 -55 12 -45" fill="#3a2a1a"/>
    <path d="M-5 -40 Q-3 -38 -1 -40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M1 -40 Q3 -38 5 -40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M-3 -34 Q0 -32 3 -34" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <path d="M-12 -28 L-15 20 L15 20 L12 -28 Z" fill="#4878c8"/>
    <path d="M-12 -28 L-15 0 L15 0 L12 -28 Z" fill="#3858a8" opacity="0.5"/>
    <rect x="-8" y="20" width="6" height="20" fill="#3a5a7a"/>
    <rect x="2" y="20" width="6" height="20" fill="#3a5a7a"/>
    <path d="M-12 -22 L-30 -30" fill="none" stroke="#4878c8" stroke-width="7" stroke-linecap="round"/>
    <circle cx="-31" cy="-31" r="5" fill="#f0d0a8"/>
    <ellipse cx="-35" cy="-35" rx="12" ry="5" fill="#8a6a4a"/>
    <g fill="#4ab8c8" opacity="0.6">
      <circle cx="-55" cy="-40" r="3"/>
      <circle cx="-70" cy="-50" r="2.5"/>
      <circle cx="-80" cy="-60" r="2"/>
    </g>
  </g>

  <!-- 飞溅水花（中间） -->
  <g fill="#4ab8c8" opacity="0.5">
    <circle cx="350" cy="280" r="4"/>
    <circle cx="410" cy="270" r="3"/>
    <circle cx="320" cy="300" r="3"/>
    <circle cx="440" cy="295" r="2.5"/>
    <circle cx="380" cy="260" r="2"/>
    <circle cx="300" cy="320" r="2.5"/>
    <circle cx="460" cy="320" r="2"/>
  </g>

  <!-- 标注：周总理 -->
  <line x1="380" y1="280" x2="380" y2="220" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="320" y="200" width="120" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="380" y="218" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">周总理（穿傣装）</text>

  <!-- 标注：银碗泼水 -->
  <line x1="395" y1="335" x2="470" y2="370" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="460" y="358" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="505" y="376" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">银碗泼水祝福</text>

  <!-- 标注：凤凰花 -->
  <line x1="80" y1="250" x2="120" y2="180" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="60" y="165" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="105" y="183" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">凤凰花开</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">周总理穿上傣族服装，和傣族人民一起泼水祝福——这个泼水节，永远忘不了</text>
</svg>
