<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="丁香花穗、花苞未开的丁香结、雨中丁香插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">丁香结</text>
  <line x1="360" y1="58" x2="440" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="72" width="800" height="200" fill="#e8e0ec" opacity="0.3"/>
  <!-- 雨丝 -->
  <line x1="100" y1="80" x2="95" y2="120" stroke="#a8b8c8" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="90" x2="195" y2="130" stroke="#a8b8c8" stroke-width="1" opacity="0.4"/>
  <line x1="300" y1="80" x2="295" y2="125" stroke="#a8b8c8" stroke-width="1" opacity="0.4"/>
  <line x1="500" y1="85" x2="495" y2="125" stroke="#a8b8c8" stroke-width="1" opacity="0.4"/>
  <line x1="600" y1="90" x2="595" y2="130" stroke="#a8b8c8" stroke-width="1" opacity="0.4"/>
  <line x1="700" y1="80" x2="695" y2="120" stroke="#a8b8c8" stroke-width="1" opacity="0.4"/>

  <!-- 地面 -->
  <rect x="0" y="400" width="800" height="160" fill="#d8c8a8" opacity="0.3"/>

  <!-- 丁香树1（左侧，白丁香） -->
  <g transform="translate(180, 400)">
    <!-- 树干 -->
    <path d="M 0 0 Q -3 -50 -5 -100 Q -8 -140 -5 -180" fill="none" stroke="#5a4a2a" stroke-width="5"/>
    <!-- 枝条 -->
    <path d="M -5 -120 Q -25 -130 -40 -140" fill="none" stroke="#5a4a2a" stroke-width="3"/>
    <path d="M -5 -140 Q 15 -150 30 -160" fill="none" stroke="#5a4a2a" stroke-width="3"/>
    <path d="M -5 -160 Q -20 -170 -35 -175" fill="none" stroke="#5a4a2a" stroke-width="2.5"/>

    <!-- 白丁香花穗1 -->
    <g transform="translate(-40, -145)">
      <ellipse cx="0" cy="0" rx="14" ry="20" fill="#f8f0f8" opacity="0.9"/>
      <circle cx="-5" cy="-8" r="4" fill="#fff" stroke="#d8c8d8" stroke-width="1"/>
      <circle cx="5" cy="-5" r="4" fill="#fff" stroke="#d8c8d8" stroke-width="1"/>
      <circle cx="0" cy="3" r="4" fill="#fff" stroke="#d8c8d8" stroke-width="1"/>
      <circle cx="-4" cy="10" r="3.5" fill="#fff" stroke="#d8c8d8" stroke-width="1"/>
      <circle cx="4" cy="12" r="3.5" fill="#fff" stroke="#d8c8d8" stroke-width="1"/>
      <!-- 小十字花 -->
      <path d="M -5 -8 L -3 -6 M -5 -6 L -3 -8" stroke="#c8a8c8" stroke-width="0.5"/>
      <path d="M 5 -5 L 7 -3 M 5 -3 L 7 -5" stroke="#c8a8c8" stroke-width="0.5"/>
    </g>
    <!-- 白丁香花穗2 -->
    <g transform="translate(30, -165)">
      <ellipse cx="0" cy="0" rx="12" ry="18" fill="#f8f0f8" opacity="0.9"/>
      <circle cx="-4" cy="-6" r="3.5" fill="#fff" stroke="#d8c8d8" stroke-width="1"/>
      <circle cx="4" cy="-4" r="3.5" fill="#fff" stroke="#d8c8d8" stroke-width="1"/>
      <circle cx="0" cy="4" r="3.5" fill="#fff" stroke="#d8c8d8" stroke-width="1"/>
      <circle cx="-3" cy="10" r="3" fill="#fff" stroke="#d8c8d8" stroke-width="1"/>
    </g>
    <!-- 叶子 -->
    <ellipse cx="-25" cy="-110" rx="10" ry="6" fill="#6a8a3a" stroke="#4a6a2a" stroke-width="1" transform="rotate(-20 -25 -110)"/>
    <ellipse cx="15" cy="-130" rx="10" ry="6" fill="#6a8a3a" stroke="#4a6a2a" stroke-width="1" transform="rotate(30 15 -130)"/>
  </g>

  <!-- 丁香树2（右侧，紫丁香） -->
  <g transform="translate(600, 400)">
    <!-- 树干 -->
    <path d="M 0 0 Q 3 -50 5 -100 Q 8 -140 5 -180" fill="none" stroke="#5a4a2a" stroke-width="5"/>
    <!-- 枝条 -->
    <path d="M 5 -120 Q 25 -130 40 -140" fill="none" stroke="#5a4a2a" stroke-width="3"/>
    <path d="M 5 -140 Q -15 -150 -30 -160" fill="none" stroke="#5a4a2a" stroke-width="3"/>
    <path d="M 5 -160 Q 20 -170 35 -175" fill="none" stroke="#5a4a2a" stroke-width="2.5"/>

    <!-- 紫丁香花穗1 -->
    <g transform="translate(40, -145)">
      <ellipse cx="0" cy="0" rx="14" ry="20" fill="#d8b8d8" opacity="0.9"/>
      <circle cx="-5" cy="-8" r="4" fill="#c8a0c8" stroke="#a878a8" stroke-width="1"/>
      <circle cx="5" cy="-5" r="4" fill="#c8a0c8" stroke="#a878a8" stroke-width="1"/>
      <circle cx="0" cy="3" r="4" fill="#c8a0c8" stroke="#a878a8" stroke-width="1"/>
      <circle cx="-4" cy="10" r="3.5" fill="#c8a0c8" stroke="#a878a8" stroke-width="1"/>
      <circle cx="4" cy="12" r="3.5" fill="#c8a0c8" stroke="#a878a8" stroke-width="1"/>
    </g>
    <!-- 紫丁香花穗2 -->
    <g transform="translate(-30, -165)">
      <ellipse cx="0" cy="0" rx="12" ry="18" fill="#d8b8d8" opacity="0.9"/>
      <circle cx="-4" cy="-6" r="3.5" fill="#c8a0c8" stroke="#a878a8" stroke-width="1"/>
      <circle cx="4" cy="-4" r="3.5" fill="#c8a0c8" stroke="#a878a8" stroke-width="1"/>
      <circle cx="0" cy="4" r="3.5" fill="#c8a0c8" stroke="#a878a8" stroke-width="1"/>
    </g>
    <!-- 叶子 -->
    <ellipse cx="25" cy="-110" rx="10" ry="6" fill="#6a8a3a" stroke="#4a6a2a" stroke-width="1" transform="rotate(20 25 -110)"/>
    <ellipse cx="-15" cy="-130" rx="10" ry="6" fill="#6a8a3a" stroke="#4a6a2a" stroke-width="1" transform="rotate(-30 -15 -130)"/>
  </g>

  <!-- 中央放大：丁香结（未开花苞） -->
  <g transform="translate(400, 300)">
    <!-- 放大圆框 -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
    <!-- 花轴 -->
    <line x1="0" y1="50" x2="0" y2="-40" stroke="#6a8a3a" stroke-width="2"/>
    <!-- 未开花苞（丁香结） -->
    <ellipse cx="-8" cy="-30" rx="6" ry="8" fill="#e8c8e0" stroke="#a878a8" stroke-width="1.5"/>
    <ellipse cx="8" cy="-25" rx="6" ry="8" fill="#e8c8e0" stroke="#a878a8" stroke-width="1.5"/>
    <ellipse cx="-6" cy="-15" rx="6" ry="8" fill="#e8c8e0" stroke="#a878a8" stroke-width="1.5"/>
    <ellipse cx="6" cy="-10" rx="6" ry="8" fill="#e8c8e0" stroke="#a878a8" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="6" ry="8" fill="#e8c8e0" stroke="#a878a8" stroke-width="1.5"/>
    <ellipse cx="-4" cy="12" rx="5" ry="7" fill="#e8c8e0" stroke="#a878a8" stroke-width="1.5"/>
    <ellipse cx="4" cy="18" rx="5" ry="7" fill="#e8c8e0" stroke="#a878a8" stroke-width="1.5"/>
    <!-- 小叶子 -->
    <ellipse cx="-15" cy="20" rx="8" ry="5" fill="#6a8a3a" stroke="#4a6a2a" stroke-width="1" transform="rotate(-30 -15 20)"/>
    <ellipse cx="15" cy="25" rx="8" ry="5" fill="#6a8a3a" stroke="#4a6a2a" stroke-width="1" transform="rotate(30 15 25)"/>
  </g>

  <!-- 标注：白丁香 -->
  <line x1="140" y1="255" x2="100" y2="220" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="40" y="198" width="100" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="90" y="216" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">白丁香</text>

  <!-- 标注：紫丁香 -->
  <line x1="640" y1="255" x2="690" y2="220" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="660" y="198" width="100" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="710" y="216" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">紫丁香</text>

  <!-- 标注：丁香结 -->
  <line x1="400" y1="235" x2="400" y2="190" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="345" y="168" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="186" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">丁香结（花苞）</text>

  <!-- 标注：雨中丁香 -->
  <line x1="250" y1="100" x2="200" y2="80" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="150" y="60" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="205" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">雨中丁香</text>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">丁香花苞紧抱如结，象征人生愁怨——结是解不完的，人生正因有结而丰富</text>
</svg>
