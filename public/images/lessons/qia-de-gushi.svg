<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从独木桥到石拱桥到现代大桥的演变插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">桥的故事</text>
  <line x1="320" y1="56" x2="480" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——人类想办法"跨过去"的历史</text>

  <!-- 时间轴 -->
  <line x1="80" y1="330" x2="720" y2="330" stroke="#c8843a" stroke-width="3"/>
  <circle cx="180" cy="330" r="8" fill="#6a8d3f"/>
  <circle cx="380" cy="330" r="8" fill="#c8843a"/>
  <circle cx="560" cy="330" r="8" fill="#4a90b8"/>
  <circle cx="680" cy="330" r="8" fill="#e07856"/>

  <!-- 独木桥 -->
  <g transform="translate(180, 180)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#6a8d3f">最早</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">独木桥</text>
    <g transform="translate(0, 50)">
      <!-- 河岸 -->
      <rect x="-50" y="40" width="20" height="15" fill="#6a8d3f"/>
      <rect x="30" y="40" width="20" height="15" fill="#6a8d3f"/>
      <!-- 水 -->
      <path d="M-30 55 Q-15 50 0 55 Q15 60 30 55" fill="none" stroke="#4a90b8" stroke-width="2"/>
      <!-- 木头 -->
      <rect x="-32" y="35" width="64" height="8" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5" rx="3"/>
      <!-- 小人 -->
      <g transform="translate(0, 20)">
        <circle cx="0" cy="0" r="5" fill="#e07856"/>
        <ellipse cx="0" cy="10" rx="5" ry="7" fill="#c84a3a"/>
      </g>
      <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">会晃·心里慌</text>
    </g>
  </g>

  <!-- 石拱桥 -->
  <g transform="translate(380, 180)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#c8843a">古代</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">石拱桥</text>
    <g transform="translate(0, 50)">
      <!-- 拱 -->
      <path d="M-40 50 Q-40 15 0 15 Q40 15 40 50" fill="#c8843a" stroke="#7a3b14" stroke-width="2"/>
      <path d="M-40 50 Q-40 25 0 25 Q40 25 40 50" fill="#fef9ed"/>
      <!-- 桥面 -->
      <rect x="-45" y="12" width="90" height="6" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 水 -->
      <path d="M-45 55 Q-20 50 0 55 Q20 60 45 55" fill="none" stroke="#4a90b8" stroke-width="2"/>
      <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">结实·像彩虹</text>
    </g>
  </g>

  <!-- 铁桥 -->
  <g transform="translate(560, 180)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#4a90b8">近代</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">钢铁桥</text>
    <g transform="translate(0, 50)">
      <!-- 桁架 -->
      <rect x="-45" y="20" width="90" height="6" fill="#7a3b14"/>
      <path d="M-45 20 L-30 0 L-15 20 L0 0 L15 20 L30 0 L45 20" fill="none" stroke="#7a3b14" stroke-width="2"/>
      <path d="M-30 0 L-15 20 M0 0 L15 20 M15 0 L30 20" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 桥墩 -->
      <rect x="-48" y="26" width="8" height="30" fill="#8d5a36"/>
      <rect x="40" y="26" width="8" height="30" fill="#8d5a36"/>
      <path d="M-45 55 Q-20 50 0 55 Q20 60 45 55" fill="none" stroke="#4a90b8" stroke-width="2"/>
      <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">更长·更结实</text>
    </g>
  </g>

  <!-- 悬索桥 -->
  <g transform="translate(680, 180)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#e07856">现代</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">悬索桥</text>
    <g transform="translate(0, 50)">
      <!-- 主塔 -->
      <rect x="-30" y="0" width="6" height="50" fill="#7a3b14"/>
      <rect x="24" y="0" width="6" height="50" fill="#7a3b14"/>
      <!-- 缆索 -->
      <path d="M-27 0 Q0 25 27 0" fill="none" stroke="#7a3b14" stroke-width="2"/>
      <path d="M-27 0 Q-10 18 0 22 M27 0 Q10 18 0 22" fill="none" stroke="#7a3b14" stroke-width="1" stroke-dasharray="2,2"/>
      <!-- 桥面 -->
      <rect x="-40" y="22" width="80" height="5" fill="#8d5a36"/>
      <path d="M-40 55 Q-20 50 0 55 Q20 60 40 55" fill="none" stroke="#4a90b8" stroke-width="2"/>
      <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">跨海·两三千米</text>
    </g>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 430)">
    <rect x="-320" y="0" width="640" height="120" rx="10" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">桥连接的不只是两岸</text>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">独木桥连起河两岸 · 石拱桥让水"过得去" · 钢铁桥跨得更远</text>
    <text x="0" y="78" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">悬索桥跨过大海 · 边境的桥连起两个国家</text>
    <text x="0" y="105" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">桥不只是石头和钢铁，它连接的是人，是路，是往来</text>
  </g>
</svg>
