<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="几个小朋友在草地上跳绳、踢毽子、讲故事，每个人脸上都带着笑">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空 -->
  <rect x="0" y="0" width="800" height="350" fill="#a8d0e8" opacity="0.15"/>
  <!-- 太阳 -->
  <circle cx="680" cy="90" r="35" fill="#f4b942" opacity="0.8"/>
  <!-- 草地 -->
  <path d="M0 380 Q200 360 400 375 T800 370 L800 600 L0 600 Z" fill="#6a8d3f" opacity="0.5"/>
  <path d="M0 430 Q200 415 400 425 T800 420 L800 600 L0 600 Z" fill="#4a6a2f" opacity="0.4"/>
  <!-- 小花 -->
  <g fill="#e07856" opacity="0.7">
    <circle cx="100" cy="500" r="5"/>
    <circle cx="700" cy="490" r="5"/>
    <circle cx="250" cy="530" r="4"/>
    <circle cx="550" cy="520" r="4"/>
  </g>
  <g fill="#f4b942" opacity="0.7">
    <circle cx="150" cy="510" r="5"/>
    <circle cx="650" cy="530" r="5"/>
    <circle cx="400" cy="540" r="4"/>
  </g>
  <!-- 小朋友1 - 跳绳 -->
  <g transform="translate(250,380)">
    <ellipse cx="0" cy="50" rx="20" ry="25" fill="#c84a3a"/>
    <circle cx="0" cy="10" r="18" fill="#f4d4a8"/>
    <path d="M-15 -5 Q-18 -15 -12 -18" stroke="#2d2a24" stroke-width="3" fill="none"/>
    <path d="M15 -5 Q18 -15 12 -18" stroke="#2d2a24" stroke-width="3" fill="none"/>
    <circle cx="-6" cy="8" r="2.5" fill="#2d2a24"/>
    <circle cx="6" cy="8" r="2.5" fill="#2d2a24"/>
    <path d="M-5 16 Q0 20 5 16" stroke="#2d2a24" stroke-width="1.5" fill="none"/>
    <!-- 手臂 -->
    <path d="M-18 35 L-35 20" stroke="#f4d4a8" stroke-width="6" stroke-linecap="round"/>
    <path d="M18 35 L35 20" stroke="#f4d4a8" stroke-width="6" stroke-linecap="round"/>
    <!-- 腿 -->
    <path d="M-8 75 L-12 100" stroke="#4a6a2f" stroke-width="7" stroke-linecap="round"/>
    <path d="M8 75 L12 100" stroke="#4a6a2f" stroke-width="7" stroke-linecap="round"/>
    <!-- 绳子 -->
    <path d="M-35 20 Q-60 60 -35 100 Q0 120 35 100 Q60 60 35 20" stroke="#7a3b14" stroke-width="2" fill="none"/>
  </g>
  <!-- 小朋友2 - 踢毽子 -->
  <g transform="translate(500,390)">
    <ellipse cx="0" cy="50" rx="20" ry="25" fill="#7ab8d8"/>
    <circle cx="0" cy="10" r="18" fill="#f4d4a8"/>
    <path d="M-15 -5 Q-20 -18 -10 -20" stroke="#2d2a24" stroke-width="4" fill="none"/>
    <path d="M15 -5 Q20 -18 10 -20" stroke="#2d2a24" stroke-width="4" fill="none"/>
    <circle cx="-6" cy="8" r="2.5" fill="#2d2a24"/>
    <circle cx="6" cy="8" r="2.5" fill="#2d2a24"/>
    <path d="M-5 16 Q0 20 5 16" stroke="#2d2a24" stroke-width="1.5" fill="none"/>
    <!-- 手臂 -->
    <path d="M-18 35 L-30 50" stroke="#f4d4a8" stroke-width="6" stroke-linecap="round"/>
    <path d="M18 35 L30 50" stroke="#f4d4a8" stroke-width="6" stroke-linecap="round"/>
    <!-- 腿（抬一条腿踢） -->
    <path d="M-8 75 L-10 100" stroke="#8d5a36" stroke-width="7" stroke-linecap="round"/>
    <path d="M8 75 L25 65" stroke="#8d5a36" stroke-width="7" stroke-linecap="round"/>
    <!-- 毽子 -->
    <g transform="translate(30,55)">
      <circle cx="0" cy="0" r="6" fill="#c84a3a"/>
      <path d="M-6 -3 L-10 -15" stroke="#e07856" stroke-width="2"/>
      <path d="M0 -6 L0 -20" stroke="#f4b942" stroke-width="2"/>
      <path d="M6 -3 L10 -15" stroke="#e07856" stroke-width="2"/>
      <path d="M-3 -5 L-6 -18" stroke="#c84a3a" stroke-width="2"/>
      <path d="M3 -5 L6 -18" stroke="#c84a3a" stroke-width="2"/>
    </g>
  </g>
  <!-- 小朋友3 - 坐着看书 -->
  <g transform="translate(120,420)">
    <ellipse cx="0" cy="40" rx="22" ry="20" fill="#6a8d3f"/>
    <circle cx="0" cy="5" r="18" fill="#f4d4a8"/>
    <path d="M-15 -8 Q-18 -20 -10 -22" stroke="#2d2a24" stroke-width="3" fill="none"/>
    <path d="M15 -8 Q18 -20 10 -22" stroke="#2d2a24" stroke-width="3" fill="none"/>
    <circle cx="-6" cy="5" r="2.5" fill="#2d2a24"/>
    <circle cx="6" cy="5" r="2.5" fill="#2d2a24"/>
    <path d="M-5 13 Q0 16 5 13" stroke="#2d2a24" stroke-width="1.5" fill="none"/>
    <!-- 书 -->
    <rect x="-15" y="35" width="30" height="20" rx="2" fill="#fef9ed" stroke="#8d5a36" stroke-width="2"/>
    <line x1="0" y1="35" x2="0" y2="55" stroke="#8d5a36" stroke-width="1"/>
    <line x1="-10" y1="42" x2="-4" y2="42" stroke="#8d5a36" stroke-width="1"/>
    <line x1="-10" y1="47" x2="-4" y2="47" stroke="#8d5a36" stroke-width="1"/>
    <line x1="4" y1="42" x2="10" y2="42" stroke="#8d5a36" stroke-width="1"/>
    <line x1="4" y1="47" x2="10" y2="47" stroke="#8d5a36" stroke-width="1"/>
  </g>
  <!-- 纸飞机 -->
  <g transform="translate(620,200) rotate(20)">
    <path d="M0 0 L30 8 L0 16 L8 8 Z" fill="#fef9ed" stroke="#8d5a36" stroke-width="1.5"/>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">怎么都快乐</text>
</svg>
