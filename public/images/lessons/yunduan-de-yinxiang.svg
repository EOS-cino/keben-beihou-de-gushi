<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="高山云海与日出印象插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">云端的印象</text>
  <line x1="300" y1="60" x2="500" y2="60" stroke="#e8a838" stroke-width="2"/>

  <!-- 黎明天空（渐变效果） -->
  <rect x="0" y="80" width="800" height="180" fill="#4a90b8" opacity="0.2"/>
  <rect x="0" y="80" width="800" height="80" fill="#e07856" opacity="0.2"/>
  <rect x="0" y="80" width="800" height="40" fill="#e8a838" opacity="0.2"/>

  <!-- 初升太阳 -->
  <circle cx="400" cy="200" r="45" fill="#e8a838" opacity="0.9"/>
  <circle cx="400" cy="200" r="32" fill="#e07856" opacity="0.5"/>
  <g stroke="#e8a838" stroke-width="3" stroke-linecap="round" opacity="0.6">
    <line x1="400" y1="145" x2="400" y2="130"/>
    <line x1="345" y1="200" x2="330" y2="200"/>
    <line x1="455" y1="200" x2="470" y2="200"/>
    <line x1="360" y1="160" x2="348" y2="148"/>
    <line x1="440" y1="160" x2="452" y2="148"/>
  </g>

  <!-- 远山（从云海中探出，像岛屿） -->
  <path d="M0 380 L80 320 L150 360 L240 300 L320 350 L400 290 L480 340 L560 295 L640 345 L720 310 L800 350 L800 420 L0 420 Z" fill="#2d6a4f" opacity="0.4"/>
  <!-- 山峰标注为云海中的岛屿 -->
  <g fill="#2d6a4f" opacity="0.5">
    <path d="M100 340 L130 310 L160 340 Z"/>
    <path d="M380 320 L410 290 L440 320 Z"/>
    <path d="M620 330 L650 300 L680 330 Z"/>
  </g>

  <!-- 云海（主体，翻滚的云） -->
  <rect x="0" y="360" width="800" height="120" fill="#f8f8f0" opacity="0.85"/>
  <!-- 云海翻滚纹理 -->
  <g fill="#f8f8f0" opacity="0.9">
    <ellipse cx="100" cy="380" rx="80" ry="22"/>
    <ellipse cx="250" cy="390" rx="90" ry="25"/>
    <ellipse cx="420" cy="385" rx="85" ry="24"/>
    <ellipse cx="580" cy="392" rx="95" ry="26"/>
    <ellipse cx="720" cy="385" rx="80" ry="22"/>
  </g>
  <g fill="#e8a838" opacity="0.3">
    <ellipse cx="180" cy="400" rx="70" ry="14"/>
    <ellipse cx="450" cy="405" rx="75" ry="15"/>
    <ellipse cx="650" cy="400" rx="68" ry="14"/>
  </g>
  <!-- 云海波浪线 -->
  <g fill="none" stroke="#c8c8b8" stroke-width="1.5" opacity="0.5">
    <path d="M0 420 Q100 410 200 420 Q300 430 400 420 Q500 410 600 420 Q700 430 800 420"/>
    <path d="M0 445 Q120 438 240 445 Q360 452 480 445 Q600 438 720 445"/>
  </g>

  <!-- 近处山顶（观景台） -->
  <path d="M0 480 L120 440 L250 470 L400 430 L550 465 L700 440 L800 470 L800 560 L0 560 Z" fill="#2d6a4f" opacity="0.7"/>
  <!-- 岩石 -->
  <g fill="#6a4220" opacity="0.6">
    <ellipse cx="200" cy="490" rx="25" ry="12"/>
    <ellipse cx="500" cy="495" rx="28" ry="13"/>
  </g>

  <!-- 观景的人 -->
  <g transform="translate(400, 460)">
    <!-- 身体 -->
    <path d="M-10 -10 L-12 30 L-6 30 L-3 0 L3 0 L6 30 L12 30 L10 -10 Z" fill="#e07856" stroke="#a04830" stroke-width="1.5"/>
    <!-- 头 -->
    <circle cx="0" cy="-25" r="11" fill="#f0d0a8" stroke="#c89060" stroke-width="1.5"/>
    <!-- 头发 -->
    <path d="M-10 -30 Q-11 -38 0 -36 Q11 -38 10 -30" fill="#2a2a2a"/>
    <!-- 仰头看日出 -->
    <ellipse cx="-3" cy="-27" rx="1.8" ry="1.8" fill="#2a2a2a"/>
    <ellipse cx="3" cy="-27" rx="1.8" ry="1.8" fill="#2a2a2a"/>
    <!-- 手臂（张开感受） -->
    <path d="M-10 -8 L-25 5" fill="none" stroke="#f0d0a8" stroke-width="5" stroke-linecap="round"/>
    <path d="M10 -8 L25 5" fill="none" stroke="#f0d0a8" stroke-width="5" stroke-linecap="round"/>
    <!-- 腿 -->
    <path d="M-5 30 L-8 55" fill="none" stroke="#2d6a4f" stroke-width="6" stroke-linecap="round"/>
    <path d="M5 30 L8 55" fill="none" stroke="#2d6a4f" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- 阳光从太阳洒向云海 -->
  <g stroke="#e8a838" stroke-width="2" stroke-linecap="round" opacity="0.3" stroke-dasharray="8,8">
    <line x1="400" y1="245" x2="400" y2="360"/>
    <line x1="370" y1="240" x2="280" y2="370"/>
    <line x1="430" y1="240" x2="520" y2="370"/>
    <line x1="350" y1="235" x2="180" y2="380"/>
    <line x1="450" y1="235" x2="620" y2="380"/>
  </g>

  <!-- 飞鸟 -->
  <g fill="none" stroke="#7a3b14" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <path d="M200 150 Q208 144 216 150 Q224 144 232 150"/>
    <path d="M560 140 Q568 134 576 140 Q584 134 592 140"/>
  </g>

  <!-- 标注 -->
  <line x1="400" y1="200" x2="400" y2="160" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="345" y="132" width="110" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="400" y="150" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">云海日出</text>

  <line x1="250" y1="390" x2="180" y2="430" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="110" y="435" width="110" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="165" y="453" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">翻滚的云海</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">站在云端看日出，云海翻滚，心胸也跟着开阔</text>
</svg>
