<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="画室与多种艺术形式插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">艺术的美</text>
  <line x1="330" y1="62" x2="470" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 左：画架与画 -->
  <g transform="translate(180, 160)">
    <!-- 画架 -->
    <line x1="-40" y1="200" x2="-30" y2="0" stroke="#8d5a36" stroke-width="4"/>
    <line x1="40" y1="200" x2="30" y2="0" stroke="#8d5a36" stroke-width="4"/>
    <line x1="-35" y1="180" x2="35" y2="180" stroke="#8d5a36" stroke-width="3"/>
    <!-- 画框 -->
    <rect x="-35" y="10" width="70" height="120" fill="#fff6df" stroke="#7a3b14" stroke-width="2.5"/>
    <!-- 画内容：山水 -->
    <path d="M-30 100 Q-15 60 0 80 Q15 50 30 90 L30 125 L-30 125 Z" fill="#6a8d3f" opacity="0.5"/>
    <path d="M-25 110 Q-10 80 5 95 Q20 70 28 100 L28 125 L-25 125 Z" fill="#4a6a2f" opacity="0.6"/>
    <!-- 松树 -->
    <line x1="-15" y1="95" x2="-15" y2="70" stroke="#5a3a1a" stroke-width="2"/>
    <path d="M-22 80 Q-15 72 -8 80 M-20 75 Q-15 68 -10 75" fill="none" stroke="#4a6a2f" stroke-width="2"/>
    <!-- 小人 -->
    <circle cx="15" cy="105" r="3" fill="#7a3b14"/>
    <rect x="13" y="108" width="4" height="8" fill="#c84a3a"/>
    <!-- 留白标注 -->
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="10" fill="#c8843a" opacity="0.6">留白</text>
    <!-- 调色盘 -->
    <g transform="translate(50, 170)">
      <ellipse cx="0" cy="0" rx="25" ry="15" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
      <circle cx="-12" cy="-3" r="4" fill="#c84a3a"/>
      <circle cx="-2" cy="-6" r="4" fill="#e07856"/>
      <circle cx="8" cy="-3" r="4" fill="#6a8d3f"/>
      <circle cx="12" cy="5" r="4" fill="#a8d0e8"/>
    </g>
    <!-- 画笔 -->
    <line x1="55" y1="150" x2="65" y2="135" stroke="#5a3a1a" stroke-width="2"/>
    <ellipse cx="66" cy="133" rx="3" ry="5" fill="#c84a3a" transform="rotate(-30 66 133)"/>
    <text x="0" y="230" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">绘画</text>
  </g>

  <!-- 中：音乐 -->
  <g transform="translate(400, 180)">
    <!-- 五线谱 -->
    <g stroke="#7a3b14" stroke-width="1">
      <line x1="-50" y1="0" x2="50" y2="0"/>
      <line x1="-50" y1="12" x2="50" y2="12"/>
      <line x1="-50" y1="24" x2="50" y2="24"/>
      <line x1="-50" y1="36" x2="50" y2="36"/>
      <line x1="-50" y1="48" x2="50" y2="48"/>
    </g>
    <!-- 高音谱号 -->
    <text x="-42" y="35" font-family="serif" font-size="36" fill="#7a3b14">𝄞</text>
    <!-- 音符 -->
    <g fill="#7a3b14">
      <ellipse cx="-15" cy="30" rx="5" ry="4" transform="rotate(-20 -15 30)"/>
      <line x1="-10" y1="30" x2="-10" y2="5" stroke="#7a3b14" stroke-width="2"/>
      <ellipse cx="5" cy="24" rx="5" ry="4" transform="rotate(-20 5 24)"/>
      <line x1="10" y1="24" x2="10" y2="-1" stroke="#7a3b14" stroke-width="2"/>
      <ellipse cx="25" cy="18" rx="5" ry="4" transform="rotate(-20 25 18)"/>
      <line x1="30" y1="18" x2="30" y2="-7" stroke="#7a3b14" stroke-width="2"/>
      <!-- 连音线 -->
      <path d="M-10 5 Q10 -5 30 -7" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <!-- 音波 -->
    <g stroke="#c8843a" stroke-width="2" fill="none" opacity="0.5">
      <path d="M-40 80 Q-30 70 -20 80 Q-10 90 0 80 Q10 70 20 80 Q30 90 40 80"/>
    </g>
    <text x="0" y="120" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">音乐</text>
  </g>

  <!-- 右：雕塑 -->
  <g transform="translate(620, 180)">
    <!-- 雕塑底座 -->
    <rect x="-25" y="100" width="50" height="20" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 雕塑（抽象人形） -->
    <path d="M-15 100 Q-20 60 -10 40 Q-5 20 0 15 Q5 20 10 40 Q20 60 15 100 Z" fill="#d8c9a8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 头 -->
    <circle cx="0" cy="10" r="12" fill="#d8c9a8" stroke="#7a3b14" stroke-width="2"/>
    <!-- 凿子 -->
    <g transform="translate(35, 60)">
      <line x1="0" y1="0" x2="15" y2="-10" stroke="#5a3a1a" stroke-width="3"/>
      <path d="M15 -10 L20 -15 L22 -12 L17 -7" fill="#a8d0e8" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <!-- 碎屑 -->
    <circle cx="25" cy="95" r="2" fill="#d8c9a8"/>
    <circle cx="30" cy="100" r="1.5" fill="#d8c9a8"/>
    <text x="0" y="140" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">雕塑</text>
  </g>

  <!-- 底部：美的核心 -->
  <g transform="translate(400, 440)">
    <rect x="-200" y="0" width="400" height="80" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8"/>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">艺术 = 情感 × 形式</text>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">绘画用色彩，音乐用声音，雕塑用形状——</text>
    <text x="0" y="72" text-anchor="middle" font-family="serif" font-size="13" fill="#8d5a36">语言不同，目的相同：把心里的感受变成别人能感知的美</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">美不只是好看，更是心灵与心灵之间的对话</text>
</svg>
