<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="翠鸟停在船头插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">搭船的鸟</text>
  <line x1="340" y1="58" x2="460" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="64" width="800" height="220" fill="#d8e8f0"/>
  <!-- 远山 -->
  <path d="M0 260 Q150 200 300 240 Q450 190 600 235 Q700 210 800 245 L800 284 L0 284 Z" fill="#9ab87a" opacity="0.5"/>
  <!-- 云 -->
  <ellipse cx="150" cy="120" rx="45" ry="18" fill="#fff6df" opacity="0.8"/>
  <ellipse cx="200" cy="115" rx="35" ry="15" fill="#fff6df" opacity="0.8"/>
  <ellipse cx="600" cy="130" rx="40" ry="16" fill="#fff6df" opacity="0.8"/>

  <!-- 水面 -->
  <rect x="0" y="284" width="800" height="276" fill="#5a9aba"/>
  <!-- 水波纹 -->
  <g stroke="#7abaca" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M50 340 Q80 335 110 340 Q140 345 170 340"/>
    <path d="M300 360 Q330 355 360 360 Q390 365 420 360"/>
    <path d="M550 350 Q580 345 610 350 Q640 355 670 350"/>
    <path d="M100 420 Q130 415 160 420 Q190 425 220 420"/>
    <path d="M450 440 Q480 435 510 440 Q540 445 570 440"/>
    <path d="M600 480 Q630 475 660 480 Q690 485 720 480"/>
  </g>

  <!-- 小船 -->
  <g transform="translate(400,400)">
    <!-- 船身 -->
    <path d="M-160 0 Q-150 40 -100 50 L100 50 Q150 40 160 0 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2.5"/>
    <!-- 船板 -->
    <path d="M-160 0 L160 0" stroke="#5a3a1a" stroke-width="3"/>
    <!-- 船板纹理 -->
    <g stroke="#a86a38" stroke-width="1" opacity="0.6">
      <line x1="-140" y1="10" x2="140" y2="10"/>
      <line x1="-130" y1="25" x2="130" y2="25"/>
      <line x1="-110" y1="40" x2="110" y2="40"/>
    </g>
    <!-- 船篷 -->
    <path d="M-80 0 L-80 -50 Q-80 -70 -60 -70 L60 -70 Q80 -70 80 -50 L80 0 Z" fill="#a86a38" stroke="#5a3a1a" stroke-width="2"/>
    <g stroke="#8d5a36" stroke-width="1.5">
      <line x1="-50" y1="-70" x2="-50" y2="0"/>
      <line x1="-20" y1="-70" x2="-20" y2="0"/>
      <line x1="20" y1="-70" x2="20" y2="0"/>
      <line x1="50" y1="-70" x2="50" y2="0"/>
    </g>
  </g>

  <!-- 翠鸟（站在船头） -->
  <g transform="translate(560,395)">
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="28" ry="20" fill="#3a9a5a"/>
    <!-- 翅膀 -->
    <ellipse cx="-5" cy="2" rx="20" ry="12" fill="#2a7a9a" transform="rotate(-15 -5 2)"/>
    <!-- 头 -->
    <circle cx="18" cy="-12" r="14" fill="#3a9a5a"/>
    <!-- 头顶羽毛 -->
    <path d="M10 -22 Q18 -28 26 -22" fill="#2a8a4a"/>
    <!-- 眼睛 -->
    <circle cx="22" cy="-13" r="3" fill="#fff6df"/>
    <circle cx="23" cy="-13" r="1.8" fill="#3d2817"/>
    <!-- 嘴（又长又尖，红色） -->
    <path d="M30 -10 L52 -8 L30 -6 Z" fill="#e8583a"/>
    <!-- 橙色肚子 -->
    <ellipse cx="5" cy="10" rx="16" ry="10" fill="#e8884a"/>
    <!-- 尾巴 -->
    <path d="M-25 -2 L-40 -5 L-40 5 L-25 3 Z" fill="#2a7a9a"/>
    <!-- 腿 -->
    <line x1="-2" y1="18" x2="-2" y2="30" stroke="#e8583a" stroke-width="2.5"/>
    <line x1="8" y1="18" x2="8" y2="30" stroke="#e8583a" stroke-width="2.5"/>
    <!-- 爪子 -->
    <path d="M-6 30 L-2 30 L2 30 M4 30 L8 30 L12 30" stroke="#e8583a" stroke-width="2"/>
  </g>

  <!-- 小鱼（水里） -->
  <g transform="translate(250,470)">
    <ellipse cx="0" cy="0" rx="14" ry="6" fill="#c8d8e8"/>
    <path d="M-14 0 L-24 -6 L-24 6 Z" fill="#c8d8e8"/>
    <circle cx="8" cy="-1" r="1.5" fill="#3d2817"/>
  </g>
  <g transform="translate(620,500)">
    <ellipse cx="0" cy="0" rx="10" ry="4" fill="#c8d8e8"/>
    <path d="M-10 0 L-18 -4 L-18 4 Z" fill="#c8d8e8"/>
    <circle cx="6" cy="-1" r="1" fill="#3d2817"/>
  </g>

  <!-- 标注：翠鸟 -->
  <line x1="560" y1="395" x2="640" y2="340" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="620" y="315" width="80" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="660" y="334" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">翠鸟</text>

  <!-- 标注：红色长嘴 -->
  <line x1="545" y1="392" x2="610" y2="370" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="595" y="345" width="110" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="650" y="364" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">红色长嘴</text>

  <!-- 标注：翠绿羽毛 -->
  <line x1="535" y1="400" x2="470" y2="430" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="385" y="415" width="110" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="440" y="434" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">翠绿羽毛</text>

  <!-- 标注：小船 -->
  <line x1="400" y1="400" x2="400" y2="470" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="355" y="475" width="90" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="400" y="494" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">小船</text>

  <!-- 底部说明 -->
  <rect x="40" y="548" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="573" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">一只翠绿的翠鸟停在船头，悄悄注视水面，随时准备冲下去叼起小鱼。</text>
</svg>
