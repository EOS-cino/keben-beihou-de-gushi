<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="桃花心木树苗和种树老人插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">桃花心木</text>
  <line x1="320" y1="56" x2="480" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——不按时浇水，树才能学会自己找水</text>

  <!-- 天空 -->
  <rect x="0" y="90" width="800" height="250" fill="#a8d0e8" opacity="0.3"/>

  <!-- 远山 -->
  <path d="M0 340 Q200 260 400 300 Q600 250 800 320 L800 350 L0 350 Z" fill="#6a8d3f" opacity="0.3"/>

  <!-- 地面 -->
  <rect x="0" y="350" width="800" height="250" fill="#d4c8a0"/>
  <rect x="0" y="350" width="800" height="250" fill="#8d5a36" opacity="0.15"/>

  <!-- 左侧：被按时浇水的树（根浅，歪斜） -->
  <g transform="translate(150, 380)">
    <text x="0" y="-60" text-anchor="middle" font-family="serif" font-size="12" fill="#c84a3a">按时浇水：根浅易倒</text>
    <!-- 树干（细，歪斜） -->
    <path d="M0 80 Q5 40 -3 0 Q-5 -20 0 -40" fill="none" stroke="#8d5a36" stroke-width="6" stroke-linecap="round"/>
    <!-- 树叶（少，不茂盛） -->
    <ellipse cx="-5" cy="-45" rx="25" ry="20" fill="#6a8d3f" opacity="0.5"/>
    <ellipse cx="10" cy="-50" rx="15" ry="12" fill="#6a8d3f" opacity="0.5"/>
    <!-- 浅根 -->
    <g stroke="#7a3b14" stroke-width="2" fill="none">
      <path d="M0 80 Q-10 90 -15 95"/>
      <path d="M0 80 Q10 90 15 95"/>
      <path d="M0 80 Q-5 92 -8 98"/>
      <path d="M0 80 Q5 92 8 98"/>
    </g>
    <!-- 水壶浇水 -->
    <g transform="translate(40, 30)">
      <path d="M0 0 L20 0 L25 10 L25 20 L-5 20 L-5 10 Z" fill="#7ab8d8" stroke="#4a6a8f" stroke-width="1.5"/>
      <path d="M20 5 L35 0 L35 5" fill="none" stroke="#4a6a8f" stroke-width="1.5"/>
      <path d="M-5 10 L-15 5" fill="none" stroke="#4a6a8f" stroke-width="1.5"/>
      <!-- 水滴 -->
      <circle cx="38" cy="8" r="2" fill="#7ab8d8"/>
      <circle cx="42" cy="15" r="2" fill="#7ab8d8"/>
      <circle cx="36" cy="20" r="1.5" fill="#7ab8d8"/>
    </g>
    <!-- 倒斜标记 -->
    <path d="M-30 -30 Q-35 -20 -30 -10" fill="none" stroke="#c84a3a" stroke-width="2" stroke-dasharray="3 2"/>
  </g>

  <!-- 右侧：不按时浇水的树（根深，挺拔） -->
  <g transform="translate(550, 380)">
    <text x="0" y="-80" text-anchor="middle" font-family="serif" font-size="12" fill="#4a6a2f">不按时浇水：根深茁壮</text>
    <!-- 树干（粗，笔直） -->
    <path d="M0 100 Q3 50 0 0 Q-2 -30 0 -60" fill="none" stroke="#8d5a36" stroke-width="8" stroke-linecap="round"/>
    <!-- 树叶（茂盛） -->
    <ellipse cx="0" cy="-65" rx="40" ry="35" fill="#4a6a2f"/>
    <ellipse cx="-20" cy="-55" rx="25" ry="22" fill="#6a8d3f"/>
    <ellipse cx="20" cy="-55" rx="25" ry="22" fill="#6a8d3f"/>
    <ellipse cx="0" cy="-80" rx="30" ry="25" fill="#6a8d3f"/>
    <!-- 深根 -->
    <g stroke="#7a3b14" stroke-width="2.5" fill="none">
      <path d="M0 100 Q-15 120 -25 140 Q-30 155 -35 170"/>
      <path d="M0 100 Q15 120 25 140 Q30 155 35 170"/>
      <path d="M0 100 Q-8 130 -12 160 Q-15 175 -18 185"/>
      <path d="M0 100 Q8 130 12 160 Q15 175 18 185"/>
      <path d="M0 100 Q0 140 0 180"/>
    </g>
    <!-- 地下水标记 -->
    <g transform="translate(0, 175)">
      <line x1="-40" y1="0" x2="40" y2="0" stroke="#7ab8d8" stroke-width="2" stroke-dasharray="4 2"/>
      <text x="0" y="15" text-anchor="middle" font-family="serif" font-size="10" fill="#4a6a8f">地下水</text>
    </g>
  </g>

  <!-- 中间：种树老人 -->
  <g transform="translate(350, 420)">
    <!-- 头 -->
    <circle cx="0" cy="-50" r="18" fill="#e07856" stroke="#7a3b14" stroke-width="2"/>
    <!-- 帽子 -->
    <path d="M-20 -55 Q0 -75 20 -55" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <ellipse cx="0" cy="-55" rx="22" ry="5" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 眼睛 -->
    <circle cx="-6" cy="-50" r="2" fill="#7a3b14"/>
    <circle cx="6" cy="-50" r="2" fill="#7a3b14"/>
    <!-- 胡子 -->
    <path d="M-8 -42 Q0 -35 8 -42" fill="none" stroke="#fef9ed" stroke-width="2"/>
    <!-- 身体 -->
    <ellipse cx="0" cy="-15" rx="20" ry="25" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
    <!-- 手臂 -->
    <path d="M-18 -20 Q-30 -10 -35 5" fill="none" stroke="#6a8d3f" stroke-width="6" stroke-linecap="round"/>
    <path d="M18 -20 Q30 -10 35 5" fill="none" stroke="#6a8d3f" stroke-width="6" stroke-linecap="round"/>
    <!-- 腿 -->
    <path d="M-8 10 Q-10 25 -12 40" fill="none" stroke="#8d5a36" stroke-width="7" stroke-linecap="round"/>
    <path d="M8 10 Q10 25 12 40" fill="none" stroke="#8d5a36" stroke-width="7" stroke-linecap="round"/>
    <!-- 水桶 -->
    <g transform="translate(-35, 8)">
      <path d="M-8 0 L8 0 L10 15 L-10 15 Z" fill="#7ab8d8" stroke="#4a6a8f" stroke-width="1.5"/>
      <path d="M-8 0 Q0 -5 8 0" fill="none" stroke="#4a6a8f" stroke-width="1.5"/>
    </g>
  </g>

  <!-- 对话框 -->
  <g transform="translate(350, 330)">
    <rect x="-130" y="0" width="260" height="50" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.95"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">"不固定时间浇水，树不知道</text>
    <text x="0" y="38" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">什么时候有水，就会拼命把根往下扎"</text>
  </g>

  <!-- 底部标注 -->
  <g transform="translate(400, 575)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">在不确定中生活，才能学会独立——人也一样</text>
  </g>
</svg>
