<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="银河横亘夜空的科学插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 夜空 -->
  <rect x="0" y="0" width="800" height="500" fill="#1a2a4a" opacity="0.88"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#fef9ed">星辰的海</text>
  <line x1="356" y1="60" x2="444" y2="60" stroke="#e8a838" stroke-width="2"/>

  <!-- 银河（斜跨光带） -->
  <path d="M50 120 Q250 200 400 280 Q550 360 760 440" fill="none" stroke="#fef9ed" stroke-width="60" opacity="0.18" stroke-linecap="round"/>
  <path d="M50 120 Q250 200 400 280 Q550 360 760 440" fill="none" stroke="#fef9ed" stroke-width="30" opacity="0.28" stroke-linecap="round"/>

  <!-- 银河里的密集星点 -->
  <g fill="#fef9ed">
    <circle cx="120" cy="148" r="1.2"/>
    <circle cx="160" cy="165" r="1"/>
    <circle cx="195" cy="178" r="1.5"/>
    <circle cx="230" cy="195" r="1"/>
    <circle cx="270" cy="210" r="1.3"/>
    <circle cx="310" cy="232" r="1"/>
    <circle cx="345" cy="250" r="1.4"/>
    <circle cx="385" cy="272" r="1"/>
    <circle cx="420" cy="288" r="1.3"/>
    <circle cx="460" cy="305" r="1"/>
    <circle cx="500" cy="322" r="1.4"/>
    <circle cx="540" cy="340" r="1"/>
    <circle cx="580" cy="358" r="1.2"/>
    <circle cx="620" cy="378" r="1"/>
    <circle cx="660" cy="395" r="1.3"/>
    <circle cx="700" cy="415" r="1"/>
  </g>

  <!-- 亮星 -->
  <g>
    <circle cx="150" cy="250" r="3" fill="#fef9ed"/>
    <circle cx="150" cy="250" r="7" fill="none" stroke="#fef9ed" stroke-width="0.6" opacity="0.5"/>
    <circle cx="680" cy="180" r="3.5" fill="#e8a838"/>
    <circle cx="680" cy="180" r="8" fill="none" stroke="#e8a838" stroke-width="0.6" opacity="0.5"/>
    <circle cx="560" cy="120" r="2.5" fill="#fef9ed"/>
    <circle cx="250" cy="380" r="3" fill="#e07856"/>
    <circle cx="250" cy="380" r="7" fill="none" stroke="#e07856" stroke-width="0.6" opacity="0.5"/>
    <circle cx="430" cy="430" r="2.5" fill="#fef9ed"/>
    <circle cx="720" cy="320" r="2.5" fill="#4a90b8"/>
    <circle cx="120" cy="180" r="2.5" fill="#fef9ed"/>
  </g>
  <!-- 散布的小星 -->
  <g fill="#fef9ed" opacity="0.7">
    <circle cx="90" cy="320" r="1"/>
    <circle cx="350" cy="120" r="1"/>
    <circle cx="500" cy="200" r="1"/>
    <circle cx="620" cy="420" r="1"/>
    <circle cx="200" cy="100" r="1"/>
    <circle cx="730" cy="260" r="1"/>
    <circle cx="380" cy="380" r="1"/>
    <circle cx="60" cy="400" r="1"/>
    <circle cx="450" cy="150" r="1"/>
    <circle cx="650" cy="450" r="1"/>
  </g>

  <!-- 太阳系示意（右下小图） -->
  <g transform="translate(640 460)">
    <rect x="-75" y="-35" width="150" height="70" fill="#fef9ed" stroke="#e8a838" stroke-width="1.5" rx="6"/>
    <text x="0" y="-18" text-anchor="middle" font-family="serif" font-size="11" fill="#8a5a14">太阳在银河系的位置</text>
    <!-- 微缩银河 -->
    <ellipse cx="0" cy="6" rx="55" ry="14" fill="none" stroke="#4a90b8" stroke-width="1.2"/>
    <ellipse cx="0" cy="6" rx="35" ry="9" fill="none" stroke="#e8a838" stroke-width="1"/>
    <circle cx="0" cy="6" r="3" fill="#e07856"/>
    <circle cx="38" cy="6" r="2" fill="#e8a838"/>
    <text x="38" y="24" text-anchor="middle" font-family="serif" font-size="9" fill="#8a5a14">太阳</text>
  </g>

  <!-- 地面剪影（山） -->
  <path d="M0 500 L120 460 L260 495 L400 470 L540 495 L680 465 L800 500 L800 600 L0 600 Z" fill="#2d4a3a"/>
  <rect x="0" y="500" width="800" height="100" fill="#1a3a2a" opacity="0.6"/>

  <!-- 仰望的小人 -->
  <g transform="translate(400 540)">
    <path d="M -12 20 Q -14 0 -8 -10 Q 0 -14 8 -10 Q 14 0 12 20 Z" fill="#2d6a4f"/>
    <circle cx="0" cy="-22" r="9" fill="#f0d0a8"/>
    <path d="M -8 -28 Q 0 -34 8 -28" fill="#3a3a3a"/>
  </g>

  <!-- 标注 -->
  <line x1="400" y1="280" x2="400" y2="320" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="330" y="322" width="140" height="26" fill="#1a2a4a" stroke="#e8a838" rx="4"/>
  <text x="400" y="340" text-anchor="middle" font-family="serif" font-size="14" fill="#fef9ed">银河——数千亿颗恒星</text>

  <!-- 底部说明 -->
  <rect x="80" y="555" width="640" height="34" fill="#fef9ed" stroke="#e8a838" stroke-width="1" rx="6" opacity="0.9"/>
  <text x="400" y="576" text-anchor="middle" font-family="serif" font-size="14" fill="#8a5a14">那条横过夜空的光带，是流淌了亿万年的星辰的海</text>
</svg>
