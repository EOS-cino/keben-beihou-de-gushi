<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="钱塘江大潮壮观场面插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">观潮</text>
  <line x1="360" y1="58" x2="440" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="64" width="800" height="160" fill="#d8e0e8"/>
  <!-- 远处薄雾 -->
  <ellipse cx="400" cy="200" rx="350" ry="20" fill="#fff6df" opacity="0.5"/>

  <!-- 海宁盐官镇堤坝（观潮点） -->
  <rect x="0" y="460" width="800" height="50" fill="#b89868"/>
  <rect x="0" y="455" width="800" height="10" fill="#a88858"/>
  <!-- 堤坝栏杆 -->
  <g fill="#8d6a4a">
    <rect x="40" y="430" width="6" height="30"/>
    <rect x="100" y="430" width="6" height="30"/>
    <rect x="160" y="430" width="6" height="30"/>
    <rect x="640" y="430" width="6" height="30"/>
    <rect x="700" y="430" width="6" height="30"/>
    <rect x="760" y="430" width="6" height="30"/>
  </g>
  <rect x="30" y="425" width="740" height="6" fill="#8d6a4a"/>

  <!-- 观潮人群 -->
  <g transform="translate(80,420)">
    <circle cx="0" cy="-12" r="6" fill="#e8c4a0"/>
    <rect x="-6" y="-6" width="12" height="14" rx="2" fill="#c8483a"/>
    <rect x="-4" y="8" width="8" height="10" fill="#3a6a9a"/>
  </g>
  <g transform="translate(130,422)">
    <circle cx="0" cy="-12" r="6" fill="#e8c4a0"/>
    <rect x="-6" y="-6" width="12" height="14" rx="2" fill="#3a6a9a"/>
    <rect x="-4" y="8" width="8" height="10" fill="#5a3a1a"/>
  </g>
  <g transform="translate(680,420)">
    <circle cx="0" cy="-12" r="6" fill="#e8c4a0"/>
    <rect x="-6" y="-6" width="12" height="14" rx="2" fill="#5a8a3a"/>
    <rect x="-4" y="8" width="8" height="10" fill="#3d2817"/>
  </g>
  <g transform="translate(730,422)">
    <circle cx="0" cy="-12" r="6" fill="#e8c4a0"/>
    <rect x="-6" y="-6" width="12" height="14" rx="2" fill="#e8a838"/>
    <rect x="-4" y="8" width="8" height="10" fill="#5a3a1a"/>
  </g>

  <!-- 江面 -->
  <rect x="0" y="224" width="800" height="236" fill="#5a8aaa"/>

  <!-- 远处潮线（白线） -->
  <rect x="250" y="230" width="300" height="4" fill="#fff6df" opacity="0.7"/>

  <!-- 大潮水墙（中间主体） -->
  <path d="M0 360 Q100 320 200 340 Q300 300 400 330 Q500 295 600 335 Q700 310 800 345 L800 460 L0 460 Z" fill="#3a7a9a"/>
  <!-- 潮头浪花 -->
  <path d="M0 360 Q100 320 200 340 Q300 300 400 330 Q500 295 600 335 Q700 310 800 345" fill="none" stroke="#fff6df" stroke-width="4"/>
  <!-- 浪花飞溅 -->
  <g fill="#fff6df">
    <path d="M150 330 Q145 315 155 310 Q160 320 155 330 Z"/>
    <path d="M250 315 Q245 300 255 295 Q260 305 255 315 Z"/>
    <path d="M380 322 Q375 305 385 300 Q390 312 385 322 Z"/>
    <path d="M500 310 Q495 295 505 290 Q510 300 505 310 Z"/>
    <path d="M620 325 Q615 310 625 305 Q630 318 625 325 Z"/>
    <circle cx="180" cy="305" r="4" opacity="0.8"/>
    <circle cx="320" cy="295" r="5" opacity="0.8"/>
    <circle cx="450" cy="290" r="4" opacity="0.8"/>
    <circle cx="560" cy="300" r="5" opacity="0.8"/>
    <circle cx="680" cy="305" r="4" opacity="0.8"/>
  </g>
  <!-- 潮水纹理 -->
  <g stroke="#4a8aaa" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M50 390 Q100 380 150 390"/>
    <path d="M250 400 Q300 390 350 400"/>
    <path d="M450 395 Q500 385 550 395"/>
    <path d="M650 400 Q700 390 750 400"/>
  </g>

  <!-- 声波线（闷雷声） -->
  <g fill="none" stroke="#7a3b14" stroke-width="1.5" opacity="0.4">
    <path d="M400 180 Q420 170 440 180"/>
    <path d="M380 165 Q420 150 460 165"/>
  </g>
  <text x="400" y="150" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" opacity="0.6">轰隆隆——</text>

  <!-- 标注：潮头水墙 -->
  <line x1="400" y1="330" x2="400" y2="280" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="335" y="255" width="130" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="400" y="274" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">潮头水墙</text>

  <!-- 标注：白浪 -->
  <line x1="250" y1="315" x2="180" y2="280" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="110" y="260" width="90" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="155" y="279" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">白浪</text>

  <!-- 标注：观潮人群 -->
  <line x1="130" y1="422" x2="130" y2="395" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="75" y="372" width="110" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="130" y="391" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">观潮人群</text>

  <!-- 标注：远处白线 -->
  <line x1="400" y1="232" x2="560" y2="210" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="540" y="188" width="120" height="28" rx="4" fill="#fff6df" stroke="#c8843a" stroke-width="1.5"/>
  <text x="600" y="207" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">远处白线</text>

  <!-- 底部说明 -->
  <rect x="40" y="528" width="720" height="40" rx="6" fill="#fff6df" stroke="#c8843a" stroke-width="1" opacity="0.8"/>
  <text x="400" y="553" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">钱塘江大潮潮头如墙，白浪翻滚，声如闷雷，浩浩荡荡横贯江面，不愧为天下奇观。</text>
</svg>
