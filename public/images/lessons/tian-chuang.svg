<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="木屋顶上方天窗与雨夜的画面">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">天窗</text>
  <line x1="220" y1="70" x2="580" y2="70" stroke="#5d4037" stroke-width="2"/>
  <!-- 夜空雨 -->
  <rect x="0" y="100" width="800" height="200" fill="#2c3e50" opacity="0.25"/>
  <line x1="120" y1="130" x2="110" y2="170" stroke="#5d8aa8" stroke-width="2"/>
  <line x1="220" y1="140" x2="210" y2="180" stroke="#5d8aa8" stroke-width="2"/>
  <line x1="320" y1="125" x2="310" y2="165" stroke="#5d8aa8" stroke-width="2"/>
  <line x1="480" y1="135" x2="470" y2="175" stroke="#5d8aa8" stroke-width="2"/>
  <line x1="600" y1="130" x2="590" y2="170" stroke="#5d8aa8" stroke-width="2"/>
  <line x1="680" y1="145" x2="670" y2="185" stroke="#5d8aa8" stroke-width="2"/>
  <!-- 闪电 -->
  <path d="M 400 110 l -12 40 l 12 0 l -16 50" stroke="#f0c419" stroke-width="3" fill="none"/>
  <!-- 屋顶 -->
  <polygon points="100,300 400,150 700,300" fill="#5d4037"/>
  <polygon points="100,300 400,150 700,300 700,330 100,330" fill="#8a6d3b"/>
  <!-- 天窗 -->
  <rect x="360" y="230" width="80" height="60" fill="#f0c068" stroke="#3a3a3a" stroke-width="3"/>
  <line x1="400" y1="230" x2="400" y2="290" stroke="#3a3a3a" stroke-width="1.5"/>
  <line x1="360" y1="260" x2="440" y2="260" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- 从天窗透出的光 -->
  <polygon points="360,290 440,290 480,420 320,420" fill="#f0c068" opacity="0.3"/>
  <!-- 屋身 -->
  <rect x="200" y="330" width="400" height="160" fill="#8a6d3b" opacity="0.6"/>
  <rect x="340" y="380" width="50" height="80" fill="#3a3a3a" opacity="0.5"/>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14">一方小窗，望见大大世界</text>
</svg>
