<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="小熊抱着礼物盒在森林里送朋友的童话插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">小熊的礼物</text>
  <line x1="330" y1="56" x2="470" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——最好的礼物，是一颗惦记你的心</text>

  <!-- 森林背景 -->
  <rect x="0" y="90" width="800" height="340" fill="#6a8d3f" opacity="0.12"/>

  <!-- 远处的树 -->
  <g transform="translate(100, 240)">
    <rect x="-6" y="0" width="12" height="80" fill="#8d5a36"/>
    <polygon points="-30,0 30,0 0,-55" fill="#2d6a4f"/>
    <polygon points="-26,-25 26,-25 0,-70" fill="#2d6a4f"/>
  </g>
  <g transform="translate(700, 250)">
    <rect x="-6" y="0" width="12" height="70" fill="#8d5a36"/>
    <polygon points="-28,0 28,0 0,-50" fill="#2d6a4f"/>
    <polygon points="-24,-22 24,-22 0,-64" fill="#2d6a4f"/>
  </g>

  <!-- 小熊 -->
  <g transform="translate(400, 300)">
    <!-- 身体 -->
    <ellipse cx="0" cy="20" rx="50" ry="42" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 头 -->
    <circle cx="0" cy="-40" r="34" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 耳朵 -->
    <circle cx="-26" cy="-62" r="11" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="26" cy="-62" r="11" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="-26" cy="-62" r="5" fill="#e07856"/>
    <circle cx="26" cy="-62" r="5" fill="#e07856"/>
    <!-- 脸 -->
    <ellipse cx="0" cy="-32" rx="18" ry="13" fill="#e8a838" opacity="0.6"/>
    <circle cx="-11" cy="-44" r="3" fill="#7a3b14"/>
    <circle cx="11" cy="-44" r="3" fill="#7a3b14"/>
    <ellipse cx="0" cy="-36" rx="4" ry="3" fill="#7a3b14"/>
    <path d="M-5 -28 Q0 -23 5 -28" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 腿 -->
    <rect x="-32" y="55" width="14" height="20" rx="6" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.2"/>
    <rect x="18" y="55" width="14" height="20" rx="6" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.2"/>
    <!-- 抱着的礼物盒 -->
    <g transform="translate(0, 25)">
      <rect x="-30" y="-20" width="60" height="50" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-30" y="-8" width="60" height="8" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
      <path d="M-12 -20 Q-12 -38 0 -34 Q12 -38 12 -20" fill="none" stroke="#e8a838" stroke-width="4"/>
      <circle cx="0" cy="-34" r="4" fill="#e8a838" stroke="#7a3b14" stroke-width="1"/>
    </g>
    <text x="0" y="95" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">小熊抱着亲手做的礼物</text>
  </g>

  <!-- 朋友们 -->
  <g transform="translate(170, 360)">
    <ellipse cx="0" cy="0" rx="16" ry="12" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.2"/>
    <circle cx="-12" cy="-4" r="7" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.2"/>
    <path d="M14 -2 Q26 -10 22 6" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.2"/>
    <circle cx="-13" cy="-5" r="1.5" fill="#7a3b14"/>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">小兔</text>
  </g>
  <g transform="translate(640, 360)">
    <ellipse cx="0" cy="0" rx="14" ry="10" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.2"/>
    <circle cx="10" cy="-4" r="7" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.2"/>
    <path d="M-10 4 Q-22 0 -18 -12" fill="none" stroke="#8d5a36" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">小松鼠</text>
  </g>

  <!-- 飞舞的爱心 -->
  <g fill="#e07856" opacity="0.8">
    <path d="M280 200 a5 5 0 0 1 10 0 a5 5 0 0 1 10 0 q0 7 -10 13 q-10 -6 -10 -13" transform="scale(0.9)"/>
    <path d="M520 210 a5 5 0 0 1 10 0 a5 5 0 0 1 10 0 q0 7 -10 13 q-10 -6 -10 -13" transform="scale(0.8)"/>
  </g>

  <!-- 地面 -->
  <rect x="0" y="430" width="800" height="40" fill="#6a8d3f" opacity="0.3"/>

  <!-- 底部引言 -->
  <g transform="translate(400, 500)">
    <rect x="-300" y="0" width="600" height="70" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">千里送鹅毛，礼轻情意重</text>
    <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">给予比得到，更能让人快乐</text>
  </g>
</svg>
