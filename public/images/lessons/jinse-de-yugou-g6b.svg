<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="金色的鱼钩 - 老班长背影与炊烟">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题栏 -->
  <rect x="0" y="0" width="800" height="74" fill="#7a3b14" opacity="0.12"/>
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">金色的鱼钩</text>
  <line x1="310" y1="64" x2="490" y2="64" stroke="#c05a30" stroke-width="2"/>

  <!-- 黄昏天空 -->
  <rect x="0" y="74" width="800" height="240" fill="#c05a30" opacity="0.05"/>
  <!-- 落日 -->
  <circle cx="400" cy="180" r="40" fill="#c05a30" opacity="0.15"/>
  <circle cx="400" cy="180" r="28" fill="#c05a30" opacity="0.2"/>

  <!-- 远处草地丘陵 -->
  <path d="M0 280 Q200 250 400 270 Q600 250 800 275 L800 320 L0 320 Z" fill="#3a7d5c" opacity="0.12"/>
  <path d="M0 320 Q200 295 400 310 Q600 295 800 315 L800 514 L0 514 Z" fill="#3a7d5c" opacity="0.18"/>

  <!-- 炊烟（从中心升起，主要视觉元素） -->
  <g transform="translate(400,200)" opacity="0.6">
    <path d="M0 80 Q-8 60 -4 40 Q4 20 -2 0 Q-6 -20 2 -40 Q6 -60 -2 -80" stroke="#7a7468" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M6 80 Q14 55 8 35 Q0 15 6 -5 Q12 -25 4 -50 Q0 -70 8 -85" stroke="#7a7468" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M-6 80 Q-14 58 -10 38 Q-4 18 -8 -2 Q-12 -22 -6 -45 Q-2 -65 -10 -80" stroke="#7a7468" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- 烟雾粒子 -->
    <circle cx="-4" cy="40" r="4" fill="#7a7468" opacity="0.15"/>
    <circle cx="6" cy="10" r="5" fill="#7a7468" opacity="0.12"/>
    <circle cx="-8" cy="-20" r="6" fill="#7a7468" opacity="0.1"/>
    <circle cx="4" cy="-50" r="7" fill="#7a7468" opacity="0.08"/>
  </g>

  <!-- 老班长背影（背对观众，蹲在火堆旁） -->
  <g transform="translate(400,380)">
    <!-- 身体背影（深色剪影） -->
    <path d="M-30 -40 Q-35 -10 -38 30 L38 30 Q35 -10 30 -40 Z" fill="#2d2a24" opacity="0.85"/>
    <!-- 军帽背影 -->
    <path d="M-22 -50 Q0 -68 22 -50 L22 -42 L-22 -42 Z" fill="#2d2a24" opacity="0.85"/>
    <rect x="-24" y="-44" width="48" height="5" fill="#2d2a24" opacity="0.85"/>
    <!-- 五星（背影看不到，但帽子轮廓） -->
    <!-- 后背 -->
    <path d="M-28 -38 Q-30 -10 -32 25 L32 25 Q30 -10 28 -38 Z" fill="#3a7d5c" opacity="0.6"/>
    <!-- 补丁 -->
    <rect x="-12" y="-10" width="14" height="14" fill="#3a7d5c" opacity="0.4" stroke="#7a3b14" stroke-width="0.5" stroke-dasharray="2 2"/>
    <!-- 蹲着的腿 -->
    <ellipse cx="-22" cy="30" rx="14" ry="10" fill="#2d2a24" opacity="0.85"/>
    <ellipse cx="22" cy="30" rx="14" ry="10" fill="#2d2a24" opacity="0.85"/>
    <!-- 手臂伸向火堆 -->
    <path d="M-30 -20 Q-45 0 -50 20" stroke="#2d2a24" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M30 -20 Q45 0 50 20" stroke="#2d2a24" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- 篝火（老班长面前） -->
  <g transform="translate(400,410)">
    <!-- 火堆石块 -->
    <ellipse cx="0" cy="20" rx="40" ry="8" fill="#7a7468" opacity="0.4"/>
    <ellipse cx="-30" cy="18" rx="8" ry="5" fill="#7a7468" opacity="0.5"/>
    <ellipse cx="30" cy="18" rx="8" ry="5" fill="#7a7468" opacity="0.5"/>
    <!-- 柴 -->
    <line x1="-18" y1="12" x2="18" y2="12" stroke="#7a3b14" stroke-width="3"/>
    <line x1="-15" y1="16" x2="15" y2="8" stroke="#7a3b14" stroke-width="2.5"/>
    <!-- 火焰 -->
    <path d="M-12 10 Q-8 -8 0 -18 Q8 -8 12 10 Q6 4 0 8 Q-6 4 -12 10 Z" fill="#c05a30" opacity="0.8"/>
    <path d="M-7 8 Q-4 -4 0 -12 Q4 -4 7 8 Q3 2 0 6 Q-3 2 -7 8 Z" fill="#c05a30"/>
    <!-- 锅 -->
    <ellipse cx="0" cy="2" rx="18" ry="4" fill="#2d2a24" opacity="0.7"/>
    <path d="M-18 2 L-16 12 L16 12 L18 2" fill="#2d2a24" opacity="0.6"/>
    <ellipse cx="0" cy="2" rx="18" ry="4" fill="#3a7d5c" opacity="0.3"/>
    <!-- 锅耳 -->
    <ellipse cx="-20" cy="3" rx="3" ry="2" fill="none" stroke="#2d2a24" stroke-width="1.5"/>
    <ellipse cx="20" cy="3" rx="3" ry="2" fill="none" stroke="#2d2a24" stroke-width="1.5"/>
  </g>

  <!-- 金色鱼钩（特写，右下，与g6a左下位置不同） -->
  <g transform="translate(650,440)">
    <circle cx="0" cy="0" r="48" fill="#c05a30" opacity="0.08"/>
    <!-- 鱼钩（方向不同，朝右） -->
    <path d="M0 -28 L0 8 Q0 22 12 22 Q24 22 24 8" stroke="#c05a30" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M24 8 L20 2 L16 8" stroke="#c05a30" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="24" y1="8" x2="18" y2="12" stroke="#c05a30" stroke-width="2"/>
    <circle cx="0" cy="-28" r="3" fill="#7a3b14"/>
    <!-- 光芒 -->
    <g stroke="#c05a30" stroke-width="1.5" opacity="0.35">
      <line x1="-10" y1="-18" x2="-22" y2="-26"/>
      <line x1="30" y1="0" x2="42" y2="0"/>
      <line x1="10" y1="28" x2="18" y2="38"/>
    </g>
    <text x="0" y="48" text-anchor="middle" font-family="serif" font-size="12" fill="#c05a30">金色鱼钩</text>
  </g>

  <!-- 鱼骨（老班长自己只吃鱼骨） -->
  <g transform="translate(150,440)" opacity="0.7">
    <path d="M-25 0 L25 0" stroke="#7a7468" stroke-width="2.5"/>
    <circle cx="-28" cy="0" r="4" fill="#7a7468"/>
    <line x1="-18" y1="-8" x2="-18" y2="8" stroke="#7a7468" stroke-width="1.5"/>
    <line x1="-8" y1="-9" x2="-8" y2="9" stroke="#7a7468" stroke-width="1.5"/>
    <line x1="2" y1="-8" x2="2" y2="8" stroke="#7a7468" stroke-width="1.5"/>
    <line x1="12" y1="-9" x2="12" y2="9" stroke="#7a7468" stroke-width="1.5"/>
    <line x1="22" y1="-7" x2="22" y2="7" stroke="#7a7468" stroke-width="1.5"/>
    <text x="0" y="24" text-anchor="middle" font-family="serif" font-size="12" fill="#7a7468">嚼鱼骨充饥</text>
  </g>

  <!-- 草丛 -->
  <g stroke="#3a7d5c" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M60 480 Q62 468 64 480"/>
    <path d="M75 485 Q77 470 79 485"/>
    <path d="M540 470 Q542 458 544 470"/>
    <path d="M720 475 Q722 462 724 475"/>
  </g>

  <rect x="0" y="514" width="800" height="86" fill="#fef9ed"/>
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14" opacity="0.85">炊烟袅袅鱼汤香，老班长只嚼鱼骨守战友</text>
</svg>
