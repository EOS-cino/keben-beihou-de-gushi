<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="精彩极了和糟糕透了 - 父母的不同评价">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题栏 -->
  <rect x="0" y="0" width="800" height="74" fill="#7a3b14" opacity="0.12"/>
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">"精彩极了"与"糟糕透了"</text>
  <line x1="290" y1="64" x2="510" y2="64" stroke="#c05a30" stroke-width="2"/>

  <!-- 左半场景：母亲表扬 -->
  <g>
    <rect x="30" y="100" width="350" height="380" rx="10" fill="#fff" stroke="#3a7d5c" stroke-width="2" opacity="0.9"/>
    <!-- 地板 -->
    <rect x="30" y="420" width="350" height="60" rx="10" fill="#7a3b14" opacity="0.1"/>
    <!-- 窗户 -->
    <rect x="60" y="130" width="80" height="60" rx="3" fill="#3a7d5c" opacity="0.2" stroke="#7a3b14" stroke-width="1.5"/>
    <line x1="100" y1="130" x2="100" y2="190" stroke="#7a3b14" stroke-width="1"/>
    <line x1="60" y1="160" x2="140" y2="160" stroke="#7a3b14" stroke-width="1"/>

    <!-- 母亲形象（开心拥抱） -->
    <g transform="translate(120,330)">
      <!-- 裙子 -->
      <path d="M-28 -10 L28 -10 L40 70 L-40 70 Z" fill="#c05a30"/>
      <!-- 身体 -->
      <rect x="-22" y="-40" width="44" height="36" rx="8" fill="#c05a30"/>
      <!-- 头 -->
      <circle cx="0" cy="-58" r="18" fill="#c05a30"/>
      <!-- 头发 -->
      <path d="M-18 -64 Q0 -80 18 -64 L18 -52 Q0 -58 -18 -52 Z" fill="#2d2a24"/>
      <!-- 笑眼 -->
      <path d="M-8 -60 Q-5 -64 -2 -60 M2 -60 Q5 -64 8 -60" stroke="#2d2a24" stroke-width="2" fill="none"/>
      <!-- 微笑 -->
      <path d="M-5 -50 Q0 -45 5 -50" stroke="#2d2a24" stroke-width="2" fill="none"/>
      <!-- 拥抱手臂 -->
      <path d="M22 -30 Q50 -20 56 10" stroke="#c05a30" stroke-width="9" fill="none" stroke-linecap="round"/>
    </g>

    <!-- 孩子（拿诗稿） -->
    <g transform="translate(220,360)">
      <rect x="-14" y="-30" width="28" height="50" rx="5" fill="#3a7d5c"/>
      <circle cx="0" cy="-44" r="13" fill="#c05a30"/>
      <!-- 笑脸 -->
      <circle cx="-4" cy="-46" r="1.5" fill="#2d2a24"/><circle cx="4" cy="-46" r="1.5" fill="#2d2a24"/>
      <path d="M-4 -40 Q0 -37 4 -40" stroke="#2d2a24" stroke-width="1.5" fill="none"/>
      <!-- 诗稿 -->
      <rect x="10" y="-20" width="30" height="40" rx="2" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5"/>
      <line x1="15" y1="-12" x2="35" y2="-12" stroke="#7a3b14" stroke-width="0.8"/>
      <line x1="15" y1="-6" x2="35" y2="-6" stroke="#7a3b14" stroke-width="0.8"/>
      <line x1="15" y1="0" x2="32" y2="0" stroke="#7a3b14" stroke-width="0.8"/>
      <line x1="15" y1="6" x2="35" y2="6" stroke="#7a3b14" stroke-width="0.8"/>
      <!-- 腿 -->
      <rect x="-10" y="18" width="8" height="26" fill="#2d2a24"/>
      <rect x="2" y="18" width="8" height="26" fill="#2d2a24"/>
    </g>

    <!-- 气泡：精彩极了 -->
    <g transform="translate(140,160)">
      <path d="M0 0 L120 0 L120 50 L40 50 L30 70 L28 50 L0 50 Z" fill="#3a7d5c" opacity="0.92"/>
      <text x="60" y="32" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#fef9ed">精彩极了！</text>
    </g>
    <!-- 爱心装饰 -->
    <g fill="#c05a30" opacity="0.6"><path d="M300 200 C296 196 292 196 292 200 C292 196 288 196 284 200 C284 208 292 214 292 214 C292 214 300 208 300 200 Z"/><path d="M310 250 C307 247 304 247 304 250 C304 247 301 247 298 250 C298 256 304 260 304 260 C304 260 310 256 310 250 Z"/></g>
    <text x="205" y="465" text-anchor="middle" font-family="serif" font-size="16" fill="#3a7d5c">母亲的鼓励</text>
  </g>

  <!-- 右半场景：父亲批评 -->
  <g>
    <rect x="420" y="100" width="350" height="380" rx="10" fill="#fff" stroke="#7a3b14" stroke-width="2" opacity="0.9"/>
    <rect x="420" y="420" width="350" height="60" rx="10" fill="#7a3b14" opacity="0.1"/>
    <!-- 书架 -->
    <rect x="660" y="130" width="90" height="80" rx="2" fill="#7a3b14" opacity="0.15" stroke="#7a3b14" stroke-width="1"/>
    <line x1="660" y1="155" x2="750" y2="155" stroke="#7a3b14" stroke-width="1"/>
    <line x1="660" y1="180" x2="750" y2="180" stroke="#7a3b14" stroke-width="1"/>
    <rect x="670" y="138" width="8" height="14" fill="#3a7d5c"/><rect x="680" y="138" width="8" height="14" fill="#c05a30"/><rect x="690" y="138" width="8" height="14" fill="#3a7d5c"/>
    <rect x="670" y="162" width="8" height="14" fill="#c05a30"/><rect x="680" y="162" width="8" height="14" fill="#7a3b14"/>

    <!-- 父亲形象（严肃坐姿） -->
    <g transform="translate(660,340)">
      <!-- 椅子 -->
      <rect x="-50" y="20" width="60" height="50" rx="3" fill="#7a3b14" opacity="0.3"/>
      <rect x="-50" y="-10" width="10" height="80" fill="#7a3b14" opacity="0.3"/>
      <!-- 身体 -->
      <rect x="-32" y="-40" width="44" height="50" rx="6" fill="#2d2a24"/>
      <!-- 头 -->
      <circle cx="-10" cy="-58" r="17" fill="#c05a30"/>
      <!-- 眼镜 -->
      <circle cx="-16" cy="-60" r="6" fill="none" stroke="#2d2a24" stroke-width="1.5"/>
      <circle cx="-4" cy="-60" r="6" fill="none" stroke="#2d2a24" stroke-width="1.5"/>
      <line x1="-10" y1="-60" x2="-10" y2="-60" stroke="#2d2a24" stroke-width="1.5"/>
      <!-- 严肃嘴 -->
      <line x1="-16" y1="-49" x2="-4" y2="-49" stroke="#2d2a24" stroke-width="2"/>
      <!-- 手拿稿子 -->
      <path d="M-32 -20 Q-50 -10 -52 10" stroke="#2d2a24" stroke-width="8" fill="none" stroke-linecap="round"/>
      <rect x="-66" y="0" width="24" height="34" rx="2" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5" transform="rotate(-8 -54 17)"/>
    </g>

    <!-- 孩子（低头紧张） -->
    <g transform="translate(490,360)">
      <rect x="-14" y="-30" width="28" height="50" rx="5" fill="#3a7d5c"/>
      <circle cx="0" cy="-44" r="13" fill="#c05a30"/>
      <!-- 低眉 -->
      <path d="M-7 -46 L-3 -44 M3 -44 L7 -46" stroke="#2d2a24" stroke-width="1.5" fill="none"/>
      <line x1="-4" y1="-39" x2="4" y2="-39" stroke="#2d2a24" stroke-width="1.5"/>
      <!-- 腿 -->
      <rect x="-10" y="18" width="8" height="26" fill="#2d2a24"/>
      <rect x="2" y="18" width="8" height="26" fill="#2d2a24"/>
      <!-- 手 -->
      <circle cx="-18" cy="-10" r="5" fill="#c05a30"/>
    </g>

    <!-- 气泡：糟糕透了 -->
    <g transform="translate(560,160)">
      <path d="M0 0 L120 0 L120 50 L80 50 L60 70 L62 50 L0 50 Z" fill="#7a3b14" opacity="0.92"/>
      <text x="60" y="32" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#fef9ed">糟糕透了。</text>
    </g>
    <!-- 叹号装饰 -->
    <g fill="#7a7468" opacity="0.5"><rect x="445" y="200" width="4" height="14"/><circle cx="447" cy="220" r="3"/></g>
    <text x="595" y="465" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">父亲的严厉</text>
  </g>

  <!-- 中间分隔与天平意象 -->
  <g transform="translate(400,290)">
    <line x1="0" y1="-160" x2="0" y2="180" stroke="#7a7468" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>
    <circle cx="0" cy="0" r="22" fill="#fef9ed" stroke="#7a3b14" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">爱</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="18" fill="#7a3b14" opacity="0.85">鼓励与批评，两种声音同源于爱</text>
</svg>
