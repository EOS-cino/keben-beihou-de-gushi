<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="语文老师在黑板前写字的人物插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#2d6a4f">语文老师</text>
  <line x1="350" y1="60" x2="450" y2="60" stroke="#e8a838" stroke-width="2"/>

  <!-- 教室墙壁 -->
  <rect x="0" y="72" width="800" height="528" fill="#f0e8d0"/>
  <!-- 墙裙 -->
  <rect x="0" y="440" width="800" height="160" fill="#dce8c8"/>

  <!-- 黑板 -->
  <rect x="120" y="120" width="560" height="280" fill="#2d4a3a" stroke="#8a6a3a" stroke-width="6"/>
  <!-- 黑板边框装饰 -->
  <rect x="120" y="120" width="560" height="280" fill="none" stroke="#5a4a2a" stroke-width="2"/>
  <!-- 黑板槽 -->
  <rect x="110" y="400" width="580" height="14" fill="#a89878" stroke="#6a5a3a" stroke-width="1.5"/>
  <!-- 粉笔 -->
  <g fill="#fef9ed">
    <rect x="180" y="404" width="30" height="6" rx="2"/>
    <rect x="240" y="404" width="24" height="5" rx="2" fill="#e8a838"/>
  </g>
  <rect x="320" y="403" width="20" height="7" rx="2" fill="#e07856"/>

  <!-- 黑板上的字 -->
  <!-- 大大的"人"字 -->
  <g stroke="#fef9ed" stroke-width="7" fill="none" stroke-linecap="round">
    <path d="M380 170 L340 270"/>
    <path d="M380 170 L420 270"/>
  </g>
  <text x="380" y="200" font-family="serif" font-size="14" fill="#e8a838" opacity="0.7">字如其人</text>
  <!-- 拼音 -->
  <text x="360" y="300" font-family="serif" font-size="20" fill="#fef9ed" opacity="0.85">rén</text>
  <!-- 一撇一捺标注 -->
  <text x="300" y="300" font-family="serif" font-size="14" fill="#e8a838" opacity="0.8">撇</text>
  <text x="430" y="300" font-family="serif" font-size="14" fill="#e8a838" opacity="0.8">捺</text>
  <!-- 小字 -->
  <text x="200" y="360" font-family="serif" font-size="16" fill="#fef9ed" opacity="0.7">一撇一捺，互相支撑</text>

  <!-- 老师（讲台前） -->
  <g transform="translate(580 380)">
    <!-- 讲台 -->
    <rect x="-60" y="40" width="120" height="14" fill="#8a6a3a" stroke="#5a4a2a" stroke-width="1.5"/>
    <rect x="-55" y="54" width="8" height="60" fill="#6a5a3a"/>
    <rect x="47" y="54" width="8" height="60" fill="#6a5a3a"/>
    <!-- 讲台上的书 -->
    <rect x="-40" y="30" width="40" height="12" fill="#e07856" stroke="#8a5a14" stroke-width="1"/>
    <!-- 老师身体 -->
    <path d="M-26 40 Q-30 0 -20 -20 Q0 -28 20 -20 Q30 0 26 40 Z" fill="#2d6a4f" stroke="#1a4a3a" stroke-width="1.5"/>
    <!-- 头 -->
    <circle cx="0" cy="-42" r="18" fill="#f4d4a8" stroke="#c8a878" stroke-width="1"/>
    <!-- 圆眼镜 -->
    <circle cx="-7" cy="-42" r="6" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
    <circle cx="7" cy="-42" r="6" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
    <line x1="-1" y1="-42" x2="1" y2="-42" stroke="#3a3a3a" stroke-width="1.2"/>
    <circle cx="-7" cy="-42" r="1.5" fill="#3a3a3a"/>
    <circle cx="7" cy="-42" r="1.5" fill="#3a3a3a"/>
    <!-- 头发（短发） -->
    <path d="M-16 -48 Q0 -62 16 -48 L16 -42 Q0 -38 -16 -42 Z" fill="#3a3a3a"/>
    <!-- 嘴（微笑） -->
    <path d="M-3 -32 Q0 -29 3 -32" fill="none" stroke="#8a4a3a" stroke-width="1.5"/>
    <!-- 手（拿粉笔写字） -->
    <path d="M-26 -8 Q-44 -16 -52 -28" fill="none" stroke="#2d6a4f" stroke-width="7" stroke-linecap="round"/>
    <circle cx="-54" cy="-30" r="5" fill="#f4d4a8"/>
    <line x1="-58" y1="-32" x2="-62" y2="-36" stroke="#fef9ed" stroke-width="3" stroke-linecap="round"/>
    <!-- 另一手 -->
    <path d="M26 -8 Q40 0 44 16" fill="none" stroke="#2d6a4f" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- 写字留下的粉笔灰 -->
  <g fill="#fef9ed" opacity="0.5">
    <circle cx="425" cy="270" r="1"/>
    <circle cx="430" cy="265" r="0.8"/>
    <circle cx="345" cy="268" r="1"/>
  </g>

  <!-- 学生们（前排背影） -->
  <g transform="translate(150 480)">
    <rect x="-30" y="20" width="60" height="14" fill="#8a6a3a"/>
    <rect x="-30" y="34" width="6" height="40" fill="#6a5a3a"/>
    <rect x="24" y="34" width="6" height="40" fill="#6a5a3a"/>
    <path d="M-18 20 Q-20 -5 -12 -15 Q0 -20 12 -15 Q20 -5 18 20 Z" fill="#e07856"/>
    <circle cx="0" cy="-28" r="12" fill="#f4d4a8"/>
    <path d="M-12 -32 Q0 -42 12 -32 L12 -26 Q0 -22 -12 -26 Z" fill="#3a3a3a"/>
  </g>
  <g transform="translate(250 490)">
    <rect x="-28" y="20" width="56" height="14" fill="#8a6a3a"/>
    <rect x="-28" y="34" width="6" height="36" fill="#6a5a3a"/>
    <rect x="22" y="34" width="6" height="36" fill="#6a5a3a"/>
    <path d="M-16 20 Q-18 -3 -10 -13 Q0 -18 10 -13 Q18 -3 16 20 Z" fill="#4a90b8"/>
    <circle cx="0" cy="-26" r="11" fill="#f4d4a8"/>
    <path d="M-11 -30 Q0 -40 11 -30 L11 -24 Q0 -20 -11 -24 Z" fill="#3a3a3a"/>
  </g>

  <!-- 标注 -->
  <line x1="360" y1="220" x2="220" y2="160" stroke="#8a5a14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="120" y="142" width="110" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="175" y="160" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a14">"人"字示范</text>

  <line x1="600" y1="340" x2="690" y2="300" stroke="#8a5a14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="640" y="282" width="130" height="26" fill="#fff6df" stroke="#2d6a4f" rx="4"/>
  <text x="705" y="300" text-anchor="middle" font-family="serif" font-size="13" fill="#2d6a4f">陈老师在板书</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="15" fill="#2d6a4f">她把汉字一个个写活，把课文一句句种进心里</text>
</svg>
