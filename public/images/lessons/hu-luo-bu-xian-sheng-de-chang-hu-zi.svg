    <circle cx="-6" cy="-6" r="2" fill="#3a2a1a"/><circle cx="6" cy="-6" r="2" fill="#3a2a1a"/>
    <path d="M-6,6 q6,4 12,0" fill="none" stroke="#3a2a1a" stroke-width="2"/>
