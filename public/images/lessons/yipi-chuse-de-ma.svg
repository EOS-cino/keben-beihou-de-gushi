<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="妹妹骑着柳枝马快乐回家的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">一匹出色的马</text>
  <line x1="290" y1="62" x2="510" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="80" width="800" height="200" fill="#a8d0e8" opacity="0.3"/>
  <!-- 夕阳 -->
  <circle cx="100" cy="150" r="35" fill="#f4a838" opacity="0.7"/>

  <!-- 远山 -->
  <path d="M0 280 L150 220 L300 260 L450 210 L600 250 L800 230 L800 320 L0 320 Z" fill="#6a8d3f" opacity="0.35"/>

  <!-- 河水 -->
  <rect x="0" y="300" width="800" height="60" fill="#a8d0e8" opacity="0.5"/>
  <path d="M0 320 Q100 315 200 320 T400 320 T600 320 T800 320" fill="none" stroke="#7ab8d8" stroke-width="2"/>
  <path d="M0 340 Q120 335 240 340 T480 340 T720 340 T800 340" fill="none" stroke="#7ab8d8" stroke-width="2"/>

  <!-- 草地/小路 -->
  <rect x="0" y="360" width="800" height="240" fill="#6a8d3f" opacity="0.3"/>
  <path d="M0 580 Q200 480 400 460 Q600 450 800 470" fill="none" stroke="#d8b878" stroke-width="50" stroke-linecap="round" opacity="0.7"/>

  <!-- 垂柳（左侧大树） -->
  <g transform="translate(650, 200)">
    <rect x="-8" y="0" width="16" height="180" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 柳枝 -->
    <path d="M-5 30 Q-30 80 -35 160" fill="none" stroke="#6a8d3f" stroke-width="2"/>
    <path d="M0 25 Q-15 90 -20 170" fill="none" stroke="#6a8d3f" stroke-width="2"/>
    <path d="M5 30 Q25 80 30 160" fill="none" stroke="#6a8d3f" stroke-width="2"/>
    <path d="M0 25 Q10 90 15 175" fill="none" stroke="#6a8d3f" stroke-width="2"/>
    <path d="M-3 28 Q-40 70 -50 150" fill="none" stroke="#4a6a2f" stroke-width="2"/>
    <path d="M3 28 Q40 70 50 150" fill="none" stroke="#4a6a2f" stroke-width="2"/>
    <!-- 柳叶 -->
    <ellipse cx="-35" cy="160" rx="3" ry="8" fill="#6a8d3f" transform="rotate(20 -35 160)"/>
    <ellipse cx="-20" cy="170" rx="3" ry="8" fill="#6a8d3f" transform="rotate(15 -20 170)"/>
    <ellipse cx="30" cy="160" rx="3" ry="8" fill="#6a8d3f" transform="rotate(-20 30 160)"/>
    <ellipse cx="15" cy="175" rx="3" ry="8" fill="#6a8d3f" transform="rotate(-15 15 175)"/>
    <!-- 树冠 -->
    <ellipse cx="0" cy="10" rx="40" ry="25" fill="#6a8d3f" opacity="0.6"/>
  </g>

  <!-- 妹妹（骑着柳枝马跑在前面） -->
  <g transform="translate(380, 430)">
    <!-- 柳枝"马" -->
    <path d="M-30 30 Q-20 10 0 0 Q20 -5 40 5 Q50 15 45 30" fill="none" stroke="#6a8d3f" stroke-width="4" stroke-linecap="round"/>
    <!-- 柳叶 -->
    <ellipse cx="-25" cy="20" rx="3" ry="7" fill="#6a8d3f" transform="rotate(30 -25 20)"/>
    <ellipse cx="40" cy="10" rx="3" ry="7" fill="#6a8d3f" transform="rotate(-30 40 10)"/>
    <!-- 妹妹身体 -->
    <path d="M-5 0 L-8 -30 L8 -30 L5 0 Z" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 头 -->
    <circle cx="0" cy="-42" r="13" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 辫子 -->
    <ellipse cx="-12" cy="-40" rx="4" ry="10" fill="#2a2a2a"/>
    <ellipse cx="12" cy="-40" rx="4" ry="10" fill="#2a2a2a"/>
    <!-- 眼睛 -->
    <circle cx="-4" cy="-43" r="1.5" fill="#2a2a2a"/>
    <circle cx="4" cy="-43" r="1.5" fill="#2a2a2a"/>
    <!-- 笑嘴 -->
    <path d="M-3 -37 Q0 -34 3 -37" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 腿（跑动） -->
    <path d="M-3 0 L-10 20" fill="none" stroke="#3a4a6a" stroke-width="6" stroke-linecap="round"/>
    <path d="M3 0 L12 18" fill="none" stroke="#3a4a6a" stroke-width="6" stroke-linecap="round"/>
    <!-- 手（举着柳枝） -->
    <path d="M5 -20 L20 -10" fill="none" stroke="#e07856" stroke-width="6" stroke-linecap="round"/>
    <circle cx="22" cy="-8" r="5" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 爸爸妈妈（走在后面） -->
  <g transform="translate(180, 440)">
    <!-- 爸爸 -->
    <path d="M0 0 L-3 -35 L13 -35 L10 0 Z" fill="#3a4a6a" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="5" cy="-48" r="12" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-3 -55 Q5 -62 13 -55" fill="none" stroke="#2a2a2a" stroke-width="2"/>
    <circle cx="1" cy="-49" r="1.5" fill="#2a2a2a"/>
    <circle cx="9" cy="-49" r="1.5" fill="#2a2a2a"/>
    <path d="M2 -43 Q5 -41 8 -43" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M-2 -20 L-8 5" fill="none" stroke="#3a4a6a" stroke-width="5" stroke-linecap="round"/>
    <path d="M10 -20 L16 3" fill="none" stroke="#3a4a6a" stroke-width="5" stroke-linecap="round"/>
    <!-- 妈妈 -->
    <path d="M40 0 L35 -38 L55 -38 L50 0 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M35 -38 L30 -10 L55 -38 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="45" cy="-50" r="11" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M36 -56 Q45 -64 54 -56 Q54 -50 45 -48" fill="#2a2a2a"/>
    <circle cx="41" cy="-50" r="1.5" fill="#2a2a2a"/>
    <circle cx="49" cy="-50" r="1.5" fill="#2a2a2a"/>
    <path d="M42 -44 Q45 -42 48 -44" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
  </g>

  <!-- 标注：柳枝马 -->
  <line x1="410" y1="430" x2="500" y2="370" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="455" y="345" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="510" y="363" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">一匹"马"</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">爸爸折了一根柳枝说"这是一匹出色的马"，妹妹骑着它欢快地跑回了家</text>
</svg>
