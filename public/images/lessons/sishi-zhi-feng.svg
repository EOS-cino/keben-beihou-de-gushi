<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="四季之风插画：春风暖、夏风热、秋风凉、冬风寒">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">四时之风</text>
  <line x1="350" y1="52" x2="450" y2="52" stroke="#c8843a" stroke-width="2"/>

  <!-- 春风（左上） -->
  <g transform="translate(200, 180)">
    <rect x="-150" y="-90" width="300" height="170" fill="#e8f5e8" opacity="0.4" rx="8"/>
    <text x="0" y="-68" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#2d6a4f">春风·暖</text>
    <!-- 风的曲线 -->
    <path d="M -120 -30 Q -80 -40 -40 -30 Q 0 -20 40 -30 Q 80 -40 120 -30" fill="none" stroke="#2d6a4f" stroke-width="2" opacity="0.5"/>
    <path d="M -120 -15 Q -80 -25 -40 -15 Q 0 -5 40 -15 Q 80 -25 120 -15" fill="none" stroke="#2d6a4f" stroke-width="1.5" opacity="0.3"/>
    <!-- 柳树 -->
    <g transform="translate(-80, 20)">
      <path d="M 0 0 Q -2 -20 -4 -40" fill="none" stroke="#5a4a2a" stroke-width="3"/>
      <path d="M -4 -30 Q -15 -25 -25 -20" fill="none" stroke="#5a4a2a" stroke-width="1.5"/>
      <path d="M -4 -35 Q 10 -30 20 -25" fill="none" stroke="#5a4a2a" stroke-width="1.5"/>
      <ellipse cx="-22" cy="-20" rx="2" ry="5" fill="#7aaa5a" transform="rotate(-30 -22 -20)"/>
      <ellipse cx="18" cy="-25" rx="2" ry="5" fill="#7aaa5a" transform="rotate(30 18 -25)"/>
    </g>
    <!-- 桃花 -->
    <g transform="translate(60, 15)">
      <path d="M 0 0 Q 5 -15 10 -30" fill="none" stroke="#5a4a2a" stroke-width="2"/>
      <circle cx="8" cy="-25" r="4" fill="#f0a8b8" stroke="#c87888" stroke-width="0.8"/>
      <circle cx="3" cy="-18" r="3" fill="#f0b8c8" stroke="#c87888" stroke-width="0.8"/>
      <circle cx="10" cy="-15" r="3" fill="#f0a8b8" stroke="#c87888" stroke-width="0.8"/>
    </g>
    <!-- 飘动的花瓣 -->
    <circle cx="20" cy="-10" r="2" fill="#f0a8b8" opacity="0.6"/>
    <circle cx="90" cy="-20" r="2" fill="#f0b8c8" opacity="0.5"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">和煦轻柔，柳绿桃红</text>
  </g>

  <!-- 夏风（右上） -->
  <g transform="translate(600, 180)">
    <rect x="-150" y="-90" width="300" height="170" fill="#fff0e0" opacity="0.4" rx="8"/>
    <text x="0" y="-68" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#e07856">夏风·热</text>
    <!-- 热风曲线 -->
    <path d="M -120 -30 Q -80 -45 -40 -30 Q 0 -15 40 -30 Q 80 -45 120 -30" fill="none" stroke="#e07856" stroke-width="2" opacity="0.5"/>
    <path d="M -120 -15 Q -80 -30 -40 -15 Q 0 0 40 -15 Q 80 -30 120 -15" fill="none" stroke="#e8a838" stroke-width="1.5" opacity="0.3"/>
    <!-- 太阳 -->
    <circle cx="-80" cy="-35" r="14" fill="#e8a838" opacity="0.6"/>
    <line x1="-80" y1="-55" x2="-80" y2="-50" stroke="#e8a838" stroke-width="2" opacity="0.5"/>
    <line x1="-80" y1="-20" x2="-80" y2="-15" stroke="#e8a838" stroke-width="2" opacity="0.5"/>
    <line x1="-100" y1="-35" x2="-95" y2="-35" stroke="#e8a838" stroke-width="2" opacity="0.5"/>
    <line x1="-65" y1="-35" x2="-60" y2="-35" stroke="#e8a838" stroke-width="2" opacity="0.5"/>
    <!-- 荷塘 -->
    <g transform="translate(30, 20)">
      <ellipse cx="0" cy="0" rx="35" ry="10" fill="#4a90b8" opacity="0.3"/>
      <!-- 荷叶 -->
      <ellipse cx="-15" cy="-5" rx="12" ry="6" fill="#2d6a4f" opacity="0.6"/>
      <ellipse cx="15" cy="-3" rx="10" ry="5" fill="#2d6a4f" opacity="0.5"/>
      <!-- 荷花 -->
      <g transform="translate(0, -12)">
        <ellipse cx="-4" cy="0" rx="3" ry="6" fill="#f0a8b8" opacity="0.8" transform="rotate(-20)"/>
        <ellipse cx="4" cy="0" rx="3" ry="6" fill="#f0a8b8" opacity="0.8" transform="rotate(20)"/>
        <ellipse cx="0" cy="-4" rx="3" ry="6" fill="#f0b8c8" opacity="0.8"/>
      </g>
    </g>
    <!-- 蝉 -->
    <text x="70" y="-35" font-family="serif" font-size="14" fill="#7a3b14" opacity="0.6">蝉鸣</text>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">暑气蒸腾，荷摇蝉鸣</text>
  </g>

  <!-- 秋风（左下） -->
  <g transform="translate(200, 420)">
    <rect x="-150" y="-90" width="300" height="170" fill="#f5e8d0" opacity="0.4" rx="8"/>
    <text x="0" y="-68" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#e8a838">秋风·凉</text>
    <!-- 凉风曲线 -->
    <path d="M -120 -30 Q -90 -50 -60 -30 Q -30 -10 0 -30 Q 30 -50 60 -30 Q 90 -10 120 -30" fill="none" stroke="#e8a838" stroke-width="2" opacity="0.5"/>
    <path d="M -120 -15 Q -90 -35 -60 -15 Q -30 5 0 -15 Q 30 -35 60 -15 Q 90 5 120 -15" fill="none" stroke="#c8843a" stroke-width="1.5" opacity="0.3"/>
    <!-- 树与落叶 -->
    <g transform="translate(-70, 20)">
      <path d="M 0 0 Q -2 -25 -3 -45" fill="none" stroke="#5a4a2a" stroke-width="3"/>
      <path d="M -3 -35 Q -12 -30 -20 -28" fill="none" stroke="#5a4a2a" stroke-width="1.5"/>
      <path d="M -3 -40 Q 8 -35 15 -32" fill="none" stroke="#5a4a2a" stroke-width="1.5"/>
      <!-- 黄叶 -->
      <ellipse cx="-18" cy="-28" rx="3" ry="5" fill="#e8a838" opacity="0.7" transform="rotate(-30 -18 -28)"/>
      <ellipse cx="13" cy="-32" rx="3" ry="5" fill="#e8a838" opacity="0.7" transform="rotate(30 13 -32)"/>
    </g>
    <!-- 飘落的叶子 -->
    <ellipse cx="20" cy="-20" rx="3" ry="5" fill="#e8a838" opacity="0.6" transform="rotate(45 20 -20)"/>
    <ellipse cx="50" cy="0" rx="3" ry="5" fill="#c8843a" opacity="0.5" transform="rotate(60 50 0)"/>
    <ellipse cx="80" cy="-10" rx="3" ry="5" fill="#e8a838" opacity="0.5" transform="rotate(30 80 -10)"/>
    <ellipse cx="100" cy="15" rx="2.5" ry="4" fill="#c8843a" opacity="0.4" transform="rotate(70 100 15)"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">萧瑟凉爽，落叶纷飞</text>
  </g>

  <!-- 冬风（右下） -->
  <g transform="translate(600, 420)">
    <rect x="-150" y="-90" width="300" height="170" fill="#e0e8f0" opacity="0.4" rx="8"/>
    <text x="0" y="-68" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#4a90b8">冬风·寒</text>
    <!-- 寒风曲线（更急促） -->
    <path d="M -120 -35 L -80 -20 L -40 -35 L 0 -20 L 40 -35 L 80 -20 L 120 -35" fill="none" stroke="#4a90b8" stroke-width="2" opacity="0.5"/>
    <path d="M -120 -20 L -80 -5 L -40 -20 L 0 -5 L 40 -20 L 80 -5 L 120 -20" fill="none" stroke="#4a90b8" stroke-width="1.5" opacity="0.3"/>
    <!-- 雪花 -->
    <g transform="translate(-60, 10)">
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#4a90b8" stroke-width="1.5"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#4a90b8" stroke-width="1.5"/>
      <line x1="-4" y1="-4" x2="4" y2="4" stroke="#4a90b8" stroke-width="1.5"/>
      <line x1="-4" y1="4" x2="4" y2="-4" stroke="#4a90b8" stroke-width="1.5"/>
    </g>
    <g transform="translate(20, -10)">
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#4a90b8" stroke-width="1.2"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#4a90b8" stroke-width="1.2"/>
      <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="#4a90b8" stroke-width="1.2"/>
      <line x1="-3.5" y1="3.5" x2="3.5" y2="-3.5" stroke="#4a90b8" stroke-width="1.2"/>
    </g>
    <g transform="translate(70, 15)">
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#4a90b8" stroke-width="1.2"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#4a90b8" stroke-width="1.2"/>
      <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="#4a90b8" stroke-width="1.2"/>
      <line x1="-3.5" y1="3.5" x2="3.5" y2="-3.5" stroke="#4a90b8" stroke-width="1.2"/>
    </g>
    <!-- 光秃的树 -->
    <g transform="translate(0, 25)">
      <path d="M 0 0 Q -2 -20 -3 -35" fill="none" stroke="#5a4a2a" stroke-width="3"/>
      <path d="M -3 -25 Q -12 -22 -18 -18" fill="none" stroke="#5a4a2a" stroke-width="1.5"/>
      <path d="M -3 -30 Q 8 -27 14 -23" fill="none" stroke="#5a4a2a" stroke-width="1.5"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">凛冽刺骨，雪花飘飘</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="580" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">春风暖·夏风热·秋风凉·冬风寒——同样是风，四季不同</text>
</svg>
