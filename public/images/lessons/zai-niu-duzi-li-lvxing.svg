<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="在牛肚子里旅行">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">在牛肚子里旅行</text>
  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">一场惊险的牛肚子探险</text>
  <g transform="translate(400,300)">
    <ellipse cx="0" cy="20" rx="150" ry="90" fill="#d8a868" stroke="#7a4a1a" stroke-width="3"/>
    <ellipse cx="-110" cy="0" rx="50" ry="46" fill="#e8c098" stroke="#7a4a1a" stroke-width="3"/>
    <path d="M-150,-20 q-30,-20 -50,-5" fill="none" stroke="#7a4a1a" stroke-width="3"/>
    <circle cx="-110" cy="0" r="6" fill="#3a2a1a"/>
    <ellipse cx="60" cy="20" rx="40" ry="30" fill="#f0d8a8" stroke="#a85a2a" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="60" cy="20" r="10" fill="#c0392b"/>
    <text x="60" y="24" text-anchor="middle" font-family="serif" font-size="12" fill="#fff">红头</text>
  </g>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">牛有四个胃，会反刍</text>
</svg>
