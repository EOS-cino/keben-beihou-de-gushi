<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="青蛙在改造后的泥塘边吆喝卖泥塘的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">青蛙卖泥塘</text>
  <line x1="310" y1="62" x2="490" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="80" width="800" height="220" fill="#a8d0e8" opacity="0.3"/>
  <!-- 太阳 -->
  <circle cx="120" cy="130" r="30" fill="#f4c842" opacity="0.7"/>

  <!-- 远山 -->
  <path d="M0 280 L200 230 L400 270 L600 220 L800 260 L800 320 L0 320 Z" fill="#6a8d3f" opacity="0.35"/>

  <!-- 改造后的泥塘（有草有水有树有花） -->
  <!-- 水塘 -->
  <ellipse cx="450" cy="450" rx="200" ry="50" fill="#a8d0e8" opacity="0.6"/>
  <ellipse cx="450" cy="440" rx="190" ry="40" fill="#7ab8d8" opacity="0.5"/>
  <path d="M280 440 Q350 435 420 440 T560 440 T620 440" fill="none" stroke="#a8d0e8" stroke-width="2"/>

  <!-- 青草（岸边） -->
  <g stroke="#4a6a2f" stroke-width="2" fill="none">
    <path d="M260 460 Q265 440 270 460"/>
    <path d="M275 462 Q280 442 285 462"/>
    <path d="M620 460 Q625 440 630 460"/>
    <path d="M635 462 Q640 442 645 462"/>
    <path d="M300 470 Q305 450 310 470"/>
    <path d="M590 470 Q595 450 600 470"/>
  </g>

  <!-- 树（栽的树） -->
  <g transform="translate(680, 320)">
    <rect x="-6" y="0" width="12" height="80" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <circle cx="0" cy="-10" r="28" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
    <circle cx="-15" cy="-5" r="16" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
    <circle cx="15" cy="-5" r="16" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
  </g>

  <!-- 花 -->
  <g transform="translate(250, 430)">
    <circle cx="0" cy="0" r="8" fill="#e07856" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#f4c842"/>
    <line x1="0" y1="8" x2="0" y2="30" stroke="#4a6a2f" stroke-width="2"/>
  </g>
  <g transform="translate(640, 430)">
    <circle cx="0" cy="0" r="8" fill="#c84a3a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#f4c842"/>
    <line x1="0" y1="8" x2="0" y2="30" stroke="#4a6a2f" stroke-width="2"/>
  </g>
  <g transform="translate(290, 445)">
    <circle cx="0" cy="0" r="7" fill="#f4c842" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#7a3b14"/>
    <line x1="0" y1="7" x2="0" y2="25" stroke="#4a6a2f" stroke-width="2"/>
  </g>

  <!-- 小路 -->
  <path d="M680 580 Q500 530 400 500 Q300 480 200 470" fill="none" stroke="#d8b878" stroke-width="30" stroke-linecap="round" opacity="0.6"/>

  <!-- 青蛙（站在泥塘边吆喝） -->
  <g transform="translate(380, 410)">
    <!-- 身体 -->
    <ellipse cx="0" cy="10" rx="30" ry="22" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
    <!-- 肚子 -->
    <ellipse cx="0" cy="15" rx="20" ry="14" fill="#a8d0a8"/>
    <!-- 头 -->
    <ellipse cx="0" cy="-12" rx="22" ry="16" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
    <!-- 眼睛（凸起） -->
    <circle cx="-10" cy="-22" r="8" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
    <circle cx="10" cy="-22" r="8" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="2"/>
    <circle cx="-10" cy="-22" r="5" fill="#ffffff"/>
    <circle cx="10" cy="-22" r="5" fill="#ffffff"/>
    <circle cx="-10" cy="-22" r="2.5" fill="#2a2a2a"/>
    <circle cx="10" cy="-22" r="2.5" fill="#2a2a2a"/>
    <!-- 嘴（张开吆喝） -->
    <ellipse cx="0" cy="-5" rx="8" ry="5" fill="#7a3b14"/>
    <!-- 腿 -->
    <ellipse cx="-22" cy="28" rx="10" ry="6" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5" transform="rotate(-20 -22 28)"/>
    <ellipse cx="22" cy="28" rx="10" ry="6" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5" transform="rotate(20 22 28)"/>
    <!-- 手臂（举起吆喝） -->
    <path d="M-15 -5 Q-25 -20 -22 -35" fill="none" stroke="#6a8d3f" stroke-width="6" stroke-linecap="round"/>
    <circle cx="-22" cy="-36" r="5" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
  </g>

  <!-- 吆喝气泡 -->
  <path d="M310 340 Q310 320 330 320 L430 320 Q450 320 450 340 L450 370 Q450 390 430 390 L360 390 L345 405 L350 390 L330 390 Q310 390 310 370 Z" fill="#fff6df" stroke="#c8843a" stroke-width="2"/>
  <text x="380" y="365" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#7a3b14">卖泥塘喽！</text>

  <!-- 来买的小动物们 -->
  <!-- 老牛 -->
  <g transform="translate(150, 440)">
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <ellipse cx="25" cy="-8" r="16" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <ellipse cx="20" cy="-18" rx="8" ry="10" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <ellipse cx="32" cy="-18" rx="8" ry="10" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <circle cx="30" cy="-8" r="2" fill="#2a2a2a"/>
    <ellipse cx="38" cy="-2" rx="4" ry="3" fill="#5a3a1a"/>
    <line x1="-15" y1="15" x2="-15" y2="28" stroke="#5a3a1a" stroke-width="4"/>
    <line x1="15" y1="15" x2="15" y2="28" stroke="#5a3a1a" stroke-width="4"/>
  </g>

  <!-- 野鸭 -->
  <g transform="translate(580, 440)">
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="#7a3b14" stroke="#5a3a1a" stroke-width="1.5"/>
    <circle cx="18" cy="-5" r="10" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <polygon points="26,-5 32,-3 26,-1" fill="#f4c842" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="20" cy="-6" r="2" fill="#2a2a2a"/>
    <path d="M-10 -2 Q-20 -8 -15 5" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <line x1="-5" y1="12" x2="-5" y2="22" stroke="#f4a838" stroke-width="2.5"/>
    <line x1="5" y1="12" x2="5" y2="22" stroke="#f4a838" stroke-width="2.5"/>
  </g>

  <!-- 标注：青蛙 -->
  <line x1="380" y1="395" x2="380" y2="350" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="470" y="345" width="80" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="510" y="363" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">青蛙</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">青蛙听了大家的建议种草引水栽树种花，泥塘变得太美了，他自己都不想走了</text>
</svg>
