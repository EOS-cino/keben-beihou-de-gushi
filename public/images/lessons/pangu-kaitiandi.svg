<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="盘古分开天地插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">盘古开天地</text>
  <line x1="280" y1="62" x2="520" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 天（上方） -->
  <rect x="0" y="80" width="800" height="220" fill="#a8c8e8"/>
  <!-- 云朵 -->
  <g fill="#f8f8f0" opacity="0.8">
    <ellipse cx="120" cy="140" rx="40" ry="18"/>
    <ellipse cx="150" cy="135" rx="30" ry="15"/>
    <ellipse cx="600" cy="130" rx="45" ry="20"/>
    <ellipse cx="630" cy="125" rx="30" ry="15"/>
    <ellipse cx="350" cy="110" rx="35" ry="16"/>
  </g>
  <!-- 太阳 -->
  <circle cx="700" cy="170" r="35" fill="#f4c842" stroke="#d8a820" stroke-width="2"/>
  <g stroke="#f4c842" stroke-width="3" stroke-linecap="round">
    <line x1="700" y1="120" x2="700" y2="105"/>
    <line x1="700" y1="220" x2="700" y2="235"/>
    <line x1="650" y1="170" x2="635" y2="170"/>
    <line x1="750" y1="170" x2="765" y2="170"/>
  </g>

  <!-- 地（下方） -->
  <rect x="0" y="380" width="800" height="220" fill="#c8a878"/>
  <!-- 地面纹理 -->
  <path d="M0 400 Q200 395 400 400 T800 400" fill="none" stroke="#a88858" stroke-width="2"/>
  <path d="M0 440 Q200 435 400 440 T800 440" fill="none" stroke="#a88858" stroke-width="2"/>
  <path d="M0 480 Q200 475 400 480 T800 480" fill="none" stroke="#a88858" stroke-width="2"/>
  <!-- 山石 -->
  <g fill="#a88868" stroke="#8a6848" stroke-width="1.5">
    <ellipse cx="100" cy="500" rx="30" ry="15"/>
    <ellipse cx="680" cy="510" rx="35" ry="18"/>
    <ellipse cx="200" cy="540" rx="25" ry="12"/>
    <ellipse cx="600" cy="545" rx="28" ry="14"/>
  </g>

  <!-- 天地分开的缝隙（中间发光带） -->
  <rect x="0" y="295" width="800" height="20" fill="#f8e898" opacity="0.6"/>
  <rect x="0" y="300" width="800" height="10" fill="#fff8c8" opacity="0.8"/>
  <!-- 光芒线 -->
  <g stroke="#f4c842" stroke-width="2" opacity="0.5">
    <line x1="100" y1="300" x2="100" y2="280"/>
    <line x1="200" y1="300" x2="200" y2="275"/>
    <line x1="300" y1="300" x2="300" y2="280"/>
    <line x1="500" y1="300" x2="500" y2="280"/>
    <line x1="600" y1="300" x2="600" y2="275"/>
    <line x1="700" y1="300" x2="700" y2="280"/>
  </g>

  <!-- 盘古（巨人，顶天立地） -->
  <!-- 身体（强壮的躯干） -->
  <path d="M360 380 L365 260 L435 260 L440 380 Z" fill="#c87838" stroke="#8a4818" stroke-width="2.5"/>
  <!-- 肌肉线条 -->
  <path d="M380 280 Q400 290 420 280" fill="none" stroke="#a85828" stroke-width="1.5"/>
  <path d="M385 320 Q400 330 415 320" fill="none" stroke="#a85828" stroke-width="1.5"/>
  <!-- 头 -->
  <circle cx="400" cy="235" r="28" fill="#f0d0a8" stroke="#c89060" stroke-width="2"/>
  <!-- 头发（飘逸） -->
  <path d="M375 228 Q400 200 425 228 Q430 215 425 205 Q400 185 375 205 Q370 215 375 228" fill="#2a2a2a"/>
  <path d="M378 210 Q370 195 365 185" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <path d="M422 210 Q430 195 435 185" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- 眼睛（坚毅） -->
  <ellipse cx="390" cy="235" rx="3.5" ry="3" fill="#2a2a2a"/>
  <ellipse cx="410" cy="235" rx="3.5" ry="3" fill="#2a2a2a"/>
  <!-- 眉毛（怒目） -->
  <path d="M383 228 L395 230" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <path d="M405 230 L417 228" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- 嘴（用力） -->
  <path d="M390 248 Q400 252 410 248" fill="none" stroke="#7a3b14" stroke-width="2"/>
  <!-- 胡须 -->
  <path d="M392 252 Q400 262 408 252" fill="none" stroke="#3a3a3a" stroke-width="2"/>

  <!-- 双臂（上举顶天） -->
  <!-- 左臂 -->
  <path d="M365 270 L310 220 L290 200" fill="none" stroke="#c87838" stroke-width="16" stroke-linecap="round"/>
  <circle cx="288" cy="198" r="12" fill="#f0d0a8" stroke="#c89060" stroke-width="2"/>
  <!-- 右臂 -->
  <path d="M435 270 L490 220 L510 200" fill="none" stroke="#c87838" stroke-width="16" stroke-linecap="round"/>
  <circle cx="512" cy="198" r="12" fill="#f0d0a8" stroke="#c89060" stroke-width="2"/>

  <!-- 双腿（踏地） -->
  <path d="M370 380 L355 440 L350 480" fill="none" stroke="#c87838" stroke-width="16" stroke-linecap="round"/>
  <path d="M430 380 L445 440 L450 480" fill="none" stroke="#c87838" stroke-width="16" stroke-linecap="round"/>
  <!-- 脚 -->
  <ellipse cx="345" cy="485" rx="18" ry="10" fill="#f0d0a8" stroke="#c89060" stroke-width="2"/>
  <ellipse cx="455" cy="485" rx="18" ry="10" fill="#f0d0a8" stroke="#c89060" stroke-width="2"/>

  <!-- 斧头（盘古手持） -->
  <!-- 斧柄 -->
  <line x1="288" y1="198" x2="250" y2="150" stroke="#6a4220" stroke-width="6" stroke-linecap="round"/>
  <!-- 斧头 -->
  <path d="M240 145 L270 140 L275 165 L260 175 L245 165 Z" fill="#b0b0b0" stroke="#6a6a6a" stroke-width="2.5"/>
  <!-- 斧刃光泽 -->
  <path d="M250 148 L265 150 L262 160" fill="none" stroke="#e0e0e0" stroke-width="2"/>

  <!-- 盘古标注 -->
  <line x1="400" y1="200" x2="400" y2="160" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="355" y="135" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="153" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">盘古</text>

  <!-- 天标注 -->
  <line x1="150" y1="140" x2="150" y2="100" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="105" y="75" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="150" y="93" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">天（清气）</text>

  <!-- 地标注 -->
  <line x1="150" y1="440" x2="150" y2="480" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="105" y="485" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="150" y="503" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">地（浊气）</text>

  <!-- 斧头标注 -->
  <line x1="255" y1="140" x2="255" y2="100" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="210" y="75" width="90" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="255" y="93" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">开天斧</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">盘古持斧劈开混沌，清气上升为天，浊气下沉为地，顶天立地万八千年</text>
</svg>