<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="夏日大树下斑驳树影的自然插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#2d6a4f">夏日的树影</text>
  <line x1="348" y1="60" x2="452" y2="60" stroke="#e8a838" stroke-width="2"/>

  <!-- 烈日天空 -->
  <rect x="0" y="72" width="800" height="320" fill="#e8a838" opacity="0.1"/>
  <!-- 太阳 -->
  <circle cx="650" cy="140" r="38" fill="#e8a838" opacity="0.8"/>
  <circle cx="650" cy="140" r="30" fill="#f0c840"/>
  <g stroke="#e8a838" stroke-width="3" opacity="0.6">
    <line x1="650" y1="80" x2="650" y2="92"/>
    <line x1="650" y1="188" x2="650" y2="200"/>
    <line x1="590" y1="140" x2="602" y2="140"/>
    <line x1="698" y1="140" x2="710" y2="140"/>
    <line x1="608" y1="98" x2="616" y2="106"/>
    <line x1="692" y1="98" x2="684" y2="106"/>
    <line x1="608" y1="182" x2="616" y2="174"/>
    <line x1="692" y1="182" x2="684" y2="174"/>
  </g>

  <!-- 大树（老榆树） -->
  <g transform="translate(400 400)">
    <!-- 树干 -->
    <path d="M -30 80 Q -34 20 -26 -40 Q -22 -80 -18 -120 L 18 -120 Q 22 -80 26 -40 Q 34 20 30 80 Z" fill="#8a6a3a" stroke="#5a4a2a" stroke-width="2"/>
    <!-- 树干纹理 -->
    <path d="M -18 -60 Q -10 -40 -18 -20" fill="none" stroke="#6a5a3a" stroke-width="1.2"/>
    <path d="M 10 -80 Q 18 -50 10 -20" fill="none" stroke="#6a5a3a" stroke-width="1.2"/>
    <!-- 树根 -->
    <path d="M -30 70 Q -50 78 -64 80" fill="none" stroke="#5a4a2a" stroke-width="6" stroke-linecap="round"/>
    <path d="M 30 70 Q 50 78 64 80" fill="none" stroke="#5a4a2a" stroke-width="6" stroke-linecap="round"/>
    <!-- 树冠（密叶） -->
    <circle cx="-50" cy="-140" r="55" fill="#2d6a4f"/>
    <circle cx="0" cy="-170" r="65" fill="#3a7a5a"/>
    <circle cx="55" cy="-145" r="58" fill="#2d6a4f"/>
    <circle cx="-30" cy="-110" r="48" fill="#3a7a5a"/>
    <circle cx="35" cy="-115" r="50" fill="#2d6a4f"/>
    <circle cx="-70" cy="-100" r="38" fill="#3a7a5a"/>
    <circle cx="70" cy="-105" r="40" fill="#3a7a5a"/>
    <!-- 叶隙漏光（小亮斑） -->
    <g fill="#fef8d0" opacity="0.7">
      <circle cx="-30" cy="-150" r="3"/>
      <circle cx="20" cy="-130" r="2.5"/>
      <circle cx="-10" cy="-180" r="2"/>
      <circle cx="40" cy="-160" r="3"/>
    </g>
  </g>

  <!-- 地面（树荫） -->
  <rect x="0" y="470" width="800" height="130" fill="#e8d8a8"/>
  <!-- 树荫暗区 -->
  <ellipse cx="400" cy="490" rx="200" ry="40" fill="#2d6a4f" opacity="0.25"/>
  <!-- 斑驳光斑（亮斑） -->
  <g fill="#f0c840" opacity="0.7">
    <ellipse cx="320" cy="500" rx="10" ry="5"/>
    <ellipse cx="360" cy="520" rx="8" ry="4"/>
    <ellipse cx="440" cy="510" rx="12" ry="5"/>
    <ellipse cx="480" cy="530" rx="9" ry="4"/>
    <ellipse cx="340" cy="540" rx="7" ry="3"/>
    <ellipse cx="420" cy="545" rx="10" ry="4"/>
    <ellipse cx="500" cy="495" rx="8" ry="4"/>
  </g>
  <g fill="#fef8d0" opacity="0.6">
    <ellipse cx="300" cy="515" rx="6" ry="3"/>
    <ellipse cx="460" cy="525" rx="7" ry="3"/>
    <ellipse cx="380" cy="535" rx="5" ry="2"/>
  </g>

  <!-- 蝉（树干上） -->
  <g transform="translate(430 340)">
    <ellipse cx="0" cy="0" rx="8" ry="4" fill="#5a4a2a"/>
    <ellipse cx="0" cy="-2" rx="6" ry="3" fill="#8a6a3a"/>
    <!-- 翅膀 -->
    <ellipse cx="-4" cy="-1" rx="6" ry="2.5" fill="#c8d8c8" opacity="0.7" transform="rotate(-15 -4 -1)"/>
    <ellipse cx="4" cy="-1" rx="6" ry="2.5" fill="#c8d8c8" opacity="0.7" transform="rotate(15 4 -1)"/>
    <!-- 声波 -->
    <path d="M14 -2 Q22 -6 28 -2" fill="none" stroke="#e8a838" stroke-width="1.5" opacity="0.6"/>
    <path d="M14 2 Q24 6 30 2" fill="none" stroke="#e8a838" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- 树荫下乘凉的人 -->
  <g transform="translate(360 510)">
    <!-- 摇椅 -->
    <path d="M-30 10 L-26 -10 L26 -10 L30 10" fill="none" stroke="#8a6a3a" stroke-width="3"/>
    <path d="M-30 10 Q-20 20 -10 10 Q0 20 10 10 Q20 20 30 10" fill="none" stroke="#8a6a3a" stroke-width="3"/>
    <!-- 人 -->
    <ellipse cx="0" cy="-14" rx="14" ry="12" fill="#2d6a4f"/>
    <circle cx="0" cy="-34" r="10" fill="#f4d4a8"/>
    <path d="M-10 -38 Q0 -46 10 -38 L10 -32 Q0 -28 -10 -32 Z" fill="#3a3a3a"/>
    <!-- 蒲扇 -->
    <path d="M14 -28 Q34 -34 38 -20 Q34 -10 14 -16 Z" fill="#e8a838" stroke="#8a5a14" stroke-width="1.2"/>
    <line x1="14" y1="-22" x2="6" y2="-14" stroke="#8a5a14" stroke-width="2"/>
  </g>

  <!-- 西瓜 -->
  <g transform="translate(510 540)">
    <path d="M-25 0 A25 12 0 0 1 25 0 Z" fill="#e07856"/>
    <path d="M-25 0 A25 12 0 0 1 25 0" fill="none" stroke="#2d6a4f" stroke-width="3"/>
    <g fill="#2a2a2a">
      <ellipse cx="-10" cy="-4" rx="1.5" ry="2.5"/>
      <ellipse cx="0" cy="-6" rx="1.5" ry="2.5"/>
      <ellipse cx="10" cy="-3" rx="1.5" ry="2.5"/>
    </g>
  </g>

  <!-- 黄狗 -->
  <g transform="translate(250 530)">
    <ellipse cx="0" cy="0" rx="22" ry="10" fill="#e8a838"/>
    <circle cx="18" cy="-6" r="9" fill="#e8a838"/>
    <path d="M24 -12 L28 -16 L26 -8" fill="#e8a838"/>
    <path d="M16 -12 L13 -16 L18 -12" fill="#e8a838"/>
    <circle cx="21" cy="-7" r="1.5" fill="#2a2a2a"/>
    <!-- 吐舌头 -->
    <ellipse cx="24" cy="-2" rx="2" ry="3" fill="#e07856"/>
    <!-- 尾巴 -->
    <path d="M-22 -4 Q-30 -10 -28 -16" fill="none" stroke="#e8a838" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- 标注 -->
  <line x1="440" y1="510" x2="580" y2="450" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="560" y="432" width="120" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="620" y="450" text-anchor="middle" font-family="serif" font-size="13" fill="#8a5a14">蝉鸣声声</text>

  <line x1="400" y1="495" x2="400" y2="430" stroke="#2d6a4f" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="340" y="404" width="120" height="26" fill="#fff6df" stroke="#2d6a4f" rx="4"/>
  <text x="400" y="422" text-anchor="middle" font-family="serif" font-size="13" fill="#2d6a4f">斑驳的树影</text>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="15" fill="#2d6a4f">烈日当头，一片树荫就是一座清凉的小国</text>
</svg>
