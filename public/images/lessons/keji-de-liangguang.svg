<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="从火把到油灯到电灯到LED的演变插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">科技的亮光</text>
  <line x1="320" y1="56" x2="480" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——从火把到LED，人类点亮黑夜</text>

  <!-- 时间轴 -->
  <line x1="80" y1="320" x2="720" y2="320" stroke="#c8843a" stroke-width="3"/>
  <circle cx="160" cy="320" r="8" fill="#c84a3a"/>
  <circle cx="340" cy="320" r="8" fill="#e8a838"/>
  <circle cx="520" cy="320" r="8" fill="#e07856"/>
  <circle cx="660" cy="320" r="8" fill="#4a90b8"/>

  <!-- 火把 -->
  <g transform="translate(160, 180)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#c84a3a">几万年前</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">火把</text>
    <g transform="translate(0, 50)">
      <!-- 木棍 -->
      <rect x="-3" y="20" width="6" height="60" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
      <!-- 火焰 -->
      <path d="M-10 20 Q-12 5 -5 -5 Q0 -15 5 -5 Q12 5 10 20 Q5 25 0 22 Q-5 25 -10 20" fill="#e8a838" stroke="#c84a3a" stroke-width="1.5"/>
      <path d="M-5 15 Q-6 5 0 -2 Q6 5 5 15 Q2 18 0 16 Q-2 18 -5 15" fill="#e07856"/>
      <!-- 光芒 -->
      <line x1="-18" y1="0" x2="-22" y2="-3" stroke="#e8a838" stroke-width="1.5" opacity="0.6"/>
      <line x1="18" y1="0" x2="22" y2="-3" stroke="#e8a838" stroke-width="1.5" opacity="0.6"/>
      <text x="0" y="100" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">会灭·会冒烟</text>
    </g>
  </g>

  <!-- 油灯 -->
  <g transform="translate(340, 180)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#e8a838">几千年前</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">油灯</text>
    <g transform="translate(0, 50)">
      <!-- 灯碗 -->
      <path d="M-18 30 Q-18 50 0 50 Q18 50 18 30 Z" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 油 -->
      <ellipse cx="0" cy="32" rx="15" ry="3" fill="#e8a838" opacity="0.5"/>
      <!-- 灯芯 -->
      <rect x="-1" y="20" width="2" height="12" fill="#7a3b14"/>
      <!-- 火苗 -->
      <path d="M-4 20 Q-5 10 0 5 Q5 10 4 20 Q2 22 0 20 Q-2 22 -4 20" fill="#e8a838" stroke="#c84a3a" stroke-width="1"/>
      <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">稳一些·还是冒烟</text>
    </g>
  </g>

  <!-- 电灯 -->
  <g transform="translate(520, 180)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#e07856">1879年</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">电灯</text>
    <g transform="translate(0, 50)">
      <!-- 灯泡 -->
      <ellipse cx="0" cy="15" rx="20" ry="25" fill="#fef9ed" stroke="#7a3b14" stroke-width="2"/>
      <!-- 灯丝 -->
      <path d="M-6 15 Q-3 8 0 15 Q3 22 6 15" fill="none" stroke="#e8a838" stroke-width="2"/>
      <!-- 螺纹 -->
      <rect x="-8" y="38" width="16" height="8" fill="#8d5a36" stroke="#7a3b14" stroke-width="1"/>
      <line x1="-8" y1="42" x2="8" y2="42" stroke="#7a3b14" stroke-width="0.5"/>
      <line x1="-8" y1="45" x2="8" y2="45" stroke="#7a3b14" stroke-width="0.5"/>
      <!-- 光芒 -->
      <line x1="-28" y1="10" x2="-33" y2="8" stroke="#e8a838" stroke-width="1.5" opacity="0.7"/>
      <line x1="28" y1="10" x2="33" y2="8" stroke="#e8a838" stroke-width="1.5" opacity="0.7"/>
      <line x1="0" y1="-15" x2="0" y2="-20" stroke="#e8a838" stroke-width="1.5" opacity="0.7"/>
      <text x="0" y="75" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">亮得久·不冒烟</text>
    </g>
  </g>

  <!-- LED -->
  <g transform="translate(660, 180)">
    <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#4a90b8">现在</text>
    <text x="0" y="18" text-anchor="middle" font-family="serif" font-size="11" fill="#8d5a36">LED</text>
    <g transform="translate(0, 50)">
      <!-- LED灯管 -->
      <rect x="-25" y="15" width="50" height="14" rx="7" fill="#fef9ed" stroke="#7a3b14" stroke-width="2"/>
      <rect x="-20" y="18" width="40" height="8" rx="4" fill="#4a90b8" opacity="0.7"/>
      <!-- 光芒 -->
      <line x1="-30" y1="5" x2="-35" y2="0" stroke="#4a90b8" stroke-width="1.5" opacity="0.7"/>
      <line x1="30" y1="5" x2="35" y2="0" stroke="#4a90b8" stroke-width="1.5" opacity="0.7"/>
      <line x1="0" y1="0" x2="0" y2="-8" stroke="#4a90b8" stroke-width="1.5" opacity="0.7"/>
      <text x="0" y="50" text-anchor="middle" font-family="serif" font-size="9" fill="#7a3b14">省电·寿命长</text>
    </g>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 430)">
    <rect x="-320" y="0" width="640" height="120" rx="10" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="28" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">每一次"亮一点"，背后都是无数人的努力</text>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">火把几万年 · 油灯几千年 · 电灯一百多年 · LED越来越快</text>
    <text x="0" y="80" text-anchor="middle" font-family="serif" font-size="12" fill="#8d5a36">越到后面走得越快，因为知识积累得越多</text>
    <text x="0" y="108" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">科技的进步，是一代代人想办法、试错、再试的结果</text>
  </g>
</svg>
