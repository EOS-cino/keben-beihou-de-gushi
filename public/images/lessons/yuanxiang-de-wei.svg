<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="故乡老屋炊烟与家乡饭菜插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">故乡的味</text>
  <line x1="320" y1="60" x2="480" y2="60" stroke="#e8a838" stroke-width="2"/>

  <!-- 黄昏天空 -->
  <rect x="0" y="80" width="800" height="260" fill="#e8a838" opacity="0.18"/>
  <rect x="0" y="80" width="800" height="120" fill="#e07856" opacity="0.12"/>
  <!-- 落日 -->
  <circle cx="650" cy="180" r="40" fill="#e8a838" opacity="0.7"/>
  <circle cx="650" cy="180" r="28" fill="#e07856" opacity="0.5"/>

  <!-- 远山 -->
  <path d="M0 300 L120 240 L240 280 L360 230 L480 275 L600 235 L720 280 L800 260 L800 340 L0 340 Z" fill="#2d6a4f" opacity="0.35"/>

  <!-- 老屋 -->
  <g transform="translate(180, 340)">
    <!-- 屋顶 -->
    <path d="M-90 0 L0 -70 L90 0 Z" fill="#6a4220" stroke="#4a2a10" stroke-width="2"/>
    <path d="M-90 0 L0 -70 L90 0 L80 8 L0 -62 L-80 8 Z" fill="#4a2a10" opacity="0.4"/>
    <!-- 墙 -->
    <rect x="-70" y="0" width="140" height="100" fill="#e8d8b8" stroke="#c8a878" stroke-width="2"/>
    <!-- 门 -->
    <rect x="-20" y="40" width="40" height="60" fill="#6a4220" stroke="#4a2a10" stroke-width="2"/>
    <circle cx="-5" cy="70" r="2" fill="#e8a838"/>
    <!-- 窗 -->
    <rect x="-60" y="20" width="30" height="30" fill="#4a90b8" opacity="0.4" stroke="#6a4220" stroke-width="2"/>
    <line x1="-45" y1="20" x2="-45" y2="50" stroke="#6a4220" stroke-width="1.5"/>
    <line x1="-60" y1="35" x2="-30" y2="35" stroke="#6a4220" stroke-width="1.5"/>
    <rect x="30" y="20" width="30" height="30" fill="#e8a838" opacity="0.4" stroke="#6a4220" stroke-width="2"/>
    <line x1="45" y1="20" x2="45" y2="50" stroke="#6a4220" stroke-width="1.5"/>
    <line x1="30" y1="35" x2="60" y2="35" stroke="#6a4220" stroke-width="1.5"/>
  </g>

  <!-- 烟囱与炊烟 -->
  <rect x="220" y="280" width="20" height="40" fill="#6a4220" stroke="#4a2a10" stroke-width="2"/>
  <g fill="none" stroke="#c8c8b8" stroke-width="6" stroke-linecap="round" opacity="0.6">
    <path d="M230 280 Q220 250 235 220 Q250 195 240 165 Q230 140 245 115"/>
    <path d="M230 280 Q240 255 225 230 Q215 205 230 180"/>
  </g>

  <!-- 老槐树 -->
  <g transform="translate(560, 340)">
    <rect x="-8" y="0" width="16" height="100" fill="#6a4220" stroke="#4a2a10" stroke-width="2"/>
    <circle cx="0" cy="-20" r="55" fill="#2d6a4f"/>
    <circle cx="-30" cy="-5" r="32" fill="#2d6a4f" opacity="0.85"/>
    <circle cx="30" cy="-10" r="30" fill="#2d6a4f" opacity="0.85"/>
    <circle cx="0" cy="-50" r="28" fill="#2d6a4f" opacity="0.9"/>
  </g>

  <!-- 地面 -->
  <rect x="0" y="440" width="800" height="160" fill="#c8a878" opacity="0.4"/>
  <path d="M0 445 Q200 440 400 445 T800 445" fill="none" stroke="#a88858" stroke-width="2"/>

  <!-- 饭桌与饭菜 -->
  <g transform="translate(400, 470)">
    <!-- 桌子 -->
    <rect x="-80" y="0" width="160" height="14" fill="#6a4220" stroke="#4a2a10" stroke-width="2"/>
    <rect x="-70" y="14" width="10" height="50" fill="#6a4220"/>
    <rect x="60" y="14" width="10" height="50" fill="#6a4220"/>
    <!-- 小米粥碗 -->
    <g transform="translate(-45, -20)">
      <path d="M-18 0 Q-18 18 0 18 Q18 18 18 0 Z" fill="#f0d8a0" stroke="#c88820" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="18" ry="6" fill="#e8a838" opacity="0.7"/>
      <ellipse cx="0" cy="-1" rx="12" ry="3" fill="#fff8c8" opacity="0.6"/>
    </g>
    <!-- 烙饼盘 -->
    <g transform="translate(10, -18)">
      <ellipse cx="0" cy="0" rx="26" ry="8" fill="#c88820" stroke="#6a4220" stroke-width="1.5"/>
      <ellipse cx="0" cy="-2" rx="22" ry="6" fill="#e8a838"/>
      <path d="M-10 -2 Q0 -6 10 -2" fill="none" stroke="#c88820" stroke-width="1"/>
    </g>
    <!-- 蒸汽 -->
    <g fill="none" stroke="#c8c8b8" stroke-width="3" stroke-linecap="round" opacity="0.6">
      <path d="M-45 -28 Q-50 -40 -42 -50 Q-38 -60 -45 -70"/>
      <path d="M10 -26 Q5 -38 14 -48 Q18 -58 10 -68"/>
    </g>
  </g>

  <!-- 标注 -->
  <line x1="230" y1="220" x2="230" y2="180" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="180" y="150" width="100" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="230" y="168" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">袅袅炊烟</text>

  <line x1="-35" y1="0" x2="-35" y2="0" transform="translate(400,470)" stroke="none"/>
  <line x1="355" y1="450" x2="320" y2="420" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="250" y="395" width="100" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="300" y="413" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">金黄米油</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">炊烟升起，一碗粥一张饼，是藏在味道里的乡愁</text>
</svg>
