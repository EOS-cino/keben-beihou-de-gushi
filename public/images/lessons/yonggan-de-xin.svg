<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="孩子面对挑战鼓起勇气的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">勇敢的心</text>
  <line x1="330" y1="62" x2="470" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 体育馆背景 -->
  <rect x="0" y="80" width="800" height="300" fill="#fff6df" opacity="0.5"/>
  <!-- 地面 -->
  <rect x="0" y="380" width="800" height="220" fill="#d8c9a8"/>

  <!-- 跳马 -->
  <g transform="translate(480, 280)">
    <!-- 马身 -->
    <rect x="-50" y="0" width="100" height="50" rx="8" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="-50" y="0" width="100" height="12" rx="6" fill="#a06a3a" stroke="#5a3a1a" stroke-width="1.5"/>
    <!-- 马腿 -->
    <rect x="-45" y="50" width="10" height="50" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="1.5"/>
    <rect x="35" y="50" width="10" height="50" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="1.5"/>
    <!-- 高度标 -->
    <line x1="70" y1="0" x2="70" y2="100" stroke="#c84a3a" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="80" y="55" font-family="serif" font-size="11" fill="#c84a3a">最高</text>
  </g>

  <!-- 小明（助跑线上） -->
  <g transform="translate(180, 340)">
    <!-- 身体 -->
    <path d="M-12 30 L-8 -10 Q0 -20 8 -10 L12 30 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 头 -->
    <circle cx="0" cy="-22" r="14" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 头发 -->
    <path d="M-13 -22 Q-13 -36 0 -36 Q13 -36 13 -22" fill="#2a2a2a"/>
    <!-- 眼睛（紧张） -->
    <ellipse cx="-5" cy="-22" rx="2" ry="3" fill="#2a2a2a"/>
    <ellipse cx="5" cy="-22" rx="2" ry="3" fill="#2a2a2a"/>
    <!-- 嘴（抿着） -->
    <line x1="-3" y1="-14" x2="3" y2="-14" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 汗滴 -->
    <ellipse cx="-16" cy="-25" rx="2" ry="4" fill="#7ab8d8" opacity="0.7"/>
    <ellipse cx="16" cy="-24" rx="2" ry="4" fill="#7ab8d8" opacity="0.7"/>
    <!-- 腿（发抖，用波浪表示） -->
    <path d="M-8 30 Q-10 45 -8 60 L-4 60 Q-6 45 -4 30" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="1.5"/>
    <path d="M4 30 Q6 45 4 60 L8 60 Q10 45 8 30" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="1.5"/>
    <!-- 抖动线 -->
    <g stroke="#c84a3a" stroke-width="1" opacity="0.5">
      <path d="M-14 45 Q-12 43 -10 45"/>
      <path d="M10 45 Q12 43 14 45"/>
    </g>
  </g>

  <!-- 心跳 -->
  <g transform="translate(180, 290)">
    <path d="M-20 0 L-10 0 L-5 -15 L0 10 L5 -20 L10 5 L20 0" fill="none" stroke="#c84a3a" stroke-width="2.5"/>
    <text x="0" y="-25" text-anchor="middle" font-family="serif" font-size="11" fill="#c84a3a">咚咚！</text>
  </g>

  <!-- 同学们（观众） -->
  <g transform="translate(600, 360)">
    <g transform="translate(0, 0)">
      <circle cx="0" cy="0" r="10" fill="#f0d0a8"/>
      <path d="M-10 0 Q-10 -10 0 -10 Q10 -10 10 0" fill="#2a2a2a"/>
      <rect x="-8" y="10" width="16" height="20" fill="#6a8d3f"/>
    </g>
    <g transform="translate(30, 0)">
      <circle cx="0" cy="0" r="10" fill="#f0d0a8"/>
      <path d="M-10 0 Q-10 -10 0 -10 Q10 -10 10 0" fill="#5a3a1a"/>
      <rect x="-8" y="10" width="16" height="20" fill="#7ab8d8"/>
    </g>
    <g transform="translate(60, 0)">
      <circle cx="0" cy="0" r="10" fill="#f0d0a8"/>
      <path d="M-10 0 Q-10 -10 0 -10 Q10 -10 10 0" fill="#2a2a2a"/>
      <rect x="-8" y="10" width="16" height="20" fill="#e07856"/>
    </g>
    <!-- 鼓掌手 -->
    <g fill="#f0d0a8">
      <circle cx="-5" cy="35" r="3"/>
      <circle cx="5" cy="35" r="3"/>
      <circle cx="25" cy="35" r="3"/>
      <circle cx="35" cy="35" r="3"/>
      <circle cx="55" cy="35" r="3"/>
      <circle cx="65" cy="35" r="3"/>
    </g>
  </g>

  <!-- 助跑虚线 -->
  <path d="M200 400 Q300 395 400 395 Q440 395 460 380" fill="none" stroke="#c8843a" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- 标注：害怕 -->
  <line x1="164" y1="316" x2="120" y2="280" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="60" y="255" width="110" height="26" fill="#fff6df" stroke="#c84a3a" rx="4"/>
  <text x="115" y="273" text-anchor="middle" font-family="serif" font-size="14" fill="#c84a3a">害怕·但敢跳</text>

  <!-- 底部说明 -->
  <rect x="80" y="500" width="640" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="8" opacity="0.85"/>
  <text x="400" y="525" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">勇敢不是不害怕——</text>
  <text x="400" y="548" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">而是害怕了，深吸一口气，还是跑了出去</text>
</svg>
