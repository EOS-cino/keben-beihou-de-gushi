<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一栋老旧的瓦房在夕阳下的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 夕阳天空 -->
  <rect x="0" y="0" width="800" height="400" fill="#e8a838" opacity="0.12"/>
  <rect x="0" y="0" width="800" height="250" fill="#e07856" opacity="0.06"/>
  <!-- 太阳 -->
  <circle cx="650" cy="150" r="40" fill="#e8a838" opacity="0.4"/>
  <circle cx="650" cy="150" r="25" fill="#e8a838" opacity="0.5"/>
  <!-- 远山 -->
  <path d="M0 320 Q150 270 300 300 Q450 260 600 290 Q700 270 800 310 L800 400 L0 400 Z" fill="#2d6a4f" opacity="0.15"/>
  <!-- 地面 -->
  <rect x="0" y="380" width="800" height="220" fill="#dceee3"/>
  <rect x="0" y="440" width="800" height="160" fill="#9fc8b4" opacity="0.3"/>
  <!-- 老屋 -->
  <g transform="translate(380 380)">
    <!-- 屋顶（瓦片） -->
    <path d="M-120 0 L0 -90 L120 0 Z" fill="#8b6f47"/>
    <path d="M-120 0 L0 -90 L120 0 L115 5 L0 -85 L-115 5 Z" fill="#6b5535"/>
    <!-- 瓦片纹理 -->
    <g stroke="#6b5535" stroke-width="1.5" fill="none" opacity="0.5">
      <path d="M-100 -10 Q0 -70 100 -10"/>
      <path d="M-80 -25 Q0 -55 80 -25"/>
      <path d="M-60 -40 Q0 -40 60 -40"/>
    </g>
    <!-- 墙 -->
    <rect x="-95" y="0" width="190" height="100" fill="#f4e4c4"/>
    <!-- 墙面斑驳 -->
    <g fill="#d4c4a4" opacity="0.4">
      <rect x="-80" y="20" width="25" height="15"/>
      <rect x="50" y="50" width="20" height="20"/>
      <rect x="-30" y="70" width="30" height="10"/>
    </g>
    <!-- 门 -->
    <rect x="-20" y="40" width="40" height="60" fill="#6b5535"/>
    <line x1="0" y1="40" x2="0" y2="100" stroke="#4a3a25" stroke-width="1.5"/>
    <circle cx="-8" cy="70" r="2" fill="#e8a838"/>
    <circle cx="8" cy="70" r="2" fill="#e8a838"/>
    <!-- 窗 -->
    <rect x="-75" y="20" width="35" height="30" fill="#4a90b8" opacity="0.3" stroke="#6b5535" stroke-width="2"/>
    <rect x="40" y="20" width="35" height="30" fill="#4a90b8" opacity="0.3" stroke="#6b5535" stroke-width="2"/>
    <line x1="-57.5" y1="20" x2="-57.5" y2="50" stroke="#6b5535" stroke-width="1.5"/>
    <line x1="-75" y1="35" x2="-40" y2="35" stroke="#6b5535" stroke-width="1.5"/>
    <line x1="57.5" y1="20" x2="57.5" y2="50" stroke="#6b5535" stroke-width="1.5"/>
    <line x1="40" y1="35" x2="75" y2="35" stroke="#6b5535" stroke-width="1.5"/>
    <!-- 烟囱 -->
    <rect x="40" y="-70" width="18" height="30" fill="#6b5535"/>
    <!-- 屋顶杂草 -->
    <g fill="#2d6a4f" opacity="0.5">
      <path d="M-50 -60 L-48 -68 L-46 -60 Z"/>
      <path d="M30 -75 L32 -83 L34 -75 Z"/>
      <path d="M-20 -70 L-18 -78 L-16 -70 Z"/>
    </g>
  </g>
  <!-- 院墙 -->
  <g fill="#d4c4a4" opacity="0.6">
    <rect x="100" y="420" width="180" height="50"/>
    <rect x="520" y="420" width="180" height="50"/>
  </g>
  <!-- 老树 -->
  <g transform="translate(150 440)">
    <path d="M-5 0 Q-3 -60 -2 -120 Q0 -130 2 -120 Q3 -60 5 0 Z" fill="#6b5535"/>
    <path d="M0 -100 Q-25 -120 -45 -115" stroke="#6b5535" stroke-width="3" fill="none"/>
    <path d="M0 -100 Q25 -120 45 -115" stroke="#6b5535" stroke-width="3" fill="none"/>
    <path d="M0 -110 Q-15 -130 -30 -140" stroke="#6b5535" stroke-width="2.5" fill="none"/>
    <path d="M0 -110 Q15 -130 30 -140" stroke="#6b5535" stroke-width="2.5" fill="none"/>
    <circle cx="-40" cy="-115" r="15" fill="#2d6a4f" opacity="0.3"/>
    <circle cx="40" cy="-115" r="15" fill="#2d6a4f" opacity="0.3"/>
    <circle cx="0" cy="-130" r="18" fill="#2d6a4f" opacity="0.3"/>
  </g>
  <!-- 青苔/草 -->
  <g fill="#2d6a4f" opacity="0.4">
    <path d="M280 480 Q285 460 280 450 Q290 460 295 480 Z"/>
    <path d="M500 480 Q505 460 500 450 Q510 460 515 480 Z"/>
    <path d="M600 490 Q605 470 600 460 Q610 470 615 490 Z"/>
  </g>
  <!-- 飞鸟 -->
  <g fill="none" stroke="#6b5535" stroke-width="2" stroke-linecap="round" opacity="0.4">
    <path d="M200 100 Q205 95 210 100 Q215 95 220 100"/>
    <path d="M250 120 Q255 115 260 120 Q265 115 270 120"/>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" font-weight="700" fill="#2d6a4f">老屋</text>
  <text x="400" y="82" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#7a7468">一栋站了一百年的房子，和它记住的故事</text>
</svg>
