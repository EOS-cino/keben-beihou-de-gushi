<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="城市广场上人们散步放风筝跳广场舞的生活插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="42" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">广场的故事</text>
  <line x1="330" y1="56" x2="470" y2="56" stroke="#c8843a" stroke-width="3"/>
  <text x="400" y="78" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">——一个广场，装着一座城的日子</text>

  <!-- 广场地面 -->
  <rect x="40" y="180" width="720" height="280" fill="#c8843a" opacity="0.18" stroke="#8d5a36" stroke-width="1.5"/>
  <line x1="400" y1="180" x2="400" y2="460" stroke="#fef9ed" stroke-width="1" opacity="0.6"/>
  <line x1="40" y1="320" x2="760" y2="320" stroke="#fef9ed" stroke-width="1" opacity="0.6"/>

  <!-- 清晨：打太极的老人 -->
  <g transform="translate(140, 260)">
    <circle cx="0" cy="0" r="10" fill="#e07856" stroke="#7a3b14" stroke-width="1.2"/>
    <ellipse cx="0" cy="30" rx="16" ry="22" fill="#6a8d3f" stroke="#7a3b14" stroke-width="1.2"/>
    <path d="M-16 18 Q-30 10 -32 20" fill="none" stroke="#6a8d3f" stroke-width="5" stroke-linecap="round"/>
    <path d="M16 18 Q30 10 32 20" fill="none" stroke="#6a8d3f" stroke-width="5" stroke-linecap="round"/>
    <text x="0" y="65" text-anchor="middle" font-family="serif" font-size="10" fill="#2d6a4f">清晨·太极</text>
  </g>

  <!-- 下午：放风筝的孩子 -->
  <g transform="translate(620, 280)">
    <circle cx="0" cy="0" r="9" fill="#e8a838" stroke="#7a3b14" stroke-width="1.2"/>
    <ellipse cx="0" cy="26" rx="13" ry="17" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.2"/>
    <path d="M12 14 Q40 -10 30 -50" fill="none" stroke="#7a3b14" stroke-width="1.2"/>
    <!-- 风筝 -->
    <polygon points="30,-50 44,-58 30,-66 16,-58" fill="#e07856" stroke="#7a3b14" stroke-width="1.2"/>
    <path d="M30 -50 L30 -36" stroke="#7a3b14" stroke-width="1"/>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a">下午·风筝</text>
  </g>

  <!-- 傍晚：散步的一家三口 -->
  <g transform="translate(300, 320)">
    <circle cx="0" cy="0" r="9" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.2"/>
    <ellipse cx="0" cy="26" rx="13" ry="17" fill="#7a3b14"/>
    <circle cx="22" cy="2" r="8" fill="#e07856" stroke="#7a3b14" stroke-width="1.2"/>
    <ellipse cx="22" cy="26" rx="11" ry="15" fill="#e07856" stroke="#7a3b14" stroke-width="1.2"/>
    <circle cx="44" cy="8" r="7" fill="#e8a838" stroke="#7a3b14" stroke-width="1.2"/>
    <ellipse cx="44" cy="28" rx="10" ry="14" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.2"/>
    <text x="22" y="55" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">傍晚·一家三口</text>
  </g>

  <!-- 入夜：广场舞 -->
  <g transform="translate(540, 360)">
    <circle cx="0" cy="0" r="8" fill="#e07856" stroke="#7a3b14" stroke-width="1.2"/>
    <ellipse cx="0" cy="22" rx="11" ry="14" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.2"/>
    <path d="M-11 10 Q-22 4 -24 14" fill="none" stroke="#c84a3a" stroke-width="4" stroke-linecap="round"/>
    <path d="M11 10 Q22 4 24 14" fill="none" stroke="#c84a3a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="40" cy="0" r="8" fill="#e07856" stroke="#7a3b14" stroke-width="1.2"/>
    <ellipse cx="40" cy="22" rx="11" ry="14" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.2"/>
    <path d="M29 10 Q18 4 16 14" fill="none" stroke="#c84a3a" stroke-width="4" stroke-linecap="round"/>
    <text x="20" y="50" text-anchor="middle" font-family="serif" font-size="10" fill="#c84a3a">入夜·广场舞</text>
  </g>

  <!-- 音符 -->
  <g fill="#7a3b14" opacity="0.6">
    <text x="500" y="250" font-family="serif" font-size="16">♪</text>
    <text x="560" y="240" font-family="serif" font-size="14">♫</text>
  </g>

  <!-- 时间轴 -->
  <g transform="translate(0, 480)" font-family="serif" font-size="11">
    <line x1="60" y1="0" x2="740" y2="0" stroke="#c8843a" stroke-width="2"/>
    <circle cx="140" cy="0" r="5" fill="#6a8d3f"/><text x="140" y="-10" text-anchor="middle" fill="#2d6a4f">清晨</text>
    <circle cx="300" cy="0" r="5" fill="#8d5a36"/><text x="300" y="-10" text-anchor="middle" fill="#7a3b14">傍晚</text>
    <circle cx="540" cy="0" r="5" fill="#c84a3a"/><text x="540" y="-10" text-anchor="middle" fill="#c84a3a">入夜</text>
    <circle cx="620" cy="0" r="5" fill="#4a90b8"/><text x="620" y="-10" text-anchor="middle" fill="#4a90b8">下午</text>
  </g>

  <!-- 底部引言 -->
  <g transform="translate(400, 530)">
    <rect x="-300" y="0" width="600" height="50" rx="8" fill="#fef9ed" stroke="#c8843a" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="22" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">广场是这座城的"客厅"，谁都能来，谁都能待</text>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="13" fill="#c84a3a">同一块地方，不同时段是不同的"剧场"</text>
  </g>
</svg>
