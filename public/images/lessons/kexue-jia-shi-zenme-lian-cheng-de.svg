<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="科学家在实验室工作的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">科学家是怎么炼成的</text>
  <line x1="250" y1="62" x2="550" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 实验室背景墙 -->
  <rect x="40" y="90" width="720" height="380" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="8"/>

  <!-- 书架（左上） -->
  <g transform="translate(70, 110)">
    <rect x="0" y="0" width="140" height="80" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="8" y="8" width="20" height="64" fill="#c84a3a"/>
    <rect x="30" y="8" width="20" height="64" fill="#6a8d3f"/>
    <rect x="52" y="8" width="20" height="64" fill="#7ab8d8"/>
    <rect x="74" y="8" width="20" height="64" fill="#e07856"/>
    <rect x="96" y="12" width="20" height="60" fill="#c8843a"/>
    <rect x="118" y="8" width="14" height="64" fill="#4a6a2f"/>
  </g>

  <!-- 显微镜（右上） -->
  <g transform="translate(640, 130)">
    <rect x="-15" y="50" width="30" height="15" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="1.5"/>
    <rect x="-8" y="20" width="16" height="32" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <circle cx="0" cy="15" r="10" fill="#a8d0e8" stroke="#7a3b14" stroke-width="1.5"/>
    <rect x="-4" y="-10" width="8" height="28" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <circle cx="0" cy="-12" r="6" fill="#5a3a1a"/>
  </g>

  <!-- 居里夫人（中）搅锅 -->
  <g transform="translate(320, 250)">
    <!-- 锅 -->
    <ellipse cx="0" cy="80" rx="60" ry="12" fill="#3a2a1a"/>
    <path d="M-60 80 L-50 130 L50 130 L60 80" fill="#5a3a1a" stroke="#3a2a1a" stroke-width="2"/>
    <ellipse cx="0" cy="80" rx="55" ry="10" fill="#2a2a2a"/>
    <!-- 矿浆气泡 -->
    <circle cx="-20" cy="75" r="3" fill="#8d5a36" opacity="0.6"/>
    <circle cx="15" cy="72" r="4" fill="#8d5a36" opacity="0.6"/>
    <circle cx="30" cy="78" r="2" fill="#8d5a36" opacity="0.6"/>
    <!-- 搅拌棒 -->
    <line x1="10" y1="80" x2="20" y2="-20" stroke="#5a3a1a" stroke-width="4"/>
    <!-- 人物 -->
    <path d="M-15 0 L-12 -40 Q-5 -50 5 -50 Q15 -50 12 -40 L15 0 Z" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5"/>
    <circle cx="0" cy="-58" r="14" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 头发（盘发） -->
    <path d="M-13 -58 Q-13 -72 0 -72 Q13 -72 13 -58" fill="#5a3a1a"/>
    <circle cx="0" cy="-72" r="6" fill="#5a3a1a"/>
    <!-- 眼睛 -->
    <circle cx="-4" cy="-58" r="1.5" fill="#2a2a2a"/>
    <circle cx="4" cy="-58" r="1.5" fill="#2a2a2a"/>
    <!-- 手 -->
    <path d="M12 -35 L20 -20" fill="none" stroke="#f0d0a8" stroke-width="6" stroke-linecap="round"/>
    <!-- 镭光（小瓶） -->
    <g transform="translate(80, 100)">
      <rect x="-6" y="0" width="12" height="20" rx="2" fill="#a8d0e8" opacity="0.3" stroke="#7ab8d8" stroke-width="1"/>
      <circle cx="0" cy="10" r="3" fill="#a8d0e8" opacity="0.8"/>
      <path d="M-3 10 L3 10 M0 7 L0 13" stroke="#fef9ed" stroke-width="0.8" opacity="0.6"/>
    </g>
  </g>
  <line x1="400" y1="350" x2="430" y2="320" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="395" y="295" width="80" height="24" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="435" y="312" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">镭·发光</text>

  <!-- 爱迪生灯泡（右下） -->
  <g transform="translate(620, 320)">
    <!-- 灯泡 -->
    <ellipse cx="0" cy="0" rx="25" ry="30" fill="#fef9ed" stroke="#7a3b14" stroke-width="2" opacity="0.8"/>
    <rect x="-8" y="28" width="16" height="12" fill="#8d5a36" stroke="#5a3a1a" stroke-width="1.5"/>
    <!-- 灯丝 -->
    <path d="M-5 5 Q0 -10 5 5" fill="none" stroke="#e07856" stroke-width="2"/>
    <!-- 光芒 -->
    <g stroke="#e07856" stroke-width="1.5" opacity="0.5">
      <line x1="0" y1="-40" x2="0" y2="-50"/>
      <line x1="-30" y1="-15" x2="-40" y2="-20"/>
      <line x1="30" y1="-15" x2="40" y2="-20"/>
      <line x1="-20" y1="-35" x2="-28" y2="-42"/>
      <line x1="20" y1="-35" x2="28" y2="-42"/>
    </g>
    <text x="0" y="60" text-anchor="middle" font-family="serif" font-size="11" fill="#7a3b14">上千次试验</text>
  </g>

  <!-- 失败记录本（左下） -->
  <g transform="translate(100, 340)">
    <rect x="0" y="0" width="100" height="70" fill="#fff6df" stroke="#7a3b14" stroke-width="1.5" rx="3"/>
    <text x="50" y="15" text-anchor="middle" font-family="serif" font-size="10" fill="#7a3b14">实验记录</text>
    <g stroke="#c84a3a" stroke-width="1">
      <line x1="10" y1="25" x2="20" y2="25"/>
      <line x1="10" y1="35" x2="20" y2="35"/>
      <line x1="10" y1="45" x2="20" y2="45"/>
      <line x1="10" y1="55" x2="20" y2="55"/>
    </g>
    <text x="25" y="28" font-family="serif" font-size="9" fill="#8d5a36">第1次 失败</text>
    <text x="25" y="38" font-family="serif" font-size="9" fill="#8d5a36">第2次 失败</text>
    <text x="25" y="48" font-family="serif" font-size="9" fill="#8d5a36">第3次 失败</text>
    <text x="25" y="58" font-family="serif" font-size="9" fill="#8d5a36">……第1000次</text>
  </g>

  <!-- 底部说明 -->
  <rect x="50" y="500" width="700" height="60" fill="#fff6df" stroke="#c8843a" stroke-width="1.5" rx="6" opacity="0.85"/>
  <text x="400" y="525" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">好奇 · 严谨 · 不怕失败 · 求真</text>
  <text x="400" y="548" text-anchor="middle" font-family="serif" font-size="14" fill="#8d5a36">科学家不是天生聪明，而是在一次次实验中"炼"出来的</text>
</svg>
