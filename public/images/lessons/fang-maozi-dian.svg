<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="方帽子店和圆帽子对比插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">方帽子店</text>
  <line x1="300" y1="62" x2="500" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 地面 -->
  <rect x="0" y="480" width="800" height="120" fill="#e8d5b0" opacity="0.4"/>

  <!-- 左侧：方帽子店 -->
  <g transform="translate(200, 0)">
    <!-- 店面 -->
    <rect x="-100" y="200" width="200" height="280" fill="#d4a574" stroke="#7a3b14" stroke-width="2"/>
    <!-- 屋顶 -->
    <path d="M-110 200 L0 140 L110 200 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <!-- 招牌 -->
    <rect x="-70" y="210" width="140" height="35" fill="#fff6df" stroke="#c8843a" stroke-width="2" rx="4"/>
    <text x="0" y="233" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#7a3b14">方帽子店</text>
    <!-- 橱窗 -->
    <rect x="-80" y="260" width="160" height="100" fill="#a8d0e8" stroke="#7a3b14" stroke-width="2" opacity="0.5"/>
    <!-- 方帽子展示 -->
    <g transform="translate(-50, 300)">
      <rect x="-20" y="-12" width="40" height="20" fill="#5a3a1a" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-30" y="8" width="60" height="8" fill="#3a2a1a" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <g transform="translate(0, 300)">
      <rect x="-20" y="-12" width="40" height="20" fill="#8d5a36" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-30" y="8" width="60" height="8" fill="#5a3a1a" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <g transform="translate(50, 300)">
      <rect x="-20" y="-12" width="40" height="20" fill="#e07856" stroke="#7a3b14" stroke-width="1.5"/>
      <rect x="-30" y="8" width="60" height="8" fill="#5a3a1a" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <!-- 门 -->
    <rect x="-25" y="370" width="50" height="110" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <circle cx="15" cy="425" r="3" fill="#e8a838"/>
    <!-- 店主（古板的大人） -->
    <g transform="translate(-60, 420)">
      <circle cx="0" cy="-30" r="15" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 方帽子 -->
      <rect x="-12" y="-48" width="24" height="12" fill="#5a3a1a" stroke="#7a3b14" stroke-width="1"/>
      <rect x="-18" y="-38" width="36" height="5" fill="#3a2a1a"/>
      <!-- 眼睛（皱眉） -->
      <path d="M-6 -32 L-3 -30" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M6 -32 L3 -30" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-5 -22 Q0 -20 5 -22" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 身体 -->
      <path d="M-10 -15 L-12 20 L12 20 L10 -15" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
  </g>

  <!-- 中间分隔线 -->
  <line x1="400" y1="150" x2="400" y2="500" stroke="#c8843a" stroke-width="2" stroke-dasharray="8,5" opacity="0.4"/>

  <!-- 右侧：圆帽子（新事物） -->
  <g transform="translate(600, 0)">
    <!-- 户外场景 -->
    <!-- 小男孩戴圆帽子 -->
    <g transform="translate(-30, 350)">
      <!-- 头 -->
      <circle cx="0" cy="0" r="22" fill="#f0d0a8" stroke="#7a3b14" stroke-width="2"/>
      <!-- 圆帽子 -->
      <ellipse cx="0" cy="-18" rx="28" ry="10" fill="#e07856" stroke="#7a3b14" stroke-width="2"/>
      <path d="M-28 -18 Q-28 -38 0 -40 Q28 -38 28 -18" fill="#e07856" stroke="#7a3b14" stroke-width="2"/>
      <!-- 眼睛（开心） -->
      <path d="M-8 -3 Q-5 -6 -2 -3" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M2 -3 Q5 -6 8 -3" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
      <!-- 嘴（笑） -->
      <path d="M-6 8 Q0 14 6 8" fill="none" stroke="#7a3b14" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 身体 -->
      <path d="M-15 20 L-18 80 L18 80 L15 20" fill="#2d6a4f" stroke="#7a3b14" stroke-width="2"/>
      <!-- 手臂 -->
      <path d="M-15 30 L-30 55" fill="none" stroke="#f0d0a8" stroke-width="8" stroke-linecap="round"/>
      <path d="M15 30 L30 55" fill="none" stroke="#f0d0a8" stroke-width="8" stroke-linecap="round"/>
      <!-- 腿 -->
      <rect x="-12" y="78" width="9" height="35" fill="#4a90b8" rx="2"/>
      <rect x="3" y="78" width="9" height="35" fill="#4a90b8" rx="2"/>
    </g>

    <!-- 其他圆帽子（展示受欢迎） -->
    <g transform="translate(50, 280)">
      <ellipse cx="0" cy="0" rx="25" ry="8" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-25 0 Q-25 -20 0 -22 Q25 -20 25 0" fill="#e8a838" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <g transform="translate(100, 300)">
      <ellipse cx="0" cy="0" rx="22" ry="7" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-22 0 Q-22 -18 0 -20 Q22 -18 22 0" fill="#2d6a4f" stroke="#7a3b14" stroke-width="1.5"/>
    </g>
    <g transform="translate(60, 340)">
      <ellipse cx="0" cy="0" rx="20" ry="6" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M-20 0 Q-20 -16 0 -18 Q20 -16 20 0" fill="#4a90b8" stroke="#7a3b14" stroke-width="1.5"/>
    </g>

    <!-- 对比标注 -->
    <text x="20" y="200" text-anchor="middle" font-family="serif" font-size="14" fill="#2d6a4f" font-weight="bold">圆帽子：舒服又好看</text>
  </g>

  <!-- 左侧标注 -->
  <text x="200" y="180" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14" font-weight="bold">方帽子：从来如此</text>

  <!-- VS标记 -->
  <circle cx="400" cy="320" r="28" fill="#fff6df" stroke="#e07856" stroke-width="3"/>
  <text x="400" y="328" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#e07856">VS</text>

  <!-- 底部说明 -->
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">"从来如此"的方帽子被更舒服的圆帽子取代，改变需要勇气</text>
</svg>
