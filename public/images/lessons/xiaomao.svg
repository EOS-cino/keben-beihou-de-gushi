<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="满月小猫在院子里淘气玩耍插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">小猫</text>
  <line x1="350" y1="60" x2="450" y2="60" stroke="#e8a838" stroke-width="2"/>

  <!-- 院子背景墙 -->
  <rect x="0" y="80" width="800" height="360" fill="#f5e0c8" opacity="0.3"/>
  <!-- 砖纹 -->
  <g stroke="#c8a878" stroke-width="1" opacity="0.4">
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
  </g>

  <!-- 地面 -->
  <rect x="0" y="440" width="800" height="160" fill="#c8a878" opacity="0.4"/>

  <!-- 花盆架与花盆 -->
  <g transform="translate(150, 440)">
    <!-- 花盆 -->
    <path d="M-35 0 L-30 50 L30 50 L35 0 Z" fill="#e07856" stroke="#a04830" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="35" ry="8" fill="#a04830"/>
    <!-- 泥土 -->
    <ellipse cx="0" cy="-2" rx="30" ry="6" fill="#6a4220"/>
    <!-- 花 -->
    <rect x="-2" y="-40" width="4" height="40" fill="#2d6a4f"/>
    <path d="M0 -25 Q-15 -30 -18 -20 Q-10 -15 0 -20" fill="#2d6a4f"/>
    <path d="M0 -15 Q15 -20 18 -10 Q10 -5 0 -10" fill="#2d6a4f"/>
    <!-- 花朵 -->
    <g transform="translate(0, -45)">
      <circle cx="-8" cy="0" r="7" fill="#e8a838"/>
      <circle cx="8" cy="0" r="7" fill="#e8a838"/>
      <circle cx="0" cy="-8" r="7" fill="#e8a838"/>
      <circle cx="0" cy="8" r="7" fill="#e8a838"/>
      <circle cx="0" cy="0" r="6" fill="#e07856"/>
    </g>
    <!-- 散落的土 -->
    <g fill="#6a4220">
      <circle cx="-45" cy="55" r="3"/>
      <circle cx="48" cy="58" r="2.5"/>
      <circle cx="-50" cy="62" r="2"/>
    </g>
  </g>

  <!-- 小猫1（花猫，扑花盆） -->
  <g transform="translate(280, 470)">
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="35" ry="22" fill="#e07856" stroke="#a04830" stroke-width="2"/>
    <!-- 花纹 -->
    <path d="M-15 -10 Q-10 -18 -5 -10" fill="none" stroke="#a04830" stroke-width="3"/>
    <path d="M5 -12 Q10 -20 15 -12" fill="none" stroke="#a04830" stroke-width="3"/>
    <!-- 头 -->
    <circle cx="30" cy="-15" r="20" fill="#e07856" stroke="#a04830" stroke-width="2"/>
    <!-- 耳朵 -->
    <path d="M18 -28 L14 -40 L24 -32 Z" fill="#e07856" stroke="#a04830" stroke-width="2"/>
    <path d="M38 -30 L42 -42 L32 -34 Z" fill="#e07856" stroke="#a04830" stroke-width="2"/>
    <path d="M18 -28 L16 -36 L22 -32 Z" fill="#e8a838" opacity="0.6"/>
    <!-- 眼睛 -->
    <ellipse cx="24" cy="-16" rx="3" ry="4" fill="#2d6a4f"/>
    <ellipse cx="36" cy="-16" rx="3" ry="4" fill="#2d6a4f"/>
    <!-- 鼻子嘴 -->
    <path d="M28 -8 L30 -6 L32 -8" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M30 -6 Q28 -2 26 -4 M30 -6 Q32 -2 34 -4" fill="none" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 胡须 -->
    <g stroke="#7a3b14" stroke-width="1" opacity="0.7">
      <line x1="22" y1="-8" x2="10" y2="-10"/>
      <line x1="22" y1="-5" x2="10" y2="-4"/>
      <line x1="38" y1="-8" x2="50" y2="-10"/>
      <line x1="38" y1="-5" x2="50" y2="-4"/>
    </g>
    <!-- 前爪（伸出扑东西） -->
    <path d="M20 5 L35 15 L40 25" fill="none" stroke="#e07856" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="42" cy="27" rx="6" ry="4" fill="#e07856" stroke="#a04830" stroke-width="1.5"/>
    <!-- 尾巴（翘起） -->
    <path d="M-30 -5 Q-50 -15 -55 -35 Q-52 -45 -45 -40" fill="none" stroke="#e07856" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- 小猫2（黑猫，荡树枝） -->
  <g transform="translate(560, 380)">
    <!-- 垂下的树枝 -->
    <path d="M0 -60 Q5 -40 0 -20 Q-5 0 0 20" fill="none" stroke="#6a4220" stroke-width="5" stroke-linecap="round"/>
    <path d="M0 -60 L-30 -70" fill="none" stroke="#6a4220" stroke-width="4" stroke-linecap="round"/>
    <!-- 叶子 -->
    <ellipse cx="-30" cy="-72" rx="8" ry="4" fill="#2d6a4f" transform="rotate(-20 -30 -72)"/>
    <!-- 小猫倒挂 -->
    <!-- 身体 -->
    <ellipse cx="0" cy="20" rx="22" ry="30" fill="#3a3a3a" stroke="#1a1a1a" stroke-width="2"/>
    <!-- 头（朝下） -->
    <circle cx="0" cy="55" r="18" fill="#3a3a3a" stroke="#1a1a1a" stroke-width="2"/>
    <!-- 耳朵 -->
    <path d="M-12 45 L-18 38 L-8 42 Z" fill="#3a3a3a" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M12 45 L18 38 L8 42 Z" fill="#3a3a3a" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- 眼睛 -->
    <ellipse cx="-6" cy="55" rx="3" ry="3.5" fill="#e8a838"/>
    <ellipse cx="6" cy="55" rx="3" ry="3.5" fill="#e8a838"/>
    <!-- 鼻子嘴 -->
    <path d="M-3 62 L0 64 L3 62" fill="none" stroke="#e8a838" stroke-width="1.5"/>
    <!-- 前爪抓树枝 -->
    <path d="M-10 0 L-5 -15" fill="none" stroke="#3a3a3a" stroke-width="8" stroke-linecap="round"/>
    <path d="M10 0 L5 -15" fill="none" stroke="#3a3a3a" stroke-width="8" stroke-linecap="round"/>
    <!-- 尾巴 -->
    <path d="M0 -10 Q20 -25 30 -15" fill="none" stroke="#3a3a3a" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- 折断的花枝（在地上） -->
  <g transform="translate(420, 540)">
    <path d="M0 0 L30 -10" fill="none" stroke="#6a4220" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="32" cy="-12" rx="6" ry="3" fill="#2d6a4f" transform="rotate(-20 32 -12)"/>
    <circle cx="0" cy="0" r="3" fill="#e8a838"/>
  </g>

  <!-- 标注 -->
  <line x1="280" y1="440" x2="280" y2="400" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="225" y="372" width="110" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="280" y="390" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">扑花盆的小花猫</text>

  <line x1="560" y1="430" x2="560" y2="470" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="505" y="475" width="110" height="26" fill="#fff6df" stroke="#e8a838" rx="4"/>
  <text x="560" y="493" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">荡树枝的小黑猫</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">满月的小猫淘气又可爱，枝折花落也让人舍不得生气</text>
</svg>
