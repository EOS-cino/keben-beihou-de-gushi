<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="豆荚裂开五粒豌豆飞出、窗台裂缝中豌豆开花插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#7a3b14">一个豆荚里的五粒豆</text>
  <line x1="280" y1="58" x2="520" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 天空 -->
  <rect x="0" y="72" width="800" height="200" fill="#d8e8f0" opacity="0.4"/>
  <!-- 太阳 -->
  <circle cx="700" cy="120" r="26" fill="#f0c840" opacity="0.7"/>
  <circle cx="700" cy="120" r="16" fill="#f4d860" opacity="0.6"/>

  <!-- 左侧：豆荚裂开 -->
  <!-- 豆荚主体 -->
  <path d="M80 200 Q140 170 220 180 Q240 210 220 240 Q140 250 80 230 Z" fill="#b8d878" stroke="#7a9a3a" stroke-width="2"/>
  <!-- 豆荚裂缝线 -->
  <path d="M90 215 Q150 200 210 210" fill="none" stroke="#7a9a3a" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- 豆荚里的豌豆 -->
  <circle cx="120" cy="210" r="12" fill="#a8d058" stroke="#6a8a2a" stroke-width="1.5"/>
  <circle cx="155" cy="208" r="12" fill="#a8d058" stroke="#6a8a2a" stroke-width="1.5"/>
  <circle cx="190" cy="212" r="12" fill="#a8d058" stroke="#6a8a2a" stroke-width="1.5"/>

  <!-- 飞出的豌豆（带虚线轨迹） -->
  <path d="M220 200 Q280 160 340 130" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="340" cy="130" r="10" fill="#a8d058" stroke="#6a8a2a" stroke-width="1.5"/>
  <path d="M220 215 Q290 200 360 195" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="360" cy="195" r="10" fill="#a8d058" stroke="#6a8a2a" stroke-width="1.5"/>
  <path d="M220 230 Q280 260 330 280" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="330" cy="280" r="10" fill="#a8d058" stroke="#6a8a2a" stroke-width="1.5"/>

  <!-- 右侧：窗台与裂缝中的豌豆 -->
  <!-- 窗框 -->
  <rect x="440" y="100" width="300" height="240" fill="none" stroke="#8a6a3a" stroke-width="6"/>
  <line x1="590" y1="100" x2="590" y2="340" stroke="#8a6a3a" stroke-width="4"/>
  <line x1="440" y1="220" x2="740" y2="220" stroke="#8a6a3a" stroke-width="4"/>
  <!-- 窗内天空 -->
  <rect x="446" y="106" width="288" height="108" fill="#c4d8e8" opacity="0.5"/>
  <rect x="446" y="226" width="288" height="108" fill="#c4d8e8" opacity="0.5"/>

  <!-- 窗台 -->
  <rect x="420" y="340" width="340" height="20" fill="#b89868" stroke="#8a6a3a" stroke-width="2"/>
  <!-- 墙壁 -->
  <rect x="420" y="360" width="340" height="200" fill="#e8d8c0" opacity="0.5"/>

  <!-- 裂缝 -->
  <path d="M560 360 Q558 380 562 400 Q556 420 560 440" fill="none" stroke="#8a6a3a" stroke-width="3"/>
  <!-- 裂缝中的豌豆藤 -->
  <path d="M560 440 Q555 420 550 395 Q548 375 552 355" fill="none" stroke="#5a8a3a" stroke-width="3"/>
  <!-- 叶子 -->
  <ellipse cx="540" cy="395" rx="14" ry="9" fill="#6a9a4a" stroke="#4a7a2a" stroke-width="1.5" transform="rotate(-30 540 395)"/>
  <ellipse cx="565" cy="375" rx="14" ry="9" fill="#7aaa5a" stroke="#4a7a2a" stroke-width="1.5" transform="rotate(25 565 375)"/>
  <!-- 豌豆花 -->
  <g transform="translate(552,350)">
    <ellipse cx="-6" cy="0" rx="6" ry="9" fill="#f0d8e8" stroke="#c878a8" stroke-width="1.5"/>
    <ellipse cx="6" cy="0" rx="6" ry="9" fill="#f0d8e8" stroke="#c878a8" stroke-width="1.5"/>
    <ellipse cx="0" cy="-6" rx="6" ry="8" fill="#fff0f8" stroke="#c878a8" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#f4c842"/>
  </g>

  <!-- 生病女孩（窗内） -->
  <!-- 床 -->
  <rect x="470" y="290" width="100" height="40" fill="#d8a878" stroke="#8a6a3a" stroke-width="2"/>
  <rect x="470" y="280" width="100" height="15" fill="#f0e0d0" stroke="#8a6a3a" stroke-width="1.5"/>
  <!-- 女孩头 -->
  <circle cx="500" cy="270" r="14" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
  <path d="M486 268 Q500 252 514 268" fill="#6a4a2a"/>
  <circle cx="495" cy="270" r="1.5" fill="#7a3b14"/>
  <circle cx="505" cy="270" r="1.5" fill="#7a3b14"/>
  <path d="M496 278 Q500 281 504 278" fill="none" stroke="#7a3b14" stroke-width="1.2"/>
  <!-- 被子 -->
  <path d="M470 295 Q500 290 530 295 L530 320 L470 320 Z" fill="#e8a0a0" stroke="#c87878" stroke-width="1.5"/>

  <!-- 标注：豆荚 -->
  <line x1="150" y1="175" x2="150" y2="135" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="100" y="110" width="100" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="150" y="128" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">豆荚裂开</text>

  <!-- 标注：飞出的豌豆 -->
  <line x1="350" y1="130" x2="390" y2="100" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="345" y="76" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="94" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">飞向远方</text>

  <!-- 标注：裂缝中的豌豆花 -->
  <line x1="552" y1="345" x2="640" y2="300" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="610" y="275" width="120" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="670" y="293" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">裂缝中开花</text>

  <!-- 标注：生病女孩 -->
  <line x1="500" y1="258" x2="460" y2="230" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="410" y="205" width="100" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="460" y="223" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">生病女孩</text>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">五粒豌豆各有去处，唯有落在裂缝中的一粒生根开花，给生病女孩带来希望</text>
</svg>
