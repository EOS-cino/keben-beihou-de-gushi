  <text x="400" y="92" text-anchor="middle" font-family="serif" font-size="18" fill="#a85a2a">吹起一串泡泡，吹出一个梦</text>
  <g transform="translate(400,300)">
    <rect x="-30" y="0" width="60" height="60" rx="6" fill="#cfe8f0" stroke="#5a8fa3" stroke-width="2"/>
