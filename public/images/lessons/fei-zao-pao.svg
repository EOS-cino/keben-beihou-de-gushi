  </g>
  <g fill="none" stroke="#5a8fa3" stroke-width="2">
    <circle cx="240" cy="220" r="26" fill="#fbe9c8" opacity="0.5"/>
    <circle cx="560" cy="200" r="32" fill="#e8d8f0" opacity="0.5"/>
    <circle cx="200" cy="330" r="18" fill="#fbe9c8" opacity="0.5"/>
    <circle cx="600" cy="340" r="22" fill="#d8f0e0" opacity="0.5"/>
    <circle cx="320" cy="150" r="14" fill="#fbe9c8" opacity="0.5"/>
    <circle cx="500" cy="140" r="16" fill="#e8d8f0" opacity="0.5"/>
  </g>
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">把小事写细，就是好文章</text>
</svg>
