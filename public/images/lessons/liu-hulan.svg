<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="刘胡兰站在人群前，目光坚定，身后是飘扬的红旗">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空 -->
  <rect x="0" y="0" width="800" height="350" fill="#a8d0e8" opacity="0.1"/>
  <!-- 红旗（背景） -->
  <g transform="translate(650,150)" opacity="0.3">
    <path d="M0 0 L0 120 L-5 120 L-5 0 Z" fill="#8d5a36"/>
    <path d="M0 5 Q40 0 80 10 Q60 20 80 35 Q40 25 0 35 Z" fill="#c84a3a"/>
    <g transform="translate(20,15)" fill="#f4b942">
      <path d="M0 -8 L2 -2 L8 -2 L3 2 L5 8 L0 4 L-5 8 L-3 2 L-8 -2 L-2 -2 Z"/>
    </g>
  </g>
  <!-- 地面 -->
  <path d="M0 420 Q200 410 400 420 T800 415 L800 600 L0 600 Z" fill="#8d5a36" opacity="0.2"/>
  <path d="M0 460 Q200 450 400 460 T800 455 L800 600 L0 600 Z" fill="#8d5a36" opacity="0.15"/>
  <!-- 人群（背景剪影） -->
  <g fill="#7a3b14" opacity="0.2">
    <circle cx="120" cy="380" r="15"/>
    <ellipse cx="120" cy="420" rx="20" ry="25"/>
    <circle cx="170" cy="375" r="14"/>
    <ellipse cx="170" cy="415" rx="18" ry="25"/>
    <circle cx="220" cy="380" r="15"/>
    <ellipse cx="220" cy="420" rx="20" ry="25"/>
    <circle cx="600" cy="375" r="14"/>
    <ellipse cx="600" cy="415" rx="18" ry="25"/>
    <circle cx="650" cy="380" r="15"/>
    <ellipse cx="650" cy="420" rx="20" ry="25"/>
    <circle cx="700" cy="375" r="14"/>
    <ellipse cx="700" cy="415" rx="18" ry="25"/>
  </g>
  <!-- 刘胡兰 -->
  <g transform="translate(400,300)">
    <!-- 身体（穿棉衣） -->
    <ellipse cx="0" cy="60" rx="35" ry="50" fill="#7a3b14"/>
    <!-- 衣领 -->
    <path d="M-15 15 L0 25 L15 15" stroke="#5a2a0a" stroke-width="2" fill="none"/>
    <!-- 头 -->
    <circle cx="0" cy="0" r="28" fill="#f4d4a8"/>
    <!-- 头发（短发） -->
    <path d="M-25 -5 Q-28 -25 -15 -28 Q0 -32 15 -28 Q28 -25 25 -5 Q20 -18 0 -20 Q-20 -18 -25 -5" fill="#2d2a24"/>
    <!-- 眼睛（坚定） -->
    <ellipse cx="-9" cy="0" rx="3" ry="4" fill="#2d2a24"/>
    <ellipse cx="9" cy="0" rx="3" ry="4" fill="#2d2a24"/>
    <!-- 眉毛 -->
    <path d="M-14 -8 L-5 -10" stroke="#2d2a24" stroke-width="2.5"/>
    <path d="M14 -8 L5 -10" stroke="#2d2a24" stroke-width="2.5"/>
    <!-- 嘴（抿紧） -->
    <path d="M-5 12 L5 12" stroke="#7a3b14" stroke-width="2"/>
    <!-- 鼻子 -->
    <path d="M0 2 L-2 8 L2 8" stroke="#d4a888" stroke-width="1.5" fill="none"/>
    <!-- 手臂 -->
    <path d="M-30 40 L-40 70" stroke="#7a3b14" stroke-width="12" stroke-linecap="round"/>
    <path d="M30 40 L40 70" stroke="#7a3b14" stroke-width="12" stroke-linecap="round"/>
    <!-- 拳头 -->
    <circle cx="-40" cy="72" r="8" fill="#f4d4a8"/>
    <circle cx="40" cy="72" r="8" fill="#f4d4a8"/>
  </g>
  <!-- 铡刀（前方地上） -->
  <g transform="translate(400,470)" opacity="0.5">
    <rect x="-50" y="0" width="100" height="8" fill="#5a5a5a" opacity="0.6"/>
    <rect x="-5" y="-30" width="10" height="30" fill="#5a5a5a" opacity="0.6"/>
    <path d="M-50 4 L50 4 L45 12 L-45 12 Z" fill="#8d5a36" opacity="0.5"/>
  </g>
  <!-- 光芒（象征性） -->
  <g stroke="#f4b942" stroke-width="2" opacity="0.2">
    <line x1="400" y1="230" x2="400" y2="180"/>
    <line x1="340" y1="250" x2="300" y2="220"/>
    <line x1="460" y1="250" x2="500" y2="220"/>
    <line x1="320" y1="300" x2="270" y2="290"/>
    <line x1="480" y1="300" x2="530" y2="290"/>
  </g>
  <!-- 题词 -->
  <g transform="translate(400,530)">
    <rect x="-130" y="-20" width="260" height="40" rx="5" fill="#fef9ed" stroke="#7a3b14" stroke-width="1.5" opacity="0.8"/>
    <text x="0" y="6" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#c84a3a">生的伟大，死的光荣</text>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">刘胡兰</text>
</svg>
