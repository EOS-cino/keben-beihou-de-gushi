<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="各种树木排成一排：高高的杨树、大大的榕树、金黄的梧桐、结果的木棉">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 天空 -->
  <rect x="0" y="0" width="800" height="400" fill="#a8d0e8" opacity="0.15"/>
  <!-- 太阳 -->
  <circle cx="680" cy="80" r="30" fill="#f4b942" opacity="0.7"/>
  <!-- 地面 -->
  <path d="M0 450 Q200 440 400 450 T800 445 L800 600 L0 600 Z" fill="#6a8d3f" opacity="0.4"/>
  <path d="M0 490 Q200 480 400 490 T800 485 L800 600 L0 600 Z" fill="#4a6a2f" opacity="0.3"/>
  <!-- 杨树（高） -->
  <g transform="translate(120,450)">
    <rect x="-8" y="-120" width="16" height="120" fill="#8d5a36"/>
    <ellipse cx="0" cy="-150" rx="30" ry="60" fill="#6a8d3f"/>
    <ellipse cx="-15" cy="-130" rx="20" ry="35" fill="#7ba84a"/>
    <ellipse cx="15" cy="-140" rx="20" ry="35" fill="#7ba84a"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">杨树</text>
  </g>
  <!-- 榕树（壮） -->
  <g transform="translate(300,450)">
    <rect x="-15" y="-100" width="30" height="100" fill="#8d5a36"/>
    <circle cx="0" cy="-130" r="60" fill="#6a8d3f"/>
    <circle cx="-35" cy="-110" r="35" fill="#7ba84a"/>
    <circle cx="35" cy="-110" r="35" fill="#7ba84a"/>
    <circle cx="0" cy="-170" r="40" fill="#6a8d3f"/>
    <!-- 气根 -->
    <path d="M-30 -90 Q-32 -50 -28 -20" stroke="#8d5a36" stroke-width="3" fill="none"/>
    <path d="M30 -90 Q32 -50 28 -20" stroke="#8d5a36" stroke-width="3" fill="none"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">榕树</text>
  </g>
  <!-- 梧桐（叶像手掌） -->
  <g transform="translate(480,450)">
    <rect x="-10" y="-110" width="20" height="110" fill="#8d5a36"/>
    <circle cx="0" cy="-140" r="50" fill="#c8843a"/>
    <circle cx="-25" cy="-155" r="25" fill="#e0a050"/>
    <circle cx="25" cy="-155" r="25" fill="#e0a050"/>
    <circle cx="0" cy="-175" r="25" fill="#e0a050"/>
    <!-- 手掌叶 -->
    <g transform="translate(-30,-120)">
      <path d="M0 0 L-8 -15 L-3 -18 L-10 -25 L-2 -25 L-8 -35 L2 -28 L5 -38 L8 -25 L15 -30 L8 -18 L12 -12 L3 -8 Z" fill="#c8843a" stroke="#8d5a36" stroke-width="1"/>
    </g>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">梧桐</text>
  </g>
  <!-- 木棉（红花） -->
  <g transform="translate(660,450)">
    <rect x="-8" y="-130" width="16" height="130" fill="#8d5a36"/>
    <ellipse cx="0" cy="-160" rx="35" ry="55" fill="#6a8d3f"/>
    <!-- 红花 -->
    <circle cx="-15" cy="-180" r="10" fill="#c84a3a"/>
    <circle cx="15" cy="-175" r="10" fill="#c84a3a"/>
    <circle cx="0" cy="-200" r="10" fill="#c84a3a"/>
    <circle cx="-20" cy="-160" r="8" fill="#e07856"/>
    <circle cx="20" cy="-165" r="8" fill="#e07856"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">木棉</text>
  </g>
  <!-- 松树 -->
  <g transform="translate(60,470)">
    <rect x="-5" y="-50" width="10" height="50" fill="#8d5a36"/>
    <path d="M0 -120 L-25 -70 L-15 -70 L-30 -40 L-20 -40 L-35 -10 L35 -10 L20 -40 L30 -40 L15 -70 L25 -70 Z" fill="#4a6a2f"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">松柏</text>
  </g>
  <!-- 银杏 -->
  <g transform="translate(740,470)">
    <rect x="-5" y="-60" width="10" height="60" fill="#8d5a36"/>
    <ellipse cx="0" cy="-90" rx="25" ry="35" fill="#f4b942"/>
    <path d="M-15 -100 Q0 -115 15 -100" fill="#e0a050" opacity="0.5"/>
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="12" fill="#7a3b14">银杏</text>
  </g>
  <!-- 标题 -->
  <text x="400" y="55" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">树之歌</text>
</svg>
