<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="三首秋景古诗意境插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <text x="400" y="46" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#2D2A24">古诗三首·秋</text>
  <text x="400" y="70" text-anchor="middle" font-family="serif" font-size="13" fill="#7A7468">山行 · 赠刘景文 · 夜书所见</text>
  <line x1="300" y1="82" x2="500" y2="82" stroke="#C05A30" stroke-width="2"/>

  <!-- 山行 -->
  <g transform="translate(150,320)">
    <rect x="-115" y="-140" width="230" height="280" rx="10" fill="#F5F0E8" stroke="#C05A30" stroke-width="2"/>
    <text x="0" y="-114" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#C05A30">山行</text>
    <!-- mountain -->
    <path d="M-90,80 L-30,-20 L10,40 L60,-50 L95,80 Z" fill="#7A7468" opacity="0.5" stroke="#2D2A24" stroke-width="1.5"/>
    <!-- red maples -->
    <circle cx="-20" cy="20" r="16" fill="#C05A30"/>
    <circle cx="20" cy="40" r="14" fill="#C05A30"/>
    <circle cx="50" cy="10" r="15" fill="#C05A30"/>
    <circle cx="-50" cy="50" r="12" fill="#C05A30"/>
    <!-- winding path -->
    <path d="M-80,80 Q-20,60 20,75 Q60,90 80,60" fill="none" stroke="#E0D9CE" stroke-width="4"/>
    <!-- house in clouds -->
    <rect x="-10" y="-10" width="16" height="12" fill="#2D2A24"/>
    <path d="M-12,-10 L-2,-22 L8,-10 Z" fill="#2D2A24"/>
    <ellipse cx="0" cy="-30" rx="30" ry="8" fill="#F5F0E8" opacity="0.9"/>
    <text x="0" y="110" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">霜叶红于二月花</text>
  </g>

  <!-- 赠刘景文 -->
  <g transform="translate(400,320)">
    <rect x="-115" y="-140" width="230" height="280" rx="10" fill="#F5F0E8" stroke="#3A7D5C" stroke-width="2"/>
    <text x="0" y="-114" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#3A7D5C">赠刘景文</text>
    <!-- oranges -->
    <g>
      <circle cx="-40" cy="40" r="20" fill="#C05A30" stroke="#2D2A24" stroke-width="1.5"/>
      <circle cx="0" cy="30" r="22" fill="#C05A30" stroke="#2D2A24" stroke-width="1.5"/>
      <circle cx="40" cy="45" r="18" fill="#C05A30" stroke="#2D2A24" stroke-width="1.5"/>
    </g>
    <!-- green tangerines -->
    <g>
      <circle cx="-30" cy="-10" r="14" fill="#3A7D5C" stroke="#2D2A24" stroke-width="1.5"/>
      <circle cx="20" cy="-20" r="15" fill="#3A7D5C" stroke="#2D2A24" stroke-width="1.5"/>
    </g>
    <!-- leaves -->
    <path d="M-20,55 L-30,40 M10,50 L2,32" stroke="#3A7D5C" stroke-width="2"/>
    <text x="0" y="100" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">橙黄橘绿</text>
    <text x="0" y="118" text-anchor="middle" font-family="serif" font-size="11" fill="#7A7468">一年好景</text>
  </g>

  <!-- 夜书所见 -->
  <g transform="translate(650,320)">
    <rect x="-115" y="-140" width="230" height="280" rx="10" fill="#2D2A24" stroke="#7A7468" stroke-width="2"/>
    <text x="0" y="-114" text-anchor="middle" font-family="serif" font-size="15" font-weight="bold" fill="#E0D9CE">夜书所见</text>
    <!-- moon -->
    <circle cx="40" cy="-70" r="20" fill="#E0D9CE" opacity="0.9"/>
    <!-- tree with falling leaves -->
    <rect x="-4" y="20" width="8" height="50" fill="#7A7468"/>
    <circle cx="-15" cy="10" r="18" fill="#7A7468" opacity="0.8"/>
    <circle cx="15" cy="0" r="18" fill="#7A7468" opacity="0.8"/>
    <path d="M0,-5 q4,8 0,16 q-4,-8 0,-16" fill="#C05A30"/>
    <!-- child with lantern catching cricket -->
    <g transform="translate(-40,60)">
      <circle cx="0" cy="-6" r="5" fill="#E0D9CE"/>
      <rect x="-4" y="-1" width="8" height="10" fill="#C05A30"/>
      <rect x="6" y="-2" width="4" height="6" fill="#E8C95A"/>
    </g>
    <text x="0" y="110" text-anchor="middle" font-family="serif" font-size="11" fill="#E0D9CE">萧萧梧叶送寒声</text>
  </g>
</svg>
