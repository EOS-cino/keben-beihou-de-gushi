<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="江南春日莺啼花红、水村酒旗与烟雨古寺">
  <rect width="800" height="600" fill="#fef9ed"/>
  <rect x="0" y="0" width="800" height="320" fill="#e8a838" opacity="0.08"/>
  <!-- 远山烟雨 -->
  <path d="M0 280 Q120 210 260 260 Q400 220 540 250 Q680 230 800 270 L800 320 L0 320 Z" fill="#9fc8b4" opacity="0.45"/>
  <path d="M0 310 Q200 270 420 295 Q620 275 800 300 L800 340 L0 340 Z" fill="#4a90b8" opacity="0.18"/>
  <!-- 古寺飞檐 -->
  <g transform="translate(560 250)">
    <path d="M-50 0 L0 -45 L50 0 L42 4 L0 -40 L-42 4 Z" fill="#e07856"/>
    <rect x="-38" y="0" width="76" height="55" fill="#f4e4c4" stroke="#8d5a36" stroke-width="2"/>
    <rect x="-12" y="20" width="24" height="35" fill="#8d5a36"/>
    <rect x="-32" y="10" width="16" height="16" fill="#4a90b8" opacity="0.6"/>
    <rect x="16" y="10" width="16" height="16" fill="#4a90b8" opacity="0.6"/>
  </g>
  <g transform="translate(640 235)" opacity="0.7">
    <path d="M-36 0 L0 -34 L36 0 Z" fill="#e07856"/>
    <rect x="-28" y="0" width="56" height="42" fill="#f4e4c4" stroke="#8d5a36" stroke-width="1.5"/>
  </g>
  <!-- 水村 -->
  <g transform="translate(180 320)">
    <path d="M-45 0 L0 -38 L45 0 Z" fill="#2d6a4f"/>
    <rect x="-36" y="0" width="72" height="48" fill="#fff6df" stroke="#8d5a36" stroke-width="2"/>
    <rect x="-12" y="18" width="24" height="30" fill="#8d5a36"/>
    <rect x="10" y="10" width="16" height="14" fill="#4a90b8" opacity="0.6"/>
  </g>
  <!-- 酒旗 -->
  <g transform="translate(255 300)">
    <line x1="0" y1="0" x2="0" y2="-50" stroke="#8d5a36" stroke-width="2.5"/>
    <path d="M0 -48 L34 -42 L30 -28 L0 -32 Z" fill="#e07856" opacity="0.85"/>
    <text x="15" y="-34" text-anchor="middle" font-family="serif" font-size="12" fill="#fff6df">酒</text>
  </g>
  <!-- 河水 -->
  <path d="M0 360 Q400 350 800 360 L800 520 L0 520 Z" fill="#4a90b8" opacity="0.22"/>
  <path d="M120 380 Q200 376 280 380" stroke="#4a90b8" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M420 400 Q500 396 580 400" stroke="#4a90b8" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- 红花绿树 -->
  <g transform="translate(120 340)">
    <rect x="-3" y="0" width="6" height="40" fill="#8d5a36"/>
    <circle cx="0" cy="-8" r="22" fill="#2d6a4f" opacity="0.7"/>
    <circle cx="-14" cy="-2" r="6" fill="#e07856"/>
    <circle cx="10" cy="-14" r="5" fill="#c84a3a"/>
    <circle cx="4" cy="6" r="5" fill="#e07856"/>
  </g>
  <!-- 黄莺 -->
  <g transform="translate(420 150)">
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="#e8a838"/>
    <circle cx="12" cy="-4" r="7" fill="#e8a838"/>
    <circle cx="14" cy="-5" r="1.5" fill="#7a3b14"/>
    <path d="M18 -4 L26 -5 L18 -2 Z" fill="#e07856"/>
    <path d="M-12 0 Q-22 -8 -18 6" stroke="#8d5a36" stroke-width="2" fill="none"/>
    <path d="M-6 8 Q0 14 6 8" stroke="#7a3b14" stroke-width="1" fill="none"/>
  </g>
  <text x="380" y="138" font-family="serif" font-size="16" fill="#e8a838">♪</text>
  <!-- 烟雨斜线 -->
  <g stroke="#4a90b8" stroke-width="1" opacity="0.25">
    <line x1="100" y1="180" x2="92" y2="210"/>
    <line x1="200" y1="170" x2="192" y2="200"/>
    <line x1="340" y1="190" x2="332" y2="220"/>
    <line x1="480" y1="175" x2="472" y2="205"/>
    <line x1="620" y1="185" x2="612" y2="215"/>
    <line x1="700" y1="170" x2="692" y2="200"/>
  </g>
  <text x="400" y="50" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#2d6a4f">江南春</text>
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">千里莺啼绿映红 水村山郭酒旗风</text>
  <text x="400" y="584" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">南朝四百八十寺 多少楼台烟雨中</text>
</svg>
