<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="一块米糕和它背后许多劳动者的插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="48" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">千人糕</text>
  <line x1="340" y1="62" x2="460" y2="62" stroke="#c8843a" stroke-width="2"/>

  <!-- 桌面 -->
  <rect x="0" y="440" width="800" height="160" fill="#d8b878" opacity="0.5"/>
  <rect x="0" y="440" width="800" height="10" fill="#8d5a36" opacity="0.4"/>

  <!-- 米糕（中间放大） -->
  <g>
    <ellipse cx="400" cy="450" rx="120" ry="20" fill="#8d5a36" opacity="0.3"/>
    <rect x="290" y="360" width="220" height="80" fill="#fff8e0" stroke="#c8843a" stroke-width="2" rx="8"/>
    <ellipse cx="400" cy="360" rx="110" ry="22" fill="#fff8e0" stroke="#c8843a" stroke-width="2"/>
    <!-- 糕面装饰 -->
    <circle cx="350" cy="358" r="6" fill="#c84a3a"/>
    <circle cx="400" cy="355" r="6" fill="#c84a3a"/>
    <circle cx="450" cy="358" r="6" fill="#c84a3a"/>
    <text x="400" y="405" text-anchor="middle" font-family="serif" font-size="20" fill="#7a3b14">米糕</text>
  </g>

  <!-- 周围劳动场景（围绕米糕） -->
  <!-- 左上：农民种稻 -->
  <g transform="translate(110, 130)">
    <!-- 水田 -->
    <path d="M0 60 Q40 55 80 60 L80 90 L0 90 Z" fill="#a8d0e8" opacity="0.6"/>
    <!-- 稻穗 -->
    <line x1="20" y1="55" x2="18" y2="35" stroke="#6a8d3f" stroke-width="2"/>
    <line x1="40" y1="55" x2="38" y2="32" stroke="#6a8d3f" stroke-width="2"/>
    <line x1="60" y1="55" x2="58" y2="35" stroke="#6a8d3f" stroke-width="2"/>
    <ellipse cx="18" cy="32" rx="4" ry="6" fill="#c8843a"/>
    <ellipse cx="38" cy="29" rx="4" ry="6" fill="#c8843a"/>
    <ellipse cx="58" cy="32" rx="4" ry="6" fill="#c8843a"/>
    <!-- 农民 -->
    <circle cx="40" cy="10" r="8" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M32 18 L48 18 L46 45 L34 45 Z" fill="#c84a3a" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M40 8 Q40 2 48 4" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  </g>
  <text x="150" y="240" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">种稻</text>

  <!-- 右上：熬糖 -->
  <g transform="translate(600, 130)">
    <!-- 甘蔗 -->
    <rect x="10" y="10" width="8" height="50" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5" rx="3"/>
    <rect x="22" y="5" width="8" height="55" fill="#6a8d3f" stroke="#4a6a2f" stroke-width="1.5" rx="3"/>
    <!-- 糖锅 -->
    <path d="M5 65 L55 65 L50 95 L10 95 Z" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <ellipse cx="30" cy="65" rx="25" ry="6" fill="#c8843a"/>
    <!-- 蒸汽 -->
    <path d="M20 60 Q25 50 22 42 M35 60 Q40 50 37 42" fill="none" stroke="#c8c8c8" stroke-width="2" opacity="0.6"/>
  </g>
  <text x="635" y="240" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">熬糖</text>

  <!-- 左下：磨米 -->
  <g transform="translate(80, 280)">
    <!-- 石磨 -->
    <ellipse cx="40" cy="50" rx="35" ry="10" fill="#8d5a36" stroke="#5a3a1a" stroke-width="2"/>
    <rect x="10" y="40" width="60" height="15" fill="#a8a8a8" stroke="#5a5a5a" stroke-width="2" rx="3"/>
    <ellipse cx="40" cy="40" rx="30" ry="8" fill="#c8c8c8" stroke="#5a5a5a" stroke-width="2"/>
    <!-- 米粉 -->
    <ellipse cx="40" cy="62" rx="20" ry="4" fill="#fff8e0"/>
    <!-- 磨柄 -->
    <line x1="40" y1="40" x2="70" y2="20" stroke="#8d5a36" stroke-width="4"/>
  </g>
  <text x="120" y="360" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">磨米</text>

  <!-- 右下：运输 -->
  <g transform="translate(620, 280)">
    <!-- 卡车 -->
    <rect x="5" y="35" width="50" height="25" fill="#c84a3a" stroke="#7a3b14" stroke-width="2" rx="2"/>
    <rect x="55" y="25" width="25" height="35" fill="#e07856" stroke="#7a3b14" stroke-width="2" rx="2"/>
    <rect x="60" y="30" width="15" height="12" fill="#a8d0e8" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="20" cy="62" r="7" fill="#2a2a2a"/>
    <circle cx="20" cy="62" r="3" fill="#8d5a36"/>
    <circle cx="65" cy="62" r="7" fill="#2a2a2a"/>
    <circle cx="65" cy="62" r="3" fill="#8d5a36"/>
  </g>
  <text x="660" y="360" text-anchor="middle" font-family="serif" font-size="13" fill="#7a3b14">运输</text>

  <!-- 连接线（表示劳动汇聚到米糕） -->
  <path d="M150 250 Q250 320 320 380" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <path d="M635 250 Q540 320 470 380" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <path d="M120 370 Q220 400 290 420" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <path d="M660 370 Q560 400 490 420" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>

  <!-- 标注：千人糕 -->
  <line x1="400" y1="350" x2="400" y2="300" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="345" y="275" width="110" height="28" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="400" y="294" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">千人糕</text>

  <!-- 底部说明 -->
  <text x="400" y="575" text-anchor="middle" font-family="serif" font-size="16" fill="#7a3b14">一块小小的米糕，经过种稻、磨米、熬糖、运输等许多人的劳动，所以叫"千人糕"</text>
</svg>
