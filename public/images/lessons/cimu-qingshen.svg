<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="纺织厂母亲工作的场景、母亲给钱买书插画">
  <rect width="800" height="600" fill="#fef9ed"/>
  <!-- 标题 -->
  <text x="400" y="44" text-anchor="middle" font-family="serif" font-size="30" font-weight="bold" fill="#7a3b14">慈母情深</text>
  <line x1="330" y1="58" x2="470" y2="58" stroke="#c8843a" stroke-width="2"/>

  <!-- 厂房背景 -->
  <rect x="0" y="72" width="800" height="420" fill="#e0d8c8" opacity="0.3"/>
  <!-- 厂房窗户 -->
  <rect x="40" y="90" width="80" height="60" fill="#c4d8e8" opacity="0.4" stroke="#8a7a60" stroke-width="1.5"/>
  <line x1="80" y1="90" x2="80" y2="150" stroke="#8a7a60" stroke-width="1"/>
  <line x1="40" y1="120" x2="120" y2="120" stroke="#8a7a60" stroke-width="1"/>
  <rect x="680" y="90" width="80" height="60" fill="#c4d8e8" opacity="0.4" stroke="#8a7a60" stroke-width="1.5"/>
  <line x1="720" y1="90" x2="720" y2="150" stroke="#8a7a60" stroke-width="1"/>
  <line x1="680" y1="120" x2="760" y2="120" stroke="#8a7a60" stroke-width="1"/>

  <!-- 缝纫机排列（背景） -->
  <g opacity="0.4">
    <g transform="translate(100, 350)">
      <rect x="-20" y="0" width="40" height="25" fill="#6a6a6a" stroke="#4a4a4a" stroke-width="1"/>
      <rect x="-8" y="-15" width="16" height="15" fill="#5a5a5a" stroke="#4a4a4a" stroke-width="1"/>
      <line x1="0" y1="-15" x2="0" y2="-25" stroke="#4a4a4a" stroke-width="2"/>
    </g>
    <g transform="translate(700, 350)">
      <rect x="-20" y="0" width="40" height="25" fill="#6a6a6a" stroke="#4a4a4a" stroke-width="1"/>
      <rect x="-8" y="-15" width="16" height="15" fill="#5a5a5a" stroke="#4a4a4a" stroke-width="1"/>
      <line x1="0" y1="-15" x2="0" y2="-25" stroke="#4a4a4a" stroke-width="2"/>
    </g>
  </g>

  <!-- 中央：母亲在缝纫机前工作 -->
  <g transform="translate(320, 340)">
    <!-- 缝纫机 -->
    <rect x="-35" y="20" width="70" height="30" fill="#5a5a5a" stroke="#3a3a3a" stroke-width="2"/>
    <rect x="-12" y="-5" width="24" height="25" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="2"/>
    <line x1="0" y1="-5" x2="0" y2="-20" stroke="#3a3a3a" stroke-width="2.5"/>
    <circle cx="0" cy="-22" r="3" fill="#3a3a3a"/>
    <!-- 轮子 -->
    <circle cx="-28" cy="35" r="10" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="1.5"/>
    <line x1="-28" y1="25" x2="-28" y2="45" stroke="#3a3a3a" stroke-width="1"/>
    <line x1="-38" y1="35" x2="-18" y2="35" stroke="#3a3a3a" stroke-width="1"/>

    <!-- 母亲（弯背坐着） -->
    <!-- 凳子 -->
    <rect x="-50" y="55" width="25" height="5" fill="#8a6a3a"/>
    <line x1="-45" y1="60" x2="-45" y2="80" stroke="#8a6a3a" stroke-width="3"/>
    <line x1="-32" y1="60" x2="-32" y2="80" stroke="#8a6a3a" stroke-width="3"/>
    <!-- 身体（弯背） -->
    <path d="M -38 55 Q -42 30 -30 10 Q -20 0 -10 5 Q 0 15 5 30 Q 10 45 15 55" fill="#7a6a5a" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 头（低头） -->
    <circle cx="-15" cy="0" r="13" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
    <!-- 头发（沾棉絮） -->
    <path d="M -28 -2 Q -26 -14 -15 -15 Q -4 -14 -2 -2" fill="#8a8a8a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-20" cy="-10" r="2" fill="#f0f0f0" opacity="0.8"/>
    <circle cx="-8" cy="-12" r="1.5" fill="#f0f0f0" opacity="0.8"/>
    <!-- 眼睛（低头看） -->
    <path d="M -19 2 Q -17 3 -15 2" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <path d="M -13 2 Q -11 3 -9 2" fill="none" stroke="#7a3b14" stroke-width="1"/>
    <!-- 手臂（在缝纫机上操作） -->
    <path d="M -5 20 Q 5 15 15 10" fill="none" stroke="#7a6a5a" stroke-width="7" stroke-linecap="round"/>
    <!-- 手（龟裂） -->
    <ellipse cx="16" cy="8" rx="6" ry="4" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1"/>
    <line x1="13" y1="6" x2="14" y2="9" stroke="#a87858" stroke-width="0.5"/>
    <line x1="17" y1="5" x2="18" y2="9" stroke="#a87858" stroke-width="0.5"/>
    <line x1="20" y1="6" x2="20" y2="9" stroke="#a87858" stroke-width="0.5"/>
  </g>

  <!-- 右侧：母亲给"我"钱 -->
  <g transform="translate(580, 340)">
    <!-- 母亲上半身 -->
    <path d="M -20 60 Q -22 25 -15 10 Q -8 2 0 2 Q 8 2 15 10 Q 22 25 20 60" fill="#7a6a5a" stroke="#7a3b14" stroke-width="1.5"/>
    <circle cx="0" cy="-12" r="13" fill="#e8c4a0" stroke="#7a3b14" stroke-width="1.5"/>
    <path d="M -13 -14 Q -11 -26 0 -27 Q 11 -26 13 -14" fill="#8a8a8a" stroke="#7a3b14" stroke-width="1"/>
    <circle cx="-4" cy="-12" r="1.5" fill="#7a3b14"/>
    <circle cx="4" cy="-12" r="1.5" fill="#7a3b14"/>
    <path d="M -4 -4 Q 0 -2 4 -4" fill="none" stroke="#7a3b14" stroke-width="1.2"/>
    <!-- 手递钱 -->
    <path d="M 15 15 Q 25 10 32 5" fill="none" stroke="#7a6a5a" stroke-width="7" stroke-linecap="round"/>
    <!-- 钱币 -->
    <rect x="30" y="-2" width="18" height="10" fill="#f0e8a0" stroke="#7a3b14" stroke-width="1.5" transform="rotate(-10 39 3)"/>
    <text x="39" y="6" text-anchor="middle" font-size="6" fill="#7a3b14" font-family="serif" transform="rotate(-10 39 3)">1.5</text>

    <!-- "我"（孩子） -->
    <g transform="translate(55, 20)">
      <path d="M -10 40 Q -12 15 -8 5 Q -4 0 0 0 Q 4 0 8 5 Q 12 15 10 40" fill="#3a5a8a" stroke="#7a3b14" stroke-width="1.5"/>
      <circle cx="0" cy="-10" r="10" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1.5"/>
      <path d="M -10 -12 Q -8 -22 0 -23 Q 8 -22 10 -12" fill="#3a3a3a" stroke="#7a3b14" stroke-width="1"/>
      <circle cx="-3" cy="-10" r="1.5" fill="#7a3b14"/>
      <circle cx="3" cy="-10" r="1.5" fill="#7a3b14"/>
      <!-- 伸手接钱 -->
      <path d="M -10 10 Q -18 8 -22 5" fill="none" stroke="#3a5a8a" stroke-width="6" stroke-linecap="round"/>
      <circle cx="-23" cy="4" r="4" fill="#f0d0a8" stroke="#7a3b14" stroke-width="1"/>
    </g>
  </g>

  <!-- 棉絮飘浮 -->
  <circle cx="200" cy="180" r="4" fill="#fff" opacity="0.7"/>
  <circle cx="450" cy="150" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="600" cy="200" r="5" fill="#fff" opacity="0.5"/>
  <circle cx="150" cy="250" r="3" fill="#fff" opacity="0.6"/>

  <!-- 标注：缝纫机 -->
  <line x1="285" y1="365" x2="200" y2="400" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="140" y="390" width="100" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="190" y="408" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">缝纫机</text>

  <!-- 标注：龟裂的手 -->
  <line x1="336" y1="348" x2="380" y2="310" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="360" y="288" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="415" y="306" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">龟裂的手</text>

  <!-- 标注：弯背 -->
  <line x1="290" y1="340" x2="230" y2="300" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="170" y="278" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="225" y="296" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">弯曲的背</text>

  <!-- 标注：买书的钱 -->
  <line x1="615" y1="340" x2="660" y2="300" stroke="#7a3b14" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="620" y="278" width="110" height="26" fill="#fff6df" stroke="#c8843a" rx="4"/>
  <text x="675" y="296" text-anchor="middle" font-family="serif" font-size="14" fill="#7a3b14">买书的钱</text>

  <!-- 底部说明 -->
  <text x="400" y="585" text-anchor="middle" font-family="serif" font-size="15" fill="#7a3b14">母亲在轰鸣的厂房里弯背做工，一元五角买书钱里藏着深深的母爱</text>
</svg>
